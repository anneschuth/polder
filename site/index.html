<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Polder — Organogram van de Nederlandse overheid</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <header>
    <div class="brand">
      <h1>Polder</h1>
      <p class="subtitle">Organogram van de Nederlandse overheid</p>
    </div>
    <div class="search-wrap">
      <input id="search" type="search" placeholder="Zoek organisatie of persoon…" autocomplete="off" />
      <div id="search-results" class="search-results" hidden></div>
    </div>
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Wissel thema" title="Wissel licht/donker">◐</button>
  </header>
  <div id="timebar">
    <input id="timeslider" type="range" />
    <output id="timelabel">vandaag</output>
  </div>
  <main>
    <div id="chart" aria-label="Organogram"></div>
    <aside id="breadcrumb" aria-live="polite"></aside>
  </main>
  <script src="vendor/d3.v7.min.js"></script>
  <script src="vendor/fuse.min.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
