description:
  text: De Dienst van de Huurcommissie ondersteunt de Huurcommissie bij zijn werkzaamheden.
    De Huurcommissie is een onpartijdige organisatie, een zelfstandig bestuursorgaan
    (zbo), die geschillen tussen huurders en verhuurders voorkomt, helpt oplossen
    of daarover een officiële uitspraak doet.
