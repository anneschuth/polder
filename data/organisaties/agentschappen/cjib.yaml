description:
  text: Als onderdeel van de Rijksoverheid en het Ministerie van Justitie en Veiligheid werkt het CJIB aan een veilige en rechtvaardige samenleving. Het CJIB vormt een belangrijke schakel in het borgen van de rechtsstaat in Nederland.* CJIB is publieke dienstverlener met een persoonsgerichte uitvoeringHet CJIB is als publieke dienstverlener expert op het gebied van innen en incasseren voor overheidsinstanties én is de spil in de executieketen. Hoogwaardige en persoonsgerichtedienstverlening staat centraal in alles wat we doen richting mensen, bedrijven en hun vertegenwoordigers en altijd in verbinding met de samenleving. Zodat mensen, bedrijven enhun vertegenwoordigers passende dienstverlening krijgen, nooit voor een dichte deur staan en wanneer nodig altijd (verder) geholpen worden door een deskundige medewerker.* CJIB is regisseur en verbinder in de executieketenHet CJIB zorgt als ketenregisseur voor snelle, daadwerkelijke en volledige tenuitvoerlegging van strafrechtelijke beslissingen
    door goed geïnformeerde partijen. Het CJIB doet dit vanuit het besef dat hiermee ingrijpende beslissingen worden uitgevoerd en genomen in de levens van mensen. Daarmee wordt recht gedaan aan daders door strafrechtelijke beslissingen rechtvaardig uit te voeren en aan slachtoffers door hen te informeren, te beschermen en schade te vergoeden. De ketenpartners  wordengefaciliteerd door hen te voorzien van de juiste informatie, het delen van relevante data en inzichten en het inzetten van onze expertise.* CJIB is expert in persoonsgericht innen & incasserenHet CJIB is expert op het gebied van persoonsgericht innen en incasseren en voegt daarmee gericht waarde toe aan de inning en incasso van overheidsvorderingen.
  url: https://www.cjib.nl/onze-kerntaken
