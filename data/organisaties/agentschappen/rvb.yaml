description:
  text: Het Rijksvastgoedbedrijf (RVB) beheert de gebouwen en gronden van de Rijksoverheid en Defensie. De dienst valt onder het ministerie van Volkshuisvesting en Ruimtelijke Ordening en is verantwoordelijk voor het beheer en de instandhouding van de grootste en meest diverse vastgoedportefeuille van Nederland, inclusief Caribisch Nederland.
