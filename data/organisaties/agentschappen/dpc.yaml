description:
  text: '"De Dienst Publiek en Communicatie (DPC) staat voor overheidscommunicatie
    die verbindt en begint bij wat mensen beweegt. Dat doet DPC door oog te hebben
    voor wat mensen in de samenleving bezighoudt en nodig hebben. Ook volgt DPC haar
    vakgebied op de voet. DPC past de opgedane inzichten toe in de rechtstreekse communicatie
    met het publiek. Deze komen tot uitdrukking in de ondersteuning en advisering
    aan de communicatiecollega’s binnen de overheid. Alles met als einddoel om overheid
    en samenleving dichter bij elkaar te brengen."De Dienst Publiek en Communicatie
    is als publieke dienstverlener verantwoordelijk voor de informatievoorziening
    vanuit de Rijksoverheid naar alle inwoners van ons land. Ook ondersteunt DPC de
    communicatiediscipline binnen de Rijksoverheid door het uitwisselen en delen van
    kennis. Als categorie Communicatie sluit en beheert DPC (raam)overeenkomsten voor
    de inkoop van communicatieproducten en –diensten voor het Rijk.DPC werkt actief
    samen met ministeries en andere overheids- en uitvoeringsorganisaties met als
    doel gezamenlijk stappen te zetten om de communicatie richting mensen in de samenleving
    zo gemakkelijk en praktisch mogelijk te kunnen aanbieden. Denk daarbij aan het
    aanbieden van informatie bij belangrijke levensgebeurtenissen op Rijksoverheid.nl.DPC
    is een agentschap van het ministerie van Algemene Zaken (AZ).'
  url: https://www.rijksoverheid.nl/ministeries/ministerie-van-algemene-zaken/organisatie/organogram/dienst-publiek-en-communicatie
taken_en_bevoegdheden: "Het agentschap Publiek en Communicatie is belast met:a.\t\
  Ondersteunen van de rijksoverheid bij het gezamenlijk verbeteren van de communicatie\
  \ met publiek en professionals.b.\tOntwikkelen en in stand houden van gemeenschappelijke\
  \ voorzieningen ten behoeve van de overheidscommunicatie.c.\tRijksbreed adviseren,\
  \ begeleiden en inkoop van communicatiebestedingen als Inkoop Uitvoeringscentrum\
  \ (IUC) en aankoopcentrale voor de categorie communicatiehttps://wetten.overheid.nl/BWBR0017416/2010-02-27https://wetten.overheid.nl/BWBR0019219/2010-04-29"
