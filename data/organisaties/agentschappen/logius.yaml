description:
  text: Logius (voorheen GBO.Overheid) is de dienst digitale overheid van het ministerie van Binnenlandse
    Zaken en Koninkrijksrelaties. Logius biedt publieke dienstverleners een samenhangende ICT-infrastructuur
    zodat burgers en bedrijven betrouwbaar, snel en gemakkelijk elektronisch zaken kunnen doen. Logius
    levert producten op het gebied van toegang (waaronder DigiD), gegevensuitwisseling, informatiebeveiliging
    en standaardisatie. Voor meer informatie kunt u de website raadplegen (www.logius.nl). Logius werkt
    nauw samen met Stichting ICTU.
  url: https://www.logius.nl/onze-organisatie/over-logius/organisatiestructuur
