description:
  text: "FMH levert facilitaire producten en diensten binnen het Rijk in de Haagse\
    \ regio. Dit doen zij met ruim 600 medewerkers rondom de werkplekken van circa\
    \ 30.000 rijkscollega’s zodat zij comfortabel kunnen werken.Het verzorgingsgebied\
    \ van FMH bestaat uit de volgende departementen:•\tBinnenlandse Zaken en Koninkrijksrelaties\
    \ (BZK)•\tBuitenlandse Zaken (BZ)•\tEconomische Zaken en klimaat (EZK)•\tInfrastructuur\
    \ en Waterstaat (IenW)•\tJustitie en Veiligheid (JenV)•\tLandbouw, Natuur en Voedselkwaliteit\
    \ (LNV)•\tOnderwijs, Cultuur en Wetenschap (OCW)•\tSociale Zaken en Werkgelegenheid\
    \ (SZW)•\tVolksgezondheid, Welzijn en Sport (VWS)•\tFinanciën (Fin), alleen vervoerFMH\
    \ werkt landelijk nauw samen met de drie andere Concern Dienstverleners van het\
    \ Rijk (CDV’s):•\thet Centrum voor Facilitaire Dienstverlening van de Belastingdienst\
    \ (B/CFD)•\tRijkswaterstaat (RWS) en•\tde Dienst Justitiële Inrichtingen (DJI)Deze\
    \ CDV’s verzorgen de facilitaire dienstverlening voor rijksorganisaties buiten\
    \ de Haagse regio."
