description:
  text: Het Nationaal Archief bestaat al meer dan 200 jaar. Met meer dan 142 kilometer
    aan papieren archieven, 300.000 kaarten en tekeningen, ruim 15 miljoen foto&rsquo;s
    en 1,2 miljoen gigabyte aan digitale bestanden maakt het Nationaal Archief geschiedenis
    toegankelijk voor iedereen. Je kunt bij het Nationaal Archief deze authentieke
    bronnen in zien, onderzoeken en telkens weer opnieuw bekijken. Zo krijgen we inzicht
    in ons verleden en kunnen we begrijpen hoe de samenleving zich ontwikkelt.Samen
    met andere archieven en overheidsorganisaties zorgen we ervoor dat ook de informatie
    van vandaag toegankelijk voor burgers is en blijft, nu en in de verre toekomst.
    Transparantie en openbaarheid van informatie is belangrijker dan ooit. Als expertisecentrum
    zet het Nationaal Archief daarom graag haar kennis en ervaring in om de informatiehuishouding
    bij overheidsorganisaties te verbeteren.Het Nationaal Archief wil op die manier
    dichterbij de burger komen, om mensen zo goed mogelijk van dienst te kunnen zijn
    bij de toegang tot informatie. Informatie uit de archieven beschikbaar is, innovatief
    en op maat, online en op locatie in onze gebouwen in Den Haag en Emmen. De archieven
    worden ook gebruikt voor tentoonstellingen (bij het Nationaal Archief en elders)
    en voor een breed educatieprogramma.
  url: https://www.nationaalarchief.nl/over-het-na/organisatie/het-nationaal-archief-voor-een-open-en-transparante-overheid#collapse-139878
