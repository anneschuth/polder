  abbr: DUO
  valid_from: '1900-01-01'
description:
  text: De Dienst Uitvoering Onderwijs (DUO) voert als baten-lastendienst in opdracht
    van de minister van Onderwijs, Cultuur en Wetenschap onderwijswetten en -regelingen
    uit. Ook voert DUO in opdracht van het ministerie van Justitie en Veiligheid de
    Wet inburgering uit.De hoofdtaken van DUO zijn:- bekostigen van onderwijsinstellingen-
    verstrekken van studiefinanciering en tegemoetkoming schoolkosten- innen van lesgelden
    en studieschulden- erkennen van diploma's, beheren Mijn diploma's- organiseren
    van school-, staats-, Wft- en inburgeringsexamens- verzamelen en beheren van onderwijsgegevens
    in diverse registraties- verrijken van onderwijsgegevens tot informatieproducten-
    fungeren als Nationaal Europass Centrum Nederland- verzamelen en beheren van gegevens
    in het landelijk register kinderopvang en peuterspeelzalen
  url: https://duo.nl/organisatie/organisatie/
taken_en_bevoegdheden: De Dienst Uitvoering Onderwijs (DUO) voert als baten-lastendienst
  in opdracht van de minister van Onderwijs, Cultuur en Wetenschap onderwijswetten
  en -regelingen uit. Ook voert DUO in opdracht van het ministerie van Sociale Zaken
  en Werkgelegenheid de Wet inburgering uit.
