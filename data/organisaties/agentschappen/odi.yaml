description:
  text: 'Impactvol werken aan de overheid van nu en morgen. Daar is ODI voor. Onze focus ligt op de digitale versnelling van de overheid. Met verschillende ODI-merken hebben wij de benodigde kennis én realisatiekracht in huis om de overheid te helpen bij complexe digitaliseringsvraagstukken. De thema’s waar wij ons mee bezighouden zijn: digitale weerbaarheid, AI, netwerksamenwerking, ambtelijk en digitaal vakmanschap en innovatieve en lerende overheid.'
