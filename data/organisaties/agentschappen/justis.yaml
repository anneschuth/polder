description:
  text: Screeningsautoriteit Justis, onderdeel van het ministerie van Justitie en
    Veiligheid, beoordeelt de betrouwbaarheid van personen en organisaties en draagt
    daarmee bij aan de rechtstaat en een veilige samenleving. Als overheidsorganisatie
    screent Justis op terreinen waarvan de politiek en samenleving vinden dat betrouwbaarheid
    belangrijk is.Justis heeft toegang tot unieke informatie die alleen voor de overheid
    beschikbaar is. Bij screening van personen en organisaties stelt Justis de principes
    van de rechtsstaat centraal. Onafhankelijk en met oog voor privacy weegt Justis,
    vanuit een wettelijke basis, de belangen van het individu af tegen de belangen
    van de samenleving. Justis stelt de behoefte van de samenleving aan betrouwbaarheid
    en veiligheid als uitgangspunt. Samen met opdrachtgevers en partners bekijkt Justis
    of en op welke manier screening tot minder risico’s voor de samenleving kan leiden.
