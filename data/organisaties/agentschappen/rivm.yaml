description:
  text: Het RIVM bestaat uit specialistische kenniscentra en een centrale bedrijfsvoering
    die RIVM’ers in staat stelt om hun werk goed te doen. Voor ondersteuning op het
    gebied van ICT (Informatie- en communicatietechnologie) en informatievoorziening,
    onderzoeksmethoden en data is er de IV (Informatievoorziening) -organisatie. Het
    instituut staat onder leiding van een Directieraad als hoogste besluitvormingsorgaan
    van het RIVM. De Commissie van Toezicht heeft tot taak het wetenschappelijk niveau
    en de onafhankelijkheid van het RIVM te bewaken
  url: https://www.rivm.nl/over-het-rivm/organisatie
