description:
  text: 'Wij zijn de Justitiële ICT Organisatie: ICT’ers die het justitieveld door
    en door kennen. Door onze inspanningen kunnen vele rijkscollega’s hun werk makkelijk
    en efficiënt doen. Wij zorgen voor de juiste hard- en software op werkplekken,
    overal in Nederland, in de vorm van op maat gemaakte apps, systemen en applicaties.
    Wij ontwikkelen veilige cloud-omgevingen, waardoor onze collega’s overal kunnen
    werken: op een werkplek, thuis en onderweg. En altijd veilig.Kortom: wij zorgen
    dat ICT werktDe Justitiële ICT Organisatie is een zelfstandig ICT-dienstverlener
    voor het gehele ministerie van Justitie en Veiligheid. Wij werken onder meer voor
    de Dienst Justitiële Inrichtingen, de Raad voor de Kinderbescherming, de Immigratie-
    en Naturalisatiedienst, de Dienst Terugkeer en Vertrek, Reclassering Nederland
    en de dienst Justis.'
