names:
- value: Justitiële Informatiedienst
  abbr: Justid
  valid_from: '1900-01-01'
description:
  text: 'De Justitiële Informatiedienst (Justid) is een onderdeel van het ministerie
    van Justitie en Veiligheid. Wij zorgen ervoor dat cruciale informatie beschikbaar
    is op het juiste moment voor de juiste persoon. Dat is onze missie. In de strijd
    voor een veilige en rechtvaardige samenleving helpt de Justitiële Informatiedienst
    met betrouwbare informatie en slimme oplossingen. Wij bouwen aan een krachtige
    verbinding tussen mens, informatie en technologie.Vingerafdrukken, informatie
    over de gezinssituatie, een strafverleden of de geldigheid van een verblijfsvergunning.
    Detentie-informatie voor slachtoffers en burgemeesters wanneer een dader weer
    vrijkomt. Enkele voorbeelden van informatie die wij, via onze ICT-voorzieningen,
    beschikbaar stellen. Informatie die strikt vertrouwelijk is en met veel zorg moet
    worden behandeld: het gaat immers over mensen. En dat is ons werk; zorgen dat
    de juiste informatie beschikbaar is over een persoon. Wij maken dit mogelijk door
    slim gebruik te maken van bestaande technologie en door innovaties en creativiteit
    te stimuleren.'
