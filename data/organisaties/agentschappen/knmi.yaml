description:
  text: Nationaal kennisinstituut voor weer, klimaat en seismologieHet KNMI adviseert en waarschuwt de samenleving om risico’s met een atmosferische of seismologische oorsprong terug te dringen. Daarvoor ontwikkelt het KNMI hoogwaardige kennis, verricht waarnemingen en zet die om in producten en diensten die de veiligheidsrisico’s verminderen, bijdragen aan een duurzame samenleving en economische mogelijkheden bevorderen.Het KNMI verzorgt ook de meteorologische en seismische berichtgeving voor Caribisch Nederland. Dit zijn de bijzondere gemeenten Bonaire, Sint Eustatius en Saba (de BES-eilanden). Het KNMI werkt nauw samen met meteorologische diensten in de regio en met Météo France.
