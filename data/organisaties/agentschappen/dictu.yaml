description:
  text: De Dienst ICT Uitvoering (DICTU) is een van de grotere ICT-dienstverleners
    binnen de Rijksoverheid en maakt deel uit van het ministerie van Economische Zaken
    en Klimaat (EZK). Naast EZK en de daaronder vallende diensten heeft DICTU ook
    opdrachtgevers bij andere ministeries. DICTU legt zich toe op het ontwikkelen
    en beheren van systemen en applicaties en de bijbehorende dienstverlening. Dat
    kunnen bedrijfsvoeringsapplicaties, websites en apps zijn, maar ook digitale werkplekken
    en applicaties op het gebied van subsidies, inspecties en registers. Wij maken
    daarbij gebruik van moderne technieken en ontwikkelingen zoals cloud, mobile en
    data.
