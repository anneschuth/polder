- value: Immigratie- en Naturalisatiedienst
  abbr: IND
  valid_from: '1900-01-01'
description:
  text: De Immigratie- en Naturalisatiedienst (IND) voert het vreemdelingenbeleid
    in Nederland uit. Dat betekent dat de IND alle verblijfsaanvragen beoordeelt van
    mensen die in Nederland willen wonen of die graag Nederlander willen worden. Het
    kan daarbij gaan om vluchtelingen die niet veilig zijn in eigen land en die daarom
    hier asiel aanvragen. Maar ook om mensen die hier willen werken, studeren, of
    een gezin willen vormen met iemand die hier al woont. Daarnaast behandelt de IND
    naturalisatieverzoeken van mensen die hier al zo lang wonen dat zij zich Nederlander
    voelen en daarom een Nederlands paspoort willen aanvragen. Bij de IND toetsen
    we elke aanvraag afzonderlijk aan de regels van het vreemdelingenbeleid. Dat betekent
    dat we goed luisteren naar het verhaal van elke aanvrager zodat elke beslissing
    die we nemen, recht doet aan ieders persoonlijke situatie.
  url: https://ind.nl/nl/over-ons/onze-organisatie
taken_en_bevoegdheden: De Immigratie- en Naturalisatiedienst (IND) is de toelatingsorganisatie
  van Nederland die als uitvoeringsorganisatie het immigratie- en asielbeleid effectief
  en efficiënt uitvoert in samenwerking met de partners in de keten. Dit houdt in
  dat de IND de aanvragen beoordeelt van vreemdelingen die in Nederland willen verblijven
  of Nederlander willen worden.
