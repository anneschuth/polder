description:
  text: Uitvoeringsorganisatie Bedrijfsvoering Rijk (UBR)  draagt bij aan een doelmatig
    en goed functionerend concern Rijk door op ondernemende wijze de krachten te bundelen
    rond dienstverlening in de meest brede zin van het woord, en de kwaliteit daarvan
    te verhogen.Daarbij geeft UBR vernieuwende initiatieven kansen om zich te ontwikkelen
    tot concernbrede dienstverlening.UBR  biedt het Rijk een breed, innovatief en
    samenhangend pakket aan producten en diensten aan. Dat doet zij in een partnerrelatie
    met andere aanbieders binnen het concern Rijk en vanuit een open, transparante
    en professionele houding.
