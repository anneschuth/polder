description:
  text: De Rijksdienst voor Ondernemend Nederland (RVO) ondersteunt, adviseert en stimuleert ondernemend Nederland. Dit doen we op drie maatschappelijke transities:1.  klimaat- en energietransitie,2.  transitie naar een duurzaam landbouw- en voedselsysteem en3.  transitie naar toekomstbestendige en digitale economie.Dat gebeurt zowel op nationaal als internationaal niveau. We voeren opdrachten uit voor vele departementen, provincies en de EU. Daarnaast dragen we bij aan een betrouwbare, toegankelijke en begrijpelijke overheid, door te streven naar excellente dienstverlening.
  url: https://www.rvo.nl/onderwerpen/over-ons
taken_en_bevoegdheden: 'De Rijksdienst voor Ondernemend Nederland (RVO) is onderdeel van het ministerie van Economische Zaken en Klimaat. RVO werkt in opdracht van ministeries, decentrale overheden en de Europese Unie. Er zijn zes vestigingen: in Assen, Den Haag, Roermond, Groningen, Utrecht en Zwolle.'
