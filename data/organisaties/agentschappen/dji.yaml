description:
  text: Dienst Justitiële Inrichtingen (DJI) is een agentschap van het ministerie
    van Justitie en Veiligheid. We zijn met zo'n 16.000 medewerkers verantwoordelijk
    voor de dagelijkse verzorging van de volwassenen en jongeren in onze inrichtingen.
    We werken op vele manieren met hen samen aan voorbereiding op hun terugkeer in
    de maatschappij. Zo dragen we bij aan de veiligheid van de samenleving. DJI'ers
    werken op 50 locaties, waaronder Caribisch Nederland. Jaarlijks stromen er ruim
    29.000 nieuwe justitiabelen in.
