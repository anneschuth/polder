description:
  text: 'Wij zijn het CIBG, een uitvoeringsorganisatie van het ministerie van Volksgezondheid,
    Welzijn en Sport. In het hart van de zorg, met hart voor de zorg. Met onze 600
    professionals verbinden de werelden van zorgverlener, zorgaanbieder en mensen
    met een zorgvraag door gegevens te beoordelen, te registreren en te verstrekken.
    In de vorm van informatie, registratie of vergunning. Zodat iedereen kan beschikken
    over de juiste zorginformatie. Waar je ook bent, op elk moment.Voor wie doen we
    het?We zijn ontstaan als antwoord op de roep om betere registratie in de zorg.
    Zijn huisartsen, specialisten en tandartsen bevoegd om hun beroep uit te oefenen?
    Zijn mensen wel of niet bereid na hun dood hun organen te doneren aan anderen?
    Welke geneesmiddelen worden in Nederland vergoed, en wat mogen ze kosten? En wie
    mag op beslissende momenten de gegevens van patiënten of cliënten inzien?Wij geven
    antwoord op deze en andere vragen. Inmiddels zijn we uitgegroeid tot een ervaren
    en wendbare uitvoeringsorganisatie die met haar producten en diensten bijdraagt
    aan goede toegankelijke zorginformatie. We weten wat er speelt, we kennen de zorg,
    kennen de informatiestromen. Dat maakt ons goed in wat we doen. Maar goed kan
    altijd beter.Altijd in ontwikkelingWe blijven verbeteren en versterken onze positie
    als betrouwbare strategisch uitvoeringspartner. Door onze expertise verder te
    verbreden en te verdiepen, en met één stem, met één doel te acteren: zakelijk,
    voorspelbaar en transparant. Door aan te sluiten bij Rijksbrede ontwikkelingen
    waar dat moet of kan, en specifiek te ontwikkelen waar nodig. En door toekomstgericht
    te adviseren over slim gebruik van data, technologie en AI. Daarmee maken we goede
    zorg mogelijk. Voor iedereen, voor nu én voor straks.'
  url: https://www.cibg.nl/
