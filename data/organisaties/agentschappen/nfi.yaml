- value: Nederlands Forensisch Instituut
  abbr: NFI
  valid_from: '1900-01-01'
description:
  text: 'Het NFI is een internationaal kennis- en expertisecentrum voor forensisch
    onderzoek. Het instituut heeft bijna veertig verschillende forensische deskundigheidsgebieden
    onder één dak en houdt zich bezig met onder andere DNA-onderzoek, het verrichten
    van gerechtelijke secties, het onderzoeken van vezels of het openmaken, uitlezen
    en ontsleutelen van digitale informatie uit telefoons van verdachten.Met deze
    onderzoeken, met de overdracht van kennis en door te innoveren levert het NFI
    een bijdrage aan de opsporing en waarheidsvinding in strafrechtelijke onderzoeken,
    zowel nationaal als internationaal. Dat doet het NFI op basis van de laatste wetenschappelijke
    inzichten.De missie van het NFI is dan ook: ‘Gericht op waarheid. Geleid door
    wetenschap. Voor een veiliger samenleving.’'
