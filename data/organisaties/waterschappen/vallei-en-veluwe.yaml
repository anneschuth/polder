  beschrijving: Waterschap Vallei en Veluwe zorgt voor veilige dijken, schoon en voldoende
    oppervlaktewater en gezuiverd afvalwater in het gebied tussen IJssel, Nederrijn,
    Utrechtse Heuvelrug en Randmeren. Samenwerken en vernieuwen zijn essentieel in
    ons werk.
