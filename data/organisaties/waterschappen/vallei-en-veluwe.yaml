  text: 'Gebied: Amersfoort, Apeldoorn, Arnhem (gedeeltelijk), Baarn, Barneveld, Brummen,
    Bunschoten, De Bilt (gedeeltelijk), Deventer (ten westen van de IJssel), Ede,
    Eemnes, Elburg, Epe, Ermelo, Harderwijk, Hattem, Heerde, Leusden, Nijkerk, Nunspeet,
    Oldebroek, Olst-Wijhe (gedeeltelijk), Putten, Renkum, Renswoude, Rheden (gedeeltelijk),
    Rhenen (gedeeltelijk), Rozendaal (gedeeltelijk), Scherpenzeel, Soest, Utrechtse
    Heuvelrug (gedeeltelijk), Veenendaal, Voorst, Wageningen, Woudenberg, Zeist (gedeeltelijk)
    en Zutphen (ten westen van de IJssel).'
