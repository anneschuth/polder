description:
  text: 'Wij werken 24 uur per dag aan schoon en voldoende water. We onderhouden de
    dijken en zuiveren afvalwater. Voor alle inwoners, bedrijven en de natuur in Oost-Brabant.
    Dit doen we met aandacht voor innovatie en duurzaamheid. Met zorg voor de natuur
    en biodiversiteit. Met kennis, lef en heel veel enthousiasme.Gebied: Asten, Bernheze,
    Boekel, Boxmeer, Cuijk, Deurne, Geldrop-Mierlo, Gemert-Bakel, Grave, Heeze-Leende,
    Helmond, ''s-Hertogenbosch, Heusden, Laarbeek, Landerd, Meierijstad, Mill en Sint
    Hubert, Nuenen, Gerwen en Nederwetten, Oss, Sint Anthonis, Sint-Michielsgestel,
    Someren, Uden, Vught en Waalwijk.'
