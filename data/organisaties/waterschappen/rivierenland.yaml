    - informatiecategorie: Vergaderstukken decentrale overheden
      url: https://www.waterschaprivierenland.nl/bestuur
      toelichting: U vindt de vergaderstukken door te klikken op  ‘bekijk agenda’s
        en vergaderstukken’.  Daar gaat u naar de datum waarop de vergadering plaatsvindt
        of heeft plaatsgevonden.
    - informatiecategorie: Klachtoordelen
      url: https://open.waterschaprivierenland.nl/klachtoordelen
      toelichting: Wij willen graag onze dienstverlening verbeteren. Klachten zijn
        daarbij een belangrijk signaal. Alle klachten die wij ontvangen worden geregistreerd.
        Wij publiceren iedere twee weken een overzicht van de afgehandelde wettelijke
        klachten.
    - informatiecategorie: Jaarplannen en jaarverslagen
      url: https://open.waterschaprivierenland.nl/jaarplannen-en-jaarverslagen
      toelichting: Op deze pagina vindt u de begroting, de jaarrekening en de openbaarheidsparagraaf
        van Waterschap Rivierenland.
    - informatiecategorie: Bij vertegenwoordigende organen ingekomen stukken
      url: https://rivierenland.notubiz.nl/zoeken?keywords=ingekomen+stukken&limit=10&document_type=&search=send
      toelichting: U vindt op deze pagina de ingekomen stukken. U kunt de resultaten
        verkleinen met de filters.
