description:
  text: 'Samen met inwoners en partners werken we aan een aantrekkelijke leefomgeving
    en zorgen met het belastinggeld van inwoners en ondernemers voor voldoende, schoon
    en veilig water in Twente, het Vechtdal en Zuidoost Drenthe.Dit doen we met grote
    betrokkenheid bij en in verbinding met onze leefomgeving. Daarbij staan we, en
    de maatschappij, voor grote uitdagingen door het veranderende klimaat, de eisen
    aan waterkwaliteit en ons streven naar duurzaamheid.Gebied: Almelo, Berkelland,
    Borger-Odoorn, Borne, Coevorden, De Wolden, Dinkelland, Emmen, Enschede, Haaksbergen,
    Hardenberg, Hellendoorn, Hengelo, Hof van Twente, Hoogeveen, Losser, Midden-Drenthe,
    Oldenzaal, Ommen, Rijssen-Holten, Tubbergen, Twenterand en Wierden.'
  url: https://www.vechtstromen.nl/over-ons/
