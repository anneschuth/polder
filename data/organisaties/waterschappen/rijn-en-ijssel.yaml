- value: Rijn en IJssel
  valid_from: '1900-01-01'
description:
  text: 'We zorgen voor veilig en schoon water. Ook zorgen we ervoor dat het niet
    te droog en niet te nat is. Zodat je in ons gebied veilig kunt werken, wonen en
    ontspannen. We houden het (grond)water op peil en zuiveren het rioolwater. We
    zorgen voor veilige dijken en we zorgen we voor schoon water in beken, sloten
    en rivieren.In ons gebied liggen de volgende gemeenten: Aalten, Arnhem (noord),
    Berkelland, Bronckhorst, Deventer (klein stukje, bv. Bathmen), Doesburg, Doetinchem,
    Duiven, Haaksbergen, Hof van Twente, Lingewaard, Lochem, Montferland, Oost Gelre,
    Oude IJsselstreek, Rheden, Rijssen-Holten, Rozendaal, Westervoort, Winterswijk,
    Zevenaar en Zutphen.'
