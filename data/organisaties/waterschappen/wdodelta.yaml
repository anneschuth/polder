- value: Drents Overijsselse Delta
  abbr: WDODelta
  valid_from: '1900-01-01'
description:
  text: 'Als waterschap zorgen wij voor sterke dijken en voldoende (schoon) water
    voor inwoners, agrariërs en bedrijven, in de stad en de natuur. Dat doen we zodat
    de mensen in ons gebied (Assen tot Deventer en Kampen tot Hoogeveen) gezond en
    veilig kunnen leven, wonen en werken.We hebben drie hoofdtaken: zorgen voor droge
    voeten, genoeg water en schoon water. Dat doen we door sterke dijken te bouwen,
    de aan- en afvoer van water te regelen met gemalen en stuwen en water dat inwoners
    en bedrijven gebruiken schoon te maken. Het schone water hergebruiken we in onze
    sloten, kanalen en weteringen. Daarbij kijken we niet alleen naar vandaag, maar
    ook naar de toekomst.Gemeenten in ons gebied: Assen, Dalfsen, De Wolden, Deventer,
    Hardenberg, Hellendoorn, Hoogeveen, Kampen, Meppel, Midden-Drenthe, Olst-Wijhe,
    Ommen, Raalte, Rijssen-Holten, Staphorst, Steenwijkerland, Westerveld, Zwartewaterland
    en Zwolle.'
  url: https://www.wdodelta.nl/onze-organisatie
