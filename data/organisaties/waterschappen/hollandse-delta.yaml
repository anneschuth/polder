description:
  text: 'Waterschap Hollandse Delta zet zich iedere dag in voor voldoende (schoon)
    water, stevige dijken en veilige (vaar)wegen op de Zuid-Hollandse Eilanden. Gebieden
    die onder het waterschap vallen: Albrandswaard, Barendrecht, Dordrecht, Goeree-Overflakkee,
    Hendrik-Ido-Ambacht, Hoeksche Waard, Nissewaard, Ridderkerk, Rotterdam, Voorne
    aan Zee en Zwijndrecht.'
