description:
  text: 'Waterschap Zuiderzeeland is de waterbeheerder in Flevoland en een klein deel
    van Friesland en Overijssel. Wij beheren in dit gebied alle dijken, watergangen,
    gemalen en waterzuiveringen. Hiermee zorgen we voor veiligheid en voldoende en
    schoon water.Dat doen wij in samenwerking met gemeenten, provincies, natuurorganisaties,
    andere waterschappen, maatschappelijke organisaties en belangenbehartigers.Gebied:
    Almere, De Fryske Marren, Dronten, Lelystad, Noordoostpolder, Steenwijkerland,
    Urk en Zeewolde.'
