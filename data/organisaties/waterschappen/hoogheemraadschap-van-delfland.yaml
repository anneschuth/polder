- value: Hoogheemraadschap van Delfland
  valid_from: '1900-01-01'
description:
  text: 'Nederland en water zijn onlosmakelijk met elkaar verbonden. Maar sterke dijken,
    schone sloten en zuiver water zijn belangrijke eisen voor een veilige omgeving.
    Bij het Hoogheemraadschap van Delfland nemen we de zorg voor het water op ons.
    Zodat jij samen met alle inwoners van ons gebied fijn kunt wonen, werken én ontspannen
    in deze prachtige waterrijke omgeving.Ons gebied: Delft, Den Haag, Lansingerland,
    Leidschendam-Voorburg, Maassluis, Midden-Delfland, Pijnacker-Nootdorp, Rijswijk,
    Rotterdam, Schiedam, Vlaardingen, Wassenaar, Westland en Zoetermeer.'
