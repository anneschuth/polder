names:
- value: Groene Metropoolregio Arnhem-Nijmegen
  abbr: GMR
  valid_from: '1900-01-01'
description:
  text: 'Onze uitdaging:  er is een enorme druk op de regio om te wonen, te werken,
    te bezoeken, te studeren en te ontspannen. En tegelijkertijd is er de zorg voor
    onze natuurlijke omgeving, die daarbij voor eco­systeem­diensten als drinkwater
    zorgt. Daarom moeten we investeren in woningbouw, bereikbaarheid, economie, duurzaamheid,
    natuur, landschap, recreatie en toerisme.Onze vijf opgaven: voor de deelnemende
    gemeenten werken we aan vijf opgaven: -Groene groeiregio (ruimtelijke opgaven
    en woningbouw. -Productieve regio (economie en arbeidsmarkt).- Ontspannen regio
    (leefbaarheid, natuur en landschap, cultuur en erfgoed).-Verbonden regio (mobiliteit
    en bereikbaarheid). - Circulaire regio (circulariteit, duurzaamheid, klimaat en
    energie)'
