description:
  text: Sinds 2013 werkt één ambtelijke organisatie voor de gemeente Dinkelland én
    de gemeente Tubbergen. De ambtelijke organisatie heet ‘Noaberkracht Dinkelland
    Tubbergen’. Medewerkers die voor 2013 werkzaam waren bij Dinkelland of Tubbergen,
    zijn in dienst bij de bedrijfsvoeringsorganisatie Noaberkracht Dinkelland Tubbergen.
    Noaberkracht Dinkelland Tubbergen heeft een bestuur, dat bestaat uit beide colleges
    van burgemeester en wethouders.
