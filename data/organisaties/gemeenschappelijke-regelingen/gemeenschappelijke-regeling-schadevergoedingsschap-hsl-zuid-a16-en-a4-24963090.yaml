  bevoegdheden:
  - kop_artikel: Artikel 9
    inhoud_artikel: 1 Het algemeen bestuur is bij uitsluiting bevoegd, welke bevoegdheid
      door de raden of de colleges van burgemeester en wethouders van de deelnemers
      aan het schap is overgedragen, ter zake van de behandeling van en de beslissing
      op een aanvraag om schadevergoeding als bedoeld in artikel 49 van de Wet op
      de Ruimtelijke Ordening of artikel 6.1 van de Wet ruimtelijke ordening, doch
      uitsluitend voor zover deze schade voortvloeit uit het onherroepelijke tracébesluit
      en/of daaruit rechtstreeks voortvloeiende bestuursbesluiten en rechtmatige uitvoeringshandelingen.2
      Het algemeen bestuur is bij uitsluiting bevoegd ter zake van de behandeling
      van en de beslissing op een aanvraag om schadevergoeding op basis van artikel
      3:4, tweede lid, van de Algemene wet bestuursrecht en artikel 22 van de Tracéwet,
      welke bevoegdheden door de Minister zijn overgedragen, doch uitsluitend voor
      zover deze schade voortvloeit uit het onherroepelijke tracébesluit en daaruit
      rechtstreeks voortvloeiende bestuursbesluiten en rechtmatige uitvoeringshandelingen.3
      Het algemeen bestuur kan de bevoegdheden, zoals vermeld in lid 1 en 2, mandateren
      aan de voorzitter.
