gr_meta:
  citeertitel: Gemeenschappelijke regeling schadevergoedingsschap HSL-Zuid, A16 en
    A4
  doel: Het doel van de regeling is het bevorderen dat de behandeling van verzoeken
    om schadevergoeding die verband houden met de aanleg van de HSL-Zuid en de verbreding,
    verlegging en reconstructie van de A-16, zoals bedoeld in artikel 1 onder f, respectievelijk
    de A-4, zoals bedoeld in artikel 1 onder f, en de beslissingen op die verzoeken
    doelmatig, deskundig en op gelijke wijze plaatsvinden. Door deze regeling wordt
    tevens voor de burgers duidelijkheid geschapen over de terzake bevoegde instantie.
