  bevoegdheden:
  - kop_artikel: Artikel 3 Taken van de dienstverlenende gemeente
    inhoud_artikel: 1.De dienstverlenende gemeente draagt zorg voor het navolgende:a.  benoeming
      van twee senior archeologen. De regio-archeologen functioneren naast de Hoornse
      gemeente archeoloog, waardoor door de Gemeente Hoorn er minimaal drie archeologen
      op senior niveau zijn aangesteld.b.  Het voorzien in de mogelijkheid van een
      centraal tussendepot, waarin de vondsten en data die voortkomen uit veldonderzoeken
      kunnen worden ondergebracht en beheerd. De vondsten van een onderzoek kunnen,
      na toestemming van de Provincie Noord-Holland, volgens een standaard bruikleenovereenkomst
      en voor onderzoeks- en publieksdoeleinden aan elke gemeente worden uitgeleend.
