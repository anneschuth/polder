gr_meta:
  citeertitel: gemeenschappelijke regeling Archeologie Westfriese Gemeenten
  doel: De gemeenschappelijke regeling wordt getroffen vanwege de regionale samenhang
    van archeologische structuren, teneinde archeologisch beleid en en indien nodig
    uitvoerende werkzaamheden gezamenlijk gestalte te geven. Hierbij zulen de dienstafnemende
    gemeenten gebruik mogen maken van het certificaat voor het verrichten van archeologisch
    onderzoek zoals bedoeld in de Erfgoedwet 2016 sub. 5.1.
