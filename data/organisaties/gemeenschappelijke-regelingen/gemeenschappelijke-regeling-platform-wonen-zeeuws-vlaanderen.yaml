  bevoegdheden:
  - kop_artikel: Artikel 9 (bevoegdheden van het algemeen bestuur).
    inhoud_artikel: Het algemeen bestuur staat aan het hoofd van het openbaar lichaam.
      Aan hem komt binnen het kader van de taakuitoefening als omschreven in artikel
      2 en artikel 3 van deze regeling alle bevoegdheden toe, die niet bij of krachtens
      deze regeling of de wet aan anderen zijn opgedragen.
  - kop_artikel: Artikel 10 (bevoegdheden van het dagelijks bestuur).
    inhoud_artikel: Het dagelijks bestuur draagt zorg voor het dagelijks beheer over
      het lichaam, waartoe in ieder geval behoort:1. het voorbereiden van al hetgeen
      ter overweging en beslissing aan het algemeen bestuur moet worden voorgelegd;2.
      het uitvoeren van de besluiten van het algemeen bestuur;3. het nemen van alle
      conservatoire maatregelen ter voorkoming van verjaring of verlies van recht
      of bezit.
  - kop_artikel: Artikel 11 (bevoegdheden van de voorzitter).
    inhoud_artikel: 1. De voorzitter bevordert een goede behartiging van de zaken
      van het openbaar lichaam.2. Hij is belast met de leiding van de vergaderingen
      van het algemeen en dagelijks bestuur.3. Hij tekent de stukken die van het algemeen
      en dagelijks bestuur uitgaan.4. Hij vertegenwoordigt het lichaam in en buiten
      rechte. Deze vertegenwoordiging kan hij aan een door hem aan te wijzen gemachtigde
      toevertrouwen.
