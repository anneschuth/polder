  citeertitel: Samenwerkingsregeling Regio Achterhoek
  doel: "Regio Achterhoek heeft tot doel het behartigen van de gemeentelijke belangen\
    \ van de gemeenten op het gebied van:•\tEconomische ontwikkeling, en specifiek\
    \ op het gebied van: Smart werken & Innovaties, Onderwijs & Arbeidsmarkt•\tRuimtelijke\
    \ ontwikkeling & volkshuisvesting, en specifiek op het gebied van: Vastgoed &\
    \ Woningmarkt•\tMobiliteit & Bereikbaarheid•\tZorginnovaties•\tCirculaire economie\
    \ & Energietransitie•\tNatuur;•\tLobby;•\tHet verwerven en verstrekken van Subsidies;•\t\
    Grensoverschrijdende samenwerking, met name gericht op Duitsland."
