  bevoegdheden:
  - kop_artikel: Artikel 5 – Bevoegdheden
    inhoud_artikel: 1. Het college van Zaltbommel kan aan het college van Maasdriel,
      of aan dit laatste college ondergeschikte medewerkers, bevoegdheden in mandaat
      opdragen ter verwezenlijking van de doelen, genoemd in artikel 2.2. De bevoegdheden
      die krachtens deze regeling in mandaat worden opgedragen, worden in een mandaatregeling
      opgenomen. De mandaatregeling wordt vastgesteld en gewijzigd door eensluidende
      besluiten van de colleges en burgemeesters van de gemeenten.3. Dit artikel is
      van overeenkomstige toepassing op het verlenen van een volmacht tot het verrichten
      van privaatrechtelijke rechtshandelingen door Maasdriel namens Zaltbommel of
      het verlenen van een machtiging voor het verrichten van feitelijke handelingen
      door Maasdriel namens Zaltbommel.
