  bevoegdheden:
  - kop_artikel: Artikel 8 BEVOEGDHEDEN
    inhoud_artikel: 1. De afbakening van de bevoegdheden en de verplichtingen van
      het algemeenbestuur is analoog aan die, welke in de gemeentewet is aangegeven
      voor degemeenteraad, voor zover daarvan bij deze regeling niet wordt afgeweken.2.
      Aan het algemeen bestuur behoren alle bevoegdheden met dien verstande dat:a.
      krachtens deze regeling bepaalde bevoegdheden zijn opgedragen aan het dagelijks
      bestuur en aan de voorzitter;b. het algemeen bestuur gerechtigd is aan het dagelijks
      bestuur bevoegdheden over te dragen, met uitzondering van de bevoegdheden genoemd
      in lid 3 van dit artikel.3. De volgende bevoegdheden van het algemeen bestuur
      zijn niet overdraagbaar:a. het aanwijzen van een voorzitter, een secretaris
      en een penningmeester, alsmede hun vervangers en de overige leden van het dagelijks
      bestuur;b. het benoemen, schorsen en ontslaan van directieleden.c. het vertegenwoordigen
      in en het deelnemen aan de Stichting Federatie Sociale Werkvoorziening in Zeeland;d.
      het vaststellen of wijzigen van de begroting;e. het vaststellen van de jaarrekening;f.
      het vaststellen of wijzigen van een reglement van orde;g. het vaststellen of
      wijzigen van een regeling betreffende het financieel en administratief beheer;h.
      het vaststellen of wijzigen van een rechtspositieregeling voor het ambtelijk
      personeel;i. het doen van voorstellen tot wijziging, toetreding, uitbreiding
      en opheffing van deze gemeenschappelijke regeling.
