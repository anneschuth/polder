  bevoegdheden:
  - kop_artikel: Artikel 4 Bevoegdheden
    inhoud_artikel: '1. Uitvoerende (college)bevoegdheden genoemd in de Participatiewet,
      het Besluit Bijstandsverlening Zelfstandigen 2004, de Wet Inkomensvoorziening
      voor Oudere en gedeeltelijk Arbeidsongeschikte Werknemers, de Wet Inkomensvoorziening
      oudere en Arbeidsongeschikte Zelfstandigen, de Wet sociale werkvoorziening,
      de Wet structuur uitvoeringsorganisatie werk en inkomen, het minimabeleid, de
      Wet kinderopvang, de Wet inburgering en de Wet educatie beroepsonderwijs en
      de op deze wetten gebaseerde regelgeving (hierna: de uitvoerende bevoegdheden),
      worden overgedragen aan het algemeen bestuur.2. De bevoegdheden genoemd in het
      eerste lid omvatten mede de bevoegdheid tot het beslissen op bezwaarschriften
      die worden ingediend tegen besluiten op het werkterrein van het openbaar lichaam,
      inclusief de voorbereiding daarvan.3. De beleidsbepalende en – voorbereidende
      bevoegdheden genoemd in voornoemde wetten en de daarop gebaseerde regelgeving
      blijven bij de afzonderlijke raden en colleges van de deelnemende gemeenten.4.
      Door middel van een afzonderlijke mandaatregeling regelen de gemeenten welke
      bevoegdheden aan Werkplein Fivelingo worden overgedragen.'
