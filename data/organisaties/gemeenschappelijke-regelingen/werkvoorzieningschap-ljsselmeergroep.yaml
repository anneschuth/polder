description:
  text: De Gemeenschappelijke Regeling IJsselmeergroep (GR) is als bedrijfsvoeringsorganisatie
    belast met de uitvoering van de Wet sociale werkvoorziening (Wsw) voor de gemeenten
    Lelystad, Noordoostpolder, Urk. De feitelijke uitvoering van deze wet is opgedragen
    aan Concern voor Werk nv (nv).Tevens is een overeenkomst gesloten in het kader
    van de uitvoering van Beschut Werk.De GR is niet alleen opdrachtgever voor de
    uitvoering van de Wsw door de nv, maar is ook enig aandeelhouder van de nv. In
    de jaarrekeningen is, conform de grondslagen voor waardering en resultaatbepaling,
    derhalve ook het resultaat van de deelneming van de GR in de nv verwerkt. Overigens
    dient het bestuur van de GR de uitvoering van de Wsw te verantwoorden tegenover
    de deelnemende gemeenten.
