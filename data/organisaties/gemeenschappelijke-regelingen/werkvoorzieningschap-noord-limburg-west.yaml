description:
  text: NLW Groep is hét werkbedrijf voor sociaal-maatschappelijke werkgelegenheid
    in de regio Noord-Limburg West, dat staat voor waardevol en passend werken met
    mensen met een afstand tot de arbeidsmarkt. NLW voert de (voormalige) Wet sociale
    werkvoorziening (Wsw) uit voor de gemeenten Peel en Maas, Horst aan de Maas en
    Venray. Daarnaast is NLW voor deze drie gemeenten een professionele partner bij
    het uitvoeren van de Participatiewet.
