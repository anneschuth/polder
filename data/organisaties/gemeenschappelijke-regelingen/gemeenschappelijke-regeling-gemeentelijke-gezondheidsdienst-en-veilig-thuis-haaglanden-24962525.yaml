  bevoegdheden:
  - kop_artikel: Artikel 4. Taken en bevoegdheden
    inhoud_artikel: 1. Het openbaar lichaam is belast met de taken die bij of krachtens
      de Wet publieke gezondheid of enige andere wet zijn opgedragen aan de gemeentelijke
      gezondheidsdienst als bedoeld in artikel 14, tweede lid, van de Wet publieke
      gezondheid.2. Ter behartiging van de in artikel 3, aanhef onder a, genoemde
      belangen dragen de deelnemers over aan het algemeen bestuur van de regeling
      de taken en bevoegdheden die aan hen zijn toegekend in:a. de Wet publieke gezondheid
      en de daaronder vallende regelingen, uitgezonderd de taken en bevoegdheden inzake
      jeugdgezondheidszorg;b. artikel 1.61 en artikel 2.19 Wetkinderopvang en kwaliteitseisen
      peuterspeelzalen;c. artikel 4 van de Wet op de lijkbezorging;d. gemeentelijke
      verordeningen ten aanzien van de uitvoering, het toezicht op en de handhaving
      van regels inzake seksinrichtingen.3. Ter behartiging van de in artikel 3, aanhef
      en onder b, genoemde belangen dragen de deelnemers over aan het algemeen bestuur
      van de regeling de taken en bevoegdheden die aan hen zijn toegekend in hoofdstuk
      2 en artikel 4.1.1 van de Wet maatschappelijke ondersteuning 2015 en de daaronder
      vallende regelingen, voor zo ver deze taken en bevoegdheden strekken tot het
      voorkomen en bestrijden van huiselijk geweld en kindermishandeling, alsmede
      de taken en bevoegdheden die aan hen zijn toegekend in hoofdstuk 2 van de Jeugdwet
      en de daaronder vallende regelingen, voor zo ver deze taken en bevoegdheden
      strekken tot het voorkomen en bestrijden van huiselijk geweld en kindermishandeling.4.
      Bestuursorganen van het openbaar lichaam en ambtenaren aangesteld door het dagelijks
      bestuur kunnen, na instemming van het algemeen bestuur, door andere bestuursorganen
      worden aangewezen als toezichthouder inzake de naleving van voorschriften die
      strekken tot de bescherming van de belangen als bedoeld in artikel 3.
