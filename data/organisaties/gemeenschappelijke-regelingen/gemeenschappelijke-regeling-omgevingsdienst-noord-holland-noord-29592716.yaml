  bevoegdheden:
  - kop_artikel: Artikel 4 Basistakenpakket omgevingsdienst, artikel 5 Overige milieutaken
      etc. en artikel 6 verzoektaken
    inhoud_artikel: "1.\tDe Omgevingsdienst is belast met het ten behoeve van de deelnemers\
      \ uitvoeren van het  basistakenpakket omgevingsdienst met inachtneming van het\
      \ door de deelnemers vastgestelde beleid.2.\tAls gevolg van gewijzigde wetgeving\
      \ of anderszins het basistakenpakket omgevingsdienst wijzigt, zal het dagelijks\
      \ bestuur de consequenties hiervan aangeven aan het algemeen bestuur.3.\tTot\
      \ het basistakenpakket omgevingsdienst wordt ook gerekend het in dit kader vervullen\
      \ van adviserende taken op het terrein van de vergunningverlening, toezicht\
      \ en handhaving ten behoeve van de deelnemers, alsmede coördinerende en afstemmende\
      \ taken die voor de deelnemers tezamen worden verricht.1.\tIn aanvulling op\
      \ de taken uit het basistakenpakket omgevingsdienst kan de Omgevingsdienst op\
      \ verzoek van een deelnemer voor deze deelnemer ook andere adviserende, ondersteunende\
      \ en uitvoerende werkzaamheden verrichten op het gebied van de fysieke leefomgeving,\
      \ voor zover daartoe mandaat of opdracht is verleend. Het gaat daarbij onder\
      \ andere om de volgende taken. Adviestaken ten aanzien van omgevingsvisies,\
      \ omgevingsplannen en programma’s. Het geven van specialistische adviezen behorende\
      \ bij overige taken zoals klimaat, duurzaamheid, milieuzorg, geluid, lucht,\
      \ externe veiligheid, bodem en water. Het gaat tevens om de verzorging van de\
      \ uitvoering van programma’s en projecten voor de deelnemers, waaronder begrepen\
      \ het ontwikkelen en handhaven van een gemeenschappelijke uitvoerend milieubeleid,\
      \ het leveren van milieutechnische – en natuurkennis, het uitvoeren van onderzoek\
      \ en metingen en het leveren van een bijdrage aan beleidsontwikkeling.2.\tOp\
      \ verzoek van een deelnemer kan de Omgevingsdienst voor deze deelnemer naast\
      \ de in lid 1 van dit artikel vermelde taken, ook andere adviserende, ondersteunende\
      \ en uitvoerende werkzaamheden op het gebied van de fysieke leefomgeving verrichten.\
      \ Deze kunnen onder meer betrekking hebben op bouwen, zwemlocaties en landschap.3.\t\
      Iedere deelnemer draagt de taken, genoemd in artikel 4 en de overige taken zoals\
      \ bedoeld in dit artikel via een takenlijst op aan de Omgevingsdienst, met dien\
      \ verstande dat met de uitvoering van deze taken moet worden ingestemd door\
      \ het algemeen bestuur.4.\tEen deelnemer kan een verzoek tot vermindering van\
      \ het takenpakket of taakuitvoering schriftelijk ter kennis brengen van de omgevingsdienst.\
      \ Het algemeen bestuur regelt de financiële en organisatorische gevolgen van\
      \ de vermindering van taken en stelt de verschuldigde schadeloosstelling vast,\
      \ conform het daarover bepaalde in artikel 38, lid 16 van de regeling.5.\tEen\
      \ verzoek tot vermindering van het takenpakket of taakuitvoering, zoals vermeld\
      \ in lid 4 van dit artikel, wordt voor wat betreft deze taken gelijkgesteld\
      \ met een verzoek tot gedeeltelijke uittreding zoals bedoeld in artikel 38 van\
      \ de regeling.1.\tOnverminderd de verplichtingen die voortvloeien uit de in\
      \ artikel 4 en 5 bedoelde taken, kan de Omgevingsdienst op verzoek van derden\
      \ adviserende, ondersteunende en uitvoerende werkzaamheden op het gebied van\
      \ zorg voor de omgeving verrichten.2.\tOnder derden wordt verstaan: niet-deelnemers\
      \ aan de regeling, niet zijnde een marktpartij."
