gr_meta:
  citeertitel: Gemeenschappelijke regeling Omgevingsdienst Noord-Holland Noord
  doel: "1.\tDe regeling wordt getroffen voor, de uitvoering van en de ondersteuning\
    \ en advisering bij, taken op het gebied van vergunningverlening, toezicht en\
    \ handhaving van de fysieke leefomgeving betreffende natuur en milieu.2.\tDe taken,\
    \ bedoeld in het eerste lid, betreffen in elk geval taken op het gebied van het\
    \ omgevingsrecht in het algemeen, alsmede taken op grond van het bepaalde bij\
    \ of krachtens de Omgevingswet, het Omgevingsbesluit, de Omgevingsverordening,\
    \ de Omgevingsplannen en de Wet Milieubeheer."
