  bevoegdheden:
  - inhoud_artikel: 1. Het Algemeen Bestuur en Dagelijks Bestuur hebben uitsluitend
      verordenende en regelgevende bevoegdheden met betrekking tot de aangelegenheden
      die de bedrijfsvoering van het openbaar lichaam betreffen.2. Het Algemeen Bestuur
      respectievelijk het Dagelijks Bestuur kunnen afzonderlijk of te samen, ieder
      voor zover zij bevoegd zijn, een gemeenschappelijke regeling treffen ter behartiging
      van een of meer bepaalde belangen van het openbaar lichaam.3. Het Algemeen Bestuur
      is bevoegd te besluiten tot de oprichting van of deelname in stichtingen, maatschappen,
      vennootschappen en coöperaties en verenigingen, dan wel de ontbinding daarvan
      of beëindiging van deelneming daaraan op voorwaarde dat de raden van de deelnemende
      gemeenten vooraf in de gelegenheid zijn gesteld hun wensen en bedenkingen met
      betrekking tot het voorgenomen besluit aan het Algemeen Bestuur kenbaar te maken.4.
      Het Dagelijks Bestuur is bevoegd met een of meer colleges van al dan niet deelnemende
      gemeenten of met bestuursorganen van andere openbare lichamen samenwerkingsovereenkomsten
      te sluiten met betrekking tot ondersteunende dienstverlening voor taken waarmee
      het openbaar lichaam belast is.5. Voor zover nodig worden de collegebevoegdheden
      betreffende uitvoering van de taken als bedoeld in artikel 4, eerste lid onder
      a tot en met d, en het tweede lid, onder verantwoordelijkheid van de colleges
      opgedragen aan het Dagelijks Bestuur van het openbaar lichaam op basis van een
      door elk college afzonderlijk vast te stellen extern mandaatbesluit.6. De colleges
      dragen met hun bevoegdheden die horen bij het uitvoeren van de taken als bedoeld
      in artikel 4 lid 1, sub e, alsmede alle voorbereidings- en uitvoeringshandelingen
      die daarmee gepaard gaan, met het vaststellen van de 3e wijziging van de gemeenschappelijke
      regeling, over aan het Dagelijks Bestuur(delegatie).
