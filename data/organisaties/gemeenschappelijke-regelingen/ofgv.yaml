description:
  text: 'De Omgevingsdienst Flevoland & Gooi en Vechtstreek (OFGV) is in 2013 opgericht.
    Ons doel: een robuuste uitvoeringsorganisatie die adequaat de omgevingstaken op
    het gebied van vergunningverlening, toezicht en handhaving uitvoert voor alle
    deelnemende partijen. Door bundeling van ervaring en een grote diversiteit aan
    kennis bij de OFGV verbetert de kwaliteit en de integraliteit van de uitvoering
    van deze taken. De OFGV is verantwoordelijk voor de uitvoering van het werk, maar
    de deelnemende partijen blijven bevoegd gezag en daarmee bestuurlijk verantwoordelijk.'
