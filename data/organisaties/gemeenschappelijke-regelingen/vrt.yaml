description:
  text: Het rechtspersoonlijkheid bezittend openbaar lichaam genaamd Veiligheidsregio
    Twente gevestigd te Enschede, met als rechtsgebied het grondgebied van de gemeenten
    Almelo, Borne, Dinkelland, Enschede, Haaksbergen, Hellendoorn, Hengelo (O), Hof
    van Twente, Losser, Oldenzaal, Rijssen, Holten, Tubbergen, Twenterand en Wierden.
