  bevoegdheden:
  - kop_artikel: Artikel 4 Taken
    inhoud_artikel: '1. Ter behartiging van de in artikel 3 genoemde belangen heeft
      het openbaar lichaam de volgende taken:a. basistakenpakket: het ten behoeve
      van de deelnemers uitvoeren van adviserende, voorbereidende en uitvoerende taken
      die behoren tot het zogenoemde basistakenpakket, zoals opgenomen in Bijlage
      1;b. aanvullend takenpakket (facultatief): het ten behoeve van de deelnemers
      uitvoeren van niet tot het basistakenpakket behorende adviserende, voorbereidende
      en uitvoerende taken op het terrein van het milieu- en omgevingsrecht, voor
      zover de betreffende deelnemer daartoe een besluit heeft genomen;alsmede ten
      behoeve van de onder a. en b. genoemde taken:c. adviserende en voorbereidende
      taken ten behoeve van bezwaarprocedures, administratief beroepsprocedures en
      rechtsgedingen;d. de advisering over en voorbereiding van besluiten op grond
      van de Wet openbaarheid van bestuur;e. het adviseren over en ontwikkelen van
      strategische en operationele beleidskaders op het terrein van het milieu- en
      omgevingsrecht;f. het in stand houden van een Milieualarmnummer.2. De FUMO kan
      ten behoeve van de deelnemers diensten op het terrein van het milieu- en omgevingsrecht
      verrichten, anders dan bedoeld in het eerste lid, indien een deelnemer daarom
      verzoekt en het dagelijks bestuur daarin bewilligt. Het bepaalde in artikel
      21, eerste lid, is van overeenkomstige toepassing.3. De FUMO kan ten behoeve
      van andere overheden en overheidsgerelateerde instellingen diensten op het terrein
      van milieu- en omgevingsrecht verrichten, indien daarom wordt verzocht en het
      dagelijks bestuur daarin bewilligt. Het dagelijks bestuur kan hiervoor nadere
      regels vaststellen. Het bepaalde in artikel 21, eerste lid, is van overeenkomstige
      toepassing.4. De taken als bedoeld in het eerste en tweede lid worden uitgevoerd
      met inachtneming van de door of ten behoeve van de deelnemers vastgestelde beleidskaders,
      beleidsregels en overige instructies.'
