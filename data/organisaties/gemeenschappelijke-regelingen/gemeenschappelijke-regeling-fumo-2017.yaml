gr_meta:
  citeertitel: Gemeenschappelijke regeling FUMO - 2017
  doel: De FUMO is bedoeld voor de uitvoering van taken en bevoegdheden ten behoeve
    van de deelnemers op het gebied van het milieu- en omgevingsrecht in ruime zin
    in het algemeen en de Wet algemene bepalingen omgevingsrecht in het bijzonder,
    alsmede taken en bevoegdheden op het terrein van vergunningverlening, handhaving
    en toezicht op grond van de in artikel 5.1 van de Wet algemene bepalingen omgevingsrecht
    genoemde wetten.
