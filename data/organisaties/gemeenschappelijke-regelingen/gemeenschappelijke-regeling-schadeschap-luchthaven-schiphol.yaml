gr_meta:
  citeertitel: Gemeenschappelijke regeling Schadeschap Luchthaven Schiphol
  doel: De regeling heeft tot doel een voor belanghebbenden duidelijke, deskundige
    en doelmatige afhandeling – de besluitvorming naar dezelfde maatstaven daarbij
    begrepen – te bevorderen van verzoeken om schadevergoeding die verband houden
    met de uitbreiding van het luchtvaartterrein Schiphol, zoals vastgelegd in de
    Planologische Kernbeslissing, alsmede met de inwerkingtreding van de wet van 27
    juni 2002 tot wijziging van de Wet luchtvaart inzake de inrichting en het gebruik
    van de luchthaven Schiphol (Stb. 374), het Luchthavenindelingbesluit en het Luchthavenverkeerbesluit.
