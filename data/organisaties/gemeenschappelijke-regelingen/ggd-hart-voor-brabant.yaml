description:
  text: Stel je eens voor… een samenleving waarin iedereen zo gezond mogelijk kan
    opgroeien en ouder worden. Waarin mensen zelf kunnen beslissen over hun eigen
    gezondheid en voldoende veerkracht hebben om met fysieke, emotionele en sociale
    uitdagingen om te gaan. Waar onze omgeving zo is ingericht dat gezonde keuzes
    de meest logische keuzes zijn. En waar gezondheid als vanzelfsprekend bovenaan
    iedere agenda staat!
