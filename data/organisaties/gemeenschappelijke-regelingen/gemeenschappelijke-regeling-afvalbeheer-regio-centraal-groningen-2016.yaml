  bevoegdheden:
  - kop_artikel: Artikel 2
    inhoud_artikel: 1. Het lichaam heeft als doel om te werken aan preventie, aan
      hoogwaardige bewerking en (her)gebruik van afvalstoffen, aan het bevorderen
      van overheidsinvloed op de sturing van afvalstoffen en het ketenbeheer, en mogelijk
      andere milieu- en reinigingstaken;2. Iedere deelnemer kan, na instemming van
      het algemeen bestuur, aan het lichaam taken overdragen die in overeenstemming
      zijn met het doel van het lichaam.3. Een deelnemer draagt aan het lichaam de
      bevoegdheden over die nodig zijn voor de uitvoering van de door die deelnemer
      aan het lichaam overgedragen taken.
