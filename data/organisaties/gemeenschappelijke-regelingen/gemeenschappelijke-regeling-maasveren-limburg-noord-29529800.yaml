  bevoegdheden:
  - kop_artikel: Artikel 3 Taken van de Centrumgemeente
    inhoud_artikel: 1. De gemeente Horst aan de Maas wordt aangewezen als Centrumgemeente.
      De taken van de Centrumgemeente omvatten:a) Beleidsvoorbereiding en –uitvoering.
      Ten aanzien van beleidsvoorbereiding en –uitvoering zijn de toepasselijke beleidsregels
      van de Centrumgemeente van toepassing;b) Eigendom vaartuigen;c) Uitvoering van
      alle operationele en toezichthoudende taken;d) Financiële administratie en verantwoording,
      waaronder beheer van de algemene reserve;e) Het zorg dragen voor een deugdelijke
      verzekering ter dekking van schade aan vaartuigen en eventuele aansprakelijkheid
      voor schade aan derden voortvloeiende uit de exploitatie van de Maasveren;f)
      Tijdige en adequate informatievoorzieningen richting de Deelnemers;g) De erfpacht
      van de veerstoepen en het onderhoud en het beheer van de veerstoepen.2. De in
      het eerste lid genoemde taken omvatten niet de bevoegdheid tot de uitoefening
      van publiekrechtelijke bevoegdheden en besluiten tot het aangaan van privaatrechtelijke
      rechtshandelingen. Deze bevoegdheden worden niet aan de Centrumgemeente overgedragen
      en blijven de verantwoordelijkheid van de Deelnemers.
