  citeertitel: Gemeenschappelijke Regeling Maasveren Limburg-Noord
  doel: 1. In het kader van deze Regeling draagt de gemeente Horst aan de Maas als
    Centrumgemeente, in opdracht van de Deelnemers aan deze Regeling , er zorg voor
    dat de belangen van de Deelnemers, elk voor zover het hun grondgebied betreft,
    worden behartigd op het gebied van:a) Onderhoud en vervanging van de vaartuigen
    Maasveren Limburg-Noord; onderhoud en beheer van de veerstoepen.b) Opdrachtgeverschap
    voor exploitatie van Maasveren Limburg-Noord.2. De uitgangspunten die ten grondslag
    liggen aan deze Regeling, zijn leidend voor contracten met exploitant(en) van
    de Maasveren. Uitgangspunt is een kostendekkende exploitatie van de Maasveren.
