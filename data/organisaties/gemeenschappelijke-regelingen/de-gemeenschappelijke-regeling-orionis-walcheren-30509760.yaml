  bevoegdheden:
  - kop_artikel: 'Artikel  5: Taken en bevoegdheden'
    inhoud_artikel: "1.\tAlle taken en bevoegdheden die bij of krachtens de geldende\
      \ Wgs, WSW, PW en de daarbij behorende of aanverwante algemeen verbindende voorschriften\
      \ aan de raad, het college of de burgemeester zijn opgedragen, inclusief het\
      \ vaststellen van verordeningen, die op grond van de Wgs, WSW, PW en de daarbij\
      \ behorende of aanverwante algemeen verbindende voorschriften aan de raden en\
      \ colleges van de deelnemende gemeenten toekomen, worden, voor zover de Wgs,\
      \ WSW, PW en de daarbij behorende of aanverwante algemeen verbindende voorschriften\
      \ zich hiertegen niet verzetten, aan Orionis Walcheren overgedragen.2.\tDe deelnemende\
      \ gemeenten dragen aan Orionis Walcheren voorts over alle bevoegdheden van regeling\
      \ en bestuur met betrekking tot:a.\thet Besluit Bijstandverlening Zelfstandigen\
      \ (2004);b.\tde Wet inkomensvoorziening oudere en gedeeltelijk arbeidsongeschikte\
      \ werkloze werknemers (IOAW);c.\tde Wet inkomensvoorziening oudere en gedeeltelijk\
      \ arbeidsongeschikte gewezen zelfstandigen (IOAZ);3.\tVoorts wordt door de deelnemende\
      \ gemeenten aan Orionis Walcheren de uitvoering opgedragen van:a.\tde Bijzondere\
      \ Bijstand en armoedebeleid, op basis van het beleid dat ter zake door de deelnemende\
      \ gemeenten is vastgesteld;b.\tgebruik van de Wet structuur uitvoeringsorganisatie\
      \ werk en inkomen;c.\tde inkoop van producten en diensten op het terrein van\
      \ re-integratie en gesubsidieerde arbeid bij aanbieders ten behoeve van de jaarlijks\
      \ te realiseren taakstelling;d.\tde advisering van het bestuur van de deelnemende\
      \ gemeenten over het te voeren beleid op het terrein van Werk & Inkomen, sociale\
      \ zekerheid en ontwikkelingen op de lokale/regionale arbeidsmarkt;e.\tkredietverstrekking,\
      \ schuldhulpverlening en budgetbeheer.4.\tHet algemeen bestuur is bevoegd tot\
      \ het vaststellen van een verordening met betrekking tot de uitvoering van activiteiten\
      \ de kredietbankfunctie betreffende, zoals:a.\tkrediettransacties binnen de\
      \ Wet Fido;b.\tschuldbemiddeling op grond van artikel 48 lid 1be.v. WCK;c.\t\
      budgetbeheer zoals bedoeld in artikel 3:5 Wftd.\tverstrekken van verklaringen\
      \ op grond van de FW;e.\tbewindvoering en curatele op grond van de FW;f.\tvroegsignalering.5.\t\
      Bij de uitvoering van het genoemde onder de leden 1 en 2 wordt door Orionis\
      \ Walcheren samengewerkt met het UWV (Uitvoering Werknemersverzekeringen) en\
      \ de externe partners die door Orionis Walcheren ingeschakeld worden bij de\
      \ activering, re- integratie en arbeidstoeleiding van cliënten. De dienst vervult\
      \ hierbij de regiefunctie namens de deelnemende gemeenten.6.\tOrionis Walcheren\
      \ kan na besluit van het algemeen bestuur ook diensten aan andere overheden\
      \ verlenen, met dien verstande dat Orionis Walcheren ten minste tachtig procent\
      \ van zijn werkzaamheden voor de deelnemers verricht. Het algemeen bestuur beslist\
      \ met betrekking tot het al dan niet verlenen van diensten aan een derde als\
      \ hiervoor bedoeld. De diensten worden verleend tegen  een vooraf overeengekomen\
      \ kostenvergoeding.7.\tOrionis Walcheren kan op verzoek van een college, indien\
      \ het algemeen bestuur hiertoe besluit, nader te omschrijven taken gaan uitvoeren\
      \ die passen binnen het belang waartoe deze regeling getroffen is. Een besluit\
      \ hiertoe vermeldt alsdan de wijze van kostenverrekening en overige voorwaarden\
      \ waaronder deze taken worden uitgevoerd. Deze voorwaarden worden vastgelegd\
      \ in een dienstverleningsovereenkomst."
