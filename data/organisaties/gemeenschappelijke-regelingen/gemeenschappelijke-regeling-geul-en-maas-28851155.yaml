gr_meta:
  citeertitel: Gemeenschappelijke regeling Geul en Maas
  doel: 1. Het gemeenschappelijk orgaan heeft tot doel het realiseren van een effectieve,
    efficiënte, kwalitatief hoogwaardige en duurzame beleidsondersteuning en uitvoering
    van het afval- en grondstoffenbeheer en schoontaken in brede zin alsmede andere
    gerelateerde taken die door de gemeenten middels eensluidend besluit zijn aangewezen.
    Het gemeenschappelijk orgaan draagt daarmee bij aan de beleidsdoelstellingen van
    de deelnemende gemeenten, zoals bescherming van het milieu en duurzaamheid, het
    bieden van regionale werkgelegenheid, het leveren van goede service en betaalbaarheid
    van de diensten.2. Het gemeenschappelijke orgaan stelt zich tevens tot doel om
    in te kunnen spelen op de (toekomstige) ontwikkelingen die van belang zijn voor
    het afval- en grondstoffenbeheer, de schoontaken en andere gerelateerde taken,
    zoals aangewezen door het bestuur.3. Het gemeenschappelijk orgaan heeft tevens
    als doelstelling om de samenwerking tussen de gemeenten op het gebied van het
    afval- en grondstoffenbeleid te versterken en te verbreden door middel van gezamenlijke
    projecten, gezamenlijke deelname aan regionale en landelijke netwerken en het
    bijdragen aan de (regionale) circulaire economie.4. Uitgangspunt van het gemeenschappelijk
    orgaan is een toekomstbestendige en duurzame samenwerking tussen de deelnemende
    gemeenten.
