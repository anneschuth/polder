  bevoegdheden:
  - kop_artikel: Artikel 8 Bevoegdheden
    inhoud_artikel: 1. Het bestuur is verantwoordelijk voor de verdeling van taken,
      verantwoordelijkheden en bevoegdheden binnen de gemeenschappelijke regeling
      en diensten zoals vastgelegd in het dienstverleningshandvest.2. Het bestuur
      beoordeelt en stelt vast:• de door Stadsbeheer opgestelde periodieke managementrapportages•
      de door Stadsbeheer opgestelde exploitatiebegrotingen en eindafrekeningen• de
      door de Commissie van Advies opgevoerde c.q. verantwoorde kosten.3. Het bestuur
      regelt de wijze van interne communicatie richting de gemeenten.
