  bevoegdheden:
  - kop_artikel: Artikel 5 Overdracht bevoegdheden
    inhoud_artikel: 1. Aan de bedrijfsvoeringsorganisatie wordt overgedragen de bevoegdheid
      tot1. de heffing en invordering van de gemeentelijke belastingen;2. de uitvoering
      van de kwijtscheldingsregels.2. De deelnemers dragen aan de bedrijfsvoeringsorganisatie
      en haar bestuur hun bevoegdheden over inzake:1. de Wet waardering onroerende
      zaken, en2. de gemeentelijke belastingen met uitzondering van de bevoegdheden
      genoemd in:i. artikel 63 van de Algemene wet inzake rijksbelastingen;ii. de
      artikelen 225, 234 en 235 van de Gemeentewet;iii. de Wet op de bedrijveninvesteringszones;iv.
      de Verordening op de heffing en invordering van de haven-, kade- en opslaggelden
      van de gemeente Lochem.3. De werkzaamheden worden nader omschreven in dienstverleningsovereenkomsten.
  - kop_artikel: Artikel 6 Beperking privaatrechtelijke bevoegdheden
    inhoud_artikel: 1. De bedrijfsvoeringsorganisatie is behoudens instemming van
      de deelnemers niet bevoegd tot:a. het vestigen van opstal-, pand- en hypotheekrechten;b.
      het afgeven van garanties of andere waarborgen;c. het in erfpacht aannemen of
      uitgeven van roerende of onroerende zaken;d. het in eigendom aannemen of uitgeven
      van onroerende zaken;e. dienstverlening aan private partijen of publieke lichamen
      anders dan de deelnemers.2. Het bestuur kan besluiten tot oprichting van en
      deelneming in rechtspersonen met inachtneming van het bepaalde in artikel 31a
      van de wet.
