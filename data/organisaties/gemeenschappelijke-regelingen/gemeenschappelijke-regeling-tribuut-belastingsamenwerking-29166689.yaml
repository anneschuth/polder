  citeertitel: Gemeenschappelijke Regeling Tribuut belastingsamenwerking
  doel: De bedrijfsvoeringsorganisatie is ingesteld ter gemeenschappelijke behartiging
    van de belangen van de deelnemers op het gebied van:a. de heffing en invordering
    van belastingen;b. de uitvoering van kwijtschelding;c. de uitvoering van de Wet
    waardering onroerende zaken.
