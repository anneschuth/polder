  bevoegdheden:
  - inhoud_artikel: 1. Publieke Gezondheid en Zorg Groningen heeft alle bevoegdheden
      tot regeling, bestuur en beheer die nodig zijn voor de uitvoering van de aan
      het openbaar lichaam opgedragen taken.2. Alle bevoegdheden in het kader van
      deze Regeling die niet aan een ander bestuursorgaan van Publieke Gezondheid
      & Zorg Groningen zijn opgedragen, behoren aan het algemeen bestuur van Publieke
      Gezondheid & Zorg Groningen.3. Publieke Gezondheid & Zorg Groningen is bevoegd
      tot het mede treffen van en tot het deelnemen aan een gemeenschappelijke regeling
      en andere rechtsvormen waar die in het bijzonder aangewezen moeten worden geacht
      voor de behartiging van door de Regeling Publieke Gezondheid & Zorg Groningen
      te dienen belangen.4. Publieke Gezondheid & Zorg Groningen is bevoegd tot het
      aangaan van dienstverleningsovereenkomsten.
