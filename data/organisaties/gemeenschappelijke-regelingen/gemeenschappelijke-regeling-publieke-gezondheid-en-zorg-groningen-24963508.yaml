  citeertitel: gemeenschappelijke regeling Publieke Gezondheid & Zorg Groningen
  doel: Het belang waarvoor de Regeling is getroffen is om door een doelmatige organisatie
    en coördinatie via intergemeentelijke samenwerking uitvoering te geven aan de
    behartiging van de volgende belangen:a. bescherming en bevordering van de gezondheid
    van de bevolking;b. rampenbestrijding en crisisbeheersing;c. (doen) organiseren
    van zorg aan de bevolking.
