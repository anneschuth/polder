  bevoegdheden:
  - kop_artikel: Artikel 9 Mandaat
    inhoud_artikel: 1. Besluiten als bedoeld in artikel 1:3 Algemene wet bestuursrecht
      die volgen uit de werkzaamheden die de Omgevingsdienst Groningen voor de deelnemers
      uitvoert worden bij voorkeur door de Omgevingsdienst Groningen (in mandaat)
      en niet door de deelnemers genomen.De deelnemers verlenen daarvoor mandaat aan
      de directeur onderscheidenlijk het dagelijks bestuur van de Omgevingsdienst
      Groningen voor het nemen van besluiten. Zij verlenen dit mandaat bij separaat
      besluit. Hiervoor wordt door het Algemeen Bestuur een modelmandaatbesluit opgesteld.2.
      Ten aanzien van de aan de Omgevingsdienst Groningen in mandaat toekomende taken,
      kan ondermandaat worden verleend. De deelnemers kunnen aan het verlenen van
      ondermandaat voorwaarden stellen of daarvoor grenzen bepalen.
