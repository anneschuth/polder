      Openbaar Lichaam ReinUnie, NV ReinUnie en HVC;b. het financieel beheer van het
      onroerendgoed, opgenomen in de lening- en huurovereenkomst, zoals het gebouwencomplex
      in Velsen-Zuid alsmede circa 1250 ondergrondse containers;c. de bevordering
