names:
- value: Gemeenschappelijk regeling beschermd wonen regio Rotterdam
  valid_from: '2023-06-03'
gr_meta:
  doel: 1. Deze regeling beoogt een doeltreffende en doelmatige samenwerking tussen
    de deelnemende gemeenten voor de uitvoering van de wettelijke taak van iedere
    gemeente om zorg te dragen voor beschermd wonen.2. Deze regeling is van toepassing
    op de gemeenten Albrandswaard, Barendrecht, Capelle aan den IJssel, Krimpen aan
    den IJssel, Lansingerland, Ridderkerk en Rotterdam.
  samenwerkingsvorm:
    value: '''Regeling zonder meer'''
    afkorting: RZM
