  bevoegdheden:
  - kop_artikel: 'Artikel 5: Taak en opdracht'
    inhoud_artikel: 1. Door de colleges van de deelnemers is aan het dagelijks bestuur
      van het samenwerkingsverband de uitvoering en het vaststellen van de beleidsregels/nadere
      regels, overgedragen van:a. de Participatiewet;b. het Besluit bijstandsverlening
      zelfstandigen 2004 (Bbz);c. de Wet inkomensvoorziening oudere en gedeeltelijk
      arbeidsongeschikte werkloze werknemers (Ioaw);d. de Wet inkomensvoorziening
      oudere en gedeeltelijk arbeidsongeschikte gewezen zelfstandigen (Ioaz);e. de
      Wet inburgering (Wi) zoals deze luidde op 31 december 2012 en de Wet van 13
      september 2012 tot wijziging van de Wet inburgering en enkele andere wetten
      in verband met de versterking van de eigen verantwoordelijkheid van de inburgeringsplichtige
      (Stb. 2012, 430)de Wet kinderopvang en kwaliteitseisen peuterspeelzalen (Wko),
      voor zover het de individuele verstrekkingen betreft;f. de Wet maatschappelijke
      ondersteuning (Wmo) waar het betreft de maatwerkvoorziening;g. de Regeling gehandicapten
      parkeerkaart (GPK);h. de Wet gemeentelijke schuldhulpverlening alsmede de afgifte
      van verklaringen op grond van de Wet schuldsanering natuurlijke personen (Wsnp)
      en de indiening van verzoekschriften tot instelling van een bewind wegens verkwisting
      of het hebben van problematische schulden als bedoeld in artikel 432 van Boek
      1 van het Burgerlijk Wetboek;i. De uitbetaling en administratieve afhandeling
      van het persoonsgebonden budget (PGB) als bedoeld in de Jeugdwet;j. Algemene
      maatregelen van bestuur en uitvoeringsregelingen van de genoemde wet- en regelgeving;k.
      Wet- en regelgeving die in plaats treedt of voorheen van toepassing was van
      de onder a. tot en met i. genoemde wet- en regelgeving, alsmede het ter zake
      geldende overgangsrecht.2. Het samenwerkingsverband adviseert (het bestuur van)
      de deelnemers en doet beleidsvoorstellen over de te voeren beleidskaders op
      het terrein van werk & inkomen en sociale zekerheid en de lokale / regionale
      arbeidsmarkt, de maatschappelijke ondersteuning en gemeentelijke schulddienstverlening.
      Het samenwerkingsverband vertegenwoordigt binnen haar bevoegdheden de deelnemers
      in alle met bovengenoemde taken samenhangende overlegstructuren.3. Het samenwerkingsverband
      biedt personele ondersteuning bij de oefening voor, respectievelijk de uitvoering
      van, de van toepassing zijnde rampenplannen van de deelnemers.
  - kop_artikel: 'Artikel 6: Bevoegdheden'
    inhoud_artikel: Om de belangen genoemd in artikel 4 te kunnen verwezenlijken zijn
      door de colleges van de deelnemers de bevoegdheden en verantwoordelijkheden
      overgedragen aan het dagelijks bestuur van het samenwerkingsverband ten aanzien
      van de uitvoering van de in artikel 5 nader genoemde wetten en regelingen, alsmede
      de bijbehorende algemene maatregelen van bestuur, algemeen verbindende voorschriften
      en uitvoeringsregelingen.
