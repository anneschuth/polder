  bevoegdheden:
  - kop_artikel: Artikel 2 Organisatie
    inhoud_artikel: 1. Per overeengekomen ambtelijk samenwerkingsverband (taakveld)
      wordt bepaald welke gemeente fungeert als centrumgemeente.2. Voor de uitvoering
      van de taken waarvoor de regeling wordt aangegaan wordt bij de aangewezen centrumgemeente
      een nieuwe afdeling gevormd of een bestaande afdeling aangepast/uitgebreid.3.
      Indien dit in het kader van een goede uitoefening van taken waarvoor de regelingis
      aangegaan, gewenst is, verrichten de desbetreffende ambtenaren hun werkzaamheden
      op één (of beide) locatie(s) van de gemeentekantoren Boxmeer en Sint Anthonis.4.
      De dagelijkse aansturing en verantwoordelijkheid voor een goede taakuitvoering,
      vloeit rechtstreeks voort uit de aanwijzing als centrumgemeente. Dit impliceert
      tevens dat de verantwoordelijkheid voor de toepassing en uitvoering van het
      personeelsbeleid (incl. bevordering of disciplinaire straffen) is voorbehouden
      aan de betreffende centrumgemeente.5. De burgemeesters respectievelijk de colleges
      van burgemeester en wethouders van beide gemeenten kunnen de uitoefening van
      bevoegdheden en de ondertekening van stukken/brieven namens de Gemeente mandateren
      dan wel opdragen aan ambtenaren die in dienst zijn van de andere gemeente. Deze
      ambtenaren dienen vooraf van deze mandatering in kennis gesteld te worden en
      hiermee in te stemmen, met inachtneming van het bepaalde in artikel 10:4 Algemene
      Wet Bestuursrecht.6. Per taakveld zal een afzonderlijk service level agreement
      (SLA) door de betreffende centrumgemeente worden opgesteld en jaarlijks op basis
      van de planning & control cyclus bijgewerkt worden.7. Het vaststellen van de
      SLA is – afhankelijk van het taakveld waarop wordt samengewerkt – een bevoegdheid
      van de burgemeesters respectievelijk de colleges van burgemeester en wethouders
      van de beide gemeenten.8. Jaarlijks vindt door de aangewezen centrumgemeente
      een evaluatie plaats van de geleverde diensten op basis van de vastgestelde
      service level overeenkomst. Deze evaluatie wordt in het eerste kwartaal van
      het nieuwe kalenderjaar aan beide colleges ter vaststelling aangeboden.
