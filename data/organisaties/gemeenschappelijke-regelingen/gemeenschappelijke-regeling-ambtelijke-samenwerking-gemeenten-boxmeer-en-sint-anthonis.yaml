  citeertitel: Gemeenschappelijke Regeling Ambtelijke Samenwerking Gemeenten Boxmeer
    en Sint Anthonis
  doel: 1. Het doel van deze regeling is om te komen tot een raamovereenkomst, waarin
    heldere afspraken worden gemaakt omtrent de ambtelijke samenwerking tussen de
    beide gemeenten.2. Deze regeling geeft uitvoering aan de ambtelijke samenwerking
    tussen beide gemeenten met als doel:a. vermindering kwetsbaarheid;b. professionalisering/kwaliteitsverbetering;c.
    Kostenbeheersing en waar mogelijk besparing;3. In eerste aanleg zal de samenwerking
    beperkt blijven tot de reeds aangewezen door de colleges van burgemeester en wethouders
    aangewezen samenwerkingsverbanden Personeel & Organisatie, Informatie- en Communicatie
    Technologie, Sociale Zaken en de Adviescommissie voor de Bezwaarschriften.4. Voor
    elk van deze aangewezen samenwerkingsverbanden wordt een Service Level Agreement
    (SLA) opgesteld, waarin de te behalen resultaten worden vastgelegd;5. Mochten
    de burgemeesters of de colleges van burgemeesters en wethouders in de toekomst
    besluiten tot verdergaande ambtelijke samenwerking op andere gebieden dan genoemd
    onder lid 3, dan dient het BOR-BGO daarover advies uit te brengen en dan gelden
    ook daarvoor de bepalingen van deze raamregeling.
