  bevoegdheden:
  - kop_artikel: Artikel 2. Taken van de deelnemers.
    inhoud_artikel: 1. Het gemeentebestuur van Pijnacker-Nootdorp draagt zorg voor
      het navolgende:a. benoeming van de gemeentearchivaris van Delft tot gemeentearchivaris,
      als bedoeld in artikel 32 van de Archiefwet 1995, van Pijnacker-Nootdorp;b.
      het vaststellen van een archiefverordening, als bedoeld in artikel 30, eerste
      lid van de Archiefwet 1995, waarin het Gemeentearchief Delft wordt aangewezen
      als archiefbewaarplaats, als bedoeld in artikel 31 van de Archiefwet 1995, van
      de gemeente Pijnacker-Nootdorp, naast het depot in het gemeentehuis van Pijnacker-Nootdorp;c.
      het overbrengen van de archieven van de gemeente Pijnacker-Nootdorp tot circa
      1935 naar het Gemeentearchief Delft;d. het, met inachtneming van de overbrengingstermijn
      in de Archiefwet 1995, overbrengen van de archieven van de gemeente Pijnacker-Nootdorp
      van na 1935 naar het Gemeentearchief Delft, voor zover daar voldoende ruimte
      aanwezig is;e. het bij de Algemeen Rijksarchivaris indienen van een verzoek
      als bedoeld in artikel 46, derde lid, van de Archiefwet 1995, om de zich aldaar
      bevindende archieven betreffende de gemeente Pijnacker-Nootdorp over te dragen
      aan het Gemeentearchief Delft;f. het in staat stellen van het Gemeentearchief
      Delft om, voor zover deze situatie zich voordoet, particuliere archieven betreffende
      de gemeente Pijnacker-Nootdorp op dezelfde voorwaarden als genoemd in deze regeling,
      op te nemen en te beheren.2. Het gemeentebestuur van Delft draagt zorg voor
      het navolgende:I algemeen:a. het, overeenkomstig het daartoe bij of krachtens
      de Archiefwet 1995 bepaalde, bewaren en beheren van de overgebrachte archieven
      betreffende de gemeente Pijnacker-Nootdorp.II bijzonder:b. het, op verzoek van
      het gemeentebestuur van Pijnacker-Nootdorp, microficheren en nader ontsluiten
      van het Bevolkingsregister, de Registers van de Burgerlijke Stand, en de Doop-,
      Trouw- en Begraafregisters van de gemeente Pijnacker-Nootdorp;c. het één maal
      per jaar en verder op verzoek van het gemeentebestuur van Pijnacker-Nootdorp
      inspecteren van de niet-overgebrachte archieven van de gemeente Pijnacker-Nootdorp;d.
      het, op verzoek van het gemeentebestuur van Pijnacker-Nootdorp, conserveren
      en restaureren van de naar het Gemeentearchief Delft overgebrachte archieven;e.
      het, op verzoek van het gemeentebestuur van Pijnacker-Nootdorp, schonen en inventariseren
      van de naar het Gemeentearchief Delft overgebrachte archieven;f. het, met inachtneming
      van het daartoe bij of krachtens de Archiefwet 1995 bepaalde, beschikbaar stellen
      van de naar het Gemeentearchief Delft overgebrachte archieven, in de studiezaal
      van genoemde dienst.
