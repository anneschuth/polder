gr_meta:
  citeertitel: Samenwerkingsverband Aalsmeer-Uithoorn
  doel: '1. Belang van de regeling is voor de deelnemers: de kwaliteit van de dienstverlening
    en de e-dienstverlening, de continuïteit, realisatie van nieuwe taken ten gevolge
    van decentralisatie van taken door de rijksoverheid en lagere uitvoeringskosten.2.
    Doel van de regeling is het bewerkstelligen van een kwalitatief hoogwaardige en
    doelmatige uitvoering door het samenwerkingsverband van de door de deelnemers
    opgedragen taken.3. De missie van de organisatie is ten dienste staan van de burgers,
    bedrijven en instellingen van de gemeenten Aalsmeer en Uithoorn.'
