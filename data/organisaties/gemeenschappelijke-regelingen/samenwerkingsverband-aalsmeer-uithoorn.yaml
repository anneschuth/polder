  bevoegdheden:
  - inhoud_artikel: 1. De gemeenteraden dragen geen bevoegdheden over aan de bestuursorganen
      van de regeling.2. De gemeenteraden stellen algemeen verbindende voorschriften
      en kaderstellend beleid vast ter zake van de opgedragen taakvelden zoals genoemd
      in artikel 6.3. De colleges en burgemeesters dragen, ieder voor zover daartoe
      bevoegd, met betrekking tot de taakvelden zoals opgedragen in artikel 6, de
      bevoegdheden over aan het dagelijks bestuur van het samenwerkingsverband ten
      aanzien van de uitvoering van de opgedragen wet- en regelgeving.
