  citeertitel: Gemeenschappelijke Regeling SVHW 2015
  doel: De Regeling wordt getroffen in het belang van een zo doelmatig mogelijke uitvoering
    van werkzaamheden met betrekking tot:a. de heffing en invordering van belastingen,
    heffingen en rechten;b. de Wet waardering onroerende zaken;c. de administratie
    van vastgoedgegevens;d. het verstrekken van vastgoedgegevens aan de Deelnemers
    en derden;e. de Wet basisregistraties adressen en gebouwen.
