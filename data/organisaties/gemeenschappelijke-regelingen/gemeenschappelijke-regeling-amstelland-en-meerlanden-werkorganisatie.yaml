  doel: De Werkorganisatie behartigt de gemeenschappelijke en afzonderlijke belangen
    van de deelnemers en hun colleges op het gebied van:a. de sociale werkvoorziening
    ingevolge de WsW, enb. de arbeidsinschakeling ingevolge de Pw, met een loonwaarde
    tot 70% van het minimum loonelk voor zover de colleges conform artikel 5 bevoegdheden
    hebben overgedragen of opgedragen aan het bestuur van de Werkorganisatie. Het
    bestuur van de Werkorganisatie draagt daarbij zorg voor een zo efficiënt en effectief
    mogelijke uitvoering van de in de wetten opgedragen taken.
