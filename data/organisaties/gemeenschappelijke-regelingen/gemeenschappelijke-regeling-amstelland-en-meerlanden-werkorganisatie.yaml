  bevoegdheden:
  - inhoud_artikel: Artikel 5 Bevoegdheden1. Ter verwezenlijking van de in artikel
      4, eerste lid sub a, genoemde belangen en taken dragen de colleges hun door
      de formele wetgever in de Wsw geattribueerde bevoegdheden over aan het bestuur
      van de Werkorganisatie, uitgezonderd de van voornoemde geattribueerde bevoegdheden
      afgeleide bevoegdheden om beleidsregels vast te stellen.2. Ter verwezenlijking
      van de in artikel 4, eerste lid sub b, genoemde belangen en taken is ieder college
      gehouden ten aanzien van de hem door de formele wetgever in de Pw geattribueerde
      bevoegdheden inzake arbeidsinschakeling mandaat, alsmede de bevoegdheid tot
      verlening van ondermandaat, te verlenen aan het bestuur van de Werkorganisatie,
      voor zover het betreft de arbeidsinschakeling van personen met een loonwaarde
      tot 70%. Het bestuur stelt een model op voor het mandaat.3. Ter verwezenlijking
      van de in artikel 4, eerste lid sub b, genoemde belangen en taken staat het
      een college vrij ten aanzien van de hem door de formele wetgever in de Pw geattribueerde
      bevoegdheden inzake arbeidsinschakeling mandaat, alsmede de bevoegdheid tot
      verlening van ondermandaat, te verlenen aan het bestuur van de Werkorganisatie,
      voor zover het betreft de arbeidsinschakeling van personen met een loonwaarde
      tussen de 70-100% en/of op de collegetaak ten aanzien van arbeidsmatige dagbesteding.
      Het bestuur kan bij besluit bepalen dat de Werkorganisatie tevens het mandaat
      van een college tot uitvoering van andere taken en bevoegdheden van inzake arbeidsinschakeling
      mag uitoefenen. Het bestuur stelt een model op voor het mandaat.4. De taken
      en bevoegdheden als bedoeld in het eerste en tweede lid behoren tot het basispakket
      van taken en bevoegdheden van de Werkorganisatie. De andere taken en bevoegdheden
      als bedoeld in het derde lid behoren tot het optionele pakket van taken en bevoegdheden
      van de Werkorganisatie.5. Voor zover de diensten vallen binnen het kader van
      de in artikel 4 en 5 genoemde taken, is de Werkorganisatie tot een maximum van
      20% van haar omzet bevoegd tot het verrichten van dezelfde diensten voor andere
      publiekrechtelijke rechtspersonen of overheidsgedomineerde privaatrechtelijke
      rechtspersonen. Met deze rechtspersonen of organisaties mogen meerjarige dienstverleningsovereenkomsten
      afgesloten worden.6. Voor zover dat uit een oogpunt van het daarmee te dienen
      belang in het bijzonder aangewezen moet worden geacht mag de Werkorganisatie
      overeenkomsten met rechtspersonen waarin zij deelneemt en andere derden aangaan
      om de haar opgedragen taken geheel of gedeeltelijk uit te doen voeren.
