gr_meta:
  citeertitel: Gemeenschappelijke Regeling Veiligheidsregio Twente
  doel: De veiligheidsregio behartigt de belangen van de gemeenten op de volgende
    terreinen:a. brandweerzorg als bedoeld in artikel 3, eerste lid, onder a en b
    van de Wet veiligheidsregio’s;b. geneeskundige hulpverlening in het kader van
    de rampenbestrijding en de crisisbeheersing als bedoeld in artikel 1 van de Wet
    veiligheidsregio’s;c. rampenbestrijding en crisisbeheersing, als bedoeld in artikel
    1 van de Wet veiligheidsregio’s;
