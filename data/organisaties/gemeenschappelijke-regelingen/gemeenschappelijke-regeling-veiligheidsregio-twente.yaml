  bevoegdheden:
  - kop_artikel: Artikel 5 Taken en bevoegdheden
    inhoud_artikel: Ter behartiging van de in artikel 4 genoemde belangen is de veiligheidsregio
      belast met de taken en bevoegdheden als bedoeld in artikel 10 van de Wet veiligheidsregio’s
      en de overige taken die bij of krachtens wet- en regelgeving aan de veiligheidsregio
      worden opgedragen.
  - kop_artikel: Artikel 6 Bevoegdheden van regeling en bestuur
    inhoud_artikel: 1. De veiligheidsregio heeft alle bevoegdheden tot regeling, bestuur
      en beheer die nodig zijn voor de uitvoering van de aan de veiligheidsregio opgedragen
      taken.2. Alle bevoegdheden in het kader van deze regeling, die niet aan een
      ander bestuursorgaan zijn opgedragen, behoren aan het algemeen bestuur.
  - kop_artikel: Artikel 7 Dienstverlening
    inhoud_artikel: 1. De veiligheidsregio is bevoegd tot het verrichten van diensten
      die niet onder de reguliere taakuitoefening van de veiligheidsregio vallen op
      het gebied van veiligheid voor één of meer deelnemende gemeenten, indien deze
      daarom verzoeken en het algemeen bestuur dat verzoek inwilligt.2. Een besluit
      tot dienstverlening wordt genomen door het algemeen bestuur en vermeldt de wijze
      van kostenverrekening en de overige voorwaarden, waaronder tot de gevraagde
      dienstverlening wordt overgegaan.3. De wijze van uitvoering van deze taken wordt
      in een overeenkomst tussen de veiligheidsregio en de betreffende gemeenten vastgelegd.
  - kop_artikel: Artikel 8 Deelneming
    inhoud_artikel: De veiligheidsregio is bevoegd tot het aangaan van en deelnemen
      in een gemeenschappelijkeregeling waarbij een openbaar lichaam of een gemeenschappelijk
      orgaan wordt ingesteld.
