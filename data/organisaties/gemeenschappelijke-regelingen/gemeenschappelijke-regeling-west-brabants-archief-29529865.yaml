gr_meta:
  citeertitel: Gemeenschappelijke Regeling West-Brabants Archief
  doel: 1. Het West-Brabants Archief is ingesteld met als doel de belangen van de
    deelnemers met betrekking tot de zorg, het beheer, de bewaring en het ter beschikking
    stellen van de in de archiefbewaarplaats berustende archiefbescheiden en collecties
    van de deelnemende gemeenten te behartigen alsmede het toezicht op het beheer
    van de archiefbescheiden van de deelnemers voor zover deze niet zijn overgebracht.2.
    Het West-Brabants Archief heeft tevens als doel het in het samenwerkingsgebied
    vervullen van de functie van regionaal kennis- en informatiecentrum op het gebied
    van de lokale en regionale geschiedenis middels het opbouwen en beheren van een
    zo breed mogelijke collectie regionaal-historisch bronnenmateriaal en deze op
    een zo actief mogelijke wijze beschikbaar stellen aan en dienstbaar maken voor
    een breed publiek.
