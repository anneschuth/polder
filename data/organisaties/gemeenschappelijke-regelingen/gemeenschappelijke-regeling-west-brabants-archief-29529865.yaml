  bevoegdheden:
  - kop_artikel: Bevoegdheden van het algemeen bestuur - Artikel 9
    inhoud_artikel: 1. Voor zover in deze regeling niet anders is bepaald, oefent
      het algemeen bestuur de overgedragen bevoegdheden uit die bij of krachtens de
      Archiefwet en de Gemeentewet zijn of worden toegekend aan de colleges en die
      nodig zijn ter behartiging van de in artikel 3 omschreven doelstelling van het
      West-Brabantse Archief.2. Het algemeen bestuur is bevoegd te besluiten tot deelnemen
      aan een andere gemeenschappelijke regeling als bedoeld in de wet3. De volgende
      bevoegdheden van het algemeen bestuur zijn niet overdraagbaar:a. het aanwijzen
      en ontslaan van de voorzitter, plaatsvervangend voorzitter, alsmede de overige
      leden van het dagelijks bestuur;b. het vaststellen van een regeling voor het
      financieel en administratief beheer;c. het vaststellen van een reglement van
      orde;d. het doen van voorstellen tot wijziging, toetreding, uittreding en opheffing
      van deze gemeenschappelijke regeling.4. Het algemeen bestuur is bevoegd tot
      de oprichting van en de deelneming in stichtingen, maatschappen, vennootschappen,
      verenigingen, coöperaties en onderlinge waarborgmaatschappijen, indien dit in
      het bijzonder aangewezen moet worden geacht voor de behartiging van het daarmee
      te dienen openbaar belang. Het besluit wordt niet genomen dan nadat de raden
      van de deelnemende gemeenten een ontwerpbesluit is toegezonden en in de gelegenheid
      zijn gesteld hun wensen en bedenkingen ter kennis van het algemeen bestuur te
      brengen.
  - kop_artikel: Bevoegdheden van het dagelijks bestuur - Artikel 14
    inhoud_artikel: Het dagelijks bestuur is belast met de dagelijkse leiding van
      het West-Brabants Archief.Hiertoe behoren onder meer:a. het voorbereiden van
      al hetgeen aan het algemeen bestuur ter overweging en beslissing zal worden
      voorgelegd;b. het uitvoeren van de besluiten van het algemeen bestuur;c. het
      beheren van de inkomsten en uitgaven van het West-Brabants Archief;d. de zorg,
      voor zover niet aan anderen opgedragen, voor de controle op het geldelijk beheer
      en de boekhouding;e. het nemen van alle conservatoire maatregelen, zowel in
      als buiten rechte en het doen van alles wat nodig is ter voorkoming van verjaring
      en verlies van recht op bezit;f. het houden van een voortdurend toezicht op
      alles wat het West-Brabants Archief aangaat;g. het vaststellen van het directiestatuut
      en een algemeen mandaat- en volmachtbesluit, zoals bedoeld in artikel 26 van
      de regeling;h. het behartigen van de belangen van het West-Brabants Archief
      bij andere overheidslichamen en instellingen, diensten of personen, waarmee
      contact voor het West-Brabants Archief van belang is;i. het nemen van besluiten
      of het doen van een uitvoeringshandeling, waaronder begrepen besluiten en handelingen
      naar aanleiding van een uitspraak van een bestuursrechter.
  - kop_artikel: Directeur - Artikel 28
    inhoud_artikel: 1. Ten aanzien van de bedrijfsvoering in de organisatie draagt
      het dagelijks bestuur zijn bevoegdheden voor zover als mogelijk over in mandaat
      aan de directeur. In een door het dagelijks bestuur vast te stellen directiestatuut
      worden de taken en bevoegdheden van de directeur, alsmede de wijze waarop het
      dagelijks bestuur toeziet op de uitvoering en naleving daarvan, nader omschreven.
      Op deze bepaling is hoofdstuk 10 van de Algemene wet bestuursrecht van toepassing.2.
      Het dagelijks bestuur stelt, uit een oogpunt van doelmatig en doeltreffend bestuur
      en de uitoefening van bevoegdheden binnen de organisatie, een algemeen mandaat-
      en volmachtbesluit vast.
