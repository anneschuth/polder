  bevoegdheden:
  - kop_artikel: Artikel 9 Mandatering en facilitering
    inhoud_artikel: 9.1 De gemeenten in Holland Rijnland dragen er zorg voor dat alle
      bevoegdheden, die in het kader van de uit te voeren wetten en regelingen voor
      de uitvoering van de specialistische maatschappelijke zorg zijn opgedragen aan
      de colleges van de gemeenten of aan de Burgemeesters, worden gemandateerd dan
      wel bij machtiging worden verleend aan het college van Leiden, een en ander
      met inachtneming van het bepaalde in de Gemeentewet en de Awb en hetgeen hierboven
      is opgenomen met betrekking tot wederzijdse verantwoordelijkheden en taken.9.2
      De gemeenten in Holland Rijnland dragen er gezamenlijk zorg voor dat alle benodigde
      faciliteiten, gegevensuitwisselingen en (informatie)voorzieningen, die in het
      kader van de samenwerking benodigd zijn voor de uitvoering van de regionale
      toegang, binnen redelijke termijn beschikbaar worden gesteld. Dit geldt visa
      versa ook voor de centrumgemeente richting de andere gemeenten in Holland Rijnland.
