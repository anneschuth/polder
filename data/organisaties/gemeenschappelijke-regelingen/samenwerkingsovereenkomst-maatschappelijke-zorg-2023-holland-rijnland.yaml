gr_meta:
  doel: De doelstelling van de overeenkomst is een gedragen, sluitende en zorgvuldige
    aanpak voor de doordecentralisatie van de maatschappelijke zorg per 1 januari
    2023.a. Taken en inhoudelijke beheersmaatregelen van de specialistische voorzieningen,
    uitgevoerd door de gemeente Leiden met een gezamenlijke verantwoordelijkheid van
    alle gemeenten in Holland Rijnland;b. Taken, verantwoordelijkheden en inhoudelijke
    beheersmaatregelen van op- en afbouwopgave in de drie subregio's;c. Afspraken
    over de financiën, zowel die betrekking hebben op a en b. De inhoudelijke beheersmaatregelen
    zijn vervat in bijlage 2.1.2 De taken en bevoegdheden van de gemeenten worden
    op het gebied van de specialistische maatschappelijke zorg door mandaat en volmacht
    opgedragen aan de centrumgemeente.
