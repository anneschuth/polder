  bevoegdheden:
  - kop_artikel: Artikel 4. Bevoegdheden
    inhoud_artikel: 1. Aan het bestuur van het Openbaar Lichaam worden integraal alle
      bevoegdheden van de deelnemers overgedragen met betrekking tot de uitvoering
      van:a. de Wet sociale werkvoorziening, voor wat betreft de tot de doelgroep
      van de Wsw behorende ingezetenen die werkzaam zijn bij het Openbaar Lichaam;b.
      de Participatiewet, voor wat betreft de tot de doelgroep van Nieuw beschut onder
      de Participatiewet behorende ingezetenen die werkzaam zijn bij het Openbaar
      Lichaam;c. de Participatiewet, voor zover het betreft arbeidsinschakeling en
      beheersing van de Nederlandse taal, waaronder begrepen het opleggen van maatregelen
      en het afhandelen van bezwaarschriften dienaangaande, ten aanzien van personen
      die door deelnemers zijn aangemeld en die vallen onder de werking van artikel
      7, eerste lid, sub a van de Participatiewet.2. De bevoegdheden als bedoeld in
      lid 1 berusten bij het Algemeen Bestuur.3. Het Algemeen Bestuur kan toevertrouwde
      bevoegdheden mandateren, danwel delegeren aan het Dagelijks Bestuur, tenzij
      de aard van de bevoegdheid zich daartegen verzet.4. Het Dagelijks Bestuur kan
      een of meer leden van het Dagelijks Bestuur machtigen tot uitoefening van een
      of meer van zijn bevoegdheden, tenzij de regeling waarop de bevoegdheid steunt
      zich daartegen verzet.5. Het Dagelijks Bestuur kan toevertrouwde bevoegdheden
      mandateren aan de algemeen directeur. De mandatering vindt plaats in het directiestatuut.6.
      De gemandateerde bevoegdheden zijn opgenomen in de bij deze Gemeenschappelijke
      Regeling behorende Bijlage Bevoegdheden en Directiestatuut.
