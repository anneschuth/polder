gr_meta:
  citeertitel: Noordmidden-Drentse samenwerking
  doel: De gemeenten spannen zich in samen te werken op de volgende gebieden:a. de
    inkoop van individuele voorzieningen op het gebied van jeugdhulp in uitvoering
    van de Jeugdwet;b. de inkoop van maatwerkvoorzieningen op het gebied van maatschappelijke
    ondersteuning in uitvoering van de Wmo 2015;c. het contractmanagement met betrekking
    tot de al dan niet in samenwerking gesloten raamovereenkomsten en uitvoeringsovereenkomsten
    op de gebieden van jeugdhulp en maatschappelijke ondersteuning;d. het toezicht
    op de kwaliteit en doelmatigheid van de ingekochte dienstverlening;e. het toezicht
    op de rechtmatigheid van de besteding van de gelden;f. de handhaving van de kwaliteit,
    doelmatigheid en rechtmatigheid;g. advisering betreffende de kwaliteit van met
    PGB ingekochte dienstverlening;h. advisering, overleg en afstemming met betrekking
    tot de uitvoering en beleidsvorming;i. standpuntbepaling ten aanzien van (subregio)
    overstijgende vraagstukken op het gebied van het sociaal domein.
  samenwerkingsvorm:
    value: '''Regeling zonder meer'''
    afkorting: RZM
