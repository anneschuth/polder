  bevoegdheden:
  - kop_artikel: Artikel 4
    inhoud_artikel: 1. De door de regio in het kader van het doel van deze gemeenschappelijke
      regeling te behartigen belangen zijn :een evenwichtige ontwikkeling van het
      gebied en versterking van de kwaliteit van hetvestigingsklimaat door onder andere:a.
      verbetering van het innovatieve vermogen van de regionale economie door innovatiesin
      de industrie, zorg, ICT en zakelijke dienstverlening;b. vergroting van de sociale
      betrokkenheid en participatie van mensen in het onderwijs,op de arbeidsmarkt
      en in het maatschappelijk leven;c. verbetering van de externe en interne bereikbaarheid
      door middel van een verbeterdsnelwegennet, goede noord-zuid verbindingen, doorstroming
      op de stedelijkeinvalswegen en een beter gebruik van het regionaal openbaar
      vervoer en voor korteafstanden de fiets;d. versterking van de kwaliteit van
      de leefomgeving door onder andere regionaleafstemming van het gezamenlijke programma
      van wonen, werken en voorzieningen,verduurzaming van de voorraad woningen en
      kantoren, herontwikkeling van verouderdeplekken en delen in stad of dorp, beter
      beleefbaar en bruikbaar maken van landschappenen versterking van lokale identiteiten
      en cultuurhistorische rijkdom.2. De behartiging van de in het eerste lid genoemde
      belangen omvat onder meer:a. de bevordering van overleg met en tussen de gemeenten
      ter afstemming encoördinatie van gemeentelijke beleidsvoornemens en beleidsmaatregelen;b.
      de bevordering van gemeenschappelijke standpuntbepalingen;c. het voeren van
      overleg met de provinciale- en rijksoverheid en het voorstaan vandeze belangen
      ook bij andere instellingen, waaronder belangengroepen,maatschappelijke organisaties
      en private partijen;d. het geven van voorlichting inzake de belangenbehartiging
      in de ruimste zin door deregio.
