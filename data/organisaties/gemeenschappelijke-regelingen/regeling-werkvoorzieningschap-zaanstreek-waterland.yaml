gr_meta:
  citeertitel: Regeling Werkvoorzieningschap Zaanstreek-Waterland
  doel: 1. Het openbaar lichaam heeft tot doel door middel van de uitvoering van de
    Wsw te voorzien in arbeid al dan niet onder aangepaste omstandigheden, die zoveel
    mogelijk gericht is op behoud, herstel dan wel bevorderen van de arbeidsbekwaamheid
    van die personen, die tot het verrichten van arbeid in staat zijn, doch voor wie
    in belangrijke mate ten gevolge van bij hen gelegen factoren, gelegenheid om onder
    normale omstandigheden arbeid te verrichten niet of voorshands niet aanwezig is,
    een en ander mede met het oog op het kunnen verrichten van arbeid onder normale
    omstandigheden.2. Het openbaar lichaam neemt deel in, dan wel richt eigen organisaties
    in, die andere personen, niet zijnde in het kader van de nWsw, op commerciële
    wijze reïntegreren dan wel detacheren of begeleiden met het oog op plaatsing op
    de reguliere arbeidsmarkt.
