  bevoegdheden:
  - kop_artikel: Artikel 4 Mandaat Deelnemende gemeente
    inhoud_artikel: 1. Het college van de Deelnemende gemeente draagt de taken en
      bevoegdheden welke noodzakelijk zijn voor de realisering van het doel van de
      Centrumregeling, zoals omschreven in artikel 2 en artikel 3, op aan het college
      van de Centrumgemeente.2. Voor de uitvoering van de in artikel 3 genoemde taken
      zal het college van de Deelnemende gemeente zijn daarop betrekking hebbende
      wettelijke bevoegdheden mandateren aan het college van de Centrumgemeente.3.
      Het college van de Deelnemende gemeente draagt zelf zorg voor de wettelijk vereiste
      bekendmaking zoals bedoeld in Afdeling 3.6 van de Algemene wet bestuursrecht.4.
      Het college van de Centrumgemeente wordt toegestaan ondermandaat te verlenen
      aan zijn medewerkers. De Centrumgemeente draagt zorg voor de hiervoor vereiste
      wettelijke bekendmaking zoals bedoeld in Afdeling 3.6 van de Algemene wet bestuursrecht.5.
      Het college van de Deelnemende gemeente blijft verantwoordelijk voor de uitvoering
      van de in artikel 3 genoemde taken.
  - kop_artikel: Artikel 4a Mandaat Afnemende gemeente
    inhoud_artikel: 1. Gemeenten, die niet deelnemen aan de Centrumregeling, kunnen
      op basis van een DVO specifieke producten en diensten afnemen van Vidar. In
      de DVO wordt specifiek overeengekomen, welke taken en bevoegdheden het college
      van de Afnemende gemeente opdraagt aan het college van de Centrumgemeente.2.
      Voor zover nodig zal het college van de Afnemende gemeente de wettelijke bevoegdheden,
      die betrekking hebben op de in de DVO opgedragen taken en bevoegdheden, mandateren
      aan het college van de Centrumgemeente.3. Het college van de Afnemende gemeente
      draagt, voor zover aan de orde, zelf zorg voor de wettelijk vereiste bekendmaking
      zoals bedoeld in Afdeling 3.6 van de Algemene wet bestuursrecht.4. Het college
      van de Centrumgemeente wordt toegestaan ondermandaat te verlenen aan zijn medewerkers.
      De Centrumgemeente draagt zorg voor de hiervoor vereiste wettelijke bekendmaking
      zoals bedoeld in Afdeling 3.6 van de Algemene wet bestuursrecht.5. Het college
      van de Afnemende gemeenten blijft verantwoordelijk voor de uitvoering van de
      taken en bevoegdheden welke behoren bij de producten en/of diensten.
