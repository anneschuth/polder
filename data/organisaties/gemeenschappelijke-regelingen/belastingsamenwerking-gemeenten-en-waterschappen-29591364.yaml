gr_meta:
  citeertitel: Belastingsamenwerking Gemeenten en Waterschappen
  doel: 1. De regeling wordt getroffen in het belang van de deelnemers voor het:a.
    heffen en invorderen van belastingen;b. afhandelen van bezwaar- en beroepschriften
    inzake belastingen;c. uitvoeren van de Wet waardering onroerende zaken.2. Het
    dagelijks bestuur adviseert de deelnemers omtrent de belastingen waarvan de heffing
    en invordering krachtens deze regeling is opgedragen aan de BsGW.
