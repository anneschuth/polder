  bevoegdheden:
  - kop_artikel: Artikel 5
    inhoud_artikel: Aan het dagelijks bestuur wordt overgedragen de bevoegdheid tot:a.
      de aanwijzing van een of meer ambtenaren van de BsGW als heffingsambtenaar,
      als bedoeld in artikel 232, vierde lid, onder a van de Gemeentewet en artikel
      124, vijfde lid, onder a van de Waterschapswet, bevoegd tot het heffen van belastingen
      en de uitvoering van de Wet waardering onroerende zaken;b. de aanwijzing van
      een of meer ambtenaren van de BsGW als invorderingsambtenaar, als bedoeld in
      artikel 232, vierde lid, onder b van de Gemeentewet en artikel 124, vijfde lid
      onder b van de Waterschapswet, bevoegd tot het invorderen van belastingen;c.
      de aanwijzing van een of meer ambtenaren van de BsGW of een gerechtsdeurwaarder
      als belastingdeurwaarder, als bedoeld in artikel 232, vierde lid, onder d van
      de Gemeentewet en artikel 124, vijfde lid, onder d van de Waterschapswet;d.
      de aanwijzing van een of meer ambtenaren van de BsGW als ambtenaar van de BsGW
      als bedoeld in artikel 232, vierde lid, onder c van de Gemeentewet en artikel
      124, vijfde lid, onder c van de Waterschapswet, bevoegd tot het heffen en invorderen
      van belastingen en de uitvoering van de Wet waardering onroerende zaken;e. het
      beslissen op administratieve beroepen tegen afgewezen verzoeken om kwijtschelding;f.
      het vaststellen van uitvoeringsregels samenhangend met het combibiljet.2. Het
      eerste lid is uitsluitend van toepassing ten aanzien van de:a. onroerende zaak
      belasting als bedoeld in artikel 220 van de Gemeentewet;b. hondenbelasting als
      bedoeld in artikel 226 van de Gemeentewet;c. afvalstoffenheffing als bedoeld
      in artikel 15.33 van de Wet Milieubeheer;d. rioolheffing als bedoeld in artikel
      228 van de Gemeentewet;e. watersysteemheffing als bedoeld in artikel 117 van
      de Waterschapswet;f. zuiveringsheffing als bedoeld in artikel 122d van de Waterschapswet;g.
      verontreinigingsheffing als bedoeld in artikel 7.2 van de Waterwet;h. uitvoering
      van de wet WOZ.3. Ten aanzien van de in het tweede lid genoemde belastingen
      wordt aan het dagelijks bestuur mandaat verleend tot:a. het geheel of gedeeltelijk
      oninbaar verklaren van een belastingaanslag als bedoeld in artikel 255, vijfde
      lid, van de Gemeentewet respectievelijk artikel 144, vijfde lid, van de Waterschapswet;b.
      toepassing geven aan de hardheidsclausule als bedoeld in artikel 63 van de Algemene
      wet inzake rijksbelastingen;c. het verlenen van gehele of gedeeltelijke kwijtschelding
      van een bij beschikking opgelegde boete als bedoeld in artikel 66 van de Algemene
      wet inzake rijksbelastingen.
