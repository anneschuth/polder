  bevoegdheden:
  - kop_artikel: Artikel 12. Bestuurstaken en bevoegdheden
    inhoud_artikel: 1. Het algemeen bestuur, het dagelijks bestuur en de voorzitter
      hebben de bevoegdheden welke voortvloeien uit de aan het openbaar lichaam in
      de artikelen 4 en 5 opgedragen taken.2. Behoudens voor zover de regeling daarvan
      afwijkt, is de Provinciewet wat betreft de taken van provinciale staten, gedeputeerde
      staten en de commissaris van de Koning zoveel mogelijk van overeenkomstige toepassing
      op het algemeen bestuur, het dagelijks bestuur en de voorzitter.3. Voor de toepassing
      van het tweede lid blijft de Wet dualisering provinciebestuur buiten beschouwing.
