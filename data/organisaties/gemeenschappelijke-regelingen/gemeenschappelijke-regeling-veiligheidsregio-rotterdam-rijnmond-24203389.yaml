gr_meta:
  citeertitel: Gemeenschappelijke regeling Veiligheidsregio Rotterdam-Rijnmond
  doel: Het openbaar lichaam heeft tot doel:a. het doelmatig organiseren en coördineren
    van werkzaamheden ter voorkoming, beperking en bestrijding van brand, het beperken
    van brandgevaar, het voorkomen en beperken van ongevallen bij brand en al hetgeen
    daarmee verband houdt, het beperken en bestrijden van gevaar voor mensen en dieren
    bij ongevallen anders dan bij brand, het beperken en bestrijden van rampen en
    overigens het bevorderen van een goede hulpverlening bij ongevallen en rampen;b.
    het doelmatig organiseren en coördineren van het vervoer van zieken en ongevalslachtoffers,
    de registratie daarvan en het bevorderen van adequate opname van zieken en ongevalslachtoffers
    in ziekenhuizen of andere instelling voor intramurale zorg;c. het voorbereiden
    en bewerkstelligen van een doelmatig georganiseerde en gecoördineerde geneeskundige
    hulpverlening bij ongevallen en rampen;d. het geven van invulling aan de regionale
    taken ten aanzien van de organisatie en voorbereiding op rampenbestrijding en
    crisisbeheersing en de hiermee verbandhoudende multidisciplinaire samenwerking.
