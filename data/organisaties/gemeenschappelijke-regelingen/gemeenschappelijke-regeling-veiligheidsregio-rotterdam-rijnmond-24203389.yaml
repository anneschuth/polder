  bevoegdheden:
  - kop_artikel: 'Artikel 4 Gemeenschappelijke regeling: taken en bevoegdheden'
    inhoud_artikel: "Het openbaar lichaam draagt zorg voor de volgende wettelijke\
      \ taken en beschikt daarbij over de daarbij genoemde bevoegdheden:a.\tgenoemd\
      \ in artikel 10 van de Wet veiligheidsregio’s;b.\tgenoemd in artikel 25 van\
      \ de Wet veiligheidsregio’s;c. \toverige taken die bij of krachtens wet aan\
      \ het openbaar lichaam worden opgedragen.Het bestuur en de directeur van de\
      \ veiligheidsregio zijn gemandateerd op grond van het MVMR."
