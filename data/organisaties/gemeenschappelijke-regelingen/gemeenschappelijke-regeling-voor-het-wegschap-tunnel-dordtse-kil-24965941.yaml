  citeertitel: Gemeenschappelijke regeling voor het Wegschap tunnel Dordtse Kil
  doel: 1. Er is een openbaar lichaam, genaamd "Wegschap Tunnel Dordtse Kil", hierna
    te noemen het wegschap. Het wegschap is gevestigd te Dordrecht.2. Dit wegschap
    heeft, in het belang van de ontsluiting van de gebieden van de deelnemers, tot
    taak het in stand houden, beheren en exploiteren van de tunnel en de aansluitende
    wegverbindingen en bijbehorende installaties.
