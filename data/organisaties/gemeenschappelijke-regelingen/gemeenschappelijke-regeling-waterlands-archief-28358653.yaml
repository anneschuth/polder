  bevoegdheden:
  - kop_artikel: Artikel 4 Taken en bevoegdheden bestuur
    inhoud_artikel: 1. Aan het bestuur van het Waterlands Archief zijn de navolgende
      werkzaamheden, taken en bevoegdheden van de colleges overgedragen:a. de beheerstaken,
      te onderscheiden in het behouden, bewerken en benutten van de archiefbescheiden
      die berusten in de in artikel 3 genoemde archiefbewaarplaatsen;b. de taken en
      bevoegdheden, bedoeld in de artikelen 15, derde lid, 16, tweede lid, 19, 31
      en 32, derde lid, van de Archiefwet 1995;2. Het bestuur van het Waterlands Archief
      voert aanvullend op de in lid 1 genoemde werkzaamheden, taken en bevoegdheden
      de navolgende taken voor de gemeenten uit:a. het adviseren en het doen van voorstellen
      aan de colleges van de gemeenten over de taken en bevoegdheden, die door de
      colleges van de gemeenten worden uitgevoerd ingevolge de artikelen 5, 7, 8,
      12, 13, 15, eerste en tweede lid, 30 en 32, tweede lid, van de Archiefwet 1995,
      enb. het verrichten van door de colleges opgedragen andere taken die verband
      houden met de behartiging van de belangen, bedoeld in artikel 3.
