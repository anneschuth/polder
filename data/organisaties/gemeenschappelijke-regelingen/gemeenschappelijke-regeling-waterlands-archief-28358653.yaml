gr_meta:
  citeertitel: Gemeenschappelijke Regeling Waterlands Archief
  doel: 1. De regeling wordt getroffen met het doel de belangen van de colleges bij
    alle aangelegenheden betreffende de archiefbescheiden en collecties die berusten
    in de archiefbewaarplaatsen van de gemeenten, in gezamenlijkheid te behartigen.2.
    Het Waterlands Archief is mede ingesteld met het doel om in beperkte omvang diensten
    aan derden te leveren ten aanzien van het beheer van archiefbescheiden en collecties.
