  bevoegdheden:
  - kop_artikel: Artikel 5 Bevoegdheden uit te voeren taken
    inhoud_artikel: Ter behartiging van de in artikel 3 genoemde belangen dragen de
      Raden en Colleges de bevoegdheden ten aanzien van de hieronder genoemde taken
      over aan het Algemeen Bestuur van de Regeling, ieder voor zover het hun bevoegdheden
      betreft:1. Uitgezonderd de gemeenten Alphen aan den Rijn en Nieuwkoop, de instandhouding
      van een Regionaal Bureau Leerrecht Holland Rijnland (RBL Holland Rijnland) dat
      belast is met:a. de uitvoering van de Leerplichtwet 1969, zoals deze van tijd
      tot tijd luidt;b. de uitvoering van de doorstroompuntwetgeving, zoals deze nu
      luidt of gaat luiden in de toekomst, bij de bestrijding van voortijdig schoolverlaten
      en het volgen van jongeren in een kwetsbare positie, door middel van uitoefening
      van de taken en bevoegdheden als bedoeld in:i. Wet educatie en beroepsonderwijs,
      artikelen 8.03, 8.1.8, 8.3.2, 8.3.3, 8.3.4, derde en vijfde lid, en 2.5.5 e;ii.
      Wet op Expertisecentra, artikelen 42B, 47A, 147, 148, 149, derde en vijfde lid
      en 162;iii. Wet voortgezet onderwijs 2020, artikelen 8.18, 8.20, 8.21 eerste
      lid, 8.22 eerste en derde lid, 8.23 tweede en derde lid, 8.24 derde lid, 8.25
      tweede lid, 8.26 eerste lid, 8.27 derde en vijfde lid, 8.31 eerste lid en artikel
      11.97.2.    Vaststellen van de Huisvestingsverordening op grond van de Huisvestingswet,
      zoals deze van tijd tot tijd luidt, waarin regels worden opgesteld over:a. Huisvestingsvergunningplicht
      (koopwoningen uitgezonderd);b. Indeling in urgentiecategorieën;c. Wijze van
      bekendmaken van het aanbod van de aangewezen categorieën woonruimte die bestemd
      zijn voor verhuur;d. Bestuursrechtelijke handhaving en toezicht alleen voor
      de bevoegdheden die in deze Regeling zijn overgedragen en die in de Huisvestingsverordening
      zijn bepaald.3.    Op grond van de Huisvestingswet verlenen, weigeren en intrekken
      van een huisvestingsvergunning.4.    Op grond van de Huisvestingswet beslissen
      over de indeling van woningzoekenden in de urgentiecategorieën.5.    De inkoop
      en aanbesteding van een Collectief Vraagafhankelijk Vervoerssysteem (CVV), alsmede
      het contractbeheer met de gecontracteerde aanbieder.6.    Het in co-creatie
      met Deelnemende gemeenten opstellen, periodiek actualiseren van een Regionale
      Investeringsagenda Holland Rijnland (RIA) alsmede het realiseren van de RIA
      met inachtneming van de beheersverordening RIA.7.    Ten behoeve van de thema’s
      mobiliteit, economie, duurzaamheid, energie, groen, wonen en ruimte voert Holland
      Rijnland de volgende taken uit:a. Uitvoeren van strategische toekomstverkenningen
      en projecten, het ontwikkelen van regionaal beleid en het monitoren van gemaakte
      afspraken.b. Opstellen, vaststellen, periodiek actualiseren, coördineren van-
      en het (laten) uitvoeren van visies, beleidsplannen en programma’s ten behoeve
      van regionale ontwikkeling.c. Opstellen en periodiek actualiseren van een bedrijventerreinenstrategie,
      kantorenstrategie en kantorenmonitor.d. Opstellen, vaststellen en periodiek
      actualiseren van een regionale woonagenda en een contingent Regeling voor bijzondere
      doelgroepen.e. Opstellen en periodiek actualiseren van een regionaal woningbouwprogramma.f.
      Procesbegeleiding, actualiseren en, op verzoek van de deelnemende gemeente(n),
      uitvoeren van programma’s en projecten.8. Het opstellen en vaststellen van een
      Algemene subsidieverordening met in achtneming van het bepaalde in titel 4.2
      van de Algemene wet Bestuursrecht.9. Het beheren van fondsen en subsidies, namelijk:a.
      het instellen en beheren van een Regionaal Investeringsfonds ‘RIF’;b. het met
      inachtneming van hetgeen is bepaald in de Beheersverordening regionale investeringsagenda
      Holland Rijnland 2025 instellen en beheren van een fonds ten behoeve van de
      RIA;c. het aanvragen, verlenen en ontvangen van subsidies, waaronder begrepen
      het coördineren van subsidieaanvragen voor zover deze subsidies betrekking hebben
      op de taken en bevoegdheden zoals deze in dit artikel zijn opgenomen;d. door
      het Algemeen Bestuur in de toekomst in te stellen fondsen en subsidies.
