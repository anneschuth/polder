gr_meta:
  citeertitel: Gemeenschappelijke regeling Regio Holland Rijnland
  doel: '1. Holland Rijnland heeft tot doel vanuit de gedachte van verlengd lokaal
    bestuur om, met inachtneming van wat verder in de Regeling is bepaald, de gemeenschappelijke
    belangen van de Deelnemende gemeenten te behartigen en de samenwerking tussen
    de Deelnemende gemeenten in Holland Rijnland te stimuleren en te faciliteren door:a.    Het
    regionaal organiseren van afstemming, besluitvorming over- en het gezamenlijk
    uitvoeren van regionale strategische vraagstukken;b.    Het opzetten en uitvoeren
    van projecten en beleid;c.    Een efficiënte en effectieve uitvoering van de Leerplichtwet,
    doorstroompuntwetgeving, de Huisvestingswet en het Collectief Vraagafhankelijk
    Vervoer (‘CVV’).2. De in het eerste lid genoemde belangenbehartiging omvat, met
    erkenning van de eigen bevoegdheden van de besturen van de Deelnemende gemeenten,
    het gevraagd of ongevraagd adviseren over aangelegenheden op het gebied van ruimtelijke
    en economische aangelegenheden en waarvan redelijkerwijs kan worden aangenomen,
    dat zij voor de intergemeentelijke verhoudingen en regionale ontwikkelingen van
    wezenlijk belang zijn. Hierbij wordt onderscheid gemaakt in:a.    Richtinggevende
    advisering: waarin op regionaal niveau door het Algemeen Bestuur een eenduidige
    beleidslijn, visie of verordening wordt vastgesteld voor taken zoals genoemd in
    artikel 5.b.    Bestuurlijk platform: het bieden van een Bestuurlijk platform
    binnen de taakomschrijving als bedoeld in artikel 5, voor onderlinge afstemming
    tussen de Colleges.c.    Efficiency: indien aannemelijk, is dat door de gezamenlijke
    uitvoering van een aan de afzonderlijke Deelnemende gemeenten opgedragen taak
    een goedkoper en/of beter product kan worden geleverd.'
