gr_meta:
  citeertitel: Gemeenschappelijke Regeling voor Veilig Thuis Groningen
  doel: De gemeenschappelijke regeling is aangegaan met de volgende doelen:a. de samenwerking
    verankeren tussen de colleges van de gemeenten bij de zorg voor één Veilig Thuis;b.
    de taken en bevoegdheden van de gemeenten vanuit de Wmo 2015, de Jeugdwet en het
    terrein van veiligheid en openbare orde ten aanzien van Veilig Thuis door mandaat
    en volmacht op te dragen aan het college van de Centrumgemeente;c. de samenwerking
    tussen de deelnemers bevorderen door actief informeren en communiceren;d. afstemming
    tussen de deelnemers over de opdracht aan Veilig Thuis;e. de beheersing van de
    middelen en eventuele besparingen of aanvullende kosten en de verevening van risico’s
    tussen de deelnemers.
