  bevoegdheden:
  - kop_artikel: Artikel 5. Mandaat
    inhoud_artikel: 1. Aan het college van de Centrumgemeente wordt door de colleges
      van de Gemeenten mandaat dan wel machtiging of volmacht verleend om namens de
      colleges van de gemeenten, voor zover nodig en voor zover van toepassing, in
      mandaat besluiten te nemen en als ge(vol)machtigde andere (rechts)handelingen
      te verrichten die noodzakelijk zijn ter behartiging van de in artikel 2 gestelde
      doelen en de daartoe opgedragen taken zoals aangegeven in artikel 4, tenzij
      een wettelijk voorschrift of de aard van de bevoegdheid zich hiertegen verzet.
      Onder het mandaat valt in ieder geval het nemen van subsidiebesluiten ten behoeve
      van Veilig Thuis in de ruimste zin des woords en het nemen van besluiten op
      eventuele bezwaarschriften en het voeren van (van verweer in) beroepsprocedures.2.
      Het college van de Centrumgemeente is bevoegd aan de medewerkers van de Centrumgemeente
      een of meerdere ondermandaten, en voor zover van toepassing, ondermachtigingen
      of ondervolmachten, te verlenen voor de volgende bevoegdheden:a. subsidieverlening
      en -vaststelling aan Veilig Thuis;b. het beheer van de projectkosten (incidentele
      restmiddelen);c. het besluiten op bezwaar en het voeren van (verweer in) beroepsprocedures.3.
      Het college van de Centrumgemeente kan het in het eerste lid bedoelde mandaat
      in ondermandaat geven aan de portefeuillehouder jeugd van de Centrumgemeente.
      Van dit ondermandaat kan uitsluitend in spoedeisende gevallen gebruik worden
      gemaakt.4. Een college van de deelnemende gemeente kan aan het college van de
      Centrumgemeente mandaat dan wel machtiging of volmacht verlenen voor het uitvoeren
      van bovenwettelijke taken als bedoeld in artikel 4, vierde lid.5. De colleges
      van de gemeenten kunnen de in deze Regeling verleende mandaten, machtigingen
      en volmachten alleen intrekken onder de voorwaarde dat zij de activiteiten op
      het gebied van huiselijk geweld en kindermishandeling gedurende 12 maanden na
      intrekking, bij Veilig Thuis blijven onderbrengen. Bij intrekking van het mandaat,
      machtiging of volmacht voor bovenwettelijke taken, geldt een termijn van 6 maanden.6.
      In het geval dat het intrekken van het mandaat, machtiging of volmacht bedoeld
      in de vorige leden, voor de Centrumgemeente frictiekosten met zich meebrengt,
      komen die kosten voor rekening van de gemeente die het mandaat, de machtiging
      of de volmacht heeft ingetrokken.
