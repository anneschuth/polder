description:
  text: 'Omgevingsdienst IJsselland is een gemeenschappelijke regeling van 11 gemeenten
    en provincie Overijssel. Waarom wij ons dagelijks inzetten voor een duurzame leefomgeving,
    vertellen we graag in onze motivatie.Organisatie Omgevingsdienst IJssellandAlgemeen
    bestuurHet algemeen bestuur van Omgevingsdienst IJsselland wordt gevormd door
    de portefeuillehouders Milieu van de elf gemeenten en de provincie Overijssel.
    Het algemeen bestuur komt vier keer per jaar bij elkaar. De vergaderstukken van
    algemeen bestuursvergaderingen kunt u opvragen via een mail naar info@odijsselland.nl.Dagelijks
    bestuurHet dagelijks bestuur is gekozen uit het algemeen bestuur.• Voorzitter:
    M.W. OffingaManagementteamDe directeur en de teammanagers van de teams Advies,
    Vergunningen, Toezicht & Handhaving en Staf vormen samen het managementteam.Branche;
    Diensten overheidsrelatiesBedrijfsgrootte; 51 - 200 medewerkersHoofdkantoor;  Zwolle,
    OverijsselOpgericht;  2018SpecialismenKennisinstituut, Toezicht, Handhaving, Vergunningverlening,
    Advies, Veiligheid, Luchtkwaliteit, Geluidsbelasting, Bodemkwaliteit, Afval, Asbest,
    Milieuzonering, Energie en duurzaamheid, Groen en ecologie, Vestigingsklimaat
    en Leefomgeving'
  url: https://www.odijsselland.nl/over-onze-organisatie/
