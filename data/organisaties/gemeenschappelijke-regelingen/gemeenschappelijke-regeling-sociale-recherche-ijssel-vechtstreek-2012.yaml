  bevoegdheden:
  - kop_artikel: Artikel 2
    inhoud_artikel: 1. Het doel van deze regeling is het inrichten van een samenwerkingsverband
      met betrekking tot het voorkomen van en de opsporing van fraude met de door
      de gemeenten uit te voeren sociale zekerheidsregelingen.2. De gemeenten dragen
      hiertoe de uitoefening van hun bevoegdheden in het kader van de opsporing of
      voorkomen van fraude met de door de gemeenten uit te voeren sociale zekerheidsregelingen
      over aan de gemeente Zwolle.
