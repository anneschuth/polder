description:
  text: Meerinzicht is de samenwerking van de gemeenten Ermelo, Harderwijk en Zeewolde.
    De 3 gemeenten werken samen in het sociaal domein en op het gebied van bedrijfsvoering.De
    3 gemeenten werken binnen Meerinzicht samen op het gebied van zorg, werk en inkomen,
    jeugdhulp en leerlingzaken en op het gebied van belastingen, financiën, HRM, communicatie,
    informatisering en automatisering, facilitaire dienstverlening, gebouwenbeheer,
    juridische zaken, en geo-informatie.
  url: https://www.meerinzicht.nl/over-meerinzicht
