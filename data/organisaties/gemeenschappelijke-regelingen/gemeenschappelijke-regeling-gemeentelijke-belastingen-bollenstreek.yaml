gr_meta:
  citeertitel: Gemeenschappelijke Regeling Gemeentelijke Belastingen Bollenstreek
  doel: 1. De regeling wordt getroffen ter behartiging van het belang van een kwalitatief
    goede endoelmatige uitvoering van de taken van de gemeenten op het gebied van
    het herwaarderen in hetkader van de Wet waardering onroerende zaken, het heffen
    en invorderen en kwijtschelden vanaanslagen gemeentelijke belastingen en het afhandelen
    van bezwaar- en beroepschriften.2. De behartiging van het in het eerste lid omschreven
    doel wordt opgedragen aan de gemeenteNoordwijk, die in deze als centrumgemeente
    fungeert.3. De deelnemers sluiten een dienstverleningsovereenkomst af om het in
    het eerste lid, gesteldedoel te realiseren.
  samenwerkingsvorm:
    value: '''Regeling zonder meer'''
    afkorting: RZM
