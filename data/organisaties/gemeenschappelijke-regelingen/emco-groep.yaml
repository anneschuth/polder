description:
  text: De EMCO-groep is hét werkleerbedrijf van de regio Zuidoost Drenthe, met ruim
    1500 medewerkers. Voor de gemeenten Emmen, Coevorden en een gedeelte van de gemeente
    Borger-Odoorn voeren wij delen van de Participatiewet uit.Voor alle doelgroepen
    met een afstand tot de arbeidsmarkt verzorgen wij een pasklare oplossing.Leren
    en werken op een werkplek, is onze insteek. Door het laten opdoen van werkervaring
    en door scholing en training verkleinen wij hun afstand tot de arbeidsmarkt.
