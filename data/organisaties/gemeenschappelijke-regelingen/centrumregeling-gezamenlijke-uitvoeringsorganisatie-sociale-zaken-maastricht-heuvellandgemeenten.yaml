  citeertitel: Centrumregeling gezamenlijke uitvoeringsorganisatie Sociale Zaken Maastricht
    - Heuvellandgemeenten
  doel: 1. Het belang van deze regeling is vorm te geven aan de samenwerking tussen
    de centrumgemeente en partnergemeenten op het terrein van de Participatiewet en
    de daarmee samenhangende wetten en uitvoeringsregelingen op het gebied van inkomens-
    en bijstandsvoorzieningen.2. Deze regeling heeft als doel te zorgen voor een democratische,
    gelijkwaardige, kwalitatief hoogwaardige, effectieve en efficiënte uitvoering
    van de in het vorige lid genoemde wetten en uitvoeringsregelingen voor de burgers
    en de betrokken gemeentelijke bestuursorganen.
