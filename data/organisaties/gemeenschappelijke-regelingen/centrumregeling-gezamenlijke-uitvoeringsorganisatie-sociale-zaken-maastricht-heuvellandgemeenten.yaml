  bevoegdheden:
  - kop_artikel: Artikel 5 Bevoegdheden
    inhoud_artikel: 1. Voor de uitvoering van de in het voorgaande artikel genoemde
      taken mandateren de colleges van de partnergemeenten hun daarop betrekking hebbende
      bevoegdheden aan het college van de centrumgemeente.2. Het college van de centrumgemeente
      kan in de in het vorige lid genoemde mandatering gemachtigd worden om mandaat
      te verlenen aan medewerkers die onder hun gezag werkzaam zijn.3. De door de
      colleges van de partnergemeenten verstrekte mandaten worden in elke gemeente
      opgenomen in het mandaatregister. De colleges van de partnergemeenten dragen
      daarbij tevens zorg voor de bekendmaking van de verstrekte mandaten, zoals vereist
      Afdeling 3.6 van de Algemene wet bestuursrecht.4. Het bepaalde in de vorige
      leden van dit artikel is van overeenkomstige toepassing op het verlenen van
      volmachten tot het verrichten van privaatrechtelijke rechtshandelingen door
      het college van de centrumgemeente.5. Het college van de centrumgemeente houdt
      een register bij van de aan hem verleende mandaten en volmachten. Daarin worden
      ook de ondermandaten en sub-volmachten opgenomen.6. In geval van verlening van
      ondermandaten dan wel sub-volmachten zorgt het college van de centrumgemeente
      voor de bekendmaking daarvan zoals bepaald in Afdeling 3.6 Algemene wet van
      het bestuursrecht.
