gr_meta:
  citeertitel: Gemeenschappelijke Regeling Omgevingsdienst IJsselland
  doel: Het openbaar lichaam is ingesteld ter behartiging van de individuele en gezamenlijke
    belangen van de deelnemers op het gebied van de fysieke leefomgeving en ziet op
    de vergunningverlening, het toezicht op de naleving en de handhaving van de voorschriften
    zoals opgenomen in de relevante regelgeving, voor zover de bevoegdheid daartoe
    de deelnemer toekomt en voor zover deze aan de Omgevingsdienst IJsselland is gemandateerd.
