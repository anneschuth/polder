  bevoegdheden:
  - kop_artikel: Artikel 4 Bevoegdheden
    inhoud_artikel: 1. Ter behartiging van de in artikel 3 genoemde belangen dragen
      de deelnemers aan Cocensus de bevoegdheden over, welke benodigd zijn voor de
      uitvoering van de werkzaamheden met betrekking tot:a. de heffing en de invordering
      van de gemeentelijke belastingen, heffingen en rechten als genoemd in bijlage
      1;b. de uitvoering van kwijtschelding voor de gemeentelijke belastingen, heffingen
      en rechten als genoemd in bijlage 1, dit inclusief de behandeling van administratief
      beroep;c. de uitvoering van de Wet waardering onroerende zaken, waaronder tevens
      wordt begrepen de administratie van vastgoedgegevens en het verstrekken van
      vastgoedgegevens aan de deelnemers en derden;d. de behandeling van bezwaar,
      beroep, hoger beroep en beroep in cassatie voorvloeiende uit de werkzaamheden
      genoemd bij de onderdelen 1a. en 1b.2. De vertegenwoordigende organen van de
      deelnemers geven elkaar wederzijdse toestemming om de bevoegdheid tot de heffing
      en de invordering en tot kwijtschelding van andere belastingen, heffingen en
      rechten dan bedoeld in het eerste lid, onderdelen a en b, over te dragen aan
      Cocensus. Het dagelijks bestuur neemt de bevoegdheden als bedoeld in de vorige
      volzin op in bijlage 1 bij deze regeling en zendt deze aan de deelnemers en
      Gedeputeerde Staten.3. Aan Cocensus worden geen verordenende bevoegdheden toegekend.4.
      De deelnemers dragen in dit kader het beheer van de archieven die ontstaan vanuit
      de primaire processen aan Cocensus op. Het dagelijks bestuur kan na advies van
      de archivaris van Cocensus, ten aanzien van deze archieven besluiten tot vervanging
      en vernietiging.5. De werkzaamheden worden per deelnemer nader geduid in een
      dienstverleningsovereenkomst.
