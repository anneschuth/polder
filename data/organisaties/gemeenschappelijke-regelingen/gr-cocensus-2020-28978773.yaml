gr_meta:
  citeertitel: GR Cocensus 2020
  doel: 1. De regeling wordt getroffen in het belang van een zo doelmatig mogelijk
    beheer en uitvoering van werkzaamheden met betrekking tot:a. de heffing en de
    invordering van gemeentelijke belastingen, heffingen en rechten;b. de uitvoering
    van de Wet waardering onroerende zaken, waaronder tevens wordt begrepen de administratie
    van vastgoedgegevens en het verstrekken van vastgoedgegevens aan de deelnemers
    en derden;c. de behandeling van bezwaar, beroep, hoger beroep en beroep in cassatie
    voorvloeiende uit de bij de onderdelen 1a. en 1b. genoemde werkzaamheden;d. de
    uitvoering van de kwijtschelding inclusief de behandeling van administratief beroep.2.
    Cocensus kan de deelnemers adviseren omtrent de voorbereiding en opstelling van
    belastingbeleid en belastingverordeningen.
