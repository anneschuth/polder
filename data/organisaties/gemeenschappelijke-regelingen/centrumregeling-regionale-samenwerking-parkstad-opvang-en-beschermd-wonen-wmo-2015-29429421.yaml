  doel: De regeling heeft tot doel door middel van samenwerking een adequate uitvoering
    van taken en uitoefening van bevoegdheden van partijen op grond van de Wet maatschappelijke
    ondersteuning te realiseren, in het bijzonder met betrekking tot de gemeentelijke
    verplichting om te voorzien in de behoefte aan beschermd wonen en opvang, zoals
    vastgelegd in artikel 1.2.1, onder b en c, van de Wmo 2015.
