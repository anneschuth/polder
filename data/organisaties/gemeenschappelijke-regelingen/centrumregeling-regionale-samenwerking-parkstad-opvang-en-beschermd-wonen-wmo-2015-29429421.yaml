  bevoegdheden:
  - kop_artikel: Artikel 3 Bevoegdheden
    inhoud_artikel: 1. De colleges van Brunssum, Kerkrade, Landgraaf, Nuth, Onderbanken,
      Simpelveld en Voerendaal verlenen het college van Heerlen mandaat om te beslissen
      op aanvragen om een maatwerkvoorziening dan wel een persoonsgebonden budget
      ten behoeve van opvang of beschermd wonen.2. Onder het in het vorige lid bedoelde
      mandaat is mede begrepen het na heroverweging in bezwaar beslissen op een aanvraag
      als bedoeld in dat lid, alsmede het voeren van verweer in beroep en hoger beroep
      ten overstaan van de administratieve rechter.3. De colleges van Brunssum, Kerkrade,
      Landgraaf, Nuth, Onderbanken, Simpelveld en Voerendaal machtigen voorts het
      college van Heerlen om alle andere handelingen te verrichten zoals beschreven
      in de Wmo 2015, in relatie tot een melding van een behoefte aan maatschappelijke
      ondersteuning, voor zover deze handelingen betrekking hebben op (het onderzoek
      naar) de behoefte aan opvang of beschermd wonen.4. Ter zake de uitoefening van
      de in de vorige leden opgedragen bevoegdheden en taken geldt het recht van ondermandaat
      respectievelijk substitutie.
