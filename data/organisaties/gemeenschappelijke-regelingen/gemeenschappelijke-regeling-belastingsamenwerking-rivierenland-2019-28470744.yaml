  bevoegdheden:
  - kop_artikel: Artikel 4 Behartigde belangen
    inhoud_artikel: 1. In het kader van deze gemeenschappelijke regeling worden de
      belangen van de deelnemers, elk voor zover het hun grondgebied en hun belangen
      betreft, behartigd op het gebied van:a. de heffing en de invordering van de
      door de deelnemer aan BSR overgedragen belastingen;b. de uitvoering van de Wet
      waardering onroerende zaken (Wet WOZ) waaronder tevens wordt begrepen de administratie
      van vastgoedgegevens en het verstrekken van vastgoedgegevens aan de deelnemers
      en derden;c. de uitvoering van de Wet kenbaarheid publiekrechtelijke beperkingen
      onroerende zaken.d. de inrichting en/of het beheer van de door de deelnemer
      aan BSR overgedragen andere basisregistraties;2. Bij deze regeling is een bijlage
      gevoegd met daarop een overzicht van de taken die door de deelnemers aan BSR
      zijn overgedragen als genoemd in het eerste lid.3. Het college van burgemeester
      en wethouders onderscheidenlijk het dagelijks bestuur van een deelnemer kan
      taken als bedoeld in het eerste lid, voor zover die niet reeds zijn overgedragen,
      aan BSR overdragen. De deelnemers verlenen elkaar automatisch wederzijdse toestemming
      voor deze overdracht. Het college van burgemeester en wethouders onderscheidenlijk
      het dagelijks bestuur van een deelnemer dient een verzoek tot overdracht van
      de betreffende taak in bij het algemeen bestuur. Een overdracht van taken behoeft
      de instemming bij unaniem besluit van het algemeen bestuur. Na instemming van
      het algemeen bestuur draagt het college van burgemeester en wethouders onderscheidenlijk
      het dagelijks bestuur van de betreffende deelnemer door middel van een delegatiebesluit
      de taak over.4. Het algemeen bestuur is bevoegd om op verzoek van een deelnemer
      de uitvoering van taken terug te leggen bij de deelnemer, met dien verstande
      dat hierbij een opzegtermijn van één jaar in acht wordt genomen en deze bepaling
      niet geldt in geval van een wens tot uittreding van een deelnemer conform artikel
      37 van de regeling.5. Het algemeen bestuur bepaalt de voorwaarden waaronder
      taken worden overgedragen of teruggelegd.6. Het dagelijks bestuur past bij overdracht
      of teruglegging de bijlage als bedoeld in het tweede lid aan, zendt deze bijlage
      aan de deelnemers, en draagt ervoor zorg dat het college van burgemeester en
      wethouders van de gemeente Tiel de bijlage zendt aan gedeputeerde staten van
      de provincies waarin de deelnemers zijn gelegen, en dat dit college de bijlage
      bekendmaakt door kennisgeving van de inhoud daarvan in de Staatscourant.
  - kop_artikel: Artikel 5 Overdracht bevoegdheden
    inhoud_artikel: 1. BSR en het bestuur van BSR als bedoeld in de artikelen 3 en
      24 van deze gemeenschappelijke regeling komen de bevoegdheden toe die in deze
      regeling aan BSR en het bestuur van BSR zijn toegekend.2. Aan BSR worden geen
      verordenende bevoegdheden toegekend.
