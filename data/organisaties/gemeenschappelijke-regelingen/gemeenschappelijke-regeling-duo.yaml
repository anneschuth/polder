gr_meta:
  citeertitel: Gemeenschappelijke regeling Duo+
  doel: De regeling wordt getroffen ter uitvoering van beleid en van ondersteunende
    bedrijfsprocessen van de deelnemers alsmede de sturing en toetsing daarvan. Zulks
    om vanuit bestuurlijke autonomie en beleidsvrijheid van de deelnemers gestalte
    te geven aan een toekomstbestendige, kwalitatief hoogwaardige en doelmatige uitvoering
    van de door de deelnemers opgedragen taken.
