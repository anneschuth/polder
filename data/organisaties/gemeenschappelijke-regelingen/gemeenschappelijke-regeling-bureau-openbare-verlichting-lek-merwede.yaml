gr_meta:
  citeertitel: Gemeenschappelijke Regeling Bureau Openbare Verlichting Lek-Merwede
  doel: Het Bestuur van het Bureau Openbare Verlichting behartigt de gemeenschappelijke
    en afzonderlijke belangen van de gemeenten op het gebied van het beheren en in
    stand houden van de openbare verlichting van de gemeenten. Het draagt zorg voor
    een zo doelmatig mogelijke uitvoering van taken en uitoefening van bevoegdheden
    op het voornoemde terrein.
