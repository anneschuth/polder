  bevoegdheden:
  - kop_artikel: Artikel 4
    inhoud_artikel: 1. De Colleges dragen ter uitvoering van de in artikel 3, eerste
      en tweede lid genoemde belangen en taken en de daarmee samenhangende wetten,
      regelingen en praktijkrichtlijnen, hun daarmee verband houdende bevoegdheden
      die zij als wegbeheerder hebben op grond van de Wegenwet, en hun daarmee verband
      houdende bevoegdheden krachtens artikel 160 lid 1 onder a, b, e en f Gemeentewet,
      - mede ter voorkoming van aansprakelijkheid op grond van het Burgerlijk Wetboek
      - over aan het Bestuur van het Bureau Openbare Verlichting Lek-Merwede2. Na
      besluitvorming ten aanzien van de in artikel 3, vijfde lid genoemde belangen
      en taken dragen de Colleges de in het eerste lid genoemde bevoegdheden eveneens
      over aan het Bestuur van het Bureau Openbare Verlichting Lek-Merwede.
