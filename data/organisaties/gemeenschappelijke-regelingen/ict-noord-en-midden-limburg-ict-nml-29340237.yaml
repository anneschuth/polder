gr_meta:
  citeertitel: ICT Noord- en Midden-Limburg (ICT NML)
  doel: De regeling heeft tot doel:a) Het ten dienste van de deelnemers verzorgen
    en ondersteunen van voorzieningen op het gebied van informatie- en communicatietechnologie
    en het creëren van de voorwaarden voor een efficiënte bedrijfsvoering en een efficiënte
    en klantgerichte dienstverlening, en;b) Het ten dienste van de deelnemers verzorgen
    en veilig distribueren van actuele, betrouwbare en complete informatie op het
    gebied van geo-informatie en het creëren van de voorwaarden voor een efficiënte
    bedrijfsvoering voor nu en in de toekomst.
