gr_meta:
  citeertitel: Gemeenschappelijke Regeling Bedrijfsvoeringsorganisatie Valleihopper
  doel: De regeling is getroffen voor gemeenschappelijke behartiging van de belangen
    van de deelnemers in het kader van de uitvoering van hun bedrijfsvoeringstaken
    betreffende het Vraagafhankelijk vervoer en ook het OV-vangnet voor de Utrechtse
    gemeenten. De doelstelling is om te voldoen aan de door Gedeputeerde Staten gestelde
    kaders en gezamenlijke voordelen te realiseren door:a. de kosten beter te beheersen;b.
    de kwaliteit van de dienstverlening te verhogen;c. de kwetsbaarheid van ondersteuning
    te verminderen;d. de regionale samenwerking te verbeteren;
