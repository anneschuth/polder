  bevoegdheden:
  - kop_artikel: Artikel 6 Bevoegdheidstoekenning
    inhoud_artikel: 1. De bevoegdheden nodig voor de uitvoering van de aan ICT-samenwerking
      West-Brabant West opgedragen taken worden door de Colleges bij afzonderlijke
      mandaatbesluiten aan het Bestuur toegekend.2. De mandaatbesluiten als bedoeld
      in het eerste lid worden periodiek, in ieder geval gelijktijdig met het sluiten
      van de Dienstverleningsovereenkomsten, bedoeld in artikel 5, derde lid, geactualiseerd.3.
      Binnen de aan het Bestuur overeenkomstig het eerste lid toegekende mandaten
      legt het Bestuur vast welke mandaten in ondermandaat worden opgedragen aan de
      Directeur voor zover ondermandaat is toegestaan.
