gr_meta:
  citeertitel: Gemeenschappelijke regeling GGD Noord- en Oost-Gelderland
  doel: 'De GGD biedt actief ''Een gezond houvast'' en bewaakt, beschermt en bevordert
    de gezondheid van de inwoners.Onze GGD is werkzaam voor zowel de hele samenleving
    in Noord- en Oost-Gelderland, afzonderlijke gemeenten of gedeelten daarvan zoals
    buurten of scholen. Wij doen dit namens de gemeenten. Hierbij nemen we geen verantwoordelijkheden
    over, maar signaleren actief, verbinden, geven richting en zo nodig praktische
    ondersteuning om lokale aanpak te realiseren.Wij zetten de gezondheid van de inwoners
    centraal. Dat geldt zowel voor acute situaties (crisissen en incidenten) als voor
    de langere termijn waar preventie een rol speelt. GGD''ers nemen de visie op Positieve
    Gezondheid als basis voor het handelen: "Gezondheid is het vermogen zich aan te
    passen en eigen regie te voeren, in het licht van de fysieke, emotionele en sociale
    uitdagingen van het leven." Dit vanuit het vertrouwen dat ieder van ons een actieve
    bijdrage kan leveren aan de gezonde toekomst van onze gemeenschap. Door het opbouwen
    en onderhouden van betekenisvolle samenwerkingsrelaties werken GGD''ers samen
    met vele partijen aan de gezondheid van de burgers van Noord- en Oost-Gelderland.'
