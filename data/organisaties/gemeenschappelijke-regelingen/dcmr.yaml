  abbr: DCMR
  valid_from: '1900-01-01'
description:
  text: DCMR Milieudienst Rijnmond is de gezamenlijke omgevingsdienst van de provincie
    Zuid-Holland en dertien gemeenten in de regio Rijnmond. DCMR zet zich in voor
    een gezonde, veilige en duurzame leefomgeving voor de 1,2 miljoen inwoners van
    de Rijnmondregio. We verlenen milieuvergunningen aan bedrijven en controleren
    op de naleving van geldende milieuregels en andere wet- en regelgeving. Daarnaast
    geeft DCMR adviezen aan overheden over ruimtelijke plannen met als doel een toekomstbestendig
    gebruik van de fysieke leefomgeving.
  url: https://www.dcmr.nl/over-dcmr/organisatie
