gr_meta:
  citeertitel: Samenwerkingsregeling Regio Achterhoek
  doel: Regio Achterhoek heeft tot doel het behartigen van de gemeenschappelijke belangen
    van de gemeenten op het gebied van:- lobby;- subsidies;- grensoverschrijdende
    samenwerking;- economische ontwikkeling en arbeidsmarkt;- mobiliteit;- ruimtelijke
    ontwikkeling en volkshuisvesting;- leefbaarheid en voorzieningen;- zorg en welzijn;-
    jeugd en onderwijs;- cultuur;- recreatie en toerisme;- milieu en afval;- natuur;zulks
    met in achtneming van hetgeen in deze regeling nader is bepaald met betrekking
    tot de taken en bevoegdheden van de Regio Achterhoek.
