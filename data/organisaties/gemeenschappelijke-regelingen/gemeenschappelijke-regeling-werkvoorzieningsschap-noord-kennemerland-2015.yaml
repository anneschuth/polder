  bevoegdheden:
  - inhoud_artikel: 1. Ter uitvoering van het in artikel 3 lid 1 en lid 2 van de regeling
      genoemde doel en belang dragen de colleges aan het bestuur alle bevoegdheden
      en verplichtingen over met betrekking tot de uitvoering van de Wet.2. De uitvoering
      bedoeld in het eerste lid heeft in ieder geval betrekking op:a. het in dienst
      nemen/houden van personen, die op grond van de Wet daarvoor in aanmerking komen,
      voor zover voor die personen passende arbeid beschikbaar is;b. het actief begeleiden
      van personen met een arbeidsbeperking naar werk bij een reguliere werkgever;c.
      het oprichten en/of in stand houden van één of meer werkverbanden;d. Het oprichten
      van één of meer private ondernemingen, alsmede het deelnemen in private ondernemingen;e.
      het op basis van een daartoe af te sluiten dienstverleningsovereenkomst uitvoeren
      van andere taken ten behoeve van (één van) de gemeenten dan alleen de Wet;f.
      het verlenen van diensten aan derden op basis van een daartoe met een dergelijke
      organisatie af te sluiten dienstverleningsovereenkomst.3. Het bestuur van het
      schap kan publieke taken mandateren aan de uitvoeringsorganisatie als bedoeld
      in artikel 1, lid 1, onder n van de regeling.
