    2015
  doel: 1. Het Schap heeft tot doel in haar rechtsgebied de Wet uit te voeren;2. Het
    Schap behartigt, met inachtneming van hetgeen hierover in de regeling is bepaald,
    de belangen van de gemeenten gezamenlijk en ieder afzonderlijk met betrekking
    tot de uitvoering van de Wet en richt zich op het behoud, herstel en bevorderen
    van arbeidsbekwaamheid, alsmede het in dienst nemen van c.q. (bevorderen van)
    uitstroom naar arbeidsplaatsen bij andere werkgevers van personen met een arbeidsbeperking.
