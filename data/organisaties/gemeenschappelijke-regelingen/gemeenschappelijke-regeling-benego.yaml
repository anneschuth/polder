  bevoegdheden:
  - kop_artikel: Artikel 4
    inhoud_artikel: "3.Ter realisatie van zijn dol en ter uitoefening van de hem in\
      \ lid twee opgedragen taken, heeft het openbaar lichaam de volgende bevoegdheden:-\t\
      Het instellen van werkgroepen-\tHet instellen of bevorderen van onderzoeken-\t\
      Het uitbrengen van adviezen-\tHet geven van voorlichting omtrent de doelstellingen\
      \ en de activiteiten van het samenwerkingsverband-\tHet formuleren van samenwerkingsvoorstellen\
      \ inzake alle onder de gemeentelijke bevoegdheid ressorterende aangelegenheden.4.De\
      \ deelnemende gemeenten verbinden zich ertoe, binnen de grenzen van de hun krachtens\
      \ hun interne recht toekomende bevoegdheden, door passende uitvoeringsmaatregelen,\
      \ het openbaar lichaam medewerking te verlenen bij vervulling van zijn doelstelling\
      \ en taken."
  - kop_artikel: Artikel 5
    inhoud_artikel: 1.Onverminderd het bepaalde in artikel vier, tweede lid, derde
      streepje, kan het openbaar lichaam, voor zover dit noodzakelijk is om zijn doel
      te realiseren, de deelnemende gemeenten verzoeken de uitoefening van bepaalde,
      wel omschrijven gemeentelijke bevoegdheden aan het openbaar lichaam toe te vertrouwen.
      De opdracht die het openbaar lichaam namens de deelnemende gemeente zal waarnemen
      is materiaal en in de tijd beperkt tot realisatie van een vooraf welbepaald
      project.2.De deelnemende gemeenten kunnen op hun beurt het openbaar lichaam
      verzoeken bepaalde taken namens deze gemeenten waar te nemen.
