gr_meta:
  citeertitel: Gemeenschappelijke regeling Gemeentelijke Gezondheidsdienst Amsterdam-Amstelland
  doel: "Het lichaam behartigt de belangen van de deelnemers op het terrein van:a.\t\
    het beschermen en bevorderen van de gezondheid van de bevolking of van specifieke\
    \ groepen daarbinnen, in het rechtsgebied van het lichaam;b.\thet voorkomen en\
    \ het vroegtijdig opsporen van ziekten onder de bevolking;c.\thet bevorderen van\
    \ de openbare geestelijke gezondheidszorg;d.\thet zorg dragen voor een Advies\
    \ en Meldpunt Huiselijk geweld en Kindermishandeling; met als doel onder andere:•\t\
    De duur, de ernst en de kans op herhaling van huiselijk geweld en kindermishandeling\
    \ in afzonderlijke gezinnen/families doen afnemen;•\tMeer kinderen geweldloos\
    \ kunnen laten opgroeien;e.\thet zorgdragen voor het Centrum Seksueel Geweld (CSG)\
    \ met als doel onder andere de versterking van de hulpverlening aan slachtoffers\
    \ van seksueel geweld in de regio, en alles wat met het bovenstaande onder a tot\
    \ en met e in de ruimste zin verband houdt."
