description:
  text: MissieWij dragen bij aan het bereiken en in stand houden van een veilige en
    duurzame fysieke leefomgeving en een goede omgevingskwaliteit binnen ons werkgebied.
    Daarbinnen inspireren wij burgers en bedrijven tot het nemen van eigen verantwoordelijkheid.
    Het resultaat is een landelijk vooruitstrevende en toekomstbestendige voorbeeldorganisatie
    waar partners met vertrouwen mee samenwerken.VisieWij werken, als onderdeel van
    het openbaar bestuur, samen met burgers, bedrijven en overheden aan een evenwichtige
    en duurzame ontwikkeling van onze leefomgeving. Naast vergunningverlening, toezicht
    en handhaving bij bedrijven, adviseren wij over de verschillende aspecten van
    de fysieke leefomgeving en duurzaamheid binnen het ruimtelijke domein.In de uitvoering
    van onze taken vervullen wij een proactieve, regisserende en vooral verbindende
    rol. Als procesregisseur met kennis van zowel inhoud als uitvoering bevorderen
    wij een integrale aanpak binnen het ruimtelijk domein en koppelen wij de juiste
    partijen aan elkaar. Daarbij is kwalitatieve en adequate dienstverlening leidend.Initiatieven
    van burgers en bedrijven vragen van ons een open houding, gericht op wederzijds
    vertrouwen. Als kennisorgaan anticiperen wij hierop en faciliteren met een helder
    inzicht in het speelveld, binnen de kaders van de wet- en regelgeving.Via deze
    werkwijze bouwen wij, namens onze gemeenten en provincie, elke dag aan een landelijk
    vooruitstrevende en toekomstbestendige voorbeeldorganisatie.
