description:
  text: Reinigingsdienst Waardlanden is een samenwerkingsverband van de gemeenten
    Gorinchem, Hardinxveld-Giessendam, Molenlanden en Vijfheerenlanden. Deze gemeenschappelijke
    regeling verzorgt voor en namens de vier gemeenten de afvalinzameling. De taken
    van de afvalinzameling en verwerking zijn formeel aan Waardlanden overgedragen.
    Waardlanden voert deze taken uit op basis van de vastgestelde afvalstoffenverordeningen
    en gemeentelijk beleid van de deelnemende gemeenten. Het bestuur van Waardlanden
    wordt gevormd door een wethouder uit elk van de vier gemeenten.Naast de  afval-
    en grondstoffeninzameling (nzamelings- en veegroutes) voor de gemeenten Gorinchem,
    Hardinxveld-Giessendam, Molenlanden en Vijfheerenlanden zijn er een aantal milieustraten.
    Tevens rijden er in de regio dagelijks extra servicewagens rond om altijd flexibel
    te kunnen inspringen, zijn er milieucoaches en educaties op scholen  voor hulp
    en tips over minder afval en nog beter scheiden en proberen de toezichthouders
    proberen (ernstige) vervuiling tegen te gaan.
