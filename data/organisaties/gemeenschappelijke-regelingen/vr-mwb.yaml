description:
  text: De ambtelijke hoofstructuur is vastgelegd in het Organisatiebesluit en bestaat
    uit een Algemeen Directeur/Regionaal Commandant en een plaatsvervanger, een sector
    Strategie en Bedrijfsvoering, een sector Risico- en Crisisbeheersing en drie districten
    De Markiezaten, de Baronie en Hart van Brabant. De directieleden vormen samen
    met de sectormanagers, de districtsmanagers en de controller het Managementteam
    van de veiligheidsregio.De ambtelijke hoofdstructuur is uitwerkt en vastgelegd
    in het Organisatieplan.De sector Strategie en Bedrijfsvoering bestaat uit de volgende
    zes afdelingen afdeling Inkoop en Contractmanagement, Financiën, Planning en Control
    (FP&C), Human Resource Management (HRM), Strategie en Ontwikkeling (S&O), Communicatie
    en Informatisering. De afdelingen staan onder leiding van een afdelingshoofd.De
    sector Risico- en Crisisbeheersing bestaat eveneens uit zes afdelingen, drie afdelingen
    gebiedsteams risicobeheersing, een afdeling industriële veiligheid , de afdeling
    Crisisbeheersing en de afdeling Bevolkingszorg. De afdelingen staan onder leiding
    van een afdelingshoofd.Ten behoeve van de brandweerzorg zijn er drie territoriale
    districten. De districten staan onder leiding van een districtsmanager. Ieder
    district heeft een afdelingshoofd brandweerzorg, die verantwoordelijk is voor
    de repressie, vakbekwaamheid, Informatie, Onderzoek en Analyse (IOA) binnen het
    district en een afdelingshoofd Techniek, Facilitair en Logistiek (TFL district).De
    veiligheidsregio kent ook een aantal portefeuilles die wisselend aan een districtsmanager
    worden toegewezen , Techniek, Facilitair en Logistiek (TFL centraal), Operationeel
    Centrum Brandweer (OCB), Vrijwilligheid, Arbeidsomstandigheden (Arbo), Piketorganisatie,
    Incidentbestrijding, Onderzoek en Analyse (IBOA) en Vakbekwaamheid. Voor de ondersteuning
    van de portefeuilles zorgen de zelfstandig afdelingen TFL centraal, OCB, Piketorganisatie,
    IBOA, de afdelingen 'vakbekwaam blijven' en 'vakbekwaam worden en bedrijfsbureau'
    (waaronder ook het oefencentrum Safety Village valt) De portefeuillehouder Vrijwilligheid
    wordt ondersteund door het Bureau Vrijwilligheid. De portefeuille Arbo wordt ondersteunde
    door de afdeling HRM.De veiligheidsregio heeft een zelfstandige eenheid concerncontrol
    en een team programmamanagement dat wordt aangestuurd door de plv Algemeen Directeur/Regionaal
    Commandant.
