  bevoegdheden:
  - kop_artikel: 'Artikel 31: Overdracht bevoegdheden'
    inhoud_artikel: Aan het bestuur van de Omgevingsdienst worden geen bevoegdheden
      overgedragen.
  - kop_artikel: 'Artikel 32: Mandaatverlening'
    inhoud_artikel: 1. De colleges kunnen aan het dagelijks bestuur onderscheidenlijk
      de secretaris mandaat verlenen ter uitvoering van de bevoegdheden van het betreffende
      college, voor zover deze binnen het belang van deze regeling vallen. Onverminderd
      het bepaalde in artikel 10:4 van de Algemene wet bestuursrecht moet de secretaris
      instemmen met de mandaatverlening door het betreffende college.2. Gedeputeerde
      staten van de provincie en de colleges van de gemeenten verplichten zich er
      voor zorg te dragen dat namens hun bestuur ten minste de bevoegdheden noodzakelijk
      voor de uitvoering van het basistakenpakket en de VTH-taken voor BRZO- en RIE4-bedrijven
      aan het dagelijks bestuur onderscheidenlijk de secretaris in mandaat worden
      opgedragen.3. De krachtens dit artikel genomen mandaatbesluiten worden overeenkomstig
      artikel 3:42, tweede lid, van de Algemene wet bestuursrecht bekendgemaakt, onverminderd
      het bepaalde in artikel 10:5 van de Algemene wet bestuursrecht. Voorts worden
      de mandaatbesluiten opgenomen in een register.
  - kop_artikel: 'Artikel 33: Privaatrechtelijke bevoegdheden'
    inhoud_artikel: 1. De privaatrechtelijke bevoegdheden van de Omgevingsdienst worden
      ingekaderd door de begroting, en nader ingevuld in onder meer het directiereglement
      en het treasurystatuut. Bij de ter inzagelegging van de ontwerpbegroting wordt
      melding gemaakt van voorgenomen rechtshandelingen die een bedrag van € 2,5 miljoen
      te boven gaan.2. Het algemeen bestuur kan slechts bij vijf zesde meerderheid
      besluiten tot de oprichting van en de deelneming in stichtingen, maatschappen,
      vennootschappen, verenigingen, coöperaties en onderlinge waarborgmaatschappijen.
