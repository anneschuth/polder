  bevoegdheden:
  - kop_artikel: Artikel 5
    inhoud_artikel: 1. De bestuursorganen oefenen binnen de grenzen, getrokken in
      de Gemeentewet, die bevoegdheden van de regeling en bestuur uit die zij ter
      vervulling van hun taak behoeven.2. Tot de in het eerste lid bedoelde bevoegdheden
      behoren niet andere bevoegdheden dan die voortvloeiende uit:a. de Gemeentewet;b.
      de Wet gemeenschappelijke regelingen;c. de artikelen 15 en 16 van de Wegenwet,
      voor wat betreft door het recreatieschap aangelegde c.q.aan te leggen dan wel
      door een deelnemende gemeente in beheer en onderhoud aan het recreatieschapovergedragen
      c.q. over te dragen recreatieve fietspaden.
  - kop_artikel: Artikel 6
    inhoud_artikel: Voor zover uit deze regeling niet het tegendeel blijkt, is de
      verdeling van bevoegdheden tussen het algemeen bestuur, het dageiijks bestuur
      en de voorzitter gelijk aan die tussen de gemeenteraad, het college van burgemeester
      en wethouders en de burgemeester zoals die is geregeld in de Gemeentewet, onverminderd
      de mogelijkheid tot overdracht van bevoegdheden overeenkomstig de in de Gemeentewet
      gegeven regelen.
