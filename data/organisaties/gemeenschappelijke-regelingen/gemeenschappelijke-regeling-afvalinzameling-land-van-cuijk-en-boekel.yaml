  citeertitel: Gemeenschappelijke Regeling Afvalinzameling Land van Cuijk en Boekel
  doel: Het openbaar lichaam behartigt de gemeenschappelijke en afzonderlijke taken
    van de gemeenten op het gebied van reiniging, inzameling en verwijdering van afval.
    Het draagt zorg voor een zo doelmatig mogelijke uitvoering van deze taken en uitoefening
    van bevoegdheden op de voorgenomen terreinen.
