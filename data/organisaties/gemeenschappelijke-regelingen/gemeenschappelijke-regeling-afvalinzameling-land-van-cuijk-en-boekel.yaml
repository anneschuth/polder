  bevoegdheden:
  - kop_artikel: Artikel 4
    inhoud_artikel: 1. De colleges dragen ter uitvoering van de in het eerste t/m
      het derde lid van artikel 3 genoemde taken en belangen, hun bevoegdheden op
      grond van de Wet Milieubeheer en Gemeentewet en de daarmee samenhangende wetten
      en regelingen, volledig over aan het algemeen bestuur van het openbaar lichaam.2.
      Na besluitvorming ten aanzien van de in artikel 3, vierde lid genoemde taken,
      dragen de colleges hun hiermee samenhangende bevoegdheden op grond van de Wet
      Milieubeheer en Gemeentewet en de daarmee samenhangende wetten en regelingen,
      volledig over aan het algemeen bestuur van het openbaar lichaam.3. Het is mogelijk
      om verandering aan te brengen in de overgedragen bevoegdheden. Een besluit hiertoe
      dient in het algemeen bestuur met unanieme stemmen te worden genomen.
