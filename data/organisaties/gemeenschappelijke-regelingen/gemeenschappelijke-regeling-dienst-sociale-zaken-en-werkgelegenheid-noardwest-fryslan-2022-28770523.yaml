  bevoegdheden:
  - kop_artikel: 'Artikel 4: Taken en bevoegdheden'
    inhoud_artikel: 1. Ter uitvoering van het in artikel 3 van de regeling genoemde
      belang, dragen de colleges aan het bestuur alle taken over die aan de colleges
      toekomen op grond van de wetten.2. In afwijking van lid 1 behoren het vaststellen
      en evalueren van beleid op basis van de wetten niet tot de overgedragen taken.3.
      De colleges doen mededeling aan het bestuur van alle relevante informatie die
      voor de uitvoering van dit artikel van belang is.4. De Dienst zal de uitvoering
      van de in de vorige leden van dit artikel omschreven taken zoveel als mogelijk
      verrichten met andere instanties die (mede) belast zijn met de uitvoering van
      de wet- en regelgeving op de terreinen van de sociale zekerheid, maatschappelijke
      zorg en gesubsidieerde arbeid.
