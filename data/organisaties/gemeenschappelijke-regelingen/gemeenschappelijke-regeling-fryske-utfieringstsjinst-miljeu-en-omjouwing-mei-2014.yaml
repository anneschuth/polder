  bevoegdheden:
  - kop_artikel: Artikel 5 Bevoegdheden
    inhoud_artikel: 1. Aan het bestuur van het openbaar lichaam worden geen publiekrechtelijke
      bevoegdheden overgedragen.2. Onverminderd het bepaalde in artikel 10:4 van de
      Algemene wet bestuursrecht kunnen de deelnemers, ter uitvoering van de in artikel
      4 genoemde taken, aan het bestuur van het openbaar lichaam mandaat verlenen
      om in naam van de respectieve bestuursorganen besluiten te nemen, volmacht verlenen
      tot het verrichten van privaatrechtelijke rechtshandelingen of machtiging verlenen
      tot het verrichten van handelingen die noch een besluit, noch een privaatrechtelijke
      rechtshandeling zijn.3. Tenzij anders is bepaald kan het bestuur van het openbaar
      lichaam ten aanzien van de in mandaat, volmacht en machtiging opgedragen taken
      en bevoegdheden ondermandaat, ondervolmacht en ondermachtiging verlenen.4. Besluiten
      als bedoeld in het tweede en derde lid worden, onder de zorg van de secretaris/directeur,
      opgenomen in het Register mandaat, volmacht en machtiging FUMO. Het register
      is openbaar.
