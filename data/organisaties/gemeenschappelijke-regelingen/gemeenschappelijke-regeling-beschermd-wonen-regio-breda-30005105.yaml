  valid_until: '2024-07-23'
gr_meta:
  doel: De Regeling is aangegaan met de volgende doelen:1. de samenwerking verankeren
    tussen de Colleges van de Gemeenten voor de maatwerkvoorziening Beschermd Wonen;2.
    het afstemmen van het regionaal beleid op het terrein Beschermd Wonen ter uitvoering
    van het door de raden vastgesteld beleidskader;3. de uitwerking van het regionaal
    beleid in een inkoopbeleid voor Beschermd Wonen;4. het financieren van Beschermd
    Wonen;5. het gezamenlijk organiseren van de toegang tot Beschermd Wonen;6. het
    monitoren van de resultaten van Beschermd Wonen en op basis daarvan bijsturen;7.
    de taken en bevoegdheden van de Colleges van de Gemeenten vanuit de Wmo, ten aanzien
    van Beschermd Wonen zoals opgenomen in artikel 4 door mandaat op te dragen aan
    het College van de Centrumgemeente. Hiermee wordt het volgende beoogd:a. efficiënte
    en effectieve inzet van de door de deelnemers beschikbaar gestelde middelen en
    gezamenlijke afstemming over eventuele besparingen of aanvullende kosten en de
    verevening van risico’s;b. borgen van de regionale samenwerking voor de schaarse
    en dure maatwerkvoorziening Beschermd Wonen;c. het stimuleren van de samenwerking
    tussen de deelnemers door actief informeren en communiceren.
  samenwerkingsvorm:
    value: '''Regeling zonder meer'''
    afkorting: RZM
