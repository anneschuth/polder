gr_meta:
  citeertitel: Senzer
  doel: 'In het eerste lid van dit artikel is expliciet het belang als bedoeld in
    artikel 10 eerste lid Wgr benoemd waarom de colleges van burgemeester en wethouders
    van de deelnemende gemeenten deze regeling treffen: dat gebeurt ter behartiging
    van de sturing en beheersing van uitvoeringstaken en van ondersteunende processen
    van de deelnemende gemeenten. In artikel 3.3 is het solidariteitsbeginsel expliciet
    toegevoegd, alsook dat er sprake is van een gemeenschappelijk basispakket. Het
    uitgangspunt van een gelijkluidend over te dragen takenpakket is niet absoluut;
    colleges kunnen onderdelen van het takenpakket buiten de overdracht van taken
    houden. Zo waren er bij het ingaan van de geactualiseerde GR enkele taakonderdelen
    die door gemeenten niet aan Senzer waren overgedragen. Deze taakverdeling is door
    de vaststelling van de nieuwe GR niet gewijzigd. In lid 4 gaat het om extra taken
    van deelnemende gemeenten. Deze worden op basis van een dienstverleningsovereenkomst
    in mandaat opgedragen aan het openbaar lichaam.'
