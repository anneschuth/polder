names:
- value: Rekenkamer Amsterdam-Zaanstad
  abbr: RAZ
  valid_from: '1900-01-01'
description:
  text: 'De Rekenkamer Amsterdam-Zaanstad onderzoekt hoe het bestuur van de gemeenten
    Amsterdam en Zaanstad het gemeentelijke beleid uitvoert. We controleren of het
    bestuur volgens de regels werkt, de afgesproken doelen waarmaakt en of het daaraan
    niet meer geld uitgeeft dan nodig.We zijn onafhankelijk en bepalen zelf waar we
    onderzoek naar doen. Onze onderzoeken gaan over allerlei onderwerpen: van toegankelijkheid
    van buurthuizen tot het groenbeleid van de gemeente. En van klimaatbestendig bouwen
    tot het beheer van sport- en speeltoestellen in de openbare ruimte. We hebben
    ruime bevoegdheden om informatie te verzamelen die wij voor een onderzoek nuttig
    vinden.'
