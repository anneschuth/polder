description:
  text: 'Baanbrekers is het leer-, werk- en mensontwikkelbedrijf van de gemeenten
    Heusden, Loon op Zand en Waalwijk. Wij willen dat iedereen meedoet aan de samenleving
    en aan werk. Is werk niet, nog niet of even niet mogelijk? Dan is er hulp in de
    vorm van een tijdelijk inkomen.Baanbrekers heeft 3 afdelingen:- Leren & Werken;
    De afdeling L&W verricht - in- en extern - allerlei activiteiten voor opdrachtgevers.
    Denk hierbij aan: inpakken, ompakken, samenstellen, cateren, beveiliging, groenvoorziening,
    schoonmaak en het stimuleren van de kringloop. Dit met het doel om mensen te leren
    werken en ontwikkelen.- Re integratie, Participatie & Inkomen; De afdeling RP&I
    is er voor inwoners van de gemeenten Heusden, Loon op Zand en Waalwijk die niet
    in hun eigen levensonderhoud kunnen voorzien of die te maken krijgen met hoge
    bijzondere bestaanskosten. Wij ondersteunen en begeleiden mensen naar werk.- Bedrijfsvoering
    & Control: De afdeling B&C is de ondersteunende stafafdeling van het leer-, werk-
    en mensontwikkelbedrijf.'
