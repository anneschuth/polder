  bevoegdheden:
  - kop_artikel: 'Artikel 10: Bevoegdheden bestuur'
    inhoud_artikel: 1. Aan het bestuur komen alle bevoegdheden toe die aan de regeling
      zijn opgedragen.2. Voor zover deze regeling niet anders bepaalt, kunnen de gemeenteraden
      geen zienswijze naar voren brengen op voorgenomen besluiten van het bestuur.3.
      Ingezetenen van de deelnemers en belanghebbenden worden niet betrokken bij de
      voorbereiding, uitvoering en evaluatie van beleid op grond van deze regeling.4.
      Het bestuur kan over gaan tot de oprichting van rechtspersonen als bedoeld in
      artikel 31a van de wet, nadat de gemeenteraden in de gelegenheid zijn gesteld
      over een ontwerpbesluit hun wensen en bedenkingen kenbaar te maken aan het bestuur.5.
      Het bestuur kan de voorzitter, of één of meer leden bevoegdheden toekennen.6.
      Het bestuur kan aan de manager bevoegdheden opdragen met uitzondering van:a.
      het vaststellen, dan wel wijzigen van de begroting;b. het vaststellen van de
      jaarrekening;c. het vaststellen van de financiële beheerverordening, de controleverordening
      en de verordening op het onderzoek naar de doelmatigheid en doeltreffendheid,
      zoals omschreven in de artikelen 212, 213 en 213a van de Gemeentewet;d. het
      vaststellen van een organisatiereglement en bijbehorende regels.
