  citeertitel: Gemeenschappelijke Regeling Werkmaatschappij 8KTD
  doel: 'Artikel 3: BelangHet belang waarvoor de regeling wordt getroffen, is het
    bewerkstelligen van een kwalitatief goede en doelmatige uitvoering door de bedrijfsvoeringsorganisatie
    van de door de deelnemers opgedragen taken op het gebied van ICT, zoals bepaald
    in het door beide colleges vastgestelde en vast te stellen inrichtingsplan en
    eventueel in de gesloten dienstverleningsovereenkomst tussen de deelnemers en
    de bedrijfsvoeringsorganisatie.'
