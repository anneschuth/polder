  bevoegdheden:
  - kop_artikel: Artikel 5 Taken en bevoegdheden
    inhoud_artikel: Ter behartiging van de in artikel 4 genoemde belangen is de veiligheidsregio
      belast met de uitvoering van de volgende taken en beschikt zij - onverminderd
      het bepaalde in artikel 30 van de wet - over de daarbij behorende bevoegdheden:a.
      het in stand houden van een (regionale) brandweer;b. het in stand houden van
      een bureau GHOR;c. het in stand houden van een Regionale Ambulance Voorziening
      (RAV);d. het in stand houden van een gemeenschappelijke meldkamer;e. het waarschuwen
      van de bevolking, het verkennen van gevaarlijke stoffen en het verrichten van
      ontsmetting, het adviseren van andere overheden en organisaties op het gebied
      van de brandpreventie, brandbestrijding en het voorkomen, beperken en bestrijden
      van ongevallen met gevaarlijke stoffen, zoals bedoeld in artikel 25 van de Wet
      veiligheidsregio's;f. het opstellen, vaststellen en uitvoeren van een beleidsplan,
      gebaseerd op een risicoprofiel, en een crisisplan;g. het daadwerkelijk verlenen
      of doen verlenen van ambulancezorg- en vervoer;h. het inventariseren van risico's
      van branden, rampen en crises;i. het adviseren van het bevoegd gezag over risico's
      van branden, rampen en crises in de bij of krachtens de Wet veiligheidsregio's
      aangewezen gevallen alsmede in de gevallen die in het beleidsplan zijn bepaald;j.
      het adviseren van het bevoegde college van Burgemeester en Wethouders over de
      taak bedoeld in artikel 3, eerste lid, van de Wet veiligheidsregio's;k. het
      voorbereiden op de bestrijding van branden en het organiseren van de rampenbestrijding
      en de crisisbeheersing, inclusief de advisering over de gemeentelijke voorbereidingen
      daarop;l. het aanschaffen en beheren van gemeenschappelijk materieel;m. het
      aanwijzen van een inrichting als bedrijfsbrandweerplichtig, als bedoeld in artikel
      31 van de Wet veiligheidsregio's;n. het maken van schriftelijke afspraken en
      het - zo nodig - in overleg treden met instellingen, zorgaanbieders en ambulancevervoerders,
      zoals bedoeld in artikel 33 en 34 van de Wet veiligheidsregio's;o. het sluiten
      van convenanten met de regiopolitie, andere overheden en derden over de afstemming,
      voorbereiding of uitvoering van taken die betrekking hebben op de hulpverlening
      en veiligheid;p. het inrichten en in stand houden van de informatievoorziening
      binnen de diensten van de veiligheidsregio en tussen deze diensten en de andere
      diensten en organisaties die betrokken zijn bij de in dit artikel genoemde taken;q.
      het verschaffen van informatie en het zorg dragen voor de communicatie over
      rampen en crises, als bedoeld in de artikelen 46 en 49 van de Wet veiligheidsregio's;r.
      het geven van een bevel als bedoeld in artikel 48, tweede lid, van de Wet veiligheidsregio's.s.
      het zorg dragen voor een periodieke kostenevaluatie en visitatie, als bedoeld
      in artikel 56 van de Wet veiligheidsregio's;t. het aanwijzen van ambtenaren
      die zijn belast met toezicht, als bedoeld in artikel 61 van de Wet veiligheidsregio's
      en het daarvan mededeling doen door plaatsing in de Staatscourant;u. het aanwijzen
      van een functionaris die is belast met de coördinatie van de maatregelen en
      voorzieningen die de gemeenten treffen met het oog op een ramp of crisis;v.
      het opleggen van een last onder bestuursdwang, als bedoeld in artikel 63 van
      de Wet veiligheidsregio's;w. het bespreken van onderwerpen op het terrein van
      sociale veiligheid waarvoor afstemming raadzaam is;y. het voorkomen, beperken
      en bestrijden van brand, alsmede het beperken en bestrijden van gevaar voor
      mensen en dieren bij ongevallen, anders dan door brand, in de gemeenten;z. het
      oprichten van of deelnemen in stichtingen, vennootschappen, en coöperatieve
      en andere verenigingen, dan wel het ontbinden daarvan of het beëindigen van
      de deelneming overeenkomstig artikel 31a Wet gemeenschappelijke regelingenaa.
      alle overige taken en bevoegdheden, die - nu of in de toekomst - op grond van
      de wet- en regelgeving worden opgedragen aan het bestuur van de veiligheidsregio.
