  citeertitel: Gemeenschappelijke regeling Veiligheidsregio Gelderland-Zuid
  doel: De veiligheidsregio behartigt de belangen van de deelnemende gemeenten op
    de volgende terreinen:a. Brandweerzorg;b. Geneeskundige hulpverlening bij ongevallen
    en rampen (GHOR);c. Rampenbestrijding en crisisbeheersing;d. Ambulancezorg;e.
    Het voorzien in de meldkamerfunctie;f. Sociale Veiligheid, voor zover het gaat
    over onderwerpen waarover regionale afstemming gewenst is.
