gr_meta:
  citeertitel: GRWRE
  doel: 1. Het openbaar lichaam behartigt de gemeenschappelijke belangen van de deelnemende
    gemeenten op het gebied van de sociale werkvoorziening.2. Het openbaar lichaam
    kan de gemeenschappelijke belangen van de deelnemende gemeenten op het gebied
    van andere vormen van al dan niet gesubsidieerde arbeid anders dan op het gebied
    van sociale werkvoorziening behartigen.
