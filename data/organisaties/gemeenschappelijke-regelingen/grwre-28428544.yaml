  bevoegdheden:
  - kop_artikel: Artikel 5
    inhoud_artikel: 1. Ter verwezenlijking van de in artikel 4, eerste lid genoemde
      gemeenschappelijke belangen dragen de deelnemende gemeenten de uitvoering van
      de Wet sociale werkvoorziening en van de uit dezewet voortvloeiende uitvoeringsregelingen
      over aan het openbaar lichaam.2. De deelnemende gemeenten kunnen individueel
      aan het openbaar lichaam ter verwezenlijking van de in artikel 4, tweede lid
      genoemde gemeenschappelijke belangen, de uitvoering van wetten betreffende andere
      vormen van, al dan niet, gesubsidieerde arbeid en uit deze wetgeving voortvloeiende
      uitvoeringsregelingen overdragen, voor zover de wetgeving daartoe de mogelijkheid
      biedt
  - kop_artikel: Artikel 6
    inhoud_artikel: Voor zover hiervan in deze regeling niet is afgeweken, komen aan
      de bestuursorganen van het openbaar lichaam ter uitvoering van de in artikel
      5 eerste lid genoemde taken de bevoegdheden toe die aan de colleges van de deelnemende
      gemeenten behoren.
