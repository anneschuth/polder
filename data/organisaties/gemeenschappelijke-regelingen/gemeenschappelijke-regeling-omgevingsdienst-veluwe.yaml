gr_meta:
  doel: Het openbaar lichaam is ingesteld ter gemeenschappelijke behartiging van de
    belangen van de deelnemers op het gebied van het omgevingsrecht. Onder de belangen
    van de deelnemers wordt tevens begrepen het belang van een goede samenwerking
    tussen de omgevingsdiensten in Gelderland.
