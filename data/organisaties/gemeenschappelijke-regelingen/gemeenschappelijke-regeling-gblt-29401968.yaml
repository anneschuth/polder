  bevoegdheden:
  - kop_artikel: Artikel 6
    inhoud_artikel: 1. Aan GBLT en zijn organen komen de bevoegdheden toe die in de
      regeling aan GBLT en zijn organen zijn toegekend.2. Aan het dagelijks bestuur
      van GBLT wordt door de colleges van de deelnemers overgedragen de bevoegdheid
      tot heffing en invordering van de belastingen en/of andere taken die de deelnemers
      opdragen aan GBLT.3. Aan het dagelijks bestuur van GBLT wordt door de colleges
      van B&W van de deelnemende gemeenten overgedragen de bevoegdheden tot uitvoering
      van de Wet waardering onroerende zaken.4. Aan het dagelijks bestuur van GBLT
      kunnen door de colleges van B&W van de deelnemende gemeente(n) bevoegdheden
      worden overgedragen met betrekking tot de inrichting en/of het beheer van andere
      basisregistraties.5. De bevoegdheden, bedoeld in het tweede, derde en vierde
      lid, worden door het DB bijgehouden in een openbaar register.6. Het algemeen
      bestuur kan besluiten tot deelneming in een belangenvereniging ter behartiging
      van een of meer belangen van GBLT, onverminderd het bepaalde in artikel 64a
      van de Wet gemeenschappelijke regelingen.
