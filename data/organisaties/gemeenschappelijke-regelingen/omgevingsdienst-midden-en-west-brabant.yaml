description:
  text: Het openbaar lichaam is ingesteld om ten behoeve van de deelnemers taken uit
    te voeren op het gebied van het omgevingsrecht en om als verlengstuk van het lokaal
    en provinciaal bestuur een bijdrage te leveren aan een leefbare en veilige werk-
    en leefomgeving van de regio Midden- en West-Brabant.
