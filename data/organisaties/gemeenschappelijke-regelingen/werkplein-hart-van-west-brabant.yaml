description:
  text: 'Met de inwoner stemmen we de ondersteuning af op wat nodig is. Met onze kennis
    en expertise zorgen we voor hun groei en ontwikkeling. Werkpleiners passen maatwerk
    toe, gaan samenwerkingen met partners in de regio aan en durven buiten de gebaande
    paden te denken. Hun motivatie: zorgen dat inwoners meedoen aan de maatschappij!
    Werkpleiners doen dit namens de gemeenten Etten-Leur, Halderberge, Moerdijk, Roosendaal,
    Rucphen en Zundert.Werkplein heeft verschillende werkgebieden. Deze werkgebieden
    bestaan uit de specialistenteams diagnose, ontwikkeling en werkpunt & Inburgering.
    Deze teams staan in contact met inwoners en werkgever.'
