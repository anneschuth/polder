  bevoegdheden:
  - kop_artikel: artikel 6. Bevoegdheden
    inhoud_artikel: 1. Aan het bestuur van de GR Nieuw Reijerwaard worden ter vervulling
      van de in artikel 5 omschreven taken alle bevoegdheden van regelingen en bestuur
      toegekend binnen de grenzen van artikel 30 en 31a van de Wet gemeenschappelijke
      regelingen en met inachtneming van de beperkingen daarin gesteld.2. Ten behoeve
      van de in artikel 4 genoemde doelstelling kan, indien dit bijzonder aangewezen
      wordt geacht, de GR Nieuw Reijerwaard een of meer stichtingen, maatschappen,
      vennootschappen, verenigingen, coöperaties en onderlinge waarborgmaatschappijen
      oprichten of daarin deelnemen.
