  bevoegdheden:
  - kop_artikel: Artikel 7 Bevoegdheden
    inhoud_artikel: "1.\tAan de Ontwikkelingsmaatschappij worden de volgende bevoegdheden\
      \ overgedragen:Ruimtelijke ordening en bouwen- de bevoegdheid van het college\
      \ van burgemeester en wethouders van Heerenveen alsmede van het college van\
      \ burgemeester en wethouders van De Fryske Marren te besluiten op aanvragen\
      \ om een vergunning voor een omgevingsplanactiviteit (5.1, eerste lid, onder\
      \ a, Omgevingswet);- de bevoegdheid van het college van burgemeester en wethouders\
      \ van Heerenveen alsmede van het college van burgemeester en wethouders van\
      \ De Fryske Marren te besluiten op aanvragen om een omgevingsvergunning voor\
      \ een bouwactiviteit (artikel 5.1, tweede lid, onder a, Omgevingswet);milieu-\
      \ de bevoegdheid van het college van burgemeester en wethouders van Heerenveen\
      \ alsmede van het college van burgemeester en wethouders van De Fryske Marren\
      \ om te beslissen op aanvragen om een omgevingsvergunning voor een milieubelastende\
      \ activiteit (artikel 5.1, tweede lid, onder b, Omgevingswet);- de bevoegdheid\
      \ van het college van burgemeester en wethouders van Heerenveen alsmede van\
      \ het college van burgemeester en wethouders van De Fryske Marren om voorschriften\
      \ te verbinden aan een omgevingsvergunning voor een milieubelastende activiteit\
      \ (artikel 5.34, derde lid, onder c, onder 1°, Omgevingswet);- de bevoegdheid\
      \ van het college van burgemeester en wethouders van Heerenveen alsmede van\
      \ het college van burgemeester en wethouders van De Fryske Marren om de voorschriften\
      \ die verbonden zijn aan een milieubelastende activiteit te actualiseren, voor\
      \ zover die niet meer toereikend zijn gezien de ontwikkelingen van de technische\
      \ mogelijkheden tot het beschermen van het milieu en de ontwikkelingen met betrekking\
      \ tot de kwaliteit van het milieu (artikel 5.38, eerste lid, onder b, Omgevingswet);-\
      \ de bevoegdheid van het college van burgemeester en wethouders van Heerenveen\
      \ alsmede van het college van burgemeester en wethouders van De Fryske Marren\
      \ om een omgevingsvergunning voor een milieubelastende activiteit geheel of\
      \ gedeeltelijk in te trekken (artikel 5.40. tweede lid, Omgevingswet);uitritvergunning-de\
      \ bevoegdheid van het college van burgemeester en wethouders van Heerenveen\
      \ alsmede van het college van burgemeester en wethouders van De Fryske Marren\
      \ om te beslissen op verzoeken om vergunning te verlenen voor het maken van\
      \ een uitweg naar de weg, van de weg gebruik te maken voor het hebben van een\
      \ uitweg en verandering te brengen in een bestaande uitweg naar de weg (artikel\
      \ 2.12 APV Heerenveen, artikel 2.12 APV De Fryske Marren).reclame- de bevoegdheid\
      \ van het college van burgemeester en wethouders van Heerenveen alsmede van\
      \ het college van burgemeester en wethouders van De Fryske Marren op verzoeken\
      \ om vergunning te verlenen voor het maken van handelsreclame met behulp van\
      \ een opschrift, aankondiging of afbeelding in welke vorm dan ook, die vanaf\
      \ de weg of vanaf een andere voor het publiek toegankelijke plaats zichtbaar\
      \ is (artikel 4.15 APV Heerenveen; artikel 4.15 APV De Fryske Marren).2.\tOnder\
      \ het voorgaande is mede begrepen het beslissen op bezwaar- en beroepschriften,\
      \ gericht tegen beslissingen die door organen van de Ontwikkelingsmaatschappij\
      \ zijn genomen.De behandeling daarvan vindt plaats op de wijze als bepaald in\
      \ de Verordening op de commissie voor bezwaar- en beroepschriften zoals deze\
      \ is vastgesteld door de gemeente Heerenveen.3.\tIndien ten gevolge van wijziging\
      \ van wettelijke regelingen de uitvoering van werkzaamheden als bedoeld in het\
      \ eerste lid gaan strekken ter uitvoering van een andere regeling dan ter uitvoering\
      \ waarvan zij ten tijde van het van kracht worden van deze regeling strekten,\
      \ dan welindien in deze werkzaamheden ten gevolge van een dergelijke wijziging\
      \ veranderingen optreden, blijven zij, voor zover hun strekking en omvang door\
      \ hun wijziging niet wezenlijk veranderen, behoren tot de taken die aan de Ontwikkelingsmaatschappij\
      \ zijn opgedragen."
  - inhoud_artikel: 2 onder het voorgaande is mede begrepen het beslissen op bezwaar-
      en beroepschriften, gericht tegen beslissingen die door organen van de Ontwikkelingsmaatschappij
      zijn genomen.De behandeling daarvan vindt plaats op de wijze als bepaald in
      de Verordening op de commissie voor bezwaar- en beroepschriften zoals deze is
      vastgesteld door de gemeente Skarsterlân.3 indien er sprake is van vernummering
      van de artikelnummers en -leden waarop de in lid 1 genoemde bevoegdheden zijn
      gebaseerd, treden de vernummerde artikelnummers en -leden in de plaats van de
      voorheen van toepassing zijnde artikelnummers en -leden.
