  bevoegdheden:
  - kop_artikel: Artikel 4. Taken en bevoegdheden
    inhoud_artikel: 1. Ter behartiging van de in artikel 3 genoemde belangen is het
      Servicebureau Jeugdhulp Haaglanden belast met uitvoering van de volgende taken
      in het kader van de Jeugdwet:a. ondersteuning bij regionaal te contracteren
      jeugdhulp;b. coördineren van regionale berichtgeving inzake de jeugdhulp;c.
      leveren van een bijdrage aan de optimalisering van de opgedragen uitvoeringsprocessen;d.
      contractbeheer en contractmanagement;e. afwikkelen van het opgedragen declaratie-
      en betalingsverkeer;f. leveren van een bijdrage en advies bij de verantwoordingscyclus
      waaronder het genereren van adequate managementinformatie en informatie voor
      de planning en controlcyclus;g. het op verzoek namens gemeenten optreden richting
      leveranciers om de voorwaarden en eisen, waaronder de overeenkomsten worden
      afgesloten te harmoniseren.2. In de dienstverleningsovereenkomst worden samenwerkingsafspraken
      vastgelegd met betrekking tot de financiering en af te nemen diensten van het
      Servicebureau Jeugdhulp Haaglanden.3. De colleges:a. dragen geen bevoegdheden
      over aan het bestuur;b. kunnen bevoegdheden voor de uitvoering van taken aan
      het bestuur en de directeur in mandaat opdragen.
