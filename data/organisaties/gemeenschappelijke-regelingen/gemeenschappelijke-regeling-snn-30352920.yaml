  citeertitel: gemeenschappelijke regeling SNN
  doel: De regeling heeft ten doel de belangenbehartiging van de deelnemende provincies
    te ondersteunen ten behoeve van de ontwikkeling van Noord-Nederland, mede door
    het beheer van financiële fondsen, de besteding van deze middelen en het faciliteren
    van een managementautoriteit ter uitvoering van Europese programma’s.
