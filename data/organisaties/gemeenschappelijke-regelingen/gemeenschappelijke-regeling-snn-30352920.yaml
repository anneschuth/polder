  bevoegdheden:
  - kop_artikel: Artikel 5 Bevoegdheden
    inhoud_artikel: 1. De bevoegdheid tot subsidieverstrekking uit de middelen die
      door of namens de deelnemers gezamenlijk aan het samenwerkingsverband ter beschikking
      worden gesteld, wordt bij gelijkluidend besluit opgedragen aan het samenwerkingsverband.2.
      Ten behoeve van de aan het samenwerkingsverband opgedragen taken kan het daartoe
      bevoegde bestuursorgaan uitsluitend gelijkluidende algemeen verbindende voorschriften
      vaststellen.3. Het samenwerkingsverband kan, op verzoek en ten behoeve van één
      of meerdere deelnemers of derden, overige werkzaamheden verrichten na instemming
      van het dagelijks bestuur.
