  bevoegdheden:
  - kop_artikel: Artikel 4 - Bevoegdheden colleges
    inhoud_artikel: 1. Het college van de centrumgemeente wordt door de deelnemende
      gemeenten mandaat – en voor zo ver van toepassing - volmacht verleend om binnen
      de beleidskaders van de deelnemende gemeenten namens het college van de deelnemende
      gemeenten, voor zover nodig, alle besluiten te nemen en andere rechtshandelingen
      te verrichten die noodzakelijk zijn ter behartiging van het in artikel 2 gestelde
      belang, tenzij een wettelijk voorschrift of de aard van de bevoegdheid zich
      hiertegen verzet.2. Het college van de centrumgemeente stemt in met de verleende
      mandaten, volmachten en machtigingen, zoals bedoeld in dit artikel.
