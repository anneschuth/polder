  bevoegdheden:
  - kop_artikel: 'Artikel 10: Bevoegdheden'
    inhoud_artikel: 1. De colleges dragen geen bevoegdheden over aan het bestuur.2.
      Alle bevoegdheden die bij of krachtens enige wet van toepassing zijn op Sallcon
      komen toe aan het bestuur.3. De colleges dragen er zorg voor dat zij de directeur
      bedoeld in artikel 7, eerste lid, dan wel functionarissen van Sallcon de benodigde
      mandaten, volmachten en machtigingen geven die Sallcon nodig heeft voor de uitvoer
      van de taken, bedoeld in artikel 9, eerste lid. Voornoemde mandaten, volmachten
      en machtigingen worden verleend in de dienstverleningsovereenkomst, bedoeld
      in het derde lid.4. Het bestuur besluit slechts tot oprichting van en de deelneming
      in stichtingen, maatschappen, vennootschappen, verenigingen, coöperaties en
      onderlinge waarborgmaatschappijen, indien dat in het bijzonder aangewezen moet
      worden geacht voor de behartiging van het daarmee te dienen belang. Het besluit
      wordt niet genomen dan nadat de raden in de gelegenheid zijn gesteld hun wensen
      en bedenkingen ter kennis van het bestuur te brengen.
