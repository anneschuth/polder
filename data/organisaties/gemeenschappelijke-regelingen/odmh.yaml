names:
- value: Omgevingsdienst Midden-Holland
  abbr: ODMH
  valid_from: '1900-01-01'
description:
  text: De ODMH is de omgevingsdienst van de Provincie Zuid-Holland en de gemeenten
    Alphen aan den Rijn, Bodegraven-Reeuwijk, Gouda, Krimpenerwaard, Waddinxveen en
    Zuidplas.De ODMH draagt bij aan een veilige, duurzame en gezonde samenleving.
    Dit doet de ODMH door de (wettelijke) taken op het gebied van milieu en bouw-
    en woningtoezicht namens de deelnemers uit te voeren. We verlenen omgevingsvergunningen
    en controleren op de naleving van milieu- en bouwregels. Daarnaast adviseert de
    ODMH zijn deelnemers over inhoudelijke onderwerpen op het gebied van de fysieke
    leefomgeving, zoals bodem, geluid, lucht en externe veiligheid.
