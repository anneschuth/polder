gr_meta:
  citeertitel: Gemeenschappelijke Regeling voor Geweld in Afhankelijkheidsrelaties
    (GIA) en Meldpunt Crisiszorg West-Brabant
  doel: De Regeling is aangegaan met de volgende doelen:a. de samenwerking verankeren
    tussen de Colleges van de Gemeenten bij de regionale aanpak van het voorkomen
    en bestrijden van GIA en de zorg voor één Meldpunt Crisiszorg in de regio West-Brabant;b.
    de taken en bevoegdheden van de Colleges van de Gemeenten vanuit de Wmo, de Jeugdwet
    en het terrein van veiligheid en openbare orde ten aanzien van GIA en het Meldpunt
    Crisiszorg door mandaat op te dragen aan het College van de Centrumgemeente. Hiermee
    wordt het volgende beoogd:i. het behalen van schaalvoordelen;ii. het stimuleren
    van de samenwerking tussen de deelnemers door actief informeren en communiceren;iii.
    het afstemmen en gezamenlijk vaststellen van het regionaal beleid op het terrein
    van GIA en het Meldpunt Crisiszorg;iv. de uitwerking van het regionaal beleid
    in Opdrachten aan uitvoeringsorganisaties;v. efficiënte inzet van de regionale
    middelen en gezamenlijke afstemming over eventuele besparingen of aanvullende
    kosten en de verevening van risico’s.
  samenwerkingsvorm:
    value: '''Regeling zonder meer'''
    afkorting: RZM
