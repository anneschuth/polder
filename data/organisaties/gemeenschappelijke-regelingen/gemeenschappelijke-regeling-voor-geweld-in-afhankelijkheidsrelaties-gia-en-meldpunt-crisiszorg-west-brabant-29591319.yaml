  bevoegdheden:
  - kop_artikel: Artikel 5 Mandaat
    inhoud_artikel: 1. Aan het College van de Centrumgemeente wordt door de Colleges
      van de Gemeenten mandaat verleend om namens de Colleges van de Gemeenten, voor
      zover nodig, alle besluiten te nemen en andere rechtshandelingen te verrichten
      die noodzakelijk zijn ter behartiging van het in artikel 2 gestelde doel en
      de daartoe opgedragen taken zoals aangegeven in artikel 4, tweede lid, onder
      a t/m g tenzij een wettelijk voorschrift of de aard van de bevoegdheid zich
      hiertegen verzet.2. Het College van de Centrumgemeente is bevoegd aan medewerkers
      van de Centrumgemeente een of meerdere ondermandaten te verlenen voor de bevoegdheden
      zoals genoemd in artikel 4 tweede lid, onder a t/m g.3. De Colleges van de Gemeenten
      kunnen de in deze Regeling verleende mandaten intrekken onder de voorwaarde
      dat zij hun gemeentelijke bijdrage aan de regionale activiteiten op het gebied
      van GIA en het Meldpunt Crisiszorg gedurende twaalf maanden na intrekking blijven
      inzetten bij de betrokken uitvoeringsorganisaties.
