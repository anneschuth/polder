description:
  text: "In de gemeenschappelijke regeling wordt (in hoofdstuk 2 en 3) een beschrijving\
    \ gegeven van de organisatie van het RBT en de taken en verantwoordelijkheden\
    \ van het personeel. In aanvulling daarop wordt de administratieve en financiële\
    \ organisatie beschreven in de financiële verordening, welke op 13 december 2023\
    \ is vastgesteld door het Algemeen Bestuur. Het Algemeen Bestuur wordt gevormd\
    \ door leden van de colleges van B&W en GS van de deelnemers. Het Algemeen Bestuur\
    \ benoemt, vanuit haar midden, de leden van het Dagelijks Bestuur. Het bestuur\
    \ wordt ondersteund door een secretaris (4 uur per week), die alle uitgaande stukken\
    \ mede ondertekent en verantwoordelijk is voor de controlling van besluiten van\
    \ de directeur. Het RBT heeft geen personeel in dienst: werkzaamheden worden verricht\
    \ door ambtenaren van de deelnemende gemeenten en op detacheringsbasis ingehuurde\
    \ medewerkers. De projectorganisatie is gevestigd in een voormalig woonhuis in\
    \ het projectgebied (Columbus 17, Almelo).Per 31-12-2023 kende de projectorganisatie\
    \ de volgende bezetting:Projectdirecteur\t\t\t\t\t- \t  24 uur per weekProjectmanager\
    \ / casemanager / secretaris\t\t-\t  36 uur per weekPlaneconoom\t\t\t\t\t-\t \
    \ 12 uur per weekProjectadministrateur\t\t\t\t-\t  12 uur per weekOfficemanager\t\
    \t\t\t\t-\t  14 uur per weekTotaal (2,7 FTE)\t\t\t\t\t- \t  98 uur per weekNaast\
    \ de projectorganisatie is er een flexibele schil. De civieltechnische begeleiding\
    \ wordt (op regiebasis) verzorgd door het ingenieursbureau van de gemeente Almelo\
    \ en daarnaast wordt (op regie of opdrachtbasis) gebruik gemaakt van diverse externe\
    \ deskundigen, zoals juridische adviseurs, duurzaamheid deskundigen, taxateurs,\
    \ ICT-begeleiding, accountants, fiscalisten en archiefondersteuning.Tot slot is\
    \ op het XL Businesspark een parkmanager actief (4 uur per week), in opdracht\
    \ van de coöperatieve vereniging parkmanagement.De projectorganisatie werkt nauw\
    \ samen met andere organisaties. De communicatie en marketing vindt mede plaats\
    \ onder de merknaam Port of Twente. Port of Twente bundelt alle kracht van logistiek\
    \ Twente om de sector te versterken, te verduurzamen en de Twentse economie te\
    \ ondersteunen. Port of Twente is belangenvereniging, havenbeheerder, grondbedrijf\
    \ en vestigingsloket in één. Tot slot wordt samengewerkt met de andere topwerklocaties\
    \ in Twente (Kennispark Twente, High Tech Systems Park, ConnectU en Technology\
    \ Base) aan een gezamenlijke profilering."
  url: https://www.portoftwente.com/
