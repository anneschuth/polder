gr_meta:
  citeertitel: Gemeenschappelijke Regeling Werkzaak Rivierenland
  doel: 1. De regeling is getroffen voor gemeenschappelijke behartiging van de belangen
    van de deelnemers in het kader van het streven naar een zo hoog mogelijke arbeidsparticipatie
    van de inwoners van de gemeenten waartoe de deelnemers behoren en, indien nodig,
    het verstrekken van uitkeringen aan deze doelgroep voor de kosten van levensonderhoud.2.
    De deelnemers achten het ook hun belang de taken die zij als gevolg van de in
    artikel 4 genoemde regelgeving moeten uitvoeren zo efficiënt en effectief mogelijk
    in te richten. Daarom streven zij ernaar hun beleid en verordeningen, die zij
    als gevolg van de invoering van die regelgeving zullen vaststellen, zo veel mogelijk
    op elkaar af te stemmen, tenzij het bevoegde bestuursorgaan op grond van politiek-bestuurlijke
    overwegingen anders beslist.
