description:
  text: De Veiligheidsregio Brabant-Noord is een bestuurlijke samenwerking van deelnemende
    gemeenten, en kent de volgende organisatorische onderdelen Brandweer, Geneeskundige
    Hulpverleningsorganisatie in de Regio (GHOR), Crisisbeheersing en Rampenbestrijding,
    Bevolkingszorg en Bedrijfsvoering.De GHOR Brabant Midden-West-Noord kent een afzonderlijke
    ambtelijke organisatie, bestaande uit een samenwerking tussen de GGD Hart voor
    Brabant en de GGD West-Brabant.Veiligheidsregio Brabant-Noord heeft samen met
    Veiligheidsregio Brabant-Zuidoost een Brandweermeldkamer Oost-Brabant.
