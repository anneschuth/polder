description:
  text: 'De Intergemeentelijke Sociale Dienst is een openbaar lichaam dat gevestigd
    is in Brunssum. Het rechtsgebied omvat het grondgebied van de deelnemende gemeenten.
    Dit zijn de gemeenten Brunssum en Landgraaf.De dienst heeft als doel het, binnen
    de geformuleerde missie en visie, op bedrijfsmatige wijze (doen) uitvoeren van
    taken van de deelnemende gemeenten op de terreinen van de sociale zekerheid.De
    missie van ISD BOL luidt:"Het ontzorgen van cliënten/burgers en organisaties staat
    voorop."Binnen onze dienstverlening staat het ontzorgen van de cliënt/burger in
    het teken van snel en efficiënt verstrekken van een uitkering, bijzondere bijstand
    en/of minimaregelingen;Administratief ontzorgen van de mensontwikkelbedrijven
    en andere ketenpartners;Wij geven onze cliënten/burgers gevraagd en ongevraagd
    advies over de mogelijkheden om armoede tegen te gaan en de eigen financiële redzaamheid
    te vergroten door te wijzen op bestaande mogelijkheden van bijvoorbeeld vergoedingen,
    toeslagen en subsidies.Met een efficiënte bedrijfsvoering voert ISD BOL een cliënt-
    en klantgedreven dienstverlening uit, waarbij de dienstverlening digitaal is waar
    het kan en persoonlijk contact waar het gewenst of noodzakelijk is. Wij willen
    dat elke cliënt/burger financieel redzaam is en op basis daarvan naar eigen vermogen
    deelneemt aan de maatschappij. Als de financiële redzaamheid op eigen kracht niet
    lukt, dan fungeert ISD BOL als vangnet.Mensgericht: De cliënt/burger staat centraal
    en heeft zijn eigen verhaal. We kijken met maatwerk wat mogelijk is binnen de
    regels en wetten en passen hierbij de menselijke maat toe.Innovatief: Om de dienstverlening
    aan onze cliënten te kunnen waarborgen zet ISD BOL versterkt in op verdere digitalisering
    en automatisering. Daarnaast zijn wij steeds op zoek naar innovatieve oplossingen
    om de administratieve last voor de cliënt/burger en onze ketenpartners zoveel
    mogelijk te beperken. Wij zijn koploper op dit gebied en dat willen wij ook blijven.Samenwerken:
    Alleen zijn we sneller, samen komen we verder. Wij werken samen met onze ketenpartners
    om de klant zo optimaal mogelijk en duurzaam verder te helpen.Door een efficiënte
    inzet van automatisering en digitalisering de cliënt/burger snel te bedienen om
    zodoende in staat te zijn maatwerk te leveren voor de cliënt/burger waar dat nodig
    is.'
