  bevoegdheden:
  - kop_artikel: Artikel 5 Bevoegdheden
    inhoud_artikel: 1. De colleges alsmede de burgemeesters van de gemeenten kunnen
      bevoegdheden in mandaat verlenen en daarmee taken opdragen aan het dagelijks
      bestuur of de concerndirectie.2. Overeenkomstig artikel 10:4 van de Algemene
      wet bestuursrecht wordt voor mandaatverlening overeenkomstig het vorige lid
      instemming van het algemeen bestuur, respectievelijk het dagelijks bestuur,
      respectievelijk de concerndirectie gevraagd.3. Het dagelijks bestuur houdt een
      register bij van de overeenkomstig het eerste en tweede lid gemandateerde bevoegdheden.4.
      Het college van Wassenaar draagt de bevoegdheid over betreffende het heffen
      en invorderen van:a. begraafplaatsrechten overeenkomstig artikel 229, eerste
      lid, aanhef en onderdelen a en b, van de Gemeentewet;b. liggeld overeenkomstig
      artikel 229, eerste lid, aanhef en onderdeel a, van de Gemeentewet;c. marktgeld
      overeenkomstig artikel 229, eerste lid, aanhef en onderdeel a, van de Gemeentewet;d.
      retributies overeenkomstig de artikelen 228 en 229, eerste lid, aanhef en onderdelen
      a en b, van de Gemeentewet ene. leges overeenkomstig artikel 156, eerste en
      tweede lid, aanhef en onderdeel h, en artikel 229, eerste lid, aanhef en onderdeel
      b, van de Gemeentewet.5. Het college van Voorschoten draagt de bevoegdheid over
      betreffende het heffen en invorderen van:a. belastingen op roerende woon- en
      bedrijfsruimten overeenkomstig artikel 221 van de Gemeentewet;b. rechten voor
      het gebruik van de algemene begraafplaats overeenkomstig artikel 229, eerste
      lid, aanhef en onderdelen a en b, van de Gemeentewet;c. leges overeenkomstig
      de artikelen 156, eerste en tweede lid, aanhef en onderdeel h, en 229, eerste
      lid, aanhef en onderdeel b, van de Gemeentewet;d. marktgelden overeenkomstig
      artikel 229, eerste lid, aanhef en onderdeel a en onderdeel b, van de Gemeentewet;e.
      rechten voor de paardenmarkt overeenkomstig artikel 229, eerste lid, van de
      Gemeentewet.6. De burgemeesters dragen geen bevoegdheden over.
