description:
  text: 'Avres is een gemeenschappelijke regeling; een samenwerkingsverband van drie
    gemeenten in de AV regio. Avres voert namens deze gemeenten o.a. de Participatiewet,
    de wet Sociale Werkvoorziening en de Wet gemeentelijke schuldhulpverlening uit.
    Bij Avres werken circa 700 medewerkers. Ongeveer 500 medewerkers zijn binnen Avres
    werkzaam in het kader van de Wet Sociale Werkvoorziening en de regeling Nieuw
    Beschut. Zij zijn werkzaam op een aantal locaties in de regio of gedetacheerd
    bij werkgevers. Daarnaast hebben ongeveer 200 medewerkers een reguliere arbeidsovereenkomst.
    De organisatie is verdeeld in drie inhoudelijke afdelingen: ‘Inkomensondersteuning
    en Participatie’, ‘Ontwikkeling werkt!’ en ‘Jobcoaching & Acquisitie’.'
