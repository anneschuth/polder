  bevoegdheden:
  - kop_artikel: 'Artikel 6: Taken en bevoegdheden'
    inhoud_artikel: 1. De gemeenschappelijke regeling de Zeeuwse Muziekschool bevordert
      door middel van muziekonderwijs de participatie in kunst en cultuur met het
      doel om een bijdrage te leveren aan de actieve en passieve ontwikkeling van
      kinderen, jongeren, volwassenen en de samenleving.2. De gemeenschappelijke regeling
      de Zeeuwse Muziekschool kan met instemming van het algemeen bestuur ook diensten
      aan andere gemeenten verlenen.
