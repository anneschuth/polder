  citeertitel: Gemeenschappelijke Regeling de Zeeuwse Muziekschool
  doel: Het openbaar lichaam is ingesteld om de gezamenlijke belangen van de deelnemers
    te behartigen op het gebied van kunst educatieve activiteiten, waaronder instrumentaal
    en vocaal muziekonderwijs en muzikale vorming in de ruimste zin wordt uitgeoefend.
