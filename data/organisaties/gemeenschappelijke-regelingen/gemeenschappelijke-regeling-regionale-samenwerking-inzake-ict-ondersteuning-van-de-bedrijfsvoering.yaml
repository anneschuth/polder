gr_meta:
  citeertitel: Gemeenschappelijke regeling regionale samenwerking inzake ICT ondersteuning
    van de bedrijfsvoering
  doel: Deze regeling heeft tot doel om de gemeenschappelijke belangen van de deelnemende
    partijen te behartigen op het gebied van Informatie- en communicatietechnologie.De
    doelstellingen zijn:1. Het waarborgen van continuïteit, bedrijfszekerheid en innovatiekracht
    van de ICT dienstverlening door beperking van organisatorische kwetsbaarheid;2.
    Verhogen van de kwaliteit van processen, waardoor partijen beter kunnen functioneren;3.
    Verhogen van professionaliteit en deskundigheid van medewerkers;4. Efficiënter
    inzetten van de beschikbare arbeidskracht;5. Realiseren van besparingen door schaalvoordelen;
    het ontdubbelen van ICT voorzieningen, het beperken van de (stijgende) ICT kosten;6.
    Het gezamenlijk inkopen van software in overeenstemming met de eisen van delicentiegever.
  samenwerkingsvorm:
    value: '''Regeling zonder meer'''
    afkorting: RZM
