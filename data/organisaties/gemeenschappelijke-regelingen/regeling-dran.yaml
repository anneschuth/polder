  bevoegdheden:
  - kop_artikel: Artikel 6 Bevoegdheden
    inhoud_artikel: 1. Aan het bestuur van de DRAN worden de volgende bevoegdheden
      gedelegeerd door de deelnemers:- het verrichten van privaatrechtelijke rechtshandelingen
      op het terrein van doelgroepenvervoer;- de vertegenwoordiging in en buiten rechte
      van de deelnemers in het kader van de in artikel 4 opgedragen taken.2. De DRAN
      is behoudens instemming van alle deelnemers niet bevoegd tot:a. het vestigen
      van opstal-, pand- en hypotheekrechten;b. het afgeven van garanties of andere
      waarborgen;c. het in erfpacht aannemen of uitgeven van roerende of onroerende
      zaken;d. het in eigendom aannemen of uitgeven van onroerende zaken;e. het oprichten
      van en het deelnemen in een rechtspersoon;f. commerciële dienstverlening aan
      private partijen.
