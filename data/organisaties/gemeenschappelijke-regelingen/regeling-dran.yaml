gr_meta:
  citeertitel: regeling DRAN
  doel: 1. De DRAN heeft tot doel de gezamenlijke sturing en (financiële) beheersing
    van uitvoeringstaken en uitvoering van ondersteunende processen op het gebied
    van doelgroepenvervoer en aanvullend vervoer voor de deelnemers.2. De sturing
    en (financiële) beheersing van uitvoeringstaken en uitvoering van ondersteunende
    processen op het gebied van doelgroepenvervoer en aanvullend vervoer worden overgedragen
    aan de DRAN.
