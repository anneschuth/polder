  bevoegdheden:
  - kop_artikel: 'Artikel 38: Bevoegdheden algemeen bestuur'
    inhoud_artikel: 1. Verordeningen met betrekking tot de regionale gezondheidsdienst
      worden door het algemeen bestuur vastgesteld voor zover de bevoegdheid daartoe
      niet bij de wet of door het algemeen bestuur krachtens de wet aan het dagelijks
      bestuur of de voorzitter is toegekend.2. De overige bevoegdheden berusten bij
      het algemeen bestuur voor zover deze niet bij of krachtens de wet aan het dagelijks
      bestuur of de voorzitter zijn toegekend.3. Het algemeen bestuur kan bij verordening
      beleidsregels vaststellen waarmee andere organen van de regionale gezondheidsdienst
      rekening houden bij de uitoefening van bij of krachtens de wet verleende bevoegdheden.
      Ten aanzien van de bekendmaking van deze verordening zijn de artikelen 139,
      140 en 141 van de Gemeentewet van overeenkomstige toepassing.4. Het algemeen
      bestuur kan, ten behoeve van de uitvoering van de wettelijk opgedragen in artikel
      4 genoemde taken van de regionale gezondheidsdienst, tot oprichting van en deelneming
      in stichtingen, maatschappen, vennootschappen, verenigingen, coöperaties en
      onderlinge waarborgmaatschappijen besluiten, indien dat in het bijzonder aangewezen
      moet worden geacht voor de behartiging van het daarmee te dienen openbaar belang.
      Het besluit daartoe wordt door het algemeen bestuur met gekwalificeerde meerderheid,
      bedoeld in artikel 17, tweede lid, genomen. Het besluit wordt niet genomen dan
      nadat de raden van de deelnemende gemeenten een ontwerpbesluit is toegezonden
      en in de gelegenheid zijn gesteld hun wensen en bedenkingen ter kennis van het
      algemeen bestuur te brengen.
