gr_meta:
  citeertitel: Gemeenschappelijke regeling Veiligheids- en Gezondheidsregio Gelderland-Midden
    2015
  doel: De doelstelling van de VGGM is zorg te dragen voor een optimale waarborging
    van de kwaliteit van het leven, in casu de veiligheid en de gezondheid, van de
    inwoners van het verzorgingsgebied. Ter behartiging van de doelstelling heeft
    de Veiligheids- en Gezondheidsregio Gelderland-Midden wettelijke taken en bevoegdheden
    op het vlak van brandweerzorg, rampenbestrijding, de crisisbestrijding en de geneeskundige
    hulpverlening.
