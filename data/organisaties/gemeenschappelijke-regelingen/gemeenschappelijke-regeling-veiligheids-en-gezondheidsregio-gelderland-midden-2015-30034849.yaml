  bevoegdheden:
  - inhoud_artikel: Ter behartiging van de doelstelling heeft de Veiligheids- en Gezondheidsregio
      Gelderland-Midden de volgende wettelijke taken en bevoegdheden op het vlak van
      de publieke gezondheids- en ambulancezorg:a. de algemene taken genoemd in artikel
      2 van de Wet Publieke Gezondheid;b. de taken genoemd in artikel 5 en van de
      Wet Publieke Gezondheid op het vlak van de jeugdgezondheidszorg voor 4-19 jarigen;c.
      de taken genoemd in artikel 5a van de Wet Publieke Gezondheid op het vlak van
      ouderenzorg;d. de taken in artikel 6 Van de Wet publieke gezondheidszorg op
      het vlak van de algemene infectieziektebestrijding;e. de taken genoemd in de
      Tijdelijke Wet Ambulancezorg (2013) voor zover en voor zolang daartoe de Veiligheids-
      en Gezondheidsregio Gelderland-Midden vergunninghouder is als bedoeld in de
      Tijdelijke Wet ambulancezorg;f. andere taken die bij of krachtens wet aan de
      Veiligheids- en Gezondheidsregio Gelderland-Midden worden opgedragen.
