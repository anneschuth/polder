gr_meta:
  citeertitel: gemeenschappelijke regeling Veiligheidsregio Limburg-Noord
  doel: De Veiligheidsregio is het samenwerkingsorgaan van en voor de gemeenten en
    heeft tot doel de belangen van de gemeenten en hun ingezetenen te behartigen op
    het gebied van:a. de brandweerzorg;b. de geneeskundige hulpverlening bij ongevallen
    en rampen;c. de rampenbestrijding en crisisbeheersing;d. het bevorderen van de
    multidisciplinaire uitvoering van de rampenbestrijding, de crisisbeheersing en
    de bestrijding van zware ongevallen:e. het bevorderen van een samenhangend integraal
    veiligheidsbeleid in de regio;f. de publieke gezondheidszorg als bedoeld in de
    Wpg.
