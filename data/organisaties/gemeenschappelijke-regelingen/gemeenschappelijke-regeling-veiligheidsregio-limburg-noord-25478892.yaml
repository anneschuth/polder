  bevoegdheden:
  - kop_artikel: 'artikel 5: Taken en bevoegdheden'
    inhoud_artikel: 1. Op het gebied van veiligheid zijn aan de Veiligheidsregio de
      taken en bevoegdheden opgedragen als bedoeld in artikel 10 van de Wvr.2. Op
      het gebied van publieke gezondheidszorg zijn aan de Veiligheidsregio de taken
      en bevoegdheden opgedragen als bedoeld in de artikelen 2, 5, 5a, 6, 14 en 15a
      van de Wpg.3. De Veiligheidsregio kan overeenkomstig het bepaalde in artikel
      31a Wgr besluiten tot oprichting van en deelneming in stichtingen, maatschappen,
      vennootschappen, verenigingen, coöperaties en onderlinge waarborgmaatschappijen
      indien dat in het bijzonder aangewezen moet worden geacht voor de behartiging
      van het daarmee te dienen openbaar belang.4. De Veiligheidsregio heeft voorts
      de zorg voor al hetgeen haar bij of krachtens wet of door de besturen van de
      gemeenten wordt opgedragen.
