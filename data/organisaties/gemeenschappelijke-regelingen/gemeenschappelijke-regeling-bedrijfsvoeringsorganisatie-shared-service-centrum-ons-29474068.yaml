  bevoegdheden:
  - kop_artikel: Artikel 9 Bevoegdheden bestuur
    inhoud_artikel: "1.\tHet bestuur heeft alle bevoegdheden die het bij of krachtens\
      \ de wet en deze regeling toekomt.2.\tTot de taken en bevoegdheden van het bestuur\
      \ behoren in ieder geval:a.\thet vaststellen en wijzigen van een bijdragebesluit\
      \ waarin de verrekensystematiek, die in beginsel is gebaseerd op betaling voor\
      \ afname, wordt vastgelegd op basis waarvan de financiële bijdragen van de deelnemers\
      \ voor de uitvoering van de taken, en onderverdeeld in standaard werk, meerwerk\
      \ en maatwerk worden bepaald. Het bestuur besluit daarover met een meerderheid\
      \ van ten minste 75% van de stemmen;b.\thet opstellen van een model dienstverleningsovereenkomst\
      \ voor de afname van diensten;c.\thet vaststellen en wijzigen van de interne\
      \ en organisatorische kaders van de bedrijfsvoeringsorganisatie;d.\thet behartigen\
      \ van de belangen van de bedrijfsvoeringsorganisatie bij andere overheden, instellingen,\
      \ bedrijven of personen waarmee contact voor de bedrijfsvoeringsorganisatie\
      \ van belang is;e.\thet houden van toezicht op het functioneren van de bedrijfsvoeringsorganisatie;f.\t\
      het minimaal eens per vier jaar evalueren van de regeling. Het bestuur bepaalt\
      \ daarbij of ook het functioneren van de samenwerking of onderdelen daarvan\
      \ deel uitmaakt van een evaluatie. Het bestuur besluit daarover met een meerderheid\
      \ van ten minste 75% van de stemmen;g.\thet nemen van conservatoire maatregelen,\
      \ zowel in als buiten rechte, en het doen van alles wat nodig is ter voorkoming\
      \ van verjaring en verlies van recht of bezit;h.\thet nemen van besluiten tot\
      \ oprichting van en deelneming in stichtingen, maatschappen, vennootschappen,\
      \ verenigingen, coöperaties en onderlinge waarborgmaatschappijen, de raden en\
      \ staten gehoord.3.\tVoorafgaand aan het nemen van een besluit over zaken met\
      \ een grote politieke, financiële en/of maatschappelijke impact door bestuur\
      \ worden de raden van de gemeenten in de gelegenheid gesteld om een zienswijze\
      \ naar voren te brengen. Het bestuur bepaalt wanneer sprake is van een besluit\
      \ met deze impact. Het bestuur besluit daarover met een meerderheid van ten\
      \ minste 75% van de stemmen.4.\tIn aanvulling op het voorgaande bepaalt het\
      \ bestuur tevens of ook ingezetenen van de deelnemers alsmede belanghebbenden\
      \ kunnen bijdragen aan het formuleren van de zienwijze op een dergelijk besluit.\
      \ Voor de wijze van participatie wordt aangesloten bij de participatieverordening\
      \ van de betreffende deelnemers.5.\tHet bestuur stelt de staten en de raden\
      \ van de deelnemers voorafgaande aan het nemen van een besluit als bedoeld in\
      \ het derde lid schriftelijk en gemotiveerd in kennis van zijn oordeel over\
      \ de zienswijze, bedoeld in het derde lid, alsmede van de eventuele conclusies\
      \ die het daaraan verbindt."
