description:
  text: "Orionis Walcheren ondersteunt de 120.000 inwoners van de gemeenten Middelburg,\
    \ Veere en Vlissingen op het gebied van werk, inkomen en schuldenOnze dienstverleningBij\
    \ Orionis Walcheren kunt u terecht voor verschillende zaken:•\twe zijn een werkleerbedrijf;•\t\
    u kunt bij ons een Participatiewet uitkering, bijzondere bijstand en minimaregelingen\
    \ aanvragen;•\twe bieden schuldhulpverlening.Onze missieWij geloven dat iedereen\
    \ ertoe doet. En dat werk en ontwikkeling voorwaarden zijn om mee te doen in de\
    \ maatschappij.We staan voortdurend in verbinding met de inwoners van Walcheren.\
    \ Vanuit oprechte belangstelling doen we wat nodig is voor een actief en zelfstandig\
    \ leven voor iedereen die ons nodig heeft.•\tSamen met partners ontwikkelen en\
    \ begeleiden we naar werk•\tAls werk niet gelijk lukt, zorgen we snel voor tijdelijk\
    \ en/of extra inkomen•\tWe ondersteunen bij geldzorgen door schuldhulpverlening\
    \ en preventie•\tWe zorgen voor beschut en beschermd werk voor mensen met een\
    \ afstand tot de arbeidsmarkt"
