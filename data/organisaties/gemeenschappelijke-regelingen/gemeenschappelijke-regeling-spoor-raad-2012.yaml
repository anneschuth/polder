  bevoegdheden:
  - kop_artikel: Artikel 3 Doelstelling en belang
    inhoud_artikel: '1.Het gemeenschappelijk orgaan oefent de bevoegdheden van de
      raad uit als bedoeld in ondermeer artikel 48 van de Wpo, alsmede de bevoegdheden
      van de raad en het college als beschreven in de statuten van de Stichting, voor
      zover uit de wet of statuten ten minste niet voortvloeit dat een bepaalde bevoegdheid
      uitsluitend voor de desbetreffende gemeente geldt, zoals bijvoorbeeld met betrekking
      tot een besluit als bedoeld in artikel 106 Wpo (onder meer vervreemding van
      een gebouw) of artikel 48 lid 5 Wpo (opheffing van een school).2.Aan de afzonderlijke
      gemeenten blijft voorbehouden: de goedkeuring van een besluit tot wijziging
      van de statuten voor zover die zijn gericht op fusie van de Stichting met een
      andere onderwijsorganisatie.'
