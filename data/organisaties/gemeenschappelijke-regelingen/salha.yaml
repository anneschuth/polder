description:
  text: Het Streekarchief Langstraat Heusden Altena is een gemeenschappelijke regeling
    voor de zorg en het beheer van de archieven van de gemeenten Altena, Heusden en
    Waalwijk. Het Streekarchief heeft een algemeen bestuur en een dagelijks bestuur,
    die beide worden gevormd door vertegenwoordigers van de drie deelnemende gemeenten.Samenstelling
    algemeen bestuur:dhr. S. Sheikkariem (wethouder gemeente Altena), liddhr. H. Tanis
    (wethouder gemeente Altena), lidmw. W. van Hees (burgemeester gemeente Heusden),
    liddhr. P.L.S. van Steen (wethouder gemeente Heusden), liddhr. F. Spierings (wethouder
    gemeente Waalwijk), liddhr. A. de Jong (wethouder gemeente Waalwijk), lidmw. M.
    Heijmans-van Bruggen (streekarchivaris), secretarisSamenstelling dagelijks bestuur:dhr.
    S. Sheikkariem (wethouder gemeente Altena), lidmw. W. van Hees (burgemeester gemeente
    Heusden), voorzitterdhr. F. Spierings (wethouder gemeente Waalwijk), lidmw. M.
    Heijmans-van Bruggen (streekarchivaris), secretaris
