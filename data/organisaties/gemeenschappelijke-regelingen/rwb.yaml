description:
  text: RWB is een (college-)samenwerking van de zestien gemeenten in West-Brabant,
    gericht op 1) de uitvoering van een strategische economische agenda en 2) op het
    uitvoeren van een aantal collectieve dienstverlenende taken. 1) We werken met
    het bedrijfsleven en onderwijsinstellingen aan een sterke economie voor onze regio.
    We geven daarmee invulling aan het overheidsdeel van de ambitie van de Economic
    Board West-Brabant. 2) RWB voert een aantal dienstverlenende taken uit. Dit zijn
    Kleinschalig Collectief Vervoer (KCV), met als 'product' de Deeltaxi, het Mobiliteitscentrum
    voor regionale HR-diensten met onder meer een regionale flexpool en inhuurdesk
    en taken op het gebied van Regioarcheologie.Daarnaast beheren we ook het Onderzoek
    & Ontwikkelfonds.
