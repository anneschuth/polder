    Regio West-Kennemerland
  doel: Deze regeling is aangegaan met als doel het behartigen van de belangen van
    gemeenten op het gebied van de uitvoering van de Leerplichtwet 1969 en het Besluit
    (RMC) Regionale Meld- en Coördinatiefunctie Voortijdig Schoolverlaten ten behoeve
    van het efficiënt en doelmatig samenwerken van de deelnemende gemeenten, een en
    ander voor zover het betreft de deelname van die gemeenten aan een of meerdere
    percelen.
