  bevoegdheden:
  - kop_artikel: Artikel 4 Taken gemeenschappelijk orgaan
    inhoud_artikel: Ter behartiging van de in artikel 3 te behartigen belangen voert
      het gemeenschappelijk orgaan taken uit, welke zijn onder te verdelen in drie
      percelen, zoals omschreven in de artikelen 5, 6 en 7.Artikel 11 Overige bevoegdheden
      gemeenschappelijk orgaan1. Het gemeenschappelijk orgaan is voorts, voor zover
      het betreft de deelname aan de artikel 5, 6 en 7 genoemde percelen, bevoegd
      om beslissingen te nemen omtrent:a. de vaststelling van het beleid en jaarplan/bedrijfsplan
      voor de uitvoering van de op grond van artikel 10 gemandateerde taken en bevoegdheden,
      jaarlijks vast te stellen voor 1 december voorafgaand aan het jaar waarop het
      plan betrekking heeft;b. de vaststelling van het jaarverslag en de effectrapportage,
      het aanbieden aan de Colleges en de verzending aan het Ministerie van OCW;c.
      de vaststelling van de instructie leerplichtambtenaar en RMC-functionaris, voor
      zover het betreft de in het derde lid van dit artikel genoemde gemeenten die
      deelnemen aan perceel 2;2. De colleges verlenen, ten behoeve van de uitvoering
      van de gemandateerde taken en binnen de kaders van de begroting, volmacht aan
      het gemeenschappelijk orgaan voor het aangaan van overeenkomsten met derden
      binnen de vastgestelde begroting van het gemeenschappelijk orgaan.3. Alle correspondentie
      van het gemeenschappelijk orgaan alsmede besluiten op grond van dit artikel
      wordt/worden ondertekend door of namens de voorzitter van het gemeenschappelijk
      orgaan.
