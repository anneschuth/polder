  bevoegdheden:
  - kop_artikel: Artikel 5 Bevoegdheden
    inhoud_artikel: 1. De daartoe bevoegde bestuursorganen van de gemeenten zullen
      in afzonderlijke mandaat, volmacht en machtigingsbesluiten bepalen welke bevoegdheden
      opgedragen worden aan de directeuren en medewerkers van de werkorganisatie.2.
      Ondermandaat is toegestaan, tenzij dat uitdrukkelijk is voorbehouden.3. Er wordt
      een register bijgehouden van de overeenkomstig het eerste en tweede lid (onder)gemandateerde
      bevoegdheden.4. Het college draagt de bevoegdheid om heffingsambtenaren, invorderingsambtenaren
      en leerplichtambtenaren aan te wijzen over aan het bestuur van de werkorganisatie.5.
      De werkorganisatie is gelet op artikel 31 van de wet niet bevoegd tot de aankoop
      van onroerend goed.
