gr_meta:
  citeertitel: Gemeenschappelijke Regeling Werkorganisatie Druten Wijchen
  doel: 'Het belang van de regeling is het bewerkstelligen van een krachtige en professionele
    uitvoering van de werkorganisatie van de door de gemeenten opgedragen taken. Daarmee
    biedt de werkorganisatie een kwalitatief hoogwaardige, efficiënte en innovatieve
    dienstverlening aan de klanten van de gemeenten: inwoners, bedrijven en instellingen.
    De werkorganisatie is ‘dienstbaar’ aan beide autonome gemeentebesturen en maakt
    een zelfstandige beleidskoers voor de gemeenten mogelijk.'
