gr_meta:
  citeertitel: Regionaal Historisch Centrum Rijnstreek en Lopikerwaard
  doel: Onze missie is burgers en bestuur te voorzien van betrouwbare historische
    informatie over het werkgebied op basis van archieven en collecties die wij beheren.
    Deze zijn afkomstig van overheidsinstanties (gemeenten, waterschappen en hun voorgangers)
    en van particuliere instellingen (kerken, verenigingen) die hun archieven bij
    ons hebben ondergebracht. Daarnaast waakt het RHC vanuit de inspectietaak over
    de duurzame toegankelijkheid van de archieven, zoals onze partners die vandaag
    de dag vormen.
