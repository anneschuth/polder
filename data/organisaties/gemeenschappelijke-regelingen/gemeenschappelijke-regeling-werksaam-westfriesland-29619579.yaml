gr_meta:
  citeertitel: Gemeenschappelijke Regeling WerkSaam Westfriesland
  doel: WerkSaam wil inwoners van Westfriesland naar vermogen laten deelnemen aan
    de reguliere arbeidsmarkt en het beroep van inwoners op een uitkering zoveel mogelijk
    beperken. Hiertoe ondersteunt WerkSaam werkzoekenden, uitkeringsgerechtigden en
    werkgevers in de regio.Het doel van WerkSaam is om uitvoering te geven aan de
    taken van de Westfriese gemeenten op het gebied van werk en inkomen en om de daartoe
    beschikbare middelen optimaal aan te wenden.
