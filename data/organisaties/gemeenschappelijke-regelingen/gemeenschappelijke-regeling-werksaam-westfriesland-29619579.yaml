  bevoegdheden:
  - kop_artikel: Artikel 5 en 6 van de Gemeenschappelijke regeling WerkSaam
    inhoud_artikel: 1. De kerntaak van WerkSaam is het zorg dragen voor het zo snel
      mogelijk aan werk helpen van werkzoekenden en het goed bedienen van werkgevers
      die op zoek zijn naar (tijdelijke) arbeidskrachten. Hieronder valt de beleidsontwikkeling,
      -vaststelling en –uitvoering van de volgende regelingen:a. Participatiewet,
      met uitzondering van de bijzondere bijstand ;b. Wet Sociale Werkvoorziening;c.
      Wet inkomensvoorziening Oudere en gedeeltelijk arbeidsongeschikte werknemers
      (Ioaw);d. Wet inkomensvoorziening Oudere en gedeeltelijk arbeidsongeschikte
      gewezen zelfstandigen (Ioaz);e. Besluit bijstandverlening zelfstandigen (Bbz);f.
      Wet educatie en beroepsonderwijs (alleen volwasseneneducatie);2. Bij het uitvoeren
      van deze regelingen gaat het om de volgende werkzaamheden:a. het verstrekken
      of bepalen van een uitkering, inkomensvoorziening, salaris, tegemoetkoming,
      voorschot of bijdrage;b. het terugvorderen of halen van verhaal n.a.v. een reeds
      verstrekte uitkering, inkomensvoorziening, tegemoetkoming, voorschot of bijdrage;c.
      het opleggen van een boete;d. het uitvoeren van fraudeonderzoeken op het gebied
      van bijstandverlening;e. het aanbieden van arbeidsinschakelingen enf. het aanbieden
      van trajecten in het kader van volwasseneneducatie3. Indien ten gevolge van
      wijziging van wettelijke regelingen, taken als bedoeld in lid 1 gaan strekken
      ter uitvoering van een andere regeling dan ter uitvoering waarvan zij na de
      inwerkingtreding van deze gemeenschappelijke regeling strekten, dan wel indien
      in deze werkzaamheden ten gevolge van een dergelijke wijziging veranderingen
      optreden, blijven zij, voor zover hun strekking en omvang door die wijziging
      niet wezenlijk veranderen, behoren tot de taken die lid 1 aan WerkSaam opdraagt.4.
      Eveneens behoort tot de taken het verrichten van bedrijfsvoeringstaken ter uitvoering
      van lid 1 en 2 zoals bedrijfsvoeringstaken op het gebied van personeel, informatie,
      juridische zaken, organisatie, financiën, administratie, communicatie, huisvesting
      en ICT-dienstverlening.Artikel 6 Overige, extra en plustaken1. Een individuele
      deelnemende gemeente kan het algemeen bestuur verzoeken om een bestaande taak
      voor die gemeente te intensiveren, mits daarvoor de bijbehorende middelen beschikbaar
      worden gesteld. Het algemeen bestuur beslist of het verzoek geen verstorend
      effect heeft op de bedrijfsvoering van WerkSaam.2. Het algemeen bestuur beslist
      bij unanimiteit over de vraag of, onder welke condities en in welke omvang WerkSaam
      de in artikel 5 lid 1 van deze regeling genoemde taken voor derden gaat uitvoeren
      op basis van een privaatrechtelijke overeenkomst.3. Het algemeen bestuur beslist
      bij unanimiteit over de vraag of, onder welke condities en in welke omvang WerkSaam
      extra taken gaat uitvoeren voor de gemeente(n) mits deze taken passen bij het
      doel als omschreven in artikel 4 van deze regeling.4.  Het algemeen bestuur
      beslist over de vraag of, onder welke condities en in welke omvang WerkSaam
      plustaken gaat uitvoeren voor de gemeente(n) mits deze taken passen bij het
      doel als omschreven in artikel 4 van deze regeling. Plustaken worden alleen
      uitgevoerd op basis van een verzoek van de desbetreffende gemeente(n).
