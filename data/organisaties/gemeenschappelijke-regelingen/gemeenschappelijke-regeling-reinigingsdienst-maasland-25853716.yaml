  citeertitel: gemeenschappelijke regeling Reinigingsdienst Maasland
  doel: 1. In het belang van een milieuhygiënisch verantwoorde en een doelmatige verwijdering
    van afvalstoffen heeft het openbaar lichaam primair tot taak:a. zorg te dragen
    voor de inzameling van huishoudelijke afvalstoffen als bedoeld in artikel 10.21,
    eerste lid van de Wet milieubeheer;b. zorg te dragen voor de inzameling van grove
    huishoudelijke afvalstoffen als bedoeld in artikel 10.22, eerste lid onder a.
    van de Wet milieubeheer;c. zorg te dragen voor de afzonderlijke inzameling van
    groente- fruit- en tuinafval als bedoeld in artikel 10.21, tweede lid van de Wet
    milieubeheer en van andere bestanddelen van huishoudelijke afvalstoffen krachtens
    artikel 10.21 derde lid van de Wet milieubeheer;d. zorg te dragen voor de inzameling
    van de in dit lid onder a t/m c bedoelde afvalstoffen, die ter verwerking worden
    geaccepteerd op de door de gemeenten of de Dienst op te richten en in stand te
    houden brengvoorzieningen, als bedoeld in artikel 10.22, eerste lid sub b. van
    de Wet milieubeheer;e. zorg te dragen voor het machinaal verwijderen en verwerken
    van veegvuil, bladeren alsmede het verwijderen en (doen) verwerken van kolkenslib;f.
    zorg te dragen voor het aankopen, distribueren, vervangen en onderhouden van middelen
    ter uitvoering van de onder a tot en met e genoemde taken;g. zorg te dragen voor
    de inzameling en het (doen) verwerken van bedrijfsafvalstoffen,h. het behartigen
    van de gemeenschappelijke belangen van de deelnemende gemeenten in het kader van
    de rechten en plichten ten opzichte van de Vereniging Afvalsamenwerking Limburg
    (ASL), die neergelegd zijn in de door de aangesloten gemeenten afgesloten contracten;
