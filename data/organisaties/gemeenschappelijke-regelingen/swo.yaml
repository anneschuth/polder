names:
- value: Samenwerkingsorganisatie De Wolden Hoogeveen
  abbr: SWO
  valid_from: '1900-01-01'
description:
  text: De ambtelijke organisaties van de gemeente De Wolden en de gemeente Hoogeveen
    zijn per 1 januari 2015 samengevoegd tot één nieuwe publiekrechtelijke ambtelijke
    organisatie voor beide gemeenten met het doel de kwaliteit van de gemeentelijke
    dienstverlening te optimaliseren, de kwetsbaarheid van de respectievelijke ambtelijke
    organisaties te beperken en de kosten van de uitvoering van de gemeentelijke taken
    zo goed mogelijk te beheersen.
