  doel: De gemeenschappelijke regeling heeft tot doel de Wet sociale werkvoorziening
    (Wsw) en daaruit voortvloeiende voorschriften uit te voeren voor de acht aangesloten
    gemeenten. De uitvoering van de Wsw heeft het bestuur van de gemeenschappelijke
    regeling opgedragen aan Caparis NV.
