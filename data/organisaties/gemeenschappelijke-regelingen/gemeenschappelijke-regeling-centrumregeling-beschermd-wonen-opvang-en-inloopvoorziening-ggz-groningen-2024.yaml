  bevoegdheden:
  - kop_artikel: Artikel 4 Taken en bevoegdheden
    inhoud_artikel: 1) De Colleges en Burgemeesters dragen aan het college en de burgemeester
      van de Centrumgemeente de in lid 2 en 3 bedoelde taken en bevoegdheden op.2)
      De aan de Centrumgemeente opgedragen taken omvatten in elk geval:a) Het in stand
      houden van een centrale toegang voor opvang;b) De inzet van personele capaciteit
      ten behoeve van coördinatie, monitoring van de (financiële) ontwikkelingen rond
      beschermd wonen en opvang, de ondersteuning AO Z&V, SOO en BOOGO en de uitvoering
      van kwantitatief onderzoek en aanleveren van rapportages ten behoeve van sturing;c)
      Het verwerken van persoonsgegevens in het kader van deze gemeenschappelijke
      regeling overeenkomstig de Algemene verordening gegevensbescherming;d) Het (doen)
      aanbieden van de bovenregionale Inloopvoorziening GGz;e) Het (doen) aanbieden
      van een crisisopvang in Leek;3) De aan de Centrumgemeente opgedragen taken omvatten,
      behoudens voor zover een College een besluit heeft genomen als bedoeld in lid
      4, voorts:a) Het bieden van algemene- dan wel maatwerkvoorzieningen op het gebied
      van Opvang, waaronder in elk geval het bieden van dag-, nacht- en crisisopvang;b)
      Het bieden van Voorzieningen op het gebied van beschermd wonen;c) indiceren
      en herindiceren voor (begeleiding) van opvang;d) Ingeval de onder c van dit
      lid genoemde indicatie en herindicatie door de Centrumgemeente is verricht,
      behandelt de Centrumgemeente ook de klachten die betrekking hebben op deze indicaties
      en de vertegenwoordiging in bezwaar- en beroepsprocedures;e) Het houden van
      toezicht op de Wmo-voorzieningen die vallen onder deze regeling;f) Het zorgdragen
      voor afstemming van de toezichthouder van de Centrumgemeente met de toezichthouder
      van een deelnemende gemeente, dan wel een andere door de deelnemende gemeente
      aangewezen functionaris;g) Het bieden van regionale ondersteuning ten behoeve
      van de decentrale toegang;h) Het verzorgen van contractmanagement en inkoop
      op het gebied van de opgedragen taken.4) Ieder van de Deelnemers kan besluiten
      een taak, bedoeld in lid 3, of een deel daarvan, zelf te gaan verrichten. De
      opdracht van die taak aan de Centrumgemeente vervalt met ingang van het eerstvolgende
      kalenderjaar na bekendmaking van dat besluit aan de Deelnemers, de Centrumregeling,
      en de Centrumgemeente, mits dat besluit niet later dan drie maanden voorafgaand
      aan dat kalenderjaar bekend is gemaakt. Bij een dergelijk besluit dienen de
      Deelnemers en de Centrumgemeente in goed overleg af te stemmen over de reële
      afbouwmogelijkheden en/of frictiekosten die voortvloeien uit de overdracht van
      de taak.5) Over de uitvoering van deze taken bedoeld in dit artikel kunnen de
      Deelnemers nadere afspraken maken met de Centrumgemeente, onder meer zoals bedoeld
      in artikel 10 van deze regeling.
  - kop_artikel: Artikel 5 Bevoegdheden colleges en burgemeesters
    inhoud_artikel: 1) De Colleges verlenen mandaat aan de Centrumgemeente om de bevoegdheden
      uit te oefenen op grond van de Wmo 2015 en artikel 160 Gemeentewet voor zover
      die nodig zijn voor de uitvoering van de taken die ingevolge artikel 4 aan de
      Centrumgemeente zijn opgedragen en zolang het besluit als bedoeld in artikel
      4 lid 4 niet in werking is getreden.2) De Colleges staan toe dat de Centrumgemeente
      voor de gemandateerde bevoegdheden ondermandaat verleent aan haar medewerkers.3)
      De Burgemeesters dragen op grond van artikel 171 lid 2 Gemeentewet de bevoegdheid
      om hun gemeente in en buiten rechte te vertegenwoordigen op aan de Centrumgemeente,
      of een nader door deze aan te wijzen persoon voor zover dit nodig is voor de
      uitvoering van de taken die ingevolge artikel 4 aan de Centrumgemeente zijn
      opgedragen.
