description:
  text: De gemeenschappelijke regeling Reinigingsdiensten Rd4 heeft de volledige afvalzorgplicht
    voor de gemeenten Beekdaelen, Brunssum, Eijsden-Margraten, Gulpen-Wittem, Heerlen,
    Kerkrade, Landgraaf, Simpelveld, Vaals en Voerendaal. Dit doet zij door een zo
    optimaal mogelijke exploitatie en beheer (maatschappelijke, financieel en milieu)
    van de gehele afvalketen, namelijk het inzamelen, sorteren en bewerken van afval-
    en grondstoffen afkomstig uit de deelnemende gemeenten, reinigen van de openbare
    ruimten en daarmee samenhangende taken, het bestrijden van onkruid, het opruimen
    van afval dumpingen, het verrichten van transportwerkzaamheden, het bestrijden
    van gladheid, het verrichten van kringloopactiviteiten en het vermarkten van afval-
    en grondstofstromen. Daarnaast beheert en exploiteert Rd4 8 grondstoffenparken
    en 3 RD4U kringloopwinkels.Tevens heeft Rd4 de taak om de deelnemende gemeenten
    te adviseren t.a.v. beleid.
