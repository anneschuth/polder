  bevoegdheden:
  - kop_artikel: Artikel 5 – Bevoegdheden
    inhoud_artikel: 1. Aan het bestuur van de Regio worden geen bevoegdheden overgedragen.2.
      In afwijking van lid 1 kunnen bevoegdheden worden overgedragen, indien alle
      deelnemers daartoe eensluidend besluiten en het Algemeen Bestuur instemt met
      de overdracht van bevoegdheden.3. In afwijking van lid 1 kunnen aanvragen van
      subsidies en Specifieke Uitkeringen (SPUK’s) ingediend en uitgekeerd worden
      door het Algemeen Bestuur conform een daartoe opgestelde verordening.4. Voor
      de uitvoering van programma’s en projecten, als bedoeld in artikel 4, kunnen
      de colleges mandaat verlenen aan het bestuur van de Regio, alsmede aan de regiosecretaris.
      Het betreffende bestuursorgaan stemt in met de mandaatverlening. Voor mandaatverlening
      aan de regiosecretaris is de instemming van het Algemeen Bestuur vereist, onverminderd
      het bepaalde in artikel 10:4 van de Algemene wet bestuursrecht.5. Het Algemeen
      Bestuur is bevoegd tot de oprichting van en de deelneming in stichtingen, maatschappen,
      vennootschappen, verenigingen, coöperaties, gemeenschappelijke regelingen en
      onderlinge waarborgmaatschappijen, indien dit in het bijzonder aangewezen moet
      worden geacht voor de behartiging van het daarmee te dienen openbaar belang.
      Het besluit wordt niet genomen dan nadat de raden van de deelnemende gemeenten
      een ontwerpbesluit is toegezonden en in de gelegenheid zijn gesteld hun wensen
      en bedenkingen ter kennis van het Algemeen Bestuur te brengen.
