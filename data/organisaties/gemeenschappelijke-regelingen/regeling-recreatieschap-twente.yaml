  bevoegdheden:
  - kop_artikel: Artikel 9 Bevoegdheden bestuur
    inhoud_artikel: Het bestuur is in ieder geval bevoegd:a. Tot het aanwijzen, schorsen
      en ontslaan van de directeur/secretaris van het Recreatieschap Twente;.b. Regels
      vast te stellen over de ambtelijke organisatie;c. Tot privaatrechtelijke rechtshandelingen
      te besluiten;d. Te besluiten namens Recreatieschap Twente rechtsgedingen, bezwaarschriftenprocedures
      of administratief beroepsprocedures te voeren of rechtshandelingen ter voorbereiding
      daarop te verrichten.e. Tot het beheer van activa en passiva van Recreatieschap
      Twente;f. De zorg, voor zover die niet aan anderen toekomt, voor de controle
      op het geldelijke beheer en de boekhouding;g. Tot het houden van een gedurig
      toezicht op al wat Recreatieschap Twente aangaat.h. Tot het beheren en onderhouden
      van de gebouwen, werken en inrichtingen welke Recreatieschap Twente bezit of
      op enigerlei wijze onder zich heeft; eni. Het vaststellen van de plannen en
      voorwaarden van aanbesteding van werken en leveranties ten behoeve van Recreatieschap
      Twente.
