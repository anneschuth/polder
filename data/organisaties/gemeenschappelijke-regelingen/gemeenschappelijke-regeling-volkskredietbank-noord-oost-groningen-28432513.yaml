gr_meta:
  citeertitel: Gemeenschappelijke Regeling Volkskredietbank Noord-Oost Groningen
  doel: De bank is een kredietbank als bedoeld in artikel 5 Wck en heeft geen winstoogmerk.
    De regeling wordt getroffen ten bate van een zo doelmatig mogelijke uitvoering
    van de volgende belangen:a. het verlenen van hulp om te komen tot een financieel
    stabiele situatie bij burgers die in financiële moeilijkheden verkeren of dreigen
    te raken;b. het op zakelijke en sociaal verantwoorde wijze voorzien in de behoefte
    aan sociale kredieten;c. het voorkomen van maatschappelijk minder gewenste vormen
    van financiële dienstverlening.
