  bevoegdheden:
  - kop_artikel: Artikel 5 Overdracht en uitvoering wettelijke bevoegdheden
    inhoud_artikel: 1. Met inachtneming van het bepaalde in artikel 30, eerste lid,
      onder a en b, van de Wet gemeenschappelijke regelingen, worden aan de bestuursorganen
      van de bank – met uitzondering van de bevoegdheden genoemd in artikel 2 Wgs
      – integraal alle bevoegdheden van regeling en bestuur van de deelnemende gemeenten
      overgedragen met betrekking tot:a. de uitvoering van de Wet gemeentelijke schuldhulpverlening;b.
      het beslissen op bezwaar en het voeren van verweer in beroepsprocedures met
      betrekking tot de Wet gemeentelijke schuldhulpverlening;c. de in artikel 4 lid
      2 genoemde regelgeving;d. enige andere wettelijke bepaling of beleidsregel aangaande
      het in artikel 3 genoemde doel van de regeling.2. Voor de uitvoering van enige
      wettelijke bepaling betreffende de in artikel 3 genoemde doelstelling, treden
      de organen van de bank in de plaats van de respectievelijke bestuursorganen
      van de deelnemers, ieder voor zover het hen aangaat.
