  citeertitel: Gemeenschappelijke regeling Technology Base
  doel: Technology Base heeft als doel de integrale gebiedsontwikkeling, binnen door
    de deelnemers gestelde kaders van het Projectgebied - ten behoeve van toekomstbestendige
    bestemmingen die een belangrijke bijdrage zullen leveren aan de economie, ecologie,
    natuur, woningbouw en leefbaarheid van de regio.Het planologisch kader voor de
    gebiedsontwikkeling wordt gevormd door de vigerende bestemmingsplannen van de
    gemeenten Dinkelland en Enschede, structuurvisies en de Beleidsregel ruimtelijke
    kwaliteit voormalige Vliegbasis Twenthe.
