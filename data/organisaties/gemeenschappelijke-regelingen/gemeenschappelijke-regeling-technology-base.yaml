  bevoegdheden:
  - kop_artikel: Artikel 5. Bevoegdheden
    inhoud_artikel: Dit artikel bevat geen limitatieve opsomming van de bevoegdheden
      van Technology Base en beoogt geen beperking aan te brengen in de bevoegdheden
      die Technology Base van rechtswege heeft.1. Met betrekking tot de in artikel
      4 genoemde taken behoren aan Technology Base onder meer de volgende bevoegdheden:a.
      Het verkrijgen en vervreemden van de eigendom van onroerende en roerende zaken.b.
      Het aangaan van erfpachtovereenkomsten, huur- en gebruiksovereenkomsten.c. Het
      aangaan van overeenkomsten en aanbesteden van werken, diensten en leveringen
      met betrekking tot de voorbereiding en uitvoering van de gebiedsontwikkeling
      en het beheer van de tot het Projectgebied behorende gronden en het vastgoed.d.
      Het aangaan van geldleningen en rekening-courantovereenkomsten en het waarborgen
      van geldelijke verplichtingen.e. Het aangaan van organisatorische en/of facilitaire
      samenwerking met derden, waaronder andere overheidslichamen, maatschappelijke
      organisaties, onder meer op het gebied van natuur en milieu en andere belangenorganisaties,
      indien dat voor een effectieve behartiging van de belangen van Technology Base
      noodzakelijk is.f. Het oprichten van of deelnemen in rechtspersonen, aan wie
      opdracht wordt gegeven om onderdelen van de in art. 4 genoemde taken binnen
      de doelstelling van de Gemeenschappelijke regeling feitelijk te realiseren.
