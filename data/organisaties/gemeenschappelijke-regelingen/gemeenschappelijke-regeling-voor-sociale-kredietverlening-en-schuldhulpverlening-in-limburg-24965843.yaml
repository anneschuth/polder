  bevoegdheden:
  - inhoud_artikel: Hoofdstuk 5 De bevoegdheden en taken van het bestuurArtikel 18Aan
      het bestuur worden ten behoeve van de behartiging van de in artikel 3 lid 2
      van de regeling vermelde taken dezelfde bevoegdheden overgedragen, welke de
      gemeentebesturen ter zake hebben.§ 1 Het algemeen bestuurArtikel 191. Aan het
      algemeen bestuur behoort alle bevoegdheid, die niet bij of krachtens de regeling
      is opgedragen aan het dagelijks bestuur of aan de voorzitter.2. Het algemeen
      bestuur kan besluiten tot de oprichting van en de deelneming in stichtingen,
      maatschappen, vennootschappen, verenigingen, coöperaties en onderlinge waarborgmaatschappijen,
      indien dat in het bijzonder aangewezen moet worden geacht voor de behartiging
      van het daarmee te dienen openbaar belang. Het besluit wordt niet genomen dan
      nadat de raden van de gemeenten een ontwerpbesluit is toegezonden en in de gelegenheid
      zijn gesteld hun wensen en bedenkingen ter kennis van het algemeen bestuur te
      brengen.§ 2 Het dagelijks bestuurArtikel 20Het dagelijks bestuur is bevoegd:a.
      het dagelijks bestuur van Kredietbank Limburg te voeren, voor zover niet bij
      of krachtens de wet het algemeen bestuur hiermee is belast;a. beslissingen van
      het algemeen bestuur voor te bereiden en uit te voeren;b. regels vast te stellen
      over de ambtelijke organisatie van Kredietbank Limburg;c. ambtenaren te benoemen,
      te schorsen en te ontslaan;d. tot privaatrechtelijke rechtshandelingen van Kredietbank
      Limburg te besluiten, met uitzondering van privaatrechtelijke rechtshandelingen
      als bedoeld in artikel 19, tweede lid;e. te besluiten namens Kredietbank Limburg,
      het dagelijks bestuur of het algemeen bestuur rechtsgedingen, bezwaarprocedures
      of administratief beroepsprocedures te voeren of handelingen ter voorbereiding
      daarop te verrichten, tenzij het algemeen bestuur, voor zover het algemeen bestuur
      aangaat, in voorkomende gevallen anders beslist;f. tot het nemen van alle conservatoire
      maatregelen en het doen wat nodig is ter voorkoming van verjaring of verlies
      van recht of bezit.§ 3 De voorzitterArtikel 211. De voorzitter is belast met
      de leiding van de vergaderingen van het algemeen en dagelijks bestuur.2. Hij
      is belast met de uitvoering van de besluiten van het dagelijks bestuur.3. De
      voorzitter vertegenwoordigt Kredietbank Limburg in en buiten rechte. Hij kan
      de vertegenwoordiging aan een door hem aan te wijzen gemachtigde opdragen.
