  doel: 1. De regeling heeft tot doel:a. hulp te verlenen aan burgers die door hun
    schuldenlast in maatschappelijke problemen zijn of kunnen komen, door middel van
    schuldhulpverlening;b. hulp te verlenen aan burgers die zelf niet in staat zijn
    hun financiële zaken te behartigen, hetzij door middel van budgetbeheer, hetzij
    door middel van beschermingsbewind;c. het op een verantwoorde wijze voorzien in
    de behoefte aan krediet, door middel van sociale kredietverlening.
