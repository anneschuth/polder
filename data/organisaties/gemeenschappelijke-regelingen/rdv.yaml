description:
  text: Gemeenschappelijke regeling Regio De Vallei is een samenwerking van gemeenten
    Barneveld, Ede, Nijkerk, Scherpenzeel en Wageningen. De regio heeft tot taak het
    gezamenlijk aanbesteden, contracteren, beheren en beëindigen van contracten ten
    aanzien van de daarvoor door de deelnemende gemeenten aan te wijzen onderdelen
    van de verwerking van huishoudelijk afval. En het afstemmen en in samenwerking
    ontwikkelen van beleid, uitwisselen van kennis en ervaring en adviseren over huishoudelijk
    afval ten behoeve van de deelnemende gemeenten.Het secretariaat van de regio wordt
    ingevuld door gemeente Ede.
