  bevoegdheden:
  - kop_artikel: Artikel 5 Algemene bepalingen
    inhoud_artikel: 1. Drechtsteden vervult ten behoeve van de in artikel 4 genoemde
      doelstelling de taken:a. welke in deze regeling in artikel 6, eerste lid als
      autonome taken zijn aangeduid;b. welke bij afzonderlijk eensluidend besluit
      van het (de) bevoegde bestuursorga(a)n(en) van alle gemeenten aan Drechtsteden
      zijn gedelegeerd.c. welke bij afzonderlijk eensluidend besluit van het (de)
      bevoegde bestuursorga(a)n(en) van alle gemeenten aan Drechtsteden zijn gemandateerd
      dan wel waarvoor volmacht of machtiging is verleend.d. welke worden uitgevoerd
      ten behoeve van één of enkele gemeenten en bij afzonderlijk eensluidend besluit
      van de bevoegde bestuursorganen van deze gemeenten zijn gemandateerd dan wel
      waarvoor volmacht of machtiging is verleend en door de Drechtraad zijn aanvaard.e.
      welke worden uitgevoerd ten behoeve van de gemeenten en door deze gemeenten
      zijn opgedragen aan Drechtsteden in artikel 7, eerste lid, van deze regeling.2.
      De in het eerste lid genoemde besluiten bevatten tevens de aanduiding van de
      specifieke bevoegdheden die door de gemeente(n) worden overgedragen aan de Drechtsteden.3.
      Naast de in het eerste lid bedoelde taken kan Drechtsteden ook de uitvoering
      van taken ten behoeve van ook andere dan de in de aanhef genoemde gemeenten,
      rijk, provincie en andere publiekrechtelijke lichamen op zich nemen.4. De uitvoering
      van de in het derde lid bedoelde taken kan plaatsvinden door middel van een
      daartoe tussen het betreffende overheids-/publiekrechtelijke lichaam en Drechtsteden
      te sluiten overeenkomst en door middel van deelname door het betreffende overheids-/publiekrechtelijke
      lichaam aan de regeling voor die ta(a)k(en), onder door de Drechtraad te stellen
      voorwaarden.
