gr_meta:
  citeertitel: Gemeenschappelijke regeling Drechtsteden
  doel: 1. Drechtsteden heeft tot doel, binnen de kaders als genoemd in en voortvloeiend
    uit deze regeling, draagvlak te creëren voor een evenwichtige ontwikkeling van
    het gebied.2. Ter verwezenlijking van de in het vorige lid genoemde doelstelling
    behartigt Drechtsteden, met inachtneming van de autonomie van de deelnemende gemeenten,
    de gemeenschappelijke regionale belangen op de volgende terreinen:a. Economie,
    arbeidsmarktbeleid en bereikbaarheid (economie, grondzaken, bereikbaarheid, recreatie
    en toerisme)b. Fysiek (volkshuisvesting, wonen, ruimtelijke ontwikkeling en ruimtelijk
    beheer, duurzaamheid, milieu, water, publieke infrastructuur, externe -, water-
    en verkeersveiligheid)c. Sociaal (sociale zekerheid en - ontwikkeling, sociale
    werkvoorziening, kennisinfrastructuur, sport en cultuur)d. Bestuurlijke – en netwerkontwikkelinge.
    Staf- en ondersteunende diensten, beheer basisregistraties en de bedrijfsvoeringf.
    Sociaal-geografisch onderzoektvoering van de belastingheffing en -invordering.g.
    De uitvoering van de belastingheffing en -invordering.3. Naast de in het tweede
    lid genoemde belangen heeft Drechtsteden als doelstelling zorg te dragen voor:a.
    de efficiënte en effectieve heffing en invordering van belastingen, voor de heffing
    en invordering waarvan de gemeenteraden van de gemeenten belastingverordeningen
    en de kwijtscheldingsregels hebben vastgesteld, elk voor zover het hun gebied
    betreft;b. de uitvoering van de Wet WOZ waaronder tevens wordt begrepen de administratie
    van vastgoedgegevens en het verstrekken van vastgoedgegevens aan de deelnemers
    en derden, elk voor zover het hun gebied betreft.
