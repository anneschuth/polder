  bevoegdheden:
  - kop_artikel: Artikel 5 – Bevoegdheden
    inhoud_artikel: 1. Aan het bestuur van de Regio worden geen bevoegdheden overgedragen.2.
      Voor de uitoefening van programma’s en projecten, als bedoeld in artikel 4,
      kunnen de colleges mandaatverlenen aan het bestuur van de Regio, alsmede aan
      de regiosecretaris. Het betreffende bestuursorgaan stemt in met de mandaatverlening,
      voor mandaatverlening aan de regiosecretaris is de instemming van het algemeen
      bestuur vereist, onverminderd het bepaalde in artikel 10:4 van de Algemene wet
      bestuursrecht.
