  bevoegdheden:
  - kop_artikel: '6'
    inhoud_artikel: 1. De Deelnemers dragen aan de Bedrijfsvoeringsorganisatie en
      haar Bestuur de bevoegdheden over die nodig zijn voor de uitvoering van de taak
      bedoeld in artikel 4 voor zover de Bedrijfsvoeringsorganisatie deze taak of
      onderdelen daarvan voor de betrokken Deelnemer uitvoert op basis van de gesloten
      Dienstverleningsovereenkomst.2. Voor de taken bedoeld in artikel 5, eerste lid,
      kan overdracht van bevoegdheden plaatsvinden op voorstel van de betrokken Deelnemer.
      De Regeling hoeft niet te worden gewijzigd.3. De Deelnemers dragen aan de Bedrijfsvoeringsorganisatie
      en haar Bestuur geen publiekrechtelijke bevoegdheden over.4. De Bedrijfsvoeringsorganisatie
      sluit zich aan bij de Werkgeversvereniging samenwerkende gemeentelijke organisaties
      (SGO), die door de Vereniging van Nederlandse Gemeenten op 11 december 2019
      is opgericht.
