  citeertitel: Gemeenschappelijke Regeling PlusOV
  doel: De Bedrijfsvoeringsorganisatie is ingesteld voor de gemeenschappelijke behartiging
    van de belangen van de Deelnemers met betrekking tot het tot stand brengen en
    in stand houden van kwalitatief hoogwaardig, herkenbaar, efficiënt en eenvoudig
    te gebruiken Doelgroepenvervoer.
