  bevoegdheden:
  - inhoud_artikel: 1. Aan het Algemeen Bestuur komen in het kader van deze regeling
      alle bevoegdheden toe, tenzij bij wet of in deze regeling anders in bepaald.2.
      De volgende bevoegdheden van het Algemeen Bestuur zijn niet overdraagbaar:a.
      het vaststellen en wijzigen van de begroting, van de grondexploitatie, van de
      meerjarenraming en het vaststellen van de jaarrekening;b. het vaststellen en
      wijzigen van een reglement van orde voor de vergaderingen van het Algemeen en
      het Dagelijks Bestuur;c. het overeenkomstig artikel 212 Gemeentewet jo. artikel
      216 Provinciewet vaststellen en wijzigen van een verordening over de uitgangspunten
      voor het financiële beleid, en van regels voor het financieel beheer en voor
      de inrichting van de financiële organisatie;d. het overeenkomstig artikel 213/213a
      Gemeentewet jo. artikel 217 Provinciewet vaststellen en wijzigen van een verordening
      met regels voor de controle op het financiële beheer, en van de inrichting van
      de financiële organisatie;e. het doen van voorstellen tot wijziging van de regeling
      in verband met uitbreiding van het RBT-gebied, met de toetreding tot of de uittreding
      uit de regeling van een of meer deelnemers en in verband met de opheffing van
      deze gemeenschappelijke regeling.3. Besluiten met betrekking tot de in dit artikel
      genoemde bevoegdheden kunnen met een gewone meerderheid van stemmen binnen het
      Algemeen Bestuur worden genomen, tenzij in deze regeling anders is aangegeven.
