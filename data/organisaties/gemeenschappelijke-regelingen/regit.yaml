description:
  text: '1. De Bedrijfsvoeringsorganisatie heeft tot doel:2. Het voeren van regie
    op de volledige ICT-voorziening ten behoeve van de deelnemende Gemeenten en de
    uitvoering van de in de dienstverleningsovereenkomsten opgesomde activiteiten.3.
    De Bedrijfsvoeringsorganisatie heeft de volgende kwalitatieve doelstellingen:•
    De gebruiker centraal: RegIT richt zich met de ICT-voorziening op het ondersteunen
    van de eindgebruiker, om zowel inwoners als gemeentelijke medewerkers optimaal
    te bedienen;• Toekomstbestendige ICT-voorziening: Een stabiele basis waarop ruimte
    ontstaat voor innovatie, zodat Deelnemers klaar zijn voor de uitdagingen van morgen;•
    ‘In control’: RegIT stuurt op kwaliteit, continuïteit, veiligheid, schaalvoordelen,
    kosten en resultaten van de gemeentelijke ICT-voorziening;• Goede samenwerking:
    RegIT versterkt de band tussen Gemeenten als gezamenlijke eigenaars. De Deelnemers
    werken nauw samen en delen hun verantwoordelijkheden, tenzij er overtuigende en
    afgestemde redenen zijn dit niet te doen.'
