  bevoegdheden:
  - kop_artikel: Artikel 8 Bevoegdheden
    inhoud_artikel: 1. De Bedrijfsvoeringsorganisatie heeft een Bestuur.2. Alle bevoegdheden
      die bij of krachtens Wet van toepassing zijn op de Bedrijfsvoeringsorganisatie
      komen toe aan het Bestuur.3. De Deelnemers dragen geen beleidsbevoegdheden over
      aan de Bedrijfsvoeringsorganisatie.4. De Deelnemers stellen de benodigde mandaten,
      volmachten en machtigingen vast voor het realiseren van de doelstellingen uit
      artikel 5 en de taken uit artikel 6 lid 1.5. Het Bestuur is bevoegd om uitvoerende
      bevoegdheden die niet wettelijk zijn voorbehouden aan het Bestuur, te mandateren
      aan gemeentesecretarissen of directeur, conform artikel 19.
