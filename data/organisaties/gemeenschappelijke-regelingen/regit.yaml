gr_meta:
  citeertitel: RegIT
  doel: Deze Regeling heeft als doel de samenwerking tussen de Deelnemers op het gebied
    van ICT-voorziening via een gezamenlijke ICT-regieorganisatie te regelen. Hiermee
    wordt geborgd dat de Deelnemers digitaal kunnen werken, voorbereid zijn op een
    veranderende digitale toekomst en gegevens veilig, betrouwbaar en efficiënt kunnen
    beheren.
