  bevoegdheden:
  - kop_artikel: Toelichting bij artikel 8 Bureau van de ombudsman
    inhoud_artikel: De medewerkers van het bureau komen in dienst van de gemeente
      Amsterdam. Uit artikel 160, eerste lid, onder d, van de Gemeentewet volgt dat
      het college besluit tot het aangaan van een arbeidsovereenkomst met deze ambtenaren.
      De ambtenaren van het bureau zijn verder ter zake van de inhoudelijke werkzaamheden
      uitsluitend verantwoording verschuldigd aan de ombudsman. Het college mag bovendien
      aan deze ambtenaren geen andere werkzaamheden opdragenDe CAO Gemeenten, de CAO
      Amsterdam en andere voor ambtenaren van de gemeente Amsterdam geldende arbeidsrechtelijke
      regelingen zijn van toepassing op de ambtenaren werkzaam bij de ombudsman.In
      een apart besluit wordt voor arbeidsrechtelijke bevoegdheden ten aanzien van
      de ambtenaren van het bureau een volmacht gegeven door het college van Amsterdam
      aan de ombudsman.In een apart besluit worden ook mandaat, machtiging en volmacht
      geregeld ten aanzien van de overige bedrijfsvoeringsaspecten die het bureau
      van de ombudsman aangaan.
