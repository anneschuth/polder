  bevoegdheden:
  - kop_artikel: Artikel 6
    inhoud_artikel: 1. De in artikel 4 omschreven activiteiten kunnen ook voor andere
      rechtspersonen, niet zijnde de deelnemers worden uitgeoefend krachtens overeenkomst.2.
      Het algemeen bestuur besluit tot het aangaan van een overeenkomst als bedoeld
      in het eerste lid. In afwijking van hetgeen bepaald in artikel 11 neemt het
      algemeen bestuur dit besluit bij eenparigheid van stemmen.3. Het algemeen bestuur
      kan de bevoegdheid genoemd in het tweede lid niet delegeren en evenmin mandateren.4.
      Het algemeen bestuur ziet bij de uitoefening van de in het tweede lid genoemde
      bevoegdheid op toe dat de opbrengst van activiteiten bedoeld in het eerste lid
      niet meer dan een marginaal percentage van de omzet van het samenwerkingsverband
      bedraagt. Het algemeen bestuur stelt hieromtrent nadere regels vast.
