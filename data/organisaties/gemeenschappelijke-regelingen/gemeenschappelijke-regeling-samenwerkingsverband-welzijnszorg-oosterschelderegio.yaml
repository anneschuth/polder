  citeertitel: Gemeenschappelijke regeling Samenwerkingsverband Welzijnszorg Oosterschelderegio
  doel: De regeling is getroffen met het oog op de volgende belangen:a. de realisering
    van de gezamenlijke beleidsvoorbereiding, besluitvorming en beleidsuitvoering
    op het terrein van de welzijnszorg;b. het bevorderen van de onderlinge afstemming
    van beleid van de deelnemers over voorzieningen en aangelegenheden op het terrein
    van de welzijnszorg, anders dan bedoeld onder a.
