description:
  text: Recreatieschap Groengebied Amstelland is de bestuurlijke organisatie die verantwoordelijk
    is voor de ontwikkeling en het beheer van het bijzondere recreatiegebied Groengebied
    Amstelland. Recreatie Noord-Holland beheert in opdracht van het recreatieschap
    de recreatiegebieden binnen Groengebied Amstelland. Centraal hierbij staat dat
    alle bezoekers naar hartenlust van de bijzondere omgeving kunnen genieten.
  url: https://www.groengebied-amstelland.nl/over/over-de-organisatie
