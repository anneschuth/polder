description:
  text: Het Samenwerkingsverband Welzijnszorg Oosterschelderegio (SWVO) is een gemeenschappelijke
    regeling.  De gemeenten Borsele, Goes, Kapelle, Noord-Beveland, Reimerswaal, Schouwen-Duiveland
    en Tholen hebben het SWVO de opdracht gegeven om hun gezamenlijke belangen te
    behartigen en hen te ondersteunen op de volgende beleidsterreinen:- Wmo- Volwasseneneducatie-
    Gezondheid- Cultuur en bibliotheek- Maatschappelijk werk en Cliëntondersteuning-
    Leerlingenvervoer- Jeugd
  url: https://www.swvo.nl/ons-werk/
