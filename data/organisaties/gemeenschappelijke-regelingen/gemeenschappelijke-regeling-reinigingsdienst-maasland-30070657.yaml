  citeertitel: gemeenschappelijke regeling "Reinigingsdienst Maasland"
  doel: Het openbaar lichaam heeft tot doel:- het tot stand brengen van een samenwerking
    tussen de deelnemers op het terrein van het (doen) inzamelen en bewerken van afvalstoffen,
    het reinigen van de openbare ruimten en de daarmee samenhangende taken;- het behartigen
    van de gemeenschappelijke belangen van de gemeenten in het kader van de rechten
    en plichten ten opzichte van de Vereniging Afval Samenwerking Limburg (ASL), die
    neergelegd zijn in de door de aangesloten gemeenten afgesloten contracten.
