  bevoegdheden:
  - kop_artikel: Artikel 6. Taken en Bevoegdheden
    inhoud_artikel: 1. Ter verwezenlijking van de doelstellingen van artikel 5, wordt
      een openbaar lichaam in stand gehouden en geëxploiteerd. Aan het openbaar lichaam
      komen de in dit artikel opgenomen taken van (beleids)uitvoerende aard toe.2.
      Het openbaar lichaam voert de taken voor de deelnemers uit in de vorm van basistaken
      en plustaken.3. Het openbaar lichaam voert één of meer van de volgende basistaken
      uit voor de deelnemende gemeenten:a. afvalbeheer (inzameling en beheer milieustraten);b.
      het verrichten van kringloopactiviteiten, en;c. beleidsadvisering en voorlichting.4.
      In aanvulling op het bepaalde in het derde lid geldt dat de op 1 juli 2024 bestaande
      uitzonderingen op de in het derde lid genoemde basistaken, voor zover vastgelegd
      in de dienstverleningsovereenkomst tussen het openbaar lichaam en de betreffende
      gemeente, worden gerespecteerd.5. Het openbaar lichaam kan onder meer de volgende
      plustaken uitvoeren, waaronder, maar niet uitsluitend:a. straatreiniging (o.a.
      mechanisch vegen, handmatig vegen, verwijderen zwerfafval op verhardingen, onkruidbestrijding
      verhardingen, verwijderen hondenpoep op hondenuitlaat plekken, legen straatprullenbakken);b.
      kolkenreiniging;c. ongediertebestrijding;d. groenbeheer (zwerfafval verwijderen
      in groen, schoffelen, maaien, snoeien en opstellen en uitvoeren beheerplannen);e.
      klein civieltechnisch (onderhoud, beheer en instandhouding van straatmeubilair,
      borden, herstel bestrating);f. gladheidsbestrijding;g. onderhoud groen op sportcomplexen
      en onderhoud groen op begraafplaatsen;h. overige werkzaamheden (o.a. graffiti
      en kauwgom verwijderen);i.  inzet op basis van oproep (geen planning).
