  citeertitel: Gemeenschappelijke regeling Vervoerregio Amsterdam
  doel: De Vervoerregio Amsterdam heeft tot taak, met inachtneming van hetgeen in
    deze regeling is bepaald, die belangen te behartigen, welke verband houden met
    de verkeers- en vervoerstaak die voortvloeit uit het Besluit Vervoerregio, de
    Wet personenvervoer 2000 en de Wet lokaal spoor.
