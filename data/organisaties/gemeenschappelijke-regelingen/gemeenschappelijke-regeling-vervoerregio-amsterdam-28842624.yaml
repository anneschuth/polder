  bevoegdheden:
  - kop_artikel: Artikel 5
    inhoud_artikel: Ter behartiging van het in artikel 4 genoemde belang, alsmede
      ter uitvoering van de wet en daarop berustende wettelijke (uitvoerings-)maatregelen,
      is de Vervoerregio Amsterdam bevoegd tot:a. het aangeven van hoofdlijnen van
      de gewenste ontwikkeling van het gebied door middel van planning, sturing en
      coördinatie,b. uitvoering van gemeentelijke taken, die aan de Vervoerregio Amsterdam
      zijn overgedragen,c. het verlenen van diensten,d. uitoefening van taken van
      rijk en/of provincie(s), wanneer de Vervoerregio Amsterdam daartoe in staat
      wordt gesteld.
