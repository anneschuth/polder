  bevoegdheden:
  - kop_artikel: Artikel 8 Bevoegdheden
    inhoud_artikel: 1. Het bestuur is verantwoordelijk voor de verdeling van taken,
      verantwoordelijkheden en bevoegdheden binnen de gemeenschappelijke regeling
      en diensten zoals vastgelegd in het dienstverleningshandvest.2. Het bestuur
      beoordeelt en stelt vast:• de door Stadsbeheer opgestelde periodieke managementrapportages•
      de door Stadsbeheer opgestelde exploitatiebegrotingen en eindafrekeningen• de
      door de Commissie van Advies opgevoerde c.q. verantwoorde kosten.3. Het bestuur
      regelt de wijze van interne communicatie richting de gemeenten.4. Het bestuur
      besluit niet tot het vaststellen van meerjarige strategische plannen dan nadat
      de raden van de deelnemende gemeenten gedurende twaalf weken in de gelegenheid
      zijn gesteld om schriftelijk hun zienswijzen op het concept bij het bestuur
      naar voren te brengen.5. Het bestuur beslist niet over een voorstel alvorens
      de raden om zienswijzen zijn gevraagd, wanneer ten minste twee gemeenteraden
      het bestuur hierom verzoeken. In spoedeisende gevallen kan het bestuur afzien
      van het vragen van zienswijzen. Het bestuur stelt de raden hiervan schriftelijk
      en gemotiveerd op de hoogte.6. Indien het vijfde lid wordt toegepast, dan hebben
      de raden twaalf weken de tijd hun zienswijzen bij het bestuur naar voren te
      brengen. Voorafgaande aan het nemen van het besluit waarover de zienswijzen
      gegeven is stelt het bestuur de raden schriftelijk en gemotiveerd in kennis
      van het oordeel over de zienswijzen, alsmede van de eventuele conclusies die
      het daaraan verbindt.
