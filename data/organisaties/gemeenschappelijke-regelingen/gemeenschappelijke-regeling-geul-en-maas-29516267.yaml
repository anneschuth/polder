gr_meta:
  citeertitel: Gemeenschappelijke regeling Geul en Maas
  doel: Het gemeenschappelijk orgaan heeft tot doel het realiseren van een effectieve,
    efficiënte, kwalitatief hoogwaardige en duurzame beleidsondersteuning en uitvoering
    van het afval- en grondstoffenbeheer en schoontaken in brede zin alsmede andere
    gerelateerde taken die door de gemeenten middels eensluidend besluit zijn aangewezen.Het
    gemeenschappelijk orgaan draagt daarmee bij aan de beleidsdoelstellingen van de
    deelnemende gemeenten, zoals bescherming van het milieu en duurzaamheid, het bieden
    van regionale werkgelegenheid, het leveren van goede service en betaalbaarheid
    van de diensten.
