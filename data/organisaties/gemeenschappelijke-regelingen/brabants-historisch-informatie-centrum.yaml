description:
  text: Het Brabants Historisch Informatie Centrum (BHIC) is het Regionaal Historisch
    Centrum (RHC) van Noord-Brabant. We zijn een archiefinstelling met bijna 40 km.
    aan papieren archieven.Daarnaast beschikken we over een duurzame digitale archiefbewaarplaats
    (E-depot).Het werkgebied van het BHIC beslaat de Provincie Noord-Brabant, 9 gemeenten,
    3 waterschappen en 12 gemeenschappelijke regelingen.Voor de organisaties in dit
    uitgebreide werkgebied zijn we adviseur, archiefbewaarplaats en zijn we voor een
    aantal overheden ook toezichthouder en archivaris.Ook bewaren en beheren we diverse
    particuliere archieven en collecties.
