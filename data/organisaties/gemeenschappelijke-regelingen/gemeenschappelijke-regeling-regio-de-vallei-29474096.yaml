  bevoegdheden:
  - kop_artikel: ARTIKEL 4 BEVOEGDHEDEN
    inhoud_artikel: 1. Aan het bestuur van de regio worden geen bevoegdheden overgedragen.2.
      In afwijking van lid 1 kunnen bevoegdheden worden overgedragen, indien alle
      deelnemers daartoe eensluidend besluiten en het algemeen bestuur instemt met
      de overdracht van bevoegdheden.3. Voor de uitvoering van taken als bedoeld in
      artikel 3 kunnen de colleges mandaat verlenen aan het bestuur van de regio,
      alsmede aan de regiosecretaris. Het betreffende bestuursorgaan stemt in met
      de mandaatverlening. Voor mandaatverlening aan de regiosecretaris is de instemming
      van het algemeen bestuur vereist, onverminderd het bepaalde in artikel 10:4
      van de Algemene wet bestuursrecht.
