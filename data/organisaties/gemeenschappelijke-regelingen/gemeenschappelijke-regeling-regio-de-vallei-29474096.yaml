gr_meta:
  citeertitel: Gemeenschappelijke Regeling Regio De Vallei
  doel: 1. De regio heeft tot doel:In het belang van de deelnemende gemeenten een
    doelmatige en uit oogpunt van milieuhygiëne verantwoorde wijze van verwerking
    van huishoudelijke afvalstoffen en grondstoffen en andere categorieën van afvalstoffen.2.
    De regio heeft tot taak:-        Gezamenlijk aanbesteden, contracteren en beheren
    van contracten ten aanzien van de daarvoor door de deelnemende gemeenten aan te
    wijzen onderdelen van de verwerking van huishoudelijk afval;-        Afstemmen
    en in samenwerking ontwikkelen van beleid, uitwisselen van kennis en ervaring
    en adviseren over huishoudelijk afval ten behoeve van de deelnemende gemeenten.
