  bevoegdheden:
  - kop_artikel: Artikel 5 Overdracht bevoegdheden en toepasselijkheid Gemeentewet
    inhoud_artikel: 1. Ter uitvoering van de in artikel 4 genoemde belangen dragen
      de deelnemende gemeenten aan GBTwente de bevoegdheden over, welke benodigd zijn
      voor de uitvoering van de werkzaamheden met betrekking tot:a. de heffing en
      invordering van belastingen en rechten, enb. de uitvoering van kwijtschelding;c.
      de uitvoering van de Wet waardering onroerende zaken waaronder tevens wordt
      begrepen de administratie van vastgoedgegevens en het verstrekken van vastgoedgegevens
      aan de deelnemers en derden.2. De deelnemers kunnen bij separaat besluit bevoegdheden
      overdragen met betrekking tot overige taken voor wat betreft de in artikel 4,
      lid 3 genoemde belangen.3. Aan GBTwente worden geen verordenende bevoegdheden
      toegekend.4. De uit te voeren taken, werkzaamheden en randvoorwaarden worden
      nader geduid in separate dienstverleningsovereenkomsten per deelnemer en fiscale
      uitvoeringsovereenkomsten per derde.5. Het algemeen bestuur kan besluiten tot
      deelneming/toetreding in een belangenvereniging/werkgeversvereniging ter behartiging
      van één of meer belangen van GBTwente, onverminderd het bepaalde in artikel
      31a van de Wet gemeenschappelijke regelingen.
