  bevoegdheden:
  - inhoud_artikel: 1. De dienst heeft tot doel het gemeenschappelijk belang sociale
      werkvoorziening ten behoeve van de deelnemende gemeenten te behartigen, alsmede
      de hiervoor opgebouwde infrastructuur in te zetten voor re-integratiedoeleinden.2.
      Daartoe dragen de bestuursorganen van de deelnemende gemeenten hun bevoegdheden,
      die noodzakelijk zijn voor de uitvoering van het in lid 1 genoemde belang, over,
      te weten:a. De volledige uitvoering van de wet en van de daaruit voortvloeiende
      voorschriften, voor zover die uitvoering aan de gemeenten is opgedragen.b. Het
      oprichten, exploiteren en in stand houden van bedrijven voor industriële, cultuurtechnische,
      administratieve werkzaamheden, detacheringen en trajectbegeleiding, welke zoveel
      mogelijk zijn gericht op het behouden dan wel bevorderen van de arbeidsbekwaamheid
      van de werknemer mede met het oog op het kunnen verrichten van arbeid onder
      normale omstandigheden.3. Het algemeen bestuur kan binnen het kader van het
      in lid 1 omschreven doel één of meerdere privaatrechtelijke rechtspersonen oprichten.4.
      De gemeentebesturen verplichten zich tot het medewerken aan het vinden van voldoende
      en geëigende werkzaamheden voor de medewerkers.
