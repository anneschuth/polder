gr_meta:
  doel: 1.Het gemeenschappelijk orgaan heeft tot taak toezicht uit te oefenen op het
    bestuur van de stichting, zoals bedoeld wordt in artikel 48 van de Wet op het
    primair onderwijs, en zoals bedoeld wordt in de statuten van de stichting.
