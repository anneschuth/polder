  bevoegdheden:
  - kop_artikel: Artikel 3 Taken en bevoegdheden
    inhoud_artikel: Ten behoeve van dit toezicht zijn aan het gemeenschappelijk orgaan
      de volgende bevoegdheden toegekend:a.het benoemen van de leden van het bestuur
      van de stichting;b.het schorsen of ontslaan van een lid van het bestuur van
      de stichting;c.het bevestigen van het schorsen van een bestuurslid door het
      bestuur van de stichting;d.het goedkeuren van het door het bestuur van de stichting
      voorgelegde ontwerp van de begroting en het ontwerp van de jaarrekening;e.het
      nemen van de nodig geachte maatregelen om de continuïteit van het onderwijsproces
      te waarborgen indien voor 1 februari van het jaar waarvoor een begroting geldt,
      de begroting niet is goedgekeurd;f.het goedkeuren van een wijziging van een
      begroting;g.het goedkeuren van een wijziging van de statuten van de stichting;h.het
      ontbinden van de stichting;i.het hernieuwd in stand houden van de scho(o)l(en)
      waarvan de instandhouding aan de stichting was overgedragen of het overdragen
      daarvan aan een andere rechtspersoon die tot instandhouding van een openbare
      school bevoegd is;j.het besluiten over vereffening bij ontbinding van de stichting.
