    inhoud_artikel: De deelnemers dragen de bevoegdheden die hen bij of krachtens
      de wet zijn toegekend in mandaat op aan het bestuur, voor zover dit nodig is
      voor de uitvoering van de taken, bedoeld in artikel 5. Het bestuur kan daartoe
      een of meer modellen vaststellen voor de mandaatbesluiten.
