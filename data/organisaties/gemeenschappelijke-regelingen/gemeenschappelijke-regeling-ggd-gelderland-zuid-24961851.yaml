  bevoegdheden:
  - kop_artikel: Artikel 6 Bevoegdheden
    inhoud_artikel: 1. Voor zover hiervan niet in deze regeling is afgeweken, en onverminderd
      het bepaalde in artikel 30 van de wet, komen aan de bestuursorganen van de GGD
      Gelderland-Zuid ter behartiging van de in artikel 4 genoemde belangen en ter
      uitvoering van de in artikel 5 genoemde taken alle bevoegdheden toe, die aan
      de bestuursorganen van de deelnemende gemeente behoren, met dien verstande dat
      het algemeen bestuur in de plaats treedt van de raad, het dagelijks bestuur
      in de plaats treedt van het college van burgemeester en wethouders en de voorzitter
      in de plaats van de burgemeester. De bestuursorganen van de deelnemende gemeenten
      oefenen hun bevoegdheden tot regeling en bestuur ten aanzien van deze taken
      niet zelf uit.2. Voorts wordt expliciet aan de GGD Gelderland-Zuid opgedragen
      de bevoegdheid tot oprichting van of deelname in stichtingen, vennootschappen,
      en coöperatieve en andere verenigingen, dan wel het ontbinden daarvan of het
      beëindigen van de deelneming, zulks overeenkomstig artikel 31a van de Wet.3.
      Ten slotte komen aan de bestuursorganen van de GGD Gelderland-Zuid alle bevoegdheden
      toe die in wet- en regelgeving rechtstreeks zijn opgedragen aan (het bestuur
      van) de gemeentelijke gezondheidsdienst.
