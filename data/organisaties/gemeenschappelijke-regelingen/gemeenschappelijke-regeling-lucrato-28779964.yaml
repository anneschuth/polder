  bevoegdheden:
  - kop_artikel: Artikel 4
    inhoud_artikel: Ter behartiging van de belangen genoemd in artikel 3 dragen de
      deelnemers de volgende taken en bevoegdheden over aan het bestuur van de bedrijfsvoeringsorganisatie:a.De
      uitvoering van de Wet sociale werkvoorziening met uitzondering van artikel 14,
      eerste lid, van deze wet onder bij de bedrijfsvoeringsorganisatie;b.De uitvoering
      van artikel 10b van de Participatiewet, beschut werk, onder bij de bedrijfsvoeringsorganisatie;c.De
      uitvoering van artikel 10 van de Participatiewet voor zover het de ondersteuning
      van kansrijke werkzoekenden naar werk betreft met toepassing van de voorzieningen
      gericht op arbeidsinschakeling uit de verordening op grond van de Participatiewet.2.Het
      bestuur is bevoegd tot de oprichting vanen de deelneming in stichtingen, maatschappen,
      vennootschappen, verenigingen , coöperaties, en onderlinge waarborgmaatschappijen
      indien dat in het bijzonder aangewezenmoet worden geacht voor de behartiging
      van het daarmee te dienen openbaar belang. Voordat het besluit wordt genomen
      wordende raden van de deelnemende gemeenten inde gelegenheid gesteld om hun
      wensen en bedenkingen over het ontwerpbesluit ter kennis van het bestuur te
      brengen.
