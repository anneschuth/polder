  bevoegdheden:
  - kop_artikel: Artikel 5. Taken en bevoegdheden
    inhoud_artikel: "1.\tTer behartiging van de belangen zoals vermeld in het voorgaande\
      \ artikel verricht Ferm Werk als basisdienstverlening de uitvoering van de aan\
      \ de deelnemers opgedragen of in de toekomst op te dragen taken in het kader\
      \ van de Wet sociale werkvoorziening, de Participatiewet, de Wet inkomensvoorziening\
      \ oudere en gedeeltelijk arbeidsongeschikte werkloze werknemers, de Wet inkomensvoorziening\
      \ oudere en gedeeltelijk arbeidsongeschikte gewezen zelfstandigen, het Besluit\
      \ bijstandsverlening zelfstandigen en de Wet inburgering 2021.2.\tDe raden en\
      \ de colleges van burgemeester en wethouders van de deelnemers dragen hun bevoegdheden\
      \ met betrekking tot de wetten en regelingen die behoren tot de basisdienstverlening\
      \ volledig over aan de betreffende bestuursorganen van Ferm Werk. Ferm Werk\
      \ zorgt daarbij voor afstemming met de deelnemers alvorens beleid vast te stellen.\
      \ Alvorens gebruik te maken van zijn verordenende bevoegdheden stelt Ferm Werk\
      \ de raden en colleges van de deelnemers in de gelegenheid om hun zienswijzen\
      \ ten aanzien van het voorgenomen besluit kenbaar te maken tenzij het dagelijks\
      \ bestuur oordeelt dat dit uitsluitend een wijziging van technische of redactionele\
      \ aard betreft.3.\tNaast de in het eerste lid genoemde taken kunnen de deelnemers\
      \ als aanvullende dienstverlening de uitvoering van de volgende wetten en regelingen\
      \ of nader te bepalen onderdelen daarvan door Ferm Werk laten verrichten:a.\t\
      Lokale regelingen ter bevordering van maatschappelijke participatie en/of bestrijding\
      \ van armoede;b.\tUitvoerende taken rond huisvesting van vergunninghouders in\
      \ het kader van de Huisvestingswet;c.\tWet Maatschappelijke Ondersteuning.4.\t\
      Voor zover een deelnemer door Ferm Werk aanvullende dienstverlening laat verrichten\
      \ als bedoeld in het voorgaande lid draagt het college van burgemeester en wethouders\
      \ van die deelnemer de uitvoering van concreet omschreven taken over alsmede\
      \ de bevoegdheid om regels te stellen die direct op die uitvoering betrekking\
      \ hebben. Ferm Werk zorgt daarbij voor afstemming met de deelnemer alvorens\
      \ dit uitvoeringsbeleid vast te stellen.5.\tDe deelnemers formuleren ieder voor\
      \ zich de algemene beleidskaders, beleidsprioriteiten en financiële middelen\
      \ m.b.t. het brede sociaal domein.6.\tIn samenhang met hun eigen beleid ten\
      \ aanzien van het sociale domein maken de afzonderlijke deelnemers jaarlijks\
      \ afspraken met Ferm Werk over de doelstellingen en ambities ten aanzien van\
      \ de door Ferm Werk uit te voeren wetten en regelingen en de inzet van instrumenten\
      \ om deze te bereiken; deze afspraken worden jaarlijks vastgelegd."
