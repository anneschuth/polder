  citeertitel: gemeenschappelijke regeling Ferm Werk
  doel: De regeling is getroffen om door het bundelen van krachten de volgende belangen
    te behartigen:a. het bieden van goede dienstverlening aan de inwoners van de deelnemers
    op het terrein van participatie, werk en inkomen, gebaseerd op een integrale gemeenschappelijke
    aanpak binnen het sociale domein;b. het waarborgen van de rechtmatige, effectieve
    en efficiënte uitvoering van wetten en regelingen;c. het optimaliseren van de
    kwaliteit van de dienstverlening en het verlagen van de uitvoeringskosten.
