  bevoegdheden:
  - kop_artikel: 'Artikel 6: Taken en bevoegdheden'
    inhoud_artikel: 1. De te verrichten taken worden collectief uitgevoerd, tenzij
      het algemeen bestuur anders besluit.2. Ter uitvoering van het in artikel 3 omschreven
      doel heeft het openbaar lichaam de volgende taken:a. de zorg voor de verwerking
      van afvalstoffen, zoals het beheer en de exploitatie van milieustraten en de
      op- en overslag van afvalstoffen;b. het desgevraagd adviseren van de deelnemers
      over het uitvoeren van relevante bepalingen van de Wet milieubeheer en de daaruit
      voortvloeiende voorschriften;c. het vaststellen van de tarieven, anders dan
      de door de gemeenteraad vast te stellen belastingtarieven, voor de verwerking
      van afvalstoffen;d. het uitvoeren of doen uitvoeren van andere taken op het
      gebied van de afvalstoffenverwerking, zo het algemeen bestuur daartoe besluit,
      met dien verstande dat aldus aan deelnemers zonder hun instemming geen andere
      verplichtingen kunnen worden opgelegd dan die voort vloeien uit deze regeling;e.
      het geven van voorlichting op het gebied van afvalpreventie en -verwerking en
      verzameling van afvalstoffen;f. het op verzoek van een of meerdere deelnemers
      uitvoeren of doen uitvoeren van een andere taak op het gebied van de verwerking
      en verzameling van afvalstoffen.3. De taken, genoemd in lid 2 onder sub f worden
      door het openbaar lichaam niet uitgevoerd ten behoeve van de deelnemers, die
      geen gebruik maken van de betreffende faciliteit. De kosten, verbonden aan de
      uitvoering van een faciliteit komen volledig ten laste van de deelnemers, die
      wel van de faciliteit gebruik maken.4. Ingeval het algemeen bestuur besluit
      tot uitvoering van een taak als genoemd onder lid 2 sub f ten behoeve van een
      of meerdere deelnemers zullen omtrent de uitvoering en de gevolgen daarvan nadere
      afspraken met deze deelnemer(s) gemaakt worden.5. De deelnemers dragen, met
      in achtneming van lid 2 aan het openbaar lichaam over al hun bevoegdheden tot
      regeling en bestuur en tot deelname aan het maatschappelijk verkeer ter behartiging
      van de in het eerste en tweede lid genoemde belangen en taken.
