  bevoegdheden:
  - kop_artikel: 3 Taken en bevoegdheden
    inhoud_artikel: 1. Het openbaar lichaam heeft tot taak de regionale grensoverschrijdende
      samenwerking tussen haar leden te stimuleren, te ondersteunen en te coördineren.2.
      Het openbaar lichaam dient activiteiten te ontplooien, programma’s en projecten
      te ontwikkelen en uit te voeren alsmede financiële middelen aan te vragen, te
      ontvangen en hierover te beschikken.3. Het openbaar lichaam vertegenwoordigt
      binnen het gebied de belangen van zijn leden ten opzichte van internationale,
      nationale en andere instellingen.4. Het openbaar lichaam stimuleert het overleg
      en de coördinatie tussen publiekrechtelijke instellingen, overheidsorganen en
      maatschappelijke groeperingen in alle geledingen van het gebied van het openbaar
      lichaam.5. Het openbaar lichaam adviseert leden, burgers, ondernemingen, verenigingen,
      overheidsorganen en overige instellingen in grensoverschrijdende kwesties.6.
      De grensoverschrijdende samenwerking als bedoeld in lid 1 tot en met 5 vindt
      in het bijzonder op de volgende gebieden plaats:a. economische ontwikkeling;b.
      opleiding en onderwijs;c. menselijk potentieel;d. verkeer en vervoer;e. technologie
      en innovatie;f. ruimtelijke ordening;g. cultuur en sport;h. toerisme en recreatie;i.
      milieubescherming en afvalverwerking;j. natuurbehoud en landschapsbeheer;k.
      sociale zaken;l. volksgezondheid;m. rampenbestrijding;n. communicatie; eno.
      openbare orde en veiligheid.Prioriteit hebben die activiteiten, die een aantoonbaar
      voordeel en een aantoonbare meerwaarde voor de burgers opleveren en de mensen
      in het gebied van het openbaar lichaam dichter bij elkaar brengen.
