gr_meta:
  citeertitel: Centrumregeling Meten en Monitoren Afvalwaterketen en Grondwater Vallei
    en Veluwe
  doel: De deelnemende gemeenten en het waterschap werken door middel van deze centrumregeling
    aan de doelstellingen zoals verwoord onder lid 1 tot en met lid 3 en uitgangspunten
    zoals verwoord onder lid 4 tot en met lid 6:1. Het regulier aan gemeenten en waterschap
    verschaffen van op meet- en monitoringsgegevens gebaseerde informatie over en
    inzicht in hoe de gemeentelijke rioolstelsels, het systeem van de afvalwaterketen
    als geheel, het stedelijk oppervlaktewatersysteem en het grondwater functioneren.2.
    Het in opdracht van een deelnemende gemeente of van het waterschap op basis van
    de verzamelde data uitbrengen van advies met betrekking tot de afvalwaterketen,
    het stedelijk oppervlaktewatersysteem en het grondwater.3. Door de taken van gemeenten
    en waterschap te bundelen wordt de kwaliteit geborgd, wordt er bespaard op kosten
    en wordt de kwetsbaarheid bij de partners ten aanzien van de personele inzet verminderd.
    Ook wordt door deze aanpak de innovatie in de uitvoering van het beheer en onderhoud
    bevorderd.4. Deze centrumregeling is gericht op meten, monitoren en daaraan verbonden
    advisering zoals omschreven in artikel 4 ten behoeve van de deelnemende gemeenten
    en het waterschap.5. De samenwerking wordt zodanig ingericht dat zij garant staat
    voor continuïteit en duurzaamheid van de informatievoorziening met betrekking
    tot het functioneren van de gemeentelijke rioolstelsels, het systeem van de afvalwaterketen
    als geheel, het stedelijk oppervlaktewatersysteem en het grondwater.6. De deelnemende
    gemeenten en het waterschap behouden hun eigen bestuurlijke structuur, bevoegdheden
    en verantwoordelijkheden, gericht op een goede invulling van hun zorgplicht met
    betrekking tot de inzameling en afvoer van afvalwater, het transport en de verwerking
    van afvalwater, het stedelijk oppervlaktewaterbeheer en het grondwaterbeheer.
  samenwerkingsvorm:
    value: '''Regeling zonder meer'''
    afkorting: RZM
