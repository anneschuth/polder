  citeertitel: gemeenschappelijke regeling Samenwerkingsverband Noord-Nederland
  doel: De regeling heeft ten doel de belangen van de deelnemende provincies te behartigen
    ten behoeve van een duurzame en innovatieve economische ontwikkeling van Noord-Nederland,
    het beheer van financiële fondsen en de besteding van deze middelen en het in
    dat kader faciliteren van het bestaan van een managementautoriteit ter uitvoering
    van Europese programma’s.
