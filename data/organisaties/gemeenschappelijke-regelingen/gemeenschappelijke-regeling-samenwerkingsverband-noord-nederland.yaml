  bevoegdheden:
  - kop_artikel: Artikel 5 Bevoegdheden
    inhoud_artikel: 1. Aan het samenwerkingsverband worden bij deze regeling overgedragen
      de taken en bevoegdheden van Gedeputeerde Staten van de deelnemende provincies
      betreffende het beheer, de besteding, toezicht en monitoring, daarbij inbegrepen
      de verstrekking van subsidies van de middelen die door of namens de deelnemers
      aan het samenwerkingsverband ter beschikking worden gesteld.2. De deelnemers
      kunnen uitsluitend gelijkluidende algemeen verbindende voorschriften vaststellen
      omtrent de uitoefening van de in artikel 4 en het vorige lid genoemde taken
      en de in het vorige lid genoemde bevoegdheden.3. Het samenwerkingsverband is
      bevoegd tot het, op verzoek en ten behoeve van één of meerdere deelnemers of
      derden, verrichten van werkzaamheden.
