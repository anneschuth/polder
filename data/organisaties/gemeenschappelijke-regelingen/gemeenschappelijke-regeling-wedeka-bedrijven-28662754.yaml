  bevoegdheden:
  - kop_artikel: Artikel 4 Besluiten taken en bevoegdheden
    inhoud_artikel: 1. Een college kan in een afzonderlijk besluit taken en bevoegdheden,
      met betrekking tot uitvoering van de Participatiewet, voor wat betreft de tot
      de doelgroep Nieuw beschut onder de Participatiewet behorende ingezetenen aan
      Wedeka Bedrijven overdragen.2. Een college kan in een afzonderlijk besluit taken
      en bevoegdheden, met betrekking tot uitvoering van de Participatiewet, voor
      zover het betreft arbeidsinschakeling ten aanzien van personen die door de deelnemers
      zijn aangemeld, en die vallen onder de werking van artikel 7, eerste lid, sub
      a van de Participatiewet aan Wedeka Bedrijven overdragen.3. Colleges kunnen
      bij afzonderlijk eensluidend besluit taken en bevoegdheden, met betrekking tot
      uitvoering van de Participatiewet, voor wat betreft de tot de doelgroep Nieuw
      beschut onder de Participatiewet behorende ingezetenen aan Wedeka Bedrijven
      overdragen.4. Colleges kunnen bij afzonderlijk eensluidend besluit taken en
      bevoegdheden, met betrekking tot uitvoering van de Participatiewet, voor zover
      het betreft arbeidsinschakeling ten aanzien van personen die door de deelnemers
      zijn aangemeld, en die vallen onder de werking van artikel 7, eerste lid, sub
      a van de Participatiewet aan Wedeka Bedrijven overdragen.5. De in het eerste
      tot en met vierde lid genoemde besluiten bevatten tevens de aanduiding van de
      specifieke bevoegdheden die door de deelnemers worden overgedragen aan Wedeka
      Bedrijven en de voorwaarden waaronder deze bevoegdheden worden uitgeoefend.
  - kop_artikel: Artikel 6 Bevoegdheden
    inhoud_artikel: 1. Aan het Bestuur van het openbaar lichaam worden alle bevoegdheden
      van de deelnemers overgedragen met betrekking tot de uitvoering van de Wet sociale
      werkvoorziening, voor wat betreft de tot de doelgroep van de Wsw behorende ingezetenen
      die werkzaam zijn bij het openbaar lichaam of elders in het kader van begeleid
      werken.2. De bevoegdheden als bedoeld in lid 1 berusten bij het Algemeen Bestuur.3.
      Het Algemeen Bestuur kan bevoegdheden mandateren, dan wel delegeren aan het
      Dagelijks Bestuur, tenzij de aard van de bevoegdheid zich daartegen verzet.4.
      Het Dagelijks Bestuur kan een of meer leden van het Dagelijks Bestuur machtigen
      tot uitoefening van een of meer van zijn bevoegdheden, tenzij de regeling waarop
      de bevoegdheid steunt zich daartegen verzet.5. Het Dagelijks Bestuur kan bevoegdheden
      mandateren aan de Algemeen directeur. De mandatering vindt plaats in het directiestatuut.
