  citeertitel: Gemeenschappelijke regeling Heesch West
  doel: Het samenwerkingsverband heeft tot doel het bevorderen van de economische
    ontwikkeling en werkgelegenheid in de regio Noordoost Brabant door middel van
    het duurzaam ontwikkelen, realiseren, exploiteren en beheren van een kwalitatief
    hoogwaardig en uit financieel-economisch oogpunt aanvaardbaar regionaal bedrijventerrein.  Op
    basis van de door de grondgebiedgemeenten in 2022 vastgestelde bestemmingsplannen
    Heesch West en in bestuurlijke samenhang hiermee op te stellen bestemmingsplannen,
    -wijzigings- en uitwerkingsplannen, betreffende het gebied als aangeduid op de
    bij deze regeling gevoegde kaart, met een ten tijde van de vaststelling van deze
    regeling gezamenlijke capaciteit van circa 100 hectare netto uitgeefbaar bedrijventerrein.
    De deelnemende gemeenten dragen daartoe de hierna in artikel 5 benoemde taken
    en artikel 6 genoemde bijbehorende bevoegdheden over aan het samenwerkingsverband
    en spannen zich in voor een goede samenwerking en afstemming met het samenwerkingsverband
    ten aanzien van de voor de realisatie van de doelstelling vereiste inzet van niet
    overgedragen taken.
