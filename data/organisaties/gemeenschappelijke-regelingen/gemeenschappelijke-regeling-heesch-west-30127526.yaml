  bevoegdheden:
  - kop_artikel: Artikel 6. Bevoegdheden
    inhoud_artikel: Voor zover hiervan niet in deze regeling is afgeweken, en onverminderd
      het bepaalde in artikel 30 van de Wet, komen aan de bestuursorganen van het
      samenwerkingsverband ter uitvoering van de in het eerste en tweede lid van artikel
      5 van deze regeling genoemde deeltaken de bevoegdheden toe, die aan de bestuursorganen
      van de deelnemende gemeenten toebehoren,een en ander voor zover niet in strijd
      met de Wet.Het algemeen bestuur is bevoegd tot het oprichten van of het deelnemen
      in stichtingen, maatschappen, vennootschappen, verenigingen, coöperaties en
      onderlinge waarborgmaatschappijen dan wel het ontbinden daarvan of het beëindigen
      van de deelneming.Het algemeen bestuur is bevoegd tot het heffen van belastingen
      zoals bedoeld in artikel 228 en 228a Gemeentewet, en van de rechten zoals bedoeld
      in artikel 229 Gemeentewet.Voor zover een door het algemeen bestuur vastgestelde
      verordening voorziet in hetzelfde onderwerp als een verordening van een grondgebiedgemeente,
      regelt eerstbedoelde verordening de onderlinge verhouding. Zij kan bepalen,
      dat de verordening van de gemeente voor het rechtsgebied waarvoor de regeling
      geldt, dan wel voor een gedeelte daarvan voor wat betreft dat onderwerp ophoudt
      te gelden.Het samenwerkingsverband is bevoegd tot het aanstellen van personeel
      en het aangaan van detacheringovereenkomsten en overeenkomsten van opdracht
      zoals bedoeld in artikel 27 van deze regeling, zulks met inachtneming van hetgeen
      in hoofdstuk 9 van deze regeling is bepaald.Van de bevoegdheden genoemd in het
      tweede lid wordt niet eerder gebruik gemaakt dan nadat de raden van de deelnemende
      gemeenten een ontwerpbesluit is toegezonden en zij in de gelegenheid zijn gesteld
      hun wensen en bedenkingen ter kennis van het algemeen bestuur te brengen.Het
      samenwerkingsverband is bevoegd tot het aangaan van geldleningen.
