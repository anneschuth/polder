gr_meta:
  citeertitel: Gemeenschappelijke Regeling Noord-Hollands Archief
  doel: 1. De regeling wordt getroffen met het doel de belangen van de Minister en
    de colleges bij alle aangelegenheden betreffende de archiefbescheiden, collecties,
    individuele documenten en dergelijke die berusten in de rijksarchiefbewaarplaats
    in de provincie en de archiefbewaarplaatsen van de gemeenten, in gezamenlijkheid
    te behartigen. Het Noord-Hollands Archief is mede ingesteld met het doel diensten
    aan derden te leveren ten aanzien van het beheer van archiefbescheiden en collecties.2.
    Het Noord-Hollands Archief voert bij de behartiging van de belangen, bedoeld in
    het eerste lid, het archiefbeleid en het cultuurbeleid van de Minister en de gemeenten
    mede uit.3. De Minister en de gemeenten kunnen gezamenlijk algemene aanwijzingen
    geven omtrent de wijze waarop het Noord-Hollands Archief de belangen, bedoeld
    in het eerste lid, behartigt.
