  bevoegdheden:
  - kop_artikel: Artikel 4. De uitvoeringsorganisatie
    inhoud_artikel: 1. De uitvoeringsorganisatie voert met inachtneming van het overige
      in deze regeling bepaalde de dienstverleningsovereenkomst uit.2. De verantwoordelijkheid
      voor de organisatorische vormgeving en de hiërarchische aansturing van de uitvoeringsorganisatie,
      inclusief alle aangelegenheden van rechtspositionele aard, ligt bij de centrumgemeente.3.
      De bevoegdheid tot het nemen van besluiten noodzakelijk voor de uitvoering van
      de dienstverleningsovereenkomst mandateren de bevoegde bestuursorganen van de
      gemeenten aan het hoofd van de uitvoeringsorganisatie met de mogelijkheid van
      ondermandaat.4. De bevoegde bestuursorganen van de gemeenten wijzen het hoofd
      van de uitvoeringsorganisatie aan als gemeenteambtenaar als bedoeld in artikel
      231, tweede lid, onderdeel a en b van de Gemeentewet en artikel 1, tweede lid
      van de wet WOZ.5. De uitvoeringsorganisatie verricht haar werkzaamheden ter
      uitvoering van de dienstverleningsovereenkomst vanuit de centrumgemeente.6.
      De uitvoeringsorganisatie legt tijdig rekening en verantwoording af aan het
      portefeuillehouderoverleg.
