description:
  text: Regio Gooi en Vechtstreek is het samenwerkingsverband van Blaricum, Eemnes,
    Gooise Meren, Hilversum, Huizen, Laren en Wijdemeren. Wat met elkaar beter lukt
    en meerwaarde heeft, dat doen we samen. Iedere dag werken we aan een duurzame,
    gezonde en veilige regio. Voor inwoners, met gemeenten.
  url: https://www.regiogv.nl/over-ons/organisatie/
