  bevoegdheden:
  - kop_artikel: 'Artikel 5: Taken en bevoegdheden'
    inhoud_artikel: 1. Ter behartiging van de in artikel 3 genoemde belangen is Veiligheidsregio
      Zeeland belast met de in artikelen 10, 14, 15, 16 en 17 van de Wet veiligheidsregio&rsquo;s
      en de in artikelen 6, 7 en 8 van de Wet Publieke Gezondheid genoemde taken en:a.
      het zorg dragen voor de voorbereiding op de bestrijding van een epidemie van
      een infectieziekte behorend tot groep A als bedoeld in artikel 1 onder e van
      de Wet publieke gezondheid, alsmede op de bestrijding van een nieuw subtype
      humaan influenzavirus, waarbij ernstig gevaar voor de volksgezondheid bestaat.2.
      Veiligheidsregio Zeeland heeft alle bevoegdheden tot regeling, bestuur en beheer
      die nodig zijn voor de uitvoering van de aan haar opgedragen taken;3. Tot deze
      bevoegdheden behoort het vaststellen van een verordening ten behoeve van het
      heffen en invorderen van rechten als bedoeld in artikel 229, eerste lid, onder
      b en artikel 231 van de Gemeentewet, voor zover deze door de bevoegde bestuursorganen
      is overgedragen;4. Alle bevoegdheden in het kader van deze gemeenschappelijke
      regeling, die niet aan een ander bestuursorgaan zijn opgedragen, behoren aan
      het algemeen bestuur;5. Veiligheidsregio Zeeland is bevoegd tot het uitvoeren
      van andere taken dan bedoeld in dit artikel en tot het verlenen van diensten
      voor &eacute;&eacute;n of meer deelnemende gemeenten of voor andere gemeenten,
      indien deze daarom verzoeken en het algemeen bestuur besluit tot het aangaan
      van de desbetreffende dienstverleningsovereenkomst;6. De uitvoering van de in
      het vorige lid bedoelde taken en het verlenen van diensten geschiedt op basis
      van een dienstverleningsovereenkomst tussen Veiligheidsregio Zeeland en de ge-meente
      of gemeenten die het aangaat. In deze dienstverleningsovereenkomst wordt neergelegd
      welke prestaties Veiligheidsregio Zeeland zal leveren, de kosten die integraal
      bij de betreffende gemeente(n) in rekening worden gebracht en de voorwaarden
      voor beide partijen waaronder tot uitvoering van de taken of de dienstverlening
      wordt overgegaan.
