  bevoegdheden:
  - kop_artikel: Artikel 9 Bevoegdheden bestuur
    inhoud_artikel: 1.  Het bestuur heeft alle bevoegdheden die het bij of krachtens
      de wet en deze regeling toekomt.2. Tot de taken en bevoegdheden van het bestuur
      behoren in ieder geval:a. het vaststellen en wijzigen van een bijdragebesluit
      waarin de verrekensystematiek, die in beginsel is gebaseerd op betaling voor
      afname, wordt vastgelegd op basis waarvan de financiële bijdragen van de deelnemers
      voor de uitvoering van de taken, en onderverdeeld in standaard werk, meerwerk
      en maatwerk worden bepaald. Het bestuur besluit daarover met een meerderheid
      van ten minste 75% van de stemmen;b. het opstellen van een model dienstverleningsovereenkomst
      voor de afname van diensten;c. het vaststellen en wijzigen van de interne en
      organisatorische kaders van de bedrijfsvoeringsorganisatie;d. het behartigen
      van de belangen van de bedrijfsvoeringsorganisatie bij andere overheden, instellingen,
      bedrijven of personen waarmee contact voor de bedrijfsvoeringsorganisatie van
      belang is;e. het houden van toezicht op het functioneren van de bedrijfsvoeringsorganisatie;f.
      het nemen van conservatoire maatregelen, zowel in als buiten rechte, en het
      doen van alles wat nodig is ter voorkoming van verjaring en verlies van recht
      of bezit;g. het nemen van besluiten tot oprichting van en deelneming in stichtingen,
      maatschappen, vennootschappen, verenigingen, coöperaties en onderlinge waarborgmaatschappijen,
      de raden en staten gehoord.
