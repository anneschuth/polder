  bevoegdheden:
  - kop_artikel: Artikel 3
    inhoud_artikel: '1. De bedrijfsvoeringsorganisatie behartigt de gemeenschappelijke
      en afzonderlijke uitvoeringstaken van de gemeenten op het gebied van reiniging,
      inzameling en verwijdering van afval. Het draagt zorg voor een zo doelmatig
      mogelijke uitvoering van deze taken en uitoefening van bevoegdheden op deze
      terreinen.2. In het kader van haar doelstelling heeft de bedrijfsvoeringsorganisatie
      tot taak het inzamelen, verwijderen of het collectief doen inzamelen of doen
      verwijderen van huishoudelijke afvalstoffen ter voldoening van de bij of krachtens
      de Wet Milieubeheer aan de gemeente opgelegde verplichting. Tot deze taak behoort
      in ieder geval het dagelijks onderhoud en beheer van opstallen, brengstations
      en inzamelmiddelen en de zorg voor de verwerking van huishoudelijke afvalstoffen.3.
      Het bestuur van de bedrijfsvoeringsorganisatie heeft voorts tot taak het op
      verzoek van een of meerdere gemeenten uitvoeren of doen uitvoeren van andere
      gemeentelijke uitvoeringstaken op het gebied van afvalstoffenverwijdering of
      reiniging, zoals bijvoorbeeld: zwerfafval, gladheidsbestrijding, graffitiverwijdering
      en ongediertebestrijding.4. Het bestuur is bevoegd tot het oprichten van en
      deelnemen in stichtingen, maatschappen, vennootschappen, verenigingen, coöperaties
      en onderlinge waarborgmaatschappijen, indien dat in het bijzonder aangewezen
      moet worden geacht voor de behartiging van de belangen van de bedrijfsuitvoeringsorganisatie.5.
      Een besluit, zoals bedoeld in artikel 3 lid 4, wordt niet genomen dan nadat
      de raden van de gemeenten een ontwerpbesluit is toezonden en in de gelegenheid
      zijn gesteld hun wensen en bedenkingen ter kennis van het bestuur te brengen.'
