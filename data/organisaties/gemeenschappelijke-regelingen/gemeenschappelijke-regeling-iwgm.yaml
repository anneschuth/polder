  bevoegdheden:
  - inhoud_artikel: Artikel 3 Te behartigen belang, taken en bevoegdheden1. De bedrijfsvoeringsorganisatie
      is getroffen in het belang van een doelmatige en bedrijfsmatig verantwoorde
      uitvoering van de medebewindstaak van de colleges betreffende de Wsw. Ter bevordering
      daarvan dragen de colleges de bevoegdheden ten aanzien van de Wsw op grond van
      artikel 1, tweede lid Wsw, over aan IWGM.2. Het te behartigen belang kan ook
      inhouden dat, al dan niet tezamen, de regie en uitvoering over het realiseren
      van participatiebanen op grond van de Pw wordt opgedragen aan IWGM. Hiertoe
      zal in een dergelijke situatie een dienstverleningsovereenkomst worden gesloten
      tussen de betreffende gemeente en IWGM. Het bestuur van de IWGM zal daartoe
      de algemene uitgangspunten voor en de voorwaarden van die dienstverleningsovereenkomst
      vaststellen.3. Het te behartigen belang kan ook inhouden dat, al dan niet tezamen,
      taken uit de Wmo worden opgedragen aan IWGM. Hiertoe zal in een dergelijke situatie
      een dienstverleningsovereenkomst worden gesloten tussen de betreffende gemeente
      en IWGM. Het bestuur zal daartoe de algemene uitgangspunten voor en de voorwaarden
      van die dienstverleningsovereenkomst vaststellen.4. De IWGM kan ook voor derden
      taken uitvoeren die gericht zijn op het ontwikkelen van arbeidsvaardigheden
      en het bemiddelen van mensen naar (betaalde) arbeid. Hiertoe zal in een dergelijke
      situatie een dienstverleningsovereenkomst worden gesloten tussen de derde partij
      en de IWGM. Het bestuur zal daartoe de algemene uitgangspunten voor en de voorwaarden
      van die dienstverleningsovereenkomst vaststellen.5. Het bestuur kan besluiten
      tot de oprichting van en de deelneming in stichtingen, maatschappen, vennootschappen,
      verenigingen, coöperaties en onderlinge waarborgmaatschappijen, indien dat in
      het bijzonder aangewezen moet worden geacht voor de behartiging van het daarmee
      te dienen openbaar belang. Het besluit wordt niet genomen dan nadat de raden
      van de gemeenten een ontwerpbesluit is toegezonden en de raden in de gelegenheid
      zijn gesteld hun wensen en bedenkingen ter kennis van het bestuur van de IWGM
      te brengen.6. De IWGM is bevoegd de uitvoering van de aan haar overgedragen
      bevoegdheden c.q. aan haar opgedragen taken, op te dragen aan Stichting Sociale
      Werkvoorziening Industriële Toelevering en Service (INTOS).
