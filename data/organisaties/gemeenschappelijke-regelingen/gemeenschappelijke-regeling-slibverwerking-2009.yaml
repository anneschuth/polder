  citeertitel: Gemeenschappelijke regeling Slibverwerking 2009
  doel: Het Openbaar Lichaam behartigt de belangen van de Waterschappen op het terrein
    van:(i) het transporteren of doen transporteren van zuiveringsslib naar verwerkingsinstallaties,
    stortplaatsen of andere eindbestemmingen;(ii) het gecontroleerd storten of verwerken
    of doen storten of doen verwerken van zuiveringsslib in verbrandingsinstallaties
    of op andere wijze;(iii) het afvoeren en storten of doen afvoeren en doen storten
    van asresten of andere restproducten van de verwerking van zuiveringsslib, voor
    zover geen nuttig gebruik daarvan mogelijk is;(iv) het afzetten of doen afzetten
    van zuiveringsslib en/of restproducten van de verwerking daarvan voor nuttig gebruik;
    en(v) het produceren van duurzame energie en de interne afzet daarvan.
