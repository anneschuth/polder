  bevoegdheden:
  - kop_artikel: Artikel 4 - Taken en bevoegdheden
    inhoud_artikel: Ten behoeve van de behartiging van de in artikel 3 genoemde belangen,
      is het Openbaar lichaam belast met en bevoegd tot:a het verwerven, houden, beheren
      en vervreemden voor de Waterschappen van aandelen in het kapitaal van HVC; Ib
      het toetreden tot een ballotageovereenkomst, waaronder in elk geval de Ballotageovereenkomst
      B, met HVC;c het garant staan voor de verplichtingen van HVC krachtens door
      HVC gesloten overeenkomsten van geldlening, conform het bepaalde in artikel
      7 van de Ballotageovereenkomst B;d het actief invulling geven aan het aandeelhouderschap
      in HVC door ketenontwikkelingen, onderling en met HVC te bespreken, die in brede
      zin verband houden met slibverwerking en duurzaamheid;e het, op basis van hoeveelheden
      tonnages door HVC verwerkt zuiveringsslib, factureren aan de Waterschappen;f
      het benoemen van een commissaris in de raad van commissarissen van HVC namens
      de Waterschappen;g het actief uitoefenen van de stemrechten verbonden aan de
      aandelen die het Openbaar lichaam in HVC houdt;h het goed uitvoering en inhoud
      geven aan ontwikkelingen op het gebied van duurzaamheid;i het bewaken en proactief
      invullen van de afspraken en normen op het gebied van corporate governance,
      zoals onder meer vastgelegd in de Nederlandse corporate governance code.
