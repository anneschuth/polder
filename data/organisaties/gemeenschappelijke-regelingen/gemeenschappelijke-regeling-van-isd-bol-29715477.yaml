  citeertitel: gemeenschappelijke regeling van ISD BOL
  doel: De regeling behartigt door het op bedrijfsmatige wijze uitvoeren van taken
    op terreinen van het sociaal domein, de belangen van de deelnemers op genoemde
    terreinen. De dienst neemt daarbij de door de deelnemers geformuleerde visie en
    missie in acht. De overheveling van taken en bevoegdheden van het college wordt
    nader bepaald in artikel 6 en artikel 10 van deze regeling.
