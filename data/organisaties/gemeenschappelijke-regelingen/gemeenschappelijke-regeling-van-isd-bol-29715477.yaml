  bevoegdheden:
  - kop_artikel: Artikel 6 Taken en bevoegdheden van het algemeen bestuur
    inhoud_artikel: 1. Ter vervulling van het in artikel 2 genoemde belang heeft het
      algemeen bestuur de taak om het beleid te ontwikkelen en voor te bereiden op
      strategisch, tactisch en operationeel niveau.2. Aan het algemeen bestuur worden
      alle bevoegdheden overgedragen, die nodig zijn voor de vervulling van de taak
      als bedoeld in lid 1 van dit artikel met uitzondering van de bevoegdheden, die
      bij wet of in deze regeling aan een ander bestuursorgaan zijn toebedeeld.3.
      Het vaststellen van verordeningen en van beleid blijft de bevoegdheid van de
      afzonderlijke gemeenteraden.4. Het algemeen bestuur is bevoegd tot de oprichting
      van en de deelneming in stichtingen, maatschappen, vennootschappen, verenigingen,
      coöperaties en onderlinge waarborgmaatschappijen, indien dat in het bijzonder
      aangewezen moet worden geacht voor de behartiging van het daarmee te dienen
      openbaar belang.5. Het besluit bedoeld in lid 4 van dit artikel wordt niet genomen
      nadat de raden van de deelnemers een ontwerpbesluit is toegezonden en in de
      gelegenheid zijn gesteld hun wensen en bedenkingen ter kennis van het algemeen
      bestuur te brengen.6. Het algemeen bestuur beslist niet over een voorstel alvorens
      de raden om zienswijzen zijn gevraagd, wanneer ten minste twee gemeenteraden
      het dagelijks bestuur hierom verzoeken. In spoedeisende gevallen kan het dagelijks
      bestuur afzien van het vragen van zienswijzen. Het dagelijks bestuur stelt de
      raden hiervan schriftelijk en gemotiveerd op de hoogte.7.  Indien het zesde
      lid wordt toegepast, dan hebben de gemeenteraden twaalf weken de tijd hun zienswijzen
      bij het dagelijks bestuur naar voren te brengen. Voorafgaande aan het nemen
      van het besluit waarover de zienswijzen gegeven zijn, stelt het dagelijks bestuur
      de gemeenteraden en het algemeen bestuur schriftelijk en gemotiveerd in kennis
      van het oordeel over de zienswijzen, alsmede van de eventuele conclusies die
      het daaraan verbindt.
  - kop_artikel: Artikel 10 Taken en bevoegdheden van het dagelijks bestuur
    inhoud_artikel: 1. De taken van het dagelijks bestuur zijn:a. De uitvoering van
      de Participatiewet inclusief de invoeringswet, de uitvoering van de Wet Inkomensvoorziening
      oudere en gedeeltelijk arbeidsongeschikte werknemers (IOAW) en de Wet Inkomensvoorziening
      oudere en gedeeltelijk arbeidsongeschikte zelfstandigen (IOAZ), de uitvoering
      van het Besluit bijstandverlening zelfstandigen (Bbz) en bij deze wetten behorende
      algemene maatregelen van bestuur en uitvoeringsregelingen.b. De uitvoering van
      de Wet inburgering 2021.c. De uitvoering van andere door een of meer deelnemende
      gemeenten aan de dienst opgedragen taken binnen het sociaal domein.d. Het verlenen
      van diensten binnen het sociaal domein aan gemeenten buiten het onder artikel
      3 lid 2 genoemde rechtsgebied dan wel aan andere organisaties dan gemeenten
      ongeacht hun plaats van vestiging, met dien verstande dat het algemeen bestuur
      hiermee dient in te stemmen. De diensten worden verleend tegen een vooraf overeengekomen
      prijs. Verschuldigde BTW wordt apart in rekening gebracht.2. Aan het dagelijks
      bestuur van de dienst worden bij deze regeling alle bevoegdheden overgedragen,
      die nodig zijn voor de uitvoering van de in lid 1 onder a en b van dit artikel
      genoemde taken.3. De vaststelling van nadere regels op grond van de verordeningen
      is de bevoegdheid van de afzonderlijke Colleges, tenzij deze bevoegdheid is
      gedelegeerd aan het dagelijks bestuur.4. Voorts heeft het dagelijks bestuur,
      onverminderd het bepaalde in artikel 33 b van de Wet gemeenschappelijke regelingen,
      de volgende taken en bevoegdheden:a. Het vertegenwoordigen van de dienst binnen
      regionaal bestuurlijk overleg.b. Het behartigen van de belangen van de dienst
      bij andere overheden, instellingen, bedrijven of personen, waarmee contact voor
      de dienst van belang is.c. Het houden van toezicht op het functioneren van de
      dienst.
  - kop_artikel: Artikel 14 Taken, verantwoordelijkheden en bevoegdheden
    inhoud_artikel: 1. De bestuursorganen worden bijgestaan door een directeur, aan
      wie in het dagelijks bestuur een adviserende stem toekomt.2. De directeur wordt
      aangenomen, geschorst en ontslagen door het dagelijks bestuur.3. Het dagelijks
      bestuur wijst een plaatsvervanger voor de directeur aan, die de directeur in
      geval van verhindering of ontstentenis vervangt.4. De directeur fungeert in
      het algemeen bestuur en het dagelijks bestuur als secretaris.5. De directeur
      ondertekent mede alle stukken die van het algemeen en het dagelijks bestuur
      uitgaan.6. De directeur is belast met de dagelijkse leiding van de dienst.7.
      De verantwoordelijkheden en bevoegdheden van de directeur worden vastgelegd
      in een statuut. Het statuut wordt vastgesteld door het dagelijks bestuur.8.
      Het dagelijks bestuur komt jaarlijks met de directeur een bedrijfsplan overeen,
      waarin de door de dienst te leveren prestaties zijn vastgelegd.9. De directeur
      is verantwoording verschuldigd aan het dagelijks bestuur.
