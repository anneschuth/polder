  bevoegdheden:
  - kop_artikel: Artikel 5 Bevoegdheden
    inhoud_artikel: 1. De colleges geven de centrumgemeente het mandaat om de in artikel
      11 genoemde taken uit te voeren, uiteraard begrensd door wetgeving, jurisprudentie
      en vastgestelde kaders.2. Het college van de centrumgemeente kan de bevoegdheden
      in lid 5.1 onder mandateren aan ambtenaren van de centrumgemeente.3. De regiogemeenten
      mandateren de centrumgemeente om namens hen op te treden in landelijke overleggen
      en de belangen van de regiogemeenten te vertegenwoordigen.4. Verdere uitwerking
      van bevoegdheden is wenselijk gezien de huidige ontwikkeling van beschermd wonen,
      maatschappelijke opvang, verslavingszorg, de aanpak van personen met verward
      gedrag, de Wet verplicht GGz en de Wet zorg en dwang en kunnen middels een door
      alle partijen ondertekend addendum worden toegevoegd.
