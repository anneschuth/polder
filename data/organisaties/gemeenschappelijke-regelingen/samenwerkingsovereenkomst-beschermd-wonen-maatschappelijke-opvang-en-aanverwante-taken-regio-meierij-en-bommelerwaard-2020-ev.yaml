  citeertitel: Samenwerkingsovereenkomst beschermd wonen, maatschappelijke opvang
    en aanverwante taken regio Meierij en Bommelerwaard 2020 e.v.
  doel: In deze samenwerkingsovereenkomst zijn de afspraken vastgelegd die de centrumgemeente
    met de regiogemeenten maakt over de uitvoering van de taken rondom beschermd wonen,
    maatschappelijke opvang, verslavingszorg, de aanpak van personen met verward gedrag,
    de Wet verplichte GGz en de Wet zorg en dwang. De partijen gaan daartoe de komende
    jaren een onderlinge samenwerking aan gericht op het zorgdragen voor een kwalitatief
    goede en efficiënte inkoop, contractbeheer en uitvoering van de beleidstaken.
