  valid_from: '1900-01-01'
description:
  text: 'Ombudsman Metropool Amsterdam is een tweedelijns klachtenregeling: u kunt
    bij ons terecht wanneer u een klacht hebt ingediend bij een gemeente die bij ons
    is aangesloten en u niet tevreden bent met hoe die klacht is afgehandeld. Als
    uw klacht gaat over de uitvoering van beleid -  bijvoorbeeld de wijze waarop een
    vergunning (niet) is verstrekt, hoe een bezwaarschrift is behandeld, of het (niet)
    nakomen van afspraken - dan kijken wij opnieuw naar de klacht en komen wij waar
    mogelijk met een oplossing.'
