  bevoegdheden:
  - kop_artikel: Artikel 4 Uitvoering van de werkzaamheden
    inhoud_artikel: De taak zoals genoemd in artikel 2 wordt uitgeoefend door en onder
      verantwoordelijkheid en regie van het waterschap Brabantse Delta. Tot deze taak
      behoort tevens:1.Het opstellen van een begroting, jaarrekening, planning en
      beleid voor het inzetten van de muskusrattenbestrijders.2.Het één maal per jaar
      aan de deelnemende waterschappen uitbrengen van een rapportage van de werkzaamheden,
      inclusief het resultaat van de geleverde prestaties, inzake de werkzaamheden
      over het afgelopen jaar.3.Het verstrekken van alle relevante schriftelijke informatie
      indien daarom door één van de deelnemende waterschappen wordt verzocht.
