  citeertitel: Gemeenschappelijke regeling muskusrattenbestrijding Noord-Brabant
  doel: 1. Deze regeling wordt gesloten in het belang van een goede samenwerking tussen
    de waterschappen met betrekking tot de muskusrattenbestrijding te weten de doelmatige
    bestrijding van de muskusrat en beverrat en het voorkomen van schade door deze
    soorten aan waterstaatswerken in het bijzonder.2. De werkzaamheden omvatten de
    uitvoering van de muskusrattenbestrijding in de provincie Noord- Brabant, ..........
