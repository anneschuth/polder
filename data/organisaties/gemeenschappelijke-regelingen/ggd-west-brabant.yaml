description:
  text: 'Bij GGD West-Brabant streven we naar een gezonde en veilige leefomgeving
    voor iedereen. Onze kernboodschap is helder: “Wij maken samen gezond gewoon”.
    Dit betekent dat we gezondheid en welzijn voor iedereen toegankelijk willen maken
    door middel van preventie, samenwerking en innovatie.Wij zetten ons in voor het
    bewaken, beschermen en bevorderen van de gezondheid en veiligheid van alle inwoners
    van West-Brabant. Ook voor jou staan wij klaar!We werken samen met onze partners
    aan een toekomst waarin iedereen de kans krijgt om gezond op te groeien en te
    leven.'
