  bevoegdheden:
  - kop_artikel: Artikel 3. Bevoegdheden
    inhoud_artikel: 1. De bevoegdheden die aan het recreatieschap worden overgedragen
      berusten bij het algemeen bestuur, tenzij in deze regeling anders wordt bepaald.
      Het algemeen bestuur kan, tenzij de aard van de bevoegdheid zich daartegen verzet,
      aan het dagelijks bestuur bevoegdheden overdragen en kan daarbij beperkingen
      stellen.2. De in de gebiedsverordeningen aan de colleges toegekende bevoegdheden,
      met inbegrip van de bevoegdheid tot de aanwijzing van toezichthouders als bedoeld
      in artikel 5:11 Algemene wet bestuursrecht, alsmede de collegebevoegdheden als
      bedoeld in artikel 125 Gemeentwet ten aanzien van toezicht en handhaving worden
      voor wat betreft de behartiging van de belangen en taken van het recreatieschap
      overgedragen aan het algemeen bestuur.3. De in de subsidieverordeningen van
      de deelnemende gemeenten aan de colleges toegekende bevoegdheden worden voor
      wat betreft de behartiging van de belangen en taken van het recreatieschap overgedragen
      aan het algemeen bestuur.4. Het dagelijks bestuur kan binnen door hem te bepalen
      grenzen volmacht en mandaat verlenen aan een of meer ambtenaren van de gemeenten
      van de deelnemende colleges voor het nemen van besluiten en het verrichten van
      privaatrechtelijke handelingen.5. Het dagelijks bestuur houdt een openbaar toegankelijk
      register bij van gebiedsverordeningen en subsidieverordeningen van de gemeenteraden
      van de deelnemende gemeenten als bedoeld in het tweede en derde lid, alsmede
      van de bevoegdheden uit deze verordeningen die krachtens deze regeling zijn
      overgedragen aan het algemeen bestuur.
