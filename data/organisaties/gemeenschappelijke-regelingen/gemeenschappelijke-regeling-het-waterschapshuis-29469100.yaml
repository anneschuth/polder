  citeertitel: Gemeenschappelijke regeling Het Waterschapshuis
  doel: De regeling wordt getroffen om een expertinstituut en service organisatie
    voor waterschappen in het leven te roepen met als doel het in opdracht van de
    deelnemende waterschappen en eventuele derden realiseren van renderende samenwerking
    op informatie- en bedrijfsprocessen en daarmee behartiging van behoeften van algemeen
    belang van de watersector.
