  citeertitel: Gemeenschappelijke Regeling Samenwerking Kempengemeenten
  doel: De regeling wordt getroffen ter gezamenlijke behartiging van de afzonderlijke
    en gemeenschappelijke belangen van de bestuursorganen op het gebied van:a.    informatie
    en communicatie technologie, waaronder Samenwerking geografische informatievoorziening
    en BAG (SSC);b.    de Wmo, Wet gemeentelijke schuldhulpverlening, Jeugdwet, Jeugdhulp
    (JH), minimaregelingen op grond van de Participatiewet (MD) en de bijzondere bijstand
    (tot en met 31 december 2023);c.    Vergunningverlening, Toezicht en Handhaving
    (VTH).
