  bevoegdheden:
  - kop_artikel: Artikel 4 Taken en bevoegdheden
    inhoud_artikel: 1. Het algemeen bestuur heeft ten behoeve van de uitvoering van
      bevoegdheden van de colleges de overgedragen en opgedragen taken en/of bevoegdheden,
      bedoeld in het tweede tot en met het negende lid. Het algemeen bestuur kan de
      uitoefening van deze bevoegdheden delegeren of mandateren aan het dagelijks
      bestuur.2. Het algemeen bestuur is ten aanzien van het SSC belast met de taken:a.
      aanschaf, ontwikkeling, onderhoud, beheer en exploitatie van data en telefonie
      hardware, -software, -netwerk infrastructuren, -applicaties en alle overige
      ICT ondersteunende systemen ten behoeve van de Samenwerking Kempengemeenten,
      het Participatiebedrijf en de deelnemende gemeenten;b. landmeetkundige activiteiten
      ten behoeve van de Samenwerking Kempengemeenten en de deelnemende gemeenten;c.
      vastgoedinformatievoorziening voor de deelnemende gemeenten;d. uitvoering van
      de Basisregistratie Adressen en Gebouwen voor de deelnemende gemeenten.3. Aan
      het algemeen bestuur worden de bevoegdheden van de colleges genoemd in de volgende
      wetten en daarop gebaseerde regelgeving op landelijk niveau overgedragen en
      alleen in die gevallen waarin delegatie op grond van wettelijke bepalingen niet
      mogelijk is in mandaat opgedragen:a. de Wet gemeentelijke schuldhulpverlening
      (de minimaregelingen met als grondslag de Participatiewet en de bijzondere bijstand
      tot en met 31 december 2023 en de Participatieregeling 18+ Kempengemeenten);b.
      de uitvoering van maatwerkvoorzieningen (waaronder begeleiding) ter ondersteuning
      van de zelfredzaamheid en participatie en het geven van informatie, advies en
      cliëntenondersteuning op dit onderdeel van de Wmo.4. Aan het algemeen bestuur
      worden ten aanzien van Jeugdhulp de volgende taken en bevoegdheden van de colleges
      genoemd in de Jeugdwet en daarop gebaseerde regelgeving op landelijk niveau
      overgedragen, behoudens de taken en bevoegdheden van het college van Oirschot:a.
      het organiseren en uitvoeren van de Jeugdhulp conform het door de raden vastgestelde
      meerjarenbeleidskader Jeugdhulp in de Kempen en dienstverleningsmodel Jeugdhulp;b.
      de coördinatie van beleidsvoorbereiding, uitvoeringsbeleid, evaluatie en verantwoording
      naar de colleges en raden.5. Het algemeen bestuur draagt ten aanzien van VTH
      namens de colleges en de burgemeesters, behoudens voor het college van de gemeente
      Bergeijk en Bladel zorg voor vergunningverlening, toezicht en handhaving op
      basis van door de colleges en de burgemeesters afzonderlijk vast te stellen
      mandaatbesluiten waarin aan het dagelijks bestuur mandaat, volmacht en machtiging
      ten aanzien van specifieke rechtshandelingen en feitelijke handelingen worden
      verleend. Uitvoering van de bevoegdheden, genoemd in de voornoemde mandaatbesluiten,
      vindt plaats overeenkomstig door de colleges en de burgemeesters te geven instructies
      als bedoeld in artikel 10:6 van de Algemene wet bestuursrecht.6. Voorts is het
      dagelijks bestuur belast met:a.  afhandeling van klachten voor zover deze betrekking
      hebben op de Samenwerking Kempen-gemeenten, enb. registratie, afhandeling, voortgangsbewaking
      en archivering ten aanzien van (digitale) aanvragen, verzoeken, correspondentie
      en overige post ten aanzien van de werkzaamheden voortvloeiende uit de taken
      en bevoegdheden.7. Het algemeen bestuur draagt zorg en is verantwoordelijk voor
      de beleidsvoorbereiding van de taken genoemd onder het tweede tot en met achtste
      lid en doet daartoe voorstellen aan de colleges of als de raden de beslissingsbevoegdheid
      hebben, via de colleges aan de raden. De deelnemende gemeenten kunnen over de
      beleidsterreinen waarop en de mate waarin de uitvoering op dit onderdeel wordt
      overgedragen aan de Samenwerking Kempengemeenten afspraken maken in een dienstverleningsovereenkomst.8.
      Het algemeen bestuur kan op verzoek van een deelnemer zorgdragen voor de inzet
      van een functionaris voor de gegevensbescherming voor die deelnemer.9. De specificatie
      en wijze van uitvoering van de taken en bevoegdheden als genoemd in het eerste
      tot en met achtste lid, kunnen tussen de deelnemende gemeenten en het dagelijks
      bestuur vastgelegd worden in een dienstverleningsovereenkomst.
