  bevoegdheden:
  - kop_artikel: Artikel 6 Bevoegdheden
    inhoud_artikel: 1. De gemeenten dragen geen bevoegdheden over aan de Groene Metropoolregio
      Arnhem-Nijmegen, met uitzondering van de bevoegdheid van de colleges om een
      subsidie te verstrekken aan de Stichting The Economic Board.2. De gemeenten
      verlenen ieder afzonderlijk de mandaten, volmachten en machtigingen aan de Groene
      Metropoolregio Arnhem-Nijmegen.3. De Groene Metropoolregio Arnhem-Nijmegen is
      behoudens instemming van de gemeenten niet bevoegd tot:a. het vestigen van opstal-,
      pand- en hypotheekrechten;b. het afgeven van garanties of andere waarborgen;c.
      het in erfpacht aannemen of uitgeven van roerende of onroerende zaken;d. het
      in eigendom aannemen of uitgeven van onroerende zaken;e. commerciële dienstverlening
      aan private partijen.
