gr_meta:
  citeertitel: Gemeenschappelijke regeling Regio Arnhem-Nijmegen
  doel: De regeling wordt getroffen om de positie van de Groene Metropoolregio Arnhem-Nijmegen
    te versterken en een kwalitatieve groei van de regio – met behoud van de typische
    balans tussen levendige verstedelijking en ontspannen leefkwaliteit – te bewerkstelligen
    op het gebied van ruimtelijke ontwikkeling (waaronder wonen, landschap, verkeer
    en mobiliteit) en sociaaleconomische ontwikkeling (waaronder werkgelegenheid,
    bedrijvigheid, recreatie, toerisme, leefbaarheid en cultuur) op de schaal van
    de regio, en waarbij integraliteit, innovatie, duurzaamheid en circulariteit belangrijke
    uitgangspunten zijn.
