  bevoegdheden:
  - kop_artikel: Artikel 5 Overdracht wettelijke bevoegdheden
    inhoud_artikel: 1. De besturen van de deelnemers dragen aan het bestuur de bevoegdheden
      over die nodig zijn voor de uitvoering van de werkzaamheden met betrekking tot
      de belangen genoemd in artikel 2.2. De werkzaamheden worden nader omschreven
      in dienstverleningsovereenkomsten.
  - kop_artikel: Artikel 6 Overgedragen overige bevoegdheden
    inhoud_artikel: 1. Het bestuur is bevoegd tot regeling en bestuur ter behartiging
      van de belangen van de deelnemers voor zover betrekking hebbend op de opgedragen
      taken genoemd in artikel 4.2. Het bestuur is bevoegd de regelingen vast te stellen,
      die krachtens de wet voor de organisatie van het samenwerkingsverband moeten
      worden vastgesteld.3. Het bestuur neemt, ook alvorens is besloten tot het voeren
      van een rechtsgeding, alle conservatoire maatregelen en doet wat nodig is ter
      voorkoming van verjaring of verlies van recht of bezit.4. Het bestuur beheert
      de inkomsten, uitgaven en het vermogen van het samenwerkingsverband.5. Het bestuur
      houdt een register bij van de belastingverordeningen van de deelnemers. In het
      register worden tevens de bij die belastingverordeningen behorende kwijtscheldingsregels
      opgenomen.6. Het bestuur kan mandaat verlenen aan een of meer leden van het
      bestuur en aan de directeur. Het bestuur kan de directeur toestaan ondermandaat
      te verlenen.7. Het bestuur is bevoegd tot het geheel of gedeeltelijk oninbaar
      verklaren van de belasting.8. De besturen van de deelnemers kunnen taken en
      bevoegdheden in het kader van de Basisregistraties Adressen en Gebouwen overdragen
      of opdragen aan het bestuur.9. Het bestuur kan slechts dan besluiten tot het
      deelnemen in een gemeenschappelijke regeling dan wel toetreden tot een andere
      rechtspersoon wanneer elk van de besturen van de deelnemers met een daartoe
      strekkend voorstel heeft ingestemd.
