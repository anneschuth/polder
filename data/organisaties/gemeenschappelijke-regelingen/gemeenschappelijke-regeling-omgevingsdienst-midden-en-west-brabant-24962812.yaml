  bevoegdheden:
  - kop_artikel: Artikel 2aOpenbaar lichaam
    inhoud_artikel: 1. Het openbaar lichaam heeft geen verordenende bevoegdheid overgedragen
      gekregen van de deelnemers.2. Het algemeen bestuur heeft een eigen verordenende
      bevoegdheid met betrekking tot de vaststelling van de verordeningen ex artikel
      212 en 213 Gemeentewet juncto artikel 216 en 217 Provinciewet, de vaststelling
      van de organisatieverordening en de vaststelling van de arbeidsvoorwaardenverordening
      als bedoeld in artikel 125 Ambtenarenwet.3. Het algemeen bestuur en dagelijks
      bestuur hebben voorts regelgevende bevoegdheid met betrekking tot de aangelegenheden
      die de bedrijfsvoering van het openbaar lichaam betreffen.
