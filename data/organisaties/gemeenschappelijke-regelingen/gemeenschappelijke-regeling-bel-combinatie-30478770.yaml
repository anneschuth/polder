  bevoegdheden:
  - kop_artikel: 'Artikel 5: Algemene bevoegdheidstoedeling'
    inhoud_artikel: 1. De deelnemers dragen geen bevoegdheden over aan de bedrijfsvoeringsorganisatie.2.
      De deelnemers zorgen voor de vaststelling van toereikende mandaten, volmachten
      en machtigingen die de bedrijfsvoeringsorganisatie nodig heeft voor de uitoefening
      van zijn taken.3. Ondermandaat is toegestaan, tenzij dat uitdrukkelijk is voorbehouden.
