  doel: De Dienst heeft als doel het (doen) uitvoeren van taken van de deelnemende
    gemeenten op de terreinen van sociale zekerheid, maatschappelijke zorg, jeugdzorg
    en gesubsidieerde arbeid, voor zover een gemeente op één van deze terreinen geen
    uitdrukkelijk voorbehoud heeft gemaakt. Voor zover een gemeente een dergelijk
    voorbehoud heeft gemaakt wordt dit opgenomen in een bijlage bij deze regeling.
