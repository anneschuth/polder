gr_meta:
  citeertitel: Gemeenschappelijke Regeling Belastingsamenwerking Rivierenland
  doel: Belastingsamenwerking Rivierenland heeft als doel het voor haar deelnemers
    uitvoeren van het heffen en invorderen van belastingen, het uitvoeren van de Wet
    waardering onroerende zaken, het beheer en de uitvoering van vastgoedinformatie
    en het beheer en de uitvoering van de Basisregistraties voor Adressen en Gebouwen
    (BAG). BSR zorgt voor de onroerende zaakbelasting, roerende zaakbelasting, forensenbelasting,
    rioolheffing, hondenbelasting, afvalstoffenheffing/ reinigingsrecht, zuiveringsheffing,
    wegenheffingen ingezetenen, gebouwd en ongebouwd, watersysteemheffingen ongebouwd,
    ingezetenen, natuurterreinen en ongebouwd. Ook bepaalt BSR de WOZ-waarden van
    panden voor de tien deelnemende gemeenten. Het beheer en de uitvoering van de
    BAG wordt per medio 2014 uitgevoerd voor de gemeenten IJsselstein en Montfoort.
