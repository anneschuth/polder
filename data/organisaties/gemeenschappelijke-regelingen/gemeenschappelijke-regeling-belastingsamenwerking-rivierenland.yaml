  bevoegdheden:
  - kop_artikel: Artikel 4 Behartigde belangen
    inhoud_artikel: In het kader van deze gemeenschappelijke regeling worden de belangen
      van de deelnemers, elk voor zover het hun grondgebied en hun belangen betreft,
      behartigd op het gebied van:a. de heffing en invordering van belastingen;b.
      de uitvoering van de Wet waardering onroerende zaken waaronder tevens wordt
      begrepen de administratie van vastgoedgegevens en het verstrekken van vastgoedgegevens
      aan de deelnemers en derden.c. De inrichting en/of het beheer van andere basisregistraties.
  - kop_artikel: Artikel 5
    inhoud_artikel: '1. [Toelichting: Overdracht Bevoegdheden:]Het BSR en de bestuursorganen
      van het BSR als bedoeld in artikel 3 en artikel 24 komen de bevoegdheden toe
      die in deze regeling aan het BST en de bestuursorganen van het BSR zijn toegekend.2.
      [Toelichting: Geen verordenende bevoegdheden:]Aan het BSR worden geen verordenende
      bevoegdheden toegekend.'
