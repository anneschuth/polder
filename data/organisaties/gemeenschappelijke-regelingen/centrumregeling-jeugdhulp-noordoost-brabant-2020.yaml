  bevoegdheden:
  - kop_artikel: Artikel 5 Bevoegdheden
    inhoud_artikel: 1. De colleges geven de centrumgemeente mandaat en volmacht om
      de in artikel 10 genoemde taken uit te voeren, uiteraard begrensd door wetgeving,
      jurisprudentie en vastgestelde kaders.2. Het college van de centrumgemeente
      kan de bevoegdheden in het eerste lid ondermandateren aan de medewerkers van
      de centrumgemeente.
