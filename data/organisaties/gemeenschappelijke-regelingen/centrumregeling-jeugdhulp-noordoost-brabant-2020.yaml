gr_meta:
  citeertitel: Centrumregeling Jeugdhulp Noordoost Brabant 2020
  doel: De gemeenten zijn een onderlinge samenwerking aangegaan gericht op het zorgdragen
    voor een kwalitatief goede en efficiënte inkoop van de jeugdtaken op basis van
    de Inkoopstrategie 2020-2024, de jaarlijks vastgestelde Inkoopopdracht, het Regionaal
    Beleidsplan Jeugd 2020-2024, en beleidsopdrachten, met inachtneming van de bepalingen
    van de Jeugdwet.
  samenwerkingsvorm:
    value: '''Regeling zonder meer'''
    afkorting: RZM
