  bevoegdheden:
  - inhoud_artikel: Artikel 4 bevoegdheden1. Ter behartiging van het in artikel 3
      lid 1 sub a van de regeling genoemde belang dragen de colleges alle taken en
      bevoegdheden met betrekking tot de uitvoering van de Wet sociale werkvoorziening
      over aan het dagelijks bestuur van het openbaar lichaam, waaronder het aanbieden
      van een dienstbetrekking aan in de gemeenten woonachtige personen als bedoeld
      in artikel 2 lid 1 van de Wet sociale werkvoorziening.2. Indien en voor zover
      het college van burgemeester en wethouders de behartiging van de in artikel
      3 lid 1 sub b van deze regeling genoemde belangen aan het dagelijks bestuur
      van het openbaar lichaam opdraagt, verstrekt het college van burgemeesters en
      wethouders aan de algemeen directeur van Novatec door middel van een mandaatbesluit
      de op deze belangen betrekking hebbende bevoegdheden. In een uitvoeringsovereenkomst
      worden nadere afspraken gemaakt over de wijze van uitvoering van de aan het
      werkvoorzieningschap opgedragen taak.3. Aan het dagelijks bestuur van het openbaar
      lichaam is ten behoeve van zijn doelstelling en taken de bevoegdheid toegekend
      samenwerking aan te gaan met rechtspersonen met overeenkomende doelstellingen
      en taken.4. Aan het algemeen bestuur van het openbaar lichaam is ten behoeve
      van zijn doelstelling en taken de bevoegdheid toegekend privaatrechtelijke rechtspersonen
      op te richten en of deel te nemen in een of meer bestaande dan wel op te richten
      privaatrechtelijke rechtspersonen.
