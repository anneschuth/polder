  citeertitel: gemeenschappelijke regeling Novatec 2006
  doel: 1. Het belang ter behartiging waarvan de regeling is getroffen omvat:a) de
    volledige uitvoering van de Wet sociale werkvoorziening en de daaruit voortvloeiende
    en daarmee verband houdende voorschriften en regelingen gericht op het realiseren
    van de doelstelling van deze wet;b) het bieden van werkervaringsplaatsen en faciliteiten
    op het gebied van testen, trainen en begeleiden van personen met een grote afstand
    tot de arbeidsmarkt in de meest brede zin voor zover gemeenten of andere instanties
    hiervoor een beroep doen op het werkvoorzieningschap.2. Het in lid 1 bedoelde
    belang is zoveel als mogelijk gericht op de reïntegratie van betrokken personen
    op de reguliere arbeidsmarkt dan wel op het verrichten van arbeid onder aangepaste
    omstandigheden.
