  bevoegdheden:
  - kop_artikel: Wet veiligheidsregio’s Artikel 10
    inhoud_artikel: Bij de regeling, bedoeld in artikel 9, worden aan het bestuur
      van de veiligheidsregio de volgende taken en bevoegdheden overgedragen:a. het
      inventariseren van risico’s van branden, rampen en crises;b. het adviseren van
      het bevoegd gezag over risico’s van branden, rampen en crises in de bij of krachtens
      de wet aangewezen gevallen alsmede in de gevallen die in het beleidsplan zijn
      bepaald;c. het adviseren van het college van burgemeester en wethouders over
      de taak, bedoeld in artikel 3, eerste lid;d. het voorbereiden op de bestrijding
      van branden en het organiseren van de rampenbestrijding en de crisisbeheersing;e.
      het instellen en in stand houden van een brandweer;f. het instellen en in stand
      houden van een GHOR;g. het voorzien in de meldkamerfunctie;h. het aanschaffen
      en beheren van gemeenschappelijk materieel;i. het inrichten en in stand houden
      van de informatievoorziening binnen de diensten van de veiligheidsregio en tussen
      deze diensten en de andere diensten en organisaties die betrokken zijn bij de
      onder d, e, f, en g genoemde taken.
  - kop_artikel: GR VNOG Artikel 4 Taken
    inhoud_artikel: "1.\tTer behartiging van de in artikel 3 genoemde belangen is\
      \ de veiligheidsregio belast met de taken en bevoegdheden, als bedoeld in artikel\
      \ 10 van de Wvr en de overige taken en bevoegdheden die bij of krachtens wet-\
      \ en regelgeving aan de veiligheidsregio worden opgedragen.2.\tDe colleges van\
      \ burgemeester en wethouders van de gemeenten kunnen, afzonderlijk of tezamen\
      \ andere taken of bevoegdheden opdragen aan het bestuur van de veiligheidsregio\
      \ voor zover deze taken binnen het belang van de regeling vallen, als omschreven\
      \ in artikel 3. De wijze van uitvoering van deze taken wordt in een overeenkomst\
      \ tussen de veiligheidsregio en de betreffende gemeenten vastgelegd."
  - kop_artikel: GR VNOG Artikel 5 Bevoegdheden
    inhoud_artikel: "1.\tHet algemeen bestuur kan besluiten tot oprichting van of\
      \ deelneming in stichtingen, maatschappen, vennootschappen, verenigingen, coöperaties\
      \ en onderlinge waarborgmaatschappijen. Het algemeen bestuur kan slechts daartoe\
      \ besluiten indien dat in het bijzonder aangewezen moet worden geacht voor de\
      \ behartiging van het daarmee te dienen openbaar belang. Het besluit wordt niet\
      \ genomen dan nadat de raden van de gemeenten een ontwerpbesluit is toegezonden\
      \ en in de gelegenheid zijn gesteld hun wensen en bedenkingen ter kennis van\
      \ het algemeen bestuur te brengen.2.\tHet voorstel tot deelneming is aangenomen\
      \ wanneer het algemeen bestuur met meerderheid van ten minste twee derde van\
      \ de leden van het algemeen bestuur die samen ten minste twee derde van het\
      \ aantal in het algemeen bestuur uit te brengen stemmen vertegenwoordigen daartoe\
      \ besluit.3.\tDe veiligheidsregio houdt een openbaar register van deelnemingen\
      \ bij.4.\tHet algemeen bestuur kan aan het dagelijks bestuur bevoegdheden overdragen,\
      \ tenzij de aard van de bevoegdheid zich daartegen verzet De bevoegdheden, als\
      \ bedoeld in artikel 33a, tweede lid, van de wet kunnen in ieder geval niet\
      \ worden overgedragen."
  - kop_artikel: GR VNOG Artikel 14 Bevoegdheden
    inhoud_artikel: "1.\tHet dagelijks bestuur oefent de taken en bevoegdheden uit\
      \ als bedoeld in artikel 33b van de wet.2.\tVoorts is het dagelijks bestuur\
      \ belast met:a.\thet voorstaan van de belangen van de veiligheidsregio en de\
      \ gemeenten bij andere overheden en andere instellingen, diensten of personen\
      \ waarmee contact voor de veiligheidsregio van belang is;b.\tde coördinatie\
      \ van de werkzaamheden van de territoriale afstemmingsoverleggen, bedoeld in\
      \ de artikelen 14, en van de adviescommissies, bedoeld in artikel 24 van de\
      \ wet;c.\thet regelen van de vervanging van de algemeen directeur;d.\thet vaststellen\
      \ van een instructie voor de secretaris;e.\thet vaststellen van een reglement\
      \ van orde voor de eigen vergaderingen;f.\thet vaststellen van de rechtspositieregelingen\
      \ voor het personeel;g.\tde zorg voor het beheer van inkomsten en uitgaven van\
      \ de veiligheidsregio;h.\tde zorg, voor zover deze niet aan anderen toekomt,\
      \ voor de controle op het geldelijk beheer en de boekhouding;i.\thet houden\
      \ van toezicht op alles wat de veiligheidsregio aangaat;j.\tde zorg voor de\
      \ archiefbescheiden van de veiligheidsregio en haar organen."
