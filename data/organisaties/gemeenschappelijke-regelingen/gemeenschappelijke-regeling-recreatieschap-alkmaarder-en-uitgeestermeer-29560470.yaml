  bevoegdheden:
  - kop_artikel: Artikel 5 Bevoegdheden
    inhoud_artikel: "Artikel 5 \tBevoegdheden1.\tAan het recreatieschap worden ter\
      \ behartiging van de in artikel 3 genoemde belangen/doelen en ter verwezenlijking\
      \ van de in artikel 4 omschreven taken de volgende bevoegdheden toegekend dan\
      \ wel overgedragena.\tbesluiten tot het oprichten van en deelnemen in stichtingen,\
      \ maatschappen, vennootschappen, verenigingen, coöperaties en onderlinge waarborgmaatschappijen,\
      \ voor zover dit past binnen het in artikel 3 gestelde belang;b.\thet vaststellen\
      \ van verordeningen, al dan niet door strafbepaling of bestuursdwang te handhaven,\
      \ strekkende tot de uitoefening van de belangen en de taken van het recreatieschap;c.\t\
      het heffen van leges;d.\thet uitoefenen van de gemeentelijke bevoegdheden, ingevolge\
      \ artikel 430a van het Wetboek van Strafrecht;e.\thet uitoefenen van de bevoegdheid\
      \ van het college van burgemeester en wethouders, als bedoeld in artikel 2.1\
      \ en onder e van de Wet algemene bepalingen omgevingsrecht voor wat betreft\
      \ het gestelde in Bijlage I, onderdeel C, categorie 19, onder 19.1, onder g\
      \ en ten eerste van het Besluit omgevingsrecht, enf.\thet instellen van commissies\
      \ als bedoeld in artikel 25 van de Wgr."
