  bevoegdheden:
  - inhoud_artikel: Artikel 3 - Centrumgemeente constructie1. De regionale verwerving
      van de jeugdhulp wordt uitgevoerd door de centrumgemeente. Deze gemeente treedt
      namens de deelnemende gemeenten op als inkopende of subsidiërende partij.2.
      De deelnemende gemeenten verlenen de centrumgemeente daartoe opdracht tot het
      verrichten van de in artikel 4 genoemde taken namens de deelnemende gemeenten
      overeenkomstig artikel 8, vierde lid van de Wgr.3. De centrumgemeente aanvaardt
      deze opdracht en richt daartoe een inkoopteam in binnen de eigen ambtelijke
      organisatie.4. De kosten van inrichting en instandhouding van het inkoopteam
      als bedoeld in het vorige lid worden door de deelnemende gemeenten gezamenlijk
      gedragen en verdeeld op de wijze zoals vastgelegd in het service-level agreement
      zoals de deelnemers dat met de centrumgemeente aangaan.5.a. De centrumgemeente
      draagt zorg voor het beslissen op aanvragen om subsidie, binnen tevoren door
      de deelnemende gemeenten in regioverband vastgestelde inhoudelijke en financiële
      kaders, onder exclusieve toepassing van de Algemene subsidieverordening van
      de centrumgemeente en op basis van een door het college van de centrumgemeente
      vast te stellen subsidieregeling.b. De centrumgemeente wordt tevens gemandateerd
      te beslissen op bezwaarschriften tegen besluiten als bedoeld onder a.c. De onder
      a en b bedoelde mandaatverlening ziet op een afdoeningsmandaat- en een ondertekeningsmandaat.d.
      De onder a en b bedoelde mandaatverlening omvat mede het verrichten van handelingen
      ter voorbereiding en uitvoering van de betreffende besluiten.e. De centrumgemeente
      is bevoegd om bij afzonderlijk besluit ten aanzien van de uitoefening van de
      in dit lid bedoelde mandaten ondermandaat te verlenen.6. De centrumgemeente
      fungeert als bestuurlijk partner voor de subsidieontvangende instellingen en
      draagt zorg voor de beleidscoördinatie op het vlak van de werkzaamheden van
      de instellingen en stemt dit af met de deelnemende gemeenten in het periodieke
      regionale overleg.7. De centrumgemeente wordt hiermee voorts volmacht verleend
      voor het verrichten van privaatrechtelijke rechtshandelingen ter uitvoering
      van de in artikel 4 genoemde taken.
