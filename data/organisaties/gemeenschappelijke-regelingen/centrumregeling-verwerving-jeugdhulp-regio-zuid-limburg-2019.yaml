gr_meta:
  citeertitel: Centrumregeling Verwerving Jeugdhulp regio Zuid-Limburg 2019
  doel: De deelnemende gemeenten zijn een onderlinge samenwerking aangegaan gericht
    op de doelstellingen zoals verwoord onder de leden 1 en 2 van dit artikel en op
    basis van de uitgangspunten zoals verwoord onder de leden 3 tot en met 6 van dit
    artikel:1. Het zorgdragen voor een kwalitatief goede en efficiënte uitvoering
    van de jeugdhulptaken, zoals vastgelegd in de beleidsplannen Jeugd van de deelnemende
    gemeenten, met inachtneming van de bepalingen van de Jeugdwet.2. Het delen van
    kennis en expertise in de regio die nodig zijn voor de ontwikkeling en uitvoering
    van het jeugdhulpbeleid.3. De samenwerking wordt zodanig ingericht dat zij garant
    staat voor continuïteit en duurzaamheid van de jeugdhulp.4. In de vormgeving van
    deze gezamenlijk uit te voeren jeugdhulp wordt maximaal aangesloten op de wijze
    van inrichting van de lokale jeugdhulptaken in de deelnemende gemeenten.5. De
    deelnemende gemeenten behouden hun eigen bestuurlijke structuur, bevoegdheden
    en verantwoordelijkheden, gericht op een goede dienstverlening aan de eigen bevolking
    en ruimte voor het behoud van eigen identiteit in de uitvoering van de nieuwe
    jeugdhulptaken.6. Deze centrumregeling betreft de taken die de centrumgemeente
    voor de deelnemers verricht ten behoeve van de verwerving van de dienstverlening
    van de jeugdhulp zoals omschreven in artikel 4 van deze regeling.
