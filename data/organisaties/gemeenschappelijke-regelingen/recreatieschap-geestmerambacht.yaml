description:
  text: Recreatieschap Geestmerambacht is de bestuurlijke organisatie die verantwoordelijk
    is voor de ontwikkeling en het beheer van het unieke Geestmerambacht en Park van
    Luna. In opdracht van Recreatieschap Geestmerambacht worden de recreatiegebieden
    Geestmerambacht en Park van Luna beheerd door Recreatie Noord-Holland. Centraal
    hierbij staat dat alle bezoekers van de recreatiegebieden naar hartenlust van
    de bijzondere omgeving kunnen genieten.
  url: https://www.geestmerambacht.nl/over/over-de-organisatie
