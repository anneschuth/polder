  citeertitel: Gemeenschappelijke regeling Natuur- en recreatieschap IJsselmonde
  doel: Het Natuur- en recreatieschap heeft tot taak in onderlinge samenhang het behartigen
    van het gemeenschappelijk belang van de deelnemers voor wat betreft de ontsluiting,
    de ontwikkeling, aanleg en het beheer in het kader van de openluchtrecreatie en
    het toerisme en waar mogelijk van natuur en landschap in het werkgebied.
