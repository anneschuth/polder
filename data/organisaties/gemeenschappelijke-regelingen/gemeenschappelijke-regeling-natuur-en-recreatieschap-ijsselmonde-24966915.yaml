  bevoegdheden:
  - kop_artikel: Artikel 3
    inhoud_artikel: Aan het Natuur- en recreatieschap worden ter vervulling van de
      in artikel 2, vierde lid, omschreven taak alle bevoegdheden van regeling en
      bestuur toegekend binnen de grenzen van de wet.
  - kop_artikel: Artikel 4
    inhoud_artikel: Aan het algemeen bestuur behoort met betrekking tot de in artikel
      2, vierde lid, omschreven taak van het Natuur- en recreatieschap alle bevoegdheid,
      tenzij bij wet of in deze regeling anders is bepaald.
  - kop_artikel: Artikel 5
    inhoud_artikel: Alle stukken die uitgaan van het algemeen bestuur en het dagelijks
      bestuur worden door de voorzitter en de secretaris ondertekend.
