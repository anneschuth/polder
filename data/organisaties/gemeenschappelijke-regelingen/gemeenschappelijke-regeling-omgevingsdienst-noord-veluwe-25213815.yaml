  bevoegdheden:
  - kop_artikel: Artikel 8. Bevoegdheden
    inhoud_artikel: 1. De deelnemers dragen geen publiekrechtelijke bevoegdheden over
      aan het openbaar lichaam.2. De deelnemers beslissen ieder afzonderlijk over
      de verlening van mandaat, volmacht en machtiging aan het openbaar lichaam en
      stemmen dat zoveel mogelijk met elkaar af.
  - kop_artikel: Artikel 9. Beperking privaatrechtelijke bevoegdheden
    inhoud_artikel: Het openbaar lichaam is behoudens instemming van alle deelnemers
      niet bevoegd tot:a. het aangaan van geldleningen, waaronder begrepen het aangaan
      van rekening courant-verhoudingen met een hoger gezamenlijk maximum dan € 500.000,-;b.
      het vestigen van opstal-, pand- en hypotheekrechten;c. het afgeven van garanties
      of andere waarborgen;d. het in erfpacht aannemen of uitgeven van roerende of
      onroerende zaken;e. het in eigendom aannemen of uitgeven van onroerende zaken;f.
      het oprichten van en het deelnemen in een rechtspersoon;g. commerciële dienstverlening
      aan private partijen.
