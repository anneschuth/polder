gr_meta:
  citeertitel: Gemeenschappelijke regeling Omgevingsdienst Noord-Veluwe
  doel: De regeling is ingesteld ter gemeenschappelijke behartiging van de belangen
    van de deelnemers ter zake van vergunningverlening, toezicht en handhaving en
    advisering in het kader van het omgevingsrecht. Onder de belangen van de deelnemers
    wordt tevens begrepen het belang van een goede samenwerking tussen de regionale
    uitvoeringsdiensten in Gelderland.
