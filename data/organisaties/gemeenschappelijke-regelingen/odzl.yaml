names:
- value: Omgevingsdienst Zuid-Limburg
  abbr: ODZL
  valid_from: '1900-01-01'
description:
  text: De Omgevingsdienst Zuid-Limburg is een gemeenschappelijke regeling en levert
    kennis en expertise op het gebied van vergunningverlening, toezicht, handhaving
    en milieuadvies voor gemeenten en provincie. Wij werken aan een gezonde en veilige
    leefomgeving in de regio Limburg. Onze opdrachtgevers zijn de gemeenten Beek,
    Beekdaelen, Brunssum, Eijsden-Margraten, Gulpen-Wittem, Heerlen, Kerkrade, Landgraaf,
    Maastricht, Meerssen, Simpelveld, Sittard-Geleen, Stein, Vaals, Valkenburg aan
    de Geul, Voerendaal en de Provincie Limburg.
  url: https://odzuidlimburg.nl/organisatie/afdelingen/default.aspx
