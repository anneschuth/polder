  bevoegdheden:
  - kop_artikel: Artikel 9 Taken en bevoegdheden van het Dagelijks Bestuur
    inhoud_artikel: 1. De taken en bevoegdheden van het Dagelijks Bestuur volgen uit
      de wet, deze Regeling of zijn door de colleges overgedragen.2. Het Dagelijks
      Bestuur heeft de navolgende taken en bevoegdheden ter uitvoering van de Kernagenda
      zoals genoemd in artikel 2, lid 3 en uitgewerkt in het Blauwe Schema:• het uitoefenen
      van een regionale platformfunctie• het nemen van besluiten ten aanzien van bovenregionale,
      bovengemeentelijke afstemmings- vraagstukken alsmede het bepalen op welke manier
      dergelijke vraagstukken kunnen worden afgewikkeld;• het namens de regio, zijnde
      alle Parkstad-Limburggemeenten, kunnen reageren op van hogere overheden ontvangen
      documenten, waaronder het geven van inspraakreacties;• het voorbereiden van
      regionaal beleid;• het vaststellen van regionaal beleid voor zover dit een collegebevoegdheid
      betreft;• het opstellen en vaststellen van regionale beleidsregels;• het toetsen
      van de toepassing en uitvoering van regionaal beleid;• het programmeren en vaststellen
      van regionale programmeringen en regionale programma’s;• het regionaal monitoren;•
      het regionaal ontwikkelen van instrumenten en• het verstrekken van financiële
      middelen/subsidies (voor zover -regionaal- budget voorhanden is.)3. Door de
      colleges overgedragen bevoegdheden worden onverwijld door het Algemeen Bestuur,
      op voorstel van het Dagelijks Bestuur, aan de Bestuurscommissies overgedragen.
      Het Dagelijks Bestuur heeft hierdoor primair de verantwoordelijkheid voor:a.
      de besturing en de verantwoording van de gemeenschappelijke regeling.b. het
      bevorderen en invullen van de samenwerking binnen Parkstad.c. het leggen van
      dwarsverbanden en initiëren/uitvoeren van overkoepelende activiteiten. Dit via
      het aanhaken aan (bij voorkeur Parkstadbrede) kansrijke initiatieven (inclusief
      het verrichten van haalbaarheidsonderzoeken) die zich tijdens de uitvoering
      van het jaarplan kunnen aandienen/Bestuurscommissies-overstijgende onderwerpen.d.
      het vervullen van de werkgeversrol voor de Parkstad Limburg-organisatiee. de
      communicatie naar de stakeholders, zoals gemeenteraden, colleges, provincie,
      maatschappelijke organisaties.f. de afwikkeling van de overdracht van de taken
      GBRD aan BsGW en het beheer van de daarvoor bestemde desintegratie- en frictiebudgetten.4.
      De bestuursorganen van deze Regeling kunnen bepalen op welke wijze verandering
      kan worden gebracht in de overgedragen bevoegdheden, met dien verstande dat
      niet kan worden besloten tot uitbreiding van de overgedragen bevoegdheden.
