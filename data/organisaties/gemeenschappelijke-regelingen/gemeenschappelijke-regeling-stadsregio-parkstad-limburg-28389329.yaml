  citeertitel: Gemeenschappelijke regeling Stadsregio Parkstad Limburg
  doel: 1. Stadsregio Parkstad Limburg heeft tot doel om op basis van de onderwerpen
    genoemd in de Kern-agenda en de Keuze-agenda de samenwerking tussen de deelnemende
    Gemeenten te faciliteren en te komen tot een samenhangend beleid en uitvoering
    daarvan op de gebieden van ruimte, mobiliteit, economie & toerisme, wonen & herstructurering,
    energie en duurzaamheid, sociaal domein/participatie, cultuur, onderwijs, arbeidsmarkt,
    milieu en sport.2. De vorm van de samenwerking kan verschillen. Aan de onderwerpen
    die deel uitmaken van de Kern-agenda nemen alle Gemeenten deel. Daarbij is het
    Regiobureau procesmatig en inhoudelijk verantwoordelijk. Aan de onderwerpen die
    deel uit maken van de keuze-agenda nemen alleen Gemeenten deel die daarvoor kiezen.
    Daarbij heeft het Regiobureau ten minste een monitorende en versterkende taak;
    de procesverantwoordelijkheid kan echter ook buiten de Stadsregio Parkstad Limburg
    worden gelegd.3. Tot de onderwerpen van de Kern-agenda behoren in elk geval:a.
    ruimte;b. mobiliteit;c. economie & toerisme;d. wonen & herstructureringzoals weergegeven
    in het Blauwe Schema.
