description:
  text: 'Veiligheidsregio Limburg-Noord (VRLN) is één van de 25 veiligheidsregio’s
    van ons land. Binnen Veiligheidsregio Limburg-Noord werken brandweer, GGD en crisisbeheersing
    samen. Het samenwerkingsverband wordt bestuurd door de deelnemende gemeenten:
    Beesel, Bergen, Echt-Susteren, Gennep, Horst aan de Maas, Leudal, Maasgouw, Mook
    en Middelaar, Nederweert, Peel en Maas, Roerdalen, Roermond, Venlo, Venray en
    Weert. Tevens is de veiligheidsregio een samenwerkingsverband tussen de politie,
    gemeenten, defensie, waterschappen, Rijkswaterstaat, Ambulancezorg Limburg en
    Prorail. Het doel van de samenwerking is gezamenlijke voorbereidingen treffen
    en de aanpak van een ramp of crisis gecoördineerd tot stand brengen.'
