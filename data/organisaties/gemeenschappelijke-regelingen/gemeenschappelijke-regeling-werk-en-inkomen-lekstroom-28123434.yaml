  bevoegdheden:
  - kop_artikel: Artikel 5 Taken en bevoegdheden
    inhoud_artikel: 1.Binnen het belang en de missie van het vorige artikel verricht
      de dienst de daarop gerichte beleids- en uitvoerende taken voor de deelnemende
      gemeenten in het kader van de aan die gemeenten opgedragen of in de toekomst
      op te dragen taken op grond van en krachtensa.de Participatiewet;b.de Wet inkomensvoorziening
      oudere en gedeeltelijk arbeidsongeschikte werkloze werknemers;c.de Wet inkomensvoorziening
      oudere en gedeeltelijk arbeidsongeschikte gewezen zelfstandigen;d.het Besluit
      bijstandverlening zelfstandigen 2004 (incl. artikel 36);e.het minimabeleidf.artikel
      1.13 van de Wet kinderopvang en kwaliteitseisen peuterspeelzalen;g.de Wet gemeentelijke
      schuldhulpverlening;h.de artikelen 21 en 22 van de Wet op de Lijkbezorging2.De
      dienst is voorts opgedragen de volledige verantwoordelijkheid en de uitvoering
      van taken op grond van en krachtens nieuwe wet- en regelgeving, die in de plaats
      treedt of samenhangt met de in het eerste lid genoemde wetten en regelgeving.3.De
      deelnemende gemeentebesturen dragen hun bevoegdheden op grond van die wetten
      en regelingen over aan het algemeen bestuur van het openbaar lichaam, met uitzondering
      van de bevoegdheid met betrekking tot het vaststellen van het lokaal minimabeleid
      en het beleid ingevolge de bijzondere bijstand. Deze bevoegdheid blijft bij
      de afzonderlijke gemeentebesturen.4.De gemeenteraden van Houten en Nieuwegein
      dragen in afwijking van het derde lid geen van hun verordenende bevoegdheden
      over.5.Met betrekking tot de uitvoering van de in de leden 1 tot en met 3 van
      dit artikel overgedragen bevoegdheden en uitoefening van de daarop gebaseerde
      taken worden door de gemeenten periodiek beleidskaders en beleidsprioriteiten
      geformuleerd. Hiervan afgeleid worden door de gemeenten in overleg met het openbaar
      lichaam prestatieafspraken opgesteld.6.Voorts is de dienst belast met:a.de taak
      en bevoegdheid om te besluiten op bezwaarschriften die in het kader van de uitgeoefende
      taken worden ingediend;b.de behandeling en afhandeling van klachten op basis
      van de door het algemeen bestuur vast te stellen klachtenregeling.c.de voorbereidende
      werkzaamheden van regelingen die aan het Rijk verantwoord moeten worden ten
      behoeve van rijksinformatie.7.De gemeenten kunnen de dienst belasten met de
      verantwoordelijkheid en de uitvoering van de taken en bevoegdheden op grond
      van andere dan in het eerste lid genoemde wetten en regelingen inzake de sociale
      zekerheid en inzake gemeentelijke sociale zorg voor zover de betreffende wetgeving
      en regelingen daartoe de mogelijkheid bieden.8.De taken en bevoegdheden, bedoeld
      in het eerste lid, worden zoveel mogelijk uitgevoerd in samenwerking met het
      Uitvoeringsinstituut werknemersverzekeringen (Uwv) en andere organisaties en
      instanties die met de uitvoering van sociale zekerheidswetten zijn belast.9.De
      gemeentelijke bestuursorganen verlenen hun medewerking aan de uitvoering van
      besluiten die het bestuur van de dienst neemt binnen de aan het bestuur toegekende
      bevoegdheden.
