names:
- value: Werk en Inkomen Lekstroom
  abbr: WIL
  valid_from: '1900-01-01'
description:
  text: Werk en Inkomen Lekstroom (WIL) helpt inwoners van de Lekstroomgemeenten Houten,
    IJsselstein, Lopik en Nieuwegein en onze klanten gericht vooruit op het gebied
    van werk, inkomen en schulden. Ons doel is dat mensen weer mee kunnen doen en
    perspectief hebben.Wat doet WIL?WIL verstrekt bijstandsuitkeringen aan mensen
    die het écht nodig hebben en begeleidt hen naar werk, betaald of onbetaald. Daarnaast
    biedt WIL hulp bij schulden en financiële ondersteuning aan mensen met een laag
    inkomen.
  url: https://www.wil-lekstroom.nl/over-wil/ons-doel
