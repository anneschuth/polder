gr_meta:
  citeertitel: Gemeenschappelijke Regeling Metropoolregio Eindhoven 2024
  doel: Het doel van de samenwerking binnen de Metropoolregio Eindhoven is het handhaven
    en uitbouwen van het kenmerkende economische profiel van de regio, om op die manier
    het vestigings- en verblijfsklimaat voor onze inwoners en bedrijven te stimuleren.Daartoe
    organiseert de Metropoolregio een adequate vorm van samenwerking tussen gemeenten
    onderling en tussen overheid en maatschappelijke partners ter behartiging van
    de gezamenlijke belangen op de thema’s, zoals nader uitgewerkt in een regionale
    agenda (ruimte en wonen, mobiliteit, energietransitie, economie, landelijk gebied).
  samenwerkingsvorm:
    value: Openbaar lichaam
    afkorting: OL
