  bevoegdheden:
  - kop_artikel: Bevoegdheden  Artikel 5
    inhoud_artikel: '1. Onverminderd de rechtstreeks door de wet aan haar toegekende
      bevoegdheden, is het bestuur van de Metropoolregio ter uitoefening van haar
      taken, genoemd in artikel 4, eerste lid, bevoegd:a. Algemeen verbindende voorschriften
      te geven over:- het instellen en beheren van regionale investerings- en stimuleringsfondsen;-
      de eigen organisatie en bedrijfsvoering.b. Een regionale agenda vast te stellen.c.
      Het oprichten van onderscheidenlijk deelnemen in stichtingen, maatschappen,
      vennootschappen en coöperaties en verenigingen, dan wel de ontbinding daarvan
      of beëindiging van deelneming daarvan, onverminderd het bepaalde in artikel
      31a van de wet.d. Een gemeenschappelijke regeling tussen het openbaar lichaam
      en andere openbare lichamen vast te stellen en te wijzigen, alsmede het toetreden
      tot en het uittreden uit een dergelijke gemeenschappelijke regeling.e. Met één
      of meer gemeenten samenwerkingsovereenkomsten te sluiten met betrekking tot
      ondersteunende dienstverlening.2. De bevoegdheden die het bestuur van de Metropoolregio
      heeft ter uitoefening van de taken als bedoeld in artikel 4, tweede lid, luiden
      als volgt:a. Landgoed Gulbergen: het verrichten van privaatrechtelijke rechtshandelingen
      als grondeigenaar van het landgoed en het doen van uitgaven uit het fonds en
      de voorzieningen als bedoeld in artikel 4, tweede lid, aanhef en onder a.3.
      De bevoegdheden van het bestuur behorende bij de taken als bedoeld in artikel
      4, derde lid, zijn;a. Het vaststellen van een verordening als bedoeld in artikel
      30, eerste lid, van de Archiefwet 1995 voor de zorg voor en het beheer van de
      archiefbescheiden van alle bestuursorganen van de gemeenten die naar de regionale
      archiefbewaarplaats(en) zijn overgebracht.b. Het aanwijzen van de gemeentelijke
      archiefbewaarplaats(en) als bedoeld in artikel 31 van de Archiefwet 1995. Aan
      deze bevoegdheid wordt uitvoering gegeven door het aanwijzen van één of meer
      regionale archiefbewaarplaatsen.c. Het aanwijzen, schorsen en ontslaan van een
      gemeentearchivaris als bedoeld in artikel 32, derde lid, van de Archiefwet 1995,
      in de persoon van een streekarchivaris.d. Het vaststellen van een verordening
      als bedoeld in de Archiefwet, met betrekking tot het toezicht op het beheer
      van de archiefbescheiden van de gemeenten door de streekarchivaris. Onder het
      toezicht valt ook het toezicht op het beheer van de archiefbescheiden van gemeenschappelijke
      organen en/of de organen van openbare lichamen, voor zover dat toezicht door
      een voorziening of het ontbreken daarvan bij een deelnemende gemeente berust.e.
      Het heffen van rechten ter zake van het genot van door of vanwege het RHCe geleverde
      diensten aan particulieren.4. Het bepaalde in het derde lid, is niet van toepassing
      op de gemeente Gemert-Bakel.'
