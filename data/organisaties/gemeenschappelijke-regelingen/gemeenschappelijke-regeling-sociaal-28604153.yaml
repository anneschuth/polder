gr_meta:
  citeertitel: Gemeenschappelijke Regeling Sociaal
  doel: 1. De GRS heeft tot doel, binnen de kaders als genoemd in en voortvloeiend
    uit deze Regeling, bij te dragen aan de beleidsontwikkeling van de gemeenten op
    de gebieden van het sociaal domein en sociale werkvoorziening en uitvoering te
    geven aan het op deze gebieden vastgestelde beleid.2. Ter verwezenlijking van
    de in het eerste lid genoemde doelstelling behartigt de GRS de gemeenschappelijke
    regionale belangen op de terreinen van sociaaleconomische versterking, sociaal
    domein en sociale werkvoorziening.
