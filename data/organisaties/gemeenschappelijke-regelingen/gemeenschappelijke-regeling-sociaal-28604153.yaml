  bevoegdheden:
  - kop_artikel: Artikel 4. Grondslagen, artikel 5 Taken
    inhoud_artikel: "1. GRS vervult ten behoeve van de in artikel 3 genoemde doelstelling\
      \ de taken:a. die bij deze Regeling aan de GRS zijn gedelegeerd;b. die bij deze\
      \ Regeling aan de GRS zijn gemandateerd dan wel waarvoor volmacht of machtiging\
      \ is verleend;c. die worden uitgevoerd in opdracht van één of enkele gemeenten.2.\
      \ De in het eerste lid onder c bedoelde taken worden niet uitgevoerd dan nadat\
      \ de betreffende taken zijn vastgelegd in een tussen het Dagelijks Bestuur en\
      \ het college van de betreffende gemeente(n) af te sluiten dienstverleningsovereenkomst\
      \ en bij afzonderlijk besluit van het college of de colleges van de betreffende\
      \ gemeente(n) de voor de uitvoering van die taken vereiste bevoegdheden zijn\
      \ gedelegeerd of gemandateerd dan wel dan wanneer daarvoor volmacht of machtiging\
      \ is verleend.3. Naast de in het eerste lid bedoelde taken kan de GRS ook de\
      \ uitvoering van taken ten behoeve van andere dan de in de aanhef genoemde gemeenten\
      \ of het rijk, de provincie en andere publiekrechtelijke lichamen op zich nemen.4.\
      \ De uitvoering van de in het derde lid bedoelde taken kan plaatsvinden door\
      \ middel van een daartoe tussen het betreffende overheids-/publiekrechtelijke\
      \ lichaam en de GRS te sluiten overeenkomst en door middel van deelname door\
      \ het betreffende overheids-/publiekrechtelijke lichaam aan de regeling voor\
      \ die ta(a)k(en), onder door het Algemeen Bestuur te stellen voorwaarden.Artikel\
      \ 51.\tAan het bestuur van de GRS worden de volgende taken gedelegeerd en gemandateerd\
      \ als bedoeld in artikel 4, eerste lid onder a en b:Onderwerp \tBevoegdhedenParticipatieweta.\t\
      Het vaststellen van nadere regels wordt gedelegeerd aan het Algemeen Bestuur,\
      \ met uitzondering van de nadere regels voor aanvullende inkomensondersteuning\
      \ (paragraaf 4.1. van de Participatiewet).b.\tAlle uitvoerende taken en bevoegdheden,\
      \ die bij of krachtens de wet, alsmede de daarop gebaseerde algemene maatregelen\
      \ van bestuur en uitvoeringsregelingen, aan de colleges zijn toegekend, worden\
      \ gedelegeerd aan het Dagelijks Bestuur.Wet inkomensvoorziening oudere en gedeeltelijk\
      \ arbeidsongeschikte werkloze werknemers (IOAW)a.\tHet vaststellen van nadere\
      \ regels wordt gedelegeerd aan het Algemeen Bestuur;b.\tAlle uitvoerende taken\
      \ en bevoegdheden, die bij of krachtens de wet, alsmede de daarop gebaseerde\
      \ algemene maatregelen van bestuur en uitvoeringsregelingen, aan de colleges\
      \ zijn toegekend, worden gedelegeerd aan het Dagelijks Bestuur.Wet Inkomensvoorziening\
      \ oudere en gedeeltelijk arbeidsongeschikte gewezen zelfstandigen (IOAZ)a.\t\
      Het vaststellen van nadere regels wordt gedelegeerd aan het Algemeen Bestuur;b.\t\
      Alle uitvoerende taken en bevoegdheden, die bij of krachtens de wet, alsmede\
      \ de daarop gebaseerde algemene maatregelen van bestuur en uitvoeringsregelingen,\
      \ aan de colleges zijn toegekend, worden gedelegeerd aan het Dagelijks Bestuur.De\
      \ Wmo 2015, voor zover dit de maatwerkvoorzieningen betreft, zoals nader aangeduid\
      \ in de desbetreffende begripsbepaling van artikel 1.1.1 van de Wmo 2015, met\
      \ inbegrip van de bevoegdheden genoemd in artikel 6.1 Wmo 2015 en met uitzondering\
      \ van beschermd wonen en opvang.a.\tAlle uitvoerende taken en bevoegdheden,\
      \ die bij of krachtens de in de eerste kolom genoemde artikelen, alsmede de\
      \ daarop gebaseerde algemene maatregelen van bestuur en uitvoeringsregelingen,\
      \ aan de colleges zijn toegekend, worden   gedelegeerd aan het Dagelijks Bestuur.Wet\
      \ structuur uitvoeringsorganisatie werk en inkomena.  Het vaststellen van nadere\
      \ regels wordt gedelegeerd aan het Algemeen Bestuur;b.  Alle uitvoerende taken\
      \ en bevoegdheden, die bij of krachtens de wet, alsmede de daarop gebaseerde\
      \ algemene maatregelen van bestuur en uitvoeringsregelingen, aan de colleges\
      \ zijn toegekend, worden gedelegeerd aan het Dagelijks Bestuur.Wet kinderopvang,\
      \ voor zover betrekking hebbend op de tegemoetkoming van de gemeente in de kosten\
      \ van kinderopvang (hoofdstuk 1).a.\tHet vaststellen van nadere regels wordt\
      \ gedelegeerd aan het Algemeen Bestuur;b.\tAlle uitvoerende taken en bevoegdheden,\
      \ die bij of krachtens het in de eerste kolom genoemde hoofdstuk, alsmede de\
      \ daarop gebaseerde algemene maatregelen van bestuur en uitvoeringsregelingen,\
      \ aan de colleges zijn toegekend, worden gedelegeerd aan het Dagelijks Bestuur.Wet\
      \ gemeentelijke schuldhulpverleninga.\tAlle uitvoerende taken en bevoegdheden,\
      \ die bij of krachtens de wet, alsmede de daarop gebaseerde algemene maatregelen\
      \ van bestuur en uitvoeringsregelingen, aan de colleges zijn toegekend, worden\
      \ gedelegeerd aan het Dagelijks Bestuur met uitzondering van de uitvoering van\
      \ preventie, nazorg en vroegsignalering.b.\tAlle uitvoerende taken en bevoegdheden\
      \ op het gebied van de taken preventie, nazorg en vroegsignalering, die bij\
      \ of krachtens de wet, alsmede de daarop gebaseerde algemene maatregelen van\
      \ bestuur en uitvoeringsregelingen, aan de colleges zijn toegekend, worden gemandateerd\
      \ aan het Dagelijks Bestuur.Wet Sociale Werkvoorziening, voor zover betrekking\
      \ hebbend op de in het vijfde lid genoemde takena.\tHet vaststellen van nadere\
      \ regels wordt gedelegeerd aan het Algemeen Bestuur;b.\tAlle uitvoerende taken\
      \ en bevoegdheden, die bij of krachtens de in de eerste kolom genoemde taken,\
      \ alsmede de daarop gebaseerde algemene maatregelen van bestuur en uitvoeringsregelingen,\
      \ aan de colleges zijn toegekend, worden gedelegeerd aan het Dagelijks Bestuur.Algemene\
      \ wet bestuursrechta.\tHet vaststellen van nadere regels wordt gedelegeerd aan\
      \ het Algemeen Bestuur;b.\tDe uitvoering van titel 4.2 Awb wordt gedelegeerd\
      \ aan het Dagelijks BestuurBeschermd wonen en opvangDe uitvoeringstaken waartoe\
      \ door de gemeente Dordrecht specifiek opdracht is gegeven worden gemandateerd\
      \ aan het Dagelijks Bestuur.Wet op de lijkbezorgingDe uitvoering van de artikelen\
      \ 21 en 22 en het verlenen van toestemming voor het verrichten van sectie op\
      \ het lichaam van een overledene op grond van artikel 72, tweede lid van de\
      \ Wet op de lijkbezorging worden gemandateerd aan het Dagelijks Bestuur.Burgerlijk\
      \ WetboekDe bevoegdheid tot het indienen van een verzoek tot instelling van\
      \ een bewind wegens verkwisting of het hebben van problematische schulden op\
      \ grond van artikel 1:432 BW respectievelijk tot het verlengen of opheffen van\
      \ een ingesteld bewind op grond van artikel 1:449 BW wordt gemandateerd aan\
      \ het Dagelijks Bestuur.2.\tConform artikel 4:81 van de Algemene wet bestuursrecht\
      \ kunnen zowel het Algemeen Bestuur als het Dagelijks Bestuur van de regeling\
      \ beleidsregels vaststellen met betrekking tot de aan hen gedelegeerde en gemandateerde\
      \ bevoegdheden.3.\tDe Gemeenten kunnen in de door hen vast te stellen verordeningen\
      \ en andere algemeen verbindende voorschriften beleidsinhoudelijke verschillen\
      \ opnemen die aansluiten op de lokale wensen en behoeften. De eventuele meer-\
      \ of minderkosten in de uitvoering worden via een uitvoeringstoets door de GRS\
      \ in beeld gebracht en verrekend met de betreffende gemeente(n).4.\tDe Gemeenten\
      \ kunnen aan het Algemeen Bestuur en aan het Dagelijks Bestuur opdragen om in\
      \ de op grond van het eerste lid vast te stellen nadere regels en beleidsregels\
      \ beleidsinhoudelijke verschillen op te nemen die aansluiten op de lokale wensen\
      \ en behoeften. De eventuele meer- of minderkosten in de uitvoering worden via\
      \ een uitvoeringstoets door de GRS in beeld gebracht en verrekend met de betreffende\
      \ gemeente(n).5.\tNaast de in lid 1 en 2 genoemde gedelegeerde en gemandateerde\
      \ taken heeft het bestuur van de GRS de volgende taken:Sociaala.\tHet, in co-creatie\
      \ met de Gemeenten, voorbereiden van een door de lokale raden vast te stellen\
      \ regionale visie sociaal beleid;b.\tHet, in co-creatie met de Gemeenten, voorbereiden\
      \  van door de lokale raden vast te stellen verordeningen en beleidsplannen;c.\t\
      Het, in co-creatie met de Gemeenten, voorbereiden van door de colleges vast\
      \ te stellen nadere regels,voor zover deze betrekking hebben op de in het eerste\
      \ lid genoemde taken.Sociale werkvoorziening (Wsw)Het in samenhang met de Participatiewet\
      \ (doen) uitvoeren van de Wsw, aangepaste arbeid en daarmee verband houdende\
      \ vraagstukken (artikel 1, tweede lid Wsw) op de volgende terreinen:a.\tHet\
      \ met de gemeenschappelijke regeling sociale werkvoorziening Drechtwerk ontwikkelen\
      \ van beleid en het stellen van kaders op het gebied van het (doen) verschaffen\
      \ van arbeid onder aangepaste omstandigheden aan mensen die op 1 januari 2015\
      \ een sw-indicatie en een dienstbetrekking bij de GR Drechtwerk hadden;b.\t\
      Het in relatie tot het gestelde onder a overdragen van de daartoe verkregen\
      \ Rijksmiddelen Wsw aan de gemeenschappelijke regeling sociale werkvoorziening\
      \ Drechtwerk;c.\tHet organiseren van cliëntenparticipatie sociale werkvoorziening;d.\t\
      Het uitvoeren van al die werkzaamheden en activiteiten die dienstbaar zijn aan\
      \ en voortvloeien uit de onder a tot en met c genoemde taken.6.\tDe gemeente\
      \ Hardinxveld-Giessendam neemt niet deel aan de in het vijfde lid, onder het\
      \ kopje \"Sociale werkvoorziening (Wsw)\" genoemde taken. Indien zij alsnog\
      \ deel wil gaan nemen aan deze taken dient zij dit tijdig bij het algemeen bestuur\
      \ kenbaar te maken. Aan de deelname kunnen door het algemeen bestuur voorwaarden\
      \ worden verbonden."
