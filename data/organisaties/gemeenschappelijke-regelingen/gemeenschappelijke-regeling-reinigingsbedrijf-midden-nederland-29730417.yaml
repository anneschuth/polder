  bevoegdheden:
  - kop_artikel: Bevoegdhedenverdeling  Artikel  18
    inhoud_artikel: 1.Met betrekking tot de uitoefening van de in artikel 3 en 4 genoemde
      doelen en taken berust bij het dagelijks bestuur alle bevoegdheid die niet krachtens
      deze regeling aan het algemeen bestuur of aan de voorzitter is opgedragen.2.Naast
      de uitoefening van taken en bevoegdheden op grond van het elders in deze regeling
      bepaalde, is het algemeen bestuur in elk geval belast met en bevoegd tot het:a.vaststellen
      van de meerjaren- en jaarlijkse beleidsplannen;b.vaststellen en wijzigen van
      de begroting;c.vaststellen van de jaarrekening,d.vaststellen van de winstbestemming/verliesdekking;e.vaststellen
      van de controleverordening;f.vaststellen van het treasurystatuut;g.vaststellen
      van het dienstverleningshandvest, bedoeld in artikel 5, eerste en tweede lid;h.vaststellen
      van de model dienstverleningsovereenkomst, bedoeld in artikel 5, derde lid;i.opstellen
      van voorwaarden voor toetreding;j.besluiten over toetreding en uittreding van
      (andere) deelnemers; enk.oprichten van, het mede oprichten van en het deelnemen
      in bedrijven.3.Voor zover de bevoegdheid in het tweede lid, onder k, het oprichten
      van en de deelneming in stichtingen, maatschappen, vennootschappen, verenigingen,
      coöperaties en onderlinge waarborgmaatschappijen behelst, besluit het algemeen
      bestuur hiertoe indien dat in het bijzonder aangewezen moet worden geacht voor
      de behartiging van het daarmee te dienen publiek belang. Het besluit wordt niet
      genomen dan nadat de raden van de deelnemende gemeenten in de gelegenheid zijn
      gesteld hun wensen en bedenkingen ter kennis van het algemeen bestuur te brengen.
  - kop_artikel: Artikel  19
    inhoud_artikel: 1.Het algemeen bestuur kan, naast commissies van advies, commissies
      instellen met het oog op de behartiging van bepaalde belangen.2.De instelling
      van commissies, de regeling van haar bevoegdheden en samenstelling alsmede de
      vaststelling van andere nadere regelingen met betrekking tot het functioneren
      van commissies, geschieden overeenkomstig het bepaalde in artikel 24 en 25 van
      de wet.3.Het algemeen bestuur kan verordeningen vaststellen.
  - kop_artikel: Artikel  20
    inhoud_artikel: 1.Naast de uitoefening van taken en bevoegdheden op grond van
      het elders in deze regeling bepaalde, is het dagelijks bestuur onder meer belast
      met en bevoegd tot:a.dagelijkse bestuursaangelegenheden, voor zover niet bij
      of krachtens de wet of de regeling het algemeen bestuur hiermee is belast;b.beslissingen
      van het algemeen bestuur voor te bereiden en uit te voeren;c.regels vast te
      stellen over de ambtelijke organisatie van het openbaar lichaam;d.ambtenaren
      te benoemen, te schorsen en te ontslaan, dit met uitzondering van de secretaris-directeur;e.tot
      privaatrechtelijke rechtshandelingen van het openbaar lichaam te besluiten,
      met uitzondering van privaatrechtelijke rechtshandelingen als bedoeld in artikel
      17, derde lid, juncto 31a van de wet;f.te besluiten namens het openbaar lichaam,
      het dagelijks bestuur of het algemeen bestuur rechtsgedingen, bezwaarprocedures
      of administratief beroepsprocedures te voeren of handelingen ter voorbereiding
      daarop te verrichten, tenzij het algemeen bestuur, voor zover het het algemeen
      bestuur aangaat, in voorkomende gevallen anders beslist;g.het toezicht op het
      beheren van de financiën en eigendommen van het lichaam;h.het opstellen/aanpassen
      van een instructie voor de secretaris-directeur; eni.het voorstaan van de belangen
      van het lichaam bij andere overheden en andere instellingen, diensten en personen
      waarmee contact voor het lichaam van belang is;j.het geven van opdrachten, het
      doen van aanbestedingen en van gunningen van leveringen en diensten en het aangaan
      van overeenkomsten, voor zover behorend tot de bij RMN belegde taken, met inbegrip
      van overeenkomsten met afval- en grond-verwerkers- en onderhoudsbedrijven2.Het
      dagelijks bestuur kan een of meer leden van het dagelijks bestuur, alsmede de
      secretarisdirecteur, machtigen tot uitoefening van een of meer van zijn bevoegdheden,
      tenzij de regeling waarop de bevoegdheid steunt zich daartegen verzet.
