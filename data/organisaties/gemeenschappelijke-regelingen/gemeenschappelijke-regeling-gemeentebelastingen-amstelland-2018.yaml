  bevoegdheden:
  - kop_artikel: Artikel 4. Mandaat collegebevoegdheden
    inhoud_artikel: 1. Het college van de gastheergemeente wordt mandaat verleend
      om namens de colleges van de gastgemeenten alle besluiten te nemen ter uitvoering
      van de artikelen 230 tot en met 257 van de Gemeentewet in samenhang met de Algemene
      wet inzake rijksbelastingen, de Invorderingswet 1990 en de Kostenwet invordering
      rijksbelastingen, de Wet waardering onroerende zaken en de door de raden van
      de gastgemeenten vastgestelde belastingverordeningen , voor zover deze besluiten
      betrekking hebben op belastingen waarvan de heffing of invordering krachtens
      artikel 7 van deze regeling, is overgedragen aan de ambtenaren van de gastheergemeente.2.
      Het college van de gastheergemeente wordt mandaat verleend om namens de colleges
      van de gastgemeenten alle feitelijke handelingen en rechtshandelingen te verrichten
      ter voorbereiding en uitvoering van de beslissingen van de colleges van de gastgemeenten
      als bedoeld in het eerste lid.3. De bevoegdheid te beslissen op bezwaarschriften
      tegen besluiten als bedoeld in het eerste en het tweede lid wordt niet opgedragen
      aan het college van de gastheergemeente. Het college van de gastheergemeente
      kan wel namens de colleges van de gastgemeenten alle handelingen ter voorbereiding
      van de beslissing op bezwaar verrichten.4. Ten aanzien van de bevoegdheden die
      in dit artikel in mandaat worden opgedragen aan het college van de gastheergemeente,
      kan dit college ondermandaat verlenen aan ambtenaren van de gastheergemeente.
  - kop_artikel: Artikel 5. Overgedragen collegebevoegdheden
    inhoud_artikel: Het college van de gastheergemeente kan bepalen dat voor de toezending
      of uitreiking van aanslagbiljetten ingevolge artikel 8, eerste lid, van de Invorderingswet
      1990 voor de in artikel 232, tweede lid onder b, bedoelde ambtenaar een andere
      ambtenaar van de gastheergemeente in de plaats treedt.
  - kop_artikel: Artikel 6. Ambtelijke bevoegdheden
    inhoud_artikel: 1. De colleges van de gastgemeenten wijzen, met inachtneming van
      artikel 232, tweede lid onder a Gemeentewet en artikel 30, zevende lid, van
      de Wet waardering onroerende zaken de door de gastheergemeente aangewezen heffingsambtenaar
      aan als heffingsambtenaar van hun gemeente.2. De colleges van de gastgemeenten
      wijzen, met inachtneming van artikel 232, tweede lid onder b Gemeentewet de
      door de gastheergemeente aangewezen invorderingsambtenaar aan als invorderingsambtenaar
      van hun gemeente.3. De colleges van de gastgemeenten wijzen, met inachtneming
      van artikel 232, tweede lid onder c Gemeentewet de door de gastheergemeente
      aangewezen belastingambtenaren aan als belastingambtenaren van hun gemeente.4.
      De colleges van de gastgemeenten wijzen, met inachtneming van artikel 232, tweede
      lid onder d Gemeentewet de door de gastheergemeente aangewezen belastingdeurwaarder
      aan als belastingambtenaar van hun gemeente.5. Dit artikel is slechts van toepassing
      op de heffing en invordering van belastingen zoals die in de dienstverleningsovereenkomst,
      bedoeld in artikel 7, zijn opgenomen.
  - kop_artikel: Artikel 7. Overdracht uitvoering gemeentelijke belastingen
    inhoud_artikel: Door de gastheer gemeente worden op het moment van het aangaan
      van deze vernieuwde gemeenschappelijke regeling onderstaande belastingen, alsmede
      de uitvoering van de Wet waardering onroerende zaken, uitgevoerd voor zover
      de uitvoering is overgedragen of niet is ingetrokken. Door de gastheergemeente
      wordt een laatste stand van zaken vastgelegd in de dienstverleningsovereenkomst
      met de deelnemende gemeenten en wordt daarin aangeven welke belastingen door
      de gastheergemeente worden uitgevoerd.de heffing en invordering van:a. de onroerende-zaakbelastingen,
      artikel 220 Gemeentewet;b. de hondenbelasting, artikel 226 Gemeentewet;c. de
      rioolheffing, artikel 228a Gemeentewet;d. de afvalstoffenheffing bedoeld in
      artikel 15.33 Wet milieubeheer;e. de roerende-zaakbelasting, artikel 221 Gemeentewet;f.
      de baatbelasting, artikel 222 Gemeentewet;g. de forensenbelasting, artikel 223
      Gemeentewet;h. de toeristenbelasting, artikel 224 Gemeentewet;i. de watertoeristenbelasting,
      artikel 224 Gemeentewet;j. de reclamebelasting, artikel 227 Gemeentewet;k. de
      precariobelasting, artikel 228 Gemeentewet;l. de grafrechten, artikel 229 Gemeentewet;m.
      de BIZ-bijdrage, artikel 1 Wet op de bedrijveninvesteringszonesn. de uitvoering
      van de Wet waardering onroerende zaken;
  - kop_artikel: Artikel 8. Dienstverleningsovereenkomst
    inhoud_artikel: In de dienstverleningsovereenkomst, te sluiten door de colleges
      van de gemeenten, wordt nadere uitwerking gegeven aan deze regeling. In de dienstverleningsovereenkomst
      worden in ieder geval geregeld:a. de te heffen en in te vorderen belastingen;b.
      de uitvoeringskaders;c. de kwaliteitseisen waaraan de taakuitoefening door de
      gastheergemeente moet voldoen;d. de verplichtingen tussen de colleges van de
      gemeenten, ene. de wijze waarop invulling wordt gegeven aan de informatieplichten,
      bedoeld in paragraaf 2.3.
