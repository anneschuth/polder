  bevoegdheden:
  - kop_artikel: Artikel 4. Taken en bevoegdheden
    inhoud_artikel: 4.1 Ter behartiging van de in artikel 3 genoemde belangen is de
      Serviceorganisatie Zorg Holland Rijnland belast met uitvoering van de volgende
      taken in het kader van de Jeugdwet:(a) Het uitvoeren van contractmanagement,
      contractbeheer, financiële administratie en betalingen voor regionale jeugdhulp
      en gespecialiseerde jeugdhulp;(b) Het namens elke deelnemer optreden als budgethouder,
      het accorderen van facturen en verantwoordingen op basis van toetsing aan de
      gesloten overeenkomsten met de aanbieders en zodanig dat de deelnemers daarmee
      aan de voor hen geldende verantwoordingsvereisten kunnen voldoen;(c) Het namens
      de deelnemende gemeenten verzorgen van de digitale uitwisseling van iJW-berichten
      met aanbieders conform de landelijke i-standaarden. Daarbij wordt tevens de
      woonplaats van jeugdigen en hun ouders/verzorgers getoetst in de Basisregistratie
      Personen (BRP) van de opdrachtgevende deelnemer;(d) Het namens de deelnemende
      gemeenten verzorgen van de Jeugdbeschermingstafel, met inachtneming van de daartoe
      door de deelnemers vastgestelde beleidsmatige kaders.(e) leveren van een bijdrage
      en advies bij de verantwoordingscyclus waaronder het genereren van adequate
      managementinformatie en informatie voor de planning en controlcyclus;(f) het
      archiveren op basis van de Archiefwet van alle relevante (contract)stukken inzake
      de in dit artikel vermelde taken inclusief archieven betreffende taken die door
      rechtsvoorganger(s) zijn gevormd;(g) gevraagd en ongevraagd adviseren aan gemeenten
      over beleidsontwikkeling die de uitvoering betreffen;(i) en bovenstaande taken
      op andere beleidsvelden in het Sociaal domein als gemeenten daartoe besluiten.(j)
      en bovenstaande taken op gebied van Maatschappelijke Zorg als gemeenten daartoe
      besluiten.4.2 De colleges:(a) delegeren geen bevoegdheden aan het bestuur(b)
      mandateren de bevoegdheden die nodig zijn voor de uitvoering van de in het eerste
      lid genoemde taken aan het bestuur en de secretaris-directeur.4.3 In uitvoering
      van de haar opgelegde taken en bevoegdheden worden de bepalingen van het Samenwerkingshandvest
      Governance Jeugdhulp Holland Rijnland door de Serviceorganisatie in acht genomen.
