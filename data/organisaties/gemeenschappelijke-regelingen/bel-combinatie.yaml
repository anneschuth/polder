description:
  text: 'De BEL Combinatie levert alle producten en diensten voor de gemeenten Blaricum,
    Eemnes en Laren.Blaricum, Eemnes en Laren (BEL) hebben op 1 januari 2008 hun gemeentelijke
    organisaties samengevoegd tot een nieuwe werkorganisatie: de BEL Combinatie.De
    BEL Combinatie verzorgt de dienstverlening en de totstandkoming en uitvoering
    van het beleid voor de 3 gemeenten. De 3 zelfstandige gemeentebesturen waken ervoor
    dat dat blijft afgestemd op wat in hun dorp nodig is.'
  url: https://www.belcombinatie.nl/BEL_Combinatie/Organisatie/Organogram
