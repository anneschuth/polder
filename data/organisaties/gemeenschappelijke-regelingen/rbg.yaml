description:
  text: De Regionale Belasting Groep regelt de belastingen voor de hoogheemraadschappen
    van Schieland en de Krimpenerwaard en van Delfland. Daarnaast verzorgt de RBG
    deze taken en de uitvoering van de wet WOZ voor de gemeenten Delft, Schiedam en
    Vlaardingen.De Regionale Belasting Groep heeft de vorm van een gemeenschappelijke
    regeling. Het is daarmee een zelfstandig overheidslichaam, met een eigen bestuur.
    Dagelijks bestuursleden van de waterschappen en wethouders van de gemeenten vormen
    samen het algemeen en het dagelijks bestuur.
  url: https://www.derbg.nl/over-ons/organisatie/
