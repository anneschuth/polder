  bevoegdheden:
  - kop_artikel: 'Artikel 10: Bevoegdheden'
    inhoud_artikel: 1. De colleges kunnen, direct of indirect, bevoegdheden voor de
      uitvoering van de taken, bedoeld in artikel 9, eerste lid, in mandaat, volmacht
      en machtiging aan het orgaan verlenen. Mandaten als bedoeld in de vorige zin,
      worden opgenomen in mandaatbesluiten en opgenomen in een mandaatregister.2.
      Aan het orgaan kunnen bevoegdheden worden overgedragen door de colleges, zonder
      dat daarvoor de regeling hoeft te worden gewijzigd, een en ander met inachtneming
      van artikel 41, eerste lid juncto artikel 10, tweede lid, van de wet.
