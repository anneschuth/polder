  bevoegdheden:
  - kop_artikel: Artikel 3 Taken en bevoegdheden centrumgemeente
    inhoud_artikel: 1. De centrumgemeente coördineert en oefent de bevoegdheden van
      de gemeenteraad uit als bedoeld in artikel 48 van de Wet op het primair onderwijs
      en in de statuten van de stichting, met uitzondering van de opheffing van scholen
      en met inachtneming van het advies van het Overlegorgaan toezicht openbaar onderwijs.2.
      De bevoegdheden als bedoeld in het vorige lid zijn:a. Het houden van toezicht
      op de wezenskenmerken van het openbaar onderwijs;b. Het al of niet verlenen
      van goedkeuring aan de begroting en jaarrekening van de stichting wegens strijd
      met het algemeen belang, waaronder het financiële belang van de deelnemende
      gemeenten;c. Het al of niet instemmen met de wijziging van de statuten van de
      stichting;d. Benoeming leden raad van toezicht van de stichting;e. Het ontslaan
      van leden van de raad van toezicht bij:• verwaarlozing van hun taak of onvoldoende
      functioneren;• onverenigbaarheid van functies of belangen;• wijziging van de
      omstandigheden of andere redenen op grond waarvan zijnhandhaving als lid redelijkerwijs
      niet van de stichting kan worden verlangd;f. Het schorsen van leden van de raad
      van toezicht;g. Het zelf voorzien in het bestuur in geval van ernstige verwaarlozing
      door het collegevan bestuur of het functioneren van het college van bestuur
      in strijd met de wet;h. Het doen van een voorstel aan de raden tot ontbinding
      van de stichting op verzoekvan het bestuur of in geval van ernstige verwaarlozing
      door het bestuur of hetfunctioneren van het bestuur in strijd met de wet.
