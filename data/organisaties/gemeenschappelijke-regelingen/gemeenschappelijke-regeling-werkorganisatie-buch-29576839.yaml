gr_meta:
  citeertitel: Gemeenschappelijke Regeling Werkorganisatie BUCH
  doel: 'De regeling wordt getroffen ten behoeve van het bewerkstelligen van een krachtige
    en professionele uitvoering door de werkorganisatie van de door de gemeenten opgedragen
    taken. Daarmee biedt de werkorganisatie een kwalitatief hoogwaardige, efficiënte
    en innovatieve dienstverlening aan de ‘klanten’ van de gemeenten: inwoners, bedrijven
    en instellingen.'
