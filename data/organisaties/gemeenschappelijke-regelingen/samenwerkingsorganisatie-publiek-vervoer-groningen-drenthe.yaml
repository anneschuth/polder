  bevoegdheden:
  - kop_artikel: Artikel 10 Bevoegdheden bestuur
    inhoud_artikel: 1. Aan het bestuur komen alle bevoegdheden toe die aan de Regeling
      zijn opgedragen.2. Het bestuur kan de voorzitter, of één of meer leden bevoegdheden
      toekennen.3. Het bestuur kan mandaat/volmacht verlenen aan de directeur met
      uitzondering van:a. het vaststellen, dan wel wijzigen van de begroting;b. het
      vaststellen van de jaarrekening;c. het vaststellen van de financiële beheerverordening,
      de controleverordening en de verordening op het onderzoek naar de doelmatigheid
      en doeltreffendheid, zoals omschreven in de artikelen 212, 213 en 213a van de
      Gemeentewet;d. het vaststellen van een organisatiereglement en bijbehorende
      regels;e. het instellen van reserves en voorzieningen.
