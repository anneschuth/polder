gr_meta:
  citeertitel: Samenwerkingsorganisatie Publiek Vervoer Groningen Drenthe
  doel: Het belang waarvoor de Regeling wordt getroffen, is ter ondersteuning van
    de deelnemers bij het uitvoeren van de vervoersovereenkomsten die door de deelnemers
    zijn gesloten en de advisering bij de doorontwikkeling van vervoer in het gebied
    van de deelnemers.Deze Regeling ziet op vraaggestuurd vervoer niet volgens een
    dienstregeling. Uitdrukkelijk is het openbaar vervoer zoals bedoeld in de Wet
    Personenvervoer 2000 uitgesloten, met uitzondering van vervoer waarvoor ontheffing
    is verleend of vervoer dat wordt uitgevoerd door vrijwilligersorganisaties (buurtbussen).
  samenwerkingsvorm:
    value: Bedrijfsvoeringsorganisatie
    afkorting: BVO
