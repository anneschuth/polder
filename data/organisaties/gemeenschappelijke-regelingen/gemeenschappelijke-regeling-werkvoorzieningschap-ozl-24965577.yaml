  citeertitel: gemeenschappelijke regeling Werkvoorzieningschap OZL
  doel: Het Werkvoorzieningschap heeft tot doel:1. Het voorzien in en het bieden van
    passende werkgelegenheid en arbeidsrevalidatie voor ingezetenen, die blijkens
    een door het Uitvoeringsinstituut Werknemersverzekeringen (UWV) afgegeven indicatiebeschikking
    of herindicatiebeschikking uitsluitend onder aangepaste omstandigheden tot regelmatige
    arbeid in staat zijn.2. Uitvoering geven aan de door de deelnemende Gemeenten
    opgedragen werkzaamheden in het kader van de Participatiewet.
