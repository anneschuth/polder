description:
  text: HLTsamen is de ambtelijke werkorganisatie van de gemeenten Hillegom, Lisse
    en Teylingen. Met ongeveer 500 medewerkers ondersteunt HLTsamen de drie gemeentebesturen
    bij het uitvoeren van hun taken. De organisatie is verantwoordelijk voor een breed
    scala aan diensten, waaronder ruimtelijke ordening, sociale zaken en economische
    ontwikkeling. HLTsamen streeft naar efficiënte en innovatieve dienstverlening
    voor de ruim 80.000 inwoners van de drie gemeenten. De werkorganisatie werkt vanuit
    verschillende locaties, waaronder gemeentehuizen en kantoren in Hillegom, Lisse
    en Sassenheim. Daarnaast zijn er diverse teams en commissies die zich richten
    op specifieke taken en projecten. HLTsamen legt de nadruk op samenwerking, creativiteit
    en voortdurende ontwikkeling om de gemeenten mooier, beter, veiliger, duurzamer
    en schoner te maken.
