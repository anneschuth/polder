gr_meta:
  citeertitel: Gemeenschappelijke regeling Vervoerregio Amsterdam
  doel: 1.Vervoerregio Amsterdam heeft tot taak, met inachtneming van hetgeen in deze
    regeling is bepaald, die belangen te behartigen, welke verband houden met de verkeers-
    en vervoertaak die voortvloeit uit wet- en regelgeving, in het gebied zoals aangewezen
    krachtens artikel 20, derde lid, van de Wet personenvervoer 2000.2.Het in het
    eerste lid bedoelde belang betreft ‘verkeer en vervoer’.
