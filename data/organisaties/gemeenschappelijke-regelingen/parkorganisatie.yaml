description:
  text: Park Lingezegen is een gemeenschappelijke regeling. In deze gemeenschappelijke
    regeling nemen de Gemeente Arnhem, Gemeente Overbetuwe, Gemeente Lingewaard en
    Gemeente Nijmegen deel. De Parkorganisatie is gemandateerd om de uitvoering van
    de werkzaamheden voor de gemeenschappelijke regeling uit te voeren.De Parkorganisatie
    heeft tot doel de realisatie en coördinatie van het beheer van Park Lingezegen
    op basis van het Beheerplan Park Lingezegen en het Masterplan én het exploiteren
    van natuurgronden en een evenemententerrein en het stimuleren van doorontwikkeling
    in het Park.
