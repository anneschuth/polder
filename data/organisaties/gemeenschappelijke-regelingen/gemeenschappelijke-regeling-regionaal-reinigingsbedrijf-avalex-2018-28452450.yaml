  bevoegdheden:
  - kop_artikel: 'Artikel 11: Bevoegdheden'
    inhoud_artikel: 1. De colleges kunnen, direct of indirect, bevoegdheden voor de
      uitvoering van de taken, bedoeld in artikel 9, eerste en tweede lid, aan de
      directeur in mandaat opdragen. Mandaten als bedoeld in de vorige zin, worden
      opgenomen in separate mandaatbesluiten. Deze mandaatbesluiten worden opgenomen
      in een mandaatregister.2. De colleges dragen geen bevoegdheden over aan het
      bestuur.3. Het bestuur kan besluiten tot oprichting van en de deelneming in
      stichtingen, maatschappen, vennootschappen, verenigingen, coöperaties en onderlinge
      waarborgmaatschappijen. Het bestuur besluit hiertoe alleen indien dat in het
      bijzonder aangewezen moet worden geacht voor de behartiging van het belang,
      genoemd in artikel 2. Het besluit wordt niet genomen dan nadat de raden in de
      gelegenheid zijn gesteld hun wensen en bedenkingen ter kennis van het bestuur
      te brengen.4. Het derde lid is van overeenkomstige toepassing op deelname aan
      gemeenschappelijke regelingen overeenkomstig de wet.
