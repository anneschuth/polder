gr_meta:
  citeertitel: Gemeenschappelijke regeling Regionaal Reinigingsbedrijf Avalex 2018
  doel: De regeling beoogt het doeltreffend en doelmatig uitvoeren of doen uitvoeren
    van de reinigingstaken van de deelnemende gemeenten, voortkomend uit of samenhangend
    met taken op het gebied van het gemeentelijke afvalbeleid, die voortvloeien uit
    de Wet milieubeheer. Avalex kan ten behoeve van dit belang structureel samenwerken
    met andere organisaties, dan wel participeren in andere organisaties, een en ander
    overeenkomstig de bepalingen elders in deze regeling.
