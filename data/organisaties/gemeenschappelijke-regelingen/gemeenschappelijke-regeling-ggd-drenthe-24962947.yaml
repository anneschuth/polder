  bevoegdheden:
  - kop_artikel: 'artikel 7: Bevoegdheden GGD Drenthe'
    inhoud_artikel: 1. Het algemeen bestuur kan besluiten tot een verdere toedeling
      van bevoegdheden aan het dagelijks bestuur.2. Van de verdere toedeling van bevoegdheden
      aan het dagelijks bestuur zijn in ieder geval uitgezonderd de besluiten genoemd
      in artikel 12, lid 1 en b van deze regeling.3. Tot de taken van het algemeen
      bestuur horen in ieder geval:a. het vaststellen of wijzigen van de begroting;b.
      het vaststellen van de jaarrekening;c. het vaststellen, wijzigen of intrekken
      van reglementen;d. het wijzigen van de regeling;e. het vaststellen van tarieven;f.
      het doen van uitgaven voordat de begroting of begrotingswijziging die dat mogelijk
      maakt is goedgekeurd;g. het benoemen of ontslaan van leden van het dagelijks
      bestuur.4. In alle gevallen waarin deze regeling niet voorziet, beslist het
      algemeen bestuur.
