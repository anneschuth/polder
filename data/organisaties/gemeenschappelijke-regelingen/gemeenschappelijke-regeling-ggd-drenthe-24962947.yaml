gr_meta:
  citeertitel: Gemeenschappelijke regeling GGD Drenthe
  doel: 'GGD Drenthe heeft tot doel een bijdrage te leveren aan de publieke gezondheidszorg
    en bewaakt, beschermt en bevordert de gezondheid1 van de aan deze regeling deelnemende
    gemeenten.1 GGD Drenthe bevordert individueel en collectief gezond gedrag; beschermt
    tegen bedreigingen van de volksgezondheid met preventie, bestrijding en voorlichting;
    bewaakt de volksgezondheid door gezondheidsrisico’s en onveiligheid te signaleren
    en inzichten hierover actief te communiceren.2 Waaronder de door de minister van
    VWS gemandateerde taak inzake vergunningsverlening tatoeëren en piercen.3 Het
    begrip ''additionele taak'' is bewust niet gedefinieerd. Dit geeft het algemeen
    bestuur de mogelijkheid om producten uitdrukkelijk als additionele taak te benoemen.
    Maar het is ook mogelijk om dit begrip een louter financiële betekenis te geven,
    bijvoorbeeld door als additionele taak te benoemen: elk product waarvoor betaald
    wordt buiten de inwonersbijdrage.'
