gr_meta:
  citeertitel: Eemkracht
  doel: Eemkracht heeft tot doel, met inachtneming van hetgeen hierover in de regeling
    is bepaald, om door een efficiënte en effectieve uitvoering van de Wetten de belangen
    van de gemeenten gezamenlijk en ieder afzonderlijk te behartigen op het gebied
    van de in artikel 5 genoemde taken in het sociaal domein en het bevorderen van
    de kwaliteit en continuïteit van de dienstverlening, elk voor zover de colleges
    daartoe de bevoegdheden hebben overgedragen aan het bestuur van Eemkracht.
