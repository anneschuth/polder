  bevoegdheden:
  - kop_artikel: Artikel 4 Bevoegdheden
    inhoud_artikel: Ter behartiging van het belang zoals genoemd in artikel 3 dragen
      de colleges bevoegdheden over aan Eemkracht die noodzakelijk zijn voor de uitvoering
      van de in artikel 5 genoemde taken. De bevoegdheden omvatten uitsluitend de
      taken die bij of krachtens de Wetten zoals genoemd in artikel 1 onder g zijn
      toegekend aan de colleges voor zover deze betrekking hebben op vervulling van
      de taken in deze regeling.
