description:
  text: De organisatie voor de uitvoering van het sociaal domein van de gemeente Baarn,
    Bunschoten en Soest (voorheen BBS) is per 1 januari 2026 officieel ondergebracht
    bij Eemkracht.Eemkracht helpt inwoners met zaken zoals werk, inkomen, schulden,
    leerlingenvervoer en ondersteuning bij zelfstandig wonen.De wens van de inwoner
    staat bij Eemkracht centraal. En er is altijd hulp in de eigen gemeente beschikbaar.
    De hulp wordt zo licht als mogelijk en zo zwaar als nodig gekozen.
  url: https://www.eemkracht.nl/over-eemkracht/wie-zijn-wij
