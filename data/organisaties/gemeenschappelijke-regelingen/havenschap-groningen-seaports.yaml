description:
  text: Als commerciële exploitant en beheerder van de haven van Delfzijl en de Eemshaven
    werkt Groningen Seaports aan uw nieuwe bedrijfsvestiging. Wij leggen de rode loper
    graag voor u uit en zoeken mee naar wat voor uw bedrijf de beste locatie is. Via
    weg, spoor, diepzee en binnenwater zijn de havengebieden optimaal en snel bereikbaar.
    U vindt hier een gevarieerd aanbod aan vestigingslocaties en profiteert van moderne
    faciliteiten, een strategisch gunstige ligging en een stimulerend vestigingsklimaat.Bent
    u actief in de offshore wind business of datacenterbranche, dan is de Eemshaven
    de plaats waar u het beste tot uw recht komt. Voor chemische bedrijvigheid of
    circulaire economische activiteiten is Delfzijl de aangewezen locatie. Benieuwd
    wat de Eemshaven of de haven van Delfzijl u kan bieden? Neem gerust contact op,
    dan kijken we gezamenlijk naar de mogelijkheden.
  url: https://www.groningen-seaports.com/groningen-seaports/organisatieprofiel/
