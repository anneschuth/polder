  bevoegdheden:
  - kop_artikel: Artikel 5. Taken en bevoegdheden
    inhoud_artikel: 1. Ter behartiging van de belangen zoals vermeld in het voorgaande
      artikel verricht de uitvoeringsorganisatie Ferm Werk als basisdienstverlening
      de uitvoering van de aan de deelnemers opgedragen of in de toekomst op te dragen
      taken in het kader van de Wet sociale werkvoorziening, de Participatiewet, de
      Wet inkomensvoorziening oudere en gedeeltelijk arbeidsongeschikte werkloze werknemers,
      de Wet inkomensvoorziening oudere en gedeeltelijk arbeidsongeschikte gewezen
      zelfstandigen, het Besluit bijstandsverlening zelfstandigen en de Wet inburgering.2.
      De raden en de colleges van burgemeester en wethouders van de deelnemers dragen
      hun bevoegdheden met betrekking tot de wetten en regelingen die behoren tot
      de basisdienstverlening volledig over aan de betreffende bestuursorganen van
      het openbaar lichaam Ferm Werk. Het openbaar lichaam Ferm Werk zorgt daarbij
      voor afstemming met de deelnemers alvorens beleid vast te stellen. Alvorens
      gebruik te maken van zijn verordenende bevoegdheden stelt het openbaar lichaam
      Ferm Werk de raden en colleges van de deelnemers in de gelegenheid om hun zienswijzen
      ten aanzien van het voorgenomen besluit kenbaar te maken tenzij het dagelijks
      bestuur oordeelt dat dit uitsluitend een wijziging van technische of redactionele
      aard betreft.3. Naast de in het eerste lid genoemde taken kunnen de deelnemers
      als aanvullende dienstverlening de uitvoering van de volgende wetten en regelingen
      of nader te bepalen onderdelen daarvan door de uitvoeringsorganisatie Ferm Werk
      laten verrichten:a. Lokale regelingen ter bevordering van maatschappelijke participatie
      en/of bestrijding van armoede;b. Wet Gemeentelijke Schuldhulpverlening inclusief
      de afgifte van een verklaring als bedoeld in artikel 285, lid 1 onder f van
      de Faillissementswet;c. Uitvoerende taken rond huisvesting van vergunninghouders
      in het kader van de Huisvestingswet;d. Wet Maatschappelijke Ondersteuning.4.
      Voor zover een deelnemer door de uitvoeringsorganisatie Ferm Werk aanvullende
      dienstverlening laat verrichten als bedoeld in het voorgaande lid draagt het
      college en wethouders van die deelnemer de uitvoering van concreet omschreven
      taken over alsmede de bevoegdheid om regels te stellen die direct op die uitvoering
      betrekking hebben. Het openbaar lichaam Ferm Werk zorgt daarbij voor afstemming
      met de deelnemer alvorens dit uitvoeringsbeleid vast te stellen.5. De deelnemers
      formuleren ieder voor zich de algemene beleidskaders, beleidsprioriteiten en
      financiële middelen m.b.t. het brede sociaal domein.6. In samenhang met hun
      eigen beleid ten aanzien van het sociale domein maken de afzonderlijke deelnemers
      jaarlijks afspraken met het openbaar lichaam Ferm Werk over de doelstellingen
      en ambities ten aanzien van de door het openbaar lichaam Ferm Werk uit te voeren
      wetten en regelingen en de inzet van instrumenten om deze te bereiken; deze
      afspraken worden jaarlijks vastgelegd.
