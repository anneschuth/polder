  bevoegdheden:
  - kop_artikel: Artikel 4 Bevoegdheden en bevoegdhedenverdeling
    inhoud_artikel: Voor zover hiervan niet in deze regeling is afgeweken, en onverminderd
      het bepaalde in artikel 30 van de Wet gemeenschappelijke regelingen, komen aan
      de bestuursorganen van de regio ter uitvoering van de in artikel 5, lid 2 genoemde
      taken en binnen het raam van het in lid 1 van dat artikel geformuleerde doel
      de bevoegdheden toe, die aan de bestuursorganen van de deelnemende gemeenten
      behoren, met dien verstande, dat het algemeen bestuur in plaats treedt van de
      raad, het dagelijks bestuur in de plaats treedt van het college van burgemeester
      en wethouders en de voorzitter in plaats van de burgemeester.
