gr_meta:
  citeertitel: Gemeenschappelijke Regeling Regio De Vallei
  doel: 1. De Regio De Vallei heeft tot doel:a. te voorzien in structurele en/of ad
    hoc overlegvormen tussen de deelnemende gemeenten en andere overlegpartners:•
    die er op gericht zijn elkaar te informeren over gemeentelijke en andere activiteiten
    die voor deregio van belang kunnen zijn;• die naast informatievoorziening en –uitwisseling
    ook gericht zijn op het afstemmen van beleid en het opstellen van een gezamenlijke
    strategische agenda bij gemeenschappelijke belangen;b. vanuit een gemeenschappelijk
    belang van twee of meer deelnemende gemeenten de aanpak van projecten te bevorderen
    die de twee of meer deelnemende gemeenten gezamenlijk en eventueel met andere
    partners kunnen ontwikkelen en uitvoeren;c. de hierna in lid 2, onder b. en c.
    genoemde uitvoeringstaken te behartigen.1. De in lid 1 bedoelde samenwerking ligt
    op het gebied van:a. algemeen bestuurlijke aangelegenheden;b. ruimtelijke ordening
    en volkshuisvesting, waaronder de uitvoering van (het budgetbeheer van) het Besluit
    Woninggebonden Subsidies (uitvoering BWS)c. zorg voor het milieu, waaronder afvalverwerking,
    milieuhandhaving en algemeen milieubeleid;d. verkeer en vervoer met als specifieke
    aandachtsgebieden o.a. mobiliteit, bereikbaarheid en verkeersveiligheid;e. recreatie
    en toerisme;f. economische- en sociaal-economische zaken, zulks ter bevordering
    van een duurzame ontwikkeling van de regionale economie;g. arbeid en educatie.
