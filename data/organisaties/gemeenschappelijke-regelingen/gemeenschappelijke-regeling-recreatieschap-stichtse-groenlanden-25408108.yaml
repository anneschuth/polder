  bevoegdheden:
  - kop_artikel: Artikel 6
    inhoud_artikel: Het recreatieschap is binnen het gebied als bedoeld in artikel
      3 en met inachtneming van het belang als bedoeld in artikel 4 bevoegd tot:a.
      het aanleggen en exploiteren van recreatieve voorzieningen en het uitvoeren
      van andere werken verband houdend met het in artikel 4 bedoelde belang;b. het
      instandhouden en verbeteren van het natuur- en landschapsschoon;c. het verlenen
      van bijdragen aan derden;d. het vaststellen van algemeen verbindende voorschriften
      al dan niet door strafbepaling of bestuursdwang te handhaven;e. het heffen van
      belastingen, een en ander met inachtneming van het bepaalde in artikel 54, eerste
      lid onder a. van de Wgr.f. het uitvoeren van overige taken die passen binnen
      de doelstelling en verband houden met de in dit artikel weergegeven taken.
