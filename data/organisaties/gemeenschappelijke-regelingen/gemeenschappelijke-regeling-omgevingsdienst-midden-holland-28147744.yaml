  citeertitel: Gemeenschappelijke regeling Omgevingsdienst Midden-Holland
  doel: De regeling wordt getroffen ter ondersteuning van Gedeputeerde Staten en bestuursorganen
    van de regiogemeenten bij de uitvoering van hun taken op het gebied van het omgevingsrecht
    in het algemeen en de Wet algemene bepalingen omgevingsrecht in het bijzonder,
    alsmede de taken op het gebied van vergunningverlening, handhaving en toezicht
    op grond van de in artikel 4, eerste lid, onder b genoemde wetten.
