  bevoegdheden:
  - kop_artikel: Artikel 4 Taken
    inhoud_artikel: 1. Aan de omgevingsdienst komen ter behartiging van de belangen
      waarvoor de regeling is getroffen, de volgende taken en bevoegdheden toe:1.
      Het verrichten van adviserende, ondersteunende en voorbereidende werkzaamheden
      op het gebied van de zorg voor het omgevingsrecht en de uitvoering van programma’s
      en projecten op het gebied van omgeving;2. Het namens de colleges van burgemeester
      en wethouders van de regiogemeenten en voor zover daartoe mandaat is verleend,
      uitvoeren van de bij of krachtens de navolgende wetten toebedeelde taken en
      bevoegdheden:a. de Wet milieubeheer;b. de Wet geluidhinder;c. de Wet bodembescherming;d.
      de Wet algemene bepalingen omgevingsrecht;e. de Wet ruimtelijke ordening;f.
      de Woningwet;g. de Gemeentewet;h.de Algemene wet bestuursrecht;i. de Wet openbaarheid
      van bestuur.j. de Omgevingswet.3. Het namens de colleges van burgemeester en
      wethouders van de regiogemeenten tevens uitvoeren van omgevingstaken op grond
      van andere wet- en regelgeving dan genoemd in het eerste lid, onder b, voor
      zover daartoe mandaat is verleend;4. Het namens Gedeputeerde Staten en voor
      zover daartoe mandaat is verleend uitvoeren van de volgende taken en bevoegdheden,
      met inachtneming van met de provincie overeengekomen beleid:a. de taken en bevoegdheden
      als bedoeld in het eerste lid onder b, voor zover Gedeputeerde Staten het bevoegd
      gezag zijn;b. omgevingstaken op grond van andere wet- en regelgeving dan onder
      a. genoemd;2. Aan de omgevingsdienst komen voorts die taken en bevoegdheden
      toe welke op verzoek van een of meer colleges van B en W van de regiogemeenten
      of Gedeputeerde Staten worden uitgevoerd en uitgeoefend.3. Met betrekking tot
      de uitvoering en nadere invulling van de in de vorige leden genoemde taken worden
      door of namens het dagelijks bestuur met de deelnemers schriftelijk werkafspraken
      en afspraken over vergoedingen gemaakt.4. Voor zover bij de mandaatverlening
      niet anders is bepaald kan ten aanzien van de aan de omgevingsdienst in mandaat
      toekomende taken en bevoegdheden ondermandaat worden verleend.5. Indien ten
      gevolge van wijziging van wettelijke regelingen ter bescherming van het milieu,
      de uitvoering van werkzaamheden als bedoeld in het eerste lid gaan strekken
      ter uitvoering van een andere regeling dan ter uitvoering waarvan zij ten tijde
      van het van kracht worden van deze regeling strekten, dan wel indien in deze
      werkzaamheden ten gevolge van een dergelijke wijziging veranderingen optreden,
      blijven zij, voor zover hun strekking en omvang door hun wijziging niet wezenlijk
      veranderen, behoren tot de taken die in de genoemde artikelleden aan de omgevingsdienst
      zijn opgedragen.6. Werkzaamheden met betrekking tot de in lid 1 onder b en c
      bedoelde taken en bevoegdheden die zijn gestart door de Milieudienst Midden-Holland
      voor het operationeel worden van de omgevingsdienst, worden voortgezet of overgenomen
      door de Omgevingsdienst Midden-Holland.7. De omgevingsdienst kan tevens taken
      uitvoeren of diensten verrichten voor en op verzoek van andere instanties dan
      de deelnemers. Met betrekking tot de uitvoering en nadere invulling van deze
      taken worden door of namens het dagelijks bestuur met de betreffende instanties
      schriftelijk werkafspraken en afspraken over vergoedingen gemaakt.
