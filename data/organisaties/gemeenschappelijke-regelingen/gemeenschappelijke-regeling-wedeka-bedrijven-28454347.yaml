  bevoegdheden:
  - kop_artikel: Artikel 3 Taak van het werkvoorzieningschap
    inhoud_artikel: 1. Het werkvoorzieningschap heeft tot taak om voor ingezetenen
      van de gemeenten die blijkens een indicatiebeschikking of herindicatiebeschikking
      van het betreffende college tot de doelgroep behoren, als materieel werkgever
      op te treden in de door het college aan te bieden arbeidsovereenkomst naar burgerlijk
      recht voor het verrichten van arbeid onder aangepaste omstandigheden, en deze
      werknemers daartoe een passende arbeidsplaats aan te bieden.2. Daarnaast heeft
      het werkvoorzieningschap tot taak de volledige uitvoering van de Wet Sociale
      Werkvoorziening voor die werknemers in de zin van die wet, die voor 1 januari
      1998 (voor wat betreft werknemers afkomstig uit de gemeenten Vlagtwedde en Borger-Odoorn)
      respectievelijk 1 januari 2001 (voor wat betreft werknemers afkomstig uit de
      overige deelnemende gemeenten) reeds in dienst waren van het werkvoorzieningschap
      en dus op arbeidsovereenkomst met het schap zelf bij het schap werkzaam zijn.3.
      Tevens heeft het werkvoorzieningschap de mogelijkheid om haar aanwezige infrastructuur
      ter beschikking te stellen ten behoeve van activiteiten voor andere vormen van
      gesubsideerde arbeid; met dien verstande dat de taken genoemd in lid 1 en 2
      op geen enkele wijze in het gedrang mogen komen of mogen worden geschaad.
  - kop_artikel: Artikel 4 Aanwijzingsbesluit
    inhoud_artikel: Indien een college andere taken en bevoegdheden, behorend tot
      de uitvoering van de Wet Sociale Werkvoorziening, dan de in artikel 3 genoemde
      aan het werkvoorzieningschap wenst over te dragen kan het in overleg met het
      werkvoorzieningschap daartoe een aanwijzingsbesluit nemen als bedoeld in artikel
      2, derde lid, van de Wet Sociale Werkvoorziening.
