  bevoegdheden:
  - kop_artikel: 'Artikel 4 Gemeenschappelijke regeling: taken en bevoegdheden'
    inhoud_artikel: 1. Ter behartiging van de in artikel 3 genoemde belangen dragen
      de colleges de volgende taken en bevoegdheden over aan de Veiligheidsregio:a.
      taken genoemd in artikel 10 van de Wet;b. taken genoemd in artikel 25 van de
      Wet;c. overige taken die bij of krachtens wet aan de Veiligheidsregio worden
      opgedragen.2. De Veiligheidsregio draagt voorts zorg voor:a. het verzorgen van
      andere aangelegenheden die in het kader van de doelstelling van belang zijn
      en waarvan de uitvoering door het college, na besluitvorming in het algemeen
      bestuur, aan de Veiligheidsregio wordt opgedragen;b. taken zoals genoemd in
      het vigerende beleidsplan (artikel 14 van de Wet) van de Veiligheidsregio;c.
      De zorg voor permante beschikbaarstelling van voldoende en kwalitatief goede
      ambulancevoorzieningen op grond van de aanwijzing van de Veiligheidsregio als
      regionale ambulancevoorziening ex. artikel 4, tweede lid, van de Wet ambulancezorgvoorzieningen;d.
      het uitvoering geven aan de meldkamerfuncties; binnen de meldkamer als bedoeld
      in artikel 25a, eerste lid, van de Politiewet 2012;e. het adviseren van de gemeenten
      ten aanzien van het pro-actie- en preventiebeleid;f. het op verzoek bijstaan
      en/of verzorgen van de ambtelijke ondersteuning voor het gezag van de burgemeester
      in geval van een calamiteit;g. het regionaal coördineren van de voorbereiding
      van de gemeentelijke processen op het gebied van de rampenbestrijding en de
      crisisbeheersing.3. Het dagelijks bestuur kan, op verzoek van een of meer colleges,
      besluiten tot het verrichten van diensten aan:a. een of meer deelnemende colleges,
      strekkende tot de uitvoering van bepaalde taken ten behoeve van en ten laste
      van die gemeente(n);b. derden, strekkende tot de uitvoering van bepaalde taken
      ten behoeve van en ten laste van deze derden.
