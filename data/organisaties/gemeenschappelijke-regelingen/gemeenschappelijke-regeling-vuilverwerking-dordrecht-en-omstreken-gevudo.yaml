gr_meta:
  citeertitel: Gemeenschappelijke Regeling Vuilverwerking Dordrecht en Omstreken (GEVUDO)
  doel: 1. Het lichaam heeft tot doel zorg te dragen voor het op milieuhygiënisch
    verantwoorde wijze bewaren, bewerken en (doen) verwerken van huishoudelijk en
    andere categorieën van afvalstoffen met bijkomende werkzaamheden voornamelijk
    afkomstig uit de Regio Zuid-Holland Zuid.2. Het lichaam stelt zich bovendien ten
    doel na te streven dat de tijdens en na de verwerking vrijkomende energie en reststoffen
    op een maatschappelijk nuttige en rendabele wijze zoveel mogelijk te doen hergebruiken.3.
    Het lichaam zal zo nodig een coördinerende en initiërende rol vervullen ten aanzien
    van beleid op het
