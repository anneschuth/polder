  doel: Artikel 3 Belang en doelstelling1. Het belang waarvoor de regeling is getroffen,
    is het bewerkstelligen van een kwalitatief goede en doelmatige uitvoering van
    de gemeentelijke taken van de deelnemers.2. De bedrijfsvoeringsorganisatie handelt
    volgens de kernwaarden die zijn vastgelegd in een door het bestuur vast te stellen
    organisatievisie.
