  bevoegdheden:
  - inhoud_artikel: Artikel 2 Doel en reikwijdte van de regeling1. De regeling wordt
      getroffen voor de uitvoering van de taken van de gemeenten op het gebied van
      het heffen en invorderen van gemeentelijke belastingen en rechten en voor de
      uitvoering van de Wet waardering onroerende zaken (Wet WOZ).2. De uitvoeringsorganisatie
      wordt belast met het leveren van de producten, die zijn genoemd in het bedrijfsplan.3.
      Het leveren van de in het bedrijfsplan genoemde producten vindt plaats op basis
      van de ook in het bedrijfsplan opgenomen planning.4. De gemeenten besluiten
      gezamenlijk aan de in het bedrijfsplan genoemde producten toe te voegen, te
      wijzigen of af te halen. Uitgangspunt is dat de uitvoeringsorganisatie belast
      is met de uitvoering van de heffing en de invordering van de gemeentelijke belastingen
      alsmede bij de uitvoering van de Wet waardering onroerende zaken (Wet WOZ).Artikel
      6 Verantwoording1. De uitvoeringsorganisatie legt aan de gemeenten voor 1 mei
      van ieder kalenderjaar door middel van een jaarverslag rekening en verantwoording
      af over het daaraan voorafgaande kalenderjaar.2. Op basis van het bedrijfsplan
      brengt het hoofd van de uitvoeringsorganisatie één keer per jaar een managementrapportage
      uit, die voor eind september wordt voorgelegd aan de gemeenten.Artikel 7 Beleid1.
      Aan de uitvoeringsorganisatie worden geen verordenende bevoegdheden toegekend.2.
      De bevoegdheid tot het vaststellen van het financieel en fiscaal beleid voor
      de producten, waarop het bedrijfsplan betrekking heeft, ligt bij de gemeenten.3.
      De uitvoeringsorganisatie verzorgt de beleidsvoorbereiding en -uitvoering, van
      de producten, waarop het bedrijfsplan betrekking heeft.4. De gemeenten informeren
      de uitvoeringsorganisatie uiterlijk voor 1 juni van het kalenderjaar voorafgaand
      aan het jaar van invoering, over ontwikkelingen met betrekking tot nieuw beleid
      of wijziging van beleid als bedoeld in het tweede lid.5. De uitvoeringsorganisatie
      levert uiterlijk voor 1 juli van het kalenderjaar de kengetallen die gemeenten
      nodig hebben ter vaststelling van het beleid voor het jaar daarop .6. De uitvoeringsorganisatie
      informeert zo spoedig mogelijk de gemeenten over ontwikkelingen die van invloed
      zijn op het fiscaal beleid of de begroting van de deelnemende gemeenten dan
      wel de uitvoering van het bedrijfsplan.7. De uitvoeringsorganisatie informeert
      de gemeente in ieder geval over bezwaar- en beroepsprocedures waarbij een financieel
      belang van € 10.000,- of meer is gemoeid.
