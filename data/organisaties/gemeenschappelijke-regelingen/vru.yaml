- value: Veiligheidsregio Utrecht
  abbr: VRU
  valid_from: '1900-01-01'
description:
  text: 'Wij dragen bij aan veiligheid. Elke dag weer, steeds beter.’ Dat is waar
    we voor staan. De Veiligheidsregio Utrecht is een samenwerkingsverband van en
    voor alle 26 Utrechtse gemeenten in de provincie Utrecht. Samen met onze partners
    zorgen wij elke dag voor de veiligheid van alle mensen die in de regio wonen en
    verblijven.Dat doen wij met onze centralisten op de 112-meldkamer, onze brandweermensen
    en onze collega’s van risicobeheersing, crisisbeheersing, de geneeskundige hulpverleningsorganisatie
    in de regio (GHOR) en de ondersteunende diensten.Of we nou branden blussen of
    op kantoor werken: bij de VRU werken we allemaal met een passie. Een passie om
    levens te redden, om incidenten te voorkomen en te bestrijden. Mensen met een
    helder hoofd en een hart dat klopt voor de goede afloop. Dienstbaar, deskundig,
    alert en adequaat. Wij zijn de VRU.'
  url: https://vru.nl/wij-zijn-de-vru/
