description:
  text: We bieden een breed scala aan werkplekken en opleidingsmogelijkheden, buiten
    de muren van Promen of op een zo regulier mogelijke passende werkplek bij Promen
    zelf. We bieden diensten op het gebied van schoonmaak, groenonderhoud en catering
    en productiematige diensten zoals  in-, om- en verpakken (van zowel food als non-food),
    assemblage en montage. Al deze werkzaamheden worden uitgevoerd door mensen met
    een afstand tot de arbeidsmarkt. We doen dit voor mensen vanuit de Participatiewet,
    met een WSW-indicatie, maar ook voor statushouders, schoolverlaters van VSO/PRO
    en voor mensen met een indicatie voor Beschut Werk, een garantiebaan of re-integratie.
