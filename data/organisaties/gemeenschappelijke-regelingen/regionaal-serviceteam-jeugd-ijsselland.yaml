description:
  text: Het Regionaal Serviceteam Jeugd IJsselland (RSJ IJsselland) is het regionale
    samenwerkingsverband van de elf gemeenten in de regio IJsselland als het gaat
    om de uitvoering van de taken uit de Jeugdwet. De gemeenten Dalfsen, Deventer,
    Hardenberg, Kampen, Olst-Wijhe, Ommen, Raalte, Staphorst, Steenwijkerland, Zwartewaterland
    en Zwolle hebben de Gemeenschappelijke Regeling Bedrijfsvoeringsorganisatie Regionaal
    Serviceteam Jeugd IJsselland (RSJ IJsselland) opgericht. Hiermee is het RSJ IJsselland
    het regionale samenwerkingsverband van deze elf gemeenten als het gaat om de uitvoering
    van de taken uit de Jeugdwet. De gemeenten werken allen vanuit hun eigen lokale
    autonomie. De regionale samenwerking dient de lokale werking te faciliteren.Het
    RSJ IJsselland draagt voor deze elf gemeenten zorg voor de inkoop van diensten
    in het kader van de specialistische jeugdzorg, het contractmanagement, het contractbeheer,
    monitoring en de uitvoering van regionale inhoudelijke thema’s.
