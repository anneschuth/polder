  bevoegdheden:
  - kop_artikel: Artikel 2 Belang, taken en bevoegdheden van de Regeling en van de
      Centrumgemeente
    inhoud_artikel: 2.De beleidsbepalende bevoegdheden en de bevoegdheid om de financiële
      kaders vast te stellen blijven berusten bij de Gemeenten.3.De Centrumgemeente
      voert namens de Gemeenten de taken uit en oefent de bevoegdheden uit die noodzakelijk
      zijn om de in lid 1 genoemde belangen te behartigen voor zover de hiermee verband
      houdende kosten passen binnen de begroting.4.De Centrumgemeente mag onvoorziene
      uitgaven doen die noodzakelijk, onvermijdbaar en niet uitstelbaar zijn om de
      continuïteit van de dienstverlening te waarborgen. Deze onvoorziene uitgaven
      worden, zo mogelijk vooraf, in een spoedportefeuillehoudersoverleg afgestemd.5.De
      Colleges mandateren aan het college van burgemeester en wethouders van de Centrumgemeente
      de taken en bevoegdheden ter verwezenlijking van het belang, genoemd in het
      eerste lid van dit artikel.6.Het college van burgemeester en wethouders van
      de Centrumgemeente is bevoegd aan de medewerkers van de Regeling een of meer
      ondermandaten te verlenen.7.Ingeval de uitvoering van wetten, besluiten en regelingen,
      ondergebracht in de Regeling, leidt tot een zodanige vermindering van taken
      dat dit gevolgen heeft voor de omvang van de Regeling, dan zijn de Gemeenten
      gezamenlijk verantwoordelijk voor deze gevolgen, inclusief de financiële gevolgen
      waaronder eventuele WW-verplichtingen op basis van een verdeelsleutel overeenkomstig
      het in artikel 8, vierde lid, van deze Regeling gestelde.
