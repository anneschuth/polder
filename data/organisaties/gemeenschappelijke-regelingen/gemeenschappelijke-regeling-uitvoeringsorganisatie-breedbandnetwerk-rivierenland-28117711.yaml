  citeertitel: Gemeenschappelijke regeling Uitvoeringsorganisatie Breedbandnetwerk
    Rivierenland
  doel: Deze regeling wordt getroffen teneinde de aanleg en het beheer van een breedbandnetwerk
    door de gemeenten in gezamenlijkheid te realiseren in de gemeenten. Voornoemd
    breedbandnetwerk staat open voor alle private aanbieders om diensten zoals internettoegang,
    televisie, telefonie, zorg en onderwijs op afstand aan te bieden aan de inwoners
    van de gemeenten. Dit om zoveel mogelijk inwoners van de gemeenten in staat te
    stellen om gebruik te kunnen maken van een hoogwaardig netwerk voor data-transport.
