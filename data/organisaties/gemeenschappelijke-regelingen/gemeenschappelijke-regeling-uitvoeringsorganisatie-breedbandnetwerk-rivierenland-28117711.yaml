  bevoegdheden:
  - kop_artikel: 'Artikel 4: Taken'
    inhoud_artikel: 1. Het algemeen bestuur van de Uitvoeringsorganisatie Breedbandnetwerk
      Rivierenland heeft als taak zorg te dragen voor het aanleggen, beheren en onderhouden
      van een breedbandnetwerk binnen de gemeenten.2. De colleges kunnen ook andere
      taken opdragen aan het bestuur, voor zover het algemeen bestuur daar unaniem
      mee instemt.3. Er worden geen bevoegdheden overgedragen aan de Uitvoeringsorganisatie
      Breedbandnetwerk Rivierenland.4. De colleges onderscheidenlijk de burgemeesters
      van de gemeenten kunnen waar nodig machtiging, volmacht dan wel mandaat verlenen
      aan het dagelijks bestuur van Uitvoeringsorganisatie Breedbandnetwerk Rivierenland
      indien dit vereist is voor effectieve en efficiënte uitvoering van de taken.5.
      Gemeenten kunnen ieder afzonderlijk met de Uitvoeringsorganisatie Breedbandnetwerk
      Rivierenland overeenkomsten sluiten ten aanzien van de taken, bedoeld in het
      eerste en het tweede lid.6. Het dagelijks bestuur stelt een gelijkluidende overeenkomst
      vast ten behoeve van de overeenkomsten, bedoeld in het vijfde lid.7. De Uitvoeringsorganisatie
      Breedbandnetwerk Rivierenland kan ook diensten verlenen aan andere publiekrechtelijke
      rechtspersonen dan de gemeenten dan wel aan andere privaatrechtelijke overheidsorganisaties,
      met dien verstande dat de Uitvoeringsorganisatie Breedbandnetwerk Rivierenland
      ten minste tachtig procent van zijn werkzaamheden voor de gemeenten verricht.
      Het algemeen bestuur beslist met betrekking tot het al dan niet verlenen van
      diensten aan een derde als hiervoor bedoeld.
