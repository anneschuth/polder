description:
  text: Nederland telt 25 veiligheidsregio’s. Veiligheidsregio’s moeten de inwoners
    van Nederland beter beschermen tegen rampen en crises. Veiligheidsregio Brabant-Zuidoost
    (VRBZO) is de veiligheidsregio voor Zuidoost-Brabant. In onze organisatie werken
    brandweer en GHOR samen om incidenten en rampen te voorkomen, te beperken en te
    bestrijden. Dit doen we voor en samen met de 21 gemeenten in ons werkgebied en
    de mensen die hier wonen of verblijven. We zijn behulpzaam, deskundig, daadkrachtig
    en gericht op samenwerken.
  url: https://www.vrbzo.nl/de-veiligheidsregio/
