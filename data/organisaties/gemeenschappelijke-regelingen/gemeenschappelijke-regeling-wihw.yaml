  bevoegdheden:
  - kop_artikel: Artikel 5 Overdracht van bevoegdheden
    inhoud_artikel: 1. Voor zover hiervan in deze regeling niet is afgeweken, komen
      aan de bestuursorganen van de regeling ter uitvoering van de in artikel 4 genoemde
      taken de bevoegdheden van het dagelijks bestuur in de plaats van het college
      van burgemeester en wethouders en de voorzitter in de plaats van de burgemeester.2.
      Waar in deze regeling artikelen van de wet, de Gemeentewet, de in artikel 4
      genoemde wetten en regelingen of enige andere wet van overeenkomstige toepassing
      worden verklaard, wordt in de artikelen voor de Gemeentewet, het college van
      burgemeester en wethouders en de burgemeester onderscheidenlijk gelezen het
      algemeen bestuur, het dagelijks bestuur en de voorzitter.
