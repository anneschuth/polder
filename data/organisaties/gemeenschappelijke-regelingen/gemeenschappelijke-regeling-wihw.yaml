gr_meta:
  citeertitel: Gemeenschappelijke regeling WIHW
  doel: De regeling is getroffen voor gemeenschappelijke behartiging van de belangen
    van de deelnemersin het kader van het streven naar een zo hoog mogelijke arbeidsparticipatie
    van de inwoners vande gemeenten waartoe de deelnemers behoren en, indien nodig,
    het verstrekken van uitkeringenaan deze doelgroep voor de kosten van levensonderhoud.
