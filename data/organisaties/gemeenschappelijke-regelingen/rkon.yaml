names:
- value: Rekenkamer Oost-Nederland
  abbr: RKON
  valid_from: '1900-01-01'
description:
  text: De Rekenkamer Oost-Nederland is de rekenkamer voor de provincies Gelderland
    en Overijssel. Wij doen onafhankelijk onderzoek naar de uitvoering van het provinciaal
    beleid. De onderzoeksrapporten zijn openbaar en worden behandeld in de vergaderingen
    van Provinciale Staten. Provinciale Staten besluiten vervolgens wat er met de
    conclusies en aanbevelingen gedaan wordt.Op deze wijze draagt de Rekenkamer Oost-Nederland
    bij aan de kwaliteit van het provinciaal bestuur en aan het vergroten van de publieke
    verantwoording.
  url: https://rekenkameroost.nl/rekenkamer-oost-nederland/
