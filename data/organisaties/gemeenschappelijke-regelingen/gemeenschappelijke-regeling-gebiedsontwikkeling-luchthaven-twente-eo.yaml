gr_meta:
  citeertitel: Gemeenschappelijke regeling Gebiedsontwikkeling Luchthaven Twente e.o.
  doel: 1. ADT heeft, gelet op het bepaalde in art. 2.1. van de Bestuurovereenkomst
    tot doel de herontwikkeling van het Projectgebied - als gevolg van de sluiting
    van de luchtmachtbasis Twente waarmee het militair gebruik van het projectgebied
    is beëindigd - ten behoeve van toekomstbestendige bestemmingen die een belangrijke
    bijdrage zullen leveren aan de economie, ecologie en leefbaarheid van de regio.ADT
    en de Deelnemers zullen zich inspannen het Projectgebied te bestemmen voor woningbouw,
    bedrijventerrein, luchthaven en natuur, met als uitgangspunt dat de gebiedsontwikkeling
    moet bijdragen aan een economisch sterker en duurzamer Twente.2. Het ruimtelijke
    kader voor de gebiedsontwikkeling wordt gevormd door de structuurvisies.
