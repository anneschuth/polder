  bevoegdheden:
  - kop_artikel: Artikel 5. Bevoegdheden
    inhoud_artikel: Dit artikel bevat geen limitatieve opsomming van de bevoegdheden
      van ADT en beoogt geen beperking aan te brengen in de bevoegdheden die ADT van
      rechtswege heeft.1. Met betrekking tot de in artikel 4 genoemde taken behoren
      aan ADT ondermeer de volgende bevoegdheden:a. het verkrijgen en vervreemden
      van de eigendom van onroerende en roerende zaken;b. het aangaan van erfpachtovereenkomsten,
      huur- en gebruiksovereenkomsten;c. het aangaan van overeenkomsten en aanbesteden
      van werken, diensten en leveringen met betrekking tot de voorbereiding en uitvoering
      van de gebiedsontwikkeling en het beheer van de tot het Projectgebied behorende
      gronden en het vastgoed;d. Het uitoefenen van toezicht op aanvragen tot (verlengingen
      van) ontheffingen bij de Militaire Luchtvaartautoriteit voor het toestaan van
      luchtvaartactiviteiten op de luchthaven;e. het aangaan van geldleningen en rekening-courantovereenkomsten
      en het waarborgen van geldelijke verplichtingen;f. het aangaan van organisatorische
      en/of facilitaire samenwerking met derden, waaronder andere overheidslichamen,
      maatschappelijke organisaties, onder meer op het gebied van natuur en milieu
      en andere belangenorganisaties, indien dat voor een effectieve behartiging van
      de belangen van ADT noodzakelijk is;g. het oprichten van of deelnemen in rechtspersonen,
      aan wie opdracht wordt gegeven om onderdelen van de in art. 4 genoemde taken
      binnen de doelstelling van de Gemeenschappelijke Regeling feitelijk te realiseren.
