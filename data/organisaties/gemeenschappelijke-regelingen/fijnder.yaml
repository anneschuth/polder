description:
  text: Fijnder is het werkleerbedrijf voor de gemeenten Berkelland, Oost Gelre en
    Winterswijk. Fijnder is verantwoordelijk voor de sociale werkplaats, de weg naar
    werk en uitkeringen. Samen met andere ketenpartners in het sociaal domein zetten
    we ons proactief in voor een zo optimaal mogelijke deelname van onze inwoners
    aan de samenleving. Zelfredzaamheid is hierin een belangrijke waarde.
  url: https://www.fijnder.nl
