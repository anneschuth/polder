gr_meta:
  citeertitel: Gemeenschappelijke regeling Werk en Inkomen Lekstroom
  doel: 1. De dienst behartigt de gemeenschappelijke belangen van de gemeenten ten
    aanzien van een klantgerichte uitvoering van de wetten waarvan de uitvoering is
    overgedragen aan de dienst. Dit geschiedt door middel van een rechtmatige, doelmatige
    en doeltreffende uitvoering.2. De dienst heeft de missie dat alle burgers in de
    deelnemende gemeenten die dat kunnen naar vermogen (economisch) participeren,
    en sociale uitsluiting, schulden en armoede voorkomen wordt. Degenen die dat nodig
    hebben krijgen (extra) inkomensondersteuning dan wel een rechtmatige uitkering.
    Deze inkomensondersteuning en/of uitkeringsafhankelijkheid is zo kort mogelijk
    en mensen worden hierin zo goed als mogelijk ondersteund. Daarbij gaat de dienst
    uit van de kracht van mensen zelf en werk boven een uitkering.
