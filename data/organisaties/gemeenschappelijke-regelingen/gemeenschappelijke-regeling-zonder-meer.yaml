gr_meta:
  citeertitel: Gemeenschappelijke regeling zonder meer
  doel: 1. Deze regeling heeft betrekking op samenwerking op het gebied van taken
    die voortvloeien uit de decentralisaties op het terrein van het sociaal domein.2.
    De samenwerking richt zich op overleg en afstemming tussen de deelnemende gemeenten
    in de meest ruime zin, waarmee een strategische en sterke(re) positie wordt gecreëerd
    naar derden toe. Door gezamenlijke beleidsvoorbereiding en -uitvoering wordt de
    kwaliteit verbeterd en worden schaalvoordelen benut.3. De samenwerking richt zich
    indien gewenst op een gezamenlijk inkoop- en contractmanagement, daar waar sprake
    is van afname van producten tegen een bepaalde prijs. Zie bijlage II van de Dienstverleningsovereenkomst
    voor specificering.4. Deze regeling respecteert bestaande samenwerkingsvormen
    van de deelnemende gemeenten maar sluit nieuwe samenwerking met anderen of aansluiting
    van de deelnemende gemeenten bij de bestaande regeling niet uit.5. Vanuit deze
    regeling kan, ter realisering van de doelstellingen uit dit artikel, samenwerking
    worden gezocht met derden.
  samenwerkingsvorm:
    value: '''Regeling zonder meer'''
    afkorting: RZM
