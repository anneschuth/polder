description:
  text: 'GGD Gelderland-Zuid zorgt voor de gezondheid van de inwoners in de regio
    Gelderland-Zuid. Dit doen wij in opdracht van de gemeenten in Gelderland-Zuid
    en van de landelijke overheid. Dit gebeurt op de volgende manieren:- Signaleren
    en voorkomen van gezondheidsproblemen.- Acuut optreden bij gevaar voor de volksgezondheid,
    o.a. bij rampen.- Zorg toegankelijk maken voor verschillende doelgroepen.- Bevorderen
    van samenwerking met partners in gezondheid en veiligheid.De meeste GGD-taken
    liggen vast in de Wet publieke gezondheid. Andere relevante wetten voor de taken
    die wij uitvoeren, zijn: de Wet kinderopvang, Wet op de lijkbezorging, Jeugdwet,
    Wet maatschappelijke ondersteuning en Wet veiligheidsregio’s.'
