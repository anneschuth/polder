  bevoegdheden:
  - kop_artikel: Artikel 7 Mandaat, machtiging en delegatie van overgedragen bevoegdheden
    inhoud_artikel: 1. De colleges alsmede de burgemeesters van de gemeenten kunnen
      bevoegdheden mandateren respectievelijk machtigen aan het algemeen bestuur.2.
      Mandaat wordt niet eerder verleend dan nadat het algemeen bestuur daarmee uitdrukkelijk
      heeft ingestemd.3. Ondermandaat is toegestaan tenzij dat uitdrukkelijk is voorbehouden.4.
      Er wordt een register bijgehouden van de overeenkomstig het eerste en derde
      lid gemandateerde bevoegdheden.5. Voor zover van delegatie sprake is, is dat
      in deze regeling vervat.
