  citeertitel: Gemeenschappelijke Regeling SSC DeSom 2015
  doel: Het belang van deze regeling is het bewerkstelligen van een kwalitatief hoogwaardige
    en een doelmatige uitvoering door het SSC van de door de gemeenten opgedragen
    uitvoerende taken en de ondersteuning in brede zin op het terrein van de ICT en
    het creëren van de voorwaarden voor een efficiënte bedrijfsvoering en een efficiënte
    en klantgerichte dienstverlening.
