  bevoegdheden:
  - kop_artikel: Artikel 4
    inhoud_artikel: 1. Het streekarchief heeft tot doel de uitvoering van de gemeentelijke
      taken in het kader van de Archiefwet.2. In het kader van deze taakopdracht draagt
      het Streekarchief zorg voor o.a.:a. de aanstelling van een streekarchivaris,
      die voor de deelnemende gemeenten geldt als de gemeentearchivaris, als bedoeld
      in art. 32van de Archiefwet;b. het in standhouden van een archiefbewaarplaats
      als bedoeld in art. 31 van de Archiefwet;c. het beheer van naar de archiefbewaarplaats
      overgebrachte archiefbescheiden;d. het toezicht op het beheer van nog niet naar
      de archiefbewaarplaats overgebrachte archiefbescheiden, die nog bij de deelnemende
      gemeente berusten;e. integraal digitaal informatiebeheer (duurzaamheid, betrouwbaarheid
      en veiligheid) i.s.m. de deelnemers;f. de inrichting en het beheer van een studiezaal
      ter raadpleging van archiefbescheiden;g. het (interactief) betrekken van diverse
      publieksgroepen en (werk)gemeenschappen bij de lokale en regionale geschiedbeoefening
      enarchiefbeheer;h. de mogelijkheid van hergebruik van informatie (open data)
      en inbedding van de (digitale) collectie in externe platforms.3. De per gemeente
      te verrichten werkzaamheden worden jaarlijks vastgelegd in een werkprogramma,
      waarin opgenomen:a. een basispakket, bestaande uit algemene collectieve taken
      en standaardtaken, gekoppeld aan het aantal strekkende meters dat isovergedragen;b.
      taken op verzoek, die uitdrukkelijk niet voor alle gemeenten worden uitgevoerd.4.
      Ten behoeve van een adequate voorbereiding en uitvoering van de hiervoor bedoelde
      taken zijn aan het streekarchief bevoegdheden van regeling en bestuur inzake
      de eigen huishouding, toegekend binnen de grens van artikel 30 van de Wgr.5.
      Aan het streekarchief is, ten behoeve van de in het eerste lid genoemde doelstelling,
      de bevoegdheid toegekend een of meer rechtspersonen op te richten en/ of deel
      te nemen in een of meer bestaande dan wel te vormen rechtspersonen.6. Wanneer
      het streekarchief overgaat tot het oprichten van een rechtspersoon, zoals bedoeld
      in het vorige lid, treedt het algemeen bestuur tevens op als algemene vergadering
      van aandeelhouders, c.q. als stichtingsbestuur.
