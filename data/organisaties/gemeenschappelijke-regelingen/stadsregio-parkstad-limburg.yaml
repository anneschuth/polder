description:
  text: 'Stadsregio Parkstad Limburg is sinds 1999 het bestuurlijk samenwerkingsverband
    van de Parkstadgemeenten Beekdaelen, Brunssum, Heerlen, Kerkrade, Landgraaf, Simpelveld
    en Voerendaal. Daarvoor werkten de gemeenten samen onder de titels ''Oostelijke
    Mijnstreek'' en ''Streekgewest Oostelijk Zuid Limburg''. Vanaf 2014 wordt gewerkt
    met een Gemeenschappelijke Regeling (GR) van Colleges van Burgemeesters en Wethouders.  Het
    Dagelijks Bestuur (DB) wordt gevormd door de burgemeesters van de zeven gemeenten.
    Het Algemeen Bestuur (AB) uit de burgemeesters aangevuld met zeven wethouders,
    van iedere gemeente één. Daarnaast zijn er vijf bestuurscommissies: Economie &
    Toerisme, Wonen & Herstructurering, Ruimte & Mobiliteit, Duurzaamheid en Sociaal
    Economische Structuurversterking (SES).Elke bestuurscommissie is samengesteld
    uit één portefeuille-houdend collegelid per aan het onderwerp deelnemende gemeente.
    Het doel is te komen tot een samenhangend beleid en uitvoering op de thema’s:
    ruimte & mobiliteit, economie & toerisme, wonen & herstructurering, duurzaamheid
    & energie, leefbaarheid en welzijn (SES) en grensoverschrijdende samenwerking
    (GROS). Het thema Grensoverstijgende Samenwerking is belegd in het Dagelijks Bestuur.Het
    regiobureau waar zo’n 35 professionals werken, faciliteert de samenwerking tussen
    de zeven gemeenten op basis van de strategische agenda. Zij ondersteunen ook de
    Bestuurscommissies waar leden van de colleges van Burgemeesters en Wethouders
    van de Parkstadgemeenten het beleid en de (uitvoering)plannen vaststellen die
    invulling geven aan de thema’s.'
