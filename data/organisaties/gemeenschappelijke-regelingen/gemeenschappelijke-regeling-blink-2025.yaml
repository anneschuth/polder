  bevoegdheden:
  - kop_artikel: Artikel 4. Bevoegdheden
    inhoud_artikel: 1.  Het Algemeen Bestuur en Dagelijks Bestuur hebben verordenende
      en regelgevende bevoegdheden met betrekking tot de aangelegenheden die de bedrijfsvoering
      van het openbaar lichaam betreffen.2. De colleges hebben op basis van het bepaalde
      in de Afvalstoffenverordening, ieder voor zich, besloten Blink aan te wijzen
      als inzameldienst voor het ophalen van huishoudelijke afvalstoffen en KWD- bedrijfsafvalstoffen,
      zoals bedoeld in de Afvalstoffenverordening. Blink is dientengevolge bevoegd
      tot het inzamelen van huishoudelijke afvalstoffen als bedoeld in de artikelen
      10.21 eerste lid en artikel 10:22 eerste lid Wet milieubeheer.3.  Het Algemeen
      Bestuur is bevoegd met een of meer deelnemende gemeenten overeenkomsten te sluiten
      met betrekking tot de sortering, vermarkting en (eind)verwerking van (grondstoffen
      in) grof en fijn huishoudelijke afvalstoffen. Voorts kan het Algemeen Bestuur
      op grond van een door een of meer deelnemende gemeenten verstrekte volmacht
      overeenkomsten sluiten met derden met betrekking tot sortering, vermarkting
      en (eind)verwerking van (grondstoffen in) grof en fijn huishoudelijke afvalstoffen.4.
      Het Algemeen Bestuur is bevoegd met het oog op het in artikel 3 benoemd belang
      tot het vaststellen of wijzigen van een gemeenschappelijke regeling tussen het
      openbaar lichaam en andere openbare lichamen, alsmede het toetreden tot en het
      uittreden uit een dergelijke regeling.5. Het Algemeen Bestuur is bevoegd te
      besluiten tot de oprichting van of deelname in stichtingen, maatschappen, vennootschappen
      en coöperaties en verenigingen, dan wel de ontbinding daarvan of beëindiging
      van deelneming daaraan op voorwaarde dat de raden van de deelnemende gemeenten
      vooraf in de gelegenheid zijn gesteld hun wensen en bedenkingen met betrekking
      tot het voorgenomen besluit aan het Algemeen Bestuur kenbaar te maken.6. Het
      Dagelijks Bestuur is bevoegd met een of meer al dan niet deelnemende gemeenten
      of met privaatrechtelijke rechtspersonen samenwerkingsovereenkomsten te sluiten
      met betrekking tot ondersteunende dienstverlening voor taken waarmee het openbaar
      lichaam belast is.
