gr_meta:
  citeertitel: Gemeenschappelijke regeling Blink 2025
  doel: 1.  De colleges hebben deze regeling getroffen ter behartiging van de sturing
    en beheersing van ondersteunende processen en van uitvoeringstaken van de deelnemende
    gemeenten op het terrein van milieu, zoals benoemd in de Wmb, bij het reinigen
    van de openbare ruimte en bij de gladheidsbestrijding.2. De colleges richten een
    gezamenlijke uitvoeringsorganisatie op in de vorm van een openbaar lichaam voor
    de uitvoering van gemeentelijke taken op het terrein van de afvalinzameling en
    reinigingstaken die bij wet - in het bijzonder de artikelen 10.21 en 10.22 van
    de Wet milieubeheer - aan de deelnemende gemeenten zijn opgedragen en/of die voortvloeien
    uit de aan de gemeenten op grond van de Gemeentewet toevertrouwde zorg voor de
    eigen huishouding op het terrein van het milieu, zoals benoemd in de Wmb.3.  De
    gezamenlijke uitvoeringsorganisatie heeft mede tot het doel zorg te dragen voor
    gemeentelijke uitvoeringstaken op het vlak van de inzameling, sortering, vermarkting
    en (eind)verwerking van (grondstoffen in) grof en fijn huishoudelijke afvalstoffen,
    de gladheidsbestrijding en de reiniging van de openbare ruimte van de deelnemende
    gemeenten.4.  De colleges dragen tezamen zorg voor de besturing van de gezamenlijke
    uitvoeringsorganisatie en houden daarbij rekening met de bevoegdhedenverdeling
    over de gemeentelijke organen en de zelfstandigheid van ieder van de deelnemende
    gemeenten.5. Het openbaar lichaam kan daarnaast van een of meer deelnemende gemeenten
    opdrachten aannemen voor de uitvoering of ondersteuning bij de uitvoering van
    met name te benoemen gemeentelijke taken op het terrein van het milieu zoals benoemd
    in de Wmb, mits dat gebeurt op een budgettair neutrale wijze voor de andere deelnemende
    gemeenten.
