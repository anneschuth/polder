description:
  text: ICT NML is een samenwerkingsverband tussen zes gemeenten in Limburg en Noord-Brabant
    (Venlo, Roermond, Weert, Nederweert, Asten en Someren) op het gebied van gezamenlijke
    ICT infrastructuur. Wij zijn een gerenommeerde ICT-dienstverlener die zowel de
    lokale overheid als haar ketenpartners:helpt te excelleren door snel, goed en
    slim gebruik te maken van technische mogelijkheden;aanzet tot synergie-effecten;maximaal
    ontzorgt.ICT NML biedt een gemeenschappelijk automatiseringsplatform dat samenwerken
    vergemakkelijkt. Dit is randvoorwaardelijk voor verdere digitale samenwerking.
    Ondernemerschap staat bij ons hoog in het vaandel; wij zijn een wendbare en weerbare
    organisatie die kwaliteit van bestaande dienstverlening borgt én is voorbereid
    op de toekomst. Onze kernwaarden - passie, vertrouwen, eenvoud en flexibiliteit
    - geven richting aan ons handelen en vormen de basis van onze werkwijze.Sinds
    januari 2024 maakt ECGeo, het geo-samenwerkingsverband van de gemeenten Leudal,
    Nederweert, Roermond en Weert, deel uit van ICT NML. ECGeo brengt haar eigen expertise
    op het gebied van geo-informatie mee, zoals de BGT, BAG en kaartviewer. Deze integratie
    maakt het mogelijk om geo-diensten efficiënter en effectiever in te zetten en
    de kwaliteit verder te verhogen.
