  bevoegdheden:
  - kop_artikel: Artikel 5
    inhoud_artikel: 1.  Aan het bestuur van het Werkvoorzieningschap zijn, ter behartiging
      van het in artikel 4 genoemde belang, de volgende bevoegdheden en taken overgedragen:a.
      het uitoefenen van het werkgeverschap van Wsw-medewerkers en de daarbij behorende
      bevoegdheden die bij of krachtens de Wsw aan de gemeentebesturen zijn toegekend,
      voor zover deze strekken tot arbeidsinschakeling van daartoe geïndiceerde personen,
      waarvoor de gemeenten verantwoordelijk zijn;b. het verrichten van in het kader
      van bovengenoemd belang alle noodzakelijke en gewenste taken voor zover deze
      krachtens de wet niet zijn voorbehouden aan een ander rechtspersoonlijkheid
      bezittend lichaam;c. het verrichten van al hetgeen met het vorenstaande verband
      houdt of daartoe bevorderlijk kan zijn.2. Het bestuur besluit tot de oprichting
      van en de deelneming in stichtingen, maatschappen, vennootschappen, verenigingen,
      coöperaties en onderlinge waarborgmaatschappijen, indien dat in het bijzonder
      aangewezen moet worden geacht voor de behartiging van het daarmee te dienen
      openbaar belang en slechts voor zover zulks past binnen het doel van het Werkvoorzieningschap.
      Het besluit wordt niet genomen dan nadat de raden van de gemeenten een ontwerpbesluit
      is toegezonden en in de gelegenheid zijn gesteld hun wensen en bedenkingen ter
      kennis van het bestuur te brengen.
