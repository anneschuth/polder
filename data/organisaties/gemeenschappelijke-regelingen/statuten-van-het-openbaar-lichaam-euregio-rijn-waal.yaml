  bevoegdheden:
  - kop_artikel: § 3 Taken en bevoegdheden
    inhoud_artikel: 1. De Euregio Rijn-Waal heeft de taak de regionale grensoverschrijdende
      samenwerking van haar leden op de in lid 2 genoemde gebieden te bevorderen,
      te ondersteunen en te coördineren. Zij voert te dien einde projecten uit. Zij
      vraagt financiële middelen van derden aan en neemt deze in ontvangst. Zij verstrekt
      financiële middelen aan derden. Zij adviseert leden, burgers, bedrijven, organisaties,
      overheden en andere instellingen bij grensoverschrijdende activiteiten en problemen.2.
      Grensoverschrijdende samenwerking vindt op de volgende gebieden plaats:a) economische
      ontwikkeling,b) opleidingen en onderwijs,c) verkeer en vervoer,d) ruimtelijke
      ordening,e) sport en cultuur,f) recreatie en toerisme, g)milieubehoud en afvalbeheer,g)
      milieubehoud en afvalbeheer,h) natuur, landschap en klimaati) sociale zaken,j)
      gezondheidszorg,k) rampenbestrijding,l) telecommunicatie,m) openbare orde en
      veiligheid.
