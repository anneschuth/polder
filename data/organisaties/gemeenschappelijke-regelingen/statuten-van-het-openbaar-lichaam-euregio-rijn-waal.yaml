names:
- value: Statuten van het openbaar lichaam Euregio Rijn-Waal
  valid_from: '2019-06-06'
gr_meta:
  doel: De Euregio Rijn-Waal is een Nederlands-Duits openbaar lichaam, waarbij ca.
    55 gemeenten en regionale overheden zijn aangesloten. De Euregio Rijn-Waal heeft
    als belangrijkste doel de grensoverschrijdende samenwerking op het gebied van
    economie en maatschappij te verbeteren en te intensiveren. In het werkgebied van
    de Euregio Rijn-Waal bestaan veel mogelijkheden voor een sterke economische en
    maatschappelijke ontwikkeling. De Euregio Rijn-Waal brengt partners bij elkaar
    om gezamenlijke initiatieven te starten en zo gebruik te maken van synergie-effecten.
