  bevoegdheden:
  - kop_artikel: Artikel 4 Bevoegdheden
    inhoud_artikel: 1. Ter behartiging van het in artikel 3 genoemde belang is het
      bestuur bevoegd tot:a. het vaststellen van de organisatiestructuur;b. het vaststellen
      van het (meerjaren)personeels- en formatieplan;c. het vaststellen en uitvoeren
      van het personeelsbeleid;d. het nemen van besluiten terzake het benoemen, schorsen
      en ontslaan van personeel alsmede het voeren van rechtsgedingen;e. het aanschaffen
      en het beheren van de middelen ten behoeve van het apparaat;f. het aanschaffen
      en het beheren van materieel dat structureel door meer dan één recreatieschap
      wordt gebruikt;g. het doen van beleidsvoorstellen aan de recreatieschappen,
      betreffende gemeenschappelijke beleidsuitgangspunten;h. het bespreken van gemeenschappelijke
      thema’s en het - waar nodig en door de recreatieschappen gewenst voorbereiden
      van gemeenschappelijk beleid.2. Naast de bevoegdheden vermeld in het eerste
      lid kan de bedrijfsvoeringsorganisatie taken voor derden uitvoeren. Deze werkzaamheden
      mogen niet in strijd zijn met het belang waarvoor de regeling is getroffen,
      moeten minimaal kostendekkend zijn en mogen niet tot gevolg hebben dat de bedrijfsvoeringsorganisatie
      niet langer ten minste 80% van zijn werkzaamheden voor deelnemers verricht.3.
      De bevoegdheden genoemd in het eerste lid worden uitgeoefend binnen de grenzen
      van de rechtspositieregeling van de provincie Utrecht als bedoeld in artikel
      13 en de vastgestelde begroting en algemene financiële kaders als bedoeld in
      artikel 17 van deze regeling.
