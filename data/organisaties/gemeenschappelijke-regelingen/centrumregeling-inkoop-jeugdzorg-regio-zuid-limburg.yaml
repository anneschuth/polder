gr_meta:
  citeertitel: Centrumregeling Inkoop Jeugdzorg regio Zuid-Limburg
  doel: De deelnemende gemeenten gaan door middel van deze centrumregeling onderlinge
    samenwerking aan met de doelstellingen zoals verwoord onder 1 en 2 en uitgangspunten
    zoals verwoord onder 3 tot en met 6:1. Het zorg dragen voor een kwalitatief goede
    en efficiënte uitvoering van de jeugdzorgtaken, zoals vastgelegd in de beleidsplannen
    Jeugd van de deelnemende gemeenten, met inachtneming van de bepalingen van de
    Jeugdwet.2. Het delen van kennis en expertise in de regio die nodig zijn voor
    de uitvoering.3. De samenwerking wordt zodanig ingericht dat zij garant staat
    voor continuïteit en duurzaamheid van de jeugdzorg.4. In de vormgeving van deze
    gezamenlijk uit te voeren jeugdzorg wordt maximaal aangesloten op de wijze van
    inrichting van de lokale jeugdzorgtaken in de deelnemende gemeenten.5. De deelnemende
    gemeenten behouden hun eigen bestuurlijke structuur, bevoegdheden en verantwoordelijkheden,
    gericht op een goede dienstverlening aan de eigen bevolking en ruimte voor het
    behoud van eigen identiteit in de uitvoering van de nieuwe jeugdzorgtaken.6. Deze
    centrumregeling is gericht op de inkoop van de dienstverlening van de jeugdzorg
    zoals omschreven in artikel 4 ten behoeve van de deelnemende gemeenten.
  samenwerkingsvorm:
    value: '''Regeling zonder meer'''
    afkorting: RZM
