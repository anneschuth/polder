gr_meta:
  citeertitel: Regeling Bedrijfsvoeringorganisatie Prolander
  doel: Het belang waarvoor deze regeling is getroffen is continuering van de nauwe
    samenwerking tussen de provincies Drenthe en Groningen uit oogpunt van kwaliteitsverbetering,
    efficiency, borging van continuïteit in de bedrijfsprocessen en vermindering van
    de kwetsbaarheid met betrekking tot de inrichting van het landelijk gebied en
    de aankoop, de verkoop en het beheer van grond ten behoeve van natuur en landbouw
    in de provincies Drenthe en Groningen, zoals voorheen voornamelijk binnen DLG-Noord
    plaatsvond.De uitvoering zal plaatsvinden binnen de beleidsmatige kaders (Programma
    landelijk gebied en de Realisatiestrategie), toepasselijke regelgeving en mandaatbesluiten
    van de provincies.
