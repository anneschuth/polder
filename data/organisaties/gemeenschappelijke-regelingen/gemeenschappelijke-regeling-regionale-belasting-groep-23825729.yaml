  bevoegdheden:
  - kop_artikel: Artikel 6
    inhoud_artikel: 1. Aan de bestuursorganen van de RBG als genoemd in artikel 4,
      eerste lid, komen de bevoegdheden toe die in deze regeling aan de RBG zijn toegekend.2.
      De door het dagelijks bestuur van een deelnemend waterschap aan de RBG overgedragen
      bevoegdheden tot heffing en invordering van waterschapsbelastingen worden vastgelegd
      in een takenregister.3. De door een college van een deelnemende gemeente op
      grond van artikel 5 aan de RBG overgedragen bevoegdheden tot heffing en invordering
      van gemeentelijke belastingen, alsmede de bevoegdheid tot uitvoering van de
      Wet waardering onroerende zaken, worden vastgelegd in een takenregister.4. Wijziging
      van een deel van de in het takenregister als bedoeld in het tweede of derde
      lid voor de betreffende deelnemer opgenomen waterschapsbelastingen dan wel gemeentelijke
      belastingen is mogelijk indien het algemeen bestuur hiertoe besluit.5. Voorafgaand
      aan dit besluit is overeenstemming daarover tussen het algemeen bestuur en de
      deelnemer waarvoor de wijziging van toepassing vereist.6. Een wijziging in het
      takenregister wordt nadat daartoe besloten is op de gebruikelijke wijze bekend
      gemaakt en treedt in werking op een in die bekendmaking aangegeven moment.7.
      Op alle besluiten die voorafgaand aan een wijziging van het takenregister zijn
      genomen en op alle belastbare feiten blijft de regeling van toepassing zoals
      deze op het moment van het nemen van het betreffende besluit dan wel het ontstaan
      van het belastbare feit luidde. Ten aanzien van deze besluiten en belastbare
      feiten blijft de Regionale Belasting Groep het bevoegd gezag.
