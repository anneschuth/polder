  citeertitel: Gemeenschappelijke regeling Regionale Belasting Groep
  doel: Het belang van deze regeling bestaat uit het ten behoeve van de deelnemers:a.
    heffen en invorderen van belastingen;b. uitvoeren van de Wet waardering onroerende
    zaken, waaronder tevens wordt begrepen de administratie van vastgoedgegevens op
    basis van die wet en het verstrekken van die vastgoedgegevens aan de waterschappen,
    gemeenten en derden.
