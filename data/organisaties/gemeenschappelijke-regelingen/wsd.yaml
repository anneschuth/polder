description:
  text: WSD is het sociaal werkbedrijf voor negen gemeenten binnen de driehoek Den
    Bosch-Tilburg-Eindhoven. Wij ondersteunen mensen met een afstand tot de arbeidsmarkt
    bij het vinden van werk. Dit omdat wij geloven in een maatschappij waarin iedereen
    mee kan doen, ook als je een afstand tot de arbeidsmarkt hebt. Door mensen te
    begeleiden en te ontwikkelen, zorgen wij voor passend werk. Het liefst bij een
    reguliere werkgever en als het nodig is bij WSD.
