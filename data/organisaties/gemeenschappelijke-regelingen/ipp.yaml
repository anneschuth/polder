description:
  text: Sinds 1953 werken de gemeente Den Haag en Rijswijk samen in de oudste Gemeenschappelijke
    Regeling van Nederland, het Industrieschap de Plaspoelpolder (IPP). Het IPP biedt
    de gemeente Den Haag en Rijswijk een bestuurlijk-strategisch instrument waarmee
    gestuurd wordt op een sterk vestigings- en investeringsklimaat in de regio Haaglanden,
    onder meer door duurzame herinrichting en -structurering van bedrijventerreinen
    en gronduitgifte binnen haar werkgebied. Zeggenschap en risico zijn gelijk verdeeld
    tussen de deelnemende gemeenten.Het IPP heeft ten doel om bij te dragen aan een
    aantrekkelijk, duurzaam en veilig vestigingsklimaat en het bevorderen van de brede
    werkgelegenheid. Het IPP kan in opdracht van de gemeenten en binnen de geldende
    publiekrechtelijke beleidskaders privaatrechtelijke handelingen verrichten zoals
    het aanleggen, herstructureren en exploiteren van bedrijventerreinen, en het verrichten
    van alle taken die met deze doelstelling samenhangen. De GR IPP is gericht op
    het uitvoeren van gemeentelijk beleid waarbij geen sprake is van beleidsvoorbereiding
    of (strategische) beleidskeuzes.
