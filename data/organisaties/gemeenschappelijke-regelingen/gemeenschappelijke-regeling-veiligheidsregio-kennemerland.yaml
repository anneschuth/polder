gr_meta:
  citeertitel: gemeenschappelijke regeling Veiligheidsregio Kennemerland
  doel: De veiligheidsregio heeft tot doel om ter behartiging van de gemeentelijke
    belangen:a. uitvoering te geven aan de Wet veiligheidsregio’s;b. uitvoering te
    geven aan de Wet publieke gezondheid;c. het fungeren als overlegplatform voor
    onderwerpen op het gebied van veiligheid, brandweer en gezondheid, maatschappelijke
    zorg en jeugd voor zover deze het verzorgingsgebied van de deelnemende gemeenten
    gezamenlijk betreffen;d. uitvoering te geven aan andere gemeentelijke taken op
    het terrein van veiligheid, brandweer en gezondheid, maatschappelijke zorg en
    jeugd.
