  bevoegdheden:
  - kop_artikel: 'Artikel 15: Bevoegdheden'
    inhoud_artikel: Het algemeen bestuur heeft in het kader van de uitvoering van
      deze regeling:a. de bevoegdheid tot het instellen van een commissie met het
      oog op de behartiging van bepaalde belangen zoals bedoeld in artikel 25 van
      de Wet gemeenschappelijke regelingen;b. bevoegdheden zoals omschreven in artikel
      25, derde lid onder a. tot en met c. van de Wet gemeenschappelijke regelingen.c.
      de bevoegdheden tot oprichting van en deelneming in privaatrechtelijke rechtspersonen
      als omschreven in artikel 31a van de Wet gemeenschappelijke regelingen.
