  bevoegdheden:
  - kop_artikel: Artikel 3.1 Taken
    inhoud_artikel: 1. Aan het bestuur van de veiligheidsregio worden de bevoegdheden,
      genoemd in artikel 10 van de Wet veiligheidsregio’s overgedragen. Voor de wijze
      van uitoefening van deze bevoegdheden wordt een overeenkomst afgesloten tussen
      de veiligheidsregio en de gemeenten.2. De colleges kunnen, afzonderlijk of tezamen,
      andere taken of bevoegdheden opdragen of overdragen aan het bestuur van de veiligheidsregio,
      voor zover deze taken binnen het belang van de regeling vallen, als omschreven
      in artikel 1.2. Het algemeen bestuur moet instemmen met deze aanvullende overdracht
      of opdracht van taken of bevoegdheden. De wijze van uitvoering van deze taken
      wordt in een overeenkomst tussen de veiligheidsregio en de betreffende gemeenten
      vastgelegd.3. Het algemeen bestuur, het dagelijks bestuur en de voorzitter kunnen
      afzonderlijk of tezamen, ieder voor zover zij voor de veiligheidsregio bevoegd
      zijn, een gemeenschappelijke regeling treffen ter behartiging van een of meer
      bepaalde belangen van de veiligheidsregio, onverminderd het bepaalde in artikel
      93 onderscheidenlijk artikel 96 van de Wet gemeenschappelijke regelingen.4.
      Het dagelijks bestuur en de voorzitter gaan niet over tot het treffen van een
      regeling dan na verkregen toestemming van het algemeen bestuur. De toestemming
      kan slechts worden onthouden wegens strijd met het recht of het algemeen belang.
      Het algemeen bestuur beslist niet over de toestemming, dan nadat de raden ten
      minste acht weken hebben gehad hun zienswijzen omtrent het treffen van de gemeenschappelijke
      regeling bij het dagelijks bestuur bekend te maken. Het dagelijks bestuur voegt
      de zienswijzen bij de gemeenschappelijke regeling zoals die aan het algemeen
      bestuur wordt aangeboden.
  - kop_artikel: Artikel 3.2 Bevoegdheden algemeen bestuur
    inhoud_artikel: 1. Alle bevoegdheden die niet bij of krachtens de wet of de regeling
      aan het dagelijks bestuur of de voorzitter zijn opgedragen, berusten bij het
      algemeen bestuur.2. Het algemeen bestuur is in elk geval bevoegd tot:a. het
      geven van kaders over alles wat de veiligheidsregio aangaat, met inbegrip van
      de samenstelling en omvang van de organisatie;b. het vaststellen van het beleidsplan,
      bedoeld in artikel 14 van de Wet veiligheidsregio’s;c. het vaststellen van het
      risicoprofiel, bedoeld in artikel 15 van de Wet veiligheidsregio’s;d. het vaststellen
      van het crisisplan, bedoeld in artikel 16 van de Wet veiligheidsregio’s, ene.
      het vaststellen van een beleidsnotitie omtrent de bevoegdheden bedoeld in het
      vierde lid en in artikel 3.1, derde en vierde lid.3. Het algemeen bestuur besluit
      over dienstverlening door de veiligheidsregio aan anderen dan de gemeenten.
      Het algemeen bestuur kan kaders stellen ten behoeve van de door het dagelijks
      bestuur te sluiten overeenkomsten met gemeenten of anderen dan de gemeenten.4.
      Het algemeen bestuur besluit slechts tot de oprichting van of de deelneming
      in stichtingen, maatschappen, vennootschappen, verenigingen, coöperaties, en
      onderlinge waarborgmaatschappijen, indien dat in het bijzonder aangewezen moet
      worden geacht voor de behartiging van het daarmee te dienen openbaar belang,
      onverminderd het bepaalde in artikel 31a van de Wet gemeenschappelijke regelingen.5.
      Het algemeen bestuur stelt in elk geval de volgende regelingen op:a. de financiële
      verordening, bedoeld in artikel 212 van de Gemeentewet;b. de financiële controleverordening,
      bedoeld in artikel 213 van de Gemeentewet;c. de bijdrageverordening, bedoeld
      in artikel 4.2a, derde lid;d. het reglement van orde, bedoeld in artikel 2.6,
      eerste lid;e. het model voor de overeenkomst, bedoeld in artikel 3.1, eerste
      en tweede, lid;f. een reglement voor de behandeling van een bezwaar als bedoeld
      in artikel 7:1, eerste lid, van de Algemene wet bestuursrecht, eng. een reglement
      voor de behandeling van een klacht als bedoeld in artikel 9:1, eerste lid, van
      de Algemene wet bestuursrecht.
  - kop_artikel: Artikel 3.3 Overdracht
    inhoud_artikel: 1. Het algemeen bestuur kan aan het dagelijks bestuur bevoegdheden
      overdragen, tenzij de aard van de bevoegdheid zich daar tegen verzet. Het algemeen
      bestuur stelt daartoe een delegatiebesluit vast.2. Het algemeen bestuur kan
      in elk geval niet overdragen de bevoegdheden genoemd in artikel 33a, tweede
      lid, van de Wet gemeenschappelijke regelingen en de bevoegdheden, bedoeld in
      artikel 3.2, tweede lid.
  - kop_artikel: Artikel 3.5 Bevoegdheden dagelijks bestuur
    inhoud_artikel: Het dagelijks bestuur is, onverminderd het bepaalde in artikel
      3.3, in ieder geval bevoegd:a. het dagelijks bestuur van de veiligheidsregio
      te voeren, voor zover niet bij of krachtens de wet of de regeling het algemeen
      bestuur of de voorzitter hiermee is belast;b. beslissingen van het algemeen
      bestuur voor te bereiden en uit te voeren;c. regels vast te stellen over de
      ambtelijke organisatie van de veiligheidsregio;d. ambtenaren te benoemen, te
      schorsen en te ontslaan, met uitzondering van de algemeen directeur bedoeld
      in artikel 2.13;e. tot privaatrechtelijke rechtshandelingen van de veiligheidsregio
      te besluiten, met uitzondering van besluiten tot oprichting van en de deelneming
      in stichtingen, maatschappen, vennootschappen, verenigingen, coöperaties en
      onderlinge waarborgmaatschappijen;f. te besluiten namens de veiligheidsregio,
      het dagelijks bestuur of het algemeen bestuur rechtsgedingen, bezwaarprocedures
      of administratief beroepsprocedures te voeren of handelingen ter voorbereiding
      daarop te verrichten, tenzij het algemeen bestuur, voor zover het het algemeen
      bestuur aangaat, in voorkomende gevallen anders beslist.
  - kop_artikel: Artikel 3.6 Mandaat
    inhoud_artikel: Het dagelijks bestuur kan een of meer leden van het dagelijks
      bestuur machtigen tot uitoefening van een of meer van zijn bevoegdheden, tenzij
      de regeling waarop de bevoegdheid steunt zich daartegen verzet.
