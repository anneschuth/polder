description:
  text: RMN (Reinigingsbedrijf Midden Nederland) is in 2000 opgericht. Inmiddels is
    RMN uitgegroeid tot een gemeenschappelijke regeling van de volgende zes gemeenten:BaarnBunnikNieuwegeinSoestIJsselsteinZeistDeze
    zes gemeenten zijn eigenaar van RMN en vertegenwoordigd in het algemeen en dagelijks
    bestuur van RMN.RMN is voor de deelnemende gemeenten de vanzelfsprekende samenwerkingspartij
    als het gaat over inzameling van grondstoffen en restafval en een schone, hele
    en veilige buitenruimte. Wij zijn de afval- en grondstoffenexpert, opereren zelfbewust
    en dragen actief bij aan circulaire doelen en duurzaamheidsdoelen.
