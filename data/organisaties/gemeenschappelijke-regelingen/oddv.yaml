- value: Omgevingsdienst de Vallei
  abbr: OddV
  valid_from: '1900-01-01'
description:
  text: Over onsOmgevingsdienst de Vallei (OddV) draagt bij aan een veilige, duurzame
    en gezonde leefomgeving. We werken in opdracht van vijf gemeenten en de provincie
    Gelderland. We werken nauw samen op het gebied van vergunningverlening, toezicht
    en handhaving van de milieu- en bouwwetgeving. Ook houden we ons bezig met de
    duurzame omgevingskwaliteit. Daarnaast adviseren we over externe en constructieve
    veiligheid, luchtkwaliteit, geluidsbelasting en duurzaamheid.Met zo’n 140 collega’s
    zorgen we voor een betere dienstverlening aan bedrijven en inwoners, minder administratieve
    lasten en kortere procedures. Zo werken we samen aan een veilig, gezond en leefbaar
    Valleigebied.
  url: https://www.oddevallei.nl/over-ons/
