  bevoegdheden:
  - kop_artikel: Artikel 6 Taken en bevoegdheden
    inhoud_artikel: 1. Aan het algemeen bestuur behoren taken en bevoegdheden toe
      die in de wet aan het algemeen bestuur zijn opgedragen, alsmede alle bevoegdheden
      die voorts in deze regeling aan dit orgaan worden opgedragen en niet aan het
      dagelijks bestuur of de voorzitter zijn opgedragen.2. Het algemeen bestuur kan
      aan het dagelijks bestuur bevoegdheden overdragen met uitzondering van de bevoegdheid
      tot:a. het vaststellen en wijzigen van de begroting;b. het vaststellen en wijzigen
      van de deelbegrotingen (per samenwerkingsmodule);c. het vaststellen van de rekening;d.
      het vaststellen van verordeningen;e. het vaststellen van het uitvoeringsplan
      en uitvoeringsprogramma;f.  het instellen van bestuurscommissies;g. het oprichten
      van of deelnemen in stichtingen, vennootschappen, en coöperatieve en andere
      verenigingen passend binnen de te behartigen belangen, de taken en de bevoegdheden
      van het samenwerkingsverband dan wel het ontbinden van die rechtspersonen of
      het beëindigen van de deelneming;
