  bevoegdheden:
  - kop_artikel: Artikel 3 - Doel en taakomschrijving; overdracht van bevoegdheden
    inhoud_artikel: 1. De regeling heeft als doel het door middel van het openbaar
      lichaam GGD ZL behartigen van de belangen van gemeenten op het terrein van de
      volksgezondheid en openbare gezondheidszorg ten behoeve van de bevolking van
      Zuid-Limburg.2. De GGD ZL draagt binnen Zuid-Limburg zorg voor de uitvoering
      van alle taken die in wetten op het terrein van de volksgezondheid en de openbare
      gezondheidszorg en in regelingen die krachtens die wetten zijn getroffen, aan
      gemeenten zijn opgedragen of aan gezondheidsdiensten zijn of nog zullen worden
      opgedragen. Voorzover het aan gemeenten opgedragen taken betreft, dragen de
      gemeentebesturen de uitvoering van die taken over aan het algemeen bestuur van
      de GGD ZL.3. De colleges dragen aan het algemeen bestuur van de GGD ZL alle
      bevoegdheden over die aan de colleges ten dienste staan ingevolge of ter uitvoering
      van de in lid 2 bedoelde wetten en regelingen.4. Indien nieuwe wetten of regelingen
      op het terrein van de volksgezondheid en de openbare gezondheidszorg worden
      ingevoerd waarin aan de gemeenten taken en bevoegdheden worden toegekend of
      indien in bestaande wetten of regelingen op het terrein van de volksgezondheid
      nieuwe taken en bevoegdheden aan gemeenten worden toegekend, kan het algemeen
      bestuur van de GGD ZL besluiten om binnen Zuid-Limburg zorg te gaan dragen voor
      de uitvoe¬ring daarvan. De daadwerkelijke uitvoering van die taken en bevoegdheden
      door de GGD ZL binnen het grondgebied van een deelnemende gemeente gaat pas
      in op een nader door het algemeen bestuur te bepalen datum nadat door het gemeentebestuur
      van de betreffende gemeente is besloten om die taken en bevoegdheden aan het
      algemeen bestuur van de GGD ZL over te dragen.5. In opdracht van de gemeenten
      of andere instellingen of instanties kan de GGD ZL ook andere aan de doelomschrijving
      van de GGD ZL verwante diensten verrichten.
