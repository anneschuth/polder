  citeertitel: Gemeenschappelijk regeling Groengebied Amstelland
  doel: Deze regeling heeft ten doel binnen een gebied, als aangegeven op de bij deze
    regeling behorende en als zodanig gewaarmerkte tekening:a. het bevorderen van
    een evenwichtige ontwikkeling van de openluchtrecreatie;b. het tot stand brengen
    en bewaren van een evenwichtig natuurlijk milieu;c. het tot stand brengen en onderhouden
    van een harmonisch landschap, dat is afgestemd op het onder a en b geformuleerde
    en dat rekening houdt met een gezonde agrarische bedrijfsvoering.
