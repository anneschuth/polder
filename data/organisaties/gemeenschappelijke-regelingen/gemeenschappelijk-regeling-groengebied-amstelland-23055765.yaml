  bevoegdheden:
  - inhoud_artikel: "Artikel 3,2.\tTer verwezenlijking van de in artikel 2 genoemde\
      \ doelen worden aan het bestuur van het schap de volgende bevoegdheden toegekend:a.\t\
      het vaststellen van verordeningen, op overtreding waarvan een geldboete van\
      \ de tweede categorie kan worden gesteld,b.\thet heffen van rechten, als bedoeld\
      \ in artikel 229, 1e lid onder a en b, van de Gemeentewet en in artikel 221,\
      \ onder b van de Provinciewet, de rechten waarvan heffing krachtens bijzondere\
      \ wetten geschiedt en de heffing bedoeld in artikel 15.33 van de Wet milieubeheer,c.\t\
      Het uitoefenen van de gemeentelijke bevoegdheden, ingevolge artikel 430a van\
      \ het Wetboek van Strafrecht (ongeklede recreatie), indien en voor zover het\
      \ algemeen bestuur heeft verklaard daartoe over te gaan,d.\tHet uitoefenen van\
      \ de bevoegdheid van burgemeester en wethouders, als bedoeld in artikel 8.2,\
      \ eerste lid van de Wet milieubeheer voor wat betreft het gestelde in bijlage\
      \ I, categorie 19, sub g, onder 1 van het Inrichtingen- en Vergunningenbesluit\
      \ Milieubeheer (gemotoriseerde modelvliegtuigen, -vaartuigen, -voertuigen) indien\
      \ en voor zover het algemeen bestuur heeft verklaard daartoe over te gaan,e.\t\
      Het uitoefenen van de bevoegdheid tot toepassing van bestuursdwang zoals bedoeld\
      \ in artikel 125 van de Gemeentewet en artikel 122 van de Provinciewet indien\
      \ en voor zover de toepassing van bestuursdwang dient tot handhaving van door\
      \ het bestuur van het schap vastgestelde regels."
