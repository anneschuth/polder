  citeertitel: Gemeenschappelijke regeling WSD
  doel: Artikel 3 Doelstelling1. Het schap heeft tot doel de uitvoering van de Wsw.
    Ter realisering van deze doelstelling draagt het schap er onder meer zorg voor
    dat zij aan zoveel mogelijk ingezetenen, die blijkens een indicatiebeschikking
    of herindicatiebeschikking tot de doelgroep behoren, een dienstbetrekking aanbiedt
    voor het verrichten van arbeid onder aangepaste omstandigheden.2. Het schap heeft
    eveneens tot doel ondersteuning bij arbeidsinschakeling voor de doelgroepen genoemd
    in artikel 7, lid 1 onderdeel a Pw door onder andere het voorzien in participatievoorziening
    beschut werk, vaststelling doelgroep loonkostensubsidie en uitvoering loonkostensubsidie,
    leer-werk-trajecten een en ander als bedoeld in de Pw. Daarnaast heeft het schap
    ten doel het aanbieden van voorzieningen in het kader van inburgering op grond
    van de Wi en in het kader van dagbesteding op grond van de Wmo die bijdragen aan
    arbeidsinschakeling.3. Bij de uitvoering van taken wordt onderscheid gemaakt tussen
    basistaken die voor alle deelnemende gemeenten worden uitgevoerd en plustaken,
    waarbij deelnemende gemeenten vrije keuze hebben om die door het schap te laten
    uitvoeren.4. Het schap heeft mede ten doel andere vormen van gesubsidieerde arbeid
    uit te voeren dan wel te doen uitvoeren. Het algemeen bestuur van WSD kan hiertoe
    een of meerdere privaatrechtelijke rechtspersonen oprichten, overeenkomstig artikel
    18, tweede lid.5. Het algemeen bestuur is bevoegd om onder nader door hem te stellen
    voorwaarden met niet aan de regeling deelnemende   gemeenten en of met andere
    derden overeenkomsten aan te gaan ter uitvoering van vormen van gesubsidieerde
    arbeid, scholing en of begeleiding.
