  bevoegdheden:
  - kop_artikel: Artikel 4 Bevoegdheden
    inhoud_artikel: Artikel 4 Bevoegdheden1. Aan het bestuur van het schap worden
      de bevoegdheden van regeling en bestuur van de colleges en raden van de deelnemende
      gemeenten uit de Wsw overgedragen ter verwezenlijking van de in artikel 3, eerste
      lid genoemde doelstelling.2. De deelnemers kunnen bevoegdheden van de colleges
      die het schap nodig heeft voor de uitoefening van haar taken genoemd in artikel
      3, tweede lid overdragen aan het algemeen bestuur. Overdracht van bevoegdheden
      als hiervoor bedoeld bevat een bepaling over de duur ervan en vervalt van rechtswege
      indien de regeling wordt gewijzigd.3. Voor zover geen gebruik is gemaakt van
      het eerste of tweede lid, zorgen gemeenten voor toereikende mandaten, volmachten
      en machtigingen die het schap nodig heeft voor de uitoefening van haar taken,
      genoemd in artikel 3.4. Deelnemers sluiten onverminderd het bepaalde in het
      tweede en derde lid, overeenkomsten met het schap om afspraken te maken over
      onder meer randvoorwaarden voor uitvoering van de taken.
  - kop_artikel: Artikel 17 Verdeling van de bevoegdheden
    inhoud_artikel: Artikel 17 Verdeling van de bevoegdhedenTen aanzien van de bevoegdheden
      en de verdeling van de bevoegdheden van het bestuur van het schap zijn van overeenkomstige
      toepassing de regels welke bij of krachtens de Gemeentewet, de Wsw, de Pw, de
      Wmo en de Wi zijn gesteld voor de verdeling van de bevoegdheden van de gemeenten
      over de gemeentelijke bestuursorganen, tenzij daarvan bij of krachtens de Wet
      is afgeweken.
  - kop_artikel: Artikel 18 Algemeen bestuur, afbakening en bevoegdheden
    inhoud_artikel: Artikel 18 Algemeen bestuur, afbakening en bevoegdheden1. Alle
      taken en bevoegdheden in het kader van deze regeling, die niet aan het dagelijks
      bestuur of de voorzitter zijn opgedragen, behoren aan het algemeen bestuur.2.
      Het algemeen bestuur besluit slechts tot oprichting van en de deelneming in
      stichtingen, maatschappen, vennootschappen, verenigingen, coöperaties en onderlinge
      waarborgmaatschappijen, indien dat in het bijzonder aangewezen moet worden geacht
      voor de behartiging van het daarmee te dienen belang. Het besluit wordt niet
      genomen dan nadat raden in de gelegenheid zijn gesteld hun wensen en bedenkingen
      ter kennis van het algemeen bestuur te brengen.
  - kop_artikel: Artikel 21 Dagelijks bestuur
    inhoud_artikel: Artikel 21 Dagelijks bestuurAan het dagelijks bestuur komen in
      ieder geval de dagelijkse leiding en uitvoering van zaken toe, alsmede het houden
      van toezicht op al wat het schap aangaat. Hiertoe behoort onder meer:a. Het
      voorbereiden van al hetgeen in het algemeen bestuur ter overweging en beslissing
      moet worden gebracht;b. Het uitvoeren van de besluiten van het algemeen bestuur;c.
      Het beheer der activa en passiva van het schap;d. De zorg, voor zover deze van
      het dagelijks bestuur afhangt, voor de administratieve organisatie, de financiële
      administratie en de controle op het geldelijk beheer en de boekhouding;e. Het
      besluiten om namens het schap, het dagelijks bestuur of het algemeen bestuur
      rechtsgedingen, bezwaarprocedures of administratief beroepsprocedures te voeren
      of handelingen ter voorbereiding daarop te verrichten, tenzij het algemeen bestuur,
      voor zover het algemeen bestuur aangaat, in voorkomende gevallen anders beslist;f.
      Het nemen van alle conservatoire maatregelen, zowel in als buiten rechte, en
      het doen van alles wat nodig is ter voorkoming van verjaring en verlies van
      recht en bezit;g. Het houden van toezicht op al hetgeen de uitvoering van de
      Wsw aangaat;h. Het vaststellen van regels over de ambtelijke organisatie van
      het schap;i. Het benoemen, schorsen en ontslaan van ambtenaren;j. Het besluiten
      tot privaatrechtelijke rechtshandelingen van het schap, met uitzondering van
      privaatrechtelijke rechtshandelingen als bedoeld in artikel 18, tweede lid;k.
      Het samenwerken met uitvoeringsinstanties en de Arbeidsvoorzieningsorganisaties
      als bedoeld in artikel 4 van de Wsw;l. Het verstrekken van subsidies als bedoeld
      in artikel 7 van de Wsw;m. Het aanvragen van (her) indicatiebeschikkingen als
      bedoeld in artikel 11 van de Wsw, enn. Het voorstaan van belangen van het schap.
