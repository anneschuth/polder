gr_meta:
  citeertitel: Gemeenschappelijke regeling FUMO - 2022
  doel: De FUMO is ingesteld in het gemeenschappelijk belang van de deelnemers van
    een doelmatige en doeltreffende uitvoering en handhaving van het bepaalde bij
    of krachtens de in artikel 4 bedoelde wetten, zoals bedoeld in artikel 18.21,
    lid 1, Omgevingswet, binnen het werkgebied, zoals bedoeld in artikel 18.21, lid
    3, Omgevingswet, van de veiligheidsregio Fryslân.
