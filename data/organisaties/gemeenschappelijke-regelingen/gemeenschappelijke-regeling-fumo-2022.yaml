  bevoegdheden:
  - kop_artikel: Artikel 4 Taken
    inhoud_artikel: '1. Ter behartiging van de in artikel 3 genoemde belangen heeft
      het openbaar lichaam de volgende taken:a. basistakenpakket: de taken bedoeld
      in artikel 18.22 Omgevingswet jo 13.22 Omgevings-besluit. Tot de basistaken
      behoren ook de daarmee samenhangende, adviserende en ondersteunende werkzaamheden;b.
      aanvullend takenpakket (facultatief): andere taken op het terrein van de overheidszorg
      voor de fysieke leefomgeving, als bedoeld in artikel 1.2 van de Omgevingswet,
      dan zijn opgenomen in het basistakenpakket, voor zover die op grond van een
      daartoe strekkend besluit van een deelnemer aan FUMO zijn opgedragen, waaronder
      begrepen uitvoerende, voorbereidende, adviserende en andere ondersteunende werkzaamheden,
      de uitvoering van de Wob, adviseren en ontwikkelen van strategische en operationele
      vraagstukken ten aanzien van bestuurlijke aangelegenheden die verband houden
      met de aan FUMO opge-dragen taken en het voeren van en adviseren over bestuurs-
      en civielrechtelijke procedu-res daarover.c. collectieve taken: niet aan een
      individuele deelnemer toe te rekenen andere taken dan bedoeld in onderdeel a
      en b die FUMO uitvoert in opdracht en ten behoeve van het col-lectief van de
      gezamenlijke deelnemers, waaronder in elk geval het in stand houden van een
      milieualarmnummer , zoals jaarlijks in de begroting beschreven.d. incidentele
      taken: andere taken dan bedoeld in onderdeel a en b, die op grond van een afzonderlijke
      dienstverleningsovereenkomst met een deelnemer incidenteel door FUMO worden
      uitgevoerd.2. De FUMO kan ten behoeve van andere overheden en overheidsgerelateerde
      instellingen dien-sten op het terrein van de overheidszorg voor de fysieke leefomgeving
      in de zin van artikel 1.2 Omgevingswet verrichten, indien daarom wordt verzocht
      en het dagelijks bestuur daarin bewil-ligt. Het dagelijks bestuur kan hiervoor
      nadere regels vaststellen. Het bepaalde in artikel 21, eerste lid, is van overeenkomstige
      toepassing.3. De taken als bedoeld in het eerste en tweede lid worden uitgevoerd
      met inachtneming van de regels als bedoeld in artikel 18.23 lid 1 Omgevingswet,
      alsmede de voor die taken geldende beleidskaders, beleidsregels en overige instructies.'
