gr_meta:
  citeertitel: Gemeenschappelijke regeling Omgevingsdienst Noord-Holland Noord
  doel: 1. De regeling wordt getroffen voor de uitvoering van en ondersteuning bij
    taken op het gebied van vergunningverlening, toezicht en handhaving van de fysieke
    leefomgeving.2. De taken, bedoeld in het eerste lid, betreffen in elk geval taken
    op het gebied van het omgevingsrecht in het algemeen en de Wet algemene bepalingen
    omgevingsrecht in het bijzonder, alsmede de taken op het terrein van vergunningverlening,
    toezicht en handhaving op grond van de in artikel 5.1 van de Wet algemene bepalingen
    omgevingsrecht genoemde wetten, dan wel de daarvoor in de plaats getreden wet-
    en regelgeving.
