  bevoegdheden:
  - kop_artikel: 'Artikel 8: Bevoegdheden'
    inhoud_artikel: 1. Aan het bestuur worden geen bevoegdheden overgedragen door
      de deelnemers.2. De colleges kunnen bevoegdheden mandateren aan het bestuur
      en de directeur.3. Ambtenaren in dienst van de deelnemers kunnen ondermandaat
      verlenen aan de directeur, voor zover zij hiertoe bevoegd zijn.4. Voor een geldig
      mandaat of ondermandaat als bedoeld in het tweede en derde lid is de instemming
      van het bestuur respectievelijk de directeur vereist, overeenkomstig artikel
      10:4 van de Algemene wet bestuursrecht.5. Een mandaat of ondermandaat als bedoeld
      in het tweede en derde lid wordt schriftelijk gegeven, overeenkomstig artikel
      10:5 van de Algemene wet bestuursrecht.6. Het dagelijks bestuur houdt een register
      bij van de aan het bestuur respectievelijk aan de directeur gemandateerde bevoegdheden.
