  bevoegdheden:
  - kop_artikel: Artikel 5 Mandaat collegebevoegdheden
    inhoud_artikel: 1. Het college van de Centrumgemeente wordt mandaat verleend om
      namens de colleges van de Gastgemeenten alle besluiten te nemen ter uitvoering
      van de wetgeving als genoemd in de bijlage van deze regeling.2. Het college
      van de Centrumgemeente wordt mandaat verleend om namens de colleges van de Gastgemeenten
      alle feitelijke handelingen en rechtshandelingen te verrichten ter voorbereiding
      en uitvoering van de beslissingen van de colleges van de Gastgemeenten als bedoeld
      in het eerste lid.3. Ten aanzien van de bevoegdheden die in dit artikel in mandaat
      worden opgedragen aan het college van de Centrumgemeente, kan dit college ondermandaat
      verlenen.4. Het college van de Centrumgemeente wordt tevens mandaat verleend
      om namens de colleges van de Gastgemeenten verzoeken als bedoeld in artikel
      4.1 van de Wet open overheid te behandelen en daarop te besluiten. Eventuele
      bezwaren hierover worden door de Gastgemeenten zelf behandeld.5. De Gastgemeenten
      blijven zelf verantwoordelijk voor uitvoering van artikel 3.1 en 3.3. van de
      Wet open overheid, met uitzondering van de in art. 3.3. bedoelde woo-verzoeken
      en woo-besluiten.
