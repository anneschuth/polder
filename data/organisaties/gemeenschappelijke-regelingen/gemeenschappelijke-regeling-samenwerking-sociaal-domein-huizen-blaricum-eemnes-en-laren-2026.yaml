gr_meta:
  doel: 1. De regeling wordt getroffen ter behartiging van het belang van een goede
    uitvoering van de gemeentelijke taken op het gebied van de individuele voorziening
    Sociaal Domein.2. De uitvoeringsorganisatie wordt belast met de ambtelijke uitvoering
    van alle taken in het kader van de wetten en regelingen zoals opgenomen in bijlage
    1 van deze regeling.3. De Centrumgemeente stelt tegen vergoeding van kosten volgens
    het bepaalde in artikel 10 personeel, materieel en huisvesting beschikbaar voor
    de uitvoeringsorganisatie.4. De uitvoeringsorganisatie draagt zorg voor uitvoering
    van andere dan wel nieuwe wetten, besluiten of regelingen op het gebied van individuele
    voorzieningen Sociaal Domein, waarvan de uitvoering aan gemeenten is of wordt
    opgedragen en waarvan door de gemeentebesturen is of wordt bepaald dat deze taak
    bij de Centrumgemeente is of wordt neergelegd. Bijlage 1 van deze regeling wordt
    aangepast op grond van een dergelijk besluit.
