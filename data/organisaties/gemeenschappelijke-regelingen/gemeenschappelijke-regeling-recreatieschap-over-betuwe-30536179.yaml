  bevoegdheden:
  - kop_artikel: Artikel 5 Bevoegdheden
    inhoud_artikel: 1. De bestuursorganen oefenen bevoegdheden van de regeling en
      bestuur uit die zij ter vervulling van hun taak nodig hebben, voortvloeiend
      uit:a. de Gemeentewet;b. de Wet gemeenschappelijke regelingen;c. de artikelen
      15 en 16 van de Wegenwet, voor wat betreft door het Recreatieschap aangelegde
      c.q. aan te leggen dan wel door een deelnemende gemeente in beheer en onderhoud
      aan het Recreatieschap overgedragen c.q. over te dragen recreatieve fietspaden.2.
      Voor zover uit deze regeling niet het tegendeel blijkt, is de verdeling van
      bevoegdheden tussen het algemeen bestuur, het dagelijks bestuur en de voorzitter
      gelijk aan die tussen de gemeenteraad, het college van burgemeester en wethouders
      en de burgemeester zoals die is geregeld in de Gemeentewet, onverminderd de
      mogelijkheid tot overdracht van bevoegdheden overeenkomstig de in de Gemeentewet
      gegeven regelen.
