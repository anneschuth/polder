description:
  text: Laborijn is de uitvoeringsorganisatie van de Participatiewet, de Wsw en de
    Wet inburgering voor de gemeenten Doetinchem en Aalten en de Wsw voor de gemeenten
    Montferland en Oude IJsselstreek.Wij houden ons bezig met de ontwikkeling van
    mensen. Bij Laborijn geloven wij dat meedoen gelukkig en gezond maakt. Meedoen
    op je eigen niveau, maar wel in je volle kracht. Of het nu gaat om werk bij een
    reguliere werkgever, om een leertraject, om een beschutte werkplek of om een andere
    vorm van ‘meedoen’, bijvoorbeeld met vrijwilligerswerk...wij geloven dat er geen
    betere manier is om een waardevol leven te leiden.
