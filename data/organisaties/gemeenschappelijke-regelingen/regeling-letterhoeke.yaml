gr_meta:
  citeertitel: Regeling Letterhoeke
  doel: Letterhoeke is ingesteld met het doel de belangen van de minister, het provinciaal
    bestuur en het bestuur van de stichting bij alle aangelegenheden betreffende de
    collecties en archiefbescheiden, die berusten in de rijksarchiefbewaarplaats in
    de provincie Fryslân, de Provinciale Bibliotheek te Leeuwarden en het Frysk Letterkundich
    Museum en Dokumintaasjesintrum te Leeuwarden, in gezamenlijkheid te behartigen.
    Letterhoeke stelt zich tevens ten doel het in de collecties en archieven ondergebrachte
    cultureel erfgoed op actieve wijze toegankelijk te maken en te houden voor en
    onder de aandacht te brengen van een breed publiek. Letterhoeke bevordert daarenboven
    de Friese literatuur en de verbreding daarvan door het literaire klimaat in Fryslân
    te verbreden in de meest brede zin.
