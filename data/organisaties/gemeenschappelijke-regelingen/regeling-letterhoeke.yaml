  bevoegdheden:
  - kop_artikel: Artikel 2
    inhoud_artikel: 3.Aan Letterhoeke worden de navolgende werkzaamheden, taken en
      bevoegdheden opgedragen:a. de beheerstaken, te onderscheiden in het behouden,
      bewerken en benutten van de collecties en archiefbescheiden die berusten bij
      de in het tweede lid genoemde instellingen;b. het adviseren en het doen van
      voorstellen aan de minister over de taken en bevoegdheden, die door de minister
      worden uitgevoerd ingevolge de artikelen 5, 6, 7, 8, 12, 13 en 15 eerste en
      tweede lid van de Archiefwet 1995;c. het verrichten van door de minister, respectievelijk
      provinciale of gedeputeerde staten opgedragen andere taken die verband houden
      met de behartiging van de belangen, bedoeld in het tweede lid;d. de taken en
      bevoegdheden bedoeld in de artikelen 15 derde lid, 16 tweede lid, 17, 18, 20
      en 26, tweede lid, van de Archiefwet 1995.
