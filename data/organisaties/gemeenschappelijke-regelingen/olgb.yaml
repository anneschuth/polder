names:
- value: Openbaar Lichaam Gezamenlijke Brandweer
  abbr: O.L.G.B.
  valid_from: '1900-01-01'
description:
  text: De Gezamenlijke Brandweer is een samenwerkingsverband tussen ongeveer zestig
    bedrijven in het haven- en industriegebied van Rotterdam en de Gemeente Rotterdam.
    De organisatie verzorgt in dit gebied de brandbestrijding en hulpverlening en
    heeft daarbij de verplichting tot het in stand houden van een bedrijfsbrandweer
    (gelet op artikel 3, lid 1 en artikel 31 van de Wet veiligheidsregio’s) overgenomen
    van de bedrijven, die aangesloten zijn. Dit noemen we de zogenaamde 'ledenbedrijven'.
    Zowel de bedrijven als de Gemeente Rotterdam financieren de totale preparatieve
    en repressieve brandweerzorg die de Gezamenlijke Brandweer levert.
  url: https://www.gezamenlijke-brandweer.nl/
