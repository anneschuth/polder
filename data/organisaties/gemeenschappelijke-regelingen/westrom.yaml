description:
  text: Westrom is een gemeenschappelijke regeling van 5 Midden-Limburgse gemeenten.
    Het algemeen bestuur bestaat uit 2 wethouders per deelnemende gemeenten. Het DB
    bestaat uit 5 AB-leden ieder afkomstig uit een andere gemeente plus drie onafhankelijke
    leden.De organisatie wordt geleid door een algemeen directeur. Er zijn twee operationele
    divisies plus een stafafdeling.
