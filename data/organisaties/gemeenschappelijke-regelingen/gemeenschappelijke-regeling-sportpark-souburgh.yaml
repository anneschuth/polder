  bevoegdheden:
  - kop_artikel: Artikel 10
    inhoud_artikel: 1. Aan het Algemeen Bestuur behoren alle bevoegdheden die aan
      het lichaam zijn overgedragen toe voor zover die niet bij Wet gemeenschappelijke
      regelingen of deze regeling is opgedragen aan een ander bestuursorgaan van het
      lichaam.2. Het Algemeen Bestuur is bevoegd uit eigen beweging initiatieven te
      ontwikkelen die bijdragen aan verwezenlijken van het doel en de taak van het
      lichaam en kan daarvoor, voor zover het niet op het werkterrein van de commissie
      zoals bedoeld in art. 18 en art. 19 betrekking heeft , adviezen uitbrengen.3.
      Het Algemeen Bestuur is bevoegd aan de commissie, als bedoeld in art. 18, over
      door hem aangeduide zaken te vragen of op te dragen advies uit te brengen.
  - kop_artikel: Artikel 19
    inhoud_artikel: 1. Het Algemeen Bestuur kan commissies instellen met het oog op
      de behartiging van bepaalde belangen. Het Algemeen Bestuur regelt de samenstelling
      en bevoegdheden.2. Het Algemeen Bestuur gaat niet over tot het instellen van
      een commissie dan na een verkregen verklaring van geen bezwaar van de raden
      van de deelnemende gemeenten.3. Het ontwerp van een besluit tot instelling van
      een commissie wordt met een toelichting aan de raden van de deelnemende gemeenten
      gezonden.De verordening, waarbij de commissie wordt ingesteld houdt in ieder
      geval het volgende in:a. De over te dragen bevoegdheden en de omvang daarvan
      in relatie met de bevoegdheden van het Algemeen Bestuur en het Dagelijks Bestuur;b.
      De werkwijze van de commissie;c. De openbaarheid van de vergaderingen;d. De
      voorbereiding, de uitvoering en de openbaarmaking van de besluiten van de commissie;e.
      Het toezicht van het Algemeen Bestuur en het Dagelijks Bestuur op de uitoefening
      van de bevoegdheden door de commissie;f. De verhouding van de toegekende bevoegdheden
      tot die van het Algemeen Bestuur en het Dagelijks Bestuur;g. De verantwoording
      aan het Algemeen Bestuur.
