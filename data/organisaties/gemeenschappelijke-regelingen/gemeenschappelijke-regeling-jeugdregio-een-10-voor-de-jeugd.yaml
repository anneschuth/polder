  bevoegdheden:
  - kop_artikel: Artikel 5. Bevoegdheden
    inhoud_artikel: 1. Het bestuur van het openbaar lichaam heeft verordenende en
      regelgevende bevoegdheden met betrekking tot de aangelegenheden die de bedrijfsvoering
      van het openbaar lichaam betreffen.2. De collegebevoegdheden betreffende de
      taken genoemd in Artikel 4 eerste lid, worden door de colleges gemandateerd
      aan het Dagelijks bestuur van het openbaar lichaam op basis van een door elk
      college afzonderlijk vast te stellen gelijkluidend mandaatbesluit.3. Het Dagelijks
      bestuur is bevoegd te besluiten tot het aangaan van overeenkomsten met een of
      meer, al dan niet deelnemende gemeenten en samenwerkingsverbanden met betrekking
      tot:a.eigen taken van het openbaar lichaam ofb.taken welke aan haar zijn gemandateerd4.
      Het Dagelijks bestuur is bevoegd te besluiten tot het aangaan van overeenkomsten
      met betrekking tot het uitvoeren van taken als bedoeld in Artikel 4 lid 3 van
      de regeling.5. Het Algemeen bestuur respectievelijk het Dagelijks bestuur kunnen
      afzonderlijk of samen, ieder voor zover zij bevoegd zijn, een gemeenschappelijke
      regeling, waarvan uitgezonderd het instellen van een openbaar lichaam, treffen
      ter behartiging van een of meer bepaalde belangen van het openbaar lichaam.
      Het Algemeen bestuur respectievelijk het Dagelijks bestuur gaan niet over tot
      het treffen van een gemeenschappelijke regeling dan nadat zij hierover vooraf
      de raden van de deelnemende gemeenten in de gelegenheid hebben gesteld hun zienswijzen
      kenbaar te maken.6. Het Algemeen bestuur is bevoegd te besluiten tot de oprichting
      van en de deelneming in stichtingen, maatschappen, vennootschappen, coöperaties
      en verenigingen, op voorwaarde dat de raden van de deelnemende gemeenten vooraf
      in de gelegenheid zijn gesteld hun wensen en bedenkingen met betrekking tot
      het voorgenomen besluit aan het Algemeen bestuur kenbaar te maken.
