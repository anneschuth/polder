gr_meta:
  citeertitel: Gemeenschappelijke regeling Jeugdregio Een 10 voor de Jeugd
  doel: 1. De colleges treffen deze regeling ter verbetering van de beschikbaarheid
    en kwaliteit van jeugdzorg voor de meest kwetsbare kinderen door het versterken
    van de regionale samenwerking tussen gemeenten en het beter organiseren van de
    regionale contractering en subsidiëring van regionale jeugdhulp.2. De colleges
    richten een gezamenlijke uitvoeringsorganisatie op in de vorm van een openbaar
    lichaam ter behartiging van het belang als bedoeld in het eerste lid, dragen tezamen
    zorg voor de besturing ervan en houden daarbij rekening met de bevoegdhedenverdeling
    over de gemeentelijke organen en de zelfstandigheid van ieder van de deelnemende
    gemeenten.3. Het openbaar lichaam bundelt geld en personele inzet, deels beschikbaar
    gesteld door het Rijk, om gemeentelijke taken op het gebied van de inkoop van
    regionale jeugdhulp uit te voeren, beleid voor te bereiden en samen te werken
    voor alle deelnemende gemeenten.
