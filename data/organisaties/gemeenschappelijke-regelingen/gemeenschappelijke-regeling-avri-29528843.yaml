  bevoegdheden:
  - kop_artikel: 'Artikel 21: Bevoegdheden'
    inhoud_artikel: 1. Aan het bestuur van Avri wordt overgedragen:a. de bevoegdheid
      de afvalstoffenheffing, bedoeld in artikel 15.33 van de Wet milieubeheer, te
      heffen;b. de bevoegdheid om reinigingsrechten, bedoeld in artikel 229 van de
      Gemeentewet, te heffen;c. het vaststellen van de verordeningen bedoeld in artikel
      10.23 en 15.33 van de Wet milieubeheer, end. de uitvoering van de verordeningen
      bedoeld onder a. tot en met c., waaronder ook de bevoegdheid ambtenaren aan
      te wijzen voor het heffen en invorderen van de onder a en b bedoelde belastingen
      en rechten.2. De raden of colleges kunnen bij afzonderlijk delegatiebesluit
      additionele bevoegdheden overdragen aan het algemeen bestuur, voor zover deze
      bevoegdheden binnen het belang van de regeling vallen.3. Het dagelijks bestuur
      houdt een register bij van de bevoegdheden die overeenkomstig het tweede lid
      zijn overgedragen.
