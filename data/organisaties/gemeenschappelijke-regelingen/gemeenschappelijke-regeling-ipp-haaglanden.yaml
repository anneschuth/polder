  bevoegdheden:
  - kop_artikel: 'Artikel 3: Taken en Bevoegdheden Colleges'
    inhoud_artikel: Deze regeling heeft uitsluitend betrekking op taken en bevoegdheden
      die aan colleges zijn toebedeeld.
  - kop_artikel: 'Artikel 4: Doelstelling'
    inhoud_artikel: "1.\tIPP Haaglanden heeft tot doel binnen haar werkgebied bij\
      \ te dragen aan een veilig, aantrekkelijk, gezond en duurzaam vestigingsklimaat\
      \ en betaalbare bedrijfshuisvesting ter bevordering van brede werkgelegenheid.\
      \ Dit doet zij doormiddel van het aanleggen, herstructureren en exploiteren\
      \ van bedrijventerreinen, waaronder het verrichten van alle taken die met deze\
      \ doelstelling samenhangen, daaronder begrepen het verwerven van gronden ten\
      \ behoeve van bedrijventerreinen, desnoods door middel van onteigening, het\
      \ uitgeven (in erfpacht) van deze gronden en voorts het stichten, verwerven,\
      \ herontwikkelen, vervreemden en exploiteren van bedrijfsgebouwen, alles in\
      \ de ruimste zin van het woord.2.\tOnder de taak van IPP Haaglanden is niet\
      \ begrepen de bij de deelnemende gemeenten berustende openbare taken, waaronder\
      \ de reiniging en het onderhoud van openbare wegen, het afvoeren van water en\
      \ vuilnis, de openbare verlichting, de Brandweer en het bouwtoezicht.3.\tIPP\
      \ Haaglanden zal bij de uitvoering van haar taken waar mogelijk gebruik maken\
      \ van diensten van de deelnemende gemeenten, die door de deelnemende gemeenten\
      \ tegen kostendekkend tarief worden aangeboden. Deze afgenomen diensten komen\
      \ voor rekening van het IPP Haaglanden.4.\tTen behoeve van de in het eerste\
      \ lid vermelde taken kan IPP Haaglanden onder meer besluiten tot oprichting\
      \ van en deelneming in stichtingen, maatschappen, vennootschappen, verenigingen,\
      \ coöperaties en onderlinge waarborgmaatschappijen. Het besluit wordt niet eerder\
      \ genomen dan nadat de raden van de deelnemende gemeenten een ontwerpbesluit\
      \ is toegezonden en in de gelegenheid zijn gesteld hun eventuele zienswijzen\
      \ aan te bieden aan het Algemeen Bestuur van IPP Haaglanden.5.\tIPP Haaglanden\
      \ is bevoegd tot het verrichten van diensten, voor zover deze vallen binnen\
      \ het kader van de in het eerste lid genoemde taken, voor andere dan de deelnemende\
      \ gemeenten en/of derden, met een publiekrechtelijke taak en/of bevoegdheid."
