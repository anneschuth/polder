  citeertitel: Gemeenschappelijke Regeling IPP Haaglanden
  doel: IPP Haaglanden heeft tot doel binnen haar werkgebied bij te dragen aan een
    veilig, aantrekkelijk, gezond en duurzaam vestigingsklimaat en betaalbare bedrijfshuisvesting
    ter bevordering van brede werkgelegenheid. Dit doet zij doormiddel van het aanleggen,
    herstructureren en exploiteren van bedrijventerreinen, waaronder het verrichten
    van alle taken die met deze doelstelling samenhangen, daaronder begrepen het verwerven
    van gronden ten behoeve van bedrijventerreinen, desnoods door middel van onteigening,
    het uitgeven (in erfpacht) van deze gronden en voorts het stichten, verwerven,
    herontwikkelen, vervreemden en exploiteren van bedrijfsgebouwen, alles in de ruimste
    zin van het woord.
