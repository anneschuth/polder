description:
  text: Voor onze deelnemers voeren we de belastingtaak uit. Wat betekent dat? We
    zorgen ervoor dat iedereen die belasting moet betalen (belastingplichtigen) een
    aanslagbiljet krijgt en betaalt. Ieder jaar versturen we ongeveer 400.000 aanslagbiljetten.
    We halen per jaar ruim 275 miljoen euro belastinggeld op voor onze deelnemers.
  url: https://www.bs-ob.nl/over-bsob/wat-we-doen
