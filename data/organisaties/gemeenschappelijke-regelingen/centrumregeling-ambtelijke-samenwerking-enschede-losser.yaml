  bevoegdheden:
  - kop_artikel: Artikel 5 – Bevoegdheden
    inhoud_artikel: 1. Het college van Losser kan aan het college van Enschede, of
      aan dit laatste college ondergeschikte medewerkers, bevoegdheden in mandaat
      opdragen ter verwezenlijking van de doelen, genoemd in artikel 2.2. De burgemeester
      van Losser kan aan de burgemeester van Enschede, of aan deze laatste ondergeschikte
      medewerkers, bevoegdheden in mandaat opdragen ter verwezenlijking van de doelen,
      genoemd in artikel 2.3. De bevoegdheden die krachtens deze regeling in mandaat
      worden opgedragen, worden in een mandaatregeling opgenomen. De mandaatregeling
      wordt vastgesteld en gewijzigd door eensluidende besluiten van de colleges en
      burgemeesters van de gemeenten. Artikel 4, derde lid, is van overeenkomstige
      toepassing.4. De mandaatregeling wordt op dezelfde wijze bekendgemaakt als deze
      regeling.5. Dit artikel is van overeenkomstige toepassing op het verlenen van
      een volmacht tot het verrichten van privaatrechtelijke rechtshandelingen door
      Enschede namens Losser of het verlenen van een machtiging voor het verrichten
      van feitelijke handelingen door Enschede namens Losser.6. Bij de mandaatregeling
      kan Enschede worden aangewezen als aankoopcentrale als bedoeld in artikel 1,
      aanhef en onder s, en artikel 18 van het Besluit aanbestedingsregels voor overheidsopdrachten,
      van Losser.
