  citeertitel: Gemeenschappelijke regeling ter bevordering democratische verankering
    raden en staten bij implementatie en uitvoering Nij Begun
  doel: Artikel 1 Begripsbepaling en doel1. Deze regeling heeft betrekking op de samenwerking
    tussen Provinciale Staten van Groningen en deelnemende Groningse en Noord-Drentse
    raden, te weten de gemeenten Aa en Hunze, Eemsdelta, Groningen, Het Hogeland,
    Midden-Groningen, Noordenveld, Oldambt, Pekela, Stadskanaal, Tynaarloo, Veendam,
    Westerkwartier en Westerwolde;2. De samenwerking richt zich op overleg en de advisering
    aan de raden en staten over besluitvormingsprocessen die voortkomen uit de implementatie
    en uitvoering van Nij Begun en waar opportuun in samenhang met parallelle processen
    vanuit het Nationaal Programma Groningen.
