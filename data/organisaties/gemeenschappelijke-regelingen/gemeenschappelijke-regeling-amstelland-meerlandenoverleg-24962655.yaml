  bevoegdheden:
  - inhoud_artikel: Hoofdstuk III De bevoegdheden van de bestuursorganenDe bevoegdheden
      van het plenair overlegArtikel 9Alle bevoegdheden in het kader van de Wgr en
      deze regeling, die niet zijn opgedragen aan het dagelijks bestuur of de voorzitter,
      behoren aan het plenair overleg.De bevoegdheden van dagelijks bestuurArtikel
      10Aan het dagelijks bestuur is opgedragen:a. Het voorbereiden van al hetgeen
      aan het plenair overleg ter overweging en beslissing zal worden voorgelegd;b.
      Het voorstaan van de belangen van het overlegorgaan bij andere overheden, instellingen,
      diensten of personen, waarmee contact voor het overlegorgaan van belang is;c.
      Het uitvoeren van de besluiten van het plenair overleg;d. Het houden van toezicht
      op al wat het overlegorgaan aangaat.De bevoegdheden van de voorzitterArtikel
      111. De voorzitter is zowel de voorzitter van het plenair overleg als van het
      dagelijks bestuur. Hij is belast met de leiding van de vergadering van deze
      bestuursorganen, en ondertekent de stukken die van deze bestuursorganen uitgaan.2.
      De voorzitter is belast met de uitvoering van de besluiten van de bestuursorganen
      van het overlegorgaan.3. De voorzitter vertegenwoordigt het overlegorgaan in
      rechte.
