  bevoegdheden:
  - kop_artikel: 'Artikel 6: Taken en bevoegdheden'
    inhoud_artikel: 1. De Gemeenschappelijke Gezondheidsdienst Zeeland voert alle
      taken en bevoegdheden uit die bij of krachtens de Wet publieke gezondheid en
      de Wet veiligheidsregio’s (laatstgenoemde wet voor zover in het kader van de
      geneeskundige hulpverlening) aan de raad, het college of de burgemeester zijn
      opgedragen.2. De Gemeenschappelijke Gezondheidsdienst Zeeland verleent, onverminderd
      het bepaalde in lid 1, alleen diensten aan gemeenten binnen het in artikel 2
      genoemde rechtsgebied. Met instemming van het algemeen bestuur kunnen ook diensten
      worden aangeboden buiten het in dit artikel genoemde rechtsgebied.3. De Gemeenschappelijke
      Gezondheidsdienst Zeeland kan op verzoek, indien het algemeen bestuur hiertoe
      besluit, binnen de gedelegeerde bevoegdheden, nader te omschrijven taken gaan
      uitvoeren. Een besluit hiertoe vermeldt alsdan de wijze van kostenverrekening
      en overige voorwaarden waaronder deze taken worden uitgevoerd.4. Ten behoeve
      van de uitvoering van taken ingevolge de Wet op de lijkbezorging draagt het
      college van burgemeester en wethouders van de vestigingsplaats zorg voor de
      benoeming van artsen van de dienst tot gemeentelijk lijkschouwer.5. De Gemeenschappelijke
      Gezondheidsdienst Zeeland voert de taken en bevoegdheden uit in het kader van
      de Jeugdwet ten behoeve van de gemeenten:a. welke zijn overgedragen aan het
      bestuur van het gemeenschappelijk openbaar lichaam in artikel 6a van deze regeling,
      alsmedeb. welke bij afzonderlijk eensluidend besluit van het (de) bevoegde bestuursorga(a)n(en)
      van alle gemeenten aan het bestuur van het gemeenschappelijk openbaar lichaam
      worden gemandateerd dan wel waarvoor volmacht of machtiging is verleend en door
      het algemeen bestuur zijn aanvaard.
  - kop_artikel: 'Artikel 6a: Taken en bevoegdheden in het kader van de Jeugdwet'
    inhoud_artikel: 1. Aan het bestuur van het openbaar lichaam zijn in het kader
      van de Jeugdwet als bedoeld in artikel 6, vijfde lid onder a. de volgende taken
      opgedragen en de volgende bevoegdheden overgedragen:a. het uitvoeren van taken
      uit de Jeugdwet door middel van het contracteren en subsidiëren van aanbieders
      van jeugdhulp en uitvoerders jeugdreclassering en jeugdbeschermingsmaatregelen
      in het kader van de Jeugdwet; dit omvat ook het beëindigen van deze contracten
      door opzegging of ontbinding en het terugvorderen van deze subsidies;b. voeren
      van inkoop- en aanbestedingsprocedures voor Jeugdhulp;c. onderhandelen met aanbieders
      en uitvoerders van Jeugdhulp;d. verzamelen van de benodigde gegevens ten behoeve
      van de monitoring en verantwoording;e. bewaken van de Zeeuws brede afspraken;f.
      gevraagd en ongevraagd adviseren aan de gemeenten over zaken betreffende de
      inkoop en subsidiëren van Jeugdhulp;g. voeren van de financiële administratie;h.
      contractenbeheer;i. aanspreekpunt voor aanbieders en uitvoerders van Jeugdhulp
      en gemeenten.2. Het algemeen bestuur is bevoegd tot het vaststellen van een
      subsidieverordening als bedoeld in artikel 4:23 van de Algemene wet bestuursrecht.
