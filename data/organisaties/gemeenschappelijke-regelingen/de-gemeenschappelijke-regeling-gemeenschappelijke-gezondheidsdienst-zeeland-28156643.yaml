  citeertitel: De gemeenschappelijke regeling Gemeenschappelijke Gezondheidsdienst
    Zeeland
  doel: Het openbaar lichaam is ingesteld om gezamenlijke belangen van de deelnemers
    te behartigen op het gebied van de Wet publieke gezondheid, de Wet veiligheidsregio’s,
    de Wet op de lijkbezorging, de Jeugdwet, de Wet maatschappelijke ondersteuning
    2015 en de Wet Kinderopvang.
