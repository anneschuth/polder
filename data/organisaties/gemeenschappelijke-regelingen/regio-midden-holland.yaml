description:
  text: De samenwerking in Regio Midden-Holland is een netwerksamenwerking tussen
    de vijf gemeenten en andere partijen, zoals onderwijs, bedrijfsleven, andere overheden
    en kennisinstituten. De samenwerking richt zich op de regionale ambities. Sturing
    vindt plaats op de gezamenlijke inzet van de gemeenten in het netwerk en de sturing
    van de (lichte) gemeenschappelijke regeling.De bestuurlijke overleggen/ tafels
    bestaan uit de wethouders van de deelnemende gemeenten die vanwege hun portefeuille
    betrokken zijn bij de bestuurlijke tafels. Gezamenlijk werken zij aan de regionale
    ambities en de speerpunten die zij binnen hun overleg bepalen.Het algemeen bestuur
    van Regio Midden-Holland is formeel het bestuur van de gemeenschappelijke regeling.Het
    dagelijks bestuur draagt zorg voor de dagelijkse besturing van de gemeenschappelijke
    regeling.
  url: https://www.regiomiddenholland.nl/over+2/Bestuur/default.aspx
