  bevoegdheden:
  - kop_artikel: Taken  en bevoegdheden van het openbaar lichaam Artikel 4
    inhoud_artikel: 1. Het zitting nemen in de Bestuursraad van het Provinciaal Nazorgfonds
      ter waarborging van het toezicht op de doelmatige aanwending van de voor de
      RSZ betaalde nazorggelden;2. Het nakomen van de contractuele verplichtingen
      van de gemeenschappelijke regeling inzake de eindafwerking en nazorg van de
      gesloten stortplaats Bavel-Dorst en Zevenbergen;3. Een adequaat beheer voeren
      over de voor de nazorg beschikbare fondsen/middelen.
