  bevoegdheden:
  - kop_artikel: Artikel 3 Taken van de gemeenten
    inhoud_artikel: 1. Het college van burgemeester en wethouders van de centrumgemeente
      oefent de volgende bevoegdheden uit, en draagt zorg voor het navolgende:a. De
      registratie van alle leerplichtige leerlingen, voortijdigschoolverlaters en
      RMC-doelgroep uit de deelnemende gemeenten.b. De registratie van het niet nakomen
      van de leerplicht (verzuim) door alle leerplichtige leerlingen uit de deelnemende
      gemeenten.c. Het registreren van verzoeken tot - en beroepen op extra verlof
      en vrijstelling in het kader van de Leerplichtwet 1969.d. Het opstellen van
      een statistisch jaarverslag met betrekking tot de registratie, zoals genoemd
      in lid 1 sub a,b en c van dit artikel, voor de deelnemende gemeenten.e. Het
      opstellen en aanleveren van de jaarlijkse verantwoording aan het Ministerie
      van OC&W (CFI cijfers) voor de deelnemende gemeenten.2. De colleges van burgemeester
      en wethouders van de deelnemende gemeenten dragen zorg voor het navolgende:a.
      De deelnemende gemeente is verantwoordelijk voor de autorisatie van de centrumgemeente
      als binnengemeentelijke afnemer met de daarbij behorende categorie van personen
      en de gegevensset. Zij draagt er zorg voor dat hun GBA-verordening deze autorisatie
      mogelijk maakt.b. De deelnemende gemeente is verplicht om de besturen/directies
      van de scholen van de desbetreffende gemeente te informeren aangaande de strekking
      van deze gemeenschappelijke regeling;c. De deelnemende gemeente is verplicht
      om, na daartoe gedaan verzoek van - of namens de centrumgemeente, onverwijld
      actuele gegevens uit de gemeentelijke basisadministratie persoonsgegevens van
      alle in de gemeente woonachtige jongeren in de leeftijd van 4 tot en met 23
      jaar te verstrekken aan de centrumgemeente conform artikel 4.
