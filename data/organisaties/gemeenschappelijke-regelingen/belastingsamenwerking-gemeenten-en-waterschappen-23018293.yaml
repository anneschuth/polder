  bevoegdheden:
  - inhoud_artikel: De regeling wordt getroffen in het belang van een zo doelmatig
      mogelijke uitvoering van enige wettelijke bepaling of beleidsregel betreffende
      de heffing en invordering van:a. gemeentelijke belastingen, inclusief activiteiten
      in het kader van de Wet waardering onroerende zaken, zoals dit door de deelnemende
      gemeenten na bereikte overeenstemming daarover met het algemeen bestuur expliciet
      is bepaald. Het besluit wordt bij de regeling gevoegd.b. waterschapsbelastingen
      en - als hiervan afgeleid belang - de werkzaamheden met betrekking tot de administratie
      van gegevens ten behoeve van bestuursverkiezingen in het beheersgebied van de
      deelnemers.En zie artikel 5 van de gemeenschappelijke regeling.
