gr_meta:
  citeertitel: Belastingsamenwerking Gemeenten en Waterschappen
  doel: BsGW Belastingsamenwerking Gemeenten en Waterschappen heft en int alle lokale
    belastingen namens haar deelnemers, beheert de authentieke basisregistratie WOZ
    en verzorgt het product waarderen. BsGW voert deze taken uit voor haar deelnemers,
    zijnde 29 gemeenten en 1 waterschap. Dit doet BsGW zo efficiënt mogelijk en op
    een zorgvuldige en pragmatische wijze, gericht op tijdigheid en volledigheid.
    BsGW is een uitvoerende en dienstverlenende organisatie die op basis van bedrijfseconomische
    principes wordt geleid.BsGW werkt tegen de laagst mogelijke kosten, uitgaande
    van de beste prijs/prestatie verhouding gekoppeld aan handhaving en waar mogelijk
    verhoging van het niveau van de dienstverlening. Hierbij hoort ook expliciet het
    zoveel mogelijk zoeken en daadwerkelijk aangaan van samenwerkingsverbanden met
    andere overheden wanneer deze schaalvergroting en efficiëntievoordelen opleveren.
    BsGW investeert als kwaliteitsorganisatie continu in de ontwikkeling van kennis
    en resultaatbewustzijn van zijn medewerkers; grote waarde wordt toegekend aan
    welzijn, veiligheid en gezondheid van de medewerkers in het functioneren.
