gr_meta:
  citeertitel: Gemeenschappelijke regeling RHC Drents Archief
  doel: 1. De regeling wordt getroffen met het doel de belangen van de Minister en
    het college bij alle aangelegenheden betreffende de archiefbescheiden, collecties,
    individuele documenten en dergelijke die berusten in de rijksarchiefbewaarplaats
    in de provincie en de archiefbewaarplaats van de gemeente, in gezamenlijkheid
    te behartigen.2. Het RHC Drents Archief voert bij de behartiging van de belangen,
    bedoeld in het eerste lid, het archiefbeleid en het cultuurbeleid van de Minister
    en de gemeente mede uit.3. De Minister en het college kunnen gezamenlijk algemene
    aanwijzingen geven omtrent de wijze waarop het RHC Drents Archief de belangen,
    bedoeld in het eerste lid, behartigt.
