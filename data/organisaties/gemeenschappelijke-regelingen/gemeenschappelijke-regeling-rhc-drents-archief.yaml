  bevoegdheden:
  - kop_artikel: Artikel 2b
    inhoud_artikel: Aan het bestuur van RHC Drents Archief zijn de navolgende werkzaamheden,
      taken en bevoegdheden van het college en de Minister overgedragen:a. de beheerstaken,
      te onderscheiden in het behouden, bewerken en benutten van de archiefbescheiden
      die berusten in de in artikel 2 genoemde archiefbewaarplaatsen;b. de taken en
      bevoegdheden, bedoeld in de artikelen 15, derde lid, 16, tweede lid, 17, 18,
      19, 20, 31 en 32, eerste en derde lid, van de Archiefwet 1995;c. de bevoegdheid
      van de Minister om op grond van de artikelen 25 en 26, tweede lid, van de Archiefwet
      1995 de rijksarchivaris in de provincie te benoemen, te schorsen en te ontslaan;d.
      het adviseren en het doen van voorstellen aan de Minister en het college over
      de taken en bevoegdheden, die door de Minister of het college worden uitgevoerd
      ingevolge de artikelen 5, 6, 7, 8, 12, 13, 15, eerste en tweede lid, 30 en 32,
      tweede lid, van de Archiefwet 1995, ene. het verrichten van door de Minister
      of het college opgedragen andere taken die verband houden met de behartiging
      van de belangen, bedoeld in artikel 2.
