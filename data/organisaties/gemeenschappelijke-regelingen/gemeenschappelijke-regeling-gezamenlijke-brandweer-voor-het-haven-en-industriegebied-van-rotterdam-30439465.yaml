    en industriegebied van Rotterdam
  doel: Het O.L.G.B. heeft tot doel om binnen het verzorgingsgebied van de regeling
    invulling te geven aan de volgende onderdelen van artikel 3, lid 1 van de Wet
    veiligheidsregio’s,a. het voorkomen, beperken en bestrijden van brand, het beperken
    van brandgevaar, het voorkomen en beperken van ongevallen bij brand en al hetgeen
    daarmee verband houdt;b. het beperken en bestrijden van gevaar voor mensen en
    dieren bij ongevallen anders dan bij brand;c. het voorkomen, beperken en bestrijden
    van brand en ongevallen bij de mede op basis van artikel 31 lid 1 van de Wet veiligheidsregio’s
    aangewezen inrichtingen;d. het beperken en bestrijden van gevaar voor mensen en
    dieren bij ongevallen anders dan bij brand bij de mede op basis van artikel 31
    lid 1 van de Wet veiligheidsregio's aangewezen inrichtingen;waarbij het organisatieniveau
    van de paraatheid minimaal ligt op het peil van de artikel 31-aanwijzingen van
    de Wet veiligheidsregio’s.
