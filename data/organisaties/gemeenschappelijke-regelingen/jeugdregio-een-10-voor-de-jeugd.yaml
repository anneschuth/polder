description:
  text: Gemeenschappelijke regeling Jeugdregio Een 10 voor de Jeugd  is een samenwerkingsverband
    tussen de gemeenten Asten, Deurne, Geldrop-Mierlo, Gemert-Bakel, Helmond, Laarbeek,
    Nuenen c.a., Someren, Son en Breugel, Veldhoven en Waalre op het gebied van inkoop
    van Jeugdhulp. Onze organisatie heeft als doel om de beschikbaarheid en kwaliteit
    van jeugdzorg voor de meest kwetsbare kinderen te verbeteren door het versterken
    van de regionale samenwerking tussen gemeenten en het beter organiseren van de
    regionale contractering en subsidiëring van regionale jeugdhulp. Onze organisatie
    bestaat uit een Algemeen bestuur, Dagelijks bestuur, voorzitter en de ambtelijke
    organisatie.Bestuurlijke organen:Het Algemeen bestuur is het hoogste besluitvormende
    orgaan binnen Jeugdregio Een 10 voor de Jeugd. Zij stelt beleidskaders en begrotingen
    vast en controleert de uitvoering van het beleid. Het Algemeen bestuur bestaat
    uit vertegenwoordigers van de deelnemende gemeenten; van iedere gemeente één wethouder
    sociaal domein.Het Dagelijks bestuur is verantwoordelijk voor de dagelijkse leiding
    en uitvoering van de besluiten van de regeling. Dit omvat het voorbereiden en
    uitvoeren van beleid, het beheren van financiën en het toezicht houden op de uitvoering
    van de taken. Een aantal van deze bevoegdheden zijn gemandateerd aan de Directeur.De
    voorzitter vertegenwoordigt de organisatie in en buiten rechte en zit de vergaderingen
    van het Algemeen bestuur en Dagelijks bestuur voor.Ambtelijke organisatie:Het
    openbaar lichaam heeft geen personeel in dienst. De taken van het openbaar lichaam
    worden uitgevoerd door medewerkers van de deelnemende gemeenten en/of van het
    openbaar lichaam Gemeenschappelijke regeling Peelgemeenten.Het openbaar lichaam
    voert een takenpakket uit zoals vastgelegd in de Wet verbetering beschikbaarheid
    jeugdhulp en daarop gebaseerde wet- en regelgeving met inachtneming van de regiovisie
    Een 10 voor de Jeugd die door de gemeenteraden van de deelnemende gemeenten is
    vastgesteld. In aanvulling hierop kan het openbaar lichaam ook andere taken uitvoeren
    die gerelateerd zijn aan het doel van de organisatie.
