description:
  text: 'Sinds 2004 werken de gemeenten Cranendonck, Heeze-Leende en Valkenswaard
    samen op het gebied van bedrijfsvoering en het onderdeel Werk & Inkomen. Dit samenwerkingsverband
    is genoemd naar de snelweg A2 die de 3 gemeenten met elkaar verbindt: A2-Samenwerking.Gezamenlijk
    bedienen de gemeenten ongeveer 66.000 inwoners.'
  url: https://www.a2samenwerking.nl/over-a2-samenwerking
