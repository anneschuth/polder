- value: Veiligheidsregio Amsterdam-Amstelland
  abbr: VrAA
  valid_from: '1900-01-01'
description:
  text: ‘Uw regio’ is een veiligheidsregio. Veiligheid is dus heel belangrijk voor
    ons. En uiteraard voor jou. Het lijkt bijna een vanzelfsprekend iets, veiligheid.
    Als het zo lijkt, komt dat door de sterke samenwerking binnen Veiligheidsregio
    Amsterdam-Amstelland. Continu wordt er alles aan gedaan om veiligheid te waarborgen
    of weer te verkrijgen.In tijden van crisis hoor je het woord ‘veiligheidsregio’
    wellicht vaker vallen. Dan zijn we er ook voor je, in tijden van crisis. Door
    met onze partners te zorgen voor een slagvaardige crisisbeheersing, brandweerzorg
    en geneeskundige hulpverlening. Uiteraard willen we getroffenen zo goed mogelijk
    helpen, (materiële) schade beperken en zo spoedig mogelijk terugkeren naar de
    normale situatie.Ook wanneer het rustig is, wanneer die ‘normale situatie’ er
    is, zijn we actief voor je. Continu zijn we in overleg om te anticiperen op risico’s,
    samen te leren, crises te voorkomen en ervoor te zorgen dat onze regio een veilige
    regio is.
  url: https://veiligheidsregioaa.nl/jouw-regio/
