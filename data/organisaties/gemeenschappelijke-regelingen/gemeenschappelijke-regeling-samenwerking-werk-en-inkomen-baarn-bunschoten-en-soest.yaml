  bevoegdheden:
  - kop_artikel: Artikel 4 Bevoegdheden en uitvoeringsorganisatie
    inhoud_artikel: 1. De medewerkers van de uitvoeringsorganisatie zijn in dienst
      van de gemeente Soest. De medewerkers van de uitvoeringsorganisatie verrichten
      hun werkzaamheden in Soest dan wel op locaties in Baarn en Bunschoten overeenkomstig
      gewenste dienstverlening.2. De colleges van burgemeester en wethouders van de
      deelnemende gemeenten bepalen bij mandaatbesluit welke bevoegdheden die samenhangen
      met de gemeenschappelijke taken, gemandateerd worden aan de uitvoeringsorganisatie.3.
      Het management is bevoegd om namens de afzonderlijke colleges van burgemeester
      en wethouders van de deelnemende gemeenten besluiten te nemen over met name
      genoemde zaken in het mandaatbesluit. Het management krijgt hiermee tevens de
      bevoegdheid tot het verlenen van ondermandaat.
