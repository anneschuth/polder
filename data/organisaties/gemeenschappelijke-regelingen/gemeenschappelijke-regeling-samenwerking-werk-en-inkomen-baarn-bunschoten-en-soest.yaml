  citeertitel: Gemeenschappelijke regeling samenwerking Werk en Inkomen Baarn, Bunschoten
    en Soest
  doel: 1. Het samenwerkingsverband heeft ten doel de gezamenlijke uitvoering van
    de gemeenschappelijke taken en het afstemmen van beleid ter zake van de uitvoering
    van de in deze regeling benoemde wet- en regelgeving en het bevorderen van de
    kwaliteit en continuïteit van de dienstverlening.2. Het gemeenschappelijk belang
    betreft de uitvoering van de primaire en secundaire processen van de gemeenschappelijke
    taken.
