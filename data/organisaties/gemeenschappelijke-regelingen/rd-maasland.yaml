description:
  text: 'RD Maasland zamelt afval in met een missie: zoveel mogelijk grondstoffen
    uit het afval halen, zodat deze opnieuw tot product kunnen worden verwerkt. Zo
    dragen we bij aan een circulaire economie.Wij zijn een regionaal afval inzamelbedrijf  met
    als werkgebied de gemeenten Beesel, Horst aan de Maas, Leudal, Maasgouw, Roerdalen
    en Echt-Susteren. Deze gemeenten zijn naast eigenaar tevens onze belangrijkste
    opdrachtgevers. Daarnaast voeren wij diensten uit in opdracht van particulieren
    en bedrijven. Ook beheren en exploiteren we milieuparken in Roggel en Maasbracht.
    Ons bedrijf is gevestigd in Haelen in de gemeente Leudal.'
