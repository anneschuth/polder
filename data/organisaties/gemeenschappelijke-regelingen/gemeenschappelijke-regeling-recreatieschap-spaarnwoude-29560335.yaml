  bevoegdheden:
  - inhoud_artikel: Artikel 5 Bevoegdheden1.Aan het bestuur van het recreatieschap
      worden ter behartiging van de in artikel 3 genoemde belangen en ter verwezenlijking
      van de in artikel 4 omschreven taken alle bevoegdheden toegekend dan wel overgedragen.2.Onder
      de in het eerste lid overgedragen bevoegdheden worden ten minste verstaan:a.besluiten
      tot het oprichten van en deelnemen in stichtingen, maatschappen, vennootschappen,
      verenigingen, coöperaties en onderlinge waarborgmaatschappijen, voor zover dit
      past binnen het in artikel 3 gestelde belang;b.het vaststellen van verordeningen,
      al dan niet door strafbepaling of bestuursdwang te handhaven, strekkende tot
      de uitoefening van de belangen en de taken van het recreatieschap, met in achtneming
      van het bepaalde in artikel 156, tweede en derde lid van de Gemeentewet;c.het
      heffen van leges;d.het uitoefenen van de gemeentelijke bevoegdheden, ingevolge
      artikel 430a van het Wetboek van Strafrecht;e.het uitoefenen van de bevoegdheid
      van het college van burgemeester en wethouders, als bedoeld in artikel 2.1 en
      onder e van de Wet algemene bepalingen omgevingsrecht voor wat betreft het gestelde
      in Bijlage I, onderdeel C, categorie 19, onder 19.1, onder g en ten eerste van
      het Besluit omgevingsrecht;f.het instellen van commissies als bedoeld in artikel
      25 van de Wgr.
