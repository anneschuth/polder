  bevoegdheden:
  - kop_artikel: Artikel 5. Bevoegdheden
    inhoud_artikel: 1. Aan Regio De Baronie worden uitsluitend de bevoegdheden overgedragen
      die bij of krachtens de wet zijn toegekend aan de colleges van burgemeester
      en wethouders van de deelnemende gemeenten, waaronder tevens wordt begrepen
      het verrichten van privaatrechtelijke rechtshandelingen, voor zover deze betrekking
      hebben op vervulling van de taken als bedoeld in artikel 4.2. Alle taken en
      bevoegdheden van de regeling berusten bij het algemeen bestuur, tenzij deze
      bij het dagelijks bestuur zijn neergelegd.3. De bevoegdheid tot het vaststellen
      van de begroting en de jaarrekening kannen niet worden overgedragen aan het
      dagelijks bestuur.4. Het algemeen bestuur kan besluiten tot de oprichting van
      en de deelneming in stichtingen, maatschappen, vennootschappen, verenigingen,
      coöperaties en onderlinge waarborgmaatschappijen, zulks overeenkomstig het bepaalde
      in artikel 31a van de Wgr.5. Het algemeen bestuur besluit omtrent de uitoefening
      van eventuele bevoegdheden van Regio De Baronie ten aanzien van de rechtspersonen
      waarin zij deelneemt op basis van de wet en de statuten van de betreffende rechtspersoon,
      waaronder doch niet uitsluitend bij de benoeming van bestuurders.
