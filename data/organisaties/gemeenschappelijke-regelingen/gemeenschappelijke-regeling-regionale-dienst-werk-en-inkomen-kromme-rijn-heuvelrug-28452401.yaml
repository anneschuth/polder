  bevoegdheden:
  - kop_artikel: Artikel 4. Taakstelling en bevoegdheden
    inhoud_artikel: 1. Binnen de doelstelling van het vorige artikel verricht de RDWI
      als basispakket de daarop gerichte beleids- en uitvoerende taken voor de deelnemers
      in het kader van de aan die deelnemers opgedragen of in de toekomst op te dragen
      taken zoals opgenomen in de Wet invoering Participatiewet, de Participatiewet,
      de Wet sociale werkvoorziening, de Wet Inburgering, de Wet schuldsanering natuurlijke
      personen en alle overige op voornoemde algemeen verbindende voorschriften gebaseerde
      of daarmee samenhangende regelingen.2. De raden en de colleges van burgemeester
      en wethouders dragen hun bevoegdheden op grond van die wetten en regelingen
      over aan de betreffende bestuursorganen van de RDWI.3. In het verband met de
      in het vorige lid bepaalde overdracht kunnen de deelnemers, om lokale accenten
      te kunnen aanbrengen, voorbehouden maken met betrekking tot de overdracht van
      bevoegdheden omtrent het minimabeleid en overige onderdelen uit die wetten en
      regelingen.4. De deelnemers kunnen afzonderlijk besluiten die taken en bevoegdheden
      als pluspakket op- of over te dragen aan de betreffende bestuursorganen van
      de RDWI. Over deze pluspakket-taken worden met de RDWI afzonderlijke afspraken
      voor de te verlenen diensten, prestaties en de financiering ervan gemaakt.5.
      Met betrekking tot de uitvoering van de in de leden 1 en 2 van dit artikel overgedragen
      bevoegdheden en de uitoefening van de daarop gebaseerde taken worden door de
      deelnemers periodiek beleidskaders en beleidsprioriteiten geformuleerd. Hiervan
      afgeleid worden door de deelnemers in overleg met de RDWI prestatieafspraken
      opgesteld.6. Met betrekking tot een bedrijfsmatige uitvoering van de taken,
      zoals vermeld in het eerste lid, hebben het algemeen bestuur en/of het dagelijks
      bestuur van de RDWI, ieder slechts ten aanzien van de eigen bevoegdheden, de
      bevoegdheid deel te nemen aan een of meer gemeenschappelijke regelingen op grond
      van de Wet.
