  citeertitel: gemeenschappelijke regeling Regionale Dienst Werk en Inkomen Kromme
    Rijn Heuvelrug
  doel: 1. De RDWI heeft als doel kwalitatief hoogwaardige diensten en producten aan
    te bieden aan de klanten en aan de deelnemers op de terreinen van werk, inkomen,
    sociale werkvoorziening, re-integratie, schuldhulpverlening, inburgering en overige
    daarmee verband houdende onderwerpen.2. De RDWI zorgt daarbij voor een zodanige
    effectieve en efficiënte interne organisatie, dat die de periodiek gemaakte prestatieafspraken
    kan realiseren.
