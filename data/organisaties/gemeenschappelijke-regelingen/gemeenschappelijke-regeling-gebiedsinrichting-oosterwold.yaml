  bevoegdheden:
  - kop_artikel: Artikel 3 – Doel en reikwijdte van de Regeling
    inhoud_artikel: 1. De Regeling geldt voor Oosterwold, zoals bedoeld in artikel
      1, aanhef en onder e. van de Regeling.2. De Regeling wordt door de Gemeenten
      getroffen met als doel gemeenschappelijk en gelijkelijk uitvoering te geven
      aan de ontwikkeling en inrichting van Oosterwold volgens de Intergemeentelijke
      Structuurvisie Oosterwold.3. Ter verwezenlijking van het doel worden de taken
      en handelingsbevoegdheden vastgelegd die aan de Centrumgemeente worden gemandateerd.
      Dit geschiedt voor de onderscheidenlijke taken en handelingsbevoegdheden per
      afzonderlijk mandaat-, machtiging- en/of volmachtbesluit van de gemeente Zeewolde,
      welk besluit(en) wordt toegevoegd aan de Regeling. Het aantal documenten in
      bijlage 2 bij de Regeling kan daarmee gedurende de looptijd van de Regeling
      wijzigen.4. De gemeente Almere mandateert de door de gemeente Zeewolde gemandateerde
      taken en handelingsbevoegdheden via de reguliere lijn directeur Dienst Stedelijke
      Ontwikkeling aan de Gebiedsregisseur. De programmadirecteur Almere 2.0 draagt
      zorg voor de functionele aansturing van de Gebiedsregisseur. Na overeenstemming
      tussen de Gemeenten over het verlenen en ontvangen van ieder afzonderlijk(e)
      mandaat/machtiging/volmacht, zal de Centrumgemeente inzake haar eigen grondgebied
      een gelijkluidend mandaat-, machtiging- en/of volmachtbesluit nemen ten behoeve
      van de Gebiedsregisseur via de reguliere lijn directeur Dienst Stedelijke Ontwikkeling.5.
      De Gebiedsregisseur initieert, faciliteert en coördineert –in algemene zin-
      de initiatieven in Oosterwold. In bijlage 2 zijn de taken en handelingsbevoegdheden
      van de Gebiedsregisseur nader omschreven.6. De Gebiedsregisseur heeft een eigen
      en zichtbare positionering binnen de Centrumgemeente en is primair verantwoordelijk
      voor de uitvoering van de in bijlage 2 genoemde taken. De Gebiedsregisseur wordt
      bijgestaan door de uitvoeringsorganisatie.
