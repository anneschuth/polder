description:
  text: Recreatieschap Voorne-Putten is een gemeenschappelijke regeling gebaseerd
    op de Wet Gemeenschappelijke Regelingen. Deelnemers van het recreatieschap zijn
    de gemeenten Voorne aan Zee en Nissewaard. Zij kent een Algemeen Bestuur (AB)
    en een Dagelijks Bestuur (DB).
