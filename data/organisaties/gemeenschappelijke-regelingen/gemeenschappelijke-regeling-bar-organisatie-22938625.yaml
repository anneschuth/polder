  bevoegdheden:
  - inhoud_artikel: 'Artikel 5: Algemene bevoegdheidstoedelingDe daartoe bevoegde
      bestuursorganen van de deelnemers c.q. participanten zullen algemene dan wel
      afzonderlijke delegatie- en/of mandaatbesluiten bepalen welke bevoegdheden die
      samenhangen met de taakgebieden zoals vermeld in artikel 4 van de regeling,
      dienen te worden verleend aan de overeenkomstige bestuursorganen of aan de directieraad
      van het openbaar lichaam.'
