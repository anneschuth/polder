gr_meta:
  citeertitel: Gemeenschappelijke regeling Werkvoorzieningschap Noordoost-Brabant
  doel: 'Werkvoorzieningschap Noordoost-Brabant heeft tot doel: het continueren van
    een gemeenschappelijke voorziening ter integrale uitvoering van de Wet sociale
    werkvoorziening en de daaruit voortvloeiende en daarmee verband houdende voorschriften
    en regelingen, alsmede andere vormen van gesubsidieerde arbeid.Met name wordt
    bevorderd dat inwoners uit de regio Noordoost-Brabant met een grote afstand tot
    de reguliere arbeidsmarkt, hulp wordt geboden bij het verkrijgen van betaald werk.'
