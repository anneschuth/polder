gr_meta:
  citeertitel: Gemeenschappelijke regeling Openbare Gezondheidszorg Amstelland
  doel: "Het openbaar lichaam heeft tot doel:-\thet beschermen en bevorderen van de\
    \ gezondheid van de bevolking of van specifieke groepen daarbinnen, in het rechtsgebied\
    \ van het lichaam;-\thet voorkómen en het vroegtijdig opsporen van ziekten onder\
    \ de bevolking;-\thet bevorderen van de openbare geestelijke gezondheidszorg;-\t\
    alles wat met het bovenstaande in de ruimste zin van het woord verband houdt."
