  bevoegdheden:
  - kop_artikel: 'Artikel 4: Taken'
    inhoud_artikel: 1.  Het algemeen bestuur van de Uitvoeringsorganisatie Laborijn
      heeft als taak zorg te dragen voor de uitvoering van de taken van de colleges,
      als genoemd in de volgende wetten en alle regelgeving op landelijk niveau waarmee
      nadere uitwerking wordt gegeven aan deze wetten:a. De Wet sociale werkvoorziening;b.
      De Participatiewet; met uitzondering van de verlening van bijzondere bijstand,
      tenzij deze direct verband houdt met de kosten van levensonderhoud, zoals woonkostentoeslagen
      en bovenwettelijke aanvullingen op de bijstandsnorm;c. Wet inkomensvoorziening
      oudere en gedeeltelijk arbeidsongeschikte gewezen zelfstandigen;d. Wet inkomensvoorziening
      oudere en gedeeltelijk arbeidsongeschikte werkloze werknemers;e. Artikel 1.13
      Wet kinderopvang, met uitzondering van medisch geïndiceerden;f. De Wet inburgering
      2021.2. Ter uitvoering van de taken, bedoeld in het eerste lid, dragen de colleges
      de bevoegdheden van de colleges, genoemd in de wetten, in het eerste lid onder
      a tot en met f, over aan het algemeen bestuur.3.  In afwijking van het bepaalde
      in het eerste en tweede lid, geldt dat het college van Montferland alleen de
      taken en bevoegdheden uit de Wet sociale werkvoorziening, als bedoeld in het
      eerste lid, onder a, overdraagt.4. De colleges kunnen ten aanzien van de overgedragen
      bevoegdheden, bedoeld in het tweede lid, beleidsregels geven overeenkomstig
      artikel 4:81, eerste lid, en artikel 10:16, eerste lid, van de Algemene wet
      bestuursrecht.5.  Met het oog op de uitvoering van de taken, bedoeld in het
      eerste lid, kunnen de gemeenten aan de Uitvoeringsorganisatie Laborijn opdrachten
      voor dienstverlening verlenen. Die opdrachten worden door de Uitvoeringsorganisatie
      Laborijn uitgevoerd met inzet van doelgroepen onder de Participatiewet.6.  De
      colleges kunnen ook andere taken opdragen aan het bestuur, voor zover het algemeen
      bestuur daar mee instemt met gekwalificeerde meerderheid van twee derde van
      de uitgebrachte stemmen, waarbij de leden die zijn aangewezen door de colleges
      van Aalten en Doetinchem voor het voorstel hebben gestemd.7. Gemeenten kunnen
      met de Uitvoeringsorganisatie Laborijn overeenkomsten sluiten ten aanzien van
      de taken bedoeld in het eerste, vijfde en zesde lid.8.  Het dagelijks bestuur
      stelt, gehoord hebbende het algemeen bestuur, een dienstverleningshandvest vast
      voor de taken bedoeld in het eerste, vijfde en zesde lid.9. Het dagelijks bestuur
      stelt een modelovereenkomst vast ten behoeve van de overeenkomsten bedoeld in
      het zevende lid.10. De Uitvoeringsorganisatie Laborijn kan ook diensten verlenen
      aan andere organen dan de colleges of rechtspersonen dan de gemeenten, met dien
      verstande dat de Uitvoeringsorganisatie Laborijn ten minste tachtig procent
      van zijn werkzaamheden uitsluitend ten aanzien van de gemeenten verricht. Het
      algemeen bestuur beslist met betrekking tot dienstverlening aan derden.
