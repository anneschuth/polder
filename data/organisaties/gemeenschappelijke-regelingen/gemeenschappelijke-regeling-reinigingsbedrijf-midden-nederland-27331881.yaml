  bevoegdheden:
  - kop_artikel: Bevoegdhedenverdeling  Artikel  17
    inhoud_artikel: 1. Met betrekking tot de uitoefening van de in artikel 3 en 4
      genoemde doelen en taken berust bij het dagelijks bestuur alle bevoegdheid die
      niet krachtens deze regeling aan hetalgemeen bestuur of aan de voorzitter is  opgedragen.2.
      Naast de uitoefening van taken en bevoegdheden op grond van het elders in deze
      regeling bepaalde, is het algemeen bestuur in elk geval belast met en bevoegd
      tot het:a.  opstellen van de jaarlijkse kadernota;b.  vaststellen van de meerjaren-
      en jaarlijkse beleidsplannen;c.  vaststellen en wijzigen van de begroting;d.  vaststellen
      van de jaarrekening;e.  vaststellen van de winstbesteminmg/verliesdekking;f.  vaststellen
      van de confroleverordening;g. vaststellen van het treasurystatuut;h. vaststellen
      van het dienstverleningshandvest, bedoeld in artikel 5, eerste en tweede  lid;i.
      vaststellen van de model dienstverleningsovereenkomst, bedoeld in artikel 5,derde  lid;j.
      opstellen van voorwaarden voor toetreding;k.  besluiten over toetreding en uittreding
      van (andere)  deelnemers;  enl. oprichten van, het mede oprichten van en het
      deelnemen in bedrijven.3. Voor zover de bevoegdheid in het eerste lid, onder
      k, het oprichten van en de  deememing in stichtingen, maatschappen, vennootschappen,
      verenigingen, coöperaties en onderlinge waarborgmaatschappijen behelst, besluit
      het algemeen bestuur hiertoe indien dat in het bijzonder aangewezen moet worden
      geacht voor de behartiging van het daarmee te dienen publiek belang. Het besluit
      wordt niet genomen dan nadat de raden van de deelnemende gemeenten in de gelegenheid
      zijn gesteld hun wensen en bedenkingen ter kennis van het algemeen bestuur te
      brengen. Het besluit wordt genomen  bij meerderheid van twee derde van de uitgebrachte
      stemmen.
  - kop_artikel: Artikel  18
    inhoud_artikel: 1. Het algemeen bestuur kan, naast commissies van advies, commissies
      instellen met het oog op de behartiging van bepaalde  belangen.2. De instelling
      van commissies, de regeling van haar bevoegdheden en samenstellingalsmede de
      vaststelling van andere nadere regelingen met betrekking tot het functionerenvan
      commissies, geschieden overeenkomstig het bepaalde  in artikel 24 en 25 van
      de wet.3. Het algemeen bestuur kan verordeningen vaststellen.
  - kop_artikel: Artikel  19
    inhoud_artikel: 1. Naast de uitoefening van taken en bevoegdheden op grond van
      het elders in deze regeling bepaalde, is het dagelijks bestuur onder meer belast
      met en bevoegd tot:a. dagelijkse bestuursaangelegenheden, voor zover niet bij
      of krachtens de wet of deregeling het algemeen bestuur hiermee is belast;b.
      beslissingen van het algemeen bestuur voor te bereiden en uit te voeren;c. regels
      vast te stellen over de ambtelijke organisatie van het openbaar lichaam;d. ambtenaren
      te benoemen, te schorsen en te ontslaan, dit met uitzondering van desecretaris-directeur;e.
      tot privaatrechtelijke rechtshandelingen van het openbaar lichaam te besluiten,
      metuitzondering van privaatrechtelijke rechtshandelingen als bedoeld i n artikel  17,derde  lid
      , juncto 31a van de wet;f. te besluiten namens het openbaar lichaam, het dagelijks
      bestuur of het algemeenbestuur rechtsgedingen, bezwaarprocedures of administratief
      beroepsprocedureste voeren of handelingen ter voorbereiding daarop  te verrichten,
      tenzij hetalgemeen bestuur, voor zover het het algemeen bestuur  aangaat, i
      n voorkomendegevallen anders beslist;g. het toezicht op het beheren van de financiën
      en eigendommen van het lichaam;h. het opstellen/aanpassen van een instructie
      voor de secretaris-directeur; eni. het voorstaan van de belangen van het lichaam
      bij andere overheden en andereinstellingen, diensten en personen waarmee contact
      voor het lichaam van belang is.2. Het dagelijks bestuur kan een of meer leden
      van het dagelijks bestuur machtigen totuitoefening van een of meer van zijn
      bevoegdheden, tenzij de regeling waarop debevoegdheid steunt zich daartegen
      verzet.
