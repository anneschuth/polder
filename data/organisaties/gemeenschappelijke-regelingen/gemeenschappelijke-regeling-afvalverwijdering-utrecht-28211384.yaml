    inhoud_artikel: 1. De bestuursorganen van het openbaar lichaam zijn:• het algemeen
      bestuur;• het dagelijks bestuur;• de voorzitter.2. Binnen het gebied zijn aan
      de organen van het lichaam in het kader van deze regeling opgedragen de verplichtingen
      en de bevoegdheden die zij binnen de grens van de Wet gemeenschappelijke regelingen
      kunnen hebben.
