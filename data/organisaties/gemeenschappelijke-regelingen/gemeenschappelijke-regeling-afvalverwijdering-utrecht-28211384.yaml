  citeertitel: Gemeenschappelijke regeling Afvalverwijdering Utrecht
  doel: Het openbaar lichaam heeft tot doel in het belang van de deelnemers een doelmatige
    en uit oogpunt van milieuhygiëne verantwoorde wijze van overslag, transport en
    verwerking van huishoudelijke afvalstoffen en grondstoffen en andere categorieën
    van afvalstoffen.
