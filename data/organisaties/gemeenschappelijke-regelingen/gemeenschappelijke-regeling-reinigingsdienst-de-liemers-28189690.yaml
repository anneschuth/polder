  doel: De regeling beoogt het doeltreffend en doelmatig uitvoeren of doen uitvoeren
    van de reinigingstaken van de deelnemende gemeenten, voortkomend uit of samenhangend
    met taken op het gebied van het gemeentelijke afvalbeleid, die voortvloeien uit
    de Wet milieubeheer.
