  bevoegdheden:
  - kop_artikel: Artikel 5 Samenstelling en bevoegdheden bestuur
    inhoud_artikel: 1. De colleges wijzen elk uit hun midden één lid van het bestuur
      aan en een plaatsvervangend lid.2. Het lidmaatschap van het bestuur eindigt
      van rechtswege, zodra men ophoudt lid te zijn van het college uit wiens midden
      men is aangewezen.3. Besluitvorming vindt plaats bij unanimiteit. Elk bestuurslid
      heeft één stem.4. De deelnemers dragen geen bevoegdheden over aan de bedrijfsvoeringsorganisatie.5.
      De deelnemers zorgen voor de vaststelling van toereikende mandaten, volmachten
      en machtigingen die de bedrijfsvoeringsorganisatie nodig heeft voor de uitoefening
      van zijn taken. Het bestuur houdt hier een register van bij.
