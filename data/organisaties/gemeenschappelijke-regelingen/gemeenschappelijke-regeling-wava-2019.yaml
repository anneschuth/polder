  bevoegdheden:
  - kop_artikel: Artikel 4
    inhoud_artikel: 1. Ter uitvoering van het bepaalde in de artikelen 3 en 3a dragen
      de colleges alle ter zake van de uitvoering van de Wsw aan de colleges toekomende
      bevoegdheden en verplichtingen over aan WAVA.2. Ter uitvoering van het bepaalde
      in de artikelen 3 en 3a zullen colleges taken en budget geven in het kader van
      de Participatiewet. De taken hebben betrekking op werkgeversdienstverlening,
      participatiebanen, beschut werk en re-integratie.3. Ter uitvoering van het bepaalde
      in de artikelen 3 en 3a dragen de colleges een gezamenlijke verantwoording om
      uitvoeringstaken duurzaam vast te leggen.
