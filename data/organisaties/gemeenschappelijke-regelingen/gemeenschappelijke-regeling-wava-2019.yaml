  citeertitel: Gemeenschappelijke Regeling WAVA 2019
  doel: WAVA heeft tot doel in zijn rechtsgebied de Wsw uit te voeren en daarnaast
    zo doelmatig mogelijk taken en bevoegdheden op het terrein van werkgeversdienstverlening,
    beschut werk, gesubsidieerde arbeid en arbeidsre-integratie, die voortvloeien
    uit de Participatiewet uit te voeren.
