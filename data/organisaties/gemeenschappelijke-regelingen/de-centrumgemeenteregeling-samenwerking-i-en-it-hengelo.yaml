  bevoegdheden:
  - kop_artikel: Artikel 2 Doel, taken, bevoegdheden en reikwijdte van de regeling
    inhoud_artikel: 1. De regeling heeft tot doel om de gemeenschappelijke belangen
      van de deelnemers te behartigen op het gebied van I&IT.2. De behartiging van
      de in dit artikel bedoelde belangen omvat het (ondersteunen bij het) ontwikkelen
      en voorbereiden van beleid op het gebied van I&IT alsmede het uitvoeren van
      het beheer en de advisering op het gebied van I&IT.3. De organisatie van de
      centrumgemeente voert mede namens de overige deelnemers de taken uit en oefent
      de bevoegdheden uit die noodzakelijk zijn om de in lid 1 en lid 2 beschreven
      belangen te behartigen voor zover de hiermee verband houdende en ten laste van
      de overige deelnemers komende kosten vallen binnen de daartoe door de centrumgemeente
      opgestelde begroting die onderdeel uitmaakt van de beleidsbegroting.4. De beleidsbepalende
      bevoegdheden en de bevoegdheid om de financiële kaders vast te stellen blijven
      berusten bij de afzonderlijke raden en colleges van de deelnemende gemeenten
      respectievelijk algemeen bestuur en dagelijks van het deelnemende openbaar lichaam,
      ieder voor zover het hun bevoegdheden betreft.5. Ter uitwerking van lid 3 maken
      de deelnemers binnen de kaders van deze regeling nadere afspraken over de te
      verrichten taken en uit te oefenen bevoegdheden en de daarbij behorende kwaliteitseisen.
      Deze afspraken worden opgenomen in een ICT-dienstverleningsovereenkomst. De
      deelnemers kunnen deze afspraken bij eensluidend besluit wijzigen.6. De samenwerking
      is mede gericht op:a. het standaardiseren van IT -infrastructuur en Programmatuur;b.
      het creëren en in standhouden van één technische infrastructuur van de deelnemers;
      enc. het ondersteunen van gebruikers vanuit een centrale IT -beheerorganisatie;d.
      het verlenen van diensten om het gebied van IM, waaronder in grote lijnen wordt
      verstaan het vertalen van de informatiebehoeften naar passende informatievoorzieningen.
