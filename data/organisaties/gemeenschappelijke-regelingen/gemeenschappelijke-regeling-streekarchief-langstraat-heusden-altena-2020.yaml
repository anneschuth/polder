  citeertitel: Gemeenschappelijke regeling Streekarchief Langstraat Heusden Altena
    2020
  doel: Het streekarchief heeft tot doel de zorg voor en het beheer van de krachtens
    de Archiefwet 1995 naar de archiefbewaarplaats overgebrachte archiefbescheiden;
    het toezicht op het beheer van de niet-overgebrachte archiefbescheiden van de
    gemeenten en de intergemeentelijke samenwerkingsverbanden, en dit te doen geschieden
    door of vanwege een streekarchivaris; en ten slotte het vanuit een centrale archiefbewaarplaats
    bevorderen van lokaal- en streekhistorisch onderzoek.
