  bevoegdheden:
  - kop_artikel: Artikel 7
    inhoud_artikel: Het algemeen bestuur oefent de bevoegdheden uit zoals in deze
      regeling bepaald.
  - kop_artikel: Artikel 13
    inhoud_artikel: 1. Het dagelijks bestuur oefent, tenzij in deze regeling anders
      is bepaald, de bevoegdheden uit die bij of krachtens de Archiefwet 1995 en de
      Gemeentewet zijn of worden toegekend aan de colleges van burgemeester en wethouders
      der gemeenten, voorzover die nodig zijn ter behartiging van de in artikel 3
      omschreven taak van het streekarchief.2. Het dagelijks bestuur is voorts belast
      met onder meer:a. het voorbereiden van al hetgeen aan het algemeen bestuur ter
      overwe­ging en beslissing zal worden voorgelegd;b. het uitvoeren van de besluiten
      van het algemeen bestuur;c. het beheren van de inkomsten en uitgaven van het
      streekarchief;d. de zorg, voorzover niet aan anderen opgedragen, voor de controle
      op het geldelijk beheer en de boekhouding;e. het nemen van alle conservatoire
      maatregelen, zowel in als buiten rechte en het doen van alles wat nodig is ter
      voorkoming van verjaring en verlies van recht op bezit;f. het houden van een
      voortdurend toezicht op alles wat het streekarchief aangaat.
