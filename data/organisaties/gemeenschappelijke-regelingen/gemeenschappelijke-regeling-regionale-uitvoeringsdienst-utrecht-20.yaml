  bevoegdheden:
  - kop_artikel: Artikel 20
    inhoud_artikel: Ten aanzien van bevoegdheden die deelnemers aanvullend op deze
      regeling in mandaat opdragen aan het dagelijks bestuur of de directeur van de
      Regionale uitvoeringsdienst gelden de volgende voorschriften:a. opdracht van
      taken en bevoegdheden door de deelnemer(s) aan de Regionale uitvoeringsdienst
      kan plaatsvinden op voorstel van het algemeen bestuur, het dagelijks bestuur
      of één of meer deelnemers.b. het dagelijks bestuur voert daartoe overleg met
      de deelnemers en eventueel met andere daarvoor in aanmerking komende besturen,
      instellingen, diensten en personen.c. het dagelijks bestuur werkt de beoogde
      opdracht uit en legt die vast in een conceptbesluit, voorzien van een financiële
      onderbouwing als bedoeld in de artikelen 30 en 31, en van een regeling van de
      inhoudelijke en personele gevolgen, ter vaststelling door het algemeen bestuur.
