  citeertitel: Gemeenschappelijke regeling Regionale uitvoeringsdienst Utrecht 2.0
  doel: 1. De Regionale uitvoeringsdienst behartigt, met inachtneming van hetgeen
    hierover in de regeling is bepaald, de belangen van de deelnemers tezamen en van
    iedere deelnemer afzonderlijk op het gebied van de fysieke leefomgeving, voor
    zover de bevoegdheid daartoe de deelnemer toekomt en voor zover deze aan de Regionale
    uitvoeringsdienst gemandateerd is.2. De Regionale uitvoeringsdienst draagt zorg
    voor een organisatie ter behartiging van de in het eerste lid genoemde belangen
    en van de ter uitvoering daarvan opgedragen en overeengekomen taken.
