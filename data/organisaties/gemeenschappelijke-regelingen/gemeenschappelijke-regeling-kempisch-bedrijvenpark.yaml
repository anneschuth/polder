  bevoegdheden:
  - kop_artikel: Artikel 6 Bevoegdheden
    inhoud_artikel: 1. Aan het bestuur van het Kempisch Bedrijvenpark worden ter vervulling
      van de in artikel 5 omschreven taken alle bevoegdheden van regeling en bestuur
      toegekend binnen de grens van artikel 30 van de wet, en met inachtneming van
      hetgeen in deze regeling verder is bepaald.2. Het algemeen bestuur besluit slechts
      tot de oprichting of deelneming in stichtingen, maatschappen, vennootschappen,
      verenigingen, coöperaties en onderling waarborgmaatschappijen, indien de regeling
      in deze mogelijkheid voorziet en dat in het bijzonder aangewezen moet worden
      geacht voor de behartiging van het daarmee te dienen openbaar belang.3. Het
      besluit wordt niet genomen dan nadat de raden van de deelnemende gemeenten een
      ontwerpbesluit is toegezonden en zij in de gelegenheid zijn gesteld hun wensen
      en bedenkingen ter kennis van het algemeen bestuur te brengen.
