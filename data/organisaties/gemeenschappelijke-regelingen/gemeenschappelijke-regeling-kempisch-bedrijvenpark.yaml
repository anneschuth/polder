  citeertitel: Gemeenschappelijke regeling Kempisch Bedrijvenpark
  doel: De gemeenschappelijke regeling heeft tot doel het ontwikkelen en realiseren
    van een kwalitatief hoogwaardig en uit financieel-economisch oogpunt aanvaardbaar
    bedrijvenpark gelegen binnen het rechtsgebied, binnen de door het bevoegd gezag
    te stellen ruimtelijke en andere publiekrechtelijke randvoorwaarden, en met inachtneming
    van de nader te formuleren sectorale doelstellingen en uitgangspunten.
