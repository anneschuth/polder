  doel: De Veiligheidsregio behartigt de belangen van de gemeenten op het terrein
    van de brandweerzorg, rampenbestrijding, crisisbeheersing en geneeskundige hulpverlening
    met behoud van de lokale verankering, zoals neergelegd in de Wet veiligheidsregio's.
