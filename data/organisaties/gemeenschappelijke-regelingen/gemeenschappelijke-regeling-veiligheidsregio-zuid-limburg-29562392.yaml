gr_meta:
  citeertitel: Gemeenschappelijke Regeling Veiligheidsregio Zuid-Limburg
  doel: Het doel van de gemeenschappelijke regeling Veiligheidsregio Zuid-Limburg
    is het realiseren van een efficiënte en kwalitatief hoogwaardige organisatie en
    uitvoering van de brandweer, geneeskundige hulpverlening, gemeentelijke bevolkingszorg,
    crisisbeheersing en rampenbestrijding binnen het werkgebied van de veiligheidsregio.
