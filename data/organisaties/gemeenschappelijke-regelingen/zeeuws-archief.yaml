description:
  text: Het Zeeuws Archief is het Regionaal Historisch Centrum (RHC) van Zeeland.
    Het beheert en bewaart de archieven en collecties van Zeeuwse overheden, particulieren
    en bedrijven. Daarnaast is het Zeeuws Archief specialist in digitale duurzaamheid;
    het biedt digitale opslag, authenticiteit en toegankelijkheid in het Zeeuws e-Depot.
