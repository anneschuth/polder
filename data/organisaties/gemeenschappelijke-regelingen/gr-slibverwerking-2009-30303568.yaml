  bevoegdheden:
  - kop_artikel: Artikel 4 - Taken en bevoegdheden
    inhoud_artikel: Ten behoeve van de behartiging van de in artikel 3 genoemde belangen,
      is de GR Slibverwerking belast met en bevoegd tot:1. het verwerven, houden,
      beheren en vervreemden van aandelen B in het kapitaal van HVC;2. het toetreden
      tot de Ballotageovereenkomst B met HVC;3. het garant staan voor de verplichtingen
      van HVC krachtens door HVC gesloten overeenkomsten van geldlening, conform het
      bepaalde in artikel 7 van de Ballotageovereenkomst B;4. het actief invulling
      geven aan het aandeelhouderschap in HVC door ketenontwikkelingen die in brede
      zin verband houden met slibverwerking en duurzaamheid, met de Waterschappen
      en met HVC te bespreken;5. het actief uitoefenen van het stemrecht verbonden
      aan de aandelen B in HVC;6. het (doen) ophalen bij de Waterschappen en laten
      verwerken bij HVC van het door de waterschappen geproduceerde zuiveringsslib;7.
      het jaarlijks, op basis van hoeveelheden tonnages door de GR Slibverwerking
      afgenomen zuiveringsslib, factureren van de kosten voor verwerking daarvan,
      aan de Waterschappen;8. het jaarlijks, op basis van de in artikel 24 genoemde
      verdeelsleutel, verdelen van de provisie gerelateerd aan de garantstelling;9.
      het goed uitvoering en inhoud geven aan ontwikkelingen op het gebied van duurzaamheid
      met betrekking tot de verwerking van zuiveringsslib;10. het bewaken en proactief
      invullen van de afspraken en normen op het gebied van corporate governance,
      zoals onder meer vastgelegd in de Nederlandse corporate governance code.
