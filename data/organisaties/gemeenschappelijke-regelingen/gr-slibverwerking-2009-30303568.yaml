gr_meta:
  citeertitel: GR Slibverwerking 2009
  doel: De GR Slibverwerking behartigt de belangen van de Waterschappen op het terrein
    van:1. het afzetten of doen afzetten van zuiveringsslib en/of restproducten als
    gevolg van de verwerking daarvan voor nuttig gebruik;2. het produceren van duurzame
    energie en de interne afzet daarvan;3. het transporteren of doen transporteren
    van zuiveringsslib naar verwerkingsinstallaties, stortplaatsen of andere eindbestemmingen;4.
    het gecontroleerd storten of verwerken of doen storten of doen verwerken van zuiveringsslib
    in verbrandingsinstallaties of op andere wijze;5. het afvoeren en storten of doen
    afvoeren en doen storten van asresten of andere restproducten van de verwerking
    van zuiveringsslib, voor zover geen nuttig gebruik daarvan mogelijk is.
