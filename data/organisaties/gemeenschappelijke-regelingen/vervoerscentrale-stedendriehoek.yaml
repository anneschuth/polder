description:
  text: PlusOV is de regionale vervoerscentrale van de gemeenten Apeldoorn, Brummen,
    Deventer, Epe, Hattem, Heerde, Lochem, Voorst en Zutphen. In opdracht van deze
    gemeenten vervoeren wij u, uw kind of uw cliënt graag zo prettig mogelijk.PlusOV
    vervoert mensen volgens vaste routes, op vaste dagen en tijdstippen. Denk hierbij
    aan leerlingenvervoer en vervoer naar locaties voor dagbesteding en dagbehandeling.
    Ook vervoeren we op afroep mensen die geen eigen vervoer hebben of geen gebruik
    kunnen maken van eigen vervoer of openbaar vervoer. Bijvoorbeeld omdat ze te ver
    van een bushalte afwonen of omdat er geen openbaar vervoer in de buurt is. We
    vervoeren volgens de afspraken die de 9 gemeenten hierover samen hebben gemaakt.
