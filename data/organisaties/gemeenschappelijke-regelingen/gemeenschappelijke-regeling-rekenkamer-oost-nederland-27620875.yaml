  bevoegdheden:
  - kop_artikel: Artikel 9. Privaatrechtelijke rechtshandelingen
    inhoud_artikel: 1. Gedeputeerde Staten van Gelderland dragen er zorg voor dat
      aan het bestuur de bevoegdheid wordt toegekend te besluiten tot privaatrechtelijke
      rechtshandelingen ter uitvoering van de aan de rekenkamer opgedragen taak.2.
      De Commissaris van de Koningin van Gelderland draagt er zorg voor dat aan de
      voorzitter van het bestuur de bevoegdheid wordt toegekend tot vertegenwoordiging
      bij het verrichten van privaatrechtelijke rechtshandelingen ter uitvoering van
      de aan de rekenkamer opgedragen taak.3. Het bestuur en de voorzitter kunnen
      de directeur zoals bedoeld in artikel 13, tweede lid van deze regeling, machtigen
      de in het eerste en tweede lid bedoelde bevoegdheden uit te oefenen.
