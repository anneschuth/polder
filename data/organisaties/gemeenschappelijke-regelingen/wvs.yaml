description:
  text: WVS is het werkontwikkelbedrijf van 9 West-Brabantse gemeenten. Wij geloven
    in mensen en vinden dat iedereen moet kunnen meedoen in werk en in het leven.
    Daarom bieden wij werkzoekenden met een ondersteuningsvraag in onze regio een
    duurzaam arbeidsvangnet of een stevige opstap naar passend werk.
  url: https://www.wvs.nl/
