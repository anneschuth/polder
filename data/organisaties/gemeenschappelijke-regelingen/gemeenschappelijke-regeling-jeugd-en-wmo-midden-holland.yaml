  bevoegdheden:
  - kop_artikel: Artikel 4 Taken en overdracht bevoegdheden
    inhoud_artikel: 1. De colleges dragen ter behartiging van de in artikel 3 genoemde
      belang aan de GR JW de bevoegdheden over op grond van de in artikel 1 onder
      m genoemde Wetten voor zover betrekking hebbende op de in dit artikel 4 genoemde
      taken.2. Ten aanzien van de Wmo 2015 en Jeugdwet, voor zover dit de inkoop,
      contractering, contractmanagement en subsidiering van aanbieders betreft, worden
      alle uitvoerende taken en bevoegdheden, die aan de colleges zijn toegekend,
      gedelegeerd aan het dagelijks bestuur.3. Ten aanzien van het toezicht op de
      kwaliteit en rechtmatigheid van hulp en ondersteuning op grond van de Wmo 2015
      met inbegrip van de bevoegdheden genoemd in artikel 6.1 Wmo 2015 alsmede het
      toezicht op rechtmatigheid van jeugdhulp, worden alle uitvoerende taken en bevoegdheden,
      die bij of krachtens de wetten alsmede de daarop gebaseerde algemene maatregelen
      van bestuur en uitvoeringsregelingen, aan de colleges zijn toegekend, gedelegeerd
      aan het dagelijks bestuur.4. De GR JW kan voorts:a. nadere regels en beleid
      vaststellen ten behoeve van het regionaal Zorg- en Ondersteuningsaanbod;b. uitvoering
      geven aan landelijke programma’s en het doen van aanvragen hiertoe indien deze
      programma’s binnen het doel en belang van de GR vallen of de gemeenten dit aan
      de GR verzoeken;5. Naast de in het tweede, derde lid en vierde genoemde taken
      heeft het bestuur van de GR JW de volgende taken:a. het voorbereiden, ondersteunen
      en in co-creatie opstellen van verordeningen en beleidsplannen, (boven)regionale
      visie(s), kaders voor de inkoop, beleidsregels en regels die door het college
      niet aan de GR JW zijn gedelegeerd;b. het ondersteunen en adviseren van de gemeenten
      op het gebied van data-analyse, uniforme werkwijzen, gemeentelijke toegang;c.
      het via de jeugdbeschermingstafel uitvoeren van de toegang tot Raad van de Kinderbescherming
      als bedoeld in artikel 2.4. Jeugdwet;d. het voeren van contractmanagement op
      het gebied van doelgroepenvervoer gebaseerd op de Wet maatschappelijke ondersteuning
      2015, Jeugdwet, Wet op het primair onderwijs, Wet voortgezet onderwijs, Wet
      op de expertisecentra.e. (boven-) regionale belangenvertegenwoordiging en vertegenwoordiging
      van de regio;
