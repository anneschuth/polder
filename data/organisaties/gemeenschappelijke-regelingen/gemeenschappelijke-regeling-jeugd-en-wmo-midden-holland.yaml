gr_meta:
  citeertitel: Gemeenschappelijke regeling Jeugd en Wmo Midden-Holland
  doel: 1. De GR JW heeft tot doel om een doelmatig regionaal zorg- en ondersteuningsaanbod
    voor de inwoners van Midden-Holland te organiseren en de kwaliteit, continuïteit,
    doelmatigheid en rechtmatigheid van het zorg- en ondersteuningsaanbod te waarborgen.2.
    De GR JW heeft mede tot doel de colleges te ondersteunen bij het opstellen van
    kaderstellend beleid en door middel van overleg dit beleid zo veel mogelijk op
    elkaar af te stemmen en binnen de kaders van de gemeenschappelijke regeling uitvoering
    te geven aan het door gemeenten vastgestelde beleid.
