  bevoegdheden:
  - kop_artikel: Artikel 4 Taken en bevoegdheden
    inhoud_artikel: 1. Het Servicecentrum MER verricht alle uitvoerende taken en verzorgt
      of ondersteunt het operationeel beleid van het Servicecentrum MER en/of de deelnemende
      gemeenten op de taakvelden Omgevingsdienst, Sociaal Domein en Bedrijfsvoering.2.
      Ter uitvoering mandateren de colleges van burgemeester en wethouders en de burgemeesters
      van de deelnemende gemeenten taken en bevoegdheden over aan (de bestuursorganen
      van) het Servicecentrum MER.3. Voorts is het Servicecentrum MER belast met:a.
      Het opstellen van verweerschriften tegen bezwaar- en beroepschriften. Het beslissen
      op bezwaarschriften voor zover het betrekking heeft op het werkgebied van het
      Servicecentrum MER vindt plaats door de afzonderlijke colleges van de deelnemende
      gemeenten.b. Afhandeling van klachten voor zover deze betrekking hebben op het
      Servicecentrum MER.4. De specificatie van de taken en bevoegdheden als genoemd
      in het eerste lid en de daaraan verbonden kosten per deelnemer worden in 'Uitvoeringsprogramma’s',
      tussen de deelnemende gemeente en het Dagelijks Bestuur van het Servicecentrum
      MER vastgelegd.5. Het Dagelijks Bestuur kan besluiten dat het Servicecentrum
      MER, bij samenwerkingsovereenkomst en onder door hem te stellen voorwaarden,
      één van de in het eerste lid genoemde taken verricht ten behoeve van andere
      instanties of van buiten het verzorgingsgebied van deze regeling gelegen gemeenten
      die daartoe een verzoek doen.
