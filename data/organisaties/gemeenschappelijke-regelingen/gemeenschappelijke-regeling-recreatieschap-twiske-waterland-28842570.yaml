  bevoegdheden:
  - kop_artikel: Artikel 3
    inhoud_artikel: 1. Ter verwezenlijking van de in artikel 2 genoemde doelen worden
      aan het recreatieschap de volgende taken toegekend:a. het jaarlijks opstellen
      en het aanpassen van een jaarbegroting en van een meerjarenbegroting, die geldt
      voor de periode, volgend op het jaar waarvoor de jaarbegroting geldt.b. het
      periodiek opstellen dan wel aanpassen van een beleidsplan, dat ondermeer omvat
      een prioriteiten- en investeringsschema en het opmaken en vaststellen van plannen
      voor de werken van het recreatieschap, waaronder begrepen basis- en deelplannen
      alsmede beheerplannen.c. het uitoefenen van toezicht op de naleving van bepalingen
      in wetten, reglementen en verordeningen in het gebied voor zover vermeld in
      een bijlage bij dit artikel.d. het verwerven, ruilen, bezwaren en vervreemden
      van roerende en onroerende zaken, vorderingen of persoonlijke rechten en tot
      het verhuren, verpachten of op ander wijze in gebruik geven van de eigendommen
      van het recreatieschap.e. het aangaan van geldleningen.2. Ter verwezenlijking
      van de in artikel 2 genoemde doelen worden aan het algemeen bestuur van het
      recreatieschap de volgende bevoegdheden toegekend:a. het vaststellen van verordeningen,
      op overtreding waarvan een geldboete van de tweede categorie kan worden gesteld.b.
      Het uitoefenen van de gemeentelijke bevoegdheden, ingevolge artikel 430a van
      het Wetboek van Strafrecht (ongeklede recreatie), indien en voor zover het algemeen
      bestuur heeft verklaard daartoe over te gaan.c. Het uitoefenen van de bevoegdheid
      van burgemeester en wethouders, als bedoeld in artikel 8.2, eerste lid van de
      Wet milieubeheer voor wat betreft het gestelde in bijlage I, categorie 19, sub
      g, onder 1 van het Inrichtingen- en Vergunningenbesluit Milieubeheer (gemotoriseerde
      modelvliegtuigen, -vaartuigen, -voertuigen) indien en voor zover het algemeen
      bestuur heeft verklaard daartoe over te gaan.d. Het uitoefenen van de bevoegdheid
      tot toepassing van bestuursdwang zoals bedoeld in artikel 125 van de Gemeentewet
      en artikel 122 van de Provinciewet indien en voor zover de toepassing van bestuursdwang
      dient tot handhaving van door het bestuur van het recreatieschap vastgestelde
      regels.
  - kop_artikel: Artikel 4
    inhoud_artikel: 1. Voor zover wettelijke regels zich daartegen niet verzetten
      kan het algemeen bestuur bij verordening de uitoefening van bepaald aangewezen
      bestuursbevoegdheden aan uitvoeringsorganen mandateren.2. Het algemeen bestuur
      gaat niet over tot het vaststellen van een verordening, door strafbepalingen
      of bestuursdwang te handhaven, dan na verkregen verklaring van geen bezwaar
      van de raden van elk der deelnemende gemeenten en provinciale staten. Het dagelijks
      bestuur zendt het ontwerp van die verordening aan de deelnemers. Alle deelnemers
      zenden binnen drie maanden na ontvangst van het ontwerp van die verordening
      schriftelijk bericht aan het algemeen bestuur.3. Indien de raad van een gemeente,
      op het grondgebied waarvan de verordening betrekking heeft, schriftelijk heeft
      bericht, dat naar zijn mening de verordening geheel of ten dele niet dient te
      gelden voor bepaald aangewezen gebieden van deze gemeente, worden deze gebieden
      uitgesloten van de werkingssfeer van de betreffende bepalingen van de verordening.
      Deze uitsluiting geldt slechts indien:a. een gemeentelijke verordening voorziet
      in hetzelfde onderwerp, enb. door de raad van deze gemeente voorzien is in een
      mandaatregeling met betrekking tot de voor het beheer en toezicht noodzakelijke
      bevoegdheden voor het uitvoeringsorgaan dat door het recreatieschap is belast
      met het beheer over het gebied.4. In de door het algemeen bestuur vast te stellen
      verordening als bedoeld in lid 2 wordt een eventuele uitsluiting als bedoeld
      in het derde lid, vermeld met verwijzing naar de voor deze gebieden geldende
      gemeentelijke verordening.
