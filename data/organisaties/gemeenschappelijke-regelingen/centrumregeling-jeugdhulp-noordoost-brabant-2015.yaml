  bevoegdheden:
  - kop_artikel: Artikel 6 Bevoegdheden
    inhoud_artikel: 1. De colleges geven de centrumgemeente mandaat en volmacht om
      binnen het in deze regeling vastgestelde kader, de in artikel 4 en 5 genoemde
      taken en opdracht uit te voeren, uiteraard begrensd door wetgeving, jurisprudentie
      en vooraf vastgestelde financiële kaders.2. Het college van de centrumgemeente
      kan de bevoegdheden in het eerste lid ondermandateren aan de medewerkers van
      de centrumgemeente.
