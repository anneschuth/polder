  citeertitel: Centrumregeling Jeugdhulp Noordoost Brabant 2015
  doel: De regeling is aangegaan met als doel het behartigen van de belangen van de
    gemeenten op het gebied van de doelmatige inkoop van de individuele voorzieningen
    en in ieder geval voor 2015 de flexibele jeugdhulp, volgens het systeem van bestuurlijk
    aanbesteden.
