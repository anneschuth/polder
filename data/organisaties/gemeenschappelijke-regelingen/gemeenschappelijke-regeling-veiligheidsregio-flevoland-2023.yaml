  bevoegdheden:
  - kop_artikel: Artikel 5 Taken en bevoegdheden
    inhoud_artikel: "1.\tTer behartiging van de in artikel 4 genoemde belangen worden\
      \ door de betrokken colleges van burgemeester en wethouders in ieder geval alle\
      \ taken en bevoegdheden overgedragen die bij of krachtens de Wet veiligheidsregio’s\
      \ aan de veiligheidsregio worden overgedragen.2.\tOnverminderd lid 1 voert de\
      \ veiligheidsregio voor de deelnemende gemeenten overige adviestaken uit. Deze\
      \ taken worden opgenomen in het beleidsplan als bedoeld in artikel 14 Wvr."
  - kop_artikel: Artikel 5a Bevolkingszorgtaken
    inhoud_artikel: "1.\tTen behoeve van de deelnemende gemeenten wordt een operationele\
      \ organisatie ingesteld en in stand gehouden voor de voorbereiding op en uitvoering\
      \ van de gemeenschappelijke taken ten aanzien van gemeentelijke bevolkingszorg\
      \ waaronder in ieder geval wordt verstaan de gecoördineerde inzet van daartoe\
      \ aangesteld en opgeleid personeel belast met de maatregelen en voorzieningen\
      \ die de gemeenten treffen met het oog op een ramp of crisis.2.\tHet algemeen\
      \ bestuur wijst de coördinerend functionaris bevolkingszorg, genoemd in artikel\
      \ 36 Wvr, aan op voordracht van de gemeentesecretarissen in de regio. De coördinerend\
      \ functionaris bevolkingszorg is belast met de coördinatie van de maatregelen\
      \ en voorzieningen die voor de gemeenten worden getroffen met het oog op een\
      \ ramp of crisis. Voor de uitvoering van bevolkingszorg vertegenwoordigt de\
      \ coördinerend functionaris bevolkingszorg de deelnemende gemeenten.3.\tDe coördinerend\
      \ functionaris bevolkingszorg, genoemd in dit artikel, sluit detacheringsovereenkomsten\
      \ met de gemeenten ten behoeve van het personeel dat werkzaam is voor bevolkingszorg."
