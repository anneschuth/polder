  citeertitel: Gemeenschappelijke regeling Veiligheidsregio Flevoland 2023
  doel: "De veiligheidsregio behartigt de belangen van de deelnemende gemeenten op\
    \ de volgende terreinen:a.\tde brandweerzorg;b.\tde geneeskundige hulpverlening\
    \ in het kader van rampenbestrijding en crisisbeheersing;c.\tde gemeentelijke\
    \ bevolkingszorg in het kader van rampenbestrijding en crisisbeheersing;d.\tde\
    \ rampenbestrijding en crisisbeheersing;e.\tde meldkamerfunctie ten behoeve van\
    \ de brandweertaak en ten behoeve van de rampenbestrijding, de crisisbeheersing\
    \ en de geneeskundige hulpverlening."
