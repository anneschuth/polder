  bevoegdheden:
  - kop_artikel: Artikel 4 Bevoegdheden deelnemers
    inhoud_artikel: 1. Aan het Bestuur van De Connectie worden geen bevoegdheden gedelegeerd
      door de deelnemers.2. De deelnemers kunnen ten aanzien van de bij of krachtens
      artikel 3 aan De Connectie opgedragen taken, bevoegdheden aan de leden van de
      directie van De Connectie mandateren, met de bevoegdheid tot ondermandaat.
