  bevoegdheden:
  - inhoud_artikel: Artikel 5 ‐ Bevoegdheden1. Het college van Dongen kan aan het
      college van Tilburg, of aan dit laatste college ondergeschikte medewerkers,
      bevoegdheden in mandaat opdragen ter verwezenlijking van de doelen, genoemd
      in artikel 2.2. De burgemeester van Dongen kan aan de burgemeester van Tilburg,
      of aan deze laatste ondergeschikte medewerkers, bevoegdheden in mandaat opdragen
      ter verwezenlijking van de doelen, genoemd in artikel 2.3. De bevoegdheden die
      krachtens deze regeling in mandaat worden opgedragen, worden in een mandaatregeling
      opgenomen. De mandaatregeling wordt vastgesteld en gewijzigd door eensluidende
      besluiten van de colleges en burgemeesters van de gemeenten. Artikel 4, derde
      lid, is van overeenkomstige toepassing.
