  doel: De bedrijfsvoeringsorganisatie behartigt op basis van het door de deelnemers
    vastgestelde beleid en binnen de door de deelnemers vastgestelde financiële kaders
    de gemeenschappelijke belangen van de deelnemers op het gebied van arbeidsparticipatie
    en re-integratie.
