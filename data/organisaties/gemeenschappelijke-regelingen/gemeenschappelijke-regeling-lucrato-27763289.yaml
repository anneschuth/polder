  bevoegdheden:
  - kop_artikel: Artikel 5
    inhoud_artikel: 1. De deelnemers dragen aan de bedrijfsvoeringsorganisatie en
      zijn bestuur de bevoegdheden over die nodig zijn voor de uitvoering van de taken
      genoemd in artikel 4.2. De werkzaamheden worden nader omschreven in dienstverleningsovereenkomsten,
      waarin in ieder geval prestatieafspraken zijn opgenomen.3. Het bestuur is bevoegd
      tot de oprichting van en de deelneming in stichtingen, maatschappen, vennootschappen,
      coöperaties, en onderlinge waarborgmaatschappijen indien dat in het bijzonder
      aangewezen moet worden geacht voor de behartiging van het daarmee te dienen
      openbaar belang. Voordat het besluit wordt genomen worden de raden van de deelnemende
      gemeenten in de gelegenheid gesteld om hun wensen en bedenkingen over het ontwerpbesluit
      ter kennis van het bestuur te brengen.
