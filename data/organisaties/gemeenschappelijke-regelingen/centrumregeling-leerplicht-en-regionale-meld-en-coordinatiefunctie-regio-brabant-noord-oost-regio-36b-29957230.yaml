  bevoegdheden:
  - kop_artikel: Artikel 5 Bevoegdheden
    inhoud_artikel: 1. De colleges van de gastgemeenten geven aan de centrumgemeente
      mandaat, volmacht en machtiging om binnen de kadernota zoals bedoeld in artikel
      12 van deze regeling de in artikel 4 genoemde taken uit te voeren.2. Het college
      van de centrumgemeente kan de bevoegdheden in het eerste lid ondermandateren
      aan de medewerkers van het RBL BNO, met uitzondering van de bevoegdheid tot
      het aanwijzen van ambtenaren die toezien op de naleving van de wet en het wijzigen
      van de instructie leerplichtambtenaar en RMC-functionaris.
