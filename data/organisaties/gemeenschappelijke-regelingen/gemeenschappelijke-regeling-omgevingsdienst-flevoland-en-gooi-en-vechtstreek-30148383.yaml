gr_meta:
  citeertitel: Gemeenschappelijke regeling Omgevingsdienst Flevoland & Gooi en Vechtstreek
  doel: Artikel 2. Doelstelling1. De regeling wordt getroffen om te voldoen aan de
    verplichtingen als bedoeld in artikel 18.21 van de Omgevingswet en anderszins
    om de deelnemers te ondersteunen bij taken in het kader van het omgevingsrecht.2.
    Deze regeling is opgezet door de deelnemers met als doel om een robuuste Omgevingsdienst
    te vormen ten behoeve van een adequate uitvoering van milieutaken op het gebied
    van vergunningverlening, toezicht en handhaving voor de deelnemers, met inachtneming
    van artikel 3, derde lid.3. De deelnemers kiezen voor een verbetering van de fysieke
    leefomgeving door de uitvoering van de taken onder te brengen in deze regionale
    Omgevingsdienst. De uitvoering wordt bij de Omgevingsdienst ondergebracht met
    het behoud van de eigen bevoegdheden van alle deelnemers.4. Tevens kan de Omgevingsdienst
    taken verrichten voor zover de deelnemers hiertoe mandaten of anderszins opdracht
    verlenen.
