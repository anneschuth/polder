  bevoegdheden:
  - kop_artikel: Artikel 4. Taken
    inhoud_artikel: De Omgevingsdienst kan adviserende, ondersteunende en uitvoerende
      werkzaamheden verrichten op het gebied van milieu en verzorgt de uitvoering
      van programma's en projecten voor de deelnemers, waaronder begrepen het ontwikkelen
      en handhaven van een gemeenschappelijk uitvoerend milieubeleid, het leveren
      van milieutechnische kennis, het uitvoeren van onderzoek en metingen en het
      leveren van een bijdrage aan beleidsontwikkeling.2. De Omgevingsdienst verricht
      werkzaamheden voor de colleges, voor zover daartoe opdracht of mandaat is verleend.3.
      De Omgevingsdienst verricht in elk geval werkzaamheden voor de colleges, met
      inachtneming van het door de diverse colleges vastgestelde beleid op het gebied
      van:a. de Wet milieubeheer, met uitzondering van de titels 10.4 en 10.5 en artikel
      10.63, eerste lid;b. de Wet geluidhinder;c. de Wet bodembescherming;d. de Wabo,
      voor zover deze taken en bevoegdheden uitsluitend betrekking hebben op een activiteit
      als bedoeld in artikel 2.1, eerste lid, onder e;e. het toezicht- en handhavingstaken
      bij of krachtens de onder a tot en met d genoemde wetten;f. milieu-, toezichts-
      en handhavingstaken op grond van andere wet- en regelgeving dan genoemd in onder
      a tot en met d, bij nadere regeling vastgesteld.4. De Omgevingsdienst verricht
      werkzaamheden voor Gedeputeerde Staten, voor zover daartoe opdracht of mandaat
      is verleend en met inachtneming van het door Gedeputeerde Staten vastgestelde
      beleid op het gebied van:a. de in het derde lid, onder a tot en met d genoemde
      wet- en regelgeving, voor zover Gedeputeerde Staten het bevoegd gezag zijn;b.
      de Verordening voor de fysieke leefomgeving Flevoland onderscheidenlijk de Provinciale
      Milieuverordening Noord-Holland;c. de Wet hygiëne en veiligheid badinrichtingen
      en zwemgelegenheden;d. de Waterwet;e. de Wabo;f. de Wet natuurbescherming, de
      Natuurschoonwet 1928 en de provinciale verordening bescherming landschap en
      natuur;g. de Ontgrondingenwet;h. de toezichts- en handhavingstaken bij of krachtens
      de onder a tot en met g genoemde wetten;i. milieu-, toezichts- en handhavingstaken
      op grond van andere wet- en regelgeving dan onder a tot en met f genoemd bij
      nadere regeling vastgesteld.5. De Omgevingsdienst verricht werkzaamheden ten
      behoeve van de eigen bedrijfsvoering zoals:a. het opstellen en vaststellen van
      een bedrijfsplan en beleidsplannen van de Omgevingsdienst;b. het jaarlijks vaststellen
      van een jaarverslag.6. Voor zover bij de mandaatverlening niet anders is bepaald
      kan ten aanzien van de aan de Omgevingsdienst in mandaat opgedragen taken en
      bevoegdheden ondermandaat worden verleend. Dit lid is van overeenkomstige toepassing
      op de machtiging ter verrichting van (andere) taken.7. Indien ten gevolge van
      wijziging van wettelijke regelingen ter bescherming van het milieu, de uitvoering
      van werkzaamheden als bedoeld in het tweede tot en met zesde lid, ter uitvoering
      strekken van een andere regeling dan ter uitvoering waarvan zij ten tijde van
      het van kracht worden van deze regeling strekten, dan wel indien in deze werkzaamheden
      ten gevolge van een dergelijke wijziging veranderingen optreden, blijven zij,
      voor zover hun strekking en omvang door hun wijziging niet wezenlijk veranderen,
      behoren tot de taken die in de genoemde artikelleden aan de Omgevingsdienst
      zijn gemandateerd en waartoe de Omgevingsdienst gemachtigd is.8. De Omgevingsdienst
      kan op hun verzoek aan deelnemers en derden, zijnde niet deelnemers aan deze
      regeling, adviserende, ondersteunende en uitvoerende werkzaamheden verrichten
      tegen vergoeding. Hieronder valt in elk geval ook het organiseren en verzorgen
      van opleidingen gerelateerd aan het takenpakket van de Omgevingsdienst.9. De
      totale omvang op jaarbasis van werkzaamheden als bedoeld in het achtste lid
      mag niet meer bedragen dan de grenzen bedoeld in artikel 2.24b, eerste lid,
      van de Aanbestedingswet 2012.10. De deelnemende gemeenten kunnen er voor kiezen
      om voor de ondersteuning van de rampenbestrijding en crisisbeheersing, aanvullende
      onderdelen onder te brengen bij de Omgevingsdienst, voor zover deze taken niet
      op grond van de wet reeds aan het bestuur van de Veiligheidsregio Flevoland
      onderscheidenlijk de Veiligheidsregio Gooi en Vechtstreek dan wel de GGD Flevoland
      of de GGD Gooi en Vechtstreek toekomen.
