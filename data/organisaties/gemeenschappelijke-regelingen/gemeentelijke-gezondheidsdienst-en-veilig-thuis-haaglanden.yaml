description:
  text: 'Binnen de regio Haaglanden is er een Gemeenschappelijke Regeling (GR) voor
    de uitvoering van de taken op het gebied van Publieke Gezondheid (GGD Haaglanden)
    en Huiselijk Geweld en Kindermishandeling (Veilig Thuis Haaglanden). De GR GGD
    en Veilig Thuis (VT)  Haaglanden bestaat uit de 9 regiogemeenten: Delft, Den Haag,
    Leidschendam-Voorburg, Midden-Delfland, Pijnacker-Nootdorp, Rijswijk, Wassenaar,
    Westland en Zoetermeer.Van deze gemeenten vormen de wethouders Zorg het bestuur
    van de Gemeenschappelijke Regeling. De raad van elke gemeente wijst een lid en
    een plaatsvervangend lid aan. Gezamenlijk vormen zij het Algemeen Bestuur van
    de GR GGD en Veilig Thuis Haaglanden.Het Dagelijks Bestuur bestaat uit wethouders
    van de gemeente Pijnacker-Nootdorp, Delft en Den Haag.De uitvoering van de taken
    is ondergebracht bij de uitvoeringsorganisatie GGD Haaglanden en uitvoeringsorganisatie
    Veilig Thuis Haaglanden. Deze uitvoeringsorganisaties zijn onderdeel van de dienst
    Onderwijs, Cultuur en Welzijn van de gemeente Den Haag.'
  url: https://www.ggdhaaglanden.nl/over-ggd-haaglanden/bestuur/
