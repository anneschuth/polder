gr_meta:
  citeertitel: Gemeenschappelijk regeling Groenalliantie Midden-Holland en omstreken
  doel: De regeling wordt getroffen ter behartiging van de bovengemeentelijke belangen
    inzake het beheer en de ontwikkeling van groengebieden binnen het werkgebied van
    de groenalliantie, daaronder begrepen het behoud en de versterking van de groen-
    en recreatieve verbindingen, de landschappelijke kwaliteiten van en de biodiversiteit
    binnen de groengebieden, alsmede de bevordering van de leefbaarheid en de toeristische
    aantrekkingskracht daarvan.
