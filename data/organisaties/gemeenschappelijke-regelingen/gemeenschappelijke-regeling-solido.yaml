  bevoegdheden:
  - kop_artikel: Artikel 14 Taken en bevoegdheden van het dagelijks bestuur
    inhoud_artikel: 1. De taken en bevoegdheden van het dagelijks bestuur volgen uit
      de wet, deze regeling of zijn door de deelnemers in mandaat opgedragen. Het
      dagelijks bestuur heeft de navolgende taken:a. de uitvoering van specifieke
      ondersteunende, uitvoerende en interne beleidsprocessen met betrekking tot de
      in artikel 3 genoemde taken;b. de besturing en de verantwoording van de regeling;c.
      het bevorderen en invullen van de samenwerking tussen de deelnemers;d. het leggen
      van dwarsverbanden en initiëren/uitvoeren van overkoepelende activiteiten;e.
      het vervullen van de werkgeversrol voor de Solido organisatie;f. de communicatie
      naar de stakeholders, zoals gemeenteraden, algemene besturen, colleges, dagelijkse
      besturen, provincie, maatschappelijke organisaties en ketenpartners.2. Aan het
      dagelijks bestuur worden bij deze regeling alle bevoegdheden opgedragen, die
      nodig zijn voor de uitvoering van de in het eerste lid genoemde taken.
