  bevoegdheden:
  - kop_artikel: Artikel 5 Verantwoordelijkheden
    inhoud_artikel: 5.1 In het kader van de doelstellingen heeft de Bedrijfsvoeringsorganisatie
      de volgende uitvoerende Verantwoordelijkheden:a. Aanschaf, ontwikkeling, onderhoud,
      beheer en exploitatie van data en telefonie, hardware, software, netwerk infrastructuren,
      applicaties en GEO-informatie:b. Uitvoering van de afspraken zoals opgenomen
      in de dienstverleningsovereenkomsten, andere noodzakelijke documenten, alsmede
      wettelijke taken.5.2 Het bestuur kan besluiten tot het aangaan van dienstverleningsovereenkomsten
      met niet-deelnemers.5.3 Aan de Bedrijfsvoeringsorganisatie worden voor de realisatie
      van de in artikel 4 omschreven doelstelling alle bevoegdheden van regeling en
      bestuur gemandateerd, die nodig zijn voor de uitvoering van de in lid 1 genoemde
      verantwoordelijkheden.5.4 Ondermandaat is toegestaan tenzij anders is aangegeven.5.5
      De deelnemers dragen geen bevoegdheden over aan de Bedrijfsvoeringsorganisatie.
