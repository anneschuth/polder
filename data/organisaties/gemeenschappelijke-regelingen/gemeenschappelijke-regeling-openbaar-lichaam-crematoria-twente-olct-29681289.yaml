gr_meta:
  citeertitel: Gemeenschappelijke regeling Openbaar Lichaam Crematoria Twente (OLCT)
  doel: 1. De colleges van burgemeester en wethouders van de in de considerans genoemde
    gemeenten gaan een gemeenschappelijke regeling aan tot stichting en exploitatie
    van crematoria.2. Deze regeling wordt voor onbepaalde tijd aangegaan.3. Ten behoeve
    van de realisering van het in het eerste lid genoemd gemeenschappelijk belang
    kan het algemeen bestuur genoemd in artikel 4, eerste lid, besluiten tot (het
    doen) oprichting(en) van en/of deelneming(en) in één of meer vennootschappen,
    stichtingen of andere rechtspersonen.4. De deelnemende gemeenten zullen er steeds
    zorg voor dragen dat de gemeenschappelijke regeling te allen tijde over voldoende
    middelen beschikt om aan al zijn verplichtingen jegens derden te kunnen voldoen.5.
    Indien aan het algemeen bestuur genoemd in artikel 4, 1e lid, blijkt dat een deelnemende
    gemeente weigert de uitgaven genoemd in lid 4 op de begroting te zetten, doet
    het algemeen bestuur onverwijld het aan gedeputeerde staten het verzoek over te
    gaan tot toepassing van de artikelen 194 en 195 van de Gemeentewet.
