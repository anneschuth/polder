  bevoegdheden:
  - kop_artikel: Artikel 3
    inhoud_artikel: 1. De bevoegdheden van de colleges van burgemeester en wethouders
      ten aanzien van in artikel 1, met inachtneming van het daaromtrent bepaalde
      in de Wet op de lijkbezorging, omschreven taken worden overgedragen aan de organen
      van het openbaar lichaam.2. Waar in deze regeling artikelen van de Gemeentewet
      of van enige andere wet van overeenkomstige toepassing worden verklaard, treden
      in die artikelen in plaats van gemeente, raad, colleges van burgemeester en
      wethouders en de burgemeester, onderscheidenlijk het Openbaar Lichaam Crematoria
      Twente, het algemeen bestuur, het dagelijks bestuur en de voorzitter.
