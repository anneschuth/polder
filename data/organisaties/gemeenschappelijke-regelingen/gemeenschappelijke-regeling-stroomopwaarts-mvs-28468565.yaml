  bevoegdheden:
  - kop_artikel: Artikel 4 Bevoegdheden/taken
    inhoud_artikel: 1. Het bestuur van het openbaar lichaam is gemachtigd om de bevoegdheden,
      die de deelnemers hebben op grond van de hierna genoemde wetten dan wel wetsartikelen,
      uit te voeren:a. Participatiewet;b. Wet inkomensvoorziening oudere en gedeeltelijk
      arbeidsongeschikte werkloze werknemers;c. Wet inkomensvoorziening oudere en
      gedeeltelijk arbeidsongeschikte gewezen zelfstandigen;d. Wet gemeentelijke schuldhulpverlening;e.
      Artikel 1.13 Wet kinderopvang en kwaliteitseisen peuterspeelzalen;f. Algemene
      wet bestuursrecht;g. Wet openbaarheid van bestuur;h. Verordening maatschappelijke
      Participatie Kinderen MVS;i. art. 15 lid 1 Archiefwet 1995;j. art. 8 Archiefbesluit
      1995;k. art. 9 Archiefbesluit 1995.l. Wet inburgering2.  De deelnemer kan bij
      afzonderlijk besluit, en met inachtneming van artikel 3 van deze regeling, afzonderlijk
      bevoegdheden aan het bestuur van het openbaar lichaam gemandateerd.3.  Aan het
      afzonderlijke mandaat moet vooraf toestemming door het dagelijks bestuur worden
      verleend.4. De niet mandaterende deelnemer wordt over het afzonderlijke mandaat
      geïnformeerd.5. Aan het dagelijks bestuur van het openbaar lichaam kan de bevoegdheid
      gemandateerd worden om beleidsregels vast te stellen (m.u.v. de Wet Inburgering)6.
      Aan het dagelijks bestuur van het openbaar lichaam is de bevoegdheid overgedragen
      om de Wet Sociale Werkvoorziening uit te voeren.7. Het bestuur van het openbaar
      lichaam is eveneens gemachtigd de krachtens voornoemde wetten vastgestelde verordeningen
      en regels uit te voeren.
