  doel: Doel van deze regeling is het bewerkstelligen van een kwalitatief hoogwaardige,
    effectieve en efficiënte uitvoering door de SED organisatie van de door de gemeenten
    opgedragen uitvoerende taken met het oog op een goede dienstverlening aan de inwoners
    en een krachtige ondersteuning aan de besturen van de gemeenten.
