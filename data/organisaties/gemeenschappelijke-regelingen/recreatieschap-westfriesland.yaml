description:
  text: Recreatieschap Westfriesland maakt buiten genieten van groen, natuur en landschap
    mogelijk voor de inwoners en bezoekers van de regio Westfriesland. Het Recreatieschap
    zorgt voor gevarieerd ingerichte recreatiegebieden dicht bij huis. Alle recreatiegebieden
    zijn voorzien van waterpartijen en bos. Ook zijn er gebieden met strand, zwemwater
    en horeca. Een aantal recreatiegebieden heeft plekken om honden los te laten en
    in het Streekbos is een hondenzwemstrand aangelegd. Voor fietsen, wandelen en
    varen zijn er goed onderhouden en bewegwijzerde netwerken die naadloos aansluiten
    op de netwerken in de naastgelegen regio’s.
