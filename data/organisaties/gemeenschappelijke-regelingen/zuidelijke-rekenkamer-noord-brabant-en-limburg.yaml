description:
  text: De Zuidelijke Rekenkamer is de gemeenschappelijke rekenkamer van de provincies
    Noord-Brabant en Limburg. De taak van de rekenkamer, zoals vastgelegd in de Provinciewet
    is het onderzoeken van de doelmatigheid, de doeltreffendheid en de rechtmatigheid
    van de door het provinciebestuur gevoerde beleid.
