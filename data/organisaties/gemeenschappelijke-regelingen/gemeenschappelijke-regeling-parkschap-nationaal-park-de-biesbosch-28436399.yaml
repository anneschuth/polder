  bevoegdheden:
  - kop_artikel: Artikel 4 Bevoegdheden
    inhoud_artikel: 1. Ter uitvoering van de in artikel 3 omschreven belangen en taken
      heeft het bestuur van het openbaar lichaam alle bevoegdheden van regeling en
      bestuur binnen de grenzen van de wet en de in deze regeling op- en overgedragen
      bevoegdheden en binnen de grenzen van het rechtsgebied.2. Het bestuur van het
      openbaar lichaam heeft in ieder geval de bevoegdheid tot:a. het opmaken en vaststellen
      van beleids- en inrichtingsplannen;b. het op basis van beleids- en inrichtingsplannen
      ontwerpen en ter aanvaarding aan partijen aanbieden van werk- en investeringsplannen
      met bijbehorende kostenbegrotingen;c. het voeren van overleg met betrekking
      tot maatregelen op het gebied van natuur, recreatie, het milieu, openbare orde,
      veiligheid, zedelijkheid, gezondheid en rust;d. het adviseren over en meewerken
      aan de uitvoering van bestemmingsplannen van de deelnemende gemeenten en andere
      regelingen aangaande de ruimtelijke ordening waarbij het rechtsgebied is betrokken;e.
      het verlenen van medewerking, waaronder subsidiering, bij de uitvoering van
      werken aangaande natuurbescherming, landschapsbewaring en zorg voor recreatie;f.
      het verwerven van de eigendom van, of het vestigen van andere zakelijke of persoonlijke
      rechten op daarvoor in aanmerking komende, van belang zijnde gronden, wateren
      en opstallen, voor zover dit voor de verwezenlijking van zijn doelstelling noodzakelijk
      moet worden geacht;g. het onderhouden en exploiteren van tot stand gebrachte
      of overgenomen werken en inrichtingen, verworven eigendommen en goederen;h.
      het verkrijgen van financiële middelen uit overheidsbijdragen of anderszins;i.
      het aangaan van geldleningen;j. het vaststellen van al dan niet door strafbepaling
      of bestuursdwang te handhaven verordeningen binnen het rechtsgebied;k. zorg
      te dragen voor de bestuurlijke handhaving, bedoeld onder j;l. het vaststellen
      van verordeningen tot het heffen van belastingen, als bedoeld in artikelen 222
      en 225 van de Gemeentewet binnen het rechtsgebied;m. het vestigen van een uitsluitend
      recht als bedoeld in artikel 2:24 onder a van de Aanbestedingswet 2012.
