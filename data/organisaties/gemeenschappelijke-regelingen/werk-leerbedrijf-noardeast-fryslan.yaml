description:
  text: Bij Dokwurk ondersteunen we inwoners binnen de regio Noardeast Fryslân met
    werk- enleer-/ontwikkelvraagstukken. Meedoen in de regionale arbeidsmarkt, dat
    is wat telt!We bieden interne én externe werk- en ervaringsplekken, passend bij
    ieders talent, ambitie en ontwikkelmogelijkheden. Hierbij blijven we als professionele
    partner meebewegen met de veranderende vraag- en marktomstandigheden.Als sociaal
    ontwikkelbedrijf blijven we onze leidende positie, samen met onze partners, verder
    uitbouwen met nieuwe leer-/werkconcepten, detacheringsmogelijkheden en industriële
    toepassingen. Onze oplossingen voldoen aan de criteria Duurzaam, Eigentijds en
    Effectief, vanuit het besef dat ontwikkeling een kwestie is van samenwerken en
    doen!
  url: https://www.dokwurk.nl/content/over/over-dokwurk/
