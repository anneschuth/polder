  abbr: RAZU
  valid_from: '1900-01-01'
description:
  text: 'Het Regionaal Archief Zuid-Utrecht (RAZU) is een gemeenschappelijke regeling
    (GR) van de gemeenten Bunnik, Houten, Utrechtse Heuvelrug, Rhenen, Vijfheerenlanden
    en Wijk bij Duurstede.Het RAZU heef een tweeledig doel: enerzijds het uitvoeren
    van de Archiefwet 1995, anderzijds het vervullen van de functie van regionaal
    kennis- en informatiecentrum op het gebied van de lokale en regionale geschiedenis,
    door het opbouwen en beheren van een zo breed mogelijke collectie historische
    bronnen en door te zorgen dat zoveel mogelijk mensen daarvan kunnen genieten en
    gebruik maken.De huidige GR trad op 1 januari 2020 in werking en betreft een Bedrijfsvoeringsorganisatie.
    Het heeft één directeur en een zeskoppig bestuur. Het bestuur heeft daarnaast
    een secretaris (de directeur) en een adviseur (provinciaal interbestuurlijk toezichthouder).'
