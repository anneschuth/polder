  bevoegdheden:
  - kop_artikel: Artikel 6 - Bevoegdheden
    inhoud_artikel: 1.  Aan het bestuur van de GR Bleizo worden ter vervulling van
      de in artikel 5 omschreven taken alle bevoegdheden van regeling en bestuur toegekend
      binnen de grens van artikel 30 van de Wet gemeenschappelijke regelingen en met
      inachtneming van de beperkingen daarin gesteld.2. Ten behoeve van de in artikel
      4 genoemde doelstelling kan, indien dit in het bijzonder aangewezen wordt geacht,
      het Algemeen Bestuur besluiten dat de GR Bleizo één of meer stichtingen, maatschappen,
      vennootschappen, verenigingen, coöperaties en onderlinge waarborgmaatschappijen
      opricht of daarin deelneemt.
