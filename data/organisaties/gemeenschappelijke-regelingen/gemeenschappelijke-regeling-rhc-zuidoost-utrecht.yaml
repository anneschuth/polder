  doel: Doel van het RHC Zuidoost Utrecht is het in het samenwerkingsgebied- uitvoering
    geven aan de Archiefwet; alsmede- vervullen van de functie van regionaal kennis-
    en informatiecentrum op het gebied van de lokale en regionale geschiedenis door
    het opbouwen en beheren van een zo breed mogelijke collectie (regionaal) historische
    bronnen en deze op een zo actief mogelijke wijze dienstbaar maken voor het publiek.
