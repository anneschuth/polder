gr_meta:
  citeertitel: Gemeenschappelijke Regeling Regio Gooi en Vechtstreek
  doel: Doel van deze regeling is de samenwerking tussen de gemeenten zodanig vorm
    te geven dat de voor een gezamenlijke aanpak relevante taakstellingen en doelen
    voor de komende jaren kunnen worden aangepakt in een daarop toegesneden besturingsvorm
    onder regie van de deelnemende gemeenten en onder waarborging van betrokkenheid
    van gemeenteraden bij de regionale samenwerking.
