  bevoegdheden:
  - kop_artikel: Artikel 7 Bevoegdheden Regio
    inhoud_artikel: 1. Ten behoeve van de uitvoering van hoofdstuk 10 van de Wet milieubeheer
      wordt aan het algemeen bestuur van de Regio overgedragen de bevoegdheid tot
      het vaststellen van de afvalstoffenverordening als bedoeld in artikel 10.23
      van de Wet milieubeheer.2. Ten behoeve van de uitvoering van artikel 5 van de
      Wet publieke gezondheid wordt aan het dagelijks bestuur van de Regio overgedragen
      de bevoegdheid tot verwerking van persoonsgegevens als bedoeld in artikel 5
      lid 3 van de Wet publieke gezondheid.3. Ten behoeve van de uitvoering van de
      taken vermeld in artikel 5 lid 5(leerplicht c.a.) wordt aan het algemeen bestuur
      de bevoegdheid tot daden van regeling en bestuur overgedragen.4. Ten behoeve
      van de uitvoering van de taken vermeld in artikel 5 lid 5 worden aan het dagelijks
      bestuur de navolgende bevoegdheden overgedragen:a. de bevoegdheden die in de
      Leerplichtwet 1969, de Wet op het voortgezet onderwijs, de Wet educatie en beroepsonderwijs
      en de Wet op de expertisecentra worden toegekend aan het college van burgemeester
      en wethouders;b. de bevoegdheid om bestuursdwang als bedoeld in artikel 125
      tweede lid Gemeentewet toe te passen indien dit dient tot handhaving van de
      regels van de Leerplichtwet 1969.5. Ten behoeve van de uitvoering van de taken
      vermeld in artikel 5 lid 6 en lid 7 wordt aan het dagelijks bestuur overgedragen
      de bevoegdheid tot verwerking van persoonsgegevens.6. Bij het uitoefenen van
      de onder 1 vermelde bevoegdheden worden de bij en krachtens de geldende wetgeving
      ter zake gestelde regels in acht genomen.
