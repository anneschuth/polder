  bevoegdheden:
  - kop_artikel: Artikel 4 Teams
    inhoud_artikel: 4.1 De deelnemende gemeenten werken samen in:a. De uitvoeringb.
      Het beleid4.2 De deelnemende gemeenten worden belast met de uitvoering van de
      taken zoals genoemd in artikel 2.4.3 Gemeente Katwijk en de ISD zijn zelf verantwoordelijk
      voor de formatie in de eigen uitvoeringsteams en werken samen op de eerdergenoemde
      punten.4.4 Gemeente Katwijk, Noordwijk en de combinatie Hillegom, Lisse en Telingen
      samen, leveren ieder 1 fte aan het beleidsteam.4.5 Beleidsmedewerkers van deelnemende
      gemeenten zijn gemandateerd, beschikken over volmacht of machtiging. Zij dragen
      daarbij zorg voor afstemming en overleg binnen de subregio, voor besluiten die
      financiële gevolgen of belangrijke inhoudelijke gevolgen hebben voor de gemeenten.
      Dit geldt eveneens voor een terugkoppeling naar aanleiding van genomen besluiten,
      gevoerde gesprekken of ontvangen rapportages.4.6 De deelnemende gemeenten en
      diensten blijven als werkgever verantwoordelijk voor het uitoefenen van goed
      werkgeverschap. De medewerkers blijven in dienst van de gemeenten waar zij bij
      aanvang van de samenwerking in dienst zijn.
