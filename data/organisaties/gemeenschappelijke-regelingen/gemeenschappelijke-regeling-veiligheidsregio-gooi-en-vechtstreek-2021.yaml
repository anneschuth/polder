  bevoegdheden:
  - kop_artikel: Artikel 5 Taken en bevoegdheden
    inhoud_artikel: 'Aan de veiligheidsregio worden de volgende taken en bevoegdheden
      overgedragen.A. Algemeen1. het inventariseren van risico’s van branden, rampen
      en crises;2. het adviseren van het bevoegd gezag over risico’s van branden,
      rampen en crises in de bij of krachtens de wet aangewezen gevallen alsmede in
      de gevallen die in het beleidsplan als bedoeld in artikel 7 zijn bepaald;3.
      het adviseren van het college van burgemeester en wethouders van de aan deze
      regeling deelnemende gemeenten over de brandweerzorg, waartoe behoort: het voorkomen,
      beperken en bestrijden van brand, het beperken van brandgevaar, het voorkomen
      en beperken van ongevallen bij brand en al hetgeen daarmee verband houdt; alsmede
      het beperken en bestrijden van gevaar voor mensen en dieren bij ongevallen anders
      dan bij brand.4. het voorbereiden op de bestrijding van branden en het organiseren
      van de rampenbestrijding en de crisisbeheersing;5. het aanschaffen en beheren
      van gemeenschappelijk materieel;6. het inrichten en in stand houden van de informatievoorziening
      binnen de diensten van de veiligheidsregio en tussen deze diensten en de andere
      diensten en organisaties die betrokken zijn bij de in dit artikel onder 1d,
      2, 3, 4 en 5 genoemde taken.B. Brandweer1. Het instellen en in stand houden
      van de Brandweer Gooi en Vechtstreek die in ieder geval de volgende taken uitvoert;a.
      het voorkomen, beperken en bestrijden van brand;b. het beperken en bestrijden
      van gevaar voor mensen en dieren bij ongevallen anders dan bij brand;c. het
      waarschuwen van de bevolking;d. het verkennen van gevaarlijke stoffen en het
      verrichten van ontsmetting;e. het adviseren van andere overheden en organisaties
      op het gebied van de brandpreventie, brandbestrijding en het voorkomen, beperken
      en bestrijden van ongevallen met gevaarlijke stoffen;f. taken in het kader van
      de rampenbestrijding en de crisisbeheersing.C. Geneeskundige hulpverleningsorganisatie
      in de regio (GHOR)1. het instellen en in stand houden van de GHOR Gooi en Vechtstreek
      die in ieder geval de volgende taken uitvoert;2. de coördinatie, aansturing
      en regie van de geneeskundige hulpverlening in het kader van de rampenbestrijding
      en de crisisbeheersing door daartoe aangesteld personeel, als onderdeel van
      een gecoördineerde inzet van diensten en organisaties van verschillende disciplines,
      door tussenkomst van een meldkamer;3. de advisering van andere overheden en
      organisaties op dat gebied;4. de dienstverleningstaak van de GHOR is ondergebracht
      bij de Gemeentelijke Gezondheidsdienst(GGD) en als zodanig opgenomen in de gemeenschappelijke
      regeling Regio Gooi en Vechtstreek.D. Meldkamer1. het, gezamenlijk met de algemeen
      besturen van de veiligheidsregio’s in het werkgebied van de meldkamer, bedoeld
      in artikel 25a, tweede lid van de politiewet 2012, zorg dragen voor het op die
      meldkamer uitvoeren van de meldkamerfunctie, bedoeld in artikel 25b, eerste
      lid, van de Politiewet 2012, ten behoeve van de brandweertaak en ten behoeve
      van de rampenbestrijding, de crisisbeheersing en de geneeskundige hulpverlening;2.
      het met de algemeen besturen van de veiligheidsregio’s in het werkgebied van
      de meldkamer sluiten van een convenant, dat in ieder geval afspraken bevat over
      de uitvoering van de meldkamerfunctie, bedoeld onder a.;3. het met betrekking
      tot de voorbereiding op en het daadwerkelijk optreden bij ongevallen, rampen
      en crises eventueel en al dan niet met de algemeen besturen van de veiligheidsregio’s
      in het werkgebied van de meldkamer stellen van eisen aan de uitvoering van de
      meldkamerfunctie door de Regionale Ambulancevoorziening.E. Bevolkingszorg1.
      het instellen en in stand houden van een operationele organisatie voor de uitvoering
      van de gemeenschappelijke taken ten aanzien van de bevolkingszorg waaronder
      in ieder geval wordt verstaan de gecoördineerde inzet van daartoe aangesteld
      en opgeleid (inter)regionaal personeel belast met de maatregelen en voorzieningen
      die de gemeenten treffen met het oog op een ramp of crisis;2. de coördinerend
      functionaris bevolkingszorg als bedoeld in artikel 27 lid 5 van deze regeling
      sluit detacheringsovereenkomsten met de gemeenten ten behoeve van het personeel
      dat werkzaam is voor bevolkingszorg.'
  - kop_artikel: Artikel 10 Overige bevoegdheden
    inhoud_artikel: Het algemeen bestuur van de veiligheidsregio is bevoegd ter uitvoering
      van de taken en bevoegdheden die bij wet zijn opgedragen of die krachtens deze
      regeling aan de veiligheidsregio zijn overgedragen, tot het heffen en innen
      van retributies en/of leges met betrekking tot aan de veiligheidsregio overgedragen
      brandweertaken op basis van een daartoe door het algemeen bestuur vast testellen
      verordening.
