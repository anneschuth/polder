description:
  text: De gemeenschappelijke regeling West-Brabants Archief bewaart en beheert zowel
    de papieren als digitale archieven van de aangesloten gemeenten Bergen op Zoom,
    Etten-Leur, Halderberge, Moerdijk, Roosendaal, Rucphen, Steenbergen, Woensdrecht
    en Zundert. Die gemeenten kunnen steeds een beroep doen op de expertise van onze
    medewerkers op het gebied van hedendaags informatiemanagement. Voor bezoekers
    is het West-Brabants Archief hét informatiecentrum voor de geschiedenis van West-Brabant.
    Online en in de studiezaal kunnen zij een rijke collectie van overheidsarchieven,
    privé-archieven, boeken en afbeeldingen raadplegen.
