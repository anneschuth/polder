  bevoegdheden:
  - kop_artikel: Taken en bevoegdheden Artikel 4
    inhoud_artikel: 1. De behartiging van de in artikel 3 bedoelde belangen omvat
      meer algemeen:a. de mogelijkheid tot coördinatie, planning, uitvoering, advies
      en overleg met betrekking tot genoemde beleidsterreinen evenals vertegenwoordiging
      en lobbyactiviteiten;b. het bevorderen van verdere bestuurlijke samenwerking.2.
      De behartiging van de belangen genoemd in artikel 3, tweede lid, omvat daarnaast
      nog de volgende taken:a. het bepalen van de inzet vanuit de gemeenschappelijke
      regeling bij de totstandkoming van de ambities en agenda van het triple helix
      overleg in het West-Brabantse economische ontwikkelsysteem;b. het bepalen van
      de opgaven voor de gezamenlijke gemeenten zoals die voortvloeien uit de triple
      helix geformuleerde doelen;c. het bepalen van eventuele overige strategische
      doelen van de West-Brabantse samenwerking op het gebied van de economische structuurversterking;d.
      het opstellen van een uitvoeringsprogramma met (meerjarige) doorvertaling van
      de bekostiging van geformuleerde actieprogramma’s in de begroting.e. het borgen
      van een integrale benadering van vraagstukken, waar aangewezen door afstemming
      tussen de vier pijlers Economie, Arbeidsmarkt, Mobiliteit en Ruimte;f. het beslissen
      over aanvragen voor bijdragen uit door het algemeen bestuur ingestelde fondsen.3.
      De belangen als bedoeld in artikel 3, tweede lid, kunnen als facultatieve taak
      uitgevoerd worden.4. De belangen als bedoeld in artikel 3, derde lid, kunnen
      als collectieve of facultatieve taak uitgevoerd worden.5. Van een collectieve
      taak is sprake als 2/3 van de deelnemende gemeenten, vertegenwoordigende 2/3
      van het aantal inwoners, die taak aan de gemeenschappelijke regeling hebben
      opgedragen. De kosten van die collectieve taak komen ten laste van alle deelnemende
      gemeenten.6. Besluiten als bedoeld in het vorige lid worden door het algemeen
      bestuur zo spoedig mogelijk bij aanvang van de nieuwe bestuursperiode genomen.
      De besluiten gelden voor de lopende bestuursperiode.7. Van een facultatieve
      taak is sprake als deelnemende gemeenten een taak aan RWB opdragen en het algemeen
      bestuur die taak aanvaardt. De kosten daarvan komen voor rekening van de gemeenten
      die de taak aan RWB hebben opgedragen.8. Naast het bepaalde in de vorige leden
      kan het openbaar lichaam van een of meer deelnemende gemeenten en in samenhang
      daarmee van andere gemeenten en/of organisaties, opdrachten aannemen om diensten
      uit te voeren of uitvoeringstaken te verrichten.9. Deelnemende gemeenten kunnen
      bevoegdheden overdragen aan het algemeen bestuur van het openbaar lichaam. Dit
      kan alleen nadat met het openbaar lichaam overeenstemming is bereikt over deze
      overdracht.10. Het algemeen bestuur kan besluiten om voor ondersteunende processen,
      als bedoeld in artikel 8, derde lid, Wgr, deel te nemen in andere rechtspersonen,
      maar wel onder de voorwaarde dat de raden van de deelnemende gemeenten vooraf
      in de gelegenheid zijn gesteld hun zienswijze over het voorgenomen besluit daartoe
      aan het algemeen bestuur kenbaar te maken.11. Het algemeen bestuur is bevoegd
      tot de oprichting van en de deelneming in stichtingen, maatschappen, vennootschappen,
      verenigingen, coöperaties en onderlinge waarborgmaatschappijen, indien dit in
      het bijzonder aangewezen moet worden geacht voor de behartiging van het daarmee
      te dienen openbaar belang. Het besluit wordt niet genomen dan nadat de raden
      van de deelnemende gemeenten een ontwerpbesluit is toegezonden en in de gelegenheid
      zijn gesteld hun wensen en bedenkingen ter kennis van het algemeen bestuur te
      brengen.
