gr_meta:
  citeertitel: Gemeenschappelijke Regeling Regio West‐Brabant
  doel: 1. De regeling heeft tot doel de gemeenschappelijke belangen van de deelnemende
    gemeenten te behartigen, primair ten behoeve van de economisch ruimtelijke structuurversterking
    van West‐Brabant.2. Onder deze belangen vallen in elk geval:• Economie;• Arbeidsmarkt;3.
    Daarnaast heeft de regeling tot doel om andere belangen van deelnemende gemeenten
    te behartigen met inachtneming van het bepaalde in artikel 4.
