    staten en het stichtingsbestuur te behartigen met betrekking tot de collecties
    en archiefbescheiden die berusten in de rijksarchiefbewaarplaats in de provincie,
    de collectie van de voormalige Provinciale en Buma Bibliotheek en de tot 2002
    onder het beheer van de stichting berustende collecties van de stichting
