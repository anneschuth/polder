  bevoegdheden:
  - kop_artikel: Artikel 2b
    inhoud_artikel: 1. Het bestuur van Tresoar voert voor minister de navolgende werkzaamheden,
      taken en bevoegdheden uit:a. de beheerstaken, te onderscheiden in het behouden,
      bewerken en benutten van de archiefbescheiden die berusten in de rijksarchiefbewaarplaatsb.
      de taken en bevoegdheden, bedoeld in de artikelen 15, derde lid, 16, tweede
      lid, 17, 18, 19 en 20, van de Archiefwet 1995;c. de bevoegdheid van de minister
      om op grond van de artikelen 25 en 26, tweede lid, van de Archiefwet 1995 de
      rijksarchivaris in de provincie te benoemen, te schorsen en te ontslaan;2. het
      adviseren en het doen van voorstellen aan de minister over de taken en bevoegdheden,
      die door de minister of gedeputeerde staten worden uitgevoerd ingevolge de artikelen
      5, 6, 7, 8, 12, 13 en 15, eerste en tweede lid, van de Archiefwet 1995.3. Het
      bestuur van Tresoar voert voor gedeputeerde staten de volgende taken uit:a.
      het beheer, de uitbreiding en het publiek toegankelijk maken van de collecties
      van de voormalige Provinciale en Buma Bibliotheek, enb. het bevorderen van de
      Friese literatuur en de ontwikkeling ervan door het Friese literaire klimaat
      te verbreden in de meest ruime zin.4. Het bestuur van Tresoar voert voor het
      stichtingsbestuur de volgende taken uit:het beheer, de uitbreiding en het publiek
      toegankelijk maken van de collecties van de stichting.5. Aan het bestuur van
      Tresoar kunnen door de minister, gedeputeerde staten en de stichting andere
      taken die verband houden met de behartiging van de belangen, bedoeld in artikel
      2, worden opgedragen.6. De taken als bedoeld in het eerste, tweede en derde
      lid worden uitgevoerd met inachtneming van de door of ten behoeve van de minister,
      de provincie en de stichting vastgestelde beleidskaders, beleidsregels en overige
      instructies.
