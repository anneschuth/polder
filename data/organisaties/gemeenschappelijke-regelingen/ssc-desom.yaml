description:
  text: 'SSC DeSom is een ICT-samenwerkingsverband van en voor lokale overheden in
    West-Friesland.Naast functioneel beheer, technisch applicatiebeheer en werkplekbeheer,
    bieden wij:- continuïteit in de dienstverlening aan onze deelnemers en daarmee
    aan burgers en bedrijven;- informatiebeveiliging: door de toenemende digitalisering
    is het zorgvuldig omgaan met de informatie en gegevens van burgers en organisaties
    voor gemeenten van groot belang;- technisch telefoonbeheer: de zes gemeenten en
    WerkSaam maken gebruik van dezelfde telefooncentrale. DeSom verzorgt het technisch
    beheer van deze telefooncentrale;- participatie in en vormgeving van grote ICT-projecten;-
    hoogwaardig advies op het gebied van ICT;- de coördinatie en het verzorgen van
    aanbestedingen van de ICT-inkoop;- het beheer en onderhoud van de ICT-infrastructuur.'
