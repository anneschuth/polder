description:
  text: Omnibuzz vervoert klanten met een Wmo-indicatie. Omnibuzz zorgt voor het vervoer,
    de vervoerspas, het goed functioneren van de taxipoints en de afhandeling van
    eventuele klachten. Daarnaast controleert Omnibuzz de uitvoering van het vervoer
    voor 30 gemeenten in Limburg.Omnibuzz is een gemeenschappelijke regeling van 30
    Limburgse gemeenten en draagt zorg voor een goede uitvoering van het Wmo-vervoer.
    De missie van Omnibuzz is:Goed, veilig, betrouwbaar en betaalbaar doelgroepenvervoer
    voor nu en laterOmnibuzz zorgt dat klanten (ook diegenen die daarbij ondersteuning
    nodig hebben) optimaal kunnen reizen en kunnen blijven deelnemen aan maatschappelijke
    activiteiten. Wij werken voortdurend aan kwaliteitsverbeteringen en beheersbaarheid
    van vervoer.Het efficiënter organiseren van vervoer is duurzaam omdat minder voertuigen
    nodig zijn. Dit zorgt er tevens voor dat vervoer binnen de gemeentelijke begrotingen
    mogelijk blijft en gemeenten dit aan hun burgers kunnen blijven aanbieden. Daarnaast
    zet Omnibuzz in op het bevorderen van zelfredzaamheid. Dit betekent dat klanten
    zo veel mogelijk gebruik maken van algemeen toegankelijke voorzieningen, zoals
    het openbaar vervoer. De intentie is deelname aan de samenleving in brede zin
    te bevorderen, ook door Social Return On Investment.De gemeentelijke aansturing:GemeentenAlgemeen
    bestuurDagelijks bestuurCoördinatorenoverleg (voorbereiding algemeen bestuur)Commissie
    van Advies (voorbereiding dagelijks bestuur)Infobijeenkomsten Gemeentelijke organenDe
    werkorganisatie valt onder het bestuur. De directeur staat aan het hoofd van de
    werkorganisatie.Onder de directeur vallen:StafOndernemingsraad (OR)Functionaris
    gegevensbeschermingAfdeling uitvoeringAfdeling bedrijfsvoering.De staf bestaat
    uit:ProjectadviseursCentraal meldpuntklachtenHuman resourcesManagementondersteuningCommunicatiePrivacy
    officerPreventiemedewerkerDe afdeling bedrijfsvoering bestaat uit:Manager bedrijfsvoeringFinanciële
    administratieKlantenserviceICTAdviseur finance en controlDe afdeling uitvoering
    bestaat uit:Manager uitvoeringRelatiebeheer vervoerdersCallcenter ritaannameDe
    vervoerders vallen onder relatiebeheer vervoerders.De directeur en de managers
    van de afdelingen uitvoering en bedrijfsvoering vormen samen het MT.
