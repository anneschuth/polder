  bevoegdheden:
  - kop_artikel: Artikel 3.1
    inhoud_artikel: Aan het recreatieschap worden ter behartiging van de in artikel
      3 genoemde belangen/doelen en ter verwezenlijking van de in artikel 4 omschreven
      taken de volgende bevoegdheden toegekend:a. besluiten tot het oprichten van
      en deelnemen in rechtspersonen, voor zover dit past binnen het in artikel 3
      gestelde belang;b. besluiten tot het aangaan van overeenkomsten als bedoeld
      in artikel 4, tweede lid.c. besluiten tot het aangaan van overeenkomsten met
      derden, niet zijnde deelnemers aan de regeling, tot het verrichten van adviserende,
      ondersteunde en uitvoerende werkzaamheden op het gebied van natuur en recreatie,
      voor zover dit past binnen de in artikel 3 gestelde belangen/doelen.d. het vaststellen
      van verordeningen, al dan niet door strafbepaling of bestuursdwang te handhaven,
      strekkende tot de uitoefening van de belangen en de taken van het recreatieschap,
      met in achtneming van het bepaalde in artikel 156, tweede en derde lid van de
      Gemeentewet en artikel 152, tweede en derde lid van de Provinciewet;e. het vaststellen
      van een legesverordening;f. het uitoefenen van de gemeentelijke bevoegdheden,
      ingevolge artikel 430a van hetWetboek van Strafrecht;g. het uitoefenen van de
      bevoegdheid van het college van burgemeester en wethouders, als bedoeld in artikel
      2.1 en onder e van de Wet algemene bepalingen omgevingsrecht voor wat betreft
      het gestelde in Bijlage I, onderdeel C, categorie 19, onder 19.1, onder g en
      ten eerste van het Besluit omgevingsrecht.h. het sluiten van een overeenkomst
      met een uitvoeringsorganisatie ter uitvoering van taken die op grond van deze
      regeling aan het openbaar lichaam zijn opgedragen.
