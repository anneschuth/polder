  bevoegdheden:
  - kop_artikel: Artikel 4 Het belang en de bevoegdheden
    inhoud_artikel: 4.1 Doel van de samenwerking is het gezamenlijk behartigen en
      bevorderen van (de samenhang) binnen de publieke gezondheidzorg, ten behoeve
      van de gezondheid van de bevolking in het samenwerkingsgebied. Dit betreft de
      volgende belangen:a. het beschermen en bevorderen van de gezondheid van de bevolking
      of van specifieke groepen daarbinnen, in het rechtsgebied van het lichaam;b.
      het (doen) organiseren van preventieve zorg aan de bevolking;c. het voorkomen
      van vroegtijdig opsporen van ziekten onder de bevolking;d. alles wat met het
      bovenstaande in de ruimste zin van het woord verband houdt.4.2 Het openbaar
      lichaam is bevoegd tot:a. het oprichten en instandhouden van een doelmatig georganiseerde
      GGD, als bedoeld in de Wpg;b. het opstellen van een ( deel van het) crisisplan
      in het kader van een infectiecrisis welke gezamenlijk met het bestuur van de
      veiligheidsregio dient te worden vastgesteld;c. de geneeskundige hulpverlening
      bij ongevallen en rampen, met inachtneming van het bepaalde in de gemeenschappelijke
      regeling "Geneeskundige hulpverleningsorganisatie in de regio";d. het uitvoeren
      van taken voortkomend uit andere wetgeving.4.3 Het algemeen bestuur kan besluiten
      of en in hoeverre wijziging (daaronder ook begrepen toevoeging van nieuwe en
      afstoting van bestaande taken) aangebracht wordt in het takenpakket, binnen
      het kader als bedoeld in artikel 4.1. Dit besluit wordt niet genomen als niet
      omtrent de verwachte eenmalige en structurele financiële consequenties voldoende
      inzicht is verkregen. Gemeenten zullen voorafgaande aan de besluitvorming omtrent
      voorgenomen wijzigingen gehoord worden. Hun bevindingen zullen middels hun vertegenwoordiging
      in het bestuur in de besluitvorming betrokken worden.4.4 Taken worden naar omvang
      en kwaliteit voor alle gemeenten als basispakket gelijk uitgevoerd. Op verzoek
      van gemeenten kan de GGD tegen meerprijs extra taken (laten) verrichten. Bij
      de bepaling van het kwaliteitsniveau van de dienstverlening worden wettelijke
      uitgangspunten in acht genomen.4.5 Op verzoek en voor rekening van derden kunnen
      na een daartoe door het algemeen bestuur genomen besluit onder vaststelling
      van nadere voorwaarden werkzaamheden worden uitgevoerd.4.6 De deelnemende gemeenten/derden
      verbinden zich voor de uitvoering van de hiervoor bedoelde taken voor eigen
      kosten geschikte ruimten beschikbaar te stellen.
