  doel: Doel van de samenwerking is het gezamenlijk behartigen en bevorderen van (de
    samenhang) binnen de publieke gezondheidzorg, ten behoeve van de gezondheid van
    de bevolking in het samenwerkingsgebied. Dit betreft de volgende belangen:a. het
    beschermen en bevorderen van de gezondheid van de bevolking of van specifieke
    groepen daarbinnen, in het rechtsgebied van het lichaam;b. het (doen) organiseren
    van preventieve zorg aan de bevolking;c. het voorkomen van vroegtijdig opsporen
    van ziekten onder de bevolking;d. alles wat met het bovenstaande in de ruimste
    zin van het woord verband houdt.
