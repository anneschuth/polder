  bevoegdheden:
  - kop_artikel: Bevoegdheden Artikel 6
    inhoud_artikel: 1. Aan GBLT en zijn organen komen de bevoegdheden toe die in de
      Regeling aan GBLT en zijn organen zijn toegekend.2. De colleges van de deelnemers
      dragen de bevoegdheden over die benodigd zijn voor de uitvoering van de werkzaamheden
      met betrekking tot de heffing en invordering van de belastingen, heffingen en
      rechten, de Wet waardering onroerende zaken, de inrichting en/of het beheer
      van andere basisregistraties, en/of andere taken, een en ander als aangegeven
      in de van deze regeling onderdeel uitmakende bijlage.3. Het college van een
      deelnemer kan bevoegdheden als bedoeld in het tweede lid, voor zover die niet
      reeds zijn overgedragen, aan GBLT overdragen. De colleges en de vertegenwoordigende
      organen van de deelnemers verlenen elkaar automatisch wederzijdse toestemming
      voor deze overdracht. Het college van de deelnemer dient een verzoek tot overdracht
      van de betreffende bevoegdheid in bij het algemeen bestuur. Een overdracht van
      bevoegdheden behoeft de instemming van ¾ van de uitgebrachte stemmen van het
      algemeen bestuur. Na instemming van het algemeen bestuur draagt het college
      van de betreffende deelnemer door middel van een delegatiebesluit de bevoegdheid
      over.4. Het algemeen bestuur is bevoegd om op verzoek van een college van een
      deelnemer bevoegdheden terug te leggen bij de deelnemer, met dien verstande
      dat hierbij een opzegtermijn van één jaar in acht wordt genomen en deze bepaling
      niet geldt in geval van een wens tot uittreding van een deelnemer als bedoeld
      in artikel 48 van de regeling.5. Het algemeen bestuur bepaalt de voorwaarden
      waaronder bevoegdheden worden overgedragen of teruggelegd.6. Het dagelijks bestuur
      past bij overdracht of teruglegging van bevoegdheden de bijlage als bedoeld
      in het tweede lid aan, zendt deze bijlage aan de deelnemers, en draagt ervoor
      zorg dat de bijlage wordt bekendgemaakt.7. De aan GBLT overgedragen bevoegdheden
      worden door het dagelijks bestuur bijgehouden in een openbaar register.
