gr_meta:
  citeertitel: Gemeenschappelijke Regeling GBLT
  doel: GBLT heeft als doelstelling zorg te dragen voor een efficiënte en effectieve
    heffing en invordering van belastingen, voor de heffing en invordering waarvan
    de vertegenwoordigende organen van de deelnemers belastingverordeningen en kwijtscheldingsregels
    hebben vastgesteld, elk voor zover het hun grondgebied betreft, de uitvoering
    van de Wet waardering onroerende zaken en desgewenst de inrichting en/of het beheer
    van andere basisregistraties.
