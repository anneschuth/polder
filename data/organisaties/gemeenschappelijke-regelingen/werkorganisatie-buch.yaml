description:
  text: Werkorganisatie BUCH is in 2017 ontstaan, na een fusie van de ambtelijke organisaties
    van de gemeenten Bergen, Uitgeest, Castricum en Heiloo. Het is daarmee een jonge
    organisatie, met sterke wortels binnen de vier gemeenten.Met ruim 850 medewerkers
    faciliteren we vier besturen bij het realiseren van hun ambities. We bieden als
    één organisatie het hoofd aan maatschappelijke opgaven zoals wonen, klimaat, zorg
    en gezonde financiën. We focussen op de overeenkomsten met oog voor de lokale
    verschillen.Samen werken we aan morgen.De BUCH werkt volgens de Gemeenschappelijke
    Regeling Werkorganisatie BUCH.Werkorganisatie BUCH is een collegeregeling (art.
    2.1 van de Gemeenschappelijke Regeling), wat betekent dat de leden van het algemeen
    bestuur verantwoording afleggen aan de vier colleges die hen hebben aangewezen.
    Er wordt ook verantwoording afgelegd aan de vier gemeenteraden.Het algemeen bestuur
    – het BUCH-bestuur – bestaat uit:Vier burgemeesters, uit elke gemeente éénUit
    ieder college één wethouderDe algemeen directeur van de werkorganisatie BUCH is
    secretaris van het bestuur, maar is geen lid van het bestuur.
  url: https://www.werkenbijdebuch.nl/over-de-buch
