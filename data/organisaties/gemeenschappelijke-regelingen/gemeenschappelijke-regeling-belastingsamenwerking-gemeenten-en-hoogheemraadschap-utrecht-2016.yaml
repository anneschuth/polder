  bevoegdheden:
  - kop_artikel: 'Artikel 29: Bevoegdheden'
    inhoud_artikel: Het bestuur van het samenwerkingsverband is bevoegd tot regeling
      en bestuur ter behartiging van die belangen die aan het samenwerkingsverband
      zijn opgedragen.
  - kop_artikel: 'Artikel 30: Overdracht bevoegdheden'
    inhoud_artikel: 1. Het college van dijkgraaf en hoogheemraden van het waterschap
      Hoogheemraadschap De Stichtse Rijnlanden draagt aan het bestuur van het samenwerkingsverband
      de bevoegdheid tot heffing en invordering van alle door het algemeen bestuur
      van het waterschap Hoogheemraadschap De Stichtse Rijnlanden ingestelde waterschapsbelastingen
      over, voor zover deze waterschapsbelastingen later niet zijn opgeheven.2. De
      colleges van de deelnemende gemeenten dragen aan het bestuur van samenwerkingsverband
      over de bevoegdheid tot heffing en invordering van de volgende gemeentelijke
      belastingen, voor zover de betreffende belasting door de raad van die gemeente
      is ingesteld en niet later weer is opgeheven:a. de onroerende-zaakbelasting,
      bedoeld in artikel 220 van de Gemeentewet;b. de forensenbelasting, bedoeld in
      artikel 223 van de Gemeentewet;c. de toeristenbelasting, bedoeld in artikel
      224 van de Gemeentewet;d. de hondenbelasting, bedoeld in artikel 226 van de
      Gemeentewet;e. de precariobelasting, bedoeld in artikel 228 van de Gemeentewet;f.
      de rioolheffing, bedoeld in artikel 228a van de Gemeentewet;g. reinigingsrechten
      geheven krachtens artikel 229, eerste lid onder a en b, van de Gemeentewet;h.de
      vermakelijkhedenretributie, bedoeld in artikel 229, eerste lid onder c, van
      de Gemeentewet;i. de BIZ-bijdrage, bedoeld in artikel 1 van de Experimentenwet
      BI-zones, of bedoeld in artikel 1 van de Wet op de bedrijveninvesteringzones;j.
      de afvalstoffenheffing, bedoeld in artikel 15.33 van de Wet milieubeheer enk.
      de belastingen op roerende woon- en bedrijfsruimten, bedoeld in artikel 221
      van de Gemeentewet3. De colleges van de deelnemende gemeenten dragen aan het
      samenwerkingsverband over de uitvoering van de Wet waardering onroerende zaken.
  - kop_artikel: 'Artikel 31: Additionele overdracht'
    inhoud_artikel: 1. Het college van een deelnemende gemeente kan de bevoegdheid
      tot heffing en invordering van andere gemeentelijke belastingen dan bedoeld
      in artikel 30 overdragen aan het samenwerkingsverband.2. Het college van een
      deelnemende gemeente kan taken en bevoegdheden in het kader van basisadministraties
      of basisregistraties overdragen aan het samenwerkingsverband.3. Het bestuur
      neemt hetgeen dat op grond van de vorige leden is overgedragen, op in een register
      bij de gemeenschappelijke regeling en zendt deze ter kennisname aan de colleges
      en aan gedeputeerde staten, overeenkomstig het bepaalde in artikel 26, vierde
      lid, van de Wet gemeenschappelijke regelingen.
