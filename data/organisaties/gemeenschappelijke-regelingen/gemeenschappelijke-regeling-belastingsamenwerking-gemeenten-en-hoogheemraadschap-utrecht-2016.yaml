  citeertitel: Gemeenschappelijke Regeling Belastingsamenwerking gemeenten en hoogheemraadschap
    Utrecht 2016
  doel: In het kader van deze regeling worden de belangen van de deelnemers behartigd,
    elk voor zover het hun grondgebied en hun belangen betreft, op het gebied van:a.
    de heffing en invordering van belastingen;b. de uitvoering van de Wet waardering
    onroerende zaken, waaronder tevens wordt begrepen de administratie van vastgoedgegevens
    op basis van die wet en het verstrekken van vastgoedgegevens aan de deelnemers
    en derden, enc. basisadministraties en basisregistraties.
