gr_meta:
  citeertitel: Centrumregeling Sociaal domein Rijnstreek
  doel: De deelnemende gemeenten werken door middel van deze centrumregeling aan de
    doelstellingen en uitgangspunten zoals verwoord onder lid 1 tot en met 5:1. Het
    vastleggen van de uitgangspunten voor de gezamenlijke uitvoering van wettelijke
    taken in het sociaal domein van de deelnemende regiogemeenten, waarvoor gemeenten
    vrijwillig kunnen samenwerken.2. Met de samenwerking kan meer worden bereikt,
    kan betere dienstverlening plaatsvinden voor de inwoners en kunnen kennis en expertise
    gebundeld worden en zo kan meer efficiency gerealiseerd worden.3. Met de samenwerking
    ontstaat voor de deelnemende gemeenten en inwoners een stevigere positie in de
    regio en bij landelijke ontwikkelingen en kunnen schaalvoordelen behaald worden
    in het geval van bijvoorbeeld inkooptrajecten.4. De regiogemeenten liggen geografisch
    naast elkaar en delen kenmerken, wat de samenwerking voor de hand liggend maakt.5.
    De taken voor de samenwerking zijn een aantal  wettelijke wettelijke taken op
    het gebied van het sociaal domein en kunnen omvatten beleidsvoorbereiding, inkoop
    dan wel subsidieverlening, contractmanagement dan wel accounthouderschap, de uitvoering
    en het financieel-administratief verwerken, alsmede het clientbeheer voor zover
    opgenomen in een DVO.
  samenwerkingsvorm:
    value: '''Regeling zonder meer'''
    afkorting: RZM
