  bevoegdheden:
  - inhoud_artikel: Artikel 8.1 Bevoegdheden algemeen1.  Aan het openbaar lichaam
      zijn door de (organen van de) deelnemende gemeenten alle bevoegdheden tot regeling
      en bestuur toegekend die op enig moment nodig zijn voor de uitvoering van de
      aan de brandweer en GHOR Zuid-Limburg opgedragen taken zoals genoemd in hoofdstuk
      3. De (organen van de) deelnemende gemeenten zijn bevoegd de bij de taakuitvoering
      behorende bevoegdheden te mandateren. Van verleende mandaten wordt een geconsolideerd
      register bijgehouden.
