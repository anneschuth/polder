  bevoegdheden:
  - kop_artikel: Artikel 4 Doelstellingen, taken en bevoegdheden
    inhoud_artikel: 1. Het openbaar lichaam heeft ten doel het op een bedrijfsmatig
      verantwoorde wijze doen uitvoeren van taken van en voor de deelnemende gemeenten
      op het terrein van de gesubsidieerde arbeid. en het adviseren van de gemeenten
      op het terrein van de gesubsidieerde arbeid.2. Ter aanvulling van het lid 1
      genoemde doel voert het openbaar lichaam in ieder geval de taken en bevoegdheden
      uit van het college van burgemeester en wethouders genoemd in de WSW binnen
      het werkgebied, met uitzondering van de taken en bevoegdheden genoemd in artikel
      14, eerste lid WSW.3. Overeenkomstig het bepaalde in het eerste en tweede lid
      van dit artikel, dragen de colleges van burgemeester en wethouders van de gemeenten
      al hun bevoegdheden uit de WSW over aan het algemeen bestuur van het openbaar
      lichaam.4. Aan het algemeen bestuur is, ten behoeve van de in het eerste lid
      genoemde doelstelling, de bevoegdheid toegekend een of meer rechtspersonen op
      te richten of deel te nemen in een of meer bestaande dan wel te vormen rechtspersonen.
