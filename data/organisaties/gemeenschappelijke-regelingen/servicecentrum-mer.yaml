description:
  text: De gemeenten Maasgouw, Echt-Susteren en Roerdalen werken sinds 2013 samen
    in Servicecentrum MER en voeren een aantal taken samen uit. Deze samenwerking
    combineert de schaalvoordelen van een grote organisatie met de voordelen van een
    kleine organisatie, waarbij het bestuur dichtbij de inwoner staat. Servicecentrum
    MER is een openbaar lichaam op grond van de Wet Gemeenschappelijke Regelingen.
    Door deze wet kunnen gemeenten samenwerken in een publiekrechtelijke constructie.
  url: https://www.servicecentrum-mer.nl/over-de-mer-samenwerking
