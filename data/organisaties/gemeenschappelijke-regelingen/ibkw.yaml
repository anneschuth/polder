description:
  text: IBKW is een Gemeenschappelijke Regeling bedrijfsvoeringsorganisatie van de
    gemeenten Krimpen aan den IJssel en Krimpenerwaard.Wij nemen als bedrijfsvoeringsorganisatie
    geen besluiten (behalve betreffende onze eigen bedrijfsvoering) en zijn uitsluitend
    adviserend en uitvoerend voor onze twee deelnemers bezig.Onze taak is die van
    intern ingenieursbureau op het gebied van civiele techniek. Ons werk ligt dus
    in de openbare ruimte. Wij bereiden projecten voor en voeren directie bij de uitvoering.
    Het beheer van de openbare ruimte, het vaststellen van het beleid, het organiseren
    van participatie en het nemen van besluiten zoals vaststellen van ontwerpen en
    kredieten zijn een gemeentelijke verantwoordelijkheid.
