  bevoegdheden:
  - kop_artikel: Artikel 5 Overgedragen taken en bevoegdheden
    inhoud_artikel: '1.De Regio is ten aanzien van alle overgedragen taken belast
      met beleidsvoorbereiding.2.De Regio is ten aanzien van de uitvoering resp. uitoefening
      van alle overgedragen taken en bevoegdheden verwerkingsverantwoordelijke en
      in die hoedanigheid bevoegd tot het verwerken van persoonsgegevens.3.De Regio
      is belast met uitvoering van de navolgende taken en hiermee verband houdende
      aan het algemeen bestuur overgedragen bevoegdheden, op taakveld:'
  - inhoud_artikel: I. Ambulancezorg, voor de gemeenten:het verlenen van ambulancezorg
      op grond van de Wet Ambulancezorgvoorzieningen en de uitvoering van het ambulancedeel
      in de meldkamer die gemeenschappelijk met politie en brandweer wordt beheerd.
  - inhoud_artikel: II. Milieubeheer, voor de gemeenten:de uitvoering van Hoofdstuk
      10. Afvalstoffen van de Wet milieubeheer (Wm), voor zover deze aan gemeenten
      is opgedragen, met uitzondering van het bepaalde over afvalwater. Ten behoeve
      van de uitvoering van Hoofdstuk 10. Afvalstoffen van de Wm is de bevoegdheid
      tot het vaststellen van de afvalstoffenverordening door de gemeenteraad als
      bedoeld in artikel 10.23 van de Wm overgedragen.
  - inhoud_artikel: III. Publieke gezondheid, voor gemeenten:de uitvoering van de
      taken publieke gezondheidszorg algemeen, jeugdgezondheidszorg, ouderengezondheidszorg,
      algemene infectieziektebestrijding, Rijksvaccinatieprogramma en beschikbaarstelling
      deskundigheid. Ten behoeve van deze taken zijn de bevoegdheden als bedoeld in
      artikel 2 leden 1 en 2, artikel 5 leden 1 tot en met 4, artikel 5a leden 1 en
      2, artikel 6 lid 1, artikel 6b leden 3 tot en met 5 en artikel 15 lid 1 van
      de Wet publieke gezondheid overgedragen; Ten behoeve van de uitvoering van artikel
      5 van de Wpg is de bevoegdheid tot het verwerken van persoonsgegevens als bedoeld
      in artikel 5 lid 3 van de Wpg overgedragen.
  - inhoud_artikel: IV. Veilig Thuis, voor de gemeenten:taken met betrekking tot Veilig
      Thuis als bedoeld in het bepaalde bij of krachtens Hoofdstuk 4. Veilig Thuis
      van de Wet maatschappelijke ondersteuning 2015 (Wmo 2015) en als bedoeld in
      de Wet tijdelijk huisverbod.
  - inhoud_artikel: V. Maatschappelijke ondersteuning, voor de gemeenten en voor Eemnes:a.
      de uitvoering van de navolgende taken ten aanzien van de centrumgemeente taken
      beschermd wonen of opvang als bedoeld in artikel 1.2.1 onder b en c van de Wmo
      2015:1. accounthouderschap & marktmeesterschap;2. inkoop en contractbeheer;3.
      kassiersfunctie.b. de opdracht verstrekking van maatwerkvoorzieningen aan aanbieders,
      de controle op rechtmatigheid van declaraties van maatwerkvoorzieningen, de
      monitoring behandeling van bij aanbieders ingediende klachten en het uitvoeren
      van cliëntenervaringsonderzoek in het kader van de Wmo 2015.c. de uitvoering
      van het bepaalde in het door de gemeenten en Eemnes vastgestelde plan als bedoeld
      in artikel 2.1.2 lid 1 van de Wmo 2015 ten aanzien van beschermd wonen of opvang
      als bedoeld in artikel 2.1.2 lid 2 sub g van de Wmo 2015. Tot deze taakuitvoering
      behoren in ieder geval de beleidsuitvoering, de inkoop en het contractbeheer
      voor beschermd wonen of opvang.
  - inhoud_artikel: VI. Onderwijs, voor de gemeenten en voor Eemnes:a. de uitvoering
      van alle gemeentelijke taken als bedoeld in de Leerplichtwet 1969 én met de
      uitvoering van de regelgeving met betrekking tot de melding en de bestrijding
      van voortijdig school verlaten (Regionale Meld- en Coördinatiefunctie Voortijdig
      Schoolverlaten) als bedoeld in de Wet op het voortgezet onderwijs, de Wet educatie
      en beroepsonderwijs (WEB) en de Wet op de expertisecentra. Tot deze taken behoren
      in ieder geval:1. de registratie en administratie van de leerplichtige en kwalificatieplichtige
      leerlingen en van leerlingen met een leerovereenkomst;2. de preventieve en curatieve
      maatschappelijke zorg bij schoolverzuim en voortijdig schoolverlaters;3. justitiële
      taken in geval van overtreding van de leerplicht of kwalificatieplicht ten behoeve
      van ouders, scholen en jongeren vanaf 12 jaar;4. de behandeling van aanvragen
      tot tijdelijke vrijstelling van geregeld schoolbezoek, inschrijvingsplicht,
      leerplicht en kwalificatieplicht;5. het voeren van overleg met de daarvoor in
      aanmerking komende instanties;6. het geven van voorlichting aan scholen, ouders
      en jongeren;7. het toezicht op naleving van de Leerplichtwet 1969;8. het toepassen
      van bestuurlijke handhaving tot naleving van de Leerplichtwet 1969.b. de centrumgemeente
      taken volwasseneneducatie als bedoeld in de WEB:1. beleidscoördinatie ten aanzien
      van het voorbereiden en uitvoeren van een regionaal programma (beleidsplan)
      als bedoeld in artikel 2.3.1 lid 3 onder a van de WEB;2. inkoop en contractbeheer;3.
      kassiersfunctie.Ten behoeve van de uitvoering van de taken als bedoeld onder
      VI Onderwijs onder a zijn de bevoegdheid tot daden van regeling en bestuur,
      de bevoegdheden die in de Leerplichtwet 1969, de Wet op het voortgezet onderwijs,
      de WEB en de Wet op de expertisecentra aan het college zijn toegekend en de
      bevoegdheid van het college om bestuursdwang als bedoeld in artikel 125 Gemeentewet
      toe te passen tot bestuursrechtelijke handhaving van de regels van de Leerplichtwet
      1969 overgedragen;Ten behoeve van de uitvoering van de taken als bedoeld onder
      VI Onderwijs onder b is de bevoegdheid als bedoeld in artikel 2.3.1 lid 3 van
      de WEB overgedragen.
  - inhoud_artikel: VII. Jeugdhulp, voor de gemeenten:a. de opdrachtverstrekking van
      jeugdhulpvoorzieningen aan aanbieders, de controle op rechtmatigheid van declaraties
      van jeugdhulpvoorzieningen, de melding aanvang zorg en de monitoring van bij
      aanbieders ingediende klachten in het kader van de Jeugdwet.b. jeugdhulp te
      allen tijde bereikbaar en beschikbaar te hebben in situaties waarin onmiddellijke
      uitvoering van taken is geboden (artikel 2.6 lid 1 onder b van de Jeugdwet).Ten
      behoeve van de uitvoering van de taak als bedoeld in VII Jeugdhulp onder b zijn
      de volgende hiermee verband houdende bevoegdheden overgedragen:- het onverwijld
      melden aan de volgens de Jeugdwet met toezicht belaste ambtenaren van iedere
      calamiteit die zich bij de verlening van jeugdhulp heeft voorgedaan en van geweld
      bij de verlening van jeugdhulp (artikel 4.1.8 lid 1 van de Jeugdwet);- het treffen
      van een regeling voor de behandeling van klachten over gedragingen van de Crisisdienst
      Jeugdwet en van voor de Crisisdienst Jeugdwet werkzame personen jegens een jeugdige,
      ouder, ouder zonder gezag, voogd, degene die anders dan als ouder samen met
      de ouder het gezag over de jeugdige uitoefent of een pleegouder in het kader
      van de verlening van jeugdhulp (artikel 4.2.1 van de Jeugdwet);- het jaarlijks
      opstellen van een verslag over de naleving van de Jeugdwet in het voorafgaande
      jaar met betrekking tot regels omtrent de kwaliteit van de jeugdhulp onderscheidenlijk
      de kwaliteit van de uitvoering van de taken, het klachtrecht en de medezeggenschap
      ( artikel 4.3.1 van de Jeugdwet).
  - inhoud_artikel: VIII. Participatiewet, voor de gemeenten en voor Eemnes:de opdrachtverstrekking
      van re-integratievoorzieningen aan aanbieders, de controle op rechtmatigheid
      van declaraties van re-integratievoorzieningen en de monitoring behandeling
      van bij aanbieders ingediende klachten in het kader van de Participatiewet.
  - inhoud_artikel: IX. Wet inburgering 2021, voor de gemeenten en voor Eemnes:de
      opdrachtverstrekking van inburgeringstrajecten aan aanbieders, de controle op
      rechtmatigheid van declaraties van inburgeringstrajecten, de naleving van contractuele
      afspraken en de monitoring van bij aanbieders ingediende klachten zoals bedoeld
      in Hoofdstuk 5 van de Wet inburgering 2021.
  - inhoud_artikel: 'X. Doelgroepenvervoer,a. voor de gemeenten en voor Eemnes: de
      uitvoering van het Wmo-vervoer als bedoeld in artikel 1.2.1 onder a van de Wmo
      2015;b. voor de gemeenten en voor Eemnes: de uitvoering van het leerlingenvervoer
      als bedoeld in de artikelen 4 van de Wet op het primair onderwijs, Wet op de
      expertisecentra en Wet op het voortgezet onderwijs;'
  - inhoud_artikel: 4. Indien ten gevolge van een wijziging van wettelijke regelingen
      op de terreinen vermeld in voorgaande leden van dit artikel, de uitvoering van
      werkzaamheden ter realisatie strekt van een andere regeling dan ter uitvoering
      waarvan zij ten tijde van het van kracht worden van deze regeling strekte, dan
      wel indien in deze werkzaamheden ten gevolge van een dergelijke wijziging veranderingen
      optreden, blijven deze, voor zover hun strekking en omvang door hun wijziging
      niet wezenlijk veranderen, behoren tot de aan de Regio overgedragen taken en
      bevoegdheden.
