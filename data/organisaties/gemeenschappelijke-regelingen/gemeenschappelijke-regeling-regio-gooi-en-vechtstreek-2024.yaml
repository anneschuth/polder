  citeertitel: Gemeenschappelijke Regeling Regio Gooi en Vechtstreek 2024
  doel: Doel van de regeling is de wenselijk geachte samenwerking tussen de gemeenten
    in de regio en Eemnes zodanig vorm te geven dat de aan de Regio overgedragen,
    ondersteunende en coördinerende taken en dienstverlening doelmatig en doeltreffend
    worden uitgevoerd met behoud van de regie van de gemeenten onder waarborging van
    betrokkenheid van raden bij de regionale samenwerking.
