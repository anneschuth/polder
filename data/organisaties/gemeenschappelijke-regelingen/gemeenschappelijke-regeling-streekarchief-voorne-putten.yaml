  doel: Doel van het Streekarchief Voorne-Putten is in het samenwerkingsgebied:a.
    uitvoering geven aan de Archiefwet; alsmede hetb. vervullen van de functie van
    regionaal kennis- en informatiecentrum op het gebied van de lokale en regionale
    geschiedenis door het opbouwen en beheren van een zo breed mogelijke collectie
    (regionaal) historische bronnen en deze op een zo actief mogelijke wijze dienstbaar
    maken voor het publiek.
