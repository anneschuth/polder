  bevoegdheden:
  - kop_artikel: Artikel 9 bevoegdheden
    inhoud_artikel: 1. Aan het bestuur komen alle bevoegdheden tot regeling en bestuur
      toe die noodzakelijk zijn ten behoeve van de uitvoering van taken die bij deze
      gemeenschappelijke regeling aan het Streekarchief Voorne-Putten zijn opgedragen
      en die daarvoor bij of krachtens enig wettelijk voorschrift aan gemeentebesturen
      zijn of worden toegekend.2. Naast de uitoefening van taken en bevoegdheden op
      grond van het elders in deze regeling bepaald, is het bestuur in elk geval belast
      met en bevoegd tot:a. het vaststellen van de jaar- en meerjarenbeleidsplannen;b.
      het opstellen van voorwaarden voor toetreding;c. het voorstaan van de belangen
      van het Streekarchief Voorne-Putten bij andere overheden, instellingen, diensten
      en personen;d. het nemen van alle conservatoire maatregelen zowel in als buiten
      rechte en het doen van alles wat nodig is ter voorkoming van verjaring van recht
      of bezit.1. Het bestuur kan ten behoeve van de bedrijfsvoering van het Streekarchief
      Voorne-Putten met één of meer gemeenten afspraken maken om de daarop gerichte
      activiteiten te leveren.
