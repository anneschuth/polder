  bevoegdheden:
  - kop_artikel: Taken en bevoegdheden Artikel 4
    inhoud_artikel: 1. De regio heeft tot taak de navolgende gemeenschappelijke belangen
      te behartigen;a. Economie, Onderwijs en Arbeidsmarkt;b. Natuur, Water en Recreatie;c.
      Ruimte en Wonen;d. Sociaal Domein;e. Verkeer en Vervoer;f. Alsmede alle andere
      onderwerpen die bij gelijkluidend besluit ter behartiging aan de regio zijn
      opgedragen door de raden, colleges en/of burgemeesters, ieder voor zover het
      diens bevoegdheid betreft. Besluitvorming over dit onderwerp vindt plaats bij
      unanimiteit.Deze gemeenschappelijke belangen kunnen zowel op structurele als
      op projectmatige basis behartigd kunnen worden.2. Ter behartiging van de in
      lid 1 genoemde belangen voert de regio, op basis van daartoe door de bestuursorganen
      van gemeenten genomen besluiten, naast de algemene coördinerende taak als bedoeld
      in het eerste lid, de volgende taken uit:a. het aanvragen en verstrekken van
      subsidies.b. alle andere taken die bij gelijkluidend besluit ter behartiging
      aan de regio zijn opgedragen door de bestuursorganen van de deelnemende gemeenten,
      ieder voor zover het diens bevoegdheid betreft. Besluitvorming over dit onderwerp
      vindt plaats door middel van gelijkluidende besluitvorming van de bestuursorganen
      van twee of meer deelnemende gemeenten. De uitvoering van de taken zal beperkt
      blijven tot de gemeenten die deze aan de regio hebben opgedragen.3. Aan de regio
      zijn/worden, ter vervulling van de in lid 2 genoemde taken met betrekking tot
      de in lid 1 genoemde gemeenschappelijke belangen, bevoegdheden van regeling
      en bestuur toegekend binnen de grens van artikel 30 van de Wet gemeenschappelijke
      regelingen. Hiertoe behoort, indien de opgedragen taken hiertoe nopen, het heffen
      van rechten als bedoeld in de Gemeentewet en het heffen van rechten op grond
      van bijzondere wetten.
