description:
  text: Per juli 2013 is de oprichting van de Regionale Uitvoeringsdienst Noord-Holland
    Noord (RUD NHN) een feit. De milieudiensten Regio Alkmaar, Kop van Noord-Holland,
    West Friesland en de provincie Noord-Holland zijn per 1 januari 2014 in deze regionale
    organisatie gefuseerd.De dienst heet per 1 juli 2019 Omgevingsdienst Noord-Holland
    Noord (OD NHN).De OD NHN is in 2014 als Regionale Uitvoeringsdienst Noord-Holland
    Noord (RUD NHN) daadwerkelijk van start gegaan als een 'no-nonsens'-organisatie
    in de uitvoering van haar (milieu)taken. De Omgevingsdienst verzorgt voor zijn
    opdrachtgevers de vergunningverlening, toezicht en handhaving en staat hen bij
    met specialistisch advies. Dit doen we bijvoorbeeld op het gebied van milieu,
    veiligheid, duurzaamheid en circulaire economie.
