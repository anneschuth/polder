description:
  text: Wij zijn het werkontwikkelbedrijf van de gemeenten Purmerend en Zaanstad.
    Wij helpen mensen met een kwetsbare positie op de arbeidsmarkt om duurzaam werk
    te vinden. Voor mensen die dat nodig hebben, bieden wij beschut werk. We doen
    ons werk in uitstekende samenwerking met werkgevers.Onze organisatie is vernieuwend
    en volop in ontwikkeling. Als vraag en aanbod op de arbeidsmarkt elkaar niet vinden,
    zorgt Werkom voor verbinding. Dat doen wij in samenwerking met werkzoekenden,
    werkgevers, maatschappelijke organisaties en gemeenten.Opleidingstrajecten en
    trainingenOm mensen goed voor te bereiden op een baan bij de werkgever, bieden
    wij opleidingstrajecten en trainingen aan. Daarbij maken wij gebruik van onze
    eigen leerwerkbedrijven én van trajecten bij het bedrijfsleven. Zo werken wij
    samen met alle partijen aan een toekomst, waarin iedereen kan groeien. Bedrijven
    die mensen kansen willen bieden kunnen bij Werkom altijd terecht voor informatie,
    begeleiding en advies.DoelOns doel is om zoveel mogelijk mensen hun eigen inkomen
    te laten verdienen. Daarnaast biedt Werkom voor werknemers die een beschutte werkomgeving
    nodig hebben, een werkplek die bij hen past.
  url: https://werkom.nl/over-ons/wie-zijn-wij
