  citeertitel: gemeenschappelijke regeling Werkgeversservicepunt Parkstad (WSP Parkstad)
  doel: Het Werkgeversservicepunt dient te voorzien in passende werkgelegenheid –
    zijnde werkplekken bij derden of werkopdrachten ten behoeve van regionale werkbedrijven
    inclusief de voormalige Wsw en in arbeidsrevalidatie van personen die door de
    gemeenschappelijke regeling Werkvoorzieningschap Oostelijk Zuid-Limburg dan wel
    individuele deelnemende gemeenten aan die regeling of sociale diensten aan haar
    worden toevertrouwd en eventueel tijdelijk worden gedetacheerd. In het licht van
    het vorenstaande heeft het Werkgeversservicepunt tot doel:1. Het invulling geven
    aan de aan Gemeenten (Colleges) op grond van de Participatiewet toegekende wettelijke
    opdracht ondersteuning te bieden bij de arbeidsinschakeling en ondersteuning bieden
    aan gemeenten bij het ontwikkelen van een uniform arbeidsmarktbeleid.2. Het voor
    de regio realiseren van een optimaal functionerende arbeidsmarkt die zich onder
    meer manifesteert in een hoge participatiegraad, c.q. het minimaliseren van werkloosheid.3.
    Het mede in het licht van vorenstaande leden, zijn van aanspreekpunt voor werkgevers
    voor arbeidsbemiddeling (werkgeversdienstverlening) in de door de deelnemende
    gemeenten gevormde regio.4. Het uitvoering geven aan de voormalige Wet sociale
    werkvoorziening, exclusief het formele werkgeverschap.
