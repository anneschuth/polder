  bevoegdheden:
  - kop_artikel: Artikel 6 Het Algemeen Bestuur
    inhoud_artikel: 1. Aan het Algemeen Bestuur worden alle bevoegdheden overgedragen
      die nodig zijn om de doelstelling als genoemd in artikel 2a te verwezenlijken,
      tenzij die bevoegdheden bij wet of bij deze Regeling aan een ander bestuursorgaan
      zijn toegekend/overgedragen.2. De portefeuillehouders sociale zaken en/of arbeidsmarktbeleid
      van de Gemeenten hebben qualitate qua zitting in het Algemeen Bestuur. De leden
      hebben zitting voor een tijdvak, gelijk aan dat van de zittingsduur van leden
      van de Colleges, met dien verstande dat zij in het Algemeen Bestuur zitting
      blijven houden tot aan het tijdstip dat (zijn of haar) opvolger zijn portefeuille
      heeft aanvaard en aanwijzing als lid van het Algemeen Bestuur heeft aanvaard.
      Dit lid is van overeenkomstige toepassing bij het samengaan van gemeenten ingevolge
      de Wet ARHI.3. Het Algemeen Bestuur kiest uit zijn midden een Voorzitter en
      een plaatsvervangend Voorzitter.4. Hij/zij die ophoudt lid te zijn van het College
      van Burgemeester en Wethouders, namens welke hij/zij lid is van het Algemeen
      Bestuur, houdt onverminderd het bepaalde in de laatste zin van lid 2 van dit
      artikel, van rechtswege op lid te zijn van het Algemeen Bestuur.5. Het lidmaatschap
      van het Algemeen Bestuur is onverenigbaar met de hoedanigheid van Personeel.
  - kop_artikel: Artikel 10 Bevoegdheden van het Dagelijks Bestuur
    inhoud_artikel: 1. De taken en bevoegdheden van het Dagelijks Bestuur volgen uit
      de Wet, deze Regeling of zijn door het Algemeen Bestuur overgedragen.2. Het
      Dagelijks Bestuur is bevoegd:A. het voorbereiden van al hetgeen in het Algemeen
      Bestuur ter kennisneming, overweging en beslissing moet worden gebracht, alsmede
      het uitvoeren van de besluiten van het Algemeen Bestuur;B. het nemen van alle
      conservatoire maatregelen, zowel in als buiten rechte en het doen van alles
      wat nodig is ter voorkoming van verjaring en verlies van recht of bezit.3.3.
      De bestuursorganen van deze Regeling kunnen bepalen op welke wijze verandering
      kan worden gebracht in de overgedragen bevoegdheden, met dien verstande dat
      niet kan worden besloten tot uitbreiding van de overgedragen bevoegdheden.
  - kop_artikel: Artikel 14 Taken en bevoegdheden van de directeur/secretaris
    inhoud_artikel: 1. De directeur/secretaris staat het Algemeen Bestuur, het Dagelijks
      Bestuur, de Voorzitter en de Bestuurscommissies terzijde.2. De directeur/secretaris
      is aanwezig tijdens de vergaderingen van het Algemeen Bestuur en het Dagelijks
      Bestuur en draagt zorg voor de notulering daarvan.3. Door de directeur/secretaris
      worden alle stukken die van het Algemeen Bestuur en van het Dagelijks Bestuur
      uitgaan (mee-) ondertekend.4. De directeur/secretaris is belast met de leiding
      van de ambtelijke organisatie.5. De functie van directeur/secretaris is onverenigbaar
      met het lidmaatschap van het Algemeen Bestuur.
