names:
- value: Omgevingsdienst Groene Metropool
  abbr: ODGM
  valid_from: '1900-01-01'
description:
  text: Als inwoner en ondernemer in Gelderland kunt u op ons rekenen. Omgevingsdienst
    Groene Metropool zorgt voor een duurzame, veilige en gezonde leefomgeving. Dit
    doen we door taken uit te voeren op het gebied van vergunningverlening, toezicht
    en handhaving (VTH). Daarnaast geven wij ook advies aan onze partners, zoals gemeenten
    en provincies, en delen wij kennis over verschillende belangrijke onderwerpen.
    Bijvoorbeeld over circulair ondernemen of gevaarlijke stoffen.
