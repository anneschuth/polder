  bevoegdheden:
  - kop_artikel: 'Artikel 6: Taken en bevoegdheden'
    inhoud_artikel: '1. Alle taken en bevoegdheden die bij of krachtens de WGS, WSW,
      PW en de WWB ende daarbij behorende of aanverwante algemeen verbindende voorschriften
      aan deraad, het college of de burgemeester zijn opgedragen, inclusief het vaststellen
      vanverordeningen, die op grond van de WGS, WSW, PW en de WWB en de daarbijbehorende
      of aanverwante algemeen verbindende voorschriften aan de raden encolleges van
      de deelnemende gemeenten toekomen, worden, voor zover de WGS,WSW, PW, de WWB
      en de daarbij behorende of aanverwante algemeen verbindendevoorschriften het
      toelaten (en de wet, die het betreft niet is ingetrokken dan weloverdracht van
      bevoegdheden niet meer mogelijk is), aan Orionis Walcherenovergedragen.2. De
      deelnemende gemeenten dragen aan Orionis Walcheren voorts over allebevoegdheden
      van regeling en bestuur met betrekking tot:a. het Besluit Bijstandverlening
      Zelfstandigen (2004);b. de Wet inkomensvoorziening oudere en gedeeltelijk arbeidsongeschikte
      werklozewerknemers (IOAW);c. de Wet inkomensvoorziening oudere en gedeeltelijk
      arbeidsongeschikte gewezenzelfstandigen (IOAZ);3. Voorts wordt door de deelnemende
      gemeenten aan Orionis Walcheren de uitvoeringopgedragen van:a. De Bijzondere
      Bijstand / Minimabeleid, op basis van het beleid dat ter zake doorde deelnemende
      gemeenten is vastgesteld;b. de Wet kinderopvang op basis van het beleid dat
      ter zake door de deelnemendegemeenten is vastgesteld;c. de regeling Dak- en
      Thuislozen; 6d. voor zover van toepassing, de afwikkeling van de Wet inschakelingWerkzoekenden
      (Wiw) de regeling In- en doorstroombanen, de Wet investeren inJongeren (WIJ)
      en de Wet werk en inkomen kunstenaars (WWIK);e. de Sluitende Aanpak (uitstroom
      en re-integratieplannen), op te nemen in jaarlijksvast te stellen beleidsplan;f.
      de inkoop van producten en diensten op het terrein van re-integratie engesubsidieerde
      arbeid bij aanbieders ten behoeve van de jaarlijks te realiserentaakstelling;g.
      de advisering van het bestuur van de deelnemende gemeenten over het tevoeren
      beleid op het terrein van Werk & Inkomen, sociale zekerheid enontwikkelingen
      op de lokale/regionale arbeidsmarkt;h. het overleg met en deelname aan het Regionaal
      Ketenoverleg (Reko);i. kredietverstrekking, schuldhulpverlening en budgetbeheer.4.
      Het algemeen bestuur is bevoegd tot het vaststellen van een verordening metbetrekking
      tot de uitvoering van activiteiten de kredietbankfunctie betreffende, zoals:a:
      krediettransacties binnen de Wet Fido;b: schuldenregeling op grond van artikel
      47 e.v. WCK;c: budgetbeheer zoals bedoeld in artikel 82 van de WTK;d: verstrekken
      van verklaringen op grond van de FW;e: bewindvoering en curatele op grond van
      de FW;f: preventie;g: kredietbankactiviteiten voor andere gemeenten.5. Bij de
      uitvoering van het genoemde onder de leden 1 en 2 wordt door OrionisWalcheren
      samengewerkt met het UWV (Uitvoering Werknemersverzekeringen) en deexterne partners
      die door Orionis Walcheren ingeschakeld worden bij de activering, re-integratie
      en arbeidstoeleiding van cliënten. De dienst vervult hierbij de regiefunctienamens
      de deelnemende gemeenten.6. Orionis Walcheren verleent, onverminderd het bepaalde
      in lid 1, alleen diensten aangemeenten binnen het in artikel 2 genoemde rechtsgebied,
      alsmede buiten het in ditartikel genoemde rechtsgebied als het algemeen bestuur
      hiermee instemt. De dienstenworden verleend tegen een vooraf overeengekomen
      kostenvergoeding.7. Orionis Walcheren kan op verzoek, indien het algemeen bestuur
      hiertoe besluit, binnende gedelegeerde bevoegdheden, nader te omschrijven taken
      gaan uitvoeren. Eenbesluit hiertoe vermeldt alsdan de wijze van kostenverrekening
      en overigevoorwaarden waaronder deze taken worden uitgevoerd.'
