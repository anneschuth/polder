  bevoegdheden:
  - kop_artikel: Artikel 5 Taken en bevoegdheden
    inhoud_artikel: 1. Ten behoeve van de in artikel 4 genoemde doelstelling heeft
      de regio de volgende taken en bevoegdheden:a. logistieke ondersteuning en coördinatie
      van de netwerksamenwerking;b. het verzorgen van de externe en interne communicatie
      over de voortgang, de resultaten en de onderlinge samenhang van de diverse opgaven
      en projecten binnen de RMA;c. het onderzoeken en zo nodig realiseren van subsidiemogelijkheden
      die passen binnen de doelstelling van de regio AV.2. Voor het aanvragen van
      subsidie zoals bedoeld in lid 1, onder c verlenen de deelnemers mandaat aan
      het algemeen bestuur, met de mogelijkheid tot het verlenen van ondermandaat
      aan de netwerkmanager.
