gr_meta:
  citeertitel: Gemeenschappelijke regeling Omgevingsdienst Zuid-Limburg
  doel: Het openbaar lichaam is ingesteld ter behartiging van de belangen van de deelnemers
    ter zake van vergunningverlening, toezicht en handhaving en advisering in het
    kader van het omgevingsrecht in het belang van het bereiken en in stand houden
    van een veilige en gezonde fysieke leefomgeving en een goede omgevingskwaliteit
    in het werkgebied.
