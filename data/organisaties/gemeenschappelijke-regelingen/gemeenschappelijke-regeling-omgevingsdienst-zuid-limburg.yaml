  bevoegdheden:
  - kop_artikel: 'Artikel 13: Bevoegdheden'
    inhoud_artikel: "13.1\tMet betrekking tot de uitoefening van de taken en bevoegdheden\
      \ van het openbaar lichaam berust bij het algemeen bestuur alle bevoegdheid,\
      \ die niet bij of krachtens deze regeling aan het dagelijks bestuur of aan de\
      \ voorzitter is opgedragen of gedelegeerd.13.2\tHet algemeen bestuur heeft een\
      \ eigen verordenende bevoegdheid met betrekking tot de vaststelling van de verordeningen\
      \ ex artikel 216 en 217 van de Provinciewet en andere verordeningen die de bedrijfsvoering\
      \ van de omgevingsdienst betreffen.13.3\tNaast de uitoefening van taken en bevoegdheden\
      \ op grond van het in deze regeling bepaalde, is het algemeen bestuur in ieder\
      \ geval belast met en bevoegd tot:a.\thet doen van voorstellen aan de deelnemers\
      \ omtrent toetreding tot, uittreding uit, wijziging van of opheffing van de\
      \ regeling;b.\thet doen van uitgaven voordat de begroting of begrotingswijziging,\
      \ waarbij deze uitgaven zijn geraamd, is goedgekeurd;c.\thet aanwijzen van de\
      \ accountant.13.4\tHet algemeen bestuur kan besluiten tot de oprichting van\
      \ en de deelneming in stichtingen, maatschappen, vennootschappen, verenigingen,\
      \ coöperaties en onderlinge waarborgmaatschappijen met inachtname van hetgeen\
      \ daaromtrent in de Wet is geregeld.13.5\tEen besluit als bedoeld in het vierde\
      \ lid wordt niet genomen dan nadat de raden en provinciale staten een ontwerpbesluit\
      \ is toegezonden en deze in de gelegenheid zijn gesteld hun wensen en bedenkingen\
      \ ter kennis te brengen aan het algemeen bestuur.13.6\tHet algemeen bestuur\
      \ is bevoegd tot het mede treffen van en tot het deelnemen aan een gemeenschappelijke\
      \ regeling als bedoeld in de artikelen 93 en 96 van de Wet. Artikel 95 en 98\
      \ van de Wet zijn van overeenkomstige toepassing op deze bevoegdheden."
  - kop_artikel: 'Artikel 19: Bevoegdheden'
    inhoud_artikel: "Naast de bevoegdheden op grond van de Wet is het dagelijks bestuur\
      \ in ieder geval bevoegd:a.\thet dagelijks bestuur van het openbaar lichaam\
      \ te voeren, waaronder het toezicht op het beheren van de financiën en de eigendommen\
      \ van het openbaar lichaam;b.\tde ambtelijke organisatie van het openbaar lichaam\
      \ in te richten en de werkwijze van de ambtelijke organisatie te bepalen en\
      \ in dat kader instructies uit te vaardigen."
