  bevoegdheden:
  - kop_artikel: Artikel 5 Modulaire karakter van het samenwerkingsverband
    inhoud_artikel: 1. De regeling biedt een algemeen kader voor samenwerking op het
      gebied van het sociaal domein binnen de regio, waar specifieke samenwerkingsmodules
      aan worden toegevoegd.2. De deelnemers besluiten per samenwerkingsmodule of
      zij hieraan deelnemen.3. De toevoeging van een samenwerkingsmodule is een wijziging
      van de regeling, als bedoeld in artikel 34 lid 2.
