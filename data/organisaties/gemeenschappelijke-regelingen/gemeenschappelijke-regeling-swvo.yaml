gr_meta:
  citeertitel: Gemeenschappelijke regeling SWVO
  doel: SWVO is ingesteld om de gezamenlijke belangen van de deelnemende gemeenten
    te behartigen inzake beleidsvoorbereiding, besluitvorming en uitvoering ten aanzien
    van bovengemeentelijke voorzieningen en activiteiten op het terrein van de welzijnszorg.
    Hierbij gelet op de Wet gemeenschappelijke regelingen, de Gemeentewet, het Besluit
    Begroting en Verantwoording provincie en gemeenten, de Wet Educatie en Beroepsonderwijs
    en de Wet maatschappelijke ondersteuning.Zij stelt zich in deze op als een dienstverlenende
    organisatie voor gemeenten. Is klantgericht en streeft naar een efficiënte en
    doelmatige ondersteuning van gemeenten, zodat zij hun (lokale) taken in het sociaal
    domein optimaal kunnen uitvoeren.Bij de uitvoering van de kerntaken handelt het
    SWVO vanuit haar kernwaarden/ competenties, te weten expertise, verbinding, constante
    kwaliteit en resultaat.
