description:
  text: De gemeenten Medemblik en Opmeer hebben samen één Rekenkamer (RK). Deze RK
    is een onafhankelijke commissie die onderzoek doet naar de doeltreffendheid (resultaat),
    doelmatigheid (kosten) en rechtmatigheid (regels en besluiten) van het gemeentelijk
    beleid.
