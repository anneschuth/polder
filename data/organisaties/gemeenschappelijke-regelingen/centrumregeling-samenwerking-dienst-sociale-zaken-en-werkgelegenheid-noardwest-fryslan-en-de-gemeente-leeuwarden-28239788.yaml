  bevoegdheden:
  - kop_artikel: Artikel 4 - Bevoegdheden
    inhoud_artikel: 1. Het college van de centrumgemeente wordt door het algemeen
      bestuur dan wel het dagelijks bestuur, voor zo ver zijn bevoegdheid reikt, van
      de Dienst Sociale Zaken en Werkgelegenheid Noardwest Fryslân mandaat – en voor
      zo ver van toepassing - volmacht verleend om binnen de beleidskaders van de
      Dienst Sociale Zaken en Werkgelegenheid Noardwest Fryslân, om namens de Dienst
      Sociale Zaken en Werkgelegenheid Noardwest Fryslân voor zover nodig, alle besluiten
      te nemen en andere rechtshandelingen te verrichten die noodzakelijk zijn ter
      behartiging van het in artikel 2 gestelde belang, tenzij een wettelijk voorschrift
      of de aard van de bevoegdheid zich hiertegen verzet.2. Het college van de centrumgemeente
      wordt machtiging verleend om namens de Dienst Sociale Zaken en Werkgelegenheid
      Noardwest Fryslân alle feitelijke handelingen te verrichten ter behartiging
      van het in artikel 2 gestelde belang.
