description:
  text: De GGD is de gezondheidsdienst van en voor de gemeenten Aalten, Apeldoorn,
    Berkelland, Bronckhorst, Brummen, Doetinchem, Elburg, Epe, Ermelo, Hattem, Harderwijk,
    Heerde, Lochem, Montferland, Nunspeet, Oldebroek, Oost Gelre, Oude IJsselstreek,
    Putten, Voorst, Winterswijk en Zutphen.De GGD biedt actief 'Een gezond houvast'
    en bewaakt, beschermt en bevordert de gezondheid van de inwoners van de regio
    Noord- en Oost-Gelderland.
  url: https://www.ggdnog.nl/over-de-ggd
