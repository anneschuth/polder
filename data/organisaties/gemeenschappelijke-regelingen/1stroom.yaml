description:
  text: 1Stroom is de (ambtelijke) organisatie die werkt voor de gemeenten Duiven
    en Westervoort. De gemeenten zijn elk zelfstandig, met een eigen gemeenteraad
    en college van burgemeester en wethouders. Ze maken zelf keuzes in waar geld in
    wordt geïnvesteerd en ze stellen beleid op.
  url: https://www.1stroom.nl/over+1stroom/default.aspx
