  bevoegdheden:
  - kop_artikel: Artikel 2 Toedeling bevoegdheden
    inhoud_artikel: 1. De colleges van burgemeester en wethouders van de gemeenten
      uit de regio mandateren de bevoegdheden op het gebied van uitvoeringsniveau
      1 (registratie, art. 19 Leerplichtwet 1969) die aan hen zijn toegekend in het
      kader van het toezicht op de naleving van de Leerplichtwet 1969 en de registratie
      van voortijdig schoolverlaters in het kader van de Regionale Meld- en Coördinatiefunctie
      aan het gemeenschappelijk orgaan. De gemeente Breda is de gemeente die de taken
      zal uitvoeren.2. De colleges van burgemeester en wethouders van de Niveau 2-gemeenten
      mandateren de bevoegdheden, conform uitvoeringsniveau 2 zoals beschreven in
      artikel 14, die aan hen zijn toegekend in het kader van het toezicht op de naleving
      van de Leerplichtwet 1969 aan het gemeenschappelijk orgaan. De gemeente Breda
      is de gemeente die de taken zal uitvoeren.3. De colleges van burgemeester en
      wethouders van de Niveau 2A-gemeenten mandateren de bevoegdheden, conform uitvoeringsniveau
      2A zoals beschreven in artikel 14, die aan hen zijn toegekend in het kader van
      het toezicht op de naleving van de Leerplichtwet 1969 aan het gemeenschappelijk
      orgaan. De gemeente Breda is de gemeente die de taken zal uitvoeren.4. De colleges
      van burgemeester en wethouders van de Niveau 2-gemeenten en de Niveau 2A-gemeenten
      staan toe dat het gemeenschappelijk orgaan voor de gemandateerde bevoegdheden
      ondermandaat verleent, met uitzondering van de bevoegdheid tot het aanwijzen
      van ambtenaren die toezien op de naleving van de Leerplichtwet 1969 en het wijzigen
      van de instructie leerplichtambtenaren en RMC-functionaris.5. De colleges van
      burgemeester en wethouders van de gemeenten uit de regio verlenen hierbij aan
      de door haar aangewezen portefeuillehouder, mandaat tot het nemen van besluiten
      met betrekking tot de taakuitvoering van het Programma Schoolverzuim en Voortijdig
      Schoolverlaten, e.e.a. binnen de dan geldende kaders en begroting, waarvan alleen
      gebruik gemaakt kan worden in het regionale portefeuillehoudersoverleg.
