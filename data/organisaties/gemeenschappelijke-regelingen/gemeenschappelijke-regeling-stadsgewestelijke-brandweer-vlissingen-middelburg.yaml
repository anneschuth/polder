  citeertitel: gemeenschappelijke regeling Stadsgewestelijke brandweer Vlissingen-Middelburg
  doel: Het openbaar lichaam heeft tot doel de behartiging van de volgende belangen:-
    het uitvoeren van brandweerzorg in de ruimste zin des woords binnen het stadsgewest.Ter
    uitvoering van het doel heeft het openbaar lichaam de volgende bevoegdheden:-
    het oprichten en beheren van een Stadsgewestelijke brandweerorganisatie.
