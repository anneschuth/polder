  bevoegdheden:
  - inhoud_artikel: "Artikel 2\tDoel en reikwijdte van de regeling1.\tDe Regeling\
      \ wordt getroffen ter behartiging van het belang van een goede uitvoering van\
      \ de gemeentelijke taken op het gebied van werk, inkomen en zorg.2.\tDe Uitvoeringsorganisatie\
      \ wordt belast met:a.\tBeleidsadvisering: op het gebied van werk en inkomen\
      \ (Participatiewet, IOAW, IOAZ, Bbz 2004, Sociale Werkvoorziening, bijzondere\
      \ bijstand en minimabeleid, Wet gemeentelijke schuldhulpverlening).b.\tUitvoerende\
      \ taken:I.\top het gebied van werk en inkomen (Participatiewet, IOAW, IOAZ,\
      \ Bbz 2004, bijzondere bijstand en minimabeleid);II.\tWet inburgeringIII.\t\
      Wet gemeentelijke schuldhulpverleningIV.\tWmo-loket Bloemendaal;V.\tRegeling\
      \ gehandicaptenparkeerkaart.c.\tDe backofficetaken voor de WMO 2015 en de Jeugdwet\
      \ zoals opgenomen in het jaarplan.d.\tHet leveren van een personele bijdrage\
      \ ten behoeve van het WMO-loket van  de gemeente Heemstede conform de afspraken\
      \ in het jaarplan.e.\tDe uitvoering van andere wetten, besluiten en regelingen\
      \ op het gebied van werk en inkomen waarvan de uitvoering aan de Gemeenten is\
      \ of wordt opgedragen.3.\tIn afwijking van het bepaalde in lid 2 onder e kunnen\
      \ de Gemeenten besluiten om de uitvoering van wetten, besluiten en regelingen\
      \ op het gebied van werk en inkomen, die in werking treden na het aangaan van\
      \ deze Regeling, niet onder te brengen bij de Uitvoeringsorganisatie.Artikel\
      \ 5 BeleidDe Uitvoeringsorganisatie verzorgt de beleidsvoorbereiding voor de\
      \ in artikel 2, lid 2, onderdeel a vermelde regelgeving. De bevoegdheid tot\
      \ het vaststellen van beleid blijft bij de deelnemende Gemeenten.Artikel 6 Jaarplan\
      \ en verantwoordingsinformatie1. Op voorstel van het hoofd van de Uitvoeringsorganisatie\
      \ stelt het portefeuillehoudersoverleg een Jaarplan vast.2. Vaststelling van\
      \ het Jaarplan vindt plaats vóór 31 december van het jaar, voorafgaand aan het\
      \ jaar waarop het plan betrekking heeft.3. Op basis van het Jaarplan levert\
      \ het hoofd van de Uitvoeringsorganisatie verantwoordingsinformatie aan de afdelingen\
      \ Welzijn van de deelnemende Gemeenten.4. De Uitvoeringsorganisatie levert aan\
      \ de deelnemende gemeenten: de rekening van de GR; de begroting, de voorjaarsnota\
      \ en najaarsnota van de GR (m.u.v. WMO en Jeugdwet) en de periodieke financiële\
      \ overzichten WMO en Jeugdwet. Er vindt intergemeentelijk afstemming plaats\
      \ over het moment van levering.5. De Uitvoeringsorganisatie levert aan de portefeuillehouders\
      \ van de deelnemende gemeenten: periodiek een inzage in de budgetontwikkelingen\
      \ van de Participatiewet, IOAW, IOAZ, bijzondere bijstand, minimabeleid en schuldhulp."
