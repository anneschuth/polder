description:
  text: GBTwente begon in 2009 als samenwerking (Gemeenschappelijke Regeling) op het
    gebied van gemeentelijke belastingen tussen de gemeenten Borne, Enschede en Hengelo.
    Het idee achter de samenwerking was om kennis te delen, kosten te besparen en
    kwetsbaarheid te verminderen. GBTwente is begonnen op de derde etage van het Stadskantoor
    in Hengelo en is sinds 1 mei 2019 gevestigd aan de Demmersweg 140 in Hengelo onder
    de huidige naam GBTwente.In 2011 trad de gemeente Losser toe aan de GR. Daarna
    volgden Haaksbergen (2012), Almelo (2013), Oldenzaal (2013) en Twenterand (2017).
    Sinds 2016 voert GBTwente ook werkzaamheden uit voor de gemeenten Berkelland en
    Bronckhorst. Dit gebeurt op basis van een fiscale overeenkomst tussen GBTwente
    en Berkelland en Bronckhorst. Deze gemeenten zijn dus niet aangesloten bij de
    Gemeenschappelijke Regeling (GR) met GBTwente zelf.GBTwente bepaalt inmiddels
    voor 10 gemeenten de WOZ-waarde en verzorgt het proces van heffen en innen van
    belastingen. Dat zijn Almelo, Berkelland, Borne, Bronckhorst, Enschede, Haaksbergen,
    Hengelo, Losser, Oldenzaal en Twenterand. In het hele verzorgingsgebied wonen
    meer dan een half miljoen inwoners voor wie GBTwente jaarlijks ruim 300.000 aanslagen
    verzorgt. Landelijk behoort GBTwente tot de vijf grootste belastingorganisaties
    en staat bekend als innovatief. Met ruim 100 medewerkers wil GBTwente belastingen
    de komende jaren begrijpelijk maken op een persoonlijke manier. Voor gemeenten,
    maar ook voor inwoners van die gemeenten. Daarmee verandert de rol van uitvoerend
    naar uitvoerend én adviserend, maar ook van kostenefficiënt naar kostenefficiënt
    én kwalitatief goed.
  url: https://gbtwente.nl/wie-we-zijn
