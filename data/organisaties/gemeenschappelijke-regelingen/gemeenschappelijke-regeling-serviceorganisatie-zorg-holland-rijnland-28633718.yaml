  bevoegdheden:
  - kop_artikel: Artikel 4. Taken en bevoegdheden
    inhoud_artikel: 4.1 Ter behartiging van de in artikel 3 genoemde belangen is de
      Serviceorganisatie Zorg Holland Rijnland belast met uitvoering van de volgende
      taken in het kader van de Jeugdwet:(a) ondersteuning bij de regionale inkoop
      en contractering van regionale jeugdhulp en gespecialiseerde jeugdhulp;(b) coördineren
      van regionale berichtgeving inzake regionale en gespecialiseerde jeugdhulp;(c)
      leveren van een bijdrage aan de optimalisering van de opgedragen uitvoeringsprocessen;(d)
      contractbeheer en contractmanagement;(e) afwikkelen van het opgedragen declaratie-
      en betalingsverkeer;(f) leveren van een bijdrage en advies bij de verantwoordingscyclus
      waaronder het genereren van adequate managementinformatie en informatie voor
      de planning en controlcyclus;(g) het op verzoek namens gemeenten optreden richting
      leveranciers om de voorwaarden en eisen, waaronder de overeenkomsten worden
      afgesloten te harmoniseren;(h) het archiveren op basis van de Archiefwet van
      alle relevante (contract)stukken inzake de in artikel 4.1 vermelde taken;(i)
      gevraagd en ongevraagd adviseren aan gemeenten over beleidsontwikkeling die
      de uitvoering betreffen;(j) en bovenstaande taken op gebied van Maatschappelijke
      Zorg als gemeenten daartoe besluiten.4.2 De colleges:(a) delegeren geen bevoegdheden
      aan het bestuur;(b) kunnen bevoegdheden voor de uitvoering van taken aan het
      bestuur en de secretaris-directeur in mandaat opdragen.4.3 In uitvoering van
      de haar opgelegde taken en bevoegdheden worden de bepalingen van het Samenwerkingshandvest
      Governance Jeugdhulp Holland Rijnland door de Serviceorganisatie in acht genomen.
