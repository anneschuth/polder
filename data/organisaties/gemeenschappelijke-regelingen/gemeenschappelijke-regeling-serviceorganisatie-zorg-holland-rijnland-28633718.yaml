  doel: De regeling behartigt de belangen van de deelnemers op het terrein van uitvoering
    van gemeentelijke inkoop en contractering in het kader van de Jeugdwet:(a) Regionale
    jeugdhulp in het gedwongen kader;(b) Gespecialiseerde jeugdhulp;(c) Maatschappelijke
    Zorg als deelnemers daartoe besluiten.
