  doel: De regeling wordt getroffen met het doel de belangen van de Minister en het
    college bij alle aangelegenheden betreffende de archiefbescheiden, collecties,
    individuele documenten en dergelijke die berusten in de rijksarchiefbewaarplaats
    in de provincie en de archiefbewaarplaats van de gemeente, in gezamenlijkheid
    te behartigen.
