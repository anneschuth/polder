description:
  text: Gezond zijn is meer dan niet ziek zijn. Gezond zijn is ook meedoen in de maatschappij,
    sociale contacten hebben en een gevoel van controle over je eigen leven kunnen
    ervaren. Het motto van GGD Groningen, de Gemeentelijke Gezondheidsdienst, is ‘Samen
    werken aan gezondheid’.Zo’n 500 GGD-professionals werken dagelijks aan de gezondheid,
    het welzijn en de veiligheid van alle inwoners van de provincie Groningen. Dit
    doen wij namens alle Groninger gemeenten. Preventie en positieve gezondheid zijn
    daarbij belangrijke aandachtspunten.
