  citeertitel: Gemeenschappelijke regeling ROGplus Nieuwe Waterweg Noord
  doel: Deze regeling is door de colleges getroffen voor een kwalitatief hoogwaardige,
    effectieve en efficiënte uitvoering van in ieder geval de maatwerkvoorzieningen
    op grond van de Wmo2015, dan wel voor andere taken in het sociaal domein die de
    deelnemende colleges, met toestemming van de raden, aan het gemeenschappelijk
    orgaan op- dan wel overdragen.
