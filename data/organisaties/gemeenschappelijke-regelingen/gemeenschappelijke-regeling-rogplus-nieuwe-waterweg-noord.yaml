  bevoegdheden:
  - kop_artikel: Artikel 4 Overdracht van taken en bevoegdheden
    inhoud_artikel: 1. De colleges dragen aan het gemeenschappelijk orgaan al hun
      op grond van de Verordening zoals vermeld in artikel 1, onder l van deze regeling,
      toekomende taken en bevoegdheden over.2. Tot de bevoegdheden zoals vermeld in
      het voorgaande lid worden ook gerekend het behandelen van en beslissen op bezwaarschriften
      en het voorbereiden en vaststellen van beleid aangaande de uitvoering van de
      overgedragen taken en bevoegdheden.3. Indien er sprake is van opdracht dan wel
      overdracht van overige taken en bevoegdheden, zoals bedoeld in het voorgaande
      artikel, gebeurt dat bij afzonderlijk collegebesluit. Deze besluiten worden
      als bijlage aan deze regeling gehecht.4. Een college kan de besluiten, zoals
      vermeld in het voorgaande lid, nemen op een zelf te bepalen prioriteit en tijdstip.
