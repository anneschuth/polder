  bevoegdheden:
  - kop_artikel: artikel 9 Bevoegdheden Algemeen Bestuur, artikel 13  Taken en bevoegdheden
      Dagelijks Bestuur
    inhoud_artikel: "Artikel 9 Bevoegdheden Algemeen Bestuur1.\tAlle bevoegdheden\
      \ die niet bij of krachtens de wet of deze regeling aan een ander bestuursorgaan\
      \ zijn opgedragen, komen toe aan het Algemeen bestuur.2.\tHet Algemeen bestuur\
      \ kan besluiten tot oprichting van of deelneming in stichtingen, maatschappen,\
      \ vennootschappen, verenigingen, coöperaties en onderlinge waarborgmaatschappijen.\
      \ Het Algemeen bestuur neemt daarbij het bepaalde in artikel 31a van de Wet\
      \ in acht.3.\tHet Algemeen bestuur kan aan het Dagelijks bestuur bevoegdheden\
      \ overdragen, tenzij de aard van de bevoegdheid zich daartegen verzet. De volgende\
      \ bevoegdheden worden in ieder geval niet overgedragen:a.\tde bevoegdheden als\
      \ bedoeld in artikel 33a lid 2 van de Wet;b.\thet vaststellen, wijzigen of intrekken\
      \ van algemeen verbindende voorschriften;c.\thet wijzigen van deze regeling;e.\t\
      het vaststellen van tarieven;f.\thet doen van uitgaven voordat de begroting\
      \ of begrotingswijziging die dat mogelijk maakt, is vastgesteld.Artikel 13\t\
      Taken en bevoegdheden Dagelijks bestuur1.\tHet Dagelijks bestuur oefent de taken\
      \ en bevoegdheden uit als bedoeld in artikel 33b van de Wet.2.\tDaarnaast is\
      \ het Dagelijks bestuur belast met:a.\thet benoemen, schorsen en ontslaan van\
      \ ambtenaren, voor zover in deze gemeenschappelijke regeling niet anders wordt\
      \ bepaald;b.\thet voorstaan van de belangen van GGD Drenthe bij andere overheden,\
      \ instellingen of personen, waarmee contact voor GGD Drenthe van belang is;c.\t\
      de zorg voor het beheer van inkomsten en uitgaven van GGD Drenthe;d.\tde zorg,\
      \ voor zover deze niet aan anderen toekomt, voor de controle op het geldelijk\
      \ beheer en de boekhouding;e.\thet houden van toezicht op alles wat GGD Drenthe\
      \ aangaat;f.\tde zorg voor de archiefbescheiden van GGD Drenthe en haar organen."
