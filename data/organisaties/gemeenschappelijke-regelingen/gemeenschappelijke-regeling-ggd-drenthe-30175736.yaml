gr_meta:
  citeertitel: Gemeenschappelijke regeling GGD Drenthe
  doel: 'GGGD Drenthe is ingesteld voor de gezamenlijke behartiging van de belangen
    van de Gemeenten op het gebied van onder andere de publieke gezondheid en sociale
    veiligheid, de geneeskundige hulpverlening bij ongevallen en rampen en lijkbezorging.
    Een en ander met inachtneming van wat in deze regeling is bepaald met betrekking
    tot de taken en bevoegdheden van GGD Drenthe3 Het begrip ''additionele taak''
    is bewust niet gedefinieerd. Dit geeft het algemeen bestuur de mogelijkheid om
    producten uitdrukkelijk als additionele taak te benoemen. Maar het is ook mogelijk
    om dit begrip een louter financiële betekenis te geven, bijvoorbeeld door als
    additionele taak te benoemen: elk product waarvoor betaald wordt buiten de inwonersbijdrage.'
