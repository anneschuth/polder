  valid_from: '2024-01-01'
gr_meta:
  doel: De regeling beoogt het doeltreffend en doelmatig in samenwerking uitvoeren
    of doen uitvoeren van (een deel van) de taken en bevoegdheden van de colleges
    op het gebied van Beschermd Wonen en mogelijk op andere aanverwante beleidsterreinen
    voor zover deze taken op grond van artikel 10 aan het GO Beschermd Wonen zijn
    opgedragen.
