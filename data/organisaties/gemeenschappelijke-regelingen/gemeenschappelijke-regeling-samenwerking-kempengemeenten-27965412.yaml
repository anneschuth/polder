gr_meta:
  citeertitel: Gemeenschappelijke Regeling Samenwerking Kempengemeenten
  doel: De regeling wordt getroffen ter gezamenlijke behartiging van de afzonderlijke
    en gemeenschappelijke belangen van de bestuursorganen op het gebied van:a. Informatie
    en communicatie technologie, waaronder Samenwerking geografische informatievoor-ziening
    (SSC);b. De Wmo, Wet gemeentelijke schuldhulpverlening, Jeugdwet, minimaregelingen
    en bijzondere bijstand op grond van de Participatiewet (MD);c. Personeel & Organisatie
    (P&O);d. Jeugdhulp (JH), ene. Vergunningverlening, toezicht en handhaving (VTH).
