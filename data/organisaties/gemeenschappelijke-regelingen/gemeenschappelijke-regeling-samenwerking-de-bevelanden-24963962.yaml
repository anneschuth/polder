  bevoegdheden:
  - kop_artikel: Artikel 5 Taakvelden, taken en bevoegdheden
    inhoud_artikel: 1. De behartiging van de in artikel 4 bedoelde belangen heeft
      betrekking op de volgende taakvelden:a. samenwerking op het gebied van ICTb.
      samenwerking op het gebied van informatievoorziening;c. samenwerking ten aanzien
      van P&O en salarisadministratie;d. samenwerking op het gebied van werk, zorg
      en inkomen.2. Ter uitvoering van de in het eerste lid genoemde taakvelden worden
      de navolgende taken en bevoegdheden overgedragen aan het dagelijks bestuur van
      de regeling.
