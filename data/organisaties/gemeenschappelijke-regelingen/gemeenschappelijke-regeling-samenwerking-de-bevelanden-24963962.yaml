gr_meta:
  citeertitel: gemeenschappelijke regeling Samenwerking De Bevelanden
  doel: '1. De regeling bevordert een duurzame, robuuste samenwerking met flexibiliteit
    binnen geldende marges door het behartigen van de gemeenschappelijke belangen
    van de gemeenten, het vergroten van het gemeenschappelijke kennisniveau en het
    inspelen op dwingende, bestuurlijke en maatschappelijke ontwikkelingen die op
    termijn de bestuurskracht van de individuele gemeenten sterk zullen beïnvloeden,
    met het doel: het vergroten van de bestuurskracht, met behoud van de huidige bestuurlijke
    schaal, door bundeling van ambtelijke expertise op operationeel, tactisch en/of
    strategisch niveau met als resultaat: verhoogde kwaliteit, continuïteit en efficiëntie.2.
    De regeling behartigt de gemeenschappelijke belangen van de gemeenten.'
