description:
  text: De gemeenten Hattem, Heerde en Oldebroek (H2O) hebben een Bedrijfsvoeringsorganisatie
    H2O opgericht, de i-Dienst. De gemeenschappelijke serviceorganisatie i-Dienst
    verzorgt de automatisering voor de H2O-gemeenten. Ze biedt werkplek ondersteuning
    aan de circa 800 medewerkers op 10 verschillende locaties. De i-Dienst is gevestigd
    in het Stadhuis van de gemeente Hattem.De basisdiensten die de i-Dienst voor de
    H2O-gemeenten uitvoert zijn- Systeembeheer van ICT-middelen;- Netwerkbeheer van
    ICT-infrastructuur;- ICT-apparatenbeheer;- Beheer kantoorautomatisering;- (Skilled)
    ICT Servicedesk;- ICT-architectuur;- Informatiebeveiliging;- ICT-advies en -beleidsvoorbereiding.
  url: https://i-dienst.nl
