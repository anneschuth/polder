  bevoegdheden:
  - kop_artikel: Artikel 5
    inhoud_artikel: 1. Alle  bevoegdheden  van  de  besturen  der  deelnemende gemeenten
      tot  het  vervullen  van de  in  artikel  4  genoemde  taak,  komen  toe  aan  het  bestuur  van  het  werkvoorzieningsschap.2.
      Waar in deze regeling artikelen van de gemeentewet of van enige andere wet of
      wettelijke regeling van overeenkomstige toepassing worden verklaard, treden
      in die artikelen in de plaats van de gemeente, de raad, burgemeester en wethouders
      en de burgemeester, onderscheidenlijk  het  werkvoorzieningsschap,  het  algemeen  bestuur,  het  dagelijks  bestuur
      en de voorzitter.
