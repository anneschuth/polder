  bevoegdheden:
  - kop_artikel: Register van gemeenschappelijke regelingen Provincie Zeeland
    inhoud_artikel: De bevoegdheden die bij de regeling dan wel, met toepassing van
      artikel 10, tweede lid, tweede volzin, Wgr krachtens de regeling zijn overgedragen;
      Bij de gemeenschappelijke regeling Europese Gemeenschap voor Territoriale Samenwerking
      is een openbaar lichaam ingesteld dat de bevoegdheden bezit om aan het aan het
      maatschappelijk rechtsverkeer deel te kunnen nemen. De EGTS beschikt overeenkomstig
      artikel 1 van de Verordening over rechtspersoonlijkheid en over de ruimste handelingsbekwaamheid
      die in de nationale wetgeving van die lidstaat aan rechtspersonen wordt toegekend.
      Krachtens de verordening kan zij met name roerende en onroerende goederen verkrijgen
      of vervreemden, personeel in dienst nemen en in rechte optreden.
