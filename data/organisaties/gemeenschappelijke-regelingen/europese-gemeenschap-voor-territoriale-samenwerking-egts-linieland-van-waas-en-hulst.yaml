  valid_from: '2011-06-15'
gr_meta:
  doel: De EGTS heeft tot doel om het grensoverschrijdende overleg en de grensoverschrijdendesamenwerking
    tussen de deelnemers in het kader van de ontwikkelingsvisie Linieland vanWaas
    en Hulst te bevorderen en te ondersteunen in het bijzonder door het opstarten
    enuitvoeren van samenwerkingsprojecten op de in de visie vermelde terreinen te
    wetenhaven en economie, mobiliteit, natuur en recreatie en wonen en leefbaarheid.
