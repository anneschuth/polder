  bevoegdheden:
  - kop_artikel: 'Artikel 4: Taken en bevoegdheden'
    inhoud_artikel: 1. Ter verwezenlijking van het doel worden in ieder geval, met
      inachtneming van het bepaalde in wettelijke voorschriften en deze regeling,
      de in artikel 5 genoemde taken verricht.2. Het lichaam heeft de bevoegdheid
      om, in het belang van het in artikel 3 gestelde doel, deel te nemen aan gemeenschappelijke
      regelingen en privaatrechtelijke rechtspersonen op te richten.3. Het lichaam
      is bevoegd, in het kader van het in artikel 3 gestelde doel, tot het op verzoek
      van één of meerdere deelnemers en/of derden verrichten van diensten.4. Een besluit
      tot dienstverlening als bedoeld in lid 3 kan genomen worden indien en voor zover:a.
      de dienstverlening redelijkerwijs aansluit bij de in artikel 5 genoemde taak;b.
      de uitvoering plaatsvindt tegen minimaal kostendekkende tarieven, behoudens
      bijzondere omstandigheden ter beoordeling aan het Dagelijks Bestuur;c. uitvoering
      zoveel als mogelijk plaatsvindt op basis van een schriftelijke overeenkomst.
