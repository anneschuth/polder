description:
  text: Werkzaak Rivierenland werkt voor 8 gemeenten in de regio Rivierenland. Wij
    voeren de Participatiewet en de Wet sociale werkvoorziening uit. Werkzaak Rivierenland
    begeleidt mensen bij het vinden van werk en biedt inkomensondersteuning. Ook adviseren
    wij werkgevers over personeelsoplossingen en subsidies en zij kunnen werk aan
    ons uitbesteden.
