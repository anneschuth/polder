gr_meta:
  citeertitel: Gemeenschappelijke Regeling Diamant-groep
  doel: De Diamant-groep behartigt de gemeenschappelijke belangen van de deelnemende
    gemeenten op het gebied van sociale werkvoorziening.De Diamant-groep kan de gemeenschappelijke
    belangen van de deelnemende gemeenten op het gebied van andere vormen van gesubsidieerde
    arbeid anders dan op het gebied van sociale werkvoorziening behartigen.
