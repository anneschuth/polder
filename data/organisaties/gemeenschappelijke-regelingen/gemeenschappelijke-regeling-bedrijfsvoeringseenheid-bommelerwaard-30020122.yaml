  citeertitel: Gemeenschappelijke Regeling Bedrijfsvoeringseenheid Bommelerwaard
  doel: De regeling is getroffen voor gemeenschappelijke behartiging van de belangen
    van de deelnemers in het kader van de uitvoering van hun bedrijfsvoeringstaken.
    De doelstelling is om gezamenlijke voordelen te realiseren door:-de kwaliteit
    te verhogen;-de kwetsbaarheid te verminderen;-kosten te beheersen en, zo mogelijk,
    te verlagen.
