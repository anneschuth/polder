  citeertitel: Gemeenschappelijke regeling Recreatieschap Hitland
  doel: Het recreatieschap heeft tot taak het in onderlinge samenhang behartigen van
    het gemeenschappelijk belang van de deelnemende gemeenten voor wat betreft natuur
    en landschap, de ontsluiting, de ontwikkeling, de aanleg en het beheer in het
    kader van de openluchtrecreatie en het toerisme en het behouden en recreatief
    ontsluiten van het agrarisch open middengebied in het gebied.
