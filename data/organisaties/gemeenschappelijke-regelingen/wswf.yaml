  valid_from: '1900-01-01'
description:
  text: WerkSaam Westfriesland staat voor werk, ontwikkeling en inkomen. Wij helpen
    mensen met een afstand tot de arbeidsmarkt op weg naar werk. Dit zijn mensen die
    geen baan hebben en zonder hulp ook moeilijk een baan vinden. Zolang werken nog
    een stap te ver is, zorgen wij voor inkomensondersteuning. Wij werken voor de
    inwoners van de zeven West-Friese gemeenten. Het talent van de werkzoekende en
    de wens van de werkgever zijn voor ons het belangrijkste.
  url: https://www.werksaamwf.nl/over-werksaam/wie-we-zijn/over-werksaam-westfriesland
