gr_meta:
  citeertitel: MGR Rijk van Nijmegen
  doel: 1. Het samenwerkingsverband wordt ingesteld om de belangen van de deelnemende
    gemeenten te behartigen; meer in het bijzonder op het gebied van werk, inkomen,
    zorg, welzijn, inkoop en ICT.2. Het samenwerkingsverband wordt ingesteld om de
    belangen van de deelnemende gemeenten te behartigen op het gebied van regionale
    afstemming en regionale samenwerking.
