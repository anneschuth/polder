  bevoegdheden:
  - inhoud_artikel: Artikel 4a Overdragen bevoegdheden1. Ter verwezenlijking van de
      in artikel 4 lid 1 van de Regeling bedoelde taken worden de bevoegdheden inzake
      de bedrijfsvoering van een ambtelijke organisatie, waaronder mede wordt verstaan
      het inrichten, het organiseren en het aansturen van een ambtelijk apparaat,
      overgedragen aan het Dagelijks Bestuur van het Openbaar lichaam.2. De gemeentesecretaris
      respectievelijk de bestuursadviseur maken geen deel uit van de ambtelijke organisatie
      als bedoeld in het vorige lid.Artikel 5 Bevoegdheidstoedeling1. De daartoe bevoegde
      bestuursorganen van de deelnemers zullen daarnaast in afzonderlijke mandaat-
      en volmachtbesluiten bepalen, welke bevoegdheden - noodzakelijk voor de uitvoering
      van de in artikel 4, lid 1 van de Regeling bedoelde taken - worden verleend
      aan de overeenkomstige bestuursorganen, de Algemeen Directeur en overigen binnen
      het Openbaar Lichaam. Ondermandaat is mogelijk.
