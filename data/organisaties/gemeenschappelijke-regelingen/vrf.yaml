description:
  text: De regio heeft tot doel het behartigen van de gemeenschappelijke belangen
    van de gemeenten op deterreinen van:a. publieke gezondheidszorgb. brandweerzorgc.
    geneeskundige hulpverlening bij ongevallen en rampend. rampenbestrijding en crisisbeheersinge.
    het bevorderen van de multidisciplinaire samenwerking en de coördinatie in de
    uitvoering vanrampenbestrijding en crisisbeheersingf. het in stand houden en beheren
    van de meldkamerfunctieg. het zijn van een platform voor samenwerking voor aan
    hulpverlening gelieerde diensten, partnersdan wel organisaties en andere openbare
    lichamen.
  url: https://www.veiligheidsregiofryslan.nl/over-veiligheidsregio-frysl%C3%A2n/hoe-ziet-onze-organisatie-eruit/
