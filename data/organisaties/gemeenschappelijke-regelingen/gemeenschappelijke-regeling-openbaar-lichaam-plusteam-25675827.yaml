  bevoegdheden:
  - kop_artikel: Artikel 7 Bevoegdheden Algemeen Bestuur
    inhoud_artikel: 1. Tot de taken van het Algemeen bestuur (AB) behoort in ieder
      geval;a. een voortdurend toezicht op al wat het Plusteam aangaat;b. vaststelling
      van het organisatiebesluit;c. vaststelling van de begroting dan wel wijzigingen
      daarvan;d. vaststelling van de rekening;e. vaststelling of wijziging van de
      rechtspositionele regelingen van het personeel van het openbaar lichaam;f. de
      vaststelling van het liquidatieplan;g.besluiten omtrent conflicten tussen DB
      en secretaris.Over deze zaken moet, behoudens wat betreft g, in een openbare
      vergadering worden beraadslaagd en besloten.2. Het AB is niet bevoegd belastingen
      te heffen of anderszins algemeen verbindende voorschriften en/of beleidsregels
      te geven.
