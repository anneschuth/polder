  bevoegdheden:
  - kop_artikel: 'Artikel 5: Taken en bevoegdheden'
    inhoud_artikel: 1. Ter verwezenlijking van de in artikel 4 genoemde gemeenschappelijke
      belangen is door de gemeenten aan Kompas opgedragen de volledige verantwoordelijkheid
      voor de uitvoering van de taken en bevoegdheden op grond van en krachtens de
      na te melden wetten en regelingen.A. De Participatiewet, de Invoeringswet Participatiewet
      en andere sociale zekerheidswetten waarvan de uitvoering aan gemeenten, al dan
      niet in medebewind, is opgedragen, voor zover de uitvoering daarvan niet reeds
      is ondergebracht bij andere organisaties;B. De Algemene Bijstandswet (Awb, voor
      zover nog van toepassing ), het Besluit bijstandsverlening zelfstandigen 2004
      (voor zover nog van toepassing), de Wet Inkomensvoorziening oudere en gedeeltelijk
      arbeidsongeschikte werkloze werknemers (IOAW), de Wet Inkomensvoorziening oudere
      en gedeeltelijk arbeidsongeschikte gewezen zelfstandigen (IOAZ), de Wet schuldhulpverlening,
      de Wet inburgering (Wi) en de Wet Participatiebudget;C. De uitvoering van de
      algemene maatregelen van bestuur, uitvoeringsregelingen van de genoemde wetten
      en andere taken op het gebied van sociale zekerheid , voortvloeiende uit gemeentelijke,
      zowel autonome als in medebewind tot stand gekomen, verordeningen, alsmede beleidsplannen
      in het kader van het gemeentelijke minimabeleid.D. Kompas is bij de uitvoering
      van deze taken gebonden aan het door de gemeenten ingevolge artikel 20 vastgestelde
      beleidsplan.2. De taken onder het eerste lid vermeld vormen het basispakket3.
      De gemeenten kunnen Kompas belasten met de uitvoering van andere taken, waartoe
      de opdracht door de aangesloten gemeenten mogelijk is.4. Kompas verleent alleen
      diensten aan gemeenten en andere organisaties buiten het in artikel 2 lid 2
      genoemde rechtsgebied als het algemeen bestuur hiermee instemt. De diensten
      worden verleend tegen een vooraf overeengekomen prijs. Verschuldigde BTW wordt
      apart in rekening gebracht.5. De taken genoemd onder lid 1 worden zoveel mogelijk
      uitgevoerd in samenwerking met het UWV, organisaties van zorginstellingen en
      instanties die met de uitvoering van sociale zekerheidswetten zijn belast.6.
      De gemeenten verlenen hun medewerking aan de uitvoering van besluiten die het
      bestuur van Kompas neemt binnen de aan het bestuur toegekende bevoegdheden.7.
      Als de gemeente, naar het oordeel van het bestuur, de in lid 6 bedoelde medewerking
      niet of niet in voldoende mate verleent, kan het bestuur namens of ten laste
      van de betrokken gemeente een besluit uitvoeren of laten uitvoeren.8. Alvorens
      over te gaan tot toepassing van lid 7, stelt het bestuur het gemeentebestuur
      van de betrokken gemeente daarvan in kennis.9. Mocht enige in het eerste lid
      genoemde wet of regeling op enig moment vervangen worden door een andere, gelijksoortige
      wet, dan treedt deze in de plaats van de aldaar genoemde wet of regeling. Daartoe
      is geen wijziging van deze gemeenschappelijke regeling noodzakelijk.
