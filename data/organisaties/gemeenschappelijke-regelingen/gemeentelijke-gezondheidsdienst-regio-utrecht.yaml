description:
  text: GGD regio Utrecht is de gemeentelijke gezondheidsdienst van de 26 gemeenten
    in de regio Utrecht. ‘Gezondheid’ en 'preventie’ zijn dé sleutelwoorden in alles
    wat wij doen. Vanuit onze brede (sociaal medische) ervaring en deskundigheid bevorderen
    én beschermen we de gezondheid van alle inwoners.
