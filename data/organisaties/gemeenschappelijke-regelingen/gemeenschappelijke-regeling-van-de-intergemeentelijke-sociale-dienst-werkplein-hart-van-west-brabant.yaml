  citeertitel: Gemeenschappelijke regeling van de Intergemeentelijke Sociale Dienst
    Werkplein Hart van West-Brabant
  doel: Het Werkplein Hart van West-Brabant behartigt de belangen van de deelnemers
    op het gebied van de aan deze gemeenten in medebewind opgedragen wetgeving inzake
    werk en inkomen.Het Werkplein Hart van West-Brabant zorgt voor een rechtmatige,
    cliëntgerichte, efficiënte en effectieve uitvoering van de Wet werk en bijstand
    en aanverwante wetten en regelingen.
