  bevoegdheden:
  - kop_artikel: 'Artikel 5: Taken en bevoegdheden'
    inhoud_artikel: 1. De colleges van burgemeester en wethouders van de deelnemende
      gemeenten dragen hun taken en bevoegdheden over die bij of krachtens de wet,
      waaronder artikel 160 lid 1 sub a aan hen zijnopgedragen, om het doel verwoord
      in artikel 3, het garanderen van de continuïteit en kwalitatiefadequate dienstverlening
      op het terrein van ICT van deze regeling te verwezenlijken. Hetzelfde geldtvoor
      de bevoegdheden toegekend aan het bestuur van de RDWI in de regeling van de
      RDWI.2. De RID verleent, onverminderd het bepaalde in lid 1, alleen diensten
      aan organisaties binnen het in artikel 2 genoemde rechtsgebied. Met instemming
      van het algemeen bestuur kunnen ook diensten worden aangeboden aan organisaties
      buiten het in dit artikel genoemde rechtsgebied en op grond van artikel 26 van
      deze regeling toe mogen treden.3. De RID kan op verzoek, indien het algemeen
      bestuur hiertoe besluit, binnen de gedelegeerde bevoegdheden, nader te omschrijven
      taken gaan uitvoeren. Een besluit hiertoe vermeldt alsdan de wijze van kostenverrekening
      en overige voorwaarden waaronder deze taken worden uitgevoerd.
