  bevoegdheden:
  - kop_artikel: Artikel 2b Taken en bevoegdheden
    inhoud_artikel: 1.    Aan het bestuur van het Brabants Historisch Informatie Centrum
      zijn de navolgende werkzaamheden, taken en bevoegdhedenvan de colleges, de algemene
      en dagelijkse besturen van de waterschappen en de minister overgedragen:a.    de
      beheerstaken, te onderscheiden in het behouden, bewerken en benutten van de
      archiefbescheiden die berusten in de in artikel2, eerste lid, genoemde archiefbewaarplaatsen;b.    de
      taken en bevoegdheden, bedoeld in de artikelen 15, derde lid, 16, tweede lid,
      17, 18, 19, 20, 31 en 32, eerste en derde lid, vande Archiefwet 1995;c.    de
      bevoegdheid van de minister om op grond van de artikelen 25 en 26, tweede lid,
      van de Archiefwet 1995 de rijksarchivaris inde provincie te benoemen, te schorsen
      en te ontslaan;d.    het adviseren en het doen van voorstellen aan de minister,
      de colleges en de algemene en dagelijkse besturen van dewaterschappen over de
      taken en bevoegdheden, die door de minister, de colleges of de algemene en dagelijkse
      besturen van dewaterschappen worden uitgevoerd ingevolge de artikelen 5, 6,
      7, 8, 12, 13, 15, eerste en tweede lid, 30 en 32, tweede lid, van deArchiefwet
      1995, ene.    het verrichten van door de minister, de colleges of de algemene
      en dagelijkse besturen van de waterschappen opgedragen anderetaken die verband
      houden met de behartiging van de belangen, bedoeld in artikel 2.2.    Het Brabants
      Historisch Informatie Centrum stelt zich tevens ten doel het bij de in artikel
      2, eerste lid, genoemdearchiefbewaarplaatsen ondergebrachte cultuurhistorisch
      erfgoed toegankelijk te maken voor en onder de aandacht te brengenvan een breed
      publiek.
