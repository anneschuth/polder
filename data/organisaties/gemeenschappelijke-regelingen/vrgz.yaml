description:
  text: De Veiligheidsregio Gelderland-Zuid (VRGZ) is een organisatie voor brandweerzorg,
    geneeskundige hulpverlening en voorbereiding en coördinatie op het gebied van
    rampenbestrijding en crisisbeheersing. De VRGZ is een van de 25 veiligheidsregio's
    in Nederland.De VRGZ draagt bij aan een veilige regio. Hier worden rampen en crises
    zo goed mogelijk voorkomen en bestreden. In onze regio kunnen de inwoners rekenen
    op snelle en goede hulpverlening en brandweerzorg. Dit doet de VRGZ samen met
    de 14 gemeenten, de politie en andere lokale, regionale en landelijke partijen.De
    veiligheidsregio kent de sectoren brandweerzorg, ambulancezorg, meldkamer, crisisbeheersing
    en bedrijfsvoering.
