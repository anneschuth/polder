description:
  text: ODRA is een gemeenschappelijke regeling waarin onze opdrachtgevers als eigenaren
    deelnemen en samenwerken. Onze organisatie staat voor de uitvoering van zogenaamde
    VTH-taken op het gebied van milieu en bouw. Vergunningverlening, toezicht en handhaving
    zijn onze kerntaken. Ook verzorgt ODRA juridische ondersteuning en specialistische
    advisering. Onder meer op het gebied van geluid, licht, omgevingsveiligheid en
    milieumetingen.De eigenaren van de gemeenschappelijke regeling zijn tien gemeenten
    uit de Provincie Gelderland en de Provincie Gelderland samen. Iedere deelnemer
    is als eigenaar vertegenwoordigt in ons Algemeen Bestuur.
