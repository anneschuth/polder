gr_meta:
  citeertitel: Gemeenschappelijke regeling Recreatieschap Twiske-Waterland
  doel: Deze regeling heeft ten doel binnen een gebied, als aangegeven op de bij dezeregeling
    behorende en als zodanig gewaarmerkte tekening:a. het bevorderen van een evenwichtige
    ontwikkeling in de openluchtrecreatie;b. in samenhang met het vorenstaande tot
    stand brengen en bewaren van eenevenwichtig natuurlijk milieuc. het tot stand
    brengen en duurzaam in stand houden van het specifiek engedifferentieerde karakter
    van het landschap door bescherming, ontwikkelingen consolidatie van de waarden
    die het in zich draagt.
