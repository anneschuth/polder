  bevoegdheden:
  - kop_artikel: Artikel 4.2 Bevoegdheden
    inhoud_artikel: 1. Het algemeen bestuur is bevoegd tot alle daden van regeling
      en bestuur nodig voor de behartiging van het belang van deze regeling en de
      uitoefening van de bevoegdheden van het openbaar lichaam.2. Alle bevoegdheden
      in het kader van deze regeling, die niet aan een ander bestuursorgaan zijn opgedragen
      behoren toe aan het algemeen bestuur.3. Het algemeen bestuur kan aan het dagelijks
      bestuur bevoegdheden overdragen, tenzij de aard van de bevoegdheid zich daartegen
      verzet.4. Het algemeen bestuur kan in ieder geval niet overdragen de bevoegdheid
      tot:a. het vaststellen en wijzigen van het Regionaal Risicoprofiel, het Regionaal
      Beleidsplan en het Regionaal Crisisplan;b. het vaststellen en wijzigen van de
      begroting;c. het vaststellen van de bestuursrapportages en de jaarrekening;d.
      het vaststellen, wijzigen of intrekken van verordeningen door strafbepalingen
      of bestuursdwang te handhaven;e. het oprichten of deelnemen in stichtingen,
      maatschappen, vennootschappen en coöperatieve en andere verenigingen, dan wel
      het ontbinden daarvan of het beëindigen van deelneming daaraan.f. het toetreden
      tot, uittreden uit of wijzigen van de gemeenschappelijke regeling overeenkomstig
      het gestelde in hoofdstuk 12.5. Het algemeen bestuur besluit slechts tot de
      oprichting van en de deelneming in stichtingen, maatschappen, vennootschappen,
      verenigingen, coöperaties en onderlinge waarborgmaatschappijen, indien de regeling
      in deze mogelijkheid voorziet en dat in het bijzonder aangewezen moet worden
      geacht voor de behartiging van het daarmee te dienen openbaar belang.6. Het
      besluit zoals bedoeld in lid 5 wordt niet genomen dan nadat de gemeenteraden
      van de deelnemende gemeenten een ontwerpbesluit is toegezonden en in de gelegenheid
      zijn gesteld hun wensen en bedenkingen ter kennis van het algemeen bestuur te
      brengen.7. Het algemeen bestuur stelt een reglement van orde vast.
  - kop_artikel: Artikel 5.3 Bevoegdheden
    inhoud_artikel: 1. Het dagelijks bestuur is belast met en bevoegd tot:a. het voeren
      van het dagelijks bestuur van het openbaar lichaam, voor zover niet bij of krachtens
      de wet of de regeling het algemeen bestuur hiermee is belast;b. het voorbereiden
      en uitvoeren van beslissingen van het algemeen bestuur;c. het vaststellen van
      regels over de ambtelijke organisatie van het openbaar lichaam;d. het benoemen,
      schorsen en ontslaan van ambtenaren;e. het nemen van besluiten tot privaatrechtelijke
      rechtshandelingen, met uitzondering van privaatrechtelijke rechtshandelingen
      als bedoeld in artikel 31a van de wet;f. het nemen van besluiten namens het
      openbaar lichaam, het dagelijks bestuur, of het algemeen bestuur rechtsgedingen,
      bezwaarprocedures of administratief beroepsprocedures te voeren of handelingen
      ter voorbereiding daarop te verrichten, tenzij het algemeen bestuur, voor zover
      het het bestuur aangaat, in voorkomende gevallen anders beslist;g. het nemen,
      ook alvorens besloten is tot het voeren van een rechtsgeding, van alle conservatoire
      maatregelen en het doen wat nodig is ter voorkoming van verjaring of verlies
      van recht of bezit;h. het voorstaan van de belangen van de veiligheidsregio
      bij andere overheden, instellingen of personen, waarmee contact voor de veiligheidsregio
      van belang is;i. de zorg voor het beheer van inkomsten en uitgaven van de veiligheidsregio;j.
      de zorg, voor zover deze niet aan anderen toekomt, voor de controle op het geldelijk
      beheer en de boekhouding;k. het houden van toezicht op alles wat de veiligheidsregio
      aangaat;l. de zorg voor de archiefbescheiden van de veiligheidsregio en haar
      organen.2. Het dagelijks bestuur oefent verder, voor zover het algemeen bestuur
      daartoe besluit, de aan het algemeen bestuur wettelijke toegekende of krachtens
      deze regeling toevallende bevoegdheden uit.3. Het algemeen bestuur kan regels
      stellen inzake de wijze waarop het dagelijks bestuur de aan hem toegewezen taken
      uitvoert en bevoegdheden uitoefent.4. Het dagelijks bestuur kan een of meer
      leden van het dagelijks bestuur machtigen tot uitoefening van een of meer van
      zijn bevoegdheden, tenzij de regeling waarop de bevoegdheid steunt zich daartegen
      verzet.
