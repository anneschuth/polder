gr_meta:
  citeertitel: Gemeenschappelijke regeling Veiligheidsregio Brabant-Noord 2017
  doel: De Veiligheidsregio Brabant-Noord behartigt het belang van een doelmatig georganiseerde
    en gecoördineerde, waar mogelijk integrale, uitvoering van de hulpverlening in
    het werkgebied alsmede de voorbereiding daarop.De veiligheidsregio behartigt daartoe
    de belangen van de deelnemende partijen op de volgende terreinen:a) brandweerzorg;b)
    geneeskundige hulpverlening;c) rampenbestrijding en crisisbeheersing;d) het voorzien
    in een gemeenschappelijke meldkamer;e) bevolkingszorg.
