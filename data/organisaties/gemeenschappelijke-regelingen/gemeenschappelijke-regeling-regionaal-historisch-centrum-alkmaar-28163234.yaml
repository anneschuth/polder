  bevoegdheden:
  - kop_artikel: Artikel 5 Bevoegdheden
    inhoud_artikel: 1. Aan het bestuur van het RHC Alkmaar worden, ter behartiging
      van de in artikel 3 genoemde belangen en ter verwezenlijking van de in artikel
      4 omschreven taken alle bevoegdheden van regeling en bestuur toegekend die ingevolge
      de Archiefwet 1995 aan de deelnemers toebehoren evenals alle bevoegdheden van
      regeling en bestuur voortvloeiende uit de Wgr en de Gemeentewet, een en ander
      met inachtneming van de beperkingen daarin gesteld en voorts met inachtneming
      van hetgeen in deze regeling is bepaald.2. Onder de in het eerste lid overgedragen
      bevoegdheden worden in ieder geval verstaan:a. de bevoegdheden, bedoeld in de
      artikelen 15, derde lid, 16, tweede lid, 17,18, 19, 20, 31 en 32, eerste en
      derde lid, van de Archiefwet 1995;b. de bevoegdheid van het college om op grond
      van artikel 32 lid 3, van de Archiefwet 1995 de gemeentearchivaris te benoemen,
      te schorsen en te ontslaan;c. het adviseren en het doen van voorstellen aan
      de colleges van de deelnemende gemeenten over de taken en bevoegdheden, die
      door de colleges worden uitgevoerd ingevolge de artikelen 5, 7, 8, 12, 13, 15,
      eerste en tweede lid, 30 en 32, tweede lid, van de Archiefwet 1995.3. Het algemeen
      bestuur van het RHC Alkmaar is bevoegd tot het oprichten van of deelneming in
      privaatrechtelijke rechtspersonen alsmede deel te nemen aan gemeenschappelijke
      regelingen voor zover dit past binnen het in artikel 3 gestelde belang en doel.4.
      Het algemeen bestuur van het RHC Alkmaar is bevoegd, in het kader van het bepaalde
      in artikel 3, tot het op verzoek van één of meerdere deelnemers en/of derden
      verrichten van diensten.5. Een besluit tot dienstverlening als bedoeld in het
      vierde lid van dit artikel, vermeldt ten minste de wijze van kostenverdeling
      en overige voorwaarden.
