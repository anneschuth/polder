gr_meta:
  citeertitel: gemeenschappelijke regeling Regionaal Historisch Centrum Alkmaar
  doel: 1. De regeling is getroffen met het doel de belangen van de deelnemers in
    het samenwerkingsgebied bij alle aangelegenheden betreffende de archiefbescheiden,
    collecties, individuele documenten en dergelijke die berusten in de gemeentelijke
    archiefbewaarplaats van de deelnemers in gezamenlijkheid te behartigen alsmede
    het vervullen van de functie van regionaal kennis- en informatiecentrum op het
    gebied van de lokale en regionale geschiedenis door het opbouwen en beheren van
    een zo breed mogelijke collectie (regionaal) historische bronnen welke door haar
    op een zo actief mogelijke wijze beschikbaar wordt gesteld voor een breed publiek.2.
    Het RHC Alkmaar is mede getroffen met het doel diensten aan derden te leveren
    ten aanzien van het beheer van archiefbescheiden en collecties. Deze dienstverlening
    zal in een overeenkomst worden vastgelegd.3. De colleges kunnen gezamenlijk algemene
    aanwijzingen geven omtrent de wijze waarop het RHC Alkmaar de belangen, in het
    eerste lid, behartigt.
