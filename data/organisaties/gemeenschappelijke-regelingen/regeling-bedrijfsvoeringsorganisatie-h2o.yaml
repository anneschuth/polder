  bevoegdheden:
  - kop_artikel: Artikel 5 Bevoegdheden
    inhoud_artikel: Het bestuur bezit de bevoegdheden als vermeld in artikel 33b van
      de wet.
  - kop_artikel: Artikel 9 Bevoegdheden bestuur
    inhoud_artikel: 1. Het bestuur heeft alle bevoegdheden die het bij of krachtens
      de wet en deze regeling toekomt.2. Tot de taken en bevoegdheden van het bestuur
      behoren in ieder geval:a. Het vaststellen van het jaarlijkse actieprogramma;b.
      Het vaststellen en wijzigen van het dienstverleningshandvest;c. Het vaststellen
      en wijzigen van een bijdrageregeling waarin de financiële bijdragen van de deelnemende
      gemeenten voor de basistaken en de aanvullende diensten worden vastgelegd;d.
      Het opstellen van een model dienstverleningsovereenkomst voor de afname van
      diensten;e. Het vaststellen en wijzigen van de interne en organisatorische kaders
      van de bedrijfsvoeringsorganisatie;f. Het behartigen van de belangen van de
      bedrijfsvoeringsorganisatie bij andere overheden, instellingen, bedrijven of
      personen waarmee contact voor de Bedrijfsvoeringsorganisatie van belang is;g.
      Het houden van toezicht op het functioneren van de bedrijfsvoeringsorganisatie;h.
      Het nemen van conservatoire maatregelen, zowel in als buiten rechte, en het
      doen van alles wat nodig is ter voorkoming van verjaring en verlies van recht
      of bezit;i. Het nemen van besluiten tot oprichting van en deelneming in stichtingen,
      maatschappen, vennootschappen, verenigingen, coöperaties en onderlinge waarborgmaatschappijen,
      de raden gehoord.3. De besluiten omtrent de bevoegdheden als genoemd in dit
      artikel in het tweede lid, onder b en c worden door het bestuur met een twee
      derde meerderheid van stemmen genomen.
