  citeertitel: Regeling Bedrijfsvoeringsorganisatie H2O
  doel: 1. De regeling wordt uitsluitend getroffen ter behartiging van de uitvoering
    van bedrijfsvoeringsprocessen van de deelnemers.2. De bedrijfsvoeringsorganisatie
    verzorgt voor de deelnemers in brede zin de ondersteuning op het terrein van de
    bedrijfsvoering en creëert daarmee de voorwaarden voor een efficiënte en klantgerichte
    bedrijfsvoering.
