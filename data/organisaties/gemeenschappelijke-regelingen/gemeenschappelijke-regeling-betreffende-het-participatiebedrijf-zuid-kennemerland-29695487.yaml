  citeertitel: Gemeenschappelijke Regeling betreffende het Participatiebedrijf Zuid-Kennemerland
  doel: 1. De regeling is getroffen ter uitvoering en behartiging van de gemeenschappelijke
    en afzonderlijke belangen van de deelnemende gemeenten op het gebied van• de sociale
    werkvoorziening (Wet sociale werkvoorziening)• re-integratie voor werkzoekenden
    met een overbrugbare afstand tot de arbeidsmarkt (Participatiewet)• beschut werk
    op grond van de Participatiewet• leerwerktrajecten voor jongeren zonder start-
    of beroepskwalificatie (Wet voortijdig schoolverlaten)2. Het Participatiebedrijf
    zorgt gelet op de behartiging van de belangen zoals bedoeld in het eerste lid
    voor een zo efficiënt en effectief mogelijke uitvoering van de in artikel 4 aangegeven
    taken.
