  bevoegdheden:
  - kop_artikel: Artikel 4 Taken en bevoegdheden
    inhoud_artikel: 1. Het Participatiebedrijf voert alle taken van de colleges met
      betrekking tot de Sociale werkvoorziening uit;2. De colleges dragen de aan hen
      toekomende bevoegdheden met betrekking tot de sociale werkvoorziening over aan
      het bestuur, met uitzondering van de beleidsmatige en verordenende taken;3.
      Het Participatiebedrijf voert taken met betrekking re-integratie voor de werkzoekenden
      met een overbrugbare afstand tot de arbeidsmarkt uit4. Het Participatiebedrijf
      voert taken met betrekking tot beschut werk uit voor werkzoekenden die zijn
      aangewezen op werken in een beschutte werkomgeving5. Het Participatiebedrijf
      organiseert leerwerktrajecten voor jongeren zonder start- of beroepskwalificatie.6.
      Het bestuur kan besluiten dat het Participatiebedrijf ook taken uitvoert voor
      colleges die niet deelnemen aan de regeling. Het bestuur stelt de voorwaarden
      hiervoor vast.7. Beleidsmatige en verordenende bevoegdheden die betrekking hebben
      op de taken zoals genoemd in lid 3,4,5 en 6 van dit artikel worden niet overgedragen
      en zijn voorbehouden aan de GR deelnemende gemeenten.8. Het Participatiebedrijf
      komt met elke aan de GR deelnemende gemeente een dienstverleningsovereenkomst
      overeen waarin bovengenoemde taken uit artikel 3 en 4 worden geduid en uitgewerkt.9.
      Het Participatiebedrijf sluit met de opdrachtgever leerwerktrajecten een dienstverleningsovereenkomst
      voor de uitvoering van leerwerktrajecten voor jongeren zonder beroeps- of startkwalificatie.10.
      Het bestuur kan besluiten dat het Participatiebedrijf ook andere taken, die
      aan re-integratie gerelateerd zijn, uitvoert. Het bestuur stelt de voorwaarden
      hiervoor vast.
