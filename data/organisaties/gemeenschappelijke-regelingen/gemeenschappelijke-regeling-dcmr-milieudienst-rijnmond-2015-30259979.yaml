gr_meta:
  citeertitel: gemeenschappelijke regeling DCMR Milieudienst Rijnmond 2015
  doel: De DCMR is de gezamenlijke milieudienst van de provincie Zuid-Holland en 16
    gemeenten. Het is een regio met veel industrie en een hoge bevolkingsdichtheid.
    In dit gebied bewaakt de DCMR de milieukwaliteit in nauwe samenwerking met andere
    overheidsinstellingen, zoals de politie, brandweer, arbeidsinspectie en GGD. De
    DCMR voert deze taak al ruim 40 jaar uit.
