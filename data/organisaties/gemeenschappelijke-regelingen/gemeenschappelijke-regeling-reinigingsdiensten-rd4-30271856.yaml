  bevoegdheden:
  - inhoud_artikel: Artikel 5 Dienstverlening1. Het lichaam is binnen het kader van
      het bepaalde in de artikelen 3 en 4 bevoegd tot het verrichten van diensten
      voor één of meerdere deelnemende gemeenten en/of derden.2. Een besluit van het
      dagelijks bestuur tot dienstverlening als bedoeld in lid 1 vermeldt de wijze
      van kostenverrekening en de overige voorwaarden.
