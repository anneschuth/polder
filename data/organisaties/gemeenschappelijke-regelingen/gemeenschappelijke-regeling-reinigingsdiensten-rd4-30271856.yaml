gr_meta:
  citeertitel: Gemeenschappelijke Regeling Reinigingsdiensten Rd4
  doel: De gemeenschappelijke regeling heeft als doel het door middel van een openbaar
    lichaam behartigen van de belangen van - en het tot stand brengen van een samenwerking
    tussen - de aan de regeling deelnemende gemeenten op het terrein van het (doen)
    inzamelen en bewerken van afvalstoffen afkomstig uit de deelnemende gemeenten,
    het reinigen van de openbare ruimten en de daarmee samenhangende taken alsmede
    het bestrijden van gladheid in het gebied, een en ander met inachtneming van het
    provinciaal milieubeleidsplan als bedoeld in de Wet Milieubeheer en van het door
    de overheid gevoerde afvalstoffenbeleid.
