  bevoegdheden:
  - kop_artikel: Artikel 3. Doelstelling en bevoegdheden.
    inhoud_artikel: 1.De regeling wordt getroffen om gezamenlijk zorg te dragen voor
      de uitoefening van de taken en de bevoegdheden, die krachtens artikel 17 van
      de wet aan de gemeenteraden zijn opgedragen.2.De zorg, bedoeld in het eerste
      lid, omvat de besluitvorming ten aanzien van de aangelegenheden, als bedoeld
      in artikel 8, tweede lid onder b, artikel 24, tweede en vierde lid en artikel
      25 van de statuten van de stichting.
