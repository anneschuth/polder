description:
  text: De Regionale Uitvoeringsdienst (RUD) Utrecht verleent vergunningen en handhaaft
    wetten en regels op het gebied van milieu, natuur, bodem, landschap en water.De
    RUD werkt voor de provincie Utrecht en de gemeenten Amersfoort, Baarn, Bunschoten,
    Eemnes, Houten, Leusden, Lopik, Nieuwegein, Soest, Utrecht en Woudenberg.
