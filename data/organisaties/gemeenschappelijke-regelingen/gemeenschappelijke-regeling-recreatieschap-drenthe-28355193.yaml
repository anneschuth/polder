  bevoegdheden:
  - kop_artikel: Artikel 4
    inhoud_artikel: 1. De raad, het college van burgemeester en wethouders en de burgemeester
      van de deelnemende gemeenten kunnen ter behartiging van de taken als bedoeld
      in artikel 3 besluiten bevoegdheden over te dragen aan respectievelijk het Algemeen
      Bestuur, het Dagelijks Bestuur en de voorzitter van het samenwerkingsverband.2.
      Het samenwerkingsverband oefent de overgedragen bevoegdheden eerst uit voor
      zover het Algemeen Bestuur daarmee instemt.3. Een besluit als bedoeld in het
      eerste lid regelt zo nodig de bijdrage in de kosten in verband met de uitoefening
      van de betreffende bevoegdheden.4. Een vertegenwoordiger van een deelnemende
      gemeente, waarvan het bestuur de bepaalde bevoegdheid niet heeft overgedragen,
      onthoudt zich in de vergadering van het Algemeen Bestuur van medestemmen over
      aangelegenheden, die betrekking hebben op de uitoefening van bedoelde bevoegdheid.5.
      De wettelijke voorschriften met betrekking tot de in het eerste lid bedoelde
      bevoegdheden, de uitoefening van deze bevoegdheden en het toezicht daarop, zijn
      van overeenkomstige toepassing.6. Een besluit, als bedoeld in het eerste lid,
      wordt de aan het samenwerkingsverband deelnemende gemeenten meegedeeld en wordt
      bekend gemaakt door ter inzagelegging ter secretarie van de gemeente, die het
      aangaat, alsmede opgenomen in de registers als bedoeld in artikel 27 van de
      Wet gemeenschappelijke regelingen.De voorzitter van het samenwerkingsverband
      maakt de ter inzagelegging tevoren bekend in één of meerdere dag- of nieuwsbladen,
      die in het gebied verspreid worden.
