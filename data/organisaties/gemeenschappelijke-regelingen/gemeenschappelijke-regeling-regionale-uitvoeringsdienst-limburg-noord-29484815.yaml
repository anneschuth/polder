gr_meta:
  citeertitel: gemeenschappelijke regeling regionale uitvoeringsdienst Limburg Noord
  doel: Het openbaar lichaam is ingesteld ter behartiging van de individuele en gezamenlijke
    belangen van de deelnemers op het gebied van de uitvoering van taken van toezicht
    op en handhaving van de milieuvoorschriften krachtens de Wet algemene bepalingen
    omgevingsrecht en de overige milieuwet- en regelgeving, alsook voor de uitvoering
    van taken op het gebied van vergunningverlening krachtens deze wet- en regelgeving,
    zoals omschreven in Hoofdstuk 2 van deze regeling.
