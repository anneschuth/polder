  bevoegdheden:
  - kop_artikel: Artikel 4
    inhoud_artikel: 1. De colleges dragen de volgende aan hen toekomende bevoegdheden
      en verantwoordelijkheden en daarmee samenhangende taken ten aanzien van de Wsw
      over aan het Werkvoorzieningschap:a. Het aan een geïndiceerde aanbieden van
      een dienstbetrekking voor het verrichten van arbeid onder aangepaste omstandigheden,
      als bedoeld in artikel 2, eerste lid van de Wsw;b. Het opzeggen van de onder
      onderdeel a bedoelde dienstbetrekking met een geïndiceerde, als bedoeld in artikel
      6, tweede lid van de Wsw;c. Het in voorkomende gevallen vragen van advies aan
      het Uitvoeringsinstituut werknemersverzekeringen over de opzegging van de dienstbetrekking,
      als bedoeld in artikel 6, derde lid van de Wsw;d. Het namens geïndiceerden tijdig
      aanvragen van een herindicatie én het op verzoek van geïndiceerden aanvragen
      van een herindicatie bij het Uitvoeringsinstituut werknemersverzekeringen. Dit
      lid is ook van toepassing met betrekking tot geïndiceerden op de wachtlijst
      en geïndiceerden met een dienstbetrekking op grond van artikel 7 van de Wsw.e.
      Het, overeenkomstig artikel 11, derde lid van de Wsw, aanvragen van een herindicatie
      bij het Uitvoeringsinstituut werknemersverzekeringen voor de werknemer die de
      bedongen arbeid gedurende een ononderbroken periode van ten minste 13 weken
      niet heeft verricht omdat hij in verband met ongeschiktheid ten gevolge van
      ziekte daartoe verhinderd was en die naar het inzicht van het dagelijks bestuur
      duurzaam niet in staat zal zijn tot het verrichten van arbeid onder aangepaste
      omstandigheden;f. Het verwerken van vervallen (her)indicatiebeschikkingen, als
      bedoeld in artikel 12, tweede lid van de Wsw, alsmede het berichten van het
      Uitvoeringsinstituut werknemersverzekeringen over de vervallen (her)indicatiebeschikkingen,
      als bedoeld in artikel 5, derde lid van het Besluit uitvoering sociale werkvoorziening
      en begeleid werken;g. Het aanwijzen van een privaatrechterlijke rechtspersoon
      voor de uitvoering van de Wsw, als bedoeld in artikel 2, tweede lid van de Wsw.
      Dit voor zover het taken betreft die behoren bij de bevoegheden en verantwoordelijkheden
      die de colleges volgens dit lid overdragen aan het Werkvoorzieningschap of taken
      betreft die de colleges volgens het tweede lid van dit artikel mandateren aan
      het Werkvoorzieningschap.1. De colleges kunnen voorts het Werkvoorzieningschap
      mandateren voor een aantal uitvoeringstaken in het kader van de Wsw. Deze taken
      behoren bij de bevoegdheden en verantwoordelijkheden in het kader van de Wsw
      die de colleges niet aan het Werkvoorzieningschap overdragen. De door de colleges
      aan het Werkvoorzieningschap gemandateerde taken zijn opgenomen in bijlage 1
      bij deze regeling.2. Ter vervulling van de in het eerste lid genoemde bevoegdheden
      en verantwoordelijkheden en van de in het tweede lid bedoelde taken geeft het
      Werkvoorzieningschap tevens uitvoering aan de beleidskaders zoals deze door
      de raden worden vastgesteld. Ook geeft het Werkvoorzieningschap uitvoering aan
      de nadere regels die de raden stellen via de op grond van de Wsw vast te stellen
      verordeningen, tenzij in deze verordeningen anders wordt bepaald.3. De colleges
      erkennen tegenover het Werkvoorzieningschap hun wezenlijke rol als potentiële
      opdrachtgever van passende werkzaamheden voor de werknemers.
  - kop_artikel: Artikel 5
    inhoud_artikel: 1. De bestuursorganen van het Werkvoorzieningschap zijn:a. het
      algemeen bestuur;b. het dagelijks bestuur;c. de voorzitter.2. Aan de bestuursorganen
      van het openbaar lichaam worden bevoegdheden voor regeling en bestuur overgedragen
      binnen de grenzen van de Wgr.3. De afbakening van de bevoegdheden tussen de
      bestuursorganen van het openbaar lichaam is, onverminderd artikel 33, eerste
      lid van de Wgr en artikel VIIIa Wet dualisering gemeentebestuur, gelijk aan
      die welke in de Gemeentewet ten aanzien van bestuursorganen is neergelegd, tenzij
      uit deze regeling anders blijkt.4. Het algemeen bestuur kan haar bevoegdheden
      met inachtneming van artikel 33, eerste lid Wgr geheel of gedeeltelijk overdragen
      aan het dagelijks bestuur. Het dagelijks bestuur oefent die overgedragen bevoegdheden
      uit overeenkomstig de eventueel door het algemeen bestuur te stellen regels.
