description:
  text: Het recreatiegebied Alkmaarder- en Uitgeestermeer wordt in opdracht van het
    Recreatieschap Alkmaarder- en Uitgeestermeer beheerd door Recreatie Noord-Holland.
    Beiden zijn verantwoordelijk voor de ontwikkeling en het beheer van het prachtige
    Alkmaarder- en Uitgeestermeer, plus het oevergebied. Centraal hierbij staat dat
    alle bezoekers van het recreatiegebied naar hartenlust van de bijzondere omgeving
    kunnen genieten.
