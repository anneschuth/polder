    inhoud_artikel: Bevoegdheden tot regeling en bestuur met betrekking tot de uitvoering
      van [PW](https://wetten.overheid.nl/BWBR0015703), [BBZ 2004](https://wetten.overheid.nl/BWBR0015711),
      [IOAW](https://wetten.overheid.nl/BWBR0004044), [IOAZ](https://wetten.overheid.nl/BWBR0004163)
      en [WSW](https://wetten.overheid.nl/BWBR0008903) en het oprichten, exploiteren
      en in stand houden van activiteiten voor industriële werkzaamheden, facilitaire
      dienstverlening, detacheringen en trajectbegeleiding, welke gericht zijn op
      het behouden dan wel het bevorderen van de arbeidsbekwaamheid van de werknemer
      mede met het oog op het kunnen gaan verrichten van arbeid onder normale omstandigheden.
