  bevoegdheden:
  - kop_artikel: Artikel 6 – Bevoegdheden
    inhoud_artikel: 1. De colleges dragen al hun bevoegdheden in het kader van de
      Wet sociale werkvoorziening over aan het bestuur, met uitzondering van de bevorderingsplicht
      als bedoeld in artikel 1, derde lid, van de Wet sociale werkvoorziening en de
      bevoegdheid om algemeen verbindende voorschriften vast te stellen.2. De colleges
      dragen geen bevoegdheden in het kader van de Participatiewet over aan het bestuur.3.
      Een college kan beleidsregels vaststellen omtrent de uitoefening van de overgedragen
      bevoegdheden door het bestuur.4. Een college gaat niet over tot het vaststellen,
      wijzigen of intrekken van een beleidsregel dan nadat het bestuur in de gelegenheid
      is geweest zijn wensen en bedenkingen aan het betreffende college kenbaar te
      maken. Deze verplichting is niet van toepassing indien de vaststelling, wijziging
      of intrekking op voorstel van het bestuur gebeurt, of wanneer alle betrokken
      colleges gelijkluidende beleidsregels willen vaststellen, zij eenzelfde wijziging
      doorvoeren of zij allen beslissen tot intrekking.5. Het bestuur geeft een college
      alle door het college gevraagde inlichtingen omtrent de uitoefening van de overgedragen
      bevoegdheden.
