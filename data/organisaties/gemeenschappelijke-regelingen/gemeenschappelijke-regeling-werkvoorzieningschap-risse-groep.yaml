gr_meta:
  citeertitel: Gemeenschappelijke regeling Werkvoorzieningschap Risse Groep
  doel: Het schap heeft tot doel:a) aan zoveel mogelijk ingezetenen van de gemeenten,
    die blijkens een (her)indicatiebeschikking tot de doelgroep als bedoeld in artikel
    1, eerste lid, van de Wet sociale werkvoorziening behoren, een dienstbetrekking
    krachtens arbeidsovereenkomst aan te bieden voor het verrichten van arbeid onder
    aangepaste voorwaarden, gericht op het behouden van, dan wel het bevorderen van
    de arbeidsbekwaamheid van de werknemer met het oog op het kunnen gaan verrichten
    van arbeid onder normale omstandigheden als bedoeld in artikel 3 van de Wet sociale
    werkvoorziening.b) het ontwikkelen van arbeidsmogelijkheden voor personen met
    een afstand tot de arbeidsmarkt, die vallen onder andere sociale wetgeving dan
    de Wet sociale werkvoorziening of nog werkzaam zijn in het reguliere bedrijfsleven,
    door het bieden van faciliteiten en werkervaringsmogelijkheden gericht op maximale
    participatie in het arbeidsproces.
