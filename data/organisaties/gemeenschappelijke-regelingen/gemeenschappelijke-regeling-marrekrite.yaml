  citeertitel: Gemeenschappelijke regeling Marrekrite
  doel: De Marrekrite behartigt binnen de opgedragen taken de gemeenschappelijke belangen
    van de colleges, met als doel een evenwichtige en gecoördineerde ontwikkeling
    van de recreatie in de provincie Fryslân, rekening houdende met de belangen van
    natuur en landschap.
