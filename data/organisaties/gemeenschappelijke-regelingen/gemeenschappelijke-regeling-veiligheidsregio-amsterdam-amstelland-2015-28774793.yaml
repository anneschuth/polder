  bevoegdheden:
  - kop_artikel: Artikel 6. Taken
    inhoud_artikel: 1. Ter behartiging van de in artikel 5 van de regeling genoemde
      doelstelling is de Veiligheidsregio belast met de uitvoering van de taken en
      bevoegdheden, zoals genoemd in artikel 10, 25, 32, 35 en 36 van de Wet en de
      overige taken en bevoegdheden die bij of krachtens wet en regelgeving aan de
      Veiligheidsregio worden opgedragen.2. De Veiligheidsregio is tevens belast met
      het organiseren van de regionale coördinatie van de gemeentelijke processen.
  - kop_artikel: Artikel 7. Verplichtingen van de Gemeenten
    inhoud_artikel: De Gemeenten zijn in ieder geval verplicht om kosteloos de volgende
      faciliteiten ter beschikking te stellen aan de Veiligheidsregio:a. bereikbare
      en bruikbare bluswatervoorzieningen;b. toegang tot geografische en bouwkundige
      informatie;c. informatie over wegomleggingen en -afsluitingen etc.;d. informatie
      over relevante vergunningen;e. voor de Veiligheidsregio relevante informatie
      voortvloeiende uit handhaving en toezicht door de Gemeenten.
