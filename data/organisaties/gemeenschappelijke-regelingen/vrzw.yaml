description:
  text: Als Veiligheidsregio Zaanstreek-Waterland werken we 24/7 aan de veiligheid
    van de inwoners van onze regio. Dit doen we door risico's te beperken, 'adequaat'
    op te treden en de effecten van incidenten, rampen en crisis te beheersen. Samen
    met inwoners, instellingen, bedrijven én onze partners maken we Zaanstreek-Waterland
    veiliger. Nederland telt 25 veiligheidsregio's. Een veiligheidsregio is een gebied
    waarbinnen gemeenten en hulpverleningsdiensten samenwerken ons werkgebied veiliger
    te maken. Ons werkgebied is Zaanstreek-Waterland. Namens de 7 gemeenten in onze
    regio voeren we taken uit op het gebied van rampenbestrijding, crisisbeheersing,
    risicobeheersing, brandweerzorg, geneeskundige hulpverlening en de gemeenschappelijke
    meldkamer. De burgemeesters van deze gemeenten vormen ons Algemeen Bestuur.
  url: https://www.veiligheidsregiozaanstreekwaterland.nl/organisatie
