  bevoegdheden:
  - kop_artikel: Artikel 4 Bevoegdheden
    inhoud_artikel: '1. Ter behartiging van het in artikel 3 van de regeling genoemde
      belang dragen de colleges aan het openbaar lichaam over alle bevoegdheden en
      verplichtingen. Tot die overgedragen bevoegdheden worden onder meer gerekend:
      het wachtlijstbeheer van Beschut Werken, het verzorgen van de aanvraag voor
      herindicatie bij het UWV en het bekostigen van begeleid-werken-plaatsen.Het
      bestuur van het openbaar lichaam is ter behartiging van even genoemd belang
      namens de colleges gemachtigd tot het sluiten van een samenwerkingsovereenkomst
      en een nadere overeenkomst met de uitvoeringsorganisatie als bedoeld in artikel
      1, onderdeel d, van de regeling.2. Het openbaar lichaam kan de volgende publieke
      taken, te weten het wachtlijstbeheer, het verzorgen van de aanvraag voor herindicatie
      bij het UWV en het bekostigen van begeleid-werken-plaatsen, mandateren aan de
      uitvoeringsorganisatie als bedoeld in artikel 1, onderdeel d, van de regeling.3.
      Het openbaar lichaam is bevoegd te besluiten tot het oprichten van, en het deelnemen
      in rechtspersonen indien dat bijzonder aangewezen moet worden geacht ter behartiging
      van het daarmee te dienen openbaar belang. Indien en voor zover vanwege het
      openbaar lichaam benoemingen plaatsvinden in de Raad van Commissarissen van
      de hiervoor genoemde rechtspersonen is benoeming in de Raad van Commissarissen
      onverenigbaar met de kwaliteit van burgemeester en wethouder van de deelnemende
      gemeenten. Deze besluiten dienen te worden voorgelegd aan de raden van de deelnemende
      gemeenten voor een wensen- en bedenkingen- procedure.'
