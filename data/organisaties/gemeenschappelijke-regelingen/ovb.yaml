  abbr: OVB
  valid_from: '1900-01-01'
description:
  text: Openbaar Lichaam OV-bureau van de gemeente Groningen en de provincies Groningen
    en Drenthe is opgericht in 2004 door de provincies Groningen en Drenthe en de
    gemeente Groningen om samen invulling te geven aan het opdrachtgeverschap voor
    het openbaar (bus)vervoer. De gedachte achter de samenwerking is krachten  bundelen
    om vervoerkundige, maatschappelijke en om financiële meerwaarde te creëren voor
    het openbaar vervoer in het gebied. Openbaar (bus)vervoer is daarbij een belangrijk
    onderdeel van het bredere verkeers- en vervoersbeleid in de regio.
  url: https://ovbureau.nl/het-ov-bureau-groningen-drenthe/
