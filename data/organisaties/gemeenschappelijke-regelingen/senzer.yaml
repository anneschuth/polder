description:
  text: Als werkbedrijf voor de arbeidsmarktregio Helmond-De Peel voeren we de Participatiewet
    uit voor zeven gemeenten. We bedienen daarmee een regio met 250.000 inwoners.
    Via ons werken ruim 2.000 mensen bij honderden bedrijven. Ook verzorgen we inkomensondersteuning
    voor 4.500 bijstandscliënten en zorgen we voor honderden mensen voor zinvolle
    maatschappelijke participatie.
