  bevoegdheden:
  - kop_artikel: Artikel 22 Bevoegdheden Algemeen Bestuur
    inhoud_artikel: 1. Met betrekking tot de uitoefening van de taken en bevoegdheden
      van het openbaar lichaam berust bij het algemeen bestuur alle bevoegdheid, die
      niet bij of krachtens deze regeling aan het dagelijks bestuur of aan de voorzitter
      is opgedragen of gedelegeerd.2. Naast de uitoefening van taken en bevoegdheden
      op grond van het in deze regeling bepaalde, is het algemeen bestuur in ieder
      geval belast met en bevoegd tot:a. Het doen van voorstellen aan de deelnemers
      omtrent toetreding tot, uittreding uit, wijziging van of opheffing van de regeling;b.
      Het aangaan van geldleningen en van rekening-courantovereenkomsten;c. Het uitlenen
      van gelden en het waarborgen van geldleningen door anderen aan te gaan;d. Het
      doen van uitgaven voordat de begroting of begrotingswijziging, waarbij deze
      uitgaven zijn geraamd, is goedgekeurd;e. Het aanwijzen van de accountant.3.
      Het algemeen bestuur besluit slechts tot de oprichting van en de deelneming
      in stichtingen, maatschappen, vennootschappen, verenigingen, coöperaties en
      onderlinge waarborgmaatschappijen, indien dat in het bijzonder aangewezen moet
      worden geacht voor de behartiging van het daarmee te dienen openbaar belang.4.
      Het besluit wordt niet genomen dan nadat de raden en provinciale staten een
      ontwerpbesluit is toegezonden en in de gelegenheid zijn gesteld hun wensen en
      bedenkingen ter kennis te brengen aan het algemeen bestuur.5. Het algemeen bestuur
      is bevoegd tot het mede treffen van en tot het deelnemen aan een gemeenschappelijke
      regeling als bedoeld in de artikelen 93 en 96 van de Wet. Artikel 95 en 98 van
      de Wet zijn van overeenkomstige toepassing op deze bevoegdheden.
  - kop_artikel: Artikel 23 Bevoegdheden Dagelijks Bestuur
    inhoud_artikel: 1. Het dagelijks bestuur is in ieder geval bevoegd:a. het dagelijks
      bestuur van het openbaar lichaam te voeren, waaronder het toezicht op het beheren
      van de financiën en de eigendommen van het openbaar lichaam;b. beslissingen
      van het algemeen bestuur voor te bereiden en uit te voeren;c. regels vast te
      stellen over de ambtelijke organisatie van het openbaar lichaam;d. ambtenaren
      te benoemen, te schorsen en te ontslaan;e. tot privaatrechtelijke rechtshandelingen
      van het openbaar lichaam te besluiten, met uitzondering van privaatrechtelijke
      rechtshandelingen als bedoeld in artikel 55a van de Wet;f. te besluiten namens
      het openbaar lichaam,, het dagelijks bestuur of het algemeen bestuur rechtsgedingen,
      bezwaarprocedures of administratief beroepsprocedures te voeren of handelingen
      ter voorbereiding daarop te verrichten, tenzij het algemeen bestuur, voor zover
      het het algemeen bestuur aangaat, in voorkomende gevallen anders beslist.2.  Het
      dagelijks bestuur neemt, ook alvorens is besloten tot het voeren van een rechtsgeding,
      alle conservatoire maatregelen en doet wat nodig is ter voorkoming van verjaring
      of verlies van recht of bezit.
