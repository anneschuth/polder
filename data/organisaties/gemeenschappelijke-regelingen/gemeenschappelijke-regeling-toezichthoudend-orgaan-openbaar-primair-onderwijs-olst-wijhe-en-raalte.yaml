  bevoegdheden:
  - kop_artikel: Artikel 3 Doelstelling en belang
    inhoud_artikel: 1. Het gemeenschappelijk orgaan coördineert en oefent bevoegdheden
      van de raden uit als bedoeld in artikel 48 van de Wet op het primair onderwijs,
      alsmede in de statuten van de Stichting gelet op het belang te voldoen aan de
      grondwettelijke plicht zorg te dragen voor voldoend openbaar onderwijs in een
      genoegzaam aantal scholen.2. De in het eerste lid van dit artikel genoemde bevoegdheden
      zijn:- benoeming, schorsing en ontslag van de leden van de raad van toezicht
      van de stichting;- inwinnen van inlichtingen en het voeren van besprekingen
      met het bestuur en de raad van toezicht van de stichting over de algemene gang
      van zaken binnen de Stichting;- bespreken van de (meerjaren-)begroting en rekening
      van de stichting met het bestuur van de stichting;- maatregelen te nemen die
      zij nodig acht om de continuïteit van het onderwijsproces te waarborgen indien
      voor 1 februari van het jaar waarvoor de begroting geldt de begroting van de
      stichting niet is goedgekeurd;- goedkeuring van een statutenwijziging van de
      stichting;- het doen van een voorstel aan de raden tot het treffen van maatregelen
      en zo nodig ontbinding van de stichting als er sprake is van ernstige taakverwaarlozing
      door het stichtingsbestuur of functioneren in strijd met de wet. Ontbinding
      geschiedt na overleg met het stichtingsbestuur. “
