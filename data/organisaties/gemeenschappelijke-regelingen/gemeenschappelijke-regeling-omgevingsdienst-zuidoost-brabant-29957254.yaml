  bevoegdheden:
  - kop_artikel: Artikel 3.6 Taken en bevoegdheden
    inhoud_artikel: 1.Onverminderd de wet, heeft het algemeen bestuur de volgende
      taken en bevoegdheden:a.het vaststellen van beleidsregels waarmee de andere
      organen van de omgevingsdienst rekening houden bij de uitoefening van hun bevoegdheden;b.het
      instellen van commissies als bedoeld in artikel 25 van de wet;c.het oprichten
      van en de deelneming in stichtingen, maatschappen, vennootschappen, verenigingen,
      coöperaties en onderlinge waarborgmaatschappijen indien:1°.dat in het bijzonder
      aangewezen is voor de behartiging van het daarmee te dienen openbaar belang;
      en2°.dat ter behartiging van ondersteunende processen is;d.het met inachtneming
      van de hoofdstukken VIII en IX van de wet deelnemen aan of treffen van een gemeenschappelijke
      regeling ter behartiging van de ondersteunende processen, mits twee derde van
      het aantal deelnemers met het aangaan van de regeling heeft ingestemd.2.Onverminderd
      artikel 57a van de wet, kan het algemeen bestuur de uitoefening van door hem
      te bepalen bevoegdheden volgens door hem te stellen beleidsregels of daaraan
      te stellen beperkingen overdragen aan het dagelijks bestuur of aan een commissie
      als bedoeld in artikel 25 van de wet, met uitzondering van:a.het stellen van
      beleidsregels over het aangaan van geldleningen, het uitlenen van geld, of over
      de directe regeling van hetgeen verder de geldmiddelen van de omgevingsdienst
      aangaat;b.het regelen van de gevolgen van toetreding of uittreding van een bestuursorgaan
      tot respectievelijk uit de regeling alsmede het verbinden van nadere voorwaarden
      daaraan;c.het doen van een voorstel aan de colleges en Gedeputeerde Staten tot
      wijziging van de regeling;d.het instellen van een commissie als bedoeld in artikel
      24, eerste en tweede lid, artikel 24a en artikel 25 van de wet;e.het oprichten
      van en de deelneming in stichtingen, maatschappen, vennootschappen, verenigingen,
      coöperaties en onderlinge waarborgmaatschappijen, bedoeld in het eerste lid,
      onder c;f.het vaststellen van een liquidatieplan bij opheffing van de regeling.3.Onverminderd
      artikel 25 van de wet regelt het algemeen bestuur bij het instellen van een
      commissie als bedoeld in het eerste lid, onder b:a.de einddatum van de commissie,
      indien deze is ingesteld voor bepaalde tijd; enb.de benoeming van een lid van
      het dagelijks bestuur als voorzitter van de commissie.
