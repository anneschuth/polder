gr_meta:
  citeertitel: Gemeenschappelijke Regeling Omgevingsdienst Zuidoost-Brabant
  doel: De Omgevingsdienst Zuidoost-Brabant (ODZOB) is één van de 28 omgevingsdiensten
    in Nederland. De Omgevingsdiensten zijn opgericht in 2013 o.a. naar aanleiding
    van de vuurwerkramp in Enschede, de brand in het Hemeltje in Volendam en de ramp
    in Moerdijk. Het organiseren van de vergunningverlening, het toezicht en de handhaving
    op het gebied van omgevingsrecht moest slimmer.Want waar we vaak niet bij stilstaan,
    is dat risico’s en gevolgen voor de leefomgeving vaak niet ophouden bij een gemeente-
    of provinciegrens. Het vervoer van (gevaarlijke) stoffen verloopt via de weg,
    het water of het spoor dwars door dorpen en steden heen. Een brand brengt afvalstoffen
    in de lucht, die kunnen overwaaien naar een compleet ander gebied. En vervuild
    bluswater kan via de sloot kilometers verderop schade aanrichten.Onze opgave is
    dan ook het zorgen voor een veilige, gezonde en duurzame (fysieke) leefomgeving.
    Dit doen we dagelijks door samen met onze 21 gemeenten, provincie Noord-Brabant
    en samenwerkingspartners hier aan te werken.
