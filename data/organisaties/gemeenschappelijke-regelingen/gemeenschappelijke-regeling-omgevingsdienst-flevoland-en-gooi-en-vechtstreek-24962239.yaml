gr_meta:
  citeertitel: Gemeenschappelijke regeling Omgevingsdienst Flevoland & Gooi en Vechtstreek
  doel: Deze regeling is opgezet door de deelnemers met als doel om een robuuste omgevingsdienst
    te vormen ten behoeve van een adequate uitvoering van milieutaken op het gebied
    van vergunningverlening, toezicht en handhaving voor de provincie Flevoland en
    de regio Gooi en Vechtstreek. De deelnemers kiezen voor een verbetering van de
    kwaliteit en de integraliteit van de uitvoering van de taken door deze onder te
    brengen in deze regionale omgevingsdienst. De uitvoering wordt bij de omgevingsdienst
    ondergebracht met het behoud van de eigen bevoegdheden van alle deelnemers. Tevens
    kan de omgevingsdienst taken verrichten op basis van de Wabo en andere relevante
    wetgeving en uitvoeringsbesluiten voor zover de deelnemers hiertoe mandaten verlenen.
