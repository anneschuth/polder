  citeertitel: Gemeenschappelijke Regeling voor Sociale Kredietverlening en Schuldhulpverlening
    in Limburg
  doel: 1. De regeling heeft tot doel:a. hulp te verlenen aan natuurlijke personen
    die door hun schuldenlast in maatschappelijke problemen zijn of kunnen komen,
    door middel van schuldhulpverlening;b. hulp te verlenen aan natuurlijke personen
    die zelf niet in staat zijn hun financiële zaken te behartigen, hetzij door middel
    van budgetbeheer, hetzij door middel van beschermingsbewind;c. het op een verantwoorde
    wijze voorzien in de behoefte aan krediet, door middel van sociale kredietverlening.2.
    Kredietbank Limburg tracht de in het eerste lid genoemde doelen te bereiken door:a.
    het verrichten van hulpverlenende, bemiddelende, sanerende en voorlichtende werkzaamheden;b.
    het op een maatschappelijk verantwoorde wijze verstrekken van geldleningen;c.
    het verrichten van alle handelingen die met de doelstellingen verband houden of
    daarvoor bevorderlijk kunnen zijn.
