  citeertitel: Gemeenschappelijke regeling werkorganisatie Langedijk en Heerhugowaard
  doel: Deze regeling wordt getroffen voor het instandhouden van een gezamenlijke
    ambtelijke werkorganisatie van de gemeenten om voor de colleges beleid en uitvoeringsbeleid
    te kunnen voorbereiden en uitvoeren, waaronder mede begrepen het uitoefenen van
    de daartoe benodigde bevoegdheden in mandaat. Daarmee biedt de werkorganisatie
    een kwalitatief hoogwaardige, efficiënte en innovatieve dienstverlening aan het
    bestuur en de inwoners van de gemeenten, en aan de bedrijven en instellingen in
    de gemeenten.
