  bevoegdheden:
  - kop_artikel: 'Artikel 5: Bevoegdheden'
    inhoud_artikel: 1. De colleges kunnen, direct of indirect, bevoegdheden voor de
      uitvoering van de in artikel 11 genoemde taken aan de directie in mandaat opdragen.
      Mandaten als bedoeld in de vorige zin, worden opgenomen in een mandaatregeling.2.
      De colleges dragen aan het bestuur in ieder geval de bevoegdheid over tot het
      aanwijzen van heffingsambtenaren, invorderingsambtenaren, belastingdeurwaarders
      en leerplichtambtenaren.3. Aan het bestuur kunnen aanvullende bevoegdheden worden
      overgedragen door de colleges, zonder dat daarvoor de regeling hoeft te worden
      gewijzigd, een en ander met inachtneming van artikel 10, tweede lid, van de
      wet.4. De bevoegdheden van het bestuur bestaan in ieder geval uit:a. het vaststellen
      en wijzigen van de begroting;b. het vaststellen van de jaarrekening;c. het vaststellen
      van de kadernota;d. het vaststellen van de benodigde verordeningen, regelingen
      en nota’s ten behoeve van de werkorganisatie;e. de aanwijzing van een of meer
      accountants, bedoeld in artikel 213, tweede lid, van de  Gemeentewet;f. het
      beheer van de inkomsten en uitgaven van de werkorganisatie;g. het vaststellen
      van de arbeidsvoorwaarden van het personeel van de werkorganisatie;h. benoeming,
      schorsing en ontslag van het personeel van de werkorganisatie;i. het voeren
      van rechtsgedingen, bezwaarprocedures of administratieve beroepsprocedures,
      het instellen van bezwaar en beroep alsmede het vragen om een voorlopige voorziening;j.
      het besluiten tot privaatrechtelijke rechtshandelingen ten behoeve van de werkorganisatie,
      enk. het behartigen van de belangen van de werkorganisatie bij andere overheden,
      instellingen of personen.5. Het bestuur neemt alle conservatoire maatregelen
      en doet wat nodig is ter voorkoming van verjaring of verlies van recht of bezit
      van de werkorganisatie.6. Het bestuur besluit slechts tot oprichting van en
      de deelneming in stichtingen, maatschappen, vennootschappen, verenigingen, coöperaties
      en onderlinge waarborgmaatschappijen, indien dat in het bijzonder aangewezen
      moet worden geacht voor de behartiging van het daarmee te dienen belang. Het
      besluit wordt niet genomen dan nadat de raden in de gelegenheid zijn gesteld
      hun wensen en bedenkingen ter kennis van het bestuur te brengen.
