  bevoegdheden:
  - inhoud_artikel: 'Artikel 5 Dienstverleningsovereenkomsten1. Met betrekking tot
      de uitvoering en nadere invulling van de in artikel 3 en 4 genoemde taken worden
      door of namens het algemeen bestuur enerzijds met elk van de deelnemers afzonderlijk
      anderzijds, schriftelijke werkafspraken gemaakt in de vorm van dienstverleningsovereenkomsten
      (DVO’s), waarin in ieder geval is vastgelegd welke producten en diensten de
      omgevingsdienst aan de deelnemers zal leveren en wat de vergoeding daarvoor
      zal zijn.2. Met betrekking tot de beëindiging van de in artikel 4 genoemde taken
      worden door of namens het dagelijks bestuur enerzijds met de deelnemer die het
      aangaat anderzijds, in deze overeenkomsten eveneens schriftelijke afspraken
      gemaakt met betrekking tot in ieder geval de afwikkeling van de financiële gevolgen
      daarvan.Artikel 6 Werkzaamheden voor derdenOnverminderd de verplichtingen die
      voortvloeien uit de in artikel 3 en 4 bedoelde taken, kan de omgevingsdienst
      op verzoek van derden, indien dit geen verstoring veroorzaakt in de uitvoering
      van de in beide artikelen aangeduide taken, adviserende, ondersteunende en uitvoerende
      werkzaamheden op het gebied van de fysieke leefomgeving verrichten. Onder derden
      wordt verstaan: andere overheden dan de deelnemers.'
