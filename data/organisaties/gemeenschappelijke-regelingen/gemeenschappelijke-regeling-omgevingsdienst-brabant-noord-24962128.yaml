gr_meta:
  citeertitel: Gemeenschappelijke Regeling Omgevingsdienst Brabant Noord
  doel: Het openbaar lichaam is ingesteld om ten behoeve van de deelnemers taken uit
    te voeren op het gebied van de fysieke leefomgeving en om als verlengstuk van
    het lokaal en provinciaal bestuur een bijdrage te leveren aan een leefbare en
    veilige werk- en leefomgeving van de regio Brabant Noordoost.
  samenwerkingsvorm:
    value: Openbaar lichaam
    afkorting: OL
