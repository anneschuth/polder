description:
  text: Recreatieschap Spaarnwoude is de bestuurlijke organisatie voor het beheer
    en de ontwikkeling van Spaarnwoude Park. Het betreft een samenwerkingsverband
    tussen de provincie Noord-Holland en de gemeenten Haarlem, Amsterdam, Velsen en
    Haarlemmermeer. Centraal hierbij staat uiteraard dat alle bezoekers van het recreatiegebied
    naar hartenlust van de bijzondere omgeving kunnen genieten.
  url: https://www.spaarnwoudepark.nl/over/de-organisatie
