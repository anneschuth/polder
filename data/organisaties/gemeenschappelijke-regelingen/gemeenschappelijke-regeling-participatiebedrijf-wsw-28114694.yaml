  citeertitel: Gemeenschappelijke Regeling Participatiebedrijf Wsw
  doel: Het belang ter behartiging waarvan de regeling is getroffen omvat de overdracht
    van het formele werkgeverschap van Wsw-werknemers aan het openbaar lichaam, binnen
    welk kader de gemeenten de uitvoering van artikel 2 lid 1 van de Wsw en de daaruit
    voortvloeiende en daarmee verband houdende voorschriften en regelingen overdragen
    aan het openbaar lichaam.
