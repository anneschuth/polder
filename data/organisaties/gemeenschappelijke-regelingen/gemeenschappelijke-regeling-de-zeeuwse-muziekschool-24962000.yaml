gr_meta:
  citeertitel: Gemeenschappelijke Regeling de Zeeuwse Muziekschool
  doel: Deze regeling heeft ten doel een vorm van bestuurlijke en organisatorische
    samenwerking, waarbinnen het geven van kunsteducatieve activiteiten, waaronder
    instrumentaal en vocaal muziekonderwijs en muzikale vorming in de ruimste zin
    ten behoeve van leerlingen woonachtig in de deelnemende gemeenten wordt uitgeoefend.
