  bevoegdheden:
  - kop_artikel: Artikel 4 Taken en bevoegdheden
    inhoud_artikel: 1. Gemeenschappelijke regeling MER verricht alle uitvoerende taken
      en verzorgt of ondersteunt het operationeel beleid van Gemeenschappelijke regeling
      MER en/of de deelnemende gemeenten op de taakvelden back office dienstverlening
      en bedrijfsvoering. Ter uitvoering hiervan zijn de colleges van burgemeester
      en wethouders van de deelnemende gemeenten bevoegd om taken en bevoegdheden
      over te dragen aan Gemeenschappelijke regeling MER.2. Voorts is Gemeenschappelijke
      regeling MER belast met:a. Het opstellen van verweerschriften tegen bezwaar-
      en beroepschriften. Het beslissen op bezwaarschriften voor zover het betrekking
      heeft op het werkgebied van Gemeenschappelijke regeling MER vindt plaats door
      de afzonderlijke colleges van de deelnemende gemeenten.b. Afhandeling van klachten
      voor zover deze betrekking hebben op Gemeenschappelijke regeling MER.c. Registratie,
      afhandeling, voortgangsbewaking en archivering ten aanzien van (digitale)aanvragen,
      verzoeken, correspondentie en overige post ten aanzien van de werkzaamheden
      voortvloeiende uit de taken en bevoegdheden. Gemeenschappelijke regeling MER
      draagt zorg en is verantwoordelijk voor de voorbereiding van de taken genoemd
      onder het eerste en tweede lid en doet daartoe voorstellen aan de colleges of
      als de gemeenteraden de beslissingsbevoegdheid hebben, via de colleges aan de
      gemeenteraden.3. De specificatie en wijze van uitvoering van de taken en bevoegdheden
      als genoemd in het eerste lid en de daaraan verbonden kosten per deelnemer worden
      in 'Jaarwerkplannen', ex artikel 18 van deze regeling, tussen ieder van de deelnemers
      en het Algemeen Bestuur van Gemeenschappelijke regeling MER vastgelegd in een
      (deel)overeenkomst van opdracht.4. Het Algemeen Bestuur kan besluiten dat Gemeenschappelijke
      Regeling MER, bij samenwerkingsovereenkomst en onder door hem te stellen voorwaarden,
      één van de in het eerste lid genoemde taken verricht ten behoeve van andere
      instanties of van buiten het verzorgingsgebied van deze regeling gelegen gemeenten
      die daartoe een verzoek doen.
