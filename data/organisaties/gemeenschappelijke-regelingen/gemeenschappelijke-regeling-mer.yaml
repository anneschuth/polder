  citeertitel: Gemeenschappelijke Regeling MER
  doel: Gemeenschappelijke Regeling MER behartigt de gemeenschappelijke en afzonderlijke
    belangen van de deelnemende gemeenten op back office dienstverlening en de bedrijfsvoering.
    De deelnemende gemeenten werken daarbij vooralsnog samen op het gebied van Omgevingsrecht,
    Algemene Plaatselijke Verordening (APV) en bijzondere wetgeving. De gemeenten
    hebben de intentie om de samenwerking naar meer terreinen uit te breiden.
