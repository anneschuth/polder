description:
  text: 'Sabewa Zeeland is een uitvoeringsorganisatie. Wij verzorgen de heffing en
    invordering van de waterschapsbelasting voor waterschap Scheldestromen en de gemeentelijke
    belastingen van acht Zeeuwse gemeenten, te weten: Borsele, Goes, Hulst, Kapelle,
    Reimerswaal, Sluis, Terneuzen en Tholen.Wij behandelen ook de bezwaar- en beroepschriften
    die u kunt indienen tegen de belastingaanslagen. Als u een verzoek voor kwijtschelding
    indient, behandelen wij deze ook. Verder voeren we de taken en werkzaamheden in
    het kader van de Wet waardering onroerende zaken (Wet WOZ) uit voor de aangesloten
    gemeenten.De bepaling van de hoogte van de belastingtarieven blijft een bevoegdheid
    van de gemeenten en het waterschap afzonderlijk.'
