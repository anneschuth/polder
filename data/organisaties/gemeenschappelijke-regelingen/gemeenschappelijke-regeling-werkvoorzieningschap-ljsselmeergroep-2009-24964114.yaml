  bevoegdheden:
  - inhoud_artikel: Artikel 61 Het openbaar lichaam is, ter behartiging van het in
      artikel 4 genoemde belang, bevoegd tot:a. het oprichten en verwerven van, het
      deelnemen in, het samenwerken met, het voeren van de directie over, het exploiteren
      van, als mede het (doen) financieren van andere ondernemingen, in welke rechtsvorm
      ook, met name in verband met de daartoe geëigende bedrijven, zoals fabrieken,
      werkplaatsen en dienstverlenende instellingen, door aanwending van alle middelen
      welke daaraan dienstbaar kunnen zijn of door tewerkstelling van personeel in
      het bedrijfsleven of bi) de overheid en het voeren van management;b. het uitoefenen
      van bevoegdheden welke bij of krachtens de Wsw aan de gemeentebesturen zijn
      toegekend (met uitzondering van het vaststellen van verordeningen krachtens
      de Wsw);c. het verrichten van in het kader van bovengenoemd belang alle noodzakelijke
      en gewenste taken voor zover deze krachtens de wet niet zijn voorbehouden aan
      een ander rechtspersoonlijkheid bezittend lichaam;d. het verrichten van al hetgeen
      met het vorenstaande verband houdt of daartoe bevorderlijk kan zijn, alles in
      de ruimste zin des woords.2 De verdeling van de bevoegdheden tussen de bestuurorganen
      is gelijk aan die welke in de Gemeentewet ten aanzien van de gemeentelijke bestuursorganen
      is neergelegd, tenzij uit deze regeling anders blijkt.3 Het algemeen bestuur
      kan zijn bevoegdheden met inachtneming van artikel 33, eerste lid, van de Wgr
      geheel of gedeeltelijk overdragen aan het dagelijks bestuur, voor zover dit
      in overeenstemming is met het ter zake bepaalde in de Wsw. Het dagelijks bestuur
      oefent die bevoegdheid uit overeenkomstig de eventueel door het algemeen bestuur
      te stellen regels.4 Op de oprichting van en de deelneming in organisaties met
      een privaatrechtelijke rechisvorm is het bepaalde in artikel 160 van de Gemeentewet
      van overeenkomstige toepassing.
