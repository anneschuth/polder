  citeertitel: Gemeenschappelijke Regeling Werkvoorzieningschap lJsselmeergroep 2009
  doel: Het openbaar lichaam heeft ten doel het verzorgen en doen verzorgen van arbeidstoeleiding
    en re-integratie van werkzoekenden en werklozen in de ruimste zin des woords,
    waaronder:a. het in het kader van de Wsw bieden van arbeid onder aangepaste omstandigheden
    aan de in de Wsw bedoelde personen;b. het benutten van de infrastructuur van het
    sociale werkvoorzieningschapsbedrijf voor reintegratiedoeleinden voor de deelnemende
    gemeenten.
