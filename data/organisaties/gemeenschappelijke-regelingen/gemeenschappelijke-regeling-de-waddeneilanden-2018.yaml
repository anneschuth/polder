gr_meta:
  citeertitel: Gemeenschappelijke regeling De Waddeneilanden 2018
  doel: 1. Het openbaar lichaam verleent bemiddeling en/of ondersteuning bij de totstandkoming
    en/of uitvoering van samenwerkingsovereenkomsten tussen twee of meer aan de regeling
    deelnemende gemeenten.2. Het openbaar lichaam verleent desgevraagd diensten aan
    één of meer aan de regeling deelnemende gemeenten, dan wel bevordert onderlinge
    dienstverlening tussen de gemeenten, wanneer dit uit doelmatigheidsoverwegingen
    wenselijk wordt geacht.
