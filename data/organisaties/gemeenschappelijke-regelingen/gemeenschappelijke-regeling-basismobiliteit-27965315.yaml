gr_meta:
  citeertitel: Gemeenschappelijke Regeling Basismobiliteit
  doel: De bedrijfsvoeringsorganisatie is ingesteld ter gemeenschappelijke behartiging
    van de belangen van de deelnemers met betrekking tot het tot stand brengen, ontwikkelen
    en in stand houden van een kwalitatief hoogwaardig, herkenbaar, efficiënt en eenvoudig
    te gebruiken stelsel van basismobiliteit. Hierbij wordt rekening gehouden met
    de mogelijkheden van reizigers en hun sociale netwerk en wordt erop toegezien
    dat het aanvullend openbaar vervoer ook in het buitengebied en de kleine kernen
    voldoende gewaarborgd is en dat het vervoer een optimale aansluiting heeft op
    de belangrijkste knooppunten van het openbaar- vervoer-netwerk.
