  bevoegdheden:
  - inhoud_artikel: 1. De deelnemers dragen aan de bedrijfsvoeringsorganisatie en
      haar bestuur de bevoegdheden over die nodig zijn voor de uitvoering van de taak
      bedoeld in artikel 4, eerste lid, onder a, of onderdelen daarvan, alleen voor
      zover de bedrijfsvoeringsorganisatie deze taak of onderdelen daarvan voor de
      betrokken deelnemer uitvoert op basis van de aangegane dienstverleningsovereenkomst.2.
      Onderdeel van een voornemen als bedoeld in artikel 4, derde lid, en een besluit
      als bedoeld in artikel 4, zesde lid, is de wijziging in de overgedragen bevoegdheden
      voor de taak of onderdelen daarvan, die de deelnemer niet meer door de bedrijfsvoeringsorganisatie
      wil laten uitvoeren. De regeling hoeft niet te worden gewijzigd.3. Voor de taken
      bedoeld in artikel 5, eerste lid, kan overdracht van bevoegdheden plaatsvinden
      op voorstel van de betrokken deelnemer. De regeling hoeft niet te worden gewijzigd.4.
      De deelnemers dragen aan de bedrijfsvoeringsorganisatie en haar bestuur geen
      publiekrechtelijke bevoegdheden over.
