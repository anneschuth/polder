gr_meta:
  citeertitel: Gemeenschappelijke Regeling Samenwerking A2-gemeenten
  doel: 'De regeling wordt getroffen ten behoeve van de uitvoering door de Samenwerking
    A2-gemeenten van de door de gemeenten opgedragen bedrijfsvoeringstaken middels
    uitstekende dienstverlening: kwalitatief hoogwaardig, betrouwbaar en in nabijheid
    van de gemeenten. Dit ten behoeve van de gemeentelijke organisaties, inwoners,
    bedrijven en instellingen. De Samenwerking A2-gemeenten behartigt vanuit deze
    missie de gemeenschappelijke en afzonderlijke belangen van de gemeenten op de
    gebieden van:a. Werk en Inkomen;b. Personeel en Organisatie;c. Informatisering
    en Automatisering;d. Juridische Zaken;e. Financiën en Administratie;f. Inkoop;g.
    Communicatie;h. Gegevensbeheer eni. Management op alle bovengenoemde taken.'
