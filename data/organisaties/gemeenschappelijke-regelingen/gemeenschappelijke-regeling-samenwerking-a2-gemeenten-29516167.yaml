  bevoegdheden:
  - kop_artikel: Artikel 5 Algemene bevoegdheidstoedeling
    inhoud_artikel: 1. Voor zover van delegatie sprake is, is dat in deze regeling
      vervat.2. De colleges kunnen andere bevoegdheden die hun bij of krachtens de
      wet zijn toegekend mandateren aan het bestuur, voor zover dit nodig is voor
      de uitvoering van de taken, bedoeld in artikel 4.3. De colleges dragen tevens
      zorg voor benodigde volmachten en machtigingen die de Samenwerking A2-gemeenten
      nodig heeft voor het kunnen functioneren als brede bedrijfsvoeringssamenwerking
      en het uitvoeren van hiermee samenhangende taken.4. Ondermandaat is toegestaan,
      tenzij dat uitdrukkelijk is voorbehouden.5. Er wordt een register bijgehouden
      van de overeenkomstig het tweede en vierde lid (onder)gemandateerde bevoegdheden.
