names:
- value: Gemeenschappelijk orgaan siteholderschap werelderfgoed Hollandse Waterlinies
  valid_from: '1900-01-01'
description:
  text: 'In een gemeenschappelijke regeling is de bestuurlijke en ambtelijke samenwerking
    van de Siteholder vastgelegd. De taken en verantwoordelijk heden van de Siteholder
    zijn het beschermen, beheren en uitdragen van de Werelderfgoedwaarde. Met het
    vervullen van deze taken voldoet de Siteholder aan de internationale verplichtingen
    van Nederland richting UNESCO.Visie: We zorgen er als siteholder voor dat iedereen
    de waarde van het erfgoed kent, dat men bewust met het erfgoed omgaat, dat het
    erfgoed behouden blijft en beschermd wordt en ook dat zoveel mogelijk mensen het
    verhaal van de Hollandse Waterlinies leren kennen, zodat het verhaal wordt doorgegeven
    aan volgende generaties. Bij ontwikkelingen staat de instandhouding en versterking
    van het werelderfgoed Hollandse Waterlinies centraal, uitgaande van de kernkwaliteiten.Missie:
    Met 4 provincies zorgen we er voor dat de Hollandse Waterlinies behouden blijven
    en beschermd worden. Dat het verhaal van de Hollandse Waterlinies uitgedragen
    wordt zodat het voor iedereen toegankelijk wordt op een manier waarbij het duidelijk
    wordt dat het een UNESCO Werelderfgoed betreft en waarom dat zo is. Behoud door
    ontwikkeling is daarbij het motto.'
