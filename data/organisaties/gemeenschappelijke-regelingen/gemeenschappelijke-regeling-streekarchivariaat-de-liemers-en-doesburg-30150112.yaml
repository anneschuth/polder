  bevoegdheden:
  - kop_artikel: Artikel 4 Taken en bevoegdheden
    inhoud_artikel: 1. Voor de behartiging van de in artikel 3, eerste lid genoemde
      belangen vervult het bestuur van het Streekarchivariaat alle taken die de wet
      aan de colleges toekent.2. De colleges dragen in dat kader alle in de wet aan
      hen toegekende bevoegdheden over aan het bestuur van het Streekarchivariaat.3.
      Het Streekarchivariaat zal in het kader van de belangen vermeld in artikel 3,
      tweede lid, zorgdragen voor de ontwikkeling van een samenhangend cultuur-historisch
      beleid, waarin in ieder geval de lokale en regionale geschiedbeoefening gestimuleerd
      zal worden.
