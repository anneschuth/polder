gr_meta:
  citeertitel: Gemeenschappelijke regeling Streekarchivariaat de Liemers en Doesburg
  doel: 1.  Het Streekarchivariaat heeft tot doel de belangen van de deelnemers met
    betrekking tot de zorg, het beheer, de bewaring en het ter beschikking stellen
    van de in de archiefbewaarplaats berustende archiefbescheiden en collecties van
    de deelnemers in gezamenlijkheid te behartigen, alsmede het toezicht op het beheer
    van de archiefbescheiden van de deelnemers voor zover deze niet zijn overgebracht.2.
    Het Streekarchivariaat heeft tevens als doel het vervullen van de functie van
    regionaal kennis- en informatiecentrum op het gebied van de lokale en regionale
    geschiedenis middels het opbouwen en beheren van een zo breed mogelijke collectie
    regionaal-historisch bronnenmateriaal en deze op een zo actief mogelijke wijze
    beschikbaar stellen aan en dienstbaar maken voor een breed publiek.
