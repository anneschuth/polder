  bevoegdheden:
  - kop_artikel: Artikel 2A
    inhoud_artikel: Het bedrijf heeft tot taak:a. het stichten, beheren en exploiteren
      van een of meer gemeenschappelijkevuilafvoerinrichtingen;b. het (doen) uitvoeren
      van werken, welke ten behoeve van de instandhouding, de verbetering en de uitbreiding
      van de gemeenschappelijke vuilafvoerinrichting(en) nodig zijn;c. de regeling
      van de aanvoer van de afvalstoffen uit de gemeenten naar devuilafvoerinrichting(en),
      voor zover uit een oogpunt van efficiënte bedrijfsvoering noodzakelijk en zulks
      met inbegrip van de mogelijkheid om na goedkeuring van alle raden van de deelnemende
      gemeenten over te gaan tot instelling van een gemeenschappelijkevuilophaaldienst;d.
      voortdurend te trachten door samenwerking met andere gemeenten, met ingevolge
      de Wet gemeenschappelijke regelingen tot stand gekomen rechtspersonen of met
      andere derden dan wel door gebruikmaking van andere vuilverwerkingsmethoden,
      een economischer bedrijfsvoering tot stand te brengen.
  - kop_artikel: Artikel 3
    inhoud_artikel: 1. De deelnemende gemeenten verbinden zich na het gereedkomen
      van de inrichting(en) deafvalstoffen, waarover zij de beschikking verkrijgen
      en welke volgens de in artikel 13, sub f,bedoelde omschrijving voor afvoer in
      aanmerking komen, naar de door het dagelijks bestuuraan te wijzen plaats(en)
      te vervoeren en aan het bedrijf ter afvoer aan te bieden.2. De deelnemende gemeenten
      waarborgen hoofdelijk de nakoming van alle verplichtingen van het bedrijf tegenover
      derden.3. De deelnemende gemeenten zullen de financiële gevolgen van de onder
      2 bedoeldenakoming verrekenen in verhouding tot hun inwonertal per 1 januari
      van het jaar van aanvang van de lopende zittingsperiode van het algemeen bestuur,
      afgerond naar beneden op een veelvoud van 100.
