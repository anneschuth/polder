  bevoegdheden:
  - kop_artikel: Artikel 2b
    inhoud_artikel: 1. Aan het bestuur van het Historisch Centrum Limburg zijn de
      navolgende werkzaamheden, taken en bevoegdheden van de Minister en de colleges
      B&W overgedragen:a. de beheerstaken, te onderscheiden in het behouden, bewerken
      en benutten van de archiefbescheiden die berusten in de in artikel 2 genoemde
      archiefbewaarplaatsen;b. de taken en bevoegdheden, bedoeld in de artikelen 15,
      derde lid, 16, tweede lid, 19, 31 en 32, derde lid, van de Archiefwet 1995;c.
      de bevoegdheid van de Minister om op grond van de artikelen 25 en 26, tweede
      lid, van de Archiefwet 1995 de rijksarchivaris in de provincie aan te wijzen;d.
      het adviseren en het doen van voorstellen aan de Minister en de colleges B&W
      over de taken en bevoegdheden, die door de Minister of de colleges B&W worden
      uitgevoerd ingevolge de artikelen 5, 6, 7, 8, 12, 13, 15, eerste en tweede lid,
      30 en 32, tweede lid, van de Archiefwet 1995, ene. het verrichten van door de
      Minister of de colleges B&W opgedragen andere taken die verband houden met de
      behartiging van de belangen, bedoeld in artikel 2, eerste en tweede lid.2. Het
      Historisch Centrum Limburg stelt zich tevens ten doel het in de archiefbewaarplaatsen
      van de Minister en de gemeenten ondergebrachte cultuurhistorisch erfgoed toegankelijk
      te maken voor en onder de aandacht te brengen van een breed publiek.
