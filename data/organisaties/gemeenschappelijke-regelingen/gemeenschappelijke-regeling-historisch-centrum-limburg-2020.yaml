gr_meta:
  citeertitel: Gemeenschappelijke Regeling Historisch Centrum Limburg 2020
  doel: 1. De regeling wordt getroffen met het doel de belangen van de Minister en
    het college bij alle aangelegenheden betreffende de archiefbescheiden, collecties,
    individuele documenten en dergelijke die berusten in de rijksarchiefbewaarplaats
    in de provincie en de archiefbewaarplaats van de gemeente, in gezamenlijkheid
    te behartigen.2. Het Historisch Centrum Limburg stelt zich tevens ten doel het
    in de archiefbewaarplaatsen van de Minister en de gemeenten ondergebrachte cultuurhistorisch
    erfgoed toegankelijk te maken voor en onder de aandacht te brengen van een breed
    publiek.
