  bevoegdheden:
  - kop_artikel: Artikel 4 Bevoegdheden/taken
    inhoud_artikel: 1. Het bestuur van het openbaar lichaam is gemachtigd om de bevoegdheden,
      die de deelnemers hebben op grond van de hierna genoemde wetten dan wel wetsartikelen,
      uit te voeren:a. Participatiewet;b. Wet inkomensvoorziening oudere en gedeeltelijk
      arbeidsongeschikte werkloze werknemers;c. Wet inkomensvoorziening oudere en
      gedeeltelijk arbeidsongeschikte gewezen zelfstandigen;d. Wet gemeentelijke schuldhulpverlening;e.
      Artikel 1.13 Wet kinderopvang en kwaliteitseisen peuterspeelzalen.f. Wet Sociale
      Werkvoorzieningg. Algemene wet bestuursrecht;h. Wet openbaarheid van bestuur.i.
      Verordening maatschappelijke Participatie Kinderen MVS.j. art. 15 lid 1 Archiefwet
      1995:k. art. 8 Archiefbesluit 1995:l. art. 9 Archiefbesluit 1995:2. De deelnemer
      kan bij afzonderlijk besluit, en met inachtneming van artikel 3 van deze regeling,
      afzonderlijk bevoegdheden aan het bestuur van het openbaar lichaam overdragen.3.
      Aan de afzonderlijke overdracht moet vooraf toestemming door het dagelijks bestuur
      worden verleend.4. De niet overdragende deelnemer wordt jaarlijks over de afzonderlijke
      overdracht geïnformeerd.5. Aan het dagelijks bestuur van het openbaar lichaam
      kan de bevoegdheid gemandateerd worden om beleidsregels vast te stellen.6. Het
      bestuur van het openbaar lichaam is eveneens gemachtigd de krachtens voornoemde
      wetten vastgestelde verordeningen en regels uit te voeren .
