  citeertitel: Gemeenschappelijke regeling ter bevordering democratische verankering
    raden en staten bij implementatie en uitvoering Nij Begun
  doel: 'Artikel 1 Begripsbepaling en doel1. In deze regeling wordt verstaan onder:-
    Algemene besturen: de algemene besturen van de waterschappen Hunze en Aa’s en
    Noorderzijlvest;- Deelnemers: provinciale staten, raden en algemene besturen;-
    Raden: de Groningse en Noord-Drentse raden, te weten de gemeenten Aa en Hunze,
    Eemsdelta, Groningen, Het Hogeland, Midden-Groningen, Noordenveld, Oldambt, Pekela,
    Stadskanaal, Tynaarlo, Veendam, Westerkwartier en Westerwolde;- Provinciale staten:
    de provinciale staten van de provincie Groningen.2. De samenwerking richt zich
    op overleg en de advisering aan de raden, staten en algemene besturen over besluitvormingsprocessen
    die voortkomen uit de implementatie en uitvoering van Nij Begun en waar opportuun
    in samenhang met parallelle processen vanuit het Nationaal Programma Groningen.'
