gr_meta:
  doel: 1. Het openbaar lichaam is ingesteld met als doel de belangen van de deelnemers
    met betrekking tot de zorg, het beheer, de bewaring en het ter beschikking stellen
    van de in de archiefbewaarplaats berustende archiefbescheiden en collecties van
    de deelnemende gemeenten te behartigen alsmede het toezicht op het beheer van
    de archiefbescheiden van de deelnemers voor zever deze niet zijn overgebracht
    (artikelen 30 en 32 Archiefwet 1995).2. Het openbaar lichaam heeft tevens als
    doel het in het samenwerkingsgebied vervullen van de functie van regionaal kennis-
    en informatiecentrum op het gebied van de lokale en regionale geschiedenis middels
    het opbouwen en beheren van een zo breed mogelijke collectie regionaal-historisch
    bronnenmateriaal en deze op een zo actief mogelijke wijze beschikbaar stellen
    aan en dienstbaar maken voor een breed publiek.
