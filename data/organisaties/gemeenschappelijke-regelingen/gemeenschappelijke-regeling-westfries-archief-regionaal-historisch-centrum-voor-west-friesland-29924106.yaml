  bevoegdheden:
  - kop_artikel: 4 Taken en bevoegdheden
    inhoud_artikel: 1. Voor de behartiging van de in het eerste lid van het vorige
      artikel genoemde belangen vervullen het openbaar lichaam en zijn organen alle
      taken die de Wet aan de deelnemers en hun bestuursorganen toekent.2. De daartoe
      bevoegde bestuursorganen van de deelnemers dragen in dat kader alle in de Wet
      aan hen toegekende bevoegdheden over aan de overeenkomstige bestuursorganen
      van het openbaar lichaam.3. Het openbaar lichaam zal in het kader van de belangen
      vermeld in het tweede lid van het vorige artikel zorgdragen voor de ontwikkeling
      van een samenhangend cultuur-historisch beleid, waarin in ieder geval de lokale
      en regionale geschiedbeoefening gestimuleerd zal worden.4. Het openbaar lichaam
      verleent inspraak aan ingezetenen en andere belanghebbenden bij de voorbereiding,
      uitvoering en evaluatie van beleid. Op inspraak is in beginsel de procedure
      van afdeling 3.4 van de Algemene wet bestuursrecht van toepassing, tenzij het
      openbaar lichaam een andere inspraakverordening heeft vastgesteld.
