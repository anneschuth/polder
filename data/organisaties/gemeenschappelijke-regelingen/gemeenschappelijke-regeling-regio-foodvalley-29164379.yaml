gr_meta:
  citeertitel: Gemeenschappelijke Regeling Regio Foodvalley
  doel: De gemeenschappelijke regeling wordt getroffen om de FoodValley regio een
    Europese topregio te maken op het gebied van kennis, ontwikkeling en innovatie
    in de agro-foodsector door versterking van het vestigingsklimaat en de kwaliteit
    van de leefomgeving. De gemeenschappelijke regeling Regio FoodValley werkt daartoe
    samen met ondernemers en onderwijs/onderzoek. Regio FoodValley concentreert zich
    op de terreinen economie, werkgelegenheid, ruimtelijke ontwikkeling, wonen en
    mobiliteit.
