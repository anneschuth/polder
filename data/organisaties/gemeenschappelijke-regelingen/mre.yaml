description:
  text: Metropoolregio Eindhoven (MRE) is een bestuurlijke samenwerking tussen 21
    gemeenten in het zuidoosten van de provincie Noord-Brabant op basis van de Wet
    gemeenschappelijke regelingen (Wgr). Het betreft de gemeenten Asten, Bergeijk,
    Best, Bladel, Cranendonck, Deurne, Eersel, Eindhoven, Geldrop-Mierlo, Gemert-Bakel,
    Heeze-Leende, Helmond, Laarbeek, Nuenen c.a., Oirschot, Reusel-de Mierden, Son
    en Breugel, Someren, Valkenswaard, Veldhoven en Waalre.
