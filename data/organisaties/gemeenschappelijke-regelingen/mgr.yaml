description:
  text: 'De MGR is een platform voor samenwerking en afstemming tussen gemeenten in
    de regio. Dat zijn de gemeenten: Berg en Dal, Beuningen, Druten, Heumen, Mook
    en Middelaar, Nijmegen en Wijchen.Er vallen twee uitvoeringsmodules onder de MGR:
    iRvN en WerkBedrijf.iRvN is de regionale samenwerkingspartner op ICT-gebied voor
    de gemeenten in Het Rijk van Nijmegen. Alle zeven gemeenten hebben hun ICT ondergebracht
    bij iRvN. Door samenwerking realiseert iRvN schaalvoordelen, centralisatie en
    standaardisatie van ICT- en informatiesystemen binnen de aangesloten gemeenten.WerkBedrijf
    voert voor de deelnemende gemeenten het werkdeel van de Participatiewet uit. Daarnaast
    wordt ook de Wet sociale werkvoorziening uitgevoerd. WerkBedrijf coördineert ook
    de arbeidsmatige dagbesteding (WMO).'
