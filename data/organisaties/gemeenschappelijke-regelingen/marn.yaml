description:
  text: De MARN (Milieusamenwerking en Afvalverwerking Regio Nijmegen) is een openbaar
    lichaam waarin de zeven gemeenten in de regio Nijmegen samenwerken. De gemeenschappelijke
    regeling wordt getroffen ter ondersteuning van de behartiging van de gemeenschappelijke
    belangen van de deelnemende gemeenten ter bescherming van het milieu, waaronder
    een optimale en milieuhygiënisch verantwoorde verwijdering van afvalstoffen. Deze
    gemeenten zijn Nijmegen, Heumen, Beuningen, Druten, Wijchen, Mook en Middelaar,
    en Berg en Dal.
  url: https://www.marn.nl/
