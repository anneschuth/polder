  citeertitel: gemeenschappelijke regeling openbaar lichaam Plusteam
  doel: Het openbaar lichaam behartigt op een adequate, effectieve en efficiënte wijze
    de belangen van de deelnemende gemeenten in het samenwerkingsgebied door het op
    een kwalitatief hoogwaardige wijze verrichten van uitvoeringstaken en het verlenen
    van ondersteuning op het terrein van de jeugdhulp in het kader waarvan de gemeente
    op grond van artikel 1.3 tweede lid van de Jeugdwet gehouden is voorzieningen
    en maatregelen te treffen alsmede op het terrein van maatschappelijke ondersteuning
    in het kader waarvan de gemeente op grond van artikel 1.2.1 van de Wet maatschappelijke
    ondersteuning 2015 gehouden is maatwerkvoorzieningen te treffen.
