- value: Samenwerking Kempengemeenten
  valid_from: '1900-01-01'
description:
  text: De colleges van burgemeester en wethouders van de gemeenten Bergeijk, Bladel,
    Eersel, Oirschot en Reusel-De Mierden en de burgemeesters van de gemeenten Eersel,
    Oirschot en Reusel-De Mierden, ieder voor zover het hun eigen bevoegdheden betreft
    nemen deel aan de Gemeenschappelijke Regeling Samenwerking Kempengemeenten.De
    regeling wordt getroffen ter gezamenlijke behartiging van de afzonderlijke en
    gemeenschappelijke belangen van de bestuursorganen op het gebied van:- Informatie
    en communicatie technologie, waaronder Samenwerking geografische informatievoorziening
    en BAG- De Wmo, Wet gemeentelijke schuldhulpverlening, Jeugdwet, Jeugdhulp, minimaregelingen
    op grond van de Participatiewet- Vergunningverlening, toezicht en handhaving
