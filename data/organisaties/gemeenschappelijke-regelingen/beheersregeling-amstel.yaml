  bevoegdheden:
  - kop_artikel: Artikel 4  Beheersregeling
    inhoud_artikel: 1 De besturen van Utrecht en Zuid-Holland dragen de uitoefening
      van hun uit de Provinciewet voortvloeiende bevoegdheid met betrekking tot het
      beheer van de Amstel over aan het bestuur van Noord-Holland, met inbegrip van
      de eventuele toepassing van bestuursdwang.2 Het bestuur van Noord-Holland zal
      het beheer uitvoeren en handhaven overeenkomstig de scheepvaart- en vaarwegenregelgeving
      zoals die is bepaald bij of krachtens een door provinciale staten van Noord-Holland
      vastgestelde verordening.
