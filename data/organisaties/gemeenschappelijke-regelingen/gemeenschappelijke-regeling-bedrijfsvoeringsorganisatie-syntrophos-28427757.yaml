  bevoegdheden:
  - kop_artikel: Artikel 5 Taken
    inhoud_artikel: 1.  In het kader van de doelstelling heeft de Bedrijfsvoeringsorganisatie
      de volgende taken:a.  Aanschaf, ontwikkeling, onderhoud, beheer en exploitatie
      van data en telefonie,   hardware, software, netwerk infrastructuren, applicaties,
      Geo-informatie, waaronder begrepen de registratie in het kader van BGT, BAG
      en WKPB, en alle overige ICT ondersteunende systemen.b. Uitvoering van de in
      de dienstverleningsovereenkomsten opgenomen taken,   alsmedewettelijke taken.2.
      De Bedrijfsvoeringsorganisatie gaat dienstverleningsovereenkomsten aan met de
      Deelnemers.3. Het Bestuur kan besluiten tot het aangaan van dienstverleningsovereenkomsten
      met niet-Deelnemers.4. Aan de Bedrijfsvoeringsorganisatie worden voor de realisatie
      van de in artikel 4 omschreven doelstelling alle bevoegdheden van regeling en
      bestuur gemandateerd, die nodig zijn voor de uitvoering van de in lid 1 genoemde
      taken.5. Ondermandaat is toegestaan, tenzij dat uitdrukkelijk is voorbehouden.6.
      De Deelnemers dragen geen bevoegdheden over aan de Bedrijfsvoeringsorganisatie.
