gr_meta:
  citeertitel: Gemeenschappelijke regeling bedrijfsvoeringsorganisatie Syntrophos
  doel: 1. De Bedrijfsvoeringsorganisatie heeft tot doel:Het realiseren en behouden
    van de reeds aanwezige benodigde informatievoorzieningen en het efficiënte en
    professionele beheer daarvan ten behoeve van de deelnemende Gemeenten en de coördinatie
    van ICT- activiteiten in verband met de verdere ontwikkeling van de in de dienstverleningsovereenkomsten
    opgesomde activiteiten. Daarnaast kan de Bedrijfsvoeringsorganisatie met toestemming
    van het Bestuur eveneens werkzaamheden verrichten op voormeld terrein ten behoeve
    van niet-deelnemende organisaties.2. De invoering van de Regeling dient de volgende
    kwalitatieve doelstellingen te realiseren:. verminderen kwetsbaarheid;. vergroten
    slagkracht;. ontwikkelingen en landelijke vereisten beter het hoofd bieden;. beheersen
    van kosten(-stijgingen) en benodigde investeringen;. verbeteren van de dienstverlening.
