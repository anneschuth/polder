  bevoegdheden:
  - kop_artikel: Artikel 5. Bevoegdheden
    inhoud_artikel: 1. Aan het openbaar lichaam worden de bevoegdheden overgedragen
      tot regeling, bestuur en beheer van de uitvoering van de taken als bedoeld in
      artikel 4.2. Tot de bevoegdheden horen uitsluitend de bevoegdheden die bij of
      krachtens de wet zijn toegekend aan de colleges van burgemeester en wethouders
      van de deelnemende gemeenten, waaronder tevens wordt begrepen het verrichten
      van privaatrechtelijke rechtshandelingen, voor zover deze betrekking hebben
      op vervulling van de taken als bedoeld in artikel 4.
