  doel: Het samenwerkingsorgaan heeft tot doel, vanuit de gedachte van verlengd lokaal
    bestuur en met inachtneming van wat verder in de regeling is bepaald, het behartigen
    van gemeenschappelijke belangen van de gemeenten op de in artikel 5 genoemde beleidsterreinen
    die bepalend zijn voor een evenwichtige en voorspoedige ontwikkeling van het gebied.
