  bevoegdheden:
  - kop_artikel: Artikel 5 Beleidsterreinen, taken en bevoegdheden
    inhoud_artikel: 'Ter behartiging van de in artikel 4 lid 1 genoemde belangen voert
      het samenwerkingsorgaan binnen de onderstaande beleidsterreinen de volgende
      taken uit:1.**Economische zaken, toerisme en recreatie**: het vaststellen, periodiek
      actualiseren en de procesbegeleiding van een:a. Bedrijventerreinenstrategie;b.
      Regionale visie toerisme en recreatie;c. Economische agenda;d. Kantorenstrategie;2.**Vervallen**3.**Natuur
      en Landschap**: het vaststellen, periodiek actualiseren, de procesbegeleiding
      van visies, beleidsplannen en programma’s ten behoeve van regionale landschapsontwikkeling.4.**Ruimtelijke
      ordening**: het vaststellen, periodiek actualiseren, de procesbegeleiding van
      visies, beleidsplannen en programma’s ten behoeve van regionale ruimtelijke
      ontwikkelingen.5.**Verkeer en vervoer**:a. Het vaststellen, periodiek actualiseren
      en implementeren van een Regionaal Verkeers- en Vervoersplan (RVVP);b. Het in
      stand houden van een Collectief Vraagafhankelijk Vervoerssysteem (CVV);c. Het
      gestelde onder b is niet van toepassing op de gemeenten Alphen aan den Rijn
      en Nieuwkoop tot deze gemeenten besluiten alsnog aan te sluiten bij het Collectief
      Vraagafhankelijk Vervoersysteem van Holland Rijnland;d. De onder c. genoemde
      gemeenten blijven tot het moment van aansluiting op dit beleidsterrein buiten
      de kostentoedeling die gemoeid gaat bij de uitvoering van de taken gesteld onder
      b.;e. de onder c. genoemde gemeenten zijn tot het moment van aansluiting op
      dit beleidsterrein niet bevoegd deel te nemen aan de besluitvorming die betrekking
      heeft op de onder b. gestelde taken.6.**Wonen**:a. Het vaststellen en periodiek
      actualiseren van een:1. Regionale woonvisie;2. Regionaal woningbouw- en herstructureringsprogramma;3.
      Huisvestingsverordening als bedoeld in artikel 2 lid 1 van de Huisvestingswet
      vigerend voor die gemeenten waarvan de raad expliciet heeft besloten deze bevoegdheid
      aan het samenwerkingsorgaan te hebben overdragen; dan wel een model-huisvestingsverordening
      als bedoeld in artikel 2 lid 1 van de Huisvestingswet vigerend voor die gemeenten
      waarvan de raad expliciet heeft besloten deze bevoegdheid vooralsnog niet aan
      het samenwerkingsorgaan te hebben overdragen, welke (model-) huisvestingsverordening
      slechts regels stelt met betrekking tot het in gebruik nemen of geven van woonruimte
      als bedoeld in hoofdstuk II van de Huisvestingswet;b. Het sluiten van overeenkomsten
      als bedoeld in artikel 4 van de Huisvestingswet voor die gemeenten die de bevoegdheid
      expliciet hebben overgedragen;c. Het uitvoeren van hetgeen aan burgemeester
      en wethouders is opgedragen in hoofdstuk V van de Huisvestingswet;Het beheren
      van door andere overheden te verstrekken woningbouwsubsidies.7.**Sociale Agenda**:a.
      Het vaststellen en periodiek actualiseren van een regionaal programma voor de
      Sociale Agenda;b. De instandhouding van een Regionaal Bureau Leerplicht Holland
      Rijnland (RBL Holland Rijnland) dat belast is met de uitoefening van de Leerplichtwet
      1969;c. De bestrijding van het voortijdig schoolverlaten door middel van de
      uitoefening van de taken en bevoegdheden als bedoeld in artikel 8.3.2 en artikel
      8.3.3 Wet educatie en beroepsonderwijs, artikel 118h en artikel 118i Wet op
      het voortgezet onderwijs, en artikel 162b en artikel 162c Wet op de expertisecentra;d.
      Vervallen;e. Deelname aan interregionaal overleg met de gezamenlijke gemeenten
      in de andere samenwerkingsgebieden in de regio van het Regionaal Platform Arbeidsmarkt
      Rijn-Gouwe;f. Het onder b. en c. gestelde is niet van toepassing op de gemeenten
      Alphen aan den Rijn en Nieuwkoop tot deze gemeenten besluiten de onder b. en
      c. genoemde taken en bevoegdheden over te dragen aan het samenwerkingsorgaan;g.
      De onder f. bedoelde gemeenten blijven buiten de kostentoedeling voor de onder
      b. en c. genoemde taken;h. De onder f. bedoelde gemeenten zijn niet bevoegd
      deel te nemen aan de besluitvorming over de onder b. en c. genoemde taken.8.**Regionale
      Investeringsstrategie**:Het instellen en beheren van het ‘Regionaal Investeringsfonds
      Holland Rijnland’.9.**Subsidies**:a. Het ontvangen van subsidies en het verlenen
      van subsidies voor wat betreft de taken en bevoegdheden zoals deze in dit artikel
      zijn opgenomen.b. Het vaststellen van een Algemene subsidieverordening met in
      achtneming van het bepaalde in titel 4.2 van de Algemene wet bestuursrecht.'
