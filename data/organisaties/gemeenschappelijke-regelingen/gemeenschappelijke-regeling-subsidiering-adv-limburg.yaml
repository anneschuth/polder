  bevoegdheden:
  - inhoud_artikel: 1. De colleges van de gemeenten  Beesel, Bergen, Echt-Susteren,
      Peel en Maas, Leudal, Maasgouw, Nederweert, Roerdalen, Roermond, Venlo en Weert
      uit de regio Noord- en Midden-Limburg dragen de in artikel 2, lid 1 en lid 3
      genoemde aan hun toekomende bevoegdheden op aan het college van de gemeente
      Roermond, alsmede de bevoegdheid als bedoeld in artikel 2, tweede lid, van de
      Wet gemeentelijke antidiscriminatievoorzieningen een gezamenlijke verordening
      op te stellen voor de deelnemende gemeenten uit de regio Noord- en Midden-Limburg.2.
      De colleges van de gemeenten Beek, Beekdaelen, Brunssum, Eijsden-Margraten,
      Gulpen-Wittem, Heerlen, Kerkrade, Landgraaf, Meerssen, Simpelveld, Sittard-Geleen,
      Stein, Vaals, Valkenburg aan de Geul en Voerendaal uit de regio Zuid-Limburg
      dragen de in artikel 2, lid 1 en lid 3 genoemde aan hun toekomende bevoegdheden
      op aan het college van de gemeente Maastricht, alsmede de bevoegdheid als bedoeld
      in artikel 2, tweede lid, van de Wet gemeentelijke antidiscriminatievoorzieningen
      een gezamenlijke verordening op te stellen voor de deelnemende gemeenten uit
      de regio Zuid-Limburg.
