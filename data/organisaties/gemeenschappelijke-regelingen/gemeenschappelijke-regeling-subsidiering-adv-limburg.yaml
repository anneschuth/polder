gr_meta:
  citeertitel: Gemeenschappelijke regeling subsidiëring ADV-Limburg
  doel: 1. Het doel van deze regeling is het aan de inwoners van de deelnemende gemeenten
    bieden van toegang tot een antidiscriminatievoorziening en het daarvoor (laten)
    oprichten en het in stand houden van de AntiDiscriminatieVoorziening Limburg,
    verder te noemen "ADV-Limburg".2. De gemeente Maastricht zal optreden als centrumgemeente
    voor de regio Zuid-Limburg met betrekking tot de inhoud van deze regeling.3. De
    gemeente Roermond zal optreden als centrumgemeente voor de regio Noord- en Midden-Limburg
    met betrekking tot de inhoud van deze regeling.
  samenwerkingsvorm:
    value: '''Regeling zonder meer'''
    afkorting: RZM
