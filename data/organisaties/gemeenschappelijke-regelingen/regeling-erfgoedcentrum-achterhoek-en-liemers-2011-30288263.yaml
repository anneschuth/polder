  bevoegdheden:
  - kop_artikel: Artikel 8
    inhoud_artikel: 1. Voor zover taken en bevoegdheden in deze regeling niet aan
      een ander persoon of orgaan worden toegekend, berusten deze bij het algemeen
      bestuur.2. Het algemeen bestuur heeft in ieder geval de volgende taken en bevoegdheden:a.
      het benoemen van leden van het dagelijks bestuur en de voorzitter;b. het vaststellen
      van de begroting en jaarrekening;c. het vaststellen van verordeningen in het
      kader van het aan het bestuur van de regeling opgedragen archieftaak, inclusief
      de bevoegdheid om een verordening vast te stellen als bedoeld in artikel 229
      van de Gemeentewet.3. Het algemeen bestuur stelt regels vast met betrekking
      tot:a. het beheer van de archiefbewaarplaats;b. het beheer van de naar die archiefbewaarplaats
      overgebrachte archiefbescheiden;c. het toezicht op het beheer van de niet naar
      die archiefbewaarplaats overgebrachtearchiefbescheiden.4. Onder het stellen
      van regels zijn mede begrepen die voor de vergoeding van kosten met betrekking
      tot de raadpleging van archiefbescheiden.5. Voor 1 juli van elk jaar stelt het
      algemeen bestuur op voorstel van de directeur een verslag over de werkzaamheden
      van de dienst in het daaraan voorafgaande kalenderjaar vast. Het verslag wordt
      vervolgens aan de deelnemende gemeenten, ter attentie van de gemeentelijke bestuursorganen,
      ter kennisname gezonden.
  - kop_artikel: Artikel 14
    inhoud_artikel: Onverminderd zijn bevoegdheden als bedoeld in artikel 33b van
      de Wet gemeenschappelijke regelingen behoren tot de taken van het dagelijks
      bestuur mede:1. het beheer van de activa en passiva van het Erfgoedcentrum,
      inclusief het dragen van verantwoordelijkheid voor een goede en optimale bedrijfsvoering;2.
      de zorg, voor zover deze van het dagelijks bestuur afhangt voor de controle
      op het geldelijk beheer en de boekhouding van het Erfgoedcentrum;3. het houden
      van een voortdurend toezicht op alles wat het Erfgoedcentrum aangaat;4. al hetgeen
      deze regeling voor het overige aan het dagelijks bestuur opdraagt dan wel door
      het dagelijks bestuur wenselijk wordt geoordeeld in het kader van een goede
      en optimale bedrijfsvoering.
  - kop_artikel: Artikel 17
    inhoud_artikel: 1. De voorzitter is belast met de uitvoering van de besluiten
      van de bestuursorganen.2. De voorzitter ondertekent de stukken die van de bestuursorganen
      uitgaan.3. De voorzitter vertegenwoordigt het Erfgoedcentrum in en buiten rechte.
      De vertegenwoordiging kan hij opdragen aan een door hem aan te wijzen gevolmachtigde.4.
      Indien de voorzitter behoort tot het bestuur van een van de deelnemers, die
      partij is in een geding waarbij het Erfgoedcentrum betrokken is, wordt het Erfgoedcentrum
      door zijn vervanger vertegenwoordigd.
