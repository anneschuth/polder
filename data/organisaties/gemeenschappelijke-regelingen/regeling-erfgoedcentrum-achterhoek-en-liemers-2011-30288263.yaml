gr_meta:
  citeertitel: Regeling Erfgoedcentrum Achterhoek en Liemers 2011
  doel: Het Erfgoedcentrum heeft tot doel:a. het overeenkomstig de Archiefwet 1995
    beheren, toegankelijk maken en beschikbaar stellen van archiefbescheiden van de
    deelnemende en andere overheidslichamen;b. het toezicht door de streekarchivaris
    op het beheer van de niet naar de centrale archiefbewaarplaats overgebrachte archiefbescheiden
    van de deelnemers en andere overheidslichamen als hiervoor genoemd onder a.;c.
    het in stand houden en bevorderen van het cultureel erfgoed in het gebied van
    de Achterhoek en de Liemers in de ruimste zin van het woord;d. het binnen en in
    het verlengde van de onder a. tot en met c. omschreven doelstellingen, ontplooien
    van activiteiten die direct en aanwijsbaar de financieel-economische positie van
    het Erfgoedcentrum ten goede komen.
