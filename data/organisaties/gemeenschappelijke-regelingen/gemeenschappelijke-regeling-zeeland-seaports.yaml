  bevoegdheden:
  - inhoud_artikel: Ter uitvoering van de in lid 1 omschreven taak heeft het bestuur
      van de publieke rechtspersoon alle bevoegdheden van regeling en bestuur waaronder
      het opstellen van verordeningen en tot deelname aan het maatschappelijk verkeer
      ter behartiging van de in dit artikel bedoelde belangen en taken overgedragen
      gekregen. Op de overtreding van het gestelde in de verordeningen kan straf worden
      gesteld.Het bestuur van de publieke rechtspersoon is bevoegd zo nodig de naleving
      van de wet- en regelgeving, zoals deze onder meer zijn neer gelegd in de Havenverordening
      van de gemeenschappelijke regeling te verzekeren door de toepassing van bestuursdwang
      c.q. het opleggen van een last onder dwangsom, een en ander op voet van de Algemene
      wet bestuursrecht en voorts artikel 122 Provinciewet en artikel 125 Gemeentewet.De
      bevoegdheid van de publieke rechtspersoon tot het heffen van belasting en rechten
      als bedoeld in artikel 229, eerste lid, onder a en b van de Gemeentewet en de
      artikelen 222c en 223 van de Provinciewet, de rechten waarvan de heffing geschiedt
      krachtens bijzondere wetten, alsmede de heffing bedoeld in artikel 15.33 van
      de Wet milieubeheer. Deze bevoegdheid blijft bestaan totdat de onderneming van
      de Gemeenschappelijke regeling bij akte is ingebracht in de Naamloze vennootschap
      Zeeland Seaports en de betreffende verordeningen zijn ingetrokken.
