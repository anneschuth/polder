gr_meta:
  citeertitel: gemeenschappelijke regeling Zeeland Seaports
  doel: De gemeenschappelijke regeling heeft tot belang en taak de economische ontwikkeling,
    het beheer, het onderhoud en de exploitatie van havens, wegen, werken, inrichtingen,
    gebouwen, werktuigen, industrie- en handelsterreinen en wateren binnen de gebieden,
    aangegeven op de bij deze regeling als Bijlage 1 behorende gewaarmerkte tekening
    (het Beheersgebied). De gemeenschappelijke regeling zal deze taak opdragen aan
    en uit laten voeren door de door haar op te richten Naamloze Vennootschap Zeeland
    Seaports (hierna de NV) en haar Onderneming in deze NV in brengen en voor deze
    NV, zolang dit naar het oordeel van de GR ZSP nodig is, garant staan tegen door
    de NV te stellen zekerheden, alsmede overeenkomsten met haar aan te gaan die bijdragen
    aan de verwezenlijking van de statutaire doelstelling van de NV.
