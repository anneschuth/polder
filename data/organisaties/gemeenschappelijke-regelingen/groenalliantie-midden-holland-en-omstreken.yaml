description:
  text: Groenalliantie Midden-Holland is een samenwerkingsverband van de gemeenten
    Bodegraven-Reeuwijk, Gouda, Waddinxveen, Krimpen aan den IJssel en Krimpenerwaard.
    Doel van de samenwerking is het ontwikkelen en beheren van natuur- en recreatiegebieden
    in deze gemeenten en daarmee een aantrekkelijk en duurzaam leefklimaat realiseren.Groenalliantie
    Midden-Holland e.o. werd op 1 mei 2014 opgericht. Het is een gemeenschappelijke
    regeling gebaseerd op de Wet Gemeenschappelijke Regelingen. Zij kent een Algemeen
    Bestuur (AB) en een Dagelijks Bestuur (DB). Bekijk de bevoegdheden en de samenstelling
    van het bestuur.
