  bevoegdheden:
  - kop_artikel: Bevoegdheden Artikel 7.
    inhoud_artikel: Ter verwezenlijking van de in artikel 5 genoemde taken komen de
      Veiligheidsregio de volgende bevoegdheden toe:a. de bevoegdheden, genoemd in
      artikel 4, eerste lid, van de Brandweerwet 1985;b. de bevoegdheden, genoemd
      in artikel 4, eerste lid, van de Wet geneeskundige hulpverlening bij ongevallen
      en rampen;c. het sluiten van een overeenkomst met de regiopolitie over de inrichting
      en het beheer van een gemeenschappelijke meldkamer en de 112-centrale;d. het
      sluiten van convenanten met het Regionaal College, het bestuur van de GGD Flevoland
      2008, andere overheden en derden over de afstemming, voorbereiding of uitvoering
      van taken die betrekking hebben op hulpverlening en veiligheid.
