  doel: De GR Nieuw Reijerwaard heeft tot doel casu quo als belang het binnen diens
    rechtsgebied ontwikkelen en realiseren van minimaal 90 hectare bedrijventerrein
    op de locatie Nieuw Reijerwaard met de daarbij horende ontsluiting en het daarbij
    horende groen.
