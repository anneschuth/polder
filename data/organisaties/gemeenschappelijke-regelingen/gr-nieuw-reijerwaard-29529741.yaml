  bevoegdheden:
  - kop_artikel: Artikel 6. Bevoegdheden
    inhoud_artikel: 1. Aan het bestuur van de GR Nieuw Reijerwaard worden ter vervulling
      van de in artikel 5 omschreven taken alle bevoegdheden van regelingen en bestuur
      toegekend binnen de grenzen van artikel 30 en 31a van de wet en met inachtneming
      van de beperkingen daarin gesteld.2. Ten behoeve van de in artikel 4 genoemde
      doelstelling kan, indien dit bijzonder aangewezen wordt geacht, de GR Nieuw
      Reijerwaard een of meer stichtingen, maatschappen, vennootschappen, verenigingen,
      coöperaties en onderlinge waarborgmaatschappijen oprichten of daarin deelnemen.3.
      Het in het tweede lid genomen besluit wordt niet genomen dan nadat de raden
      van de deelnemende gemeenten een ontwerpbesluit is toegezonden en in de gelegenheid
      zijn gesteld hun wensen en bedenkingen ter kennis van het Algemeen Bestuur van
      de GR Nieuw Reijerwaard te brengen.
