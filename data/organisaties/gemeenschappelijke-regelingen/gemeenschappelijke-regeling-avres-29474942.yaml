  bevoegdheden:
  - kop_artikel: Artikel 5 Overdracht van taken en bevoegdheden
    inhoud_artikel: 1. Alle taken en alle bevoegdheden die bij of krachtens de Participatiewet,
      de Wet inkomensvoorziening oudere en gedeeltelijke arbeidsongeschikte werknemers,
      de Wet Inkomensvoorziening oudere en gedeeltelijke arbeidsongeschikte gewezen
      zelfstandigen, de Wet sociale werkvoorziening, de Wet gemeentelijke schuldhulpverlening
      en de daarbij behorende of aanverwante algemeen verbindende voorschriften, aan
      de raad of het college van burgemeester en wethouders zijn opgedragen, inclusief
      het vaststellen van verordeningen, die op grond van de Participatiewet, de Wet
      inkomensvoorziening oudere en gedeeltelijke arbeidsongeschikte werknemers, de
      Wet Inkomensvoorziening oudere en gedeeltelijke arbeidsongeschikte gewezen zelfstandigen,
      de Wet sociale werkvoorziening en de daarbij behorende of aanverwante algemeen
      verbindende voorschriften aan de raden of colleges van de deelnemende gemeenten
      toekomen, danwel inclusief de planverplichting die op grond van de Wet gemeentelijke
      schuldhulpverlening aan de raden van de deelnemende gemeenten toekomt, worden,
      voor zover de Participatiewet, de Wet inkomensvoorziening oudere en gedeeltelijke
      arbeidsongeschikte werknemers, de Wet Inkomensvoorziening oudere en gedeeltelijke
      arbeidsongeschikte gewezen zelfstandigen, de Wet sociale werkvoorziening, de
      Wet gemeentelijke schuldhulpverlening en de daarbij behorende of aanverwante
      algemeen verbindende voorschriften het toelaat, aan Avres overgedragen.2. De
      colleges van burgemeester en wethouders van de deelnemende gemeenten dragen
      aan Avres voorts over, voor zover wetgeving dit toelaat, alle taken en bevoegdheden
      van regeling en bestuur met betrekking tot het Besluit bijstandsverlening zelfstandigen.3.
      De raden en de colleges van burgemeester en wethouders van de deelnemende gemeenten
      dragen aan Avres op en over, voor zover wetgeving dit toelaat, het in stand
      houden van en het uitoefenen van alle taken en bevoegdheden behorende bij een
      kredietbank.4. In afwijking van het bepaalde in het derde lid, stellen de raden
      van de deelnemende gemeenten, met het oog op de bedrijfsvoering van de kredietbank,
      een reglement op, waarin voor het aanbieden van krediet in het kader van het
      uitoefenen van haar publieke taak ten minste voorschriften staan opgenomen die
      overeenkomen met het ingevolge de afdelingen 4.2.1, 4.2.2, en 4.2.3, de artikelen
      4:32 en 4:33, paragraaf 4.3.8.1. van de Wet op het financieel toezicht en de
      hoofdstukken IV en V van de Wet op het consumentenkrediet bepaalde.5. Avres
      kan op verzoek van een van de deelnemers, indien het algemeen bestuur hiertoe
      besluit, binnen de overgedragen bevoegdheden, voor deze deelnemer een taak of
      een gedeelte van een taak uitvoeren, conform de eigen beleidsuitgangspunten
      van deze deelnemer. Een besluit hiertoe vermeldt alsdan de voorwaarden waaronder
      deze taak of gedeelte van deze taak wordt uitgevoerd, alsmede de eventuele wijze
      van kostenverrekening.6. In afwijking van het bepaalde in het eerste lid, blijven,
      overeenkomstig hetgeen is gesteld in artikel 8 c van de Participatiewet, de
      taken en bevoegdheden op grond van het bepaalde in de paragrafen 7.1. en 7.3
      van de Participatiewet, voorbehouden aan de colleges van burgemeester en wethouders
      van de gemeenten.
