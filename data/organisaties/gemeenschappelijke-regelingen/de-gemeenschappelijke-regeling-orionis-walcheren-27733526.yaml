  bevoegdheden:
  - kop_artikel: 'Artikel 6: Taken en bevoegdheden'
    inhoud_artikel: '1. Alle taken en bevoegdheden die bij of krachtens de WGS, WSW,
      PW en de daarbij behorende of aanverwante algemeen verbindende voorschriften
      aan de raad, het college of de burgemeester zijn opgedragen, inclusief het vaststellen
      van verordeningen, die op grond van de WGS, WSW, PW en de daarbij behorende
      of aanverwante algemeen verbindende voorschriften aan de raden en colleges van
      de deelnemende gemeenten toekomen, worden, voor zover de WGS, WSW, PW en de
      daarbij behorende of aanverwante algemeen verbindende voorschriften het toelaten
      (en de wet, die het betreft niet is ingetrokken dan wel overdracht van bevoegdheden
      niet meer mogelijk is), aan Orionis Walcheren overgedragen.2. De deelnemende
      gemeenten dragen aan Orionis Walcheren voorts over alle bevoegdheden van regeling
      en bestuur met betrekking tot:a. het Besluit Bijstandverlening Zelfstandigen
      (2004);b. de Wet inkomensvoorziening oudere en gedeeltelijk arbeidsongeschikte
      werkloze werknemers (IOAW);c. de Wet inkomensvoorziening oudere en gedeeltelijk
      arbeidsongeschikte gewezen zelfstandigen (IOAZ);3. Voorts wordt door de deelnemende
      gemeenten aan Orionis Walcheren de uitvoering opgedragen van:a. De Bijzondere
      Bijstand/ Minimabeleid, op basis van het beleid dat ter zake door de deelnemende
      gemeenten is vastgesteld;b. de Wet kinderopvang op basis van het beleid dat
      ter zake door de deelnemende gemeenten is vastgesteld;c. de regeling Dak- en
      Thuislozen;d. voor zover van toepassing de afwikkeling van de Wet inschakeling
      Werkzoekenden (Wiw))e. de Sluitende Aanpak (uitstroom en re-integratieplannen),f.
      de inkoop van producten en diensten op het terrein van re-integratie en gesubsidieerde
      arbeid bij aanbieders ten behoeve van de jaarlijks te realiseren taakstelling;g.
      de advisering van het bestuur van de deelnemenäe gemeenten over het te voeren
      beleid op het terrein van Werk & Inkomen, sociale zekerheid en ontwikkelingen
      op de lokale/regionale arbeidsmarkt;h. kredietverstrekking, schuldhulpverlening
      en budgetbeheer.4. Het algemeen bestuur is bevoegd tot het vaststellen van een
      verordening met betrekking tot de uitvoering van activiteiten de kredietbankfunctie
      betreffende, zoals:a: krediettransacties binnen de Wet Fido;b: schuldenregeling
      op grond van artikel 47 e.v. WCK;c: budgetbeheer zoals bedoeld in artikel 82
      v n de WTK;d: verstrekken van verklaringen op grond van de FW;e: bewindvoering
      en curatele op grond van de FW;f: preventie;g: kredietbankactiviteiten voor
      andere gemeenten.5. Bij de uitvoering van het genoemde onder de leden 1 en 2
      wordt door Orionis Walcheren samengewerkt met het UWV (Uitvoering Werknemersverzekeringen)
      en de externe partners die door Orionis Walcheren ingeschakeld worden bij de
      activering, reïntegratie en arbeidstoeleiding van cliënten. De dienst vervult
      hierbij de regiefunctie namens de deelnemende gemeenten.6. Orionis Walcheren
      kan met instemming van het algemeen bestuur ook diensten aan andere gemeenten
      verlenen. De diensten worden verleend tegen een vooraf overeengekomen kostenvergoeding.7.
      Orionis Walcheren kan op verzoek, indien het algemeen bestuur hiertoe besluit,
      binnen de gedelegeerde bevoegdheden, nader te omschrijven taken gaan uitvoeren.
      Een besluit hiertoe vermeldt alsdan de wijze van kostenverrekening en overige
      voorwaarden waaronder deze taken worden uitgevoerd.'
