  bevoegdheden:
  - kop_artikel: Artikel 5 Taken en bevoegdheden
    inhoud_artikel: Met betrekking tot de behartiging van de in artikel 4, lid 2,
      sub a t/m c genoemde belangen heeft SamenTwente de volgende taken en bevoegdheden:1.
      Publieke gezondheid:a. de instelling en instandhouding van een gezondheidsdienst
      als bedoeld artikel 14, lid 1 van de Wet publieke gezondheidb. Alle bij of krachtens
      de Wet publieke gezondheid aan het college toegekende taken en bevoegdheden;c.
      Alle bij of krachtens de Wet publieke gezondheid aan de gemeentelijke gezondheidsdienst
      toegekende taken en bevoegdheden;d. de benoeming van gemeentelijke lijkschouwers
      als bedoeld in artikel 4 van de Wet op de lijkbezorging;e. op verzoek van één
      of meer deelnemers de uitvoering van specifieke werkzaamheden.2. Jeugdhulp en
      maatschappelijke ondersteuning:a. uitvoeren en/of uitbesteden van taken waarvan
      de Jeugdwet en/of de Wmo 2015 beoogt dat deze regionaal worden uitgevoerd:1.
      jeugdbescherming en jeugdreclassering;2. jeugdzorgplus;3. residentiële/specialistische
      jeugdzorg;4. crisisdienst.b. overige vrijwillig overeengekomen taken:1. uitvoeren
      en/of uitbesteden van werving, matchen en uitvoeren pleegzorg;2. inrichten en
      inhoudelijk faciliteren van een regionaal reflectiepunt;3. inrichten van een
      advies- en consultatiefunctie;4. inrichten van een backoffice voor taken die
      regionaal worden uitgevoerd of ingekocht en uitvoeren van ondersteunende werkzaamheden
      daarin.3. Advies- en meldpunt huiselijk geweld en kindermishandeling:a. de taken
      als bedoeld in of krachtens hoofdstuk 4 van de Wmo 2015.4. Het oprichten van
      onderscheidenlijk deelnemen in stichtingen, verenigingen, maatschappen, vennootschappen,
      coöperaties en onderlinge waarborgmaatschappijen, voor zover dit betreft de
      taken en bevoegdheden als bedoeld in dit artikel onder 1 tot en met 3.5. Het
      bieden van werkgeverschap en/of andere organisatorische voorzieningen ten behoeve
      van ambtelijke capaciteit die door twee of meer deelnemers om doelmatigheidsredenen
      centraal wordt gebundeld.6. (vervalt per 1 januari 2022) Recreatieve voorzieningen:a.
      bevordering van totstandkoming en instandhouding van publieke recreatieve/toeristische
      infrastructuur in Twente;b. aanleg, onderhoud en beheer van publieke recreatieve/toeristische
      voorzieningen die hetzij op zichzelf, hetzij in routeverband, hetzij door opname
      in arrangementen, een bovenlokaal karakter hebben.
