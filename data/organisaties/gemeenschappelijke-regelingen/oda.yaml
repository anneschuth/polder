names:
- value: Omgevingsdienst Achterhoek
  abbr: ODA
  valid_from: '1900-01-01'
description:
  text: Omgevingsdienst Achterhoek (ODA) draagt bij aan een veilige, duurzame en gezonde
    leefomgeving. Wij verlenen omgevingsvergunningen in opdracht van tien gemeenten
    en de provincie Gelderland. Ook zien we erop toe dat bedrijven voldoen aan actuele
    wet- en regelgeving op het gebied van milieu(veiligheid). Daarnaast adviseren
    we onder andere onze opdrachtgevers over archeologie en over verschillende milieu-onderwerpen,
    zoals bodem, geluid en lucht.
  url: https://www.odachterhoek.nl/over-ons/
