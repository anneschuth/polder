gr_meta:
  citeertitel: Gemeenschappelijke regeling Omgevingsdienst Zuid-Holland Zuid
  doel: De regeling is getroffen ter ondersteuning van de deelnemers bij de uitvoering
    van hun taken op het gebied van het omgevingsrecht in het algemeen en de Wet algemene
    bepalingen omgevingsrecht in het bijzonder, alsmede de taken op het terrein van
    vergunningverlening, handhaving en toezicht op grond van de in artikel 5.1 van
    de Wet algemene bepalingen omgevingsrecht genoemde wetten. De Omgevingsdienst
    kan adviserende, ondersteunende en uitvoerende werkzaamheden verrichten op het
    gebied van de zorg voor het milieu en het omgevingsrecht en programma’s en projecten
    uitvoeren op het gebied van milieu en ruimte. De Omgevingsdienst voert voor de
    deelnemers taken en bevoegdheden uit op grond van genoemde wettelijke voorschriften.
