description:
  text: Onze naam zegt alles over ons. Wij zijn een Sociale Dienst. Met onze dienstverlening
    ondersteunen we de gemeenten Harlingen, Terschelling, Vlieland en Waadhoeke bij
    het uitvoeren van hun taken in het sociaal domein. Vooral voor de Participatiewet,
    de Wmo en de Jeugdwet.We zorgen bijvoorbeeld voor bijstandsuitkeringen en andere
    financiële regelingen voor inwoners van de vier gemeenten. We helpen inwoners
    met een bijstandsuitkering bij het vinden van werk of een andere manier om actief
    mee te doen in de samenleving. We kopen Wmo-ondersteuning in bij zorgaanbieders.
    We leveren kennis en ondersteuning aan de gebiedsteams en we verzorgen financiële
    rapportages en begrotingen voor de gemeentebesturen.
