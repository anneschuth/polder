  bevoegdheden:
  - kop_artikel: Artikel 5
    inhoud_artikel: 1. Alle bevoegdheden van de colleges tot het vervullen van de
      in artikel 4, tweede lid, genoemde taken, worden overgedragen aan het bestuur
      van het werkvoorzieningsschap.2. Indien taken als bedoeld in artikel 4, derde
      lid, van deze regeling worden uitgevoerd, dragen de colleges hun bevoegdheden
      daartoe op aan het algemeen bestuur van het werkvoorzieningsschap.3. Waar in
      deze regeling artikelen van de Gemeentewet of van enige andere wet of wettelijke
      regeling van overeenkomstige toepassing worden verklaard, treden in die artikelen
      in de plaats van de gemeente, de raad, burgemeester en wethouders en de burgemeester,
      onderscheidenlijk het werkvoorzieningsschap, het algemeen bestuur, het dagelijks
      bestuur en de voorzitter.
