  citeertitel: Gemeenschappelijke Regeling Waterschapsbedrijf Limburg
  doel: De regeling wordt getroffen in het belang van een zo doelmatig mogelijke uitvoering
    van enige wettelijke bepaling of beleidsregel betreffende de volgende waterschapstaken:1.
    de bouw, de exploitatie, het onderhoud en het beheer van alle zuiveringstechnische
    werken met toebehoren;2. het contractbeheer van de waterkwaliteitslaboratoriumactiviteiten.
