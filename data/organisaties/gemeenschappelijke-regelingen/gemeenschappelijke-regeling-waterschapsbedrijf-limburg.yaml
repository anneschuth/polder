  bevoegdheden:
  - kop_artikel: 'Artikel 5: Uitvoering wettelijke bevoegdheden'
    inhoud_artikel: Voor de uitvoering van enige wettelijke bepaling betreffende de
      in artikel 3 genoemde belangen, treedt het algemeen bestuur, het dagelijks bestuur
      en de voorzitter van de regeling in de plaats van de respectievelijke bestuursorganen
      van de deelnemers, ieder voor zover het hen aangaat.
  - kop_artikel: 'Artikel 6: Overdracht wettelijke bevoegdheden'
    inhoud_artikel: Het algemeen bestuur, het dagelijks bestuur en de voorzitter van
      de deelnemers dragen de uitvoering van de in bijlage 1 opgenomen wettelijke
      bepalingen betreffende de in artikel 3 genoemde belangen over aan de respectievelijke
      bestuursorganen van de regeling, ieder voor zover het hen aangaat.
