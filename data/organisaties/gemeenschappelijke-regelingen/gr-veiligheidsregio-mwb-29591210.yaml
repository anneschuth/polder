gr_meta:
  citeertitel: GR Veiligheidsregio MWB
  doel: Het primaire doel van de Veiligheidsregio is het beschermen van burgers tegens
    risico's op het gebied van fysieke veiligheid. De Veiligheidsregio behartigt de
    belangen van de deelnemende gemeenten op de terreinen van brandweerzorg, geneeskundige
    hulpverlening, rampenbestrijding en crisisbeheersing en het voorzien van een gemeenschappelijke
    meldkamer.
