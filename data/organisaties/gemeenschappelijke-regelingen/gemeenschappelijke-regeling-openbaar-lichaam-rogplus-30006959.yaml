  citeertitel: Gemeenschappelijke regeling openbaar lichaam Rogplus
  doel: Deze regeling is door de colleges getroffen voor een kwalitatief hoogwaardige,
    effectieve en efficiënte uitvoering van in ieder geval de voorzieningen van de
    Wet maatschappelijke ondersteuning 2015 en - vanaf 1 januari 2023 - de Jeugdwet,
    dan wel voor andere taken in het sociaal domein die de colleges, met instemming
    van de raden, delegeren aan Rogplus.
