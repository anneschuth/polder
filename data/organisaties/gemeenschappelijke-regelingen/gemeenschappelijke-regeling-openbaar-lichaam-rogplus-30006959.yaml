  bevoegdheden:
  - kop_artikel: Artikel 4 Taken en bevoegdheden
    inhoud_artikel: 1. De colleges delegeren de volgende taken naar Rogplus:a. Indicatiestelling
      voor maatwerkvoorzieningen Wet maatschappelijke ondersteuning 2015 en de toegang
      tot algemene voorzieningen vallend onder genoemde wet, uitgezonderd maatschappelijke
      opvang;b. Het nemen van besluiten over voorzieningen jeugdhulp in het kader
      van de Jeugdwet;c. Inkoop maatwerkvoorzieningen Wet maatschappelijke ondersteuning
      2015 en alle vormen van jeugdhulp uitgezonderd het Landelijk Transitie Arrangement
      (LTA), Gecertificeerde instellingen en Veilig Thuis;d. Het contractmanagement
      voor bovengenoemde voorzieningen;e. Het informatiemanagement voor bovengenoemde
      voorzieningen.2. De in het voorgaande lid vermelde taken kunnen nader worden
      uitgewerkt in dienstverleningsovereenkomsten tussen de gemeenten en het openbaar
      lichaam Rogplus.3. De colleges zijn bevoegd aanvullende bevoegdheden op- dan
      wel over te dragen aan het algemeen bestuur dan wel het dagelijks bestuur, mits
      deze passen binnen de in artikel 3 genoemde belangen.4. Het algemeen bestuur
      kan besluiten tot de oprichting van en de deelneming in stichtingen, maatschappen,
      vennootschappen, verenigingen, coöperaties en onderlinge waarborgmaatschappijen
      indien dit in het bijzonder aangewezen moet worden geacht voor de behartiging
      van het daarmee te dienen openbaar belang.5. Het besluit wordt niet genomen
      dan nadat de raden van de gemeenten een ontwerpbesluit is toegezonden en in
      de gelegenheid zijn gesteld hun wensen en bedenkingen ter kennis van het algemeen
      bestuur te brengen.
