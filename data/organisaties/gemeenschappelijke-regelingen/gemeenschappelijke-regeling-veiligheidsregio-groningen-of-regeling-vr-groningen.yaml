  bevoegdheden:
  - kop_artikel: Artikel 7 Taken, verantwoordelijkheden en bevoegdheden regeling
    inhoud_artikel: '**Regionale brandweer:** met betrekking tot de taken en verantwoordelijkheden
      van de regionale brandweer is het bepaalde in de Wet veiligheidsregio’s van
      toepassing.**GHOR:** de taken en verantwoordelijkheden van de GHOR betreffen
      de coördinatie, aansturing en regie van de geneeskundige hulpverlening in de
      regio.Tot de taken behoort ook de advisering van andere overheden en organisaties
      op het gebied van de geneeskundige hulpverlening.**Meldkamerfunctie:** het veiligheidsbestuur
      kan besluiten aan het in het artikel 10, onder g genoemde van de Wet veiligheidsregio’s,
      uitvoering te geven in een verband dat voorziet in de meldkamerfunctie voor
      een gebied groter dan het eigen werkgebied.**Gemeentelijke kolom:** de taken
      van de regeling op het terrein van de gemeentelijke kolom omvatten de zorg voor
      de gemeentelijke processen van rampenbestrijding en crisisbeheersing, aangemerkt
      als bevolkingszorg.De taken omvatten voorts de op basis van de processen bevolkingszorg
      door de gemeenten gezamenlijk te treffen maatregelen en voorzieningen met het
      oog op een ramp of crisis.De taken omvatten tevens de gezamenlijk vormgegeven
      ondersteuning van individueel door deelnemende gemeenten te treffen maatregelen
      en voorzieningen ter zake van de bevolkingszorg.**Veiligheidsregio algemeen:**
      In aanvulling op het in de wet gemelde worden onder de overgedragen taken en
      bevoegdheden ook verstaan de verordenende bevoegdheden, benodigd voor de uitvoering
      van de aan de Veiligheidsregio Groningen opgedragen taken, voor zover zij niet
      blijkens wet of memorie van toelichting de bevoegdheid van de onderscheiden
      raden dienen te blijven.'
  - kop_artikel: Artikel 6 Bevoegdheden veiligheidsregio
    inhoud_artikel: De Veiligheidsregio Groningen heeft alle bevoegdheden tot regeling,
      bestuur en beheer die nodig zijn voor de uitvoering van de aan het openbaar
      lichaam opgedragen taken.Alle bevoegdheden in het kader van deze regeling die
      niet aan een ander bestuursorgaan van de regeling zijn opgedragen, behoren aan
      het veiligheidsbestuur.De Veiligheidsregio Groningen is bevoegd tot het mede
      treffen van en tot het deelnemen aan een gemeenschappelijke regeling en andere
      rechtsvormen waar die in het bijzonder aangewezen moeten worden geacht voor
      de behartiging van door de regeling te dienen belangen.De taken van de regeling
      zijn bepaald door de Wet veiligheidsregio’s
