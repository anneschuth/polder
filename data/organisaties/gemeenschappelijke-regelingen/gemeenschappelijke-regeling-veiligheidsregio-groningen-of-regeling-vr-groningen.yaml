  doel: De regeling stelt zich ten doel om door regeling en bestuur en door een doelmatige
    organisatie en coördinatie via intergemeentelijke samenwerking uitvoering te geven
    aan de behartiging van de volgende belangen:a. brandweerzorg;b. geneeskundige
    hulpverlening bij ongevallen en rampen;c. rampenbestrijding en crisisbeheersing;d.
    bevolkingszorg;e. melding, alarmering en coördinatie ambulancezorg en brandweer.
