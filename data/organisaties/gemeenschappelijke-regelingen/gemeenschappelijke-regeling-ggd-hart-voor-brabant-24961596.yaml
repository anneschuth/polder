  bevoegdheden:
  - kop_artikel: Artikel 10 Het dagelijks bestuur
    inhoud_artikel: 1. Het dagelijks bestuur vergadert ten minste zesmaal per jaar
      en verder zo dikwijls als de voorzitter dit nodig oordeelt of ten minste drie
      leden van het dagelijks bestuur dit schriftelijk verzoeken, onder opgave van
      de te behandelen onderwerpen, waarna de vergadering binnen veertien dagen plaatsvindt.2.
      De artikelen 28, eerste tot en met derde lid, 29, 30 en 56 van de Gemeentewet
      zijn van overeenkomstige toepassing.3. Elk lid heeft in de vergadering van het
      dagelijks bestuur één stem.4. Het dagelijks bestuur stelt een reglement van
      orde vast voor zijn vergaderingen.5. Aan het dagelijks bestuur behoren alle
      bevoegdheden behalve de volgende bevoegdheden van het algemeen bestuur:- het
      besluiten over toetreden, uittreden, wijzigen en opheffen, zoals bedoeld inhoofdstuk
      6;- het vaststellen van de jaarstukken en het vaststellen en/of wijzigen van
      de begroting en het basispakket;- het besluiten tot het oprichten van en deelnemen
      in stichtingen, maatschappen, vennootschappen, verenigingen, coöperaties en
      onderlinge waarborgmaatschappijen.6. Het dagelijks bestuur kan de uitoefening
      van zijn bevoegdheden voor zover als mogelijk in mandaat opdragen aan de directeur.
      Een door het dagelijks bestuur vast te stellen organisatie-verordening beschrijft
      de taken van de directeur en de wijze waarop het dagelijks bestuur toeziet op
      de uitvoering daarvan.
