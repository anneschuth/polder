  bevoegdheden:
  - kop_artikel: Artikel 2 Taken van de deelnemers
    inhoud_artikel: 1. Het gemeentebestuur van Midden-Delfland draagt zorg voor het
      navolgende:a. benoeming van de archeoloog van Delft tot archeoloog van Midden-Delfland;b.
      het voorzien in de mogelijkheid van een depot, waarin de vondsten die voortkomen
      uit opgravingen kunnen worden ondergebracht.2. Het gemeentebestuur van Delft
      draagt zorg voor het navolgende:a. de mogelijkheid dat de archeoloog van Delft
      in voldoende mate archeologische werkzaamheden kan verrichten voor de gemeente
      Midden-Delfland;b. de archeoloog zal voor de duur van gemiddeld 30 dagen per
      jaar de volgende taken op archeologisch gebied voor de gemeente Midden-Delfland
      vervullen:Beleidstaken- Het inventariseren van archeologische terreinen binnen
      de gemeente Midden-Delfland.- Het samenstellen van een lijst van beschermde
      (gemeentelijke) archeologische monumenten en archeologische meldingsgebieden
      voor de gemeente Midden-Delfland.- Het zoveel mogelijk in de bodem behouden
      van belangrijke archeologische resten en/of ter plaatse op enerlei wijze doen
      markeren van gevonden constructies.- Het adviseren van burgemeester en wethouders
      inzake archeologische waarden en objecten binnen de gemeente Midden-Delfland.-
      Het melden van nieuwe vondsten en opgravingen aan Archis, het centrale archief
      van de Rijksdienst voor het Oudheidkundig Bodemonderzoek (artikel 41 Monumentenwet
      1988).Documentatie- Het documenteren van archeologische vindplaatsen, vondsten
      en structuren binnen de gemeente Midden-Delfland.- Het toegankelijk maken, bewerken
      en in goede staat houden van het archeologisch documentatiearchief.- Het toegankelijk
      maken, bewerken en in goede staat houden van het gemeentelijk depot voor archeologische
      vondsten.Voorlichting, educatie en publiciteit- Het geven van voorlichting aan
      gemeentelijke diensten, pers, burgerij, scholen, oudheidkundige verenigingen,
      historici en collega-archeologen betreffende archeologische zaken van de gemeente
      Midden-Delfland.- Het houden van voordrachten, excursies en rondleidingen inzake
      archeologische onderwerpen betreffende de gemeente Midden-Delfland.- Het begeleiden
      van de in Midden-Delfland op archeologisch terrein actieve oudheidkundige verenigingen.-
      Het begeleiden van exposities betreffende archeologische zaken van de gemeente
      Midden-Delfland.c. het kunnen voorzien in depotruimte, indien de gemeente Midden-Delfland
      daarin zelf niet of onvoldoende blijkt te kunnen voorzien.
