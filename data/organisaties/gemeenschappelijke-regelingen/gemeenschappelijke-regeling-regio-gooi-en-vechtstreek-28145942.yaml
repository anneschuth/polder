  bevoegdheden:
  - kop_artikel: Artikel 7 Bevoegdheden Regio
    inhoud_artikel: 1. Ten behoeve van de uitvoering van hoofdstuk 10 van de Wet milieubeheer
      wordt aan het algemeen bestuur van de Regio overgedragen de bevoegdheid tot
      het vaststellen van de afvalstoffenverordening als bedoeld in artikel 10.23
      van de Wet milieubeheer.2. Ten behoeve van de uitvoering van artikel 5 van de
      Wet publieke gezondheid wordt aan het dagelijks bestuur van de Regio overgedragen
      de bevoegdheid tot verwerking van persoonsgegevens als bedoeld in artikel 5
      lid 3 van de Wet publieke gezondheid.3. Ten behoeve van de uitvoering van de
      taken vermeld in artikel 5 lid 5(leerplicht c.a.) wordt aan het algemeen bestuur
      de bevoegdheid tot daden van regeling en bestuur overgedragen.4. Ten behoeve
      van de uitvoering van de taken vermeld in artikel 5 lid 5 worden aan het dagelijks
      bestuur de navolgende bevoegdheden overgedragen:a. de bevoegdheden die in de
      Leerplichtwet 1969, de Wet op het voortgezet onderwijs, de Wet educatie en beroepsonderwijs
      en de Wet op de expertisecentra worden toegekend aan het college van burgemeester
      en wethouders;b. de bevoegdheid om bestuursdwang als bedoeld in artikel 125
      tweede lid Gemeentewet toe te passen indien dit dient tot handhaving van de
      regels van de Leerplichtwet 1969.5. Ten behoeve van de uitvoering van de taken
      vermeld in artikel 5 lid 9 worden aan het dagelijks bestuur overgedragen de
      met de uitvoering van deze taak verband houdende bevoegdheden te weten:• het
      onverwijld melden aan de ingevolge de Jeugdwet met toezicht belaste ambtenaren
      van iedere calamiteit die zich bij de verlening van jeugdhulp heeft voorgedaan
      en van geweld bij de verlening van jeugdhulp (artikel 4.1.8 onder 1 Jeugdwet);•
      het treffen van een regeling voor de behandeling van klachten over gedragingen
      van de Crisisdienst Jeugdwet en van voor de Crisisdienst Jeugdwet werkzame personen
      jegens een jeugdige, ouder, ouder zonder gezag, voogd, degene die anders dan
      als ouder samen met de ouder het gezag over de jeugdige uitoefent of een pleegouder
      in het kader van de verlening van jeugdhulp (artikel 4.2.1 Jeugdwet):• het jaarlijks
      opstellen van een verslag over de naleving van de Jeugdwet in het voorafgaande
      jaar met betrekking tot regels omtrent de kwaliteit van de jeugdhulp onderscheidenlijk
      de kwaliteit van de uitvoering van de taken, het klachtrecht en de medezeggenschap
      (in artikel 4.3.1 Jeugdwet);- het gebruik van het burgerservicenummer van een
      jeugdige als bedoeld in artikel 7.2.1 van de Jeugdwet en het vaststellen van
      het burgerservicenummer van een jeugdige als bedoeld in artikel 7.2.2 van de
      Jeugdwet alsmede de bevoegdheid om van de verplichtingen in de artikelen 7.2.1
      en 7.2.2 van de Jeugdwet af te wijken als bedoeld in artikel 7.2.6 van de Jeugdwet;•
      de bevoegdheid tot het verwerken van persoonsgegevens als bedoeld in artikel
      7.4.0 lid 1 en 2 van de Jeugdwet6. Ten behoeve van de uitvoering van de ingevolge
      artikel 5 van deze gemeenschappelijke regeling overgedragen taken worden aan
      het dagelijks bestuur de bevoegdheden voortvloeiend uit de artikelen 35 tot
      en met 39 en 43 van de Wet bescherming persoonsgegevens overgedragen.7. Bij
      het uitoefenen van de onder 1 vermelde bevoegdheden worden de bij en krachtens
      de8. geldende wetgeving ter zake gestelde regels in acht genomen.
