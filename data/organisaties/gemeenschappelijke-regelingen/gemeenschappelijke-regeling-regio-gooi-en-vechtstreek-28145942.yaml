  citeertitel: Gemeenschappelijke Regeling Regio Gooi en Vechtstreek
  doel: Doel van deze regeling is de wenselijk geachte samenwerking tussen de gemeenten
    in Gooi en Vechtstreek en Eemnes zodanig vorm te geven dat de aan de Regio opgedragen
    taken doelmatig en doeltreffend worden uitgevoerd met behoud van de regie van
    de gemeenten onder waarborging van betrokkenheid van gemeenteraden bij de regionale
    samenwerking.
