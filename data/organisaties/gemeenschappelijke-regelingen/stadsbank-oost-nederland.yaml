description:
  text: Wij zijn dé financieel dienstverlener in Oost Nederland sinds 1939. Stadsbank
    Oost Nederland is een non-profit organisatie. Ons kantoor is gevestigd in Enschede.
    Onze drijfveer? Duurzame financiële stabiliteit creëren voor onze klanten in opdracht
    van 21 gemeenten in Twente en de Achterhoek. Elke werkdag zetten ruim 160 financiële
    professionals hun expertise in om mensen weer in hun kracht te zetten als het
    gaat om financieel gezond worden én blijven.
