  bevoegdheden:
  - kop_artikel: Artikel 3 Bevoegdheden
    inhoud_artikel: 1. De Omgevingsdienst heeft geen verordenende bevoegdheid overgedragen
      gekregen van de deelnemers.2. Het algemeen bestuur heeft een eigen verordenende
      bevoegdheid met betrekking tot de vaststelling van de verordeningen ex artikel
      212 en 213 Gemeentewet juncto artikel 216 en 217 Provinciewet, de vaststelling
      van de organisatieverordening en de vaststelling van de arbeidsvoorwaardenverordeningen
      als bedoeld in artikel 125 Ambtenarenwet.3. Het algemeen bestuur en dagelijks
      bestuur hebben voorts verordenende en regelgevende bevoegdheid met betrekking
      tot de aangelegenheden die de bedrijfsvoering van de Omgevingsdienst betreffen.4.
      Het algemeen bestuur kan met inachtneming van de hoofdstukken VIII en IX van
      de wet een gemeenschappelijke regeling treffen ter behartiging van een of meer
      bepaalde belangen van de Omgevingsdienst enkel op het gebied van de ondersteunende
      processen. Het algemeen bestuur gaat niet over tot het treffen van een gemeenschappelijke
      regeling dan nadat tenminste twee derde van het aantal deelnemers met het aangaan
      van de regeling heeft ingestemd. Onder het treffen van een gemeenschappelijke
      regeling wordt in dit artikel mede verstaan het wijzigen van, het toetreden
      tot en het uittreden uit een gemeenschappelijke regeling.5. Het algemeen bestuur
      is bevoegd te besluiten tot de oprichting van of deelname in stichtingen, maatschappen,
      vennootschappen en coöperaties en verenigingen, dan wel de ontbinding daarvan
      of beëindiging van deelneming daaraan ter behartiging van een of meer bepaalde
      belangen van de Omgevingsdienst enkel op het gebied van de ondersteunende processen
      op voorwaarde dat de raden en Provinciale Staten vooraf in de gelegenheid zijn
      gesteld hun wensen en bedenkingen met betrekking tot het voorgenomen besluit
      aan het algemeen bestuur kenbaar te maken.6. Het dagelijks bestuur kan enkel
      op basis van de door de heffingsambtenaren van de deelnemers verleende externe
      mandaten leges innen voor het op aanvraag door de Omgevingsdienst leveren van
      diensten en het uitvoeren van taken voor derden. De leges worden vastgesteld
      op basis van de door iedere deelnemer gehanteerde norm. De leges komen ten goede
      aan de betrokken deelnemer.
