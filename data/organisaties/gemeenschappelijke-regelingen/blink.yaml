description:
  text: Van afval tot grondstofBlink is een gemeenschappelijke regeling tussen de
    gemeenten Asten, Deurne, Gemert-Bakel, Heeze-Leende, Helmond, Laarbeek, Nuenen,
    Someren en Son en Breugel. Het servicegebied van Blink in de Peelregio (Zuidoost-Brabant)
    omvat zo'n 118.000 huisaansluitingen.Blink is hier namens deze gemeenten actief
    op het gebied van afvalinzameling, grondstoffenbeheer, reiniging en onderhoud
    van de openbare ruimte en beheer van de milieustraten.
