  citeertitel: Samenwerkingsregeling Regio Achterhoek
  doel: Regio Achterhoek heeft tot doel het behartigen van de gemeenschappelijke belangen
    van de gemeenten op het gebied van:- Economische ontwikkeling, en specifiek op
    het gebied van:• Smart werken & Innovaties• Onderwijs & Arbeidsmarkt- Ruimtelijke
    ontwikkeling & volkshuisvesting, en specifiek op het gebied van:• Vastgoed & Woningmarkt-
    Mobiliteit & Bereikbaarheid- Zorginnovaties- Circulaire economie & Energietransitie-
    Milieu en afval (beheerstaken);- Natuur;- Lobby;- (het verwerven van) Subsidies;-
    Grensoverschrijdende samenwerking, met name gericht op Duitsland
