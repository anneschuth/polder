gr_meta:
  citeertitel: Gemeenschappelijke regeling Omgevingsdienst Twente
  doel: 1. De Omgevingsdienst Twente is ingesteld ter behartiging van de individuele
    en gezamenlijke belangen van de deelnemers op het gebied van:• het voorbereiden
    van beschikkingen,• het toezicht op de naleving van de milieuvoorschriften, neergelegd
    in wet- en regelgeving en in beschikkingen en• aanvullende taken en bevoegdheden
    welke door het bevoegd gezag aan de Omgevingsdienst Twente zijn gemandateerd.2.
    De Omgevingsdienst Twente draagt zorg voor een organisatie ter behartiging van
    de in het eerste lid genoemde belangen en richt zich daarbij op:• bieden van een
    structuur waarin de deelnemers voldoen aan de wettelijke eisen van kwaliteit,
    effectiviteit en robuustheid en organisatie voor de uitvoering van hun vth-taken;•
    adviezen aan en uitvoering voor de deelnemers ten behoeve van hun vth-taken;•
    inzetten van kennis en kunde;• realiseren van een centraal aanspreekpunt voor
    externe partners;• het creëren van een zo gelijk mogelijk speelveld voor burgers
    en bedrijven in het werkgebied van de Omgevingsdienst Twente.
