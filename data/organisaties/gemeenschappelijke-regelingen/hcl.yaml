description:
  text: Het Historisch Centrum Limburg (HCL) is een gemeenschappelijke regeling met
    het Rijk, de gemeente Maastricht en de gemeente Heerlen als deelnemer. Zij kent
    daarnaast 24 DVO-partners (Provincie, Waterschap, gemeenten en gemeenschappelijke
    regelingen) die hun archieven hebben ondergebracht bij het HCL. De deelnemers
    zijn vertegenwoordigd in het bestuur van het HCL.Het Historisch Centrum Limburg
    (HCL) beheert en bewaart de analoge en digitale archieven en collecties van Limburgse
    overheidsorganisaties, particulieren en bedrijven. Binnen het HCL werken we met
    bijna 70 collega’s samen vanuit onze locaties in Maastricht en Heerlen. Op beide
    locaties bevinden zich studiezalen waar bezoekers – op afspraak – archiefstukken
    kunnen raadplegen. Ook zijn steeds meer Limburgse archieven en collecties online
    te raadplegen. We beheren meer dan 30 kilometer analoge archieven en zitten midden
    in een transitie van analoog naar digitaal.Het HCL is partner voor overheden bij
    het borgen van de duurzame toegankelijkheid en betrouwbaarheid van hun archieven,
    zowel fysiek als digitaal. Archiefwet- en regelgeving verplicht overheidsorganisaties
    te voldoen aan de wettelijke vereisten ten aanzien van hun informatie- en archiefbeheer.
    Het HCL houdt daarbij toezicht en geeft adviezen.
