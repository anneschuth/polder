description:
  text: 'De gemeenten Barendrecht, Ridderkerk en Rotterdam hebben gezamenlijk de ontwikkeling
    van Nieuw Reijerwaard op zich genomen. Hiertoe hebben zij per 1 januari 2012 de
    Gemeenschappelijke Regeling Nieuw Reijerwaard (GRNR) opgericht. Nieuw Reijerwaard
    biedt de ruimte om een duurzaam en toekomstbestendig bedrijventerrein te ontwikkelen
    voor het AgroVersFood-cluster in Barendrecht en Ridderkerk. Er is 96 hectare beschikbaar
    voor bedrijven. De ontwikkeling van Nieuw Reijerwaard is uiterlijk in 2030 afgerond.
    De ontwikkeling van Nieuw Reijerwaard is mede mogelijk gemaakt door de Provincie
    Zuid-Holland.Nieuw Reijerwaard is een plek waar het goed toeven is voor iedereen:
    ondernemers, medewerkers, omwonenden en weggebruikers. Het bedrijventerrein is
    centraal gelegen in de regio Rotterdam nabij verkeersknooppunt Ridderster (A15/A16).
    Nieuw Reijerwaard is onderdeel van het overkoepelende Dutch Fresh Port.'
  url: https://www.nieuwreijerwaard.eu/wie-zijn-we/over-ons/
