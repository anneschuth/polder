gr_meta:
  citeertitel: gemeenschappelijke regeling voor Stark
  doel: De rechtspersoon heeft tot doelstelling:a. het bevorderen of uitvoeren van
    activiteiten welke gericht zijn op het creëren, bevorderen of in stand houden
    van werkgelegenheid voor natuurlijke personen die een afstand hebben tot de reguliere
    arbeidsmarkt;b. natuurlijke personen, ongeacht de soort uitkering en/of wettelijke
    basis, door middel van persoonlijke begeleiding en ondersteuning (jobcoaching),
    te laten reïntegreren op de reguliere arbeidsmarkt, alles in de ruimste zin des
    woord;c. natuurlijke personen te laten participeren in de maatschappij, onder
    meer door arbeidsmatige dagbesteding.
