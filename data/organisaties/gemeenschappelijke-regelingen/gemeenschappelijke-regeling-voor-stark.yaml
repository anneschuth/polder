  bevoegdheden:
  - kop_artikel: Artikel 4
    inhoud_artikel: 1. Voor de uitvoering van de activiteiten in het kader van de
      Wsw dragen de colleges van de gemeenten Hoogeveen, De Wolden en Midden-Drenthe
      al hun bevoegdheden en verplichtingen uit die wet over aan de rechtspersoon,
      behoudens de beleidsmatige bevoegdheden die met de uitoefening van deze bevoegdheden
      verbonden zijn.2. De werkzaamheden worden nader geduid in dienstverleningsovereenkomsten.3.
      Aan de rechtspersoon worden geen verordenende bevoegdheden ingevolge de Wsw
      en de uit deze wet voortvloeiende wettelijke voorschriften toegekend.4. Overeenkomstig
      artikel 1 lid 2 van de Wsw treedt het bestuur van de rechtspersoon in de plaats
      van de betrokken colleges zoals genoemd onder lid 1.
