  valid_from: '1900-01-01'
description:
  text: De Randstedelijke Rekenkamer doet onafhankelijk onderzoek naar het provinciaal
    beleid. De onderzoeksrapporten zijn openbaar en worden behandeld in de vergaderingen
    van Provinciale Staten. Provinciale Staten besluiten vervolgens wat er met de
    conclusies en aanbevelingen gedaan wordt.Op deze wijze draagt de Randstedelijke
    Rekenkamer bij aan de kwaliteit van het provinciaal bestuur en aan het vergroten
    van de publieke verantwoording.
