  bevoegdheden:
  - kop_artikel: Artikel 4. Bevoegdheden
    inhoud_artikel: 1. Het Algemeen bestuur en Dagelijks bestuur hebben verordenende
      en regelgevende bevoegdheden met betrekking tot de aangelegenheden die de bedrijfsvoering
      van het openbaar lichaam betreffen.2. Het Algemeen bestuur respectievelijk het
      Dagelijks bestuur kunnen afzonderlijk of samen, ieder voor zover zij bevoegd
      zijn, een gemeenschappelijke regeling treffen, waarvan uitgezonderd het instellen
      van een openbaar lichaam, ter behartiging van een of meer bepaalde belangen
      van het openbaar lichaam. Het Algemeen bestuur respectievelijk het Dagelijks
      bestuur gaan niet over tot het treffen van een gemeenschappelijke regeling dan
      nadat zij hierover vooraf de raden van de deelnemende gemeenten in de gelegenheid
      hebben gesteld hun wensen en bedenkingen kenbaar te maken.3. Het Algemeen bestuur
      is bevoegd te besluiten tot de oprichting van en de deelneming in stichtingen,
      maatschappen, vennootschappen, coöperaties en verenigingen, op voorwaarde dat
      de raden van de deelnemende gemeenten vooraf in de gelegenheid zijn gesteld
      hun wensen en bedenkingen met betrekking tot het voorgenomen besluit aan het
      Algemeen bestuur kenbaar te maken.4. Het Dagelijks bestuur is bevoegd te besluiten
      tot het aangaan van (samenwerkings)overeenkomsten met betrekking tot taken waarmee
      het openbaar lichaam is belast met een of meer al dan niet deelnemende gemeenten
      en samenwerkingsverbanden.5. Het Dagelijks bestuur is bevoegd te besluiten tot
      het aangaan van overeenkomsten voor plustaken als bedoeld in artikel 6 van deze
      regeling met een of meer deelnemende gemeenten.6. Het Dagelijks bestuur is bevoegd
      te besluiten tot het aangaan van dienstverleningsovereenkomsten met betrekking
      tot faciliterende taken als bedoeld in artikel 7 van deze regeling met een of
      meer deelnemende gemeenten.7. Het Algemeen bestuur is bevoegd te besluiten tot
      het aangaan van dienstverleningsovereenkomsten met betrekking tot faciliterende
      taken als bedoeld in artikel 7 van deze regeling met een of meer niet deelnemende
      gemeenten, samenwerkingsverbanden en derden.8. De collegebevoegdheden betreffende
      de uitvoering van de Wmo, Jeugd, BMS, Inburgering en aanverwante wet- en regelgeving
      worden onder verantwoordelijkheid van de colleges opgedragen aan het Dagelijks
      bestuur van het openbaar lichaam op basis van een door elk college afzonderlijk
      vast te stellen extern mandaatbesluit. Het Dagelijks bestuur is bevoegd om ondermandaat
      te verlenen aan de ambtelijke organisatie. Uitgangspunt is dat bevoegdheden
      zo laag mogelijk in de organisatie worden belegd.
