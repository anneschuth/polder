  bevoegdheden:
  - kop_artikel: Artikel 9 Taken en bevoegdheden van het Dagelijks Bestuur
    inhoud_artikel: "1. De taken en bevoegdheden van het Dagelijks Bestuur volgen\
      \ uit de wet, deze Regeling of zijn door de colleges overgedragen. Overgedragen\
      \ bevoegdheden berusten bij het Dagelijks Bestuur.2. Het Dagelijks Bestuur heeft\
      \ de navolgende taken en bevoegdheden ter uitvoering van de Kernagenda zoals\
      \ genoemd in artikel 2, lid 3 en uitgewerkt in het Blauwe Schema/de jaarplannen:•\
      \ het uitoefenen van een regionale platformfunctie• het nemen van besluiten\
      \ ten aanzien van bovenregionale, bovengemeentelijke afstemmings- vraagstukken\
      \ alsmede het bepalen op welke manier dergelijke vraagstukken kunnen worden\
      \ afgewikkeld;• het namens de regio, zijnde alle Parkstad-Limburggemeenten,\
      \ kunnen reageren op van hogere overheden ontvangen documenten, waaronder het\
      \ geven van inspraakreacties;• het voorbereiden van regionaal beleid;• het vaststellen\
      \ van regionaal beleid voor zover dit een collegebevoegdheid betreft;• het opstellen\
      \ en vaststellen van regionale beleidsregels;• het toetsen van de toepassing\
      \ en uitvoering van regionaal beleid;• het programmeren en vaststellen van regionale\
      \ programmeringen en regionale programma’s;• het regionaal monitoren;• het regionaal\
      \ ontwikkelen van instrumenten en• het verstrekken van financiële middelen/subsidies\
      \ (voor zover -regionaal- budget voorhanden is) en hetprocedureel afwikkelen\
      \ daarvan en•  het aanvragen (en verder procedureel afwikkelen) van subsidies.3.\t\
      Met het vaststellen van deze gemeenschappelijke regeling zijn de in lid 2 van\
      \ dit artikel vermelde collegebevoegdheden met betrekking tot de Kernagenda-onderwerpen\
      \ overgedragen aan het dagelijks bestuur.4.\tDe door de deelnemers overgedragen\
      \ bevoegdheden, genoemd in lid 2 van dit artikel, worden met inachtneming van\
      \ het Blauwe Schema door het algemeen bestuur, op voorstel van het dagelijks\
      \ bestuur, aan de bestuurscommissies overgedragen.5.\tHet dagelijks bestuur\
      \ heeft primair de verantwoordelijkheid voor:a)\tde besturing en de verantwoording\
      \ van het openbaar lichaam Stadsregio Parkstad Limburg genoemd inartikel 4;b)\t\
      het bevorderen en invullen van de samenwerking binnen Parkstad;c)\thet leggen\
      \ van dwarsverbanden en initiëren/uitvoeren van overkoepelende activiteiten.\
      \ Dit via hetaanhaken aan (bij voorkeur Parkstadbrede) kansrijke initiatieven\
      \ (inclusief het verrichten vanhaalbaarheidsonderzoeken) die zich tijdens de\
      \ uitvoering van een jaarplan kunnen aandienen;d)\tbestuurscommissies/programma’\
      \ s-overstijgende onderwerpen;e)\tgrensoverstijgende samenwerking -GROS-;f)\t\
      het vervullen van de werkgeversrol voor het regiobureau;g)\tde communicatie\
      \ naar de stakeholders, zoals gemeenteraden, colleges, provincie, maatschappelijkeorganisaties.6.\t\
      De mogelijkheid bestaat om bevoegdheden in mandaat op te dragen; dit geschiedt\
      \ op basis van separatecollegebesluiten buiten deze regeling om."
