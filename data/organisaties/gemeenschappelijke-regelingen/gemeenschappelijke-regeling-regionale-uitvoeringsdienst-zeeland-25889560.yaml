gr_meta:
  citeertitel: Gemeenschappelijke regeling Regionale uitvoeringsdienst Zeeland
  doel: De regeling wordt getroffen ter ondersteuning van de colleges bij de uitvoering
    van hun taken op het gebied van het omgevingsrecht in het algemeen en de Wet algemene
    bepalingen omgevingsrecht in het bijzonder, alsmede de taken op het terrein van
    vergunningverlening, handhaving en toezicht op grond van de in artikel 5.1 van
    de Wet algemene bepalingen omgevingsrecht genoemde wetten. Voorts wordt de regeling
    getroffen ter behartiging van de taken voortvloeiend uit het Besluit risico’s
    zware ongevallen 1999.
