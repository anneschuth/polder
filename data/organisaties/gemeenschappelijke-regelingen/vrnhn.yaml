names:
- value: Veiligheidsregio Noord-Holland Noord
  abbr: VRNHN
  valid_from: '1900-01-01'
description:
  text: De term Veiligheidsregio Noord-Holland Noord slaat behalve op een geografisch
    gebied ook op een organisatie met rond de achttienhonderd medewerkers. De veiligheidsregio
    coördineert de inspanningen op het gebied van veiligheid in de regio Noord-Holland
    Noord. Samen Hulpvaardig, luidt het motto.De organisatie Veiligheidsregio Noord-Holland
    Noord is een samenvoeging van de regionale brandweer, de GHOR (geneeskundige hulpverlening),
    Zorg- en Veiligheidshuis Noord-Holland Noord, Risico- en Crisisbeheersing, de
    Gemeenschappelijke Meldkamer en Ambulancezorg Noord-Holland Noord.Veiligheidsregio
    Noord-Holland Noord werkt intensief samen met partners op het gebied van veiligheid.
    Denk daarbij aan politie van de eenheid Noord-Holland, GGD Hollands Noorden, Kustwacht,
    KNRM reddingsbrigades, Hoogheemraadschap Hollands Noorderkwartier, het Nederlands
    Rode Kruis, Defensie en de ziekenhuizen in de regio.
