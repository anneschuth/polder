description:
  text: De Veiligheidsregio Rotterdam-Rijnmond (VRR) is een overheidsorganisatie die
    namens de 13 gemeenten in de regio taken uitvoert op het gebied van rampenbestrijding,
    crisisbeheersing, risicobeheersing, brandweerzorg, ambulancezorg en geneeskundige
    hulpverlening.
