  citeertitel: gemeenschappelijke regeling van ISD BOL
  doel: De regeling behartigt door het op bedrijfsmatige wijze uitvoeren van taken
    op terreinen van het sociaal domein, de belangen van de gemeenten op genoemde
    terreinen. De dienst neemt daarbij de geformuleerde visie en missie in acht. Deze
    taken worden nader bepaald in artikel 6 en artikel 10 van deze regeling.
