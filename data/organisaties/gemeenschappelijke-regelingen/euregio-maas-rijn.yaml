gr_meta:
  doel: 1. De kerntaak van de EGTS bestaat erin de samenwerking tussen de partnerregio's
    te vereenvoudigen en te intensiveren ten behoeve van een evenwichtige en duurzame
    ontwikkeling van het gebied zonder binnengrenzen en om het dagelijkse leven van
    de burgers in alle levensomstandigheden te vergemakkelijken.De EGTS ziet zich
    als platform ter bundeling van taken, als bemiddelaar om de economische, sociale
    en territoriale cohesie te bevorderen zonder echter de plaats te willen innemen
    van de bestaande bevoegde autoriteiten.2. De EGTS kan activiteiten ontplooien,
    programma’s en projecten uitwerken en implementeren, alsmede financiële middelen
    aanvragen.
