  bevoegdheden:
  - kop_artikel: Artikel 7 Organen en hun bevoegdheden
    inhoud_artikel: 1. De organen van de EGTS zijn:a) de vergadering bestaande uit
      de vertegenwoordigers/sters van haar leden alsmede adviserende leden;b) het
      bestuur;c) een voorzitter/ster en twee vicevoorzittters/sters uit het bestuur.2.
      De bevoegdheden van de organen:a) Vergadering:De vergadering besluit over de
      jaarlijkse begroting, het werkplan en de statuten overeenkomstig de doelen van
      de EGTS die in artikel 3 van de statuten zijn vastgelegd. De vergadering kan
      een deel van haar bevoegdheden aan het bestuur en/of de voorzitter/ster overdragen.b)
      Bestuur:Het bestuur is het uitvoerend orgaan van de EGTS. Het bestuur beslist
      binnen zijn bevoegdheidsdomein over alle aangelegenheden die niet aan de vergadering
      zijn voorbehouden.c) Voorzitter/ster:De voorzitter/ster van de EGTS oefent de
      functies uit van directeur/directrice in de zin van artikel 10.1.b van de EGTS-verordening.
      De voorzitter/ster is verantwoordelijk voor de4 voorbereiding en uitvoering
      van de besluiten van de vergadering. Hij/zij is tekenbevoegd voor de inkomsten
      en uitgaven. Hij/zij is het hoofd van de EGTS. In deze hoedanigheid heeft hij/zij
      de supervisie over de directeur/directrice die de leiding heeft over het ambtelijk
      bureau van de EGTS. De voorzitter/ster kan een deel van zijn/haar taken onder
      de voorwaarden van het huishoudelijk reglement aan een vertegenwoordiger/ster
      of de directeur/directrice van het ambtelijk bureau overdragen.
