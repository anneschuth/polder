description:
  text: De Euregio Maas-Rijn is met haar drie talen en vijf partnerregio’s de meest
    veelzijdige, maar ook meest complexe euregio in hartje Europa.Ze houdt zich actief
    bezig met het opzetten van projecten door competente actoren te verenigen. De
    EMR koppelt en ondersteunt deze actoren en bemiddelt tussen hen en draagt zodoende
    bij tot het welslagen van de grensoverschrijdende samenwerking tussen de partnerregio’s
    over de landsgrenzen heen.Veel concrete verworvenheden die het leven van de burgers
    in de EMR vergemakkelijken, lijken ons vandaag heel vanzelfsprekend. Toch konden
    ze vaak ontstaan dankzij afspraken binnen en projecten van de Euregio Maas-Rijn.Menige
    dagelijkse dienstverlening ontstond dankzij de voortrekkersrol en steun van de
    Euregio Maas-Rijn.
