  bevoegdheden:
  - kop_artikel: Artikel 5 Taken en bevoegdheden
    inhoud_artikel: 1. Voor de uitvoering van de basistaken heeft het bestuur alle
      bevoegdheden tot regeling en bestuur.2. Voor de uitvoering van de basistaken
      dragen deelnemers hun bevoegdheden bij of krachtens de Wet publieke gezondheid,
      artikel 4 van de Wet op de lijkbezorging, artikel 5.2 van de Wet verplichte
      geestelijke gezondheidszorg, de Jeugdwet en de Wet maatschappelijke ondersteuning
      2015, over aan het bestuur.3. Naast het bepaalde in de Wet gemeenschappelijke
      regelingen of elders in deze regeling, zijn de volgende bevoegdheden, van het
      algemeen bestuur:a. de bevoegdheid te besluiten over onderwerpen met een aanzienlijk
      financieel belang, politiek gevoelige onderwerpen of beleidsmatige keuzes;b.
      het vaststellen van (beleids)kaders;c. regelgevende bevoegdheden, uitgezonderd
      het vaststellen van regels over de ambtelijke organisatie;d. het instellen van
      commissies als bedoeld in artikel 25, eerste lid van de Wet gemeenschappelijke
      regelingen;e.  het oprichten van en het deelnemen in privaatrechtelijke rechtspersonen,
      met inachtneming van het daarover bepaalde in artikel 31a van de Wet gemeenschappelijke
      regelingen;f. het treffen van een gemeenschappelijke regeling als bedoeld in
      artikel 96 van de Wet gemeenschappelijke regelingen.4. Alle bevoegdheden in
      het kader van deze regeling zijn bevoegdheden van het dagelijks bestuur, tenzij
      bij of krachtens de Wet gemeenschappelijke regelingen of in deze regeling anders
      is bepaald.5. Tenzij in de regeling anders is bepaald, stelt het dagelijks bestuur
      de tarieven als bedoeld in artikel 7.4 vast en de overige voorwaarden waaronder
      werkzaamheden worden uitgevoerd. Daarbij geldt als uitgangspunt dat de tarieven
      tenminste kostendekkend zijn. Het algemeen bestuur kan besluiten van dit uitgangspunt
      af te wijken.
