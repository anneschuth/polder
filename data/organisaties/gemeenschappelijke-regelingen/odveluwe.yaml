description:
  text: Omgevingsdienst Veluwe (ODVeluwe) draagt bij aan een veilige en gezonde fysieke
    leefomgeving. In opdracht van de gemeenten en de provincie Gelderland verstrekken
    onze vergunningverleners omgevingsvergunningen en zien onze toezichthouders erop
    toe dat bedrijven voldoen aan actuele wet- en regelgeving op het gebied van milieu(veiligheid).
    Daarnaast adviseren onze experts onder meer onze partners over verschillende (milieu)onderwerpen,
    zoals energie, bodem, ruimtelijke ordening, duurzaamheid, lucht, geluid, natuur
    en ecologie, en externe veiligheid.
