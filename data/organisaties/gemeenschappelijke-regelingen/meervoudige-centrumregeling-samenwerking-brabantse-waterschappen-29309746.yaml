  bevoegdheden:
  - kop_artikel: Artikel 7 Verlening mandaat/machtiging
    inhoud_artikel: 1. Het dagelijks bestuur van het gastwaterschap verleent mandaat
      aan het dagelijks bestuur van een centrumwaterschap om binnen de beleidskaders
      van het gastwaterschap namens het gastwaterschap alle besluiten te nemen die
      noodzakelijk zijn ter uitvoering van de taken die aan het centrumwaterschap
      zijn gegeven zoals bedoeld in de leden 1 en 2 van artikel 5.2. Gebruikmaking
      van het verleende mandaat geldt tevens als acceptatie van het verstrekte mandaat
      en de daaraan verbonden voorwaarden.3. Ten aanzien van de bevoegdheden waarvoor
      in dit artikel mandaat is verleend aan het dagelijks bestuur van een centrumwaterschap,
      kan dit dagelijks bestuur ondermandaat verlenen aan medewerkers van het centrumwaterschap.4.
      De in het vorige lid bedoelde personen zijn gemachtigd om alle handelingen te
      verrichten voor de voorbereiding en de uitvoering van besluiten waarvoor in
      het eerste lid mandaat wordt gegeven alsmede om over die besluiten informatie
      te verschaffen aan derden.5. Bij de uitoefening van de aan de bij de taak behorende
      bevoegdheden worden eventuele specifieke bepalingen, in acht genomen.
  - kop_artikel: Artikel 8 Omvang (onder)mandaat
    inhoud_artikel: 1. Ten aanzien van organisatorische en personele aangelegenheden
      is ondermandaat niet toegestaan.2. Het centrumwaterschap handelt bij de uitoefening
      van het (onder)mandaat overeenkomstig het beleid van het gastwaterschap.3. De
      verantwoordelijkheid voor het maken van beleid blijft bij het gastwaterschap
      en gaat niet over naar het centrumwaterschap.4. Deze regeling is niet van toepassing
      op de bevoegdheden die een ambtenaar nodig heeft voor zijn eigen waterschap.
