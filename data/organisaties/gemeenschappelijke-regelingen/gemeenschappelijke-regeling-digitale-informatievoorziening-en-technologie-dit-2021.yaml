  bevoegdheden:
  - kop_artikel: Artikel 2 Belang, taken en reikwijdte van de Regeling
    inhoud_artikel: '1. De Regeling wordt getroffen ter behartiging van het gemeenschappelijke
      belang van een goed beheer van Informatievoorziening, en bijbehorende dienstverlening
      aan de Gemeenten.2. De beleidsbepalende bevoegdheden en de bevoegdheid om de
      financiële kaders vast te stellen blijven berusten bij de Gemeenten, ieder voor
      zover het hun bevoegdheid betreft.3. De Centrumgemeente houdt ter uitvoering
      van de Regeling binnen de eigen ambtelijke organisatie een werkeenheid in stand
      aangeduid als de Uitvoeringsorganisatie.4. De Uitvoeringsorganisatie van de
      Centrumgemeente voert mede namens de Gemeenten de taken uit en oefent de bevoegdheden
      uit die noodzakelijk zijn om de in lid 1 genoemde belangen te behartigen voor
      zover de hiermee verband houdende kosten passen binnen de begroting.5. Ter uitwerking
      van lid 4 maken de Gemeenten binnen de kaders van deze Regeling nadere afspraken
      over de uit te oefenen bevoegdheden en mandaten.6. De Uitvoeringsorganisatie
      wordt belast met de uitvoering van alle taken in de volgende deelgebieden:a.
      beheer: het ontwikkelen, inkopen, installeren, inrichten, testen en beveiligen
      van de Informatievoorziening, inclusief periodiek testen op correcte werking,
      de permanente bewaking, performance- en capaciteitscontrole met het doel om
      de werking van de diensten op het afgesproken kwaliteitsniveau te houden.b.
      ondersteunen: het op strategisch en tactisch niveau adviseren over effectieve
      inzet van Informatievoorziening en het op operationeel niveau beantwoorden van
      vragen en herstellen van dienstverlening bij verstoring daar van.7. Voor deze
      taken worden de niveaus van dienstverlening gedefinieerd in het Informatieplan
      die kaderstellend is voor de inrichting van de Uitvoeringsorganisatie.8. Zowel
      de Uitvoeringsorganisatie als elk van de Gemeenten is bevoegd tot het doen van
      voorstellen tot wijziging van deze taken.9. Ingeval de uitvoering van bepaalde
      wetten, besluiten en regelingen ondergebracht in de Uitvoeringsorganisatie of
      de Gemeenten, niet langer onder de gemeentelijke verantwoordelijkheid vallen
      en dit leidt tot een zodanige vermindering van taken dat dit gevolgen heeft
      voor de omvang van de Uitvoeringsorganisatie, dan zijn de Gemeenten gezamenlijk
      verantwoordelijk voor deze gevolgen, inclusief de financiële gevolgen waaronder
      eventuele wachtgeldverplichtingen.'
  - kop_artikel: Artikel 8 Beleid
    inhoud_artikel: 1. Het hoofd van de Uitvoeringsorganisatie draagt zorg voor de
      voorbereiding van beleid voor de in artikel 2 vermelde taken. Beleidswijzigingen
      op het gebied van Informatievoorziening worden opgenomen in het Informatieplan.2.
      De bevoegdheid tot het vaststellen van beleid voor de uitvoering van de in artikel
      2 vermelde taken blijft bij de Gemeenten.
