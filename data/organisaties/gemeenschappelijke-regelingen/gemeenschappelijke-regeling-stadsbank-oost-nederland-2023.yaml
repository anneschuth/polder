  citeertitel: Gemeenschappelijke Regeling Stadsbank Oost Nederland 2023
  doel: De bank is een gemeentelijke kredietbank als bedoeld in de WCK en heeft tot
    doel, met inachtneming van hetgeen in deze regeling is bepaald om een, zowel vanuit
    een bedrijfseconomische alsook maatschappelijke optiek bezien, verantwoord pakket
    van, al dan niet, financiële dienstverlening aan te bieden aan, in het bijzonder,
    de ingezetenen in haar rechtsgebied.
