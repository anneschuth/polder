  bevoegdheden:
  - kop_artikel: Artikel 5 Bevoegdheden tot regeling en bestuur
    inhoud_artikel: 'Met betrekking tot de behartiging van de in artikel 4, tweede
      lid, genoemde belangen behoren aan de bank de volgende bevoegdheden van regeling
      en bestuur:1. Krediettransacties binnen de Wet fido gegeven kaders:a. geldkrediet
      zoals omschreven in artikel 1, onderdeel a, onder 1o, WCK;b. doorlopend krediet
      zoals omschreven in artikel 1, onderdeel f, WCK;c. saneringskrediet ter uitvoering
      van een regeling met betrekking tot een bestaandeschuldenlast van een natuurlijke
      persoon, geheel of gedeeltelijk voortvloeiend uit een ofmeer krediettransacties;d.
      geldleningen als bedoeld in de artikelen 48 lid 2, onderdeel d, 51 en 52Participatiewet,
      waarbij de deelnemende gemeenten, al dan niet als borg, optreden;2. Schuldenregeling:a.
      schuldbemiddeling op grond van de artikelen 47 en 48 WCK, waarbij, indien dezedienst
      aan een ingezetene van een deelnemende gemeente zal worden verleend, geenvoorafgaande
      toestemming is vereist van het college van betreffende gemeente. Het inrekening
      brengen van de kosten voor dienstverlening die door de tussenkomst vandeelnemende
      gemeenten aan klanten van de bank is verleend, vindt achteraf, middelsdeclaratie
      plaats;b. het tot stand brengen en het uitvoeren van regelingen met betrekking
      tot eenbestaande schuldenlast van een natuurlijke persoon, geheel of gedeeltelijkvoortvloeiend
      uit een of meer krediettransacties;3. Budgetbeheer:a. het aanbieden van een
      dienstenpakket aan de ingezetenen van de deelnemendegemeenten dat, ten eerste,
      bestaat uit de mogelijkheid een bankrekening te openengenaamd: budgetbeheerrekening,
      van waaruit de bank, in naam en voor rekening vande rekeninghouder, in het bijzonder,
      niet incidentele, periodiek terugkerende betalingenverricht. Daarnaast biedt
      dit dienstenpakket de mogelijkheid om, in die gevallen waarinde bank dit wenselijk
      acht, de rekeninghouder gedurende een door de bank te bepalenperiode op een
      planmatige wijze te coachen om zo te komen tot een voorrekeninghouder verantwoord
      inkomsten-uitgavenpatroon. Deze coaching omvat hetaanreiken van kennis en het
      oefenen van vaardigheden en is er op gericht dat derekeninghouder op termijn,
      in staat zal zijn om zelfstandig, structureel evenwicht in zijnfinanciële huishouding
      aan te brengen en te bewaren.Het in rekening brengen van de kosten voor dienstverlening
      die door de tussenkomstvan deelnemende gemeenten aan klanten van de bank is
      verleend, vindt achteraf,middels declaratie plaats. Het in rekening brengen
      van de kosten voor rekeninghoudersdienstverlening aan de overige vindt, middels
      periodieke afschrijving van de betreffendebudgetbeheerrekeningen plaats;b. het
      op verzoek van een college verrichten van de betalingen als bedoeld in artikel
      57,onderdeel a, van de Participatiewet.4. Verklaringen op grond van de Fw:het
      in mandaat afgeven van verklaringen als bedoeld in artikel 285 lid 2 juncto
      artikel285 lid1 onder f Fw. Het in rekening brengen van de kosten voor dienstverlening
      diedoor de tussenkomst van deelnemende gemeenten aan klanten van de bank isverleend,
      vindt achteraf, middels declaratie plaats.5. Bewindvoering en curatele op grond
      van de Fw:a. het aan rechtbanken beschikbaar stellen van in dienst van de bank
      zijndebewindvoerders en curatoren en het, voor zover de functie daartoe aanleiding
      geeft,overdragen van de zeggenschap over deze werknemers aan deze gerechten,
      tenbehoeve van de uitvoering van de relevante bepalingen uit de Fw (wettelijkeschuldsaneringsregeling);b.
      het aan bewindvoerders en curatoren beschikbaar stellen van financiële diensten,
      inhet bijzonder, het aanhouden van boedelrekeningen.6. Bewindvoering op grond
      van het BW (onderbewindstelling ter bescherming vanmeerderjarigen):a. het aan
      kantongerechten beschikbaar stellen van in dienst van de bank zijndebewindvoerders
      en het, voor zover de functie daartoe aanleiding geeft, overdragen vande zeggenschap
      over deze werknemers aan deze gerechten, ten behoeve van deuitvoering van de
      relevante bepalingen uit Titel 19, boek 1 BW, Onderbewindstelling terbescherming
      van meerderjarigen;b. het aan bewindvoerders beschikbaar stellen van financiële
      diensten, in het bijzonder,het aanhouden van rekeningen ten behoeve van het
      vermogensbeheer van degene dieonderbewind is gesteld.7. Diensten in het kader
      van de beschikbaarheid/nuttigheid:het, al dan niet kosteloos, op verzoek van
      een of meer deelnemende gemeenten ofderden verstrekken van informatie of advies
      ter zake van die aandachtsgebieden waaropde bank zich krachtens haar doelstelling
      beweegt, dan wel het aan verzoeker terbeschikking stellen van bij de bank aanwezige
      expertise.8. Preventie:a. bevorderen van maatregelen ter voorkoming en bestrijding
      van problematischeschuldsituaties;b. geven van voorlichting en advies met betrekking
      tot het bovengenoemde onderwerpen aandachtsgebieden waarop de bank zich krachtens
      haar doelstelling beweegt.De door de bank in het kader van preventie aan de
      deelnemende gemeenten of haaringezetenen geleverde diensten worden om niet verricht.
      Het algemeen bestuur kanbesluiten dat voor deze dienstverlening kosten in rekening
      zullen worden gebracht.9. Het bevorderen van de spaarzin;10. Harmonische en
      evenwichtige ontwikkeling van de onderneming:Met inachtneming van haar doelstelling
      zoals in artikel 4 lid 1 van deze regelingomschreven, zal de bank:a. haar pakket
      van dienstverlening primair afstemmen op de behoeften van deingezetenen van
      de deelnemende gemeenten en dit pakket van diensten ook primairaan deze doelgroep
      aanbieden;b. ingezetenen van niet-deelnemende gemeenten eveneens in de gelegenheid
      stellengebruik te maken van het pakket van dienstverlening van de bank, maar
      slechts indienmet de besturen van deze gemeenten overeenstemming is bereikt
      over de dekking vanfinanciële risico’s;c. haar diensten, voor zover het diensten
      aan ingezetenen van deelnemendegemeenten betreft, aanbieden op kostprijsbasis
      en met uitsluiting van winstbejag;d. kunnen overgaan tot het, buiten de centrale
      vestiging te Enschede, in deelnemendegemeenten vestigen van bijkantoren;e. kunnen
      overgaan tot het vestigen van agent- of correspondentschappen bij eenafdeling
      of dienst van een gemeente, dan wel op een andere wijze tot samenwerkingmet
      een deelnemende gemeente of daaraan gelieerde instantie komen; waarin eenfinancieel-economisch
      beeld wordt geschetst van de bank en waarin tevens eenprognose wordt gegeven
      met betrekking tot de toekomstige periode;f. het ontwikkelen van beleid inzake
      medezeggenschap en arbeidsomstandighedenDe bank zal als deelnemer in krediettransacties
      als bedoeld in lid 1, onderdeel 1, onder d, van dit artikel, slechts participeren
      indien en voor zover er tussen de deelnemende gemeente en de bank overeenstemming
      is bereikt.'
