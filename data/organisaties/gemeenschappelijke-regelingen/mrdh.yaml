  abbr: MRDH
  valid_from: '1900-01-01'
description:
  text: De Metropoolregio Rotterdam Den Haag (MRDH) is dé samenwerking van, voor en
    door 21 gemeenten in de grootstedelijke regio Rotterdam Den Haag. Samen met het
    bestuur, de 21 gemeenten, mede-overheden en onze netwerkpartners van kennisinstellingen
    en bedrijfsleven, werken we aan een aantrekkelijke regio voor inwoners om te werken,
    wonen en recreëren, waar (internationale) bedrijven zich vestigen en waar bezoekers
    zich welkom voelen. Wij richten ons op het versterken van het economisch vestigingsklimaat
    en het verbeteren van de bereikbaarheid.
  url: https://mrdh.nl/wie-zijn/mrdh-organisatie
