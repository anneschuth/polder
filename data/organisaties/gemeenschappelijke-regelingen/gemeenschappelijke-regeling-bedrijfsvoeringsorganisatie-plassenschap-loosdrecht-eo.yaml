  bevoegdheden:
  - kop_artikel: Artikel 4. Taken en bevoegdheden
    inhoud_artikel: 1. Aan het bestuur van de Bedrijfsvoeringsorganisatie Plassenschap
      worden de volgende taken en bevoegdheden overgedragen:a. het beheer van de eigendommen
      en het vaststellen van de kaders voor de taakuitvoering ten behoeve van uitvoerende
      derde partijen en het maken van afspraken met deze derde partijen;b. het aanleggen,
      onderhouden en eventueel exploiteren van recreatieve voorzieningen en het uitvoeren
      van andere werken verband houdend met deze taak;c. het in stand houden en verbeteren
      van het natuur- en landschapsschoon voor zover samenhangend met deze taak;d.
      het financiële beheer, contractmanagement en de communicatieve taken die benodigd
      zijn voor uitvoering van de taken bedoeld onder a. tot en met c.2. De nadere
      omschrijving van de taken, de intensiteit van en condities waaronder de taken
      worden uitgevoerd, worden door het bestuur vastgelegd in het uitvoeringsplan
      bedoeld in artikel 16.
