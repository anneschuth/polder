  citeertitel: Gemeenschappelijke Regeling Omgevingsdienst regio Utrecht
  doel: De Omgevingsdienst behartigt, met inachtneming van hetgeen hierover in de
    regeling is bepaald, de belangen van de gemeenten tezamen en van elke deelnemende
    gemeente afzonderlijk op het gebied van omgeving in de ruimste zin, voor zover
    de bevoegdheid daartoe de gemeente toekomt en aan de Omgevingsdienst gemandateerd
    is.De Omgevingsdienst draagt zorg voor een organisatie ter behartiging van de
    in lid 1 genoemde belangen en van de ter uitvoering daarvan opgedragen en overeengekomen
    taken.
