  bevoegdheden:
  - kop_artikel: Artikel 23
    inhoud_artikel: Onverminderd het bepaalde in de Algemene wet bestuursrecht en
      de overige toepasselijke wet- en regelgeving, gelden voor de opdracht tot uitvoering
      van taken en bevoegdheden door de gemeenten aan de Omgevingsdienst, anders dan
      de taken en bevoegdheden die reeds op grond van artikel 21 door de Omgevingsdienst
      zullen worden uitgevoerd respectievelijk uitgeoefend, de volgende voorschriften:a.
      Opdracht tot uitvoering van taken en bevoegdheden door de gemeenten dan wel
      een gemeente aan de Omgevingsdienst kan plaatsvinden op voorstel van het algemeen
      bestuur, het dagelijks bestuur of één of meer gemeenten.b. het dagelijks bestuur
      voert daartoe overleg met de colleges van burgemeester en wethouders van de
      gemeenten en eventueel met andere daarvoor in aanmerking komende besturen, instellingen,
      diensten en personen.c. het dagelijks bestuur werkt de beoogde opdracht uit
      en legt die vast in een concept-besluit, voorzien van een financiële onderbouwing
      als bedoeld in de artikelen 30 en 31, en van een regeling van de inhoudelijke
      en personele gevolgen, ter vaststelling door het algemeen bestuur.
