- value: Fryske Utfieringstsjinst Miljeu en Omjouwing
  abbr: FUMO
  valid_from: '1900-01-01'
description:
  text: De Fryske Utfieringstsjinst Miljeu en Omjouwing (FUMO) is de omgevingsdienst
    van Fryslân. De FUMO geeft advies, verstrekt vergunningen en houdt toezicht op
    het gebied van natuur- en milieuwet- en regelgeving. Dat doet de FUMO voor de
    bedrijven en inwoners van Fryslân, in opdracht van alle 18 Friese gemeenten, de
    provincie Fryslân en Wetterskip Fryslân; de deelnemers.
  url: https://www.fumo.nl/over-de-fumo
