  bevoegdheden:
  - kop_artikel: Artikel 5 Bevoegdheden
    inhoud_artikel: 1. De colleges alsmede de burgemeesters van de gemeenten kunnen
      bevoegdheden in mandaat verlenen en daarmee taken opdragen aan het dagelijks
      bestuur of de concerndirectie.2. Overeenkomstig artikel 10:4 van de Algemene
      wet bestuursrecht wordt voor mandaatverlening overeenkomstig het vorige lid
      instemming van het algemeen bestuur, respectievelijk het dagelijks bestuur,
      respectievelijk de concerndirectie gevraagd.3. Het dagelijks bestuur houdt een
      register bij van de overeenkomstig het eerste en tweede lid gemandateerde bevoegdheden.4.
      [vervallen]5. [vervallen]6. De burgemeesters dragen geen bevoegdheden over.
