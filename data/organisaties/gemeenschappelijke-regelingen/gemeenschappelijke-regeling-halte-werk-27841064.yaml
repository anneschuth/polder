  bevoegdheden:
  - kop_artikel: Artikel 4 Taken en bevoegdheden
    inhoud_artikel: 1. Ter uitvoering van het in artikel 3 van de regeling genoemde
      belang, dragen de colleges van de deelnemende gemeenten aan Halte werk alle
      bevoegdheden op met betrekking tot de uitvoering van de wetten, met inachtneming
      van de door de bestuursorganen van de deelnemende gemeenten vastgestelde verordeningen,
      overige algemeen verbindende voorschriften en beleidsregels.2. De uitvoering
      als bedoeld in het eerste lid heeft in ieder geval betrekking op:a. beleidsvoorbereidende
      werkzaamheden, op het terrein van de uitvoering van de wetten, zulks met inachtneming
      van de, op basis van de wetten, door de bestuursorganen van de deelnemende gemeenten
      vastgestelde verordeningen, overige algemeen verbindende voorschriften en beleidsregels;b.
      uitvoeren van het door de daartoe bevoegde gemeentelijke bestuursorganen vastgestelde
      beleid;c. de uitvoering van algemene maatregelen van bestuur en de uitvoeringsregelingen
      van de in het eerste lid genoemde wetten, voor zover deze aan het college is
      opgedragen;d. de uitvoering van nieuwe wet- of regelgeving die in de plaats
      treedt van de in dit lid bedoelde wet- of regelgeving;e. het op basis van de
      wetten geven van voorlichtingen en informatie aan burgers;f. het op basis van
      de wetten uitvoering geven aan participatie, arbeidsre-integratie en sociale
      activeringen, alsmede inkomensondersteuning;g. het oprichten van of deelneming
      in stichtingen, maatschappen, vennootschappen, verenigingen, coöperaties en
      onderlinge waarborgmaatschappijen, voor zover dit past binnen het belang van
      de regeling;h. het verrichten van voorbereidende werkzaamheden met betrekking
      tot bezwaar en (hoger) beroep, voor zover dit verband houdt met de in dit lid
      bedoelde wet- en regelgeving;i. het op basis van een daartoe af te sluiten dienstverleningsovereenkomst
      uitvoeren van andere taken t.b.v. (één van) de deelnemende gemeenten dan alleen
      de wetten;j. het verlenen van diensten aan een andere gemeente dan de deelnemende
      gemeenten op basis van een daartoe met een dergelijke gemeente af te sluiten
      dienstverleningsovereenkomst.3. De bestuursorganen van de deelnemende gemeenten
      doen mededeling van bij hen in voorbereiding zijnde maatregelen en plannen die
      voor de uitvoering van het bepaalde in artikel 3 van belang zijn.4. De colleges
      van de deelnemende gemeenten zullen in afzonderlijke mandaatbesluiten bepalen
      welke bevoegdheden, die samenhangen met de taken als vermeld in artikel 4 van
      de regeling, gemandateerd dienen te worden aan het bestuur dan wel aan de directeur
      van HALte werk.5. Het bestuur houdt een register bij van de aan het bestuur
      respectievelijk aan de directeur gemandateerde bevoegdheden.
