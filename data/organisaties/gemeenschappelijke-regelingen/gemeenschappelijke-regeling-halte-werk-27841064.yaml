  citeertitel: Gemeenschappelijke Regeling HALte werk
  doel: Halte werk behartigt, met inachtneming van hetgeen hierover in de regeling
    is bepaald, de belangen van de deelnemende gemeenten gezamenlijk en ieder afzonderlijk
    met betrekking tot de uitvoering van de in medebewind opgedragen Wetten, voor
    zover de bevoegdheid daartoe de deelnemende gemeente toekomt en voor zover deze
    aan het bestuur en/of directeur van Halte werk is gemandateerd.
