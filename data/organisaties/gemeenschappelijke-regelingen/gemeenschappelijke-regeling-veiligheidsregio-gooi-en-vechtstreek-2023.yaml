  doel: De veiligheidsregio behartigt de gemeenschappelijke belangen van de aan deze
    regeling deelnemende gemeenten op de volgende terreinen:a. de brandweerzorg;b.
    de geneeskundige hulpverlening in het kader van rampenbestrijding en crisisbeheersing;c.
    de gemeentelijke bevolkingszorg in het kader van rampenbestrijding en crisisbeheersing;d.
    de rampenbestrijding en crisisbeheersing;e. de meldkamerfunctie ten behoeve van
    de brandweertaak en ten behoeve van de rampenbestrijding, de crisisbeheersing
    en de geneeskundige hulpverlening.
