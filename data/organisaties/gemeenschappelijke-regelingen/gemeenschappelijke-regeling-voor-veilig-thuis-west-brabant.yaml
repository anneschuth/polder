  bevoegdheden:
  - kop_artikel: Artikel 5 Mandaat
    inhoud_artikel: 1. Aan het College van de Centrumgemeente wordt door de colleges
      van de Gemeenten mandaat verleend om namens de Colleges van de Gemeenten, voor
      zover nodig, alle besluiten te nemen en andere rechtshandelingen te verrichten
      die noodzakelijk zijn ter behartiging van het in artikel 2 gestelde doel en
      de daartoe opgedragen taken zoals aangegeven in artikel 4, tenzij een wettelijk
      voorschrift of de aard van de bevoegdheid zich hiertegen verzet. Hieronder wordt
      in ieder geval verstaan het nemen van subsidiebesluiten ten behoeve van Veilig
      Thuis in de ruimste zin des woords en het nemen van beslissingen op eventuele
      bezwaarschriften en het voeren van beroepsprocedures.2. Het College van de Centrumgemeente
      is bevoegd aan de medewerkers van de Centrumgemeente een of meerdere ondermandaten
      te verlenen voor de volgende bevoegdheden:a. subsidieverlening aan Veilig Thuis;b.
      het beheer van de projectkosten (incidentele restmiddelen);c. het beslissen
      op bezwaar en het voeren van beroepsprocedures.3. De Colleges van de Gemeenten
      kunnen de in deze Regeling verleende mandaten alleen intrekken onder de voorwaarde
      dat zij de activiteiten op het gebied van huiselijk geweld en kindermishandeling
      gedurende 12 maanden na intrekking bij Veilig Thuis blijven onderbrengen.
