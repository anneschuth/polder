gr_meta:
  citeertitel: Gemeenschappelijke Regeling voor Veilig Thuis West-Brabant
  doel: De gemeenschappelijke regeling is aangegaan met de volgende doelen:a. de samenwerking
    verankeren tussen de Colleges van de Gemeenten bij de zorg voor één Veilig Thuis;b.
    de taken en bevoegdheden van de regiogemeenten vanuit de Wmo, de Jeugdwet en het
    terrein van veiligheid en openbare orde ten aanzien van Veilig Thuis door mandaat
    en volmacht op te dragen aan het College van de Centrumgemeente. Hierdoor wordt
    het behalen van schaalvoordelen, het stimuleren van de samenwerking tussen de
    deelnemers door actief informeren en communiceren, het afstemmen van de opdracht
    van de regiogemeenten aan Veilig Thuis, de beheersing van de middelen en eventuele
    besparingen of aanvullende kosten en de verevening van risico’s geregeld.
  samenwerkingsvorm:
    value: '''Regeling zonder meer'''
    afkorting: RZM
