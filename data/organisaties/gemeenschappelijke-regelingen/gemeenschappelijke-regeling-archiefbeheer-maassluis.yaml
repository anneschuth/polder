  bevoegdheden:
  - kop_artikel: Artikel 4 Taken en bevoegdheden van de deelnemers
    inhoud_artikel: Als gemeentelijke archiefbewaarplaats in de zin van artikel 31
      van de wet wordt voor de gemeente Maassluis aangewezen de archiefbewaarplaats
      van het Stadsarchief Vlaardingen, gevestigd Plein Emaus 5 te Vlaardingen, naast
      het depot in het stadhuis van Maassluis, gevestigd Koningshoek 93050 te Maassluis.
  - kop_artikel: Artikel 5
    inhoud_artikel: 1. Het gemeentebestuur van Maassluis draagt zorg voor het navolgende:a.
      benoeming van de stadsarchivaris van Vlaardingen tot gemeentearchivaris, als
      bedoeld in artikel 32 van de wet, van Maassluis;b. het vaststellen van een archiefverordening,
      als bedoeld in artikel 30, eerste lid en artikel 32, tweede lid van de wet;c.
      het overbrengen van de archieven van de gemeente Maassluis tot circa 1935, naar
      het Vlaardingse Stadsarchief;d. het bij de directeur van het Nationaal Archief
      te ’s-Gravenhage indienen van een verzoek om de zich aldaar bevindende archieven
      betreffende de gemeente Maassluis in bewaring te geven aan het Stadsarchief
      Vlaardingen;e. het in staat stellen van het Stadsarchief Vlaardingen om, voor
      zover deze situatie zich voordoet, particuliere archieven betreffende de gemeente
      Maassluis op dezelfde voorwaarden als genoemd in deze regeling, op te nemen
      en te beheren.
  - kop_artikel: Artikel 6
    inhoud_artikel: Het gemeentebestuur van Vlaardingen draagt zorg voor het navolgende:|
      Algemeena. het, overeenkomstig het daartoe bij of krachtens de wet bepaalde,
      bewaren en beheren van de overgebrachte archieven betreffende de gemeente Maassluis.b.
      het, met inachtneming van het daartoe bij of krachtens de wet bepaalde, beschikbaar
      stellen van de overgebrachte archieven in de studiezalen van het Vlaardingse
      Stadsarchief;II Bijzonderc. het, op verzoek van het gemeentebestuur van Maassluis,
      microficheren of fotokopiëren en nader ontsluiten van het Bevolkingsregister,
      de Registers van de Burgerlijke Stand en de Doop-, Trouw- en Begraafregisters
      van de gemeente Maassluis en andere frequent geraadpleegde archieven of archiefbestanddelen;d.
      het één maal per jaar en verder op verzoek van het gemeentebestuur van Maassluis
      inspecteren van de niet-overgebrachte archieven van de gemeente Maassluis;e.
      het, op verzoek van het gemeentebestuur van Maassluis, conserveren en restaureren
      van de overgebrachte archieven;f. het, op verzoek van het gemeentebestuur van
      Maassluis, schonen en inventariserenvan de overgebrachte archieven.Ter uitvoering
      van de in dit artikel onder II Bijzonder c, d, e en f genoemde werkzaamheden,
      stelt de stadsarchivaris van Vlaardingen jaarlijks, in overleg met het gemeentebestuur
      van Maassluis, een uitvoeringsprogramma op. Het in artikel 7, derde lid, genoemde
      budget is daarbij richtinggevend.
