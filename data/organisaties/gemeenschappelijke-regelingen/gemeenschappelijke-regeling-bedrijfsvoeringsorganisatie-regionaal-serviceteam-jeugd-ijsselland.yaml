gr_meta:
  citeertitel: Gemeenschappelijke regeling Bedrijfsvoeringsorganisatie Regionaal Serviceteam
    Jeugd IJsselland
  doel: De regeling wordt getroffen ter ondersteuning en uitvoering van de taken van
    de colleges in het kader van de Jeugdwet, in het bijzonder de inkoop van diensten
    in het kader van de specialistische jeugdzorg, het contractmanagement, het contractbeheer,
    monitoring en de uitvoering van regionale inhoudelijke thema’s, tenzij het bestuur
    van de bedrijfsvoeringsorganisatie op zwaarwegende gronden anders beslist en uitsluitend
    met instemming van alle elf gemeenten.
