  citeertitel: Samenwerkingsorganisatie De Wolden Hoogeveen
  doel: Het belang waarvoor de Regeling wordt getroffen, is het bewerkstelligen van
    een kwalitatief goede en doelmatige uitvoering door de Bedrijfsvoeringsorganisatie
    van gemeentelijke taken, zoals vastgelegd in de vastgestelde en vast te stellen
    wettelijke voorschriften, regelingen, beleid, bedrijfsplan, overige besluiten
    en in de jaarlijks vast te stellen begroting van de deelnemers.
