  bevoegdheden:
  - kop_artikel: Artikel 7 Bevoegdheden
    inhoud_artikel: 1. De veiligheidsregio heeft alle bevoegdheden tot regeling, bestuur
      en beheer die nodig zijn voor de uitvoering van de aan haar opgedragen taken.2.
      Tot deze bevoegdheden behoort het vaststellen van een verordening ten behoeve
      van het heffen en invorderen van rechten als bedoeld in artikel 229, eerste
      lid, onder b en artikel 231 van de Gemeentewet, voor zover deze door de bevoegde
      bestuursorganen is overgedragen.3. Alle bevoegdheden in het kader van deze gemeenschappelijke
      regeling, die niet aan een ander bestuursorgaan zijn opgedragen, behoren aan
      het algemeen bestuur.
