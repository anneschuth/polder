gr_meta:
  citeertitel: Gemeenschappelijke regeling Omgevingsdienst Groningen
  doel: De Omgevingsdienst Groningen is ingesteld om vergunningverlenende, toezichthoudende
    en handhavingstaken op het gebied van het omgevingsdomein voor de deelnemers te
    gaan uitvoeren, waarmee de deelnemers de kwaliteit van de uitvoering van deze
    taken willen verbeteren.
