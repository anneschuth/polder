  bevoegdheden:
  - kop_artikel: Artikel 10 Mandaat
    inhoud_artikel: 1  De Omgevingsdienst Groningen verricht naast zelfstandig uit
      te voeren werkzaamheden, ook werkzaamheden voor Gedeputeerde Staten en Burgemeester
      en Wethouders van de gemeenten via mandaat, waarbij het door Gedeputeerde Staten
      en Burgemeester en Wethouders vastgestelde beleid in acht wordt genomen.2  Ten
      aanzien van de aan de Omgevingsdienst Groningen in mandaat toekomende taken,
      kan ondermandaat worden verleend.3  De werkzaamheden die de Omgevingsdienst
      Groningen via mandaat verricht, worden opgenomen in een door de deelnemers te
      nemen mandaatbesluit.
