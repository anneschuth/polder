  bevoegdheden:
  - kop_artikel: Artikel 5 Bevoegdheden
    inhoud_artikel: 1. Ter uitvoering van de taken, bedoeld in artikel 4, eerste lid,
      dragen de colleges hun bevoegdheden genoemd in de wetten genoemd in artikel
      4, eerste lid, over aan het bestuur van GGD HN.2. Ten behoeve van de taken bedoeld
      in artikel 4, tweede lid, kan overdracht van bevoegdheden plaatsvinden op het
      voorstel van het betreffende college, zonder dat hiervoor de regeling hoeft
      te worden gewijzigd.3. De directeur is toezichthouder in de zin van artikel
      1.61, eerste lid van de Wet kinderopvang.4. Het algemeen bestuur is bevoegd
      tot de oprichting van en de deelneming in stichtingen, maatschappen, vennootschappen,
      verenigingen, coöperaties en onderlinge waarborgmaatschappijen, met inachtneming
      van artikel 31a van de wet.5. Het algemeen bestuur neemt het besluit, bedoeld
      in het vierde lid, met een meerderheid van ten minste twee derde van de leden
      van het algemeen bestuur die samen ten minste twee derde van het aantal uit
      te brengen stemmen vertegenwoordigen.
