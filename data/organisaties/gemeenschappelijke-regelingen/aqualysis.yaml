description:
  text: Wij zijn een geaccrediteerd (RvA L230), onafhankelijk en onpartijdig laboratorium.
    Met een team van enthousiaste en deskundige collega’s voeren wij hydrobiologisch,
    bacteriologisch en chemisch onderzoek uit en verrichten we diverse soorten veldwerkzaamheden
    en monsternemingen.
