  bevoegdheden:
  - kop_artikel: Artikel 3 (taak)
    inhoud_artikel: Het openbaar lichaam treedt op als opdrachtgever voor de realisering
      van collectief vraagafhankelijk openbaar vervoer en voor - door de deelnemers
      - aan te wijzen categorieën van personen binnen het vervoersgebied, waarbij
      voor deze doelgroepen een zo effectief, efficiënt en uniform mogelijk vervoersaanbod
      wordt nagestreefd.Tot deze categorieën behoren in ieder geval de gehandicapten,
      die ingevolge de Wet voorzieningen gehandicapten ter voorziening van hun vervoersbehoeften
      door de gemeenten in aanmerking zijn gebracht voor collectief vervoer.De door
      de deelnemers aan te wijzen categorieën personen worden ten laste van de deelnemer
      die deze aanwijst, vervoerd.Het openbaar lichaam draagt verantwoordelijkheid
      voor alle bevoegdheden die voortvloeien uit het optreden als opdrachtgever.Het
      openbaar lichaam neemt daartoe de in convenants met deelnemers vastgelegde algemene
      en financiële randvoorwaarden in acht.
  - kop_artikel: Artikel 9 (bevoegdheden van het algemeen bestuur)
    inhoud_artikel: Het algemeen bestuur staat aan het hoofd van het openbaar lichaam.
      Aan hem komt binnen het kader van de taakuitoefening als omschreven in artikel
      2 en artikel 3 van deze regeling alle bevoegdheden toe, die niet bij of krachtens
      deze regeling of de wet aan anderen zijn opgedragen.
