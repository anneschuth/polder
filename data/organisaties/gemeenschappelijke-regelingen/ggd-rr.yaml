description:
  text: 'De gemeenschappelijke regeling GGD Rotterdam-Rijnmond (GR GGD-RR) voert de
    basistaken uit voor het gehele werkgebied. In de begroting is aangegeven wat de
    aard, omvang en prijs is van de producten die de GGD  Rotterdam-Rijnmond voor
    de aangesloten gemeenten uitvoert.De volgende gemeenten nemen deel aan de gemeenschappelijke
    regeling GGD Rotterdam-Rijnmond: Albrandswaard, Barendrecht, Capelle a/d IJssel,
    Goeree-Overflakkee, Krimpen a/d IJssel, Lansingerland, Maassluis, Nissewaard,
    Ridderkerk, Rotterdam, Schiedam,  Vlaardingen en Voorne aan Zee.'
