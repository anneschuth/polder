  citeertitel: Gemeenschappelijke Regeling Belastingsamenwerking SaBeWa Zeeland
  doel: In het kader van deze gemeenschappelijke regeling worden de belangen van de
    deelnemers, elk voor zover het hun gebied betreft en niet uitdrukkelijk is uitgesloten
    van de taakoverdracht aan SaBeWa Zeeland, behartigd op het terrein van:a. de heffing
    en invordering van belastingen zoals genoemd in de bijlage behorende bij de Gemeenschappelijke
    Regeling Belastingsamenwerking SaBeWa Zeeland;b. de uitvoering van de Wet waardering
    onroerende zaken.
