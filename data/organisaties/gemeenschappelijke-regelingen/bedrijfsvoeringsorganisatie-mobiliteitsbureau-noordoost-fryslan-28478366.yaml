  bevoegdheden:
  - kop_artikel: Artikel 5 Bevoegdheden
    inhoud_artikel: 1. Aan het bestuur van het Mobiliteitsbureau Noordoost Fryslân
      worden geen publiekrechtelijke bevoegdheden overgedragen.2. Onverminderd het
      bepaalde in artikel 10:4 van de Algemene wet bestuursrecht bevorderen de deelnemers,
      ter uitvoering van de in artikel 4 genoemde taken, dat door de bevoegde bestuursorganen
      van de deelnemende gemeenten en de provincie aan het bestuur van het Mobiliteitsbureau
      Noordoost Fryslân mandaat wordt verleend om besluiten te nemen, volmacht wordt
      verleend tot het verrichten van privaatrechtelijke rechtshandelingen en machtiging
      wordt verleend tot het verrichten van handelingen die noch een besluit, noch
      een privaatrechtelijke rechtshandeling zijn.
