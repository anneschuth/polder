gr_meta:
  citeertitel: Bedrijfsvoeringsorganisatie Mobiliteitsbureau Noordoost Fryslân
  doel: Het belang van de regeling is het realiseren van het behoud en/ of verbeteren
    van de leefbaarheid in de regio Noordoost Fryslân. Specifiek ziet de regeling
    toe op het realiseren van dit belang door het verhogen van de bereikbaarheid en
    het efficiënt organiseren van doelgroepenvervoer en openbaar vervoer, door het
    realiseren van een samenhangend vervoerssysteem in de regio.
