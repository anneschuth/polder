gr_meta:
  citeertitel: Gemeenschappelijke Regeling Regionale Uitvoeringsdienst Noord-Holland
    Noord
  doel: De regeling is getroffen ter ondersteuning van de deelnemers bij de uitvoering
    van hun taken op het gebied van vergunningverlening, toezicht en handhaving. De
    taken betreffen in elk geval de wettelijk bepaalde taken op het gebied van het
    omgevingsrecht in het algemeen en de Wet algemene bepalingen omgevingsrecht in
    het bijzonder, alsmede de taken op het terrein van vergunningverlening, handhaving
    en toezicht op grond van de in artikel 5.1 van de Wet algemene bepalingen omgevingsrecht
    genoemde wetten.
