  bevoegdheden:
  - inhoud_artikel: De uitvoeringsdienst is belast met het ten behoeve van de deelnemers
      uitvoeren van het verplichte Landelijke Basistakenpakket met inachtneming van
      het door de deelnemers vastgestelde beleid. Tot het Landelijke Basistakenpakket
      wordt ook gerekend het in dit kader vervullen van adviserende taken op het terrein
      van de vergunningverlening, toezicht en handhaving ten behoeve van de deelnemers,
      alsmede coördinerende en afstemmende taken die voor de deelnemers tezamen worden
      verricht. In aanvulling op de taken uit het Landelijke Basistakenpakket kan
      de Uitvoeringsdienst op verzoek van een deelnemer voor deze deelnemer ook andere
      adviserende, ondersteunende en uitvoerende werkzaamheden inzake de vergunningverlening,
      toezicht en handhaving op het gebied van het fysieke leefomgeving verrichten
      met inachtneming van het door de deelnemers vastgestelde beleid.
