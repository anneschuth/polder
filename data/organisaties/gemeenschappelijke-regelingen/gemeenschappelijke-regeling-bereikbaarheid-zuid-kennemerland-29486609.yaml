  bevoegdheden:
  - kop_artikel: Artikel 4 Bevoegdheden
    inhoud_artikel: 1. Ter behartiging van de in artikel 3 genoemde belangen is het
      orgaan bevoegd besluiten voor te bereiden voor de besturen van de deelnemers.2.
      Ten behoeve van de voorbereiding van de besluiten genoemd onder 1 is het orgaan
      bevoegd namens alle deelnemers met mede-overheden en derden besprekingen en
      onderhandelingen te voeren.3. Het orgaan legt de voorstellen voor aan de deelnemende
      gemeenten, die daarover op de voor hen geëigende wijze besluiten.4. Het orgaan
      is bevoegd om ten behoeve van de in lid 1 genoemde werkzaamheden onderzoek te
      laten uitvoeren. Het formele opdrachtgeverschap voor dergelijk onderzoek berust
      bij een daartoe door het orgaan aan te wijzen deelnemer.5. Het orgaan is bevoegd
      te beschikken over het werkdeel van de begroting zoals bedoeld in art. 12.2.6.
      Alle correspondentie van het orgaan alsmede besluiten uit hoofde van artikel
      4 worden ondertekend door of namens de voorzitter en secretaris van het orgaan.
