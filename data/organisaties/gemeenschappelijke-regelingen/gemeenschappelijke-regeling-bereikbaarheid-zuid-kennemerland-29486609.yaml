gr_meta:
  citeertitel: Gemeenschappelijke regeling Bereikbaarheid Zuid-Kennemerland
  doel: De regeling dient om de door de raden van de deelnemers genomen besluiten
    inzake samenwerking op het gebied van bereikbaarheid in onderlinge afspraken vast
    te leggen en aldus over een langdurige periode te borgen. De door de raden van
    de deelnemers genomen besluiten betreffen met name de instelling van een Regionaal
    Mobiliteitsfonds en de vaststelling van de bereikbaarheidsvisie. Deze dienen om
    de vier opgaven voor Zuid-Kennemerland (woningbouw, economie, landschap & recreatie
    en klimaat & energie) op te pakken en de doelstelling, zoals geformuleerd in de
    Bereikbaarheidsvisie, dichterbij te brengen:- Een economisch krachtige regio met
    een hoge leefomgevingskwaliteit en oog voor duurzaamheid.
