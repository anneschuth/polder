  bevoegdheden:
  - kop_artikel: Artikel 4 – Bevoegdheden
    inhoud_artikel: 1. De centrumgemeente is belast met taken die betrekking hebben
      op de volgende gebieden:a. informatievoorziening, data en privacy;b. inkoop
      en contractmanagement;c. financiën;d. HRM;e. juridische zaken, enf. facilitaire
      zaken.2. Ter uitvoering van de in het eerste lid opgenomen taken worden dienstverleningsovereenkomsten
      afgesloten tussen de centrumgemeente enerzijds en iedere partnergemeente afzonderlijk
      anderzijds, waarin de invulling van de taken nader wordt overeengekomen. De
      centrumgemeente stelt daartoe een model-dienstverleningsovereenkomst op die
      als basis voor de afzonderlijke dienstverleningsovereenkomsten wordt gehanteerd
      en kan algemene voorwaarden opstellen.3. De in het eerste lid genoemde taken
      kunnen worden uitgebreid of niet langer worden afgenomen indien de centrumgemeente
      en de betreffende partnergemeente daarover overeenstemming bereiken middels
      een dienstverleningsovereenkomst.4. De bevoegdheden die nodig zijn voor de uitoefening
      van de in het eerste lid bedoelde taken worden bij apart mandaatbesluit opgedragen
      aan het college of ambtenaren van de centrumgemeente. Daarbij wordt voorzien
      in de mogelijkheid ondermandaat te verlenen.5. Het vorige lid is van overeenkomstige
      toepassing op het verlenen van een volmacht tot het verrichten van privaatrechtelijke
      rechtshandelingen of het verlenen van een machtiging voor het verrichten van
      feitelijke handelingen door de centrumgemeente namens de partnergemeente.6.
      De bevoegdheid tot het vaststellen van beleidsregels wordt niet gemandateerd
      aan het college van de centrumgemeente, tenzij een college van een partnergemeente
      hiertoe expliciet besloten heeft in zijn mandaatbesluit.
