names:
- value: Natuur- en recreatieschap IJsselmonde
  valid_from: '1900-01-01'
description:
  text: Het natuur- recreatieschap vervult een trekkersrol in het realiseren en beheren
    van het bestaande en geplande recreatieve aanbod in de groene buitenruimte van
    IJsselmonde. Het wordt in onderlinge samenhang afgestemd op de brede maatschappelijke
    vraag en mogelijkheden met een marktgerichte oriëntatie.Onderdeel van de gemeenschappelijke
    regeling zijn de gemeenten Zwijndrecht, Barendrecht, Hendrik-Ido-Ambacht, Ridderkerk
    en Alblasserwaard.
