  bevoegdheden:
  - kop_artikel: 'Artikel 6: Bevoegdheden'
    inhoud_artikel: 1. De colleges geven het college van de Centrumgemeente mandaat,
      volmacht en machtiging om de in artikel 5 genoemde taken uit te voeren, begrensd
      door wetgeving, jurisprudentie en financiële kaders.2. Het college van de Centrumgemeente
      kan de bevoegdheden in het eerste lid ondermandateren aan de medewerkers van
      de Centrumgemeente.
  - kop_artikel: 'Artikel 7: Taken en bevoegdheden Gemeenten in het kader van de doordecentralisatie
      van Beschermd wonen'
    inhoud_artikel: 1. Elke Gemeente zorgt voor een stevige lokale Basis conform de
      uitgangspunten in de regionale beleidskaders, zodat inwoners kunnen meedoen,
      participeren naar vermogen en zo lang mogelijk zelfstandig, al dan niet met
      ondersteuning, kunnen wonen. Zwaardere zorg en/of een beroep op het Specialistische
      vangnet Beschermd wonen en opvang wordt daardoor zoveel mogelijk voorkomen.2.
      Elke Gemeente heeft een lokaal uitvoeringsprogramma waarin is opgenomen hoe
      er wordt gewerkt aan het realiseren van de Basis op orde. Dit gebeurt binnen
      de kaders van de Regionale Ontwikkelagenda psychische kwetsbaarheid.3. Alle
      Gemeenten organiseren gezamenlijk elk jaar een bijeenkomst waarbij de ontwikkelingen
      van het afgelopen jaar worden gepresenteerd aan alle stakeholders en waarbij
      vooruit wordt gekeken naar het komende jaar.4. Alle Gemeenten dragen zorg voor:–
      het lokaal oppakken van de brede vraagverheldering voor Beschermd wonen en opvang;–
      het bouwen aan de Basis op orde;– procesregie bij in- en uitstroom naar en vanuit
      het Specialistisch vangnet Beschermd wonen en opvang;– de verantwoordelijkheid
      voor openbare orde en veiligheid bij uitstroom naar Gemeente van herkomst;–
      toeleiding van eigen inwoners naar beveiligde en/of Wlz plekken;– een aanpak-voorkomen-escalatiemodel
      en een gemeentelijke procesregisseur die binnen kantoortijden aanspreekbaar
      is voor inwoners, ketenpartners, Gemeenten en de Regionale toegang voor overleg
      over complexe casuïstiek;– het realiseren van tussenvormen voor Beschermd Thuis
      voor eigen inwoners.
