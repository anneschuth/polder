  bevoegdheden:
  - kop_artikel: Artikel 4
    inhoud_artikel: 1. Promen heeft tot doel het op een bedrijfsmatig verantwoorde
      wijze uitvoering te geven aan de Wet sociale werkvoorziening, alsmede aan de
      voorziening gericht op arbeidsinschakeling zoals bedoeld in artikel 7, lid 1,
      onder a, van de Participatiewet.2. Ter vervulling van het in lid 1 genoemde
      doel voert Promen, de volgende taken uit:a. vervallenb. het instellen en in
      stand houden van een uitvoeringsorganisatie belast met de gemeentelijke taken,
      genoemd in de Wet sociale werkvoorziening;c. het ontwikkelen en aanbieden van
      voorzieningen gericht op arbeidsinschakeling, zoals bedoeld in lid 1, van dit
      artikel.3. Aan Promen zijn alle taken en bevoegdheden overgedragen die de Wet
      sociale werkvoorziening oplegt c.q. toekent aan de deelnemende gemeenten.4.
      Aan Promen zijn bevoegdheden van regeling en bestuur toegekend binnen de grens
      van artikel 30 van de Wet gemeenschappelijke regelingen.5. Aan Promen is, ten
      behoeve van de in het eerste lid genoemde doelstelling, de bevoegdheid toegekend
      een of meer rechtspersonen op te richten en/of deel te nemen in een of meer
      bestaande dan wel te vormen rechtspersonen.6. vervallen7. De deelnemende colleges
      rekenen het tot hun taak om waar mogelijk opdrachtgever te zijn van daartoe
      geëigende werkzaamheden ten behoeve van de werknemers van Promen.
