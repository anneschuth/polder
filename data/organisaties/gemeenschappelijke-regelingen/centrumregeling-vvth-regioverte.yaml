  doel: De gemeente Voerendaal en de gemeente Heerlen ter stimulering van de kwaliteit
    en vergroting van de robuustheid de samenwerking wensen op te zoeken bij de uitoefening
    van de taken op het vlak van Veiligheid, Vergunningverlening, Toezicht en Handhaving.
