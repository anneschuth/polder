  bevoegdheden:
  - kop_artikel: Artikel 4 – Bevoegdheden
    inhoud_artikel: 1. De centrumgemeente levert personele ondersteuning op de volgende
      gebieden:a. Veiligheidb. Vergunningverleningc. Toezichtd. Handhaving2. Ter uitvoering
      van de in het eerste lid opgenomen taken wordt een dienstverleningsovereen-komst
      afgesloten tussen de centrumgemeente en de partnergemeente, waarin de invulling
      van de taken nader wordt overeengekomen.3. De dienstverleningsovereenkomst kan
      in overleg tussen de centrumgemeente en de partnergemeente worden gewijzigd
      of beëindigd.4. De bevoegdheden die nodig zijn voor de uitoefening van de in
      het eerste lid bedoelde taken worden bij mandaatbesluit door het college en
      de burgemeester van de partnergemeente opgedragen aan het college en de burgemeester
      van de centrumgemeente.5. Het college van de centrumgemeente aanvaardt het mandaat
      en de daarbij gegeven aanwijzingen.6. Het college en de burgemeester van de
      centrumgemeente verlenen ondermandaat overeenkomstig het algemeen mandaatbesluit
      van de centrumgemeente.7. Het vierde, vijfde en zesde lid zijn van overeenkomstige
      toepassing op het verlenen van een volmacht tot het verrichten van privaatrechtelijke
      rechtshandelingen of het verlenen van een machtiging voor het verrichten van
      feitelijke handelingen.
