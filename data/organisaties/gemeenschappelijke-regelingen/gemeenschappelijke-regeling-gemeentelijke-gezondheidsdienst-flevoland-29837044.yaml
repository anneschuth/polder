  bevoegdheden:
  - kop_artikel: Artikel 9 Algemene bevoegdheidstoedeling
    inhoud_artikel: 1. Het algemeen bestuur kan bevoegdheden overdragen aan het dagelijks
      bestuur als dat in voorkomende gevallen noodzakelijk is om slagvaardig op te
      kunnen treden.2. Het dagelijks bestuur kan de uitoefening van zijn bevoegdheden
      voor zover als mogelijk in mandaat verlenen aan de dPG.3. In de door het dagelijks
      bestuur vast te stellen organisatieverordening, zoals bedoeld in artikel 17,
      worden de taken beschreven van de dPG en de wijze waarop het dagelijks bestuur
      toeziet op de uitvoering daarvan.4. Het algemeen bestuur besluit tot de oprichting
      van en de deelneming in stichtingen, maatschappen, vennootschappen, verenigingen,
      coöperaties en onderlinge waarborgmaatschappijen, indien dat in het bijzonder
      aangewezen moet worden geacht voor de behartiging van het daarmee te dienen
      openbaar belang. Het besluit wordt niet genomen dan nadat de raden van de gemeenten
      een ontwerp-besluit is toegezonden en in de gelegenheid zijn gesteld hun wensen
      en bedenkingen ter kennis van het algemeen bestuur te brengen.
