gr_meta:
  citeertitel: Gemeenschappelijke regeling Metropoolregio Eindhoven 2015
  doel: Het doel van de samenwerking binnen de Metropoolregio Eindhoven is het handhaven
    en uitbouwen van het kenmerkende economische profiel van de regio, om op die manier
    het vestigings- en verblijfsklimaat voor onze inwoners en bedrijven te stimuleren.De
    Metropoolregio Eindhoven werkt aan concrete en urgente opgaven binnen de thema's
    Economie, Mobiliteit, Energietransitie en Transitie Landelijk Gebied.
