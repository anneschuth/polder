  bevoegdheden:
  - inhoud_artikel: Zie artikel 5 van de Gemeenschappelijke Regeling (wijziging november
      2017).Op 27 maart 2019 heeft het Algemeen Bestuur het Samenwerkingsakkoord 2019-2022
      en Statuut Overlegorganen 2019 vastgesteld. Afspraken zijn gemaakt over een
      nieuwe manier van werken. De Metropoolregio Eindhoven doet hiermee tot en met
      2020 ervaring op en stelt op basis daarvan een gewijzigde Gemeenschappelijke
      Regeling vast.
