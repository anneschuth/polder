  bevoegdheden:
  - kop_artikel: Artikel 4. Taken en bevoegdheden
    inhoud_artikel: 1. Ter verwezenlijking van de in artikel 3, tweede lid, genoemde
      te behartigen belangen worden aan het Plassenschap de volgende taken en bevoegdheden
      toegekend:a. het aanleggen, onderhouden en eventueel exploiteren van recreatieve
      voorzieningen en het uitvoeren van andere werken verband houdend met het te
      behartigen belang;b. het instandhouden en verbeteren van het natuur- en landschapsschoon
      voor zover samenhangend met de recreatiekwaliteit;c. het vaststellen van algemeen
      verbindende voorschriften, al dan niet door strafbepalingen of bestuursdwang
      te handhaven, die de belangen van de recreatie, bescherming van natuur en landschap
      of het nautisch beheer van het openbaar water betreffen;d. de taken en bevoegdheden
      die ingevolge de Scheepvaartverkeerswet en de daarbij behorende uitvoeringsbesluiten
      zijn toegekend aan het bevoegd gezag;e. het heffen van rechten als bedoeld in
      artikel 229, eerste lid onder a en b, van de Gemeentewet en de rechten waarvan
      heffing krachtens bijzondere wetten geschiedt;f. de gemeentelijke taken en bevoegdheden
      ingevolge de Wet op de openluchtrecreatie en de daarbij behorende uitvoeringsbesluiten,
      voor de terreinen die eigendom zijn van het Plassenschap;g. de gemeentelijke
      bevoegdheid ingevolge artikel 430a van het Wetboek van Strafrecht;h. de bevoegdheid
      tot toepassing van bestuursdwang zoals bedoeld in artikel 125 van de Gemeentewet;i.
      het in samenhang met de taken en bevoegdheden genoemd onder a. tot en met h.,
      toepassen van de in de Algemene wet bestuursrecht en in andere relevante regelgeving
      opgenomen procedures.2. De besturen van de deelnemende gemeenten zijn niet langer
      bevoegd gebruik te maken van de door haar ingevolge het eerste lid overgedragen
      bevoegdheden.3. Binnen het kader van de in artikel 3, tweede lid, omschreven
      te behartigen belangen kunnen de aan het Plassenschap toekomende taken en bevoegdheden
      worden uitgebreid dan wel beperkt bij gelijkluidend besluit van alle deelnemers,
      zonder dat daartoe wijziging van deze regeling noodzakelijk is. De deelnemers
      dragen op de gebruikelijke wijze zorg voor de bekendmaking van dat besluit.4.
      Het Plassenschap is bevoegd om met andere recreatieschappen deel te nemen aan
      een gemeenschappelijke regeling:a. waaraan de coördinatie van de voorbereiding
      en uitvoering van grensoverschrijdend gemeenschappelijk beleid wordt opgedragen;b.
      waarbij het personeel dat voor het Plassenschap werkzaam is, in dienst is.
