  abbr: ODRU
  valid_from: '1900-01-01'
description:
  text: De ODRU werkt aan een veilige, duurzame en gezonde fysieke leefomgeving. We
    ondersteunen en adviseren inwoners en bedrijven op het gebied van milieuvergunningen
    en zijn gespecialiseerd in milieutoezicht en -handhaving als het gaat om veiligheid,
    lucht, geluid, energie, afval en bodem.
  url: https://www.odru.nl/over-ons/wat-doen-wij/
