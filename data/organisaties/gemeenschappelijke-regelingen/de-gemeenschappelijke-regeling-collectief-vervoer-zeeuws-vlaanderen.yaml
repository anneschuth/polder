  citeertitel: De gemeenschappelijke regeling Collectief Vervoer Zeeuws-Vlaanderen
  doel: Het openbaar lichaam is ingesteld om de gezamenlijke belangen van de deelnemers
    te behartigen op het gebied van met bovenstaande wet- en regelgeving.Zij heeft
    ten doel om een collectief vraagafhankelijk openbaar vervoersysteem tot stand
    te (doen) brengen en in stand te (doen) houden en daarmede het belang van goed
    (openbaar) personenvervoer te behartigen.)
