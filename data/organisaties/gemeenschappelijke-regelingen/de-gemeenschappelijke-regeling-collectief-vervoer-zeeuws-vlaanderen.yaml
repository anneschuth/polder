  bevoegdheden:
  - kop_artikel: 'Artikel 6: Taken en bevoegdheden'
    inhoud_artikel: Het openbaar lichaam treedt op als opdrachtgever voor de realisering
      van het collectief vraagafhankelijk vervoer en voor - door de deelnemers - aan
      te wijzen categorieën van personen binnen het vervoersgebied, waarbij voor deze
      doelgroepen een zo effectief, efficiënt uniform mogelijk vervoersaanbod wordt
      nagestreefd.Tot deze categorie behoren in ieder geval de mensen met een beperking,
      die ingevolge de Wet Maatschappelijke ondersteuning ter voorziening van hun
      vervoersbehoeften door de gemeenten in aanmerking zijn gebracht voor collectief
      vervoer.De door de deelnemers aan te wijzen categorieën personen worden ten
      laste van de deelnemers die deze aanwijst vervoerd.Het openbaar lichaam draagt
      verantwoordelijkheid voor alle bevoegdheden die voortvloeien uit het optreden
      als opdrachtgever.
