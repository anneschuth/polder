  bevoegdheden:
  - kop_artikel: Artikel 4 Bevoegdheden/taken
    inhoud_artikel: 1. Aan het bestuur van het openbaar lichaam worden de bevoegdheden
      die de deelnemers hebben op grond van de hierna genoemde wetten dan wel wetsartikelen
      gedelegeerd:a. Participatiewet;b. Wet inkomensvoorziening oudere en gedeeltelijk
      arbeidsongeschikte werkloze werknemers;c. Wet inkomensvoorziening oudere en
      gedeeltelijk arbeidsongeschikte gewezen zelfstandigen;d. Wet gemeentelijke schuldhulpverlening
      en artikel 1:432a BW;e. Artikel 1.13 Wet kinderopvang en kwaliteitseisen peuterspeelzalen;f.
      Vervalleng. Vervallenh. Verordening maatschappelijke Participatie Kinderen MVS;i.
      Vervallenj. Vervallenk. Vervallenl. Wet Inburgering 2021m. Wet sociale werkvoorziening.2.  De
      deelnemer kan bij afzonderlijk besluit, en met inachtneming van artikel 3 van
      deze regeling, afzonderlijk bevoegdheden aan het bestuur van het openbaar lichaam
      gemandateerd.3.  Aan het afzonderlijke mandaat moet vooraf toestemming door
      het dagelijks bestuur worden verleend.4. De niet mandaterende deelnemer wordt
      over het afzonderlijke mandaat geïnformeerd.5. Vervallen6. Vervallen7. Het bestuur
      van het openbaar lichaam is eveneens gemachtigd de krachtens voornoemde wetten
      vastgestelde verordeningen en regels uit te voeren.8. Alle opvolgende en in
      de plaats tredende wet- en regelgeving waarbij de inhoud van de in dit artikel
      genoemde bevoegdheden niet wijzigt, is van overeenkomstige toepassing.9. Besluiten
      van het bestuur van het openbaar lichaam zijn niet vatbaar voor het geven van
      zienswijzen door de raden van de deelnemende gemeenten, met uitzondering van
      besluiten tot het vaststellen of wijzigen van de begroting als bedoeld in artikel
      35 Wet gemeenschappelijke regelingen en besluiten als bedoeld in afdeling 3.4
      van de Algemene wet bestuursrecht.
