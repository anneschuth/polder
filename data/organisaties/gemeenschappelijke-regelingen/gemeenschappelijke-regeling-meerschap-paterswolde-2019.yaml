  bevoegdheden:
  - kop_artikel: Artikel 2
    inhoud_artikel: 1. Het lichaam heeft binnen zijn gebied ten doel de behartiging
      van de recreatie, de natuurbescherming en de landschapsverzorging, waaronder
      begrepen het beheer van het (openbaar) water, voor zover dat bij de deelnemers
      berustte.2. Iedere deelnemer kan, na instemming van het algemeen bestuur, aan
      het lichaam taken overdragen die in overeenstemming zijn met het doel van het
      lichaam.3. Een deelnemer draagt aan het lichaam de bevoegdheden over die nodig
      zijn voor de uitvoering van de door die deelnemer aan het lichaam overgedragen
      taken, daaronder begrepen de bevoegdheid tot het in verband met de aan het lichaam
      overgedragen taken betreffende het opleggen en/of heffen van belastingen, heffingen
      en/of retributies.
