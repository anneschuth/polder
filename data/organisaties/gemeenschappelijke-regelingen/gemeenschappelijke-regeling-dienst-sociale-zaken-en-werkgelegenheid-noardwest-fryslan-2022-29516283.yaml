  bevoegdheden:
  - kop_artikel: 'Artikel 4: Taken en bevoegdheden'
    inhoud_artikel: 1. Ter uitvoering van het in artikel 3 van de regeling genoemde
      belang, dragen de colleges aan het bestuur alle taken over die aan de colleges
      toekomen op grond van de wetten.2. In afwijking van lid 1 behoren het vaststellen
      en evalueren van beleid op basis van de wetten niet tot de overgedragen taken.3.
      De colleges doen mededeling aan het bestuur van alle relevante informatie die
      voor de uitvoering van dit artikel van belang is.4. De Dienst zal de uitvoering
      van de in de vorige leden van dit artikel omschreven taken zoveel als mogelijk
      verrichten met andere instanties die (mede) belast zijn met de uitvoering van
      de wet- en regelgeving op de terreinen van de sociale zekerheid, maatschappelijke
      zorg en gesubsidieerde arbeid.5. Een college kan bij afzonderlijk delegatiebesluit
      andere bevoegdheden overdragen aan het bestuur van De Dienst, tenzij de wet
      of de aard van de bevoegdheid zich tegen die overdracht verzet.6. Het college
      neemt het delegatiebesluit, bedoeld in het vijfde lid, niet dan nadat het de
      raad van de betreffende gemeente in de gelegenheid heeft gesteld zijn wensen
      en bedenkingen aan het college bekend te maken. De gemeenteraad heeft acht weken
      de tijd om zijn wensen en bedenkingen aan het college kenbaar te maken. De termijn
      loopt vanaf de dag nadat het college het ontwerpbesluit aan de raad aanbiedt.
      In spoedeisende gevallen kan dit lid buiten toepassing worden gelaten. De raden
      worden zo spoedig mogelijk over het delegatiebesluit in kennis gesteld.7. Het
      delegatiebesluit, bedoeld in het vijfde lid, wordt overeenkomstig artikel 3:42
      van de Algemene wet bestuursrecht en artikel 6 Bekendmakingswet bekendgemaakt
      en onverwijld toegezonden aan het bestuur van De Dienst.8. Het bepaalde in het
      vijfde tot en met het zevende lid is van overeenkomstige toepassing op de intrekking
      of wijziging van het delegatiebesluit, bedoeld in het vijfde lid, onverminderd
      het bepaalde in artikel 10:18 van de Algemene wet bestuursrecht.
