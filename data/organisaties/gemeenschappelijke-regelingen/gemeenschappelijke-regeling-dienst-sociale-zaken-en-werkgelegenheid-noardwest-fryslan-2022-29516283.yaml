  doel: De Dienst behartigt de belangen van de colleges met betrekking tot sturing
    en beheersing van ondersteunende processen en uitvoeringstaken op het gebied van
    de wetten, voor zover die zijn opgedragen aan de colleges en voor zover de colleges
    die belangen voor wat betreft ondersteunende processen en uitvoeringstaken hebben
    op- of overgedragen aan de Dienst.
