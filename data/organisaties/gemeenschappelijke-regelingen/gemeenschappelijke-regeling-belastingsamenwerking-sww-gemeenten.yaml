  citeertitel: Gemeenschappelijke regeling Belastingsamenwerking SWW-gemeenten
  doel: De regeling wordt getroffen ter uitvoering van de belangen van de deelnemers
    op het gebied van:a. de heffing en invordering van belastingen;b. de uitvoering
    van de Wet waardering onroerende zaken, waaronder tevens wordt begrepen de administratie
    van vastgoedgegevens en het verstrekken van vastgoedgegevens aan de deelnemers.
