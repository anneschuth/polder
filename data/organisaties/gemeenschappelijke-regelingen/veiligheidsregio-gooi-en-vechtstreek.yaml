description:
  text: In de Veiligheidsregio Gooi en Vechtstreek wordt samengewerkt door de zes
    gemeenten in de regio (Blaricum, Gooise Meren, Hilversum, Huizen, Laren en Wijdemeren),
    de brandweer in de regio, de geneeskundige hulpverleningsorganisatie in de regio
    (GHOR), de politie en het Openbaar Ministerie.
