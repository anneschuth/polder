gr_meta:
  doel: Het orgaan draagt zorg voor de oprichting en instandhouding van de ombudscommissie
    Hoeksche Waard. Deze commissie is belast met de externe beoordeling van verzoekschriften
    als bedoeld in titel 9.2 van de Algemene wet bestuursrecht, voorzover het betreft
    gedragingen van bestuurorganen van de deelnemers.
