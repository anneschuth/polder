gr_meta:
  citeertitel: gemeenschappelijke regeling Omgevingsdienst Rivierenland
  doel: De regeling is getroffen ter gemeenschappelijke behartiging van de belangen
    van de deelnemers ter zake van vergunningverlening, toezicht en handhaving in
    het kader van het omgevingsrecht. Onder de belangen van de deelnemers wordt tevens
    begrepen het belang van een goede samenwerking tussen de omgevingsdiensten in
    Gelderland.
