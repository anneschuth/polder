  bevoegdheden:
  - kop_artikel: Artikel 8. Bevoegdheden
    inhoud_artikel: 1. De deelnemers dragen geen publiekrechtelijke bevoegdheden over
      aan het openbaar lichaam.2. De deelnemers beslissen ieder afzonderlijk over
      de verlening van mandaat, volmacht en machtiging aan het openbaar lichaam.
  - kop_artikel: Artikel 9. Beperking privaatrechtelijke bevoegdheden
    inhoud_artikel: Het openbaar lichaam is behoudens instemming van de deelnemers
      niet bevoegd tot:a. het vestigen van opstal-, pand- en hypotheekrechten;b. het
      afgeven van garanties of andere waarborgen;c. het in erfpacht aannemen of uitgeven
      van roerende of onroerende zaken;d. het in eigendom aannemen of uitgeven van
      onroerende zaken;e. het oprichten van en het deelnemen in een rechtspersoon;f.
      commerciële dienstverlening aan private partijen.
