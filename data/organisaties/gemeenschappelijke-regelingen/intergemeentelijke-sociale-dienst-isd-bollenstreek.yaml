description:
  text: De ISD Bollenstreek staat voor Intergemeentelijke Sociale Dienst Bollenstreek
    en is een samenwerkingsverband van de gemeenten Hillegom, Lisse, Noordwijk en
    Teylingen. Bij ons kunnen de bewoners terecht voor alle vragen op het gebied van
    sociale zekerheid en de Wmo.Ons verzorgingsgebied omvat ongeveer 120.000 inwoners.
    Ruim 1100 mensen ontvangen een uitkering voor hun levensonderhoud. Wij kennen
    ongeveer 9.500 mensen die een Wmo-voorziening ontvangen. Bij de ISD Bollenstreek
    werken ongeveer 125 mensen die dit mogelijk maken.De ISD heeft een afdeling Klant
    Contact Centrum en een Product Centrum. Voor al uw vragen kunt u terecht bij het
    Klant Contact Centrum. Dit kan via de telefoon, per mail, de website en een persoonlijk
    bezoek bij Voor ieder 1 in uw woonplaats. Medewerkers van het Klant Contact Centrum
    behandelen uw vraag direct. Is dit niet mogelijk, dan hoort u binnen welke termijn
    u een reactie kunt verwachten.Vragen of aanvragen die complex zijn of een langere
    verwerkingstijd nodig hebben, worden door de medewerkers van het Klant Contact
    Centrum aan de medewerkers van het Product Centrum overgedragen.De ISD vindt het
    belangrijk dat u goed en snel wordt geholpen. Het Klant Contact Centrum is op
    iedere werkdag bereikbaar. Dit betekent dat u altijd uw vraag kunt stellen aan
    één van de medewerkers.Naast de drie afdelingen is er een managementteam en een
    stafafdeling. Onder de stafafdeling valt beleid en juridische zaken, personeel
    en organisatie, communicatie en secretariële ondersteuning).
