  bevoegdheden:
  - kop_artikel: 'Artikel 34: Bevoegdheden'
    inhoud_artikel: Het bestuur van het samenwerkingsverband is bevoegd tot regeling
      en bestuur ter behartiging van die belangen die aan het samenwerkingsverband
      zijn opgedragen.
  - kop_artikel: 'Artikel 35: Overdracht bevoegdheden'
    inhoud_artikel: 1. Aan het samenwerkingsverband wordt de bevoegdheid tot heffing
      en invordering van de volgende gemeentelijke belastingen overgedragen door de
      colleges van de deelnemende gemeenten, voor zover de deelnemer de betreffende
      belasting kent:a. onroerende-zaakbelasting;b. rioolheffing;c. afvalstoffenheffing;2.
      Het dagelijks bestuur van het Waterschap Aa en Maas draagt aan het samenwerkingsverband
      de bevoegdheid tot heffing en invordering van alle door het algemeen bestuur
      van het Waterschap Aa en Maas op of voor 1 oktober 2009 ingestelde waterschapsbelastingen
      over, voor zover deze waterschapsbelastingen later niet zijn opgeheven.3. De
      colleges van de deelnemende gemeenten dragen aan het samenwerkingsverband over
      de uitvoering van de Wet waardering onroerende zaken.
  - kop_artikel: 'Artikel 36: Additionele overdracht'
    inhoud_artikel: 1. Het college van een deelnemende gemeente kan de bevoegdheid
      tot heffing en invordering van andere gemeentelijke belastingen dan bedoeld
      in artikel 35 overdragen aan het samenwerkingsverband.2. Het algemeen bestuur
      neemt hetgeen op grond van het vorige lid is overgedragen, op in een bijlage
      bij de gemeenschappelijke regeling en zendt deze ter kennisname aan de colleges
      van de deelnemers en aan gedeputeerde staten.
