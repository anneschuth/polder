gr_meta:
  citeertitel: Gemeenschappelijke Regeling BSOB
  doel: In het kader van deze regeling worden de belangen van de deelnemers behartigd,
    elk voor zover het hun grondgebied en hun belangen betreft, op het gebied van:a.
    de heffing en invordering van belastingen, rechten en retributies;b. de uitvoering
    van de Wet waardering onroerende zaken, waaronder mede wordt begrepen de administratie
    van vastgoedgegevens op basis van die wet en het verstrekken van vastgoedgegevens
    aan de deelnemers en derden.
