description:
  text: De Betho is een sociaal werkontwikkelbedrijf in Goes dat zich inzet voor mensen
    met een afstand tot de arbeidsmarkt. Wij geloven in mogelijkheden en begeleiden
    mensen naar passend werk, met als doel een zo regulier mogelijke werkplek buiten
    onze organisatie. Waar dat niet haalbaar is, bieden wij beschutte werkplekken
    binnen De Betho.
