  bevoegdheden:
  - inhoud_artikel: 1. Het openbaar lichaam heeft ten doel het op een bedrijfsmatig
      verantwoorde wijze doen uitvoeren van alle taken van en voor de gemeenten die
      voortvloeien uit de Wsw.2. Ter verwezenlijking van het in het eerste lid vermelde
      doel dragen de colleges van de deelnemende gemeenten hun bevoegdheden tot uitvoering
      van de Wsw, met inachtneming van het bepaalde in artikel 1, lid 2 Wsw, volledig
      over aan het bestuur van het openbaar lichaam, zoals vermeld in artikel 2 van
      deze regeling.3. Aan het openbaar lichaam is, ten behoeve van de in het eerste
      lid genoemde doelstelling, de bevoegdheid toegekend een of meer rechtspersonen
      op te richten en/of deel te nemen in een of meer bestaande rechtspersonen, dan
      wel te vormen rechtspersonen. Artikel 160, tweede en derde lid, van de Gemeentewet
      is van overeenkomstige toepassing.
