  bevoegdheden:
  - kop_artikel: Artikel 6
    inhoud_artikel: 1. Waar in wettelijke regelingen, op grond waarvan de taken in
      artikel 5, eerste lid, aan het openbaar lichaam zijn opgedragen, bevoegdheden
      van regeling en bestuur zijn toegekend aan de gemeente, het college van burgemeester
      en wethouders of de burgemeester, of plichten zijn opgelegd, komen die bevoegdheden
      toe en rusten die plichten op onderscheidenlijk het openbaar lichaam, het dagelijks
      bestuur en de voorzitter, tenzij de wettelijke regelingen of deze regeling anders
      bepalen een en ander behoudens hetgeen bepaald is in artikel 30, eerste lid,
      van de Wet gemeenschappelijke regelingen.2. De directeur Publieke Gezondheid
      is toezichthouder in de zin van artikel 1.61, eerste lid Wet kinderopvang.3.
      De directeur Publieke Gezondheid is bevoegd om namens het college gemeentelijke
      lijkschouwers te benoemen.
