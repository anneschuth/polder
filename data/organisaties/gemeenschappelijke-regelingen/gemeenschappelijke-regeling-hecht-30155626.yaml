  citeertitel: Gemeenschappelijke Regeling Hecht
  doel: Het openbaar lichaam heeft ten doel de belangen te behartigen van de aan de
    regeling deelnemende gemeenten op het terrein van de openbare gezondheidszorg,
    de volksgezondheid, kwetsbare inwoners op het grensvlak van zorg en veiligheid
    en de ambulancezorg.
