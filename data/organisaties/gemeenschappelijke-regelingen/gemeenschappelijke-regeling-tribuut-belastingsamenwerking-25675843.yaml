  bevoegdheden:
  - inhoud_artikel: Artikel 4 AdviseringDe bedrijfsvoeringsorganisatie adviseert de
      deelnemers over de voorbereiding en de opstelling van belastingbeleid en belastingverordeningen,
      waarvan de heffing en invordering bij of krachtens deze regeling is overgedragen
      aan de bedrijfsvoeringsorganisatie.Artikel 5 Overdracht bevoegdheden1. De deelnemers
      dragen aan de bedrijfsvoeringsorganisatie en haarbestuur de bevoegdheden over
      die nodig zijn voor de uitvoering van de werkzaamheden met betrekking tot de
      belangen genoemd in artikel 3.2. De werkzaamheden worden nader omschreven in
      dienstverleningsovereenkomsten.3. De Gemeentewet is in voorkomende gevallen
      van overeenkomstige toepassing, tenzij dit uitdrukkelijk is uitgesloten of hiervan
      uitdrukkelijk is afgeweken.Artikel 6 Beperking privaatrechtelijke bevoegdhedenDe
      bedrijfsvoeringsorganisatie is behoudens instemming van de deelnemers niet bevoegd
      tot:a. het vestigen van opstal-, pand- en hypotheekrechten;b. het afgeven van
      garanties of andere waarborgen;c. het in erfpacht aannemen of uitgeven van roerende
      of onroerende zaken;d. het in eigendom aannemen of uitgeven van onroerende zaken;e.
      dienstverlening aan private partijen of publieke lichamen anders dan de deelnemers.
