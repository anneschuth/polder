names:
- value: Bedrijfsvoeringsorganisatie doelgroepenvervoer regio Arnhem Nijmegen
  abbr: BVO DRAN
  valid_from: '1900-01-01'
description:
  text: De achttien gemeenten in de regio Arnhem-Nijmegen werken samen aan het regionale
    doelgroepenvervoer. Hiervoor is de Bedrijfsvoeringsorganisatie doelgroepenvervoer
    regio Arnhem-Nijmegen opgericht. Het betreft de gemeenten Arnhem, Berg en Dal,
    Beuningen, Doesburg, Druten, Duiven, Heumen, Lingewaard, Montferland, Mook en
    Middelaar, Nijmegen, Overbetuwe, Renkum, Rheden, Rozendaal, Westervoort, Wijchen
    en Zevenaar.De bedrijfsvoeringsorganisatie brengt de belangen van de deelnemende
    gemeenten samen op het gebied van aanvullend vervoer. Samen werken we aan het
    tot stand brengen, ontwikkelen en in stand houden van een kwalitatief hoogwaardig,
    herkenbaar, efficiënt en eenvoudig te gebruiken vervoersysteem. Dit vervoer rijdt
    per 1 september 2016 onder de naam Avan.In de bedrijfsvoeringsorganisatie sturen
    en beheersen de gemeenten samen de uitvoering en ondersteunende processen voor
    dit aanvullend vervoer.
