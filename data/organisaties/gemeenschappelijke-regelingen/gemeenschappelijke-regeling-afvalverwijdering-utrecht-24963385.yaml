  bevoegdheden:
  - kop_artikel: Artikel 6.
    inhoud_artikel: 1. Binnen het gebied zijn aan de organen van het lichaam in het
      kader van deze regeling opgedragen de verplichtingen en de bevoegdheden die
      zij binnen de grens van de Wet gemeenschappelijke regelingen kunnen hebben.2.
      De organen van de provincie behouden de bevoegdheden die hun zijn toegekend
      in de Afvalstoffenwet. Zij zullen naast hetgeen in een provinciaal afvalstoffenplan
      wordt bepaald evenwel geen aanvullende regelen stellen jegens het openbaar lichaam.
