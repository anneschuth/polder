  doel: '"Deze gemeenschappelijke regeling heeft tot doel op een doelmatige en uit
    oogpunt van milieuhygiëne verantwoorde wijze sturing en uitvoering te geven aan
    het afvalstoffenbeleid in de provincie Utrecht".'
