  citeertitel: Gemeenschappelijke Regeling Sociale Werkvoorziening Drechtwerk
  doel: Het openbaar lichaam behartigt de belangen van de gemeenten op het terreinvan:a.
    het werkgeverschap van de Sw-werknemers en de ambtelijk werknemers diewerkzaam
    zijn in het kader van de uitvoering van de wet.b. Uitvoerende werkzaamheden in
    het kader van de wet, daaronder niet begrepende taken die zijn opgedragen aan
    het openbaar lichaam Drechtsteden.
