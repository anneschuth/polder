  bevoegdheden:
  - kop_artikel: Artikel 11
    inhoud_artikel: 1. Alle taken en bevoegdheden in het kader van deze regeling die
      niet aan het Dagelijks Bestuur, de voorzitter, de secretaris of de algemeen
      directeur zijn opgedragen, berusten bij het Algemeen Bestuur.2. Naast de uitoefening
      van taken en bevoegdheden op grond van het elders in deze regeling bepaalde,
      is het Algemeen Bestuur in elk geval belast met en bevoegd tot:a. het vaststellen
      van de ondernemings- en beleidsplannen;b. het vaststellen en wijzigen van de
      begroting;c. het vaststellen van de jaarrekening;d. het vaststellen van de winstbestemming/verliesdekking;e.
      het opstellen van voorwaarden voor toetreding en uittreding;f. het besluiten
      over toetreding en uittreding van andere gemeenten.
  - kop_artikel: Artikel 17
    inhoud_artikel: Naast de uitoefening van taken en bevoegdheden op grond van het
      elders in deze regeling bepaalde, is het Dagelijks Bestuur in ieder geval belast
      met en bevoegd tot:a. het toezicht op al wat het openbaar lichaam aangaat;b.
      de voorbereiding van al hetgeen in de vergadering van het Algemeen Bestuur ter
      overweging en beslissing moet worden gebracht;c. het uitvoeren van de besluiten
      van het Algemeen Bestuur;d. het toezicht op het beheren van de financiën van
      het openbaar lichaam;e. het toezicht op het beheren van de eigendommen van het
      openbaar lichaam;f. het huren en pachten van onroerende goederen;g. het voorstaan
      van de belangen van het openbaar lichaam bij andere overheden en andere instellingen,
      diensten, personen waarmee contact voor het openbaar lichaam van belang is;h.
      het afkondigen van besluiten waarvan afkondiging bij wet of bij besluit van
      het Algemeen Bestuur is voorgeschreven;i. het geven van ongevraagd ontslag,
      uitgezonderd ontslag wegens het bereiken van de pensioengerechtigde leeftijd,
      aan Sw-werknemers;j. het beslissen op bezwaarschriften en geschillen welke door
      zowel ambtelijke werknemers als Sw-werknemers worden aangedragen. Het Dagelijks
      Bestuur vraagt het advies van een bezwaarschriftencommissie alvorens tot een
      beslissing terzake wordt overgegaan.
