  doel: Het openbaar lichaam behartigt de belangen van de deelnemers op het gebied
    van het uitvoeren van de Wet sociale werkvoorziening, de participatievoorziening
    beschut werk als bedoeld in artikel 10b van de Participatiewet en het plaatsen
    van werkzoekenden, al dan niet met een arbeidsbeperking, bij werkgevers.
