gr_meta:
  citeertitel: GRWRE (Ergon)
  doel: 1. Het openbaar lichaam behartigt de gemeenschappelijke belangen van de deelnemende
    gemeenten op het gebied van de uitvoering van de Wet sociale werkvoorziening en
    de in mandaat gegeven taken op het gebied van de Participatiewet.2. Ter behartiging
    van de belangen op het gebied van de Wet sociale werkvoorziening  dragen de gemeenten
    de taken en bevoegdheden tot de uitvoering van de Wet sociale werkvoorziening  en
    de uit deze wet voortvloeiende uitvoeringsregelingen over aan het bestuur van
    het openbaar lichaam.3. Het openbaar lichaam kan, indien en voor zover daartoe
    wordt besloten door de colleges, ook belangen behartigen op het gebied van de
    uitvoering van wetgeving die op enig moment één of meerdere van de in lid 1 genoemde
    wetten vervangt waarbij dientengevolge de doelgroep kan wijzigen.4. Het openbaar
    lichaam kan, indien en voor zover daartoe door de colleges wordt besloten, ook
    belangen behartigen op het gebied van de uitvoering van andere sociale zekerheidswetten
    dan de in lid 1 genoemde wetten.
