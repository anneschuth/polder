  bevoegdheden:
  - kop_artikel: Artikel 4
    inhoud_artikel: 2. Ter behartiging van de belangen op het gebied van de Wsw dragen
      de gemeenten de taken en bevoegdheden tot de uitvoering van de Wsw en de uit
      deze wet voortvloeiende uitvoeringsregelingen over aan het bestuur van het openbaar
      lichaam.3. Het openbaar lichaam kan, indien en voor zover daartoe wordt besloten
      door de colleges, ook belangen behartigen op het gebied van de uitvoering van
      wetgeving die op enig moment één of meerdere van de in lid 1 genoemde wetten
      vervangt waarbij dientengevolge de doelgroep kan wijzigen.4. Het openbaar lichaam
      kan, indien en voor zover daartoe door de colleges wordt besloten, ook belangen
      behartigen op het gebied van de uitvoering van andere sociale zekerheidswetten
      dan de in lid 1 genoemde wetten.5. De werkzaamheden die niet voor alle deelnemende
      gemeenten worden verricht, worden door middel van schriftelijk vastgelegde afspraken
      door het openbaar lichaam uitgevoerd. Deze afspraken bevatten in elk geval een
      duidelijke omschrijving van de werkzaamheden, de prestatieafspraken en de overeengekomen
      prijs.6. Voor zover aan de orde, zorgen de gemeenten voor toereikende mandaten,
      volmachten en machtigingen die Ergon nodig heeft voor de uitoefening van zijn
      taken.
