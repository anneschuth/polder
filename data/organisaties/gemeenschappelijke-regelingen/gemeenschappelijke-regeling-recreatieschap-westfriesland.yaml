  bevoegdheden:
  - kop_artikel: Artikel 4
    inhoud_artikel: Aan het algemeen bestuur van het Lichaam worden toegekend de bevoegdheden,
      zowel van regeling als van bestuur, die de wet aan de bestuursorganen van de
      deelnemende gemeente toekent met betrekking tot de in artikel 3 genoemde taken,
      met inbegrip van:1. de bevoegdheid om in overleg met de deelnemende gemeenten
      verordeningen vast te stellen, door strafbepalingen en/of bestuursdwang te handhaven;2.
      de bevoegdheid verordeningen vast te stellen tot heffing van rechten als bedoeld
      in artikel 228 en 229 van de Gemeentewet.
