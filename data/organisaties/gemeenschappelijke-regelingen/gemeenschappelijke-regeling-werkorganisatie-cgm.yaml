  citeertitel: Gemeenschappelijke regeling werkorganisatie CGM
  doel: 1. Het belang van de regeling is het bewerkstelligen van een kwalitatief hoogwaardige-
    en een doelmatige uitvoering door de Werkorganisatie CGM van de door de deelnemende
    gemeenten aan de Werkorganisatie CGM opgedragen taken.2. De Werkorganisatie CGM
    heeft een missie en een visie. Deze zijn opgenomen in het Bedrijfsplan CGM.
