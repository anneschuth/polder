description:
  text: Recreatieschap Twiske-Waterland is de bestuurlijke organisatie die verantwoordelijk
    is voor de ontwikkeling en het beheer van het prachtige Twiske. In opdracht van
    het Recreatieschap Twiske-Waterland wordt recreatiegebied Het Twiske beheerd door
    Recreatie Noord-Holland. Centraal hierbij staat dat alle bezoekers van het recreatiegebied
    naar hartenlust van de bijzondere omgeving kunnen genieten.
  url: https://www.twiske-waterland.nl/over/over-de-organisatie
