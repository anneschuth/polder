gr_meta:
  citeertitel: Gemeenschappelijke regeling Aqualysis
  doel: De regeling wordt getroffen ter gemeenschappelijke uitvoering van de laboratoriumactiviteiten
    van de waterschappen ter ondersteuning bij de uitoefening door de waterschappen
    van de taken en bevoegdheden die bij of krachtens de wet aan hen zijn toegekend.
    Aqualysis kan, binnen zijn taken, daarbij als aankoopcentrale voor de waterschappen
    fungeren.
