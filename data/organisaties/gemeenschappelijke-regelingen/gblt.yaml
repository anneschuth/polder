description:
  text: 'U kunt bij GBLT terecht met al uw vragen over gemeente- en waterschapsbelastingenGBLT
    wil inwoners, bedrijven en eigenaren zo goed mogelijk helpen met de belastingen.
    Wij willen belasting regelen zo makkelijk mogelijk maken. Hierbij hebben wij oog
    voor uw situatie. Wij vragen om de meningen van inwoners, bedrijven en eigenaren
    om nog beter te kunnen werken.In 2011 is GBLT ontstaan als een belastingsamenwerking.
    GBLT regelt de belastingen voor een aantal organisaties. Wij werken samen met
    zeven gemeenten en vijf waterschappen. Het gaat om de zeven gemeenten: Zwolle,
    Bunschoten, Leusden, Nijkerk, Dronten, Dalfsen en Ommen, vijf waterschappen: Drents
    Overijsselse Delta, Rijn en IJssel, Vechtstromen, Vallei en Veluwe en Zuiderzeeland.GBLT
    regelt de belastingen voor deze waterschappen en gemeentenWij bedoelen met het
    regelen van belastingen:Ervoor zorgen dat eigenaren, inwoners en bedrijven aanslagbiljetten
    ontvangen. Het hangt af van uw situatie welke belastingen er op uw aanslagbiljet
    staan;Bijhouden wie er betaalt. Wij helpen u bij problemen met betalen. Wij denken
    mee in oplossingen. Zoals kwijtschelding, een betalingsregeling of schuldhulp;Vaststellen
    van de WOZ-waarde voor de zeven gemeenten. Bent u het niet eens met de WOZ-waarde?
    U kunt bij ons gratis bezwaar maken;Beantwoorden van vragen, het beoordelen van
    aanvragen kwijtschelding en het beoordelen van bezwaren.U krijgt ieder jaar een
    belastingaanslag van GBLTU kiest zelf hoe u betaalt. U betaalt in een keer of
    in delen. Heeft u een laag inkomen? Dan kunt u kwijtschelding aanvragen. Bij kwijtschelding
    kijken wij of u minder hoeft te betalen. Bezit u een pand in de gemeenten Zwolle,
    Bunschoten, Leusden, Nijkerk, Dronten en Dalfsen? Dan krijgt u ook het taxatieverslag
    over de WOZ-waarde van uw pand. Het taxatieverslag staat in Mijn Loket.Het verschilt
    per jaar wanneer u uw belastingaanslag krijgtUw waterschap zorgt dat u droge voeten
    houdt en schoon water. Bijvoorbeeld door onderhoud aan de dijken en het schoonmaken
    van rioolwater. Uw gemeente helpt met voorzieningen voor mensen en bedrijven.
    Bijvoorbeeld door onderhoud aan stoep en wegdek. Of door hulp aan kwetsbare inwoners
    met een laag inkomen en ouderen.'
