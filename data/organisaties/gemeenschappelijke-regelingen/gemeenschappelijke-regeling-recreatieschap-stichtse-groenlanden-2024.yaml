gr_meta:
  citeertitel: Gemeenschappelijke regeling recreatieschap Stichtse Groenlanden 2024
  doel: Deze regeling is getroffen ter behartiging van het belang van de deelnemers
    bij de uitvoering van de intergemeentelijke recreatie en de bescherming van de
    natuur en het landschap. Met betrekking tot dit belang worden aan het recreatieschap
    bevoegdheden van regeling en bestuur toegekend die aan de besturen van de deelnemende
    gemeenten toekomen en noodzakelijk zijn voor de uitvoering van de taken als bedoeld
    in artikel 4 van deze regeling.
