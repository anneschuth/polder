  bevoegdheden:
  - kop_artikel: Artikel 7  Taken en bevoegdheden
    inhoud_artikel: 1. Bij de uitoefening van de taken en bevoegdheden van het algemeen
      bestuur vinden de in de Provinciewet gestelde regels zoveel mogelijk overeenkomstige
      toepassing.2. Tot de taken van het algemeen bestuur behoren alle bevoegdheden
      die aan het algemeen bestuur toekomen ingevolge artikel 4 van deze regeling
      en die niet bij of krachtens de bepalingen van deze regeling aan het dagelijks
      bestuur of aan de voorzitter zijn opgedragen.3. Het algemeen bestuur kan voor
      de uitvoering van de taken bedoeld in artikel 4 lid 1 onder a en b één of meerdere
      uitvoeringsorganisatie(s) aanwijzen.4. Indien het algemeen bestuur een besluit
      als bedoeld in artikel 4, lid 1 onder d wenst vast te stellen, te wijzigen of
      in te trekken, legt het een voorstel daartoe met toelichting voor aan de raden
      van de gemeenten en aan provinciale staten. De raden van de gemeenten en provinciale
      staten kunnen binnen 3 maanden na verzending van het voorstel, schriftelijk
      hun oordeel inzake dat voorstel geven. Het algemeen bestuur besluit niet alvorens
      deze termijn verstreken is dan wel het bericht van de raden van alle gemeenten
      en provinciale staten is ontvangen. Deze procedure geldt niet voor algemeen
      verbindende voorschriften of besluiten ter bescherming van werken, inrichtingen
      of eigendommen van het recreatieschap.5. Het dagelijks bestuur draagt zorg voor
      de afkondiging van de algemeen verbindende voorschriften overeenkomstig artikel
      6 van de Bekendmakingswet.6. Deze regeling laat onverlet de bevoegdheid van
      de besturen van de gemeenten algemeen verbindende voorschriften als bedoeld
      in het vierde lid vast te stellen die aanvullende bepalingen bevatten ten aanzien
      van onderwerpen, waarin een algemeen verbindend voorschrift van het recreatieschap
      reeds heeft voorzien, tenzij deze bepalingen in strijd zijn met de door het
      recreatieschap vastgestelde bepalingen.7. Het algemeen bestuur kan een ambtelijke
      klankbordgroep instellen, waarin vertegenwoordigers van de deelnemers kunnen
      participeren. Taak en werkwijze van de ambtelijke klankbordgroep worden geregeld
      in een nader besluit.8. Op voorstel van de raden van de deelnemende gemeenten
      en Provinciale Staten gezamenlijk stelt het algemeen bestuur een gemeenschappelijke
      Raadsadviescommissie, zoals bedoeld in artikel 24a van de Wgr, in die het algemeen
      bestuur van advies kan voorzien, de besluitvorming van de raden van de deelnemende
      gemeenten en Provinciale Staten met betrekking tot de regeling kan voorbereiden
      of de raden en Staten van advies kan voorzien.9. Het algemeen bestuur regelt
      de bevoegdheden, de taken en werkwijze van de commissie zoals bedoeld in het
      achtste lid, nadat het de raden en Provinciale Staten van de deelnemende gemeenten
      in de gelegenheid heeft gesteld hun wensen en bedenkingen hieromtrent ter kennis
      van het algemeen bestuur te brengen.
