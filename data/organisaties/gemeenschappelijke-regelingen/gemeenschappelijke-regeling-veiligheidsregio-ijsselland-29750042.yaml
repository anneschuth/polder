  bevoegdheden:
  - kop_artikel: Artikel 6 Wettelijke taken en bevoegdheden
    inhoud_artikel: Ter behartiging van de in artikel 4 bedoelde belangen bezitten
      de bestuursorganen van de Veiligheidsregio de taken en bevoegdheden, die hen
      op grond van de Wet veiligheidsregio’s, de (Tijdelijke) Wet Ambulancezorg en
      de Wet publieke gezondheid toekomen.
  - kop_artikel: Artikel 7 Andere taken en bevoegdheden
    inhoud_artikel: 1. De bestuursorganen van de Veiligheidsregio zijn bevoegd tota.
      het coördineren, (doen) uitvoeren en ondersteunen van gezamenlijke afspraken
      tussen de deelnemende gemeenten als kolom in het belang van doelmatige en slagvaardige
      hulpverlening en van samenwerking als één organisatie bij rampen en crises.b.
      het nemen van besluiten over activiteiten binnen de kolom gemeenten in de gevallen
      waarin deze kolom optreedt als één organisatie.c. het aanwijzen van toezichthoudende
      ambtenaren indien een gemeente toezichthoudende taken opdraagt met toepassing
      van de volgende leden dit artikel.2. De Veiligheidsregio kan andere taken uitvoeren
      voor een of meer deelnemende gemeenten of voor andere gemeenten.3. De uitvoering
      van taken, opgedragen op grond van lid 2:a. dient de behartiging van de belangen,
      genoemd in artikel 4.b. geschiedt, voor zover niet opgenomen in deze regeling,
      op verzoek van de betreffende gemeente of gemeenten.c. wordt schriftelijk (nader)
      vastgelegd tussen de Veiligheidsregio en de betreffende gemeente of gemeenten.4.
      De schriftelijke afspraken betreffen in ieder geval:a. de diensten of prestaties
      van de Veiligheidsregio;b. de duur en de kosten van de taakuitvoering,c. de
      toewijzing van specifieke bevoegdheden,d. de opzegtermijn van de dienstverleninge.
      de verrekening van eventuele desintegratiekosten. Daarbij geldt als uitgangspunt
      dat de gemeente(n) die de dienstverlening voortijdig beëindigt, de kosten draagt
      die het rechtstreekse gevolg zijn van die beëindiging en dat de overige gemeenten
      geen financieel nadeel daarvan ondervinden.
