gr_meta:
  citeertitel: Gemeenschappelijke regeling Veiligheidsregio IJsselland
  doel: De Veiligheidsregio behartigt de belangen van deelnemende gemeenten op het
    gebied van risicobeheersing, brandweerzorg, geneeskundige hulpverlening, beheersing
    en bestrijding van rampen en crises. Daartoe behoort in het bijzonder ook een
    doelmatige en slagvaardige hulpverlening en samenwerking als één organisatie bij
    rampen en crises mede op basis van een gecoördineerde voorbereiding.
