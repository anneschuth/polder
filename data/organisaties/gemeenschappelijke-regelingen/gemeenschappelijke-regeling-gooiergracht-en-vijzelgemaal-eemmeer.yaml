  - inhoud_artikel: De gemeenten hebben alle bevoegdheden m.b.t. de zorg voor en het
      exploiteren en onderhouden van de Gooiergracht en het vijzelgemaal aan het einde
      van de Gooiergracht overgedragen aan het bestuur van het openbaar lichaam.Het
      algemeen bestuur is bevoegd tot het vaststellen, wijzigen of intrekken van verordeningen
