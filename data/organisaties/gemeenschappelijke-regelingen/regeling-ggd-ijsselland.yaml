gr_meta:
  citeertitel: Regeling GGD IJsselland
  doel: GGD IJsselland is ingesteld voor de gezamenlijke behartiging van de belangen
    van deelnemende gemeenten op met name het terrein van de publieke gezondheidszorg,
    zulks met inachtneming van hetgeen in deze regeling nader is bepaald met betrekking
    tot de taken en bevoegdheden van het samenwerkingsverband.
