  bevoegdheden:
  - kop_artikel: Artikel 5
    inhoud_artikel: Ter behartiging van de in artikel 3 bedoelde belangen heeft het
      samenwerkingsverband, met inachtneming van het bepaalde in artikel 7, de volgende
      taken en specifieke bevoegdheden:1. wettelijke taken en bevoegdheden als GGD:a.
      het instellen en in standhouden van een gezondheidsdienst als bedoeld in de
      artikelen 14, eerste lid, en 15 van de Wet Publieke Gezondheid;b. de taken en
      bevoegdheden, die de Wet Publieke Gezondheid aangeeft voor het bestuur van de
      gezondheidsdienst;c. het houden van toezicht als bedoeld in hoofdstuk 1 afdeling
      4 van de Wet Kinderopvang.2. taken en bevoegdheden in vrijwillige samenwerking:a.  taken
      op het terrein van gemeentelijke overheidszorg, die gemeenten, collectief of
      afzonderlijk, aan het samenwerkingsverband opdragen met inachtneming van het
      bepaalde in artikel 6, leden 2 tot en met 4b. de bevoegdheid tot het aanwijzen
      van een gemeentelijk lijkschouwer als bedoeld in de Wet op de lijkbezorging
      voor de deelnemende gemeenten.
  - kop_artikel: Artikel 6
    inhoud_artikel: 1. GGD IJsselland voert periodiek bestuurlijk overleg met de deelnemende
      gemeenten omtrent de inhoud en het niveau van uitvoering van wettelijke taken,
      genoemd in artikel 5, lid 1. De inhoud en het niveau van de uitvoering van deze
      taken worden een keer per bestuursperiode vastgesteld door het algemeen bestuur
      en jaarlijks geactualiseerd door het dagelijks bestuur.2. De uitvoering van
      taken en bevoegdheden in vrijwillige samenwerking, bedoeld in artikel 5, lid
      2,a dient de behartiging van de belangen, genoemd in artikel 3;b geschiedt op
      verzoek van de betreffende gemeente of gemeenten;c wordt schriftelijk vastgelegd
      tussen GGD IJsselland en de betreffende gemeente of gemeenten.3. GGD IJsselland
      stemt jaarlijks met de betrokken gemeenten de uitvoering af van de taken en
      bevoegdheden in vrijwillige samenwerking genoemd in artikel 5, lid 2.4. Met
      betrekking tot de taken en bevoegdheden in vrijwillige samenwerking, bedoeld
      in de leden 2 en 3, maken GGD IJsselland en de gemeente(n) in ieder geval afspraken
      over:a de duur en de kosten van de taakuitvoering;b de opzegtermijn van de dienstverlening;c
      de verrekening van eventuele desintegratiekosten. Daarbij geldt als uitgangspunt
      dat de gemeente(n) die de dienstverlening voortijdig beëindigt, de kosten draagt
      die het rechtstreekse gevolg zijn van die beëindiging en dat de overige gemeenten
      geen financieel nadeel daarvan ondervinden.
  - kop_artikel: Artikel 7
    inhoud_artikel: 1. In het geval een gemeente bepaalde taken en bevoegdheden, bedoeld
      in artikel 5, lid 1 en 2, niet aan GGD IJsselland heeft opgedragen onthouden
      de leden van het algemeen bestuur van deze gemeente zich van stemming over aangelegenheden
      die de uitoefening van deze taak en bevoegdheid door GGD IJsselland betreffen.2.
      Het in het vorige lid bepaalde is niet langer van toepassing voor een gemeente
      indien uitoefening door GGD IJsselland van de taak en bevoegdheid ingevolge
      enige wet of wettelijk voorschrift wordt voorgeschreven.
