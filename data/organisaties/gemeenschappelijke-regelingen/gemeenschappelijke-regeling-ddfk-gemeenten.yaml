  bevoegdheden:
  - inhoud_artikel: Artikel 5 Algemene bevoegdheidstoedeling1. De daartoe bevoegde
      bestuursorganen van de deelnemende gemeenten zullen in afzonderlijke mandaatbesluiten
      bepalen welke bevoegdheden die samenhangen met de taken zoals vermeld in artikel
      4 van de regeling opgedragen dienen te worden aan de overeenkomstige bestuursorganen
      dan wel aan de directeur van de DDFK-gemeenten.2. Aan het bestuur van de DDFK-gemeenten
      worden geen bevoegdheden overgedragen.3. In afwijking van het tweede lid worden,
      met inachtneming van artikel 232, vierde lid, van de Gemeentewet en artikel
      30, achtste lid van de Wet waardering onroerende zaken, aan het Dagelijks Bestuur
      onderscheidenlijk de ambtenaren, genoemd in artikel 15, alle bevoegdheden tot
      heffing en invordering van gemeentelijke belastingen overgedragen, met inbegrip
      van de uitvoering van de Wet waardering onroerende zaken.Artikel 5a Treffen
      gemeenschappelijke regeling1. Het algemeen bestuur en het dagelijks bestuur
      zijn, ieder voor zover zij bevoegd zijn, bevoegd tot het mede treffen van en
      het deelnemen aan een gemeenschappelijke regeling als bedoeld in artikel 93
      onderscheidenlijk artikel 96 van de wet.2. Het dagelijks bestuur gaat niet over
      tot het treffen van een gemeenschappelijke regeling dan na verkregen toestemming
      van het algemeen bestuur.3. In dit artiikel wordt onder het treffen van een
      gemeenschappelijke regeling tevens verstaan het toetreden tot, uittreden uit
      of wijzigen van een gemeenschappelijke regeling.
