  bevoegdheden:
  - inhoud_artikel: De regeling heeft tot taak de gemeenschappelijke behartiging van
      de belangen van de deelnemende gemeenten op het terrein van de openluchtrecreatie
      en het toerisme in het gebied.De bestuursorganen oefenen binnen de grenzen,
      getrokken in de Gemeentewet, die bevoegdheden van de regeling en bestuur uit
      die zij ter vervulling van hun taak behoeven.Tot die bedoelde bevoegdheden behoren
      niet andere bevoegdheden dan die voortvloeiende uit:- de Gemeentewet;- de Wet
      gemeenschappelijke regelingen;De artikelen 15 en 16 van de Wegenwet, voor wat
      betreft door het recreatieschap aangelegde c.q. aan te leggen dan wel door een
      deelnemende gemeente in beheer en onderhoud aan het recreatieschap overgedragen
      c.q. over te dragen recreatieve fietspaden.
