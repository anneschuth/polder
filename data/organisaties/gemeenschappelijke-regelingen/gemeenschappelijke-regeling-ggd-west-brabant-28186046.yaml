  bevoegdheden:
  - kop_artikel: Artikel 9 Het dagelijks bestuur
    inhoud_artikel: 1. Aan het dagelijks bestuur behoren alle bevoegdheden behalve
      de volgende bevoegdheden van het algemeen bestuur:- het besluiten over toetreding,
      uittreding, wijziging en opheffing, zoals bedoeld in hoofdstuk 7;- het vaststellen
      van de jaarrekening en het vaststellen en/of wijzigen van de begroting en de
      basistaken;- het besluiten tot het oprichten van en deelnemen in stichtingen,
      maatschappen, vennootschappen, verenigingen, coöperaties en onderlinge waarborgmaatschappijen.2.
      Het dagelijks bestuur vergadert tenminste zesmaal per jaar en verder zo dikwijls
      als de voorzitter dit nodig vindt of tenminste drie leden van het dagelijks
      bestuur dit schriftelijk verzoeken, onder opgave van de te behandelen onderwerpen,
      waarna de vergadering binnen veertien dagen plaatsvindt.3. De artikelen 56 en
      58 van de Gemeentewet over de werkwijze bij en het stemmen tijdens de vergaderingen
      zijn van overeenkomstige toepassing. Elk lid heeft in de vergadering van het
      dagelijks bestuur één stem.4. De stemming in het dagelijks bestuur geschiedt
      mondeling, tenzij de voorzitter of één van de leden verzoekt om schriftelijke
      stemming.5. Het dagelijks bestuur kan zijn bevoegdheden binnen nadere voorwaarden
      mandateren aan de directie en houdt daarop toezicht. Een organisatieverordening
      beschrijft de relatie tussen het dagelijks bestuur en de directie.
