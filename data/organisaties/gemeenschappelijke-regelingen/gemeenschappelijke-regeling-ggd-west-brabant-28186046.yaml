  citeertitel: Gemeenschappelijke regeling GGD West-Brabant
  doel: '1. Het doel van deze regeling is: het behartigen van de belangen van de gemeenten
    op het gebied van de publieke gezondheid.2. De gemeenten houden de GGD in stand
    en zo nodig andere vormen van organisatie op het gebied van de publieke gezondheid.'
