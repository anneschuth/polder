  bevoegdheden:
  - kop_artikel: '4'
    inhoud_artikel: Aan Het Flevolands Archief zijn de volgende werkzaamheden, taken
      en bevoegdheden van de deelnemers overgedragen:a. de beheerstaken, te onderscheiden
      in het behouden, bewerken en benutten van de archiefbescheiden en collecties
      die berusten in de in artikel 3, eerste lid, genoemde archiefbewaarplaatsen;b.
      de taken en bevoegdheden, bedoeld in de artikelen 15, tweede en derde lid, 16,
      tweede lid, 19, 28, 29, derde lid, 31 en 32, derde lid, 36, 37, derde lid,4
      van de Archiefwet 1995;c. de bevoegdheid van de Minister om op grond van de
      artikelen 25 en 26, tweede lid, van de Archiefwet 1995 de rijksarchivaris in
      de provincie te benoemen, te schorsen en te ontslaan;d. het adviseren en doen
      van voorstellen aan de deelnemers over de taken en bevoegdheden, die door de
      deelnemers worden uitgevoerd ingevolge de artikelen 5, 6, 7, 8, 12, 13, 27,
      29, tweede lid, 30, 32, tweede lid, 35 en 37, tweede lid van de Archiefwet 1995;e.
      het adviseren aan de provincie, de gemeenten en het waterschap op grond van
      artikel 15, eerste lid van de Archiefwet 1995 inzake het vaststellen van beperkingen
      aan de openbaarheid van over te brengen archiefbescheiden;f. het verrichten
      van door een of meer deelnemers opgedragen andere taken die verband houden met
      de behartiging van de belangen, bedoeld in artikel 3, eerste lid.
