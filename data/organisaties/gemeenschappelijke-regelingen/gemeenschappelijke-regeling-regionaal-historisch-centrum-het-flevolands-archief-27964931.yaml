  citeertitel: Gemeenschappelijke regeling Regionaal Historisch Centrum Het Flevolands
    Archief
  doel: De regeling wordt getroffen met het doel de belangen die de deelnemers hebben
    bij goed beheer van de archiefbescheiden en collecties, die berusten in de rijksarchiefbewaarplaats
    in de provincie, de archiefbewaarplaats van de provincie, de archiefbewaarplaatsen
    van de gemeenten en de archiefbewaarplaats van het waterschap, en alle daarbij
    behorende aangelegenheden in gezamenlijkheid te behartigen.
