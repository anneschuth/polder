gr_meta:
  citeertitel: Senzer
  doel: Deze regeling is getroffen ter behartiging van de sturing en beheersing van
    ondersteunende processen en van uitvoeringstaken van de deelnemende gemeenten.De
    colleges richten een gezamenlijke uitvoeringsorganisatie op in de vorm van een
    openbaar lichaam voor de uitvoering van gemeentelijke taken op het terrein van
    de Participatiewet, de Wsw, de IOAW, de IOAZ, de Wajong, het Bbz 2004 en aanverwante
    wetgeving, dragen tezamen zorg voor de besturing ervan en houden daarbij rekening
    met de bevoegdhedenverdeling over de gemeentelijke organen en de zelfstandigheid
    van ieder van de deelnemende gemeenten.
