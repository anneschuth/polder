  bevoegdheden:
  - kop_artikel: 'Artikel 4: Overdracht bevoegdheden en verplichtingen'
    inhoud_artikel: '1. Ter uitvoering van het in artikel 3 genoemde dragen de deelnemende
      gemeenten hun bevoegdheden en verplichtingen uit de WSW over aan het Instituut.2.
      Uitgangspunt is dat het Instituut te allen tijde verantwoordelijk zal blijven
      voor en belast zal blijven met de uitvoering van de wettelijk opgedragen taken.3.
      Het Instituut gaat, ter verwezenlijking van de in artikel 3 genoemde doelen
      met IW4 Beheer NV een samenwerkingsovereenkomst aan, waar een sociaal/ economisch
      contract deel van uitmaakt, waarin de wederzijdse verantwoordelijkheden, bevoegdheden
      en verplichtingen zijn vastgelegd. Het Instituut wijst daartoe als feitelijk
      met de uitvoering belast orgaan aan: IW4 Beheer NV.'
