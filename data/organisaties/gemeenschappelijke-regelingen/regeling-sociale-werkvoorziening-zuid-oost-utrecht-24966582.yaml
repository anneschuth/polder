  valid_until: '2018-01-01'
gr_meta:
  doel: 1. Het Instituut heeft tot doel het handhaven en vergroten of herstellen van
    de arbeidsgeschikheid van personen die tot arbeid in staan zijn, maar voor wie,
    in belangrijke mate, tengevolge van bij hen gelegen factoren, gelegenheid om onder
    normale omstandigheden arbeid te verrichten niet of nu niet aanwezig zijn.2. Het
    Instituut heeft tevens tot doel het handhaven van en zorgdragen voor voorzieningen
    die sociale activering en een zelfstandige bestaansvoorziening bevorderen van
    in het rechtsgebied als bedoeld in artikel 2 woonachtige langdurig werklozen,
    uitkeringsgerechtigden en jongeren.3. Het Instituut kan de in de leden 1en 2 genoemde
    doelen uitbesteden op contractbasis.
