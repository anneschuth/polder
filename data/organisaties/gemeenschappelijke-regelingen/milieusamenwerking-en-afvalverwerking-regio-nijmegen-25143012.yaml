  bevoegdheden:
  - kop_artikel: 'Artikel 5: Taken en bevoegdheden'
    inhoud_artikel: Ter verwezenlijking van de van de in artikel 4 genoemde belangen
      komen het openbaar lichaam de volgende taken en bevoegdheden toe:1. Afvalverwerking:a.
      Het deelnemen in het aandelenkapitaal van ARN B.V. of haar rechtsopvolger.b.
      Het verwerven, beheren en verhuren van gronden, indien en voor zover nodig voor
      deexploitatie van de verwerkingsinrichting.c. Het in overleg met de gemeenten
      regelen van de aanvoer van de afvalstoffen, voor zover dit uit een oogpunt van
      doeltreffende bedrijfsvoering van de verwerkingsinrichting noodzakelijk is.d.
      Elk van de gemeenten verbindt zich om:1. de door of vanwege die gemeente ingezamelde
      afvalstoffen aan deverwerkingsinrichting aan te bieden van welke verplichting
      door het Algemeen Bestuurontheffing kan worden verleend;2. de wijze van inzamelen
      af te stemmen op de wijze van verwerken van deverwerkingsinrichting;3.  voor
      veranderingen in het inzamelsysteem, tijdig vooraf toestemming te vragen aanhet
      Dagelijks Bestuur waaraan de voorwaarde kan worden verbonden dat de uit dieveranderingen
      voortvloeiende nadelige gevolgen aan het openbaar lichaam of aan deARN B.V.
      worden vergoed.e. het openbaar lichaam sluit met de ARN B.V. een vuilverwerkingsovereenkomst,regelende
      de aanbiedingsplicht van de deelnemende gemeenten van de door of vanwegehen
      opgehaalde afvalstoffen, de acceptatieplicht van de aangeboden afvalstoffen
      door deverwerkingsinrichting en het in rekening brengen van de verwerkingskosten
      door ARN B.V.aan de deelnemende gemeenten.2. ProjectenHet op verzoek en in opdracht
      van de deelnemende gemeenten dan wel een deel van dedeelnemende gemeenten (doen)
      opzetten en (doen) uitvoeren van projecten op hetterrein van het milieu waarbij
      de projecten bekostigd worden door de daaraandeelnemende gemeenten naar rato
      van deelname.
