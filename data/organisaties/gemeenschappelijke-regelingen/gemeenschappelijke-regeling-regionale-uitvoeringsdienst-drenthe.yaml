  bevoegdheden:
  - kop_artikel: Artikel 2 Instelling, doelen beleid
    inhoud_artikel: 1. Er is een openbaar lichaam welke rechtspersoonlijkheid bezit
      als bedoeld in artikel 8, eerste lid van de Wet, genaamd Regionale Uitvoeringsdienst
      Drenthe, verder te noemen de Regionale Uitvoeringsdienst.2. Het openbaar lichaam
      is gevestigd te Assen en wordt aangegaan voor onbepaalde tijd.3. Het openbaar
      lichaam is ingesteld ter behartiging van de individuele en gezamenlijke belangen
      van de deelnemers op het gebied van de uitvoering van taken van toezicht op
      en handhaving van de milieuvoorschriften krachtens de Wet algemene bepalingen
      omgevingsrecht en de overige milieuwet- en regelgeving, alsook voor de uitvoering
      van taken op het gebied van vergunningverlening krachtens deze wet- en regelgeving,
      zoals omschreven in Hoofdstuk 2 van deze regeling.4. Het openbaar lichaam heeft
      de volgende bevoegdheden:a. Het openbaar lichaam heeft de bevoegdheden die het
      van rechtswege bezit om aan het maatschappelijk verkeer deel te nemen, waaronder
      de bevoegdheid om privaatrechtelijke rechtshandelingen te verrichten en de bevoegdheid
      tot het aanstellen van personeel op publiekrechtelijke grondslag;b. Het openbaar
      lichaam is bevoegd tot het op verzoek en ten behoeve van één of meerdere deelnemers
      en/of derden verrichten van diensten.
