  bevoegdheden:
  - kop_artikel: Artikel 4 – Taken en bevoegdheden
    inhoud_artikel: 1. Ter verwezenlijking van de doelstelling van artikel 3, voert
      de centrumgemeente de taken voor de deelnemers uit in de vorm van basistaken
      en plustaken.2. De centrumgemeente voert de volgende basistaken uit voor alle
      deelnemers:a. voorbereiden van de besluitvorming van de deelnemers over het
      vaststellen en herijken van de gezamenlijke strategische koers en ambities van
      de centrumregeling;b. voorbereiden van de besluitvorming van de deelnemers over
      het vaststellen van regionaal energiebeleid;c. monitoren van de voortgang van
      de gestelde doelen, welke door de deelnemers zijn vastgelegd in de onder a en
      b bedoelde beleidsdocumenten;d. opbouwen, bundelen en delen van kennis;e. voeren
      van bovenlokaal accountmanagement met strategische samenwerkingspartners;f.
      voeren van de financiële administratie en verantwoording, waaronder het beheer
      van de algemene reserve;g. opstellen van het werkprogramma voor de centrumregeling.3.
      De centrumgemeente kan ter verwezenlijking van de doelstelling als bedoeld in
      artikel 3 ook plustaken voor twee of meer deelnemers verrichten indien de betreffende
      deelnemers daartoe gezamenlijk besluiten.
