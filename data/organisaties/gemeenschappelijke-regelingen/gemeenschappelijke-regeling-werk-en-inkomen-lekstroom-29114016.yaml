  bevoegdheden:
  - kop_artikel: Artikel 5 Taken en bevoegdheden
    inhoud_artikel: 1.Binnen het belang en de missie van het vorige artikel verricht
      de dienst de daarop gerichte beleids- en uitvoerende taken voor de deelnemende
      gemeenten in het kader van de aan die gemeenten opgedragen of in de toekomst
      op te dragen taken op grond van en krachtensa.de Participatiewet;b.de Wet inkomensvoorziening
      oudere en gedeeltelijk arbeidsongeschikte werkloze werknemers;c.de Wet inkomensvoorziening
      oudere en gedeeltelijk arbeidsongeschikte gewezen zelfstandigen;d.het Besluit
      bijstandverlening zelfstandigen 2004 (incl. artikel 36);e.het minimabeleidf.artikel
      1.13 van de Wet kinderopvang en kwaliteitseisen peuterspeelzalen;g.de Wet gemeentelijke
      schuldhulpverlening inclusief de afgifte van een verklaring als bedoeld in artikel
      285, lid 1 onder f van de Faillissementswet;h.de artikelen 21 en 22 van de Wet
      op de Lijkbezorging2.De dienst is voorts opgedragen de volledige verantwoordelijkheid
      en de uitvoering van taken op grond van en krachtens nieuwe wet- en regelgeving,
      die in de plaats treedt of samenhangt met de in het eerste lid genoemde wetten
      en regelgeving.3.De deelnemende gemeentebesturen dragen hun taken en bevoegdheden
      op grond van de wetten en regelingen bedoeld in het eerste en tweede lid van
      dit artikel over aan het algemeen bestuur van het openbaar lichaam, met uitzondering
      van de taak en de bevoegdheid tot het vaststellen en uitvoeren van een jaarplan
      lokaal werkteam dat onderdeel uitmaakt van de taken en bevoegdheden als bedoeld
      in artikel 7, lid 1 onder a van de Participatiewet.4.De gemeenteraden van Houten
      en Nieuwegein dragen in afwijking van het derde lid geen van hun verordenende
      bevoegdheden over.5.Bij de uitvoering van de bevoegdheid voor het minimabeleid
      en de bijzondere bijstand (uitvoering van artikel 35 van de Participatiewet)
      geldt als randvoorwaarde dat de dienst daarbij het lokaal gemeentelijk beleid
      voor deze dienstverlening uitvoert.6.Voorts is de dienst belast met:a.de taak
      en bevoegdheid om te besluiten op bezwaarschriften die in het kader van de uitgeoefende
      taken worden ingediend;b.de behandeling en afhandeling van klachten op basis
      van de door het algemeen bestuur vast te stellen klachtenregeling.c.de voorbereidende
      werkzaamheden van regelingen die aan het Rijk verantwoord moeten worden ten
      behoeve van rijksinformatie.7.De gemeenten kunnen de dienst belasten met de
      verantwoordelijkheid en de uitvoering van de taken en bevoegdheden op grond
      van andere dan in het eerste lid genoemde wetten en regelingen inzake de sociale
      zekerheid en inzake gemeentelijke sociale zorg voor zover de betreffende wetgeving
      en regelingen daartoe de mogelijkheid bieden.8.De taken zoals genoemd in het
      eerste lid, worden zo veel mogelijk uitgevoerd in samenwerking met betrokken
      gemeenten, het UWV-werkbedrijf en andere organisaties en instanties die belast
      zijn met de uitvoering van taken binnen het sociaal domein of belast zijn met
      de uitvoering van sociale zekerheidswetten.9.De gemeentelijke bestuursorganen
      verlenen hun medewerking aan de uitvoering van besluiten die het bestuur van
      de dienst neemt binnen de aan het bestuur toegekende bevoegdheden.
