  valid_from: '2020-09-01'
gr_meta:
  doel: Deze regeling heeft tot doel de samenwerking tussen de Gemeenten te bevorderen
    met betrekking tot al hetgeen behoort tot de wettelijke taken op het gebied van
    Archeologische Monumentenzorg. Gemeente Delft stelt de faciliteiten en capaciteiten
    van de Afdeling Erfgoed, team Archeologie en Monumenten beschikbaar aan gemeente
    Westland inzake het behoud en de bescherming van het archeologische erfgoed in
    de gemeente Westland.
