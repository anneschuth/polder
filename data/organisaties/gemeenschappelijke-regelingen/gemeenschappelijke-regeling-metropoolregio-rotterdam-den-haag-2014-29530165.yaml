  bevoegdheden:
  - kop_artikel: Artikel 3:3 Bevoegdheidsverdeling
    inhoud_artikel: 1. Aan het algemeen bestuur komen alle bevoegdheden toe, voor
      zover deze niet bij of krachtens de wet of bij of krachtens deze regeling aan
      het dagelijks bestuur of de voorzitter zijn toegekend.2. Het dagelijks bestuur
      is bevoegd tot het voeren van het dagelijks bestuur, tenzij bij of krachtens
      de wet anders bepaald.3. Het algemeen bestuur stelt de bevoegdheid van het dagelijks
      bestuur vast tot het procederen in kort geding, het voegen in strafzaken, het
      spoedheidshalve instellen van bezwaar en beroep, het instellen van incidenteel
      beroep daaronder begrepen, het verzoeken van een voorlopige voorziening en het
      verrichten van (rechts-)handelingen ter voorkoming van verjaring of verlies
      van recht of bezit, en kan aan het dagelijks bestuur bevoegdheden van het algemeen
      bestuur overdragen, tenzij de aard van de bevoegdheid zich daartegen verzet.
      Artikel 156 van de Gemeentewet is van overeenkomstige toepassing.4. De voorzitter
      vertegenwoordigt de Metropoolregio in en buiten rechte.
  - kop_artikel: Artikel 3:4 Bevoegdheden Verkeer en Vervoer
    inhoud_artikel: 1. Het dagelijks bestuur voert de in het Besluit Vervoersregio
      genoemde bevoegdheden uit voor het bij dat besluit bepaalde territoir.2. Aan
      het algemeen bestuur is overgedragen de bevoegdheid een subsidieverordening
      op te stellen in het kader van verkeer en vervoer.
  - kop_artikel: Artikel 3:7 Overige bevoegdheden
    inhoud_artikel: 1. De Metropoolregio komen alle bevoegdheden toe die het openbaar
      lichaam van rechtswege bezit om als rechtspersoon aan het maatschappelijk verkeer
      deel te nemen.2. Voor alle van de in artikel 3:1 genoemde belangen, taken en
      bevoegdheden is de Metropoolregio bevoegd tot:a. het reageren op rijks- en provinciale
      nota’s en plannen die voor het territoir van belang zijn;b. het vertegenwoordigen
      van de Metropoolregio in overlegsituaties, enc. het organiseren van overleg
      en het uitbrengen van advies.
