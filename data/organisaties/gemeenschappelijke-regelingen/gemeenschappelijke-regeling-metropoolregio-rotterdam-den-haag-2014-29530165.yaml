gr_meta:
  citeertitel: Gemeenschappelijke regeling Metropoolregio Rotterdam Den Haag 2014
  doel: In de metropoolregio Rotterdam Den Haag werken 23 gemeenten aan het versterken
    van de economie en het verbeteren van de bereikbaarheid. De gezamenlijke inzet
    is om te zorgen voor een welvarende regio waar mensen prettig kunnen leven. De
    gemeenten werken samen aan zichtbare resultaten en organiseren vitale netwerken
    die bijdragen aan welvaart en welzijn in de metropoolregio. Een goede toekomst
    voor de mensen die hier, nu en in de toekomst, wonen en werken. Daar gaat het
    om.
