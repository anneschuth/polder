  bevoegdheden:
  - kop_artikel: Artikel 7. De werkwijze en taken
    inhoud_artikel: 1. Het algemeen bestuur vergadert overeenkomstig een per jaar
      vast te stellen rooster envoorts zo dikwijls als de voorzitter of één van de
      leden onder opgave van redenen dat schriftelijk vraagt.2. Besluiten worden genomen
      bij unanimiteit van stemmen.3. In de vergadering van het algemeen bestuur heeft
      ieder lid één stem.4. De vergaderingen van het algemeen bestuur worden bijgewoond
      door de algemeendirecteur van het samenwerkingsverband.5. Aan het algemeen bestuur
      worden door de deelnemende gemeentebesturen alleuitvoerende bevoegdheden en
      de daaruit voortvloeiende taken, die op grond van de in artikel 3 genoemde wetten
      en regelgeving aan de deelnemende gemeentebesturen toekomen, overgedragen.6.
      Het algemeen bestuur stelt voor een in de prestatieovereenkomst aangegeven periode
      een prestatieovereenkomst vast waarin prestatieafspraken zijn beschreven die
      het samenwerkingsverband moet leveren.7. Het algemeen bestuur is, met in achtneming
      van het bepaalde in artikel 31a Wgr, bevoegd tot oprichting van en de deelneming
      in stichtingen, maatschappen, vennootschappen, verenigingen, coöperaties en
      onderlinge waarborgmaatschappijen binnen het sociaal domein.8. Alle bevoegdheden
      die niet bij of krachtens de wet of de regeling aan het dagelijks bestuur of
      de voorzitter zijn opgedragen, berusten bij het algemeen bestuur.9. Het algemeen
      bestuur is bevoegd regelingen vast te stellen omtrent de eigen organisatie en
      bedrijfsvoering.10. Het algemeen bestuur kan aan het dagelijks bestuur bevoegdheden
      van het algemeenbestuur overdragen, tenzij de aard van de bevoegdheid zich tegen
      overdracht verzet.
