  bevoegdheden:
  - kop_artikel: Artikel 5 Taken en bevoegdheden
    inhoud_artikel: 1. Bij deze regeling worden de taken en bevoegdheden conform artikel
      10 van de wet aan het algemeen bestuur overgedragen.2. Conform artikel 14 van
      de Wet publieke gezondheid wordt aan het algemeen bestuur overgedragen het instellen
      en in stand houden van de gemeentelijke gezondheidsdienst.3. Bij deze regeling
      worden de taken als bedoeld in artikel 5, tweede lid, onder a tot en met d van
      de Wet publieke gezondheid aan het algemeen bestuur overgedragen.4. Conform
      artikel 4 van de Wet op de lijkbezorging wordt aan het algemeen bestuur overgedragen
      het verschaffen van de mogelijkheid tot het doen schouwen van lijken.5. Eveneens
      zijn de navolgende taken door de gemeenten aan het algemeen bestuur opgedragen:a.
      opzetten en beheren van gemeenschappelijke pools (expertteams) van ambtenaren
      voor met name benoemde functies ten behoeve van de lokale uitvoering van de
      gemeentelijke processen;b. (doen) opstellen en bijhouden van de geregionaliseerde
      draaiboeken voor de gemeentelijke processen;c. aanbieden van een opleidings-
      en oefenprogramma en het registreren van de geoefendheid van de ambtenaren die
      in de onder sub. a genoemde pools zijn participeren.
  - inhoud_artikel: ToelichtingIn artikel 10 zijn de volgende taken en bevoegdheden
      opgenomen:.a. het inventariseren van risico’s van branden, rampen en crises;b.
      het adviseren van het bevoegd gezag over risico’s van branden, rampen en crises
      in de bij of krachtens de wet aangewezen gevallen alsmede in de gevallen die
      in het beleidsplan zijn bepaald;c. het adviseren van het college van burgemeester
      en wethouders over de taak, bedoeld in artikel 3, eerste lid van de wet;d. het
      voorbereiden op de bestrijding van branden en het organiseren van de rampenbestrijding
      en de crisisbeheersing;e. het instellen en in stand houden van een brandweer;f.
      het instellen en in stand houden van een GHOR;g. het voorzien in de meldkamerfunctie;h.
      het aanschaffen en beheren van gemeenschappelijk materieel;i. het inrichten
      en in stand houden van de informatievoorziening binnen de diensten van de regio
      en tussen deze diensten en de andere diensten en organisaties die betrokken
      zijn bij de onder d,e,f en g genoemde taken.In artikel 25, lid 1 en 2 van de
      wet zijn nog specifieke taken voor de ingestelde brandweer benoemd. Voor de
      GGD zijn nog taken benoemd in de Wet kinderopvang (directeur GGD wordt door
      gemeenten aangewezen als toezichthouder), taken gemandateerd door de Minister
      VWS (vergunningverlening tatoeëren en piercen) en de gemeente Harlingen (sanitaire
      controle schepen) en tenslotte taken WMO (vangnet- en bemoeizorg, coördinatie
      casemanagement scenarioteams en ondersteuning sociale teams)
