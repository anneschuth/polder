gr_meta:
  citeertitel: Gemeenschappelijke regeling Veiligheidsregio Fryslân
  doel: De regio heeft tot doel het behartigen van de gemeenschappelijke belangen
    van de gemeenten opde terreinen van:a. publieke gezondheidszorg;b. brandweerzorg;c.
    geneeskundige hulpverlening bij ongevallen en rampen;d. rampenbestrijding en crisisbeheersing;e.
    het bevorderen van de multidisciplinaire samenwerking en de coördinatie in de
    uitvoering van rampenbestrijding en crisisbeheersing;f. het in stand houden en
    beheren van een gemeenschappelijke meldkamer.g. een platform voor samenwerking
    te zijn voor aan hulpverlening gelieerde diensten, partners dan wel organisaties
    en andere openbare lichamen.
