description:
  text: Mensen gezonde kansen bieden om alles uit hún leven te halen. Dat is de missie
    van GGD Flevoland. Want mensen die zich gezond en veilig voelen, doen actiever
    mee aan het leven. In de samenleving probeert iedereen alles uit het leven te
    halen met de mogelijkheden die ze hebben. Dat maakt hen gelukkiger en zelfredzamer.
    Het ervaren van zelf te kunnen kiezen. De kwaliteit van leven stimuleert hen om
    gezonde keuzes te maken. Lekker in je vel zitten geeft plezier aan je leven!Gezond
    opgroeienHet is belangrijk dat iedereen zo gezond mogelijk opgroeit en leeft.
    Positieve gezondheid is de basis voor het handelen van GGD Flevoland. Gezondheid
    is meer dan niet ziek zijn. De publieke gezondheidszorg is bedoeld om de gezondheid
    van alle inwoners van Flevoland te bewaken, te beschermen en te bevorderen. Ook
    als mensen daar niet altijd om vragen.GGD Flevoland werkt in opdracht van de zes
    gemeenten in Flevoland. De hoofdvestiging van GGD Flevoland bevindt zich Lelystad.
    De aandacht is speciaal gericht op mensen die meer hulp nodig hebben, bijvoorbeeld
    omdat ze kwetsbaar zijn of zorg mijden.PreventiePreventie (voorkomen van) is de
    belangrijkste activiteit van GGD Flevoland. Het is gericht op het helpen bij een
    gezonde leefstijl. In een gezonde omgeving, die meehelpt aan het voorkomen van.
    Als GGD proberen we de gezondheidsverschillen te verkleinen. Gezondheid moet overal
    terugkomen en bij de gemeenten hoog op de agenda staan. Als GGD laten we zien
    wat we doen en onderbouwen dit met data. Dat inzicht delen we met de inwoners
    van Flevoland.Je kunt bij ons terecht voorJeugdgezondheidszorg, zoals advies bij
    kinderziekten en prikken tegen ziekten.Vragen over infectieziekten, zoals hepatitis,
    de ziekte van Lyme en q-koorts.Soatesten en vragen over jouw seksuele gezondheid,
    liefde en seks.Reisvaccinaties en advies bij reizen.Vragen en zorgen over milieu
    en veiligheid in jouw omgeving.Maatschappelijke zorg.
