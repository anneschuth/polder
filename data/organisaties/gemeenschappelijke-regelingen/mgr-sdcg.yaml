description:
  text: De Modulaire Gemeenschappelijke Regeling sociaal domein Centraal Gelderland
    (MGR SDCG) is een samenwerkingsverband van 11 gemeenten op het gebied van het
    sociaal domein. De MGR bestaat uit zes samenwerkingsmodules:- Inkoop Zorg - sociaal
    domein Centraal Gelderland- Regionale Facilitering Zorg- Onderwijszaken (Regionaal
    Bureau Leerlingzaken Midden Gelre - RBL)- Werkgeversservicepunt Midden-Gelderland
    (WSP)- Werkgeverschap SW (WgSW)- Contractmanagement InburgeringstrajectenEen gemeente
    is deelnemer in de MGR en kan op basis daarvan participeren in een programma en
    bijbehorende module. Iedere gemeente bepaalt zelf in welk programma en welke module
    wordt geparticipeerd. De afspraken tussen gemeenten en de MGR worden vastgelegd
    in een dienstverleningsovereenkomst (DVO). De kosten van de MGR worden per module
    begroot en verantwoord. Gemeenten betalen alleen voor de modules waarin zij deelnemen.
  url: https://mgrsdcg.nl/over+de+mgr/algemeen/default.aspx
