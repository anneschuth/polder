  citeertitel: Centrumregeling samenwerking gemalendiensten
  doel: De regeling wordt getroffen om de afspraken vast te leggen die de gemeenten
    hebben gemaakt met het oog op de doelmatige en doeltreffende uitvoering door de
    centrumgemeente voor de gemeenten van de taken op het gebied van de rioolgemalen
    en persleidingen die binnen het beheergebied van de gemeenten zijn gelegen, gelet
    op de gemeentelijke zorgplicht voor de inzameling van het stedelijk afvalwater.
