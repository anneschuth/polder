  bevoegdheden:
  - kop_artikel: Artikel 5 - Bevoegdheden centrumgemeente
    inhoud_artikel: 1. De colleges bewerkstelligen dat daar waar nodig het college
      van de centrumgemeente volmacht en machtiging met de mogelijkheid tot het verlenen
      van ondervolmacht en ondermachtiging wordt verleend om namens de burgemeester
      en het college van elke gastgemeente alle privaatrechtelijke rechtshandelingen,
      en feitelijke handelingen te verrichten ter uitvoering van de taken, genoemd
      in artikel 4.2. Ten aanzien van de bevoegdheden die op basis van dit artikel
      in volmacht en machtiging worden opgedragen aan het college van de centrumgemeente,
      kan dit college ondervolmacht of -machtiging verlenen aan medewerkers van de
      centrumgemeente. Het college van de centrumgemeente informeert de colleges van
      de gastgemeenten daarover.
