  bevoegdheden:
  - kop_artikel: Artikel 4 Taken en bevoegdheden
    inhoud_artikel: 1. Ten behoeve van de in artikel 3 genoemde doelstelling verricht
      de Samenwerking De Liemers voor de gemeenten beleidsvoorbereidende en uitvoerende
      taken met betrekking tot de volgende taakvelden:a. RSD;b. RID;c. Inkoopsamenwerking;d.
      uitoefening van overige door de gemeenten overgedragen taken aan Samenwerking
      DeLiemers.2. De colleges delegeren c.q. mandateren de bevoegdheden van regeling
      van de organisatie, bestuur en de bevoegdheid te besluiten tot privaatrechtelijke
      rechtshandelingen met betrekking tot de in artikel 4, lid 1 genoemde taken en
      taakvelden, nader uitgewerkt in bij deze regeling behorende delegatiebesluiten
      en mandatenregeling, aan de bestuursorganen van de Samenwerking De Liemers.3.
      De Samenwerking De Liemers draagt zorg en is verantwoordelijk voor de beleidsvoorbereiding
      van de taken bedoeld onder het eerste en tweede lid en doet daartoe voorstellen
      aan de colleges of als de gemeenteraden de beslissingsbevoegdheid hebben, via
      de colleges aan de gemeenteraden.4. De gemeenten verlenen hun medewerking aan
      de uitvoering van besluiten die de Samenwerking De Liemers neemt in verband
      met de uitoefening van de aan de Samenwerking De Liemers toegekende bevoegdheden.5.
      De Samenwerking De Liemers is voorts belast met de uitvoering van algemene maatregelen
      van bestuur, uitvoeringsregelingen en andere gemeentelijke taken en bevoegdheden
      op het gebied van voornoemde diensten, met de afhandeling van klachten en het
      voeren van verweer in bezwaar- en beroepsprocedures betrekking hebbend op regelingen
      op het gebied van de onder artikel 4, lid 1 genoemde taakvelden.6. De gemeente
      waar geadresseerde van een besluit, waartegen bezwaar wordt gemaakt, woonachtig
      is, behandelt het bezwaarschrift.
