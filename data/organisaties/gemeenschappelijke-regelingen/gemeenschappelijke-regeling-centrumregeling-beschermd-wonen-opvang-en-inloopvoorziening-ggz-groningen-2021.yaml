gr_meta:
  doel: De Centrumregeling wordt aangegaan in het belang van de doelmatigheid en de
    kwaliteit van de uitvoering van (een deel van) de taken en bevoegdheden van de
    Deelnemers op het gebied van beschermd wonen en opvang, alsmede van de Inloopvoorziening
    GGz, voor zover deze taken op grond van artikel 4 aan de Centrumgemeente zijn
    opgedragen.
