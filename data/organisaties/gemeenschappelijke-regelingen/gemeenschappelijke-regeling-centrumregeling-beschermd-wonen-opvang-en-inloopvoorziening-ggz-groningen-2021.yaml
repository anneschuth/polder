  bevoegdheden:
  - kop_artikel: Artikel 5 Bevoegdheden colleges en burgemeesters
    inhoud_artikel: 1. De Colleges verlenen mandaat aan de Centrumgemeente om de bevoegdheden
      uit te oefenen op grond van de Wmo en artikel 160 Gemeentewet voor zover die
      nodig zijn voor de uitvoering van de taken die ingevolge artikel 4 aan de Centrumgemeente
      zijn opgedragen en zolang het besluit als bedoeld in artikel 4 lid 4 niet in
      werking is getreden..2. De Colleges staan toe dat de Centrumgemeente voor de
      gemandateerde bevoegdheden ondermandaat verleent aan haar medewerkers.3. De
      Burgemeesters dragen op grond van artikel 171 lid 2 Gemeentewet de bevoegdheid
      om hun gemeente in en buiten rechte te vertegenwoordigen op aan de Centrumgemeente,
      of een nader door deze aan te wijzen persoon voor zover dit nodig is voor de
      uitvoering van de taken die ingevolge artikel 4 aan de Centrumgemeente zijn
      opgedragen.
