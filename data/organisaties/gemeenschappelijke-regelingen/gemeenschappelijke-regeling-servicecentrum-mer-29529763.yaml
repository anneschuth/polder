  bevoegdheden:
  - kop_artikel: Artikel 4 Taken en bevoegdheden
    inhoud_artikel: 1. Servicecentrum MER ontwikkelt voor de taakvelden Omgevingsdienst
      en Sociaal Domein het uitvoeringsbeleid en verricht op basis daarvan alle uitvoerende
      taken voor de Deelnemende gemeenten.2. Servicecentrum MER ontwikkelt voor het
      taakveld Bedrijfsvoering het inhoudelijk (en uitvoerings) beleid voor de Deelnemende
      gemeenten en verricht op basis daarvan alle uitvoerende taken voor de Deelnemende
      gemeenten.3. De Colleges van de Deelnemende gemeenten mandateren hun taken en
      bevoegdheden met betrekking tot de hiervoor genoemde taakvelden aan de bestuursorganen
      van het openbaar lichaam.4. De Colleges kunnen besluiten nader te bepalen taken
      en bevoegdheden te delegeren aan de bestuursorganen van het openbaar lichaam.5.
      Bij toepassing van het bepaalde in het voorgaande lid dienen de Colleges een
      unaniem besluit te nemen.6. De Colleges kunnen over een voorgenomen delegatiebesluit
      de zienswijze van de Gemeenteraden van de Deelnemende gemeenten vragen.7. De
      Colleges kunnen besluiten andere taken en bevoegdheden, dan die op basis van
      de in art 3 genoemde taakvelden, te mandateren aan de bestuursorganen van het
      openbaar lichaam. Zij kunnen over een dergelijk voorgenomen besluit de zienswijze
      van de Gemeenteraden vragen.8. Voorts is Servicecentrum MER belast met:a. De
      afhandeling van klachten voor zover deze betrekking hebben op Servicecentrum
      MER.b. Het bieden van ondersteuning aan de Colleges bij de behandeling van bezwaar-
      en beroepsschriften en in civiele procedures. De bevoegdheid tot het nemen van
      beslissingen op bezwaar wordt niet gemandateerd en blijft bij de Colleges berusten.9.
      Het Dagelijks Bestuur kan besluiten dat Servicecentrum MER, middels een samenwerkings-overeenkomst
      en onder door het Dagelijks Bestuur te stellen voorwaarden, één van de in het
      eerste lid genoemde taken verricht ten behoeve van andere instanties of van
      buiten het verzorgingsgebied van deze Regeling gelegen gemeenten die daartoe
      een verzoek doen.
