gr_meta:
  citeertitel: Gemeenschappelijke regeling Fijnder
  doel: 1. Deze regeling wordt getroffen om zorg te dragen voor een effectieve en
    efficiënte uitvoering van de aan de colleges opgedragen taken op het gebied van
    participatie, re-integratie, sociale werkvoorziening, werk en inkomen.2. De dienst
    richt zich op maximale ondersteuning, ontwikkeling en zelfredzaamheid van klanten
    op het gebied van arbeid, inkomen en participatie.3. De dienst werkt vanuit de
    bedoeling, is klantgericht, resultaatgericht en levert, in samenwerking met de
    partners, maatwerk.4. De dienst voert de opgedragen taken uit met betrokken, professioneel
    en kwalitatief goed personeel.5. De dienst heeft ambitie en wenst een voortrekkersrol
    te vervullen.
