  bevoegdheden:
  - kop_artikel: Artikel 4 Taken en bevoegdheden
    inhoud_artikel: 1. Het algemeen bestuur van Fijnder heeft als taak zorg te dragen
      voor de uitvoering van de taken van de colleges, als genoemd in de volgende
      wetten en alle regelingen en alle regelgeving op landelijk en gemeentelijk niveau
      waarmee nadere uitwerking wordt gegeven aan deze wetten:a. Participatiewet;b.
      Wet sociale werkvoorziening (Wsw);c. Besluit bijstandsverlening zelfstandigen;d.
      Wet inkomensvoorziening oudere en gedeeltelijk arbeidsongeschikte werkloze werknemers;e.
      Wet inkomensvoorziening oudere en gedeeltelijk arbeidsongeschikte gewezen zelfstandigen.f.
      Gemeentelijke regeling op het gebied van de bijzondere bijstand.g. Wet gemeentelijke
      schuldhulpverlening voor zover het de (ex-) zelfstandige betreft die behoort
      tot de kring van rechthebbenden voor het Besluit bijstandsverlening zelfstandigen
      of de Wet inkomensvoorziening oudere en gedeeltelijk arbeidsongeschikte gewezen
      zelfstandigen.2. Het algemeen bestuur heeft als taak zorg te dragen voor de
      uitvoering ten aanzien van het gemeentelijke minimabeleid. Het opstellen van
      het beleid blijft een bevoegdheid van de colleges.3. Ter uitvoering van de taken,
      bedoeld in het eerste lid, dragen de colleges hun bevoegdheden over aan het
      algemeen bestuur.4. De colleges kunnen ten aanzien van de overgedragen bevoegdheden,
      bedoeld in het derde lid, beleidsregels geven overeenkomstig artikel 4:81, eerste
      lid, en artikel 10:16, eerste lid, van de Algemene wet bestuursrecht (Awb).5.
      De taken genoemd onder het eerste lid worden zoveel mogelijk uitgevoerd in samenwerking
      met de ketenpartners als bedoeld in de wet Structuur uitvoeringsorganisatie
      en inkomen.6. Met het oog op de uitvoering van de taken, bedoeld in het eerste
      lid, kunnen de gemeenten aan Fijnder opdrachten voor dienstverlening verlenen.7.
      De colleges kunnen ook andere taken opdragen aan het bestuur, voor zover het
      algemeen bestuur daarmee instemt met gekwalificeerde meerderheid van twee derde
      van de uitgebrachte stemmen.
