  citeertitel: gemeenschappelijke regeling Omnibuzz
  doel: Het openbaar lichaam is ingesteld in het belang van een kwalitatief hoogwaardige,
    klantgerichte en een zo doelmatig en doeltreffend mogelijke gezamenlijke operationele
    regie op en uitvoering van het doelgroepenvervoer.
