  bevoegdheden:
  - kop_artikel: 'Artikel 7 Algemeen bestuur: bevoegdheden'
    inhoud_artikel: 1.  De bevoegdheden die bij de regeling worden opgedragen, berusten
      bij het algemeen bestuur, tenzij bij wet of in de regeling anders is bepaald.2.
      Het algemeen bestuur kan besluiten tot de oprichting van en de deelneming in
      stichtingen, maatschappen, vennootschappen, verenigingen, coöperaties en onderlinge
      waarborgmaatschappijen, indien dat in het bijzonder aangewezen moet worden geacht
      voor de behartiging van het daarmee te dienen openbaar belang. Het besluit wordt
      niet genomen dan nadat de raden van de gemeenten een ontwerpbesluit is toegezonden
      en in de gelegenheid zijn gesteld hun wensen en bedenkingen ter kennis van het
      algemeen bestuur van het openbaar lichaam te brengen.3. Het algemeen bestuur
      kan met toepassing van de artikelen 24 en 25 van de wet commissies van advies
      dan wel commissies belast met de behartiging van bepaalde belangen instellen.
