  doel: Het samenwerkingsverband heeft tot doel burgers, die behoren tot de re-integratiedoelgroep
    of die een beroep doen op de Wsw of op wetten als bedoeld in artikel 4 lid 2 en
    lid 3, op effectieve en efficiënte wijze te re-integreren waardoor zoveel mogelijk
    mensen in de deelnemende gemeenten naar vermogen werken en een economische bijdrage
    leveren.
