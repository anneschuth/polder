  bevoegdheden:
  - kop_artikel: Artikel 3. Taken, activiteiten en bevoegdheden
    inhoud_artikel: 1. De colleges van de gemeenten dragen de volledige uitvoering
      van de Wet sociale werkvoorziening voor wat betreft de tot de doelgroep van
      de Wet sociale werkvoorziening behorende ingezeten die werkzaam zijn bij het
      openbaar lichaam Reestmond over, met uitzondering van:a. Tot de doelgroep van
      de Wet sociale werkvoorziening behorende ingezeten van de gemeenten die op 31
      december 2014 op basis van een arbeidsovereenkomst voor bepaalde tijd in dienst
      waren bij het openbaar lichaam Reestmond voor het verrichten van arbeid onder
      aangepaste omstandigheden;b. Tot de doelgroep van de Wet sociale werkvoorziening
      behorende ingezeten van de gemeenten, die door het college een arbeidsovereenkomst
      naar Burgerlijk Recht krijgen aangeboden voor het verrichten van arbeid onder
      aangepaste omstandigheden, en deze werknemers daartoe een passende arbeidsplaats
      aanbiedt.2. Tevens heeft het openbaar lichaam Reestmond de mogelijkheid om haar
      aanwezige infrastructuur ter beschikking te stellen ten behoeve van het in opdracht
      van of in samenwerking met de gemeenten en/of andere organisaties verrichten
      van bepaalde diensten en activiteiten voor andere vormen van gesubsidieerde
      arbeid, met dien verstande dat de taken genoemd in lid 1 op geen enkele wijze
      in gedrang mogen komen of mogen worden geschaad.3. Het openbaar lichaam heeft
      de mogelijkheid tot het oprichten van of het deelnemen in privaatrechtelijke
      rechtspersonen, indien dat in het bijzonder aangewezen moet worden geacht voor
      de behartiging van het daarmee te dienen openbaar belang.
