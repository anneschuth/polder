  doel: Reestmond, één van de grootste werkgevers in de regio, voert voor de gemeenten
    Meppel, Westerveld en Staphorst de Wet sociale werkvoorzieningen uit.Het doel
    van Reestmond is mensen ontwikkelen, waardoor voor hen de afstand tot de arbeidsmarkt
    wordt verkleind en de kans op een reguliere baan vergroot.
