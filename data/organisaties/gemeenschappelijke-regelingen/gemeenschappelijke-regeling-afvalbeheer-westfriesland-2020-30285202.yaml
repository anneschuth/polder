  bevoegdheden:
  - kop_artikel: Artikel 3
    inhoud_artikel: 1. Het Lichaam wordt ingesteld ten behoeve van het beheer van
      de voormalige stortplaats Westwoud alsmede ten behoeve van intergemeentelijke
      afstemming met betrekking tot afvalstoffenbeleid en – uitvoering, DVO- en aandeelhouderzaken;2.
      Het Lichaam wordt daarbij opgedragen:a. zorg te dragen voor het beheren van
      de voormalige stortplaats Westwoud;b. zorg te dragen voor overleggen ten behoeve
      van intergemeentelijke afstemming met betrekking tot afvalstoffenbeleid en –
      uitvoering, DVO- en HVC-aandeelhouderzaken.
  - kop_artikel: Artikel 4
    inhoud_artikel: 'Aan het algemeen bestuur van het Lichaam worden toegekend de
      bevoegdheden, , die de wet aan de bestuursorganen van de deelnemende gemeente
      toekent met betrekking tot de in artikel 3 genoemde taken, met inbegrip van:a:
      de bevoegdheid deel te nemen aan een gemeenschappelijke regeling zoals bedoeld
      in artikel 93 van de Wet gemeenschappelijke regelingen, nadat de raden van de
      deelnemende gemeenten zijn gehoord.'
