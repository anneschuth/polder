description:
  text: 'VNOG helpt mens en dier in nood en ondersteunt om gevaar te voorkomen. Alles
    wat we doen is erop gericht om de twee primaire vragen uit de samenleving te beantwoorden:
    ‘Help mij als ik in nood ben’ en ‘Vertel mij hoe veilig en gezond te wonen, werken
    en recreëren’.Samen werken wij aan veiligheid. Wij zijn de Brandweer: vanuit een
    fijnmazig netwerk van 56 brandweerposten, met bijna 1300 vrijwillige brandweermensen
    en 120 beroeps brandweermensen helpen wij dag en nacht bij brand, ongevallen,
    rampen en crises. Wij zijn de GHOR: we coördineren de geneeskundige hulpverlening
    bij rampen en crises. Wij zijn Crisisbeheersing: samen met de operationele diensten,
    met crisispartners en met gemeenten (bevolkingszorg) zorgen wij ervoor dat we
    zijn voorbereid op crises en wanneer deze zich voordoen dat ze adequaat worden
    aangepakt. Wij zijn Risicobeheersing: wij helpen inwoners, bedrijven en gemeenten
    om hun zelfredzaamheid te vergroten en goede vergunningen te kunnen verlenen en
    stimuleren veilig gedrag. We verzamelen, monitoren, analyseren en duiden data.
    Met deze informatie beoordelen we risico’s en we gebruiken die informatie bij
    onze voorlichting, advisering en bij het bestrijden van branden, ongevallen, rampen
    en crises.Met bijna 300 medewerkers voeren wij alle ondersteunende werkzaamheden
    voor onze taken uit. Zo oefenen wij al ons personeel en ons netwerk, we leiden
    mensen op, we kopen en onderhouden al ons materieel en materiaal en we voeren
    alle achterliggende administratie uit.We werken veelvuldig met allerlei partners
    samen: o.a. met onze gemeenten, GGD, zorgpartners, waterschappen, andere veiligheidsregio’s
    (zoals met de vier andere veiligheidsregio’s in het oosten van het land in de
    Oost-5 samenwerking), Defensie, landelijke partners (zoals het NIPV, het Nederlands
    Instituut Publieke Veiligheid) en ook met onze Duitse buren. Met daadkracht, deskundigheid,
    en passie -onze kernwaarden- geven wij zo samen met partners uitvoering aan onze
    missie: “Samen werken aan veiligheid”. We staan altijd voor u klaar.'
