  bevoegdheden:
  - kop_artikel: Artikel 2 - Taken van de deelnemers
    inhoud_artikel: 1. Het gemeentebestuur van Pijnacker-Nootdorp draagt zorg voor
      het navolgende:a. benoeming van de archeoloog van Delft tot archeoloog van Pijnacker-Nootdorp.b.
      het voorzien in de mogelijkheid van een depot, waarin de vondsten die voortkomen
      uitopgravingen kunnen worden ondergebracht.2. Het gemeentebestuur van Delft
      draagt zorg voor het navolgende:a. de mogelijkheid dat de archeoloog van Delft
      in voldoende mate archeologische werkzaamhedenkan verrichten voor de gemeente
      Pijnacker-Nootdorp.b. de archeoloog zal voor de duur van gemiddeld 15 dagen
      per jaar de volgende taken oparcheologisch gebied voor de gemeente Pijnacker-Nootdorp
      vervullen.
