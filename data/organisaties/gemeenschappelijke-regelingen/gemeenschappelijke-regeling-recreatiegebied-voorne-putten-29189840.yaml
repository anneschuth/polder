  bevoegdheden:
  - kop_artikel: Artikel 2
    inhoud_artikel: 1. de raden en colleges van burgemeester en wethouders van de
      gemeenten Nissewaard, Brielle, Hellevoetsluis en Westvoorne vormen een rechtspersoonlijkheid
      bezittend openbaar lichaam, genaamd Recreatieschap Voorne-Putten, dat is gevestigd
      te Spijkenisse.2. Het recreatieschap kent de organen:a. het algemeen bestuur;b.
      het dagelijks bestuur;c. de voorzitter.3. Het recreatieschap heeft tot taak
      in onderlinge samenhang het behartigen van het gemeenschappelijk belang van
      de deelnemers voor wat betreft de ontsluiting, de ontwikkeling, aanleg en het
      beheer in het kader van de openluchtrecreatie en het toerisme en waar mogelijk
      van natuur en landschap in het gebied.
  - kop_artikel: Artikel 3
    inhoud_artikel: Aan het recreatieschap worden ter vervulling van de in artikel
      2, derde lid, omschreven taak alle bevoegdheden van regeling en bestuur toegekend
      binnen de grenzen van de wet.
  - kop_artikel: Artikel4
    inhoud_artikel: Aan het algemeen bestuur behoort met betrekking tot de in artikel
      2, derde lid, omschreven taak van het recreatieschap alle bevoegdheid, tenzij
      bij wet of in deze regeling anders is bepaald.
