gr_meta:
  citeertitel: Gemeenschappelijke Regeling Regionaal Archief Rivierenland
  doel: "1.\tHet Regionaal Archief heeft tot doel het binnen het samenwerkingsgebied\
    \ vervullen van de functie van regionaal kennis- en informatiecentrum op het gebied\
    \ van de lokale en regionale geschiedenis en vervult daartoe de volgende taken:a.\t\
    de zorg voor en het beheer van de in de archiefbewaarplaats berustende archiefbescheiden\
    \ van de deelnemers;b.\thet toezicht op het beheer van de archiefbescheiden van\
    \ de deelnemers voor zover deze niet zijn overgebracht;c.\tde zorg voor en het\
    \ beheer van de in de archiefbewaarplaats berustende archiefbescheiden van instanties\
    \ die niet bestuurlijk in de regeling participeren en waaraan op contractbasis\
    \ diensten worden verleend, end.\thet stimuleren van de lokale en de regionale\
    \ geschiedbeoefening en het daartoe aanleggen, beheren en bewaren van een zo compleet\
    \ mogelijke collectie relevant bronnenmateriaal op het gebied van de lokale- en\
    \ regionale geschiedenis.2.\tAan het bestuur van het Regionaal Archief worden,\
    \ ter uitvoering van de taken, bedoeld in het eerste lid, de bevoegdheden van\
    \ de colleges, bedoeld in artikel 30 en 32 van de Archiefwet overgedragen."
