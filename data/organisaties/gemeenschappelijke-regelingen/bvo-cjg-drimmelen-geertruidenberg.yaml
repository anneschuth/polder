gr_meta:
  citeertitel: BVO CJG Drimmelen Geertruidenberg
  doel: Deze regeling wordt getroffen ter ondersteuning en uitvoering van taken van
    de colleges in het kader van de Jeugdwet, in het bijzonder toeleiding naar, advisering
    over, bepaling van en het inzetten van hulp voor ouders en jeugdigen door middel
    van:a. het bieden van informatie en advies over opvoeden en opgroeien;b. het bieden
    van ambulante jeugdhulp en gezinsbegeleiding op alle leefgebieden gericht op:˚1.
    het veranderen of te leren hanteren van gedrag;˚2. het versterken van opvoedvaardigheden
    van ouders;˚3. het versterken van de zelfredzaamheid en weerbaarheid;˚4. het creëren
    van goede pedagogische omstandigheden in het gezin;˚5. het voorkomen van onveiligheid.c.
    Coördinatie van jeugdhulp en arrangeren van passende zorg;d. Participatiebevordering
    door het stimuleren en faciliteren van informele netwerken.
