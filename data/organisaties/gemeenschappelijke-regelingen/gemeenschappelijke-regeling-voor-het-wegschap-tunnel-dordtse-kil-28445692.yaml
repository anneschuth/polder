  bevoegdheden:
  - kop_artikel: Artikel 4 Bevoegdheden
    inhoud_artikel: Ten behoeve van de verwezenlijking van de taakstelling, zoals
      vermeld in artikel 2, tweede lid, komen aan het wegschap de volgende bevoegdheden
      toe:a. het bijeenbrengen van de financiële middelen, nodig voor het in stand
      houden, beheren en exploiteren van de tunnel en de aansluitende wegen;b. het
      toegankelijk stellen van de tunnel voor elke verkeersdeelnemer, die de wens
      te kennen geeft tegen betaling van een vergoeding de tunnel te gebruiken, waarbij
      voetgangers, fietsers en gebruikers van het openbaar vervoer door middel van
      lijndiensten vrijgesteld zijn van het betalen van tol;c. het vaststellen van,
      al dan niet door strafbepaling of bestuursdwang te handhaven, verordeningen;d.
      alle andere wettige middelen, die voor het bereiken van het doel bevorderlijk
      kunnen zijn;e. het heffen van tolgelden tot zodanige bedragen, dat een rendabele
      exploitatie van de tunnel gewaarborgd wordt.
