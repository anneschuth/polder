description:
  text: Streekarchief Midden-Holland bewaart de archieven van de volgende gemeenten:Gouda;Krimpen
    aan den IJssel;Krimpenerwaard (Ammerstol, Berkenwoude, Bergambacht, Gouderak,
    Haastrecht, Krimpen aan de Lek, Lekkerkerk, Ouderkerk aan den IJssel, Schoonhoven,
    Stolwijk, Vlist);Waddinxveen (Broek c.a., Noord-Waddinxveen, Zuid-Waddinxveen);Zuidplas
    (Moordrecht, Nieuwerkerk aan den IJssel, Zevenhuizen-Moerkapelle);diverse Gemeenschappelijke
    Regelingen die het Streekarchief Midden-Holland hebben aangewezen als archiefbewaarplaats.
