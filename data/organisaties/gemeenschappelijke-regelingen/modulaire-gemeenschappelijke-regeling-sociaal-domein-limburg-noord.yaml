names:
- value: Modulaire gemeenschappelijke regeling sociaal domein Limburg-Noord
  valid_from: '1900-01-01'
description:
  text: 'Veertien gemeenten in de regio''s Noord- en Midden-Limburg werken samen op
    het gebied van inkoop, contractmanagement, contractbeheer en datamanagement van
    Jeugdhulp, Wmo, Participatie, Beschermd Wonen, Maatschappelijke Opvang, Bemoeizorg
    en Preventie. De deelnemende gemeenten zijn: Beesel, Bergen, Echt-Susteren, Gennep,
    Horst aan de Maas, Leudal, Maasgouw, Nederweert, Peel en Maas, Roerdalen, Roermond,
    Venlo, Venray en Weert.De gemeenten hebben de inkoop, contractmanagement, contractbeheer
    en datamanagement in het sociaal domein centraal belegd bij de Modulaire gemeenschappelijke
    regeling sociaal domein Limburg-Noord (MGR), ook wel bekend als het Sociaal Domein.
    Wij sluiten voor de regiogemeenten in Noord- en Midden-Limburg de (raam)overeenkomsten
    met aanbieders.'
