  bevoegdheden:
  - kop_artikel: Artikel 2 Instelling, doel en beleid
    inhoud_artikel: 1.Er is een openbaar lichaam welke rechtspersoonlijkheid bezit
      als bedoeld in artikel 8, eerste lid van de Wet, genaamd Omgevingsdienst Drenthe,
      verder te noemen de Omgevingsdienst.2.Het openbaar lichaam is gevestigd te Assen
      en wordt aangegaan voor onbepaalde tijd.3.Het openbaar lichaam is ingesteld
      ter behartiging van de individuele en gezamenlijke belangen van de deelnemers
      op het gebied van de uitvoering van taken van toezicht op en handhaving van
      de milieuvoorschriften krachtens de Omgevingswet en de overige milieuwet- en
      regelgeving, alsook voor de uitvoering van taken op het gebied van vergunningverlening
      krachtens deze wet- en regelgeving, zoals omschreven in Hoofdstuk 2 van deze
      regeling.4.Het openbaar lichaam heeft de volgende bevoegdheden:a.het openbaar
      lichaam heeft de bevoegdheden die het van rechtswege bezit om aan het maatschappelijk
      verkeer deel te nemen, waaronder de bevoegdheid om privaatrechtelijke rechtshandelingen
      te verrichten en de bevoegdheid tot het aanstellen van personeel op publiekrechtelijke
      grondslag;b.het openbaar lichaam is bevoegd tot het op verzoek en ten behoeve
      van één of meerdere deelnemers en/of derden verrichten van diensten.
  - kop_artikel: Artikel 3 Taken
    inhoud_artikel: 1.De taken van de Omgevingsdienst betreffen, het milieutakenpakket:a.alle
      milieuvergunningverleningb.alle milieumeldingenc.alle milieutoezicht en handhavingd.alle
      bodemtakene.alle milieuspecialismen2.Naast de taken op het gebied van toezicht,
      handhaving en vergunningverlening behoren tot het takenpakket van de Omgevingsdienst
      ook coördinerende, afstemmende en adviserende taken die voor de deelnemers tezamen
      worden verricht.3.Voor andere dan de in lid 1 bedoelde taken is een unaniem
      besluit van het algemeen bestuur nodig. Dit geldt niet voor bij of krachtens
      wettelijk voorschrift aan omgevingsdiensten opgelegde taken.4.De Omgevingsdienst
      stelt een productencatalogus op en stelt telkens tijdig voor het uitvoeringsjaar
      een jaarprogramma op.5.De Omgevingsdienst kan voor de uitoefening van taken
      gebruik maken van personeel van deelnemers op nader overeen te komen voorwaarden.
