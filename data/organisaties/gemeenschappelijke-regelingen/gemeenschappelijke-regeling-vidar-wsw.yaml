description:
  text: 'Ons motto is: “Werk voorop, kansen voor iedereen.” Wij geloven dat iedereen
    talent heeft en mee kan doen aan de samenleving. Wij vinden ook dat iedereen recht
    heeft op (betaald) werk.Vidar ondersteunt inwoners van Sittard-Geleen, Stein en
    Beek bij het vinden van werk, het krijgen van een inkomen, het ontwikkelen van
    vaardigheden en het ontdekken van hun talenten.Bedrijven kunnen bij ons terecht
    voor de werving, selectie en begeleiding van personeel, (groeps)detachering, advies
    bij personeelsvraagstukken, informatie over subsidies en regelingen m.b.t. inclusief
    ondernemen, jobcarving, inclusief bedrijfsadvies, branche-inzichten en arbeidsmarktkennis
    en voor hulp bij de invulling van social return. Ook kunnen bedrijven productie-
    en montagewerk aan Vidar uitbesteden.Bij Vidar werken 1.000 medewerkers, waarvan
    zo’n 660 werkzaam zijn in een beschutte werkomgeving. Wij begeleiden zo''n 1.300
    kandidaten in ontwikkelingstrajecten en ondersteunen ruim 3.000 huishoudens in
    de regio met een bijstandsuitkering. Tot slot ondersteunen wij zo’n 8.000 inwoners
    uit de Westelijke Mijnstreek die rond het bestaansminimum leven aanvullend met
    een of meerdere minima-regelingen.'
  url: https://www.vidar.nl/over-vidar
