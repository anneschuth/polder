gr_meta:
  citeertitel: Gemeenschappelijke Regeling ABG-organisatie
  doel: Deze regeling wordt getroffen ter behartiging van de sturing en beheersing
    van ondersteunende processen en uitvoeringstaken van de deelnemende gemeenten.
    De doelstelling is een kwalitatief hoogwaardige en doelmatige uitvoering door
    de bedrijfsvoeringsorganisatie van de door de deelnemende gemeenten opgedragen
    taken te bewerkstelligen met het oog op een goede dienstverlening aan de inwoners
    en een krachtige ondersteuning aan de besturen van de deelnemende gemeenten.
