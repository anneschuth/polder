gr_meta:
  citeertitel: Regeling Zonder Meer BLNP
  doel: 1. Deze regeling heeft betrekking op de samenwerking van de deelnemende gemeenten
    binnen devakgebieden Financiën, ICT, Juridische Zaken en Personeel & Organisatie.2.
    De samenwerking richt zich op gezamenlijke uitvoering van taken als benoemd in
    bijlage 1 bijdeze Gemeenschappelijke Regeling in de meest ruime zin. Deze taken
    betreffen taken op het gebiedbeleid, beheer en uitvoering.
  samenwerkingsvorm:
    value: '''Regeling zonder meer'''
