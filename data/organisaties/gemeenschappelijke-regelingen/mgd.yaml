names:
- value: MijnGemeenteDichtbij
  abbr: MGD
  valid_from: '1900-01-01'
description:
  text: MijnGemeenteDichtbij is gevormd door twee zelfstandige gemeenten, Boxtel en
    Sint-Michielsgestel. zij hebben een eigen gemeenteraad en college van B&W. Deze
    worden ondersteund door één personele organisatie, waar ongeveer 470 collega’s
    werkzaam in zijn. Deze samenwerking noemen we een Gemeenschappelijke Regeling
    (samenwerkingsorganisatie Boxtel – Sint-Michielsgestel).
  url: https://open.mijngemeentedichtbij.nl/
