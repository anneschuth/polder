  bevoegdheden:
  - kop_artikel: Artikel 4
    inhoud_artikel: 4.1 De GR heeft ten doel:1. het vervullen van de publieke taken
      in verband met het nautisch beheer, de scheepvaart, de havens en de vaarwegen
      in het beheergebied;2. het bevorderen van de verdere ontwikkeling en het gebruik
      van de havens en de daarbij behorende industrieterreinen gelegen in de gemeente
      Delfzijl en van de Eemshaven en de daarbij behorende industrieterreinen gelegen
      in de gemeente Eemsmond, mede teneinde3. daardoor de bedrijvigheid en de werkgelegenheid
      in de provincie Groningen te bevorderen.4.2 Ter uitvoering van het in artikel
      4.1 omschreven doel heeft de GR tot taak:1. het uitvoeren van alle op haar rustende
      publiekrechtelijke taken waaronder die welke verband houden met het nautisch
      beheer, voor zover verband houdende met de havens in het beheersgebied, voor
      zover die publiekrechtelijke taken niet, al dan niet rechtstreeks, aan (personen
      aangesteld bij) Groningen Seaports NV opgedragen mochten zijn of worden; en2.
      het oprichten van en deelnemen in privaatrechtelijke rechtspersonen, in het
      bijzonder in Groningen Seaports NV, die als doelstelling heeft de exploitatie
      en het op privaatrechtelijke wijze (doen) uitvoeren van de ondernemingsgerichte
      activiteiten in de meest ruime zin van het woord van de in artikel 4.1 genoemde
      havens en daarbij behorende industrieterreinen.3. het bevorderen van de financiering
      van Groningen Seaports N.V., zolang het algemeen bestuur dat noodzakelijk acht.4.3
      Aan de GR zijn en worden hierbij, door de deelnemers, ieder voor zover het hun
      bevoegdheden betreft, de bevoegdheden overgedragen, die zij hebben en  die ter
      uitvoering van haar in artikel 4.2 onder 1 omschreven taken nodig zijn, in het
      bijzonder:1. de publiekrechtelijke bevoegdheden in verband met het nautisch
      beheer, de scheepvaart, de havens en de vaarwegen, voor zover berustend bij
      de deelnemers, zoals die op grond van de Scheepvaartverkeerswet, het Binnenvaartpolitiereglement,
      de Wrakkenwet, het Loodsplichtbesluit 1995, het Voorschriftenbesluit Registerloodsen,
      de Wet voorkoming verontreiniging door schepen, de Regeling vervoer gevaarlijke
      stoffen met zeeschepen (RVGZ), de Wet vervoer gevaarlijke stoffen, de Waterstaatswet,
      de Havenbeveiligingswet en het Besluit verkeersinformatie en verkeersaanwijzingen
      scheepvaart, alsmede andere regelingen de scheepvaart en scheepvaartladingen
      betreffende, en wel voor zover betrekking hebbende op het beheergebied; alsmede2.
      de bevoegdheid terzake (belasting)verordeningen te maken, ook voor zover op
      overtreding daarvan straf gesteld wordt; alsmede3. de bevoegdheid tot opleggen
      van heffingen of belastingen terzake de taken en/of bevoegdheden genoemd in
      artikel 4.3. onder 14.4 Tot de aan de GR overgedragen taken en bevoegdheden
      horen uitdrukkelijk niet die op grond van de Wegenwet en publiekrechtelijke
      taken en bevoegdheden in verband met de riolering en het baggeren.4.5 Het algemeen
      bestuur kan, met instemming van de deelnemers, besluiten dat verandering wordt
      gebracht in de aan de GR overgedragen bevoegdheden, met dien verstande dat het
      algemeen bestuur niet kan besluiten tot uitbreiding van de overgedragen bevoegdheden.
      Van de instemming dienen de deelnemers vooraf schriftelijk blijk te geven.
