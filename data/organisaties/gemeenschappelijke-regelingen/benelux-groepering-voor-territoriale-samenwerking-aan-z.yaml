description:
  text: Wij geloven in de kracht van samenwerking. Wij zijn er voor jou! We luisteren
    naar je, denken met je mee en ondersteunen waar nodig. Want wij weten dat iedereen
    wel eens hulp kan gebruiken. Bij aan-z bieden we kortdurende jeugdhulp en maatschappelijke
    dienstverlening, een breed welzijnsaanbod en de uitvoering van de Wmo voor alle
    inwoners van de gemeente Terneuzen. Ook hebben we aanbod in de gemeenten Assenede,
    Kaprijke en Sint-Laureins. Zo kun je in verschillende regio’s gebruikmaken van
    onze diensten.
