  bevoegdheden:
  - kop_artikel: 'Artikel 6: Doel, taken en opdrachten'
    inhoud_artikel: 1. De BGTS bezit rechtspersoonlijkheid overeenkomst artikel 7
      van het Verdrag en beschikt over de ruimste handelingsbekwaamheid die in elk
      Benelux-land aan rechtspersonen wordt toegekend.2. De rechtsbevoegdheid komt
      de BGTS slechts toe voor zover zulks noodzakelijk is voor de vervulling van
      zijn taken en de verwezenlijking van zijn doelstellingen.3. De BGTS werkt voor
      alle inwoners van het werkgebied (Terneuzen, Assenede, Kaprijke, St- Laureins)
      en schenkt bijzondere aandacht aan mensen die minder mogelijkheden of kansen
      hebben.De BGTS heeft tot taak mensen te stimuleren hun leven in (eigen) handen
      te nemen en actief te participeren aan de samenleving. De BGTS gaat met hen
      op zoek naar sterkten en toekomstverwachtingen.De BGTS ontwikkelt en verbindt
      krachten tussen mensen, netwerken en organisaties.De BGTS pakt problemen aan
      door zich te richten op de oplossingen.De BGTS bouwt aan goed samenleven in
      buurten en wijken.4. De BGTS maakt activiteitenplannen, verstrekt diensten,
      geeft voorlichting, registreert bestaande voorzieningen met de mogelijkheden
      tot hulpverlening, verricht onderzoek naar wensen en behoeften, werkt samen
      met betrokken instanties en heeft aandacht voor de welzijnscomponenten in het
      beleid.5. Ter realisatie van zijn doel en ter uitoefening van de hem opgedragen
      taken, heeft de BGTS volgende bevoegdheden, die naargelang de noodzaak kunnen
      worden uitgebreid:• het uitvoeren van alle activiteiten en verrichtingen die
      rechtstreeks of onrechtstreeks betrekking hebben op het in lid 3 en 4 aangegeven
      doel of die de verwezenlijking ervan kunnen begunstigen• het samenwerken en
      overeenkomsten sluiten met personen, inrichtingen of diensten• het verwerven
      en beheren van fondsen ter realisering van de doelen• het formuleren van voorstellen
      inzake onder de bevoegdheid vallende aangelegenheden• het instellen van permanente
      of ad hoc adviesgroepen• het instellen of bevorderen van onderzoeken• het uitbrengen
      van adviezen• het geven van voorlichting• De uitvoering van voormelde taken
      kan, voor zover het interne recht van de betrokken landen dit toestaat, gepaard
      gaan met een overdracht van bevoegdheid van regeling en bestuur van de deelnemers
      aan de BGTS en dit mits aanpassing van de statuten, waarbij de overgedragen
      bevoegdheden en de gevolgen van de overdracht nauwkeurig worden bepaald
