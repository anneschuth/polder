description:
  text: Of u nu speciaal aangepast vervoer nodig heeft of niet, wij vervoeren u comfortabel
    en veilig. Het vervoer wordt verzorgd door Munckhof en Van Driel. U herkent Valleihopper
    aan het logo op de voertuigen.Valleihopper is er voor mensen met een Wmo-vervoerindicatie
    die wonen in de regio Foodvalley. Dit zijn de gemeenten Barneveld, Ede, Nijkerk,
    Renswoude, Rhenen, Scherpenzeel, Wageningen en Veenendaal. Valleihopper is bestemd
    voor sociaal-recreatieve doeleinden. Het vervoer naar een medische afspraak wordt
    gedoogd, als er geen alternatief vervoer voorhanden is.U kunt gebruik maken van
    Valleihopper wanneer u vanwege een beperking niet met openbaar vervoer kunt reizen,
    of als u aangepast vervoer nodig heeft. U kunt dan bij de afdeling Wmo van uw
    gemeente een vervoerindicatie aanvragen. Komt u in aanmerking voor de vervoervoorziening,
    dan ontvangt u een Valleihopper-pas. Deze pas heeft een uniek nummer. Met deze
    pas kunt u ritten boeken en gebruik maken van de vervoerdiensten van Valleihopper.
  url: https://www.valleihopper.nl/over-valleihopper
