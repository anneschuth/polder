  bevoegdheden:
  - kop_artikel: Artikel 4
    inhoud_artikel: Artikel 41.Ter behartiging van de belangen genoemd in artikel
      3 dragen de deelnemers de volgende taken en bevoegdheden over aan het bestuur
      van de bedrijfsvoeringsorganisatie:a.de uitvoering van de Wet sociale werkvoorziening
      met uitzondering van artikel 14, eerste lid, van deze wet;b.de uitvoering van
      artikel 10b van de Participatiewet;c.de uitvoering van artikel 10 van de Participatiewet
      voor zover het de ondersteuning van kansrijke werkzoekenden naar werk betreft
      met toepassing van de voorzieningengericht op arbeidsinschakeling uit de verordening
      op grond van de Participatiewet.2.Ter behartiging van de belangen genoemd in
      artikel 3 dragen de deelnemers aan het bestuur van de bedrijfsvoeringsorganisatie
      ook over de bevoegdheid arbeidsovereenkomsten met ads-medewerkers aan te gaan.
      Deze bevoegdheid kan door de bedrijfsvoeringsorganisatie slechts worden uitgeoefend
      nadat daartoe afspraken zijn gemaakt in de prestatieafspraken en bovendien slechts
      binnen de grenzen van deze afspraken.3.Het bestuur is bevoegd tot de oprichting
      van en de deelneming in stichtingen, maatschappen, vennootschappen, verenigingen,
      coöperaties, en onderlinge waarborgmaatschappijen indien dat in het bijzonder
      aangewezen moet worden geacht voor de behartiging van het daarmee te dienen
      openbaar belang. Voordat het besluit wordt genomen wordende raden van de deelnemende
      gemeenten in de gelegenheid gesteld om hun wensen en bedenkingen over het ontwerpbesluit
      ter kennis van het bestuur te brengen.
