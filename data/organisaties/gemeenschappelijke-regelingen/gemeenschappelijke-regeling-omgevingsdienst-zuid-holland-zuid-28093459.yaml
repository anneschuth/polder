  citeertitel: Gemeenschappelijke regeling Omgevingsdienst Zuid-Holland Zuid
  doel: De regeling is getroffen ter ondersteuning van de bestuursorganen van de gemeenten
    in Zuid-Holland Zuid en de provincie Zuid-Holland bij de uitvoering van hun taken
    op het gebied van het omgevingsrecht en andere opgedragen taken.
