  bevoegdheden:
  - inhoud_artikel: Overgedragen bevoegdheden:Aan het algemeen bestuur komen alle
      taken en bevoegdheden toe voor zover die niet in deze regeling zijn overgelaten
      aan het dagelijks bestuur, de voorzitter of een commissie.Dienstverlening in
      de operationele uitvoering van de organisatie wordt geacht te vallen onder het
      mandaatsbesluit van de directeur.De directeur is namens het dagelijks bestuur
      belast met de dagelijkse leiding over de gezamenlijke brandweer en handelt conform
      het door het dagelijks bestuur vastgestelde mandaatsbesluit.De directeur beheert
      namens het dagelijks bestuur de financiën en de middelen van het O.L.G.B. en
      handelt conform het door het dagelijks bestuur vastgestelde mandaatsbesluit.De
      directeur voert namens het dagelijks bestuur het personeelsbeheer en handelt
      daarin conform het door het dagelijks bestuur vastgestelde mandaatsbesluit.
