  bevoegdheden:
  - kop_artikel: Artikel 5. Overdracht van bevoegdheden.
    inhoud_artikel: 1. Door het aangaan van c.q. het toetreden tot de regeling dragen
      dedeelnemende gemeenten de bevoegdheden uit de uitvoerende sfeer, dienodig zijn
      voor het vervullen van de in het vorige artikel genoemde taken,aan de gemeenschappelijke
      regeling over. Daartoe wordt in ieder gevalgerekend de bevoegdheid tot inzamelen
      van huishoudelijke afvalstoffenals bedoeld in de artikelen 10.21, lid 1 en 10.22,
      lid 1 van de Wetmilieubeheer.2. Tot de zorg en de uitvoerende taken bedoeld
      in het eerste lid en in artikel 4 van deze regeling worden niet gerekend:het
      gebruik van bevoegdheden tot het geven van algemene regels,zoals het opleggen
      van heffingen enhet uitoefenen van toezicht en het gebruik van bestuursrechtelijkemaatregelen
      ter handhaving van wettelijke bepalingen.
