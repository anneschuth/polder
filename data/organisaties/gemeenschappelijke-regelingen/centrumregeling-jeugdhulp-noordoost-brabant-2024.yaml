gr_meta:
  citeertitel: Centrumregeling Jeugdhulp Noordoost Brabant 2024
  doel: De gemeenten zijn een onderlinge samenwerking aangegaan gericht op het zorgdragen
    voor een kwalitatief goede en efficiënte inkoop van de jeugdtaken op basis van
    de Inkoopstrategie, de jaarlijks vastgestelde Inkoopopdracht, het Regionaal Beleidsplan
    Jeugd, en beleidsopdrachten, met inachtneming van de bepalingen van de Jeugdwet.
