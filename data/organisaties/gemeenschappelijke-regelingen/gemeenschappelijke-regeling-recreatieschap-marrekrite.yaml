  bevoegdheden:
  - kop_artikel: 'Artikel 4: Taken openbaar lichaam'
    inhoud_artikel: 1. Ter behartiging van de in artikel 3 genoemde belangen oefent
      het openbaar lichaam de volgende taken uit:Het bevorderen van waterrecreatie
      door het tot stand brengen, beheren en onderhouden van voldoende vrije aanlegplaatsen
      midden in de natuur. Dit omvat mede:○ het zorgdragen voor een goede spreiding
      van de aanlegplaatsen;○ het op diepte houden van de aanlegplaatsen;○ het ophalen
      van recreatieafval bij de aanlegplaatsen; en○ het verzorgen van het groenonderhoud
      bij de aanlegplaatsen.Het bevorderen van landrecreatie door:a. het tot stand
      brengen, beheren en onderhouden van bewegwijzering van recreatieve routestructuren,
      inclusief toeristische overstappunten; enb. het beheren en coördineren van recreatieve
      routes in de digitale routedatabase.Advisering en ontwikkeling (water- en landrecreatie):a.
      advisering over uniforme brug- en sluisbediening.b. het geven van voorlichting,
      het ontwerpen van plannen en het verstrekken van adviezen.;c. het gevraagd en
      ongevraagd (doen) uitvoeren van onderzoek.d. het initiëren, coördineren en organiseren
      van werkgroepen, (innovatieve) projecten en initiatieven.2. De taken als bedoeld
      in het eerste lid worden zo veel als mogelijk uitgevoerd in afstemming met de
      betreffende deelnemer(s) en voorts met inachtneming van het door de bestuursorganen
      van de provincie en de deelnemende gemeenten vastgestelde beleid, beleidsregels
      en instructies.3. Recreatieschap Marrekrite is bevoegd tot het ten behoeve van
      derden verrichten van diensten op het terrein van het beheer en onderhoud ten
      behoeve van water- en landrecreatie, voor zover het dagelijks bestuur daarin
      bewilligt.
