description:
  text: Over RogplusWij zorgen dat iedere inwoner van Maassluis, Vlaardingen of Schiedam
    mee kan (blijven) doen in de samenleving. En (langer) zelfstandig kan wonen. Want
    ook met een beperking of ziekte kunnen mensen hun zelfstandigheid behouden. Of
    weer terugkrijgen. De Wet maatschappelijke ondersteuning (Wmo) maakt dit mogelijk.
    Wij geven ook advies over oplossingen buiten de Wmo. En werken nauw samen met
    de gemeentelijke wijkteams en organisaties in het sociaal domein.
  url: https://www.rogplus.nl/over-rogplus
