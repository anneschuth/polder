  bevoegdheden:
  - kop_artikel: 'Artikel 5: Taken en bevoegdheden'
    inhoud_artikel: Ter verwezenlijking van de van de in artikel 4 genoemde belangen
      komen het openbaar lichaam de volgende taken en bevoegdheden toe:1. Afvalverwerking:a.
      Het deelnemen in het aandelenkapitaal van ARN B.V. of haar rechtsopvolger.b.
      Het in overleg met de gemeenten regelen van de aanvoer van de afvalstoffen,
      voor zover dit uit een oogpunt van doeltreffende bedrijfsvoering van de verwerkingsinrichting
      noodzakelijk is.c. Elk van de gemeenten verbindt zich om:i. de door of vanwege
      die gemeente ingezamelde afvalstoffen aan de verwerkingsinrichting aan te bieden
      van welke verplichting door het Algemeen Bestuur ontheffing kan worden verleend;ii.
      de wijze van inzamelen af te stemmen op de wijze van verwerken van de verwerkingsinrichting;iii.
      voor veranderingen in het inzamelsysteem, tijdig vooraf toestemming te vragen
      aan het Dagelijks Bestuur waaraan de voorwaarde kan worden verbonden dat de
      uit die veranderingen voortvloeiende nadelige gevolgen aan het openbaar lichaam
      of aan de ARN B.V. worden vergoed.d. het openbaar lichaam sluit met de ARN B.V.
      een vuilverwerkingsovereenkomst, regelende de aanbiedingsplicht van de deelnemende
      gemeenten van de door of vanwege hen opgehaalde afvalstoffen, de acceptatieplicht
      van de aangeboden afvalstoffen door de verwerkingsinrichting en het in rekening
      brengen van de verwerkingskosten door ARN B.V. aan de deelnemende gemeenten.2.
      BeleidHet afstemmen en/of het opzetten van gezamenlijk beleid op afval en milieuterrein.
