  bevoegdheden:
  - kop_artikel: Artikel 3
    inhoud_artikel: 1. Het Lichaam wordt ingesteld ten behoeve van het vaststellen
      en (doen) uitvoeren van het beleid ten aanzien van huishoudelijke en andere
      afvalstoffen, zoals bedoeld in de Wet milieubeheer.2. Het Lichaam wordt daarbij
      opgedragen:a. verordeningen vast te stellen als bedoeld in artikel 10.23 e.v.
      van de Wet Milieubeheer;b. ter uitvoering van het Alleenrecht Uitvoeringsovereenkomsten
      aan te gaan;c. zorg te dragen voor het (doen) beheren van huishoudelijke en
      andere afvalstoffen op de wijze zoals aangegeven in de Wet milieubeheer en de
      Regionale Afvalstoffenverordening Westfriesland;d. het doen stichten, doen beheren
      en doen exploiteren van verwerkingsinrichtingen, al dan niet in samenwerking
      met derden, voor zover de stichting, het beheer dan wel de exploitatie ingevolge
      de Wet milieubeheer dan wel overige publiekrechtelijke regelingen door het Lichaam
      dient te worden verzorgd;e. het doen verzorgen van transport van die categorieën
      afvalstoffen die op grond van de Wet milieubeheer vanuit het samenwerkingsverband
      moeten worden afgevoerd;f. het doen verzorgen van de inzameling, opslag en verwerking
      van klein gevaarlijk afval conform de daarvoor geldende regelgeving;g. het namens
      de deelnemende gemeenten verlenen van vergunningen voor de inzameling van oud
      papier, karton en textiel;h. het doen zorgdragen voor de bestrijding van plaagdieren;i.
      het adviseren van de deelnemende gemeenten aangaande de uitvoering van het gestelde
      in de Wet milieubeheer en op verzoek van een of meer gemeenten aangaande milieutechnische
      vraagstukken, verband houdende met de taakstelling, zoals in dit artikel omschreven;j.
      de uitvoering van andere milieutaken die door de deelnemende gemeenten aan het
      lichaam worden opgedragen.k. het ten behoeve van de deelnemende gemeenten participeren
      in HVC en aan haar gelieerde ondernemingen.l. het heffen van belastingen als
      bedoeld in artikel 15.33 Wet milieubeheer met uitzondering van de bevoegdheid
      tot het opleggen van aanslagen afvalstoffenheffing.3. De in het tweede lid onder
      sub a bedoelde bevoegdheid wordt opgedragen onder de voorwaarde dat HVC wordt
      aangewezen als inzameldienst als bedoeld in artikel 10.24 Wet milieubeheer.
  - kop_artikel: Artikel 4
    inhoud_artikel: Aan het Algemeen Bestuur van het Lichaam worden toegekend de bevoegdheden,
      zowel van regeling als van bestuur, die de wet aan de bestuursorganen van de
      deelnemende gemeente toekent met betrekking tot de in artikel 3 genoemde taken,
      met inbegrip van:a. de bevoegdheid om in overleg met de deelnemende gemeenten
      verordeningen vast te stellen, door strafbepalingen en/of bestuursdwang te handhaven;b.
      de bevoegdheid deel te nemen aan een gemeenschappelijke regeling zoals bedoeld
      in artikel 93 van de Wet gemeenschappelijke regelingen, nadat de raden van de
      deelnemende gemeenten zijn gehoord.
