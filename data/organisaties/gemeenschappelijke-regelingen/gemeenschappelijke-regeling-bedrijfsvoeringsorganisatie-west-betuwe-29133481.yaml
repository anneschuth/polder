  bevoegdheden:
  - kop_artikel: Artikel 5 – Verdeling bevoegdheden
    inhoud_artikel: 1. De deelnemers dragen geen bevoegdheden over aan de bedrijfsvoerings-organisatie.2.
      De deelnemers zorgen voor de vaststelling van toereikende mandaten, volmachten
      en machtigingen die de bedrijfsvoeringsorganisatie nodig heeft voor de uitoefening
      van zijn taken. Het bestuur houdt hier een register van bij.3. Alle bevoegdheden
      die bij of krachtens enige wet van toepassing zijn op de bedrijfsvoeringsorganisatie
      komen toe aan het bestuur.
