gr_meta:
  citeertitel: Gemeenschappelijke Regeling Bedrijfsvoeringsorganisatie West-Betuwe
  doel: 1. De regeling is getroffen voor gemeenschappelijke behartiging van de belangen
    van de deelnemers in het kader van de uitvoering van hun bedrijfsvoeringstaken.
    De doelstelling is om gezamenlijke voordelen te realiseren door:- de kosten te
    verlagen;- de kwaliteit te verhogen;- de kwetsbaarheid te verminderen;- kansen
    te bieden aan medewerkers.1. De deelnemers achten het ook hun belang de taken
    die zij in het kader van hun bedrijfsvoering uitvoeren zo efficiënt en effectief
    mogelijk in te richten. Daarom zullen zij hun beleid, regelgeving en werkprocessen
    die verband houden met de bedrijfsvoering zo veel mogelijk op elkaar afstemmen.2.
    Voor zover dat voor een efficiënte en effectieve bedrijfsvoering noodzakelijk
    is, achten de deelnemers het ook hun belang om deel te kunnen nemen in publiekrechtelijke
    rechtspersonen.3. Voor zover dat voor een efficiënte en effectieve bedrijfsvoering
    noodzakelijk is, achten de deelnemers het, met inachtneming van het bepaalde in
    artikel 31a van de WGR, ook hun belang om deel te kunnen nemen in een privaatrechtelijke
    rechtspersoon.
