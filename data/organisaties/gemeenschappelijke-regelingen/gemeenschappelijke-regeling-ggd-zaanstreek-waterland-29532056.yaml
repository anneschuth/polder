  bevoegdheden:
  - kop_artikel: Artikel 48 Bevoegdheden
    inhoud_artikel: 1. De bevoegdheden die bij deze regeling worden overgedragen,
      berusten bij het algemeen bestuur, tenzij bij wet of in deze regeling anders
      is bepaald.2. Het algemeen bestuur stelt een reglement voor de orde en de huishouding
      van het openbaar lichaam vast voor zover daarvan bij deze regeling niet is afgeweken.3.
      Het algemeen bestuur is bevoegd tot de oprichting van en de deelneming in stichtingen,
      maatschappen, verenigingen, coöperaties en onderlinge waarborgmaatschappijen
      in het kader van het daarbij te behartigen openbaar belang.4. Het besluit genoemd
      in het derde lid van dit artikel wordt niet genomen dan nadat de raden een ontwerpbesluit
      is toegezonden en in de gelegenheid zijn gesteld hun wensen en bedenkingen kenbaar
      te maken aan het algemeen bestuur.5. Het algemeen bestuur kan een lid van het
      dagelijks bestuur ontslag verlenen indien dit lid het vertrouwen van het algemeen
      bestuur niet meer bezit.
