  bevoegdheden:
  - kop_artikel: Artikel 2 Doel en reikwijdte van de regeling
    inhoud_artikel: 1. De deelnemers beogen met deze Regeling vorm te geven aan de
      samenwerking tussen hen aangaande de verplichtingen van de colleges op het gebied
      van de Participatiewet en de Wsw alsmede de daarmee samenhangende wetten en
      (uitvoerings)regelingen.2. Deze Regeling heeft als doel het bewerkstelligen
      van een , gelijkwaardige, kwalitatief hoogwaardige, effectieve en (zowel praktische
      als kosten-)efficiënte uitvoering van de in het vorige lid genoemde verplichtingen
      voor alle relevante actoren, voornamelijk de inwoners en de betrokken (gemeentelijke)
      bestuursorganen.3. De deelnemers wijzen de gemeente Nissewaard aan als centrumgemeente
      in het kader van deze Regeling.4. Gemeenten beleggen de wettelijke taken op
      het gebied van de Wsw en de nog nader te bepalen taken in het kader van de Participatiewet,
      zoals in het tweede lid bedoeld en zoals nader gespecificeerd in deze Regeling
      en nader te specificeren in dienstverleningsovereenkomsten bij de centrumgemeente.5.
      De beleidsbepalende bevoegdheden genoemd in voornoemde wetten en de daarop gebaseerde
      regelgeving behoren toe aan de bestuursorganen van de gemeenten, ieder voor
      zover het hun bevoegdheid betreft.6. De centrumgemeente gaat met elke aan de
      regeling deelnemende gemeente afzonderlijk, een dienstverleningsovereenkomst
      aan tot uitvoering van de regeling.7. Het college van de centrumgemeente wordt
      door de colleges van de gemeenten gemandateerd om de in dit artikel bedoelde
      verplichtingen uit te voeren.8. De door de colleges verstrekte mandaten worden
      in elke gemeente opgenomen in het mandaatregister. Tevens dragen de colleges
      zorg voor de vereiste bekendmaking van de verstrekte mandaten - daaronder begrepen
      eventuele wijzigingen van die mandaten op basis van deze Regeling - conform
      de Awb.9. Het college van de centrumgemeente houdt een register bij van de aan
      haar verleende mandaten en volmachten.10. Voor zoveel nodig verlenen de colleges
      van de gemeenten tevens volmacht tot het verrichten van privaatrechtelijke rechtshandelingen
      door het college van de centrumgemeente, waarbij het bepaalde in de vorige leden
      van toepassing is.11. Bij tegenstrijdigheid tussen het bepaalde in de Regeling
      en de dienstverleningsovereenkomst, prevaleren de bepalingen van de regeling
      boven de dienstverleningsovereenkomst.
