  bevoegdheden:
  - kop_artikel: Artikel 5 Bevoegdheidstoedeling college en burgemeester
    inhoud_artikel: 1. Het college en de burgemeester van de gastgemeente zullen bij
      afzonderlijk mandaatbesluit de bevoegdheden die samenhangen met de taken zoals
      vermeld in artikel 4 opdragen aan de overeenkomstige bestuursorganen. De gastgemeente
      kan instructies verbinden aan dit mandaat.2. Aan het bestuur van de centrumgemeente
      worden geen bevoegdheden overgedragen.3. In afwijking van het tweede lid worden,
      met inachtneming van artikel 232, vierde lid, van de Gemeentewet en artikel
      30, achtste lid van de Wet waardering onroerende zaken, aan het college van
      de centrumgemeente onderscheidenlijk de ambtenaren, genoemd in artikel 6, alle
      bevoegdheden tot heffing en invordering van gemeentelijke belastingen overgedragen,
      met inbegrip van de uitvoering van de Wet waardering onroerende zaken.
  - kop_artikel: Artikel 6 Ambtelijke bevoegdheden
    inhoud_artikel: 1. Het college van de gastgemeente wijst, met inachtneming van
      artikel 232, tweede lid onder a Gemeentewet en artikel 30, zevende lid, van
      de Wet waardering onroerende zaken de door de centrumgemeente aangewezen heffingsambtenaar
      aan als heffingsambtenaar van zijn gemeente.2. Het college van de gastgemeente
      wijst, met inachtneming van artikel 232, tweede lid onder b Gemeentewet de door
      de centrumgemeente aangewezen invorderingsambtenaar aan als invorderingsambtenaar
      van zijn gemeente.3. Het college van de gastgemeente wijst, met inachtneming
      van artikel 232, tweede lid onder c Gemeentewet de door de centrumgemeente aangewezen
      belastingambtenaar aan als belastingambtenaar van zijn gemeente.4. Het college
      van de gastgemeente wijst, met inachtneming van artikel 232, tweede lid onder
      d Gemeentewet de door de centrumgemeente aangewezen belastingdeurwaarder aan
      als belastingdeurwaarder van zijn gemeente.
