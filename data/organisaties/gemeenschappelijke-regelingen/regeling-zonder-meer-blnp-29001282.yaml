gr_meta:
  citeertitel: Regeling Zonder Meer BLNP
  doel: 1. Deze regeling heeft betrekking op de samenwerking van de deelnemende gemeenten
    binnen de vakgebieden Financiën, ICT, Juridische Zaken en HRM.2. De samenwerking
    richt zich op gezamenlijke uitvoering van taken als benoemd in bijlage 1 bij deze
    Gemeenschappelijke Regeling in de meest ruime zin. Deze taken betreffen taken
    op het gebied beleid, beheer en uitvoering.
  samenwerkingsvorm:
    value: '''Regeling zonder meer'''
