  bevoegdheden:
  - kop_artikel: Artikel 3 Taken en bevoegdheden centrumgemeente
    inhoud_artikel: 3.1 De centrumgemeente coördineert en oefent de bevoegdheden van
      de gemeenteraad uit als bedoeld in artikel 48 van de Wet op het primair onderwijs
      en in de statuten van de stichting, met uitzondering van de opheffing van scholen
      en met inachtneming van het advies van het Overlegorgaan toezicht openbaar onderwijs.3.2
      De bevoegdheden als bedoeld in het vorige lid zijn:a. Het houden van toezicht
      op de wezenskenmerken van het openbaar onderwijs;b. Het al of niet verlenen
      van goedkeuring aan de begroting en jaarrekening van de stichting wegens strijd
      met het algemeenbelang, waaronder het financiële belang van de deelnemende gemeenten;c.
      Het al of niet instemmen met de wijziging van de statuten van de stichting;d.
      Benoeming leden raad van toezicht van de stichting;e. Het ontslaan van leden
      van de raad van toezicht bij:• verwaarlozing van hun taak of onvoldoende functioneren;•
      onverenigbaarheid van functies of belangen;•wijziging van de omstandigheden
      of andere redenen op grond waarvan zijn handhaving als lid redelijkerwijs niet
      van de stichting kan worden verlangd.f. Het schorsen van leden van de raad van
      toezicht.g. Het zelf voorzien in het bestuur in geval van ernstige verwaarlozing
      door het college van bestuur of het functioneren van het college van bestuur
      in strijd met de wet.h. Het doen van een voorstel aan de raden tot ontbinding
      van de stichting op verzoek van het bestuur of in geval van ernstige verwaarlozing
      door het bestuur of het functioneren van het bestuur in strijd met de wet.3.3
      Besluiten van de centrumgemeente in het kader van de in lid 3.1 en lid 3.2 genoemde
      bevoegdheden worden niet voor een zienswijze als bedoeld in artikel 10 lid 5
      van de Wet gemeenschappelijke regelingen aan de gemeenteraden voorgelegd.3.4
      Bij de voorbereiding, uitvoering en/of evaluatie van beleid inzake de uitvoering
      van de in lid 3.1 en lid 3.2 genoemde bevoegdheden kunnen naast leden van het
      college van bestuur van de stichting, leden van de raad van toezicht van de
      stichting, leden van de (g)mr als bedoeld in artikel 2 van de statuten van de
      stichting en één of meerdere extern deskundigen worden betrokken.
