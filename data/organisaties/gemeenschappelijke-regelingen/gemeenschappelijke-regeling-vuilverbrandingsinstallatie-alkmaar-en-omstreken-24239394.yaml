  bevoegdheden:
  - kop_artikel: Artikel 5 Bevoegdheden
    inhoud_artikel: 1. Aan het bestuur van het lichaam worden ter behartiging van
      de in artikel 3 genoemde belang en ter verwezenlijking van de in artikel 4 omschreven
      taken alle bevoegdheden -met uitzondering van de verordenende bevoegdheid- toegekend
      welke op grond van de Wet milieubeheer toebehoren aan de bestuursorganen van
      de deelnemende gemeenten, evenals alle bevoegdheden van regeling en bestuur
      voortvloeiende uit de Wgr en de Gemeentewet - met uitzondering van de bevoegdheid
      andere belastingen te heffen dan bedoeld in artikel 229- en voorts met inachtneming
      van de beperkingen daarin gesteld en met inachtneming van hetgeen in deze regeling
      verder is bepaald.2. Onder de in het eerste lid bedoelde bevoegdheden worden
      in ieder geval verstaan:a. besluiten tot het oprichten van en deelnemen in rechtspersonen,
      voor zover dit past binnen het in artikel 3 gestelde belang;b. besluiten tot
      het aangaan van overeenkomsten als bedoeld in artikel 3;c. besluiten tot het
      aangaan van overeenkomsten met derden, niet zijnde deelnemers aan de regeling,
      tot het verrichten van adviserende, ondersteunende en uitvoerende werkzaamheden
      op het gebied van milieubeheerd. het ten behoeve van de deelnemers inzamelen,
      voor zover het lichaam daartoe is aangewezen, en verwerken van afvalstoffen
      als bedoeld in de artikelen 10.21 en 10.22 Wet milieubeheer.
