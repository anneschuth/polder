gr_meta:
  citeertitel: Gemeenschappelijke regeling vuilverbrandingsinstallatie Alkmaar en
    omstreken
  doel: 1. Het lichaam heeft tot doel het behartigen van het belang van de verwerking
    van de door de gemeenten ingevolge de Wet milieubeheer verkregen afvalstoffen.2.
    Het lichaam tracht dit te bereiken door het deelnemen in rechtspersonen met een
    aanverwant doel, het aangaan van overeenkomsten en al hetgeen overigens ten dienste
    is of kan zijn van het te behartigen belang.3. Ingevolge de Wet milieubeheer zijn
    aan de raden en de colleges van burgemeester en wethouders van de deelnemende
    gemeenten bevoegdheden voor de verwerking van afvalstoffen opgedragen. Deze door
    de raden en de colleges van de deelnemende gemeenten aan het lichaam overgedragen
    bevoegdheden worden door het lichaam uitgeoefend.
