  bevoegdheden:
  - kop_artikel: Artikel 5. Bevoegdheden
    inhoud_artikel: 1. Aan Regio Hart van Brabant worden de bevoegdheden overgedragen
      tot regeling, bestuur en beheer van de uitvoering van de taken als bedoeld in
      artikel 4.2. Tot de bevoegdheden behoort het vaststellen van een subsidieverordening,
      voor zover dit noodzakelijk is voor de vervulling van de taken als bedoeld in
      artikel 4, eerste lid, onder c.3. Tot de bevoegdheden horen, behoudens het bepaalde
      in lid 2, uitsluitend de bevoegdheden die bij of krachtens de wet zijn toegekend
      aan de colleges van burgemeester en wethouders van de deelnemende gemeenten,
      waaronder tevens wordt begrepen het verrichten van privaatrechtelijke rechtshandelingen,
      voor zover deze betrekking hebben op vervulling van de taken als bedoeld in
      artikel 4.4. Tot de bevoegdheden behoort ook het verstrekken van subsidie aan
      Midpoint Brabant, waaronder in ieder geval een periodieke begrotingssubsidie
      zoals bedoeld in artikel 27, lid 5.
