gr_meta:
  citeertitel: gemeenschappelijke regeling Regio Hart van Brabant 2022
  doel: De regeling heeft als doel om vanuit het beginsel van autonomie van het lokale
    bestuur:a. een overlegstructuur met bestuursbevoegdheden in te stellen en in stand
    te houden, die dient om de samenwerking tussen de deelnemende gemeenten vorm te
    geven;b. rechtens verantwoording af te kunnen leggen over de besteding van (subsidie)gelden
    die door andere overheden, instellingen en/of bedrijven met het oog op die samenwerking
    worden toegekend;c. samen te werken om regionale opgaven te identificeren en op
    basis daarvan gezamenlijk beleid op te stellen en gezamenlijke projecten te definiëren,
    te initiëren en uit te voeren, dan wel projecten ter uitvoering op te dragen,
    aan te bieden of aan te besteden aan gelieerde- en derde partijen, waaronder Midpoint
    Brabant;d. een bestuurlijke structuur in te stellen met het oog op een kwalitatief
    goede en efficiënte uitvoering van de regionale jeugdhulptaken.
