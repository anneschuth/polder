  bevoegdheden:
  - kop_artikel: Artikel 5 Taken en bevoegdheden
    inhoud_artikel: Bij deze regeling worden aan het algemeen bestuur overgedragen:a.
      de taken en bevoegdheden conform artikel 10 van de wet;b. de taken en bevoegdheden
      tot het instellen en het in stand houden van de regionale gezondheidsdienst
      conform artikel 14 van de Wet publieke gezondheid;c. de taken en bevoegdheden
      conform artikel 5, tweede lid, onder a tot en met d en artikel 6b, derde lid
      van de Wet publieke gezondheid;d. de taken en bevoegdheden tot het verschaffen
      van de mogelijkheid tot het doen schouwen van lijken conform artikel 4 van de
      Wet op de lijkbezorging;e. het opzetten en beheren van gemeenschappelijke pools
      (expertteams) van ambtenaren voor met name benoemde functies ten behoeve van
      de lokale uitvoering van de gemeentelijke processen;f. het (doen) opstellen
      en bijhouden van de geregionaliseerde draaiboeken voor de gemeentelijke processen;g.
      het aanbieden van een opleidings- en oefenprogramma en het registreren van de
      geoefendheid van de ambtenaren die in de onder sub. e genoemde pools participeren.
