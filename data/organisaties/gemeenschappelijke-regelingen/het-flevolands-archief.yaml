description:
  text: Het Flevolands Archief is een van de 12 Regionaal Historische Centra in Nederland
    en is gevestigd in Lelystad. De basis van het archief wordt gevormd door de archieven
    van het Zuiderzeeproject, de grootste polder ter wereld en één van de grootste
    waterbouwkundige projecten die ooit zijn uitgevoerd door het Rijk. Deze werkzaamheden
    zijn veelal vastgelegd op foto of film, wat resulteert in een prachtige beeldcollectie.HFA
    bewaart het geheugen van de provincie Flevoland in archieven en verschillende
    collecties. In het archief vindt u tekeningen, foto's, kranten, boeken en archieven
    over de geschiedenis van Flevoland.Het Flevolands Archief is een openbaar lichaam
    en is samenwerkingspartner voor diverse overheidsorganen. Dit zijn het Rijk, de
    Provincie Flevoland, de  gemeenten Dronten, Lelystad, Urk en Zeewolde en het waterschap
    Zuiderzeeland.
