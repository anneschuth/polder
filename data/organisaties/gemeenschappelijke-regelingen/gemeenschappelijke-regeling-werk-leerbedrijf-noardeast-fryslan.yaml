  bevoegdheden:
  - kop_artikel: Artikel 3
    inhoud_artikel: 1. Het openbaar lichaam behartigt de gemeenschappelijke en afzonderlijke
      belangen van de gemeenten op het gebied van gesubsidieerde arbeid en (onderdelen
      van) arbeidsintegratie en/of re-integratie. Het draagt zorg voor een zo doelmatige
      mogelijke uitvoering van taken en uitoefening van bevoegdheden op de voornoemde
      terreinen.2. In het kader van haar doelstelling heeft het openbaar lichaam in
      ieder geval tot taakhet in dienst nemen van personen die op grond van de Wsw
      daarvoor in aanmerkingkomen, het aanbieden van passende arbeid, het beheer van
      wachtlijsten in het kadervan de Wsw, en de bevordering van de re-integratie
      van arbeidsgehandicapten en deuitvoering van andere wettelijke voorschriften
      en regelingen op het terrein van degesubsidieerde arbeid en/of de arbeidsintegratie.3.
      Het Algemeen en het Dagelijks Bestuur van het openbaar lichaam, ieder voor zoverbevoegd,
      hebben voorts als taak de uitvoering van alle overige in de Wsw aan degemeenten
      opgedragen taken, met uitzondering van het vaststellen vanverordeningen met
      betrekking tot de uitvoering van de taken in het kader van deWsw en daarmee
      samenhangende regelingen en wetten.4. Het openbaar lichaam kan tevens taken
      uitvoeren op het gebied van gesubsidieerdearbeid en arbeidsintegratie ten behoeve
      van andere, niet aan deze regelingdeelnemende gemeenten. Hiertoe wordt een overeenkomst
      van opdracht afgeslotentussen het openbaar lichaam en de betreffende gemeente.
  - kop_artikel: Artikel 4
    inhoud_artikel: 1. Ter verwezenlijking van de in artikel 3, eerste, tweede en
      derde lid van deze regeling genoemde belangen en taken dragen de Colleges, ieder
      voor zover bevoegd, hun bevoegdheden op grond van de Wsw en de daarmee samenhangende
      wetten en regelingen over aan het Algemeen Bestuur van het openbaar lichaam.
      Dit met uitzondering van het bepaalde in de verordeningen:a. Wachtlijstbeheer;b.
      Persoonsgebonden budgetten;c. Cliëntenparticipatie.2. Ter verwezenlijking van
      artikel 3, eerste, tweede en derde lid en artikel 4 lid 1, worden jaarlijks
      contractafspraken gemaakt tussen de Colleges en het Algemeen bestuur.
