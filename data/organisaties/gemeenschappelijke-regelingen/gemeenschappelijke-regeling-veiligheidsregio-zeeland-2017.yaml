  doel: Veiligheidsregio Zeeland behartigt de belangen van de deelnemende gemeenten
    op de volgende terreinen:a. de brandweerzorg;b. geneeskundige hulpverlening;c.
    rampenbestrijding en crisisbeheersing;d. het voorzien in een gemeenschappelijke
    meldkamer.
