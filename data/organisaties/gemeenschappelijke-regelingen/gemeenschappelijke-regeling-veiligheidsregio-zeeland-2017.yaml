  bevoegdheden:
  - kop_artikel: 'Artikel 5: Taken en bevoegdheden'
    inhoud_artikel: 1. Ter behartiging van de in artikel 4 genoemde belangen is Veiligheidsregio
      Zeeland belast met de in artikel 10, 14, 15, 16 en 17 van de Wet veiligheidsregio’s
      genoemde taken en:a. het zorg dragen voor de voorbereiding op de bestrijding
      van een epidemie van een infectieziekte behorend tot groep A als bedoeld in
      artikel 1 onder e van de Wet publieke gezondheid, alsmede op de bestrijding
      van een nieuw subtype humaan influenzavirus, waarbij ernstig gevaar voor de
      volksgezondheid bestaat;b. het vaststellen van eisen waaraan de regionale ambulancevoorziening
      op grond van artikel 7 van de Tijdelijke wet ambulancezorg dient te voldoen
      ten aanzien van de meldkamer ambulancezorg;c. het adviseren van de Minister
      van Volksgezondheid, Welzijn en Sport over vaststelling of wijziging van eisen
      als bedoeld onder b.;2. Veiligheidsregio Zeeland kan worden belast met de advisering
      bij evenementenvergunningen;3. Veiligheidsregio Zeeland heeft alle bevoegdheden
      tot regeling, bestuur en beheer die nodig zijn voor de uitvoering van de aan
      haar opgedragen taken;4. Tot deze bevoegdheden behoort het vaststellen van een
      verordening ten behoeve van het heffen en invorderen van rechten als bedoeld
      in artikel 229, eerste lid, onder b en artikel 231 van de Gemeentewet, voor
      zover deze door de bevoegde bestuursorganen is overgedragen;5. Alle bevoegdheden
      in het kader van deze gemeenschappelijke regeling, die niet aan een ander bestuursorgaan
      zijn opgedragen, behoren aan het algemeen bestuur;6. Veiligheidsregio Zeeland
      is bevoegd tot het uitvoeren van andere taken dan bedoeld in dit artikel en
      tot het verlenen van diensten voor één of meer deelnemende gemeenten of voor
      andere gemeenten, indien deze daarom verzoeken en het algemeen bestuur besluit
      tot het aangaan van de desbetreffende dienstverleningsovereenkomst;7. De uitvoering
      van de in het vorige lid bedoelde taken en het verlenen van diensten geschiedt
      op basis van een dienstverleningsovereenkomst tussen Veiligheidsregio Zeeland
      en de gemeente of gemeenten die het aangaat. In deze dienstverleningsovereenkomst
      wordt neergelegd welke prestaties Veiligheidsregio Zeeland zal leveren, de kosten
      die integraal bij de betreffende gemeente(n) in rekening worden gebracht en
      de voorwaarden voor beide partijen waaronder tot uitvoering van de taken of
      de dienstverlening wordt overgegaan.
