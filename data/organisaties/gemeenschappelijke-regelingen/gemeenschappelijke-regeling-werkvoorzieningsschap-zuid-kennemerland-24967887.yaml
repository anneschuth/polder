  citeertitel: Gemeenschappelijke regeling Werkvoorzieningsschap Zuid-Kennemerland
  doel: 1. De gemeenschappelijke regeling is getroffen ter uitvoering en behartiging
    van de gemeenschappelijke en afzonderlijke belangen van de deelnemende gemeenten
    op het gebied van de sociale werkvoorziening.2. De bedrijfsvoeringsorganisatie
    draagt gelet op de behartiging van de belangen zoals bedoeld in het eerste lid
    zorg voor een zo efficiënt en effectief mogelijke uitvoering van de bij of krachtens
    de Wet Sociale Werkvoorziening opgedragen taken.
