  bevoegdheden:
  - kop_artikel: Artikel 4 Bevoegdheden
    inhoud_artikel: 1. Ter verwezenlijking van de in artikel 3 genoemde belangen en
      in artikel 3 genoemde taken dragen de colleges hun bevoegdheden op grond van
      de Wet Sociale Werkvoorziening en de daarmee samenhangende wetten en regelingen
      over aan het bestuur van de bedrijfsvoeringsorganisatie, behoudens de beleidsmatige
      bevoegdheden die met de uitoefening van deze bevoegdheden verbonden zijn.2.
      De werkzaamheden worden nader geduid in dienstverleningsovereenkomsten.3. Aan
      het werkvoorzieningsschap worden geen verordenende bevoegdheden ingevolge de
      Wet Sociale Werkvoorziening en de uit deze wet voortvloeiende wettelijke voorschriften
      toegekend.
