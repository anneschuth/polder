description:
  text: Solido is een Gemeenschappelijk Regeling (GR), ontstaan als samenwerkingsverband
    voor IT-diensten van gemeenten. Onze GR heeft 8 deelnemers die feitelijk onze
    eigenaren zijn.Deze deelnemers zijn de gemeenten Heerlen, Kerkrade, Landgraaf,
    Brunssum, Voerendaal, Simpelveld, Beekdaelen en de Veiligheidsregio Zuid-Limburg.
    Daarnaast hebben we nog diverse klanten waar wij enkele of meerdere IT-diensten
    aan leveren.Omdat schaalgrootte van wezenlijk belang is om zo efficiënt en goedkoop
    mogelijk ons werk te doen, staan wij open voor nieuwe klanten en deelnemers. Heeft
    u interesse in onze dienstverlening of heeft u een ander vraagstuk, neem dan contact
    met ons op.
