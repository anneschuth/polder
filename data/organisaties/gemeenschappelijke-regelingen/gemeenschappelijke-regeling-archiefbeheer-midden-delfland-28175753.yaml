  bevoegdheden:
  - kop_artikel: Artikel 2. Taken van de deelnemers.
    inhoud_artikel: 1. Het gemeentebestuur van Midden-Delfland draagt zorg voor het
      navolgende:a. benoeming van de gemeentearchivaris van Delft tot gemeentearchivaris,
      als bedoeld in artikel 32 van de Archiefwet 1995, van Midden-Delfland;b. het
      vaststellen van een archiefverordening, als bedoeld in artikel 30 eerste lid
      van de Archiefwet 1995, waarin het Gemeentearchief Delft wordt aangewezen als
      archiefbewaarplaats, als bedoeld in artikel 31 van de Archiefwet 1995, van de
      gemeente Midden-Delfland, naast het depot in het gemeentehuis van Midden-Delfland;c.
      het, met inachtneming van de overbrengingstermijn in de Archiefwet 1995, overbrengen
      van de archieven van de gemeente Midden-Delfland naar het Gemeentearchief Delft,
      voor zover daar voldoende ruimte aanwezig is;d. het bij de Algemeen Rijksarchivaris
      indienen van een verzoek als bedoeld in artikel 46, derde lid, van de Archiefwet
      1995, om de zich aldaar bevindende archieven betreffende de gemeente Midden-Delfland
      over te dragen aan het Gemeentearchief Delft;e. het in staat stellen van het
      Gemeentearchief Delft om, voor zover deze situatie zich voordoet, particuliere
      archieven betreffende de gemeente Midden-Delfland op dezelfde voorwaarden als
      genoemd in deze regeling, op te nemen en te beheren.2. Het gemeentebestuur van
      Delft draagt zorg voor het navolgendeI algemeen:a. het, overeenkomstig het daartoe
      bij of krachtens de Archiefwet 1995 bepaalde, bewaren en beheren van de overgebrachte
      archieven betreffende de gemeente Midden-Delfland.II bijzonder:b. het, op verzoek
      van het gemeentebestuur van Midden-Delfland, microficheren en nader ontsluiten
      van het Bevolkingsregister, de Registers van de Burgerlijke Stand, en de Doop-,
      Trouw- en Begraafregisters van de gemeente Midden-Delfland;c. het één maal per
      jaar en verder op verzoek van het gemeentebestuur van Midden-Delfland inspecteren
      van de niet-overgebrachte archieven van de gemeente Midden-Delfland;d. het,
      op verzoek van het gemeentebestuur van Midden-Delfland, conserveren en restaureren
      van de naar het Gemeentearchief Delft overgebrachte archieven;e. het, op verzoek
      van het gemeentebestuur van Midden-Delfland, schonen en inventariseren van de
      naar het Gemeentearchief Delft overgebrachte archieven;f. het, met inachtneming
      van het daartoe bij of krachtens de Archiefwet 1995 bepaalde, beschikbaar stellen
      van de naar het Gemeentearchief Delft overgebrachte archieven, in de studiezaal
      van genoemde dienst.
