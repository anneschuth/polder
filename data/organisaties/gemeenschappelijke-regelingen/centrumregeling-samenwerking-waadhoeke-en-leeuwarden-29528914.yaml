  bevoegdheden:
  - kop_artikel: Artikel 4 - Bevoegdheden
    inhoud_artikel: 1. Het college van burgemeester en wethouders van Waadhoeke verleent
      bij separaat vast te stellen besluit mandaten, volmachten en machtigingen aan
      het college van de centrumgemeente die nodig zijn om de in het kader van deze
      Regeling te sluiten SLA en eventueel andere te sluiten overeenkomsten, die onder
      deze Regeling vallen, uit te voeren middels het Shared Service Centrum. Aan
      de SLA zal het besluit van die verleende mandaten, volmachten en machtigingen
      toegevoegd worden.2. Later verleende mandaten, volmachten en machtigingen zullen
      eveneens aan de in het eerste lid genoemde overzicht toegevoegd worden.3. Het
      college van de centrumgemeente stemt in met de verleende mandaten, volmachten
      en machtigingen, zoals bedoeld in dit artikel.
