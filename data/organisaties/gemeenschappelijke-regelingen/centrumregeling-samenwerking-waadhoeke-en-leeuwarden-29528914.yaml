  citeertitel: Centrumregeling samenwerking Waadhoeke en Leeuwarden
  doel: De regeling geeft uitvoering aan de samenwerking tussen Waadhoeke en de centrumgemeente
    om te bewerkstelligen dat de facilitaire voorzieningen (in dezen vooreerst ICT
    – voorzieningen) die zij moeten treffen, worden gerealiseerd met het oog op de
    verwezenlijking van hun gemeenschappelijke doelstellingen, te weten ter ondersteuning
    van de uitvoering van de gemeentelijke taken van openbaar belang waarvoor goede
    ICT voorzieningen een noodzakelijke voorwaarde zijn.De samenwerking tussen de
    gemeenten en bundeling van elkaars ervaring, kennis en personeel is van belang
    om de openbare dienstverlening van de gemeenten en haar burgers te kunnen garanderen
    en efficiënt uit te voeren.De gezamenlijke ICT voorzieningen zijn daarnaast onmisbaar
    in de ondersteuning van de wettelijk verplichte regionale samenwerking door gemeenten
    in het sociaal domein.
