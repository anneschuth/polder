  bevoegdheden:
  - kop_artikel: Artikel 7 Bevoegdheden
    inhoud_artikel: 1. De deelnemers dragen geen bevoegdheden over aan het openbaar
      lichaam.2. De deelnemers verlenen ieder afzonderlijk de mandaten, volmachten
      en machtigingen aan het openbaar lichaam die noodzakelijk zijn voor de uitvoering
      van de taken.
  - kop_artikel: Artikel 8 Beperking privaatrechtelijke bevoegdheden
    inhoud_artikel: Het samenwerkingsverband is behoudens instemming van de deelnemers
      niet bevoegd tot:a. het vestigen van opstal-, pand- en hypotheekrechten;b. het
      afgeven van garanties of andere waarborgen;c. het in erfpacht aannemen of uitgeven
      van roerende of onroerende zaken;d. het in eigendom aannemen of uitgeven van
      onroerende zaken;e. het oprichten van en het deelnemen in een rechtspersoon;f.
      commerciële dienstverlening aan private partijen.
