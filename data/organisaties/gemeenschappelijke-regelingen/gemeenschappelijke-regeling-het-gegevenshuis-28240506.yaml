  bevoegdheden:
  - kop_artikel: Artikel 6 Het Algemeen Bestuur
    inhoud_artikel: 1. Het Algemeen Bestuur bestaat uit de door de deelnemers A en
      deelnemers B afgevaardigde personen.2. Iedere deelnemer vaardigt één persoon
      af in het Algemeen Bestuur.3. De bevoegdheden van het Algemeen Bestuur volgen
      uit de Wet of de Regeling.
  - kop_artikel: Artikel 8 Het Dagelijks Bestuur
    inhoud_artikel: 1. Het Dagelijks Bestuur bestaat uit tenminste twee leden en de
      Voorzitter. Het Dagelijks Bestuur bestaat altijd uit een oneven aantal. Het
      Algemeen Bestuur kiest uit zijn midden de leden, met inachtneming van het gestelde
      in artikel 10, lid 1.2. De bevoegdheden van het Dagelijks Bestuur volgen uit
      de wet, deze Regeling of zijn door de deelnemers A of deelnemers B overgedragen.3.
      De leden en het aantal leden van het Dagelijks Bestuur worden zo gekozen dat
      zij gezamenlijk minder dan de helft van het totale stemrecht als bedoeld in
      artikel 7, derde lid, kunnen uitoefenen in het Algemeen Bestuur.
  - kop_artikel: Artikel 12 Taken en bevoegdheden van de Secretaris
    inhoud_artikel: 1. De Secretaris staat het Algemeen Bestuur, het Dagelijks Bestuur
      en de Voorzitter terzijde.2. De Secretaris is aanwezig tijdens de vergaderingen
      van het Algemeen Bestuur en het Dagelijks Bestuur en draagt zorg voor de notulering
      daarvan.3. Door de Secretaris worden alle stukken die van het Algemeen Bestuur
      en van het Dagelijks Bestuur uitgaan (mee-)ondertekend.4. De Secretaris is belast
      met de leiding van de ambtelijke organisatie.
