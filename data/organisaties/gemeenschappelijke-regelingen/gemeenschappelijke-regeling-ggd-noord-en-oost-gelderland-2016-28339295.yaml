  bevoegdheden:
  - kop_artikel: Artikel 5 Bevoegdheden
    inhoud_artikel: 1. Ter uitvoering van de taken, bedoeld in artikel 4, eerste en
      tweede lid, dragen de colleges hun bevoegdheden, genoemd in de wetten genoemd
      in artikel 4, eerste en tweede lid, over aan het bestuur van de GGD.2. Onderdeel
      van een verzoek als bedoeld in artikel 4, derde lid, en een besluit als bedoeld
      in artikel 4, achtste lid, is de wijziging in de overgedragen bevoegdheden voor
      de taken die de gemeente niet meer door de GGD wil laten uitvoeren. De regeling
      hoeft hiervoor niet te worden gewijzigd.3. Ten behoeve van de taken, bedoeld
      in artikel 4, negende lid, kan overdracht van bevoegdheden plaatsvinden op voorstel
      van het betreffende college, zonder dat hiervoor de regeling hoeft te worden
      gewijzigd.4. De directeur is toezichthouder in de zin van artikel 1.61, eerste
      lid, en artikel 2.19, eerste lid, Wet kinderopvang en kwaliteitseisen peuterspeelzalen.
      Aan de directeur komen de bevoegdheden als toezichthouder toe, genoemd in de
      Algemene wet bestuursrecht en de Wet kinderopvang en kwaliteitseisen peuterspeelzalen.5.
      Het algemeen bestuur is bevoegd tot de oprichting van en de deelneming in stichtingen,
      maatschappen, vennootschappen, verenigingen, coöperaties en onderlinge waarborgmaatschappijen,
      als bedoeld in artikel 31a van de wet.6. Het algemeen bestuur neemt het besluit,
      bedoeld in het vijfde lid, met een meerderheid van ten minste twee derde van
      de leden van het algemeen bestuur die samen ten minste twee derde van het aantal
      in het algemeen bestuur uit te brengen stemmen vertegenwoordigen.
