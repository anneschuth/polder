gr_meta:
  citeertitel: Gemeenschappelijke regeling GGD Noord- en Oost-Gelderland 2016
  doel: 'Missie: GGD Noord- en Oost-Gelderland is de gezondheidsdienst van 22 gemeenten.
    Zij bewaakt, beschermt en bevordert de gezondheid van de inwoners.Toelichting:
    • De GGD signaleert gezondheidsproblemen en -risico''s, adviseert over oplossingen
    en coördineert de uitvoering ervan. Wanneer dat gewenst is, voert hij zelf ook
    uit. • De GGD is oog en oor voor het openbaar bestuur. • De GGD richt zich in
    de eerste plaats op preventie. • De GGD doet zijn werk professioneel en betrokken,
    met veel oog voor de mensen met de grootste gezondheidsrisico''s. • De GGD werkt
    intern nauw samen en zet zich in voor een goede samenwerking met externe partners.
    • De GGD stelt zich zo objectief mogelijk op. • De GGD verricht zijn taken op
    grond van de wet of op verzoek van gemeenten, het rijk of anderen. • De GGD streeft
    effectiviteit en doelmatigheid na. • De werkzaamheden van de GGD sluiten altijd
    aan bij de kennis en competenties waarover hij beschikt. De taken van de GGD zijn:
    • Jeugdgezondheidszorg (4 - 19 jarigen) • Infectieziektebestrijding • Vaccinaties
    • Medische milieukunde • Maatschappelijke Zorg • Beleidsadvisering • Epidemiologie
    • Gezondheidsbevordering • Bevolkingsonderzoeken • Forensische zorg'
