description:
  text: In Regio Rivierenland bundelen gemeenten hun krachten. We voeren gemeentelijke
    taken uit én regionale beleidsprocessen. Dat doen we met ongeveer 80 vaste collega’s
    en 40 collega’s binnen onze flexibele schil.Wat wij doen:Met 7 diensten voeren
    we gemeentelijke taken uit, zoals leerplicht, inkoop, wmo-jeugd etc.Via onze programma’s
    en projecten in FruitDelta hebben we een aanjagende en faciliterende rol in regionale
    samenwerking op bijvoorbeeld de thema's wonen, economie, energie, arbeidsmigranten
    en mobiliteit.Binnen bedrijfsvoering ondersteunen we onze collega’s met deskundige
    en efficiënte dienstverlening, zodat zij met hun werk betekenisvol voor de samenleving
    kunnen zijn.
  url: https://www.regiorivierenland.nl/over-regio-rivierenland/
