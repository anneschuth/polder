  bevoegdheden:
  - kop_artikel: Artikel 8
    inhoud_artikel: 1. De bevoegdheden die aan het bestuur van het bedrijvenschap
      worden overgedragen, berusten bij het algemeen bestuur, tenzij bij wet of in
      deze regeling anders is bepaald.2. Het algemeen bestuur stelt de algemene financiële
      en beleidsmatige kaders vast voor de uitoefening van de taken en bevoegdheden.
      Daartoe stelt het algemeen bestuur jaarlijks in ieder geval een begroting en
      een grondexploitatieberekening vast, waartoe het dagelijks bestuur een voorstel
      doet.3. Het algemeen bestuur stelt de jaarrekening, het jaarverslag en een halfjaarrapportage
      vast.
