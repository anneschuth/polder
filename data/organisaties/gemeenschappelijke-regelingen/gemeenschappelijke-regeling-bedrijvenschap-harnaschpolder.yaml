gr_meta:
  citeertitel: Gemeenschappelijke regeling Bedrijvenschap Harnaschpolder
  doel: Het bedrijvenschap heeft tot doel bij te dragen aan een aantrekkelijk vestigingsklimaat
    voor bedrijven en het bevorderen van werkgelegenheid door middel van het aanleggen
    en exploiteren van bedrijventerreinen, waaronder het verrichten van alle taken
    die met deze doelstelling samenhangen. Onder die taken is begrepen het verwerven
    van gronden ten behoeve van de bedrijventerreinen, desnoods door middel van onteigening,
    en voorts in dat verband stichten, verwerven, vervreemden en exploiteren van bedrijfsgebouwen,
    alles in de ruimste zin van het woord.
