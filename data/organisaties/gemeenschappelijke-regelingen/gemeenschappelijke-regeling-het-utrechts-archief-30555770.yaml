  bevoegdheden:
  - inhoud_artikel: Artikel 2b1. Aan het bestuur van Het Utrechts Archief zijn de
      navolgende werkzaamheden, taken en bevoegdheden vanhet college, gedeputeerde
      staten en de Minister overgedragen:a. de beheerstaken, te onderscheiden in het
      behouden, bewerken en benutten van de archiefbescheiden dieberusten in de in
      artikel 2 genoemde archiefbewaarplaatsen;b. de taken en bevoegdheden, bedoeld
      in de artikelen 15, derde lid, 16, tweede lid, 17, 18, 19, 20, 28, 29, derdelid,
      31 en 32, derde lid, van de Archiefwet 1995;c. de bevoegdheid van de Minister
      om op grond van de artikelen 25 en 26, tweede lid, van de Archiefwet 1995de
      rijksarchivaris in de provincie aan te wijzen.d. het adviseren en het doen van
      voorstellen aan de Minister, gedeputeerde staten en het college over de takenen
      bevoegdheden, die door de Minister, gedeputeerde staten of het college worden
      uitgevoerd ingevolge deartikelen 5, 6, 7, 8, 12, 13, 15, eerste en tweede lid,
      27, 29, tweede lid, 30 en 32, tweede lid, van de Archiefwet1995, ene. het verrichten
      van door de Minister, gedeputeerde staten of het college opgedragen andere taken
      dieverband houden met de behartiging van de belangen, bedoeld in artikel 2,
      eerste en tweede lid.2. Het Utrechts Archief stelt zich tevens ten doel het
      in de archieven ondergebrachte cultureel erfgoed opactieve wijze toegankelijk
      te maken voor en onder de aandacht te brengen van een breed publiek.3. Het Utrechts
      Archief verricht namens en onder verantwoordelijkheid van gedeputeerde staten
      en het collegetaken omtrent het beheer van niet-overgebrachte archiefbescheiden
      als bedoeld in artikel 2, vierde lid.4. Besluiten van het bestuur van Het Utrechts
      Archief worden niet aan zienswijzen van de Minister, provincialestaten respectievelijk
      gemeenteraad onderworpen, tenzij de Wet gemeenschappelijke regelingen of dezeregeling
      dat expliciet voorschrijft.
