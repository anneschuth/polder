  citeertitel: Gemeenschappelijke regeling Het Utrechts Archief
  doel: De regeling wordt getroffen met het doel de belangen van de Minister, gedeputeerde
    staten en het college bij alle aangelegenheden betreffende de archiefbescheiden,
    collecties, individuele documenten en dergelijke die berusten in de rijksarchiefbewaarplaats
    in de provincie, de archiefbewaarplaats van de provincie en de archiefbewaarplaats
    van de gemeente, in gezamenlijkheid te behartigen.
