  - kop_artikel: Artikel 4.
    inhoud_artikel: 1. Het recreatieschap heeft tot taak het in onderlinge samenhang
      behartigen van het gemeenschappelijk belang van de deelnemende gemeenten voor
      wat betreft natuur en landschap, de ontsluiting, de ontwikkeling, de aanleg
      en het beheer in het kader van de openluchtrecreatie en het toerisme en het
      behouden en recreatief ontsluiten van het agrarisch open middengebied in het
      gebied.2. Aan het recreatieschap worden ter vervulling van de in lid 1 omschreven
      taak alle bevoegdheden van regeling en bestuur toegekend binnen de grens van
      artikel 30 van de Wet gemeenschappelijke regelingen.
