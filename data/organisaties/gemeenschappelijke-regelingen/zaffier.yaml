description:
  text: Je wilt graag grip houden op je eigen situatie. Maar wat als er iets gebeurt
    in je leven waardoor dit (tijdelijk) niet lukt? Je hebt bijvoorbeeld zorgen over
    je inkomen of je wilt inburgeren in Nederland. Woon je in de gemeente Alkmaar,
    Bergen, Castricum, Dijk en Waard, Heiloo of Uitgeest? Dan ondersteunt Zaffier
    je bij al je vragen over werk, geldzaken of inburgering.Zaffier ondersteunt inwoners
    bij werk, geldzaken en inburgeringMet een groot netwerk en goed opgeleide specialisten
    maken we gebruik van kansen en talenten. En gaan we voor ontwikkeling. Binnen
    en buiten de regio. Inwoners kunnen op ons terugvallen. Inwoners hebben één aanspreekpunt
    en kunnen makkelijk bij ons terecht. Fysiek of online.We kijken samen naar wat
    er nodig is. Zo houden inwoners zelf grip op de situatie en de ondersteuning die
    zij krijgen. Wetten, regels en beleid geven grenzen. Maar zijn niet allesbepalend.
    Het gaat erom dat de inwoner zelf weer verder kan. Ook al is dat met wat ondersteuning.
    Het is ons doel dat iedereen mee doet. Dat iedereen in de maatschappij een plek
    krijgt. Met genoeg financiële middelen om van te leven. Een plek waar iemand tot
    zijn recht komt. Maar tot die tijd, doen we het samen.Want samen kom je verder!
  url: https://www.zaffier.nl/de-organisatie/wie-is-zaffier
