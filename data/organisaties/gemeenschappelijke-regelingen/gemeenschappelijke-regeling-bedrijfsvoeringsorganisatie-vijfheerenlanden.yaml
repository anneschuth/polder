gr_meta:
  citeertitel: Gemeenschappelijke Regeling bedrijfsvoeringsorganisatie Vijfheerenlanden
  doel: De regeling wordt getroffen ten behoeve van het bewerkstelligen van een volledige
    ambtelijke krachtenbundeling van de drie gemeenten, gedurende de periode tot aan
    de herindeling. Daarmee beogen de gemeenten gezamenlijk kwalitatief hoogwaardige
    dienstverlening te bieden aan hun inwoners en ondernemers, waarbij de vitaliteit
    van de samenleving in deze gemeenten wordt gewaarborgd.
