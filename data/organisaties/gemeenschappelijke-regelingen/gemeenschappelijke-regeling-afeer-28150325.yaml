  bevoegdheden:
  - kop_artikel: Artikel 4. Bevoegdheden
    inhoud_artikel: 1. Aan het bestuur van het Openbaar Lichaam worden integraal alle
      bevoegdheden van de deelnemers overgedragen met betrekking tot de uitvoering
      van:a. de Wet sociale werkvoorziening, voor wat betreft de tot de doelgroep
      van de Wsw behorende ingezetenen die werkzaam zijn bij het Openbaar Lichaam;2.
      Aan het bestuur van het Openbaar Lichaam worden integraal alle bevoegdheden
      van de deelnemers gemandateerd met betrekking tot de uitvoering van:a. de Participatiewet,
      voor wat betreft de tot de doelgroep van Nieuw beschut onder de Participatiewet
      behorende ingezetenen die werkzaam zijn bij het Openbaar Lichaam;b. de Participatiewet,
      voor zover het betreft arbeidsinschakeling en beheersing van de Nederlandse
      taal, waaronder begrepen het opleggen van maatregelen, ten aanzien van personen
      die door deelnemers zijn aangemeld en die vallen onder de werking van artikel
      7, eerste lid, sub a van de Participatiewet.3. De bevoegdheden als bedoeld in
      lid 1 berusten bij het Algemeen Bestuur.4. Het Algemeen Bestuur is het bevoegd
      orgaan om, bij meerderheid van stemmen, te besluiten tot deelname aan de Werkgeversvereniging
      Samenwerkende Gemeenschappelijke Organisaties (WSGO) nu de regeling in deze
      mogelijhkheid voorziet en dat in het bijzonder aangewezen moet worden geacht
      voor de behartiging van het daarmee te dienen openbaar belang.5. Het Algemeen
      Bestuur kan toevertrouwde bevoegdheden mandateren, danwel delegeren aan het
      Dagelijks Bestuur, tenzij de aard van de bevoegdheid zich daartegen verzet.6.
      Het Dagelijks Bestuur kan een of meer leden van het Dagelijks Bestuur machtigen
      tot uitoefening van een of meer van zijn bevoegdheden, tenzij de regeling waarop
      de bevoegdheid steunt zich daartegen verzet.7. Het Dagelijks Bestuur kan toevertrouwde
      bevoegdheden mandateren aan de algemeen directeur. De mandatering vindt plaats
      in het directiestatuut.8. De gemandateerde bevoegdheden zijn opgenomen in de
      bij deze Gemeenschappelijke Regeling behorende Bijlage Bevoegdheden en Directiestatuut.
