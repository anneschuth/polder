  bevoegdheden:
  - kop_artikel: Artikel 6. Taken
    inhoud_artikel: Artikel 6. Taken1. Ter behartiging van de in artikel 5 van de
      regeling genoemde doelstelling is de Veiligheidsregio belast met de uitvoering
      van de taken en bevoegdheden, zoals genoemd in artikel 10, 25, 32, 35 en 36
      van de Wet en de overige taken en bevoegdheden die bij of krachtens wet en regelgeving
      aan de Veiligheidsregio worden opgedragen.2. De Veiligheidsregio is tevens belast
      met het organiseren van de regionale coördinatie van de gemeentelijke processen
      op het gebied van brandweerzorg, rampenbestrijding, crisisbeheersing en de geneeskundige
      hulpverlening.3. De Veiligheidsregio draagt zorg voor het bijstaan en/of verzorgen
      van de ambtelijke ondersteuning voor het gezag van de burgemeester in geval
      van een calamiteit.
  - kop_artikel: Artikel 7. Verplichtingen van de Gemeenten
    inhoud_artikel: Artikel 7. Verplichtingen van de GemeentenDe Gemeenten zijn in
      ieder geval verplicht om kosteloos de volgende faciliteiten ter beschikking
      te stellen aan de Veiligheidsregio:a. bereikbare en bruikbare bluswatervoorzieningen;b.
      toegang tot geografische en bouwkundige informatie;c. informatie over wegomleggingen
      en -afsluitingen etc.;d. informatie over relevante vergunningen;e. voor de Veiligheidsregio
      relevante informatie nodig voor een behoorlijke uitvoering van artikel 5 en
      artikel 6 van deze regeling, voortvloeiende uit handhaving en toezicht door
      de desbetreffende bestuursorganen van de Gemeenten.
  - kop_artikel: Artikel 12. Taken en bevoegdheden
    inhoud_artikel: Artikel 12. Taken en bevoegdheden1.Het algemeen bestuur van de
      Veiligheidsregio heeft tot taak:a. toezien op de uitvoering van de doelstelling,
      taken en bevoegdheden als bedoeld in artikelen 5 en 6 van de regeling:b. organiseren
      van voorbereiding en uitvoering van eigen besluitvorming;c. beheer van de organisatie
      van de Veiligheidsregio;2.Het algemeen bestuur van de Veiligheidsregio is bevoegd
      te besluiten tot:a. het nemen van alle beslissingen op het gebied van personeel
      en organisatie van de Veiligheidsregio;b. het vaststellen van een mandaatregeling
      voor nader door haar aan te geven onderwerpen en/of taken en bevoegdheden;c.
      de oprichting van en de deelneming in stichtingen, maatschappen, vennootschappen,
      verenigingen, coöperaties en onderlinge waarborgmaatschappijen, dan wel het
      ontbinden daarvan of het beëindigen van de deelname daaraan, als omschreven
      in artikel 31a van de Wet gemeenschappelijke regelingen.
