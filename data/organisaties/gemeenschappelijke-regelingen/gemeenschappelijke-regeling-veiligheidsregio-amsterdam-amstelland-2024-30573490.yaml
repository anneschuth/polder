  citeertitel: Gemeenschappelijke Regeling Veiligheidsregio Amsterdam-Amstelland 2024
  doel: De Veiligheidsregio heeft tot doel om ter behartiging van de belangen van
    de Gemeenten:a. uitvoering te geven aan de Wet;b. uitvoering te geven aan de Tijdelijke
    wet ambulancezorg;c. uitvoering te geven aan de Wet Publieke Gezondheid;d. de
    organisatie van de regionale taken crisisbeheersing, brandweerzorg in stand te
    houden en het voorzien in de meldkamerfunctie;e. de voorbereiding op het gebied
    van crisisbeheersing regionaal te coördineren, waaronder het beheer op bevolkingszorg
    en deels van crisiscommunicatie in samenwerking met de gemeente Amsterdam.
