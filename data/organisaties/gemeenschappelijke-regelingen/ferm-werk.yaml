description:
  text: Ferm Werk is opgericht als de uitvoeringsorganisatie van de gemeenten Woerden,
    Bodegraven-Reeuwijk, Oudewater en Montfoort voor de Participatiewet, de Wet sociale
    werkvoorziening (Wsw) en de Wet inburgering 2021. Ferm Werk bestaat in de huidige
    vorm sinds 1 januari 2014 en is sindsdien de rechtsopvolger van De Sluis Groep,
    uitgebreid met de activiteiten van de afdelingen Werk & Inkomen van de 4 gemeenten.
  url: https://www.fermwerk.nl/over-ferm-werk
