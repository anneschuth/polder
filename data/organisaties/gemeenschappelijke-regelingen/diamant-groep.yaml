description:
  text: De Diamant-groep is een ontwikkel- en werkbedrijf met als doel mensen met
    een afstand tot de arbeidsmarkt actief te laten deelnemen aan de samenleving.
    Hierbij werken wij nauw samen met gemeenten in de regio. Bij de uitvoering van
    de Participatiewet zoeken wij actief naar nieuwe initiatieven en ideeën.
