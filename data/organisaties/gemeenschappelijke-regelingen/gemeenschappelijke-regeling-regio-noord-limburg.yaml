  bevoegdheden:
  - kop_artikel: Artikel 6 - Bevoegdheden
    inhoud_artikel: 1. De deelnemers dragen geen bevoegdheden over aan het samenwerkingsverband,
      met uitzondering van de bevoegdheid van de colleges tot:a. het vaststellen van
      subsidieregelingen voor investerings- en stimuleringsfondsen en het op basis
      daarvan verlenen van subsidies, en;b. het vaststellen en actualiseren van een
      uitvoeringsprogramma.2. De bevoegde organen van de deelnemende gemeenten verlenen
      ieder afzonderlijk de voor de uitvoering van deze regeling benodigde mandaten,
      volmachten en machtigingen aan het samenwerkingsverband.
