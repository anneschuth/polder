gr_meta:
  doel: De regeling wordt getroffen in het belang van:• het op interregionaal, nationaal
    en internationaal niveau positioneren, handhaven en uitbouwen van het profiel
    van de regio Noord-Limburg als gezondste regio;• het creëren van een optimale,
    regionale (beleids)afstemming tussen de gemeenten;• het stimuleren van het vestigings-
    en verblijfsklimaat voor inwoners en bedrijven in de regio Noord-Limburg;• het
    organiseren van een adequate vorm van samenwerking tussen overheid en maatschappelijke
    partners ter behartiging van de gezamenlijke belangen op de thema's zoals die
    nader worden uitgewerkt in het uitvoeringsprogramma.
