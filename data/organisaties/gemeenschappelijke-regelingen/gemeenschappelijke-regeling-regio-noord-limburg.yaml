description:
  text: De acht Noord-Limburgse gemeenten werken als rn-l samen om hun gezamenlijke
    ambitie in de praktijk te brengen. Het belangrijkste doel? Van Noord-Limburg de
    Gezondste Regio maken.
  url: https://rn-l.nl/wat-is-rn-l/
