description:
  text: Het Noordelijk Belastingkantoor is een overheidsorganisatie die belasting
    heft en int voor waterschappen en gemeenten.WaterschapsbelastingWoont u in het
    gebied van de waterschappen Hunze en Aa’s, Noorderzijlvest of Wetterskip Fryslân?
    Dan krijgt u de aanslag waterschapsbelastingen van het Noordelijk Belastingkantoor.Gemeentelijke
    belastingenWoont u in de gemeente Groningen, Eemsdelta, Noordenveld, Oldambt of
    Pekela? Dan krijgt u van ons de aanslag voor de waterschapsbelastingen, gemeentelijke
    belastingen en uw WOZ-waarde.KwijtscheldingsgemeentenVoor een groot aantal gemeenten
    in Noord-Nederland handelen wij ook de kwijtscheldingsverzoeken af.
