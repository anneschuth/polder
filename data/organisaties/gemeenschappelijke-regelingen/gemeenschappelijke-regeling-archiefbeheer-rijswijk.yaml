  bevoegdheden:
  - kop_artikel: Artikel 2. Taken van de deelnemers.
    inhoud_artikel: 1. Het gemeentebestuur van Rijswijk draagt zorg voor het navolgende:a.
      het benoemen van de gemeentearchivaris van Delft tot gemeentearchivaris, als
      bedoeld in artikel 32 van de Archiefwet 1995, van Rijswijk;b. het vaststellen
      van een archiefverordening, als bedoeld in artikel 30 eerste lid van de Archiefwet
      1995, waarin het Gemeentearchief Delft wordt aangewezen als archiefbewaarplaats,
      als bedoeld in artikel 31 van de Archiefwet 1995, van de gemeente Rijswijk,
      naast het depot in het gemeentehuis van Rijswijk;c. het, met inachtneming van
      de overbrengingstermijn in de Archiefwet 1995, overbrengen naar het Gemeentearchief
      Delft van de archieven van de gemeente Rijswijk, benevens de aan de gemeente
      Rijswijk geschonken of in bewaring gegeven archieven, inclusief de bijbehorende
      beheersdocumtenen, toegangen en nadere toegangen;d. het in staat stellen van
      het Gemeentearchief Delft om particuliere archieven betreffende de gemeente
      Rijswijk op te nemen en te beheren, onder dezelfde voorwaarden als genoemd in
      deze regeling, voor zover de jaarlijkse aanwas niet groter is dan 10% van de
      totale omvang van de archieven onder deze regeling begrepen.2. Het gemeentebestuur
      van Delft draagt zorg voor het navolgende:a. het, overeenkomstig het daartoe
      bij of krachtens de Archiefwet 1995 bepaalde, opnemen, bewaren en beheren van
      de overgebrachte archieven betreffende de gemeente Rijswijk, benevens de aan
      de gemeente Rijswijk geschonken of in bewaring gegeven archieven;b. het, met
      inachtneming van het daartoe bij of krachtens de Archiefwet 1995 bepaalde, aan
      het publiek beschikbaar stellen van de archieven onder deze regeling begrepen.c.
      het behartigen van inspectie en advisering ten aanzien van de niet-overgebrachte
      archieven van de gemeente Rijswijk.3. Het gemeentebestuur van Delft draagt bovendien,
      doch slechts na overleg en wederzijdse instemming, zorg voor het navolgende:a.
      het microficheren en/of digitaliseren en op internet plaatsen van de archieven
      onder deze regeling begrepen;b. het conserveren en restaureren van de archieven
      onder deze regeling begrepen;c. het schonen en inventariseren van de archieven
      onder deze regeling begrepen;d. het opnemen van gemeentelijke en particuliere
      archieven uit Rijswijk, voor zover de toename meer bedraagt dan 10% van de totale
      omvang van de archieven onder deze regeling begrepen.
