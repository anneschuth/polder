  citeertitel: Gemeenschappelijke Regeling Bedrijfsvoeringsorganisatie Ingenieursbureau
    Krimpenerwaard
  doel: 1. Het doel van deze regeling is om, met inachtneming van de autonomie van
    de deelnemers, door middel van samenwerking op het gebied van bedrijfsvoering
    en uitvoering, kwaliteits-, schaal- en efficiëntievoordelen te behalen waardoor
    de deelnemers beter in staat zijn zich te focussen op hun kerntaken.2. Het te
    behartigen belang richt zich op de sturing en beheersing van ondersteunende processen
    (bedrijfsvoering) en uitvoeringstaken op het gebied van weg- en waterbouw van
    het grondgebied van de deelnemers.
