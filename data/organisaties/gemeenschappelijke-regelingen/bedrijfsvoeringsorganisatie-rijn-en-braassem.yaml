    en doelmatige uitvoering van de taken van de gemeenten op het gebied van informatievoorziening,
    automatisering en andere niet overheidstaken en het daarbij vergaand ontdubbelen
    van ICT functionaliteit, waardoor de gemeenten beter in staat zijn zich te focussen
    op hun kerntaken.
