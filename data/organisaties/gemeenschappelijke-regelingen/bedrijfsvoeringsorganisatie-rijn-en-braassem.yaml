  bevoegdheden:
  - kop_artikel: Artikel 5 Bevoegdheden bedrijfsvoeringsorganisatie
    inhoud_artikel: 1. De gemeenten dragen geen bevoegdheden over aan de bedrijfsvoeringsorganisatie,
      maar kunnen ter verwezenlijking van de in artikel 4 genoemde taken bevoegdheden
      mandateren, volmachten en machtigingen verlenen aan de bedrijfsvoeringsorganisatie.2.
      Mandaat wordt niet eerder verleend dan nadat het bestuur daarmee heeft ingestemd.3.
      Ondermandaat is toegestaan tenzij dat uitdrukkelijk is voorbehouden.4. De gemeenten
      dragen ieder voor zich zorg voor de vaststelling van de benodigde mandaten,
      volmachten en machtigingen die het bestuur van de bedrijfsvoeringsorganisatie
      nodig heeft voor de uitoefening van zijn taken.5. Er wordt een register bijgehouden
      van de overeenkomstig het eerste en tweede lid gemandateerde bevoegdheden.
