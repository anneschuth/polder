  valid_from: '1900-01-01'
description:
  text: 'Cure Afvalbeheer is een samenwerkingsverband van de gemeenten Eindhoven,
    Geldrop-Mierlo en Valkenswaard. Zo’n 110 medewerkers zijn dagelijks in de weer
    om van ruim 147.500 huishoudens het afval in te zamelen. We legen niet alleen
    de grijze, groene en ondergrondse containers, maar zorgen ook voor de gescheiden
    inzameling van oud papier, kunststof en glas. Ook beheren we 4 milieustraten waar
    inwoners terecht kunnen met grof afval en klein chemisch afval.Bij Cure zijn we
    er al een tijdje uit; afval is een grondstof voor iets nieuws. Samen willen we
    naar een afvalloze maatschappij. Daarom hebben we bij de bouw van onze nieuwe
    milieustraat en hoofdkantoor in Eindhoven veel hergebruikte materialen toegepast.
    Vanaf december 2020 is dit de nieuwe uitvalbasis voor onze medewerkers. Een plek
    waar iedereen zich thuis en welkom voelt: open, transparant met deuren die altijd
    open staan. Passend bij de cultuur van onze organisatie.Cure Afvalbeheer is geen
    commercieel bedrijf maar een zogenaamde gemeenschappelijke regeling (GR: samenwerking
    met meerdere gemeentes) die de afvalinzameling en verwerking voor en namens de
    gemeenten Valkenswaard, Geldrop-Mierlo en Eindhoven doet. Het bestuur van de GR
    Cure bestaat dan ook uit de vertegenwoordigende wethouders van deze drie gemeenten.
    De taken van de afvalinzameling en verwerking zijn formeel aan de GR Cure overgedragen.Cure
    voert haar taken uit op basis van de vastgestelde Afvalstoffenverordeningen en
    gemeentelijk beleid namens de deelnemende gemeenten uit.'
