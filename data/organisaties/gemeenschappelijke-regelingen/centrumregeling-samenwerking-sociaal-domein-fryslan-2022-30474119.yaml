  bevoegdheden:
  - kop_artikel: Artikel 5 - Bevoegdheden centrumgemeente
    inhoud_artikel: 1.Het college en de burgemeester van de centrumgemeente wordt
      bij dezen mandaat, volmacht en machtiging verleend om namens het college en
      de burgemeester van elke gastgemeente alle besluiten te nemen, privaatrechtelijke
      rechtshandelingen, en feitelijke handelingen te verrichten ter uitvoering van
      de functies, genoemd in artikel 4 ten behoeve van de taken, bedoeld in het eerste
      lid, onder a tot en met o.2.Ten aanzien van de onderwerpen die jaarlijks – tegelijk
      met het bespreken van de begroting - in het portefeuillehouders overleg worden
      voorzien van een zwaarwegend advies (conform artikel 12 lid 2), is het het college
      en de burgemeester van de centrumgemeente enkel toegestaan om de in het eerste
      lid genoemde bevoegdheden uit te oefenen, nadat het portefeuillehouders overleg
      daarover een zwaarwegend advies heeft kunnen geven aan het college en de burgemeester
      van de centrumgemeente. Het college en de burgemeester van de centrumgemeente
      mogen slechts afwijken van het zwaarwegend advies indien zij deze afwijking
      schriftelijk gemotiveerd onderbouwen. Bij gebreke van overeenstemming dan wel
      tijdig advies, beslist het college van de centrumgemeente. Het portefeuillehouderoverleg
      kan nadere regels stellen omtrent de procedure voor het tot stand komen van
      het zwaarwegend advies.3.Ten aanzien van de bevoegdheden die in dit artikel
      in mandaat, volmacht en machtiging worden opgedragen aan het college respectievelijk
      de burgemeester van de centrumgemeente, kan dit college respectievelijk de burgemeester
      ondermandaat, volmacht of machtiging verlenen aan medewerkers van de centrumgemeente.4.De
      bevoegdheid van het college en de burgemeester van de centrumgemeente, op basis
      van het eerste lid, om een overeenkomst met een aanbieder aan te gaan of een
      beschikking af te geven voor inkoop, strekt ten hoogste tot het bedrag dat elke
      gemeente als budget voor inkoop via het portefeuillehouderoverleg Algemeen en
      Middelen beschikbaar stelt.5.Ten aanzien van de besluitvorming binnen deze regeling
      geldt:a.De centrumgemeente besluit zelfstandig in mandaat en dus zonder consultatie
      vooraf; dit betreft taken met wettelijke verplichte samenwerking met uitzondering
      van de gevallen waar het budgetrecht van de raad van de gastgemeente wordt gevraagd,
      waarvoor het recht van consultatie als bedoeld bij (b) geldt, ofwel;b.De centrumgemeente
      neemt een voorgenomen besluit welke ter consultatie aan de andere gemeenten
      wordt voorgelegd; de centrumgemeente neemt vervolgens op basis van de consultatie
      een besluit, ofwel;c.De centrumgemeente komt in samenwerking met de andere gemeenten
      tot een besluit;d.De centrumgemeente bereidt in geval van onderwerpen buiten
      het mandaat van de centrumgemeente een besluit voor welk besluit na overeenstemming
      in het portefeuillehoudersoverleg door alle colleges van de gastgemeenten en
      centrumgemeente wordt genomen. Daar waar het de bevoegdheden van de gemeenteraden
      betreft wordt het besluit door de gemeenteraden van de gastgemeentes en centrumgemeente
      genomen.6.Besluitvorming over alle onderwerpen die niet vallen in één van de
      hiervoor genoemde categorieën vindt plaats door de centrumgemeente op basis
      van het mandaat in overeenstemming met het bepaalde in dit artikel.
