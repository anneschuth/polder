gr_meta:
  citeertitel: Centrumregeling samenwerking Sociaal Domein Fryslân 2022
  doel: De regeling wordt getroffen om de afspraken vast te leggen die de Friese gemeenten
    hebben gemaakt met het oog op de gezamenlijke uitvoering door centrumgemeente
    en gastgemeenten van de wettelijke taken waarvoor gemeenten wettelijk verplicht
    moeten samenwerken alsmede van de taken waarvoor gemeenten vrijwillig kunnen samenwerken
    op een doelmatige en doeltreffende wijze.De taken zijn de wettelijke taken op
    het terrein van jeugdhulp, maatschappelijke ondersteuning en participatie en de
    functies voor deze taken zien op beleidsvoorbereiding, de inkoop, het contractmanagement
    en -beheer en de uitvoering en het financieel-administratief verwerken alsmede
    het cliëntenbeheer.
  samenwerkingsvorm:
    value: '''Regeling zonder meer'''
    afkorting: RZM
