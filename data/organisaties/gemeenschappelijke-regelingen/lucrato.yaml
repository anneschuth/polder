description:
  text: We openen kansen voor kandidaten, werkgevers én de samenleving. Voor de gemeenten
    Apeldoorn, Epe en Heerde helpen we mensen vanuit de Participatiewet duurzaam aan
    werk. De naam Lucrato staat voor ‘winst’.Wij geloven dat werken op meerdere manieren
    winst oplevert. Sociale, maatschappelijke en economische winst. Winst voor werkzoekenden
    én voor werkgevers.
