  bevoegdheden:
  - kop_artikel: 'Artikel 3: Gemeenschappelijke rekenkamer'
    inhoud_artikel: Er dient een gemeenschappelijk orgaan te worden opgericht door
      middel van een gemeenschappelijke regeling, omdat dit zo is voorgeschreven in
      artikel 81l van de Gemeentewet. De Gemeentewet geeft aan dat onder andere de
      artikelen 1 en 8, tweede lid, van de Wet gemeenschappelijke regelingen toegepast
      dienen te worden bij het instellen van een gemeenschappelijke rekenkamer.De
      Gemeentewet geeft een regeling voor de decentrale rekenkamer. Deze is met name
      terug te vinden in hoofdstukken IVa (De rekenkamer) en XIa (De bevoegdheid van
      de rekenkamer). De gemeente mag daar bij verordening niet van afwijken. Om te
      onderstrepen dat dit ook geldt voor de gemeenschappelijke rekenkamer in een
      gemeenschappelijke regeling, wordt hiernaar in dit artikel verwezen.Het gemeenschappelijk
      orgaan is genaamd Rekenkamer Wassenaar, Voorschoten, Oegstgeest en Leidschendam-Voorburg
      maar kan ook worden aangeduid als de Rekenkamer [naam eigen gemeente] of de
      Rekenkamer met daarachter de naam van één van de andere deelnemende gemeenten.Een
      gemeenschappelijk orgaan bezit anders dan een openbaar lichaam geen rechtspersoonlijkheid.
      Het kan dus niet zelfstandig deelnemen aan het maatschappelijk verkeer en bijvoorbeeld
      geen arbeidsovereenkomsten sluiten. Personeel dat werkt voor een gemeenschappelijk
      orgaan moet dus altijd in dienst zijn van één of meer van de deelnemende partijen.
      Een ander verschil is dat het gemeenschappelijk orgaan maar één bestuur heeft
      en niet zoals het openbaar lichaam een algemeen bestuur, een dagelijks bestuur
      en een voorzitter.
