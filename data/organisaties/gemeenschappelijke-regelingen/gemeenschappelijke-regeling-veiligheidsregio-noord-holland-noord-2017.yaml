  bevoegdheden:
  - kop_artikel: Artikel 5
    inhoud_artikel: 1. De Veiligheidsregio heeft alle bevoegdheden tot regeling en
      beheer die nodig zijn voor de uitvoering van de aan de Veiligheidsregio overgedragen
      taken.2. De Veiligheidsregio heeft de bevoegdheid om, ter uitvoering van het
      in artikel 3 genoemde belang , deel te nemen aan gemeenschappelijke regelingen
      en privaatrechtelijke rechtspersonen op te richten en hieraan deel te nemen.3.
      De Veiligheidsregio is bevoegd op basis van een daartoe af te sluiten overeenkomst,
      ter uitvoering van het in artikel 3 genoemde belang, tot het op verzoek en ten
      behoeve van één of meerdere deelnemers en/of derden uitvoeren van taken dan
      wel verrichten van diensten.4. Een overeenkomst als bedoeld in het derde lid
      vermeldt de wijze van kostenverrekening en de overige voorwaarden.
