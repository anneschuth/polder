description:
  text: De Werkorganisatie Druten Wijchen is een samenwerkingsverband tussen de gemeenten
    Druten en Wijchen. Wij trekken samen op om de uitdagingen in ons gebied aan te
    pakken. Zo willen we het wonen, werken en ondernemen voor inwoners, ondernemers
    en maatschappelijke organisaties in de gemeenten Druten en Wijchen zo prettig
    mogelijk maken. Nu én in de toekomst. Samen maken we het verschil.
  url: https://www.werkorganisatiedrutenwijchen.nl/organisatiestructuur
