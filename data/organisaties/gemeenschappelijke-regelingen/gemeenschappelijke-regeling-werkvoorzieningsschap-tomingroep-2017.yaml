  citeertitel: Gemeenschappelijke regeling Werkvoorzieningsschap Tomingroep 2017
  doel: Het Werkvoorzieningsschap Tomingroep heeft tot doel voor de colleges van de
    deelnemende gemeenten de wet sociale werkvoorziening uit te voeren. In het kader
    van deze doelstelling heeft het Schap tot taak het in dienst nemen van personen,
    die op grond van de wet daarvoor in aanmerking komen.
