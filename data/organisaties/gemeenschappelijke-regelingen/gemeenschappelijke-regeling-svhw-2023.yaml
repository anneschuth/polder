gr_meta:
  citeertitel: Gemeenschappelijke Regeling SVHW 2023
  doel: De Regeling wordt getroffen in het belang van een zo doelmatig mogelijke uitvoering
    van werkzaamheden met betrekking tot:a. de heffing en invordering van belastingen,
    heffingen en rechten;b. de Wet waardering onroerende zaken;c. de Wet basisregistraties
    adressen en gebouwen;d. de Wet kenbaarheid publiekrechtelijke beperkingen onroerende
    zaken;e. de administratie van vastgoedgegevens;f. het verstrekken van vastgoedgegevens
    aan de Deelnemers en derden.
