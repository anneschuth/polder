  bevoegdheden:
  - kop_artikel: Artikel 4 Bevoegdheden
    inhoud_artikel: 1. Ter behartiging van de in artikel 3 genoemde belangen dragen
      de Deelnemers aan het SVHW de bevoegdheden over, welke benodigd zijn voor de
      uitvoering van de werkzaamheden met betrekking tot de heffing en invordering
      van de belastingen, heffingen en rechten, de Wet waardering onroerende zaken,
      de Wet basisregistraties adressen en gebouwen en de Wet kenbaarheid publiekrechtelijke
      beperkingen, de administratie van vastgoedgegevens en het verstrekken van vastgoedgegevens
      aan de Deelnemers en derden, een en ander als aangeven in de aan deze Regeling
      gehechte bijlage, die met inachtneming van het bepaalde in het tweede lid door
      het Dagelijks bestuur wordt opgesteld en bijgehouden.2. De Deelnemers geven
      elkaar wederzijdse toestemming om de bevoegdheden als bedoeld in het eerste
      lid, voor zover die niet reeds zijn overgedragen, over te dragen aan het SVHW.
      Het Dagelijks bestuur neemt de bevoegdheden als bedoeld in de vorige volzin
      op in de bij deze Regeling behorende bijlage, zendt deze bijlage aan de Deelnemers,
      en draagt er zorg voor dat het bestuur van de gemeente Hoeksche Waard de bijlage
      zendt aan gedeputeerde staten van de provincies waarin de Deelnemende rechtspersonen
      zijn gelegen.3. Aan het SVHW worden geen verordenende bevoegdheden toegekend.
