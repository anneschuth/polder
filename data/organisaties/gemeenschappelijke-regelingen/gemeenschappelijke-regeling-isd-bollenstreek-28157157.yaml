  bevoegdheden:
  - kop_artikel: 'Artikel 5: Taak en opdracht'
    inhoud_artikel: 1. Door de colleges van de deelnemers is aan het dagelijks bestuur
      van het samenwerkingsverband de uitvoering en het vaststellen van de beleidsregels/nadere
      regels, overgedragen (gedelegeerd) van:a. de Participatiewet voor zover dit
      ziet op bijstandsverlening als bedoeld in artikel 7 lid 1 sub b van de Participatiewet,
      de tegenprestatie als bedoeld in artikel 7 lid 1 sub c van de Participatiewet,
      alsmede de diagnose van personen in het kader van de doorverwijzing naar het
      Servicepunt Werk en de ondersteuning bij arbeidsinschakeling in de vorm van
      de vaststelling/besluitvorming, uitbetaling en administratieve afhandeling van
      de loonkostensubsidie als bedoeld in artikel 7 lid 1 sub a juncto artikel 6
      lid 2, artikel 10b lid 9, artikel 10c en d van de Participatiewet;b. het Besluit
      bijstandsverlening zelfstandigen 2004 (Bbz);c. de Wet inkomensvoorziening oudere
      en gedeeltelijk arbeidsongeschikte werkloze werknemers (Ioaw);d. de Wet inkomensvoorziening
      oudere en gedeeltelijk arbeidsongeschikte gewezen zelfstandigen (Ioaz);e. de
      Wet inburgering (Wi) zoals deze luidde op 31 december 2012 en de Wet van 13
      september 2012 tot wijziging van de Wet inburgering en enkele andere wetten
      in verband met de versterking van de eigen verantwoordelijkheid van de inburgeringsplichtige
      (Stb. 2012, 430)f. de Wet kinderopvang en kwaliteitseisen peuterspeelzalen (Wko),
      voor zover het de individuele verstrekkingen betreft;g. de Wet maatschappelijke
      ondersteuning (Wmo) waar het betreft de maatwerkvoorziening;h. de Regeling gehandicapten
      parkeerkaart (GPK);i. de Wet gemeentelijke schuldhulpverlening alsmede de afgifte
      van verklaringen op grond van de Wet schuldsanering natuurlijke personen (Wsnp)
      en de indiening van verzoekschriften tot instelling van een bewind wegens verkwisting
      of het hebben van problematische schulden als bedoeld in artikel 432 van Boek
      1 van het Burgerlijk Wetboek;j. Algemene maatregelen van bestuur en uitvoeringsregelingen
      van de genoemde wet- en regelgeving;k. Wet- en regelgeving die in plaats treedt
      of voorheen van toepassing was van de onder a. tot en met i. genoemde wet- en
      regelgeving, alsmede het ter zake geldende overgangsrecht.2. Door de colleges
      van de deelnemers is aan het dagelijks bestuur/directeur van het samenwerkingsverband
      volmacht/machtiging verleend tot berekening, uitbetaling en administratieve
      afhandeling van individuele jeugdhulpvoorzieningen die zijn verstrekt in de
      vorm van een persoonsgebonden budget (PGB) als bedoeld in de Verordening Jeugdhulp.Daarnaast
      is door de colleges van de deelnemers aan het dagelijks bestuur/directeur van
      het samenwerkingsverband mandaat verleend voor het nemen van besluiten op aanvragen
      individuele jeugdhulpvoorzieningen als bedoeld in artikel 12 van de Verordening
      Jeugdhulp en artikel 2.3 van de Jeugdwet, het herzien en intrekken van dergelijke
      besluiten, het geheel of gedeeltelijk terugvorderen van de geldswaarden van
      ten onrechte genoten individuele jeugdhulpvoorzieningen, het nemen van besluiten
      op bezwaarschriften tegen voor omschreven besluiten en het in en buiten rechte
      vertegenwoordigen van het college bij procedures over individuele jeugdhulpvoorzieningen.3.
      Het samenwerkingsverband adviseert (het bestuur van) de deelnemers en doet beleidsvoorstellen
      over de te voeren beleidskaders op het terrein van werk & inkomen en sociale
      zekerheid, de maatschappelijke ondersteuning en gemeentelijke schulddienstverlening.
      Het samenwerkingsverband vertegenwoordigt binnen haar bevoegdheden de deelnemers
      in alle met bovengenoemde taken samenhangende overlegstructuren.4. Het samenwerkingsverband
      biedt personele ondersteuning bij de oefening voor, respectievelijk de uitvoering
      van, de van toepassing zijnde rampenplannen van de deelnemers.
  - kop_artikel: 'Artikel 6: Bevoegdheden'
    inhoud_artikel: Om de belangen genoemd in artikel 4 te kunnen verwezenlijken zijn
      door de colleges van de deelnemers de bevoegdheden en verantwoordelijkheden
      overgedragen (gedelegeerd) aan het dagelijks bestuur van het samenwerkingsverband
      ten aanzien van de uitvoering van de in artikel 5, eerste lid, nader genoemde
      wetten en regelingen, alsmede de bijbehorende algemene maatregelen van bestuur,
      algemeen verbindende voorschriften en uitvoeringsregelingen. Ten aanzien van
      de uitvoering van de in artikel 5 lid 2 omschreven taken hebben de colleges
      van de deelnemers aan het dagelijks bestuur/directeur van het samenwerkingsverband
      mandaat/volmacht/machtiging verleend overeenkomstig afdeling 10.1.1 van de Algemene
      wet bestuursrecht.
