  bevoegdheden:
  - kop_artikel: Toelichting bij artikel 8 Bureau van de ombudsman
    inhoud_artikel: Het bureau van de ombudsman is gevestigd in de gemeente Amsterdam
      en staat onder leiding van de ombudsman. De ambtenaren van het bureau worden
      aangesteld in dienst van de Gemeente Amsterdam.De Gemeentewet schrijft voor
      dat de ambtenaren van het bureau door het college moeten worden benoemd op voordracht
      van de ombudsman. In een apart besluit worden rechtspositionele bevoegdheden
      die het college van Amsterdam heeft ten aanzien van de ambtenaren van het bureau,
      gemandateerd aan de ombudsman. De ambtenaren van het bureau zijn verder uitsluitend
      verantwoording verschuldigd aan de ombudsman. Het college mag bovendien aan
      deze ambtenaren geen andere werkzaamheden opdragen.De personeelsregeling van
      de gemeente Amsterdam (PGA) is rechtstreeks van toepassing op de ambtenaren
      werkzaam bij de ombudsman. Wanneer de PGA wordt gewijzigd, dan zijn deze wijzigingen
      automatisch van toepassing op deze groep medewerkers.Voor wat betreft de overige
      bedrijfsvoeringsaspecten die het bureau van de ombudsman aangaan, geldt dat
      de ombudsman verschillende bevoegdheden van het college verkrijgt op basis van
      (onder)mandaat, -volmacht en - machtiging. Hierover wordt een apart bevoegdhedenbesluit
      genomen. Bij de uitoefening van die bevoegdheden is de ombudsman gehouden aan
      de gemeentebrede spelregels voor zover deze niet de onafhankelijke positie van
      de ombudsman schaden.
