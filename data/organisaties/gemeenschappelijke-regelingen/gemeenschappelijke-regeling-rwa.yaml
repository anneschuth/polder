  bevoegdheden:
  - inhoud_artikel: Artikel 4 Taken bedrijfsvoeringsorganisatie1. De bedrijfsvoeringsorganisatie
      heeft tot taak:– Het (doen) uitvoeren van de wet binnen het werkgebied;– Het
      adviseren van de gemeenten inzake de sociale werkvoorziening en de daarmee verband
      houdende vraagstukken.2. Ter uitvoering van de in lid 1 genoemde taken dragen
      de colleges van burgemeester en wethouders al hun bevoegdheden en verplichtingen
      uit de wet over aan de bedrijfsvoeringsorganisatie, met uitzondering van de
      artikelen 8, 9, 13, vierde lid en 14, eerste lid uit de wet, met dien verstande
      dat het bestuur van de bedrijfsvoeringsorganisatie in de plaats treedt van de
      colleges van burgemeester en wethouders.
