  doel: De doelstelling van de regeling is het behartigen van de belangen van de gemeenten
    op het terrein van de sociale werkvoorziening en meer in het bijzonder het behartigen
    van een evenwichtige ontwikkeling van de voorziening in de vraag naar aangepaste
    werkgelegenheid binnen het werkgebied.
