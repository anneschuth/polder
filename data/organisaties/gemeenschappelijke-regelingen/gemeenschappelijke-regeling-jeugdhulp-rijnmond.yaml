  bevoegdheden:
  - kop_artikel: Artikel 10
    inhoud_artikel: 1. Het algemeen bestuur wijst de uitvoerende gemeente aan, besluit
      over de omvang van de inzet door de uitvoerende gemeente en de wijze waarop
      de hiermee gemoeide kosten worden doorberekend aan de gemeenten (de verrekeningssystematiek)
      voor de vaststelling van hun financiële bijdrage.2. Het algemeen bestuur besluit
      met unanimiteit van stemmen over de verrekeningssystematiek voor de vaststelling
      van de financiële bijdragen.3. Het algemeen bestuur neemt een apart besluit
      met unanimiteit van stemmen over de omvang van de inzet door de uitvoerende
      gemeente (inclusief de inzet van de secretaris). Op basis hiervan wordt een
      overeenkomst met de uitvoerende gemeente aangegaan en worden bijbehorende mandaten
      en machtigingen verleend. Bij dit besluit heeft het lid dat namens de uitvoerende
      gemeente in het bestuur zit geen stemrecht.4. Verder behoren alle andere bevoegdheden
      in het kader van deze regeling, die niet aan een ander orgaan zijn opgedragen,
      aan het algemeen bestuur.
  - kop_artikel: Artikel 15
    inhoud_artikel: Het dagelijks bestuur is belast met:a. een voortdurend toezicht
      op al wat het lichaam aangaat;b. het voorbereiden van al hetgeen aan het algemeen
      bestuur ter overweging en beslissing zal worden voorgelegd;c. het uitvoeren
      van de besluiten van het algemeen bestuur;d. het voorstaan van de belangen van
      het lichaam bij andere overheden, instellingen of personen, waarmee contact
      voor het lichaam van belang is;e. het beheer van inkomsten en uitgaven van het
      lichaam;f. de zorg, voor zover deze niet aan anderen toekomt, voor de controle
      op het geldelijk beheer en de boekhouding;g. het nemen van alle conservatoire
      maatregelen zowel in als buiten rechte en het doen van alles wat nodig is ter
      voorkoming van verjaring en verlies van recht of bezit.h. de zorg voor de archiefbescheiden
      van de organen van het openbaar lichaam, overeenkomstig de in het kader van
      artikel 40 van de Archiefwet 1995 geldende regeling (Archiefverordening) van
      de uitvoerende gemeente;i. de zorg voor de archiefbescheiden die worden gevormd
      krachtens de aan het bestuur van de regeling gedelegeerde taken.
  - kop_artikel: Artikel 16
    inhoud_artikel: 1. Het dagelijks bestuur oefent, voor zover het algemeen bestuur
      daartoe besluit en naar door dat bestuur te stellen regels, de aan het algemeen
      bestuur wettelijk toegekende of krachtens de regeling hem toevallende bevoegdheden
      uit, met uitzondering van:a. het vaststellen en wijzigen van de begroting;b.
      het vaststellen van de rekening;c. het toetreden tot, het uittreden uit of het
      wijzigen van de gemeenschappelijke regeling overeenkomstig hoofdstuk XI van
      deze regeling;d. het oprichten van of deelnemen in stichtingen, maatschappen,
      vennootschappen en coöperatieve en andere verenigingen dan wel het ontbinden
      daarvan of het beëindigen van de deelname daaraan.2. Van besluiten van het algemeen
      bestuur als bedoeld in het eerste lid doet het dagelijks bestuur onverwijld
      mededeling aan de gemeenten.
  - kop_artikel: Artikel 19
    inhoud_artikel: 1. De voorzitter is belast met het bevorderen van een goede behartiging
      van de zaken van het gemeenschappelijk openbaar lichaam.2. De voorzitter is
      belast met de leiding van de vergaderingen van het algemeen en van het dagelijks
      bestuur.3. Hij tekent alle stukken die van het algemeen of van het dagelijks
      bestuur uitgaan.4. Voorts is hij, naast het leiden van de vergaderingen van
      het algemeen en het dagelijks bestuur, belast met:a. het terstond ter tafel
      brengen van alle tot het algemeen en/of het dagelijks bestuur gerichte brieven
      en andere stukken in de vergadering van het orgaan tot welks bevoegdheid het
      nemen van een beslissing omtrent de daarin behandelde zaak behoort;b. het daadwerkelijk
      doen uitvoeren van de besluiten van het dagelijks bestuur;c. het zo nodig instellen
      van een onderzoek, voordat bepaalde zaken ter overweging en beslissing worden
      voorgelegd aan het algemeen en/of het dagelijks bestuur.
  - kop_artikel: Artikel 20
    inhoud_artikel: 1. De voorzitter vertegenwoordigt het lichaam in en buiten rechte.2.
      Indien de voorzitter behoort tot het bestuur van een gemeente die partij is
      in een rechtsgeding waarbij het lichaam is betrokken, wordt het lichaam door
      een ander, door het dagelijks bestuur aan te wijzen lid van dit bestuur, vertegenwoordigd.
