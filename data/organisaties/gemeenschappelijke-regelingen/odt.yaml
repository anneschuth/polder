description:
  text: Omgevingsdienst Twente werkt aan een gezonde, veilige en duurzame leefomgeving,
    zodat iedereen in Twente prettig kan wonen, werken en leven.In opdracht van de
    veertien Twentse gemeenten en de provincie Overijssel voeren wij taken uit op
    het gebied van vergunningverlening, toezicht en handhaving.
  url: https://odtwente.nl/over+ons/default.aspx
