  citeertitel: Gemeenschappelijke Regeling Omgevingsdienst Brabant Noord
  doel: De regeling wordt getroffen om taken op het gebied van de fysieke leefomgeving
    op een efficiënte en doelmatige wijze uit te voeren en een bijdrage te leveren
    aan een leefbare en veilige werk- en leefomgeving in de provincie Noord-Brabant
    en in de regio Brabant Noordoost in het bijzonder.
