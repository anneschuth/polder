gr_meta:
  doel: 'Uitvoering geven aan 1. omgevingsvergunningen milieu en 2. Aan toezicht en
    handhaving van milieu. De algemene doelen van de GR zijn: versterken gezamenlijke
    daadkracht, bevordering integraal werken, ontwikkeling specifieke deskundigheden,
    vermindering van kwetsbaarheid, bevordering efficiënter werken en doelmatigheid
    handhaving. Dit doen we door versterking van de onafhankelijke functie van een
    team Handhaving.'
