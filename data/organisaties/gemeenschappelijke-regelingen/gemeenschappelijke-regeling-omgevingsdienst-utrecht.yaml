  bevoegdheden:
  - kop_artikel: Artikel 25. Algemeen bestuur
    inhoud_artikel: 1. Alle bevoegdheden die niet bij of krachtens de wet aan het
      dagelijks bestuur of de voorzitter zijn toegekend, berusten bij het algemeen
      bestuur.2. Het algemeen bestuur kan aan het dagelijks bestuur bevoegdheden overdragen,
      tenzij de aard van de bevoegdheid zich tegen overdracht verzet.3. Het algemeen
      bestuur kan het dagelijks bestuur niet overdragen de bevoegdheid tot:a. het
      vaststellen of wijzigen van de begroting;b. het vaststellen van de jaarrekening;c.
      het beslissen tot het verlenen van diensten aan andere partijen dan de colleges,
      end. het benoemen, ontslaan of schorsen van leden van het dagelijks bestuur.4.
      Het algemeen bestuur besluit slechts tot oprichting van, en de deelneming in
      stichtingen, maatschappen, vennootschappen, verenigingen, coöperaties en onderlinge
      waarborgmaatschappijen, indien dat in het bijzonder aangewezen moet worden geacht
      voor de behartiging van het daarmee te dienen openbaar belang. Het besluit wordt
      niet genomen dan nadat de raden en provinciale staten in de gelegenheid zijn
      gesteld hun wensen en bedenkingen ter kennis van het algemeen bestuur te brengen.
      Het besluit wordt genomen bij meerderheid van drie vierde van de uitgebrachte
      stemmen.
  - kop_artikel: Artikel 26. Dagelijks bestuur
    inhoud_artikel: Het dagelijks bestuur heeft in ieder geval de volgende taken en
      bevoegdheden ten behoeve van het voeren van het dagelijks bestuur van de Omgevingsdienst:a.
      beslissingen van het algemeen bestuur voorbereiden en uitvoeren;b. regels vaststellen
      over de ambtelijke organisatie van de Omgevingsdienst;c. ambtenaren in dienst
      nemen, schorsen en ontslaan;d. te besluiten tot privaatrechtelijke rechtshandelingen
      van de Omgevingsdienst, met uitzondering van privaatrechtelijke rechtshandelingen
      als bedoeld in artikel 25, vierde lid, ene. te besluiten namens de Omgevingsdienst,
      het dagelijks bestuur of het algemeen bestuur rechtsgedingen, bezwaarprocedures
      of administratief beroepsprocedures te voeren of handelingen ter voorbereiding
      daarop te verrichten, tenzij het algemeen bestuur, voor zover dit het algemeen
      bestuur aangaat, in voorkomende gevallen anders beslist.
  - kop_artikel: Artikel 27. Voorzitter
    inhoud_artikel: 1. De voorzitter:a. bevordert een goede behartiging van de taken
      van de Omgevingsdienst;b. is voorzitter van het algemeen bestuur en van het
      dagelijks bestuur;c. ondertekent alle stukken welke van het algemeen en het
      dagelijks bestuur uitgaan, end. vertegenwoordigt de Omgevingsdienst in en buiten
      rechte.2. Indien de voorzitter aan een ander volmacht of machtiging verleent
      tot vertegenwoordiging, bedoeld in het eerste lid onder d, behoeft deze machtiging
      de instemming van het dagelijks bestuur.
