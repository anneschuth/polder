gr_meta:
  doel: 1. De Omgevingsdienst behartigt, met inachtneming van hetgeen hierover in
    de regeling is bepaald, de belangen van de provincie en de gemeenten tezamen en
    van de provincie en elke gemeente afzonderlijk op het gebied van omgeving in de
    ruimste zin, voor zover de bevoegdheid daartoe de provincie of de gemeente toekomt
    en aan de Omgevingsdienst gemandateerd is.2. De Omgevingsdienst draagt zorg voor
    een organisatie ter behartiging van de in lid 1 genoemde belangen en van de ter
    uitvoering daarvan opgedragen en overeengekomen taken.
