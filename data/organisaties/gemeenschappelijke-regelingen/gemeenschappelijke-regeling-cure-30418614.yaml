gr_meta:
  citeertitel: Gemeenschappelijke regeling Cure
  doel: Artikel 3. Het doel van de gemeenschappelijke regeling.1. De gemeenschappelijke
    regeling heeft als doel het door middel van een openbaar lichaam behartigen van
    de belangen van – en het tot stand brengen van een samenwerking tussen – de aan
    de regeling deelnemende gemeenten op het terrein van het beheer van huishoudelijke
    afvalstoffen afkomstig uit de deelnemende gemeenten en de daarmee samenhangende
    taken, een en ander met inachtneming van de Wet milieubeheer en van het door de
    overheid gevoerde afvalstoffenbeleid.2. De gemeenschappelijke regeling kan daarnaast
    van één of meer deelnemende gemeenten en in samenhang daarmee van andere gemeenten
    en organisaties, opdrachten aannemen om belangen te behartigen. Uitgangspunt daarbij
    is dat de kosten en risico’s van deze specifieke belangenbehartiging worden gedragen
    door de desbetreffende gemeenten en/of organisaties en dat deze specifieke belangenbehartiging
    niet ten koste mag gaan van behartiging van de gemeenschappelijke belangen van
    de deelnemende gemeenten.
