  bevoegdheden:
  - kop_artikel: Artikel 7 Mandatering en facilitering
    inhoud_artikel: 7.1 De gemeenten in de Leidse regio dragen er zorg voor dat alle
      bevoegdheden, die nodig zijn voor het uitvoeren van de taken van centrumgemeente
      worden gemandateerd dan wel bij machtiging worden verleend aan het college van
      Leiden, een en ander met inachtneming van het bepaalde in de Gemeentewet en
      de Awb en hetgeen hierboven is opgenomen met betrekking tot wederzijdse verantwoordelijkheden
      en taken.7.2 De gemeenten in de Leidse regio dragen er gezamenlijk zorg voor
      dat alle benodigde faciliteiten, gegevensuitwisselingen en (informatie)voorzieningen,
      die in het kader van de samenwerking benodigd zijn voor de uitvoering van de
      regionale toegang, binnen redelijke termijn beschikbaar worden gesteld. Dit
      geldt visa versa ook voor de centrumgemeente richting de andere gemeenten in
      de Leidse regio.
