gr_meta:
  doel: De doelstelling van de overeenkomst is een gedragen, sluitende en zorgvuldige
    aanpak voor de doordecentralisatie van de maatschappelijke zorg in de Leidse regio
    per 1 januari 2023.a. De gezamenlijke voorbereiding en uitvoering van de Transformatie
    Maatschappelijke Zorg, waaronder het ontwikkelen en realiseren van een Ontwikkelagenda
    waarin in samenhang wordt gewerkt aan o.a.:- de preventie van dakloosheid,- de
    benodigde algemene (gesubsidieerde) voorzieningen,- een spreidingsplan van voorzieningen
    in de Leidse regio om de op- en afbouwopgave te realiseren,- de doorontwikkeling
    van de lokale toegang.b. De gezamenlijke uitvoering van ondersteunende (reguliere)
    taken, zoals de monitoring en de subsidieverstrekking.c. Afspraken over de financiën,
    die betrekking hebben op deze bovengenoemde taken.
