gr_meta:
  citeertitel: Gemeenschappelijke regeling Omgevingsdienst Groene Metropool
  doel: 1. Ter behartiging van het belang genoemd in artikel 2 brengen de deelnemers
    de uitvoering van de basistaken onder bij het openbaar lichaam.2. Tot de basistaken
    kunnen behoren coördinerende, adviserende en ondersteunende taken ten behoeve
    van de basistaken.3. Over het uitvoeren van de basistaken worden afzonderlijke
    overeenkomsten gesloten tussen een deelnemer en het openbaar lichaam.
