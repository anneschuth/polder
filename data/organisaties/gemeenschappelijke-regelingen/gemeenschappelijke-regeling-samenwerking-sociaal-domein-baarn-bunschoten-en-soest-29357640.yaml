gr_meta:
  citeertitel: Gemeenschappelijke regeling samenwerking sociaal domein Baarn, Bunschoten
    en Soest
  doel: BBS behartigt de gemeenschappelijke en afzonderlijke belangen van de deelnemers
    en hun colleges voor de uitvoering van de taken op het gebied van het sociaal
    domein, ter zake van de uitvoering van de in deze regeling benoemde wet- en regelgeving
    en het bevorderen van de kwaliteit en continuïteit van de dienstverlening, elk
    voor zover de colleges daartoe de bevoegdheden hebben opgedragen aan het bestuur
    van BBS.
