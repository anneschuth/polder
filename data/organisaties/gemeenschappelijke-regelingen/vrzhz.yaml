description:
  text: De Veiligheidsregio Zuid-Holland Zuid (VRZHZ) werkt aan een veilige en gezonde
    omgeving voor de inwoners, bedrijven en bezoekers van onze regio. Hiervoor is
    een goede samenwerking tussen alle partijen van groot belang. Niet voor niets
    is onze slogan; samen voor veiligheid. Lees meer op https://www.zhzveilig.nl/over-de-veiligheidsregio
  url: https://www.zhzveilig.nl/over-de-veiligheidsregio
