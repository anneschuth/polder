  bevoegdheden:
  - kop_artikel: Artikel 6 Het algemeen bestuur
    inhoud_artikel: "1.    Het algemeen bestuur bestaat uit de door de deelnemers\
      \ afgevaardigde personen.2.\tIedere deelnemer vaardigt één persoon af in het\
      \ algemeen bestuur.3.\tDe bevoegdheden van het algemeen bestuur volgen uit de\
      \ Wet of de Regeling.4.\tHet algemeen bestuur kan besluiten tot de oprichting\
      \ van en de deelneming in stichtingen, maatschappen, vennootschappen, verenigingen,\
      \ coöperaties en onderlinge waarborgmaatschappijen dan wel het ontbinden daarvan\
      \ of het beëindigen van deelname daaraan, indien dat in het bijzonder aangewezen\
      \ wordt geacht voor de behartiging van het daarmee te dienen openbaar belang\
      \ in het algemeen en het belang van Het Gegevenshuis in het bijzonder.5.   Het\
      \ algemeen bestuur besluit niet tot het vaststellen van meerjarige strategische\
      \ plannen dannadat de raden van de deelnemende gemeenten onderscheidenlijk het\
      \ algemeen bestuur van hetwaterschap gedurende twaalf weken in de gelegenheid\
      \ zijn gesteld om schriftelijk hun zienswijzenop het concept bij het dagelijks\
      \ bestuur naar voren te brengen.6.   Het algemeen bestuur beslist niet over\
      \ een voorstel alvorens de gemeenteraden van dedeelnemende gemeenten onderscheidenlijk\
      \ het algemeen bestuur van het waterschap omzienswijzen zijn gevraagd, wanneer\
      \ ten minste een vijfde van de gemeenteraden, het algemeenbestuur van het waterschap\
      \ inbegrepen, het dagelijks bestuur hierom verzoekt. In spoedeisendegevallen\
      \ kan het dagelijks bestuur afzien van het vragen van zienswijzen. Het dagelijks\
      \ bestuur steltde gemeenteraden en het algemeen bestuur van het waterschap hiervan\
      \ schriftelijk engemotiveerd op de hoogte.7.    Indien het tweede lid wordt\
      \ toegepast, dan hebben de gemeenteraden onderscheidenlijk hetalgemeen bestuur\
      \ van het waterschap twaalf weken de tijd hun zienswijzen bij het dagelijks\
      \ bestuur naar voren te brengen. Voorafgaande aan het nemen van het besluit\
      \ waarover de zienswijzen gegeven zijn, stelt het dagelijks bestuur de gemeenteraden,\
      \ het algemeen bestuur van het waterschap en het algemeen bestuur schriftelijk\
      \ en gemotiveerd in kennis van het oordeel over de zienswijzen, alsmede van\
      \ de eventuele conclusies die het daaraan verbindt."
  - kop_artikel: Artikel 8 Het Dagelijks Bestuur
    inhoud_artikel: 1. Het Dagelijks Bestuur bestaat uit tenminste twee leden en de
      Voorzitter. Het Dagelijks Bestuur bestaat altijd uit een oneven aantal. Het
      Algemeen Bestuur kiest uit zijn midden de leden, met inachtneming van het gestelde
      in artikel 10, lid 1.2. De bevoegdheden van het Dagelijks Bestuur volgen uit
      de wet, deze Regeling of zijn door de deelnemers opgedragen.3. De leden en het
      aantal leden van het Dagelijks Bestuur worden zo gekozen dat zij gezamenlijk
      minder dan de helft van het totale stemrecht als bedoeld in artikel 7, tweede
      lid, kunnen uitoefenen in het Algemeen Bestuur.
  - kop_artikel: Artikel 13 Taken en bevoegdheden van de secretaris
    inhoud_artikel: 1. De secretaris staat het algemeen bestuur, het dagelijks bestuur
      en de voorzitter terzijde.2. De secretaris is aanwezig tijdens de vergaderingen
      van het algemeen bestuur en het dagelijksbestuur en draagt zorg voor de notulering
      daarvan.3. Door de secretaris worden alle stukken die van het algemeen bestuur
      en van het dagelijksbestuur uitgaan (mee-)ondertekend.4. De secretaris is belast
      met de leiding van de ambtelijke organisatie.
