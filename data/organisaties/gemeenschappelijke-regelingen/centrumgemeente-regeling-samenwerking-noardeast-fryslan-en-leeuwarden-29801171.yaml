  citeertitel: Centrumgemeente regeling samenwerking Noardeast-Fryslân en Leeuwarden
  doel: 1. De regeling wordt getroffen in verband met het tot stand brengen van een
    goede facilitaire voorziening (in dezen vooreerst ICT – voorzieningen) ter ondersteuning
    van de uitvoering van de gemeentelijke taken van openbaar belang waarvoor goede
    ICT voorzieningen een noodzakelijke voorwaarde zijn.De samenwerking tussen de
    gemeenten en bundeling van elkaars ervaring, kennis en personeel is van belang
    om de openbare dienstverlening van de gemeenten en haar burgers te kunnen garanderen
    en efficiënt uit te voeren.De gezamenlijke ICT voorzieningen zijn daarnaast onmisbaar
    in de ondersteuning van de wettelijk verplichte regionale samenwerking door gemeenten
    in het sociaal domein.2. Deze gemeenschappelijke regeling is uitdrukkelijk geen
    zelfstandige rechtspersoon.3. De colleges van de centrumgemeente en Noardeast
    hebben de bevoegdheid, indien en zodra daar in de toekomst behoefte toe bestaat,
    in onderling overleg en goedvinden van de in artikel 2.1. bedoelde samenwerking
    uit te breiden met al die taken en dienstverlening die de gemeenten alsdan geraden
    voorkomen.
