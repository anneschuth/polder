names:
- value: Plassenschap Loosdrecht e.o.
  valid_from: '1900-01-01'
description:
  text: Activiteit omschrijvinga. het beheer van de eigendommen en het vaststellen
    van de kaders voor de taakuitvoering ten behoeve van uitvoerende derde partijen
    en het maken van afspraken met deze derde partijen;b. het aanleggen, onderhouden
    en eventueel exploiteren van recreatieve voorzieningen en het uitvoeren van andere
    werken verband houdend met deze taak;c. het in stand houden en verbeteren van
    het natuur- en landschapsschoon voor zover samenhangend met deze taak;d. het financiële
    beheer, contractmanagement en de communicatieve taken die benodigd zijn voor uitvoering
    van de taken bedoeld onder a. tot en met c.
