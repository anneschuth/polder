  bevoegdheden:
  - kop_artikel: Artikel 4 - Bevoegdheden
    inhoud_artikel: 1. De colleges van de gastgemeenten verlenen bij separaat vast
      te stellen besluiten mandaten, volmachten en machtigingen aan het college van
      de centrumgemeente die nodig zijn om de taken die onder deze Regeling vallen
      uit te voeren2. Het college van de centrumgemeente stemt in met de verleende
      mandaten, volmachten en machtigingen, zoals bedoeld in dit artikel.3. De gastgemeenten
      verlenen bij separaat besluit aan de centrumgemeente een alleenrecht voor de
      taken zoals genoemd in artikel 2, tweede lid.
