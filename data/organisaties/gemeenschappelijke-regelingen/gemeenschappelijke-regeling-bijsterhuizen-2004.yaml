  bevoegdheden:
  - inhoud_artikel: 1. Voor zover hiervan niet in deze regeling is afgeweken, en onverminderd
      het bepaalde in artikel 30 van de wet, komen aan de bestuursorganen van het
      samenwerkingsverband ter uitvoering van de in artikel 5 van deze regeling genoemde
      taken de bevoegdheden toe, die aan de bestuursorganen van beide deelnemende
      gemeenten behoren.2. Het samenwerkingsverband is bevoegd tot het oprichten van
      of het deelnemen in stichtingen, maatschappen, vennootschappen en coöperatieve
      of andere verenigingen, danwel het ontbinden daarvan of het beëindigen van de
      deelneming.3. Het samenwerkingsverband is bevoegd tot het heffen van rechten,
      zoals bedoeld in artikel 219, eerste lid, van de Gemeentewet en tot het heffen
      van rechten waarvan heffing krachtens bijzondere wetten geschiedt zulks met
      inachtneming van hetgeen in deze regeling is bepaald.4. Het samenwerkingsverband
      is bevoegd algemeen verbindende voorschriften vast te stellen ter uitvoering
      van de in artikel 5 van deze regeling genoemde taken.5. Het samenwerkingsverband
      is bevoegd, indien een onteigening in het belang van de ruimtelijke ordening
      en van de volkshuisvesting hiertoe aanleiding geeft, de Kroon te verzoeken tot
      onteigening over te gaan ten name van het samenwerkingsverband.6. Het samenwerkingsverband
      is bevoegd tot het aanstellen van personeel en het aangaan van detacheringsovereenkomsten
      en overeenkomsten van opdracht zoals bedoeld in artikel 28 van deze regeling,
      zulks met inachtneming van hetgeen in hoofdstuk 9 van deze regeling is bepaald.7.
      Van de bevoegdheden genoemd in het tweede lid wordt niet eerder gebruik gemaakt
      dan nadat de raden van beide deelnemende gemeenten zijn gehoord.
