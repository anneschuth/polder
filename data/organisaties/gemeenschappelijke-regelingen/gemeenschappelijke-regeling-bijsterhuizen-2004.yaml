  doel: Het samenwerkingsverband heeft tot doel het bevorderen van de economische
    ontwikkeling en werkgelegenheid in de regio Nijmegen door middel van het ontwikkelen
    en exploiteren van een kwalitatief hoogwaardig en uit financieel-economisch oogpunt
    aanvaardbaar intergemeentelijk bedrijventerrein.
