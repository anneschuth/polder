  bevoegdheden:
  - inhoud_artikel: Artikel 16 Taken en bevoegdheden dienst1. De deelnemers uit de
      gemeenten Beverwijk, Heemskerk, Uitgeest en Velsen dragen bij deze regeling
      de bevoegdheden beschreven in  Bijlage I bij deze regeling aan het algemeen
      bestuur over.2. Deelnemers en derden als bedoeld in artikel 18 kunnen aan het
      dagelijks bestuur onderscheidenlijk de directeur mandaat verlenen ter uitvoering
      van de bevoegdheden van de betreffende deelnemer.3. Het nemen van zelfstandige
      besluiten op verzoeken om schadevergoedingen die veroorzaakt zouden zijn binnen
      het kader van de uitoefening van de onder de leden 1 en 2 van dit artikel genoemde
      bevoegdheden, is aan de deelnemers voorbehouden. Het nemen van deze besluiten
      wordt noch aan de bestuursorganen van de dienst overgedragen, noch opgedragen.4.
      De dienst voert voor de deelnemers in ieder geval het basistakenpakket uit en
      kan daarnaast ook het milieutakenpakket en/of plustaken uitvoeren. Bijlage I
      benoemt welke taken de dienst uitvoert.5. Voor een uitbreiding van de door de
      dienst uit te voeren taken en/of van de aan de dienst overgedragen bevoegdheden,
      is de goedkeuring van de raad, onderscheidenlijk provinciale staten van de betreffende
      deelnemer, alsmede unanieme instemming van zowel het dagelijks bestuur als het
      algemeen bestuur vereist.6. Na besluitvorming als bedoeld in het vijfde lid
      wordt Bijlage I bij deze regeling aangepast zonder dat sprake is van een wijziging
      als bedoeld in artikel 37 van deze regeling.7. Een deelnemer kan een verzoek
      tot vermindering van het takenpakket schriftelijk ter kennis brengen van de
      dienst, hetgeen wordt gelijkgesteld met een verzoek tot gedeeltelijke uittreding
      voor wat betreft deze taken zoals bedoeld in artikel 36 van de regeling.8. Het
      voorgaande lid is niet van toepassing, wanneer wijzigingen in nationale en bovennationale
      wet- en regelgeving nopen tot wijzigingen in de bevoegdheidsverdeling ten aanzien
      van het takenpakket.
