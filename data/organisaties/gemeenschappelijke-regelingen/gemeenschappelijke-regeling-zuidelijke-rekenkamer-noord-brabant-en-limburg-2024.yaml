  citeertitel: Gemeenschappelijke regeling Zuidelijke Rekenkamer Noord-Brabant en
    Limburg 2024
  doel: De rekenkamer verricht onderzoek naar het gevoerde bestuur van de provincies
    Noord-Brabant en Limburg. Het onderzoek is gericht op doelmatigheid, doeltreffendheid
    en rechtmatigheid van het door het provinciebestuur gevoerde bestuur (wettelijke
    taak). Het maatschappelijk doel is het leveren van een bijdrage aan de kwaliteit
    en het lerend vermogen van de besturen van de provincies Noord-Brabant en Limburg.
