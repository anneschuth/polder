  citeertitel: Gemeenschappelijke regeling Historisch Centrum Overijssel
  doel: De regeling wordt getroffen met het doel de belangen van de Minister en de
    colleges bij alle aangelegenheden betreffende de archiefbescheiden, collecties,
    individuele documenten en dergelijke die berusten in de rijksarchiefbewaarplaats
    in de provincie en de archiefbewaarplaatsen van de gemeenten, in gezamenlijkheid
    te behartigen.
