  bevoegdheden:
  - kop_artikel: Artikel 2b
    inhoud_artikel: 1. Aan het bestuur van Het Historisch Centrum Overijssel zijn
      de navolgende werkzaamheden, taken en bevoegdheden van de colleges en de Minister
      overgedragen:a. de beheerstaken, te onderscheiden in het behouden, bewerken
      en benutten van de archiefbescheiden die berusten in de in artikel 2 genoemde
      archiefbewaarplaatsen;b. de taken en bevoegdheden, bedoeld in de artikelen 15,
      derde lid, 16, tweede lid, 17, 18, 19, 20, 31 en 32, eerste en derde lid, van
      de Archiefwet 1995;c. de bevoegdheid van de Minister om op grond van de artikelen
      25 en 26, tweede lid, van  de Archiefwet 1995 de rijksarchivaris in de provincie
      te benoemen, te schorsen en te ontslaan;d. het adviseren en het doen van voorstellen
      aan de Minister en de colleges over de taken en bevoegdheden, die door de Minister
      of de colleges worden uitgevoerd ingevolge de artikelen 5, 6, 7, 8, 12, 13,
      15, eerste en tweede lid, 30 en 32, tweede lid, van de Archiefwet 1995, ene.
      het verrichten van door de Minister of de colleges opgedragen andere taken die
      verband houden met de behartiging van de belangen, bedoeld in artikel 2.2. Het
      Historisch Centrum Overijssel voert bij de behartiging van de belangen, bedoeld
      in het eerste lid, het archiefbeleid en cultuurbeleid van de Minister en de
      gemeenten mede uit.3. Het Historisch Centrum Overijssel stelt zich tevens ten
      doel het in de archieven ondergebrachte cultureel erfgoed op actieve wijze toegankelijk
      te maken voor en onder de aandacht te brengen van een breed publiek.
