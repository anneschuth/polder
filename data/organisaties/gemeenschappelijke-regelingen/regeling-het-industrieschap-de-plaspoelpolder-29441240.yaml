  bevoegdheden:
  - kop_artikel: Artikel 5
    inhoud_artikel: 1. Het Industrieschap heeft tot doel - door middel van het aanleggen,
      herstructureren en exploiteren van bedrijventerreinen, waaronder het verrichten
      van alle taken die met deze doelstelling samenhangen, daaronder begrepen het
      verwerven van gronden ten behoeve van bedrijventerreinen, desnoods door middel
      van onteigening, het uitgeven (in erfpacht) van deze gronden en voorts het stichten,
      verwerven, herontwikkelen, vervreemden en exploiteren van bedrijfsgebouwen,
      alles in de ruimste zin van het woord - bij te dragen aan een aantrekkelijk
      vestigingsklimaat en het bevorderen van de werkgelegenheid.2. Onder de taak
      van het Industrieschap is niet begrepen de bij de deelnemende gemeenten berustende
      openbare taken, waaronder de reiniging en het onderhoud van openbare wegen,
      het afvoeren van water en vuilnis, de openbare verlichting, de Brandweer en
      het bouwtoezicht.3. Het Industrieschap zal bij de uitvoering van zijn taken
      zoveel mogelijk gebruik maken van diensten van de deelnemende gemeenten, die
      door de deelnemende gemeenten tegen kostendekkend tarief worden aangeboden.
      Deze afgenomen diensten komen voor rekening van het Industrieschap.4. Ten behoeve
      van de in het eerste lid vermelde taken kan het Industrieschap onder meer besluiten
      tot oprichting van en deelneming in stichtingen, maatschappen, vennootschappen,
      verenigingen, coöperaties en onderlinge waarborgmaatschappijen. Het besluit
      wordt niet genomen dan nadat de raden van de deelnemende gemeenten een ontwerpbesluit
      is toegezonden en in de gelegenheid zijn gesteld hun wensen en bedenkingen ter
      kennis van het algemeen bestuur van het Industrieschap te brengen.5. Het Industrieschap
      is bevoegd tot het verrichten van diensten, voor zover deze vallen binnen het
      kader van de in artikel 5 genoemde taken, voor andere dan de deelnemende gemeenten
      en/of derden, met een publiekrechtelijke taak en/of bevoegdheid.
  - kop_artikel: Artikel 4
    inhoud_artikel: Deze regeling heeft uitsluitend betrekking op taken en bevoegdheden
      die aan colleges zijn toebedeeld.
