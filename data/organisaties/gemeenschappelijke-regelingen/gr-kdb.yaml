description:
  text: 'De gemeenschappelijke regeling werkbedrijven Kust-, Duin- en Bollenstreek
    (GR KDB) is een gemeenschappelijke regeling van 7 deelnemende gemeenten en daarmee
    een openbaar lichaam. De regeling behartigt de belangen van de deelnemende gemeenten
    op het gebied van het uitvoeren van de Wet sociale werkvoorziening (WSW), de participatievoorziening
    beschut werk als bedoeld in artikel 10b van de Participatiewet en het plaatsen
    van werkzoekenden (re-integratie), al dan niet met een arbeidsbeperking, bij werkgevers.
    Provalu is de uitvoeringsorganisatie die de verschillende modules voor de GR KDB
    uitvoert.De GR KDB kent een modulaire opbouw waardoor gemeenten zelf beslissen
    of zij deelnemen aan één of meerdere modules. De gemeenten die deelnemen zijn:
    Hillegom, Katwijk, Lisse, Noordwijk, Oegstgeest, Teylingen en Wassenaar. Alle
    zeven gemeenten nemen deel aan de module WSW. Aan de module beschut werk en re-integratie
    nemen vijf van de zeven gemeenten deel (Katwijk, Hillegom, Lisse, Teylingen en
    Noordwijk). De samenwerking tussen GR KDB en Provalu is geregeld in een aanwijzingsbesluit,
    een samenwerkingsovereenkomst en een jaarovereenkomst.'
  url: https://www.provalu.nl/over-ons/gemeenschappelijke-regeling-kust-duin-en-bollenstreek/
