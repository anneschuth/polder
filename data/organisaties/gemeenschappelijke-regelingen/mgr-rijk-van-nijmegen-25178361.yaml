  bevoegdheden:
  - kop_artikel: Artikel 6 Bevoegdheden van het samenwerkingsverband
    inhoud_artikel: A. Module Regionaal werkbedrijf1. De deelnemers dragen geen publiekrechtelijke
      bevoegdheden - waaronder begrepen de bevoegdheid tot het vaststellen van een
      strategisch beleidskader - over aan het samenwerkingsverband, met uitzondering
      van de bevoegdheid tot het vaststellen van een verordening en beleidsregels
      over:a. het ondersteunen bij de arbeidsinschakeling;b. het aanbieden van voorzieningen;c.
      het aanbieden van opleiding en scholing;d. het verstrekken van een premie in
      verband met het verrichten van werkzaamheden;e. het verrichten van werkzaamheden
      in een beschutte omgeving.De bevoegdheid wordt uitgeoefend met inachtneming
      van het bepaalde in wet- en regelgeving en in de strategische beleidskaders
      zoals die door de raden van de deelnemende gemeenten worden vastgesteld.2. De
      deelnemers verlenen ieder afzonderlijk de mandaten, volmachten en machtigingen
      aan het openbaar lichaam die noodzakelijk zijn voor de uitvoering van de taken.B.
      Module ICTDe colleges van burgemeester en wethouders van de deelnemende gemeenten
      zoals bedoeld in artikel 5 onder B. geven aan de MGR de opdracht om de continuïteit
      en kwalitatief adequate dienstverlening op het gehele terrein van de ICT-infrastructuur
      en –voorzieningen van alle deelnemende gemeenten te verwezenlijken.
