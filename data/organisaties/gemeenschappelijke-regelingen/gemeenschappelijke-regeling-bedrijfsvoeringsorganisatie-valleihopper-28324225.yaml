gr_meta:
  citeertitel: Gemeenschappelijke Regeling Bedrijfsvoeringsorganisatie Valleihopper
  doel: De regeling is getroffen voor gemeenschappelijke behartiging van de belangen
    van de deelnemers in het kader van de uitvoering van hun bedrijfsvoeringstaken
    betreffende het Vraagafhankelijk vervoer en het OV-vangnet. De doelstelling is
    om te voldoen aan de door Gedeputeerde Staten gestelde kaders en gezamenlijke
    voordelen te realiseren door:- de kosten beter te beheersen;- de kwaliteit van
    de dienstverlening te verhogen;- de kwetsbaarheid van ondersteuning te verminderen;-
    de regionale samenwerking te verbeteren;- meer kansen te bieden aan medewerkers.
