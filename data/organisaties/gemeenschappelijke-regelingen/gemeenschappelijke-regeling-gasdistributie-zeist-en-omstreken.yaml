gr_meta:
  doel: Dit openbaar lichaam had als belang het verzorgen van de gasdistributie, tegen
    gelijke prijzen, in de deelnemende gemeenten op een veilige en efficiënte wijze,
    alsmede het verhuren van warmwaterapparatuur en het bevorderen van een doelmatig
    energiebeheer.Er is sprake van een slapend orgaan, waar kapitaal in zit. GZO ontvangt
    geen gemeentelijke bijdrage. Er bestaat nog een kleine kans op een slotuitkering
    voor de deelnemende partijen. Mocht Eneco overgaan tot afsplitsing van het netwerkbedrijf,
    dan zou er nog een bedrag uitgekeerd kunnen worden aan de deelnemers GZO, waarna
    de opheffing definitief uitgevoerd kan worden. Dit financiële belang voor de deelnemers
    is de reden dat de regeling nog formeel in stand wordt gehouden.
