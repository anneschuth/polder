  bevoegdheden:
  - inhoud_artikel: 1. Teneinde de belangen, genoemd in artikel 4, te kunnen verwezenlijken,
      zijn de bevoegdheden van de colleges, ieder voor zover zij deelnemen aan de
      samenwerkingsmodules, uit de Wet sociale werkvoorziening, alsmede uit de Participatiewet,
      voor zover deze betrekking hebben op de arbeidsinschakeling, overgedragen aan
      het bestuur van de regeling.2. Het algemeen bestuur kan in een uitvoeringsregeling
      verandering aanbrengen in de bevoegdheden, bedoeld in het eerste lid.
