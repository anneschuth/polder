description:
  text: Dethon is een Gemeenschappelijke Regeling (GR) van de drie gemeenten in Zeeuws-Vlaanderen.
    Wij voeren een aantal onderdelen van de Participatiewet uit. Een Gemeenschappelijke
    Regeling heeft een unieke manier van bedrijfsvoering. Hoe dat werkt? Dat leggen
    we graag uit. Dethon voert een aantal onderdelen van de Participatiewet uit namens
    de drie gemeenten in Zeeuws-Vlaanderen.
