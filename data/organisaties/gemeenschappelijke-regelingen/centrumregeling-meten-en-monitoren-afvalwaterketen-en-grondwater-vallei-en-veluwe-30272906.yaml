  bevoegdheden:
  - kop_artikel: Artikel 3. Centrumconstructie
    inhoud_artikel: 1. De centrumorganisatie is verantwoordelijk voor de uitvoering
      van de taken zoals deze zijn genoemd in artikel 4 van deze regeling.2. In het
      kader van hetgeen is bepaald in het eerste lid verlenen de deelnemende gemeenten
      de centrumorganisatie mandaat.3. De centrumorganisatie aanvaardt de opdracht
      tot uitvoering van de in het eerste lid genoemde taken onder mandaat en richt
      daartoe een uitvoeringsteam (UVT) in binnen de eigen organisatie.
