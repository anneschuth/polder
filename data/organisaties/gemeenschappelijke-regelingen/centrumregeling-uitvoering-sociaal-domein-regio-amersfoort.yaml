  bevoegdheden:
  - kop_artikel: Artikel 6. Taken centrumgemeente
    inhoud_artikel: 1. De centrumgemeente voert binnen het doel van de regeling de
      volgende taken uit:a. inkoop van hulp en ondersteuning en de bijbehorende implementatieactiviteiten;b.
      account- en contractmanagement;c. data en monitoring;d. vertegenwoordigen en
      ondersteunen in de (boven)regionale en landelijke overleggen jeugdhulp, Wmo
      en passend onderwijs;e. ondersteuning toezichthouden kwaliteit en rechtmatigheid
      op aanbieders;f. transformatiemanagement;g. verstrekken van subsidies en financiële
      bijdragen;h. ontvangen van (rijks)subsidies.i. zorgadministratie jeugdhulp en
      Wmo.2. De uitvoering van de taken gebeurt op basis van een mandaat van de deelnemende
      gemeente en betreft een exclusieve bevoegdheid van de centrumgemeente. De deelnemende
      gemeente voert deze taken niet zelf uit en verstrekt geen opdrachten hieromtrent
      aan derden.3. Bij unaniem besluit van de deelnemende gemeenten kan aan een deelnemende
      gemeente een vrijstelling op één of enkele van de genoemde taken worden verleend.
      De grondslag voor deze vrijstelling dient gelegen te zijn in bij wet- en regelgeving
      voorgeschreven regio-indelingen of de historische gegroeide realiteit. De verleende
      vrijstellingen zijn vastgelegd in het takenregister middels een leeg vakje.4.
      De in het eerste lid bedoelde taken worden nader uitgewerkt in het takenregister.
      Wijzigingen in het takenregister behoeven de instemming van de colleges van
      alle deelnemende gemeenten.5. Het opstellen, afstemmen, vaststellen, uitvoeren
      en evalueren van andersoortig beleid maakt geen onderdeel uit van de taken van
      de regeling.
