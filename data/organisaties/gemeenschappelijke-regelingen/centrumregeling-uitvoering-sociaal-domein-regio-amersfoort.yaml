gr_meta:
  doel: Het binnen de kaders van het (regionale) beleid van de deelnemende gemeenten
    gezamenlijk op doelmatige, efficiënte en rechtmatige wijze uitvoeren van de inkoop
    of subsidie van hulp en ondersteuning en ondersteunende taken die daaruit volgen
    voor:a. de Jeugdwet ten behoeve van de deelnemende gemeenten in de jeugdregio;b.
    de Wmo 2015 ten behoeve van de deelnemende gemeenten in de regio, inclusief de
    Centrumgemeenteopdracht beschermd wonen, maatschappelijke opvang, Vrouwenopvang
    en Veilig Thuis;c. de wet Primair Onderwijs en de wet Voortgezet Onderwijs ten
    behoeve van de deelnemende gemeenten in de regio, voor zover het betreft leerlingenvervoer.2.
    Het in partnerschap met aanbieders en samenwerkingspartners transformeren van
    het regionale zorglandschap in lijn met regionale en landelijke ontwikkelingen.3.
    (Boven)regionale afstemming om een eenduidige wijze van samenwerken te realiseren
    op jeugdhulp, Wmo en passend onderwijs.4. Het bevorderen van een doeltreffende
    samenwerking tussen de deelnemende gemeenten ten aanzien van de taken bedoeld
    in het eerste, tweede en derde lid.
