names:
- value: De Bedrijfsvoeringspartner
  abbr: DBP
  valid_from: '1900-01-01'
description:
  text: De BedrijfsvoeringsPartner verzorgt alle taken van gemeentelijke bedrijfsvoering.
    Van financiën tot HRM, van juridische advisering tot administraties, van automatisering
    en informatiebeheer tot inkoopadvies. Het bestuur is bestuurlijk verantwoordelijk
    als werkgever. Het bestuur richt zich op goed werkgeverschap en goede dienstverlening
    aan de deelnemende gemeenten. Vanuit elke deelnemende gemeente is een wethouder
    vertegenwoordigd in het bestuur. De dagelijkse leiding van De BedrijfsvoeringsPartner
    ligt bij de directeur die tevens secretaris is van het bestuur. De organisatie
    is onderverdeeld in 2 clusters; Mens & Faciliteiten en Informatisering & Automatisering.
    Ieder cluster heeft een eigen concernmanager en meerdere teams. Elk cluster en
    team heeft in principe zijn eigen focus en specialiteit, maar er wordt gewerkt
    vanuit het idee dat samenwerking over de grenzen van teams, clusters en de organisatie
    heen is een ‘must’ voor een optimaal eindresultaat.Het cluster Mens & Faciliteiten
    biedt dienstverlening voor de mens – zowel in- als extern – en voor de faciliteiten
    om het werk te kunnen doen. Dit cluster bestaat uit 8 teams; HR-services & Advies,
    HR-specialisten & Communicatie, Facilitair advies & Managementondersteuning, Facility
    services, Zorgadministratie, Uitkeringsadministratie, Financiële administratie
    en Juridische dienstverlening.Het cluster Informatisering & Automatisering biedt
    dienstverlening omtrent informatisering en automatisering. Het cluster bestaat
    uit 7 teams; Automatisering, Applicatiebeheer, Informatieadvies, Informatiediensten,
    Informatiebeheer, Financieel advies en Inkoopadvies.
