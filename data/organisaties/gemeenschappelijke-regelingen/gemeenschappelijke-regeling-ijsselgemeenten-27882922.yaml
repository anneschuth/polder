  citeertitel: Gemeenschappelijke regeling IJSSELgemeenten
  doel: De regeling wordt uitsluitend getroffen ter behartiging van de sturing en
    beheersing van ondersteunende processen en van uitvoeringstaken van de deelnemers.Doel
    van de regeling is het bewerkstelligen van een kwalitatief hoogwaardige en doelmatige
    uitvoering van de door de deelnemers aan IJSSELgemeenten opgedragen taken.
