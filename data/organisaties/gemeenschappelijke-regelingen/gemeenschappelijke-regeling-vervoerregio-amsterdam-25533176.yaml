gr_meta:
  citeertitel: Gemeenschappelijke regeling Vervoerregio Amsterdam
  doel: De Vervoerregio Amsterdam heeft tot taak, met inachtneming van hetgeen in
    de gemeenschappelijke regeling is bepaald, die belangen te behartigen, welke verband
    houden met de verkeers- en vervoerstaak die voortvloeit uit de Wet afschaffing
    plusregio's, de AMvB (Staatsblad 2014, nummer 559) en de Wet lokaal spoor. Het
    bedoelde belang betreft verkeer en vervoer.
