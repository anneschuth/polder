  bevoegdheden:
  - kop_artikel: Artikel 3. Belang, doelstelling en bevoegdheden
    inhoud_artikel: 1. WHW-bedrijven behartigt de gemeenschappelijke en afzonderlijke
      belangen van de gemeenten op het gebied van de uitvoering van de Wet sociale
      werkvoorziening, zoals die taken en bevoegdheden door de wet aan de gemeenten
      is opgedragen.2. Ter verwezenlijking van de in artikel 3, lid 1 genoemde belangen
      dragen de raden en de colleges van de gemeenten, ieder voor zover bevoegd op
      grond van de Participatiewet, Wsw, de uitvoering van de Wsw en alle daarmee
      samenhangende bevoegdheden over aan het bestuur van WHW-bedrijven.
