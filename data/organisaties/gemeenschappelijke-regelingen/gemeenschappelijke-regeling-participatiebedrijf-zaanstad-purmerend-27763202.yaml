  bevoegdheden:
  - kop_artikel: 'Artikel 10: Bevoegdheden'
    inhoud_artikel: 1. De colleges dragen de aan hen toekomende bevoegdheden uit de
      Wet sociale werkvoorziening over aan het bestuur, met uitzondering van artikel
      14 van de Wet sociale werkvoorziening. De bevoegdheid beleidsregels te stellen
      blijft toekomen aan de colleges, een en ander overeenkomstig artikel 4:81, en
      10:16, eerste lid, van de Algemene wet bestuursrecht.2. De colleges kunnen,
      direct of indirect, bevoegdheden voor de uitvoering van de Participatiewet aan
      de directeur in mandaat opdragen. Mandaten als bedoeld in de vorige zin, worden
      opgenomen in separate mandaatbesluiten. Vorenbedoelde mandaatbesluiten worden
      opgenomen in een mandaatregister.3. Aan het bestuur kunnen aanvullende bevoegdheden
      worden overgedragen door de colleges, zonder dat daarvoor de regeling hoeft
      te worden gewijzigd, een en ander met inachtneming van artikel 10, tweede lid,
      van de wet.4. Het bestuur besluit slechts tot oprichting van en de deelneming
      in stichtingen, maatschappen, vennootschappen, verenigingen, coöperaties en
      onderlinge waarborgmaatschappijen, indien dat in het bijzonder aangewezen moet
      worden geacht voor de behartiging van het daarmee te dienen belang. Het besluit
      wordt niet genomen dan nadat de raden in de gelegenheid zijn gesteld hun wensen
      en bedenkingen ter kennis van het bestuur te brengen.
