  bevoegdheden:
  - kop_artikel: Artikel 5.
    inhoud_artikel: 1. Ter uitvoering van de in artikel 4 van de regeling genoemde
      taak, dragen de colleges van de gemeenten Emmen en Coevorden aan het werkvoorzieningsschap
      over, al hun bevoegdheden en verplichtingen voortvloeiende uit de wet.2. De
      besturen van de gemeenten behouden, indien zulks naar hun oordeel gewenst is,
      de bevoegdheid om inwoners uit hun gemeenten voor te dragen bij en te plaatsen
      in werkverbanden, niet vallend onder deze regeling.3. De gemeente Borger - Odoorn
      zal de mate van overdracht van haar bevoegdheden regelen middels een aanwijzingsbesluit.
