gr_meta:
  citeertitel: Gemeenschappelijke regeling FUMO - 2016
  doel: De regeling heeft ten doel het behartigen van de belangen van de deelnemers
    bij de uitvoering van taken en bevoegdheden op het gebied van het milieu- en omgevingsrecht
    in ruime zin in het algemeen en de Wet algemene bepalingen omgevingsrecht in het
    bijzonder, alsmede taken en bevoegdheden op het terrein van vergunningverlening,
    handhaving en toezicht op grond van de in artikel 5.1 van de Wet algemene bepalingen
    omgevingsrecht genoemde wetten.
  samenwerkingsvorm:
    value: Openbaar lichaam
    afkorting: OL
