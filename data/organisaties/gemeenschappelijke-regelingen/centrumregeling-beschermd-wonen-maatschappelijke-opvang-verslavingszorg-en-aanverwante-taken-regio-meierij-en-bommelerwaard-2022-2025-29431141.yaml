  bevoegdheden:
  - kop_artikel: Artikel 5 Taken en bevoegdheden centrumgemeente
    inhoud_artikel: 1. De colleges en burgemeesters van de regiogemeenten dragen aan
      het college en burgemeester van de centrumgemeente taken op ter verwezenlijking
      van het doel, genoemd in artikel 2.2. De colleges en burgemeesters van de regiogemeenten
      geven de centrumgemeente mandaat om de in lid 5.3 genoemde taken uit te voeren,
      uiteraard begrensd door wetgeving, jurisprudentie en vastgestelde kaders.3.
      De taken van de centrumgemeente zullen zich in ieder geval richten op inkoop,
      contract- en accountmanagement, beheren van regionale financiën, toezicht en
      het uitvoeren van regionale beleidstaken.4. De taken en bevoegdheden uit lid
      3 betreffen de volgende deelgebieden en voorzieningen van het sociaal domein:a.
      beschermd wonen;b. maatschappelijke opvang;c. verslavingszorg;d. aanverwante
      taken (te weten de aanpak van personen met verward gedrag, de Wet verplichte
      GGz en de Wet zorg en dwang).5. De gemeente ’s-Hertogenbosch zal haar rol als
      centrumgemeente in de zin van de Wet Maatschappelijke Ondersteuning 2015 invullen.6.
      Het college en burgemeester van de centrumgemeente kunnen de bevoegdheden in
      lid 5.2 onder mandateren aan ambtenaren van de centrumgemeente of een uitvoerende
      organisatie.7. De centrumgemeente draagt zorg voor de archiefbescheiden conform
      de archiefregeling van de centrumgemeente.
