    en aanverwante taken regio Meierij en Bommelerwaard 2022 – 2025
  doel: In deze centrumregeling zijn de afspraken vastgelegd tussen de gemeenten uit
    de regio Meierij en Bommelerwaard over de uitvoering van de taken rondom beschermd
    wonen, maatschappelijke opvang, verslavingszorg, de aanpak van personen met verward
    gedrag, de Wet verplichte GGz en de Wet zorg en dwang (aanverwante taken). De
    gemeenten gaan daartoe de komende jaren een onderlinge samenwerking aan gericht
    op het zorgdragen voor een kwalitatief goede ondersteuningsstructuur voor de doelgroep
    van beschermd wonen, maatschappelijke opvang en aanverwante taken. Hierdoor wordt
    het behalen van schaalvoordelen, het stimuleren van de samenwerking tussen de
    gemeenten, de beheersing van de middelen en eventuele besparingen of aanvullende
    kosten en de verevening van risico’s geregeld.
