gr_meta:
  doel: Het Zorg- en Veiligheidshuis Parkstad is ingesteld ter uitvoering van specifieke
    ondersteunende, uitvoerende en beleidsprocessen en -taken op het gebied van zorg
    en veiligheid voor de deelnemers als vermeld in artikel 3 van de regeling. Overeenkomstig
    het bepaalde in artikel 5 kan het Zorg- en Veiligheidshuis Parkstad dit ook leveren
    aan niet deelnemende overheidsorganisaties, primair binnen de regio Zuid-Limburg.
