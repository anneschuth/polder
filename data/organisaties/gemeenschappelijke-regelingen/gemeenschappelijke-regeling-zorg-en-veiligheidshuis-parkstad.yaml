  bevoegdheden:
  - kop_artikel: Artikel 3 Taken
    inhoud_artikel: 1. Ondersteunende, uitvoerende en beleidsprocessen als bedoeld
      in artikel 2, derde lid, hebben betrekking op tenminste een van de volgende
      taken:a. Bevorderen van de samenwerking tussen de gemeenten en partners in het
      justitiële, bestuurlijke en zorgdomein om te komen tot een integrale aanpak
      van (potentieel) criminele of ernstige overlast veroorzakende personen of systemen,
      mits daarbij sprake is van complexe casuïstiek. De aanpak staat in functie van
      het streven de sociale veiligheid te vergroten en daarmee de leefbaarheid binnen
      de samenleving te verbeteren.b. Bijdragen aan de veiligheid(sbeleving) als onderdeel
      van het integrale veiligheidsbeleid. Hierbij gaat het om het voorkomen en verminderen
      van recidive, (ernstige) overlast, criminaliteit en maatschappelijke uitval
      bij complexe problemen, door een combinatie van repressie, bestuurlijke interventie
      en zorg.c. Het vervullen van (specialistische) uitvoerings- en ondersteuningstaken
      die verband houden met de taken genoemd onder a en b.d. Het inbrengen en delen
      van de kennis en expertise bij de beleidsvoorbereiding en uitvoering ten aanzien
      van de taken of afgeleiden daarvan genoemd onder a en b.2. Het Algemeen Bestuur
      stelt jaarlijks een overzicht op van de ondersteunende, uitvoerende en beleidsprocessen
      die betrekking hebben op de in het eerste lid genoemde taken.
