gr_meta:
  citeertitel: Gemeenschappelijke regeling Avres
  doel: Het openbaar lichaam behartigt de gemeenschappelijke en afzonderlijke belangen
    van de deelnemers op het gebied van uitkeringsverstrekking, gesubsidieerde arbeid,
    arbeidsintegratie en –participatie, sociale activering, schuldhulpverlening, sociale
    kredietverstrekking, inburgering en kinderopvang in het kader van sociaal medische
    indicatie. Het draagt zorg voor een zo doelmatige mogelijke uitvoering van taken
    en uitoefening van bevoegdheden op de voornoemde terreinen.
