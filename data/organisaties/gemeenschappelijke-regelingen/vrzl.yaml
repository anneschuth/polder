- value: Veiligheidsregio Zuid-Limburg
  abbr: VRZL
  valid_from: '1900-01-01'
description:
  text: Veiligheidsregio Zuid-Limburg is erop gericht om inwoners en bezoekers van
    Zuid-Limburg beter te beschermen tegen (gezondheids)risico's, rampen en crises.
    Wij zijn er voor jouw veiligheid. Die veiligheid beschermen we door risico&rsquo;s
    in kaart te brengen en ons aan de hand daarvan voor te bereiden op mogelijke rampen
    en crises. Dat doen we echter niet alleen. Door samen te werken met onze partners,
    kunnen we tijdens en na een &eacute;chte ramp of crisis zo effectief mogelijk
    optreden. Zo houden we Zuid-Limburg veilig.
  url: https://www.vrzl.nl/over-ons
