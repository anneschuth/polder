gr_meta:
  citeertitel: Gemeenschappelijke Regeling ISD Bollenstreek 2024
  doel: 1. De belangen die de deelnemers nastreven door deel te nemen in deze regeling
    zijn:- Verbetering van de kwaliteit van de dienstverlening op het terrein van
    werk en inkomen;- Vermindering van de kwetsbaarheid van de afzonderlijke deelnemers;-
    Efficiëntere uitvoering van de aan het samenwerkingsverband opgedragen taken.2.
    Het samenwerkingsverband behartigt de gemeenschappelijke belangen van de deelnemers
    ten aanzien van een klantgerichte uitvoering van de wetten waarvan de uitvoering
    is overgedragen aan het samenwerkingsverband. Dit geschiedt door middel van een
    rechtmatige, doelmatige en doeltreffende uitvoering, waarbij de belangen van de
    klant en diens zelfstandige bestaansvoorziening centraal staan.
