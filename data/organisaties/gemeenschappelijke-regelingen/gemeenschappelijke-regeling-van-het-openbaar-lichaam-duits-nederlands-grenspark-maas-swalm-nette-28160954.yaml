gr_meta:
  doel: Het openbaar lichaam heeft tot doel de gezamenlijke belangen in grensoverschrijdende
    zin te behartigen, waarbij de meerwaarde van de grensoverschrijdende samenwerking
    gericht is op het behoud en de ontwikkeling van het natuurlijk landschap, de schoonheid,
    de wezenskenmerken en de verzorging en ordening daarvan, met inachtneming van
    belangen van economische, culturele en sociale aard.
