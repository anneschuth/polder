gr_meta:
  citeertitel: Gemeenschappelijke regeling Recreatieschap Twiske-Waterland
  doel: 1. Deze regeling heeft ten doel binnen een gebied, als aangegeven op de bij
    deze regeling behorende en als zodanig gewaarmerkte tekening:a. het bevorderen
    van een evenwichtige ontwikkeling in de openluchtrecreatie;b. in samenhang met
    het vorenstaande tot stand brengen en bewaren van een evenwichtig natuurlijk milieu;c.
    het tot stand brengen en duurzaam in stand houden van het specifiek en gedifferentieerde
    karakter van het landschap door bescherming, ontwikkeling en consolidatie van
    de waarden die het in zich draagt end. het verwerven van inkomsten uit het recreatiegebied
    ter verwezenlijking en instandhouding van de direct hiervoor genoemde doelstellingen.
