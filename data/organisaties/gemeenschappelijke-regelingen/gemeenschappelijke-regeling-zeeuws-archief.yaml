  bevoegdheden:
  - kop_artikel: Artikel 4
    inhoud_artikel: "Aan het bestuur van de archiefdienst zijn de navolgende werkzaamheden,\
      \ taken en bevoegdheden van de deelnemers overgedragen:a.\tde beheerstaken,\
      \ te onderscheiden in het behouden, bewerken en benutten van de archiefbescheiden\
      \ en collecties die berusten bij, dan wel vallen onder het beheer van de archiefdienst;b.\t\
      de taken en bevoegdheden, bedoeld in de artikelen 15, derde lid, 16, tweede\
      \ lid, 17 tot en met 20,  29, eerste en derde lid,  32, eerste en derde lid,\
      \  37, eerste en derde lid, van de Archiefwet 1995;c.\tde bevoegdheid van de\
      \ minister om op grond van de artikelen 25 en 26, tweede lid, van de Archiefwet\
      \ 1995 de rijksarchivaris in de provincie aan te wijzen, te schorsen en te ontslaan;d.\t\
      de bevoegdheid van gedeputeerde staten om op grond van artikel 29 van de Archiefwet\
      \ 1995 de provinciearchivaris aan te wijzen, te schorsen en te ontslaan;e.\t\
      de bevoegdheid van de colleges B&W om op grond van artikel 32 van de Archiefwet\
      \ 1995 de gemeentearchivaris aan te wijzen, te schorsen en te ontslaan;f.\t\
      de bevoegdheid van het bestuur van het waterschap om op grond van artikel 37\
      \ van de Archiefwet 1995 de waterschapsarchivaris aan te wijzen, te schorsen\
      \ en te ontslaan.g.\thet adviseren en het doen van voorstellen aan de deelnemers\
      \ over de taken en bevoegdheden, die door de deelnemers worden uitgevoerd ingevolge\
      \ de artikelen 5 tot en met 8, 12, 13, 15, eerste en tweede lid, 27 en 29, tweede\
      \ lid, 30 en 32, tweede lid, 35 en 37, tweede lid, van de Archiefwet 1995;h.\t\
      het verrichten van door de deelnemers opgedragen andere taken die verband houden\
      \ met de behartiging van de belangen, bedoeld in artikel 3, eerste en tweede\
      \ lid."
