  citeertitel: Gemeenschappelijke regeling AQUON 2018
  doel: De regeling heeft als doel om op het gebied van de informatievoorziening rond
    laboratoriumactiviteiten en daarmee verband houdende veld- en adviesactiviteiten
    te komen tot:a. kennisdeling en -ontwikkeling;b. vergroting van de efficiency;c.
    vermindering van de kwetsbaarheid;d. benutting van de mogelijkheden tot continue
    kwaliteitsborging en kwaliteitsverbetering; ene. versterking van de innovatiekracht.
