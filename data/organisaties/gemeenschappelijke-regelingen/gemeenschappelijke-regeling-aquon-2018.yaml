  - kop_artikel: Artikel 20 Algemeen
    inhoud_artikel: 1. Bij het algemeen bestuur berusten alle taken en bevoegdheden
      die op grond van deze regeling, wettelijke bepalingen of overeenkomsten aan
      AQUON toekomen, voor zover deze ingevolge deze regeling of wettelijke bepalingen
      niet aan het dagelijks bestuur zijn opgedragen.2. Het algemeen bestuur kan een
      of meer van zijn bevoegdheden overdragen aan het dagelijks bestuur, tenzij de
      aard van de bevoegdheid zich daartegen verzet.
