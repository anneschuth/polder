  bevoegdheden:
  - inhoud_artikel: Het doel van de openbare rechtspersoon is het in stand houden
      van openbare scholen voor primair onderwijs als bedoeld in artikel 46 van de
      WPO.Om haar doel te bereiken kan de openbare rechtspersoon gebruik maken van
      alle middelen die daaraan dienstbaar zijn. De openbare rechtspersoon beoogt
      niet het maken van winst.
