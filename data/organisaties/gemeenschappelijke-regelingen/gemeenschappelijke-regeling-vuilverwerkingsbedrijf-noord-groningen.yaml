  bevoegdheden:
  - kop_artikel: Artikel 5
    inhoud_artikel: 1. De behartiging van de in artikel 4 bedoelde belangen omvat
      in ieder geval de volgende bevoegdheden en taken:a. het stichten en exploiteren
      van een afvalstoffenverwerkingsbedrijf;b. het streven naar samenwerking bij
      de inzameling en het transport van afvalstoffen;c. het verrichten van overige
      taken waartoe de deelnemende gemeente krachtens de Wet milieubeheer en op grond
      hiervan vastgestelde verordeningen, bepalingen, richtlijnen e.d. zijn gehouden;d.
      het voeren van overleg met en het bepleiten van de belangen van de deelnemende
      gemeenten bij andere overheden en andere instellingen;e. het vervullen van een
      coördinerende en initiërende rol op het gebied van het afvalstoffenbeleid;f.
      het adviseren van de deelnemende gemeenten aangaande inzameling, transport en
      verwijdering van afvalstoffen.
