  - kop_artikel: Artikel 6 – Bevoegdheden
    inhoud_artikel: De colleges van burgemeester en wethouders dragen aan het openbaar
      lichaam over:a) Alle bevoegdheden en verplichtingen die hun met betrekking tot
      de Wet sociale werkvoorziening toekomen, voor zover daarvan in de deze regeling
      niet wordt afgeweken.b) De colleges blijven zelf verantwoordelijk voor de uitvoering
      van de bevorderingsplicht, als bedoeld in artikel 1 lid 3 van de Wet sociale
      werkvoorziening.
