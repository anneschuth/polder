gr_meta:
  citeertitel: Gemeenschappelijke regeling werkvoorzieningschap Weert en Omstreken,
    de Risse
  doel: Het werkvoorzieningschap heeft tot doel:a. De uitvoering van de wet.b. Aan
    zo veel mogelijk ingezetenen van de deelnemende gemeenten, die blijkens een(her)indicatiebeschikking
    tot de doelgroep als bedoeld in artikel 1 onder a van de wet behoren, eendienstbetrekking
    krachtens arbeidsovereenkomst naar burgerlijk recht aan te bieden voor hetverrichten
    van arbeid onder aangepaste omstandigheden.c. Een dienstbetrekking krachtens arbeidsovereenkomst
    naar burgerlijk recht aan te bieden voor hetverrichten van arbeid onder aangepaste
    omstandigheden aan ingezetenen, die blijkens een(her)indicatiebeschikking tot
    de doelgroep als bedoeld in artikel 1 onder a van de wet behoren en van andere
    gemeenten wanneer deze gemeenten de Risse op grond van artikel 2 lid 2 van de
    wet, aanwijzen om de wet voor hen uit te voeren.d. Het ontwikkelen van arbeidsmogelijkheden
    van personen met een grote afstand tot de arbeidsmarkt, die vallen onder de wet,
    met het oog op hun terugkeer in het reguliere arbeidsproces.e. Het ontwikkelen
    van arbeidsmogelijkheden van personen met een afstand tot de arbeidsmarkt, die
    niet vallen onder de wet, maar onder andere wettelijke regelingen inzake gesubsidieerde
    arbeid of nog werkzaam zijn in het reguliere bedrijfsleven, door het bieden van
    faciliteiten en werkervaringsmogelijkheden gericht op terugkeer in het arbeidsproces.
