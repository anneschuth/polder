  - kop_artikel: Artikel 5
    inhoud_artikel: Voor zover de diensten vallen binnen het kader van de in artikel
      4 vermelde taken, is de bedrijfsvoeringsorganisatie bevoegd tot het verrichten
      van diensten voor andere gemeenten dan de deelnemers en/of derden met een publiekrechtelijke
      status en/of privaatrechtelijke overheidsgedomineerde organisaties. Met deze
      publiek- en privaatrechtelijke organisaties kunnen meerjarige dienstverleningsovereenkomsten
      afgesloten worden.
