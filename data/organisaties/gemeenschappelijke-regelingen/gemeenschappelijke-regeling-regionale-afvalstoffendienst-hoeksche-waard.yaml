gr_meta:
  citeertitel: Gemeenschappelijke Regeling Regionale Afvalstoffendienst Hoeksche Waard
  doel: De RAD heeft tot taak zorg te dragen voor de inzameling van huishoudelijke
    afvalstoffen, grove huishoudelijke afvalstoffen, groente- fruit- en tuinafval
    en van andere bestandddelen van huishoudelijke afvalstoffen die in de provinciale
    milieuverordening worden aangewezen en zorg te dragen voor de verwerking van deze
    afvalstoffen. Tevens heeft de RAD de zorg voor de inzameling van bedrijfsafvalstoffen.
    Aan de RAD kunnen ook andere taken op het terrein van de milieuwetgeving worden
    overgedragen, welke daartoe door de besturen van de deelnemende gemeenten bij
    eensluidend besluit worden aangewezen.Ten behoeve van de uitvoering van deze taken
    komen aan het bestuur van de RAD alle bevoegdheden tot regeling en bestuur toe
    als die daarvoor bij of krachtens enig wettelijk voorschrift aan de gemeentebesturen
    zijn of worden toegekend, zulks met uitzondering van de bevoegdheid andere belastingen
    te heffen dan de rechten bedoeld in artikel 229, eerste lid, onder a en b, van
    de Gemeentewet, de rechten waarvan de heffing krachtens andere wetten dan de Gemeentewet
    geschiedt en de belasting, bedoeld in artikel 15.33 van de Wet milieubeheer. Tot
    de bevoegdheden behoort in elk geval de bevoegdheid tot het vaststellen van de
    verordening als bedoeld in artikel 10.10 van de Wet milieubeheer.
