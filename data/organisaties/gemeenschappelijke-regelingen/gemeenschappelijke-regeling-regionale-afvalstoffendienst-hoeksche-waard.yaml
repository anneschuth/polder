  bevoegdheden:
  - inhoud_artikel: Artikel 5 Bevoegdheden1. Ten behoeve van de uitvoering van de
      in artikel 4 genoemde taken komen aan het bestuur van het openbaar lichaam alle
      bevoegdheden tot regeling en bestuur toe als die daarvoor bij of krachtens enig
      wettelijk voorschrift aan de gemeentebesturen zijn of worden toegekend, zulks
      met uitzondering van de bevoegdheid andere belastingen te heffen dande rechten
      bedoeld in artikel 229 van de Gemeentewet, de rechten waarvan de heffing krachtens
      andere wetten dan de Gemeentewet geschiedt en de heffing, bedoeld in artikel
      15.33 van de Wet milieubeheer.2. Tot de bevoegdheden, bedoeld in het eerste
      lid, behoort in elk geval de bevoegdheid tot het vaststellen van de afvalstoffenverordening,
      bedoeld in artikel 10.23, eerste lidvan de Wet milieubeheer en de handhaving
      hierop als bedoeld in artikel 18.2d, onder a van de Wet milieubeheer.In de aan
      het bestuur overgedragen bevoegdheden, zoals bedoeld in de leden 1 en 2 van
      dit artikel, kan met inachtneming van artikel 10, lid 2 Wgr verandering worden
      gebracht, indien een meerderheid van de leden van het algemeen bestuur hiermee
      instemt.
