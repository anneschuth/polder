gr_meta:
  citeertitel: Regeling Regio Rivierenland
  doel: Regio Rivierenland is opgericht om de deelnemende gemeenten te ondersteunen
    en te faciliterenop alle terreinen waarop gemeenten zich richten en een verantwoordelijkheid
    hebben. Dit gebeurtdoor gemeentelijke taken aan de Regio over te dragen, contracten
    met de Regio af te sluiten overhet leveren van diensten en afspraken te maken
    over beleidsmatige afstemming.
