  bevoegdheden:
  - kop_artikel: Artikel 7 Bevoegdheden
    inhoud_artikel: 1. Ten behoeve van de uitvoering van de in artikel 5, eerste lid,
      onderdeel b, genoemde taken komen aan het bestuur van het openbaar lichaam alle
      bevoegdheden tot regeling en bestuur toe als die daarvoor bij of krachtens enig
      wettelijk voorschrift aan de gemeentebesturen zijn of worden toegekend, met
      dien verstande dat aan het bestuur van het openbaar lichaam niet de bevoegdheid
      wordt overgedragen belastingen of rechten te heffen.2. De bestuursorganen van
      de gemeenten oefenen hun bevoegdheden tot regeling en bestuur niet uit ten aanzien
      van gemeentelijke taken, genoemd in artikel 5, eerste lid, onderdeel b.3. vervallen.4.
      vervallen.5. Ten behoeve van de uitvoering van de in artikel 5, eerste lid,
      onder d, genoemde taken komt aan het bestuur van het openbaar lichaam de bevoegdheid
      toe tota. het zorgdragen voor de inkoop van diensten en het beheer daarvan;b.
      het vervullen van de rol van opdrachtgever bij overeenkomsten met vervoerders
      en de regiecentrale, enc. het zorgdragen voor de ondersteuning en organisatie
      van het regionale vervoersoverleg.6. Ten behoeve van de uitvoering van de in
      artikel 5, tweede lid, bedoelde taken worden de daarbij behorende bevoegdheden
      door de betreffende bestuursorganen van de deelnemende gemeenten door middel
      van een besluit tot mandaat verleend aan respectievelijk het bestuur of de ambtenaren
      van het openbaar lichaam.7. Ten behoeve van de uitvoering van de in artikel
      5, eerste lid, onder e, genoemde taak komt aan het bestuur van het openbaar
      lichaam de bevoegdheid toe om algemeen verbindende voorschriften vast te stellen
      om subsidies te kunnen verstrekken.
