  bevoegdheden:
  - kop_artikel: 3 Gemeenschappelijke rekenkamer
    inhoud_artikel: 1. De raden richten door deze regeling een gemeenschappelijke
      rekenkamer op, als bedoeld in artikel 81l van de Gemeentewet en artikel 1 juncto
      artikel 8 lid 2 van de Wet gemeenschappelijke regelingen.2. Het gemeenschappelijke
      orgaan is genaamd ‘Rekenkamer Medemblik - Opmeer’ en is gevestigd in Medemblik.3.
      De rekenkamer kan tevens worden aangeduid als ‘Rekenkamer' met daaraan toegevoegd
      de naam van één van de deelnemende gemeenten.4. De hoofdstukken IVa (De rekenkamer)
      en XIa (De bevoegdheid van de rekenkamer) uit de Gemeentewet zijn van toepassing
      op de gemeenschappelijke rekenkamer.
