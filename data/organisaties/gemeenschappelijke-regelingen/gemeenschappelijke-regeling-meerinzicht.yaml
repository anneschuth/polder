gr_meta:
  citeertitel: Gemeenschappelijke regeling Meerinzicht
  doel: Meerinzicht is de samenwerking van de gemeenten Ermelo, Harderwijk en Zeewolde.
    De 3 gemeenten werken samen op het gebied van zorg, werk en inkomen, jeugdhulp
    en leerlingzaken (domein sociaal). Ook werken we samen op het gebied van belastingen,
    facilitaire dienstverlening, financiën, gebouwenbeheer, HRM, informatisering &
    automatisering, communicatie, juridische zaken en geo-informatie (domein bedrijfsvoering).
