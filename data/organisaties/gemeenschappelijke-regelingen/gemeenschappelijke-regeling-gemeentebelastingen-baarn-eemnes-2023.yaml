  bevoegdheden:
  - kop_artikel: Artikel 7 Mandaat collegebevoegdheden
    inhoud_artikel: 1. Het college van de centrumgemeente wordt mandaat verleend om
      namens het college van de gastgemeente alle besluiten te nemen ter uitvoering
      van de artikelen 230 tot en met 257 van de Gemeentewet in samenhang met de Algemene
      wet inzake rijksbelastingen, de Invorderingswet 1990 en de Kostenwet invordering
      rijksbelastingen, de Wet waardering onroerende zaken en de door de raden van
      de gastgemeenten vastgestelde belastingverordeningen, voor zover deze besluiten
      betrekking hebben op belastingen waarvan de heffing of invordering krachtens
      artikel 5 van deze regeling, is opgedragen aan de ambtenaren van de centrumgemeente.2.
      Het college van de centrumgemeente wordt mandaat verleend om namens het college
      van de gastgemeente alle feitelijke handelingen en rechtshandelingen te verrichten
      ter voorbereiding en uitvoering van de beslissingen van het college van de gastgemeente
      als bedoeld in het eerste lid.3. Ten aanzien van de bevoegdheden die in dit
      artikel in mandaat worden opgedragen aan het college van de centrumgemeente,
      kan dit college ondermandaat verlenen.
