  citeertitel: Gemeenschappelijke regeling Gemeentebelastingen Baarn-Eemnes 2023
  doel: 1. De regeling wordt getroffen ten behoeve van het vormen van een gemeenschappelijke
    belastingorganisatie die belast is met de heffing en invordering van gemeentelijke
    belastingen alsmede de uitvoering van de Wet waardering onroerende zaken.2. De
    gemeenschappelijke belastingorganisatie heeft tot doel om een kwalitatief goede,
    doelmatige en toekomstbestendige uitvoering van de taken van de gemeenten op de
    in lid 1 genoemde gebieden en zoals nader uitgewerkt in de dienstverleningsovereenkomst
    te bewerkstelligen.
