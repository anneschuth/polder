  bevoegdheden:
  - kop_artikel: 'Artikel 7 Algemeen bestuur: bevoegdheden'
    inhoud_artikel: 1.De bevoegdheden die bij de regeling worden opgedragen, berusten
      bij het algemeen bestuur, tenzij bij wet of in de regeling anders is bepaald.2.Het
      algemeen bestuur kan besluiten tot de oprichting van en de deelneming in stichtingen,
      maatschappen, vennootschappen, verenigingen, coöperaties en onderlinge waarborgmaatschap-
      pijen, indien dat in het bijzonder aangewezen moet worden geacht voor de behartiging
      van het daarmee te dienen openbaar belang. Het besluit wordt niet genomen dan
      nadat de raden van de gemeenten een ontwerpbesluit is toegezonden en in de gelegenheid
      zijn gesteld hun wensen en bedenkingen ter kennis van het algemeen bestuur van
      het openbaar lichaam te brengen.3.Het algemeen bestuur besluit niet tot het
      vaststellen van meerjarige strategische plannen dan nadat de raden van de gemeenten
      gedurende twaalf weken in de gelegenheid zijn gesteld om schriftelijk hun zienswijzen
      op het concept bij het dagelijks bestuur naar voren te brengen.4.Het algemeen
      bestuur beslist niet over een voorstel alvorens de raden om zienswijzen zijn
      ge- vraagd, wanneer ten minste een vijfde van de gemeenteraden het dagelijks
      bestuur hierom ver- zoekt. In spoedeisende gevallen kan het dagelijks bestuur
      afzien van het vragen van zienswijzen. Het dagelijks bestuur stelt de raden
      hiervan schriftelijk en gemotiveerd op de hoogte.5.Indien het vierde lid wordt
      toegepast, dan hebben de raden twaalf weken de tijd hun zienswijzen bij het
      dagelijks bestuur naar voren te brengen. Voorafgaande aan het nemen van het
      besluit waarover de zienswijzen gegeven zijn, stelt het dagelijks bestuur de
      raden en het algemeen bestuur schriftelijk en gemotiveerd in kennis van het
      oordeel over de zienswijzen, alsmede van de even- tuele conclusies die het daaraan
      verbindt.6.Het algemeen bestuur kan met toepassing van de artikelen 24 en 25
      van de wet commissies van advies dan wel commissies belast met de behartiging
      van bepaalde belangen instellen.
