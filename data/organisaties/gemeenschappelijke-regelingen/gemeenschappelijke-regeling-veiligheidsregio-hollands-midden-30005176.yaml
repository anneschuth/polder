gr_meta:
  citeertitel: Gemeenschappelijke Regeling Veiligheidsregio Hollands Midden
  doel: In de Veiligheidsregio Hollands Midden bereiden politie, brandweer, GHOR en
    gemeenten zich samen met partners voor op risico's, rampen en crises. Dit doen
    zij bijvoorbeeld door in een vroeg stadium mee te denken bij de aanleg van wegen
    en woonwijken. Door het opstellen van plannen om incidenten te bestrijden. Afspraken
    te maken met partners, zoals de waterschappen, drinkwaterbedrijven, defensie en
    reddingsbrigades. Functionarissen op te leiden, te trainen en te oefenen, zodat
    zij voorbereid zijn op hun taak.
