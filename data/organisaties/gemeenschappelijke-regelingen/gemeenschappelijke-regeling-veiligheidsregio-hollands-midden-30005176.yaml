  bevoegdheden:
  - kop_artikel: Artikel 5 Taken en bevoegdheden
    inhoud_artikel: 1. Ter behartiging van de in artikel 4 genoemde gemeenschappelijke
      belangen is de Veiligheidsregio belast van de uitvoering van de volgende taken
      en bevoegdheden:a. het inventariseren van risico’s van branden, rampen en crises;b.
      het adviseren van het bevoegd gezag over risico’s van branden, rampen en crises;c.
      het adviseren van het college van burgemeester en wethouders over de brandweerzorg;d.
      het voorbereiden op de bestrijding van branden en het organiseren van de rampenbestrijding
      en de crisisbeheersing;e. het instellen en in stand houden van een brandweer;f.
      het instellen en in stand houden van een GHOR;g. het voorzien in de meldkamerfunctie
      ten behoeve van de brandweertaak, de rampenbestrijding, de crisisbeheersing
      en de geneeskundige hulpverlening;h. het aanschaffen en beheren van gemeenschappelijk
      materieel;i. het inrichten en in stand houden van de informatievoorziening binnen
      de diensten van de veiligheidsregio en tussen deze diensten en andere diensten
      en organisaties die betrokken zijn bij de onder d, e, f, en g genoemde taken.2.
      Indien ten gevolge van wijziging van wettelijke regelingen, de uitvoering van
      werkzaamheden als bedoeld in lid 1 gaan strekken ter uitvoering van een andere
      regeling dan ter uitvoering waarvan zij ten tijde van het van kracht worden
      van deze regeling strekten, dan wel indien in deze werkzaamheden ten gevolge
      van een dergelijke wijziging veranderingen optreden, blijven zij, voor zover
      hun strekking en omvang door hun wijziging niet wezenlijk veranderen, behoren
      tot de taken die in het genoemde lid aan het Openbaar Lichaam zijn opgedragen
  - kop_artikel: Artikel 6 Overige bevoegdheden en plichten
    inhoud_artikel: Waar in wettelijke regelingen, op grond waarvan de taken aan de
      Veiligheidsregio zijn overgedragen, bevoegdheden van regeling en bestuur zijn
      toegekend aan de gemeente, de gemeenteraad, het college van burgemeester en
      wethouders of de burgemeester, of plichten zijn opgelegd, komen die bevoegdheden
      toe en rusten die plichten op onderscheidenlijk de Veiligheidsregio, het algemeen
      bestuur, het dagelijks bestuur en de voorzitter, tenzij de wettelijke regelingen
      anders bepalen een en ander behoudens hetgeen bepaald is in artikel 30, eerste
      lid, van de Wet gemeenschappelijke regelingen.
