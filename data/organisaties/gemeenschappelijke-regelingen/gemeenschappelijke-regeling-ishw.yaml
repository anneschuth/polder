  bevoegdheden:
  - inhoud_artikel: 1. De colleges van burgemeester en wethouders van de deelnemende
      gemeenten dragen hun taken en bevoegdheden die bij of krachtens de Gemeentewet,
      waaronder artikel 160 lid 1 sub a aan hen zijn opgedragen, over aan de ISHW
      voor zover deze nodig zijn om het doel zoals genoemd in artikel 3 en de taken
      genoemd in artikel 4 te verwezenlijken.2. ISHW kan niet zelfstandig besluiten
      tot uitbreiding van de overgedragen bevoegdheden.
