  bevoegdheden:
  - kop_artikel: Artikel 4 Taken
    inhoud_artikel: 'Aan de veiligheidsregio worden de volgende taken overgedragen.1.
      Algemeena. het inventariseren van risico’s van branden, rampen en crises;b.
      het adviseren van het bevoegd gezag over risico’s van branden, rampen en crises
      in de bij of krachtens de wet aangewezen gevallen alsmede in de gevallen die
      in het beleidsplan zijn bepaald;c. het adviseren van het college van burgemeester
      en wethouders van de aan deze regeling deelnemende gemeenten over de brandweerzorg,
      waartoe behoort: het voorkomen, beperken en bestrijden van brand, het beperken
      van brandgevaar, het voorkomen en beperken van ongevallen bij brand en al hetgeen
      daarmee verband houdt; alsmede het beperken en bestrijden van gevaar voor mensen
      en dieren bij ongevallen anders dan bij brand;d. het voorbereiden op de bestrijding
      van branden en het organiseren van de rampenbestrijding en de crisisbeheersing;e.
      het aanschaffen en beheren van gemeenschappelijk materieel;f. het inrichten
      en in stand houden van de informatievoorziening binnen de diensten van de veiligheidsregio
      en tussen deze diensten en de andere diensten en organisaties die betrokken
      zijn bij de onder 1d, 2, 3 en 4 genoemde taken.2. BrandweerHet instellen en
      in stand houden van de Brandweer Drenthe die in ieder geval de volgende taken
      uitvoert:a. het voorkomen , beperken en bestrijden van brand;b. het beperken
      en bestrijden van gevaar voor mensen en dieren bij ongevallen anders dan bij
      brand;c. het waarschuwen van de bevolking;d. het verkennen van gevaarlijke stoffen
      en het verrichten van ontsmetting;e. het adviseren van andere overheden en organisaties
      op het gebied van de brandpreventie, brandbestrijding en het voorkomen, beperken
      en bestrijden van ongevallen met gevaarlijke stoffen;f. taken in het kader van
      de rampenbestrijding en de crisisbeheersing.3. Geneeskundige hulpverleningsorganisatie
      in de regio (GHOR)Het instellen en in stand houden van de GHOR Drenthe die in
      ieder geval de volgende taken uitvoert:• de coördinatie, aansturing en regie
      van de geneeskundige hulpverlening, in het kader van de rampenbestrijding en
      de crisisbeheersing door daartoe aangesteld personeel, als onderdeel van een
      gecoördineerde inzet van diensten en organisaties van verschillende disciplines,
      door tussenkomst van een meldkamer;• de advisering van andere overheden en organisaties
      op dat gebied.4. MeldkamerfunctieHet gezamenlijk met de besturen van de veiligheidsregio’s
      Groningen en Fryslân zorgdragen voor het op de meldkamer uitvoeren van de meldkamerfunctie,
      bedoeld in artikel 25b, eerste lid, van de Politiewet 2012, ten behoeve van
      de brandweertaak en ten behoeve van de rampenbestrijding, de crisisbeheersing
      en de geneeskundige hulpverlening.'
  - kop_artikel: Artikel 5 Facultatieve taken
    inhoud_artikel: 1. De veiligheidsregio is bevoegd tot het verrichten van diensten
      voor één of meer deelnemende gemeenten of voor andere gemeenten indien deze
      daarom verzoeken en het bestuur dit verzoek inwilligt.2. De dienstverlening
      geschiedt op basis van een overeenkomst tussen de veiligheidsregio en de gemeente
      of gemeenten die het aangaat. In deze overeenkomst wordt vastgelegd welke prestaties
      de veiligheidsregio zal leveren, de kosten die bij de gemeente in rekening worden
      gebracht en de voorwaarden waaronder tot dienstverlening wordt overgegaan.3.
      De in lid 2 genoemde kosten maken geen deel uit van de in artikel 29 lid 2 genoemde
      gemeentelijke bijdrage.
