gr_meta:
  citeertitel: gemeenschappelijke regeling Veiligheidsregio Drenthe
  doel: 1. De veiligheidsregio behartigt de belangen van de aan deze regeling deelnemende
    gemeenten op de volgende terreinen:a. de brandweerzorg;b. de rampenbestrijding
    en crisisbeheersing;c. de geneeskundige hulpverlening;d. de ondersteuning van
    gemeenten in de netwerksamenwerking van het Veiligheidshuis Drenthe.2. Daarnaast
    heeft de veiligheidsregio de zorg voor:a. een adequate samenwerking met de politie
    en de meldkamer ambulancezorg;b. een gecoördineerde en multidisciplinaire voorbereiding
    op de rampenbestrijding en crisisbeheersing.
