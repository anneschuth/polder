description:
  text: KempenPlus is het participatiebedrijf van de Kempengemeenten Bergeijk, Bladel,
    Eersel en Reusel-De Mierden. Ook wordt bepaalde dienstverlening uitgevoerd voor
    de inwoners van de gemeente Oirschot. Wij zijn verantwoordelijk voor de uitvoering
    van de Participatiewet, (delen van) de Inburgeringswet en de Wet sociale werkvoorziening
    in de aangesloten gemeenten.Zo doen we dat in de KempenWe helpen de inwoners van
    de Kempengemeenten, die daar ondersteuning bij nodig hebben, om terug aan het
    werk te gaan. Bij voorkeur bereiken we, o.a. met training en coaching, dat cliënten
    aan het werk gaan bij reguliere werkgevers. Lukt dat niet, dan kunnen ze net als
    onze medewerkers met Sw-indicatie aan de slag in een beschutte werkomgeving bij
    of via KempenPlus. Voor cliënten die (nog) niet kunnen werken, zoeken we een andere
    zinvolle tijdsbesteding zoals vrijwilligerswerk.Inwoners die daar nood aan hebben,
    helpen we met een uitkering aan een (tijdelijke) inkomensvoorziening.KempenPlus
    is gevestigd in Bladel en met 750 medewerkers één van de grootste werkgevers in
    de regio.Dienstverlening richting werkgeversAls werkgever heb je behoefte aan
    goede, gemotiveerde medewerkers. En of je één medewerker zoekt of bij wijze van
    spreken tientallen, dat maakt niet uit. We bemiddelen, detacheren of nemen bijvoorbeeld
    de bemensing van een hele productielijn over.Onze vaste groep medewerkers bestaat
    uit ca. 600 mensen. Daarnaast hebben we - mede dankzij onze samenwerking met UWV
    - continu de beschikking over een wisselend bestand van een paar honderd kandidaten.
    Dat we je kunnen helpen, is dus wel bijna zeker. Goed om te weten is dat al onze
    medewerkers een plusje hebben. Je invulling aan ‘sociaal en maatschappelijk verantwoord
    ondernemen’ heb je dus ook meteen geregeld.
