  bevoegdheden:
  - kop_artikel: Artikel 3 Taak en bevoegdheden rekenkamer
    inhoud_artikel: 1. De rekenkamer is een onafhankelijk orgaan.2. Het gemeenschappelijke
      orgaan heeft, als vastgelegd in hoofdstuk XIA van de Provinciewet, tot taak
      het onderzoeken van de doelmatigheid, de doeltreffendheid en de rechtmatigheid
      van de door het provinciebestuur gevoerde bestuur, niet zijnde de controle van
      de jaarrekening die jaarlijks door de accountant wordt verricht.3. Onverminderd
      de bevoegdheid van de rekenkamer, als vastgelegd in hoofdstuk XIA van de Provinciewet,
      is de rekenkamer bevoegd ten dienste van haar onderzoek advies van deskundigen
      in te winnen.
