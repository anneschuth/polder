  bevoegdheden:
  - inhoud_artikel: De bestuursorganen van de VNOG komen de bevoegdheden toe, zoals
      deze voortvloeien uit de Brandweerwet 1985, de Wet geneeskundige hulpverlening
      bij rampen, de Wet rampen en zware ongevallen en de Wet Ambulancevervoer. Inmiddels
      Wet op de veiligheidsregio's.
  - kop_artikel: Artikel 5 Bevoegdheden
    inhoud_artikel: 1. De veiligheidsregio heeft alle bevoegdheden tot regeling, bestuur
      en beheer die nodig zijn voor de uitvoering van de aan de veiligheidsregio in
      artikel 4, eerste lid, opgedragen taken.2. De veiligheidsregio is bevoegd om
      deel te nemen aan een gemeenschappelijke regeling, als bedoeld in de artikelen
      93 en 96 van de wet, voor zover zij daar reeds deelnemer van is op de dag van
      inwerkingtreding van de eerste wijziging van deze regeling.
