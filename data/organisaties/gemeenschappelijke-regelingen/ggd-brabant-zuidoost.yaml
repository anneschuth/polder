  valid_from: '1900-01-01'
description:
  text: De GGD Brabant-Zuidoost streeft naar gezondheidswinst voor alle inwoners in
    haar regio en helpt mensen om met fysieke, sociale en emotionele uitdagingen om
    te gaan en daarin zoveel mogelijk eigen regie te voeren. We bewaken, beschermen
    en bevorderen de gezondheid van iedereen met speciale aandacht voor kwetsbare
    mensen.
