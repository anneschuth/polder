  bevoegdheden:
  - kop_artikel: Artikel 5
    inhoud_artikel: 1. Het openbaar lichaam is bevoegd tot het verrichten van diensten
      voor één of meer deelnemende gemeenten en andere overheden, indien deze daarom
      verzoeken en het algemeen bestuur dat verzoek inwilligt.2. Het openbaar lichaam
      is bevoegd tot het verrichten van diensten ten behoeve van instellingen en organen
      waarin het openbaar lichaam namens de deelnemende gemeenten zitting heeft, indien
      de desbetreffende instelling of het orgaan hierom verzoekt en het algemeen bestuur
      dat verzoek inwilligt.3. Een besluit tot dienstverlening vermeldt de wijze van
      kostenverrekening en de overige voorwaarden waaronder tot de gevraagde dienstverlening
      wordt overgegaan.
