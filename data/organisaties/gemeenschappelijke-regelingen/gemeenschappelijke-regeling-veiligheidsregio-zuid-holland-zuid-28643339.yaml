gr_meta:
  citeertitel: Gemeenschappelijke regeling Veiligheidsregio Zuid-Holland Zuid
  doel: Het openbaar lichaam heeft tot doel:a. de brandweerzorg, de rampenbestrijding,
    de crisisbeheersing, de geneeskundige hulpverlening (bij ongevallen en rampen),
    met behoud van lokale verankering, bestuurlijk en operationeel op regionaal niveau
    binnen het samenwerkingsgebied te integreren, teneinde een doelmatige en slagvaardige
    hulpverlening te verzekeren, mede op basis van een gecoördineerde voorbereiding;b.
    een platform voor samenwerking te zijn voor aan hulpverlening gelieerde diensten,
    partners dan wel organisaties en andere openbare lichamen.
