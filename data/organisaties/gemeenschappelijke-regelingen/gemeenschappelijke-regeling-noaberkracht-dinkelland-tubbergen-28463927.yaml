  bevoegdheden:
  - kop_artikel: 'Artikel 5: Bevoegdheidstoedeling'
    inhoud_artikel: 1. De bestuursorganen van de deelnemende gemeenten bepalen in
      afzonderlijke delegatie-, mandaat- en volmachtbesluiten, welke bevoegdheden
      aan de bedrijfsvoeringsorganisatie worden toegekend.2. Bij besluit van de bestuursorganen
      van de deelnemende gemeenten kunnen wijzigingen worden aangebracht in de door
      hen overgedragen of over te dragen bevoegdheden.
