  bevoegdheden:
  - kop_artikel: Artikel 5. Bevoegdheden
    inhoud_artikel: Met betrekking tot de behartiging van de in artikel 4 genoemde
      doelstelling en taken behoren aan de bank de volgende bevoegdheden:1. Krediettransacties
      binnen de wet Fido gegeven kaders:a. geldkrediet zoals omschreven in artikel
      1 sub d WCK.b. doorlopend krediet zoals omschreven in artikel 1 sub f WCKc.
      geldleningen als bedoeld in de artikelen 48 en 49 WWB, waarbij de gemeenten
      van betrokken ingezetenen al dan niet als borg optreden.2. Schuldenregeling:a.
      schuldbemiddeling op grond van artikel 47 en 48 WCK.b. verstrekken van een saneringskrediet,
      een geldkrediet als bedoeld onder dit artikel lid 1 sub a, waarmee de totale
      schuldenlast van verzoeker wordt afgekocht op basis van een percentage van deze
      totale schuldenlast.c. het tot stand brengen en uitvoeren van regelingen met
      betrekking tot een bestaande schuldenlast van een natuurlijke persoon.3. Budgetbeheer:a.
      het aanbieden van een dienstenpakket dat bestaat uit de mogelijkheid tot het
      openen van een budgetbeheerrekening, van waaruit de bank, in naam en voor rekening
      van de rekeninghouder betalingen verricht;b. het op verzoek van burgemeester
      en wethouders verrichten van de betalingen als bedoeld in artikel 57 van de
      WWB;4. Verklaringen op grond van de Fw:Uitvoering geven aan het bepaald in artikel
      285 van de Fw. Het in rekening brengen van de kosten voor dienstverlening die
      door de tussenkomst van gemeenten aan klanten van de bank is verleend, vindt
      middels declaratie plaats.5. Bewindvoering en curatele op grond van de Fw:Het
      aan rechtbanken beschikbaar stellen van in dienst van de bank zijnde bewindvoerders
      en curatoren en het, voor zover de functie daartoe aanleiding geeft, overdragen
      van de zeggenschap over deze werknemers aan deze gerechten, ten behoeve van
      de uitvoering van de relevante bepalingen uit de Faillissementswet (wettelijke
      schuldsanering);6. Bewindvoering op grond van BW:Het aan kantongerechten beschikbaar
      stellen van in dienst van de bank zijnde bewindvoerders en het, voor zover de
      functie daartoe aanleiding geeft, overdragen van de zeggenschap over deze werknemers
      aan deze gerechten, ten behoeve van de uitvoering van de relevante bepalingen
      uit Titel 19, boek 1 BW, Onderbewindstelling ter bescherming van meerderjarigen;7.
      Preventie:a. Bevorderen van maatregelen ter voorkoming en bestrijding van problematische
      schuldsituaties;b. Geven van voorlichting en advies met betrekking tot bovengenoemde
      onderwerpen en aandachtsgebieden waarop de bank zicht krachtens haar doelstelling
      beweegt.8. En voor het overige het verrichten van diensten alsmede alle verdere
      handelingen die met het vorenstaande in de ruimste zin verband houden of daartoe
      bevorderlijk zijn, waaronder in ieder geval het, al dan niet kosteloos, op verzoek
      van een of meer gemeenten of derden verstrekken van informatie of advies ter
      zake van die aandachtsgebieden waarop de bank zich krachtens haar doelstelling
      beweegt, dan wel het aan verzoeker ter beschikking stellen van bij de bank aanwezige
      expertise.9. De kosten van de dienstverlening en activiteiten van de bank worden
      op basis van een uitvoeringsovereenkomst in rekening gebracht bij desbetreffende
      gemeenten en/of overige opdrachtgevers. Bij dienstverlening en activiteiten
      voor niet deelnemende gemeenten of andere opdrachtgevers wordt een risico-opslagpercentage
      in rekening gebracht.
