gr_meta:
  citeertitel: Gemeenschappelijke Regeling Gemeentelijke Kredietbank Drenthe
  doel: 1. De bank is een gemeentelijke kredietbank als bedoeld in artikel 1 WFT en
    heeft tot doel, met in- achtneming van hetgeen in deze regeling is bepaald, om
    een, zowel vanuit bedrijfseconomische alsook maatschappelijke optiek bezien, verantwoord
    pakket van, al dan niet, financiële dienstverlening aan te bieden aan, in het
    bijzonder, de ingezetenen van het werkgebied van de bank, alsmede het zorgdragen
    voor een harmonische en evenwichtige ontwikkeling van de bank.2. De bank heeft
    eveneens tot doel:a. het op sociaal/maatschappelijk en zakelijk verantwoorde wijze
    verstrekken van krediet aan hen die op de diensten van de bank zijn aangewezenen
    bevorderen van het sociaal/maatschappelijk en zakelijk verantwoorde verstrekken
    van krediet in algemene zin;b. het uitvoeren van de publieke taak zoals deze voor
    de gemeentelijke kredietbanken onder meer is vastgelegd in de Wet Fido en de daarop
    gebaseerde besluiten;c. het bevorderen van maatregelen (op lokaal niveau) ter
    voorkoming van problematische schuldsituaties en andere financiële misstanden;d.
    het bevorderen van een oplossingsgerichte werkwijze en activiteiten op het terrein
    van Schuldhulpverlening;e. het bieden van hulp aan cliënten die in financiële
    moeilijkheden zijn geraakt of dreigen te geraken, daaronder begrepen het actief
    geven van voorlichting;f. het verlenen van financiële diensten en het bevorderen
    daarvan, alsmede alle verdere handelingen die met het vorenstaande in de ruimste
    zin verband houden of daartoe bevorderlijk zijn.
