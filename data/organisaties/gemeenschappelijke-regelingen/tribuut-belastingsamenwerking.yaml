description:
  text: Tribuut is het centrale belastingcentrum dat namens de gemeenten Apeldoorn,
    Brummen, Epe, Lochem, Voorst en Zutphen de heffing en invordering van gemeentebelastingen
    uitvoert. Ook verzorgen wij de waardering van onroerende zaken volgens de Wet
    Waardering Onroerende Zaken (WOZ). Dit doen wij zelfstandig. Gemeenten blijven
    zelf verantwoordelijk voor het bepalen van de tarieven.
