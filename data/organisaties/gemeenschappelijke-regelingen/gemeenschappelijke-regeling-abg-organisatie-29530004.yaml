  bevoegdheden:
  - kop_artikel: Artikel 4a Bevoegdheden
    inhoud_artikel: Het bestuur van de bedrijfsvoeringsorganisatie is bevoegd te besluiten
      tot de oprichting van en de deelneming in stichtingen, maatschappen, vennootschappen,
      verenigingen, coöperaties en onderlinge waarborgmaatschappijen overeenkomstig
      het bepaalde in artikel 31a van de wet.
  - kop_artikel: Artikel 5 Mandaat, aanwijzing en delegatie
    inhoud_artikel: 1. De colleges van de deelnemende gemeenten kunnen bevoegdheden
      mandateren aan de algemeen directeur.2. Ondermandaat is toegestaan tenzij dat
      uitdrukkelijk is voorbehouden.3. Er wordt een register bijgehouden van de overeenkomstig
      het eerste en tweede lid gemandateerde bevoegdheden.4. De colleges van de deelnemende
      gemeenten kunnen elk ambtenaren van de bedrijfsvoeringsorganisatie aanwijzen
      als heffingsambtenaar, invorderingsambtenaar of belastingdeurwaarder.5. De aanwijzing
      bedoeld in het vierde lid vindt niet plaats dan nadat het bestuur daarmee heeft
      ingestemd.
