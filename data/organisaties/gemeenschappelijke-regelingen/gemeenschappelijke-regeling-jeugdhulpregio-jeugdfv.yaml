  bevoegdheden:
  - kop_artikel: 'Artikel 5: Algemene bevoegdheidstoedeling'
    inhoud_artikel: 1. De colleges dragen geen bevoegdheden over aan het bestuur van
      de JeugdFV.2. Voor de uitvoering van de taken en werkzaamheden, als bedoeld
      in artikel 4, lid 1 en lid 2 en artikel 8 van deze regeling, wordt bij separaat
      besluit door de colleges mandaat verleend aan het bestuur van de JeugdFV.3.
      Onder mandateren wordt in dit artikel tevens verstaan het verlenen van volmacht
      tot het verrichten van privaatrechtelijke rechtshandelingen namens de deelnemers
      en het machtigen tot het verrichten van feitelijke handelingen namens de deelnemers.
