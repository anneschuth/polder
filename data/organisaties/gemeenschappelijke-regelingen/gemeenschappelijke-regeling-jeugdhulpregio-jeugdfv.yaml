  doel: De regeling beoogt het doeltreffend en doelmatig uitvoeren of doen uitvoeren
    van de door de deelnemers opgedragen taken, bedoeld in artikel 4 van de regeling,
    voortkomend uit of samenhangend met de taken op het gebied van jeugdhulp, die
    voortvloeien uit de Jeugdwet.
