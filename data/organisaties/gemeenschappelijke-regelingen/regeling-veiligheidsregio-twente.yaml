  bevoegdheden:
  - kop_artikel: artikel 4, artikel 5, artikel 6, artikel 7, artikel 8
    inhoud_artikel: Artikel 4 BelangenDe veiligheidsregio heeft tot doel de brandweerzorg,
      de rampenbestrijding, de crisisbeheersing en de geneeskundige hulpverlening
      bij ongevallen en rampen met behoud van lokale verankering bestuurlijk en operationeel
      op regionaal niveau te integreren teneinde een doelmatige en slagvaardige hulpverlening
      te verzekeren, mede op basis van een gecoördineerde voorbereiding.Artikel 5
      Taken en bevoegdhedenAan de Veiligheidsregio zijn de taken en bevoegdheden opgedragen
      zoals vermeld in de artikelen 10 en 25 van de Wet veiligheidsregio’s.Artikel
      6 Bevoegdheden van regeling en bestuur1. De veiligheidsregio heeft alle bevoegdheden
      tot regeling, bestuur en beheer die nodig zijn voor de uitvoering van de aan
      de veiligheidsregio opgedragen taken.2. Alle bevoegdheden in het kader van deze
      regeling, die niet aan een ander bestuursorgaan zijn opgedragen, behoren aan
      het algemeen bestuur.Artikel 7 Bevoegdheid tot het aangaan van geldleningen1.
      De veiligheidsregio is bevoegd tot het aangaan van geldleningen en van rekeningcourantovereenkomsten.2.
      De deelnemende gemeenten staan gezamenlijk garant voor de juiste betaling van
      rente, aflossing, boeten en kosten van de op grond van het bepaalde in het vorige
      lid opgenomen en op te nemen gelden op basis van de geldende financiële verdeelsleutel.Artikel
      8 Dienstverlening1. De veiligheidsregio is bevoegd tot het verrichten van diensten
      op het gebied van veiligheid voor één of meer deelnemende gemeenten, indien
      deze daarom verzoeken en het algemeen bestuur dat verzoek inwilligt.2. Een besluit
      tot dienstverlening wordt genomen door het algemeen bestuur en vermeldt de wijze
      van kostenverrekening en de overige voorwaarden, waaronder tot de gevraagde
      dienstverlening wordt overgegaan.3. Een afschrift van dit besluit wordt ter
      kennis van de deelnemende gemeenten gebracht.
