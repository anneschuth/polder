gr_meta:
  citeertitel: Regeling Veiligheidsregio Twente
  doel: De veiligheidsregio heeft tot doel de brandweerzorg, de rampenbestrijding,
    de crisisbeheersing en de geneeskundige hulpverlening bij ongevallen en rampen
    met behoud van lokale verankering bestuurlijk en operationeel op regionaal niveau
    te integreren teneinde een doelmatige en slagvaardige hulpverlening te verzekeren,
    mede op basis van een gecoördineerde voorbereiding.
