  bevoegdheden:
  - kop_artikel: Artikel 4 Taken en overdracht bevoegdheden
    inhoud_artikel: 1. De colleges dragen aan Zaffier hun bevoegdheden over op grond
      van de in artikel 1, eerste lid onder a genoemde Wetten,2. De colleges dragen
      aan Zaffier hun bevoegdheden over tot het verlenen van ondersteuning op het
      gebied van het gemeentelijk minimabeleid (gebaseerd op de artikelen 108, 147
      en 149 van de Gemeentewet).3. De uitvoering als bedoeld in het eerste lid heeft
      mede betrekking op:a. het in dienst nemen/houden van personen, die op grond
      van de Wet sociale werkvoorziening daarvoor in aanmerking komen, voor zover
      voor die personen passende arbeid beschikbaar is;b. het actief begeleiden van
      personen met een arbeidsbeperking naar werk bij een reguliere werkgever;c. het
      oprichten en/of in stand houden van één of meer werkverbanden;d. het oprichten
      van één of meer private ondernemingen, alsmede het deelnemen in private ondernemingen;e.
      te besluiten op bezwaarschriften die in het kader van de uitgeoefende taken
      worden ingediend;f. de behandeling en afhandeling van klachten op basis van
      de door het algemeen bestuur vast te stellen interne en externe klachtenregeling.4.
      Een college kan voor de uitvoering van afzonderlijke taken, binnen het belang
      en het doel van Zaffier als bedoeld in artikel 3, opdrachten tot dienstverlening
      verlenen aan Zaffier.5. Zaffier, of een directe dan wel indirecte dochteronderneming
      van Zaffier met privaatrechtelijke rechtspersoonlijkheid, kan met elke gemeente
      dienstverleningsovereen¬komsten overeenkomen met nadere afspraken ter uitvoering
      van de taken, bedoeld in dit artikel.6. Zaffier kan aan andere organen of rechtspersonen
      dan de deelnemende gemeenten (derden) diensten verlenen, binnen het belang en
      het doel van Zaffier als bedoeld in artikel 3, met dien verstande dat de omvang
      van deze taken niet meer mag bedragen dat toelaatbaar is op basis van de criteria
      voor inbesteding volgens het geldende aanbestedingsregime.7. Het Algemeen Bestuur
      van Zaffier regelt de voorwaarden waaronder de in de leden 5, 6, 7 en 9 genoemde
      taken worden uitgevoerd8. Zaffier kan door de colleges worden belast met de
      uitvoering van tijdelijke taken op grond van landelijke regelgeving, binnen
      het belang en het doel van Zaffier als bedoeld in artikel 3.
