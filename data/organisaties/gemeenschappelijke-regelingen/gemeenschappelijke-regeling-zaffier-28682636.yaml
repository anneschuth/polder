gr_meta:
  citeertitel: Gemeenschappelijke regeling Zaffier
  doel: 1. Zaffier heeft tot doel, met inachtneming van hetgeen hierover in de regeling
    is bepaald, om door een efficiënte en effectieve uitvoering van de Wetten en het
    gemeentelijke minimabeleid de belangen van de gemeenten gezamenlijk, en ieder
    afzonderlijk, te behartigen op het gebied van inburgering, arbeidsparticipatie,
    sociale werkvoorziening en beschut werk, het behoud, herstel en bevorderen van
    arbeidsbekwaamheid, alsmede voor het in dienst nemen van c.q. (bevorderen van)
    uitstroom naar arbeidsplaatsen bij andere werkgevers van personen met een arbeidsbeperking,
    arbeidsintegratie en, indien nodig, financiële inkomensondersteuning, schuldhulpverlening,
    bestrijding van armoede en het bevorderen van participatie in het maatschappelijk
    en sociale leven2. De deelnemers achten het ook in hun belang om de taken die
    zij zelf verzorgen en uitvoeren op het brede terrein van werk en inkomen zo efficiënt
    en effectief mogelijk in te richten en daarom heeft Zaffier mede tot doel om door
    middel van overleg het beleid zo veel mogelijk op elkaar af te stemmen.emmen.
