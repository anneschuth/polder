gr_meta:
  citeertitel: Gemeenschappelijke Regeling WVS
  doel: WVS-groep heeft tot doel voor personen uit zijn werkgebied, die op enigerlei
    wijze niet in staat zijn om op eigen kracht passende arbeid te verwerven, c.q.
    te behouden, of voor wie de maatschappelijke participatie dient te worden bevorderd,
    een traject te verzorgen dat hetzij leidt naar (gesubsidieerde) arbeid, hetzij
    een sociaal isolement voorkomt of doorbreekt; daarnaast heeft WVS-groep tot doel
    het organiseren van werk in een beschutte omgeving voor diegenen, die hierop (permanent)
    zijn aangewezen. De activiteiten die buiten de op de Wsw gebaseerde activiteiten
    liggen dienen ten minste kostendekkend te zijn.
