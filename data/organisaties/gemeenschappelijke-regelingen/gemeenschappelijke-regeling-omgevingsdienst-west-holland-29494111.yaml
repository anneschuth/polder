gr_meta:
  citeertitel: Gemeenschappelijke regeling Omgevingsdienst West-Holland
  doel: De ODWH staat voor duurzaamheid, veiligheid en verbetering van de leefomgeving.
    Zij neemt omgevingsbeschikkingen, ziet toe op naleving van de milieuwetgeving,
    geeft milieuadvies aan gemeenten en informeert inwoners en bedrijven op het gebeid
    van milieu in opdracht van gemeenten en andere overheden.
