description:
  text: Vervoerregio Amsterdam verbindt gemeenten en werkt aan een regio waar mensen
    vlot hun bestemming bereiken. De Vervoerregio is opdrachtgever van het openbaar
    vervoer per bus, tram en metro. De Vervoerregio financiert ook verbeteringen in
    de regionale infrastructuur voor (vracht)auto, fiets en openbaar vervoer.
