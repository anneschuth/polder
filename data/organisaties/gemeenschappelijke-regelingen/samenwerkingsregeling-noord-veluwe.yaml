  bevoegdheden:
  - inhoud_artikel: ARTIKEL 51. Ten behoeve van de uitvoering van de in artikel 4
      genoemde taken dragen de colleges van de deelnemende gemeente aan het bestuur
      van het samenwerkingsverband de bevoegdheden over uit de volgende wetten, voor
      zover het bevoegdheden van het college betreffen:a. de Wet sociale werkvoorziening;b.
      artikel 53a van de Participatiewet;c. artikelen 3a, 3b, 6, 7, 15, 16, 18, 19,
      21, 22 en 25 van de Leerplichtwet;d. artikelen 28, 118 en 118i van de Wet op
      het voortgezet onderwijs;e. artikelen 47a, 162b en 162c van de Wet op de expertisecentra;f.
      artikelen 8.1.8, 8.3.2 en 8.3.3 van de Wet educatie en beroepsonderwijs.2. Ten
      behoeve van de uitvoering van de in artikel 4, tweede lid, onder i, genoemde
      taak kan aan het bestuur van het samenwerkingsverband in mandaat worden opgedragen
      de bevoegdheid, bedoeld in artikel 16, tweede lid, van de Leerplichtwet, indien
      de burgemeester van een deelnemende gemeente deze bevoegdheid in mandaat heeft
      opgedragen aan het college van de betreffende deelnemende gemeente.3. Het algemeen
      bestuur of een college van een deelnemende gemeente kan een voorstel doen voor
      verandering van de overgedragen bevoegdheden, bedoeld in het eerste lid, zonder
      dat hiertoe de regeling hoeft te worden gewijzigd. Een dergelijk voorstel treedt
      pas in werking nadat de colleges van de deelnemende gemeenten hierover bij unanimiteit
      positief hebben besloten en treedt vervolgens in de plaats van het eerste lid.4.
      Het algemeen bestuur kan, als feitelijk met de uitvoering van de taken in het
      kader van de sociale werkvoorziening belast orgaan, een private rechtspersoon
      aanwijzen als bedoeld in artikel 2, tweede lid, van de Wet sociale werkvoorziening.
      Het algemeen bestuur stelt daartoe een aanwijzingsbesluit op.5. De colleges
      van de deelnemende gemeenten verplichten zich ambtenaren van het samenwerkingsverband
      aan te wijzen als toezichthouders als bedoeld in artikel 76a van de Participatiewet.6.
      De deelnemende gemeenten verlenen hun medewerking aan de uitvoering van besluiten
      die de bestuursorganen van het samenwerkingsverband nemen in verband met de
      uitoefening van de aan hen toegekende bevoegdheden.7. Indien een deelnemende
      gemeente naar het oordeel van een bestuursorgaan, bedoeld in het zesde lid,
      de in dat lid bedoelde medewerking niet of niet in voldoende mate verleent,
      kan het bestuursorgaan namens en ten laste van de betrokken deelnemende gemeente
      een besluit uitvoeren of doen uitvoeren.8. Alvorens over te gaan tot toepassing
      van het zesde lid, wordt het bestuur van de betrokken deelnemende gemeente in
      kennis gesteld van het daarop gerichte voornemen.
