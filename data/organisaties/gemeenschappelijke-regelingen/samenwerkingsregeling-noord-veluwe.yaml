  citeertitel: Samenwerkingsregeling Noord-Veluwe
  doel: Deze regeling wordt getroffen om een samenwerkingsverband in het leven te
    roepen met als doel de gemeenschappelijke belangen van de deelnemende gemeenten
    te behartigen en taken uit te voeren voor de deelnemende gemeenten en eventuele
    andere overheidsorganisaties, op het gebied van algemeen bestuurlijke aangelegenheden,
    ruimtelijke ordening, volkshuisvesting, sociaal-economische ontwikkeling, recreatie
    en toerisme, natuur en landschap, verkeer en vervoer, sociale zaken, arbeidsvoorziening,
    maatschappelijke zorg en welzijn, onderwijs en cultuur en milieuhygiëne en afvalstoffenverwijdering.
