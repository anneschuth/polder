gr_meta:
  citeertitel: Gemeenschappelijke Regeling Archief Gooi en Vechtstreek
  doel: De regeling is getroffen met het doel de belangen van de gemeenten in het
    samenwerkingsgebied bij alle aangelegenheden betreffende de archiefbescheiden,
    collecties, individuele documenten en dergelijke die berusten in de gemeentelijke
    archiefbewaarplaats van de gemeenten in gezamenlijkheid te behartigen alsmede
    het vervullen van de functie van regionaal kennis- en informatiecentrum op het
    gebied van de lokale en regionale geschiedenis door het opbouwen en beheren van
    een zo breed mogelijke collectie (regionaal) historische bronnen welke door haar
    op een zo actief mogelijke wijze beschikbaar wordt gesteld voor een breed publiek.
  samenwerkingsvorm:
