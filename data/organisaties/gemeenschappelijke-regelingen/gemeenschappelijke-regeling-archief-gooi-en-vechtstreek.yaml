  bevoegdheden:
  - kop_artikel: Artikel 4 Bevoegdheden
    inhoud_artikel: 1. De op basis van de Wet en aanverwante regelingen toegekende
      bevoegdheden van het college van burgemeester en wethouders en van de ambtenaren
      van de deelnemers in het kader van beheer en toezicht van het Archief Gooi en
      Vechtstreek worden in mandaat uitgeoefend door het college van burgemeester
      en wethouders en de ambtenaren van de centrumgemeente.2. De bevoegdheden met
      betrekking tot het stellen van beperkende bepalingen alsmede het opheffen van
      de openbaarheid van archiefbescheiden, zulks op basis van de artikelen 15, 15a
      en 16 van de Wet blijven voorbehouden aan de afzonderlijke colleges van burgemeester
      en wethouders respectievelijk andere natuurlijke personen of rechtspersonen,
      ieder voor zover het betreft diens ingebrachte archiefbescheiden.3. De uitvoering
      van speciale opdrachten, anders dan die beschreven in het werkplan, wordt door
      het college van burgemeester en wethouders van de centrumgemeente, gehoord de
      begeleidingscommissie, geregeld.
