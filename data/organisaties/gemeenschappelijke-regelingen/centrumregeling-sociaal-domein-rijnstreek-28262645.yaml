  citeertitel: Centrumregeling Sociaal domein Rijnstreek
  doel: 1. Het belang van deze regeling is het gezamenlijk vorm geven van de samenwerking
    op het gebied van de arbeidsinschakeling van de doelgroep(en) Participatiewet,
    inclusief de ondersteuning van de huidige WSW-medewerkers en inwoners die vallen
    onder Beschut Werken.2. Deze regeling heeft tot doel te komen tot een doelmatige
    uitvoering van de in artikel 4 van de regeling aan de centrumgemeente opgedragen
    taken.
  samenwerkingsvorm:
    value: '''Regeling zonder meer'''
