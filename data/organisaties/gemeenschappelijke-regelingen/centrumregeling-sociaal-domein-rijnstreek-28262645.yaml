  bevoegdheden:
  - kop_artikel: Artikel 5 – Bevoegdheden colleges
    inhoud_artikel: 1. Ter verwezenlijking van het doel, als bedoeld in artikel 2,
      kunnen de colleges van de regiogemeenten aan het college van Alphen aan den
      Rijn taken opdragen en bevoegdheden mandateren.2. De bevoegdheden die ter uitvoering
      van deze regeling worden gemandateerd, worden in een mandaatregeling opgenomen.
      De mandaatregeling wordt vastgesteld en gewijzigd door eensluidende besluiten
      van de colleges en burgemeesters van de gemeenten.3. Dit artikel is van overeenkomstige
      toepassing op het verlenen van volmacht tot het verrichten van privaatrechtelijke
      rechtshandelingen door Alphen aan den Rijn namens de gemeenten.
