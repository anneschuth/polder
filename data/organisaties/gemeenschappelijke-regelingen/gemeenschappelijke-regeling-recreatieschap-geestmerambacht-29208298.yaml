  bevoegdheden:
  - inhoud_artikel: "Artikel 51.\tAan het bestuur van het recreatieschap worden ter\
      \ behartiging van de in artikel 3 genoemde belangen en ter verwezenlijking van\
      \ de in artikel 4 omschreven taken alle bevoegdheden toegekend die aan de bestuursorganen\
      \ van de deelnemers toebehoren evenals alle bevoegdheden van regeling en bestuur\
      \ voortvloeiende uit de Wgr en de Gemeentewet, met inachtneming van de beperkingen\
      \ daarin gesteld en voorts met inachtneming van hetgeen in deze regeling verder\
      \ is bepaald.2. Onder de in het eerste lid overgedragen bevoegdheden worden\
      \ in ieder geval verstaan:a.\tbesluiten tot het oprichten van en deelnemen in\
      \ rechtspersonen, voor zover dit past binnen het in artikel 3 gestelde belang;b.\
      \ \tbesluiten tot het aangaan van overeenkomsten als bedoeld in artikel 4, tweede\
      \ lid.c.\tbesluiten tot het aangaan van overeenkomsten met derden, niet zijnde\
      \ deelnemers aan de regeling, tot het verrichten van adviserende, ondersteunde\
      \ en uitvoerende werkzaamheden op het gebied van natuur en recreatie.d.\thet\
      \ vaststellen van verordeningen, al dan niet door stafbepaling of bestuursdwang\
      \ te handhaven strekkende tot de uitoefening van het doel en de taken van het\
      \ recreatieschap, met in achtneming van het bepaalde in artikel 156, tweede\
      \ en derde lid van de Gemeentewet;e.\thet vaststellen van een belastingverordening\
      \ voor de heffing van rechten als bedoeld in artikel 229 van de Gemeentewet;f.\t\
      het uitoefenen van de gemeentelijke bevoegdheden, ingevolge artikel 430a van\
      \ hetWetboek van Strafrecht (ongeklede recreatie);g.\thet uitoefenen van de\
      \ bevoegdheid van het college van burgemeester en wethouders, als bedoeld in\
      \ artikel 2.1 en onder e van de Wet algemene bepalingen omgevingsrecht voor\
      \ wat betreft het gestelde in Bijlage I, onderdeel C, categorie 19, onder 19.1,\
      \ onder g en ten eerste van het Besluit omgevingsrecht (gemotoriseerde modelvliegtuigen,\
      \ -vaartuigen; -voertuigen)."
