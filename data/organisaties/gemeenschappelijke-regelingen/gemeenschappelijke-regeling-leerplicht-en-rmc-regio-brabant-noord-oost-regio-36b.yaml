  bevoegdheden:
  - kop_artikel: Artikel 1. Toedeling bevoegdheden
    inhoud_artikel: De colleges van burgemeester en wethouders van de Gemeenten Bernheze,
      Boekel, Boxmeer, Cuijk, Grave, Landerd, Lith, Maasdonk, Mill en Sint Hubert,
      Sint Anthonis, Sint-Oedenrode, Uden en Veghel mandateren de bevoegdheden die
      aan hen zijn toegekend in het kader van het toezicht op de naleving van de Leerplichtwet
      aan het college van burgemeester en wethouders van de Gemeente Oss.De colleges
      van burgemeester en wethouders van de Gemeenten Bernheze, Boekel, Boxmeer, Cuijk,
      Grave, Landerd, Lith, Maasdonk, Mill en Sint Hubert, Sint Anthonis, Sint-Oedenrode,
      Uden en Veghel staan toe dat het college van burgemeester en wethouders van
      de Gemeente Oss voor de gemandateerde bevoegdheden ondermandaat verlenen aan
      medewerkers van het Regionaal Bureau Leerlingzaken (RBL), met uitzondering van
      de bevoegdheid tot het aanwijzen van ambtenaren welke toezien op de naleving
      van de Leerplichtwet en het wijzigen van de instructie leerplichtambtenaar en
      RMC-functionaris.De colleges van burgemeester en wethouders van de Gemeenten
      Bernheze, Boekel, Boxmeer, Cuijk, Grave, Landerd, Lith, Maasdonk, Mill en Sint
      Hubert, Oss, Sint Anthonis, Sint-Oedenrode, Uden en Veghel verlenen hierbij
      aan haar portefeuillehouder Onderwijs mandaat tot het nemen van besluiten met
      betrekking tot de taakuitvoering van het Regionaal Bureau Leerlingzaken, e.e.a.
      binnen de dan geldende kaders en begroting, waarvan alleen gebruik gemaakt kan
      worden in het regionaal portefeuillehoudersoverleg Onderwijs & Educatie.
