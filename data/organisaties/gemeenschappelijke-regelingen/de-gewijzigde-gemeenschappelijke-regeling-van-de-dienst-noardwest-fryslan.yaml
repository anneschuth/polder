    en beheersing van ondersteunende processen en van uitvoeringstaken op het gebied
    van de wetten, voor zover die zijn opgedragen aan de colleges en voor zover de
    colleges die belangen voor wat betreft ondersteunende processen en voor uitvoeringstaken
    hebben op- of overgedragen aan de dienst.
