  bevoegdheden:
  - kop_artikel: 'Artikel 4: Taken en bevoegdheden'
    inhoud_artikel: 1. Ter uitvoering van het in artikel 3 van de regeling genoemde
      belang, dragen de colleges van de deelnemende gemeenten aan de dienst alle ondersteunende
      en uitvoerende taken op die aan de colleges toekomen op grond van de wetten,
      met inachtneming van het bepaalde in de leden 2-13 van dit artikel.2. Tot de
      uitvoerende taken horen niet:• het vaststellen van de begroting voor het sociaal
      domein;• het vaststellen van beleid op basis van de wetten;• Het evalueren van
      beleid;• De uitvoering van de toegang tot Jeugdwet- en maatwerkvoorzieningen
      op basis van de Wet Maatschappelijke ondersteuning.3. De colleges dragen de
      uitvoering van de Participatiewet, en het Besluit Bijstandverlening Zelfstandigen
      2004 en de Wet inkomensvoorziening oudere en gedeeltelijk arbeidsongeschikte
      werkloze werknemers en de Wet inkomensvoorziening oudere en gedeeltelijk arbeidsongeschikte
      zelfstandigen over aan de dienst voor welke uitvoering het bestuur volledig
      verantwoordelijk is, met in achtneming van lid 2;4. De deelnemende colleges
      mandateren aan het bestuur de bevoegdheid tot ondertekening van besluiten ter
      uitvoering van alle andere wetten als bedoeld in artikel 1 onder a.5. Het bestuur
      is bevoegd voor de uitvoering van de taken als bedoeld in lid 4 ondermandaat
      te verlenen aan de directeur of aan andere medewerkers van de dienst;6. Het
      bestuur houdt een overzicht bij van de besluiten die zij neemt ter uitvoering
      van het mandaat als bedoeld in lid 4 van dit artikel;7. Het bestuur bereidt
      de besluitvorming op bezwaar en (hoger) beroep voor.8. Voor zover het gaat om
      bezwaren die betrekking hebben op de wetten die de dienst in mandaat ondertekent
      (lid 4), beslist het betrokken college.9. De deelnemende gemeenten doen mededeling
      aan de dienst van bij hen in voorbereiding zijnde besluiten, maatregelen, plannen
      en beleid die voor de uitvoering van dit artikel van belang is.10. De dienst
      zal de uitvoering van de in de vorige leden van dit artikel omschreven taken
      zoveel als mogelijk verrichten met andere instanties die (mede) belast zijn
      met de uitvoering van de wet- en regelgeving op de terreinen van de sociale
      zekerheid, maatschappelijke zorg en gesubsidieerde arbeid.11. De dienst voert
      rechtmatigheidscontroles uit voor de wetten genoemd in artikel 1 onder a en
      rapporteert en adviseert daarover aan de colleges van de deelnemende gemeenten.12.
      De dienst bereidt de besluitvorming voor met betrekking tot de afhandeling van
      klachten en verzoeken in het kader van de Wet Openbaarheid van Bestuur voor
      zover het betreft de in het kader van de in de vorige leden van dit artikel
      omschreven taken.13. De dienst past de Algemene Verordening Gegevensbescherming
      toe.
