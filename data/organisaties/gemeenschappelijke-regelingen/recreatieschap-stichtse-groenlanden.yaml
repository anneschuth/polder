  text: De deelnemers in het Recreatieschap Stichtse Groenlanden zijn de gemeenten
    De Bilt, De Ronde Venen, Houten, Lopik, Stichtse Vecht, Nieuwegein, Utrecht, Woerden
    en IJsselstein, alsmede de Provincie Utrecht. Zie publicatie Gemeenschappelijke
    regeling recreatieschap Stichtse Groenlanden (publicatie d.d. 18-07-2024 op Overheid.nl,
    geldend vanaf 18-07-2024 t/m heden).
