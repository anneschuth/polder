  bevoegdheden:
  - kop_artikel: 'Artikel 4: Taken en bevoegdheden'
    inhoud_artikel: 1.Ter verwezenlijking van het doel worden in ieder geval, met
      inachtneming van het bepaalde in wettelijke voorschriften en deze regeling,
      de in artikel 5 genoemde taken verricht.2.Het Regionaal Archief Zuid-Utrecht
      is in het kader van de doelstelling bevoegd tot het op verzoek van één of meerdere
      deelnemende gemeenten en/of derden verrichten van diensten.3.Een besluit tot
      dienstverlening als bedoeld in lid 2 vermeldt ten minste de wijze van kostenberekening
      en de overige voorwaarden.
  - kop_artikel: Artikel 5
    inhoud_artikel: 1. Het Regionaal Archief Zuid-Utrecht heeft tot taak:-de zorg
      voor en het beheer van de in de archiefbewaarplaats berustende archiefbescheiden
      van de deelnemers, zoals nader omschreven in de Archiefwet 1995;-het toezicht
      op het beheer van de archiefbescheiden van de deelnemers, voor zover deze niet
      zijn overgebracht;-het stimuleren van de lokale en regionale geschiedbeoefening
      en het daartoe aanleggen, beheren en bewaren van een zo compleet mogelijke collectie
      bronnen op het gebied van de lokale en regionale geschiedenis.2.Aan het bestuur
      van de bedrijfsvoeringsorganisatie Regionaal Archief Zuid-Utrecht komen alle
      bevoegdheden tot regeling en bestuur toe die noodzakelijk zijn ten behoeve van
      de uitvoering van taken die bij deze gemeenschappelijke regeling aan het Regionaal
      Archief Zuid-Utrecht zijn opgedragen en die daarvoor bij of krachtens enig wettelijk
      voorschrift aan gemeentebesturen zijn of worden toegekend.
