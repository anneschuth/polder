gr_meta:
  citeertitel: Gemeenschappelijke regeling Veiligheidsregio Kennemerland 2019
  doel: De veiligheidsregio behartigt de belangen van de gemeenten op de volgende
    terreinen:a. veiligheid en publieke gezondheid;b. brandweerzorg;c. maatschappelijke
    zorg en jeugd;d. rampenbestrijding en crisisbeheersing in brede zin;e. risicobeheersing;f.
    samenwerking en coördinatie in de uitvoering van rampenbestrijding en crisisbeheersing;g.
    het beheer van een gemeenschappelijke meldkamer;h. het fungeren als overlegplatform
    voor onderwerpen op het gebied van veiligheid en gezondheid, maatschappelijke
    zorg en jeugd voor zover deze het verzorgingsgebied van de gemeenten gezamenlijk
    betreffen.
