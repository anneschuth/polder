gr_meta:
  citeertitel: gemeenschappelijke regeling Regionaal Historisch Centrum ‘Gelders Archief’
  doel: Transparante overheidVoor een goede relatie tussen burger en bestuur is transparantie
    levensvoorwaarde. Toegankelijke en duurzaam opgeslagen informatie draagt daar
    in het bijzonder aan bij. Nu ook het Gelders Archief steeds recenter gevormde
    archieven beheert, groeit onze bijdrage aan een transparante overheid. Met toezicht
    en advisering ondersteunt het Gelders Archief zijn partners bij een goed dynamisch
    informatiebeheer en denkt en helpt het mee aan een open en transparante overheid.Beschikbaar
    stellen van (historische) informatieVoor het verspreiden van kennis over het verleden
    van Gelderland is online dienstverlening op hetzelfde niveau als dienstverlening
    in onze studiezaal noodzakelijk. Een optimale toegankelijkheid van de collectie
    vraagt om een zo groot mogelijke digitale beschikbaarheid van de collectie. De
    opname van digitale archiefbescheiden bevordert deze online dienstverlening, evenals
    het digitaliseren van bescheiden op verzoek. Online aanwezigheid op verschillende
    platforms en kanalen vergroot de zichtbaarheid van het Gelders Archief en heeft
    een positieve invloed op hoe burgers, partners en andere belanghebbenden het Gelders
    Archief beleven.
