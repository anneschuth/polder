  bevoegdheden:
  - kop_artikel: Bevoegdheden Artikel 6
    inhoud_artikel: 1. Ten behoeve van de uitvoering van de in artikel 5 genoemde
      taken komen aan de bestuursorganen van de GGD de daarop betrekking hebbende
      gemeentelijke bevoegdheden toe, zoals deze voortvloeien uit de Wet publieke
      gezondheid, de Wet op het bevolkingsonderzoek en de Wet op de lijkbezorging.2.
      De in artikel 27, derde lid, bedoelde leidinggevende van de GGD is toezichthouder
      in de zin van artikel 61, eerste lid, Wet kinderopvang. Aan deze leidinggevende
      komen de toezichthoudende bevoegdheden als bedoeld in de Wet kinderopvang toe.
