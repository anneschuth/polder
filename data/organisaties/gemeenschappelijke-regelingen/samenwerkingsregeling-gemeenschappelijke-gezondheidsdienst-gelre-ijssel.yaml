  doel: De GGD heeft tot doel het behartigen van de gemeenschappelijke belangen van
    de gemeenten op het terrein van de openbare gezondheidszorg, zulks met inachtneming
    van hetgeen in deze regeling nader is bepaald met betrekking tot de taken en bevoegdheden
    van de GGD.
