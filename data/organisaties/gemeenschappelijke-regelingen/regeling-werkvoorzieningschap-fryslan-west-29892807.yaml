  bevoegdheden:
  - kop_artikel: Artikel 4 Doelstellingen, taken en bevoegdheden
    inhoud_artikel: 1. Het werkvoorzieningschap heeft ten doel het op een bedrijfsmatig
      verantwoorde wijze doen uitvoeren van taken van en voor gemeenten op het terrein
      van de gesubsidieerde arbeid en het adviseren van de gemeenten op het terrein
      van de gesubsidieerde arbeid.2. Ter aanvulling van het lid 1 genoemde doel voert
      het bestuur van het werkvoorzieningschap in ieder geval de taken en bevoegdheden
      uit van de colleges genoemd in de WSW binnen het werkgebied, met uitzondering
      van de taken en bevoegdheden genoemd in artikel 14, eerste lid WSW.3. Overeenkomstig
      het bepaalde in het eerste en tweede lid van dit artikel, dragen de colleges
      al hun bevoegdheden uit de WSW over aan het algemeen bestuur.4. Het werkvoorzieningschap
      houdt een werkomgeving in stand waarin personen als bedoeld in artikel 10b,
      eerste lid, van de Participatiewet in een beschutte omgeving onder aangepaste
      omstandigheden werkzaamheden kunnen verrichten.5. De colleges kunnen in mandaat
      andere bevoegdheden aan het bestuur of het personeel van het werkvoorzieningschap
      opdragen. De betreffende gemeenten en het werkvoorzieningschap sluiten een dienstverleningsovereenkomst
      af over de voorwaarden waaronder het mandaat wordt uitgeoefend.6. Het algemeen
      bestuur is bevoegd, ten behoeve van de in dit artikel genoemde doelstellingen,
      een of meer rechtspersonen op te richten of deel te nemen in een of meer bestaande
      dan wel te vormen rechtspersonen.
