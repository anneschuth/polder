description:
  text: 'Tresoar kent drie afdelingen: Collecties en Informatiebeheer, Publiek en
    presentatie en Bedrijfsvoering.Onder Collecties en Informatiebeheer vallen de
    collectievorming, catalogiseren en beschrijven van de collectie en  de conservering.Onder
    Publiek en presentatie vallen de studiezaal, educatieve activiteiten, communicatie,
    literaire en museale activiteiten.Onder Bedrijfsvoering vallen ICT, en facilitairNaast
    de drie afdelingen is er een kleine staf bestaande uit financiële administratie,
    secretariaat, controller en P&O medewerker.Er is een éénhoofdige directie'
