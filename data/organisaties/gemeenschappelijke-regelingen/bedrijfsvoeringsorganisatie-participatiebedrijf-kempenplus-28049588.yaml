  bevoegdheden:
  - kop_artikel: Artikel 5
    inhoud_artikel: 1. Het Participatiebedrijf heeft tot doel het behartigen van het
      gemeenschappelijk en afzonderlijk belang van de deelnemende gemeenten en de
      colleges op het gebied van:a. de sociale werkvoorziening ingevolge de WSW;b.
      werk en inkomen ingevolge de Pw met uitzondering van de bijzondere bijstand;c.
      de IOAW;d. de IOAZe. de Bbz,alsmede de hiervoor opgebouwde infrastructuur in
      te zetten voor re-integratiedoeleinden.2. Daartoe dragen de colleges van de
      deelnemende gemeenten hun bevoegdheden, die noodzakelijk zijn voor de uitvoering
      van het in lid 1 genoemde belang, over aan het bestuur van het Participatiebedrijf,
      te weten:a. De volledige uitvoering van de in het eerste lid genoemde wetten,
      daarop gebaseerde onderliggende landelijke regelgeving en gemeentelijke regelingen
      en van de daaruit voortvloeiende voorschriften, voor zover die uitvoering aan
      de colleges is opgedragen, alsmede van het beleid van de deelnemende gemeenten
      op het gebied van de in het eerst lid genoemde regelgeving.b. Het oprichten,
      exploiteren en in stand houden van bedrijven voor industriële, cultuurtechnische,
      administratieve werkzaamheden, detacheringen en traject-begeleiding, welke zoveel
      mogelijk zijn gericht op het behouden dan wel bevorderen van de arbeidsbekwaamheid
      van de werknemer mede met het oog op het kunnen verrichten van arbeid onder
      normale omstandigheden.3. De aan de colleges toekomende bevoegdheden om beleidsregels
      vast te stellen worden niet overgedragen.4. Het bestuur draagt zorg voor het
      nemen van besluiten op bezwaar en het instellen van en voeren van procedures
      in (hoger) beroep op grond van de regelgeving als genoemd in het eerste lid.5.
      Het bestuur draagt zorg en is verantwoordelijk voor de beleidsvoorbereiding
      van de taken genoemd in dit artikel en doet daartoe voorstellen aan de colleges,
      of als de raden de beslissingsbevoegdheid hebben, via de colleges aan de raden.6.
      Het bestuur kan binnen het kader van het in lid 1 omschreven doel één of meerdere
      privaatrechtelijke rechtspersonen oprichten.7. De colleges verplichten zich
      tot het medewerken aan het vinden van voldoende en geëigende werkzaamheden voor
      de Wsw medewerkers.8. Voor zover de diensten vallen binnen het kader van de
      in dit artikel genoemde taken, is het Participatiebedrijf bevoegd om tot een
      maximum van 20% van zijn omzet, of althans tot een zodanig percentage dat wettelijk
      is toegestaan, bevoegd tot het verrichten van dezelfde diensten voor andere
      publiekrechtelijke rechtspersonen.9. Voor zover de in het eerste lid genoemde
      wetten en regelingen wijzigingen in de inhoud of benaming daarvan ondergaan
      en deze wijzigingen als rechtsopvolging kunnen worden aangemerkt vallen die
      wijzigingen eveneens tot het doel van deze regeling.
