  bevoegdheden:
  - kop_artikel: Artikel 5 Overdracht Bevoegdheden
    inhoud_artikel: 1. Het samenwerkingsverband en de bestuursorganen van het samenwerkingsverband
      als bedoeld in artikel 3 en artikel 25 komen de bevoegdheden toe die in deze
      regeling aan het samenwerkingsverband en de bestuursorganen van het samenwerkingsverband
      zijn toegekend.2. Aan het samenwerkingsverband wordt overgedragen de bevoegdheid
      tot heffing en invordering van de volgende belastingen, voor zover de deelnemer
      de genoemde belasting kent:-onroerende-zaakbelastingen;-hondenbelasting;-rioolheffing;-afvalstoffenheffing;-reinigingsrechten;-forensenbelasting;-toeristenbelasting;-precariobelasting;-de
      waterschapsbelastingen.
