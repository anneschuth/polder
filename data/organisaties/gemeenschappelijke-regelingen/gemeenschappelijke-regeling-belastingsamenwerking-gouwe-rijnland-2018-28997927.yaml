gr_meta:
  citeertitel: Gemeenschappelijke Regeling Belastingsamenwerking Gouwe-Rijnland 2018
  doel: 1. In het kader van deze gemeenschappelijke regeling worden de belangen van
    de deelnemers, elk voor zover het hun grondgebied en hun belangen betreft, behartigd
    op het gebied van:a. de heffing en invordering van belastingen;b. de uitvoering
    van de Wet waardering onroerende zaken, waaronder tevens wordt begrepen de administratie
    van vastgoedgegevens op basis van deze wet en het verstrekken van vastgoedgegevens
    aan de deelnemers en derden.2. Het samenwerkingsverband kan de deelnemers adviseren
    omtrent de belastingen waarvan de heffing en invordering bij of krachtens dit
    artikel is overgedragen aan het samenwerkingsverband.
