description:
  text: Syntrophos is het Shared Service Center (SSC) voor de gemeenten Nissewaard
    en Voorne aan Zee.Wij leveren diensten op het gebied van ICT, GEO-informatie en
    data. Met ongeveer 55 specialisten staan wij iedere dag klaar voor onze gebruikers.
    Wij verbinden kennis, middelen en mensen met elkaar om zo een bijdrage te leveren
    aan de dienstverlening van onze partners.
