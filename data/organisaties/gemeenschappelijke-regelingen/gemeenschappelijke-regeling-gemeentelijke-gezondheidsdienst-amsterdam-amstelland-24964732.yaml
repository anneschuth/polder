  citeertitel: Gemeenschappelijke regeling Gemeentelijke Gezondheidsdienst Amsterdam-Amstelland
  doel: Het lichaam heeft tot doel:a. het beschermen en bevorderen van de gezondheid
    van de bevolking of van specifieke groepen daarbinnen, in het rechtsgebied van
    het lichaam;b. het voorkomen en het vroegtijdig opsporen van ziekten onder de
    bevolking;c. het bevorderen van de openbare geestelijke gezondheidszorg;d. het
    zorg dragen voor een Advies en Meldpunt Huiselijk geweld en Kindermishandeling;
    met als doel onder andere:-De duur, de ernst en de kans op herhaling van huiselijk
    geweld en kindermishandeling in afzonderlijke gezinnen/families doen afnemen;-Meer
    kinderen geweldloos kunnen laten opgroeien.e. Zorgdragen voor het Centrum Seksueel
    Geweld (CSG) met als doel onder andere de versterking van de hulpverlening aan
    slachtoffers van seksueel geweld in de regio.alles wat met het bovenstaande in
    de ruimste zin verband houdt.
