  bevoegdheden:
  - kop_artikel: Bevoegdheden  Artikel 10
    inhoud_artikel: 1. Het algemeen bestuur besluit op voorstel van het dagelijks
      bestuur over de omvang en inhoud van het takenpakket en de kosten die hieraan
      gekoppeld zijn. De taken zijn omschreven in artikel 4.2. Het algemeen bestuur
      stelt jaarlijks (deel)jaarplannen, (deel)begrotingen) en –(deel)jaarrekeningen
      vast voor beheerskosten en Veilig Thuis.3. Het lid Amsterdam zal via haar eigen
      begroting het door haar gewenste takenpakket voor de wettelijke taken op het
      gebied van de openbare gezondheidszorg, zoals genoemd in artikel 4 lid 1 sub
      b vaststellen, tenzij in deze regeling hierop een uitzondering is vastgelegd.4.
      De leden Aalsmeer, Amstelveen, Diemen, Ouder-Amstel en Uithoorn zullen via hun
      eigen begroting van door hen gewenste takenpakket voor de wettelijke taken op
      het gebied van de openbare gezondheidszorg, zoals genoemd in artikel 4 lid 1
      sub b, vaststellen, tenzij in deze regeling hierop een uitzondering is vastgelegd.5.
      Het te nemen besluit omtrent het takenpakket wordt voor een periode van vier
      jaar, te beginnen vanaf 2016 tot 2020 vastgesteld.6. Het algemeen bestuur kan
      het taken pakket tussentijds wijzigen. Mogelijke frictie kosten zijn voor de
      leden van de GR, zie artikel 28 lid 2.7. Verder behoren alle andere bevoegdheden
      in het kader van deze regeling, die niet aan een ander orgaan zijn opgedragen,
      aan het algemeen bestuur.
