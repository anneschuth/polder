  bevoegdheden:
  - kop_artikel: Artikel 5 Bevoegdheden inzake basispakket
    inhoud_artikel: Met betrekking tot de behartiging van de in artikel 4, lid 2,
      sub a t/m e genoemde belangen heeft Regio Twente de volgende bevoegdheden:1.
      Publieke gezondheid, onder de naam GGD Twente:a. de instelling en instandhouding
      van een gezondheidsdienst als bedoeld artikel 14, lid 1 van de Wet publieke
      gezondheid ter uitvoering van de in deze wet in de artikelen 2, 5, 5a, 6, 6b,
      15 en 15a aan het college opgedragen taken;b. de in de Wet publieke gezondheid
      in de artikelen 16, 18, 27, 28 en 29 aan de gemeentelijke gezondheidsdienst
      toegekende taken en bevoegdheden;c. de benoeming van gemeentelijke lijkschouwers
      als bedoeld in artikel 4 van de Wet op de lijkbezorging;d. op verzoek van één
      of meer deelnemers de uitvoering van specifieke werkzaamheden.2. Jeugdhulp en
      maatschappelijke ondersteuning:a. uitvoeren en/of uitbesteden van taken waarvan
      de Jeugdwet en/of de Wmo 2015 beogen dat deze regionaal worden uitgevoerd:1
      advies- en meldpunt huiselijk geweld en kindermishandeling;2 jeugdbescherming
      en jeugdreclassering;3 jeugdzorgplus;4 residentiële/specialistische jeugdzorg;5
      crisisdienst.b. overige vrijwillig overeengekomen taken:1 uitvoeren en/of uitbesteden
      van werving, matchen en uitvoeren pleegzorg;2 inrichten en inhoudelijk faciliteren
      van een regionaal reflectiepunt;3 inrichten van een advies- en consultatiefunctie;4
      inrichten van een backoffice voor taken die regionaal worden uitgevoerd of ingekocht
      en uitvoeren van ondersteunende werkzaamheden daarin.3. Sociaaleconomische structuurversterking:a.
      beheren regionale investerings- en stimuleringsfondsen;b. opzetten en uitvoeren
      projecten;c. aanvragen van subsidies voor projecten.d. initiëren van, participeren
      in en faciliteren van samenwerking met maatschappelijke partners;4. Recreatieve
      voorzieningen:a. bevordering van totstandkoming en instandhouding van publieke
      recreatieve/toeristische infrastructuur in Twente;b. aanleg, onderhoud en beheer
      van publieke recreatieve/toeristische voorzieningen die hetzij op zichzelf,
      hetzij in routeverband, hetzij door opname in arrangementen, een bovenlokaal
      karakter hebben.5. Bovengemeentelijke belangenbehartiging:a. bevorderen van
      gemeenschappelijke standpuntbepaling van de deelnemers;b. bepleiten van de gezamenlijke
      belangen van alle of enkele deelnemende gemeenten bij andere overheden en maatschappelijke
      organisaties;6. Overig:a. het oprichten van onderscheidenlijk deelnemen in stichtingen,
      maatschappen, vennootschappen, verenigingen, coöperaties en onderlinge waarborgmaatschappijen,
      voor zover dit betreft de taken en bevoegdheden als bedoeld in dit artikel onder
      1 tot en met 5;b. het treffen en wijzigen van een gemeenschappelijke regeling
      tussen Regio Twente en andere openbare lichamen alsmede het toetreden tot en
      het uittreden uit een dergelijke gemeenschappelijke regeling, voor zover dit
      betreft de uitvoering van werkzaamheden op het gebied van bedrijfsvoering ten
      behoeve van Regio Twente en indien het algemeen bestuur daarmee unaniem instemt.
