gr_meta:
  citeertitel: Regeling Regio Twente
  doel: 'De Regio Twente heeft met inachtneming van wat in deze regeling is bepaald,
    tot doel in de betreffende regio de volgende belangen te behartigen: openbare
    orde en veiligheid, volksgezondheid, milieu en afvalverwerking, ruimtelijke ontwikkeling,
    verkeer en vervoer, sociaal- economische ontwikkeling, recreatie en toerisme,
    grensoverschrijdende samenwerking, arbeidsvoorziening, volkshuisvesting en grondbeleid.'
