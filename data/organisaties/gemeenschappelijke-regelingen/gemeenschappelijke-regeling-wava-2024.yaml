  bevoegdheden:
  - kop_artikel: Artikel 5
    inhoud_artikel: "1.\tTer uitvoering van het bepaalde in de artikelen 3 en 4 dragen\
      \ de colleges alle ter zake van de uitvoering van de Wsw aan de colleges toekomende\
      \ bevoegdheden en verplichtingen over aan WAVA.2.\tTer uitvoering van het bepaalde\
      \ in de artikelen 3 en 4 zullen colleges taken en budget geven in het kader\
      \ van de Participatiewet. De taken hebben betrekking op werkgeversdienstverlening,\
      \ participatiebanen, beschut werk en re-integratie.3.\tTer uitvoering van het\
      \ bepaalde in de artikelen 3 en 4 dragen de colleges een gezamenlijke verantwoording\
      \ om uitvoeringstaken duurzaam vast te leggen."
