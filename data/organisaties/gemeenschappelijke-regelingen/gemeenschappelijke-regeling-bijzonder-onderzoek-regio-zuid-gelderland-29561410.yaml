  citeertitel: Gemeenschappelijke Regeling Bijzonder Onderzoek Regio Zuid-Gelderland
  doel: De centrumgemeente heeft tot taak gemeenschappelijke belangen van de deelnemende
    gemeenten te behartigen op het gebied van de naleving door (voormalig) uitkeringsgerechtigden
    en derden van alle de gemeente opgedragen sociale zekerheidswetgeving, de Wet
    maatschappelijke ondersteuning, de Wet Inburgering 2021 en op dat gebied uitgevaardigde
    regelingen en besluiten met dien verstande dat een onderzoek tot bijzondere controle
    op deze naleving eerst plaatsvindt na een daartoe strekkende opdracht van de centrumgemeente
    naar aanleiding van een onderzoek van het college van een deelnemende gemeente.
  samenwerkingsvorm:
