gr_meta:
  citeertitel: Gemeenschappelijke Regeling Belastingsamenwerking West-Brabant
  doel: In het kader van deze gemeenschappelijke regeling worden de belangen van de
    deelnemers, elk voor zover het hun grondgebied betreft, behartigd op het gebied
    van :a. de heffing en invordering van belastingen;b. de uitvoering van de Wet
    waardering onroerende zaken;c. de uitvoering van de Basisadministratie Adressen
    en Gebouwen,voor zover deze in de besluiten tot deelname aan de regeling niet
    uitdrukkelijk zijn uitgesloten van de taakoverdracht aan de BWB.
