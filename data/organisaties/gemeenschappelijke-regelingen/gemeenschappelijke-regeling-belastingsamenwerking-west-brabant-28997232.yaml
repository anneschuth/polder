  bevoegdheden:
  - kop_artikel: Artikel 5 Overdracht bevoegdheden en uitvoeringsconvenant
    inhoud_artikel: 1. Aan het bestuur van de BWB worden alle bestuursbevoegdheden
      overgedragen die samenhangen met de in artikel 4 genoemde taakgebieden, met
      uitzondering van de verordenende bevoegdheden.2. Ter uitvoering van de in artikel
      4 overgedragen taken en de in het eerste lid overgedragen bestuursbevoegdheden
      worden uitvoeringsconvenanten aangegaan met de ambtelijke organisatie van de
      BWB, in deze vertegenwoordigd door de directeur, en de deelnemer, in deze vertegenwoordigd
      door de secretaris. Het uitvoeringsconvenant bevat tenminste afspraken over
      de verplichtingen van de BWB en de deelnemer in relatie tot de taakoverdracht,
      de contactmomenten ambtelijke organisaties, verantwoordelijkheden P&C cyclus,
      de informatie-uitwisseling over de heffing en inning en de financiële geldstromen.
