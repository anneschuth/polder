  citeertitel: Gemeenschappelijke regeling van de Sociale Dienst Oost Achterhoek
  doel: 1. Deze regeling wordt getroffen om zorg te dragen voor een effectieve en
    efficiënte uitvoering van de taken van de colleges op het brede terrein van het
    sociaal domein waaronder de arbeidsparticipatie, arbeidsondersteuning, werk en
    inkomen. Daarnaast geldt deze regeling ook voor de burgers, die behoren tot de
    re-integratiedoelgroep of die een beroep doen op de Wsw of op andere wetten genoemd
    in artikel 4, eerste lid, arbeid te bieden, bij voorkeur onder normale omstandigheden,
    die aansluit bij hun capaciteit en mogelijkheden.2. De dienst staat voor maximale
    zelfstandigheid van de klanten op het gebied van arbeid, inkomen en participatie.3.
    De dienst is klantgericht, resultaatgericht en levert, in samenwerking met partners,
    maatwerk.4. De dienst voert de opgedragen taken uit met betrokken, professioneel
    en kwalitatief goed personeel.5. De dienst heeft ambitie en wenst een voortrekkersrol
    te vervullen.
