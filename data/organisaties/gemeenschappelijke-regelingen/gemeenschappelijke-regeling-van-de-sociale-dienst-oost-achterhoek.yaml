  bevoegdheden:
  - inhoud_artikel: 1. Het algemeen bestuur van de Sociale Dienst Oost Achterhoek
      heeft als taak zorg te dragen voor de uitvoering van de taken van de colleges,
      als genoemd in de volgende wetten en alle regelingen en alle regelgeving op
      landelijk en gemeentelijk niveau waarmee nadere uitwerking wordt gegeven aan
      deze wetten:a. Participatiewet;b. Besluit bijstandsverlening zelfstandigen;c.
      Wet inkomensvoorziening oudere en gedeeltelijk arbeidsongeschikte werkloze werknemers;d.
      Wet inkomensvoorziening oudere en gedeeltelijk arbeidsongeschikte gewezen zelfstandigen;e.
      Wet inburgering;f. Gemeentelijke regelingen op het gebied van de schuldhulpverlening;g.
      Gemeentelijke regelingen op het gebied van minimabeleid en bijzondere bijstand;h.
      Wet sociale werkvoorziening, met uitzondering van de bevoegdheid aan een Wsw-geïndiceerde
      een dienstbetrekking aan te bieden voor het verrichten van arbeid onder aangepaste
      omstandigheden (artikel 2 Wet Sociale werkvoorziening).2. Ter uitvoering van
      de taken, bedoeld in het eerste lid, dragen de colleges de bevoegdheden van
      de colleges over aan het algemeen bestuur.3. De colleges kunnen ten aanzien
      van de overgedragen bevoegdheden, bedoeld in het tweede lid, beleidsregels geven
      overeenkomstig artikel 4:81, eerste lid, en artikel 10:16, eerste lid, van de
      Algemene wet bestuursrecht (Awb).4. De taken genoemd onder het eerste lid worden
      zoveel mogelijk uitgevoerd in samenwerking met de ketenpartners als bedoeld
      in de wet Structuur uitvoeringsorganisatie en inkomen.5. Met het oog op de uitvoering
      van de taken, bedoeld in het eerste lid, kunnen de gemeenten aan de Sociale
      Dienst Oost Achterhoek opdrachten voor dienstverlening verlenen.6. De colleges
      kunnen ook andere taken opdragen aan het bestuur, voor zover het algemeen bestuur
      daarmee instemt met gekwalificeerde meerderheid van twee derde van de uitgebrachte
      stemmen.
