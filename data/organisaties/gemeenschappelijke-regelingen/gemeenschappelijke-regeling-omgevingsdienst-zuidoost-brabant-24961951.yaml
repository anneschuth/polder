gr_meta:
  citeertitel: Gemeenschappelijke Regeling Omgevingsdienst Zuidoost-Brabant
  doel: De Omgevingsdienst is ingesteld om ten behoeve van de deelnemers taken uit
    te voeren op het gebied van het omgevingsrecht en daarmee als uitvoeringsdienst
    van het lokaal en provinciaal bestuur een bijdrage te leveren aan het realiseren
    en borgen van de door de verantwoordelijke overheden in de regio Zuidoost-Brabant
    aangegeven kwaliteit van de fysieke leefomgeving.
