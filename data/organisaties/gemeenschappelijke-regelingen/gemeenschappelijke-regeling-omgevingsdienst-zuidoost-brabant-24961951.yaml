  bevoegdheden:
  - kop_artikel: 'Artikel 3 van de Gemeenschappelijke Regeling: Bevoegdheden'
    inhoud_artikel: 1. Het Algemeen Bestuur en Dagelijks Bestuur hebben verordenende
      en regelgevende bevoegdheden met betrekking tot de aangelegenheden die de bedrijfsvoering
      van de Omgevingsdienst betreffen.2. Het Algemeen bestuur respectievelijk het
      Dagelijks bestuur kunnen afzonderlijk of tezamen, ieder voor zover zij bevoegd
      zijn, een gemeenschappelijke regeling treffen ter behartiging van een of meer
      bepaalde belangen van het openbaar lichaam.3. Het Algemeen Bestuur is bevoegd
      met het oog op het in artikel 2 benoemd belang en na verkregen toestemming van
      de raden en Provinciale Staten tot het vaststellen of wijzigen van een Gemeenschappelijke
      Regeling tussen de Omgevingsdienst en andere openbare lichamen, alsmede tot
      het toetreden tot en het uittreden uit een dergelijke regeling.4. Het Algemeen
      Bestuur is bevoegd te besluiten tot de oprichting van of deelname in stichtingen,
      maatschappen, vennootschappen en coöperaties en verenigingen, dan wel de ontbinding
      daarvan of beëindiging van deelneming daaraan op voorwaarde dat de raden en
      Provinciale Staten vooraf in de gelegenheid zijn gesteld hun wensen en bedenkingen
      met betrekking tot het voorgenomen besluit aan het Algemeen Bestuur kenbaar
      te maken.5. Het Dagelijks Bestuur is bevoegd met Gedeputeerde Staten en met
      de colleges van één of meer al dan niet deelnemende gemeenten samenwerkingsovereenkomsten
      te sluiten met betrekking tot ondersteunende dienstverlening door Gedeputeerde
      Staten en de colleges voor taken waarmee de Omgevingsdienst belast is.6. Het
      Dagelijks Bestuur kan enkel op basis van de door de heffingsambtenaren van de
      deelnemers verleende externe mandaten leges innen voor het op aanvraag door
      de Omgevingsdienst leveren van diensten en het uitvoeren van taken voor derden.
      De leges wordt vastgesteld op basis van de door iedere deelnemer gehanteerde
      norm. De leges komen ten goede aan de betrokken deelnemer.
