description:
  text: Het gemeenschappelijk orgaan heeft tot doel het realiseren van een effectieve,
    efficiënte, kwalitatief hoogwaardige en duurzame beleidsondersteuning en uitvoering
    van het afval- en grondstoffenbeheer.Het gemeenschappelijk orgaan draagt daarmee
    bij aan de beleidsdoelstellingen van de deelnemende gemeenten, zoals bescherming
    van het milieu en duurzaamheid, het bieden van regionale werkgelegenheid, het
    leveren van goede service en betaalbaarheid van de diensten.
