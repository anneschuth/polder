  doel: Het GISD Regio Alkmaar behartigt de belangen van de gemeenten op het terrein
    van uitvoering van de taken als bedoeld in artikel 4 van deze regeling op de onderdelen
    jeugdhulp, maatschappelijke ondersteuning en leerlingenvervoer binnen het sociaal
    domein.
