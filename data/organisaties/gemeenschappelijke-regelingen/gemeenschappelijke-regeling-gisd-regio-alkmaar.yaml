  bevoegdheden:
  - kop_artikel: Artikel 5. Algemene bevoegdheidstoedeling
    inhoud_artikel: 1. De deelnemers dragen geen bevoegdheden over aan het GISD Regio
      Alkmaar.2. De deelnemers zorgen voor toereikende mandaten, volmachten en machtigingen
      die het GISD Regio Alkmaar nodig heeft voor de uitoefening van zijn taken.3.
      Ondermandaat/-volmacht/-machtiging is toegestaan, tenzij dat uitdrukkelijk door
      de deelnemers is uitgesloten;4. Alle bevoegdheden die bij of krachtens enige
      wet van toepassing zijn op het GISD Regio Alkmaar komen toe aan het bestuur;5.
      Er wordt door het bestuur een register bijgehouden van de overeenkomstig het
      tweede en derde lid verleende bevoegdheden.
