description:
  text: Gemeenschappelijke regeling Peelgemeenten (GR Peelgemeenten) is een samenwerkingsverband
    tussen de gemeenten Asten, Deurne, Gemert-Bakel, Laarbeek en Someren binnen het
    sociaal domein. Onze organisatie heeft als doel om het beste resultaat te boeken
    voor onze inwoners. Onze organisatie bestaat uit een Algemeen bestuur, Dagelijks
    bestuur, voorzitter en de ambtelijke organisatie.Bestuurlijke organen:Het Algemeen
    bestuur is het hoogste besluitvormende orgaan binnen GR Peelgemeenten. Zij stelt
    beleidskaders en begrotingen vast en controleert de uitvoering van het beleid.
    Het Algemeen bestuur bestaat uit vertegenwoordigers van de deelnemende gemeenten;
    van iedere gemeente één wethouder financiën en één wethouder sociaal domein.Het
    Dagelijks bestuur is verantwoordelijk voor de dagelijkse leiding en uitvoering
    van de besluiten van de regeling. Dit omvat het voorbereiden en uitvoeren van
    beleid, het beheren van financiën en het toezicht houden op de uitvoering van
    de taken. Een aantal van deze bevoegdheden zijn gemandateerd aan de Algemeen directeur.De
    voorzitter vertegenwoordigt de organisatie in en buiten rechte en zit de vergaderingen
    van het Algemeen bestuur en Dagelijks bestuur voor.Ambtelijke organisatie:De ambtelijke
    organisatie bestaat uit drie afdelingen, te weten Dienstverlening, Bedrijfsvoering
    & Advies en Opgavegericht en programmatisch werken.Dienstverlening richt zich
    op de praktische uitvoering van de taken op het gebied van de Wet maatschappelijke
    ondersteuning 2015 (Wmo), Jeugdwet, BMS (Bijzondere bijstand, minimaregelingen,
    Wet gemeentelijke schuldhulpverlening en aanverwante wet- en regelgeving zoals
    de regeling gehandicaptenparkeerkaarten en de regeling Sociaal Medische Indicatie
    Kinderopvang), de Wet Inburgering 2021 en aanverwante wet- en regelgeving.Bedrijfsvoering
    & Advies is ondersteunend aan de dienstverlening en zorgt ervoor dat iedereen
    binnen de dienstverlening zijn werk goed kan doen. Hier werken professionals met
    uiteenlopende expertises (PIOFACH).Opgavegericht en programmatisch houdt zich
    bezig met het samen bouwen aan een stevig sociaal domein. Dit doen we door gericht
    samen te werken aan de maatschappelijke opgaven binnen het sociaal domein van
    de vijf Peelgemeenten. Deze manier van werken is vormgegeven in programma's en
    programmateams. We werken gezamenlijk met onze vijf deelnemende gemeenten volgens
    de visie samenwerken door samen werken.
