  bevoegdheden:
  - kop_artikel: Artikel 4
    inhoud_artikel: 4.1 De gemeenschappelijke regeling wordt getroffen om de volgende
      belangen te bevorderen;a. de publieke taken in verband met het nautisch beheer,
      de scheepvaart, de havens en de vaarwegen in het beheersgebied; enb. de economische
      ontwikkeling, de exploitatie van havens, wegen, werken, industrieterreinen en
      wateren binnen het beheersgebied, mede teneinde daardoor de bedrijvigheid en
      werkgelegenheid en duurzaamheid in de provincie Groningen te bevorderen.4.2
      De GR heeft tot taak;1. het vervullen van de publieke taken in verband met het
      nautisch beheer, de scheepvaart, de havens en de vaarwegen in het beheersgebied.
      De GR heeft deze taak opgedragen aan en laat dit uitvoeren door Groningen Seaports
      N.V. (hierna de NV); en2. voor deze NV, zolang dit naar het oordeel van de GR
      nodig is, garant staan voor door de NV te stellen zekerheden, alsmede3. overeenkomsten
      met haar aan te gaan die bijdragen aan de verwezenlijking van de statutaire
      doelstelling van de N.V..4.3 Aan het bestuur van de GR zijn en worden hierbij,
      door de deelnemers, ieder voor zover het hun bevoegdheden betreft, de bevoegdheden
      overgedragen, die zij hebben en die ter uitvoering van haar in artikel 4.2 omschreven
      taken nodig zijn, in het bijzonder:a. de publiekrechtelijke bevoegdheden in
      verband met het nautisch beheer, de scheepvaart, de havens en de vaarwegen,
      voor zover berustend bij de deelnemers. Het betreft de bevoegdheden zoals die
      op grond van- de Scheepvaartverkeerswet,- het Binnenvaartpolitiereglement,-
      de Wrakkenwet, het Loodsplichtbesluit 1995,- het Besluit opleidingen en bevoegdheden
      nautische beroepsbeoefenaren,- de Wet voorkoming verontreiniging door schepen,-
      de Regeling vervoer gevaarlijke stoffen met zeeschepen (RVGZ),- de Wet vervoer
      gevaarlijke stoffen,- de Waterstaatswet,- de Havenbeveiligingswet,- alsmede
      andere regelingen de scheepvaart en scheepvaartladingen betreffende, en wel
      voor zover betrekking hebbende op het beheersgebied; alsmedeb. de bevoegdheid
      ter zake (belasting)verordeningen te maken, ook voor zover op overtreding daarvan
      straf gesteld wordt; alsmedec. de bevoegdheid om zo nodig de naleving van wet-
      en regelgeving, zoals deze onder meer zijn neergelegd in de Havenbeheersverordening
      - en het Havenreglement Groningen Seaports te verzekeren door de toepassing
      van bestuursdwang c.q. het opleggen van een last onder dwangsom, een en ander
      op voet van de Algemene wet bestuursrecht en voorts artikel 122 Provinciewet
      en artikel 125 Gemeentewet alsmede tot opleggen van heffingen of belastingen
      ter zake de taken en/of bevoegdheden genoemd in artikel 4.2. onder 1.4.4 Tot
      de aan het bestuur van de GR overgedragen taken en bevoegdheden horen uitdrukkelijk
      niet die op grond van de Wegenwet en publiekrechtelijke taken en bevoegdheden
      in verband met de riolering en het baggeren.4.5 Het algemeen bestuur kan met
      inachtneming van het gestelde in artikel 54 lid 1 onder a van de Wet en met
      instemming van de deelnemers, besluiten dat verandering wordt gebracht in de
      aan het bestuur van de GR overgedragen bevoegdheden, met dien verstande dat
      het algemeen bestuur niet kan besluiten tot uitbreiding van de overgedragen
      bevoegdheden. Van de instemming dienen de deelnemers vooraf schriftelijk blijk
      te geven.
