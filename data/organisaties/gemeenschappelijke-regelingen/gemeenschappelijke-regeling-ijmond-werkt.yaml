  bevoegdheden:
  - kop_artikel: Artikel 5 Taken en bevoegdheden
    inhoud_artikel: 1. Het samenwerkingsverband heeft de volgende taken:a. zoveel
      mogelijk ingezetenen die Wsw-geïndiceerd zijn, arbeid te bieden, bij voorkeur
      onder normale omstandigheden, die aansluit bij hu n capaciteiten en mogelijkheden;b.
      zoveel mogelijk ingezetenen die behoren tot de re-integratiedoelgroep te begeleiden
      naar werk, bij voorkeur onder normale omstandigheden ;c. alle uit de Pw voortvloeiende
      uitvoeringstaken op het gebied van re-integratie te verrichten;2. Het samenwerkingsverband
      heeft de volgende bevoegdheden:a. alle uit de Wsw voortvloeiende uitvoeringstaken
      zijn aan het algemeen bestuur van het samenwerkingsverband gedelegeerd;b. de
      uitvoeringstaken op het gebied van re-integratie in het kader van de Pw , de
      IOAW, de IOAZ en de Anw worden door het algemeen bestuur en de directeur in
      mandaat uitgevoerd; De colleges nemen hiertoe afzonderlijke mandaatbesluiten;c.
      naast taken die voortvloeien uit de in artikel 4 , lid 1 genoemde wetten kan
      het samenwerkingsverband, indien en voor zover daartoe unaniem door de colleges
      een mandaatbesluit is genomen, ook taken uitvoeren in het kader van de in artikel
      4, lid 2 en 3 bedoelde wetgeving;d. de taken worden uitgevoerd binnen de geldende
      beleidskaders en binnen de begroting.
