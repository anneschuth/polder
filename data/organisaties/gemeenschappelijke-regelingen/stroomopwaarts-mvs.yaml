description:
  text: Over StroomopwaartsStroomopwaarts is er voor de inwoners van Maassluis, Vlaardingen
    en Schiedam op hun weg naar werk. Wij gaan bij mensen op zoek naar hun eigen kracht
    en bieden begeleiding, training, opleiding en als dat nodig is een tijdelijk inkomen.
    Ook voor mensen met een arbeidsbeperking. Dit doen wij vanuit het Werkplein, het
    Werkleerbedrijf, samen met maatschappelijke partners en met lokale ondernemers.Sinds
    1 juli 2015 bestaat Stroomopwaarts en voert namens de gemeenten Maassluis, Vlaardingen
    en Schiedam het gedeelte Werk en Inkomen uit. Ook de sociale werkplaatsen van
    deze gemeenten zijn van Stroomopwaarts. Deze sociale werkplaatsen noemen wij het
    Werkleerbedrijf.ParticipatiewetStroomopwaarts voert namens de gemeenten Maassluis,
    Vlaardingen en Schiedam regelingen uit. Dit betreft de regelingen:ParticipatiewetSchuldhulpverleningIOAZ
    (Wet inkomensvoorziening oudere en gedeeltelijk arbeidsongeschikte gewezen zelfstandigen)IOAW
    (Wet inkomensvoorziening oudere en gedeeltelijk arbeidsongeschikte gewezen werkzoekenden)Sociaal
    ondernemenStroomopwaarts is dé partner in sociaal ondernemen. Het Werkgeversservicepunt
    (WSP) van Stroomopwaarts geeft ondernemers advies over de mogelijkheden om sociaal
    te ondernemen en adviseert over mogelijke regelingen vanuit het Rijk. Daarnaast
    denken de accountmanagers van het WSP graag mee over detachering of plaatsing
    van medewerkers met een afstand tot de arbeidsmarkt en bieden de mogelijkheid
    werk uit te besteden aan het Werkleerbedrijf van Stroomopwaarts.Nieuwe Wet InburgeringStroomopwaarts
    helpt nieuwkomers in Maassluis, Vlaardingen en Schiedam op weg om aan hun inburgeringsplicht
    te voldoen en om bekend te raken in hun nieuwe woonplaats. We bieden ondersteuning
    bij het leren van de Nederlandse taal, het bereiken van (financiële) zelfredzaamheid
    en de toeleiding naar participatieactiviteiten en (vrijwilligers)werk. Vanuit
    een persoonlijk Plan Inburgering en Participatie bieden we begeleiding op maat.
