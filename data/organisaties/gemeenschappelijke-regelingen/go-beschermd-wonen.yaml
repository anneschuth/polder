description:
  text: 1. Het GO Beschermd Wonen voert taken op het gebied van Beschermd Wonen voor
    haar deelnemers uit, of doet deze uitvoeren.2. Het GO Beschermd Wonen stelt, op
    voorstel van de colleges, bij unaniem besluit, in een dienstverleningshandvest
    vast welke taken door het GO Beschermd Wonen regionaal worden uitgevoerd en onder
    welke voorwaarden dit gebeurt.3. Het GO Beschermd Wonen kan, indien de colleges
    daartoe besluiten, ook besluiten taken uit te voeren of te laten uitvoeren op
    aanverwante beleidsterreinen.4. Het GO Beschermd Wonen kan in aanvulling op de
    regionale taken, bedoeld in het tweede en derde lid, op verzoek voor deelnemers
    lokale taken uitvoeren of doen uitvoeren. Het GO Beschermd Wonen besluit naar
    aanleiding van dit verzoek in hoeverre en onder welke voorwaarden deze lokale
    taken kunnen worden uitgevoerd. Het GO Beschermd Wonen stelt dit besluit vast
    bij unanimiteit.5. In aanvulling op het vierde lid komt het GO Beschermd Wonen
    met elke gemeente, die een verzoek doet voor het uitvoeren van lokale taken, bedoeld
    in het vierde lid, een dienstverleningsovereenkomst overeen waarin wordt gespecificeerd
    welke taken als bedoeld in het vierde lid, het GO Beschermd Wonen voor die gemeente
    uitvoert of doet uitvoeren en onder welke inhoudelijke en financiële voorwaarden
    dit plaatsvindt.
