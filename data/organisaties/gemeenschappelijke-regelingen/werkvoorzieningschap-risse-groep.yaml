names:
- value: Werkvoorzieningschap Risse Groep
  valid_from: '1900-01-01'
description:
  text: "Risse Groep heeft zich de afgelopen jaren ontwikkeld tot een netwerkorganisatie\
    \ die zich richt op het bieden van kansen op werk voor mensen met een afstand\
    \ tot de arbeidsmarkt. Hierbij wordt het beste in mensen naar boven gehaald. De\
    \ organisatie begeleidt hen bij de specifieke ontwikkeling van hun mogelijkheden,\
    \ talenten en ambities en werken samen met veel partners in de regio. Op deze\
    \ manier is Risse Groep succesvol in het bieden van passende werkplekken voor\
    \ deze doelgroep, zowel in de eigen leerwerkbedrijven als bij de bedrijven uit\
    \ het netwerk. (Werk.kom, sd). Tot deze mensen behoren onder andere:-\tBijstandsgerechtigden\
    \ die naar werk worden begeleid-\tInwoners voor wie arbeidsmatige dagbesteding\
    \ is geïndiceerd-\tJongeren voor wie het aanbod op het terrein van werk van betekenis\
    \ is-\tMedewerkers met een “beschut-nieuw”- indicatie-\tMedewerkers met een bestaande\
    \ “wsw”- baan-\tNiet- uitkeringsgerechtigden die naar werk worden begeleid-\t\
    Vluchtelingen en statushouders-\tMensen met een Wajong uitkering die gedeeltelijk\
    \ arbeidsongeschikt zijnDe organisatie voert haar werkzaamheden hoofdzakelijk\
    \ uit voor de aangesloten gemeenten. Hiertoe behoren de gemeente Weert, Nederweert\
    \ en Cranendonck."
  url: https://risse.nl/1/over-risse-groep/kennismaking
