description:
  text: 'MidZuid is de uitvoeringsorganisatie voor de GR WAVA waarin de vier Dongemond
    gemeenten zijn vertegenwoordigd. WAVA heeft tot doel in zijn rechtsgebied de Wsw
    uit te voeren en daarnaast zo doelmatig mogelijk taken en bevoegdheden op het
    terrein van werkgeversdienstverlening, beschut werk, gesubsidieerde arbeid en
    arbeidsre-integratie, die voortvloeien uit de Participatiewet uit te voeren.Samen
    met onze partners verbindt MidZuid mensen duurzaam met werk. Eerder deden we dit
    vanuit de sociale werkplaats; nu in een breed netwerk als sociaal werkbedrijf.
    De vier gemeenten in de regio Dongemond zijn gezamenlijk eigenaar van deze organisatie.
    Zo geven we uitvoering en betekenis aan: samen groeien in werk!'
