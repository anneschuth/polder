  bevoegdheden:
  - kop_artikel: Artikel 3 Belangen en bevoegdheden
    inhoud_artikel: '1 Het openbaar lichaam heeft tot doel de behartiging van de gemeenschappelijke
      belangen van de deelnemers op het gebied van de afvalstoffenverwijdering.2 De
      te verrichten taken worden collectief uitgevoerd, tenzij het algemeen bestuur
      anders besluit.3 Ter uitvoering van het in lid 1 omschreven doel heeft het openbaar
      lichaam de volgende taken: a. de zorg voor de verwijdering van afvalstoffen;b.
      het desgevraagd adviseren van de deelnemers over het uitvoeren van relevante
      bepalingen van de Wet milieubeheer en de daaruit     voortvloeiende voorschriften;
      c. het vaststellen van de tarieven voor de verwijdering van afvalstoffen; d.
      het uitvoeren of doen uitvoeren van andere taken op het gebied van de afvalstoffenverwijdering,
      zo het algemeen bestuur daartoe besluit, met dien verstande dat aldus aan deelnemers
      zonder hun instemming geen andere verplichtingen kunnen worden opgelegd dan
      die voort vloeien uit deze regeling;e. het geven van voorlichting op het gebied
      van afvalpreventie en -verwijdering;f. het op verzoek van een of meerdere deelnemers
      uitvoeren of doen uitvoeren van een andere taak op het gebied van    afvalstoffenverwijdering.4
      Verder heeft het openbaar lichaam tot doel het in stand houden van een Natuur-
      en Milieu-educatief centrum, uiteindelijk leidend tot het mogelijk oprichten
      en in stand houden van een zelfstandig Natuur- en Milieu-educatief centrum ten
      behoeve van de Zeeuws-Vlaamse deelnemers van deze regeling.5 De taken, genoemd
      in lid 3 onder sub f en lid 4 worden door het openbaar lichaam niet uitgevoerd
      ten behoeve van de deelnemers, die geen gebruik maken van de betreffende faciliteit.
      De kosten, verbonden aan de uitvoering van een faciliteit komen volledig ten
      laste van de deelnemers, die wel van de faciliteit gebruik maken6 Ingeval het
      algemeen bestuur besluit tot uitvoering van een taak als genoemd onder lid 3
      sub f ten behoeve van een of meerdere deelnemers zullen omtrent de uitvoering
      en de gevolgen daarvan nadere afspraken met deze deelnemer(s) gemaakt worden.7
      De deelnemers dragen, met in achtneming van lid 3 aan het openbaar lichaam over
      al hun bevoegdheden tot regeling en bestuur en tot deelname aan het maatschappelijk
      verkeer ter behartiging van de in het eerste en tweede lid genoemde belangen
      en taken.8 De bevoegdheid van het openbaar lichaam tot het heffen van belastingen
      betreft uitsluitend de rechten voor het genot van door of vanwege het openbaar
      lichaam verstrekte diensten, tenzij deze bedrijfsmatig worden verstrekt of bestaan
      in het tijdelijk ter beschikking van particulieren stellen van personeel van
      het openbaar lichaam.9 De deelnemers waarborgen jegens de geldverschaffers de
      nakoming van de door het openbaar lichaam aangegane geldleningen en verstrekte
      onvoorwaardelijke en onherroepelijke garanties, zulks onder het doen van afstand
      van de voorrrechten en weren welke de wet aan borgen toelaat.'
