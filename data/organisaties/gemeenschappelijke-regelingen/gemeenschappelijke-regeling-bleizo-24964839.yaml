gr_meta:
  citeertitel: Gemeenschappelijke Regeling Bleizo
  doel: De GR Bleizo heeft tot doel casu quo als belang het binnen diens rechtsgebied
    ontwikkelen en realiseren van de door de deelnemende gemeenten gezamenlijk besloten
    ontwikkelingsstrategie, alsmede het in samenhang daarmee bevorderen van de realisering
    van de stedenbaanhalte Bleizo, conform hetgeen is overeengekomen in de Bestuursovereenkomst
    (bijlage 2). De Bestuursovereenkomst vormt de basis voor de samenwerking tussen
    de deelnemers.
