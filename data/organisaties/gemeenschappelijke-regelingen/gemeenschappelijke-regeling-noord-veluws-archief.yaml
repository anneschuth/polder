names:
- value: Gemeenschappelijke Regeling Noord-Veluws Archief
  valid_from: '2025-07-01'
gr_meta:
  doel: Doel van het Noord-Veluws Archief is in het grondgebied van de deelnemende
    gemeenten zoals bedoeld in artikel 2, derde lid, van deze regeling:a. het uitvoeren
    van het bepaalde in de Archiefwet 1995; enb. het vervullen van de functie van
    regionaal kennis- en informatiecentrum op het gebied van de lokale en regionale
    geschiedenis door het opbouwen en beheren van een brede collectie (regionaal)
    historische bronnen en deze op een actieve wijze dienstbaar maken voor het publiek,een
    en ander binnen de taken die krachtens artikel 4 aan het Noord-Veluws Archief
    zijn opgedragen.
