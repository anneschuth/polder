  bevoegdheden:
  - kop_artikel: Artikel 4. Taken en bevoegdheden
    inhoud_artikel: 1. Ter behartiging van de in artikel 3 genoemde belangen is het
      Inkoopbureau H-10 belast met de volgende taken:a. uitvoering van de gezamenlijke
      inkoop en contractering – dat wil zeggen het bepalen van de wijze van inkoop,
      de inkoopprocedure en het contract- en leveranciersmanagement;b. het op verzoek
      namens gemeenten optreden richting leveranciers om de voorwaarden en eisen,
      waaronder de overeenkomsten worden afgesloten te harmoniseren (gecombineerde
      inkoop);c. het op verzoek van een individuele (of cluster van) gemeente(n) contracteren
      met leveranciers (individuele inkoop en contractering).2. In de dienstverleningsovereenkomst
      worden samenwerkingsafspraken vastgelegd met betrekking tot de financiering
      en af te nemen diensten van het Inkoopbureau H-10. De uit te voeren diensten
      zien op het aangaan en beëindigen van inkoopcontracten en contractmanagement
      met derden ter uitvoering van de taken in de Jeugdwet en voor een deel van de
      taken op basis van de Wet maatschappelijke ondersteuning 2015.
