  bevoegdheden:
  - kop_artikel: Artikel 6
    inhoud_artikel: 1. Aan het bestuur van de omgevingsdienst komen, onverminderd
      het bepaalde in artikel 25, ter behartiging van de belangen waarvoor de regeling
      is getroffen, de volgende taken en bevoegdheden toe:a. het verrichten van adviserende,
      ondersteunende en voorbereidende werkzaamheden op het gebied van het omgevingsrecht
      en de uitvoering van programma’s en projecten op het gebied van de omgeving;b.
      het namens de colleges van burgemeester en wethouders dan wel de burgemeester
      van de deelnemende gemeenten en voor zover daartoe mandaat is verleend, uitvoeren
      van de bij of krachtens de navolgende wetten toebedeelde taken en bevoegdheden:-­Monumentenwet
      1988;-­Ontgrondingenwet;-­Wet inzake de luchtverontreiniging;-­Waterwet;-­Wet
      milieubeheer;-­Wet geluidhinder;-­Wet bodembescherming-­Wet algemene bepalingen
      omgevingsrecht;-­Wet ruimtelijke ordening;-­Woningwet;-­Drank- en Horecawet;-­Gemeentewet;-­Wet
      bevordering integriteitsbeoordelingen door het openbaar bestuur.c. het namens
      de colleges van burgemeester en wethouders dan wel de burgemeester van de deelnemende
      gemeenten tevens uitvoeren van taken op grond van andere wet- en regelgeving
      dan genoemd in het eerste lid, onder b, voor zover daartoe mandaat is verleend.d.
      de taken en bevoegdheden zoals bedoeld in onderdeel a, b en c worden uitgevoerd
      met inachtneming van het door de betreffende gemeente dan wel het algemeen bestuur
      van de omgevingsdienst vastgestelde beleid.e. het namens gedeputeerde staten
      en voor zover daartoe mandaat is verleend uitvoeren van de volgende taken en
      bevoegdheden, met inachtneming van het door de provincie vastgestelde beleid:1°
      de taken en bevoegdheden als bedoeld in het eerste lid, onder b, voor zover
      gedeputeerde staten het bevoegd gezag zijn;2° taken op grond van andere wet-
      en regelgeving dan onder b genoemd.2. Voor zover bij de mandaatverlening niet
      anders is bepaald kan ten aanzien van de aan de directeur van de omgevingsdienst
      in mandaat toekomende taken en bevoegdheden ondermandaat worden verleend.3.
      Indien ten gevolge van wijziging van wettelijke regelingen ter bescherming van
      de omgeving en het milieu, de uitvoering van werkzaamheden als bedoeld in eerste
      lid gaan strekken ter uitvoering van een andere regeling dan ter uitvoering
      waarvan zij ten tijde van het in werking treden van deze regeling strekten,
      dan wel indien in deze werkzaamheden ten gevolge van een dergelijke wijziging
      veranderingen optreden, blijven zij, voor zover hun strekking en omvang door
      hun wijziging niet wezenlijk veranderen, behoren tot de taken die in de genoemde
      artikelleden aan de directeur van de omgevingsdienst zijn opgedragen.
  - kop_artikel: Artikel 7
    inhoud_artikel: 1. De omgevingsdienst is bevoegd tot het verrichten van diensten,
      voor zover deze vallen binnen het kader van de in artikel 5 vermelde belangen,
      voor andere dan de deelnemende gemeenten en/of derden, met een publiekrechtelijke
      taak en/of bevoegdheid.2. Een besluit tot dienstverlening als bedoeld in het
      eerste lid wordt genomen door het dagelijks bestuur en vermeldt de wijze van
      kostenverrekening en de overige voorwaarden.
