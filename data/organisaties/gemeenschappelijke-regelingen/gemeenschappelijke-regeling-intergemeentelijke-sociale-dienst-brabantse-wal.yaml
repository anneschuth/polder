  bevoegdheden:
  - kop_artikel: 'Artikel 13: Bevoegdheden en taken van het gemeenschappelijk orgaan'
    inhoud_artikel: 1.Het gemeenschappelijk orgaan is bevoegd om beslissingen te nemen
      omtrent:- vaststellen van de begroting;- vaststellen van de jaarrekening2.Tevens
      is het gemeenschappelijk orgaan gehouden de volgende de zaken te monitoren:-
      algemene gang van zaken rond de samenwerking.- het functioneren van de uitvoeringsorganisatie
      en de bedrijfsvoering.3.Het gemeenschappelijk orgaan is voorts betrokken bij
      de werving en selectieprocedure van het afdelingshoofd van de uitvoeringsorganisatie.4.Het
      afdelingshoofd van de uitvoeringsorganisatie staat het gemeenschappelijk orgaan
      bij de uitoefening van hun taak terzijde. Hij roept de vergadering bijeen, stelt
      de agenda op en is verantwoordelijk voor de verslaglegging.
