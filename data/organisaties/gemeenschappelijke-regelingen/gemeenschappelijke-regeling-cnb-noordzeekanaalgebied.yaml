gr_meta:
  citeertitel: Gemeenschappelijke regeling CNB Noordzeekanaalgebied
  doel: De gemeenschappelijke regeling wordt getroffen in het belang van het verkrijgen
    van eenheid van beleid tussen de deelnemende gemeenten, respectievelijk gemeenschappelijkheid
    van beleid tussen het samenwerkingsverband en het rijk, alsmede in het belang
    van het verkrijgen van eenheid van uitvoering ten aanzien van de taken van de
    gemeenten en het rijk die betrekking hebben op het bevorderen van een veilige,
    vlotte en milieuverantwoorde afwikkeling van het scheepvaartverkeer van, naar
    en binnen de havens in het Noordzeekanaalgebied en van en naar de achterliggende
    vaarwegen.Voorts wordt de regeling getroffen in het belang van de vaststelling
    van één nautisch-technisch beleid voor het Noordzeekanaalgebied door het leveren
    van een bijdrage aan het (doen) verbeteren van infrastructurele voorzieningen
    en het (doen) verbeteren van de toegankelijkheid van de vaarweg.
