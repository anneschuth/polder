description:
  text: De RSD is onderdeel van de Regionale Dienst Werk en Inkomen Kromme Rijn Heuvelrug
    (RDWI). De RSD is de uitvoeringsorganisatie van de RDWI voor de Participatiewet,
    de Wet gemeentelijke schuldhulpverlening en aanpalende wetgeving.De RSD is een
    gemeenschappelijke regeling. De RSD beschikt over een algemeen bestuur, een dagelijks
    bestuur en een ambtelijke organisatie onder leiding van een directeur.
