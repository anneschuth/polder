  bevoegdheden:
  - kop_artikel: Artikel 4 Taken en bevoegdheden
    inhoud_artikel: 1. Ter verwezenlijking van het doel worden in ieder geval, met
      inachtneming van het bepaalde in wettelijke voorschriften en deze regeling,
      de in artikel 5 genoemde taken verricht.2. Het RHC Alkmaar heeft de bevoegdheid
      om, in het belang van het in artikel 3 gestelde doel, deel te nemen aan gemeenschappelijke
      regelingen en privaatrechtelijke rechtspersonen op te richten.3. Het RHC Alkmaar
      is in het kader van de doelstelling bevoegd tot het op verzoek van één of meerdere
      deelnemers en/of derden verrichten van diensten.4. Een besluit tot dienstverlening
      als bedoeld in lid 3 vermeldt tenminste de wijze van kostenverrekening en de
      overige voorwaarden.
  - kop_artikel: Artikel 5
    inhoud_artikel: Het RHC Alkmaar heeft tot taak het uitvoeren van werkzaamheden
      als bedoeld in de Archiefwet 1995:- de zorg voor en het beheer van de in de
      archiefbewaarplaats berustende archiefbescheiden van de deelnemers (artikel
      30 Archiefwet 1995);;- het toezicht op het beheer van de archiefbescheiden van
      de deelnemers voor zover deze niet zijn overgebracht (artikel 32 Archiefwet
      1995);- het stimuleren van de lokale en regionale geschiedbeoefening en het
      daartoe aanleggen, beheren en bewaren van een zo compleet mogelijke collectie
      bronnenmateriaal op het gebied van de lokale en regionale geschiedenis.
