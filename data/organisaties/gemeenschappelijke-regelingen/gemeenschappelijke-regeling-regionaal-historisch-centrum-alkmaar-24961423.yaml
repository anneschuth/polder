  citeertitel: Gemeenschappelijke regeling Regionaal Historisch Centrum Alkmaar
  doel: Doel van het RHC Alkmaar is het in het samenwerkingsgebied vervullen van de
    functie van regionaal kennis- en informatiecentrum op het gebied van de lokale
    en regionale geschiedenis door het opbouwen en beheren van een zo breed mogelijke
    collectie (regionaal) historisch bronnenmateriaal en deze op een zo actief mogelijke
    wijze dienstbaar maken voor een breed publiek.
