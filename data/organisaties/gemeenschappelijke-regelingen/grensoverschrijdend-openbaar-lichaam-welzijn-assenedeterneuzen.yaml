  bevoegdheden:
  - inhoud_artikel: Aan-z zal een statutenwijziging voorbereiden waarbij wellicht
      de schepenen van welzijn of sociaal beleid zullen gemandateerd worden om te
      zetelen in het algemeen bestuur. Deze statutenwijziging zal pas ten vroegste
      in september kunnen geagendeerd worden op de gemeenteraad van Terneuzen.
