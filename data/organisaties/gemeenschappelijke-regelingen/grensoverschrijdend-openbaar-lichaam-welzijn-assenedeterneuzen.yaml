gr_meta:
  citeertitel: Grensoverschrijdend Openbaar Lichaam Welzijn Assenede/Terneuzen
  doel: Het GOL aan-z heeft tot doel inwoners van het werkgebied (Terneuzen, Assenede,
    Wachtebeke, Kaprijke, Sint-Laureins) te ondersteunen bij het zelfstandig leven
    en participeren in de samenleving. Aan-z doet dit door het versterken van structuren,
    sociale netwerken en eigen mogelijkheden van mensen. Aan-z richt zich daarbij
    in ieder geval op kwetsbare burgers en werkt samen met sterke burgers aan de leefbaarheid
    in buurten en wijken.
