description:
  text: Veiligheids- en gezondheidsregio Gelderland-Midden is een complete hulpverleningsorganisatie
    voor Brandweer en Volksgezondheid (Ambulancezorg en Gemeentelijke Gezondheidsdienst)
    voor de veiligheidsregio Gelderland-Midden.VGGM behartigt de belangen van vijftien
    gemeenten en hun inwoners op het gebied van brandweer en volksgezondheid.VGGM
    werkt in opdracht van de gemeenten Arnhem, Barneveld, Doesburg, Duiven, Ede, Lingewaard,
    Nijkerk, Overbetuwe, Renkum, Rheden, Rozendaal, Scherpenzeel, Wageningen, Westervoort
    en Zevenaar.
  url: https://vggm.nl/over-onze-organisatie
