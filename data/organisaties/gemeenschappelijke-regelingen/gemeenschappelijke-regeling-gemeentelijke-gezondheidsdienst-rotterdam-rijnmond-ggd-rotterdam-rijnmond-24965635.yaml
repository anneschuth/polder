  doel: Het lichaam heeft tot doel:- het beschermen en bevorderen van de gezondheid
    van de bevolking of van specifieke groepen daarbinnen, in het rechtsgebied van
    het lichaam;- het voorkómen en het vroegtijdig opsporen van ziekten onder de bevolking;-
    alles wat met het bovenstaande in de ruimste zin verband houdt.
