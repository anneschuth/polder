  valid_from: '1900-01-01'
description:
  text: 'De Groninger Archieven zijn de bron van het rijke en tastbare verleden van
    stad en provincie Groningen. We verzamelen en beheren. Daarnaast maken we historisch
    en hedendaags materiaal vindbaar en bruikbaar. Dat is niet alleen onze wettelĳke
    taak als beheerder van (overheids)archieven. Het is ook onze missie: om het verleden
    levend te houden. Voor en door onderzoekers, media, musea en iedereen die nieuwsgierig
    is naar de Groninger geschiedenis.De Groninger Archieven zijn voluit het Regionaal
    Historisch Centrum Groninger Archieven. We laten als professionele collectiebeheerder
    een zo groot mogelijk publiek kennis maken met onze fysieke en digitale collecties.
    Daarnaast zijn wij een actieve bemiddelaar om historische en actuele informatie
    over stad en provincie Groningen breed in te zetten. En voor de aangesloten overheden
    zijn wij een gedegen partner.'
