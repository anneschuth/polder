description:
  text: De directie Concernondersteuning richt zich op het bieden van hoogwaardige,
    deskundige advisering en ondersteuning vanuit verschillende domeinen. Inhoudelijke
    kennis, proactiviteit, onderlinge samenwerking en oog voor resultaten en doelen
    zijn daarbij sleutelbegrippen.De directie Concernondersteuning heeft in het nieuwe
    BZK een brede ondersteunende taak voor het gehele ministerie en de bewindspersonen.
    Naast het ondersteunen bij de concernsturing en het op strategisch niveau adviseren
    van de politieke en ambtelijke top, levert de directie Concernondersteuning vanuit
    de verschillende vakdisciplines diensten en producten aan BZK (inclusief de taakorganisaties)
    en voert zij de regie op het terrein van de basisbedrijfsvoering die door SSO’s
    wordt geleverd ten behoeve van het kerndepartement en de diverse taakorganisaties.KerntakenIn
    de directie Concernondersteuning zijn de taken van P&O, Communicatie en (strategisch)
    advies (Bestuurlijk advies en KIEM) ondergebracht. Daarnaast zijn in het cluster
    Staf en Ondersteuning de centrale bedrijfsvoeringeenheid BZK, de beheersmatige
    taken voor het SG-cluster en ondersteunende taken van de directie Concernondersteuning
    zelf alsook ondersteunende taken voor de andere directies binnen het SG-cluster
    ondergebracht.De directie Concernondersteuning kent samengevat de volgende kerntaken:-
    Strategische en inhoudelijke ondersteuning van de politieke en ambtelijke leiding
    en van de organisatie;- Adviserende en uitvoerende taken op het terrein van Communicatie,
    Personeel & Organisatie;- Ondersteunende taken onder andere voor bewindslieden
    en SG;- Beheerstaken voor het gehele SG-cluster;- Regietaken met betrekking tot
    de uitgeplaatste dienstverlening bij de SSO’s.
