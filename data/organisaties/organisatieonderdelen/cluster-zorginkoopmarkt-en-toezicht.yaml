description:
  text: 'TaakHet cluster Zorginkoopmarkt en toezicht houdt zich bezig met vraagstukken
    die spelen op het gebied van zorginkoop en ziet daarbij op de relatie tussen de
    zorgverzekeraars en de zorgaanbieders.Onderwerpen waar het cluster zich mee bezig
    houdt zijn onder meer: zorgen dat er regels worden gesteld aan de transparantie
    van het inkoopbeleid van verzekeraars, de samenwerking tussen gemeenten en verzekeraars,
    de totstandkoming van inkoopbeleid in de Wlz (en regelgeving daarover), de concessieverlening
    voor Wlz-uitvoerders. Omdat veel andere beleidsterreinen van invloed zijn op wat
    en de wijze waarop zorgverzekeraars mogen inkopen, hebben de medewerkers van het
    cluster veel contact met andere directies. Om een goed beeld van het gehele speelveld
    te krijgen worden ‘landkaarten’ van de verschillende sectoren opgesteld en vinden
    regelmatig gesprekken met zorgverzekeraars en Wlz-uitvoerders plaats over hun
    inkoopbeleid.'
