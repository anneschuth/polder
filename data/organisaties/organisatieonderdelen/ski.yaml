description:
  text: De directie SK&I werkt voor de breedte van de beleidskern aan de volgende
    onderwerpen:strategieontwikkeling, de ontwikkeling en implementatie van een Strategische
    Kennis enInnovatieagenda, aan regievoering en vertaling hiervan naar integrale,
    meerjarige Kennis- enInnovatieprogramma’s, beleid voor ontwikkeling van een toekomstbestendig
    kennis- eninnovatiesysteem, coördinerend opdrachtgeverschap voor kennis en innovatie,instrumentontwikkeling
    en –beheer en beleidsevaluatie. Daarnaast is SK&I verantwoordelijkvoor het vakdepartementale
    onderwijsbeleid.
