- value: Programmadirectie Integraal Zorgakkoord
  abbr: PDIZA
  valid_from: '1900-01-01'
description:
  text: 'In september 2022 hebben veertien partijen het Integraal Zorgakkoord (IZA)
    afgesloten. In het IZA zijn ruim 400 afspraken gemaakt met als doel de (curatieve)
    zorg betaalbaar, van goede kwaliteit en bovenal toegankelijk te houden. De focus
    ligt daarbij op de Zorgverzekeringswet, maar er is ook verbinding met andere domeinen,
    waaronder het sociaal domein. Dit omdat een integrale aanpak nodig is om de (toegankelijkheids)problemen
    in de zorg aan te pakken.  Dat doen we op landelijk niveau door goede randvoorwaarden
    te creëren (transformatiemiddelen, bekostiging, wetgeving). Op regionaal niveau
    door het faciliteren en stimuleren van goede regioplannen. Op lokaal niveau door
    afspraken in de praktijk te brengen. PDIZA is een tijdelijke, kleine directie
    die binnen VWS de uitvoering coördineert en de samenhang bewaakt, en in het veld
    de beweging aanjaagt.Aandachtsgebieden* De directie organiseert en faciliteert
    de bestuurlijke overleggen die elk kwartaal plaatsvinden. De IZA-partijen bespreken
    de voortgang en nemen besluiten.* De directie heeft een gezant passende zorg aangesteld
    (hoogleraar Jan Kremer), die met bestuurders en professionals spreekt over passende
    zorg in de praktijk.* De directie is verantwoordelijk voor communicatie over het
    akkoord, zoals het laten zien van goede voorbeelden en resultaten. De directie
    is samen met de directie Communicatie verantwoordelijk voor het ontwikkelen van
    een publiekscampagne.* Het volgen en aanjagen van de beweging in de regio. Onder
    meer door werkbezoeken te organiseren en de voortgang in de regio in beeld te
    brengen. Een kwartiermaker IZA stimuleert de regionale samenwerking.* De directie
    zorgt dat de verschillende onderdelen van VWS gelijkgericht de acties uitvoeren.
    De acties van het IZA worden uitgevoerd door tien thematafels.* De directie zorgt
    voor een integrale aanpak van debatten en brieven aan de Tweede Kamer over het
    IZA.* We zorgen voor samenhang met andere akkoorden en programma’s, zoals het
    Gezond en Actief Leven Akkoord (GALA), de Hervormingsagenda Jeugd, Toekomstbestendige
    Arbeidsmarkt Zorg (TAZ) en Wonen, Ondersteuning en Zorg voor Ouderen (WOZO).*
    We monitoren het akkoord op vier niveaus: Monitoring van de 400 acties (doet iedereen
    wat is afgesproken?).* Monitoring van de beoogde verandering van de zorg.* Doelgroepenmonitoring
    (wat is het effect op groepen burgers en patiënten?).* Monitoring van de transformatiemiddelen.'
