description:
  text: Het Centraal Planbureau (CPB) levert als onafhankelijk onderzoeksinstituut
    beleidsrelevante economische analyses en ramingen. We doen onderzoek naar de Nederlandse
    economie en het sociaaleconomisch beleid in den brede. Voor beleidsmakers en het
    bredere publiek vertalen we wetenschappelijke inzichten naar de dagelijkse beleidspraktijk,
    waarmee we een nuchtere, feitelijke basis leveren.
