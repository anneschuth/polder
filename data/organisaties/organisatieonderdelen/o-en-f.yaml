description:
  text: 'TAAK: De afdeling O en F bundelt binnen MEVA het beleid rond het opleidingsinstrumentarium
    voor opleidingen in de gezondheidszorg, schept wettelijke randvoorwaarden voor
    informatie-uitwisseling in de zorgsector en geeft invulling aan de financiële
    functie binnen de binnen de directie MEVA. Ook is het hoofd O en F eerste aanspreekpunt
    voor directiebrede secretariaatstaken (oa. capaciteit, p&c, parlementair en huisvesting).'
