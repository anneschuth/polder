description:
  text: 'De Nederlandse Zorgautoriteit (NZa) maakt en bewaakt goed werkende zorgmarkten.
    De belangen van de consument staan daarbij centraal. Efficiëntie op korte en lange
    termijn, markttransparantie, keuzevrijheid, toegang tot zorg en de kwaliteit zijn
    gewaarborgd. De consument krijgt zo de beste waar en waarde voor zijn zorgeuro.De
    NZa is marktmeester in de zorg en heeft hiervoor verschillende instrumenten. Bijvoorbeeld
    het monitoren van de ontwikkeling van zorgmarkten en het bevorderen van de werking
    van zorgmarkten, het adviseren over zorgfusies en onderzoeken en ingrijpen op
    zorgmarkten en in overeenkomsten tussen partijen, als er sprake lijkt van marktmacht.De
    NZa is ook regelgever en zorgt dat de zorg betaalbaar blijft. Dit doet de NZa
    door de tarieven, budgetten en prestaties in de zorg vast te stellen. De NZa onderzoekt
    of de consument beter af is wanneer de prijzen worden vrijgegeven of juist worden
    gereguleerd en adviseert de minister daarover.De NZa houdt toezicht op de zorgmarkten,
    om na te gaan of de zorgmarkten goed werken en zorgaanbieders en zorgverzekeraars
    de wet en regelgeving naleven. Er zijn drie vormen van toezicht: nalevingstoezicht,
    markttoezicht en uitvoeringstoezicht.'
