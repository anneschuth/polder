  valid_from: '1900-01-01'
description:
  text: De tuchtklachtfunctionaris is er voor mensen met een zorgklacht die erover
    denken een klacht in te dienen bij een tuchtcollege. De tuchtklachtfunctionarissen
    kunnen mensen die een tuchtklacht willen indienen adviseren bij het schrijven
    en wijzigen van hun tuchtklacht. Daarnaast kan de tuchtklachtfunctionaris advies
    geven of de klacht tegen de juiste persoon gericht of op de juiste plaats is bij
    een tuchtcollege.
