description:
  text: Taak:Een onderdeel van DGBel, Brieven en Beleidsbesluiten, stelt beleidsbesluiten
    op. Dit zijn publicaties van beleidsregels van de staatssecretaris van Financi???n.
    De beleidsbesluiten geven nadere invulling van de fiscale regelgeving. Er zijn
    zo'n 500 beleidsbesluiten momenteel van kracht. Daarnaast beantwoordt dit onderdeel
    brieven op fiscaal terrein namens de staatssecretaris, bijvoorbeeld over de toepassing
    van de zogenoemde hardheidsclausule. Op jaarbasis worden er ongeveer 2500 brieven
    afgedaan.
