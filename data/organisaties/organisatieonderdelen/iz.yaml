description:
  text: 'Veel internationale uitdagingen hebben impact op ons volksgezondheid- en
    sportbeleid. Om deze uitdagingen het hoofd te kunnen bieden, is het voor Nederland
    van belang om te blijven samenwerken met andere landen. Zowel bilateraal, als
    multilateraal.De directie Internationale Zaken (IZ) is verantwoordelijk voor de
    internationale positionering van VWS en onderhoudt relaties met andere landen
    en internationale organisaties. Hiertoe beschikt de directie over een attachénetwerk
    op ambassades en strategische vertegenwoordigingen in het buitenland (Brussel,
    Genève, Washington, Beijing, Londen en New Delhi). Met dit brede netwerk draagt
    IZ bij aan de beleidsontwikkeling op dossiers met een sterk internationaal karakter.
    Dat doen we in nauwe samenwerking met de verantwoordelijke beleidsdirecties en
    door interdepartementale samenwerking. We stellen de internationale reisagenda
    op voor de bewindspersonen en geven hier uitvoering aan.Aandachtsgebieden* Internationale
    beleidsontwikkeling: IZ draagt bij aan de beleidsontwikkeling op belangrijke thema’s
    zoals pandemische paraatheid, leveringszekerheid van medische producten, infectieziektenbeleid,
    antibioticaresistentie, dementie, eHealth, klimaat & volksgezondheid en preventiebeleid
    (alcohol/ tabak/drugs).* Vertegenwoordiging bij internationale organen: IZ vertegenwoordigt
    en positioneert Nederland bij relevante internationale samenwerkingsorganisaties
    zoals de Europese Unie, de World Health Organization (WHO), OESO, G20, World Economic
    Forum (WEF), Global Health Security Agenda, de Verenigde Naties en de Raad van
    Europa. IZ begeleidt de deelname van de politieke en ambtelijke leiding aan deze
    organen. In dit kader behartigt IZ ook het VWS-belang in de interdepartementale
    afstemmingsoverleggen. IZ adviseert de bewindspersonen bij de internationaal georiënteerde
    onderraden (o.a. REA, RDIA) en bij internationale punten op de (Rijks)Ministerraad.*
    Economische diplomatie: IZ positioneert het Nederlandse bedrijfsleven (Life Sciences
    &Health) op belangrijke internationale markten, door het onderhouden van optimale
    betrekkingen met buitenlandse overheden. In samenwerking met het bedrijfsleven
    organiseert de directie handelsmissies naar belangrijke partnerlanden. Maar het
    mes snijdt aan twee kanten: gezondheidsdiplomatie draagt ook bij om Nederland
    minder kwetsbaar te maken in haar afhankelijkheid van derde landen als het gaat
    om cruciale medische producten en productieprocessen.'
