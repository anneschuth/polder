description:
  text: TaakDe afdeling Sturing, Financiering en Informatie draagt zorg voor het bestuurlijk
    en juridisch functioneren van het stelsel op het terrein van de maatschappelijke
    ondersteuning. De afdeling draagt zorg voor de uitvoering van de begrotingscyclus,
    het bewaken van het financi???le kader voor de maatschappelijke ondersteuning
    en de daarbij benodigde financi???le sturingsinformatie. Verder zorgt de afdeling
    voor het actueel houden van het kennisbeleid, de beleidsinformatie, en monitoring
    resp. evaluatie op het terrein van de maatschappelijke ondersteuning. Ook het
    stimuleren van innovatie en kwaliteitsbeleid in de maatschappelijke ondersteuning
    behoort tot de taken van de afdeling. Ten slotte is de afdeling verantwoordelijk
    voor de advisering over en de co???rdinatie van de juridische aspecten van het
    beleid van de directie.
