names:
- value: Plantaardige Agroketens en Voedselkwaliteit
  abbr: PAV
  valid_from: '1900-01-01'
description:
  text: De directie PAV werkt aan duurzame en gezonde plantaardige ketens met aandacht
    voorplantgezondheid, marktbehoud, markttoegang plantaardige producten en nieuweveredelingstechnieken,
    met aandacht voor een gezonde bodem als drager van hetvoedselsysteem en is verantwoordelijk
    voor het gewasbeschermings- en mestbeleid.Daarnaast is PAV verantwoordelijk voor
    het voedselbeleid, waaronder voedselveiligheid,diervoeders en –geneesmiddelen
    en de verduurzaming van ons voedselsysteem. Ook werktPAV aan de bijdrage van agroketens
    aan de klimaatdoelstellingen, als onderdeel van deklimaatopgave voor landbouw
    en landgebruik wat wordt gecoördineerd door het programmaKlimaatopgave LNV bij
    DG NV. Deze zaken betreffen zowel de nationale als internationaleaangelegenheden.
