  valid_from: '1900-01-01'
description:
  text: De sector JZW houdt zich bezig met de toetsing van voorgenomen wetgeving,
    het ontwikkelen van instrumenten om de wetgevingskwaliteit te bevorderen, zoals
    de Aanwijzingen en het Draaiboek voor de regelgeving, het Integraal Afwegingskader
    voor beleid en regelgeving (https://www.kcwj.nl/kennisbank) of consultatie van
    nieuwe wetgeving (www.internetconsultatie.nl). De instrumenten van het wetgevingsbeleid
    zijn terug te vinden op de site van het Kenniscentrum Wetgeving en Juridische
    zaken (www.kcwj.nl).Verder houdt de sector JZW zich bezig met het vooraf toetsen
    van beslissingen en de coördinatie van verzoeken op grond de Wet openbaarheid
    van bestuur; het ontwikkelen, beheren en bewaken van de juridische kwaliteit;
    aanbesteding en het onderhouden van het geregelde contact met de landsadvocaat
    en inschakeling van de landsadvocaat en adviseren van de leden van de departementsleiding
    op juridisch-bestuurlijk gecompliceerde of gevoelige onderwerpen.
