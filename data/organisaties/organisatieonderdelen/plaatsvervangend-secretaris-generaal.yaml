description:
  text: "De pSG heeft een brede portefeuille, waaronder de volgende taken vallen:•\t\
    Verantwoordelijkheid voor alle aspecten van de bedrijfsvoering, inclusief de samenwerking\
    \ met de ministeries van Economische Zaken (EZ) en Klimaat en Groene Groei (KGG)\
    \ op het gebied van bedrijfsvoering en interne organisatie.•\t(Gedelegeerd) opdrachtgeverschap\
    \ bij de ontwikkeling van de organisatie en het begeleiden van transitie- en organisatieveranderingen.•\t\
    Rol van concern-Chief Information Officer (CIO) op het gebied van informatievoorziening,\
    \ informatiehuishouding, en ICT, inclusief de ontwikkeling van informatiebeleid\
    \ en advisering over risicovolle ICT-projecten.•\tOverleg met medezeggenschapsorganen\
    \ zoals ORK, DOR, en DGO.•\tAansturing van de Eigenaarsondersteuning (BPZ).•\t\
    Het eigenaarschap van enkele ZBO’s is belegd bij de pSG, zoals de Centrale Commissie\
    \ Dierproeven, de Grondkamers, de Kamer voor de Binnenvisserij, en diverse keuringsdiensten.•\t\
    Daarnaast heeft de pSG het gedeelde eigenaarschap over enkele diensten met EZK,\
    \ waaronder de directie Mens en Organisatie (M&O), directie Informatievoorziening\
    \ (IV), de Rijksdienst voor Ondernemend Nederland (RVO), en de Dienst ICT Uitvoering\
    \ (DICTU).De plaatsvervangend Secretaris-Generaal (pSG) vervangt de SG bij afwezigheid,\
    \ verhindering, of wanneer bestuurlijke vertegenwoordiging van LVVN gewenst is.\
    \ Dit geldt voor onderwerpen op het gebied van bedrijfsvoering, domein-overstijgende\
    \ zaken, of grote beleidsdossiers waar eigenaarschap een rol speelt."
