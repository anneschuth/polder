description:
  text: De Koninklijke Marechaussee (KMar) is een militaire politieorganisatie die
    valt onder het ministerie van Defensie. De marechaussee werkt vanuit een gevarieerd
    takenpakket en wordt over de hele wereld ingezet. De KMar is al ruim anderhalve
    eeuw actief in het Caribisch gebied.Sinds 10 oktober 2010 is de Koninklijke Marechaussee
    ook verantwoordelijk voor de grensbewaking, beveiliging en politietaken op de
    luchthavens van Caribisch Nederland. Deze taken worden uitgevoerd in samenwerking
    tussen militaire medewerkers en Rijksambtenaren van de Rijksdienst Caribisch Nederland.
    Deze unieke combinatie is te zien in de onderscheidingstekens van het RCN personeel
    en de militaire personeel van de KMar. Gezamenlijk zetten de medewerkers zich
    in om de grenzen van Bonaire, Saba en Sint Eustatius te bewaken en zo bij de dragen
    aan de veiligheid van Caribisch Nederland.
