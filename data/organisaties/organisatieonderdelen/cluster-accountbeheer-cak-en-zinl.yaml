description:
  text: 'TaakHet cluster accountbeheer is verantwoordelijk voor het coördineren van
    een goede inhoudelijke opdrachtverlening aan twee zelfstandige bestuursorganen
    (zbo’s): het CAK en het Zorginstituut Nederland. Daarbij ondersteunt het cluster
    de opdrachtgever van deze zbo’s: DGLZ. De medewerkers zijn eerste aanspreekpunt
    voor dossierhouders binnen VWS en voor de accounthouders bij de twee zbo’s.Werkzaamheden
    zijn onder meer het uitvragen van aandachtspunten voor de jaarplannen van de zbo’s,
    het voorbereiden van de periodieke overleggen tussen de zbo’s en DGLZ.Daarnaast
    onderhoudt het cluster nauw contact met de unit Concernsturing die verantwoordelijk
    is voor de ondersteuning van de ‘eigenaar’ van de zbo’s: de pSG. Daar waar ons
    cluster ondersteunt op de inhoudelijke onderwerpen doet Concernsturing dat op
    de bedrijfsvoering en algemene missie en visie van de zbo’s.'
