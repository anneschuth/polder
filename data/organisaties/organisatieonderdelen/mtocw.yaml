description:
  text: De secretaris-generaal is ambtelijk eindverantwoordelijk voor het functioneren van het ministerie en voor de voorbereiding en uitvoering van het beleid waarvoor de politieke leiding de politieke verantwoordelijkheid draagt. De secretaris-generaal heeft als hoogste ambtenaar tot taak te zorgen voor een goede onderlinge afstemming van de verschillende beleidsterreinen en voor de uitvoerbaarheid en de uitvoering van het ontwikkelde beleid. De secretaris-generaal wordt in de ambtelijke leiding van het departement bijgestaan door een vrijgestelde plaatsvervangend secretaris-generaal. Deze vervangt hem bij zijn afwezigheid in al zijn taken en behartigt, namens de secretaris-generaal, de SG-taken op het gebied van het beheer van het departement.  Daarnaast wordt hij in zijn taak bijgestaan door de directeuren-generaal. Deze zijn ambtelijk verantwoordelijk voor de beleidsterreinen van de onder hen ressorterende directies en voor de samenhang tussen die beleidsterreinen. Zij zijn daarnaast
    ambtelijk eindverantwoordelijk voor één of meer specifieke beleidsonderwerpen of -projecten die niet zonder meer tot de hierboven genoemde beleidsterreinen kunnen worden gerekend.
