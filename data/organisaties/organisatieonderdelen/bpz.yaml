description:
  text: 'De Directie Bestuurlijke en Politieke Zaken (BPZ) is een stafdirectie en
    ondersteunt de ambtelijke en politieke leiding bij hun dagelijkse taken. BPZ heeft
    een breed overzicht van de activiteiten binnen het departement en werkt samen
    met collega’s van beleid, staf, uitvoering en toezicht om het functioneren van
    LNV te optimaliseren.De kerntaken van de BPZ zijn:- Ondersteuning bewindspersonen:
    Voorbereiden en coördineren van debatten in de Tweede Kamer, inclusief ambtelijke
    ondersteuning.- Politieke advisering: Coördineren en schrijven van adviezen op
    stukken voor de bewindspersonen, inclusief parafering van stukken naar de Tweede
    Kamer, de Ministerraad, en externen. Verspreiden van kennis over politieke processen
    en ervoor zorgen dat politieke aspecten in beleidsprocessen worden meegenomen.-
    Onderhouden van contacten met het parlement: Dagelijkse contacten met de Tweede
    en Eerste Kamer en hun medewerkers.- Bestuurlijke advisering: Adviseren van bestuursraadleden,
    voorbereiden van bestuurlijke overleggen zoals de Bestuursraad (BR) en SGO, coördineren
    bestuurlijk-organisatorische processen, en optreden waar de SG en/of de BR een
    centrale rol vervult.- Eigenaarsadvisering: Adviseren voor de SG als eigenaar
    van de NVWA, Staatsbosbeheer en andere verbonden partijen.- Departementaal Crisis
    Centrum (DCC): Verantwoordelijk voor opschalen, organiseren en laten functioneren
    van departementale crisisorganisatie tijdens een crisis. Daarnaast is het DCC
    verantwoordelijk voor het coördineren en (laten) uitvoeren van werkzaamheden in
    de koude fase, zoals het opstellen van handboeken en procedures voor crisissituaties.'
