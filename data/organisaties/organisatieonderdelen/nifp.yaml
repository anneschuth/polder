description:
  text: TAAKHet Nederlands Instituut voor Forensische Psychiatrie en Psychologie (NIFP)
    biedt expertise en kennis op het gebied van de forensische psychiatrie en psychologie
    en somatische zorg in justitiële inrichtingen. Het instituut houdt zich bezig
    met pro Justitia rapportage en de lichamelijke en psychische zorg voor mensen
    justitiële inrichtingen.De belangrijkste werkzaamheden van het NIFP zijn advisering
    over somatische en psychische zorg in detentie, bemiddeling bij pro Justitia rapportage,
    psychiatrische zorg in detentie, het stellen van indicaties voor forensische zorg,
    onderzoek op het gebied van forensische psychiatrie en psychologie en opleiding.
    Op deze wijze draagt de organisatie bij aan een zorgvuldige rechtsgang, een effectieve
    uitvoering van de justitiële psychiatrische zorg en behandeling, en aan een veiliger
    samenleving.
