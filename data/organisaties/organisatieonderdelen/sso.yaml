description:
  text: TaakDe afdeling Sociale Samenhang en Opvang richt zich vooral op het versterken
    van de sociale samenhang, het stimuleren van maatschappelijke participatie door
    vrijwillige inzet en mantelzorg en het bieden van tijdelijke opvang voor en ondersteuning
    aan mensen met een (psycho)sociale problematiek of slachtoffers geweld in afhankelijkheidsrelaties.
