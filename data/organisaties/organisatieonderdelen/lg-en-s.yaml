names:
- value: Directoraat-generaal Landelijk Gebied en Stikstof
  abbr: LG&S
  valid_from: '1900-01-01'
description:
  text: Het DG Landelijk Gebied en Stikstof (DG LG&S) is verantwoordelijk voor een
    integrale aanpak van de stikstof-, natuur-, water- en klimaatopgaven. Dit wordt
    zowel op nationaal niveau als via een gebiedsgerichte aanpak uitgevoerd.De kerntaken
    van DG LG&S zijn onder andere:- Ontwikkelen van beleidskaders voor stikstof en
    natuur, inclusief vergunningverlening en bronmaatregelen.- Verantwoordelijk voor
    de gebiedsgerichte aanpak.- Sturing en afstemming van transities in het landelijk
    gebied, inclusief ruimtelijke ordening en klimaatbeleid voor landbouw en landgebruik.-
    Coördineren van de LVVN-brede inbreng bij ruimtelijke ordening en het versterken
    van toezicht en handhaving op milieunormen.Het DG LG&S werkt samen met andere
    DG’s en partners om de integrale doelstellingen te realiseren.
