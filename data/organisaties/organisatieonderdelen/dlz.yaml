description:
  text: Mensen met een blijvende behoefte aan zorg en ondersteuning willen zo veel
    mogelijk hun eigen leven leiden. Samen met mensen die belangrijk voor hen zijn
    en op een plek waar ze zich thuis voelen. Zij kunnen waar nodig een beroep doen
    op langdurige zorg, waar zorgverleners met plezier werken en bijdragen aan kwaliteit
    van leven. De toegankelijkheid, kwaliteit en betaalbaarheid van de langdurige
    zorg is niet vanzelfsprekend. Vernieuwing van de langdurige zorg is en blijft
    nodig. De directie Langdurige Zorg (LZ) wil vooropgaan in de vernieuwing van de
    langdurige zorg. Vernieuwen doen we samen met onze partners en de mensen om wie
    het gaat.Aandachtsgebieden* Toegankelijkheid en voldoende passend aanbod.* Kwaliteit
    van de langdurige zorg stimuleren en faciliteren waar nodig en gewenst.* Vereenvoudigen
    van het (regionaal samen)werken in de praktijk en leren van casuïstiek.* Ontwikkelen
    van de kennisinfrastructuur voor de langdurige zorg en deze adequaat onderhouden.*
    Dementie.* Palliatieve zorg.* Toekomstbestendige Ouderenzorg.
