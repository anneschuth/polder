names:
- value: Directie Inhoud
  valid_from: '1900-01-01'
description:
  text: De directie Inhoud levert de inhoudelijke ondersteuning aan de vaste en bijzondere
    Kamercommissies en aan de Voorzitter en de leden van de Eerste Kamer. De afdeling
    bereidt de plenaire vergadering, commissievergaderingen en een aantal andere gremia
    voor, zorgt voor verslaglegging en voor uitvoering van genomen besluiten. Ook
    ondersteunt zij de voorbereiding van de behandeling van wetsvoorstellen en de
    correspondentie met de regering.
