description:
  text: TaakHet Centraal Punt Communicatie verzorgt de publieksvoorlichting op het
    beleidsterrein van de directie Zorgverzekeringen. Dit houdt in het beantwoorden
    van burgerbrieven en e-mails of Facebookvragen.Daarnaast verzorgt het Centraal
    Punt webteksten voor Rijksoverheid.nl en samen met DCO de eindejaarscampagnes
    over de veranderingen in de zorg in het komende jaar.
