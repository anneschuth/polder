names:
- value: Directoraat-generaal Regieorganisatie Transitie Landelijk Gebied
  abbr: RTLG
  valid_from: '1900-01-01'
description:
  text: 'De Regieorganisatie Realisatie Transitie Landelijk Gebied (RTLG) is opgericht naar aanleiding van het coalitieakkoord om urgente maatschappelijke opgaven rondom landbouw, natuur, water en klimaat aan te pakken. Het doel is om als één overheid te opereren, ondersteund door een Transitiefonds en een regieorganisatie. De RTLG richt zich op de transitie van het landelijk gebied door sturing en samenwerking te combineren.De missie van de RTLG is het ondersteunen van rijk, provincies, waterschappen en gemeenten bij de uitvoering van de transitie van het landelijk gebied, zoals vastgelegd in het Nationaal Programma Landelijk Gebied (NPLG). De RTLG zorgt ervoor dat het NPLG werkbare doelen bevat die door provincies kunnen worden gerealiseerd en organiseert de feedbackloop tussen beleid en uitvoering.De taken van de RTLG zijn:- Sturing op doelrealisatie: Programmabeheersing, liaison voor de Grondfaciliteit, omgevingsmanagement en communicatie, en strategisch advies.- Ondersteuning van provincies:
    Vraagbaak, netwerkfunctie voor kennis en capaciteit, en ondersteuning bij gebiedsprocessen en het aanvragen van middelen.'
