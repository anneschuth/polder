description:
  text: De directie Publieke Gezondheid (PG) streeft naar een (mentaal) gezonde bevolking
    en het terugdringen van sociaal-economische gezondheidsverschillen. De directie
    PG is verantwoordelijk voor het stelsel van de Publieke Gezondheid dat is vastgelegd
    in de Wet Publieke Gezondheid. De publieke gezondheidszorg omvat gezondheidsbeschermende
    en gezondheidsbevorderende maatregelen voor de bevolking of specifieke groepen
    daaruit, waaronder het voorkómen en het vroegtijdig opsporen van ziekten. De directie
    PG is daarnaast verantwoordelijk voor een aantal medisch-ethische onderwerpen
    en is coördinerend opdrachtgever van de Gezondheidsraad, RIVM en ZonMw.Aandachtsgebieden*
    Versterken van het stelsel van de Publieke Gezondheid. Het betreft de samenwerking
    tussen Rijk, het RIVM, gemeenten en GGD’en met betrekking tot onder andere het
    lokale gezondheidsbeleid, de jeugdgezondheidszorg, de ouderengezondheidszorg,
    seksuele gezondheid en medische milieukunde. Daarnaast streven we naar paraatheid
    ten aanzien van (grensoverschrijdende) gezondheidsdreigingen zoals Chemische Biologische
    Radiologische en Nucleaire dreigingen (CBRN) en gezondheidsdreigingen door klimaatverandering.*
    Voorkómen en het vroegtijdig opsporen van ziekten door het programmatisch aanbieden
    van bevolkingsonderzoeken, zoals de screening op kanker en pre- en neonatale screening;
    inclusief het verkennen van nieuwe mogelijkheden, zoals de inzet van DNA-technologie
    in preventie en de zorg.* Het Gezond en Actief Leven Akkoord (GALA) dat is vastgesteld
    tussen het Rijk, Gemeenten, zorgverzekeraars en GGD-en met als doel een Gezonde
    Generatie 2040. Het betreft afspraken over onder meer het versterken van preventie
    in het zorgstelsel en de verbinding tussen het zorg- en het sociaal/gemeentelijke
    domein (link met Integraal Zorg Akkoord); en het stimuleren van een gezonde leefstijl
    en vitaal ouder worden.* ‘Health in all policies’ stimuleren, omdat het beleid
    buiten het VWS-domein een grote impact heeft op de gezondheid en instroom in de
    zorg. Het gaat hierbij om enerzijds sociale beleidsterreinen zoals armoedebeleid
    en onderwijs en anderzijds de fysieke leefomgeving en het klimaat.* Coördinatie
    Programma’s Kansrijke start, Valpreventie, Mentale gezondheid en Gezonde leefomgeving.*
    Medisch-ethische onderwerpen, zoals wetgeving en beleid op afstammingsvraagstukken,
    aanpak onbedoelde zwangerschap, abortus, de embryowet en levenseinde.
