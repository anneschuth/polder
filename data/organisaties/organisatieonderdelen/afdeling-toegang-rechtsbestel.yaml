description:
  text: 'Taak: Ontwikkelt beleid teneinde burgers en bedrijven rechtszekerheid te
    bieden in het rechtsverkeer. Hiertoe ontwikkelt de afdeling beleid op het terrein
    van de advocatuur, het notariaat en de gerechtsdeurwaarders.Ook het stelsel van
    gesubsidieerde rechtsbijstand en het beleid op het terrein van de wettelijke schuldsanering
    natuurlijke personen vallen binnen deze afdeling.'
