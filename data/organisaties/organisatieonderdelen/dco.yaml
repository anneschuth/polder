names:
- value: Directie Communicatie
  abbr: DCo
  valid_from: '1900-01-01'
description:
  text: De directie communicatie is een professionele en multidisciplinaire directie
    die volop in beweging is. DCo heeft een sterk ontwikkelde maatschappelijke en
    politiek-bestuurlijke antenne, kijkt met een frisse blik naar communicatievraagstukken
    en is gericht op resultaat. De directie bestaat uit drie afdelingen. Vanuit de
    verschillende afdelingen is voor elke bewindspersoon een multidisciplinair team
    samengesteld voor de dagelijkse communicatieve ondersteuning. In onze communicatie
    stellen we de mensen voor wie we het doen centraal. We werken met ambitie en plezier
    aan effectieve communicatie. We laten de samenhang zien tussen beleidskeuzes,
    benoemen waar nodig dilemma’s en leggen dit actief, tijdig en toegankelijk uit.
