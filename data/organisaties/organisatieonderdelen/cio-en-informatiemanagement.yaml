description:
  text: "De Directie CIO & Informatiemanagement helpt BZK bij het versterken van de\
    \ I-functie in het primaire proces door een betere informatievoorziening en het\
    \ adviseren van ambtelijke en politieke leiding over vraagstukken rondom digitalisering\
    \ en ICT.De CIO stuurt binnen BZK op de samenhang van de digitale ontwikkelingen\
    \ en projecten. Daarbij kijkt de CIO-staf naar continuïteit en veiligheid van\
    \ bestaande processen, naar het gebruik, toegankelijkheid en integriteit van informatie\
    \ en naar de kwaliteit, bestuurbaarheid en haalbaarheid van I projecten en geeft\
    \ advies op de consequenties van beslissingen.Bij de CIO wordt tevens de rol van\
    \ Chief Information Security Officer (CISO) van het ministerie van BZK ingevuld.\
    \ De CISO is spil in de inrichting en werking van de informatiebeveiliging van\
    \ het ministerie en de systemen waarvoor BZK verantwoordelijk is.Onder meer de\
    \ volgende activiteiten worden uitgevoerd:•\thet monitoren en toetsen van grote\
    \ projecten met een ICT-component•\tambtelijke en politieke leiding gevraagd en\
    \ ongevraagd adviseren over (grote) ICT-projecten•\thet verder ontwikkelen van\
    \ de strategie en visie op informatievoorziening en ICT•\thet ontwikkelen van\
    \ de departementale architectuur en standaarden•\thet bewaken van samenhang in\
    \ de informatievoorziening en ICT-projecten•\thet inrichten van project- en portfoliomanagementWerkterrein\
    \ van de CIO BZKAlles waar de ministers over gaan, is – voor de IT-governance\
    \ aspecten – ook onderdeel van het werkterrein van de CIO-BZK. Alle grote ICT-projecten\
    \ (> € 5 miljoen), vallen binnen het werkterrein van de CIO-BZK op basis van de\
    \ rijksbrede afspraken die voor deze projecten gelden.Meer informatieDe basis\
    \ van de CIO-functie is vastgelegd in het taak- en coördinatiebesluit en diverse\
    \ brieven aan de Tweede kamer : TK 2018, 26643 nr. 573; TK 2017, 26643, nr. 485;\
    \ TK 2006 – 2007, 26643, nr. 99; TK 2007-2008, 26643 nr. 121; TK 2007-2008, 26643\
    \ nr 128 ; TK 2008-2009, 26643 nr. 135; TK 2009-2010, 26643 nr. 148; TK 2010-2011,\
    \ 26643 nr. 172; TK 2012-2013, 26643 nr. 282; TK 2015-2016, 26643 nr. 389; TK\
    \ 2016-2017, 26643 nr. 422 ; TK 2016-2017, 26643 nr. 454 ; TK 2008-2009, 29362\
    \ nr. 156 ;TK 2014-2015, 33326 nr. 13"
