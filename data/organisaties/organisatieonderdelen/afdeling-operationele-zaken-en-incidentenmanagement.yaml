description:
  text: 'Taak: Ontwikkelt de incidentenstrategie door risicoanalyses uit te (laten)
    voeren, draaiboeken te maken voor crisissituaties en oefeningen te organiseren.
    Daarnaast moet een leerproces worden georganiseerd en bestaat de professie van
    de medewerkers eruit om adequaat en slagvaardig te handelen bij justitiebrede
    incidenten en crises. In voorkomend geval dient na de afhandeling van een crisis
    een en ander te worden omgezet naar een proces van reguliere beleidsontwikkeling.
    Afdeling bereidt voorts operationele besluiten voor m.b.t. getuigenbescherming,
    tip-en toongelden e.d. De afdeling beantwoordt ook brieven van burgers op het
    terrein van het gehele Directoraat-Generaal.'
