description:
  text: 'TAAK:De Afdeling EU draagt in overleg met de directies zorg voor de strategie-
    en visie-ontwikkeling ten aanzien van de EU-dossiers en beleidsvraagstukken inclusief
    de dossiers en beleidsvraagstukken in Benelux- en Senningenverband. Daarnaast
    bereidt de Afdeling EU de JBZ-Raad inhoudelijk voor. De Afdeling EU vervult de
    coordinatiefunctie op beleidsinhoudelijk en procesmatig gebied voor wat betreft
    de inbreng van het Justitie-standpunt in de EU, inclusief in Benelux- en Senningenverband.Hoofd:Mr.
