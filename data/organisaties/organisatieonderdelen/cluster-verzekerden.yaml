description:
  text: TaakOm het stelsel van de sociale ziektekostenverzekeringen van Wlz en Zvw
    voor iedereen toegankelijk en betaalbaar te houden, is het belangrijk dat er samenhang
    bestaat in de opbouw van de kring van verzekerden.Het is vanuit deze samenhang
    van belang dat tussen de onderscheiden groeperingen verzekerden en onverzekerden
    eenduidigheid bestaat over hoe de verzekeringsaanspraken geregeld zijn. In het
    cluster Verzekerden zijn daarom onderwerpen ondergebracht die samenhangen met
    de inhoudelijke vraagstukken rond de kring van verzekerden Wlz en Zvw.Niet alleen
    voor vraagstukken die de kring van verzekerden als zodanig betreffen, maar ook
    voor groepen personen die juist niet verzekerd of verzekeringsplichtig zijn, voor
    wanbetalers en gemoedsbezwaarden en voor alle overige onderwerpen, zoals identificatieplicht,
    inschrijving in de basisregistratie personen of het gebruik burgerservicenummer,
    die met de kring van verzekerden samenhangen.
