description:
  text: Binnen de afdeling Crisisbeheersing en infectieziekten werken medewerkers
    in teams aan de onderwerpen crisisbeheersing, infectiezieken, seksuele gezondheid
    en informatiebeleid.InfectieziektenBij infectieziekten gaat het om het beleid
    rond de preventie en bestrijding van infectieziekten. Naast de voorbereiding op
    en de bestrijding van infectieziekten en zoönosen zoals griep, polio en Q-koorts,
    gaat het hierbij ook om meer structurele taken zoals het Rijksvaccinatieprogramma.
    Momenteel worden diverse aanpassingen gedaan aan dat programma. Van de afdeling
    vraagt dit veel op zowel beleidsgebied als de aansturing van de implementatie.
    Ook wordt gewerkt aan de uitvoering van de beleidsbrief Verder met vaccineren,
    gericht op het verhogen van de vaccinatiegraad.Seksuele GezondheidSeksuele Gezondheid
    richt zich op de preventie van seksueel overdraagbare aandoeningen zoals chlamydia
    en hiv/aids. In augustus 2019 is gestart met de onderzoekspilot rond PrEP. Ook
    wordt gewerkt aan de uitvoering van het zevenpuntenplan rond onbedoelde (tiener)zwangerschappen
    zoals opgenomen in het Regeerakkoord.CrisisbeheersingBij crisisbeheersing gaat
    het om de voorbereiding op de aanpak van crises op het terrein van zorg en volksgezondheid.
    Het cluster is inzetbaar voor alle onderdelen van VWS. Het cluster coördineert
    de samenwerking en afstemming met andere directies, ministeries en met publieke
    en private zorgpartijen in het veld. Zowel in de voorbereiding op de aanpak van
    crises als tijdens een crisis. Tijdens crises schaalt het team op tot het Departementaal
    Crisiscentrum van VWS en begeleidt het crisisbeheersingsproces op (inter)departementaal
    niveau. Denk aan situaties als de uitbraken van ebola in West-Afrika en van Q-koorts,
    de vliegtuigramp met de MH17, de brand bij Chemie-Pack in Moerdijk, het kernongeval
    in Fukushima of de gevolgen van orkaan Irma in Caribisch Nederland. Een andere
    taak van het cluster Crisisbeheersing is het formuleren van het opleidings- en
    trainingsbeleid en het organiseren van oefeningen op het gebied van crisisbeheersing.
