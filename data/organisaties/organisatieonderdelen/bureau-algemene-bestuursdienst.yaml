description:
  text: 'De secretarissen-generaal, directeuren-generaal, inspecteurs-generaal en alle managers met integrale eindverantwoordelijkheid maken deel uit van de Algemene Bestuursdienst (ABD).Bureau Algemene BestuursdienstBureau Algemene Bestuursdienst (Bureau ABD) is het management development bureau voor de ABD-managers.De noodzaak van management development voor de top van de Rijksdienst is de laatste jaren sterk toegenomen. Een veranderende, kritische en vooral ook zeer diverse samenleving vraagt om een anders denkende en werkende overheid. Dat brengt verandering van de interne processen met zich mee en vereist nieuwe werkstijlen en een nieuwe wijze van leidinggeven.Bureau ABD stelt zich ten doel de kwaliteit van de ambtelijke leiding op de departementen te bevorderen en te waarborgen.De 3 kerntaken van Bureau ABD zijn: werving en selectie, opleiden en ontwikkelen en het uitoefenen van het werkgeverschap voor de topmanagementgroep. Meer informatie over vacatures, benoemingen en opleidingen
    voor ABD-managers staat op de website van de Algemene Bestuursdienst.'
