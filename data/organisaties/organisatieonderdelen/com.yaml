description:
  text: 'Wat is de waarde van beleid als mensen het niet kennen? Of de noodzaak ervan niet zien? De directie Communicatie zorgt voor de communicatieve ondersteuning van het beleid en denkt daarbij vanuit de personen voor wie het beleid bestemd is: welke informatie hebben zij nodig? Hoe denken zij over de zaak? Waarover praten zij?   De directie adviseert de bewindspersonen en beleidsambtenaren bij de ontwikkeling van het beleid, verzorgt de perscontacten en begeleidt bij externe optredens. Verder realiseren de communicatieadviseurs campagnes, begeleiden ze communicatieonderzoek, geven ze OCW-collega''s redactionele adviezen en beantwoorden ze vragen van het publiek. Ook verzorgt Communicatie in- en extern gerichte publicaties en de website van het ministerie van OCW.'
