description:
  text: De afdeling Wet- en Regelgeving en Verzoekschriften heeft als taak:Namens
    de Koning – op verzoek van de verantwoordelijke bewindspersoon – aan de Raad van
    State of de Tweede Kamer ter behandeling voorleggen van voorstellen voor wet-
    en regelgeving.Ter ondertekening aan de Koning voorleggen van wetten - nadat
    deze zijn aangenomen door het parlement - en van alle door de bewindspersonen
    aangeboden Koninklijke Besluiten, verdragen en andere staatsstukken.Informeren
    van de Koning over ontvangen verzoekschriften en het overdragen van de verzoekschriften
    aan de bewindspersoon die verantwoordelijk is voor het beleidsterrein waarover
    het verzoekschrift gaat.Registreren en bewaren van alle door de Koning getekende
    staatsstukken. Na een wettelijke vastgestelde bewaartermijn brengt het Kabinet
    de stukken over naar het Nationaal Archief.
