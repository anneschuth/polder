description:
  text: VWS ontvangt sinds het begin van de COVID-19 crisis veel vragen over wat er
    precies gebeurd is en (op basis waarvan) welke besluiten zijn genomen. Deze vragen
    komen onder meer naar aanleiding van een interne of externe evaluatie, een Wob/Woo-verzoek,
    via een onderzoekscommissie zoals de Onderzoeksraad voor Veiligheid (OVV) en voor
    de Parlementaire enquête Corona. De beantwoording van deze vragen vergt een zorgvuldige
    voorbereiding en een eenduidige coördinatie.PD NC-19 is verantwoordelijk voor
    deze voorbereiding en coördinatie.
