description:
  text: Aan het hoofd van het managementteam OCW staat de secretaris-generaal (SG).
    De SG geeft leiding aan alle onderdelen van het ministerie, inclusief de (rijks)diensten
    en inspecties. De SG voert haar taak uit in overeenstemming met het politieke
    beleid en is eerste politiek-adviseur van de bewindslieden. Secretaris-Generaal
    van het ministerie van Onderwijs, Cultuur en Wetenschap (OCW) is mevrouw drs.
    L. (Loes) Mulder.
