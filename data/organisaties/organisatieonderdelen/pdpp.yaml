names:
- value: Programmadirectie Pandemische Paraatheid
  abbr: PDPP
  valid_from: '1900-01-01'
  valid_until: '2024-06-01'
description:
  text: Tijdens de aanpak van de coronapandemie is gebleken dat onze infectieziektebestrijding
    op onderdelen kwetsbaar is. We moeten deze kwetsbaarheden nu aanpakken en daar
    niet mee wachten totdat zich een nieuwe pandemie aandient.PDPP is verantwoordelijk
    om de pandemische paraatheid van de publieke gezondheid te verbeteren, en met
    name de infectieziektebestrijding. Doel is voorbereid te zijn op de bestrijding
    van een volgende infectieziektecrisis door het creëren van een robuust en flexibel
    zorglandschap en goede organisatie van de publieke gezondheid.
