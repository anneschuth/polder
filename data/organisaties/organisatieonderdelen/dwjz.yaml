  abbr: DWJZ
  valid_from: '1900-01-01'
description:
  text: 'De directie Wetgeving en Juridische Zaken (WJZ) heeft als missie het bevorderen
    van het juridisch en bestuurlijk-juridisch juist, consistent en tijdig handelen
    van VWS. Kerntaken zijn het opstellen van wet- en regelgeving, het voeren van
    juridische procedures en het geven van juridisch advies over bijvoorbeeld nieuw
    beleid en uitvoeringsvraagstukken van bestaand beleid. De directie WJZ werkt daarbij
    nauw samen met de (beleids)directies. De directie WJZ maakt onderdeel uit van
    een interdepartementaal netwerk van juridische directies.Aandachtsgebieden* Totstandkoming
    van wetgeving: het VWS-wettenbestand bestaat uit ongeveer 60 wetten. Jaarlijks
    komen 10-15 wetsvoorstellen en ongeveer 30 Algemene Maatregelen van Bestuur (AMvB’s)
    in het Staatsblad. Meer dan 100 ministeriële regelingen, waarvan de helft subsidieregelingen,
    komen jaarlijks in de Staatscourant. Een tachtigtal wetsvoorstellen is permanent
    in verschillende fasen van voorbereiding. WJZ is vanaf het begin betrokken bij
    de beleidsvorming, schetst de juridische randvoorwaarden en alternatieven voor
    nieuw beleid/wetgeving, en denkt mee met beleidsdirecties over stelselherzieningen.*
    (Bestuurlijk-)juridische advisering en beoordeling van beleidsvoorstellen op rechtmatigheid,
    uitvoerbaarheid en handhaafbaarheid (waaronder staatssteun, privacy, het instellen
    van adviescommissies, verzelfstandiging en attributie/ delegatie/mandaat). De
    samenleving moet kunnen rekenen op een overheid die doet wat mensen nodig hebben
    en daarin betrouwbaar, transparant en aanspreekbaar is. De vele (civielrechtelijke)
    vraagstukken en procedures ten gevolge van de coronacrisis vergen nog immer stevige
    juridische begeleiding.* Behandelen van bezwaar en beroep: jaarlijks ontvangen
    we ongeveer 1200 bezwaren. Ongeveer 10% gaat in beroep of vraagt een voorlopige
    voorziening; slechts een minderheid wordt in het gelijk gesteld.* Behandelen Woo-verzoeken:
    jaarlijks ontvangen we rond de 200 Woo-verzoeken met een veelal (zeer) bewerkelijk
    en politiek-maatschappelijk relevant karakter. Ongeveer 100 verzoeken zijn tegelijk
    in behandeling. De Covid Woo-verzoeken zijn bij deze aantallen niet meegeteld.
    Deze Woo-verzoeken worden behandeld door de Programmadirectie Openbaarheid.'
