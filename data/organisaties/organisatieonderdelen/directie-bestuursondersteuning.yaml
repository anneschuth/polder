description:
  text: TAAKOpstellen in opdracht van de hoofddirecteur en de sectordirecteuren van
    adviezen op ter zake het te hanteren uitvoeringsbeleid zowel DJI-breed als met
    betrekking tot het beleid binnen de sectoren. Het uitvoeringsbeleid kenmerkt zich
    door een grote gerichtheid op de (behoefte van de) praktijk. De concernstaf adviseert
    het lijnmanagement tevens ten aanzien van de beleidsontwikkeling inzake DJI overstijgende
    onderwerpen, bewaakt de onderlinge samenhang en heeft de zorg voor de evaluatie
    van het uitgevoerde beleid. Bij het opstellen van de adviezen maakt  de concernstaf
    gebruik van de expertise die in de sectordirecties en inrichtingen voorhanden
    is. De concernstaf Uitvoeringsbeleid zorgt in opdracht van de lijn samen met de
    sectorstaven Uitvoeringsbeleid voor de feitelijke coördinatie, de procesmatige
    vormgeving alsmede de voortgang van de beleidsontwikkeling. Dit komt onder andere
    tot uitdrukking in het leiden en begeleiden van werk- en projectgroepen. De regie
    en aansturing van beleidsprocessen berusten bij de lijn.
