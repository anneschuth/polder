description:
  text: "Het cluster Ethiek houdt zich bezig met politiek en maatschappelijk gevoelige\
    \ thema’s, op de terreinen van nieuwe technologie en ontwikkelingen, bijzondere\
    \ thema’s rondom fertiliteit, levensbeëindiging en de belangen van proefpersonen\
    \ bij medisch onderzoek. In essentie gaat het daarbij om de vraag hoe verschillende\
    \ waarden ten opzichte van elkaar gewogen worden, en welke consequenties voor\
    \ de daaruit te vloeien normen dit heeft. Hoe verhoudt zich het recht op leven\
    \ tot respect voor autonomie? Welke consequenties heeft dit voor de ontwikkeling\
    \ van beleid en wetgeving? Belangrijkste dossiers zijn abortus, levensbeëindiging\
    \ waaronder euthanasie, onderzoek met mensen en embryo’s en de wet donorgegevens\
    \ kunstmatige bevruchting. De agenda voor dit kabinet is neergelegd in de nota\
    \ medische ethiek. Centraal daarin staat een toetsingskader voor medisch-ethische\
    \ vraagstukken.Het cluster financieel beleid is verantwoordelijk voor de financiële\
    \ advisering, de bedrijfsvoering en de secretariële ondersteuning van de directie.De\
    \ financieel adviseurs hebben als taak de financiële impact op (voorgenomen) beleid\
    \ bij de besluitvorming te betrekken en leveren bijdragen aan producten uit de\
    \ Beleids- en budgetcyclus (begroting, bestedingsplan, BUR en Jaarverslag).Financieel\
    \ beheer is op orde en voldoet aan de normen, goedkeurende ADR-verklaring en AR-rapport\
    \ zonder opmerkingen over PG.De Coördinerend Financieel Adviseur voor de DGV-kolom\
    \ is bij PG ondergebracht en valt onder dit cluster.Onder financieel beheer valt:•\t\
    Subsidiebeheer•\tInkoopbeheer•\tBetaaltermijnen•\tInhuur externen•\tInformatiebeveiliging"
