names:
- value: Europees, Internationaal en Agro-economisch Beleid
  abbr: EIA
  valid_from: '1900-01-01'
description:
  text: De directie EIA werkt aan de totstandkoming van Europese kaders en beleid
    voor eenduurzame en concurrerende agrosector. Voor de breedte van de beleidskern
    coördineert enziet EIA toe op een doelmatige, doeltreffende en correcte wijze
    van beheer en uitvoering vanhet Plattelandsontwikkelingsprogramma, onder andere
    in samenwerking met het Regiebureau POP en ook de opdrachtverlening aan RVO en
    NVWA voor de goede uitvoering van (Europees) landbouwbeleid en de EU-conforme
    uitvoering van financiële regelingen. Daarnaast geeft EIA vorm aan versterking
    van de Nederlandse inzet op mondiale voedselzekerheid en internationale agribusiness.
