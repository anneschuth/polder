description:
  text: 'TAAKDe Dienst Geestelijke Verzorging vervult als onderdeel van de Dienst
    Justitiële Inrichtingen een maatschappelijke opdracht door invulling te geven
    aan het wettelijk recht van alle mensen die justitieel zijn ingesloten om hun
    godsdienst of levensbeschouwing, individueel of in gemeenschap met anderen, vrij
    te belijden en te beleven.Vanuit verschillende geloofs- en levensovertuigingen
    richten wij ons met een pluriform, denominatief aanbod op alle mensen die justitieel
    zijn ingesloten: gedetineerden, tbs-gestelden, jeugdigen en vreemdelingen.Met
    bezielde en professionele medewerkers begeleiden wij hen bij het omgaan met het
    verleden, de actuele levenssituatie en de ontwikkeling van toekomstperspectief.
    Daarbij zijn wij gericht op samenwerking met justitiële- en maatschappelijke organisaties.
    Door onze zorg leveren wij tevens een essentiële bijdrage aan de missie van de
    Dienst Justitiële Inrichtingen.'
