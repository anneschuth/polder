description:
  text: Dienst Terugkeer en Vertrek (DTenV) is verantwoordelijk voor het zelfstandige en gedwongen vertrek van vreemdelingen die niet in Nederland mogen blijven. De medewerkers van DTenV opereren zorgvuldig en met respect voor de waardigheid van de vreemdeling.DTenV richt zich op twee doelgroepen:- Illegale vreemdelingen die zijn aangehouden in het kader van het binnenlands (mobiel) vreemdelingentoezicht en vreemdelingen aan wie de toegang is geweigerd in het kader van de grensbewaking.- Uitgeprocedeerde asielzoekers die het land moeten verlaten.Een persoonsgerichte en multidisciplinaire aanpak op basis van casemanagement staat centraal. Deze aanpak wordt uitgevoerd in samenwerking met (keten)partners. Vanuit zijn operationele taak is de DTenV gesprekspartner van bevoegde autoriteiten van herkomstlanden, waaronder diplomatieke vertegenwoordigingen.
  url: https://www.dienstterugkeerenvertrek.nl/over-dtv/organisatie
