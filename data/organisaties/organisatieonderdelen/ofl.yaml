description:
  text: 'Het Overlegorgaan Fysieke Leefomgeving (OFL) is een onafhankelijk orgaan
    voor overleg en samenwerking. In het OFL ontmoeten rijksoverheid, burgers, maatschappelijke
    organisaties en bedrijfsleven elkaar voor overleg en samenwerking op het gebied
    van de fysieke leefomgeving: de omgeving waar we wonen, werken, reizen en recre&euml;ren.
    Daarbij horen onder meer onderwerpen als klimaat, landbouw, natuur, energie en
    water. Onderwerpen die direct impact hebben op mensen in hun omgeving.'
