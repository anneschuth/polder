description:
  text: Taak:Ondersteuning Staatssecretaris en MT Belastingdienst bij sturing op ICT-processen
    (ontwerp en realisatie, test, invoering, beheer) Belastingdienst en verantwoording
    aan de Kamer. Regie op het aansluiten van de processen en de ICT-ontwikkeling
    van de Belastingdienst op de processen en ICT-producten en - diensten van de e-overheid
    en regie op de inzet van externe partijen. Het voorbereiden van beleid en van
    verandermaatregelen, en het uitvoeren van control op de daadwerkelijke invoering
    van beleid en verandermaatregelen.
