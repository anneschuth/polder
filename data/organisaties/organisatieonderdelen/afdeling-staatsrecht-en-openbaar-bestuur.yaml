description:
  text: De afdeling SOB heeft als hoofdtaak het verzamelen van informatie en op grond
    hiervan de Koning schriftelijk en mondeling informeren over actuele onderwerpen.
    Dit geldt in het bijzonder voor zijn gesprekken met de minister-president en andere
    binnen- en buitenlandse hoogwaardigheidsbekleders en voor zijn staatsbezoeken
    en werkbezoeken. Het hoofd van de afdeling SOB is tevens plaatsvervangend directeur
    van het Kabinet.
