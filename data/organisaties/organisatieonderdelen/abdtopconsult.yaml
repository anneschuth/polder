description:
  text: In 2010 stemde de Ministerraad in met de oprichting van ABDTOPConsult. ABDTOPConsult
    is een klein team van ervaren topambtenaren dat snel inzetbaar is bij complexe
    of urgente vraagstukken. De leden zijn benoemd door de ministerraad. ABDTOPConsult
    is van en voor de (rijks)overheid.
