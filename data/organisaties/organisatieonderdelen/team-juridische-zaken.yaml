description:
  text: Taak:Team Juridische Zaken verricht juridische werkzaamheden voor de Belastingdienst,
    zowel op het gebied van het ambtenarenrecht als op niet-fiscaal terrein. Hiertoe
    behoren ook de zogeheten ' kabinetszaken'. Het team behandelt geen geschillen
    met belastingplichtigen over de aanslag. De werkzaamheden van het team betreffen
    onder andere de behandeling van verzoeken om informatieverstrekking op basis van
    de WOB (Wet Openbaarheid van Bestuur) en de WBP (Wet Bescherming Persoonsgegevens).
    Ook worden verzoeken van de Nationale Ombudsman en de Commissie Gelijke Behandeling
    door dit team behandeld. Verder horen schadevergoedingszaken die de Belastingdienst
    betreffen en de bescherming van het intellectuele eigendom van de Belastingdienst
    (waaronder de huisstijl) tot de onderwerpen waar het team zich mee bezighoudt.
    Ten aanzien van het personeel van de Belastingdienst (ongeveer 32.000 medewerkers)
    heeft het team een taak inzake de toepassing van de klachtenregeling, de behandeling
    van bezwaarschriften en klachten van ambtenaren (inclusief de klachtencommissie
    seksuele intimidatie), disciplinaire straftoemeting en ontslagarrangementen. Het
    team treedt op als gemachtigde bij de bestuursrechter in ambtenarenzaken en zorgt
    voor de begeleiding van civiele procedures.
