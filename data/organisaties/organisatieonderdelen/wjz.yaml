description:
  text: 'Bij het beleid voor scholen, universiteiten, omroeporganisaties en andere
    instellingen kunt u zich vaak beroepen op een wet, algemene maatregel van bestuur
    of ministeriële regeling. Beleidsontwikkeling en wetgeving gaan hand in hand,
    via intensieve werkrelaties tussen de directie Wetgeving en Juridische Zaken en
    de andere OCW-directies.   Belangrijke onderwerpen zijn: onderwijstoezicht, leerlinggebonden
    financiering in het primair onderwijs, harmonisatie van wetgeving, goed bestuur,
    studiefinanciering, bestrijding voortijdig schoolverlaten, medezeggenschap, de
    implementatie van EU-richtlijnen en internationale verdragen. Prioriteitsvolgorde
    en planning van deze projecten gebeuren op basis van een wetgevingsprogramma.   Ook
    adviseert de directie de minister en staatssecretarissen over deregulering en
    vereenvoudiging van regelgeving, bestuurlijk-juridische en staatrechtelijke aangelegenheden,
    openbaarheid van documenten, convenanten, contracten en juridische aspecten van
    internationale afspraken.'
