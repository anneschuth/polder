description:
  text: "Shared service organisaties (SSO's)Onder het directoraat-generaal Vastgoed\
    \ en Bedrijfsvoering Rijk vallen de shared service organisaties FMHaaglanden,\
    \ Rijksorganisatie voor Informatiehuishouding (RvIHH), Shared Service Center-ICT\
    \ (SSC-ICT), Rijksorganisatie voor Ontwikkeling, Digitalisering en Innovatie (Rijksorganisatie\
    \ ODI), Organisatie Personeel en Rijk (O&P Rijk), Rijksinkoopsamenwerking (RIS),\
    \ Rijksorganisatie Beveiliging en Logistiek (RBL) en Organisatie voor Bedrijfsvoering\
    \ en Financiën (OBF).De Organisatie voor Bedrijfsvoering en Financiën (OBF) adviseert,\
    \ voert uit en ondersteunt in bedrijfsvoering en financiële processen. Dit gebeurt\
    \ op gebied van in-, door- en uitstroom, boekhouding, crediteuren- en debiteurenadministratie,\
    \ projectadministratie, functioneel beheer, communicatie, informatiebeveiliging\
    \ en privacy. Dit doet OBF voor de organisatieonderdelen Rijksorganisatie ODI,\
    \ RIS, RBL. Daarbij levert OBF ook diensten aan collega- agentschappen SSC-ICT,\
    \ FMH, Rijksorganisatie voor Informatiehuishouding (RvIHH) en de Rijkschoonmaakdienst\
    \ (RSO).De Organisatie voor Bedrijfsvoering en Financiën bestaat uit de volgende\
    \ afdelingen:-\tFinanciële Dienstverlening-\tControl & Advies-\tInformatievoorziening-\t\
    Contentteam-\tStaf"
