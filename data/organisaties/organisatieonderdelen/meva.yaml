description:
  text: 'Door toenemende welvaart, nieuwe behandelmogelijkheden, innovatie en vergrijzing
    neemt de vraag naar zorg toe. Personeelstekorten en begrensde financiële mogelijkheden
    zetten de toegankelijkheid en kwaliteit van zorg en ondersteuning onder druk.
    De directie MEVA focust zich daarom op gezondheid, zorg en welzijn thuis zolang
    het kan, digitaal als het kan en met de juiste zorg en professional op de juiste
    plek. Dit doen we aan de hand van drie overkoepelende thema’s:1. Omgaan met schaarste
    aan zowel (financiële) middelen als zorgprofessionals vanuit de verantwoordelijkheid
    voor het stelsel2. Investeren in de kwaliteit van individuele zorgverlening en
    zorgverleners op de werkvloer3. Investeren in duurzame zorg, welzijn en sportAandachtsgebieden*
    Financiering en ramingen: MEVA coördineert binnen VWS de vraagstukken rondom de
    wijze waarop de zorg wordt gefinancierd.  Daarnaast raamt MEVA de uitgavenontwikkelingen
    in de zorg.* Strategie en kennis: MEVA signaleert, verzamelt en analyseert trends
    in de zorg en brede ontwikkelingen in zorg en welzijn. Bij MEVA zit ook de CSO
    (Chief Science Officer) van VWS.* Arbeidsmarktbeleid zorg en welzijn: MEVA is
    binnen VWS verantwoordelijk voor het OVA-convenant (loonruimte), faciliteert met
    beleid het behoud van zorgmedewerkers, een leven lang ontwikkelen en innovatieve
    werkvormen, ook vanuit de regio.* Arbeidsbesparende innovatie: MEVA geeft een
    impuls aan de opschaling van sociale en technologische innovaties.* Beroepenregulering
    in de zorg: Het bevorderen en bewaken van de kwaliteit van beroepsuitoefening
    in de zorg ten behoeve van de patiëntveiligheid is gereguleerd in de Wet Beroepen
    Individuele Gezondheidszorg (BIG). Het gaat bijvoorbeeld om kwaliteitseisen aan
    zorgprofessionals, toelating van buitenlandse zorgverleners, specialismen, taakherschikking,
    medisch tuchtrecht, medisch beroepsgeheim, zeggenschap van zorgprofessionals en
    cosmetische ingrepen.* Bekostiging vervolgopleidingen: MEVA raamt en bekostigt
    de medische, verpleegkundige en psychologische vervolgopleidingen. MEVA faciliteert
    de opzet van modulair en flexibel opleiden.* Duurzaamheid en gezondheid: MEVA
    coördineert de duurzaamheidsopgave van VWS. Ook is MEVA vanuit VWS verantwoordelijk
    voor het uitvoeren van de Green Deal 3.0.* Discriminatie en gelijke kansen: MEVA
    coördineert de VWS-brede aanpak om discriminatie te bestrijden en gelijke kansen
    te bevorderen.'
