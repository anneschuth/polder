description:
  text: Het ministerie van Landbouw, Visserij, Voedselzekerheid en Natuur (LVVN) werkt volgens een model met een Secretaris-Generaal (SG) en Directeuren-Generaal (DG's) dat gericht is op eenheid van leiding en ononderbroken lijnsturing. De SG is, samen met de directeuren-generaal, de belangrijkste adviseur van de ministers, verantwoordelijk voor de ambtelijke leiding van het ministerie en de coördinatie van beleidsmatige en organisatorische zaken. De Bestuursraad, onder voorzitterschap van de SG, stuurt de ambtelijke organisatie aan.De SG stuurt de plaatsvervangend Secretaris-Generaal (pSG), de DG's, de stafdirecteuren en de inspecteur-generaal van de Nederlandse Voedsel- en Warenautoriteit (NVWA) aan op basis van managementafspraken. De DG's en stafdirecteuren geven leiding aan hun respectievelijke dienstonderdelen en dragen budget- en personeelsverantwoordelijkheid.Daarnaast is de SG verantwoordelijk voor de stafdirecties FEZ, Directie Communicatie (DC), Directie Bestuurlijke en Politieke
    Zaken (BPZ) en Wetgeving en Juridische Zaken (WJZ), en heeft hij het eigenaarschap over de NVWA en enkele Zelfstandige Bestuursorganen (ZBO's). De SG is ook betrokken bij de rijksbrede aansturing van de Rijksdienst via deelname aan het SGO (Secretarissen-Generaal Overleg).
