description:
  text: Per 1 januari 2011 is Doc-Direkt de nieuwe rijksbrede shared service organisatie.
    Doc-Direkt beheert en bewerkt archieven voor een toegankelijke, tijdige en transparante
    informatievoorziening van de rijksoverheid. De organisatie is samengesteld uit
    de archiefdiensten van de ministeries, het semi-statisch archief van de Belastingdienst
    en de Centrale Archief Selectiedienst (CAS).Doc-Direkt zorgt ervoor dat de rijksoverheid
    op het vlak van documentaire informatiehuishouding op orde is.
