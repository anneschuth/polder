description:
  text: 'De directie ESTT zorgt ervoor dat de kwaliteit van de gezondheidszorg in
    Nederland gegarandeerd blijft. Onder de directie ESTT valt een aantal onafhankelijke
    organisatie(onderdelen) die zich inzetten voor goede zorg.  Dit doen ze allemaal
    vanuit hun eigen verantwoordelijkheid en taakstelling. De directie ESTT regelt
    de bedrijfsvoering voor deze losse organisatieonderdelen. Dit beslaat secretariaat,
    administratie, juridisch advies, HRM, benoemingen leden colleges en commissies,
    communicatie, facilitair en financi&euml;n. Doordat de directie ESTT dit doet,
    kunnen de organisatie(onderdelen) zich volledig richten op hun primaire taak:
    bijdragen aan kwalitatief goede gezondheidszorg.'
