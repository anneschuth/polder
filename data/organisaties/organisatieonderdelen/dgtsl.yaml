description:
  text: Wij zijn Dienst Toeslagen, zelfstandig onderdeel van het ministerie van Financiën.
    Miljoenen mensen in Nederland krijgen 1 of meer toeslagen die helpen om de zorgverzekering,
    de zorg voor kinderen en de huur te betalen. Zodat iedereen kan meedoen in de
    maatschappij. Wie je ook bent en wat je persoonlijke situatie ook is. Dienst Toeslagen
    is de organisatie die deze toeslagen toekent en uitkeert.
