description:
  text: DUS-I is onderdeel van het kerndepartement van VWS. DUS-I is de dienstverlenende
    schakel tussen subsidieaanvragers en de ministeries van VWS en OCW. DUS-I ontwikkelt
    zich steeds verder als expertisecentrum op het gebied van subsidies. Ze opereert
    in opdracht van de beleidsdirecties en werkt nauw met hen samen. In september
    2023 voerde DUS-I 135 subsidieregelingen, beleidskaders en specifieke uitkeringen
    uit.TakenDe kerntaak van DUS-I is het verlenen, verwerken van wijzigingsverzoeken
    en vaststellen van subsidies. DUS-I voert beleidsrijke en beleidsarme subsidieregelingen
    uit, hoofdzakelijk voor instellingen, maar incidenteel ook voor burgers. DUS-I
    streeft altijd naar doelmatigheid en rechtmatigheid en heeft oog voor de menselijke
    maat. Elke nieuwe of gewijzigde regeling wordt vooraf getoetst op uitvoerbaarheid
    en handhaafbaarheid in het Subsidielab.Naast de uitvoering van haar kerntaak biedt
    DUS-I, passend bij haar centrale expertisefunctie, aanvullende diensten aan waarmee
    ze haar opdrachtgevers verder kan ontzorgen. Deze optionele diensten richten zich
    onder andere op het analyseren en presenteren van subsidie- & beleidsinformatie,
    accountantsprotocolering, de aanpak van misbruik en oneigenlijk gebruik en het
    verzorgen van voorlichting aan aanvragers.
