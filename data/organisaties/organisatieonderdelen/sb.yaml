description:
  text: 'Een sportieve samenleving waarbij plezier in sport en bewegen belangrijk
    is. Waarin voor iedereen passende en veiligesport- en beweegmogelijkheden aanwezig
    zijn en topsport mensen inspireert en samenbrengt. Dat is debeleidsdoelstelling
    van de directie Sport en Bewegen. Om deze doelstelling te bereiken werken we departementaal
    eninterdepartementaal samen, alsook met strategische partners in de sportsector
    (o.a. NOC*NSF), gemeenten,onderwijspartijen, uitvoeringsorganisaties, onderzoeksinstituten
    en meer. Ook werken we samen met internationalepartners zoals UNESCO. In 2022
    en 2023 zijn het Nationaal Sportakkoord II en Actieplan Nederland Beweegt gepubliceerd.Gezamenlijk
    vormen deze akkoorden de basis voor de aandachtsgebieden van de directie Sport
    en Bewegen.Aandachtsgebieden* Bewegen: wij willen Nederlanders dagelijks in beweging
    krijgen. Daarom focussen we ons op het creëren van de juistevoorwaarden om bewegen
    gedurende de dag te stimuleren, bijvoorbeeld in de domeinen zorg, werk en leefomgeving.Gezondheidswinst
    is hierbij het primaire uitgangspunt.* Vaardig in bewegen: meer kinderen moeten
    voldoen aan de beweegrichtlijn, daarom zetten wij in op een brede motorischeontwikkeling
    en veelzijdig bewegen. Ook willen we de sportdeelname verhogen en sportuitval
    verlagen.* Inclusief sporten en bewegen: iedere Nederlander moet ongehinderd een
    leven lang plezier kunnen hebben in sporten enbewegen.* Ruimte voor sport- en
    bewegen: we willen een sportinfrastructuur met voldoende sportaccommodaties die
    bereikbaar,toegankelijk, duurzaam en van hoge kwaliteit zijn. Daarnaast richt
    de directie zich op het versterken van eenleefomgeving die uitnodigt tot bewegen
    en spelen.* Vitale sport- en beweegaanbieders: we willen vitale sportaanbieders
    met een kwalitatief sterk, veilig en toegankelijksportaanbod voor iedereen.* Sociaal
    veilige sport: sporten moet leuk, veilig, eerlijk en zorgeloos zijn voor iedereen.
    We zetten ons in voor de basiseisenvoor sociale veiligheid bij sportaanbieders
    en werken aan extra ondersteunende infrastructuur rondom sociale veiligheid.*
    Topsport: we willen een breder palet aan waardevolle topsportprestaties realiseren,
    de topsport op een maatschappelijkverantwoorde manier organiseren, het platform
    van de topsport beter benutten en de zichtbaarheid en het bereik van detopsport
    vergroten.'
