description:
  text: 'De directie Wetgeving en Juridische Zaken (DWJZ) zorgt voor de algemene wetboeken
    en andere algemene wetten zoals het Burgerlijk Wetboek, het Wetboek van Burgerlijke
    Rechtsvordering, het Wetboek van Strafrecht, het Wetboek van Strafvordering en
    de Algemene wet bestuursrecht.Verder ontwikkelt en beheert DWJZ samen met de beleidsdirecties
    en uitvoeringsorganisaties van Veiligheid en Justitie wetgeving voor beleidsterreinen
    waarvoor de Minister en Staatssecretaris van Veiligheid en Justitie verantwoordelijk
    zijn. Bijvoorbeeld rechtshandhaving, rechtspleging, juridische beroepen en penitentiaire
    wetten. Bovendien draagt DWJZ bij aan de totstandkoming van beleid en wetgeving
    van andere ministeries alsmede van internationale regelgeving.De Minister van
    Veiligheid en Justitie is ook een verantwoordelijk voor de bevordering van wetgevingskwaliteit
    voor de gehele rijksoverheid. Vragen die hierbij aan de orde komen zijn: voldoet
    de wet aan de Grondwet en aan internationale verplichtingen? Legt de wet geen
    nodeloze lasten op? Is de wet uitvoerbaar en handhaafbaar? Of is er misschien
    een alternatief voor wetgeving? Ook deze taak is neergelegd bij DWJZ.Tenslotte
    is DWJZ ook belast met andere juridische taken, zoals de behandeling van bezwaar-
    en beroepschriften en van civielrechtelijke procedures, het opstellen van convenanten,
    het toetsen van beslissingen op grond van de Wet openbaarheid van bestuur, de
    advisering van de departementsleiding in juridisch-bestuurlijk gecompliceerde
    aangelegenheden, de zorg voor de juridische kwaliteitsborging en het onderhouden
    van het contact met de landsadvocaat.'
