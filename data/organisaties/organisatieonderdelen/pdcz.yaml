description:
  text: De programmadirectie COVID-19 Zorg richt zich op het ontwikkelen en implementeren
    van beleid dat moet zorgen voor de continuïteit van de Covid-zorg in de hele keten
    (i.e. cure en care, intra- en extramuraal) onder gelijktijdige borging van de
    reguliere zorg.Hierbij ligt het accent op COVID-19-gerelateerde zorg. Er wordt
    altijd intensief samengewerkt en afgestemd met de directies die zich bezighouden
    met de reguliere zorg. Daarnaast zorgt PDCZ ook voor de coördinatie van de VWS-bijdrage
    aan de zorg en ondersteuning van vluchtelingen uit Oekraïne.
