names:
- value: Directie Financieel-Economische Zaken (FEZ)
  valid_from: '1900-01-01'
description:
  text: 'De directie FEZ is de centrale dienstcontroller van het ministerie van BZK. De directie is inhoudelijk gepositioneerd onder de SG, en beheersmatig onder de hdDCB. FEZ heeft vier afdelingen: Control en Financieel Advies (CFA), Begroting, Economie en Evaluaties (BEE), Kaderstelling, Informatievoorziening, Inkoop en Audit (KIIA) en Financiële Administratie en Regelingen (FAR). Daarnaast wordt de directie ondersteund door een directiesecretariaat.Klik hier voor het organogram van FEZ.De directie FEZ levert intern en extern financieel-economische diensten en heeft als belangrijkste stakeholders:- De minister(s)- De SG- Diensthoofden van BZK en de BZK directeuren- Het Ministerie van Financiën, de Algemene Rekenkamer, de ADRAan deze stakeholders worden producten opgeleverd, zoals adviezen over doelmatigheid van beleid, voorstellen voor de begroting, de jaarverantwoording, adviezen om de uitgaven te beheersen, rapportage over de bedrijfsvoering van dit departement etc. Dit alles steunt
    op een juiste administratie van verplichtingen en betalingen.De wettelijke basis van de FEZ-functie is gelegen in de Comptabiliteitswet (CW) en het besluit taak FEZ. In deze wet- en regelgeving is geregeld dat ieder ministerie haar eigen directie FEZ heeft die de minister ondersteunt vanuit zijn verantwoordelijkheid voor de begroting en het financieel beheer binnen het departement. Hieruit vloeit tevens voort dat de dFEZ verantwoordelijk is voor een gezonde financiële huishouding van het departement en dat FEZ gevraagd en ongevraagd financieel-economische adviezen geeft aan de departementale leiding. FEZ voert tevens de administratie van het departement en heeft de rol van CDI. De concrete producten/taken die de directie FEZ oplevert/uitvoert en de processen langs welke dat gebeurt vormen onderdeel van het O&F rapport van FEZ.'
