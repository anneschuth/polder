description:
  text: 'Efficiency was en is één van de prioriteiten van het bedrijfsvoeringsbeleid
    van het Rijk. Met deze focus is de afgelopen jaren veel bereikt. Geleidelijk aan
    heeft individuele departementale sturing plaatsgemaakt voor rijksbrede sturing
    van de bedrijfsvoering. Met een groeiend besef dat besparing op bedrijfsvoering
    minder besparing op het primaire proces en inzet van menskracht betekent.Het einddoel
    is echter ook inhoudelijk, niet puur financieel: een flexibele rijksdienst. De
    bouwstenen hiervoor liggen in de meeste gevallen op hun plek, het cement ertussen
    mag nog steviger worden. Het aanbrengen daarvan is één van de prioriteiten van
    de komende jaren.De beleidsdirectie Inkoop, Facilitair en Huisvestingsbeleid Rijk
    (IFHR) draagt bij aan die productievere rijksoverheid. Door beleid en kaders te
    ontwikkelen voor efficiënte en flexibele huisvesting en faciliteiten en een compacte
    en professionele inkooporganisatie, waarbij aandacht is voor duurzaamheid, in
    de afdelingen Faciliteiten- en Huisvestingsbeleid en Inkoop- en Aanbestedingsbeleid.
    De afdeling Beleidsinformatie draagt bij aan data driven beleid bij geheel DGOO.
    Tevens wordt binnen de directie IFHR uitvoering gegeven aan het project Vernieuwing
    Rijnstraat.'
