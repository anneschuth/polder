description:
  text: TAAKMede zorgdragen voor de optimale benutting van de capaciteit bij de onder
    de directie TBS vallende inrichtingen, zowel in kwanitatief als kwalitatief opzicht
    (logistiek management);verantwoordelijk zijn voor het nemen van besluiten inzake
    de selectie en plaatsing, de bewegingsvrijheid, (proef)verloven van individuele
    TBS-patiënten en de monitoring van de opgelegde TBS-maatregelen.
