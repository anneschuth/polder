description:
  text: 'De minister is belast met de leiding van het departement, stelselverantwoordelijkheid
    voor de onderscheiden onderwijssectoren als geheel en de vaststelling van het
    totale beleid inclusief begroting en financiële zaken ten aanzien van OCW.  De
    minister is in het bijzonder belast met:  - Hoger onderwijs  - Wetenschappelijk
    onderwijs  - Onderzoek  - Innovatieplatform (eerste vice voorzitter)  - Cultuur
    en media  - Emancipatiebeleid (inclusief homo-emancipatie)  - Project Aanval op
    de schooluitval  - Lerarenbeleid (Arbeidsvoorwaarden)  De staatssecretaris, genoemd
    staatssecretaris voor Primair Onderwijs, is binnen de grenzen van het door de
    minister vastgestelde beleid in het bijzonder belast met:  - Het primair onderwijs  -
    het speciaal onderwijs  - het onderwijsachterstandenbeleid  - voorschoolse opvang  -
    kinderopvang  - andere aangelegenheden waarvan de behartiging door de minister
    aan haar wordt toevertrouwd.  De staatssecretaris, genoemd staatssecretaris voor
    Voortgezet en Beroepsonderwijs, is binnen de grenzen van het door de minister
    vastgestelde beleid, in het bijzonder belast met:  - Het voortgezet onderwijs  -
    het voorbereidend beroepsonderwijs en het middelbaar beroepsonderwijs - bestrijding
    van schooluitval 12-18 jarigen (in een gezamenlijke verantwoordelijkheid met de
    minister)  - de lerarenopleidingen - andere aangelegenheden waarvan de behartiging
    door de minister aan haar wordt toevertrouwd.'
