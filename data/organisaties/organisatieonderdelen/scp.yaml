description:
  text: Het SCP is één van de drie planbureaus dat met wetenschappelijke kennis over
    het leven van burgers in Nederland bijdraagt aan goed geïnformeerd overheidsbeleid
    en een betere samenleving. Als kennisinstelling doet het SCP op onafhankelijke
    wijze – gevraagd en ongevraagd – beleidsrelevant wetenschappelijk onderzoek naar
    de kwaliteit van de samenleving vanuit het perspectief van de burger.Taken* Wetenschappelijke
    verkenningen verrichten om te komen tot een samenhangende beschrijving van de
    situatie van het sociaal en cultureel welzijn in Nederland en belangrijke ontwikkelingen
    in de samenleving;* Bijdragen aan een verantwoorde keuze van beleidsdoelen en
    inzicht in de verschillende wegen om deze doeleinden te bereiken;* Informatie
    verwerven met betrekking tot de uitvoering van interdepartementaal beleid op het
    gebied van sociaal en cultureel welzijn, om de evaluatie van deze uitvoering mogelijk
    te maken.De maatschappelijke vraagstukken waar het SCP onderzoek naar doet, beperken
    zich zelden tot één specifiek beleidsterrein. Burgers bevinden zich immers in
    veel domeinen tegelijkertijd. Door dit als uitgangspunt te nemen, kan het SCP
    het effect van overheidsbeleid voor burgers beter onderzoeken. Als onafhankelijk
    planbureau kiest het SCP zelf welke onderzoeken het uitvoert, in verbindingen
    met anderen.
