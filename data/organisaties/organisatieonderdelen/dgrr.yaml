description:
  text: De directie Veiligheid en Bestuur (DVB) richt zich op het domein van de bestuurlijke
    (gemeentelijke) aanpak van openbare orde en veiligheid en criminaliteit en keteninformatievoorziening.TakenDe
    directie heeft tot taak om gemeenten zodanig toe te rusten dat deze -niet vrijblijvend
    - hun verantwoordelijkheid voor de bestuurlijke aanpak van sociale onveiligheid
    en georganiseerde criminaliteit kunnen nemen. Dat betreft zowel de directe gemeentelijke
    taken als de gemeentelijke regie om integraal sociaal veiligheidsbeleid tot stand
    te brengen. Ook heeft de directie tot taak de samenwerking tussen ketenpartners
    op het gebied van informatievoorziening te initiëren, stimuleren en realiseren.
