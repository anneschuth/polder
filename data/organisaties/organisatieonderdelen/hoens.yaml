description:
  text: 'Het hoger onderwijs telt bijna 570.000 studenten: meer dan 360.000 aan bijna
    vijftig bekostigde hogescholen en circa 207.000 aan twaalf bekostigde universiteiten.
    Veel van de voor het beleid relevante informatie wordt jaarlijks gepubliceerd
    in ''Kennis in Kaart'' (Kennis in Kaart 2007). Het beleid van het huidige kabinet
    ten aanzien het hoger onderwijs en onderzoek is verwoord in de Strategische Agenda
    getiteld ''Het hoogste goed'' (strategische agenda)  De taak van de directie is
    samengevat het garanderen en bevorderen van kwaliteit, toegankelijkheid en doelmatigheid
    van het onderwijsaanbod in het hoger onderwijs en onderzoek en de studiefinanciering
    (inclusief mbo en vo). Een greep uit de onderwerpen die daarbij aan de orde zijn:   Deelname
    aan het hoger onderwijs en rendement Studietijd en motivatie Kwaliteit en excellentie
    Internationalisering De directie Hoger Onderwijs en Studiefinanciering onderhoudt
    daartoe onder meer de contacten met (de vertegenwoordigende organisaties van)
    de bekostigde en aangewezen instellingen voor hoger onderwijs en onderzoek (VSNU
    (www.vsnu.nl) , HBO-raad (www.hbo-raad.nl) , Peapon (www.paepon.nl), de vertegenwoordigende
    organisaties van de studenten: ISO (www.iso.nl) , LSVb (www.lsvb.nl) en JOB (http://www.job-site.nl/start/top.html)
    , de Nederlands-Vlaamse Accreditatie-organisatie (http://nvao.net) , en onder
    meer VNO-NCW (http://www.vno-ncw.nl) en het Midden- en Kleinbedrijf (http://www.mkb.nl).'
