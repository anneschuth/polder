description:
  text: 'De Directie Communicatie (DC) adviseert en ondersteunt medewerkers en de
    politieke leiding over interne en externe communicatie. De DC speelt een belangrijke
    rol in het analyseren van signalen van buiten de organisatie en in het realiseren
    van beleidsdoelen, en vormt een brug tussen politiek, beleid en samenleving.Kerntaken
    van de Directie Communicatie:- Strategisch communicatieadvies: Ontwikkelen en
    uitvoeren van strategische communicatie rond beleidsprioriteiten.- Samenhang en
    kwaliteit: Zorgen voor samenhang en kwaliteit van communicatie, tekstueel en visueel.-
    Advies aan beleidsdirecties: Adviseren over de rol van communicatie in beleidsvorming.-
    Ondersteuning leiding: Adviseren bij publiciteit en externe optredens.- Pers-
    en mediacontacten: Schrijven van nieuwsberichten en onderhouden van perscontacten.-
    Speech- en tekstadvies: Schrijven van speeches en tekstadvies voor prioritaire
    stukken.- Stakeholdermanagement: Coördineren van stakeholdermanagement.- Interne
    communicatie: Verantwoordelijk voor interne communicatie binnen het departement.-
    Beheer communicatiekanalen: Beheren van online en offline communicatiekanalen,
    inclusief social media.- Community-opbouw: Opzetten van communities om de buitenwereld
    te betrekken bij LNV-thema’s.De DC voert ondersteunende communicatietaken uit
    samen met EZ en KGG en is betrokken bij interdepartementale communicatie-initiatieven.'
