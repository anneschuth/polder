description:
  text: TaakHet cluster Eigen Betalingen is verantwoordelijk voor het ontwikkelen
    en onderhouden van beleid en wetgeving op het gebied van eigen betalingen in de
    zorg. Door middel van eigen betalingen betalen gebruikers van zorg een deel van
    de kosten zelf. Het idee daarachter is dat jonge en gezonde mensen de solidariteitsgedachte
    die terugkomt in de verplichte verzekering met verbod op premiedifferentiatie
    zullen blijven steunen.De werkzaamheden in het cluster betreffen onder meer het
    uitzetten van onderzoeken naar de effecten van (de verhoging van) eigen betalingen,
    contacten met CAK over de uitvoering van de eigen bijdragesystematiek in de Wlz
    en het bedenken van alternatieve eigen betalingensystemen.
