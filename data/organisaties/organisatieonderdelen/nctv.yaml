  valid_from: '1900-01-01'
description:
  text: De Nationaal Coördinator Terrorismebestrijding en Veiligheid (NCTV) beschermt
    Nederland tegen bedreigingen die de maatschappij kunnen ontwrichten. Samen met
    zijn partners binnen overheid, wetenschap en bedrijfsleven zorgt de NCTV ervoor
    dat de Nederlandse vitale infrastructuur veilig is én blijft.De NCTV is binnen
    de Rijksoverheid verantwoordelijk voor terrorismebestrijding, cyber security,
    nationale veiligheid, crisisbeheersing en statelijke dreigingen. Samen met zijn
    partners uit het veiligheidsdomein maakt de NCTV zich sterk voor een veilig en
    stabiel Nederland. De focus ligt op het voorkomen en beperken van maatschappelijke
    ontwrichting.Hoofdopdrachten:* Nederland digitaal veilig maken* Aanslagen voorkomen
    en extremisme en terrorisme bestrijden* Nederland weerbaar maken tegen dreigingen
    door statelijke actorenTaken:* Het identificeren en duiden van dreigingen en risico’s*
    Het bewaken en beveiligen van personen, objecten, diensten en evenementen* Het
    (doen) verhogen van cybersecurity* Het (doen) verhogen van de weerbaarheid van
    vitale sectoren, burgers, bedrijven, structuren en netwerken* Het realiseren van
    optimale crisisbeheersing en crisiscommunicatieDe NCTV en zijn medewerkers vallen
    onder de verantwoordelijkheid van de minister van Justitie en Veiligheid. Organisatorisch
    en beheersmatig is de organisatie van de NCTV ondergebracht bij het ministerie
    van Justitie en Veiligheid, op vergelijkbare wijze als een directoraat-generaal.
