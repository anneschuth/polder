description:
  text: TAAKHet Stafbureau Financiën en Bedrijfsvoering bestaat uit het Cluster Bedrijfsvoering
    en het Cluster Financiële Functie.Cluster BedrijfsvoeringHet cluster Bedrijfsvoering
    heeft de volgende taken:Ondersteunen van de directeur bij de bedrijfsvoering;
    het vormen van aanspreekpunt voor alle bedrijfsvoeringsaangelegenheden, exclusief
    personeel gerelateerde taken.Het bijdragen aan planningsactiviteiten en voortgangsbewaking.Alle
    werkzaamheden die horen bij de parlementair contactpersoon.Het verzorgen van de
    secretariële en administratieve ondersteuning van directeur, MT-leden en medewerkers.Het
    zorgdragen voor de documentaire informatievoorziening (Marjolein).Cluster Financiële
    FunctieDe financiële functie omvat alle werkzaamheden die behoren bij de zgn.
    beleids- en budgetcyclus. Het cluster is hiervoor het eerste aanspreekpunt, zowel
    binnen de directie Zorgverzekeringen als voor de directie FEZ.De onderwerpen behorende
    bij de beleids- en budgetcyclus zijn; Begrotingsartikelen, Begrotingsbehandeling,
    Bestedingsplan, Budgetrapport, Voorjaarsnota, 1e Suppletoire Wet, Jaarverslag,  Algemene
    Politieke Beschouwingen, BUR, Najaarsnota, 2e Suppletoire Wet, en alle geldstromen
    (van apparaats- en personele kosten tot en met Rijksbijdragen)  van de directie
    Zorgverzekeringen.Daarnaast is aansturing van de medewerkers bij een correcte
    uitvoering van de inkoopprocessen en verdere afhandeling hiervan gedurende het
    gehele jaar een belangrijke taak bij het cluster.Ook is er een rol ten aanzien
    van begrotingen en verantwoordingen van zbo’s, agentschappen en subsidies van
    de directie Zorgverzekeringen (ZiNl, CAK, SVB, UWV, CJIB, SKGZ).
