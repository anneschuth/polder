description:
  text: De directie Informatievoorziening & Inkoop (DI&I) is verantwoordelijk voor
    de JenV-brede ICT-infrastructuur door het inrichten en beheren van centrale voorzieningen.
    De directie adviseert, faciliteert en ondersteunt de ambtelijke top, de DG-en
    en op verzoek van deze de JenV-onderdelen over (beleidsmatige) vraagstukken op
    het gebied van informatievoorziening en de beheersing van grote ICT-projecten.
    Strategisch leveranciers management is ingericht voor Microsoft (ook voor het
    Rijk) en Oracle en de directie heeft de bedrijfsjuridische functie voor JenV in
    huis. Daarnaast formuleert DI&I JenV-brede kaders en adviezen om als ministerie
    rechtmatig, efficiënt en duurzaam te kunnen inkopen en aan te sluiten op Europese
    en Rijksbrede ontwikkelingen zowel voor IV als voor inkoop.
