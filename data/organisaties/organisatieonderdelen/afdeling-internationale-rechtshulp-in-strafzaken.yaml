description:
  text: 'Taak: Landelijk kenniscentrum op het terrein van de internationale rechtshulp.
    Treedt namens de Minister van Justitie op als centrale autoriteit in concrete
    zaken. Daarbij gaat het om procedures van uitlevering, wederzijdse (''kleine'')
    rechtshulp, overname strafvervolging en overbrenging van gevonniste personen.In
    de hoedanigheid van centrale autoriteit draagt men de zorg voor de beoordeling
    en doorgeleiding van verzoeken naar- en van andere landen.'
