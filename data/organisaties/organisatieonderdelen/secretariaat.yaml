description:
  text: Het secretariaat is het eerste aanspreekpunt voor zakelijke contacten, waaronder
    gemeenten, bestuurssecretariaten, leveranciers etc. Verder houdt het secretariaat
    zich onder andere bezig met:- Het beheren van agenda's en plannen van vergaderingen.-
    Het notuleren tijdens vergaderingen.- Het organiseren van zakelijke bijeenkomsten.-
    Het beheren van het archief en contracten.- Het ondersteunen van het cliëntenpanel.-
    Verzending van bestuursstukken en andere bestuurlijke communicatie
