description:
  text: Het directoraat-generaal Koninkrijksrelaties draagt zorg voor de samenwerking
    met het Caribische deel van het Koninkrijk. Dit houdt onder meer in dat de directie
    de beleidsadvisering en interdepartementale afstemming van het beleid in Nederland
    en in het Caribische deel van het Koninkrijk coördineert. De directie Koninkrijksrelaties
    is ook verantwoordelijk voor het plannen, (doen) opzetten en (doen) uitvoeren
    van stimuleringsprogramma's en stimuleringsprojecten in het kader van samenwerking
    met het Caribisch deel van het Koninkrijk.
