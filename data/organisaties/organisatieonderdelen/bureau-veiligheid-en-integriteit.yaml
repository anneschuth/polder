description:
  text: TAAKHet bureau Veiligheid&Integriteit brengt betrokkenen rondom veiligheidszaken
    uit de gehele organisatie bij elkaar. Het richt zich primair op de ondersteuning
    van de hoofddirectie, sector- en stafdirecties en landelijke diensten. Daarnaast
    richt het zich op een goede aansluiting van DJI bij de kentenpartners in de veiligheidsketen
    en versteviging van de relatie met de overige partners.
