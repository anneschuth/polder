names:
- value: Directoraat-generaal Natuur en Visserij
  abbr: NV
  valid_from: '1900-01-01'
description:
  text: Het Directoraat-Generaal Natuur en Visserij (DG NV) werkt aan een sterke,
    veerkrachtige natuur en duurzame visserij, met als doel bij te dragen aan duurzaam
    maatschappelijk welzijn en economische ontwikkeling. DG NV richt zich op het beschermen
    en ontwikkelen van natuur, het bevorderen van duurzame visserij, en het versterken
    van de maatschappelijke waarde van natuur. Daarnaast coördineert het DG de uitvoering
    van het klimaatbeleid voor landbouw en landgebruik.De kerntaken van DG NV zijn:-
    Bescherming en ontwikkeling van natuur en het versterken van de ecologische en
    economische samenhang.- Bevorderen van duurzame visserij en aquacultuur, en implementatie
    van het Gemeenschappelijk EU Visserijbeleid.- Coördinatie van ruimtelijke ordeningsdossiers
    (NOVI).- Sturing op klimaatbeleid voor landbouw en landgebruik.- Onderhouden van
    internationale samenwerkingen op het gebied van natuur en visserij.DG NV werkt
    nauw samen met andere DG's binnen LNV om synergie te bereiken in de transitieopgaven
    van natuur, landbouw en het landelijke gebied.
