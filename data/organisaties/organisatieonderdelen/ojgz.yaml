description:
  text: "De dossiers zijn binnen de afdeling verdeeld in thema’s: structuur, gezondheid\
    \ en preventie en screeningen.Prioritaire thema’s:•\tNationaal Preventie Programma;Het\
    \ Nationaal Programma Preventie (NPP) ‘Alles is gezondheid…’ streeft naar een\
    \ vitaal en gezond Nederland. Hiervoor zijn twee langjarige doelstellingen geformuleerd:\
    \ het afremmen van de sterke toename van het aantal chronische ziekten en het\
    \ stabiliseren of terugbrengen van gezondheidsverschillen tussen laag- en hoogopgeleiden.\
    \ Het NPP is intersectoraal van opzet. Gezondheid is niet alleen van de zorg sector\
    \ of van het ministerie van VWS. Ook andere ministeries en sectoren zoals wijk,\
    \ werk, school en opvoeding dragen hun steentje bij.•\tBevolkingsonderzoeken en\
    \ screeningen;Een goede volksgezondheid door vroegopsporing van ziekte, erfelijke\
    \ aanleg voor ziekte, of risicofactoren die de kans op ziekte vergroten. Een bevolkingsonderzoek\
    \ of screening is een medisch onderzoek, aangeboden door de overheid, bij mensen\
    \ die geen gezondheidsklachten hebben. Mensen die tot de doelgroep behoren kunnen\
    \ vrijwillig deelnemen aan de bevolkingsonderzoeken en screeningen.•\tJeugdgezondheidszorg;Het\
    \ bevorderen, beschermen en bewaken van de gezondheid en de lichamelijke, psychosociale\
    \ en cognitieve ontwikkeling van jeugdigen in de leeftijd van 0 tot 18 jaar De\
    \ JGZ is onderdeel van de publieke gezondheidszorg. De uitvoering van de JGZ is\
    \ vastgelegd in de Wet en het Besluit publieke gezondheid als verantwoordelijkheid\
    \ van de gemeenten. Uitvoering vindt plaats door 50 JGZ-organisaties: GGD’en,\
    \ zorgorganisaties en drie stichtingen.Kerntaken van de JGZ zijn:-\tsystematisch\
    \ volgen en beoordelen van de lichamelijke, psychosociale en cognitieve ontwikkeling\
    \ van kinderen en jongeren in relatie tot de omgeving en het gezin waarin ze opgroeien;-\t\
    tijdig signaleren van problemen en vroegtijdig opsporen van specifieke stoornissen;-\t\
    geven van preventieve voorlichting en advies, individueel of in groepen,-\tzo\
    \ nodig verwijzen en doorgeleiden naar curatieve gezondheidszorg of jeugdhulp;-\t\
    adviseren over collectieve maatregelen/activiteiten op basis van analyse van verkregen\
    \ gegevens."
