description:
  text: "TaakHet cluster Verzekeringsmarkt en toezicht is verantwoordelijk voor het\
    \ beleid gericht op de ontwikkeling en het functioneren van de verzekeringsmarkt\
    \ van de Zorgverzekeringswet. Het gaat hierbij om de relatie tussen verzekerden\
    \ en zorgverzekeraar en de relaties tussen zorgverzekeraars. Mede op basis van\
    \ rapportages van de Nederlandse Zorgautoriteit (NZa), signaleert het cluster\
    \ marktontwikkelingen op het terrein van polissen, premies, gedrag van verzekeraars\
    \ en keuzegedrag van consumenten. Waar dit gewenst is vanuit het publieke belang\
    \ van een goede, toegankelijke zorg, ontwikkelt het cluster beleid en regelgeving\
    \ gericht op de structuur en de werking van de verzekeringsmarkt.Relevante thema’s\
    \ zijn:•\tDe werking van de markt (facts en figures, rol kleine verzekeraars,\
    \ rol volmachten) en het markttoezicht;•\tRisicoselectie (door aanvullende verzekeringen,\
    \ collectiviteiten, aanbieder vrijwillig eigen risico), overstapgedrag verzekerden\
    \ en invloed van verzekerden;•\tTransparantie (vergelijkingssites, kostenbewustzijn);•\t\
    Legitimiteit verzekeraars;•\tRol van verzekerden."
