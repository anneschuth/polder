description:
  text: Twee weken voorafgaand aan de Statenvergadering vindt de Statencommissiedag
    plaats. De Statencommissiedag is bedoeld om Statenleden een oordeel te laten vormen
    over de onderwerpen waarover ze een besluit moeten nemen.Tijdens deze dag vinden
    verschillende bijeenkomsten plaats waarin diverse thema's aan de orde komen. De
    bijeenkomsten kunnen achter elkaar, maar ook parallel plaatsvinden.Agendering
    van de onderwerpen vindt plaats aan de hand van acht kernthema's.Voorafgaand aan
    besluitvorming in PS kan het zijn dat onderwerpen eerst aan een Statentafel worden
    besproken. Een Statentafel is een 'bijeenkomst' bedoeld om meer informatie te
    krijgen over een onderwerp (beeldvorming) of om een onderwerp te bespreken en
    een mening te vormen (dialoog). Er kunnen ook Statentafels worden georganiseerd
    over onderwerpen waarvoor geen besluitvorming nodig is.De thema's worden besproken
    in commissievergaderingen. Deze worden voorgezeten door drie voorzitters.
