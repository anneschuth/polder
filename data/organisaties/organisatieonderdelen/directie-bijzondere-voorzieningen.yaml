description:
  text: TaakBijdragen aan de veiligheid van de samenleving door het snel en adequaat
    treffen van voorzieningen voor de tenuitvoerlegging van vrijheidsstraffen en vrijheidsbenemende
    maatregelen die niet vallen binnen de reguliere kaders. Daarmee fungeert de directie
    als capacitair expansievat voor de reguliere penitentiaire activiteiten van de
    Dienst Justitiële Inrichtingen.
