description:
  text: DEIA zorgt voor een eenduidige en effectieve inbreng van Veiligheid en Justitie
    in Europese en internationale overleggen. DEIA ontwikkelt en bewaakt de departementale
    strategie voor de Europese en internationale inzet van het ministerie van Justitie
    en Veiligheid.DEIA houdt zich ook bezig met horizontale of DG-overstijgende vraagstukken,
    trajecten en projecten die aan de orde zijn in Europees en internationaal verband.
    Ook bevordert en bewaakt de directie de eenheid van optreden van Justitie en Veiligheid
    in internationaal en EU-verband, met inachtneming van de beleidsverantwoordelijkheid
    van andere directies en uitvoeringsorganisaties.Daarnaast faciliteert DEIA de
    politieke en ambtelijke leiding bij hun bezoeken in het buitenland en bezoeken
    van buitenlandse hoogwaardigheidsbekleders.
