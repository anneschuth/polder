description:
  text: Binnen het bestuursdepartement van BZK is een deel van de personele capaciteit
    ondergebracht in BZK Flex. Vanuit BZK Flex werken gekwalificeerde medewerkers
    in programma’s en projecten of als tijdelijke aanvullende capaciteit op beleidsdossiers.
    Ook kunnen ze worden ingezet tijdens zogeheten ziek- en piekperioden. Met BZK
    Flex is het bestuursdepartement een stuk wendbaarder en flexibeler ingericht en
    kunnen medewerkers hun talenten optimaal inzetten bij verschillende onderdelen
    van het ministerie.
