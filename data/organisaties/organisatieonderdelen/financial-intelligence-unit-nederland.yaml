description:
  text: De missie van de FIU-Nederland is om samen met haar publieke en private partners,
    zowel nationaal als internationaal, witwassen, onderliggende delicten en terrorismefinanciering
    te bestrijden en te voorkomen, om zo onder meer de integriteit van het financiële
    stelsel te waarborgen. Als FIU-Nederland dragen wij hieraan bij middels excellente
    financial intelligence en door het vroegtijdig signaleren van nieuwe trends en
    fenomenen waarover wij onze partners voorlichten zodat wij gezamenlijk optimaal
    kunnen bijdragen aan het voorkomen en opsporen van misdrijven.
