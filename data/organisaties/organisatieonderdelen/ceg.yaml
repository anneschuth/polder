description:
  text: 'Het Centrum voor Ethiek en Gezondheid (CEG) signaleert en informeert over
    nieuwe ontwikkelingen op het gebied van ethiek, gezondheid en beleid. Het CEG
    bedient niet alleen de overheid, maar is ook een kenniscentrum voor een breder
    publiek. Het CEG is een samenwerkingsverband tussen de Gezondheidsraad en de Raad
    voor Volksgezondheid en Samenleving (RVS).Coördinator CEG: M. (Myrthe) Lenselink
    MA'
