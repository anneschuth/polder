description:
  text: TaakHet cluster Pakketbeheer houdt zich bezig met de aanspraken van het wettelijk
    verzekerd pakket van de Zorgverzekeringswet en de Wet langdurige zorg. Aan de
    hand van algemene criteria wordt bepaald welke zorg deel uitmaakt van het wettelijk
    verzekerd pakket. Het Zorginstituut Nederland adviseert; de minister besluit en
    doet voorstellen aan de Kamer. Jaarlijks is er een in- en uitstroom van (nieuwe)
    behandelingen volgens een vaste cyclus van advisering en aanpassing van regelgeving
    over het pakket en voorwaardelijke toelating. Het cluster Pakketbeheer is binnen
    de directie Zorgverzekeringen verantwoordelijk voor de voorbereiding van de besluitvorming
    van de minister op dit terrein en werkt daarbij samen met onder meer de directies
    Curatieve Zorg, Geneesmiddelen en Medische Technologie, Publieke Gezondheid en
    Langdurige Zorg. Naast de jaarlijkse pakketcyclus werkt het cluster ook aan de
    voortdurende ontwikkeling van het pakketbeheer. Voorbeelden daarvan zijn stringent
    pakketbeheer, doorontwikkeling van het instrument voorwaardelijke toelating en
    borging van het pakketcriterium kosteneffectiviteit.Het cluster Pakketbeheer verzorgt
    de publieksvoorlichting op het terrein van de Directie Zorgverzekeringen. Dit
    houdt in het beantwoorden van burgerbrieven en e-mails of facebookvragen. Daarnaast
    verzorgt het cluster Pakketbeheer webteksten voor Rijksoverheid.nl en samen met
    DCo de eindejaarscampagnes over veranderingen in de zorg in het komende jaar.
