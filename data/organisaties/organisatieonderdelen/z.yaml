- value: Directie Zorgverzekeringen
  abbr: Z
  valid_from: '1900-01-01'
description:
  text: De directie Zorgverzekeringen voelt zich verantwoordelijk voor en draagt bij
    aan het toekomstbestendig houden van de zorg. We doen dat vanuit het perspectief
    van de verzekerde en vanuit onze kennis en expertise van de werking van de Zorgverzekeringwet
    (Zvw) en de Wet langdurige zorg (Wlz). De directie Zorgverzekeringen levert een
    wezenlijke bijdrage aan de goede werking van de zorgverzekeringswetten en het
    vergroten van de samenhang tussen de domeinen.Aandachtsgebieden* Wat is verzekerde
    zorg? De directie Z is verantwoordelijk voor de aanspraak op verzekerde zorg zoals
    vastgelegd in de Zvw en de Wlz. Daarom trekt de directie ook de jaarlijkse aanpassing
    van het basispakket van de Zorgverzekeringswet.* Wie zijn verzekerd? De directie
    houdt verzekeraars scherp op hun plicht iedereen te accepteren voor de basisverzekering
    (acceptatieplicht).* Wat betalen mensen voor de zorg(verzekering)? Dit betreft
    de ontwikkeling van de premie, het eigen risico, eigen betalingen(over domeinen
    heen), zorgtoeslag en de gevolgen voor het gebruik van zorg en ondersteuning.*
    Hoe wordt verzekerd? Hieronder vallen thema’s als het contracteringsproces, wachtlijsten
    en hoe verzekeraars bijdragen aan een ander zorglandschap.* Hoe functioneert de
    zorgverzekeringsmarkt? Wat is de verhouding tussen zorgaanbieders, verzekerden
    en verzekeraars? Hoe kunnen verzekeraars zich onderscheiden (polis-aanbod, overstapseizoen)?
    Wat is de ontwikkeling van premies, reserves en resultaten van verzekeraars?*
    Hoe bevorderen we een gelijk speelveld tussen verzekeraars? We willen dat verzekerdenpopulaties
    even aantrekkelijk zijn voor verzekeraars, of het nu gezonde jongeren zijn of
    chronisch zieke ouderen. Het risicovereveningsmodel is de motor onder het stelsel
    en zorgt voor risicosolidariteit tussen gezond en chronisch ziek.* Samenwerking
    in de regio tussen verzekeraars, zorgkantoren en andere ketenpartijen, zoals gemeenten.*
    De directie Z is accounthouder voor het Zorginstituut, het CAK, de SKGZ, de aangewezen
    zorgverzekeraars die verantwoordelijk zijn voor de vergoeding van medische zorg
    van verzekerden uit het buitenland die tijdelijk in Nederland verblijven (orgaan
    van tijdelijk verblijf, Zilveren Kruis), respectievelijk wonen (orgaan van de
    woonplaats, CZ).
