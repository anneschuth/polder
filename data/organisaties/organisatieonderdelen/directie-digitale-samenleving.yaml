description:
  text: De directie Digitale Overheid heeft een overheidsbrede scope en is verantwoordelijk
    voor concretiseren van de visie op de i-Overheid en heeft de regie op de (interbestuurlijke)
    uitvoering daarvan. BZK beoogt een nieuwe weg in te slaan op het i-domein. Directie
    DO wil de drijvende kracht zijn achter het concretiseren van de visie op de rol
    van de overheid in de informatiesamenleving.DO neemt hierbij de regie op de interbestuurlijke
    uitwerking en uitvoering van deze visie, daar waar dat de publieke belangen en
    de maatschappelijke orde in de digitale samenleving dient en zo nodig versterkt.Trefwoorden
    voor de werkwijze waarop DO dat gaat doen zijn Richten, Agenderen, Adresseren,
    Verbinden, Kaderen, Normeren en Effectmeten. DO heeft als vertrekpunt meegekregen
    de gedachte van één overheid en vliegt de interbestuurlijke samenwerking rondom
    het vraagstuk van informatiesamenleving en overheid van daaruit aan.
