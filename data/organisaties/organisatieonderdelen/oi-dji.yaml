description:
  text: TAAKHet Opleidingsinstituut DJI is de specialistische opleider en het kennisinstituut
    op het gebied van detentie. Met opleidingen en kennisactiviteiten zorgt het OI
    ervoor dat medewerkers in het grote scala DJI-functies en bij ketenpartners vakbekwaam
    worden, zijn en blijven. Het werken in een gesloten setting is daarbij een rode
    draad.
