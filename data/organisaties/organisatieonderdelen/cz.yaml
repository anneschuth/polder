description:
  text: De directie Curatieve Zorg werkt aan een zorglandschap waarin de curatieve
    zorg toegankelijk, goed en betaalbaar blijft voor iedereen die haar nodig heeft.
    We proberen zorgpartijen te verleiden, te stimuleren en aan te spreken om het
    gewenste zorglandschap te realiseren. Dat doen we binnen de kaders van het zorgstelsel
    en in lijn met de afspraken in relevante akkoorden en programma’s. Daar waar de
    gewenste ontwikkeling van het zorglandschap raakt aan - of schuurt met - het stelsel,
    agenderen wij deze vraagstukken bij de directies die hiervoor verantwoordelijk
    zijn. Voor CZ zijn dit meestal de directies Z, PZO en MEVA.Aandachtsgebieden*
    VWS heeft in het Integraal Zorg Akkoord (IZA) afspraken gemaakt om de eerstelijnszorg,
    de acute zorg, de curatieve geestelijke gezondheidszorg en de medisch specialistische
    zorg (MSZ) toegankelijk te houden. CZ draagt bij aan het IZA door de financiële
    (premie) kaders te beheren. Verder door de uitwerking van de afspraken in het
    IZA te faciliteren en waar nodig - en voor zover dit mogelijk is binnen de kaders
    van het stelsel - regie te voeren op de uitvoering van deze afspraken. Samen met
    PZO, Z, het ZIN en de NZA organiseert CZ de bekostiging van prestaties in de zorg,
    in lijn met de afspraken van het IZA. Ook agendeert CX Knelpunten in wet- en regelgeving.*
    CZ stimuleert kwaliteit in de eerstelijnszorg en ggz met programma’s die worden
    uitgevoerd door ZonMW. Toegankelijke geboortezorg en mondzorg zijn geen onderdeel
    van het IZA maar wel belangrijk. CZ trekt en coördineert hier programma’s en afspraken
    met het veld die – in lijn met het IZA - gericht zijn op toegankelijke zorg voor
    iedereen die haar nodig heeft.* CZ faciliteert medisch specialistische zorg (MSZ),
    huisartsen en geboortezorg met subsidies om gestandaardiseerde gegevensuitwisseling
    mogelijk te maken tussen zorgprofessional en patiënt en tussen instellingen onderling.
    CZ werkt de Wet gegevensuitwisseling in de zorg voor de MSZ in lagere regelgeving
    uit.* CZ is verantwoordelijk voor de Wet verplichte geestelijke gezondheidszorg.
    Doel van deze wet is om verplichte zorg zoveel mogelijk te voorkomen en de minst
    ingrijpende vorm van zorg in te zetten.* CZ is verantwoordelijk voor de Wet Ambulancezorgvoorzieningen.
    Doel van deze wet is om de continuïteit en kwaliteit van de ambulancezorgvoorzieningen
    te waarborgen.
