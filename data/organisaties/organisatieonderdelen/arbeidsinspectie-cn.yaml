  valid_from: '1900-01-01'
description:
  text: De Arbeidsinspectie controleert of werkgevers en werknemers zich aan de wetten
    houden op het gebied van eerlijk, gezond en veilig werken. Door deze wetgeving
    wordt de arbeidsmarkt beschermd en illegale arbeid, arbeidsuitbuiting en oneerlijke
    concurrentie bestreden. Om naleving van de wetten te bevorderen, worden inspecties
    uitgevoerd en wordt er gehandhaafd. Daarnaast geeft de Arbeidsinspectie voorlichting
    aan werkgevers en werknemers. De Arbeidsinspectie is een onderdeel van de RCN-unit
    Sociale Zaken en Werkgelegenheid.
