description:
  text: Taak:Het team Personeel houdt zich bezig met (strategische) beleidsvorming
    op het gebied van personeel en organisatie. Daartoe behoort het doorvertalen van
    rijksbreed P&O-beleid naar het beleid voor de Belastingdienst en het inbedden
    van P&O-initiatieven van Belastingdienstkantoren in het land in een landelijk
    beleid voor de gehele Belastingdienst. Verder signaleert het team nieuwe ontwikkelingen
    op P&O-terrein die voor de Belastingdienst van belang kunnen zijn en zorgt het
    voor actualisering van het arbeidsvoorwaardenbeleid. Het team Personeel beantwoordt
    ook de infolijn waar managers, personeelsfunctionarissen en medewerkers van de
    Belastingdienst terecht kunnen met vragen over arbeidsvoorwaarden en rechtspositie.
    Het team heeft te maken met verscheidene belanghebbende partijen, zoals het management
    van de Belastingdienst, de gezamenlijke en individuele Belastingdienstkantoren
    en het ministerie van Binnenlandse Zaken en Koninkrijksrelaties. Het afwegen van
    de verschillende belangen vraagt veel afstemming en overleg zowel interdepartementaal
    als met medezeggenschapsorganen en vakcentrales.
