description:
  text: Deze sector is belast met de wetgeving op het terrein van het algemeen bestuursrecht,
    veiligheid, openbare orde en politie, rechtspleging, juridische beroepen en rechtsbijstand,
    vreemdelingenrecht, de bescherming van persoonsgegevens en kansspelen.Enkele belangrijke
    wetten zijn de Algemene wet bestuursrecht, de Politiewet, de Vreemdelingenwet,
    de Wet op de rechtelijke organisatie, de Wet op de rechtsbijstand, de Wet bescherming
    persoonsgegevens en de Wet op de kansspelen.
