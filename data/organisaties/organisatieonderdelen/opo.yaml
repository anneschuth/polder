- value: Directie Onderwijspersoneel en Primair Onderwijs
  abbr: OPO
  valid_from: '1900-01-01'
description:
  text: 'Meer dan anderhalf miljoen kinderen gaan elke dag naar de basisschool of
    naar het speciaal onderwijs, in feite bijna één op de tien inwoners. De directie
    Primair Onderwijs zet zich in voor de kwaliteit, denkt u hierbij aan de aandacht
    voor kleinere klassen, computergebruik op school, modern personeelsbeleid, stevig
    management en zeggenschap voor de ouders. De directie werkt eraan dat kinderen
    in het basisonderwijs en speciaal onderwijs ''samen naar school'' kunnen en zorgt
    voor regionale expertisecentra voor speciaal onderwijs.   Ongeveer 300.000 kinderen
    maken gebruik van (formele) kinderopvang. De directie Primair Onderwijs is verantwoordelijk
    voor de Wet kinderopvang, die de financiering regelt en de kwaliteit van de kinderopvang
    waarborgt. De directie werkt aan het harmoniseren van regelgeving voor kinderopvang,
    peuterspeelzalen en voor- en vroegschoolse educatie.  Bij de directie Primair
    Onderwijs heeft OCW bovendien de coördinatie gelegd voor thema''s die ook ná het
    basisonderwijs belangrijk blijven: onderwijsachterstandenbeleid, allochtonenbeleid,
    jeugdbeleid en asielbeleid. De directie is verantwoordelijk voor procesmanagement
    en werkt samen met scholen, schoolbesturen, gemeenten, departementen en andere
    organisaties.'
