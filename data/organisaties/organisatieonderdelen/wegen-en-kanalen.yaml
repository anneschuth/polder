description:
  text: 'Taak : Wij dragen bij aan een betere en veiligere verkeersafwikkeling binnen
    de provincie. Dat begint bij een goede zorg voor de provinciale infrastructuur.
    Wij zorgen voor een maximale levensduur van wegen, vaarwegen en objecten zoals
    bruggen en sluizen. Daarnaast is onze eenheid verantwoordelijk voor bodem- en
    asbestsanering binnen risicovolle gebieden.'
