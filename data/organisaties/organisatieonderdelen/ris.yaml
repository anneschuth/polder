description:
  text: "De Rijksinkoopsamenwerking (RIS) is een shared service organisatie binnen\
    \ het ministerie van Binnenlandse Zaken en Koninkrijksrelaties. Wij kopen in voor\
    \ de ministeries van AZ, BZ, BZK en VRO, Fin, VWS en SZW. Daarnaast voeren we\
    \ ook werkzaamheden uit voor de Hoge Colleges van Staat. Voor de rijksbrede categorieën\
    \ Schoonmaak en Vervoer & Verblijf voeren wij de aanbestedingen uit. In voorkomende\
    \ gevallen voert de RIS ook aanbestedingen uit voor andere ministeries. Daarnaast\
    \ verzorgen wij aanvullende inkoopdienstverlening zoals het beheer van primaire\
    \ inkoopapplicaties en van inkoopportalen, het adviseren over complexe vraagstukken\
    \ en het leiden van ontwikkelprojecten.De Rijksinkoopsamenwerking bestaat uit\
    \ de volgende organisatieonderdelen:•\tAfdeling Inkopen•\tAfdeling Categorie en\
    \ Contractenservices•\tStaf•\tProjectsecretarissen•\tJuridische zaken•\tRelatiemanagement•\t\
    Strategisch advies•\tMT"
