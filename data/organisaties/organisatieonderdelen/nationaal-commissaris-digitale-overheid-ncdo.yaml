description:
  text: 'Op 1 augustus 2014 is Bas Eenhoorn gestart als Digicommissaris. Hij is door
    het kabinet tijdelijk (voor vier jaar) aangesteld om als overheidsbrede regisseur
    regie te voeren op de (door)ontwikkeling van de generieke digitale infrastructuur
    .De opdracht van de Digicommissaris en zijn bureau is vierledig:- het aanjagen
    van beleidsontwikkeling en vernieuwing;- het bevorderen van de totstandkoming
    van generieke voorzieningen voor de digitale overheid;- het borgen van het beheer
    van essentiële voorzieningen;- het stimuleren van het gebruik van die generieke
    voorzieningen.Het doel: het realiseren van een solide en toekomstbestendige digitale
    overheid.In de formele instellingsbrief staat nadere informatie over de taak en
    rol van de Digicommissaris.'
