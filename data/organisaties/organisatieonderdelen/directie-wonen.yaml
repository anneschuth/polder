description:
  text: De directie Wonen is verantwoordelijk voor beleid en regelgeving voor de huurmarkt,
    waaronder de woningcorporaties, en de koopmarkt. Doelstelling is om te komen tot
    een goede werking van de woningmarkt en daarbinnen volkshuisvestelijke doelen
    te realiseren, zodat burgers goede huisvesting kunnen realiseren. Belangrijke
    thema’s zijn de betaalbaarheid en beschikbaarheid van woningen, keuzevrijheid
    voor woonconsumenten en de zorg voor het huisvesten van urgente en specifieke
    doelgroepen.
