- value: Bureau van de WRR
  valid_from: '1900-01-01'
description:
  text: Het bureau van de WRR ondersteunt de WRR en zijn leden bij de voorbereiding
    en het samenstellen van rapporten aan de regering. Het doet onderzoek op voor
    het raadswerk relevante gebieden en het begeleidt extern onderzoek in opdracht
    van de Raad.Het bureau onderhoudt contacten met voor het raadswerk relevante personen
    in bestuur en wetenschap, en bevordert de doorwerking van rapporten in de bestuurlijke
    en wetenschappelijke sfeer. Daarnaast geeft het bureau voorlichting over de activiteiten
    van de Raad en beheert het de website van de WRR.
