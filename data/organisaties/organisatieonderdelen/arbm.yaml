description:
  text: Is een instituut voor de vakgemeenschap. De Rijksbouwmeester (Rbm) bewaakt
    en bevordert de architectonische, stedenbouwkundige en ruimtelijke kwaliteit van
    de rijksvastgoedportefeuille. Het instituut richt zich op de gebruiker en de maatschappelijke
    functie die het rijksvastgoed inneemt in de nabije omgeving.
