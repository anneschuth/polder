description:
  text: TAAKAdviseren van de directeur JJI over de vormgeving van het sectorale  uitvoeringsbeleid
    zowel inhoudelijk als daar waar het gaat om het proces van beleidsvorming, zorgdragen
    voor een gecoördineerde en samenhangende benadering en daartoe afstemmen met andere
    afdelingen binnen DJI, de justitiële jeugdinrichtingen en de beleidsdirectie van
    het departement. Bij de beleidsvorming wordt gebruikgemaakt van de expertise van
    de inrichtingen.Adviseren van de directeur JJI over juridische aangelegenheden
    die van belang zijn bij de aansturing van de inrichtingen.
