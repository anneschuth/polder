  valid_from: '1900-01-01'
description:
  text: 'De ICOP is een van de vijf Interdepartementale Commissies die vallen onder
    de ICBR. De ICOP is besluitvormend voor het rijksbrede Personeels- en Organisatiebeleid.
    Het doel is met rijksbreed beleid toegevoegde waarde voor het concern en voor
    ieder departement te cre???ren. De ICOP treedt daarnaast op als contracthoudersraad
    voor de Shared Service Centers in het P&O domein (P-Direkt en de Expertisecentra).Leden:
    directeuren Personeel & Organisatie van de ministeries.'
