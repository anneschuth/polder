description:
  text: 'Taak:Het CVZ voert vier kerntaken uit op het gebied van de Zorgverzekeringswet
    (Zvw) en de Algemene Wet Bijzondere Ziektekosten (AWBZ):- Pakketbeheer - adviseren
    en standpunten innemen over de inhoud van het verzekerde pakket, adviseren over
    de methode van beoordelen van het verzekerde pakket, adviseren over pakketgeschillen
    tussen verzekerden en verzekeraars\;- Fondsbeheer - verantwoording afleggen over
    de inkomsten en uitgaven van de fondsen Zvw en AWBZ, en tot 2010 ook over de afwikkeling
    van Ziekenfondswet, analyse van ontwikkelingen in beleid en zorg en daaruit volgende
    veranderingen in de kosten\;- Verzekeraarsfinanciering - uitvoeren risicoverevening
    en uitvoeren beheerskosten AWBZ\;- Centrale uitvoering - uitvoeren van de Zvw
    en AWBZ voor Nederlanders die in het buitenland wonen, uitvoeren van de boeteregeling
    voor mensen die niet verzekerd zijn, beheren van de bijdragevervangende belasting
    voor gemoedsbezwaren.Toelichting:- rechtsvorm: Zelfstandig bestuursorgaan\;- relatie
    naar het ministerie: Directie Zorgverzekeringen'
