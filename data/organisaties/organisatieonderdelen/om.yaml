description:
  text: Mensen die worden verdacht van het plegen van een strafbaar feit, krijgen
    met het Openbaar Ministerie (OM) te maken. Het OM is de enige instantie in Nederland
    die verdachten voor de strafrechter kan brengen. Het OM zorgt ervoor dat strafbare
    feiten worden opgespoord en vervolgd. Daarvoor wordt samengewerkt met politie
    en andere opsporingsdiensten. De officier van justitie leidt het opsporingsonderzoek.Samen
    met de rechters is het OM onderdeel van de rechterlijke macht. Het OM is dus geen
    ministerie in de gebruikelijke zin van het woord.Beschrijving:Het OM is een landelijke
    organisatie verdeeld over tien arrondissementen. Deze zijn gelijk aan de tien
    regionale eenheden van de politie. Daarnaast richt het Landelijk Parket zich op
    de bestrijding van (internationaal) georganiseerde misdaad, bestrijdt het Functioneel
    Parket criminaliteit op het gebied van milieu, economie en fraude en worden alle
    beroepen tegen verkeersboetes door het Parket Centrale Verwerking OM beoordeeld.Op
    de tien arrondissementsparketten beoordelen officieren van justitie, ondersteund
    door administratieve en juridische specialisten, jaarlijks enkele honderdduizenden
    zaken. De zaken waarin hoger beroep wordt aangetekend komen bij een van de vier
    vestigingen van het Ressortsparket. Daar heet de vertegenwoordiger van het OM
    'advocaat-generaal'. De arrondissementsparketten worden geleid door hoofdofficieren
    van justitie en aan het hoofd van het Ressortsparket staat de hoofdadvocaat-generaal.De
    landelijke leiding van het OM berust bij het College van procureurs-generaal(het
    College) in Den Haag. De minister van Justitie en Veiligheid is politiek verantwoordelijk
    voor het OM. Hij bepaalt samen met het College de prioriteiten in de opsporing
    en vervolging.Het OM bestaat  uit:College van procureurs-generaal;Parket Generaal;tien
    arrondissementsparketten;het Ressortsparket met vier vestigingen;Landelijk Parket;Functioneel
    Parket;Parket Centrale Verwerking OM;Wetenschappelijk Bureau OM;Landelijke Bedrijfsvoering
    OM;Informatievoorziening OMRijksrecherche
