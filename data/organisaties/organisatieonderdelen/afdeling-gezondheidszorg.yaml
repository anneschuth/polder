description:
  text: TAAK-Ontwikkelen van beleid van aanzien van de zorg ten behoeve van gedetineerden,
    jeugdigen. TBS-gestelden en vreemdelingenbewaring\;adviseren over de kwaliteit
    van de zorg door de inrichtingen en het penitentiar ziekenhuis alsmede de verstrekking
    van medicijnen ten behoeve van bovenstaande doelgroepen\;verzorgen van de functionele
    coördinatie binnen de diverse beroepsgroepen\;behandelen van verzoeken van gedetineerden
    tot bemiddeling de inrichting danwel over andere inrichtingsoverstijgende aangelegenheden\;adviseren
    bij behandeling van gratieverzoeken, strafonderbreking en tijdelijke vrijlating
    op medische gronden.
