description:
  text: 'TAAK-Aanbieden van programma''s gericht op resocialisatie, net als eerder
    genoemde twee partners, aan mensen die met jusitie in aanraking zijn gekomen.
    Inzetten van deskundigheid en menskracht om herhaling van strafbare feiten te
    voorkomen. Ze komt daarbij zo snel mogelijk in actie, liefst direct nadat iemand
    is aangehouden. In alle fasen van de rechtsgang kan zij een rol spelen. De Reclassering
    voert drie kerntaken uit:onderzoek, voorlichting en rapportage aan justitie over
    de persoon van de dader en die omstandigheden van het delictgedrag. Die informatie
    kan een rol spelen bij de verdere justitiele afhandeling.begeleiding en toezicht.
    Begeleiding en toezicht kunnen zowel vrijwillig als in een verplicht kader(vonnis)
    worden uitgevoerd. De Reclassering voert activiteiten uit die de verdachte beter
    in staat stellen zijn verantwoordelijkheid in de samenleving aan te kunnen.aanbieden
    van vroeghulp aan gedetineerden\;aanbieden van reintegratieprogramma''s aan gedetineerden\;ontwikkelen
    en aanbieden van taakstraffen en penitentiaire programma''s. Taakstraffen zijn
    te onderscheiden in werk en leerstraffen. Ze worden opgelegd door de rechter,
    de reclassering zorgt voor organisatie en begeleiding. Bij deelname aan een penitentiair
    programma brengt een gedetineerde het laatste deel van zijn vrijheidsstraf door
    buiten de muren van de inrichting, in zijn woonomgeving, onder strikte begeleiding
    en toezicht. Zo leert de gedetineerde langzaam omgaan met een toenemende mate
    van vrijheid.Toelichting:De stichting Reclassering Nederland (SRN) is in 1995
    opgericht en bundelt alle instellingen die zich met reclasseringswerkzaamheden
    in Nederland bezighouden, te weten: Stichting Reclassering Nederland, Leger des
    Heils afdeling reclassering en de instellingen voor verslavingszorg verenigd in
    GGZ Nederland. De bundeling van reclasseringswerkzaamheden is ingezet om de kwaliteit
    en optimalisering van hulp aan personen die met justitie in aanraking komen te
    waarborgen.'
