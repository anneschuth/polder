description:
  text: 'TAAK:    De Raad heeft twee taken:rechtspraak en advies.De Raad adviseert
    de minister van Justitie gevraagd en ongevraagd over de ontwikkeling en uitvoering
    van beleid en het toepassen van regels op het gebied van :- de tenuitvoerlegging
    van straffen en maatregelen en- jeugdbescherming en jeugdzorgDe Raad toetst als
    beroepsrechter beslissingen die zijn genomen over personen die een vrijheidsstraf
    of een vrijheidsbenemende maatregel ondergaan: gedetineerden, tbs-gestelden en
    jeugdigen in justitiële jeugdinrichtingen. Behalve om beslissingen van de inrichtingsdirecteur
    kan het ook gaan over medisch handelen van een inrichtingsarts of beslissingen
    van de selectiefunctionaris of de minister van Justitie. De Raad toetst aan de
    wet, de Penitentiaire Beginselenwet, de Beginselenwet verpleging terbeschikkinggestelden
    en de Beginselenwet justitiële jeugdinrichtingen en aan de redelijkheid en billijkheid.
    De uitspraken zijn bindend: er is geen verdere beroepsmogelijkheid.TOELICHTING:     De
    overheid is verantwoordelijk voor de zorg voor justitiabelen en jeugdigen. Deze
    personen bevinden zich in een afhankelijke positie.Zij hebben daarom de bescherming
    nodig tegen de vergaande inbreuken op hun grondrechten of een willekeurige toepassing
    daarvan. Als onafhankelijk adviserend en toetsend orgaan ondersteunt de Raad de
    overheid bij het dragen van haar verantwoordelijkheid. De Raad is opgericht op
    1 april 2001 door samenvoeging van de Centrale Raad voor Strafrechtstoepassing(1953)
    en het College van Advies voor de Justitiele Kinderbescherming(1955). De Raad
    bestaat uit zestig leden: deskundigen in het penitentiair recht, het jeugd- en
    familierecht en de gedrachswetenschappen, leden van de rechterlijke macht en advocatuur,
    het openbaar bestuur en een aantal medici. De Raad is een onafhankelijk orgaan:
    de leden zijn niet verbonden aan het ministerie van Justitie of andere organisaties
    in het veld dat de Raad bestrijkt en zij worden door de Kroon benoemd.'
