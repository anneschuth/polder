description:
  text: '* Medische isotopen worden met name gebruikt voor de diagnose van kanker,
    hart- en vaatziekten, bot- en hersenaandoeningen en in toenemende mate voor de
    behandeling van verschillende kankersoorten.* De huidige nucleaire geneesmiddelen
    worden geproduceerd in kernreactoren en deeltjesversnellers. De bestaande kernreactor
    in Petten levert voldoende halffabricaten om 70% van de EU markt te voorzien,
    maar is sterk verouderd.* De doelstelling van de programmadirectie is het borgen
    van de voorzieningszekerheid van medische isotopen en het versterken van de nucleaire
    kennisinfrastructuur waarin nieuwe (kanker-)therapieën tot ontwikkeling kunnen
    komen. Onderdeel hiervan is het vraagstuk omtrent de vervanging van de Europese
    productiecapaciteit, die grotendeels plaats vindt in sterk verouderde onderzoeksreactoren.
    Hierbij wordt nadrukkelijk gekeken naar nieuwe productietechnologieën (deeltjesversnellers).
    Maar een moderne Europese reactor ten behoeve van de productie van medische isotopen
    zal een onontbeerlijke factor in de voorzieningszekerheid blijven.*Nederland heeft
    met Pallas het meest vergevorderde plan voor zo’n reactor. De Haagse besluitvorming
    hieromtrent wordt vanuit de programmadirectie (PMI) verzorgd in nauw overleg met
    alle betrokken ministeries, decentrale overheden en toezichthouders.'
