description:
  text: De organisatie wordt gesubidieerd door onder meer DGPJS. Slachtofferhulp Nederland
    komt op voor de belangen en rechten van slachtoffers van een misdrijf of een verkeersongeluk.
    Op de 75 Buro's Slachtofferhulp zetten 1500 vrijwilligers en 250 beroepskrachten
    zich dagelijks in voor de hulp aan slachtoffers. Het aanbod bestaat uit praktische
    en juridische adviezen en emotionele steun. In de media en in de politiek treedt
    Slachtofferhulp Nederland op als belangenbehartiger. De organisatie stimuleert
    onderzoek en voert politieke lobby met het doel de positie van slachtoffers te
    versterken.
