description:
  text: 'De directie Constitutionele Zaken en Wetgeving (CZW) heeft een vooraanstaande
    rol in het vervaardigen van goede wetgeving, juridisch advies en constitutioneel
    beleid. Alle wet- en regelgeving van het ministerie wordt bij CZW opgesteld, in
    samenwerking met de betrokken beleidsdirecties. CZW draagt tevens zorg voor het
    constitutioneel beleid. Regelgeving en beleidsvoornemens van andere ministeries
    toetsen we aan het Statuut, de Grondwet en verdragsbepalingen met constitutionele
    inslag. We behandelen civielrechtelijke kwesties, geven juridisch advies en verrichten
    bijzondere opdrachten van de departementsleiding. Kwaliteit staat hoog in het
    vaandel: de ontwikkeling van het wetgevingskwaliteitsbeleid heeft onze bijzondere
    aandacht.'
