description:
  text: 'Taak: Het bureau PIDS ondersteunt het interdepartementale Platform Interceptie,
    Decryptie en Signaalanalyse. Op deze terreinen heeft het platform de volgende
    taken: onderzoek en advies, uitwisseling van expertise en het uitvoeren van projecten.
    Het platform dient tevens als intermediair tussen aanbieders van telecommunicatiediensten
    en -netwerken en de behoeftestellende autoriteiten zoals OM, opsporings- en I&V
    diensten.'
