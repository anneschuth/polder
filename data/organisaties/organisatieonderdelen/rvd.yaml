names:
- value: Rijksvoorlichtingsdienst
  abbr: RVD
  valid_from: '1900-01-01'
description:
  text: Taken:- Het verzorgen van de woordvoering van de Minister-president en het
    kabinet.- Het geven van voorlichting over het algemeen regeringsbeleid, de Minister-president
    en het Ministerie van Algemene Zaken.- Het verzorgen van de woordvoering en het
    geven van voorlichting over het Koninklijk Huis en het adviseren aan leden van
    het Koninklijk Huis inzake publiciteitsaangelegenheden.- Het verzorgen van de
    informatievoorziening over het algemeen regeringsbeleid en het Koninklijk Huis.-
    Het vervullen van het voorzitterschap van de Voorlichtingsraad (VoRa).- Het coördineren,
    faciliteren en adviseren inzake interdepartementaal voorlichtings- en communicatiebeleid.-
    Het verzorgen van de informatie aan het publiek namens de gezamenlijke voorlichtingsdiensten
    van de Ministeries (Postbus 51).
