  valid_from: '1900-01-01'
description:
  text: De directie CIO Rijk bevordert de optimale vormgeving van de informatisering
    en ICT in het Rijk en zbo’s. Dat doet CIO door het stellen van kaders en daarop
    toe te zien. Hiermee levert de directie tevens een bijdrage aan de efficiency
    en effectiviteit van de rijksdienst als geheel.Om dit te bereiken is de directie
    verantwoordelijk voor:- het maken van I-beleid en –kaders voor de rijksdienst
    en op de naleving daarvan toe te zien;- doorvertaling en invulling van overheidsbrede
    I-kaders binnen de Rijksdienst;- het versterken van de I-functie binnen het Rijk;-
    het (verder) ontwikkelen van het rijksbrede CIO-stelsel;- het toetsen van grote
    projecten binnen de Rijksoverheid en publiekrechtelijke ZBO’s (hiertoe is het
    Bureau ICT Toetsing opgericht).De directie staat onder leiding van CIO Rijk Lourens
    Visser.De CIO Rijk is tevens voorzitter van het CIO beraad, waar de CIO’s van
    de ministeries en enkele grote uitvoeringsorganisaties in deel nemen.
