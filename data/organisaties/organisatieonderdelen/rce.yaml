description:
  text: De Rijksdienst voor het Cultureel Erfgoed (RCE) is een onderdeel van het ministerie
    van Onderwijs, Cultuur en Wetenschap. De RCE werkt onder de rechtstreekse verantwoordelijkheid
    van de minister en voert wet- en regelgeving en erfgoedbeleid uit dat het ministerie
    en de dienst samen maken. Ook ontwikkelt de dienst praktisch toepasbare kennis,
    en geeft de RCE advies over rijksmonumenten, landschap & leefomgeving, archeologie
    en roerend erfgoed.
