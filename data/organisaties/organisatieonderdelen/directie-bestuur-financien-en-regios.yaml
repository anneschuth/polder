description:
  text: De directie Bestuur, Financiën en Regio’s draagt bij aan goed binnenlands
    bestuur. De directie heeft een ontwikkelende en kaderstellende rol op het terrein
    van de ordening, organisatie en financiering van het binnenlands bestuur. De directie
    is een aanspreekpunten voor medeoverheden en departementen voor interbestuurlijke
    relaties en bevorderd dat beleidsontwikkeling in goede relatie tussen partijen
    gebeurt. Daarbij is het uitgangspunt om de inrichting en de praktijk van de bestuurlijke
    organisatie en de interbestuurlijke en financiële verhoudingen toe te snijden
    op economische en maatschappelijke ontwikkelingen.
