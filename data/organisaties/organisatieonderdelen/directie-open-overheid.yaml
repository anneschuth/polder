description:
  text: Een open en transparante overheid draagt bij aan het vertrouwen van de burger
    in de overheid. Het is een voorwaarde voor de democratische rechtsstaat dat de
    overheid laat zien hoe het tot besluiten is gekomen. Het ministerie van VWS zorgt
    dat informatie gevraagd en ongevraagd openbaar wordt gemaakt. Het ministerie doet
    dat op verantwoorde wijze conform de Woo, de wet op de parlementaire enquête en
    artikel 68 Grondwet. VWS is kortom ‘Open, tenzij…’.De centrale directie Open Overheid
    ondersteunt het ministerie van VWS bij het maximaal transparant maken van informatie
    voor de samenleving. De informatie die VWS openbaar maakt is goed toegankelijk,
    vindbaar, doorzoekbaar en begrijpelijk. Tot slot draagt de directie Open Overheid
    zorg voor een eenduidige werkwijze voor het kerndepartement voor zowel de passieve
    als de actieve openbaarmaking van informatie.Op deze manier krijgen journalisten
    en geïnteresseerde burgers inzicht in de beleidsvorming van het kerndepartement
    en de afwegingen die daarbij zijn gemaakt. Zo worden zij in staat gesteld om geïnformeerd
    te worden, VWS te controleren en indien nodig tot verantwoording te roepen. Het
    houdt het departement scherp en draagt daarom bij aan de werking van ons democratisch
    stelsel.De directie Open Overheid telt vier afdelingen met daaronder verschillende
    teams. DOO vormt een keten van data- en informatiespecialisten, juridische- en
    beleidsadviseurs, juridische- en beleidsmedewerkers (ondersteuning), coördinatoren,
    Woo-juristen (behandelaars, bezwaar en beroep), data scientists, contactpersonen,
    bedrijfsvoering, secretariaat en management.Kerntaken:*Openbaar maken van informatie
    op basis van een Woo-verzoek*(Pro)actief openbaar maken van informatiecategorieën
    en dossiers*Parlementaire Enquête en onderzoek*Innovatie
