  valid_from: '1900-01-01'
description:
  text: De commissaris van de Koning (cvdK) bekleedt het voorzitterschap in de vergaderingen
    van Provinciale en Gedeputeerde Staten en vertegenwoordigt de provincie in en
    buiten rechte. De commissaris van de Koning wordt benoemd bij Koninklijk besluit
    (art. 131 Gr.w) voor een periode van 6 jaar. Dat gebeurt op voordracht van Provinciale
    Staten, minister van Binnenlandse Zaken en Koninkrijksrelaties. De commissaris
    van de Koning in provincie Flevoland is Arjen Gerritsen.
