description:
  text: 'In het SG-cluster zijn de directies ondergebracht die inhoudelijk rechtstreeks
    door de SG aangestuurd worden en beheersmatig onder de verantwoordelijkheid vallen
    van de directeur Concernondersteuning. Het cluster kent uiteenlopende disciplines:
    BZK-brede advisering op het HRM-, Communicatie- en politiek/bestuurlijke domein,
    de BZK-brede verbinding en regie op de terreinen Kennis, Europa, Internationaal
    en Macro-economie, de departementale bedrijfsvoeringseenheid als ook de BZK-brede
    financiële-, de juridische- en i-control functies zijn in het cluster ondergebracht.
    Binnen het cluster is vanwege zijn bijzondere karakter bovendien één beleidsdirectie
    opgenomen, de directie Koninksrijksrelaties. Ook de permanent ‘flexibele schil’
    van het kerndepartement maakt onderdeel uit van het cluster: BZK-Flex.'
