description:
  text: TaakDe Dienst Vervoer en Ondersteuning (DV&O) is een landelijke dienst van
    DJI en verzorgt onder meer het vervoer van arrestanten, gedetineerden en vreemdelingen
    met verschillende beveiligingsniveaus. DV&O vervoert bovendien goederen en penitentiaire
    dossiers in geheel Veiligheid en Justitie.DV&O verleent daarnaast bijstand bij
    calamiteiten in (justitiële) inrichtingen en detacheert beveiligingsmedewerkers
    ter ondersteuning van organisaties die aan Veiligheid en Justitie gelieerd zijn.
