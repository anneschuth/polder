description:
  text: 'Taak: Is verantwoordelijk voor de beheerrelatie met taakorganisaties. Legt
    dwarsverbanden op basis van de planvorming, de uitvoering en de bereikte resultaten
    van de taakorganisaties ter beoordeling van de gevolgen van voorgenomen respectievelijk
    gevoerd beleid voor de verschillende justitiele ketens. Adviseert bij de ontwikkeling
    van beleid over de financiele consequenties van het voorgenomen beleid/wetgeving
    (voor de taakorganisaties).'
