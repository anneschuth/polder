description:
  text: De directie Bouwen en Energie maakt beleid voor woningbouw, woningvoorraadtransformatie
    en energie in de gebouwde omgeving. De directie zorgt voor een goed functionerende
    bouwmarkt en borgt daarbij van publieke belangen voor burgers en bedrijfsleven,
    zoals de beschikbaarheid, kwaliteit en duurzaamheid van woningen en gebouwen.
