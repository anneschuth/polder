description:
  text: De CITT houdt toezicht op het gehele terugkeerproces vanaf de bewaring in
    een politiecel met als doel verwijdering tot en met de uitzetting door de Koninklijke
    Marechaussee (KMar). Ook houdt de CITT toezicht op de overdracht van de vreemdeling
    aan de autoriteiten in het land van herkomst. De CITT rapporteert en adviseert
    de betrokken bewindslieden van Justitie, Defensie en Binnenlandse Zaken en Koninkrijksrelaties.
    Het jaarverslag CITT wordt aan de Tweede Kamer gezonden. In het jaarverslag staan
    adviezen over het verbeteren van het terugkeerproces in breedste zin. Het secretariaat
    is belast met de beleidsinhoudelijke en organisatorische ondersteuning van de
    CITT.
