description:
  text: Wat doet de Europese Unie voor Nederlandse studenten? En wat maakt Nederland
    voor buitenlandse studenten aantrekkelijk? Deze directie coördineert de inbreng
    van Nederland in vergaderingen van de Europese Unie, de OESO en Unesco. Ze verzorgt
    de internationaal gerichte strategieontwikkeling en zet internationaal vergelijkend
    onderzoek uit.   De directie verbindt internationale kennis, nationale kennis
    en issues met elkaar. Daardoor leert Nederland van het buitenland en zet het buitenland
    Nederland op de kaart. Hetzelfde gebeurt door de bilaterale samenwerking met prioritaire
    landen als Duitsland en Zuid-Afrika. Een belangrijke gesprekspartner is uiteraard
    het ministerie van Buitenlandse Zaken. De onderwijssamenwerking krijgt meestal
    vorm via intermediairen als het Europees Platform of Nuffic en ook via het uitvoeringsbureau
    CROSS (samenwerking met Midden- en Oost-Europa).
