description:
  text: 'De directie Bestuurlijke en Politieke Zaken verbindt en schakelt tussen politieke
    en ambtelijke leiding en de VWS-organisatie, zodat zij haar bijdrage kan leveren
    aan “samen gezond, fit en veerkrachtig”.De directie BPZ is een vaste sparringpartner
    bij de totstandkoming van advies over beleid, uitvoering en de VWS-organisatie.
    Samen met directies zorgen we voor tijdige en kwalitatief hoogwaardige advisering
    en ondersteuning die leidt tot goede besluitvorming door de politieke en ambtelijke
    top. Daarnaast ondersteunt BPZ de eigenaarsrol voor de concernorganisaties en
    ziet toe op een veilig VWS.Aandachtsgebieden* Advisering: Met informatie, procesondersteuning
    en advies draagt BPZ bij aan een goede en tijdige besluitvorming door de bestuurlijke
    en politieke top. Centraal staan de zorg voor inhoudelijke verbindingen, overzicht
    houden over onderwerpen die spelen, en het regisseren van de uitvoering van processen
    en procedures.* Eigenaarsadvisering: het integraal adviseren van de pSG over de
    continuïteit en het functioneren van de 23 VWS-concernorganisaties zoals we onze
    agentschappen, uitvoerende diensten, zelfstandige bestuursorganen, adviesraden,
    inspectie en het planbureau noemen.* Stukkenstroom en parlementaire zaken: het
    verwerken, coördineren en optimaliseren van de departementale en parlementaire
    stukkenstroom voor de politieke en ambtelijke leiding. BPZ is verantwoordelijk
    voor het verloop van alle contacten met de Tweede en Eerste Kamer over debatten,
    Kamerbrieven en andere parlementaire procedures en de voorbereiding van de ministerraad.*
    Ondersteuning: administratieve, praktische en protocollaire ondersteuning van
    de politieke en ambtelijke leiding.* Managementondersteuning: de managementondersteuners
    voor de bestuursraadleden en bewindspersonen dragen zorg voor complex agendabeheer
    en planning van de werkzaamheden.* Toezicht houden op de integrale veiligheid
    van VWS en de verwerking van persoonsgegevens bij VWS. Dit betreft de functie
    van de Beveiligingsautoriteit en Beveiligingscoördinator die samen met enkele
    adviseurs toezien op de veiligheid bij het departement en de beveiliging van de
    bewindspersonen. De Functionaris Gegevensbescherming (FG) en de plv FG houden
    toezicht op een juiste toepassing en naleving van de Algemene Verordening Gegevensbescherming
    en de Wet Politiegegevens bij VWS.'
