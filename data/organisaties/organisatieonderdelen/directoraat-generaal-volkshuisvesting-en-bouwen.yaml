description:
  text: Het directoraat-generaal Bestuur, Ruimte en Wonen staat voor sterk, vernieuwend
    en adaptief openbaar bestuur, een functionerend en ontwikkelend democratisch stelsel,
    een evenwichtige woningmarkt en een goed gebouwde bebouwde omgeving.Het directoraat-generaal
    helpt het openbaar bestuur zodanig in te richten en te laten werken dat het optimaal
    bijdraagt aan de welvaart en het welzijn van Nederland. Daarbij hoort hoe we wonen,
    bouwen en samenleven en uiteraard het functioneren van ons (lokaal) bestuur en
    onze democratie. Middenin de samenleving werken aan sterk openbaar bestuur en
    goed wonen en bouwen.
