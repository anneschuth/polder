  text: Taak:Het Team IV-Beleid geeft op strategisch niveau richting aan de informatievoorziening
    van de Belastingdienst om de bedrijfsdoelstellingen van de Belastingdienst te
    kunnen realiseren. IV-Beleid bepaalt, als gedelegeerde van de CIO, de kaders waarbinnen
    de IV-voortbrengings- en leveringsprocessen in de Belastingdienst zich bewegen.
