description:
  text: De Raad voor het Overheidspersoneelsbeleid (ROP) is het centrale overlegplatform
    van de gezamenlijke sectorwerkgevers en werknemers bij de overheid. De ROP heeft
    diverse taken. Zo voert de Raad overleg met de Minister van Binnenlandse Zaken
    en Koninkrijksrelaties en adviseert hij het kabinet en de Tweede Kamer - desgevraagd
    of uit eigen beweging - over aangelegenheden die het overheidspersoneelsbeleid
    betreffen. Ook doet de ROP aanbevelingen aan de overheidssectoren. Voorts is de
    ROP verantwoordelijk voor de aard en de inhoud van de pensioenvoorziening van
    het overheidspersoneel.
