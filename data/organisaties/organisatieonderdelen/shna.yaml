description:
  text: 'Het Programmabureau Staatkundige Hervormingen Nederlandse Antillen heeft
    tot taak om op het terrein van justitie de ontmanteling van de Nederlandse Antillen
    en de opbouw van de nieuwe landen Curaçao en Sint Maarten en de overgang (streefdatum:
    15 december 2008) van de eilanden Bonaire, Sint Eustatius en Saba (BES-eilanden)
    naar Nederland zo soepel mogelijk te laten verlopenVoor de BES-eilanden gaat het
    dan over tijdige borging van het beleid, wet-en regelgeving, uitvoering en toezicht
    op het Justitieel beleidsterrein op een zodanige wijze dat de staatkundige veranderingen
    bijdrage tot verbetering voor de bevolking door betere (georganiseerde) voorzieningen
    en een daadkrachtig bestuur. Bovendien coördineert het een tijdige aanpassingen
    van het Statuut en de rijkswet en -regelgeving en maatregelen op het Justitie
    beleidsterrein die voor alle onderdelen van het Koninkrijk van toepassing zijn.'
