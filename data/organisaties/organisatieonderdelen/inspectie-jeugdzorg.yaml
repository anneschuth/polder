description:
  text: De Inspectie Jeugdzorg, de Inspectie voor de Gezondheidszorg en de Inspectie
    Veiligheid en Justitie voeren het landelijk toezicht in het kader van de Jeugdwet
    uit. Als waren zij één inspectie zien zij in het kader van de Jeugdwet toe op
    de kwaliteit van de jeugdhulp, de jeugdbescherming en -reclassering en de andere
    instellingen in het jeugddomein. Daarnaast zien zij toe op de naleving van de
    wetgeving. Het landelijk toezicht jeugd stimuleert met haar toezicht de voorzieningen
    tot goede en veilige verzorging, opvoeding en behandeling van kinderen in de jeugdhulp
    en in de jeugdbescherming en -reclassering en de ondersteuning van ouders en verzorgers
    van die kinderen. Het landelijk toezicht jeugd draagt er aan bij dat de samenleving
    er op kan vertrouwen dat kinderen en ouders op tijd en op maat de hulp en zorg
    krijgen van de instellingen en de professionals. Het onafhankelijke oordeel van
    het landelijk toezicht jeugd over de kwaliteit van de jeugdhulp, de jeugdbescherming
    en -reclassering is relevant voor de professional, de instelling en de overheid
    en helpt bij het verbeteren van die kwaliteit.
