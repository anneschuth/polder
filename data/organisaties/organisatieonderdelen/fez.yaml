description:
  text: 'De Directie Financieel Economische Zaken (FEZ) fungeert als concerncontroller
    en waarborgt de rechtmatige, doelmatige en doeltreffende besteding van middelen.
    Deze taken zijn wettelijk geregeld volgens de Comptabiliteitswet.Kerntaken van
    FEZ:- Begroting en verantwoording: Betrouwbare begroting en verantwoording van
    middelen.- Regie over begrotingscyclus: Samenhangend sturingsmodel tussen beleid,
    begroting en management.- Allocatie van middelen: Transparante advisering over
    budgetverdeling binnen LNV.- Toezicht op besteding: Toezicht houden op rechtmatige
    en doelmatige besteding van begrotingsmiddelen.- Ondersteuning DG''s: Ondersteuning
    bieden aan beleidsverantwoordelijke DG''s in de begrotingscyclus.- Advies aan
    leidinggevenden: Gevraagd en ongevraagd advies aan politieke en ambtelijke leiding.-
    Audit Committee: Organiseren van een Audit Committee binnen LNV.- EU-fondsen:
    Toezicht op de inzet van Europese fondsen en advies over uitvoeringsorganisaties.-
    Beleidsevaluaties: Begeleiden van beleidsevaluaties en bewaken van de uitvoering.FEZ
    werkt nauw samen met andere directies van LVVN en de ministeries van EZ en KGG.'
