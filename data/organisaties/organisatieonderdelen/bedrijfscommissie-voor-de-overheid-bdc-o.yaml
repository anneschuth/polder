description:
  text: Bij een geschil tussen ondernemer en ondernemingsraad over de toepassing van
    de WOR kan, vóór een eventuele gang naar de rechter, de Bedrijfscommissie worden
    ingeschakeld voor bemiddeling en advies. De Bedrijfscommissie heeft een eigen,
    informele geschillenprocedure, die met name is gericht op bemiddeling.
