  valid_from: '1900-01-01'
description:
  text: 'Negenhonderdduizend scholieren hebben negenhonderdduizend onderwijswensen.
    De directie VO ontwikkelt beleid dat hun zo veel mogelijk kansen biedt, in overleg
    met de bijna zevenhonderd scholen voor voortgezet onderwijs, de drie landelijke
    pedagogische centra, het Instituut voor toetsontwikkeling Cito en de Specialisten
    in leerplanontwikkeling (SLO). Centraal staan als onderwijsvernieuwingen: de basisvorming,
    de tweede fase havo/vwo (waaronder het studiehuis) en het vmbo (het voorbereidend
    middelbaar beroepsonderwijs dat voortkomt uit vbo en mavo).  Daarnaast zijn belangrijke
    onderwerpen: het doelgroepen- en achterstandenbeleid, ict en de beroepskwaliteit
    van leraren. Verder krijgen educaties veel aandacht, zoals cultuureducatie en
    natuur- en milieueducatie. Voor de vormgeving en uitwerking van het beleid voert
    de directie regelmatig overleg met veel betrokkenen in het onderwijsveld, zoals
    scholen, vertegenwoordigers van schoolbesturen, docenten en leerlingen, maar ook
    met andere organisaties, zoals gemeenten en departementen.'
