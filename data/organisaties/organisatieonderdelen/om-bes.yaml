description:
  text: Het OM staat voor een rechtvaardige inzet van een ingrijpend overheidsinstrument. Op Bonaire, Saba en Sint Eustatius wordt dit uitgevoerd door het Openbaar Ministerie BES. Het OM BES focust zich vanzelfsprekend op het goed uitvoeren van de eigen taken, maakt zich sterk voor integrale aanpak van de veiligheid op de drie eilanden en professionaliseert voortdurend.
