description:
  text: 'De directie Bestuursondersteuning en Advies ondersteunt de politieke en ambtelijke
    top bij de politiek-bestuurlijke en organisatorische sturing van het departement.
    Belangrijke taken van de directie zijn:   Advisering aan de ambtelijke en politieke
    top over beleidsinhoudelijke, bestuurlijke en organisatorische vraagstukken.   Secretariële
    ondersteuning van de politieke en ambtelijke top.  Voeren van de secretariaten
    van de wekelijkse overleggen van de ambtelijke en politieke top (M-staf en MT
    OCW).  Regisseren van departementale processen en de dagelijkse logistiek van
    brieven, nota''s en andere documenten.  Onderhouden van de contacten met de Eerste
    en Tweede Kamer.  Bevorderen van de politiek-bestuurlijke sensitiviteit bij de
    medewerkers van OCW.  Signaleren en regisseren van (beleids)crises.  Verder speelt
    de directie samen met de veranderingsdirectie Apollo een belangrijke rol bij de
    (verdere) invoering van het SG-DG model.'
