description:
  text: 'Taak:Het Wetenschappelijk Onderzoek- en Datacentrum (WODC), Kennisinstituut
    voor de rechtsstaat, is een onafhankelijk kennisinstituut dat valt onder het ministerie
    van Justitie en Veiligheid. Het WODC draagt bij aan behoud en verbetering van
    de rechtsstaat via het (laten) uitvoeren van kwalitatief hoogwaardig wetenschappelijk
    onderzoek. En door het aanbieden van kennis, verbeterpunten en (waar mogelijk)
    denkrichtingen.Het WODC is sinds september 2019 een zelfstandige dienst van het
    ministerie van Justitie en Veiligheid (zie bericht in Staatscourant van 19-09-2019).
    Als zodanig draagt het WODC bij aan het maken, uitvoeren en controleren van landelijk
    evidence-informed justitie- en veiligheidsbeleid. Dat doen we door: het (laten)
    uitvoeren van kwalitatief hoogwaardig wetenschappelijk onderzoek en onze kennis,
    verbeterpunten en denkrichtingen aan te bieden.'
