description:
  text: Bij de Belastingdienst werken bijna 27.000 mensen. Een groot deel van onze
    medewerkers heeft direct contact met burgers en bedrijven. De rest van de medewerkers
    werkt bij de facilitaire bedrijven, concerndirecties en corporate diensten binnen
    de Belastingdienst.De Belastingdienst is onderdeel van het ministerie van Financiën.
    We voeren niet alleen fiscale wetgeving uit. Ook de FIOD maakt deel uit van de
    Belastingdienst. We hebben bovendien een van de grootste ICT-organisaties van
    het land.
