description:
  text: Het cliëntenpanel is een onafhankelijk advies- en inspraakorgaan. Het is op
    8 maart 2017 geïnstalleerd in het stadhuis in Roermond. Het panel komt 3 keer
    per jaar bij elkaar.De leden van het cliëntenpanel hebben een preventieve en signalerende
    rol vanuit hun ervaring en/of deskundigheid. Daarnaast zijn zij voor Omnibuzz
    een belangrijke sparringpartner als het gaat om het ontwikkelen van nieuw beleid.
    Zij zijn de schakel tussen Omnibuzz en klanten en voorzien hen, daar waar nodig,
    van relevante informatie.
