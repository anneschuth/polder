  valid_from: '1900-01-01'
description:
  text: Wetenschappelijke resultaten dienen gemak, gezondheid, geluk, veiligheid en
    rijkdom. De directie coördineert interdepartementaal het wetenschapsbeleid en
    is mede verantwoordelijk voor het internationale wetenschaps- en technologiebeleid.
    De directie zet zich in voor de kwaliteit en de maatschappelijke relevantie van
    het Nederlandse onderzoek. Zij onderhoudt (bestuurlijke) relaties met organisaties
    die een grote rol spelen bij de vormgeving en uitvoering van het wetenschapsbeleid,
    zoals NWO, TNO, universiteiten, GTI's en de KNAW.   De directie Onderzoek en Wetenschapsbeleid
    is bovendien beleidsmatig actief voor de Nederlandse taal en cultuur, samen met
    de OCW-directie Media, Letteren en Bibliotheken en met de Nederlandse Taalunie.
