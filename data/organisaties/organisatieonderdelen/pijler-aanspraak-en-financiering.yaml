description:
  text: 'De pijler Aanspraak & financiering richt zich op het systeem van de vergoeding
    van genees- en hulpmiddelen. Als afgeleide daarvan staan de advisering over samenstelling
    van het basispakket en kostenbeheersing van medische producten centraal. Bij deze
    pijler ligt ook de verantwoordelijkheid voor de Wet Geneesmiddelenprijzen (WGP)
    en het geneesmiddelenvergoedingssysteem (GVS).MT-lid: drs. W. de Haart, w.d.haart@minvws.nlmanagement-assistent:
