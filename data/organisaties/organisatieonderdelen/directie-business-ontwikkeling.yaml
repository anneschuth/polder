description:
  text: De directie draagt de zorg voor integrale regie, samenhang en ondersteuning
    voor de ontwikkelopgaven van het directoraat-generaal en heeft daarbij de volgende
    hoofdtaken:- Adviseren, aanjagen en ondersteunen bij de veranderopgaven binnen
    de organisatie;- Het opzetten en aansturen van deze programma’s en projecten gericht
    op de verdere ontwikkeling van de organisatie- Het leveren van voldoende kwalitatief
    hoogwaardige interne capaciteit op het terrein van project- of programmamanagement
    voor de uitvoering van programma’s en projecten.
