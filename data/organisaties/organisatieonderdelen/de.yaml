description:
  text: 'Het Nederlandse emancipatiebeleid gaat er vanuit dat een voortdurende inzet
    nodig is om emancipatie te bevorderen. Het beleid richt zich op het bevorderen
    van gelijke rechten, kansen, vrijheden en (sociale) verantwoordelijkheden in de
    maatschappij voor vrouwen én mannen. Het beleid dient bovendien de positie en
    acceptatie van homoseksuelen te verbeteren. Uitgangspunt is dat meer vrouwen meer
    uren gaan werken en hun talenten en kwaliteiten optimaal benutten.  Concrete doelen
    van de directie Emancipatie zijn:  Economische zelfstandigheid Meer vrouwen in
    topposities van overheid, onderwijs en bedrijfleven Terugdringen van beloningsverschillen
    Maatschappelijke participatie van vrouwen met een grote afstand tot de arbeidsmarkt
    Meer meisjes in bèta  Bestrijden van geweld tegen meisjes en vrouwen Actieve aanpak
    van homodiscriminatie Bevorderen combinatie arbeid en zorg tussen 7 en 7 Bijdragen
    aan verbetering van de positie van meisjes en vrouwen in de wereld'
