description:
  text: TaakDe afdeling Participatie en Ondersteuning richt zich vooral op het versterken
    van de randvoorwaarden voor en ondersteuning van de maatschappelijke participatie
    van mensen met beperkingen\; op lokaal niveau via de Wmo, landelijk via de Wet
    gelijke behandeling op grond van handicap of chronische ziekte (Wgbh/cz) en landelijke
    voorzieningen zoals het bovenregionaal vervoer.
