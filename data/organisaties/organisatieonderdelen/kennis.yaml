names:
- value: Directie Kennis en Strategie
  abbr: KENNIS
  valid_from: '1900-01-01'
description:
  text: De heer dr. A. (Arnold) Jonk is directeur van de directie Kennis. Mevrouw
    drs. E.A.A.M. (Liesbeth) van Welie is directeur van de eenheid Onderzoeksprogrammering
    van deze directie.   De directie Kennis is verantwoordelijk voor beleid en scenario-ontwikkeling
    op OCW-terrein in samenwerking met de stelsel- en themadirecties.  De integratie
    van deze onderdelen van OCW in één directie leidt tot een verbinding tussen kwantitatieve
    gegevens en analyse.   De directie zal vernieuwende werkvormen gebruiken waarbij
    een verbinding wordt gelegd tussen wetenschappelijke inzichten, ervaring uit de
    praktijk en wensen vanuit beleid/politiek. Op die manier levert Kennis een bijdrage
    aan een enthousiasmerende visie op (interactieve) beleidsontwikkeling en aan een
    gedegen kennisbasis (evidence based) onder beleid.
