description:
  text: "TAAK-Aan de hand van het personeelsbeleid van de rijksoverheid en op basis\
    \ van goed overleg met de decentrale personeelsfunctie ontwikkelen van departementaal\
    \ personeels- en organisatiebeleid en zorgdragen voor de uitvoering en evaluatie\
    \ daarvan\\;Voeren van overleg met de vakorganisaties van overheidspersoneel over\
    \ algemeen voor het gehele ministerie geldende personele aangelegenheden en arbeidsvoorwaarden\\\
    ;-Voeren van overleg met de departementale ondernemingsraad\\;-Zorgdragen voor\
    \ de kwaliteit van de functie uitoefening in het vakgebied\\;-\tVerzorgen van\
    \ een aantal facilitaire functies, zoals het bedrijfsmaatschappelijk werk, mobiliteit,\
    \ FUWASYS, AWB-procedures, informatievoorziening personeel, informatiesystemen\
    \ P&O , salarisadministratie en toepassing financiële  rechtspositie."
