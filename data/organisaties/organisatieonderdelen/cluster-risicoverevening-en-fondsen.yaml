description:
  text: TAAKHet cluster Risicoverevening en Fondsen geeft vorm aan de financiering
    van de zorgverzekeringen. Hiertoe worden beleid en instrumenten ontwikkeld, toegepast
    en geëvalueerd.De werkzaamheden omvatten het vaststellen van premies en bijdragen,
    die zowel de kosten van de verzekering dekken als vanuit inkomensbeleid en concurrentiebeleid
    acceptabel zijn. Verder het zorgen voor een doelmatige inning en een eerlijke
    verdeling over de zorgverzekeraars.Bij de verdeling van de middelen wordt gecorrigeerd
    voor gezondheidsrisico’s, zodat de zorgverzekering kan functioneren zonder risicoselectie
    (vormgeving risicoverevening).Het cluster is verantwoordelijk voor het introduceren
    van financiële prikkels bij zorgverzekeraars teneinde zorgverzekeraars adequaat
    te laten concurreren op de zorgverzekeringsmarkt alsmede zorgverzekeraars te prikkelen
    hun beoogde rol en verantwoordelijkheid op te pakken in de zorginkoopmarkt. Daarnaast
    is het cluster belast met de beleidsontwikkeling en -verantwoording t.a.v. het
    fondsbeheer. Het cluster is ook verantwoordelijk voor het beleid op de solvabiliteitsvereisten
    en is hiervoor accounthouder DNB.
