description:
  text: TAAK-Ondersteunen van de sectordirecteur en de hoofden van de eenheden en
    belast zijn met procedurele, ondersteunende, informerende taken die samenhangen
    met de aansturing van de inrichtingen en de verantwoording die terzake dient plaats
    te vinden\;vervullen van een intermediarfunctie tussen de sectordirecties en de
    algemeen directeuren van de inrichtingen\;belast zijn met relatiebeheer en het
    verzorgen en onderhouden van externe contacten en betrekkingen.
