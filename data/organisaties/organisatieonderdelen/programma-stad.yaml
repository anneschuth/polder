description:
  text: De programmadirectie Stad is verantwoordelijk voor het ontwerp, de bewaking
    van voortgang en samenhang en de benutting van lessen (inhoudelijk en bestuurlijk)
    van het programma Stad. Het programma Stad fungeert daarmee als katalysator voor
    een innovatieve ontwikkeling van stedelijke regio’s in ons land. Voor de selectie
    en de uitvoering van concrete initiatieven in het kader van het programma staan
    private en publieke partijen in stedelijke regio's, kennisinstellingen en ministeries
    (EZ, I&M, SZW, OCW, VWS en BZK zelf) aan de lat. De programmadirectie leunt bij
    die uitvoering overigens niet achterover maar ondersteunt en regisseert waar nodig
    en mogelijk.
