description:
  text: 'TAAK:De Afdeling IBP draagt, in overleg met de directies zorg voor de strategie-
    en visie-ontwikkeling ten aanzien van de multi- en bilaterale horizontale dossiers
    en beleidsvraagstukken alsook t.a.v. de Koninkrijkssamenwerking en de projecten.
    De Afdeling IBP vervult de coördinatiefunctie op beleidsinhoudelijk en procesmatig
    gebied voor wat betreft de inbreng van Justitiestandpunten bij multi- en bilaterale
    dossiers en beleidsvraagstukken alsook t.a.v. de Koninkrijkssamenwerking en de
    projecten. De Afdeling faciliteert bij capaciteitsopbouw, financiële programma''s
    en internationaal loopbaan- en detacheringsbeleid.Hoofd: drs. E.A.I.M. Vriendstel.
