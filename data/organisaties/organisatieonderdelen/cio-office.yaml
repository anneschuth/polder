description:
  text: De Chief Information Officer (CIO) van VWS adviseert bestuurders, beleidsmedewerkers en de bestuursraad gevraagd en ongevraagd over de informatie- en ICT-aspecten van beleid, uitvoering en bedrijfsvoering.De CIO zorgt ervoor dat alles wat met informatievoorziening en ICT te maken heeft binnen VWS in samenhang gebeurt, en volgens afspraken die met de zorgsector, binnen het Rijk en binnen VWS gemaakt zijn.
