description:
  text: 'Als een van de vijf ambtelijke voorportalen voor de ICBR coördineert deze
    commissie de informatievoorziening en het ICT-beleid van de rijksdienst, borgt
    het rijksbrede beleid, en doet voorstellen voor de ontwikkeling van nieuwe kaders
    en standaarden. De commissie adviseert onder meer de eigen ambtelijke en politieke
    leiding gevraagd en ongevraagd over de doelstelling, uitvoering, kosten en risico''s
    van grote ICT projecten.Leden: Chief Information Officers van de ministeries en
    de Hoge Colleges van Staat.'
