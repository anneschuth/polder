description:
  text: TakenDe afdeling Bestuurlijke Aanpak (BA) staat voor de ontwikkeling van een
    bestuurlijke aanpak van georganiseerde criminaliteit (naast de strafrechtelijke
    en fiscale aanpak) tot een geïntegreerde aanpak. Tevens staat de afdeling BA voor
    de openbare orde portefeuille van de burgemeester. Dit omvat de openbare orde
    en veiligheid, leefbaarheid, het veiligheidsbeleid van gemeenten en de bestuurlijke
    aanpak van de georganiseerde criminaliteit. BA functioneert tot slot als expertisecentrum
    en vraagstuk voor andere onderdelen van V en J waar het gaat om bestuurlijke veiligheidsvraagstukken.
