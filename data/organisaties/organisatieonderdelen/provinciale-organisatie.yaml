description:
  text: Overijssel wil een provincie zijn, waarin mensenzich thuis voelen. Een provincie,
    die transparant is in haar handelen, die beloften waarmaakt en afgerekend kan
    worden op haar prestaties. Een provincie, die professioneel en betrouwbaar is,
    die oog en oor heeft voor haar burgers en voor wat zich in de omgeving afspeelt.
    Een provincie die zich richt op de toekomst en uitstraalt dat samenwerking niet
    alleen binnen de muren van het provinciehuis, maar ook daarbuiten een vanzelfsprekendheid
    is.
