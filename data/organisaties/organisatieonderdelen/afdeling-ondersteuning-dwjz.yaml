description:
  text: De afdeling Ondersteuning ondersteunt de primaire processen van DWJZ en zorgt
    voor de bedrijfsvoerings- en PIOFACH-taken.Daarnaast vindt binnen de afdeling
    de ondersteuning plaats van de vier sectoren bij de werkzaamheden rond wetgevingstrajecten,
    zaken rond MR-advisering en Juridische Zaken. Daarnaast verzorgt de afdeling de
    coördinatie van de uitgifte van het Staatsblad en de plaatsing van DWJZ-stukken
    in de Staatscourant.
