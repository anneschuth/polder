names:
- value: Afdeling Bestuurlijke en Juridische Zaken
  valid_from: '1900-01-01'
description:
  text: 'Taak: De afdeling vervult t.b.v. het gehele Directoraat-Generaal de bewaking
    van de juridische kwaliteit en het minimaliseren van juridische risico''s. Zij
    adviseert de minister over complexen en politiek gevoelige zaken. De afdeling
    verzorgt juridische produkten zoals behandeling in beroep- en bezwaarschriften,
    WOB- en ombudsmanzaken. De afdeling beantwoordt kamervragen.Coördinatie en behandeling
    van brieven van burgers en parlementaire zaken (inclusief Kamervragen).'
