description:
  text: Het team Kinderombudsman helpt kinderen en jongeren tot 18 jaar om voor hun
    rechten op te komen bijvoorbeeld door het geven van advies of het starten van
    een onderzoek. En als het team Kinderombudsman  zelf ziet dat er in Nederland
    iets misgaat op het gebied van kinderrechten, dan komt het team ook in actie.
    Bijvoorbeeld door gevraagd en ongevraagd advies te geven aan politici en te laten
    zien hoe wetten en regels kunnen worden gebruikt om kinderen en jongeren beter
    te beschermen.
