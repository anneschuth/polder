description:
  text: TaakHet cluster Internationaal voert voor VWS de beleidscoördinatie van de
    internationale aspecten van de gezondheidszorg (zowel in de sector care als in
    de cure-sector). Deze coördinatie vindt plaats op Europees niveau en op multi-
    en bilateraal niveau. Het cluster draagt in dit verband de standpunten van het
    ministerie uit, behartigt de VWS-belangen door het voeren van onderhandelingen
    en het lobbyen in multi- en bilateraal verband. Het cluster toetst of nationale
    beleidsvoornemens betreffende het zorgstelsel passen binnen de internationale
    afspraken waaraan Nederland is gebonden. Anderzijds beziet het cluster ook of
    nieuwe verdragen door Nederland kunnen worden geratificeerd. Het cluster toetst
    daartoe of en in hoeverre nieuwe internationale regels in de weg staan aan het
    nationale beleid, en in hoeverre beleid moet worden aangepast om te kunnen passen
    binnen nieuwe verdragen.Het cluster trekt daarvoor op met betrokken VWS-directies
    en informeert en adviseert de ambtelijke en politieke leiding over te prioriteren
    dossiers en te behalen onderhandelingsresultaten om VWS-beleidsdoelstellingen
    te realiseren.Voor 2016 staan belangrijke thema’s centraal zoals de parlementaire
    behandeling van het wetsvoorstel Zvw-zorg buitenland, het afschaffen van de werelddekking
    met de aanpassing van bilaterale sociale zekerheidsverdragen/normverdragen, de
    aanpassing van de Verordening 883/2004 voor het onderdeel langdurige zorg en het
    EU-voorzitterschap in de eerste helft van 2016. Tijdens dit voorzitterschap kan
    de wijziging van de verordening een belangrijke inzet vergen.
