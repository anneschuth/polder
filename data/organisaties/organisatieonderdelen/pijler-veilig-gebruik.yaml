description:
  text: 'De pijler Veilig Gebruik heeft als doel het veilig stellen van medische producten
    (waaronder geneesmiddelen, medische hulpmiddelen en straling) te bevorderen en
    daarmee de patiëntveiligheid te verbeteren. Hierdoor ligt de verantwoordelijkheid
    voor het Besluit stralingsbescherming in deze pijler. Ook houdt men zich bezig
    met het beleid ten aanzien van registratie van bijwerkingen van geneesmiddelen.MT-lid:
    drs. W.D. Haart, w.d.haart@minvws.nlManagementassistent: mw. B. Mohaboe, b.mohaboe@minvws.nl'
