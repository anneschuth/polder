names:
- value: Regiebureau Persoonsgebonden Budget (PGB)
  valid_from: '1900-01-01'
description:
  text: "Het Regiebureau pgb is verantwoordelijk voor het voeren van de regie op de\
    \ verschillende partijen die betrokken zijn bij het PGB Portaal. In dat portaal\
    \ kunnen budgethouders, vertegenwoordigers en zorgverleners snel, makkelijk, overzichtelijk\
    \ en veilig hun pgb-administratie regelen. Ook de andere partijen werken intensief\
    \ samen om het portaal draaiende te houden en verder te ontwikkelen. Naast VWS\
    \ zijn de volgende organisaties betrokken in de keten: de Sociale Verzekeringsbank\
    \ (SVB), Zorgverzekeraars Nederland (ZN), de Vereniging van Nederlandse Gemeenten\
    \ (VNG) en belangenverenigingen Per Saldo (voor budgethouders) en de Branchevereniging\
    \ Kleinschalige Zorg (BVKZ, voor zorgverleners). Het Regiebureau pgb is daarnaast\
    \ verantwoordelijk voor het succesvol aansluiten van gemeenten op het PGB Portaal.\
    \ En uiteindelijk de overdracht van het PGB Portaal naar de SVB.*Aandachtsgebieden*Het\
    \ Regiebureau pgb heeft drie concrete opdrachten:1.\tOrganiseren van de regie\
    \ op keten van het PGB Portaal. Dit noemen we ook wel de structurele regietaken.\
    \ Deze taken komen neer op het ondersteunen en verbeteren van de samenwerking\
    \ om de doelen van de keten te behalen. En ook het voeren van regie op het verder\
    \ ontwikkelen van het PGB Portaal.2.\tZorgen voor een succesvolle landelijke aansluiting\
    \ op het PGB Portaal van budgethouders in de Wet maatschappelijke ondersteuning\
    \ (Wmo) en Jeugdwet. Dit gebeurt door gemeenten aan te sluiten op het PGB Portaal.\
    \ Budgethouders uit zes gemeenten hebben al toegang tot het portaal. Vanaf 2026\
    \ sluiten de SVB, VNG en VWS   ook de andere gemeenten aan. Daarna kijkt het Regiebureau\
    \ pgb naar het aansluiten van budgethouders in de Zorgverzekeringswet (Zvw). Budgethouders\
    \ binnen de Wet langdurige zorg (Wlz) kunnen al werken in het PGB Portaal.3.\t\
    Overdragen van het PGB Portaal naar een professionele beheerpartij: de SVB. Uiteindelijk\
    \ is het idee dat de Sociale Verzekeringsbank het PGB Portaal volledig in beheer\
    \ krijgt. Samen met de SVB werkt het Regiebureau pgb daarom aan de stappen die\
    \ nodig zijn om die overdracht succesvol te regelen."
