description:
  text: De directie Democratie en Bestuur zet zich in voor een goed functionerend
    democratisch systeem en in het bijzonder de rol van burgers en politiek ambtsdragers.
    De directie heeft een brede sociaal-maatschappelijke oriëntatie en draagt bij
    aan de oplossing van spanningen, dilemma’s en actuele vraagstukken op het snijvlak
    van politiek, bestuur en samenleving.
