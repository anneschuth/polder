description:
  text: 'Ingesteld bij wet, artikel 1:238 van het Burgerlijk Wetboek, laatstelijk
    gewijzigd bij Wet van 13 juni 1996, Stb. 328 (in werking 29 juni 1996). Bijbehorende
    besluiten:Organisatiebesluit Raad voor de Kinderbescherming 2015, laatstelijk
    gewijzigd bij AMvB van 2 september 2020, Stb. 357 (in werking 1 oktober 2020)
    met een Nota van Toelichting.Het Mandaatbesluit Raad voor de Kinderbescherming
    Ministerie van Justitie en Veiligheid 2022, Ministeriële Regeling van 7 juli 2022,
    Stcrt. 19514 (in werking 26 juli 2022).Missie: De Raad voor de Kinderbescherming,
    omdat ieder kind dat ernstige schade dreigt op te lopen het recht heeft om veilig
    verder op te groeien.Visie: De Raad voor de Kinderbescherming heeft een belangrijke
    rol in zowel de jeugdbeschermings- als strafrechtketen. We onderzoeken of overheidsingrijpen
    nodig is om een kind te beschermen, als de mogelijkheden voor vrijwillige hulp
    zijn uitgeput. Met pedagogische deskundigheid bekijken we hoe het tij te keren
    voor jongeren die met het strafrecht in aanraking zijn gekomen.De RvdK is een
    wendbare, solide en toekomstbestendige organisatie waarin veranderingen planbaar
    en voorspelbaar worden gerealiseerd.'
