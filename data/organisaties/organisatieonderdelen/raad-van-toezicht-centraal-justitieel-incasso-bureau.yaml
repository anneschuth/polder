description:
  text: 'Ingesteld bij besluit van 7 juni 1994, houdende regels in verband met de
    instelling van het CJIB (Stb. 1994, nr. 408, laatstelijk gewijzigd bij besluit
    van 11 juni 1997 / (Stb. 1997, nr. 241)).Taak: De vergadering van procureurs-generaal
