names:
- value: Gerecht in eerste aanleg van Bonaire, Sint Eustatius en Saba
  valid_from: '1900-01-01'
description:
  text: Een zaak die voor het eerst voorkomt, valt meestal onder de bevoegdheid van
    het Gerecht in eerste aanleg, dat organisatorisch deel uitmaakt van het Hof. Dergelijke
    zaken worden over het algemeen door één rechter (enkelvoudig) behandeld. De Gerechten
    in eerste aanleg van Aruba, Curaçao en Sint Maarten zijn gevestigd op de respectievelijke
    eilanden; die van Bonaire, Sint Eustatius en Saba is gevestigd op Bonaire.
