  valid_from: '1900-01-01'
description:
  text: 'Taak: De Directie Rechtsbestel is verantwoordelijk voor het rechtsbestel
    als geheel. Zorgt ervoor dat uitvoerende organisaties, taakorganisaties en stakeholders
    kunnen bijdragen aan de uitvoering van het Justitiebeleid, ieder uiteraard vanuit
    de eigen rol en verantwoordelijkheid. De Directie ontwikkelt daarvoor ook het
    bestuurlijk instrumentarium en stelt eisen aan aanpassingen van wet- en regelgeving
    en bekostiging.'
