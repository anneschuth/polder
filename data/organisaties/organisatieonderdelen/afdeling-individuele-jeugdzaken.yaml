description:
  text: TAAKDe afdeling  Individuele  Jeugdzaken (IJZ) neemt  beslissingen over selectie
    en plaatsing van jeugdigen in de justitiële jeugdinrichtingen en inzake het vrijhedenbeleid.
    IJZ  beantwoordt klachtenbrieven en neemt beslissingen op bezwaar-, beroep- en
    verzoekschriften. Het betreft die minderjarigen die in bewaring (voorlopige hechtenis)
    zijn gesteld, jeugddetentie en/of een PIJ-maatregel hebben gekregen en minderjarige
    vreemdelingen.Tevens draagt de afdeling  IJZ zorg voor het tijdig aanleveren van
    de verlengingsadviezen door de JJI inzake de PIJ-maatregel en bewaakt zij de termijnen
    van de PIJ-maatregel. Daarnaast neemt IJZ beslissingen t.a.v. verlofaanvragen
    van de binnen JJI verblijvende jeugdigen en worden politiedeclaraties van het
    verblijf van minderjarigen op het politiebureau op juistheid getoetst.
