description:
  text: "TakenDe afdeling IV stelt gemeenten in staat om hun bestuurlijke en ambtelijke\
    \ takken op het brede terrein van het tegengaan van overlast en onveiligheid adequaat\
    \ uit te oefenen. De belangrijkste thema's daarbij zijn:•\tOverlast door jeugdgroepen;•\t\
    Overlast bij betaalde voetbalwedstrijden en andere grootschalige evenementen;•\t\
    Overlast in de wijk en woonoverlast;•\tUitgaansoverlast, al dan niet veroorzaakt\
    \ door drank en drugs;•\tVerbeteren van de veiligheidsbeleving;•\tBevorderen van\
    \ intergemeentelijke en interdisciplinaire samenwerking."
