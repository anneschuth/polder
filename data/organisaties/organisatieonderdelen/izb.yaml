- value: Directie Infectieziektebeleid
  abbr: IZB
  valid_from: '1900-01-01'
description:
  text: 'De directie IZB zet zich ervoor in dat mensen in Nederland optimaal tegen
    ernstige, soms langdurende, gevolgen van infectieziekten, waaronder zoönose, beschermd
    zijn. Dat doen we door preventie (onder andere vaccinaties), het vroegtijdig signaleren
    van risico’s en door direct actie te ondernemen als dat nodig is. Ook faciliteren
    en stimuleren we kennisopbouw over infectieziekten en hebben we oog voor verschillen
    in de samenleving en extra aandacht voor groepen die meer risico lopen.Aandachtsgebieden*
    Samen in de keten: De directie IZB zorgt ervoor dat alle schakels in de keten
    hun werk goed kunnen doen door de juiste randvoorwaarden te scheppen. Primair
    vindt alles rond infectieziekten plaats door professionals, zonder bestuurlijke
    inmenging. Specifieke infectieziekten of aspecten, zoals antimicrobiële resistentie,
    kunnen op de agenda komen omdat experts een risico signaleren, vanwege (inter)nationale
    doelstellingen of omdat de politiek of samenleving hier om vraagt.* Maatschappijbreed:
    iedereen kan gevolgen ondervinden van infectieziekten en de maatregelen daartegen.
    Als directie IZB zijn we aanspreekbaar op alles wat samenhangt met een infectieziekte,
    maar we zijn niet verantwoordelijk voor alles. We doen bij het uitbreken van een
    infectieziekte ook een beroep op de verantwoordelijkheid van economische en maatschappelijke
    sectoren. We faciliteren ze waar mogelijk.* Omgevingsbewust: infectieziekte-ontwikkelingen
    hangen samen met grote mondiale vraagstukken zoals klimaatontwikkeling, verlies
    van biodiversiteit, bevolkingsgroei en ontbossing. Gezondheid en weerstand zijn
    ook afhankelijk van factoren als lucht- en waterkwaliteit, gezonde voeding, schulden
    en armoede, goede arbeidsomstandigheden en van klimaat(adaptatie).* Lerend en
    innovatief: als directie IZB bouwen we voort op eerdere ervaringen. We werken
    samen met onze reguliere onderzoekspartners, zoeken steeds naar nieuwe partners
    en stimuleren innovatie.* Paraat staan: we nemen verantwoording en financieel
    beheer serieus en werken doelmatig en rechtmatig. Bij een crisis werken we met
    het Departementaal Crisis Centrum (DCC) en maken we gebruik van reguliere crisisoverlegstructuren.
    We hebben afspraken met de Nationaal Coördinator Terrorismebestrijding en Veiligheid
    (NCTV) over het kantelpunt tussen een infectieziektecrisis en een maatschappelijke
    crisis.'
