description:
  text: '- een college dat voor meer dan de helft bestaat uit ambtenaren die werkzaam
    zijn bij een ministerie of een daaronder ressorterende instelling, dienst of bedrijf,
    en die in verband met hun werkzaamheden in dat college zitting hebben.Onder een
    adviescollege wordt verstaan, een college dat krachtens publiekrecht tot taak
    heeft de regering te adviseren over algemeen verbindende voorschriften of te voeren
    beleid van het Rijk.Géén adviescollege in de zin van wet (Kaderwet adviescolleges)
    is:- een college als bedoeld in artikel 1:1, tweede lid, van de Algemene wet bestuursrecht'
