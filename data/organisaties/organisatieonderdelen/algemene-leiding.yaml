description:
  text: Het ministerie bestaat uit twee delen, te weten de posten in het buitenland en het departement in Den Haag. Het departement is als volgt geformeerd:- de onder de Secretaris-Generaal en zijn plaatsvervanger ressorterende dienstonderdelen- de regiodirecties, formatief gerangschikt onder de Directeur-Generaal Regiobeleid en Consulaire Zaken (DGRC)- De themadirecties, formatief gerangschikt onder de Directeur-Generaal Politieke Zaken (DPGZ), de Directeur-Generaal Internationale Samenwerking (DGIS) en de Directeur-Generaal Europese Samenwerking (DGES)- de forumdirecties, formatief geranschikt onder de Directeur-Generaal Politieke Zaken (DGPZ), de Directeur-Generaal Internationale Samenwerking (DGIS) en de Directeur-Generaal Europese Samenwerking (DGES).
