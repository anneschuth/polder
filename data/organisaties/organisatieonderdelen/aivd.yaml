names:
- value: Algemene Inlichtingen- en Veiligheidsdienst
  abbr: AIVD
  valid_from: '1900-01-01'
description:
  text: In het belang van de nationale veiligheid heeft de AIVD de volgende taken:-
    het verrichten van onderzoek naar organisaties enpersonen die door de doelen die
    zij nastreven, of doorhun activiteiten een gevaar kunnen vormen voor hetvoortbestaan
    van de democratische rechtsorde, destaatsveiligheid of voor andere gewichtige
    belangen vande staat- het verrichten van veiligheidsonderzoeken- het bevorderen
    van beveiligingsmaatregelen- het doen van onderzoek naar andere landen
