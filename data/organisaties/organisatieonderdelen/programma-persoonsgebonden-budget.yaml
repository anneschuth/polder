description:
  text: 'De programmadirectie pgb (pdPGB) is verantwoordelijk voor een toekomstbestendig
    en uitvoerbaar persoonsgebonden budget (pgb). De pdPGB maakt dilemma’s inzichtelijk
    en bespreekbaar en weegt belangen af, samen met de keten. Binnen VWS met de directies
    Langdurige Zorg, Maatschappelijke Ondersteuning, Jeugd, Zorgverzekeringen en Patiënt
    & Zorgordening. Buiten VWS met de Sociale Verzekeringsbank (SVB), Zorgverzekeraars
    Nederland (ZN), Vereniging van Nederlandse Gemeenten (VNG), de belangenvereniging
    Per Saldo (budgethouders) en de Branchevereniging Kleinschalige Zorg (zorgverleners).
    De programmadirectie acteert op overkoepelende beleidsthema’s als minder regeldruk
    voor budgethouders en meer bestaanszekerheid voor zorgverleners. Om budgethouders,
    zorgverleners en verstrekkers te ondersteunen, ontwikkelt en beheert pdPGB in
    samenwerking met de keten het PGB-Portaal.Aandachtsgebieden* Samen met de directie
    Maatschappelijke Ondersteuning, de VNG en Per Saldo werken we aan verbetering
    van de toegang tot het pgb bij gemeenten. Ook de toerusting van (potentiële) budgethouders
    en consulenten wordt meegenomen.* De inzet van informele zorgverleners met een
    pgb biedt kansen in de krappe zorgarbeidsmarkt. Maar het leidt ook tot vraagstukken
    zoals het afbakenen van de scheidslijnen tussen betaalde en onbetaalde zorg of
    de bestaanszekerheid van zorgverleners (pgb als gezinsinkomen). Samen met directie
    Jeugd zoeken we naar antwoorden.* Met de directie Patiënt en Zorgordening werken
    we aan beperking van oneigenlijk gebruik van pgb’s, onder andere door het mogelijk
    maken van gegevensdeling.* In afstemming met pdPGB werkt de directie Langdurige
    Zorg aan een alternatieve financieringsvorm voor pgb-gefinancierde wooninitiatieven
    die feitelijk als zorgaanbieder fungeren.* De pdPGB is vanuit VWS opdrachtgever
    voor de SVB en voor iRealisatie (voor de doorontwikkeling van het PGB-Portaal)
    en het Overheidsdatacentrum Noord (housing en hosting portaal).* Domeinoverstijgende
    trajecten: - Met een open beleidsaanpak bereidt de directie fundamentele keuzes
    voor over hoe het pgb in de toekomst een waardevolle aanvulling kan zijn op zorg
    in natura. - De pdPGB is de drijvende kracht achter verschillende trajecten rondom
    (de professionalisering van) het werkgeverschap en opdrachtgeverschap van budgethouders
    en de afstemming daarover met SZW. - Er wordt binnen en buiten de directie hard
    gewerkt aan het PGB-Portaal en de aansluitingen van gemeentes hierop.'
