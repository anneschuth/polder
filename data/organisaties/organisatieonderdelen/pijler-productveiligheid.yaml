description:
  text: 'De pijler Productveiligheid is verantwoordelijk voo rhet beleid met betrekking
    tot de toelating van genees- en hulpmiddelen tot de markt. Deze regelgeving over
    medische producten komt grotendeels op Europees niveau tot stand en ligt besloten
    in de Geneesmiddelenwet en de Wet op de medische hulpmiddelen. Deze pijler houdt
    zich ook bezig met beleid ten aanzien van klinisch onderzoek met medische producten.MT-lid:
    mr. K.H.M. van Rooijen, kh.rooijenvan@minvws.nlManagementassistent: mw. M.R. Ramsaroep-Baldew,
    mr.baldew@minvws.nl'
