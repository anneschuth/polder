description:
  text: 'Ingesteld bij besluit van 23 augustus 1983 (Stb. 1983, 417).TAAK:Uitbrengen
    van voorstellen aan de Ministers van Justitie en Binnenlandse Zaken en Koninkrijksrelaties
    met betrekking tot de wettelijke regeling van algemene regels van bestuursrecht.
    Deze voorstellen worden zoveel mogelijk gegoten in de vorm van ontwerpvoorstellen
    van wet, voorzien van ontwerp-memorie van toelichting.Voorzitter-lid: prof.mr.
    M. ScheltemaVice-voorzitter-lid: prof.mr. P.J.J. van Buuren (uu)Secretaris-lid:
