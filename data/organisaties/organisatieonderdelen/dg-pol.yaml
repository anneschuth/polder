description:
  text: 'In het DG Politie staat de verantwoordelijkheid centraal van de minister van Veiligheid en Justitie voor het functioneren van de politieorganisatie en het leveren van politiezorg. Doel is om de kwaliteit en het presterend vermogen van de politieorganisatie te verhogen waardoor Nederland veiliger wordt.Per 1 juli 2012 bestaat DG Politie uit drie directies / portefeuilles:Portefeuille Bedrijfsvoering Politie: mr. A.F. Gaastra (directeur), tel: 070 – 426 74 97Portefeuille Regie en Control: vacaturePortefeuille Politieel beleid en Taakuitvoering: mr. M.N. Cramwinckel (directeur), tel: 070 – 426 69 95'
