description:
  text: De Rijksdienst Caribisch Nederland is de schakel tussen de ministeries die
    aanwezig zijn op Bonaire, Sint Eustatius en Saba. Ieder ministerie is zelf inhoudelijk
    verantwoordelijk voor het invoeren en het uitvoeren van beleid van het betreffende
    ministerie.Voor de juiste uitvoering en ondersteuning doen ze daarbij een beroep
    op  de centrale dienstverlening van de Rijksdienst Caribisch Nederland.De Rijksdienst
    Caribisch Nederland biedt deze centrale ondersteuning voor alle werkzame ministeries
    op de drie eilanden. Bij centrale ondersteuning kunt u denken aan het formele
    werkgeverschap, bedrijfsvoering zoals facilitaire zaken, huisvesting, ICT, personeelszaken
    en opleidingen.
