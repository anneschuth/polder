description:
  text: Binnen de directie MD Rijk worden taken op gebied van werving en selectie
    en ontwikkelen en opleiden nader met elkaar in samenhang gebracht.De directie
    MD Rijk verzorgt vacaturevervulling, loopbaanadvies, opleidingen en ontwikkeling
    voor de ABD-doelgroep. Bureau ABD biedt verschillende ontwikkelprogramma's aan
    voor (aankomende) ABD-managers en levert daarnaast diensten als coaching en opleidingsadvies.
