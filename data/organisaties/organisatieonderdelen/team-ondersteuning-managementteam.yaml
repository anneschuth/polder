description:
  text: Taak:Het team Ondersteuning Managementteam staat ten dienste van het MT van
    het directoraat-generaal Belastingdienst. Dit team voert het secretariaat van
    de groepsraad (bestaande uit de MT-leden van DGBEL en van de Belastingdienst en
    uit vertegenwoordigers van de kantoren en de facilitaire centra), van de COR (Concern
    ondernemingsraad Belastingdienst) en van het GOBD (Georganiseerd Overleg Belastingdienst).
    De loopbaanadviseurs van het team adviseren, informeren en ondersteunen het managementteam
    van de Belastingdienst inzake personele aangelegenheden die betrekking hebben
    op strategische functionarissen van de Belastingdienst, over opkomende talenten
    en over vacatures in de hoogste salarisschalen (schaal 15 BBRA en hoger).
