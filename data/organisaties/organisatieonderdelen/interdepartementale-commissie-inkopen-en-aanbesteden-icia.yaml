  valid_from: '1900-01-01'
description:
  text: Een moderne professionele en efficiënte inkoop bij de rijksoverheid. Dat is
    het domein dat de commissie inkopen en aanbesteden tot de hare rekent. Als subcommissie
    van de ICBR borgt zij het rijksbrede beleid op dit terrein en doet voorstellen
    voor de ontwikkeling van nieuwe kaders en standaarden. De ICIA adviseert onder
    meer de eigen ambtelijke en politieke leiding gevraagd en ongevraagd over de doelstelling
    en uitvoering van de inkoop bij het Rijk. Leden van de ICIA zijn de coördinerend
    directeuren Inkoop van de departementen.
