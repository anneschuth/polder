description:
  text: 'De programmadirectie COVID-19 Informatie & Coördinatie coördineert de parlementaire
    en juridische zaken en het politiek-bestuurlijke besluitvormingsproces rond COVID-19.Taken*
    Coördineren van het bestuurlijke en parlementaire proces: Kamerbrieven, Kamervragen,
    voorbereiden debatten;* Coördineren van een passende strategie voor de aanpak
    van Covid-19 voor de langere termijn;* Coördineren en uitvoeren van de voormalige
    NCTV-taken (afstemming en besluitvorming);* Tot stand brengen van een passend
    maatregelenpakket met oog voor het belang van volksgezondheid én de sociaal-maatschappelijke
    en economische effecten;* Coördineren van datastromen en informatiestromen en
    het beschikbaar stellen van deze informatie (bijvoorbeeld via het coronadashboard);*
    Verzorgen van de gedeelde ondersteuning voor de COVID-19-directies: financieel,
    informatievoorziening, secretariaat, beantwoorden van brieven van duizenden burgers
    en andere belanghebbenden.'
