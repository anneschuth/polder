description:
  text: Het Presidium van Provinciale Staten bestaat uit de fractievoorzitters en
    de voorzitter en eerste en tweede vice-voorzitter van Provinciale Staten. In het
    Presidium worden onder meer de agenda's van de Statencommissies en van Provinciale
    Staten samengesteld.Voor alle up-to-date informatie over Provinciale Staten van
    Drenthe verwijzen wij u naar onze website https://www.provincie.drenthe.nl/organisatie-bestuur/.
