description:
  text: 'Tijdens de coronaperiode kwamen bij VWS veel Wob-verzoeken (Wet openbaarheid
    bestuur, voorganger van de Wet open overheid) binnen over corona. Om de crisisorganisatie
    binnen VWS niet te veel te belasten met uitvoering van de Wob, is besloten om
    per 1 oktober 2021 een aparte programmadirectie in te richten: de Programmadirectie
    Openbaarheid (PDO). PDO werkt aan het openbaar maken van informatie over de coronaperiode.
    Alle verzoeken om deze informatie, die op basis van de Wet open overheid (Woo,
    de opvolger van de Wob) bij het ministerie van VWS worden ingediend, komen bij
    deze directie terecht.De directie telt zeven teams: zes teams bestaande uit voornamelijk
    juristen, die dagelijks bezig zijn met het beoordelen en openbaar maken van documenten,
    en een team dat verantwoordelijk is voor de logistiek rondom de informatieverzoeken.Aandachtsgebieden*
    De kernactiviteit van PDO is het zorgvuldig en efficiënt voorbereiden van Woo-besluiten
    over de coronabestrijding door VWS en het verstrekken van beoordeelde informatie
    aan verzoekers.* PDO zet in op het afdoen van alle Woo-verzoeken. Sinds de start
    van de directie gaat het om miljoenen documenten die inhoudelijk beoordeeld moeten
    worden. Daarom is gekozen voor een aanpak in tijdsfases en per categorie, de zogenaamde
    gefaseerde aanpak. PDO kijkt hoe deze aanpak verder verfijnd kan worden met als
    doel de beoordeling van documenten efficiënter en sneller te maken. Ook zorgt
    PDO voor de aanpak en doorontwikkeling van de openbaarheid van bestuur binnen
    VWS. Hierbij vindt ondersteuning plaats door Artificiële Intelligentie (AI).*
    Sinds begin september 2023 plaatst VWS Woo-besluiten en bijbehorende documenten
    op www.open.minvws.nl. Documenten op dit platform zijn gemakkelijk toegankelijk
    en doorzoekbaar met zoektermen. De komende tijd zetten we eerder genomen besluiten
    en bijbehorende documenten van de oude website (www.wobcovid19.rijksoverheid.nl)
    geleidelijk over naar dit nieuwe platform.* Begin 2024 is de parlementaire enquêtecommissie
    corona gestart. Het doel van de enquête is te komen tot waarheidsvinding. De enquêtecommissie
    onderzoekt het handelen van het kabinet tijdens de coronacrisis, de afwegingen
    die zijn gemaakt en de inzichten die daaraan ten grondslag lagen. Daarnaast onderzoekt
    de commissie de rol en het functioneren van de Tweede Kamer. PDO zorgt voor de
    informatieverstrekking aan de Tweede Kamer en ondersteunt de (oud)collega’s en
    (voormalig) bewindspersonen die de commissie uitnodigt.'
