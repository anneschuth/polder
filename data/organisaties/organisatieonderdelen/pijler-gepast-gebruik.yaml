description:
  text: 'De Pijler Gepast Gebruik houdt zich bezig met het stimuleren van het doelmatig
    gebruik van medische producten. Hier spelen ook vraagstukken als het voorkómen
    van ongeoorloofde beïnvloeding van zorgverleners en patiënten door de farmaceutische
    en hulpmiddelenindustrie, het verminderen van administratieve lasten en bevorderen
    van het gebruik van richtlijnen door beroepsbeoefenaren.MT-lid: drs. W. de Haart,
