names:
- value: Programmadirectie Weerbare Zorg
  abbr: (PDWZ)
  valid_from: '1900-01-01'
description:
  text: De zorg in Nederland moet niet alleen in het hier en nu, maar onder alle omstandigheden
    zo goed mogelĳk toegankelĳk zĳn. Nederland heeft te maken met actuele en toekomstige
    dreigingen, met mogelijk een grote impact op de maatschappĳ en de organisatie
    van de zorg. Zoals de publieke gezondheid, de curatieve- en de langdurige zorg.
    De programmadirectie Weerbare Zorg (PWDZ) heeft de taak om zorg- en welzijnsorganisaties
    en zorgprofessionals daarop zo goed mogelijk voor te bereiden.De dreigingen waar
    Nederland rekening mee moet houden zĳn divers. Bĳvoorbeeld een gewapend conflict,
    grote uitbraken van infectieziekten of extreme weersomstandigheden. In al die
    omstandigheden is slagvaardige, wendbare en opschaalbare (nood)zorg nodig. Doel
    is om de zorgverlening voor zoveel mogelĳk mensen zo lang mogelĳk toegankelĳk
    te houden. Met een daarbĳ passende kwaliteit.De programmadirectie kijkt daarvoor
    naar:* de zorgcapaciteit en de organisatie van de gewondenzorg;* medische voorraden;*
    IT en data;* de bevoegdheden tijdens een crisis;* verbetering van de civiel-militaire
    samenwerking in de zorg.Hiermee levert de programmadirectie een belangrijke bijdrage
    aan de maatschappelijke weerbaarheidsagenda van het kabinet. En ook aan de verplichtingen
    van Nederland als lid van de NAVO.Aandachtsgebieden* Problemen in actuele crises
    aanpakken* Uitzonderlijke zorgvragen in het bestaande zorgaanbod onderbrengen*
    Het Nederlandse zorgsysteem crisisbestendig maken
