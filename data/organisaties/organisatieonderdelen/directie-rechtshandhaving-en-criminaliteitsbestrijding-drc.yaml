description:
  text: 'Taak: De Directie ontwikkelt een visie, beleid en verschillende samenwerkingsvormen,
    waarmee het recht beter gehandhaafd, de criminaliteit beter bestreden en de veiligheid
    goed gewaarborgd wordt. Samen met parlement, relevante maatschappelijke organisaties,
    Openbaar Ministerie, politie en gemeenten bouwt de Directie daarvoor aan een stevig,
    inhoudelijk gedeeld fundament.'
