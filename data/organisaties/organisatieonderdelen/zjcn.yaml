description:
  text: De directie Zorg en Jeugd Caribisch Nederland (ZJCN) is verantwoordelijk voor
    beleid en wetgeving op het gebied van volksgezondheid, welzijn en sport in Caribisch
    Nederland (Bonaire, Saba en Sint-Eustatius). Daarnaast is ZJCN verantwoordelijk
    voor de uitvoering van de zorgverzekering en jeugdzorg. De ambitie is om de zorg
    in Caribisch Nederland gelijkwaardig te maken aan Europees Nederland, met een
    zorgstelsel op maat dat rekening houdt met de kleinschalige context van de eilanden.
    Er is een grote inhaalslag gemaakt met het verbeteren van de curatieve zorg en
    jeugdzorg. Het wegwerken van achterstanden, ook op het niveau van regelgeving,
    vraagt nog om extra aandacht. Zo gaan we het aanbod voor jongeren met complexe
    problematiek verbeteren, werken we aan de opbouw van maatschappelijke ondersteuning
    en de aanpak van huiselijk geweld en kindermishandeling, en voorzien we deze van
    een juridische basis. Bewegen en een gezonde leefstijl moeten onderdeel worden
    van het dagelijks leven van inwoners. Op het gebied van publieke gezondheid is
    doorontwikkeling van de lokale overheden van belang.Aandachtsgebieden* Het verder
    verbeteren van de samenwerking tussen de ziekenhuizen in Caribisch Nederland en
    op Aruba, Curaçao en Sint-Maarten.* Het verbeteren van de curatieve zorg door
    in te zetten op veilige en betrouwbare elektronische gegevensuitwisseling en e-health
    initiatieven.* Het vergroten van de capaciteit en het verbeteren van de voorzieningen
    in de langdurige zorg.* Het sluiten van contracten met aanbieders van maatwerkvoorzieningen
    voor maatschappelijke ondersteuning waarmee inwoners zo lang mogelijk thuis kunnen
    wonen.* De uitvoering van tweedelijns ambulante jeugdzorgtrajecten, kinderbeschermingsmaatregelen,
    jeugdreclassering, pleegzorg en begeleid wonen voor circa 250 kinderen.* Het uitbreiden,
    verbeteren en inkopen van jeugdzorg voor jongeren met complexe problematiek.*
    Samen met sportbonden uit Europees Nederland de achterstanden op de sportaccommodaties
    wegwerken en de Caribische sportorganisaties versterken.* Het ondersteunen van
    de lokale overheden met hun taken omtrent maatschappelijke ondersteuning, eerstelijns
    jeugdzorg, huiselijk geweld, preventie, pandemische paraatheid en publieke gezondheid.*
    Interdepartementale afstemming met betrokken vakdepartementen.* Het verkennen
    van passende wettelijke vormgeving voor het Caribische stelsel voor zorg en ondersteuning.
