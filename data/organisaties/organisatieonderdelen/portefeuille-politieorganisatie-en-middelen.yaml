- value: Portefeuille Politieorganisatie en- Middelen
  valid_from: '1900-01-01'
description:
  text: Tot deze portefeuille behoren alle taken die samenhangen met het eigenaarschap
    van de politieorganisatie. Dat wil zeggen de zorg voor de continuïteit van de
    politieorganisatie en een zodanige inrichting van de bedrijfsvoering dat de politie
    op een efficiënte manier de opgedragen taken kan uitvoeren. Ook het waarborgen
    van de omvang en kwaliteit van het politiepersoneel behoort hiertoe. De focus
    is gericht op het beheer, het beleid en de continuïteit van de politieorganisatie.
