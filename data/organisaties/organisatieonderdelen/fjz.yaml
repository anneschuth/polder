- value: Fiscale en Juridische Zaken
  abbr: FJZ
  valid_from: '1900-01-01'
description:
  text: Cd FJZ levert fiscaal en juridisch advies aan de ambtelijke en politieke top
    en richt zich op de kaderstelling van het fiscale uitvoeringsbeleid. De fiscaliteit
    is het geheel van alle wetten, regels en procedures voor de belastingheffing en
    -inning en daarmee de kern van de Belastingdienst. De hoofdtaken van FJZ zien
    op het adviseren, het stellen van kaders, het voeren van cassatieprocedures, het
    ontheffen van de geheimhoudingsplicht en het behandelen van een aantal specifieke
    juridische zaken. De directie vervult op het fiscaal juridisch terrein een schakelrol
    tussen de Belastingdienst en het kerndepartement. Fiscale en juridische zaken
    binnen de Belastingdienst die politiek, publicitair of budgettair gevoelig (kunnen)
    zijn of het beleid (kunnen) raken, vallen eveneens onder de verantwoordelijkheid
    FJZ.Rechtsstatelijkheid, rechtmatigheid, rechtszekerheid en rechtsgelijkheid zijn
    belangrijke waarden die FJZ voor de Belastingdienst als geheel bewaakt.
