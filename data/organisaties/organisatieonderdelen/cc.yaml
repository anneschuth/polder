description:
  text: "TAAK:- \tde communicatieadviseurs adviseren de bewindslieden over de strategische\
    \ invulling van de communicatieagenda. Daarnaast adviseren zij de directies over\
    \ de te volgen communicatiestrategie, maken communicatieplannen en zorgen voor\
    \ een juiste uitvoering daarvan; - \tde redacteuren zorgen voor de inhoud van\
    \ het VWS Intranet, en het interne magazine; - de medewerkers van publieksvoorlichting\
    \ krijgen en beantwoorden telefonische vragen van het publiek over VWS-thema's.\
    \ Ook houden zij op deze wijze de vragen van het grote publiek in de gaten; -\
    \ \tde medewerkers van publiekscommunicatie zorgen voor de coördinatie van campagnes\
    \ folders en andere communicatiemiddelen en doen ondersteuning en advisering over\
    \ de inzet van digitale media in interne en externe communicatie. Daarnaast bewaken\
    \ zij de huisstijl;- \tDe medewerkers van het cluster onderzoek initiëren onderzoek\
    \ op de prioriteiten en voeren media en stakeholder analyses uit, daarnaast wordt\
    \ dagelijks de nieuwsportal samengesteld aan de hand van de dag en avond bladen."
