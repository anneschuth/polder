description:
  text: Taak:Is belast met de advisering inzake vraagstukken op het gebied van informatievoorziening
    binnen het brede domein van het Directoraat-Generaal. Voornaamste onderdeel van
    werkzaamheden is op dit moment de uitvoering van het Programma informatievoorziening
    strafrechtsketen (Progis). Adviseert de Directeur-Generaal op het gebied van de
    governance van ICT binnen de taakorganisaties waarover de DG het beheer voert.
