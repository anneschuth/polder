description:
  text: Bezwaarschriften gericht tegen besluiten van Gedeputeerde Staten worden ter
    advisering aan de bezwarencommissie voorgelegd. De commissie kent achttien leden
    en is samengesteld uit externe leden. De bezwarencommissie is verdeeld in een
    tweetal kamers, een algemene kamer en een rechtspositionele kamer.
