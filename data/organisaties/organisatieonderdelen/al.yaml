  valid_from: '1900-01-01'
description:
  text: De secretaris-generaal (SG) is eindverantwoordelijk  voor het aansturen van
    het ambtelijke apparaat.  De SG vormt samen met de plaatsvervangend secretaris-generaal
    (pSG) en de directeuren-generaal (DG) de algemene leiding van het ministerie.Taken
    Algemene Leiding:- Stellen en bewaken van inhoudelijk strategische kaders en sturing
    geven op politiek gevoelige en strategisch belangrijke onderwerpen- Algemeen sturing
    geven aan het departement (toezicht, coaching, monitoring, prioriteiten, planning,
    voortgangsbewaking)- bewaken en bevorderen van een samenhangend en consistent
    beleid- inrichten en onderhouden van een infrastructuur voor de bedrijfsvoering-
    coördineren van directieoverstijgende zaken.
