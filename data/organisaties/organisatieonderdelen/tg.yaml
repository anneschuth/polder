description:
  text: Op grond van de 'Wet op de beroepen in de individuele gezondheidszorg' zijn voor de beroepen apotheker, arts, fysiotherapeut, gezondheidszorgpsycholoog, psychotherapeut, tandarts, verloskundige en verpleegkundige vijf regionale tuchtcolleges ingesteld voor de behandeling van tuchtrechtelijke zaken en een centraal tuchtcollege voor de behandeling van tuchtrechtelijke zaken in hoger beroep. Daarnaast is een college van medisch toezicht ingesteld dat op voordracht van de Inspectie voor de Gezondheidszorg oordeelt over de geschiktheid om het beroep uit te oefenen.
