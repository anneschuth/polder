description:
  text: RCN-unit SZW keert namens het Ministerie sociale verzekeringen uit om bij
    te dragen aan bestaanszekerheid voor ouderen, ouders en mensen die tijdelijk door
    bijvoorbeeld ziekte of zwangerschap niet kunnen werken.Daarnaast is er de onderstandsuitkering
    om bij te dragen aan bestaanszekerheid voor inwoners die in een financiële noodsituatie
    verkeren. De unit SZW werkt aan een menswaardig bestaan voor iedereen in Caribisch
    Nederland.
