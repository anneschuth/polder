description:
  text: 'Wat heb je nodig om gezond te blijven, of beter te worden? En als beter worden
    niet meer gaat, wat heb je dan nodig om zo zelfstandig en fijn mogelijk te kunnen
    leven? Mensen kunnen die vragen het beste samen met hun zorgverlener beantwoorden.
    Samen maken ze zorg op maat mogelijk. De directie Patiënt en Zorgordening kijkt
    naar alle aspecten van de zorg die patiënten of cliënten tegenkomen en organiseert
    de zorg zo dat deze bijdraagt aan optimale uitkomsten voor patiënten en cliënten.Aandachtsgebieden*
    Versterken van de positie van de patiënt: De patiënt/cliënt moet centraal staan
    in de zorg. Daarom is het van belang dat de rechtspositie van patiënten en cliënten
    wordt beschermd, dat de cliënt een stem heeft op individueel en collectief niveau
    en dat er patiënt-inclusief wordt gewerkt, onder meer door de inzet van ervaringsdeskundigen
    in zorg en beleid.* Zorgordening: PZo werkt aan beleid en wet- en regelgeving
    die ervoor zorgen dat de patiënt/cliënt kan rekenen op goede, toegankelijke en
    betaalbare zorg.* De beste uitkomst van zorg voor iedere patiënt: We bevorderen
    de kwaliteit van de zorg. Daarvoor is het belangrijk dat zorgverleners leren en
    verbeteren. Dat kan door kwaliteit en (patiënt gerapporteerde) uitkomsten te meten
    en gebruiken. De patiënt/cliënt zetten we centraal door de zorg om hem/haar heen
    te organiseren.*Meer tijd voor zorg door minder regeldruk: Zorgverleners en zorgaanbieders
    moeten in hun werk niet door onzinnige regelgeving worden gehinderd.* Goede zorg
    door goed bestuur: Goed en integer bestuur is essentieel voor goede zorg. Dat
    begint bij helderheid in wet- en regelgeving over waar een zorgaanbieder aan moet
    voldoen om zorg te mogen verlenen. Intern en extern toezicht op de zorg moeten
    goed zijn geregeld. De medezeggenschap van patiënten en cliënten moet zo georganiseerd
    zijn dat naar de patiënt/cliënt geluisterd wordt. Als een instelling in financiële
    problemen komt, moet altijd de continuïteit van zorg aan patiënten en cliënten
    geborgd zijn.* Regels stellen en toezicht houden waar dat noodzakelijk is: Veruit
    het grootste deel van de zorgaanbieders handelt naar eer en geweten. Maar er zijn
    personen die misbruik maken van zorggeld en/of van cliënten die zich in een kwetsbare
    positie bevinden. PZo werkt samen met toezichthouders, zorginkopers en opsporingsdiensten
    aan het voorkomen, stoppen en bestraffen van malafide zorgaanbieders.'
