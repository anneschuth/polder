names:
- value: Directoraat-generaal Agro
  abbr: DG AGRO
  valid_from: '1900-01-01'
description:
  text: Het Directoraat-Generaal Agro (DG Agro)  werkt aan de verduurzaming van de
    agrosector en het voldoen aan maatschappelijke opgaven rondom land- en tuinbouw,
    voedsel en leefomgeving. Dit omvat het behalen van klimaat-, stikstof- en waterkwaliteitsdoelen,
    het ontwikkelen van economisch duurzame verdienmodellen en het stimuleren van
    innovatie. De aanpak is zowel internationaal, nationaal als gebiedsgericht.DG
    Agro richt zich op het minimaliseren van verliezen in de keten, het verbeteren
    van productkwaliteit en het verminderen van de ecologische footprint. Daarbij
    draagt het bij aan de ontwikkeling van het Europees landbouwbeleid en streeft
    naar internationaal toonaangevende, duurzame agro- en voedselketens.Kerntaken
    van DG Agro zijn onder meer het stimuleren van verduurzaming, het bevorderen van
    dier- en plantgezondheid, en het ontwikkelen van financiële instrumenten voor
    de sector. Daarnaast draagt DG Agro bij aan voedselzekerheid en innovatie en versterkt
    het de positie van de boer in de keten.
