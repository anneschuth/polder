  valid_from: '1900-01-01'
description:
  text: De directie Organisatie omvat alle taken op het gebied van bedrijfsvoering,
    communicatie en protocol van de Eerste Kamer. Dit betreft de taakvelden van het
    secretariaat van de Voorzitter en Griffier en de raadadviseur van de Griffier,
    alle (buitenlandse) protocollaire aangelegenheden en communicatie, veiligheid
    en huisvesting, de financieel-economische aangelegenheden inclusief inkoop, personeel
    en organisatie, informatievoorziening en ICT, postregistratie en archivering,
    de receptietaken, de huishoudelijke dienst, facilitaire zaken, de bodedienst,
    de chauffeurstaak en adviserende en ondersteunende werkzaamheden bedrijfsvoering
    breed.
