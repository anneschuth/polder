description:
  text: 'Het kloppende hart van de Belastingdienst, zo wordt de directie Centrale
    Administratieve Processen (CAP) vaak genoemd. Bij CAP zijn we namelijk verantwoordelijk
    voor de ontvangst, verwerking en verzending van álle fiscale gegevens aan en van
    burgers en bedrijven in Nederland. Het is de plek waar alle processen en gegevens
    samenkomen, en waar we ervoor zorgen dat de Belastingdienst optimaal kan doen
    wat het moet doen: zorgen dat Nederland blijft draaien.'
