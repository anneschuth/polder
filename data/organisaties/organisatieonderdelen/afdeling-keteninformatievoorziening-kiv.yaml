description:
  text: TakenDe afdeling Keteninformatievoorziening (KIV) richt de informatievoorziening
    in op ketenniveau binnen de rechtspleging en de rechtshandhaving, in het bijzonder
    binnen de strafrechtketen.De afdeling realiseert en onderhoudt een integraal en
    integer persoonsbeeld in de strafrechtketen. Daarbij adviseert KIV gevraagd en
    ongevraagd de DG over vraagstukken op het gebied van informatievoorziening. Hierbij
    is KIV de schakel tussen business en ICT op strategisch niveau. Keteninformatievoorziening
    adviseert de internationale aspecten van informatievoorziening en de gevolgen
    van internationale afspaken voor de informatievoorziening van de keten en de afzonderlijke
    partijen binnen de keten. Tot slot vervult KIV een beleidsrol in het accountteam
    JustID.
