  valid_until: '2018-11-15'
description:
  text: Over HaltHalt richt zich op het voorkomen, bestrijden en bestraffen van jeugdcriminaliteit.Halt heeft de wettelijke taak om grensoverschrijdend gedrag van jongeren te bestraffen. Zo’n 17.000 jongeren per jaar krijgen een Halt-straf opgelegd. Ook op het gebied van preventie is Halt actief. Halt geeft veel voorlichtingen op scholen, sportverenigingen of in de wijk. Ook biedt Halt op maat interventies en projecten aan.Halt is verbindend partner tussen het gezin, de wereld van het jeugdstrafrecht, de gemeente en  organisaties waarmee jongeren te maken hebben. Zo levert Halt een actieve bijdrage aan een veilige en leefbare omgeving.OrganisatieSinds 1 januari 2013 is Halt één organisatie met teams in het hele land. Zo blijft Halt aansluiten bij de lokale wensen. Halt bundelt de krachten tot één vitale organisatie die meer slagkracht heeft en efficiënt haar werk doet. Halt is een stichting met een directeur/bestuurder en een Raad van Toezicht. De organisatie bestaat uit regionale teams
    (in aansluiting op de gerechtelijke kaart en de 10 politieregio’s) en een landelijk kantoor, met elk een teammanager.FinancieringHalt voert de Halt-straf uit onder verantwoordelijkheid van het Openbaar Ministerie. Het ministerie van Veiligheid en Justitie financiert de uitvoering van de Halt-straf. Preventieopdrachten voert Halt uit in opdracht van gemeenten en andere opdrachtgevers, zoals de rijksoverheid, provincies, zorg- en welzijnsorganisaties, sportbonden en scholen.TAAKGrensoverschrijdend gedrag van jongeren voorkomen, bestrijden en bestraffen.
