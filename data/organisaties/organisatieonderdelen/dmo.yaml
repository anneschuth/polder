- value: Directie Maatschappelijke Ondersteuning
  abbr: DMO
  valid_from: '1900-01-01'
description:
  text: 'De missie van DMO is: De burger participeert vanuit zijn eigen verantwoordelijkheid
    en eigen kracht in de samenleving. Het is onze taak gemeenten en veldpartijen
    in een positie te brengen zodat ze burgers effectief en efficiënt kunnen ondersteunen.
    Tevens werken we aan het versterken van de sociale basis en samenredzaamheid van
    mensen. De directie Maatschappelijke Ondersteuning is hierbij verantwoordelijk
    voor het stelsel van ondersteuning zoals dat in de Wet maatschappelijke ondersteuning
    (Wmo) is vastgelegd. De gemeenten zijn hiervoor bestuurlijk en financieel verantwoordelijk.Aandachtsgebieden*
    Een toekomstbestendig stelsel van maatschappelijke ondersteuning.* Sterke samenleving;
    versterken van de sociale basis.* Inclusieve maatschappij.* Versterken toegang.*
    Veilig Thuis.* Herdenken en nooit vergeten.* Eén tegen eenzaamheid.* Wonen en
    zorg.'
