description:
  text: TAAKHet Ministerie van Veiligheid en Justitie is verantwoordelijk voor alle  forensische
    zorg in strafrechtelijk kader aan volwassenen, waaronder tbs. De Directie Forensische
    Zorg  van DJI voert deze taak uit.Deze directie bekijkt hoeveel forensiche zorg
    nodig is, van welk type, en welke organisaties en instellingen die kunnen bieden.
    De directie koopt de benodigde zorg in, bewaakt de kwaliteit en handelt de financiering
    af. Vervolgens worden justitiabelen onder verantwoordelijkheid van de directie
    geplaatst in een van de instellingen op basis van een overeenkomst. Twee rijks-ForensischPsychiatrische
    Centra (FPC) vallen onder directe aansturing en verantwoordelijkheid van de directie.De
    directie Forensische Zorg (DforZO) bestaat naast de directeur DforZO uit de afdelingen
    Plaatsing, Zorginkoop, Kwaliteit, Kwantitatieve & Financiële Analyse en het Stafbureau.
