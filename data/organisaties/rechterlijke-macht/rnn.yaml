description:
  text: Rechtbank Noord-Nederland is bevoegd om in haar arrondissement recht te spreken
    in eerste aanleg.Tegen uitspraken van de rechtbank Noord-Nederland staat veelal
    hoger beroep open bij gerechtshof Arnhem-Leeuwarden.Het algemeen postadres is
    alleen bestemd voor niet-zaaksgebonden correspondentie.Voor zaaksgebonden correspondentie
    verwijzen wij u naar het postadres onder het betreffende rechtsgebied op Rechtspraak.nl.Zie
    daarvoor:https://www.rechtspraak.nl/Organisatie-en-contact/Organisatie/Rechtbanken/Rechtbank-Noord-Nederland/Contact/Paginas/default.aspx#2a45c9eb-d13c-465f-a2bc-579cee1ece6b094f42c7-dbf3-499e-b88f-802843249aee1
