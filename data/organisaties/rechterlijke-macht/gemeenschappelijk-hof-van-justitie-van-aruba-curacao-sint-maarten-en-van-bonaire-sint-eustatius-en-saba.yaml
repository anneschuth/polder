description:
  text: Het Gemeenschappelijk Hof van Justitie van Aruba, Curaçao, Sint Maarten en
    van Bonaire, Sint Eustatius en Saba verzorgt de rechtspraak in eerste aanleg en
    in hoger beroep op de eilanden. Het Gemeenschappelijk Hof van Justitie wordt gevormd
    door een president en de overige leden en plaatsvervangende leden. De leden van
    het Gemeenschappelijk Hof van Justitie behandelen, zowel in eerste aanleg als
    in hoger beroep, civiele zaken, strafzaken en bestuursrechtelijke zaken (waaronder
    belastingzaken).Het Gemeenschappelijk Hof van Justitie van Aruba, Curaçao, Sint
    Maarten en van Bonaire, Sint Eustatius en Saba behandelt in hoger beroep zaken
    die door de Gerechten in eerste aanleg zijn behandeld en beslist. De rechter die
    in eerste aanleg een zaak heeft behandeld, neemt niet deel aan de behandeling
    van dezelfde zaak in hoger beroep. De zaken worden in hoger beroep meervoudig,
    door drie leden van het Hof, behandeld. Die rechters vormen dan het Gemeenschappelijk
    Hof van Justitie van Aruba, Curaçao, Sint Maarten en van Bonaire, Sint Eustatius
    en Saba. Deze naam staat dus zowel voor het geheel van de rechterlijke organisatie
    van de eilanden (waaronder ook de Gerechten in eerste aanleg) als voor de hogere
    beroepsinstantie alleen (hierna ‘het Hof’ genoemd). Er zijn uitzonderingsgevallen
    waarin het Hof ook meervoudig zaken in eerste aanleg behandelt.Op Sint Eustatius
    en op Saba heeft het Gemeenschappelijk Hof van Justitie geen vestiging en ook
    geen griffie. Voor het afgeven van stukken of het betalen van griffierecht dient
    u zich te wenden tot de griffie op Sint Maarten.
