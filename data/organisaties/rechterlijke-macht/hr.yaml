  abbr: HR
  valid_from: '1900-01-01'
description:
  text: De Hoge Raad der Nederlanden is als hoogste rechterlijke instantie binnen
    de gewone rechtspraak in Nederland belast met de cassatierechtspraak op het gebied
    van het civiele recht, strafrecht en belastingrecht. De Raad is op het gebied
    van het civiele en strafrecht ook cassatierechter voor Caribisch Nederland.De
    Hoge Raad bestaat uit een president, zes vice-presidenten, raadsheren en raadsheren
    in buitengewone dienst, en worden bijgestaan door een griffier die tevens kabinetschef
    van de president is.De raadsheren en advocaten-generaal worden in hun werkzaamheden
    ondersteund door het Wetenschappelijk Bureau (WB). Die ondersteuning bestaat uit
    het analyseren van dossiers, het verzamelen van relevante literatuur en jurisprudentie
    en het voorbereiden van conclusies of arresten. Een wetenschappelijk medewerker
    werkt óf voor de Raad óf voor het Parket.Voor de samenstelling van de kamers van
    de Hoge Raad zie www.hogeraad.nl
