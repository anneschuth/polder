description:
  text: De rechtbank Overijssel staat voor goede, tijdige en begrijpelijke rechtspraak
    en spreekt recht in Almelo, Enschede en Zwolle.De rechtbank Overijssel is de eerste
    instantie die in zijn arrondissement een juridisch oordeel geeft over een zaak
    of conflict. Daarna kan een procespartij (bijvoorbeeld de veroordeelde of het
    Openbaar Ministerie (om.nl)) in hoger beroep gaan bij gerechtshof Arnhem-Leeuwarden.
