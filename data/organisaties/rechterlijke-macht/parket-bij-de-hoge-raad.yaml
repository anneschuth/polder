description:
  text: De procureur-generaal bij de Hoge Raad vormt met zijn plaatsvervanger en de
    advocaten-generaal het parket. Het parket behoort niet tot het openbaar ministerie
    en is onafhankelijk. De belangrijkste taak van het parket is het geven van onafhankelijk
    advies aan de Hoge Raad over hoe te oordelen in een gegeven cassatieberoep.Daarnaast
    heeft de procureur-generaal bij de Hoge Raad een aantal bijzondere taken.Voor
    de samenstelling van het parket zie www.hogeraad.nl
