description:
  text: Rechtbank Noord-Holland is bevoegd om in zijn arrondissement recht te spreken
    in eerste aanleg. Dit betekent dat de rechtbank de eerste instantie is die een
    juridisch oordeel over een zaak of conflict geeft. Als een van de partijen het
    niet eens zijn met het oordeel van de rechter kan die partij in hoger beroep gaan.
    Bij rechtbank Noord-Holland werken ongeveer 750 mensen.
