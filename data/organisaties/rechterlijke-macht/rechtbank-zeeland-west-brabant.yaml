description:
  text: Rechtbank Zeeland-West-Brabant is bevoegd om in het arrondissement recht te
    spreken in eerste aanleg. Dit betekent dat de rechtbank de eerste instantie is
    die een juridisch oordeel over een zaak of conflict geeft. Daarna kan een procespartij
    (bijvoorbeeld de veroordeelde of het Openbaar Ministerie (om.nl)) in hoger beroep
    gaan bij gerechtshof ’s-Hertogenbosch.
