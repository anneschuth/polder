description:
  text: 'Bij de rechtbank Oost-Brabant werken zo’n 780 medewerkers. Onze organisatie
    bestaat uit teams in de rechtsgebieden toezicht, familie- en jeugdrecht, strafrecht,
    civiel recht en bestuursrecht. Daarnaast zijn bedrijfsvoeringsteams op gebied
    van Control, Communicatie, Facilitaire Zaken, HRM en Bestuursondersteuning. Of
    je nu gerechtsjurist, bode, administratief medewerker, rechter of adviseur bent:
    samen dragen we bij aan een rechtvaardige en tijdige rechtspraak.We behandelen
    op jaarbasis zo’n 100.000 zaken. Dat gebeurt in het Paleis van Justitie in ‘s-Hertogenbosch
    (pal naast het centraal station) en in het gerechtsgebouw in het centrum van Eindhoven.We
    zijn een organisatie met trotse medewerkers die verantwoordelijkheid nemen en
    zich ook verantwoordelijk voelen. Een organisatie waarin we samenwerking en werkplezier
    heel belangrijk vinden vanuit onze 3 kernwaarden: ‘de rechtzoekende centraal’,
    ‘aandacht voor elkaar’ en ‘we doen het samen’. Bij ons staan vertrouwen, gelijkwaardigheid
    en veiligheid hoog in het vaandel, worden talenten benut en is er voor iedereen
    ruimte om initiatieven te nemen en om te leren van fouten.We vinden het ook belangrijk
    bij te dragen aan landelijke ontwikkelingen en te investeren in specialismen.
    Zo is het Landelijk Kwaliteitsbureau Curatoren, Bewindvoerders en Mentoren (CBM)
    bij onze rechtbank ondergebracht en hebben we een kenniscentrum erfrecht opgericht.
    Onze rechtbank is bovendien aangewezen om grote strafzaken te behandelen, onder
    meer op het gebied van fraudedelicten. Daarnaast hebben we in Eindhoven de eerste
    wijkrechtbank van het land opgericht.'
