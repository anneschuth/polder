description:
  text: Uit de voormalige rechtbanken van Utrecht en Zwolle-Lelystad (locatie Lelystad)
    is op 1 januari 2013 de rechtbank Midden-Nederland ontstaan. Deze is bevoegd om
    in haar arrondissement recht te spreken in eerste aanleg. Dit betekent dat de
    rechtbank de eerste instantie is die een juridisch oordeel over een zaak of conflict
    geeft. Daarna kan een procespartij (bijvoorbeeld de veroordeelde of het Openbaar
    Ministerie (om.nl)) in hoger beroep gaan bij gerechtshof Arnhem-Leeuwarden. Bij
    rechtbank Midden-Nederland werken ongeveer 175 rechters en ruim 700 andere medewerkers
    in vaste dienst.
