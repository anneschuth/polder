  abbr: Cva
  valid_from: '1900-01-01'
description:
  text: Het College van afgevaardigden is een onafhankelijk adviesorgaan dat tot taak
    heeft de Raad voor de rechtspraak gevraagd of ongevraagd te adviseren. Het college
    toetst onder andere of de Raad de rechterlijke onafhankelijkheid wel respecteert
    bij de besluiten die hij neemt. Het college fungeert ook als klankbord en brengt
    ontwikkelingen bij de gerechten onder de aandacht van de Raad.Het College van
    Afgevaardigden bestaat uit vertegenwoordigers van de gerechten (rechtbanken en
    gerechtshoven), de Centrale Raad van Beroep en het College van Beroep voor het
    bedrijfsleven.Het wordt bij het uitvoeren van zijn werkzaamheden administratief
    ondersteund door het Bureau van de Raad voor de rechtspraak.
