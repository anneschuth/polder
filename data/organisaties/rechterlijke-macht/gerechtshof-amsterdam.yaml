description:
  text: Gerechtshof Amsterdam behandelt zaken in hoger beroep van de rechtbanken Amsterdam
    en Noord-Holland, behalve sociale-zekerheids- en ambtenarenzaken (Centrale Raad
    van Beroep) en overige zaken op het gebied van bestuursrecht (Raad van State).Jaarlijks
    behandelt het gerechtshof Amsterdam ongeveer 9.500 zaken. Bij het hof werken 350
    mensen. Het gerechtshof Amsterdam is gevestigd in het Paleis van Justitie op IJdok.Het
    gerechtshof Amsterdam wordt geleid door een bestuur onder leiding van de president.
    Het hof heeft 3 afdelingen met elk hun eigen aandachtsgebied. Daarnaast heeft
    het hof speciale rechtsgebieden. Iedere afdeling staat onder leiding van een afdelingsvoorzitter.
