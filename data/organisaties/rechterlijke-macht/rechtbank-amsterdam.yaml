description:
  text: Rechtbank Amsterdam is bevoegd om in haar arrondissement recht te spreken
    in eerste aanleg. Dit betekent dat de rechtbank de eerste instantie is die een
    juridisch oordeel over een zaak of conflict geeft. Daarna kan een procespartij
    (bijvoorbeeld de veroordeelde of het Openbaar Ministerie (om.nl)) in hoger beroep
    gaan bij gerechtshof Amsterdam. Bij rechtbank Amsterdam werken ongeveer 200 rechters
    en 800 andere medewerkers.
