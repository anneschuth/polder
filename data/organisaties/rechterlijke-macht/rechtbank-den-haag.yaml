description:
  text: Rechtbank Den Haag is bevoegd om in zijn arrondissement recht te spreken in
    eerste aanleg. Dit betekent dat de rechtbank de eerste instantie is die een juridisch
    oordeel over een zaak of conflict geeft. Daarna kan een procespartij (bijvoorbeeld
    de veroordeelde of het Openbaar Ministerie (om.nl)) in hoger beroep gaan bij gerechtshof
    Den Haag. De rechtbank is samen met gerechtshof Den Haag en het College van Beroep
    voor het bedrijfsleven gevestigd in het Haagse paleis van justitie.
