description:
  text: Gerechtshof Den Haag behandelt zaken in hoger beroep van de rechtbanken Den
    Haag en Rotterdam, behalve socialezekerheids- en ambtenarenzaken (Centrale Raad
    van Beroep) en overige zaken op het gebied van bestuursrecht (Raad van State).Gerechtshof
    Den Haag behandelt zaken uit drie rechtsgebieden in twee afdelingen en één team:•
    Team Belastingrecht• Afdeling Civiel recht• Afdeling StrafrechtHet team belastingrecht
    wordt geleid door een teamvoorzitter. De afdelingen Civiel recht en Strafrecht
    kennen een afdelingsvoorzitter. Binnen deze twee afdelingen bestaat een onderverdeling
    in teams. De teams vormen zittingscombinaties (meestal 3 raadsheren) die de zaak
    behandelen.Zo'n zittingscombinatie wordt een kamer genoemd. In de meeste gevallen
    behandelt een meervoudige kamer de zaken. Een meervoudige kamer bestaat uit drie
    raadsheren. In een enkelvoudige kamer behandelt één raadsheer de zaak.De raadsheren
    worden juridisch ondersteund door secretarissen of schrijfjuristen. Zij fungeren
    meestal ook als griffier tijdens een zitting. De griffier maakt aantekeningen
    van wat op de zitting wordt gezegd.Daarnaast heeft het hof een bureau bestuur-
    en bedrijfsondersteuning met stafmedewerkers en een secretariaat voor het bestuur.
