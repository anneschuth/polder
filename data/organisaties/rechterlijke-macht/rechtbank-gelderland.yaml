description:
  text: 'Ruim 180 rechters telt de rechtbank Gelderland. Samen met de ongeveer 660
    medewerkers behandelen zij elk jaar zo’n 140.000 rechtszaken. Dat doen zij deskundig
    en met oog voor de belangen van de individuele rechtzoekende. De rechtbank telt
    vier locaties: Apeldoorn, Arnhem, Nijmegen en Zutphen. De hoofdlocaties zijn gevestigd
    in Arnhem en Zutphen. In het Zaakverdelingsreglement (officielebekendmakingen.nl)
    staat welke zaken op welke locatie worden behandeld. Rechtbank Gelderland is de
    enige rechtbank in Nederland met een militaire kamer. Hier staan Nederlandse militairen
    terecht, die zich waar ook ter wereld misdragen.Met digitale zittingszalen op
    drie locaties is de rechtbank voorbereid op de toekomst. De Rechtspraak moderniseert
    en digitaal procederen wordt de norm. In dat proces wil de rechtbank Gelderland
    een vitale organisatie zijn, met blijvende aandacht voor zowel de eigen medewerkers
    als onze professionele partners en de rechtzoekenden.'
