description:
  text: Het College van Beroep voor het bedrijfsleven (CBb) is één van de vier hoogste
    bestuursrechters die Nederland kent. De andere drie zijn de Hoge Raad, de Afdeling
    bestuursrechtspraak van de Raad van State en de Centrale Raad van Beroep.Het CBb
    is de hoogste rechter op het gebied van het economisch bestuursrecht. Het CBb
    is zowel rechter in eerste en enige aanleg, als rechter in hoger beroep. In eerste
    en enige aanleg oordeelt het CBb over onder andere landbouwsubsidies, tarieven
    voor gezondheidszorg en telecomtarieven.In hoger beroep oordeelt het CBb over
    onder andere mestboetes en boetes voor verboden prijsafspraken. Ook treedt het
    CBb in hoger beroep op als tuchtrechter voor (register)accountants.Het College
    van Beroep voor het bedrijfsleven telt ongeveer 85 personeelsleden, waaronder
    raadsheren (rechters), juristen (gerechtsauditeurs en juridische adviseurs) en
    een administratieve ondersteuning. De raadsheren en de juristen werken in twee
    werkverbanden.De administratieve ondersteuning (bedrijfsbureau, bureau bestuursondersteuning,
    administratie) verleent ondersteuning aan het bestuur en de organisatie op het
    gebied van de financiën, personeel, facilitair, documentatie, communicatie en
    ten aanzien van het primaire proces.Het College van Beroep voor het bedrijfsleven
    wordt geleid door een bestuur, bestaande uit de president, een rechterlijk lid
    en een niet-rechterlijk lid.
