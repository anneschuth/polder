description:
  text: Gerechtshof Arnhem-Leeuwarden behandelt zaken in hoger beroep van de rechtbanken
    Gelderland, Midden-Nederland, Noord-Nederland en Overijssel, behalve socialezekerheids-
    en ambtenarenzaken (Centrale Raad van Beroep) en overige zaken op het gebied van
    bestuursrecht (Raad van State). Er werken ongeveer 400 mensen in vaste dienst.Het
    gerechtshof heeft in totaal zes afdelingen, te weten een strafafdeling en een
    civiele afdeling in zowel Arnhem als Leeuwarden. Deze afdelingen zijn weer onderverdeeld
    in teams. Daarnaast is er één belastingafdeling met teams in Arnhem en in Leeuwarden
    en één afdeling Bedrijfsvoering.
