  valid_from: '1900-01-01'
description:
  text: De Centrale Raad van Beroep is een van de vier hoogste bestuursrechters die
    Nederland kent. De andere drie zijn de Hoge Raad, de Afdeling bestuursrechtspraak
    van de Raad van State en het College van Beroep voor het bedrijfsleven.De Centrale
    Raad van Beroep oordeelt in hoger beroep over geschillen op het terrein van de
    sociale verzekeringen, de sociale voorzieningen en ambtenarenzaken.Daarnaast is
    de Centrale Raad van Beroep rechter in eerste en enige aanleg in geschillen over
    de uitvoering van wetten voor oorlogs- en vervolgingsgetroffenen en voor beroepen
    van rechterlijke ambtenaren.De Centrale Raad van Beroep wordt geleid door een
    bestuur, bestaande uit de president (voorzitter), een rechterlijk bestuurslid
    en een niet-rechterlijk bestuurslid. Het bestuur wordt ondersteund door een aantal
    adviseurs.De Centrale Raad van Beroep bestaat uit drie werkstromen:• AVI (Ambtenaren
    en Pensioenen, Sociale voorzieningen, Internationale Kamer)• Bijstand• Sociale
    verzekeringenIn deze werkstromen werken rechters, gerechtsauditeurs en gerechtsambtenaren.Daarnaast
    is er één administratie (griffie) en zijn er twee ondersteunende bureaus:• Bureau
    ondersteuning bedrijfsvoering• Wetenschappelijk Bureau
