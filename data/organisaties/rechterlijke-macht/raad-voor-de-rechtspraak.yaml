names:
- value: Raad voor de rechtspraak
  valid_from: '1900-01-01'
description:
  text: De Raad voor de rechtspraak is opgericht in 2002 als onafhankelijke buffer
    tussen de rechtspraak en de regering. De Raad hoort bij de rechterlijke macht,
    maar spreekt zelf geen recht.De Raad voor de rechtspraak is het bestuur van de
    Rechtspraak als geheel.
