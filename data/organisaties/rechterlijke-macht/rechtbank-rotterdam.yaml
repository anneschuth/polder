description:
  text: De rechtbankRechtbank Rotterdam is één van de grootste rechtbanken van Nederland.
    In Rotterdam en Dordrecht behandelen we jaarlijks 184.000 zaken. Met 1.200 medewerkers
    zetten we ons elke dag in om recht te doen aan mensen en organisaties.Met een
    gezonde dosis lef en focus op innovatie en samenwerking maken we de rechtspraak
    toegankelijker. Dat doen we met projecten waarin we samen met onze ketenpartners
    de rechtsstaat versterken, zoals wijkrechtspraak en de schuldenfunctionaris. Omdat
    we zien dat kwetsbare mensen vaker in de knel komen in onze snel veranderende
    samenleving.We werken samen hard om een toegankelijke, inclusieve organisatie
    te zijn waar iedereen zich welkom voelt. Met onze uitspraken, betrokken medewerkers
    en communicatie bouwen we elke dag aan vertrouwen in een rechtvaardige samenleving.Met
    een haven van wereldformaat in de nabijheid is de rechtbank Rotterdam gespecialiseerd
    op het terrein van (inter)nationale scheepvaart-, haven- en handelszaken. Daarnaast
    is de rechtbank exclusief bevoegd op het terrein van telecommunicatierecht, mededingingsrecht
    en financieel toezicht. Tevens behandelt de rechtbank als een van de vier rechtbanken
    in Nederland de door het Landelijk Parket en Functioneel Parket aangeleverde zwaardere
    strafzaken.De rechtbank is bevoegd om in zijn arrondissement recht te spreken
    in eerste aanleg. Dit betekent dat de rechtbank de eerste instantie is die een
    juridisch oordeel over een zaak of conflict geeft.
