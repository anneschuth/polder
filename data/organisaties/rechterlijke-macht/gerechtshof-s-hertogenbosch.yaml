description:
  text: Het gerechtshof ’s-Hertogenbosch behandelt zaken in hoger beroep van de rechtbanken
    Limburg, Oost-Brabant en Zeeland-West-Brabant, behalve socialezekerheids- en ambtenarenzaken
    (Centrale Raad van Beroep) en overige zaken op het gebied van bestuursrecht (Raad
    van State). Het hof is samen met rechtbank Oost-Brabant gevestigd in het Paleis
    van Justitie in ’s-Hertogenbosch.Het gerechtshof ’s-Hertogenbosch bestaat uit
    de teams belastingrecht, handelsrecht, familie- en jeugdrecht, strafrecht en bedrijfsvoering
    en bestuursondersteuning (BBO). Het team BBO ondersteunt het bestuur en de organisatie
    op het gebied van Personeel & Organisatie, Communicatie & Voorlichting en Planning
    & Control. Daarnaast behandelt het hof beklagzaken (ex. artikel 12 Sv). Het hof
    wordt geleid door een gerechtsbestuur.
