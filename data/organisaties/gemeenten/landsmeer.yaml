description:
  text: Landsmeer is een landelijke, groene gemeente tussen Amsterdam, Zaanstad en
    Purmerend. De gemeente bestaat uit de dorpskernen Landsmeer, Den Ilp en Purmerland
    en heeft totaal zo'n 10.000 inwoners. De drie dorpskernen vormen sinds januari
    1991 één gemeente.
  url: https://www.landsmeer.nl/bestuur_en_organisatie/organisatie
