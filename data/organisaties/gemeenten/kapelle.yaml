description:
  text: De organisatie bestaat uit ongeveer 125 medewerkers. Samen zijn zij verantwoordelijk
    voor de ontwikkeling en uitvoering van het beleid van de gemeente en het adviseren
    van het bestuur.Aan het hoofd van onze organisatie staat de gemeentesecretaris/algemeen
    directeur. De gemeentesecretaris is verantwoordelijk voor de verbinding tussen
    de ambtelijke organisatie met het bestuur en de maatschappelijke opgaven. De gemeentesecretaris
    geeft leiding aan de hele organisatie, is de eerste adviseur van het college van
    B&W en bewaakt de uitvoering van beleid. Samen met de domeinmanagers van Samenleving,
    Bedrijfsvoering en Leefomgeving vormen zij het managementteam (MT).Naast de drie
    domeinen hebben we nog de teams Control, Strategie en MT. De gemeentesecretaris
    / algemeen directeur geeft leiding aan deze teams.
