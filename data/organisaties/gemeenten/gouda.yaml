description:
  text: Gemeente Gouda is een platte organisatie. Wij werken met hart voor de stad
    en willen flexibel en snel inspringen op ontwikkelingen in de samenleving. De
    organisatie is daarom verdeeld in 4 domeinen met 4 directeuren. Deze indeling
    zorgt voor een logische structuur en samenhang; gericht op de inhoud en met aandacht
    voor de medewerkers. Daarnaast is er ook de Regionale Werkorganisatie met een
    eigen directeur.
  url: https://www.werkenvoorgouda.nl/onze-organisatie/
