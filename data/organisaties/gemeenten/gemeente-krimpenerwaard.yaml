description:
  text: 'De ambtelijke organisatie van de gemeente Krimpenerwaard is verdeeld in vier
    domeinen: Publiek Domein, Sociaal Domein, Ruimtelijk Domein en Domein Bedrijfsvoering.
    Elk domein bestaat uit verschillende teams. Ieder team heeft een teammanager die
    de teamleden coacht en richting geeft.DirectieAan het hoofd van de ambtelijke
    organisatie van de gemeente Krimpenerwaard staat de gemeentesecretaris/directeur.
    Samen met de andere directieleden is hij verantwoordelijk voor de hele organisatie.'
