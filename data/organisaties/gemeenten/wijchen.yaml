    - informatiecategorie: Overige besluiten van algemene strekking
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Wijchen%22))+AND+((dt.type==%22algemeenverbindendverklaring+van+cao-bepalingen%22+OR+dt.type==%22ander+besluit+van+algemene+strekking%22+OR+dt.type==%22bekendmaking+aan+de+scheepvaart%22+OR+dt.type==%22beleidsregel%22+OR+dt.type==%22delegatie-+of+mandaatbesluit%22+OR+dt.type==%22circulaire%22)))
      toelichting: Naast algemeen verbindende voorschriften kan de gemeente Wijchen
        ook andere besluiten van algemene strekking nemen. Dat zijn bijvoorbeeld beleidsregels,
        waarin staat hoe de gemeente bepaald beleid uitvoert.
    - informatiecategorie: Wetten en algemeen verbindende voorschriften
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Wijchen%22))+AND+((dt.type==%22algemeen+verbindend+voorschrift+(verordening)%22+OR+dt.type==%22gemeenschappelijke+regeling%22+OR+dt.type==%22ruimtelijk+plan+of+omgevingsdocument%22+OR+dt.type==%22verkeersbesluit+of+-mededeling%22+OR+dt.type==%22AMvB%22+OR+dt.type==%22Ministeriële+regeling%22+OR+dt.type==%22RijksAMvB%22+OR+dt.type==%22Rijkswet%22+OR+dt.type==%22Verbeterblad%22+OR+dt.type==%22Wet%22+OR+dt.type==%22Verdrag%22)))
      toelichting: Dit zijn regels van de overheid waaraan iedereen gebonden is. De
        Rijksoverheid maakt wetten. Voor de gemeente zijn algemeen verbindende voorschriften
        opgenomen in bijvoorbeeld een verordening of een omgevingsplan.
    - informatiecategorie: Agenda’s en besluitenlijsten bestuurscolleges
      url: https://wijchen.bestuurlijkeinformatie.nl/Agenda/Index/677c317d-684e-404e-bf35-4c191ce35445
      toelichting: In de besluitenlijsten ziet u de besluiten die het college van
        burgemeester en wethouders van Wijchen heeft genomen. De agenda's van de collegevergaderingen
        en de belisnota's worden ook gepubliceerd.
    - informatiecategorie: Adviezen
      url: https://wijchen.edataloket.eu/?sort=publicationDate:desc
    - informatiecategorie: Wetten en algemeen verbindende voorschriften
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Wijchen%22))+AND+((dt.type==%22algemeen+verbindend+voorschrift+(verordening)%22+OR+dt.type==%22gemeenschappelijke+regeling%22+OR+dt.type==%22ruimtelijk+plan+of+omgevingsdocument%22+OR+dt.type==%22AMvB%22+OR+dt.type==%22Ministeriële+regeling%22+OR+dt.type==%22RijksAMvB%22+OR+dt.type==%22Rijkswet%22+OR+dt.type==%22Verbeterblad%22+OR+dt.type==%22Wet%22+OR+dt.type==%22Verdrag%22)))
    - informatiecategorie: Beschikkingen
      url: https://wijchen.edataloket.eu/?sort=publicationDate:desc
      toelichting: Beschikkingen zijn besluiten over specifieke gevallen. Als u bijvoorbeeld
        een vergunning aanvraagt of bezwaar maakt tegen bouwplannen in uw straat,
        neemt het college van burgemeester en wethouders daar een besluit over. Dit
        heet een beschikking.
    - informatiecategorie: Woo-verzoeken en -besluiten
      url: https://wijchen.edataloket.eu/?sort=publicationDate:desc
      toelichting: Met een Woo-verzoek vraagt iemand om overheidsinformatie openbaar
        te maken. Informatie die met een Woo-verzoek wordt verstrekt wordt op dit
        moment verstrekt aan de aanvrager. In de toekomst wordt dit openbaar voor
        iedereen.
    - informatiecategorie: Andere documenten
      url: https://wijchen.edataloket.eu/?sort=publicationDate:desc
    - informatiecategorie: Jaarplannen en jaarverslagen
      url: https://www.wijchen.nl/begroting-jaarrekening-en-samenwerking
      toelichting: In de begroting staan de financiële vooruitzichten. In de jaarrekening
        staan de uitgaven van het afgelopen jaar. U kunt de stukken opvragen bij de
        griffie.
    - informatiecategorie: Klachtoordelen
      url: https://www.wijchen.nl/klacht-indienen
      toelichting: Een klacht geeft aan dat iemand niet tevreden is over hoe een ambtenaar
        zich heeft gedragen. De gemeente Wijchen behandelt deze klachten en publiceert
        daarover een jaarverslag.
    - informatiecategorie: Vergaderstukken decentrale overheden
      url: https://wijchen.bestuurlijkeinformatie.nl/
      toelichting: Deze documenten bespreekt de gemeenteraad. Dat kan een brief van
        een inwoner zijn. Of een voorstel van het college waarover de raad stemt.
        Wil de raad een voorstel wijzigen, dan heet dat een amendement. Moties zijn
        voorstellen vanuit de raad.
