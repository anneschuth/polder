description:
  text: De gemeente Wijchen voert samen met de gemeente Druten een bedrijfsvoeringsorganisatie
    voor de uitvoering van de ambtelijke taken.De Werkorganisatie Druten Wijchen is
    een samenwerkingsverband tussen de gemeenten Druten en Wijchen. De Werkorganisatie
    Druten Wijchen bestaat uit vijf domeinen met zelforganiserende teams.
  url: https://www.werkorganisatiedrutenwijchen.nl/organisatiestructuur
