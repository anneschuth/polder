description:
  text: Edam-Volendam maakt deel uit van de metropoolregio Amsterdam. De indrukwekkende
    geschiedenis, de verhalen, de cultuur, de beelden, de diversiteit (eigen(w)aardigheid)
    op kleinschalig niveau en tegelijkertijd de gemeenschappelijkheid op een hoger
    niveau, bieden een prachtige schakering in kwaliteiten.De ambtelijke organisatie
    van de gemeente Edam-Volendam is verdeeld in stafteams en afdelingen. Aan het
    hoofd van de organisatie staat de algemeen directeur / gemeentesecretaris. Als
    eerste adviseur van het college van B&W is hij verantwoordelijk voor de verbinding
    tussen de ambtelijke organisatie, het bestuur en de maatschappelijke opgaven.
    Daarnaast is de algemeen directeur rechtstreeks verantwoordelijk voor het aansturen
    van de drie stafteams. De teams Veiligheid, Bestuursondersteuning & Communicatie,
    en het Projectenbureau.Onder de algemeen directeur / gemeentesecretaris is de
    organisatie opgesplitst in vier afdelingen. De afdeling Samenleving, Ruimtelijke
    Ontwikkeling, Openbare Werken en Bedrijfsvoering. De afdelingen bestaan uit verschillende
    teams met kennis, vaardigheden en expertise op het voor hun specifieke terrein.
    De afdelingen hebben een eigen afdelingshoofd.
