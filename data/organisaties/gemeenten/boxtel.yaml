    - informatiecategorie: Woo-verzoeken en -besluiten
      url: https://open.boxtel.nl/woo-verzoeken
      toelichting: Met een Woo-verzoek vraagt iemand om overheidsinformatie openbaar
        te maken. Iedereen kan een Woo-verzoek indienen. Bekijk op deze pagina een
        overzicht van lopende en afgehandelde Woo-verzoeken.
    - informatiecategorie: Jaarplannen en jaarverslagen
      url: https://www.boxtel.nl/bestuur-en-organisatie/bestuur/begroting
