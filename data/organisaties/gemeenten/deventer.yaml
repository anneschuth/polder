description:
  text: Hoofdstuk 4. De ambtelijke organisatieArtikel 12 Inrichting van de organisatie1.Aan
    het hoofd van de ambtelijke organisatie staat de gemeentesecretaris als algemeen
    directeur.2.De organisatiebeschrijving wordt apart vastgelegd en vastgesteld door
    het college in een organogram.3.Voor het wijzigen van de organisatie gelden de
    afspraken zoals gemaakt in het Sociaal Statuut.4.De programmamanager, die leiding
    geeft aan een door de directie vastgesteld programma, stelt een programmaplan
    op waarin o.a. de programmaorganisatie wordt beschreven inclusief de toedeling
    van beslisbevoegdheden aan leden van de programmaorganisatie. De directie stelt
    het programmaplan vast.5.De wijze waarop en de voorwaarden waaronder beslisbevoegdheden
    worden verleend aan functionarissen binnen de ambtelijke organisatie wordt vastgelegd
    in de ‘Regeling tot verlening van bevoegdheden gemeente Deventer’. In deze regeling
    wordt onder meer geregeld dat bij de verlening van bevoegdheden daar waar nodig
    wordt zorggedragen voor een adequate controltechnische of wettelijke functiescheiding.Voor
    het volledige organisatiebesluit zie de volgende link:https://lokaleregelgeving.overheid.nl/CVDR740025
  url: https://www.deventer.nl/organisatie
