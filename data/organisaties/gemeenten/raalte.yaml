description:
  text: De politiek bestuurlijke organisatie van de gemeente Raalte bestaat uit de
    gemeenteraad en het College van Burgemeester en Wethouders. De gemeenteraad is
    het hoogste orgaan van onze gemeente. De raad vertegenwoordigt inwoners en neemt
    beslissingen over allerlei belangrijke zaken. Het College is het dagelijks bestuur
    van de gemeente en werkt in opdracht van de gemeenteraad.Naast de politiek bestuurlijke
    organisatie is er de ambtelijke organisatie. Iedere medewerker van de gemeente
    Raalte heeft een thuisbasis in een cluster. Dit is een groep collega’s van ongeveer
    tussen de vijf en twaalf personen met een gemeenschappelijk doel. Ieder cluster
    maakt onderdeel uit van een domein.De organisatie bestaat uit de volgende zes
    domeinen:- In domein Ruimte staat het ontwikkelen van de fysieke leefomgeving
    centraal.- Het domein Publiek is voor veel mensen het eerste aanspreekpunt van
    de gemeente.- Het domein Beheer staat voor het kwalitatief onderhouden van de
    leefomgeving.- In het domein Sociaal staat het welbevinden van inwoners centraal.-
    Het domein Samenleving werkt samen met allerlei partijen aan het mogelijk maken
    van ideeën uit de samenleving. De generalisten vallen onder domein Samenleving
    en richten zich op gemeentebrede opgaven die vaak tijdelijk van aard zijn.- Het
    domein bedrijfsvoering ondersteunt de organisatie met managementondersteuning
    en advisering op het gebied van financiën, juridisch, HR, communicatie en inkoop.-
    Tot slot vind je in het hart van de organisatie ons managementteam bestaande uit
    de domeinmanagers en de directieleden.
