description:
  text: Renswoude is een kleine gemeente met ruim 6.000 inwoners. Het heeft een centrale
    ligging, op de grens tussen Utrecht en Gelderland, en is daarmee goed bereikbaar.
    Renswoude heeft een dorps karakter met stadse vraagstukken en is daardoor altijd
    in beweging.In onze organisatie werken we met diverse teams aan onze dienstverlening,
    projecten en opgaven. Daarbij staat de vraag en behoefte vanuit de samenleving
    altijd centraal. Ook onze manier van werken is daarop ingericht. In Renswoude
    werken we namelijk plaats- en tijdonafhankelijk om goed in te kunnen spelen op
    de ontwikkelingen in de maatschappij.In Renswoude doen we ons werk op basis van
    vertrouwen. We nemen daarin onze eigen verantwoordelijkheid. We hebben een informele
    organisatie met veel onderling contact. We kennen elkaar. Deze korte lijnen zorgen
    ervoor dat je echt kunt meewerken aan het uiteindelijke resultaat dat we samen
    willen bereiken. Jouw kennis en talent doet ertoe. Als professional én als persoon
    krijg je de mogelijkheid om jouw talenten nog verder te ontwikkelen.
  url: https://www.renswoude.nl/nieuwsberichten
