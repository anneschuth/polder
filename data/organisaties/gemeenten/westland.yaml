description:
  text: Samen zorgen we voor een fijn WestlandBij de gemeente Westland zetten we ons
    elke dag in voor het prachtige Westland.We houden ons dag in dag uit bezig met
    tientallen producten en diensten.Natuurlijk doen we dit niet alleen.Wij werken
    samen met partners en Westlanders zelf en laten graag een stukje zien van wat
    wij samen allemaal doen.Allereerst zorgen wij voor de inrichting van de gemeente
    Westland,zodat onze inwoners hier prettig kunnen wonen, werken en bewegen.Ook
    zorgen wij voor het onderhoud en de veiligheid.Daarnaast denken wij graag mee
    met ondernemers over hun plannen.Want een sterke economie is belangrijk voor het
    Westland.Verder zetten wij ons in voor een gezond en actief leven van al onze
    inwoners.Hebben inwoners extra hulp nodig?Dan staan wij natuurlijk voor ze klaar.Of
    zij nou geldzorgen hebben of zo lang mogelijk thuis willen blijven wonen.Vergeet
    u ook niet om bij ons langs te komen om uw paspoort of rijbewijs te verlengen
    of wanneer u iets te vieren heeft.Samen zorgen we voor een fijn leven in het Westland.
  url: https://www.gemeentewestland.nl/bestuur-en-organisatie/over-de-organisatie
