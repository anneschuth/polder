description:
  text: 'De gemeente Bunschoten ligt in het midden van het land, in de provincie Utrecht,
    aan het Eemmeer en de A1 ligt binnen handbereik. De gemeentelijke organisatie
    van Bunschoten is als volgt ingedeeld. De gemeentesecretaris en de drie leidinggevenden
    vormen samen het Management Team (MT). Zij zijn er voor de organisatieontwikkeling
    en strategische onderwerpen, het goed verlopen van de bedrijfsvoering en om de
    teams en medewerkers ondersteuning en coaching te geven.Naast het MT zijn er vanaf
    1 januari 2025 tien teams: Omgevingsontwikkeling; Beheer & Realisatie Openbare
    Ruimte; Vergunningverlening, Toezicht & Handhaving; Samenleving; Zorg & Onderwijs;
    Buitendienst; Informatiebeheer; Dienstverlening & Communicatie; Bedrijfsvoering
    en Interne Service.'
