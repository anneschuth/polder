description:
  text: De gemeente Twenterand is een boeiende organisatie met ruim 200 medewerkers.
    Alles wat we hier doen, gebeurt direct of indirect voor de mensen die er wonen,
    werken, leven of onze gemeente bezoeken. Dit betekent werken in een klantgerichte
    omgeving waarin de mensen de leidraad zijn voor alles wat we doen. De politiek
    maakt keuzes op hoofdlijnen en bepaalt wát er moet gebeuren. De medewerkers van
    de gemeente Twenterand bedenken en organiseren hoe we het doen. We maken daarbij
    gebruik van de kracht van de samenleving en hebben oog voor de menselijke maat.
    Het gaat dus om werk wat er echt toe doet met veel verantwoordelijkheid, vrijheid
    en ruimte voor eigen initiatief en creativiteit.
