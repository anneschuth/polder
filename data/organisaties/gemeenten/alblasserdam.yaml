description:
  text: Aan het hoofd van de ambtelijke organisatie staat de gemeentesecretaris (algemeen
    directeur). De gemeentesecretaris ondersteunt en adviseert de burgemeester, het
    college en de door hen ingestelde commissies bij de uitoefening van hun bestuurlijke
    taken.De gemeentesecretaris is de schakel tussen de ambtelijke organisatie en
    het college van B&W. Ze is eindverantwoordelijk voor de bedrijfsvoering van de
    ambtelijke organisatie. De afdelingshoofden helpen haar hierbij.De dagelijkse
    leiding van de afdelingen ligt bij de afdelingshoofden en teamleiders van:- Afdeling
    Ruimtelijke en Maatschappelijke Ontwikkeling- Afdeling Buitenruimte- Team Bestuur
    & Bedrijfsvoering- Team Financiën & Control- Team Veiligheid
