description:
  text: In de gemeente Amstelveen en Aalsmeer zetten ruim 1.200 medewerkers zich in
    voor ruim 128.000 inwoners. Zij doen dat in opdracht van beide gemeenteraden en
    colleges van burgemeester en wethouders, onder leiding van de algemeen directeur
    Amstelveen-Aalsmeer. In Aalsmeer wordt nauw samengewerkt met de kernorganisatie
    Aalsmeer (KOA). De ambtelijke organisatie van de gemeenten Amstelveen en Aalsmeer
    noemen we de AA-organisatie.
