description:
  text: 'We krijgen het heus wel eens te horen: ‘Werken bij een gemeente zal wel voorspelbaar
    zijn’. Niets is minder waar. Dat roepen we niet alleen, dat laten we ook zien.  Door
    de lat wat hoger te leggen dan mensen van ons verwachten. Ook onderling naar collega’s
    doen we meer voor elkaar. Daar zijn we zuinig op. We werken nauw samen en voelen
    ons met elkaar verbonden.De gemeentelijke organisatie bestaat uit een directie
    en 13 teams. Wij bieden 550 collega’s en 56.500 inwoners de uitdagingen en kansen
    van een grote gemeente en de slagvaardigheid en geborgenheid van een kleinere
    gemeente.'
