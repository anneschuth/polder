description:
  text: De gemeentelijke organisatie heeft drie afdelingen, bestaande uit verschillende
    clusters.De clusters hebben expertise op een specifiek terrein, zoals sport, jeugd
    of parkeren. Zij werken beleid uit en bieden directe ondersteuning aan bewoners
    die dit nodig hebben, bijvoorbeeld op het gebied van participatie of werk.Zie
    voor meer informatie de link naar de uitgebreide organisatiebeschrijving.
