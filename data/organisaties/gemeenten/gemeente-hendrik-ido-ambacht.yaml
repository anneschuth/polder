description:
  text: De gemeentesecretaris/algemeen directeur ondersteunt en adviseert de burgemeester
    en het college van B&W in hun bestuurlijke taken. Als hoogste ambtenaar is de
    gemeentesecretaris verantwoordelijk voor de gemeentelijke organisatie. Hij vormt
    de schakel tussen bestuur en gemeentelijk apparaat. Door hem worden alle stukken,
    die van B&W uitgaan, mede-ondertekend. De gemeentesecretaris wordt in zijn werkzaamheden
    ondersteund door de teammanagers van de teams:- Bedrijfsvoering- Buitenruimte-
    Sociaal Domein- Ruimte en Projecten- Leefbaarheid en Veilgiheid- De Volgerlanden
