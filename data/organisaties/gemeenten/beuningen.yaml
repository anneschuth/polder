description:
  text: 'De gemeente Beuningen bestaat uit vier afdelingen: Dienstverlening, Belastingen
    & Buitenruimte, Beleid & Ontwikkeling en Informatie & Bedrijfsvoering.Hiernaast
    faciliteert de gemeente Beuningen de belastingsamenwerking Munitax. Munitax is
    het gemeentelijk belastingkantoor voor de gemeenten Berg en Dal, Beuningen, Druten,
    Heumen en Wijchen. Meer informatie is te vinden op www..muntiax.nl of https://www.munitax.nl/woo-verzoek-indienen.'
