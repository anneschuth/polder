description:
  text: De gemeente is de ‘eerste overheid’ en geeft lokaal uitvoering aan landelijke
    wet- en regelgeving. De gemeenteraadsverkiezingen zijn bepalend voor de prioriteiten
    en eigen (extra) wensen die de Wassenaarse gemeenschap aan de politiek meegeeft.
    Dit zie je terug in ons coalitieakkoord.Dat akkoord is medebepalend voor ons dagelijkse
    werk en de producten, diensten en resultaten die we als medewerkers van de ambtelijke
    organisatie leveren. Ook zijn hierin de maatschappelijke opgaven opgenomen waar
    we aan werken.
  url: https://www.wassenaar.nl/informatie-over-de-eenheden
