    - informatiecategorie: Onderzoeksrapporten
      url: https://onderzoek.eindhoven.nl/
      toelichting: Hier vind je informatie voor iedereen die geïnteresseerd is in onderzoek,
        cijfers en kaartmateriaal van de gemeente Eindhoven. Ook vind je meer informatie
        over de mogelijkheden van (open) data.
    - informatiecategorie: Convenanten
      url: https://publicaties.eindhoven.nl/openbare-informatie/convenanten
      toelichting: Vanaf 2025 publiceert de gemeente Eindhoven de convenanten. Convenanten
        die zijn vastgesteld vóór 2025 en op 1-1-2026 nog geldig zijn, zijn vindbaar
        via het raadsinformatiesysteem.
    - informatiecategorie: Agenda’s en besluitenlijsten bestuurscolleges
      url: https://raadsinformatie.eindhoven.nl/modules/12/Besluitenlijsten/view?month=all&year=2023&week=all&section=
      toelichting: In de besluitenlijst college B&W ziet u de agenda en de besluiten
        die het bestuur van de gemeente Eindhoven (het college van Burgemeester en
        Wethouders) heeft genomen.
    - informatiecategorie: Woo-verzoeken en -besluiten
      url: https://publicaties.eindhoven.nl/openbare-informatie/woo-verzoeken/afgehandelde-woo-verzoeken
      toelichting: Met een Woo-verzoek wordt gevraagd om overheidsinformatie openbaar
        te maken. Iedereen kan een Woo-verzoek indienen. Bekijk op deze pagina het
        overzicht van afgehandelde Woo-verzoeken.
    - informatiecategorie: Agenda’s en besluitenlijsten bestuurscolleges
      url: https://www.eindhoven.nl/bestuur-en-beleid/bestuur/college-van-burgemeester-en-wethouders/agendas-college-burgemeester-en
      toelichting: Het college van burgemeester en wethouders publiceert op deze pagina
        wekelijks een overzicht van de externe afspraken van de afgelopen week.
    - informatiecategorie: Beschikkingen
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Eindhoven%22))+AND+((dt.type==%22ongewenstverklaring+vreemdeling%22+OR+dt.type==%22vervreemding+erfgoed%22+OR+dt.type==%22Beschikking%22+OR+dt.type==%22andere+beschikking%22+OR+dt.type==%22andere+vergunning%22+OR+dt.type==%22evenementenvergunning%22+OR+dt.type==%22exploitatievergunning%22+OR+dt.type==%22omgevingsvergunning%22+OR+dt.type==%22vergunning+voor+activiteiten+op+of+in+oppervlaktewater%22)))
      toelichting: Beschikkingen zijn besluiten over specifieke gevallen. Als u bijvoorbeeld
        bezwaar maakt tegen bouwplannen in uw straat, neemt het college hier een besluit
        over. Dit heet een beschikking.
    - informatiecategorie: Overige besluiten van algemene strekking
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Eindhoven%22))+AND+((dt.type==%22algemeenverbindendverklaring+van+cao-bepalingen%22+OR+dt.type==%22ander+besluit+van+algemene+strekking%22+OR+dt.type==%22bekendmaking+aan+de+scheepvaart%22+OR+dt.type==%22beleidsregel%22+OR+dt.type==%22delegatie-+of+mandaatbesluit%22+OR+dt.type==%22circulaire%22+OR+dt.type==%22verkeersbesluit+of+-mededeling%22)))
      toelichting: Naast algemene verbindende voorschriften kan de gemeente Eindhoven
        ook andere besluiten van algemene strekking nemen. Dat zijn dan bijvoorbeeld
        beleidsregels, waarin de gemeente aangeeft hoe zij bepaald beleid uitvoert.
    - informatiecategorie: Adviezen
      url: https://publicaties.eindhoven.nl/openbare-informatie/adviezen-van-adviescommissies
      toelichting: De gemeenteraad en het college van B en W krijgen over veel onderwerpen
        advies. Een aantal van die adviezen maken we openbaar. Als het advies komt
        van een gemeentelijk adviescollege of –commissie. Of van een externe partij
        die om advies is gevraagd.
    - informatiecategorie: Bij vertegenwoordigende organen ingekomen stukken
      url: https://eindhoven.notubiz.nl/modules/1/ingekomen_stukken/view
      toelichting: De gemeenteraad ontvangt regelmatig brieven of e-mails van inwoners,
        organisaties of andere overheden. Om privacy redenen staan ingekomen stukken
        van inwoners geanonimiseerd op de website.
    - informatiecategorie: Vergaderstukken decentrale overheden
      url: https://www.eindhoven.nl/bestuur-en-beleid/bestuur/gemeenteraad
      toelichting: De gemeenteraad vertegenwoordigt de inwoners van Eindhoven. Samen
        met het college van burgemeester en wethouders (B en W) vormt de gemeenteraad
        het bestuur van de gemeente.
    - informatiecategorie: Jaarplannen en jaarverslagen
      url: https://www.eindhoven.nl/bestuur-en-beleid/organisatie/financien
      toelichting: Het college van burgemeester en wethouders verantwoordt elk jaar
        aan de gemeenteraad wat er dat jaar is bereikt en welke plannen zijn uitgevoerd.
        Zo kan de raad haar toezichthoudende rol goed vervullen.
    - informatiecategorie: Wetten en algemeen verbindende voorschriften
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Eindhoven%22))+AND+((dt.type==%22algemeen+verbindend+voorschrift+(verordening)%22+OR+dt.type==%22gemeenschappelijke+regeling%22+OR+dt.type==%22ruimtelijk+plan+of+omgevingsdocument%22+OR+dt.type==%22AMvB%22+OR+dt.type==%22Ministeri%C3%ABle+regeling%22+OR+dt.type==%22RijksAMvB%22+OR+dt.type==%22Rijkswet%22+OR+dt.type==%22Verbeterblad%22+OR+dt.type==%22Wet%22+OR+dt.type==%22Verdrag%22)))
      toelichting: Wetten en algemeen verbindende voorschriften zijn de regels die
        de overheid voorschrijft. De Rijksoverheid maakt wetten. Ook de gemeente Eindhoven
        kan regels opstellen. Dat heet dan niet een wet, maar bijvoorbeeld een algemeen
        verbindend voorschrift.
