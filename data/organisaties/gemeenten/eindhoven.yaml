description:
  text: De gemeenteraad vertegenwoordigt de inwoners van Eindhoven. Samen met het
    college van burgemeester en wethouders (B en W) vormt de gemeenteraad het bestuur
    van de gemeente.Het college van burgemeester en wethouders is verantwoordelijk
    voor het dagelijks bestuur van Eindhoven op basis van een gezamenlijk beleidsprogramma
    voor 4 jaar.Naast de wethouders zijn er twee stadsgezanten benoemd. Deze gezanten
    zijn bedoeld om - op bestuurlijk niveau - een doorbraak of versnelling voor elkaar
    te krijgen op complexe maatschappelijke opgaven. Opgaven die erg belangrijk zijn
    voor de samenleving in onze stad en die vragen om extra aandacht en focus. De
    stadsgezanten gaan nauw samenwerken met het stadsbestuur en hun netwerk binnen
    en buiten de gemeentelijk organisatie. Beide gezanten vallen bestuurlijk onder
    de portefeuilles van hun partijgenoten in het college.De gemeentelijke organisatie
    bestaat uit 14 sectoren en het Van Abbemuseum, aangestuurd door de directieraad
    (DR). De gemeentesecretaris is voorzitter van de directieraad. Zie voor nadere
    toelichting de uitgebreide organisatiebeschrijving.
  url: https://www.eindhoven.nl/bestuur-en-beleid/organisatie/gemeentelijke-organisatie
