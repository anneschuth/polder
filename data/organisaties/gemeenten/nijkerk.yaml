description:
  text: 'De organisatie van de gemeente Nijkerk is ingericht volgens een matrix onder
    leiding van de directie met lijnsturing (teamleiders en teams).Het directieteam
    bestaat uit de gemeentesecretaris/ algemeen directeur en drie concernmanagers.
    Elke manager geeft leiding aan een van de drie taakvelden: Ruimte, Sociaal of
    Bedrijfsvoering en Externe dienstverlening.'
