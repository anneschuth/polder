description:
  text: De gemeente Bergen ligt in Noord-Limburg, in het hart van Nationaal Park De
    Maasduinen. Afferden, Aijen, Bergen, Nieuw Bergen, Siebengewald, Well en Wellerlooi
    zijn de dorpskernen van de gemeente.De organisatie van de gemeente Bergen bestaat
    uit de afdelingen Staf, Ruimte & Samenleving en Bedrijfsvoering & Dienstverlening.
