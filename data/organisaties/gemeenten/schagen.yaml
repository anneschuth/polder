description:
  text: Thuis in gemeente SchagenVan bollenvelden tot aan de kust. Van winkelen in
    de stad, of uitwaaien aan het strand. Met prachtige dorpen is er voor elk wat
    wils in de Kop van Noord-Holland. Een gemeente waar je jezelf kunt zijn en waar
    je je veilig voelt. Waar je kunt groeien en ontwikkelen. Waar je geluk en voldoening
    vindt. Waar we ons graag thuis voelen.Dat thuisgevoel is anders voor iedereen.
    Door ons te omringen met de mensen van wie we houden, door ons huis in te richten
    op een manier die bij ons past en door een omgeving te creëren waarin we ons comfortabel
    en veilig voelen. Thuis in gemeente Schagen is er voor alle inwoners, ongeacht
    achtergrond, leeftijd, gender of culturele achtergrond.Samen dragen wij bij aan
    een veilige, duurzame en gezonde gemeente Schagen. Een gemeente waarin we trots
    zijn en die we graag laten zien en van ons laten horen. Waar je de mensen om je
    heen kent, de bakker, de slager en de fietsenmaker, wie je ook bent en wat je
    ook doet. Thuis is iets bijzonders en persoonlijks.Bij ons kun je jezelf ontwikkelen
    en groeien in de richting die jij voor ogen hebt. Samen met jouw collega’s is
    het een plek waar je kunt blijven leren en jezelf uitdagen. Een organisatiecultuur
    en werkgever die je aangenaam zullen verrassen. Thuis is waar je jas hangt. Thuis
    is in gemeente Schagen.
  url: https://www.schagen.nl/organisatie
