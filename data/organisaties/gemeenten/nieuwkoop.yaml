description:
  text: 'Gemeente Nieuwkoop is de gemeente voor de kernen: Ter Aar, Korteraar, Langeraar,
    De Meije (gedeeltelijk), Nieuwkoop, Nieuwveen, Noordeinde, Noorden, Noordse Dorp,
    Papenveer, Vrouwenakker, Woerdense Verlaat en Zevenhoven. Via de link vindt u
    informatie over de inrichting van de organisatie en werkwijze.'
  url: https://www.nieuwkoop.nl/hoe-werkt-de-gemeente
