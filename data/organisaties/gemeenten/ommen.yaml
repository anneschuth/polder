description:
  text: De ambtelijke organisatie is opgedeeld in vijf verschillende clusters die
    elk verantwoordelijk zijn voor specifieke beleidsterreinen en operationele taken.
    Aan het hoofd van de clusters staat de algemeen directeur.Het cluster Beleid en
    ontwikkeling richt zich op strategische beleidsadvisering en het ontwikkelen van
    beleid dat bestuurlijke en maatschappelijke impact heeft voor Ommen.Het cluster
    Concern en ondersteuning biedt ondersteuning op het gebied van bestuurlijke en
    administratieve processen en organisatiebrede taken zoals concern control, HRM,
    communicatie en het bestuurssecretariaat.Het cluster Regie en coördinatie coördineert
    en organiseert de uitbestede taken en samenwerkingen met externe partijen, zoals
    het beheer van het openbaar gebied, ICT, handhaving en het sociaal domein.Het
    cluster Zwembaden en accommodaties beheert en onderhoudt de gemeentelijke sportfaciliteiten,
    waaronder het zwembad en sportaccommodaties, en biedt zwemlessen en recreatieve
    activiteiten.Het cluster Samen doen fungeert als frontoffice voor het sociaal
    domein en richt zich op dienstverlening binnen de participatiewet, WMO en jeugdwet.
  url: https://www.ommen.nl/bestuur-organisatie/organisatiebeschrijving/
