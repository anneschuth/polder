description:
  text: Het organisatie-ontwerp toont de wijze waarop wij zijn georganiseerd. Het
    organisatieontwerp is zó georganiseerd dat het flexibel is en geschikt om veranderende
    maatschappelijke vraagstukken aan te pakken. Het is een logisch gevolg van de
    organisatiefilosofie en maakt de organisatieontwikkeling vanaf 2017 mogelijk.Het
    organisatiemodel voor Meierijstad is opgebouwd uit verschillende schijven die
    de ordeningsprincipes in beeld brengen. De raadsleden vormen samen met de samenleving
    de eerste schijf in het model. Dit vanwege de bestuurlijk rol die zij heeft binnen
    de samenleving. Zij is in gesprek met de verschillende klantgroepen en halen bij
    hen hun input.In het midden van de tweede schijf, dat ook het vertrekpunt is voor
    de bestuurlijk agenda, staan de Mijlpalen van Meierijstad. Het college van burgemeester
    en wethouders geeft uitvoering aan de Mijlpalen van Meierijstad. De collegeleden
    zijn individueel programmabestuurder van een van de programma’s. De griffie vormt
    de schakel tussen de raad en het college. De klantgroepen staan rondom de thema’s
    sociaal-maatschappelijk, ruimtelijk/economie en bedrijfsvoering weergegeven.In
    de derde schijf stuurt de directie de ambtelijke organisatie aan. Alle inhoudelijke
    professionals zitten in een werkatelier en zijn georganiseerd vanuit de thema’s
    sociaalmaatschappelijk, ruimtelijk/economisch en bedrijfsvoering. Afhankelijk
    van een (bestuurlijke) ontwikkel opgave neemt een medewerker deel aan een of meerdere
    popup(s). Leidinggevenden als professionals werken vanuit het netwerk. Programmadragers
    regisseren binnen en tussen thema’s hun programma. Ook in deze schijf staan de
    klantgroepen rondom de thema’s in relatie tot de verschillende programma’s, werkateliers
    en pop-ups.
  url: https://www.meierijstad.nl/Alle_onderwerpen/Bestuur_en_organisatie/Meierijstad/Organisatiefilosofie
