description:
  text: Onze vijf beloften aan uIn Bernheze streven we naar een gemeenschap waarin
    het fijn wonen is voor iedereen. Met meer dan 200 medewerkers zorgen we voor leefbare
    kernen, duurzame landbouw en economie en een weerbare en veilige samenleving.Hoewel
    politiek belangrijk is, merkt u in uw dagelijks leven vooral onze dienstverlening.
    Of het nu gaat om het ophalen van afval, het aanvragen van een paspoort of het
    doen van een geboorte- of verhuisaangifte. Wij willen dat dit gewoon goed geregeld
    is.Daarom beloven we u 5 dingen. U kunt ons hieraan houden. Dit houdt ons scherp
    en zorgt ervoor dat u tevreden bent.
  url: https://www.bernheze.org/bestuur-en-organisatie/over-ons/
