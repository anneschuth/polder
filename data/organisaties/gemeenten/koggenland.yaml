description:
  text: De (ambtelijke) organisatie van de gemeente Koggenland bestaat uit een directie
    en de drie afdelingen Dienstverlening, Bedrijfsvoering en Bestuur. De Algemeen
    directeur/ Gemeentesecretaris vormt samen met de afdelingshoofden het Directie
    Management Team (DMT) en samen met de teamleiders van de afdelingen het groot
    MT (GMT).
  url: https://www.koggenland.nl/organisatiestructuur
