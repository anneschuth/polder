description:
  text: 'De organisatie van de gemeente Ameland is vormgegeven volgens het directiemodel.
    De gemeentelijke organisatie wordt aangestuurd door een secretaris-directeur,
    twee adjunct-directeuren en een bedrijfsleider buitendienst. Binnen de clusters
    van de binnen- en buitendienst werken medewerkers in kleine teams aan de vele
    verschillende taken van de gemeente volgens onze kernwaarden: lef, samenwerking
    en integriteit.'
