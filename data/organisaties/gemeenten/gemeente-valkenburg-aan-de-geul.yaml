description:
  text: De gemeente Valkenburg aan de Geul heeft 3 bestuursorganen, de Gemeenteraad,
    het College van Burgemeester en Wethouders en de Burgemeester.De ambtelijke organisatie
    ondersteunt deze bestuursorganen en voert de besluiten uit.De gemeenteraad, bestaande
    uit 17 raadsleden, wordt ondersteund door de griffie. De griffie bij de gemeente
    Valkenburg aan de Geul bestaat uit de griffier en het secretariaat.Het college
    wordt gevormd door de burgemeester en wethouders. In Valkenburg aan de Geul zijn
    er momenteel vier wethouders. Het college wordt ondersteund door de gemeentesecretaris/algemeen
    directeur .Aan het hoofd van de ambtelijke organisatie staat de gemeentesecretaris/algemeen
    directeur.
