description:
  text: De gemeente Terneuzen telt zo'n 55.000 inwoners en is daarmee de grootste
    gemeente van Zeeland. De gemeente Terneuzen is in 2003 ontstaan door samenvoeging
    van de voormalige gemeenten Axel, Sas van Gent en Terneuzen. De gemeente Terneuzen
    bestaat uit veertien kernen, namelijk Axel, Biervliet, Hoek, Koewacht, Overslag,
    Philippine, Sas van Gent, Sluiskil, Spui, Terneuzen, Westdorpe, Zaamslag, Zandstraat
    en Zuiddorpe.De medewerkers van het team Publiekszaken behandelen uw vraag als
    eerste. Zij beantwoorden de algemene vragen en sturen zo nodig vragen door naar
    de vakafdeling.
