description:
  text: De gemeenteraad, het college van burgemeester en wethouders en de burgemeester
    zijn de bestuursorganen van de gemeente Haaksbergen. De gemeenteraad (algemeen
    bestuur) wordt ondersteund door de griffie. De gemeenteraad is het hoogste orgaan
    en wordt door de inwoners van de gemeente gekozen. De raad neemt besluiten voor
    de gemeente.
  url: https://www.haaksbergen.nl/gemeentebestuur/Organisatiegegevens.html
