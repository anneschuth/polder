description:
  text: De ambtelijke organisatie ondersteunt het gemeentebestuur en voert allerlei
    gemeentelijke taken uit. De medewerkers werken vanuit het gemeentehuis in Odijk.
    De gemeentelijke organisatie wordt geleid door de directeur/gemeentesecretaris,
    Mark van der Jagt. Hij vormt de verbinding tussen het college van burgemeester
    en wethouders en de ambtenaren en vormt samen met de afdelingshoofden het managementteam
    (MT). De organisatie bestaat uit vijf afdelingen, elk met verschillende teams.
  url: https://www.bunnik.nl/bestuur-en-organisatie/overig/onze-organisatie
