description:
  text: 'Gemeentelijke organisatieDe gemeentelijke organisatie bestaat uit de Gemeentesecretaris
    / Algemeen directeur en drie afdelingen: de stafafdeling Organiseren, afdeling
    Samenleving, Team Zorg en veiligheid en de afdeling Wonen en Werken. De organisatie
    als geheel wordt geleid door het Management Team. De gemeente Uithoorn werkt daarnaast
    ook intensief samen met de gemeente Ouder-Amstel en Diemen in de gezamenlijke
    bedrijfsvoeringsorganisatie Duo+.Stafafdeling OrganiserenDeze afdeling zorgt ervoor
    dat de organisatie goed functioneert. De afdeling Organiseren houdt zich bezig
    met bedrijfsvoering waaronder financiën, communicatie en participatie, en met
    algemene bestuurlijke zaken en dienstverlening. De afdeling ondersteunt daarin
    de organisatie.Afdeling Samenleving, Team Zorg en veiligheidDe afdeling Samenleving
    richt zich op het welzijn en perspectief van de inwoners met als uitgangspunt
    inwoners zo volwaardig mogelijk deel te laten nemen aan de samenleving. Het houdt
    zich bezig met onderwerpen als werk en inkomen, jeugd en gezin, sociale voorzieningen,
    sport, cultuur, onderwijs en veiligheid.Afdeling Wonen en WerkenDe afdeling Wonen
    en Werken richt zich op het behouden en versterken van een leefomgeving waarin
    het plezierig wonen, werken en recreëren is. Het houdt zich bezig met de openbare
    ruimte en onderwerpen als  duurzaamheid, groenbeleid,  afvalwater en riolering.Management
    TeamHet Management Team is verantwoordelijk voor het functioneren van de ambtelijke
    organisatie als geheel. Zij bestaat uit de gemeentesecretaris (directielid) en
    de hoofden van de afdelingen. De gemeentesecretaris is eindverantwoordelijk.Duo+Duo+
    voert een aantal taken voor de gemeente Uithoorn, Ouder-Amstel en Diemen. Het
    gaat hier om taken zoals bijvoorbeeld vergunningen, toezicht en handhaving, dienstverlening
    (o.a. burgerzaken), beheer openbare ruimte, sociale zaken en bedrijfsvoeringstaken(o.a.
    ICT, financiën, personeelszaken). De gemeenten zijn zelfstandig en hebben ieder
    hun eigen gemeenteraden en colleges. Meer informatie duoplus.nl'
  url: https://www.uithoorn.nl/Home/Bestuur_en_organisatie/Gemeentelijke_organisatie
