description:
  text: 'De gemeentelijke organisatie heeft een tweehoofdigedirectie: de gemeentesecretaris
    ende concerndirecteur. Onder hun leiding is deorganisatie verdeeld in zeven onderdelen,die
    we clusters noemen. Elk cluster is verantwoordelijkvoor een specifieke groep takendie
    bij elkaar horen. Binnen elk cluster zijn erverschillende afdelingen. Elke afdeling
    heefteen afdelingshoofd. Deze afdelingshoofdenwerken nauw samen met de clustermanagerom
    het cluster te leiden. Samen vormen ze hetCluster Management Team, afgekort als
    CMT.'
  url: https://www.arnhem.nl/Bestuur/organisatie/Staat_van_de_Organisatie
