description:
  text: 'De gemeente Zwartewaterland werkt hard aan haar organisatie, waarbij de inwoner
    centraal staat. De gemeente werkt procesmatig. Beleid wordt geïntegreerd ontwikkeld
    en uitgevoerd. De cultuur van de organisatie is resultaatgericht.De eenhedenDe
    opbouw van de organisatie bestaat uit vier eenheden met een duidelijke focus op
    de inwoner.Externe Dienstverlening: bedient inwoners aan de balieBeheer openbare
    ruimte: bedient inwoners ''in de maatschappij''Bedrijfsvoering: bedient medewerkers
    in de organisatieSociaal Domein: bedient inwoners op het gebied van zorg, werk
    en inkomen, jeugdStrategie & Control bedient bestuur en directie.'
