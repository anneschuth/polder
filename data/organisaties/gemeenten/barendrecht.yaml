description:
  text: De organisatie bestaat uit een Managementteam (MT) met de gemeentesecretaris
    en concernmanagers. De concernmanagers geven leiding aan cluster Dienstverlening,
    Veiligheid en Bestuur, cluster Leefomgeving, cluster Buitenruimte en cluster Sociaal.
    De ondersteunende bedrijfsvoeringstaken zijn belegd bij De BedrijfsvoeringsPartner.
