description:
  text: De gemeente heeft een gemeentebestuur. Dit gemeentebestuur bestaat uit een
    dagelijks bestuur (het college van burgemeester en wethouders) en een algemeen
    bestuur (de gemeenteraad). De burgemeester is voorzitter van de gemeenteraad en
    voorzitter van het college van burgemeester en wethouders. De burgemeester is
    ook verantwoordelijk voor openbare orde en veiligheid. De griffier vormt de linking
    pin tussen de gemeenteraad en de directeur (gemeentesecretaris) van de gemeente.
    De bestuursadviseur valt rechtstreeks onder de directeur. De directeur heeft de
    leiding over de ambtelijke organisatie. Tevens valt de bestuursadviseur onder
    de directeur.
  url: https://www.pekela.nl/Onderwerpen
