description:
  text: De organisatie van de gemeente Westerwolde bestaat uit één directeur en drie
    afdelingen. De gemeentelijke organisatie heeft ongeveer 270 medewerkers.Directie:Harby
    Scheper is algemeen directeur, voorzitter van het managementteam en de gemeentesecretaris.Afdelingen:De
    gemeente Westerwolde heeft drie afdelingen. Aan het hoofd van elke afdeling staat
    een manager. De managers vormen gezamenlijk met de gemeentesecretaris het Managementteam
    (MT). De afdelingen bestaan weer uit een aantal teams met aan het hoofd een teamleider.Afdeling
    Dienstverlening:De afdeling Dienstverlening richt zich op de inwoners van de gemeente
    en de interne bedrijfsvoering van de gemeentelijke organisatie. Onder de afdeling
    vallen de volgende teams:- Team Externe Klant- Team Financiën & Juridisch- Team
    Informatie- Facilitair & Gegevensbeheer- HRM- Secretariaat- CommunicatieAfdeling
    Samenleving:De afdeling Samenleving gaat over de zorg en ondersteuning van onze
    inwoners. We noemen dit ook wel het Sociaal Domein. Onder de afdeling vallen de
    volgende teams:- Team Wet Maatschappelijke Ondersteuning (WMO)- Team Participatie-
    Team Jeugd & Veiligheid- Team Beleid- Team Welzijn, Sport & OnderwijsAfdeling
    Ruimte:De afdeling Ruimte gaat over onze fysieke leefomgeving. Denk hierbij aan
    gebouwen, wegen, economie, toerisme en de groenvoorziening in onze gemeente. Onder
    de afdeling vallen de volgende teams:- Team Openbare Werken- Team Ruimtelijk Beheer-
    Team Ruimtelijke Ontwikkeling
