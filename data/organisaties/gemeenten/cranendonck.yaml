description:
  text: Cranendonck ligt aan de A2 tussen Eindhoven en Weert en is ontstaan op 1 januari
    1997 door samenvoeging van Budel en Maarheeze. De kernen Budel, Budel-Dorplein,
    Budel-Schoot, Gastel, Maarheeze en Soerendonk vormen sindsdien samen de gemeente
    Cranendonck. De gemeente heeft een oppervlakte van circa 78,14 km2.Cranendonck
    is een gemeente die continu in ontwikkeling is. Ambitieus, op zoek naar kansen
    en toekomstgericht. Dit betekent dat ook de organisatie hierop ingericht is. We
    maken samen plannen, stellen beleid op en werken steeds meer samen met onze inwoners.
  url: https://www.cranendonck.nl/over-cranendonck
