  wooIndex:
    documentLocatie:
    - informatiecategorie: Convenanten
      url: https://www.woensdrecht.nl/publicaties-convenanten-woo
      toelichting: Een convenant is een afspraak van de overheid met een of meer partijen,
        gericht op het behalen van bepaalde (beleids-)doelen.
    - informatiecategorie: Vergaderstukken decentrale overheden
      url: https://woensdrecht.bestuurlijkeinformatie.nl/
      toelichting: Raadsvoorstellen en -besluiten
    - informatiecategorie: Woo-verzoeken en -besluiten
      url: https://www.woensdrecht.nl/woo-verzoeken-en-besluiten
      toelichting: Met een Woo-verzoek vraagt iemand om overheidsinformatie voor iedereen
        openbaar te maken. Informatie die met een Woo-verzoek wordt verstrekt wordt
        voor iedereen openbaar. Hier vindt u de samenvatting van diverse woo-verzoeken
        en de besluiten.
    - informatiecategorie: Jaarplannen en jaarverslagen
      url: https://www.woensdrecht.nl/publicaties-jaarverslagen-woo
      toelichting: In het kader van de Wet open overheid worden de adviezen uit de
        categorie Jaarverslagen van de Wet open overheid hier gepubliceerd.
    - informatiecategorie: Vergaderstukken decentrale overheden
      url: https://channel.royalcast.com/gemeentewoensdrecht/#!/upcoming
      toelichting: Live verslagen gemeenteraad
    - informatiecategorie: Vergaderstukken decentrale overheden
      url: https://woensdrecht.bestuurlijkeinformatie.nl/
      toelichting: Deze documenten bespreekt de gemeenteraad. Dat kan een brief van
        een inwoner zijn. Of een voorstel van het college waarover de raad stemt.
        Wil de raad een voorstel wijzigen, dan heet dat een amendement. Moties zijn
        voorstellen vanuit de raad.
    - informatiecategorie: Agenda’s en besluitenlijsten bestuurscolleges
      url: https://www.woensdrecht.nl/collegevergaderingen
      toelichting: De agenda's van de collegevergaderingen worden voorafgaand aan
        de vergadering gepubliceerd. In de besluitenlijsten ziet u de besluiten die
        het college van gemeente Woensdrecht tijdens deze vergadering heeft genomen.
    - informatiecategorie: Beschikkingen
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Woensdrecht%22))+AND+((dt.type==%22ongewenstverklaring+vreemdeling%22+OR+dt.type==%22vervreemding+erfgoed%22+OR+dt.type==%22Beschikking%22+OR+dt.type==%22andere+beschikking%22+OR+dt.type==%22andere+vergunning%22+OR+dt.type==%22evenementenvergunning%22+OR+dt.type==%22exploitatievergunning%22+OR+dt.type==%22omgevingsvergunning%22+OR+dt.type==%22vergunning+voor+activiteiten+op+of+in+oppervlaktewater%22)))
      toelichting: Beschikkingen zijn besluiten over specifieke gevallen. Als u bijvoorbeeld
        bezwaar maakt tegen bouwplannen in uw straat, neemt het college hier een besluit
        over. Dit heet een beschikking.
    - informatiecategorie: Overige besluiten van algemene strekking
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Woensdrecht%22))+AND+((dt.type==%22algemeenverbindendverklaring+van+cao-bepalingen%22+OR+dt.type==%22ander+besluit+van+algemene+strekking%22+OR+dt.type==%22bekendmaking+aan+de+scheepvaart%22+OR+dt.type==%22beleidsregel%22+OR+dt.type==%22delegatie-+of+mandaatbesluit%22+OR+dt.type==%22circulaire%22+OR+dt.type==%22verkeersbesluit+of+-mededeling%22)))
      toelichting: Naast algemene verbindende voorschriften kan gemeente Woensdrecht
        ook andere besluiten van algemene strekking nemen. Dat zijn dan bijvoorbeeld
        beleidsregels, waarin de gemeente aangeeft hoe zij bepaald beleid uitvoert.
    - informatiecategorie: Klachtoordelen
      url: https://www.woensdrecht.nl/woo-klachtoordelen
      toelichting: In het kader van de Wet open overheid worden de publicaties uit
        de categorie Klachtoordelen van de Wet open overheid hier gepubliceerd.
    - informatiecategorie: Wetten en algemeen verbindende voorschriften
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Woensdrecht%22))+AND+((dt.type==%22algemeen+verbindend+voorschrift+(verordening)%22+OR+dt.type==%22gemeenschappelijke+regeling%22+OR+dt.type==%22ruimtelijk+plan+of+omgevingsdocument%22+OR+dt.type==%22AMvB%22+OR+dt.type==%22Ministeriële+regeling%22+OR+dt.type==%22RijksAMvB%22+OR+dt.type==%22Rijkswet%22+OR+dt.type==%22Verbeterblad%22+OR+dt.type==%22Wet%22+OR+dt.type==%22Verdrag%22)))
      toelichting: Dit zijn de regels die de overheid voorschrijft. De Rijksoverheid
        maakt wetten. Ook de gemeente kan regels opstellen. Dat heet dan niet een
        wet, maar bijvoorbeeld een algemeen verbindend voorschrift.
    - informatiecategorie: Adviezen
      url: https://www.woensdrecht.nl/publicaties-adviezen-woo
      toelichting: In het kader van de Wet open overheid worden de publicaties uit
        de categorie Adviezen van de Wet open overheid hier gepubliceerd.
    - informatiecategorie: Vergaderstukken decentrale overheden
      url: https://woensdrecht.bestuurlijkeinformatie.nl/Calendar
      toelichting: Vergaderschema (met bijgebehorende vergaderstukken) van de gemeenteraad.
    - informatiecategorie: Onderzoeksrapporten
      url: https://www.woensdrecht.nl/onderzoeksrapporten
      toelichting: Een enorme verzameling aan gegevens over bevolking, wonen, voorzieningen,
        economie, zorg en welzijn die u kunt vergelijken met andere plaatsen in Nederland.
