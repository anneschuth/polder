  wooIndex:
    documentLocatie:
    - informatiecategorie: Agenda’s en besluitenlijsten bestuurscolleges
      url: https://buren.bestuurlijkeinformatie.nl/Reports/Details/fbbc3f24-d158-4eac-af83-662d07e273f9
      toelichting: In de besluitenlijsten ziet u de besluiten die het college van
        burgemeester en wethouders van Buren heeft genomen. In de conceptagenda ziet
        u welke agendapunten tijdens de komende collegevergadering besproken worden.
    - informatiecategorie: Woo-verzoeken en -besluiten
      url: https://www.buren.nl/woo-verzoeken
      toelichting: Met een Woo-verzoek vraagt iemand om overheidsinformatie voor iedereen
        openbaar te maken. Informatie die met een Woo-verzoek wordt verstrekt wordt
        voor iedereen openbaar. Hier vindt u de besluiten en de openbaargemaakte informatie.
    - informatiecategorie: Wetten en algemeen verbindende voorschriften
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Buren%22))+AND+((dt.type==%22algemeen+verbindend+voorschrift+(verordening)%22+OR+dt.type==%22gemeenschappelijke+regeling%22+OR+dt.type==%22ruimtelijk+plan+of+omgevingsdocument%22+OR+dt.type==%22AMvB%22+OR+dt.type==%22Ministeriële+regeling%22+OR+dt.type==%22RijksAMvB%22+OR+dt.type==%22Rijkswet%22+OR+dt.type==%22Verbeterblad%22+OR+dt.type==%22Wet%22+OR+dt.type==%22Verdrag%22)))
      toelichting: Dit zijn regels van de overheid waaraan iedereen gebonden is. De
        Rijksoverheid maakt wetten. Voor de gemeente zijn algemeen verbindende voorschriften
        opgenomen in bijvoorbeeld een verordening of een omgevingsplan.
    - informatiecategorie: Jaarplannen en jaarverslagen
      url: https://www.buren.nl/bestuur/gemeentelijke-financien/
      toelichting: In de jaarstukken, kadernota en voortgangsrapportages leest u welke
        taken de gemeente uitvoert. In de begroting staan de financiële vooruitzichten.
        In de jaarrekening staan de uitgaven van het afgelopen jaar.
    - informatiecategorie: Vergaderstukken decentrale overheden
      url: https://buren.bestuurlijkeinformatie.nl/Calendar
      toelichting: Deze documenten bespreekt de gemeenteraad. Dat kan een brief van
        een inwoner zijn. Of een voorstel van het college waarover de raad stemt.
        Wil de raad een voorstel wijzigen, dan heet dat een amendement. Moties zijn
        voorstellen vanuit de raad.
    - informatiecategorie: Beschikkingen
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Buren%22))+AND+((dt.type==%22ongewenstverklaring+vreemdeling%22+OR+dt.type==%22vervreemding+erfgoed%22+OR+dt.type==%22Beschikking%22+OR+dt.type==%22andere+beschikking%22+OR+dt.type==%22andere+vergunning%22+OR+dt.type==%22evenementenvergunning%22+OR+dt.type==%22exploitatievergunning%22+OR+dt.type==%22omgevingsvergunning%22+OR+dt.type==%22vergunning+voor+activiteiten+op+of+in+oppervlaktewater%22)))
      toelichting: Beschikkingen zijn besluiten over specifieke gevallen. Als u bijvoorbeeld
        een vergunning aanvraagt of bezwaar maakt tegen bouwplannen in uw straat,
        neemt het college van burgemeester en wethouders daar een besluit over. Dit
        heet een beschikking.
    - informatiecategorie: Overige besluiten van algemene strekking
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Buren%22))+AND+((dt.type==%22algemeenverbindendverklaring+van+cao-bepalingen%22+OR+dt.type==%22ander+besluit+van+algemene+strekking%22+OR+dt.type==%22bekendmaking+aan+de+scheepvaart%22+OR+dt.type==%22beleidsregel%22+OR+dt.type==%22delegatie-+of+mandaatbesluit%22+OR+dt.type==%22circulaire%22+OR+dt.type==%22verkeersbesluit+of+-mededeling%22)))
      toelichting: Naast algemeen verbindende voorschriften kan de gemeente Buren
        ook andere besluiten van algemene strekking nemen. Dat zijn bijvoorbeeld beleidsregels,
        waarin staat hoe de gemeente bepaald beleid uitvoert.
    - informatiecategorie: Klachtoordelen
      url: https://www.buren.nl/direct-regelen/bestuurlijk/klacht-of-bezwaar/klacht/
      toelichting: Een klacht geeft aan dat iemand niet tevreden is over hoe een ambtenaar
        zich heeft gedragen. De gemeente Buren behandelt deze klachten, maar publiceert
        nog geen klachtoordelen. Op de pagina leest u informatie over de behandeling
        van klachten.
