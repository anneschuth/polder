description:
  text: De gemeenteraad en het college van burgemeester en wethouders vormen het bestuur
    van de gemeente Bergeijk. De gemeenteraad wordt ondersteund door de griffie. De
    gemeenteraad is het hoogste orgaan en wordt door de inwoners van de gemeente gekozen.
    De raad neemt besluiten voor de gemeente.Het college van burgemeester en wethouders
    zijn verantwoordelijk voor het dagelijks bestuur van de gemeente Bergeijk. De
    gemeentesecretaris is algemeen directeur van de ambtelijke organisatie en is tevens
    de eerste adviseur van de burgemeester en het college van B&W.Aan het hoofd van
    elke afdeling staat een afdelingshoofd. De afdelingshoofden vormen samen met de
    gemeentesecretaris het managementteam. De vier afdelingen zijn opgedeeld in clusters.
    Onderstaand worden taken en bevoegdheden van de clusters beschreven.
