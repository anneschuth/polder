description:
  text: Smallingerland is een gemeente in Friesland met ruim 56.000 inwoners, goed
    bereikbaar in het hart van Noord-Nederland, nabij Groningen en Drenthe. Rondom
    onze hoofdplaats Drachten liggen 13 dorpen verspreid over de unieke Friese Wouden.
