description:
  text: 'Gemeente Haarlemmermeer is strategisch gelegen tussen de steden Amsterdam,
    Haarlem en Leiden. Voor de drooglegging in 1852 was het Haarlemmermeer een belangrijke
    scheepvaartroute tussen de Hollandse steden.In de gemeente Haarlemmermeer zetten
    dagelijks 1200 gemeenteambtenaren zich in voor ruim 163.000 inwoners. Zij doen
    dat samen met de gemeenteraad, het college van burgemeester en wethouders en onder
    leiding van het directieteam.In onze dienstverlening staan 4 serviceprincipes
    centraal: makkelijk, betrouwbaar, menselijk en verbonden.'
