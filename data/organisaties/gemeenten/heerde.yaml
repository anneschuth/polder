description:
  text: "De gemeente Heerde is een gemeente op de Noordoost Veluwe. De gemeente heeft\
    \ iets minder dan 20.000 inwoners.Binnen de gemeentelijke organisatie werken ongeveer\
    \ 215 medewerkers, verdeeld over 5 afdelingen:•\tSociaal Maatschappelijke Verbinding•\t\
    Ruimte, Ondernemen en Wonen•\tRealisatie, Onderhoud & Beheer•\tDienstverlening\
    \ en Informatiebeheer•\tBedrijfs- en Bestuursondersteuning en –AdviseringDe gemeente\
    \ heeft meerdere locaties: het gemeentekantoor, STIP, de gemeentewerf en het Raadhuis.\
    \ Meer informatie op: www.heerde.nl"
