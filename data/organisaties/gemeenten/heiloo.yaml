description:
  text: De gemeenteraad is het hoogste bestuursorgaan. De gemeenteraad bepaalt de
    hoofdlijnen van het beleid en controleert of het beleid goed wordt uitgevoerd.
    Eens in de 4 jaar kiezen de inwoners de raadsleden. De raadsleden zijn dus uw
    volksvertegenwoordigers.De gemeenteraad bestaat uit 19 leden. De burgemeester
    is de voorzitter en de griffier ondersteunt en adviseert de gemeenteraad.
  url: https://www.heiloo.nl/raad-en-college
