  wooIndex:
    documentLocatie:
    - informatiecategorie: Wetten en algemeen verbindende voorschriften
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Moerdijk%22))+AND+((dt.type==%22algemeen+verbindend+voorschrift+(verordening)%22+OR+dt.type==%22gemeenschappelijke+regeling%22+OR+dt.type==%22ruimtelijk+plan+of+omgevingsdocument%22+OR+dt.type==%22verkeersbesluit+of+-mededeling%22+OR+dt.type==%22AMvB%22+OR+dt.type==%22Ministeriële+regeling%22+OR+dt.type==%22RijksAMvB%22+OR+dt.type==%22Rijkswet%22+OR+dt.type==%22Verbeterblad%22+OR+dt.type==%22Wet%22+OR+dt.type==%22Verdrag%22)))
      toelichting: Dit zijn regels van de overheid waaraan iedereen gebonden is. De
        Rijksoverheid maakt wetten. Voor de gemeente zijn algemeen verbindende voorschriften
        opgenomen in bijvoorbeeld een verordening of een bestemmingsplan
    - informatiecategorie: Agenda’s en besluitenlijsten bestuurscolleges
      url: https://www.moerdijk.nl/bestuur-organisatie/college-bw/
      toelichting: Het college van burgemeester en wethouders vergadert iedere week.
        In de agenda’s staat vermeld welke onderwerpen er worden besproken. In de
        besluitenlijsten ziet u de besluiten die het college heeft genomen.
    - informatiecategorie: Beschikkingen
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Moerdijk%22))+AND+((dt.type==%22ongewenstverklaring+vreemdeling%22+OR+dt.type==%22vervreemding+erfgoed%22+OR+dt.type==%22Beschikking%22+OR+dt.type==%22andere+beschikking%22+OR+dt.type==%22andere+vergunning%22+OR+dt.type==%22evenementenvergunning%22+OR+dt.type==%22exploitatievergunning%22+OR+dt.type==%22omgevingsvergunning%22+OR+dt.type==%22vergunning+voor+activiteiten+op+of+in+oppervlaktewater%22)))
      toelichting: Beschikkingen zijn besluiten over specifieke gevallen. Als u bijvoorbeeld
        bezwaar maakt tegen bouwplannen in uw straat, neemt het college hier een besluit
        over. Dit heet een beschikking.
    - informatiecategorie: Overige besluiten van algemene strekking
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Moerdijk%22))+AND+((dt.type==%22algemeenverbindendverklaring+van+cao-bepalingen%22+OR+dt.type==%22ander+besluit+van+algemene+strekking%22+OR+dt.type==%22bekendmaking+aan+de+scheepvaart%22+OR+dt.type==%22beleidsregel%22+OR+dt.type==%22delegatie-+of+mandaatbesluit%22+OR+dt.type==%22circulaire%22)))
      toelichting: Naast algemene verbindende voorschriften kan gemeente Moerdijk
        ook andere besluiten van algemene strekking nemen. Dat zijn dan bijvoorbeeld
        beleidsregels, waarin de gemeente aangeeft hoe zij bepaald beleid uitvoert.
    - informatiecategorie: Vergaderstukken decentrale overheden
      url: https://moerdijk.bestuurlijkeinformatie.nl/
      toelichting: Deze documenten bespreekt de gemeenteraad. Dat kan een brief van
        een inwoner zijn. Of een voorstel van het college waarover de raad stemt.
        Wil de raad een voorstel wijzigen, dan heet dat een amendement. Moties zijn
        voorstellen vanuit de raad.
    - informatiecategorie: Jaarplannen en jaarverslagen
      url: https://www.moerdijk.nl/bestuur-organisatie/financiele-documenten/
      toelichting: In Moerdijk laten we in de jaarstukken, kadernota en voortgangsrapportages
        zien welke taken we uitvoeren. In de begroting kijken we financieel vooruit.
        In de jaarrekening laten we de uitgaven van het afgelopen jaar zien.
    - informatiecategorie: Woo-verzoeken en -besluiten
      url: https://www.moerdijk.nl/bestuur-organisatie/ingediende-woo-verzoeken/
      toelichting: Met een Woo-verzoek vraagt iemand om overheidsinformatie voor iedereen
        openbaar te maken. Informatie die met een Woo-verzoek wordt verstrekt wordt
        voor iedereen openbaar. Hier vindt u de besluiten en de openbaar gemaakte
        informatie
    - informatiecategorie: Klachtoordelen
      url: https://open.moerdijk.nl/
      toelichting: Een klacht geeft aan dat een inwoner niet tevreden is over hoe
        een ambtenaar zich heeft gedragen. Gemeente Moerdijk behandelt deze klachten
        en publiceert een actueel jaaroverzicht van de formeel afgehandelde klachten.
