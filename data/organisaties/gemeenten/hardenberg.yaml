description:
  text: 'Op deze pagina leggen we uit hoe de ambtelijke organisatie van onze gemeente
    is opgebouwd. En welk domein verantwoordelijk is voor welke taken.Aan het hoofd
    van onze organisatie staat de gemeentesecretaris / algemeen directeur. Deze persoon
    is verantwoordelijk voor de afdelingen Concernstaf en Concerncontrol. En geeft
    leiding aan het CMT (Concern Management Team).Het concernmanagementteam (CMT)
    bepaalt de organisatiebrede kaders. Het CMT bestaat uit de algemeen directeur
    en de vier concernmanagers (Ruimtelijk Domein, Maatschappelijk Domein, Openbaar
    Gebied en Bedrijfsvoering). Het CMT overlegt elke week over organisatiebrede onderwerpen
    en voorstellen. En overlegt meerdere keren per jaar met het college.Het concern
    bestaat uit verschillende clusters. Zij werken aan de verbinding tussen samenleving,
    bestuur en organisatie. Taken die onder het concern vallen zijn: control, informatieveiligheid
    en gegevensbescherming, bestuurs- en managementondersteuning (zoals secretariaat
    collegeleden), openbare orde & veiligheid, organisatieontwikkeling en informatiemanagement.Een
    uitgebreid overzicht van de domeinen (afdelingen) en teams vindt u via bijgaand
    website-adres.'
  url: https://www.hardenberg.nl/organisatie/organisatiestructuur/organogram
