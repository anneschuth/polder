description:
  text: Groot genoeg om kansen te krijgen, klein genoeg om kansen te creëren.Bij de
    gemeente Asten werken we samen aan een fijne en veilige plek om te wonen en te
    werken voor iedereen. We staan dicht bij onze inwoners en zorgen ervoor dat ze
    gehoord worden. We hebben een open houding, zijn professioneel, luisteren en denken
    mee. We zijn flexibel, klantgericht, omgevingsbewust en we hebben oog voor elkaar.
  url: https://www.werkenbijasten.nl/
