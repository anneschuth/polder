description:
  text: De gemeente Maasdriel ligt in het prachtige rivierenlandschap van de Bommelerwaard.
    Door de centrale ligging in Nederland, aan de A2, het spoor en de rivieren de
    Maas en de Waal, biedt Maasdriel vele mogelijkheden voor bedrijvigheid en voor
    landelijk wonen op korte afstand van diverse grote steden. De gemeente is op 1
    januari 1999 ontstaan door een samenvoeging van de gemeenten Ammerzoden, Hedel,
    Heerewaarden, Maasdriel en Rossum. Het omvat sindsdien 11 mooie dorpen, met elk
    zijn eigen karakteristieken en geschiedenis. De gemeente Maasdriel telt ongeveer
    26.000 inwoners. Met ruim 2.600 kleine en grote (innovatieve) bedrijven is Maasdriel
    met recht een ondernemende gemeente te noemen.
