description:
  text: De gemeente Leidschendam-Voorburg is een lokale overheidsinstantie die verantwoordelijk
    is voor het besturen en beheren van de gemeente. Haar taken en bevoegdheden omvatten
    onder andere:Ruimtelijke ordening en stedelijke ontwikkeling,  openbare voorzieningen
    en onderhoudsociale zaken, onderwijs en jeugd, maatschappelijke ondersteuning
    en welzijn, veiligheid en handhaving, milieu en duurzaamheid en burgerzakenDe
    gemeente voert haar taken uit binnen de kaders van landelijke en provinciale wetgeving,
    met eigen beleidsvrijheid binnen deze kaders.
