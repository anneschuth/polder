description:
  text: 'Bij Velsen zet je jezelf dagelijks in voor verbetering en groei van onze
    organisatie en gemeente. In de gemeente Velsen is het nooit saai. Dit komt vooral
    door verschillende dorpskernen, ieder met zijn eigen identiteit.Levendige havens
    met industrie, brede duinen met daarachter de zee. Watersport, veelzijdige kunst
    en cultuur, groene parken en landgoederen. Een drukbevaren Noordzeekanaal: Velsen
    biedt veel afwisseling voor wonen, werken, ondernemen en ontspannen. Ruim 500
    medewerkers dragen dagelijks hun steentje bij om al het moois in de gemeente te
    behouden en verder te ontwikkelen. Samen werken we voor bijna 70.000 Velsenaren
    aan een vitale en leefbare gemeente.Velsen bestaat uit 7 kernen:- IJmuiden- Driehuis-
    Santpoort-Noord- Santpoort-Zuid- Velserbroek- Velsen-Noord- Velsen-ZuidOnze dienstverlening
    richt zich op een leefbare en aantrekkelijke gemeente waarin iedereen meedoet.
    Waarin we in energiek samenspel aan een duurzame toekomst werken. Samen staan
    we sterker. Daarom maakt Velsen deel uit van de Metropoolregio Amsterdam (MRA).
    Dit is een bestuurlijk samenwerkingsverband van gemeenten en provincies rondom
    Amsterdam.'
  url: https://www.velsen.nl/organisatiestructuur-gemeente-velsen
