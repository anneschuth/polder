description:
  text: De gemeentelijke organisatie van Putten is in de basis een afdelingsmodel.
    De organisatie bestaat uit drie afdelingen:- Dienstverlening- Samenleving- RuimteIedere
    afdeling heeft een eigen manager en iedere afdeling bestaat uit vier teams. Alleen
    het team Buitendienst heeft een eigen leidinggevende, de bedrijfsleider. Zie voor
    de teams het organogram. In de organisatieregeling is aangegeven welk team verantwoordelijk
    is voor welke onderwerpen.
