description:
  text: Son en Breugel is een groene, Brabantse gemeente met ruim 18.000 inwoners
    waar het goed wonen, werken en verblijven is. De ligging van bedrijvenpark Ekkersrijt
    binnen de gemeentegrenzen, zorgt ook voor stedelijke bedrijvigheid. Samen met
    ongeveer 80 collega's werken we samen met bewoners, bedrijven en maatschappelijke
    partners aan onze lokale en regionale opgaven op het gebied van ruimtelijke ontwikkeling,
    economie, duurzaamheid, wonen, milieu, welzijn, veiligheid en mobiliteit.
  url: https://www.sonenbreugel.nl/over-de-gemeente
