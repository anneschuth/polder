description:
  text: 'Purmerend en Beemster zijn vanaf 1 januari 2022 samen de nieuwe gemeente
    Purmerend. Je kan ons vinden ten noorden van Amsterdam. Onze gemeente is een thuis
    voor bijna 100.000 inwoners. Beemster, Centrum, Gors, Overwhere, Purmer-Noord,
    Purmer-Zuid, Wheermolen en Weidevenne zijn onze wijken. Wist je dat Beemster de
    werelderfgoedstatus heeft? Binnen onze organisatie kennen wij drie domeinen: het
    maatschappelijk domein, het ruimtelijk domein en het domein bedrijfsvoering.'
