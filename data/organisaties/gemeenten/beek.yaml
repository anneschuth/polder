description:
  text: 'De gemeenteraad, bestaande uit 17 raadsleden,  wordt ondersteund door de
    griffie. De griffie bij de gemeente Beek bestaat uit de griffier en zijn plaatsvervanger.Het
    college wordt gevormd door de burgemeester en wethouders. In Beek zijn er momenteel
    drie wethouders.Het college wordt ondersteund door de gemeentesecretaris/algemeen
    directeur en een directiesecretaris.Aan het hoofd van de ambtelijke organisatie
    staat de gemeentesecretaris/algemeen directeur. In Beek wordt de gemeentesecretaris
    ondersteund door een directiesecretaris.Beek bestaat uit drie afdelingen: afdeling
    Samenleving, afdeling Ruimte en afdeling Bestuurs- en Managementondersteuning
    (BMO).Afdeling Samenleving:Team Publiekszaken;Team Beleid;Team Wijkteam WMO/Jeugd.Afdeling
    Ruimte:Team Ondersteuning, Omgevingsplannen, Vergunningen en Toezicht (OOVT);Team
    Beleid, Ontwikkeling en Projecten (BOP);Team Wijkbeheer (WB).Afdeling BMO:Team
    Advies;Team Ondersteuning;Team Administratie;Team Informatiemanagement.'
  url: https://cuatro.sim-cdn.nl/beek/uploads/organogram_2025.pdf?cb=elPcsIdd
