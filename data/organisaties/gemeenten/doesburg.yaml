description:
  text: De gemeentesecretaris stuurt de ambtelijke organisatie Doesburg aan. Deze
    is georganiseerd rondom drie pijlers, namelijk Fysiek, Samenleving en Dienstverlening.
    In het organogram is weergeven welke afdelingen binnen de pijlers vallen.Een meer
    gedetailleerde indeling naar taakvelden die vallen binnen de verschillende afdelingen
    volgt nog.
