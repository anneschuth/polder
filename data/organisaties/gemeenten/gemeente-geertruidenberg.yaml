    documentLocatie:
    - informatiecategorie: Vergaderstukken decentrale overheden
      url: https://www.geertruidenberg.nl/raadsvergaderingen
      toelichting: Deze documenten bespreekt de gemeenteraad. Dat kan een brief van
        een inwoner zijn. Of een voorstel van het college waarover de raad stemt.
        Wil de raad een voorstel wijzigen, dan heet dat een amendement. Moties zijn
        voorstellen vanuit de raad.
    - informatiecategorie: Bij vertegenwoordigende organen ingekomen stukken
      url: https://geertruidenberg.bestuurlijkeinformatie.nl/Reports/Details/989ec444-33c7-48eb-93f8-7fe14fd21a33
      toelichting: Hier staan de ingekomen stukken van de Raad. Deze kunnen ter kennisgeving
        worden aangenomen of worden geagendeerd voor de Raadsvergadering.
    - informatiecategorie: Overige besluiten van algemene strekking
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Geertruidenberg%22))+AND+((dt.type==%22algemeenverbindendverklaring+van+cao-bepalingen%22+OR+dt.type==%22ander+besluit+van+algemene+strekking%22+OR+dt.type==%22bekendmaking+aan+de+scheepvaart%22+OR+dt.type==%22beleidsregel%22+OR+dt.type==%22delegatie-+of+mandaatbesluit%22+OR+dt.type==%22circulaire%22+OR+dt.type==%22verkeersbesluit+of+-mededeling%22)))
      toelichting: Naast algemeen verbindende voorschriften kan de gemeente Geertruidenberg
        ook andere besluiten van algemene strekking nemen. Dat zijn bijvoorbeeld beleidsregels,
        waarin staat hoe de gemeente bepaald beleid uitvoert.
    - informatiecategorie: Wetten en algemeen verbindende voorschriften
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Geertruidenberg%22))+AND+((dt.type==%22algemeen+verbindend+voorschrift+(verordening)%22+OR+dt.type==%22gemeenschappelijke+regeling%22+OR+dt.type==%22ruimtelijk+plan+of+omgevingsdocument%22+OR+dt.type==%22AMvB%22+OR+dt.type==%22Ministeriële+regeling%22+OR+dt.type==%22RijksAMvB%22+OR+dt.type==%22Rijkswet%22+OR+dt.type==%22Verbeterblad%22+OR+dt.type==%22Wet%22+OR+dt.type==%22Verdrag%22)))
      toelichting: Dit zijn regels van de overheid waaraan iedereen gebonden is. De
        Rijksoverheid maakt wetten. Voor de gemeente zijn algemeen verbindende voorschriften
        opgenomen in bijvoorbeeld een verordening of een bestemmingsplan.
    - informatiecategorie: Beschikkingen
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Geertruidenberg%22))+AND+((dt.type==%22ongewenstverklaring+vreemdeling%22+OR+dt.type==%22vervreemding+erfgoed%22+OR+dt.type==%22Beschikking%22+OR+dt.type==%22andere+beschikking%22+OR+dt.type==%22andere+vergunning%22+OR+dt.type==%22evenementenvergunning%22+OR+dt.type==%22exploitatievergunning%22+OR+dt.type==%22omgevingsvergunning%22+OR+dt.type==%22vergunning+voor+activiteiten+op+of+in+oppervlaktewater%22)))
      toelichting: Beschikkingen zijn besluiten over specifieke gevallen. Als u bijvoorbeeld
        een vergunning aanvraagt of bezwaar maakt tegen bouwplannen in uw straat,
        neemt het college van burgemeester en wethouders daar een besluit over. Dit
        heet een beschikking.
