  abbr: Schiermonnikoog
  valid_from: '1900-01-01'
description:
  text: 'Schiermonnikoog is met ongeveer 950 inwoners de kleinste gemeente van Nederland.Schiermonnikoog
    drijft in economische zin vooral op toerisme met 300.000 gasten per jaar. Een
    groot deel van ons eiland heeft de status van Nationaal Park. Wij willen een goed
    voorzieningenniveau voor onze inwoners en gasten. Een uitdaging voor onze kleine,
    zelfstandige gemeente.De organisatie bestaat uit ongeveer 35 medewerkers die een
    goede dienstverlening aan onze inwoners en gemeentebestuur leveren. De meeste
    collega’s maken deel uit van de eilander gemeenschap. Daarnaast hebben we met
    een aantal andere gemeenten dienstverleningsovereenkomsten voor de inhuur van
    deskundigheid op bepaalde vakgebieden. De lijnen tussen inwoners, bestuur en medewerkers
    zijn kort. Onze ambitie is: ingewikkelde zaken zo eenvoudig mogelijk oplossen
    en dichtbij de mensen staan.'
