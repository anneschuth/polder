description:
  text: Hoe is de gemeente Veere georganiseerd?De gemeente Veere maakt keuzes en voert
    op basis van deze besluiten allerlei taken uit voor haar inwoners. Dat gebeurt
    allemaal op uiteenlopende niveaus en door verschillende mensen in onze organisatie.
    Zo controleert de gemeenteraad het college van B&W, bepalen de burgemeester en
    de wethouders de politieke koers en voeren de afdelingen de werkzaamheden uit
    die daaruit voortkomen. In de figuur die u op onderstaande web-pagina te zien
    krijgt, ziet u hoe de gemeente Veere is georganiseerd.Verder leest u op deze pagina
    een nadere beschrijving per afdeling en hoe de verschillende bevoegdheden zijn
    geregeld.
