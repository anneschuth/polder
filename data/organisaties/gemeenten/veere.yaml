    - informatiecategorie: Bij vertegenwoordigende organen ingekomen stukken
      url: https://veere.raadsinformatie.nl/modules/1/ingekomen_stukken/view
      toelichting: Stukken die binnen komen bij de gemeenteraad. Voorbeelden van dergelijke
        stukken zijn verzoeken, klachten of voorstellen. Brieven over individuele
        gevallen worden niet automatisch openbaar gemaakt.
    - informatiecategorie: Woo-verzoeken en -besluiten
      url: https://veere.raadsinformatie.nl/modules/8/Bestuursdocumenten/view?month=all&year=2024&week=all&module_filter%5Bselect%5D%5B46%5D=none&module_filter%5Bselect%5D%5B52%5D=none&module_filter%5Brange%5D%5B7%5D%5Bdata_type%5D=datetime&module_filter%5Brange%5D%5B44%5D%5Bdata_type%5D=datetime&section=
      toelichting: Met een Woo-verzoek kan aan de gemeente worden verzocht om bepaalde
        informatie openbaar te maken. Dit Woo-verzoek, het besluit dat daarop genomen
        wordt en de documenten die op grond van het verzoek verstrekt zijn, worden
        openbaar gemaakt.
    - informatiecategorie: Jaarplannen en jaarverslagen
      url: https://veere.begrotingonline.nl/
      toelichting: Een jaarplan beschrijft welke doelen de gemeente komend jaar wil
        halen, hoe die doelen gehaald moeten worden en welke middelen zullen worden
        ingezet. Een jaarverslag beschrijft achteraf wat er in het afgelopen jaar
        daadwerkelijk is gedaan en bereikt.
    - informatiecategorie: Vergaderstukken decentrale overheden
      url: https://veere.raadsinformatie.nl/dashboard
      toelichting: Documenten die ter bespreking worden voorgelegd aan de gemeenteraad
        tijdens de raadsvergadering.  Een verslag beschrijft wat tijdens de vergadering
        is besproken.  Een besluitenlijst geeft een overzicht van de uiteindelijk
        genomen beslissingen.
    - informatiecategorie: Vergaderstukken Staten-Generaal
      url: https://www.tweedekamer.nl/contact-en-bezoek/wet-open-overheid-woo#:~:text=Iedereen%20mag%20bij%20de%20Tweede,%2C%20amendementen%2C%20verslagen%20en%20moties.
      toelichting: Niet van toepassing voor de gemeente Veere.
    - informatiecategorie: Agenda’s en besluitenlijsten bestuurscolleges
      url: https://www.veere.nl/agendas-en-besluitenlijsten
      toelichting: De agenda is een omschrijving van de te bespreken onderwerpen.
        De besluitenlijst geeft een korte omschrijving van de genomen beslissingen.
        Het openbaar maken van de stukken die op de agenda staan, of de notulen, is
        op grond van de Woo niet verplicht.
    - informatiecategorie: Subsidieverplichtingen anders dan met beschikking
      url: https://www.rijksoverheid.nl/ministeries/ministerie-van-buitenlandse-zaken/contact/woo-verzoek-indienen
      toelichting: Niet van toepassing voor de gemeente Veere want deze categorie
        komt alleen voor het bij het ministerie van Buitenlandse zaken.
