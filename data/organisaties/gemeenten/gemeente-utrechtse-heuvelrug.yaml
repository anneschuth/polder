    documentLocatie:
    - informatiecategorie: Wetten en algemeen verbindende voorschriften
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Utrechtse+Heuvelrug%22))+AND+((dt.type==%22algemeen+verbindend+voorschrift+(verordening)%22+OR+dt.type==%22gemeenschappelijke+regeling%22+OR+dt.type==%22ruimtelijk+plan+of+omgevingsdocument%22+OR+dt.type==%22AMvB%22+OR+dt.type==%22Ministeriële+regeling%22+OR+dt.type==%22RijksAMvB%22+OR+dt.type==%22Rijkswet%22+OR+dt.type==%22Verbeterblad%22+OR+dt.type==%22Wet%22+OR+dt.type==%22Verdrag%22)))
      toelichting: Dit zijn de regels die de overheid voorschrijft. De Rijksoverheid
        maakt wetten. Ook de gemeente kan regels opstellen. Dat heet dan niet een
        wet, maar bijvoorbeeld een algemeen verbindend voorschrift.
    - informatiecategorie: Bij vertegenwoordigende organen ingekomen stukken
      url: https://utrechtseheuvelrug.qualigraf.nl/app/public/postin
      toelichting: Ingekomen stukken zijn documenten die door externe partijen aan
        de gemeente(raad) zijn gericht, zoals brieven, e-mails en andere correspondentie
        van inwoners, bedrijven en organisaties.
    - informatiecategorie: Jaarplannen en jaarverslagen
      url: https://www.heuvelrug.nl/financien
      toelichting: Wilt u weten hoe en waaraan de gemeente geld uitgeeft? Bekijk dan
        de jaarrekening, begroting, kadernota en bestuursrapportages. Deze staan op
        de website van de gemeente.
    - informatiecategorie: Agenda’s en besluitenlijsten bestuurscolleges
      url: https://www.heuvelrug.nl/besluitenlijsten
      toelichting: Op deze pagina treft u de agenda en besluiten die het dagelijks
        bestuur (college van B&W) van de gemeente Utrechtse Heuvelrug heeft genomen.
    - informatiecategorie: Beschikkingen
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Utrechtse+Heuvelrug%22))+AND+((dt.type==%22ongewenstverklaring+vreemdeling%22+OR+dt.type==%22vervreemding+erfgoed%22+OR+dt.type==%22Beschikking%22+OR+dt.type==%22andere+beschikking%22+OR+dt.type==%22andere+vergunning%22+OR+dt.type==%22evenementenvergunning%22+OR+dt.type==%22exploitatievergunning%22+OR+dt.type==%22omgevingsvergunning%22+OR+dt.type==%22vergunning+voor+activiteiten+op+of+in+oppervlaktewater%22)))
      toelichting: Een beschikking is een besluit in een concreet geval. Het verlenen
        van een bouwvergunning is een voorbeeld van een beschikking.
    - informatiecategorie: Overige besluiten van algemene strekking
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Utrechtse+Heuvelrug%22))+AND+((dt.type==%22algemeenverbindendverklaring+van+cao-bepalingen%22+OR+dt.type==%22ander+besluit+van+algemene+strekking%22+OR+dt.type==%22bekendmaking+aan+de+scheepvaart%22+OR+dt.type==%22beleidsregel%22+OR+dt.type==%22delegatie-+of+mandaatbesluit%22+OR+dt.type==%22circulaire%22+OR+dt.type==%22verkeersbesluit+of+-mededeling%22)))
      toelichting: Naast algemene verbindende voorschriften kan gemeente Utrechtse
        Heuvelrug ook andere besluiten van algemene strekking nemen. Dat zijn dan
        bijvoorbeeld beleidsregels, waarin de gemeente aangeeft hoe zij bepaald beleid
        uitvoert.
