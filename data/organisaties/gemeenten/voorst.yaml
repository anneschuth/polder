description:
  text: 'De gemeente Voorst is een aantrekkelijke Gelderse gemeente gelegen tussen
    IJssel en Veluwe. Een gemeente met ongeveer 25.000 inwoners die wonen in twaalf
    kernen: Bussloo, De Vecht, Klarenbeek, Nijbroek, Posterenk, Steenenkamer, Terwolde,
    Teuge, Twello, Voorst, Wilp en Wilp-Achterhoek.'
  url: https://www.voorst.nl/over-voorst
