description:
  text: Gemeente Hillegom wordt bestuurd door een college van burgemeester en wethouders,
    ondersteund door de gemeenteraad. De burgemeester is verantwoordelijk voor openbare
    orde, veiligheid, politie en brandweer. Het college bestaat uit de burgemeester,
    vier wethouders en de gemeentesecretaris. De gemeenteraad, bestaande uit gekozen
    leden, stelt het beleid vast en controleert het college. Hillegom werkt samen
    met de gemeenten Lisse en Teylingen onder de naam HLTsamen voor efficiënte dienstverlening.
    Daarnaast zijn er diverse commissies, zoals de commissie voor bezwaarschriften
    en de rekenkamercommissie, die specifieke taken uitvoeren.
