description:
  text: De gemeente Wierden is een moderne gemeente in Twente op de grens van stad
    en platteland met bijna 25.000 inwoners. Een gemeente die volop in ontwikkeling
    is. Niet alleen op het gebied van wonen, werken en recreëren, maar ook als organisatie.
    Onder de noemer 'Expeditie Wierden' werken we er aan onze organisatie nog beter
    aan te laten sluiten op de wensen van de inwoners. Want dat is tenslotte waar
    we het allemaal voor doen! Ieder voor zich in een eigen functie, maar vooral samen
    in deze kleine, maar fijne organisatie.
  url: https://www.wierden.nl/organisatie
