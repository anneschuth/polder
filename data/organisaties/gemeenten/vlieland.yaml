description:
  text: 'Een hele kleine gemeente die voor grote uitdagingen staat. We willen zelfstandig
    blijven, zorgen dat jonge mensen op het eiland willen (blijven) wonen, de voorzieningen
    voor onze inwoners en gasten op peil houden en werken aan een duurzame toekomst.
    Dit doen we met een team van circa 30 mensen, 10 bij de buitendienst en ongeveer
    20 bij de binnendienst: team beleid en team uitvoering & ondersteuning. We zijn
    allemaal generalist binnen ons eigen vakgebied en hebben veel vrijheid en verantwoordelijkheid.
    We zijn zelfstandig maar werken wel samen, zowel onderling als met de andere Waddeneilanden
    en Friese gemeenten aan de vaste wal. De sfeer is informeel en de lijnen zijn
    kort.'
