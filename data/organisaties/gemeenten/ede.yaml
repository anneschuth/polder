description:
  text: Bij de gemeente Ede werken ongeveer 1150 medewerkers (1090 fte), exclusief
    mensen die we inhuren. De gemeentelijke organisatie bestaat uit een concerndirectie
    (de gemeentesecretaris/algemeen directeur en drie concerndirecteuren) en 27 afdelingen.
    Samen met inwoners, ondernemers en organisaties bouwen we aan de toekomst van
    Ede. Samenwerken over afdelingsgrenzen en organisatiegrenzen staat hierbij centraal.We
    doen dit in ketens van beleid tot uitvoering, bijvoorbeeld van het maken van plannen
    tot het aanleggen van een nieuwe fietsroute. Daarnaast pakken we organisatiebreed
    vraagstukken op in programma’s, zoals de ontwikkeling van Hoogbouw Ede Zuid. Daar
    zorgen we voor betere woningen, een prettige leefomgeving en goede voorzieningen.Meer
    informatie over onze organisatie staat op www.werkenbijede.nl
  url: https://www.ede.nl/bestuur-en-organisatie/organisatie
