description:
  text: 'Wij zijn Haarlem en Zandvoort. 1 organisatie voor 2 gemeenten. Onze stad met haar rijke geschiedenis
    en ons oude vissersdorp als badplaats voor plezier en ontspanning. We leven van het Spaarne tot de
    zee – dit maakt ons uniek. We vinden elkaar in de wijken en we weten: iedere wijk heeft zijn eigen
    karakter. Samen, met inwoners, ondernemers en partners, zetten we ons in voor Haarlem en Zandvoort.
    Samen voor fijn wonen, samenleven, inspirerend ondernemen en bezoeken, nu en in de toekomst. Waar
    iedereen zich welkom voelt en waar je kunt zijn wie je bent.'
  url: https://organisaties.overheid.nl/38688/Gemeente_Haarlem
