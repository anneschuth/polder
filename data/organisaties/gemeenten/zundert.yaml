description:
  text: 'Gemeente Zundert staat voor groen, gedreven en gemeenschapszin. Wij willen
    een zelfstandige gemeente zijn die flexibel meebeweegt met de maatschappij. Daarom
    bieden wij onze inwoners en ondernemers volop ruimte en support tot initiatief
    en zelfontplooiing. Hiermee wil de gemeente een vitale, veilige en bruisende leefomgeving
    creëren waarbij we met elkaar bouwen aan een mooie toekomst.Wij werken met 170
    collega’s opgavegericht in programma’s en in samenwerking met partners. Onze organisatiewaarden
    zijn eigenaarschap en autonomie, een betekenisvolle bijdrage leveren, leren en
    ontwikkelen. We gaan voor een dienstverlenende en talent gedreven organisatie!In
    de organisatie hebben we vier programma’s: Veilig en weerbaar Zundert, Aantrekkelijk
    en ondernemend Zundert, Dienstverlenend en betrokken Zundert, Sociaal en Vitaal
    Zundert.'
  url: https://www.zundert.nl/fileadmin/Zundert/Documenten/Bestuur_en_politiek/Netwerkbegroting_Programma_Zundert_2025.png
