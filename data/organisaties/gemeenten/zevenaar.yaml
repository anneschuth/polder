description:
  text: 'De gemeente Zevenaar is een middelgrote gemeente met de uitdagingen van een
    grote stad. Kijk alleen al naar onze omgeving: Natura 2000-gebieden, de Duitse
    grens, spoorwegen, snelwegen en veel nieuwbouwprojecten waaronder de Fashion Outlet
    Zevenaar. Dit alles zorgt voor een interessant, uitdagend en breed taakveld voor
    ruim 400 collega’s. Onze gemeentelijke organisatie is opgebouwd uit drie domeinen:
    het sociaal domein, het fysiek domein en het domein dienstverlening en bedrijfsvoering.
    Daarnaast is er een schil van gemeenschappelijke regelingen, die uitvoering geven
    aan taken van de gemeente, zoals Reinigingsdienst de Liemers (RDL), Regionale
    Sociale Dienst de Liemers (RSD) en het Regionaal ICT en Inkoopcentrum (RID).'
  url: https://www.werkenbijzevenaar.nl/domeinen/default.aspx
