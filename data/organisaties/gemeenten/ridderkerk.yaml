description:
  text: In Ridderkerk hebben we naast het college van burgemeester en wethouders en
    directie een bureau bestuursondersteuning. Dit team is de schakel tussen het bestuur
    en de collega’s van gemeente Ridderkerk. Daarnaast zijn de werkzaamheden belegd
    bij cluster Buitenruimte, cluster Sociaal, cluster Ruimte en cluster Samenleving.
  url: https://www.ridderkerk.nl/bestuur-en-organisatie/organogram/
