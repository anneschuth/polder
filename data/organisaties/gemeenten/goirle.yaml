  text: Aan het hoofd van de gemeentelijke organisatie staat de gemeentesecretaris.
    Hij geeft leiding aan concernstaf en aan vier domeinen. Deze domeinen worden direct
    aangestuurd door de domeinmanagers. Samen met de gemeentesecretaris vormen zij
    het managementteam (MT).De organisatie bestaat uit 4 domeinen:BedrijfsvoeringFysiekSociaalPubliek
