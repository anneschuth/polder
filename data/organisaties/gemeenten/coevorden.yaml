  wooIndex:
    documentLocatie:
    - informatiecategorie: Jaarplannen en jaarverslagen
      url: https://financien.coevorden.nl/
      toelichting: In de begroting staat wat we komend jaar gaan doen en waar geld
        naartoe gaat. In de halfjaarrapportage beschrijven we hoe de situatie is ten
        opzichte van de begroting. Na het begrotingsjaar wordt er een jaarverslag
        met een jaarrekening opgesteld.
    - informatiecategorie: Overige besluiten van algemene strekking
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Coevorden%22))+AND+((dt.type==%22algemeenverbindendverklaring+van+cao-bepalingen%22+OR+dt.type==%22ander+besluit+van+algemene+strekking%22+OR+dt.type==%22bekendmaking+aan+de+scheepvaart%22+OR+dt.type==%22beleidsregel%22+OR+dt.type==%22delegatie-+of+mandaatbesluit%22+OR+dt.type==%22circulaire%22+OR+dt.type==%22verkeersbesluit+of+-mededeling%22)))
    - informatiecategorie: Wetten en algemeen verbindende voorschriften
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Coevorden%22))+AND+((dt.type==%22algemeen+verbindend+voorschrift+(verordening)%22+OR+dt.type==%22gemeenschappelijke+regeling%22+OR+dt.type==%22ruimtelijk+plan+of+omgevingsdocument%22+OR+dt.type==%22AMvB%22+OR+dt.type==%22Ministeriële+regeling%22+OR+dt.type==%22RijksAMvB%22+OR+dt.type==%22Rijkswet%22+OR+dt.type==%22Verbeterblad%22+OR+dt.type==%22Wet%22+OR+dt.type==%22Verdrag%22)))
    - informatiecategorie: Beschikkingen
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Coevorden%22))+AND+((dt.type==%22ongewenstverklaring+vreemdeling%22+OR+dt.type==%22vervreemding+erfgoed%22+OR+dt.type==%22Beschikking%22+OR+dt.type==%22andere+beschikking%22+OR+dt.type==%22andere+vergunning%22+OR+dt.type==%22evenementenvergunning%22+OR+dt.type==%22exploitatievergunning%22+OR+dt.type==%22omgevingsvergunning%22+OR+dt.type==%22vergunning+voor+activiteiten+op+of+in+oppervlaktewater%22)))
      toelichting: Beschikkingen zijn besluiten over specifieke gevallen. Als u bijvoorbeeld
        bezwaar maakt tegen bouwplannen in uw straat, dan neemt het college B&W hierover
        een besluit. Dit heet een beschikking.
    - informatiecategorie: Overige besluiten van algemene strekking
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Coevorden%22))+AND+((dt.type==%22algemeenverbindendverklaring+van+cao-bepalingen%22+OR+dt.type==%22ander+besluit+van+algemene+strekking%22+OR+dt.type==%22bekendmaking+aan+de+scheepvaart%22+OR+dt.type==%22beleidsregel%22+OR+dt.type==%22delegatie-+of+mandaatbesluit%22+OR+dt.type==%22circulaire%22)))
      toelichting: De gemeente kan besluiten van algemene strekking nemen. Bijvoorbeeld
        beleidsregels. Daarin geeft de gemeente aan hoe bepaald beleid wordt uitgevoerd.
    - informatiecategorie: Woo-verzoeken en -besluiten
      url: https://www.coevorden.nl/publicaties-wet-open-overheid
      toelichting: Met een Woo-verzoek vraagt u om overheidsinformatie openbaar te
        maken voor iedereen. Hier kunt u de afgehandelde Woo-verzoeken inzien.
    - informatiecategorie: Wetten en algemeen verbindende voorschriften
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Coevorden%22))+AND+((dt.type==%22algemeen+verbindend+voorschrift+(verordening)%22+OR+dt.type==%22gemeenschappelijke+regeling%22+OR+dt.type==%22ruimtelijk+plan+of+omgevingsdocument%22+OR+dt.type==%22verkeersbesluit+of+-mededeling%22+OR+dt.type==%22AMvB%22+OR+dt.type==%22Ministeriële+regeling%22+OR+dt.type==%22RijksAMvB%22+OR+dt.type==%22Rijkswet%22+OR+dt.type==%22Verbeterblad%22+OR+dt.type==%22Wet%22+OR+dt.type==%22Verdrag%22)))
      toelichting: Dit zijn de regels die de overheid voorschrijft. De Rijksoverheid
        maakt wetten. De gemeente kan regels bijvoorbeeld in een algemeen verbindend
        voorschrift vastleggen.
    - informatiecategorie: Agenda’s en besluitenlijsten bestuurscolleges
      url: https://www.coevorden.nl/collegebesluiten
      toelichting: In de besluitenlijst ziet u de besluiten die het bestuur van de
        gemeente Coevorden (het college van Burgemeester en Wethouders) heeft genomen.
        De agenda's van de collegevergaderingen publiceert de gemeente Coevorden nog
        niet.
    - informatiecategorie: Vergaderstukken decentrale overheden
      url: https://raadcoevorden.bestuurlijkeinformatie.nl/
      toelichting: De gemeenteraad bepaalt in hoofdlijnen het beleid van de gemeente
        en controleert of het beleid goed wordt uitgevoerd. Hier vindt u de agenda
        en vergaderstukken van de gemeenteraad van Coevorden. Ook kunt u vergaderingen
        live volgen of terugkijken.
