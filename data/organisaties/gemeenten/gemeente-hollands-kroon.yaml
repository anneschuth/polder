description:
  text: Hollands Kroon is een grote plattelandsgemeente in de Noordkop. Ontstaan uit
    een fusie van 4 gemeenten in 2012. De organisatie is plat en bestaat uit meer
    dan 40 zelforganiserende teams en een driekoppige directie. Samen met het college
    en de gemeenteraad zijn wij er voor onze inwoners, bedrijven en instellingen.
