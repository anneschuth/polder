description:
  text: Onze gemeente bestaat uit 6 steden en 83 kernen. Qua oppervlakte zijn wij
    de grootste gemeente van Nederland. Wat betreft inwoners (ruim 90.000) en arbeidsplaatsen
    (30.000) zijn we de tweede gemeente van Fryslân. En daar zijn we trots op. De
    combinatie van steden, platteland én het omvangrijke grondgebied maken onze gemeente
    uniek in Nederland.
  url: https://sudwestfryslan.nl/thema/bestuur-en-organisatie/
