description:
  text: De gemeente Hulst telt zo'n 27.500 inwoners . De gemeente Hulst kent een lange
    historie en is in huidige vorm ontstaan in 2003  door samenvoeging van de voormalige
    gemeenten Hontenisse en Hulst. De gemeente Hulst bestaat uit vijftien kernen,
    namelijk Hulst, Sint Jansteen, Clinge, Kloosterzande, Vogelwaarde, Nieuw Namen,
    Lamswaarde, Terhole, Graauw, Heikant, Hengstdijk, Kuitaart, Kapellebrug, Walsoorden,
    Ossenisse. In 2024 is gestart met de bouw van een groot aantal woningen aan de
    boorden van de Westerschelde op het voormalige parkeerterrein van de Veerhaven.
    Hier zal het plaatsje Waterzande verschijne.De organisatie van de gemeente Hulst
    kent circa 220 medewerkers, wat ongeveer 180 fté is. De organisatie bestaat uit
    een vijftal afdelingen, te weten Bedrijfsvoering, Wonen & Werken, Realisatie &
    Beheer, Publieke Dienstverlening en Samenleving. Daarnaast is er ook een stafafdeling
    met onder andere de teams P&O en Bestuursondersteuning.
  url: https://www.gemeentehulst.nl/de_Gemeente/Organisatie
