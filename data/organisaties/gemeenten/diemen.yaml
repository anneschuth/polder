description:
  text: Bij de gemeente Diemen werken ongeveer 250 medewerkers. We vormen samen met
    ons bestuur (college en raad) dus een kleine gemeente. Maar tegelijkertijd hebben
    we – dicht bij Amsterdam - te maken met de uitdagingen van een grote stad. Met
    alle medewerkers willen we werken aan het beste voor Diemen.De ambtelijke organisatie
    bestaat uit een directie met daaronder 16 teams. Elk team heeft zijn eigen taken
    en verantwoordelijkheden.De directie bestaat uit drie directeuren. Elke directeur
    heeft een aantal teams en opgaven in zijn portefeuille.
  url: https://www.diemen.nl/organisatie
