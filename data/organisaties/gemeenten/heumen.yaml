description:
  text: 'De gemeente Heumen is een Nederlandse gemeente in de provincie Gelderland
    die bestaat uit de dorpen Heumen, Malden, Overasselt en Nederasselt. De gemeente
    Heumen grenst aan de gemeentes Nijmegen, Wijchen, Berg en Dal, Mook en Middelaar
    (L) en Land van Cuijk (B). De gemeente telt 16.839 inwoners (1 januari 2024, bron:
    CBS) en heeft een oppervlakte van 41,50 km².De centrale doelstelling van de gemeente
    Heumen is om een Heumense, inclusieve samenleving te zijn. Deze inclusieve samenleving
    biedt alle mensen zondermeer fysieke, sociale en digitale toegankelijkheid, op
    het gebied van arbeid, onderwijs, wonen, goederen en diensten, verkeer en vervoer,
    zorg, ondersteuning, sport, cultuur, vrijetijdsbesteding en uitgaan.'
