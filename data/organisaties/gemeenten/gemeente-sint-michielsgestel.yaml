description:
  text: 'Gemeente Sint-Michielsgestel geeft ruimte. Met die boodschap willen we de
    rol van de gemeentelijke organisatie duidelijk maken.  De gemeente Sint-Michielsgestel
    werkt samen met de gemeente Boxtel onder 1 organisatie: MijnGemeenteDichtbij.
    Boxtel en Sint-Michielsgestel blijven zelfstandige gemeenten. Met een eigen bestuur
    en eigen beleid. De ambtelijke samenwerking biedt kansen om inwoners en ook het
    bedrijfsleven beter te kunnen helpen. De gemeenten werken met andere gemeenten
    in de Meierij op diverse gebieden al samen. Door samen te werken kunnen we de
    dienstverlening nog beter organiseren richting al onze inwoners en partners.'
  url: https://www.sint-michielsgestel.nl/bestuur-en-organisatie/organisatie
