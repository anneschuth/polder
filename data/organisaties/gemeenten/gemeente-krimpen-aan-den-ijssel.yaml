description:
  text: 'Bij de gemeente van Krimpen aan den IJssel geloven we in het leveren van
    eerlijk en betekenisvol werk. Voor alle inwoners – en ondernemers – van Krimpen.
    We doen dit samen met om en nabij de 30 betrokken teams. Zij dragen allemaal hun
    steentje bij, zodat we als gemeente steeds net weer wat beter worden dan we ervoor
    waren.Wij zijn er voor de inwoners door:Open te werken: we laten zien wat we doen
    en zijn aanspreekbaar.Eerlijk te zijn: we bieden snel helderheid over wat wel
    en niet kan.Betrokken te zijn: we staan midden in de Krimpense samenleving.Betekenisvol
    te zijn: we voegen waarde toe en denken in mogelijkheden.Visie:We hebben als gemeente
    een hart voor Krimpen aan den IJssel. Ons doel is telkens weer om van de gemeente
    een fijne plek te maken waar mensen, in verbinding met elkaar, kunnen leven, wonen
    en werken.'
