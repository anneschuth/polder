description:
  text: 'De gemeenteraad is het hoogste bestuur van de gemeente. Het college van burgemeester
    en wethouders vormt het dagelijks bestuur van de gemeente. De gemeentelijke organisatie
    kent vijf domeinen: Directie, Bedrijfsvoering, Maatschappelijke ontwikkelingen,
    Ruimtelijke ontwikkelingen en het Sociaal Domein. De gemeentesecretaris/algemeen
    directeur, tevens de domeinmanager van het domein Directie, en de vier domeinmanagers
    vormen het gemeentelijk managementteam (GMT). De domeinen bestaan uit teams, een
    aantal teams kent zogenoemde subteams. Meer informatie is beschikbaar op de gemeentelijke
    website.'
