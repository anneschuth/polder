description:
  text: 'Veenendaal is een middelgrote gemeente met ruim 70.000 inwoners. Het heeft
    een centrale ligging, op de grens tussen Utrecht en Gelderland, en is daarmee
    goed bereikbaar. Veenendaal heeft een dorps karakter met stadse vraagstukken en
    is daardoor altijd in beweging.Veens WerkenIn onze organisatie werken we met 19
    teams aan onze dienstverlening, projecten en opgaven. Daarbij staat de vraag en
    behoefte vanuit de samenleving altijd centraal. Ook onze manier van werken is
    daarop ingericht. In Veenendaal werken we namelijk plaats- en tijdonafhankelijk
    om goed in te kunnen spelen op de ontwikkelingen in de maatschappij. Dat noemen
    wij: het Veens werken.In Veenendaal doen we ons werk op basis van vertrouwen.
    We nemen daarin onze eigen verantwoordelijkheid. We hebben een informele organisatie
    met veel onderling contact. We kennen elkaar. Deze korte lijnen zorgen ervoor
    dat je echt kunt meewerken aan het uiteindelijke resultaat dat we samen willen
    bereiken. Jouw kennis en talent doet ertoe. Als professional én als persoon krijg
    je de mogelijkheid om jouw talenten nog verder te ontwikkelen.'
  url: https://www.veenendaal.nl/info-over-de-gemeente/over-de-gemeente/werken-voor-veenendaal/veens-werken/organisatie
