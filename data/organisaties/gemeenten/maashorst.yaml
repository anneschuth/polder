description:
  text: 'Maashorst is een jonge gemeente met zes kernen, omgeven door natuur zoals
    je die nergens anders tegenkomt. We kennen, net als iedere gemeente, een college,
    een gemeenteraad en een directie. De organisatie is verdeeld in drie domeinen:
    Ruimte, Sociaal en Dienstverlening. Ieder domein heeft een directeur en bestaat
    uit verschillende teams. De teams worden aangestuurd door een teammanager.Aan
    het hoofd van de ambtelijke organisatie staat de gemeentesecretaris.'
