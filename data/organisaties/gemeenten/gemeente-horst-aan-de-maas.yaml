description:
  text: 'De organisatie van de gemeente Horst aan de Maas heeft zich door de jaren
    heen ontwikkeld tot een volwassen en moderne organisatie die volop meedoet in
    de uitdagingen van deze tijd. Al onze medewerkers hebben betrokkenheid, betrouwbaarheid
    en respect hoog in het vaandel staan. De kracht van de organisatie zit hem dan
    ook in de mensen die haar maken. Samen maken we het verschil!Onze organisatie
    bestaat uit mensen uit onze gemeente én daarbuiten. Samen zorgen we ervoor dat
    we in ontwikkeling blijven en dat we klaarstaan voor elkaar en voor de inwoners.
    We werken samen aan een gezonde, duurzame en ondernemende organisatie. Met beide
    benen op de grond en met de blik vooruit. #SameGaonVûrGröts.'
  url: https://www.horstaandemaas.nl/onze-organisatie
