    documentLocatie:
    - informatiecategorie: Convenanten
      url: https://woo.helmond.nl/wooverzoekenkanaal/woo-verzoeken/convenanten
      toelichting: Een convenant is een afspraak van de gemeente Helmond met één of
        meer partijen, gericht op het realiseren van bepaalde (beleids-) doelstellingen/
        de uitvoering van publiekrechtelijke bevoegdheden/ uitvoeren van een overheidstaak.
    - informatiecategorie: Beschikkingen
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Helmond%22))+AND+((dt.type==%22ongewenstverklaring+vreemdeling%22+OR+dt.type==%22vervreemding+erfgoed%22+OR+dt.type==%22Beschikking%22+OR+dt.type==%22andere+beschikking%22+OR+dt.type==%22andere+vergunning%22+OR+dt.type==%22evenementenvergunning%22+OR+dt.type==%22exploitatievergunning%22+OR+dt.type==%22omgevingsvergunning%22+OR+dt.type==%22vergunning+voor+activiteiten+op+of+in+oppervlaktewater%22)))
      toelichting: Beschikkingen zijn besluiten over specifieke gevallen. Als u bijvoorbeeld
        bezwaar maakt tegen bouwplannen in uw straat, neemt het college hier een besluit
        over. Dit heet een beschikking.
    - informatiecategorie: Jaarplannen en jaarverslagen
      url: https://www.helmond.nl/1/bestuur/alle-onderwerpen/zoeken-in-bestuurlijke-stukken/beleid-en-bestuurlijke-informatie/jaarrekening-en-jaarverslag.html
      toelichting: Het college van burgemeester en wethouders verantwoordt elk jaar
        aan de gemeenteraad wat er dat jaar is bereikt en welke plannen zijn uitgevoerd.
        Zo kan de raad haar toezichthoudende rol goed vervullen.
    - informatiecategorie: Overige besluiten van algemene strekking
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Helmond%22))+AND+((dt.type==%22algemeenverbindendverklaring+van+cao-bepalingen%22+OR+dt.type==%22ander+besluit+van+algemene+strekking%22+OR+dt.type==%22bekendmaking+aan+de+scheepvaart%22+OR+dt.type==%22beleidsregel%22+OR+dt.type==%22delegatie-+of+mandaatbesluit%22+OR+dt.type==%22circulaire%22+OR+dt.type==%22verkeersbesluit+of+-mededeling%22)))
      toelichting: Naast algemene verbindende voorschriften kan de gemeente Helmond
        ook andere besluiten van algemene strekking nemen. Dat zijn dan bijvoorbeeld
        beleidsregels, waarin de gemeente aangeeft hoe zij bepaald beleid uitvoert.
    - informatiecategorie: Wetten en algemeen verbindende voorschriften
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Helmond%22))+AND+((dt.type==%22algemeen+verbindend+voorschrift+(verordening)%22+OR+dt.type==%22gemeenschappelijke+regeling%22+OR+dt.type==%22ruimtelijk+plan+of+omgevingsdocument%22+OR+dt.type==%22AMvB%22+OR+dt.type==%22Ministeriële+regeling%22+OR+dt.type==%22RijksAMvB%22+OR+dt.type==%22Rijkswet%22+OR+dt.type==%22Verbeterblad%22+OR+dt.type==%22Wet%22+OR+dt.type==%22Verdrag%22)))
      toelichting: Dit zijn de regels die de overheid voorschrijft. De Rijksoverheid
        maakt wetten. Ook de gemeente Helmond kan regels opstellen. Dat heet dan niet
        een wet, maar bijvoorbeeld een algemeen verbindend voorschrift.
    - informatiecategorie: Woo-verzoeken en -besluiten
      url: https://woo.helmond.nl/wooverzoekenkanaal/woo-verzoeken/woo-verzoeken
      toelichting: Met een Woo-verzoek wordt gevraagd om overheidsinformatie openbaar
        te maken. Iedereen kan een Woo-verzoek indienen. Bekijk op deze pagina een
        overzicht van afgehandelde Woo-verzoeken.
    - informatiecategorie: Agenda’s en besluitenlijsten bestuurscolleges
      url: https://helmond.raadsinformatie.nl/modules/12/besluitenlijsten/view?list_filters[0][college]=
      toelichting: Via deze pagina ziet u de agenda en de besluiten die het bestuur
        van de gemeente Helmond (het college van Burgemeester en Wethouders) heeft
        genomen.
