description:
  text: 'Hoe werkt de gemeente Oldenzaal?De ambtelijke organisatie is opgezet volgens
    het directiemodel, waarbij de domeinen werken vanuit gemeentebrede beleids- en
    bedrijfsvoeringskaders.Onze organisatie bestaat uit de volgende domeinen: Bedrijfsvoering,
    Dienstverlening, Maatschappij en Ruimte. De domeinen zijn in verschillende teams
    onderverdeeld, waarin teams gericht zijn op specifieke onderwerpen.Het aansturen
    van de organisatie is gebaseerd op de volgende pijlers:1. De publieke waarde is
    voor ons als overheidsorganisatie het uitgangspunt in al ons handelen. Alles wat
    we doen en laten draagt bij aan het geluk van de inwoners van Oldenzaal.2. We
    werken integraal, flexibel, transparant en omgevingsbewust. De vraag van de inwoner/
    klantvraag staat centraal; we behandelen vragen flexibel (persoonlijk waar nodig,
    digitaal waar kan) en meten de interne en externe klanttevredenheid.3. We managen
    integraal: het integraal realiseren van het resultaat in combinatie met integraal
    middelenbeheer (de middelen omvatten in ieder geval: financiën, personeel, inkoop,
    processen/organisatie, privacy, informatie, huisvesting en communicatie)4. De
    organisatiestructuur en de stijl van leidinggeven geeft ruimte aan professionals.
    We streven naar structurele flexibiliteit door verantwoordelijkheden laag in de
    organisatie te leggen waardoor medewerkers sneller beslissingen kunnen nemen.
    We geven vertrouwen en gaan daarbij uit van de eigen verantwoordelijkheid van
    de medewerkers voor het realiseren van het afgesproken resultaat en werkwijze
    (eigenaarschap). CMT en teamleiders geven inhoudelijk richting zonder de verantwoordelijkheid
    van de medewerkers over te nemen; de bevoegdheden worden op deze verantwoordelijkheid
    afgestemd.5. We zorgen voor een dienstverlenende en klantgerichte houding van
    alle medewerkers en leidinggevenden en een flexibele opstelling bij veranderingen
    van de taken of wijze van uitvoeren.6. We zorgen voor het optimaal benutten van
    het menselijk kapitaal door het stimuleren van competenties en talenten en het
    ontwikkelen van kennis. CMT en teamleiders zijn continu gericht op het ontwikkelen
    en verbeteren en sturen zo nodig bij.7. Het onderscheid in bestuurlijke en ambtelijke
    taken en verantwoordelijkheden: het bestuur richt zich op besturen. Het CMT richt
    zich op het professioneel adviseren op het WAT, het leiden van de organisatie
    en het voeren van het bedrijf (het “HOE”).'
