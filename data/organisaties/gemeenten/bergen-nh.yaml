description:
  text: De gemeenteraad bestaat uit gekozen volksvertegenwoordigers binnen de gemeente.
    De raad bepaalt het beleid (op hoofdlijnen, dus niet in detail). Zij neemt alle
    beslissingen die belangrijk zijn voor de gemeente. Bijvoorbeeld de vaststelling
    van het omgevingsplan of vaststellen van beleidsnota's.De gemeenteraad van gemeente
    Bergen heeft 21 leden, die elke 4 jaar worden gekozen door de stemgerechtigde
    inwoners van de gemeente.Het college van burgemeester en wethouders (b&w) vormt
    het dagelijks bestuur van de gemeente. De belangrijkste taak van het college van
    b&w is de voorbereiding en uitvoering van de besluiten van de gemeenteraad.
  url: https://www.bergen-nh.nl/raad-en-college
