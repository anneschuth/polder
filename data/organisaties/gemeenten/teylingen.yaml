description:
  text: Gemeente Teylingen wordt bestuurd door een college van burgemeester en wethouders,
    ondersteund door de gemeenteraad. De burgemeester is verantwoordelijk voor openbare
    orde en veiligheid. Het college bestaat verder uit vier wethouders, elk met hun
    eigen portefeuilles. De gemeenteraad, bestaande uit gekozen leden, stelt het beleid
    vast en controleert het college. Teylingen werkt samen met de gemeenten Hillegom
    en Lisse onder de naam HLTsamen voor efficiënte dienstverlening. Daarnaast zijn
    er diverse commissies, zoals de commissie voor bezwaarschriften en de rekenkamercommissie,
    die specifieke taken uitvoeren.
