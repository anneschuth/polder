  text: Gemeente Apeldoorn ontwikkelt zich op veelbelovende wijze. Met bedrijfsleven
    en maatschappelijke organisaties wordt steeds meer samenwerking gezocht. Het gaat
    erom samen met alle betrokkenen richting te geven aan een stad in ontwikkeling
    waar 168.000 inwoners graag en goed wonen.
