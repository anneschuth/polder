description:
  text: De ambtelijke organisatie van de gemeente Laarbeek staat onder leiding van
    gemeentesecretaris mevrouw Jolanda van de Ven. Naast algemeen directeur is zij
    ook adviseur van het college van burgemeester en wethouders. De gemeentesecretaris
    wordt ondersteund vanuit de Staf.De ambtelijke organisatie is ingedeeld in een
    drietal afdelingen. Afdeling Bedrijfsvoering, afdeling Leefomgeving en afdeling
    Samenleving. Iedere afdeling heeft een afdelingsmanager. Iedere afdeling telt
    meerdere Teams. Ieder Team heeft een coördinator.
  url: https://www.laarbeek.nl/structuur
