description:
  text: De organisatie van de gemeente ’s-Hertogenbosch bestaat uit verschillende
    afdelingen en rollen die gezamenlijk de werking en het bestuur van de gemeente
    ondersteunen. Aan het hoofd staat de gemeenteraad, die de volksvertegenwoordiging
    vormt en besluiten neemt over het beleid en de toekomst van de gemeente. De griffie
    ondersteunt de gemeenteraad met advisering, agendabeheer en administratieve taken
    om hun werkzaamheden efficiënt te laten verlopen.Het College van Burgemeester
    en Wethouders (B&W), bestaande uit de burgemeester en wethouders, voert het beleid
    van de gemeenteraad uit en is verantwoordelijk voor het dagelijks bestuur van
    de gemeente. De gemeentesecretaris is de hoogste ambtenaar en fungeert als schakel
    tussen het College van B&W en de ambtelijke organisatie. Onder de gemeentesecretaris
    vallen verschillende sectoren, elk met specifieke taken en verantwoordelijkheden.
