  wooIndex:
    documentLocatie:
    - informatiecategorie: Wetten en algemeen verbindende voorschriften
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Achtkarspelen%22))+AND+((dt.type==%22algemeen+verbindend+voorschrift+(verordening)%22+OR+dt.type==%22gemeenschappelijke+regeling%22+OR+dt.type==%22ruimtelijk+plan+of+omgevingsdocument%22+OR+dt.type==%22AMvB%22+OR+dt.type==%22Ministeriële+regeling%22+OR+dt.type==%22RijksAMvB%22+OR+dt.type==%22Rijkswet%22+OR+dt.type==%22Verbeterblad%22+OR+dt.type==%22Wet%22+OR+dt.type==%22Verdrag%22)))
      toelichting: Dit zijn de regels die de overheid voorschrijft. De Rijksoverheid
        maakt wetten. Ook de gemeente kan regels opstellen. Dat heet dan niet een
        wet, maar bijvoorbeeld een algemeen verbindend voorschrift.
    - informatiecategorie: Beschikkingen
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Achtkarspelen%22))+AND+((dt.type==%22ongewenstverklaring+vreemdeling%22+OR+dt.type==%22vervreemding+erfgoed%22+OR+dt.type==%22Beschikking%22+OR+dt.type==%22andere+beschikking%22+OR+dt.type==%22andere+vergunning%22+OR+dt.type==%22evenementenvergunning%22+OR+dt.type==%22exploitatievergunning%22+OR+dt.type==%22omgevingsvergunning%22+OR+dt.type==%22vergunning+voor+activiteiten+op+of+in+oppervlaktewater%22)))
      toelichting: Beschikkingen zijn besluiten over specifieke gevallen. Als u bijvoorbeeld
        bezwaar maakt tegen bouwplannen in uw straat, neemt het college hier een besluit
        over. Dit heet een beschikking.
    - informatiecategorie: Klachtoordelen
      url: https://www.achtkarspelen.nl/klachten-en-bezwaar
      toelichting: Een klacht geeft aan dat een inwoner niet tevreden is over hoe
        een ambtenaar zich heeft gedragen. Gemeente Achtkarspelen behandelt deze klachten,
        maar publiceert nog geen klachtoordelen. U kunt wel een verslag opvragen.
    - informatiecategorie: Agenda’s en besluitenlijsten bestuurscolleges
      url: https://www.achtkarspelen.nl/besluiten-van-het-college
      toelichting: In de besluitenlijsten ziet u de besluiten die het bestuur van
        gemeente Achtkarspelen (het college van Burgemeester en Wethouders) heeft
        genomen. De agenda's van de collegevergaderingen publiceert gemeente Achtkarspelen
        nog niet.
    - informatiecategorie: Overige besluiten van algemene strekking
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Achtkarspelen%22))+AND+((dt.type==%22algemeenverbindendverklaring+van+cao-bepalingen%22+OR+dt.type==%22ander+besluit+van+algemene+strekking%22+OR+dt.type==%22bekendmaking+aan+de+scheepvaart%22+OR+dt.type==%22beleidsregel%22+OR+dt.type==%22delegatie-+of+mandaatbesluit%22+OR+dt.type==%22circulaire%22)))
      toelichting: Naast algemene verbindende voorschriften kan gemeente Achtkarspelen
        ook andere besluiten van algemene strekking nemen. Dat zijn dan bijvoorbeeld
        beleidsregels, waarin de gemeente aangeeft hoe zij bepaald beleid uitvoert.
    - informatiecategorie: Vergaderstukken decentrale overheden
      url: https://achtkarspelen.bestuurlijkeinformatie.nl/
      toelichting: Deze documenten bespreekt de gemeenteraad. Dat kan een brief van
        een inwoner zijn. Of een voorstel van het college waarover de raad stemt.
        Wil de raad een voorstel wijzigen, dan heet dat een amendement. Moties zijn
        voorstellen vanuit de raad.
