description:
  text: Burgemeester Jan de Vries en wethouders Cees Paas en Ton Spek zorgen voor
    het dagelijks bestuur van de gemeente. De gemeenteraad benoemt de wethouders,
    die samen met de burgemeester het college vormen. De ambtenaren ondersteunen het
    college. Zij zijn ook een schakel naar de inwoners, bedrijven en organisaties
    in Sliedrecht.De burgemeester is voorzitter van het college. De andere collegeleden
    zijn de drie wethouders en gemeentesecretaris Niels Kuiper. De burgemeester en
    de wethouders hebben ieder een eigen taakgebied of 'portefeuille'. Zoals onderwijs,
    openbare werken, financiën, huisvesting, sport en cultuur.Burgemeester en wethouders
    voeren het programma van de gemeenteraad uit. Ze hebben het raadsprogramma uitgewerkt
    in het uitvoeringsprogramma 'Samen werken áán, vóór en mét Sliedrecht'. Hierin
    staan ambities en plannen met een overzicht van de financiën. In de kadernota
    en begroting staan de ambities per jaar uitgewerkt.Het college vergadert elke
    dinsdag. Bijvoorbeeld over voorstellen aan de raad. Het college beslist bij meerderheid
    van stemmen. Bij gelijke stemmen telt de stem van de burgemeester dubbel.
  url: https://www.sliedrecht.nl/Bestuur_politiek/Dagelijks_bestuur
