description:
  text: Naast de gemeenteraad en het college van burgemeester en wethouders bestaat
    de gemeente Houten uit een ambtelijke organisatie. Deze ambtenaren maken beleidsplannen
    en nota's waarover het gemeentebestuur moet beslissen. Daarnaast zorgen de ambtenaren
    voor de uitvoering van het vastgestelde beleid.Bij de gemeente Houten werken,
    verdeeld verschillende teams, ongeveer 350 medewerkers, waarvan velen in deeltijd.
    De gemeentesecretaris is het hoofd van de ambtenaren en maakt samen met een directeur
    deel uit van het Directieteam.
  url: https://www.houten.nl/gemeentelijke-organisatie/werken-bij-houten/wie-zijn-wij
