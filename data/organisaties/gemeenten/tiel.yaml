description:
  text: Tiel is een bruisende centrumgemeente met ruim 42.000 inwoners die de regio
    veel wil én kan bieden. Een stad met vele voorzieningen en leuke evenementen.
    Denk onder andere aan Appelpop en het Fruitcorso. Prachtig verscholen in het Rivierengebied,
    maar van alle kanten makkelijk te bereiken zowel per auto als met het openbaar
    vervoer. Een prachtige stad om in te wonen en te werken.
  url: https://www.tiel.nl/werken-bij-de-gemeente
