description:
  text: 'De gemeente Winterswijk telt bijna 29.000 inwoners. Het levendige centrum,
    het prachtige buitengebied en de vele voorzieningen maken Winterswijk tot een
    aantrekkelijke plaats. Samen met onze betrokken inwoners, bedrijven en instellingen
    werken wij voortdurend aan een optimale leefbaarheid en goed bereikbare voorzieningen.
    In een vitaal Winterswijk blijft het ook in de toekomst prettig wonen, werken,
    ondernemen en recreëren. Kortom: Winterswijk heeft veel te bieden.'
  url: https://www.winterswijk.nl/bestuur-en-organisatie
