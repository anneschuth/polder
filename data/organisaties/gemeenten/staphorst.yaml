        bekendmakingen.
    - informatiecategorie: Beschikkingen
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Staphorst%22))+AND+((dt.type==%22ongewenstverklaring+vreemdeling%22+OR+dt.type==%22vervreemding+erfgoed%22+OR+dt.type==%22Beschikking%22+OR+dt.type==%22andere+beschikking%22+OR+dt.type==%22andere+vergunning%22+OR+dt.type==%22evenementenvergunning%22+OR+dt.type==%22exploitatievergunning%22+OR+dt.type==%22omgevingsvergunning%22+OR+dt.type==%22vergunning+voor+activiteiten+op+of+in+oppervlaktewater%22)))
      toelichting: Deze categorie geeft inzage in beschikkingen die de gemeente afgeeft.
        Beschikkingen zijn besluiten die, in tegenstelling tot algemeen verbindende
        voorschriften, betrekking hebben op een specifiek geval, zoals een omgevingsvergunning.
    - informatiecategorie: Overige besluiten van algemene strekking
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Staphorst%22))+AND+((dt.type==%22algemeenverbindendverklaring+van+cao-bepalingen%22+OR+dt.type==%22ander+besluit+van+algemene+strekking%22+OR+dt.type==%22bekendmaking+aan+de+scheepvaart%22+OR+dt.type==%22beleidsregel%22+OR+dt.type==%22delegatie-+of+mandaatbesluit%22+OR+dt.type==%22circulaire%22+OR+dt.type==%22verkeersbesluit+of+-mededeling%22)))
      toelichting: Deze categorie is een restcategorie besluiten van algemene strekking,
        en geeft inzage in onder meer verkeersbesluiten en aanwijzingsbesluiten functionarissen.
    - informatiecategorie: Agenda’s en besluitenlijsten bestuurscolleges
      url: https://www.staphorst.nl/besluitenlijsten-college
      toelichting: Deze categorie geeft inzicht in de besluiten die door het college
        van B&W worden genomen.
    - informatiecategorie: Woo-verzoeken en -besluiten
      url: https://open.staphorst.nl/besluiten-woo-verzoeken?language_content_entity=nl
      toelichting: Deze categorie geeft inzage in Woo-besluiten en eventuele bij het
        besluit behorende documenten naar aanleiding van een ingediend Woo-verzoek.
    - informatiecategorie: Vergaderstukken decentrale overheden
      url: https://staphorst.bestuurlijkeinformatie.nl/
      toelichting: Deze categorie geeft inzage in agenda, vergaderstukken, ingekomen
        stukken en besluitenlijsten van de gemeenteraad.
