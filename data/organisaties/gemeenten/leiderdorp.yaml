description:
  text: Leiderdorp ligt midden in de Randstad, 'tussen stad en land'. Aan de westzijde
    ligt Leiden, de andere delen van het dorp grenzen aan het Groene Hart.De gemeente
    kenmerkt zich door een goed woon- en leefklimaat voor de ruim 27.000 mensen die
    er wonen. Ook bezoekers kunnen hun hart ophalen. Een bloeiend verenigingsleven,
    een ruim scala aan voorzieningen, een fiks winkelaanbod, grote bedrijvigheid en
    tal van ontspanningsmogelijkheden zijn hier te vinden.
  url: https://www.leiderdorp.nl/bestuur-organisatie
