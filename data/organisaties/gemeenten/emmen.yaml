    - informatiecategorie: Wetten en algemeen verbindende voorschriften
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Emmen%22))+AND+((dt.type==%22algemeen+verbindend+voorschrift+(verordening)%22+OR+dt.type==%22gemeenschappelijke+regeling%22+OR+dt.type==%22ruimtelijk+plan+of+omgevingsdocument%22+OR+dt.type==%22AMvB%22+OR+dt.type==%22Ministeriële+regeling%22+OR+dt.type==%22RijksAMvB%22+OR+dt.type==%22Rijkswet%22+OR+dt.type==%22Verbeterblad%22+OR+dt.type==%22Wet%22+OR+dt.type==%22Verdrag%22)))
      toelichting: Dit zijn de regels die de overheid voorschrijft. De Rijksoverheid
        maakt wetten. De gemeente kan regels bijvoorbeeld in een algemeen verbindend
        voorschrift vastleggen.
    - informatiecategorie: Agenda’s en besluitenlijsten bestuurscolleges
      url: https://gemeente.emmen.nl/besluitenlijst
      toelichting: In de besluitenlijst ziet u de besluiten die het bestuur van de
        gemeente Emmen (het college van Burgemeester en Wethouders) heeft genomen.
        De agenda's van de collegevergaderingen publiceert de gemeente Emmen  nog
        niet.
    - informatiecategorie: Vergaderstukken decentrale overheden
      url: https://emmen.bestuurlijkeinformatie.nl/Calendar
      toelichting: De gemeenteraad bepaalt in hoofdlijnen het beleid van de gemeente
        en controleert of het beleid goed wordt uitgevoerd. Hier vindt u de agenda
        en vergaderstukken van de gemeenteraad van Emmen. Ook kunt u vergaderingen
        live volgen of terugkijken.
    - informatiecategorie: Jaarplannen en jaarverslagen
      url: https://gemeente.emmen.nl/korte-versie-begroting-2024
      toelichting: In de begroting staat wat we komend jaar gaan doen en waar geld
        naartoe gaat. In de halfjaarrapportage beschrijven we hoe de situatie is ten
        opzichte van de begroting. Na het begrotingsjaar wordt er een jaarverslag
        met een jaarrekening opgesteld.
    - informatiecategorie: Beschikkingen
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=(c.product-area==%22officielepublicaties%22)and((((w.organisatietype==%22gemeente%22)and(dt.creator==%22Emmen%22))))and((dt.type==%22ruimtelijk%20plan%20of%20omgevingsdocument%22)or(dt.type==%22Beschikking%22)or(dt.type==%22andere%20beschikking%22)or(dt.type==%22andere%20vergunning%22)or(dt.type==%22evenementenvergunning%22)or(dt.type==%22exploitatievergunning%22)or(dt.type==%22omgevingsvergunning%22)or(dt.type==%22vergunning%20voor%20activiteiten%20op%20of%20in%20oppervlaktewater%22))and((w.publicatienaam==%22Gemeenteblad%22))&zv=&col=Gemeenteblad
      toelichting: Beschikkingen zijn besluiten over specifieke gevallen. Als u bijvoorbeeld
        bezwaar maakt tegen bouwplannen in uw straat, dan neemt het college B&W hierover
        een besluit. Dit heet een beschikking.
