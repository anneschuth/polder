description:
  text: Bij de gemeente Emmen staan de doelen en wensen van het bestuur (raad en college)
    centraal. De griffie helpt daarbij de raad en de medewerkers van de organisatie
    helpen het college. De gemeente Emmen bestaat uit 40 teams. Als u een brief van
    ons krijgt, dan ziet u daarin de afkorting van het team wat uw vraag behandelt.
    Hieronder leest u wat de volledige naam van het team is.
  url: https://gemeente.emmen.nl/organisatie
