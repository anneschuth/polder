description:
  text: Meer wendbaarheid gaat niet alleen over sensitief zijn op wat buiten nodig
    is. Wij richten onze organisatie ook meer in op maatschappelijke vragen die niet
    direct bij een vast team kunnen worden neergelegd. Daarom werken we met twee type
    teams werken; vaste en tijdelijke teams. Beide teams werken op basis van opdrachten,
    zij nemen een opdracht aan en zijn verantwoordelijk als team voor de resultaten
    en het realiseren van maatschappelijk effect. Zij creëren overzicht en samenhang
    binnen de bestaande taken en projecten en bepalen daarbinnen ook de prioriteiten.
    Belangrijk is dat alle teams sterk zijn en capabel om de opdracht uit te voeren.Leeswijzer
    organogram- We werken binnen de gemeente Oss aan maatschappelijke opgaven, dat
    ligt aan de basis van het organogram.-  Verschillende teams dragen d.m.v. hun
    opdracht bij aan de realisatie van de opgave, dit kan ervoor zorgen dat teams
    veranderen.- Een team of afdeling is de thuisbasis is voor elke collega. Hier
    delen collega's hun vakmanschap en werken ze samen aan een opdracht.- Een programma-
    of projectteam is een multidisciplinair team dat aan een gezamenlijke tijdelijke
    opdracht werkt. Daarnaast kennen we ook multidisciplinaire procesteams.- Collega’s
    kunnen zien bij welke teamleider, afdelingshoofd, directeur of programmamanager,
    ze terecht kunnen als ze er samen niet uit komen.- De Osse samenleving en regio
    staan in het organogram, teams aan de rand van het organogram zijn veel in verbinding
    met hen.
