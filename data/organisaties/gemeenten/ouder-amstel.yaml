description:
  text: In de gemeente Ouder-Amstel zetten ongeveer 90 medewerkers zich in voor ruim
    14.000 inwoners. Zij doen dat in opdracht van de gemeenteraad en het college van
    burgemeester en wethouders. De gemeente Ouder-Amstel werkt daarnaast samen met
    de gemeenten Uithoorn en Diemen in de samenwerkingsorganisatie Duo+.De ambtelijke
    organisatie bestaat uit vier afdelingen en is er om besluiten van de gemeenteraad
    en het college voor te bereiden en uit te voeren. Aan het hoofd van deze organisatie
    staat de gemeentesecretaris.
