description:
  text: In het organisatiebesluit van de gemeente Groningen is door het college van burgemeester en wethouders
    de hoofdstructuur en de aansturing van de ambtelijke organisatie vastgesteld. Samen met de (onder)mandaatbesluiten
    vormt het organisatiebesluit het formele kader voor de uitvoering van taken, verantwoordelijkheden
    en bevoegdheden voor de Groningse ambtelijke organisatie. Het organisatiebesluit vindt u via de link
    hieronder.
