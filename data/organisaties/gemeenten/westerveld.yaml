  wooIndex:
    documentLocatie:
    - informatiecategorie: Overige besluiten van algemene strekking
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Westerveld%22))+AND+((dt.type==%22algemeenverbindendverklaring+van+cao-bepalingen%22+OR+dt.type==%22ander+besluit+van+algemene+strekking%22+OR+dt.type==%22bekendmaking+aan+de+scheepvaart%22+OR+dt.type==%22beleidsregel%22+OR+dt.type==%22delegatie-+of+mandaatbesluit%22+OR+dt.type==%22circulaire%22+OR+dt.type==%22verkeersbesluit+of+-mededeling%22)))
      toelichting: De gemeente kan besluiten van algemene strekking nemen. Bijvoorbeeld
        beleidsregels. Daarin geeft de gemeente aan hoe bepaald beleid wordt uitgevoerd.
    - informatiecategorie: Wetten en algemeen verbindende voorschriften
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Westerveld%22))+AND+((dt.type==%22algemeen+verbindend+voorschrift+(verordening)%22+OR+dt.type==%22gemeenschappelijke+regeling%22+OR+dt.type==%22ruimtelijk+plan+of+omgevingsdocument%22+OR+dt.type==%22AMvB%22+OR+dt.type==%22Ministeriële+regeling%22+OR+dt.type==%22RijksAMvB%22+OR+dt.type==%22Rijkswet%22+OR+dt.type==%22Verbeterblad%22+OR+dt.type==%22Wet%22+OR+dt.type==%22Verdrag%22)))
      toelichting: Dit zijn de regels die de overheid voorschrijft. De Rijksoverheid
        maakt wetten. De gemeente kan regels bijvoorbeeld in een algemeen verbindend
        voorschrift vastleggen.
    - informatiecategorie: Beschikkingen
      url: https://zoek.officielebekendmakingen.nl/resultaten?q=((c.product-area==%22officielepublicaties%22)+AND+((dt.creator==%22Westerveld%22))+AND+((dt.type==%22ongewenstverklaring+vreemdeling%22+OR+dt.type==%22vervreemding+erfgoed%22+OR+dt.type==%22Beschikking%22+OR+dt.type==%22andere+beschikking%22+OR+dt.type==%22andere+vergunning%22+OR+dt.type==%22evenementenvergunning%22+OR+dt.type==%22exploitatievergunning%22+OR+dt.type==%22omgevingsvergunning%22+OR+dt.type==%22vergunning+voor+activiteiten+op+of+in+oppervlaktewater%22)))
      toelichting: Beschikkingen zijn besluiten over specifieke gevallen. Als u bijvoorbeeld
        bezwaar maakt tegen bouwplannen in uw straat, dan neemt het college B&W hierover
        een besluit. Dit heet een beschikking.
    - informatiecategorie: Jaarplannen en jaarverslagen
      url: https://westerveld.begrotingsapp.nl/
      toelichting: In de kadernota stellen we beleidsuitgangspunten voor het komende
        jaar vast. De begroting werkt deze financieel uit. Via de 1e en 2e bestuursrapportage
        volgen we de voortgang. Na het jaar komen de jaarstukken en de jaarrekening.
    - informatiecategorie: Vergaderstukken decentrale overheden
      url: https://westerveld.bestuurlijkeinformatie.nl/
      toelichting: De leden van de gemeenteraad (raadsleden) nemen alle beslissingen
        die voor de gemeente van belang zijn.  Hier vindt u de agenda en vergaderstukken
        van de gemeenteraad van Westerveld. Ook kunt u  vergaderingen live volgen
        of terugkijken.
    - informatiecategorie: Agenda’s en besluitenlijsten bestuurscolleges
      url: https://www.gemeentewesterveld.nl/Alle_onderwerpen/Bestuur_en_organisatie/College/Collegebesluiten
      toelichting: In de besluitenlijst ziet u de besluiten die het college van Burgemeester
        en Wethouders van de gemeente Westerveld heeft genomen. Gemeente Westerveld
        publiceert de agenda's van de collegevergaderingen nog niet.
