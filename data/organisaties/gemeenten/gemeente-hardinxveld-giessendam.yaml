description:
  text: 'De gemeentesecretaris en de directeur bedrijfsvoering vormen het dagelijks
    bestuur van de gemeente Hardinxveld- Giessendam.Als hoogste ambtenaar is de gemeentesecretaris
    verantwoordelijk voor de gemeentelijke organisatie. Zij vormt de schakel tussen
    bestuur en gemeentelijk apparaat.  De gemeentesecretaris wordt in har werkzaamheden
    ondersteund door de domeinmanagers van de domeinen: Sociaal , Fysiek en Bedrijfsvoering.'
