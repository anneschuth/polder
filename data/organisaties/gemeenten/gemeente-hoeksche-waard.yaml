description:
  text: 'Gemeente Hoeksche Waard is een Nederlandse gemeente in de provincie Zuid-Holland,
    ontstaan op 1 januari 2019 na een fusie van vijf gemeenten: Binnenmaas, Cromstrijen,
    Korendijk, Oud-Beijerland en Strijen. De gemeente ligt in de regio Hoeksche Waard,
    een landelijk en waterrijk gebied, en heeft ruim 87.000 inwoners. Hoeksche Waard
    staat bekend om zijn karakteristieke dorpen, agrarische landschappen en ligging
    aan het Haringvliet en Hollandsch Diep. De gemeente zet zich in voor een duurzame
    leefomgeving, economische groei en een sterke gemeenschapszin, met een focus op
    innovatie, duurzaamheid en samenwerking.'
