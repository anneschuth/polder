description:
  text: De gemeente heeft een gemeentebestuur. Dit gemeentebestuur bestaat uit een
    dagelijks bestuur (het college van burgemeester en wethouders) en een algemeen
    bestuur (de gemeenteraad). Het presidium is een afvaardiging van de gemeenteraad
    en bereidt onder meer de agenda's voor. De burgemeester is voorzitter van de gemeenteraad
    en voorzitter van het college van burgemeester en wethouders. De burgemeester
    is ook verantwoordelijk voor openbare orde en veiligheid. De griffier vormt de
    linking pin tussen de gemeenteraad en de directeur (secretaris) van de gemeente.De
    platte ambtelijke organisatie bestaat uit een MT bestaande uit drie personen .
    De managers sturen de teamleiders van 9 zelfstandige teams aan. De lijnen zijn
    kort en we werken integraal samen. Bij de gemeente Nederweert werken ongeveer
    160 mensen, waarbij de verdeling man/vrouw ongeveer 50/50 is.
  url: https://www.nederweert.nl/de-gemeentelijke-organisatie
