description:
  text: Tien kernen en ruim 24.000 inwoners, een belangrijke binnenvaarthaven, veel
    ruimte voor de zorg, een rijke historie, de Maasplassen én een mooie, bosrijke
    natuur. Dat is Maasgouw. Een nog jonge gemeente in Midden-Limburg die volop in
    ontwikkeling is.
