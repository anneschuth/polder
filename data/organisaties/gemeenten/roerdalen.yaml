description:
  text: Klein Geluk uit Roerdalen is de naam die we geven aan het vergroten van geluk
    in onze gemeente. Ons doel is om bij te dragen aan het geluk en de levensvoldoening
    van inwoners én bezoekers van onze gemeente. Dit doen we vanuit de kernwaarden
    vertrouwen en verantwoordelijkheid, respect en gelijkwaardigheid. Deze waarden
    vormen de basis voor de samenwerking met onze gemeenschap en de ontwikkeling van
    onze eigen organisatie.
  url: https://www.roerdalen.nl/werken-aan-geluk
