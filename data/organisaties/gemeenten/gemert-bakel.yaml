description:
  text: 'De gemeenteraad is het hoogste bestuursorgaan. Hij bestuurt op hoofdlijnen
    en controleert als volksvertegenwoordiging het college van B&W. De raad heeft
    het laatste woord over de besteding van het geld van de gemeente door het vaststellen
    van de gemeentebegroting. Ook stelt hij verordeningen vast. De burgemeester is
    voorzitter en de raadsgriffier is secretaris van de gemeenteraad. Zij hebben hier
    beiden geen stemrecht.Zie voor meer informatie https://www.gemert-bakel.nl/gemeenteraadHet
    college van burgemeester en wethouders (B&W) is het dagelijks bestuur van de gemeente
    en voert het beleid uit dat (op hoofdlijnen) door de gemeenteraad is vastgesteld.
    Daarover legt het college verantwoording af aan de gemeenteraad.Zie voor meer
    informatie https://www.gemert-bakel.nl/college-van-bwDe ambtelijke organisatie
    staat onder leiding van de gemeentesecretaris en algemeen directeur. Deze persoon
    is ook de adviseur van het college van burgemeester en wethouders.De organisatie
    bestaande uit ongeveer 170 medewerkers, is opgebouwd uit 7 teams met ieder zijn
    aandachtsgebieden. De directie stuurt de 7 managers aan. Gemert-Bakel doet dat
    met ambitie en doorzettingsvermogen en staat open voor mogelijkheden. Samen met
    onze inwoners en ondernemers. En dat is vertaald naar de competenties van onze
    medewerkers: samenwerken, klantgericht, initiatiefrijk en daadkracht.'
  url: https://www.gemert-bakel.nl/organisatie
