description:
  text: 'Dorps wonen met veel voorzieningen, maar ook dicht bij de stad én de rust
    van de natuur. Alle bestemmingen zijn binnen handbereik door de ligging tussen
    de snelwegen A2 en A58, een ondergronds treinstation in het centrum en Eindhoven
    Airport dichtbij. Best is van alle gemakken voorzien: basisscholen, een middelbare
    school, een ruim winkelaanbod, musea, een bibliotheek, een bioscoop, sportvoorzieningen
    en vele recreatiemogelijkheden. Best is een toegangspoort tot het Nationaal Landschap
    Het Groene Woud en maakt deel uit van de Brainport regio, het hightech hart van
    Brabant.'
  url: https://www.gemeentebest.nl/over-de-gemeente
