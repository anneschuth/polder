description:
  text: 'De ambtelijke organisatie van de gemeente Borne bestaat uit het team Directie
    (gemeentesecretaris/algemeen directeur, directiesecretaris, concerncontroller
    en afdelingsmanagers) en 4 afdelingen: Afdeling Samen Besturen, Afdeling Samen
    Bouwen, Afdeling Samen Leven en Afdeling Samen Werken.De Afdeling Samen Besturen
    houdt zich bezig met projectmanagement, bestuursondersteuning, veiligheid en ondermijning
    en communicatie en participatie.De Afdeling Samen Bouwen bestaat uit het Team
    Beleid, Team Handhaving en Uitvoering en het Team Ontwikkeling en  Vastgoed.De
    afdeling kent diverse vakgebieden, zoals wonen, verkeer, ruimtelijke ordening,
    vrijetijdseconomie, erfgoed, economie en bedrijven, platteland, mobiliteit, water,
    groen, duurzaamheid en vastgoedontwikkeling. Ook houden medewerkers van deze afdeling
    zich bezig met bouwen en bouwtoezicht, vergunningverlening, toezicht en handhaving.
    Daarnaast wordt er ook gewerkt aan een hoogwaardig woon-, werk- en leefmilieu
    door onder andere het opstellen van ruimtelijke plannen en visies.De Afdeling
    Samen Leven bestaat uit het Team Beleid en Uitvoering, Team Kwaliteit en Publiek
    en Team Sport.De afdeling voert verschillende wetten uit, zoals de Wet maatschappelijke
    ondersteuning, Jeugdwet, Participatiewet, Wet op passend onderwijs en Wet gemeentelijke
    schuldhulpverlening. Ook heeft de afdeling klantcontacten via de balies, telefoon,
    social media, receptie, etc. Daarnaast zorgen sportcoaches voor sport en bewegen,
    het bevorderen van een gezonde levensstijl, participatie, verbinding en ontmoeting.  Verder
    zet de afdeling zich in voor sterke, vitale sportverenigingen.De Afdeling Samen
    Werken bestaat uit de Teams Informatie, Team Organisatieondersteuning en Team
    Financiën en Control.De afdeling helpt het bestuur en de medewerkers van de gemeente
    Borne om hun werk goed uit te voeren. De afdeling ondersteunt, adviseert, stelt
    kaders en toetst.'
  url: https://www.borne.nl/gemeentelijke-organisatie
