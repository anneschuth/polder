description:
  text: De gemeenteraad is het hoogste bestuursorgaan in onze gemeente. De griffie
    ondersteunt de gemeenteraad. De gemeenteraad geeft aan wat er in een gemeente
    moet gebeuren en controleert het werk van de burgemeester en wethouders. Het college
    van burgemeester en wethouders (college van B&W) is het dagelijks bestuur van
    de gemeente. De bevoegdheden van het college staan in de Gemeentewet. De gemeentesecretaris
    geeft, als algemeen directeur, leiding aan de ambtelijke organisatie.De ambtelijke
    organisatie bestaat uit 4 aandachtsgebieden:- Stadsdelen, Concernzaken en Algemeen-
    Sociaal- Fysiek- Bedrijfsvoering
