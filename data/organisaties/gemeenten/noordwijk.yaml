description:
  text: Bij de gemeente Noordwijk werken we met ruim 300 medewerkers voor ruim 44.000
    inwoners. Dit doen we in 10 clusters. Binnen elk cluster werken teams aan verschillende
    onderwerpen zoals financiën, dienstverlening en duurzaamheid. De gemeentesecretaris
    en de algemeen directeur geven leiding aan de ambtelijke organisatie.
  url: https://www.noordwijk.nl/bestuur-organisatie/de-gemeentelijke-organisatie/
