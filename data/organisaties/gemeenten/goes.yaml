description:
  text: De gemeente Goes is een gemeente met iets meer dan 40.000 inwoners in de provincie
    Zeeland. De ambtelijke organisatie bestaat uit vijf afdelingen. Dit zijn de afdelingen
    Concern, Dienstverlening, Omgeving & Economie, Openbare Ruimte en Samenleving.
    De gemeentesecretaris vormt samen met de afdelingshoofden en de concerncontroller
    het Managementteam.
