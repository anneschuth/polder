description:
  text: Gemeente Den Haag. Den Haag telt acht stadsdelen. Elk van deze stadsdelen
    heeft een eigen kantoor, waar de meeste diensten van de gemeente zijn gehuisvest.
    De indeling in stadsdelen is in 1988 vastgesteld door de gemeenteraad. Elk van
    deze stadsdelen is daarbij onderverdeeld in wijken en buurten.De Rekenkamer is
    een onafhankelijke toezichthouder op het gemeentebestuur. Zij heeft een eigen
    adres voor Woo-verzoeken.
  url: https://www.denhaag.nl/nl/
