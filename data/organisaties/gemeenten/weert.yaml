description:
  text: "De gemeente Weert is een publieke organisatie van ruim 400 medewerkers. Wij\
    \ werken met passie aan klantgerichte dienstverlening. Dat doen we onder andere\
    \ door burgerinitiatieven te ondersteunen en in te zetten op burgerparticipatie.\
    \ De gemeente behoudt natuurlijk haar kerntaken.De gemeenteraad is het algemeen\
    \ bestuur van onze gemeente. De gemeenteraad stelt de kaders vast waarbinnen de\
    \ gemeente werkt. Voor het dagelijks bestuur is het college van burgemeester en\
    \ wethouders aan zet. Het college neemt bijvoorbeeld besluiten over aanvragen\
    \ voor vergunningen, uitkeringen en subsidies. Daarnaast kan het college ook contracten\
    \ sluiten. De burgemeester vertegenwoordigt de gemeente. Hij ondertekent bijvoorbeeld\
    \ contracten. In de wet staat een aantal specifieke taken, ook wel portefeuilles\
    \ genoemd, van de burgemeester, bijvoorbeeld als het gaat om de handhaving van\
    \ de openbare orde.Onze ambtelijke organisatie bestaat uit 10 afdelingen. Iedere\
    \ afdeling heeft haar eigen expertise op een specifiek gebied. Een afdeling wordt\
    \ aangestuurd door een afdelingshoofd. Sommige afdelingen zijn onderverdeeld in\
    \ teams. Dat zijn er 16 in totaal. Teams worden aangestuurd door een teamleider.\
    \ Zo werken we samen aan een gemeente waar het goed wonen, werken, leren, beleven\
    \ en ontspannen is. Of, zoals we zelf zeggen, verwonder je in de groene thuishaven\
    \ Weert.  Hieronder vind je een overzicht van alle afdelingen en teams binnen\
    \ de gemeente Weert.De bevoegdheden van de ambtelijke organisatie zijn met name\
    \ geregeld in het algemeen mandaatbesluit gemeente Weert 2024. Er kunnen ook aparte\
    \ besluiten waarin een bevoegdheid van een bepaalde functie of persoon is geregeld.•\t\
    Gemeenteraad (ondersteund door de griffie)•\tCollege van burgemeester en wethouders•\t\
    Burgemeester•\tDirectieVakafdelingen en teams:o\tRuimte, Economie en Vastgoed\t\
    Ruimtelijke ontwikkeling\tVastgoedo\tOnderwijs, Cultuur, Sport & Welzijn\tZorg\
    \ & participatie\tOnderwijshuisvesting, cultuur en sporto\tVergunningen, Toezicht\
    \ & Handhaving\tVergunning\tAPV / bijzondere wetten\tHandhavingo\tOpenbaar\
    \ Gebied\tNatuur en cultuurtechniek\tVerkeer en infratechnieko\tWerk, Inkomen\
    \ & Zorg\tSchulddienstverlening, handhaving, leerplicht/doorstroompunt en administratieve\
    \ ondersteuning\tParticipatie\tWmoo\tConcernstaf\tHRM\tCommunicatieo\tInformatieo\t\
    Dienstverlening"
