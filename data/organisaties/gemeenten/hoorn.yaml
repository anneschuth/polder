description:
  text: De gemeente Hoorn bestaat uit een directiestaf en is georganiseerd in de volgende
    drie domeinen:Domein Maatschappelijke ontwikkeling, Domein Stedelijke Ontwikkeling
    & Beheer en als laatste het Domein Bedrijfsvoering en dienstverlening.Elk domein
    heeft zijn eigen directeur. De drie directeuren van de domeinen vormen samen met
    de gemeentesecretaris de directie.
