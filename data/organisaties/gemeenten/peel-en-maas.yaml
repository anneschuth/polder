description:
  text: 'De gemeenteraad:vertegenwoordigt inwoners van Peel en Maas. Stelt hoofdlijnen/kaders
    van het beleid vast. Controleert het college van burgemeester en wethouders.Het
    college van burgemeester en wethouders:Dagelijks bestuur van de gemeente. Bereidt
    beleid en plannen voor de gemeenteraad voor.Directie: leidt de ambtelijke organisatie.
    Eerste adviseur van het college.Griffie: adviseert en ondersteunt de gemeenteraad.
    Stimuleert de duale werkwijze van de raad.Team Communicatie & Dienstverlening
    (C&D): verantwoordelijk voor organisatie-brede dienstverlening. Klant contact
    center, Burgerzaken, Communicatie.Team Vergunningen, Toezicht en Handhaving en
    Veiligheid (VTHV): uitvoering van taken op het gebied van openbare orde/veiligheid,
    vergunningverlening, toezicht en handhaving.Team Werk, Inkomen, Jeugd en Zorg
    (WIJZ): ondersteunt inwoners via een integrale aanpak. Verstrekt inkomensvoorzieningen,
    begeleiding naar werk, schuldhulpverlening, jeugdzorg en WMO-ondersteuning.Team
    Openbare Ruimte (OR): inrichting en beheer van de openbare ruimte.Team Buitendienst
    (BD): onderhoudt openbare ruimte, gemeentelijke gebouwen, sportaccommodaties en
    begraafplaatsen. Inzameling van afval en gladheidsbestrijding.Team Omgevingsontwikkeling
    (OO): opstellen van ruimtelijke, volkshuisvestelijke en economische beleids- en
    uitvoeringskaders.Team Maatschappelijke Ontwikkeling (MO): beleid en advies op
    het gebied van gemeenschapsontwikkeling, kunst en cultuur, sport en bewegen, zorg
    en ondersteuning, jeugd en onderwijs, werk en inkomen.Team Advies en Control (A&C):
    adviseert en ondersteunt de organisatie.Planning & Control, juridische control,
    personeel en organisatie, financiën, bestuursondersteuning, leren en ontwikkelen,
    inkoop, bezwaren & klachten.Team Facilitair en Informatietechnologie (FIT): Facilitaire
    dienstverlening, interne evenementenorganisatie, basisregistraties, documentaire
    informatievoorziening, applicatiebeheer, ICT-services'
  url: https://www.peelenmaas.nl/bestuur-en-organisatie/werken-bij-de-gemeente/wie-zijn-wij
