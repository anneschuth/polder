  valid_from: '1900-01-01'
description:
  text: 'Lansingerland ligt in de metropoolregio Rotterdam en Den Haag en telt rond
    de 64.000 inwoners. Onze gemeente bestaat uit drie dorpskernen: Bergschenhoek,
    Bleiswijk en Berkel en Rodenrijs. En twee buurtschappen: Kruisweg en Rotte. Als
    “Home of Horti Science” zijn we één van de meest innovatieve gemeenten in de glastuinbouwsector
    en onderdeel Greenport Westland.Het college van burgemeester en wethouders (B&W)
    vormt het dagelijks bestuur van de gemeente en is politiek verantwoordelijk voor
    beleid en besluitvorming. Het college legt verantwoording af aan de gemeenteraad.
    De gemeenteraad wordt bijgestaan door de griffier, die verantwoordelijk is voor
    de ondersteuning van de raad en het waarborgen van de informatievoorziening tussen
    de raad en het college.  De gemeentelijke organisatie wordt aangestuurd door het
    directieteam met daarin de algemeen directeur, domeindirecteuren en de concerncontroller.
    De gemeentelijke organisatie bestaat uit drie domeinen:BedrijfsvoeringVan binnen,
    voor buiten. Dat is de lijfspreuk bij domein Bedrijfsvoering. Wij zorgen ervoor
    dat binnen de organisatie alles zo goed mogelijk loopt, waardoor we de dienstverlening
    naar inwoners en ondernemers ook kunnen blijven verbeteren. Met onze werkzaamheden
    ondersteunen wij het college van Burgemeesters & Wethouders, de directie én de
    rest van de organisatie.Ruimte & EconomieLansingerland ontwikkelt en groeit volop.
    Dagelijks bouwen collega’s uit domein Ruimte & Economie samen met partners aan
    een prettig woon-, werk- en leefklimaat voor haar inwoners en ondernemers. Vernieuwing,
    ontwikkeling en innovatie.SamenlevingGelijke kansen, een goede gezondheid en een
    prettige leefomgeving voor al onze inwoners. Iedereen werkt op zijn manier aan
    de verschillende opgaven. Dat gaat van jeugdhulp tot inburgering, van onderhuisvesting
    tot sportvoorzieningen en van paspoorten tot geboorteaannames. Daarnaast leveren
    we boa’s, adviseren we de burgemeester op het gebied van ondermijning en zorgen
    we dat mensen die geen werk hebben tóch in basisvoorzieningen kunnen voorzien.
    We zijn dus breed in de samenleving actief.'
  url: https://www.werkenvoorlansingerland.nl/
