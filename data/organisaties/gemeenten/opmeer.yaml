description:
  text: De meeste burgers hebben vaak meer met ambtenaren dan met bestuurders te maken.
    Ambtenaren hebben tot taak college- en raadsbesluiten voor te bereiden en uit
    te voeren. De gemeentesecretaris vormt samen met de adjunct-gemeentesecretaris
    de directie van de ambtelijke organisatie. Zij geven samen leiding aan de ambtenaren.
    In elk geval is een van de twee aanwezig bij de wekelijkse vergaderingen van het
    college van burgemeester en wethouders. Zij vormen daarmee niet alleen de verbinding
    tussen het college en de ambtelijke werkorganisatie, zij zijn ook verantwoordelijk
    voor het goed functioneren van de organisatie, die bestaat uit 6 verschillende
    afdelingen.De afdelingen van gemeente Opmeer zijn:Strategie & OpgaveBedrijfsvoeringPubliekszakenZorg
    & WelzijnRuimte & OndernemenRealisatie & Beheer
