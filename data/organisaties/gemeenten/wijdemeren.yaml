description:
  text: De gemeente Wijdemeren is een groene en waterrijke gemeente in Noord-Holland,
    gelegen tussen Hilversum, Loosdrecht en ’s-Graveland. De organisatie richt zich
    op het leveren van publieke diensten aan inwoners en ondernemers, met aandacht
    voor leefbaarheid, duurzaamheid en samenwerking binnen de regio Gooi en Vechtstreek.De
    gemeenteraden van Wijdemeren en Hilversum hebben op 10 juli 2024 besloten om op
    1 januari 2027 de gemeente Wijdemeren bij Hilversum te voegen.
  url: https://www.wijdemeren.nl/Bestuur
