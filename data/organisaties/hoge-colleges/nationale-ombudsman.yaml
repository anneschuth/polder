description:
  text: Nationale ombudsman helpt burgers op weg als het misgaat tussen hen en de
    overheid. Door de weg te wijzen naar het juiste loket, advies te geven, en effectief
    onderzoek te doen. Daarnaast daagt de Nationale ombudsman overheden uit anders
    te kijken naar hun werk en dienstverlening. Zodat de belangen van de burger altijd
    gerespecteerd worden en onderdeel zijn in alles wat de overheid doet.De Kinderombudsman
    en de Veteranenombudsman hebben tot doel te bevorderen dat de rechten van respectievelijk
    jeugdigen en veteranen worden geëerbiedigd door bestuursorganen en door privaatrechtelijke
    organisaties.
