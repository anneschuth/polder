names:
- value: Algemene Rekenkamer
  abbr: AR
  valid_from: '1900-01-01'
description:
  text: De Algemene Rekenkamer onderzoekt of de rijksoverheid publiek geld zinnig,
    zuinig en zorgvuldig uitgeeft. Haar wettelijke taak is het controleren van de
    inkomsten en uitgaven van het Rijk en hierover rapporteert de Algemene Rekenkamer
    één keer per jaar aan het parlement op Verantwoordingsdag (derde woensdag in mei).  Op
    basis van dit oordeel kan het parlement besluiten of zij decharge verlenen aan
    het kabinet. Daarnaast rapporteert de Algemene Rekenkamer over afzonderlijke onderzoeken
    aan het parlement zodat Kamerleden kunnen bepalen of het beleid van een minister
    doeltreffend is.
  url: https://www.rekenkamer.nl/over-de-algemene-rekenkamer
