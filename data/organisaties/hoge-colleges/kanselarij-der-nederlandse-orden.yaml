description:
  text: "De Kanselarij der Nederlandse Orden is de organisatie die:-\thet Kapittel\
    \ voor de Civiele Orden en het Kapittel der Militaire Willems-Orde huisvest en\
    \ ondersteunt bij hun advisering over de voorstellen voor Koninklijke onderscheidingen-\t\
    zorg draagt voor het beheer van de versierselen van de onderscheidingen en voor\
    \ de correcte verzending ervan aan degenen die ze uitreiken-\tzorgt dat registers\
    \ worden aangehouden van onderscheiden personen-\tin de persoon van de Kanselier\
    \ der Nederlandse Orden de zuiverheid en waardigheid van de Orden bewaaktDe dagelijkse\
    \ leiding is in handen van de directeur, die daarnaast secretaris van het Kapittel\
    \ voor de Civiele Orden is."
