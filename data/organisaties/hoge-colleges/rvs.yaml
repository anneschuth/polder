description:
  text: 'De Raad van State is onafhankelijk adviseur van regering en parlement over
    wetgeving en bestuur en hoogste algemene bestuursrechter van Nederland. De Raad
    van State is een Hoog College van Staat waarvan de taken en de werkwijze zijn
    vastgelegd in de Grondwet en de Wet op de Raad van State. De dagelijkse leiding
    ligt bij de vice-president. De Raad van State heeft twee Afdelingen: de Afdeling
    advisering en de Afdeling bestuursrechtspraak. De Raad en de beide Afdelingen
    worden ondersteund door een ambtelijke organisatie met vier directies en staat
    onder leiding van de secretaris van de Raad van State.'
