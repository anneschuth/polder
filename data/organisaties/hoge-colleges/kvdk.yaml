  valid_from: '1900-01-01'
description:
  text: Het Kabinet van de Koning is een kleine rijksorganisatie die de Koning ondersteunt
    in de uitoefening van zijn constitutionele werkzaamheden. Dit heeft onder meer
    betrekking op de contacten tussen de Koning en de overige leden van de regering.Jaarlijks
    bereidt het Kabinet honderden bezoeken, ontvangsten, gesprekken en beëdigingen
    door de Koning voor. Ook verwerkt en archiveert het Kabinet van de Koning per
    jaar ruim 2500 wetten, algemene maatregelen van bestuur (amvb’s) en Koninklijke
    Besluiten.De organisatie behandelt ieder jaar duizenden brieven van burgers en
    organisaties die zich met hun vragen richten tot de Koning (verzoekschriften).
