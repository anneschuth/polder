    - informatiecategorie: Convenanten
      url: https://www.eerstekamer.nl/begrip/wet_open_overheid_convenanten
      toelichting: De link verwijst naar de convenanten van de Eerste Kamer. Een convenant is een afspraak
        van de Eerste Kamer met een of meer partijen, gericht op het behalen van bepaalde (beleids-)doelen.
    - informatiecategorie: Beschikkingen
      url: https://www.eerstekamer.nl/begrip/wet_open_overheid_verzoeken_en#p6
