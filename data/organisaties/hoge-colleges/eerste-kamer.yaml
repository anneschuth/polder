description:
  text: 'De Eerste Kamer kent feitelijk twee soorten organisaties: een politieke en een ambtelijke. De
    ambtelijke organisatie (ook wel griffie genoemd) ondersteunt de Eerste Kamer der Staten-Generaal bij
    de uitvoering van haar (grond)wettelijke taken. De griffie functioneert onder leiding van de Griffier
    van de Eerste Kamer. Het College van Voorzitter en Ondervoorzitters (CVO) houdt toezicht op het functioneren
    van de Griffie. De Griffier stuurt de Beveiligingsautoriteit en de directeuren aan.'
  url: https://www.eerstekamer.nl/begrip/ambtelijke_organisatie
