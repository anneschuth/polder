    - informatiecategorie: Agenda’s en besluitenlijsten bestuurscolleges
      url: https://www.eerstekamer.nl/planning_activiteiten_commissie?key=vm3ciy6li6wf
      toelichting: De link verwijst naar de planning van het College van Voorzitters en Ondervoorzitters.
        Het college vormt het dagelijkst bestuur van de Kamer. Deze informatie is openbaar op grond van
        het Reglement van Orde.
    - informatiecategorie: Jaarplannen en jaarverslagen
      url: https://www.eerstekamer.nl/begrip/raming
      toelichting: De link verwijst naar een overzicht van de ramingen van de Eerste Kamer. Deze zijn
        door de Eerste Kamer zelf vastgestelde "begrotingen" van de kosten voor haar functioneren.
    - informatiecategorie: Agenda’s en besluitenlijsten bestuurscolleges
      url: https://www.eerstekamer.nl/planning_activiteiten_commissie?key=vm3cndgtwfzf
      toelichting: De link verwijst naar de planning van het College van fractievoorzitters (Cvf). Het
        college ondersteunt en adviseert de Kamervoorzitter bij het leiden van de werkzaamheden van de
        Kamer. Deze informatie is openbaar op grond van het Reglement van Orde.
    - informatiecategorie: Woo-verzoeken en -besluiten
