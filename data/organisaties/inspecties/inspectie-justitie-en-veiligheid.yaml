description:
  text: De Inspectie Justitie en Veiligheid draagt bij aan een rechtvaardige en veilige
    samenleving. Dit doet de Inspectie door toezicht te houden op uitvoeringsorganisaties
    op het terrein van justitie en veiligheid. Door onderzoeken geeft de Inspectie
    inzicht in de kwaliteit van de taakuitvoering en de naleving van regels en normen.
    Om zo risico’s te signaleren en om organisaties aan te zetten tot verbetering.
