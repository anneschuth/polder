names:
- value: Inspecteur-Generaal der Krijgsmacht
  abbr: IGK
  valid_from: '1900-01-01'
description:
  text: De Inspecteur-Generaal der Krijgsmacht (IGK) bemiddelt wanneer een (voormalige)
    Defensiemedewerker of het thuisfront een probleem heeft met Defensie maar daar
    zelf niet uitkomt. De Inspecteur-Generaal der Krijgsmacht probeert de partijen
    nader tot elkaar te brengen om zo tot een oplossing te komen. Inspecteur-Generaal
    der Krijgsmacht adviseert ook de minister en is ook Inspecteur der Veteranen en
    Inspecteur der Reservisten.
