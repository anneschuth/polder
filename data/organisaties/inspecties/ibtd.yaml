description:
  text: De Inspectie belastingen, toeslagen en douane toetst of de overheid mensen
    en bedrijven rechtvaardig behandelt wanneer zij te maken hebben met belastingzaken,
    toeslagen of de douane. Dat doen wij door mogelijke structurele risico’s te onderzoeken.
    Daarbij kijken we naar het hele proces van totstandkoming van wetten en regels
    tot en met de uitvoering daarvan. Met onze onderzoeken en aanbevelingen werken
    we aan een betrouwbare overheid.
