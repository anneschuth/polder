names:
- value: Inspectie Veiligheid Defensie
  abbr: IVD
  valid_from: '1900-01-01'
description:
  text: De Inspectie Veiligheid Defensie (IVD) houdt toezicht op de fysieke en sociale
    veiligheid bij Defensie. Zij beoordeelt de werking van beleid en de uitvoering
    van regelgeving in de praktijk en onderzoekt ernstige voorvallen. Met haar toezicht
    wil de inspectie de veiligheidscultuur en het lerend vermogen van Defensie versterken.
    Het werken zo veilig mogelijk maken is een gezamenlijke opgave van de defensieorganisatie.
    Elke medewerker moet zich bewust zijn van veiligheidsrisico’s. Veiligheid vergt
    aandacht, steeds weer.
