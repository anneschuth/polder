names:
- value: Nederlandse Emissieautoriteit
  abbr: NEa
  valid_from: '1900-01-01'
description:
  text: De Nederlandse Emissieautoriteit (NEa) is de onafhankelijke nationale autoriteit
    voor uitvoering van en toezicht op marktinstrumenten die bijdragen aan een klimaatneutrale
    samenleving. De NEa is een zogenaamd klein zelfstandig bestuursorgaan (zbo). Dat
    betekent dat het bestuur een zbo is, terwijl de werkorganisatie een agentschap
    van het Ministerie van Economische Zaken en Klimaat (EZK) is. De belangrijkste
    opdrachtgevers van de organisatie zijn de ministeries van EZK, Infrastructuur
    en Waterstaat (IenW) en Financiën (MinFin). De NEa is gevestigd in Den Haag en
    telt ruim 140 medewerkers.
  url: https://www.emissieautoriteit.nl/onderwerpen/taken-en-uitvoering
