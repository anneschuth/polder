  valid_from: '1900-01-01'
description:
  text: De Inspectie Overheidsinformatie en Erfgoed houdt toezicht op een deel van
    het Nederlandse erfgoed en op het informatiebeheer bij de  centrale overheid.
    Ze levert een bijdrage aan het tegengaan van illegale handel in cultuurgoederen.  Daarnaast
    houdt ze toezicht op de naleving van het archeologiebestel, opgravingen, vondsten
    en archeologische monumenten.  Professionele organisaties voor monumentenbehoud
    vallen onder het toezicht als ook de werking van het monumentenstelsel. De Inspectie
    draagt zo bij aan het behoud en beheer van het nationale erfgoed.
