names:
- value: Inspectie Gezondheidszorg en Jeugd
  abbr: IGJ
  valid_from: '1900-01-01'
description:
  text: Iedereen moet in Nederland op goede en veilige zorg en jeugdhulp kunnen vertrouwen. Toezichthouden is meer dan ‘controleren op basis van wetten, regels en normen’. Wij agenderen kwaliteit en veiligheid bij partijen in en rondom de zorg en wij stimuleren zorgorganisaties en professionals om (samen) te werken aan het borgen en verbeteren van hun zorg. Waar nodig treden we op. We houden ook toezicht op de kwaliteit en veiligheid van zorg op Bonaire, Sint Eustatius en Saba.
  url: https://www.igj.nl/over-ons
