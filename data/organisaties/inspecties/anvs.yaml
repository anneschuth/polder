  referentie: http://wetten.overheid.nl/BWBR0002402#HoofdstukII_Artikel3
taken_en_bevoegdheden: De ANVS verleent vergunningen, registreert meldingen en registreert
  en erkent deskundigen en stralingsartsen. Daarnaast is de ANVS verantwoordelijk
  voor het houden van toezicht en het treffen van maatregelen wanneer dat voor de
  nucleaire veiligheid of stralingsbescherming noodzakelijk is. Verder zorgt de ANVS
  er met een aantal partners voor dat Nederland zo goed mogelijk is voorbereid op
  stralingsincidenten en kernongevallen. Ook heeft de Autoriteit een taak bij de ontwikkeling
  van beleid voor nucleaire veiligheid en stralingsbescherming, waaronder ook beleid
  voor radioactief afval. Ze bereidt wet- en regelgeving voor of adviseert hierover.
  Op internationaal vlak werkt de ANVS samen met verschillende buitenlandse overheden,
  autoriteiten en organisaties zoals het Internationaal Atoomenergieagentschap (IAEA).
