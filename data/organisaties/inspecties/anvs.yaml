- value: Autoriteit Nucleaire Veiligheid en Stralingsbescherming
  abbr: ANVS
  valid_from: '1900-01-01'
description:
  text: De Autoriteit Nucleaire Veiligheid en Stralingsbescherming (ANVS) ziet er
    op toe dat de nucleaire veiligheid en stralingsbescherming in Nederland voldoen
    aan de hoogste eisen. De ANVS stelt daarvoor regels op, verleent vergunningen,
    ziet toe op de naleving daarvan en kan handhavend optreden.Tot 2015 waren de diverse
    overheidstaken en de kennis over de nucleaire sector verspreid over verschillende
    instanties. Al deze kennis en kunde is nu gebundeld in de ANVS. De ANVS is sinds
    1 augustus 2017 een zelfstandig bestuursorgaan (zbo). Hierdoor kunnen beslissingen
    onafhankelijk worden genomen. De ANVS valt onder de verantwoordelijkheid van de
    minister van Infrastructuur en Waterstaat.
  url: https://www.autoriteitnvs.nl/over-de-anvs
