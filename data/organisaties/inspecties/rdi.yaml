description:
  text: Bij de Rijksinspectie Digitale Infrastructuur werken we aan een veilig verbonden
    Nederland. Een Nederland dat kan rekenen op goede telecommunicatie- en IT-netwerken,
    die bovendien veilig en betrouwbaar gebruikt kunnen worden. We voeren de wet-
    en regelgeving uit op dit gebied. En we houden er toezicht op dat iedereen zich
    aan de regels, eisen en voorwaarden houdt.
