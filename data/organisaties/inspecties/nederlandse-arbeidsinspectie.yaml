description:
  text: De Nederlandse Arbeidsinspectie is de toezichthouder op het terrein van het ministerie van Sociale Zaken en Werkgelegenheid. Dat toezicht is gericht op de naleving van de wet- en regelgeving over arbeidsomstandigheden, de arbeidsmarkt, arbeidsverhoudingen en het sociale zekerheidsstelsel. Daarnaast onderzoekt ze de werking van het stelsel van sociale zekerheid en signaleert ontwikkelingen en risico’s op de beleidsterreinen van het ministerie van SZW. Ook werkt de Inspectie op het gebied van pgb- en declaratiefraude als opsporingsorganisatie voor het ministerie van Volksgezondheid, Welzijn en Sport.
