description:
  text: De Inspectie van het Onderwijs onderzoekt of alle leerlingen onderwijs krijgen
    van voldoende kwaliteit. En of scholen en opleidingen voldoen aan de wet- en regelgeving
    en of ze hun financiën op orde hebben. De onderwijsbesturen zijn hiervoor verantwoordelijk
    en daarom begint en eindigt het toezicht bij hen. De inspectie voert daarnaast
    onderzoeken uit bij de scholen. Ook analyseert de inspectie jaarlijks alle scholen
    op basis van de gegevens die de inspectie al heeft, om te weten of er risico’s
    zijn. Naast het toezicht op individuele besturen en hun scholen kijkt de inspectie
    naar het onderwijsstelsel als geheel. Daarbij agendeert de inspectie maatschappelijk
    belangrijke onderwerpen, onder meer in de jaarlijkse Staat van het Onderwijs.In
    het hoger onderwijs beoordeelt en bevordert de Inspectie van het Onderwijs de
    kwaliteit van het stelsel, de inspectie houdt financieel toezicht en ziet toe
    op de naleving van wettelijke voorschriften door instellingen in het hoger onderwijs.Tot
    slot houdt de Inspectie van het Onderwijs toezicht hoe gemeenten hun wettelijke
    toezichtstaken uitvoeren rond de kinderopvang.
