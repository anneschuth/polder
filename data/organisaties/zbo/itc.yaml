description:
  text: Het departement IT en CIO (ITC) is een organisatieonderdeel van het Centraal
    Bureau voor de Statistiek (CBS).
taken_en_bevoegdheden: Het departement IT en CIO (ITC) van het CBS bestaat uit het
  onderstaande team en de daaronder vermelde afdelingen, waarvan de afdelingen elk
  zijn onderverdeeld in een aantal teams:* ICO (CIO office)IAS (Architectuur en security):*
  IAR (Architectuur en research)* ISC (Security service center)ITD (Techniek en dienstverlening):*
  IDO (Dienstverlening en ondersteuning)* ITT (Techniek)IAO (Applicatieontwikkeling):*
  IAO1 (Applicatieontwikkeling 1)* IAO2 (Applicatieontwikkeling 2)* IAO3 (Applicatieontwikkeling
  3)* IAO4 (Applicatieontwikkeling 4)* IAO5 (Applicatieontwikkeling 5)* IAO6 (Applicatieontwikkeling
  6)* IAO7 (Applicatieontwikkeling 7)De afdelingen en teams zijn overgenomen uit het
  [CBS-organogram](https://www.cbs.nl/-/media/_pdf/organogram-nl.pdf).
