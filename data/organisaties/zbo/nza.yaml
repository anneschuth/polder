taken_en_bevoegdheden: De Nederlandse Zorgautoriteit (NZa) is belast met:* markttoezicht,
  marktontwikkeling en tarief- en prestatieregulering, op het terrein van de gezondheidszorg;*  toezicht
  op de rechtmatige uitvoering door de zorgverzekeraars van hetgeen bij of krachtens
  de Zorgverzekeringswet is geregeld;* toezicht op de rechtmatige afrekening van de
  bijdragen, bedoeld in de artikelen 32 tot en met 34 van de Zorgverzekeringswet,
  nadat een verzekeraar opgehouden is zorgverzekeringen uit te voeren;* toezicht op
  de rechtmatige en doelmatige uitvoering door de AWBZ-verzekeraars en de rechtspersonen,
  bedoeld in artikel 40 van de Algemene Wet Bijzondere Ziektekosten, van hetgeen bij
  of krachtens die wet en de artikelen 91, tweede lid, tweede volzin, 123 en 124 van
  de Wet financiering sociale verzekeringen is geregeld;* toezicht op de uitvoering
  van de artikelen 41, 42 en 43 van de Wet marktordening gezondheidszorg. In artikel
  3 van deze wet is de juridische basis van de NZa vastgelegd. De NZa richt zich -
  naast bekostiging van zorgverleners en het bewaken van goede uitvoering van verzekeringswetten
  in de zorg - op het proactief vaststellen van condities voor marktwerking en de
  handhaving daarvan. Doel van het nieuwe zorgstelsel is dat de consument waar voor
  zijn geld krijgt. Daarbij hebben efficiëntie, keuze, kwaliteit en toegankelijkheid
  van zorgmarkten een centrale plaats.
