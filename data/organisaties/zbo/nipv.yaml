description:
  text: Het Nederlands Instituut Publieke Veiligheid (NIPV) is een kennisinstituut
    dat zich op onder meer crisisbeheersing en brandweerzorg richt. Door middel van
    onderzoek, onderwijs, informatievoorziening en ondersteuning versterkt het NIPV
    diverse crisispartners, waaronder de veiligheidsregio’s en het Rijk.
  url: https://nipv.nl/over-nipv/
