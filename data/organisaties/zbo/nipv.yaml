  kaderwetZbo:
    kaderwetVanToepassing: nee
wettelijke_grondslagen:
- opschrift: Wet veiligheidsregio's, artikel 66, lid 1
  referentie: https://wetten.overheid.nl/BWBR0027466/2024-01-01#Paragraaf17_Artikel66
taken_en_bevoegdheden: Het Nederlands Instituut Publieke Veiligheid (NIPV) heeft de
  volgende taken:* het verzorgen van officiersopleidingen, alsmede het verzorgen van
  andere (door de minister van Justitie en Veiligheid aan te wijzen) opleidingen die
  met een examen zoals bedoeld in artikel 18, lid 4 van de Wet veiligheidsregio's
  worden afgesloten;* het ontwikkelen van lesstof, oefenstof en leerstof voor bovengenoemde
  opleidingen;* het ontwikkelen en in stand houden van expertise, door middel van
  het verzamelen en beheren van relevante kennis en zo nodig door het verrichten van
  toegepast wetenschappelijk onderzoek;* het ter beschikking stellen van de verzamelde
  informatie en expertise aan organisaties die werkzaam zijn op het gebied van de
  brandweerzorg, de rampenbestrijding, de crisisbeheersing en de geneeskundige hulpverlening;*
  het verwerven en beheren van materieel (inclusief uitrustingen en telecommunicatievoorzieningen)
  en dit waar nodig ter beschikking te stellen aan de veiligheidsregio's en gemeenten
  met een gemeentelijke brandweer;* het verrichten van andere werkzaamheden op het
  gebied van de brandweerzorg, de rampenbestrijding, de crisisbeheersing en de geneeskundige
  hulpverlening, wat betreft het verzorgen van andere dan de hierboven bedoelde opleidingen
  en het ontwikkelen van lesstof, oefenstof en leerstof voor dergelijke opleidingen;*
  het werven en selecteren van kandidaten voor de bovengenoemde opleidingen;* het
  organiseren van oefeningen;* het verrichten van andere activiteiten die de deskundigheid
  van personen binnen de brandweerzorg, de rampenbestrijding, de crisisbeheersing
  en de geneeskundige hulpverlening (of het functioneren van de organisaties waarvoor
  zij werkzaam zijn) bevorderen;* het verrichten van onderzoek voor en het adviseren
  van derden om direct of indirect een bijdrage te leveren aan de fysieke veiligheid.
