names:
- value: Registratiecommissie Tandheelkundige Specialismen
  abbr: RTS
  valid_from: '1900-01-01'
description:
  text: Dit zbo is onderdeel van het cluster Registratiecommissies KNMG, KNMP, KNMT,
    FGzPt en V&VN. Het betreft hier de registratiecommissie van beroepsorganisatie
    Koninklijke Nederlandse Maatschappij tot bevordering der Tandheelkunde (KNMT).De
    Registratiecommissie Tandheelkundige Specialismen (RTS), een onafhankelijk orgaan
    binnen de KNMT, is belast met het uitvoeren van en het houden van toezicht op
    de regelgeving van het College Tandheelkundige Specialismen (CTS). De CTS-regelgeving
    heeft onder meer betrekking op de opleidingen, opleiders en de opleidingsinrichtingen
    voor tandarts-specialisten, evenals de eisen voor (her-)registratie.
  url: https://knmt.nl/loopbaan/tandartsspecialisten/registratiecommissie-tandheelkundig-specialismen-rts
kaderwet:
  kaderwetZbo:
