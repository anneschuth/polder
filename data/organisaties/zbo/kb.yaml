taken_en_bevoegdheden: De Koninklijke Bibliotheek is als nationale bibliotheek werkzaam
  op het gebied van het bibliotheekwezen en heeft onder andere de volgende taken:*
  het voorzien van informatie op het gebied van de Nederlandse geschiedenis, cultuur
  en samenleving aan het hoger onderwijs, wetenschappelijk onderzoek, het openbaar
  bestuur en de uitoefening van beroep of bedrijf;* het aansturen van het netwerk
  van openbare bibliotheekvoorzieningen door afstemming, coördinatie, educatie, informatie,
  reflectie, vertegenwoordiging en promotie;*  het in stand houden van de landelijke
  digitale bibliotheek;*  het verzorgen van een bibliotheekvoorziening van noodzakelijk
  omgezette werken voor personen met een handicap;*  het zorg dragen voor de nationale
  bibliotheekverzameling van geschreven, gedrukte en digitale publicaties;*  het bevorderen
  van de totstandkoming en instandhouding van nationale voorzieningen voor duurzaam
  behoud, beheer, ontsluiting en beschikbaarstelling van de nationale bibliotheekverzameling
  op haar werkterrein;*  het verrichten van onderzoek, gericht op de voorbereiding
  en uitvoering van het beleid op het in de wet genoemde terrein;*  het zorg dragen
  voor landelijke programma's voor conservering en digitalisering;*  het bijdragen
  aan de internationale infrastructuur voor de duurzame toegankelijkheid van digitale
  wetenschappelijke publicaties;*  het bevorderen van de afstemming met overige wetenschappelijke
  bibliotheken binnen en buiten Nederland;*  het bevorderen van de samenwerking met
  archieven, musea en uitgeverijen op haar werkterrein;*  het bevorderen van de internationale
  samenwerking op haar werkterrein.
