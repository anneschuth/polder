description:
  text: Het departement Sociaal-economische en ruimtelijke statistieken (SER) van
    het CBS bestaat uit onderstaande afdelingen, die elk zijn onderverdeeld in een
    aantal teams:SBM (Beleids- en managementsondersteuning):* SIM (Informatiemanagement)*
    SBS (Beleidsstaf)SQS (Quartaire sector):* SGZ (Gezondheid en zorg)* SND (Onderwijs)*
    SRV (Rechtsbescherming en veiligheid)* SCT (Cultuur, toerisme en technologie)SLO
    (Leefomgeving):* SRR (Regio en ruimte)* SVW (Vastgoed en woningmarkt)* SLN (Landbouw
    en natuur)* SMI (Milieu)* SEN (Energie)SES (Demografische en sociaal-economische
    statistieken):* SAM (Arbeidsmarkt)* SDE (Demografie)* SOZ (Sociale zekerheid)*
    SET (Sociaal-economisch totaalbeeld)* CN (Caribisch Nederland)SAL (Arbeid, inkomen
    en leefsituatie):* SPR (Productie)* SDV (Dynamische verwerking)* SAD (Arbeid,
    dynamiek en mobiliteit)* SIL (Leefsituatie inkomen en samenhang)SVV (Verkeer en
    vervoer):* SGV (Goederenvervoer)* SGP (Personenvervoer)De afdelingen en teams
    zijn overgenomen uit het [CBS-organogram](https://www.cbs.nl/-/media/_pdf/organogram-nl.pdf).
