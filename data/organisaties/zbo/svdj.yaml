names:
- value: Stimuleringsfonds voor de Journalistiek
  abbr: SVDJ
  valid_from: '1900-01-01'
description:
  text: Het Stimuleringsfonds voor de Journalistiek stimuleert de kwaliteit, diversiteit
    en onafhankelijkheid van de journalistiek door met geld, kennis en onderzoek de
    vernieuwing van de journalistieke infrastructuur in Nederland te bevorderen. Dit
    gebeurt onder meer door subsidieregelingen, onderzoek en door het organiseren
    van evenementen op het gebied van innovatie, onderzoeksjournalistiek en  regionale
    en lokale journalistiek. Daarnaast deelt het Fonds via de nieuwspagina op de website
    de meest recente ontwikkelingen in de journalistieke sector.Het Stimuleringsfonds
    ontvangt als zelfstandig bestuursorgaan (ZBO) jaarlijks een bijdrage van het ministerie
    van Onderwijs, Cultuur en Wetenschap, waaruit alle activiteiten worden gefinancierd.
  url: https://www.svdj.nl/over-svdj/
