taken_en_bevoegdheden: Het Stimuleringsfonds voor de Journalistiek (SvdJ) heeft de
  volgende taken:* het handhaven en bevorderen van de pluriformiteit van de pers,
  voor zover die van belang is voor informeren en opinievorming;* het verlenen van
  financiële steun aan de pers;* het verrichten dan wel doen verrichten van onderzoek
  met betrekking tot het functioneren van de pers.
