  valid_from: '1900-01-01'
description:
  text: De Nederlandsche Bank (DNB) is de centrale bank, toezichthouder en resolutieautoriteit
    die zich sterk maakt voor financiële stabiliteit en duurzame welvaart in Nederland.
    Zo draagt DNB in samenwerking met Europese partners bij aan prijsstabiliteit en
    een evenwichtige macro-economische ontwikkeling in Europa, een schokbestendig
    financieel systeem, een veilig en betrouwbaar betalingsverkeer en solide financiële
    instellingen die hun verplichtingen en toezeggingen nakomen. Om het beleid dat
    op deze doelstellingen gericht is te versterken, brengt DNB geregeld onafhankelijk
    economisch advies uit.DNB is tevens verantwoordelijk voor het betalingsverkeer
    in Caribisch Nederland. Ook werkt DNB samen met het Depositogarantiefonds voor
    de uitvoering van het depositogarantiestelsel in Caribisch Nederland. Samen met
    de Autoriteit Financiële Markten (AFM) houdt DNB toezicht op financiële instellingen
    die zich in Caribisch Nederland bevinden.
  url: https://www.dnb.nl/over-ons/
kaderwet:
  kaderwetZbo:
    instellingsmotief: Onafhankelijkheid
    kaderwetVanToepassing: ja
    afwijkendeBepalingKaderwet:
      artikel: 21,22,28,32,33,34
      toelichting: Voor artikel 28, eerste lid, en artikel 34, eerste lid, zijn er
        afwijkende bepalingen. Voor de rest van deze artikelen zijn geen afwijkende
        bepalingen. De Kaderwet zelfstandige bestuursorganen is niet van toepassing
        op de taken die DNB uitvoert op grond van de artikelen 3 en 4, eerste lid,
        onderdelen b en d, van de Bankwet 1998 en artikel 4 van de Wet geldstelsel
        BES.
