taken_en_bevoegdheden: Als zelfstandig bestuursorgaan (zbo) heeft De Nederlandsche
  Bank (DNB) op grond van artikel 4 van de Bankwet 1998 de volgende taken:* het uitoefenen
  van toezicht op financiële instellingen op grond van de daarvoor geldende wettelijke
  regelingen;* het bevorderen van de goede werking van het betalingsverkeer;* het
  bevorderen van de stabiliteit van het financiële stelsel;* het verzamelen van statistische
  gegevens en het vervaardigen van statistieken op grond van de daarvoor geldende
  wettelijke regelingen;* het uitoefenen van afwikkelingstaken met betrekking tot
  bepaalde financiële ondernemingen op de voet van de daarvoor geldende wettelijke
  regelingen.DNB kan, na toestemming bij Koninklijk Besluit, in het algemeen belang
  ook andere taken uitvoeren dan de in de Bankwet 1998 genoemde taken. Naast haar
  in artikel 4 van de Bankwet 1998 vermelde zbo-taken heeft DNB de in artikel 3 van
  de Bankwet 1998 opgenomen monetaire taken. Zo is DNB de centrale bank van Nederland
  en in die hoedanigheid (als deelnemer aan het Europees Stelsel van Centrale Banken)
  belast met taken ter uitvoering van het Verdrag betreffende de werking van de Europese
  Unie. Als centrale bank is DNB volledig onafhankelijk van de minister van Financiën.Ten
  slotte is DNB verantwoordelijk voor het betalingsverkeer in Caribisch Nederland.
  DNB werkt samen met zowel het Depositogarantiefonds als de Autoriteit Financiële
  Markten (AFM), respectievelijk om het depositogarantiestelsel in Caribisch Nederland
  uit te voeren en toezicht te houden op financiële instellingen in Caribisch Nederland.
