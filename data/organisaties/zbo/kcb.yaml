taken_en_bevoegdheden: '* De belangrijkste taak van het KCB is het inspecteren van
  verse groenten en fruit, snijbloemen en potplanten. Het KCB verricht:* de import-
  en exportinspectie (kwaliteit) van verse groenten en fruit;* de kwaliteitscontrole
  van verse groenten en fruit die binnen Nederland worden verhandeld, met uitzondering
  van het detailhandelsstadium;* de importinspectie (fytosanitair) van verse groenten
  en fruit, snijbloemen en potplanten en van plantaardige producten die niet onder
  een specifieke sector vallen, ook wel ‘diverse producten’ genaamd;* de bemonstering-
  en monitoring activiteiten ten behoeve van de export naar specifieke bestemmingen,
  onder andere de ‘Monitoring vruchtgroenten’ bestemd voor Japan, USA en Canada.;*
  Daarnaast voert het KCB voor de overheid een aantal projecten uit, zoals Survey
  Tuta Absoluta in de eindteelt van tomaat en Survey Afrikaanse fruitmot in de eindteelt
  van paprika. De fytosanitaire exportinspectie van de plantaardige producten en de
  afgifte van fytosanitaire exportcertificaten gebeuren door NVWA-ambtenaren.;* Het
  waarmerken van fytosanitaire certificaten met een CITES-bijschrijving vindt eveneens
  plaats door NVWA-ambtenaren. De aanvraag van de fytosanitaire exportinspecties en
  verzoeken tot afgifte van fytosanitaire exportcertifcaten worden door het KCB in
  ontvangst genomen.;'
