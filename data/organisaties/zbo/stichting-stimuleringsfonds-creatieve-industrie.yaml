names:
- value: Stichting Stimuleringsfonds Creatieve Industrie
  valid_from: '1900-01-01'
description:
  text: Het Stimuleringsfonds Creatieve Industrie is het rijkscultuurfonds voor vormgeving,
    architectuur en digitale cultuur. De taak van het Stimuleringsfonds is om, vanuit
    het culturele perspectief, de rijke ontwerptraditie die Nederland heeft te continueren
    en te vernieuwen door het proces van experimenteren, onderzoeken en maken te stimuleren
    en goed opdrachtgeverschap te bevorderen.
  url: https://www.stimuleringsfonds.nl/wat-we-doen
