    afwijkendeBepalingKaderwet:
      artikel: '22'
wettelijke_grondslagen:
- opschrift: Wet op het specifiek cultuurbeleid, artikel 9
  referentie: http://wetten.overheid.nl/cgi-bin/deeplink/law1/title=Wet%20op%20het%20specifiek%20cultuurbeleid
taken_en_bevoegdheden: Het fonds ondersteunt ontwerpers en makers met (inter)nationale
  projecten, culturele instellingen met eenjarige en meerjarige programma's en talenten
  in de creatieve industrie. Kerntaak is het stimuleren van cultuur. Een belangrijk
  thema is het verbeteren van de keten tussen ontwerpers/makers en opdrachtgevers/producenten.
  Met programma's, evenementen, publicaties en kennisbundeling legt het fonds bovendien
  zelf actief verbindingen tussen cultuur, ondernemerschap en maatschappelijk engagement.
