description:
  text: Dit zbo heette voor 2017 Stichting Nationale en Internationale Wegvervoer
    Organisatie. Door de wijziging van privaatrechtelijk (Stichting) naar publiekrechtelijk
    is het nu Nationale en Internationale Wegvervoer Organisatie (NIWO).
  url: https://www.niwo.nl/nl/over-de-niwo/doel-en-taak/
