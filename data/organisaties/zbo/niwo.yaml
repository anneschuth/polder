- opschrift: Wet wegvervoer goederen artikel 1.1 en 4.1
  referentie: http://wetten.overheid.nl/BWBR0024800/
- opschrift: Besluit wegvervoer goederen
  referentie: http://wetten.overheid.nl/BWBR0033600/
taken_en_bevoegdheden: Bevorderen van het Nederlandse binnenlandse en grensoverschrijdende
  beroepsgoederenvervoer over de weg door:* (ingevolge artikel 32 wgw) verlenen en
  intrekken van vergunningen voor binnenlands beroepsvervoer als bedoeld in artikel
  8 onderscheidenlijk artikel 12, eerste lid;* verlenen en intrekken van communautaire
  vergunningen als bedoeld in artikel 10, tweede onderscheidenlijk vierde lid;* verlenen
  en intrekken van machtigingen strekkende tot het verrichten van grensoverschrijdend
  vervoer als bedoeld in artikel 25, eerste lid;* afgeven van aanvullende documenten
  voor grensoverschrijdend beroepsvervoer als bedoeld in artikel 26, eerste lid, respectievelijk
  tweede lid, onderdeel c;* overige bij of krachtens algemene maatregel van bestuur
  op te dragen werkzaamheden, zowel ten aanzien van het binnenlands beroepsvervoer
  als het grensoverschrijdend beroepsvervoer;*  (ingevolgde artikel 7 Besluit goederenvervoer
  over de weg) bijhouden van een registratie- en signaleringssysteem ter uitvoering
  van het bepaalde in artikel 12 van de wet;* beheren van gegevensbestanden uit hoofde
  van haar publieke taken;* deelnemen aan onderhandelingen in het kader van bilaterale
  verdragen met andere staten, dan wel ter afsluiting van bilaterale verdragen;* bij
  ministeriële regeling kan de NIWO belast worden met overige taken, waartoe in ieder
  geval behoort de uitvoering van Verordening (EEG) nummer 391/90.
