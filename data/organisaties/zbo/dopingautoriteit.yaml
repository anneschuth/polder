taken_en_bevoegdheden: De missie van de Dopingautoriteit is het realiseren van  dopingvrije
  sport in Nederland. De Dopingautoriteit heeft als wettelijke taken:1) Het bestrijden
  van doping in de sport.2) Het uitvoeren van het dopingcontroleproces:a) Het beoordelen
  van verzoeken tot dispensatie, alsmede het verlenen van dispensatie.b) Het nemen
  van besluiten over de samenstelling van de topsportgroep.c) Het selecteren en aanwijzen
  van de personen bij wie lichaamsmonsters zullen worden   afgenomen.d) Het afnemen,
  verzamelen en analyseren van lichaamsmonsters.e) Het beheren van de resultaten van
  het laboratoriumonderzoek.f) Het deelnemen aan tuchtrechtelijke procedures.3) Het
  verzamelen en onderzoeken van informatie over mogelijke overtredingen van een  dopingreglement.4)
  Het geven van voorlichting over doping.5) Andere door Onze Minister opgedragen taken
  die verband houden met het bestrijden van toepassing van doping in de sport.De taken
  worden uitgevoerd in overeenstemming met de <a href="https://zoek.officielebekendmakingen.nl/stcrt-2019-21461.html"
  target="_blank">Wereld Anti-Doping Code.</a> Voor de uitvoering werkt de Dopingautoriteit
  samen met vele nationale en internationale organisaties.
