names:
- value: Onderzoeksraad voor Veiligheid
  abbr: OVV
  valid_from: '1900-01-01'
description:
  text: De Onderzoeksraad voor Veiligheid (OVV) doet onderzoek naar ongevallen en
    rampen in Nederland, met als doel herhaling daarvan te voorkomen. Per 1 februari
    2005 is de OVV de voortzetting van de voormalige Raad voor de Transportveiligheid.
  url: https://onderzoeksraad.nl/home/over-de-raad/
kaderwet:
  kaderwetZbo:
    instellingsmotief: Onafhankelijkheid
    kaderwetVanToepassing: ja
    afwijkendeBepalingKaderwet:
      artikel: 12,20,21,23,39
      toelichting: De gemaakte uitzonderingen waarborgen de onafhankelijkheid van
        de Onderzoeksraad. Voor artikelen 12 en 20 is slechts bij het eerste lid sprake
        van een afwijkende bepaling. Ook voor het eerste lid van artikel 39 bestaat
        een afwijkende bepaling, voor de rest van dit artikel zijn geen afwijkende
        bepalingen.
wettelijke_grondslagen:
- opschrift: Rijkswet Onderzoeksraad voor veiligheid, artikel 2
  referentie: http://wetten.overheid.nl/cgi-bin/deeplink/law1/title=rijkswet%20onderzoeksraad%20voor%20veiligheid/article=2
taken_en_bevoegdheden: De Onderzoeksraad voor Veiligheid (OVV) heeft, met het uitsluitende
  doel toekomstige voorvallen te voorkomen of de gevolgen daarvan te beperken, tot
  taak te onderzoeken en vast te stellen wat de oorzaken of vermoedelijke oorzaken
  van individuele of categorieën voorvallen, wat de omvang van hun gevolgen is en
  waar nodig aanbevelingen te doen om de veiligheid te verbeteren. De OVV is bevoegd
  om onderzoek te verrichten naar gebeurtenissen op terreinen zoals verkeer en vervoer,
  defensie, gezondheid, milieu, industrie, bouw en natuur. Zo kan de OVV bijvoorbeeld
  onderzoek doen naar branden, explosies of natuurrampen, maar in beginsel komen alle
  voorvallen in aanmerking voor onderzoek. De enige uitzonderingen hierop zijn voorvallen
  op het gebied van openbare orde, terreurbestrijding, vredesmissies, oorlogshandelingen
  en dergelijke. De OVV is bevoegd voor het gehele Koninkrijk, dus voor Nederland,
  Aruba, Curaçao en Sint Maarten.
