description:
  text: Stichting Groene Erkenningen is op 1 januari 2023 ontstaan uit een fusie van
    het Bureau Erkenningen met Groenkeur. De zbo-activiteiten van de stichting blijven
    functioneren onder de naam Bureau Erkenningen. In 2023 zijn de Stichting voor
    de Plaagdierbeheersing,  Stichting Examen- en Certificeringsinstituut Plaagdierpreventie
    en de Stichting Certificeringsinstituut Plaagdierbeheersing, Milieu en Volksgezondheid
    opgeheven. Hun activiteiten zijn voorgezet door Stichting Groene Erkenningen onder
    de naam Register Plaagdierbeheersing, Milieu en Veiligheid (RPMV). Deze activiteit
    is ook een wettelijke taak die de stichting uitvoert.De stichting is door de aangewezen
    keuringsinstellingen onder de WAS2023, overgaand in de WAAS, aangesteld om een
    schema op te stellen en beheren in nauwe afstemming met het ministerie van VWS.De
    private en publieke taken zijn gescheiden activiteiten binnen de stichting.De
    stichting is een de autoriteit in het onafhankelijk maken en beheren van normen
    die vanzelfsprekend zijn en aantoonbaar maken dat er vakkundig, veilig en verantwoord
    gewerkt wordt in de leefomgeving.
  url: https://groeneerkenningen.nl/over-de-stichting/
