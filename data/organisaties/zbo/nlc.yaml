taken_en_bevoegdheden: 'De gezamenlijke registerloodsen vormen de Nederlandse loodsencorporatie(NLC).
  Het lidmaatschap van de corporatie is verplicht en vanrechtswege geregeld. De NLC
  is een openbaar lichaam voor beroep in dezin van artikel 134 van de Grondwet. De
  corporatie heeft verordenendebevoegdheid ten opzichte van haar leden op een aantal
  gebieden, zoals deopleiding, beroepsuitoefening en dienstverlening. Handhaving van
  deverordeningen geschiedt tuchtrechtelijk, door het tuchtcollege loodsen.De corporatie
  heeft drie organen: de voorzitter, die de corporatie externvertegenwoordigt, de
  algemene raad, die het dagelijks bestuur vormt, ende ledenvergadering, die de verordeningen
  vaststelt.'
