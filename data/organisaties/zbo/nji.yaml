  referentie: https://wetten.overheid.nl/BWBR0045541/2021-08-31#Artikel2
taken_en_bevoegdheden: Het Nederlands Jeugdinstituut (NJi) heeft de volgende taken:*
  het verzamelen van actuele kennis over het opgroeien van kinderen;* het verrijken,
  duiden en delen van deze kennis;* het onder de aandacht brengen van de verzamelde
  kennis en het helpen bij de toepassing ervan;* het beheren van de uitvoering van
  het Erasmusprogramma, waar dit betrekking heeft op de jeugd.
