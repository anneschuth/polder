names:
- value: Stichting Nederlands Jeugdinstituut/NJi
  abbr: NJi
  valid_from: '1900-01-01'
description:
  text: Het Nederlands Jeugdinstituut (NJi) is een nationaal kenniscentrum dat zich
    inzet om ieder kind een kansrijke jeugd te bieden. Om dat doel te bereiken, verzamelt
    het NJi kennis over opgroeien en verrijkt, duidt en deelt het deze. Ook helpt
    het NJi bij het toepassen van de verzamelde kennis en beheert het de uitvoering
    van het deel van het Erasmusprogramma dat betrekking heeft op de jeugd, zoals
    vastgelegd in het Uitvoeringsbesluit Uitvoeringswet Erasmusprogramma en programma
    Europees Solidariteitskorps VWS.
  url: https://www.nji.nl/over-het-nji
kaderwet:
  kaderwetZbo:
    instellingsmotief: Regelgebonden uitvoering
    kaderwetVanToepassing: nee
