      artikel: '22'
      toelichting: Zover het een besluit betreft dat het bestuur van een fonds neemt
        ter uitvoering van de in art. 9, eerste lid, van de wet op het specifiek cultuurbeleid
        bedoelde taak.
wettelijke_grondslagen:
- opschrift: Wet op het specifiek cultuurbeleid, artikel 9
  referentie: http://wetten.overheid.nl/BWBR0005904/
taken_en_bevoegdheden: Het Nederlands Letterenfonds heeft als voornaamste doelstelling
  het bevorderen van de volgende zaken:* de kwaliteit en diversiteit van de Nederlands-,
  Fries- en Papiamentstalige letteren en de kwaliteit en diversiteit van literaire
  werken in de Nederlandse gebarentaal;* de kwaliteit en diversiteit van de literatuur
  uit andere taalgebieden in Nederlandse, Friese of Papiamentse vertaling of vertaling
  in de Nederlandse gebarentaal;* de vertaling van kwalitatief hoogstaande oorspronkelijk
  Nederlands-, Fries-, en Papiamentstalige literaire werken en literaire werken in
  de Nederlandse gebarentaal in andere talen dan het Nederlands, het Fries en het
  Papiaments, alsmede de internationale verspreiding van deze vertalingen en voorts
  al hetgeen daarmee verband houdt of daaraan bevorderlijk kan zijn.
