names:
- value: Centrale Commissie Mensgebonden Onderzoek
  abbr: CCMO
  valid_from: '1900-01-01'
description:
  text: De Centrale Commissie Mensgebonden Onderzoek (CCMO) waarborgt de bescherming
    van proefpersonen die bij medisch-wetenschappelijk onderzoek betrokken zijn, door
    toetsing aan de wettelijke bepalingen die voor zulk onderzoek zijn vastgesteld
    en door rekening te houden met de diverse ontwikkelingen binnen de medische wetenschap.
  url: https://www.ccmo.nl/over-de-ccmo
kaderwet:
  kaderwetZbo:
    instellingsmotief: Onafhankelijkheid
    kaderwetVanToepassing: ja
    afwijkendeBepalingKaderwet:
      artikel: '22'
      toelichting: De genoemde afwijkende bepaling geldt voor besluiten ter uitvoering
        van de Wet Medisch-wetenschappelijk onderzoek met mensen en de artikelen 10,
        16 en 19 van de Embryowet.
wettelijke_grondslagen:
- opschrift: Wet medisch-wetenschappelijk onderzoek met mensen, artikel 14
  referentie: https://wetten.overheid.nl/BWBR0009408/2024-01-01#Paragraaf5_Artikel14
taken_en_bevoegdheden: De CCMO heeft de volgende taken en bevoegdheden:* het houden
  van toezicht op de toetsing door medisch-ethische commissies van medisch-wetenschappelijk
  onderzoek met mensen in Nederland;* het toetsen van onderzoeksvormen zoals beschreven
  in artikel 2 van de Wet medisch-wetenschappelijk onderzoek met mensen en artikel
  3 van de Embryowet;* het behandelen van administratieve beroepsaanvragen van belanghebbenden
  tegen beoordelingen van medisch-ethische toetsingscommissies;* het registreren van
  medisch-wetenschappelijk onderzoek met mensen.
