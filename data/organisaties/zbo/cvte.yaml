  valid_from: '1900-01-01'
description:
  text: Diploma's in Nederland zijn voor een belangrijk deel gebaseerd op landelijke,
    centrale examens. Het vertrouwen van vervolgopleidingen en werkgevers in diploma’s
    is afhankelijk van de kwaliteit van die examens. Als College voor Toetsen en Examens
    (CvTE) zorgen we voor examens die dat vertrouwen waard zijn. Dit doen we voor
    de sectoren primair onderwijs (po), middelbaar beroepsonderwijs (mbo), voortgezet
    onderwijs (vo), staatsexamens vo en het staatsexamen Nederlands als tweede taal
    (Nt2). We werken daarin nauw samen met mensen uit het onderwijs.
  url: https://www.cvte.nl/over-het-cvte
kaderwet:
  kaderwetZbo:
    kaderwetVanToepassing: ja
wettelijke_grondslagen:
- opschrift: Wet College voor Toetsen en Examens, artikel 2
  referentie: http://wetten.overheid.nl/BWBR0025364/
taken_en_bevoegdheden: Het College voor Toetsen en Examens (CvTE) is onder meer verantwoordelijk
  voor:* het vaststellen en regelen van de centrale examens in het reguliere voortgezet
  onderwijs;* het vaststellen en regelen van de centrale examens Nederlandse taal
  en Engels in het mbo;* het vaststellen, regelen en afnemen van de staatsexamens
  in het voortgezet onderwijs;* het vaststellen, regelen en afnemen het staatsexamen
  Nederlands als tweede taal;* het regelen en erkennen van de doorstroomtoetsen en
  toetsen van een leerlingvolgsysteem.
