wettelijke_grondslagen:
- opschrift: Uitvoeringswet huurprijzen woonruimte, artikel 3a tot en met 8
  referentie: http://wetten.overheid.nl/cgi-bin/deeplink/law1/title=uitvoeringswet%20huurprijzen%20woonruimte
taken_en_bevoegdheden: '* Het doen van een uitspaak over de redelijkheid van de overeengekomen
  aanvangshuur of de voorgestelde verhoging, danwel verlaging, van de huurprijs;*
  uitspraak doen over de verhoging van de huurprijs na de totstandkoming van voorzieningen,
  veranderingen of toevoegingen;* uitspraak doen over de in rekening te brengen huurprijs
  bij vermindering van het woongenot als gevolg van een gebrek of over de redelijkheid
  van een gebruikersvergoeding;* het desgevraagd aan de rechter verstrekken van nadere
  inlichtingen over een door haar gedane uitspraak;* het desgevraagd verstrekken van
  een verklaring aan de Minister voor Wonen en Rijksdienst en publiekrechtelijke lichamen
  over de aan een woonruimte toe te kennen kwaliteit, de gebreken of tekortkomingen
  in het onderhoud en een voor de woonruimte redelijk te achten huurprijs;* het desgevraagd
  aan de minister verstrekken van gegevens die nodig zijn in het kader van het te
  voeren volkshuisvestingsbeleid;* het verstrekken van een verklaring omtrent de redelijkheid
  van de huurprijs en de juistheid van gegevens.'
