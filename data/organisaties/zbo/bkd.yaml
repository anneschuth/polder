  valid_from: '1900-01-01'
description:
  text: Sinds 1923 is het keuren van bloembollen de kerntaak van de stichting Bloembollenkeuringsdienst
    (BKD). Dit doen wij op zowel kwaliteits- als op quarantaine-aantastingen. Wij
    verrichten kwaliteitskeuringen, laboratoriumonderzoek en importinspecties. Ook
    voeren wij  exportinspecties uit in opdracht van de Nederlandse Voedsel en Waren
    Autoriteit (NVWA).BKD ondersteunt de markttoegang door het keuren van bloembollen
    op een toonaangevend kwaliteitsniveau en geeft (inter-) nationaal waarborgen voor
    de kwaliteit van bloembollen. Wij voeren deze keuringen op een onafhankelijke,
    betrouwbare en efficiënte wijze uit en zijn daarmee een belangrijke schakel in
    de kwaliteitsborging voor ondernemers en de bloembollensector.De BKD is een zelfstandig
    bestuursorgaan en wij vervullen onze wettelijke taken in opdracht en onder toezicht
    van het ministerie van Landbouw, Visserij, Voedselzekerheid en Natuur (LVVN).
  url: https://www.bkd.eu/over-bkd/
