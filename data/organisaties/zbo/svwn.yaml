names:
- value: Stichting Visitatie Woningcorporaties Nederland
  abbr: SVWN
  valid_from: '1900-01-01'
description:
  text: SVWN is in 2015 – op basis van de Woningwet art. 53a – door de minister aangewezen
    als de onafhankelijke instantie die visitatiebureaus accrediteert. Daarnaast ontwikkelen
    en beheren wij de visitatiemethodiek en zien we toe op de kwaliteit van de visitaties.
    Ook publiceert SVWN alle visitatierapporten.
  url: https://visitaties.nl/missie-en-positie
kaderwet:
  kaderwetZbo:
    kaderwetVanToepassing: ja
wettelijke_grondslagen:
- opschrift: Woningwet, artikel 53a eerste lid
  referentie: http://wetten.overheid.nl/BWBR0005181/HoofdstukIV/Afdeling3/6/Artikel53a/
taken_en_bevoegdheden: '* De onafhankelijke instantie heeft tot taak ervoor te zorgen
  dat er eens per vier jaar bij corporaties een visitatie kan worden uitgevoerd, specifiek
  door het aanwijzen van ''deskundige instanties''. SVWN doet dat door het accrediteren
  van bureaus die visitaties mogen uitvoeren. (zie ook art. 2 Statuten).'
