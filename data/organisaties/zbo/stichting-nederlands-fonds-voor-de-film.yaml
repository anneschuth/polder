taken_en_bevoegdheden: Het stimuleren van de filmproductie in Nederland, met nadruk
  op kwaliteit en diversiteit, en het bevorderen van een goed klimaat voor de Nederlandse
  filmcultuur. Om dit te bereiken geeft het Fonds filmmakers financiële ondersteuning
  bij het ontwikkelen, realiseren en distribueren van films. Het Fonds is betrokken
  bij de totstandkoming van lange speelfilms, documentaire films, experimentele films,
  korte films en animatiefilms. Daarnaast heeft het Fonds geld voor bijzondere activiteiten
  op het gebied van film.
