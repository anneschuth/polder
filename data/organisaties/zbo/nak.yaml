names:
- value: Stichting Nederlandse Algemene Keuringsdienst voor Zaaizaad en Pootgoed van
    Landbouwgewassen
  abbr: NAK
  valid_from: '1900-01-01'
description:
  text: De Nederlandse Algemene Keuringsdienst voor zaaizaad en pootgoed van landbouwgewassen
    voert wettelijke keuringen uit in opdracht en onder toezicht van het ministerie
    van Landbouw, Natuur en Voedselkwaliteit. Hierbij worden onder andere aardappelen,
    grond en zaaizaden beoordeeld op diverse kwaliteitskenmerken.
  url: https://www.nak.nl/over-de-nak/
kaderwet:
  kaderwetZbo:
    instellingsmotief: Regelgebonden uitvoering
    kaderwetVanToepassing: ja
wettelijke_grondslagen:
- opschrift: Zaaizaad- en Plantgoedwet 2005, artikel 19
  referentie: http://wetten.overheid.nl/cgi-bin/deeplink/law1/title=Zaaizaad-%20en%20plantgoedwet%202005/article=19
taken_en_bevoegdheden: '* Het door middel van keuringen bevorderen dat betrouwbaar
  teeltmateriaal van landbouwgewassen in het verkeer wordt gebracht, verder verhandeld
  en uitgevoerd wordt;* het verstrekken van certificaten ten bewijze van goedkeuring;*
  toezicht houden op de naleving van de voorschriften;* het uitvoeren van fytosanitaire
  export- en importinspecties en het waarmerken van het fytosanitaire certificaat.'
