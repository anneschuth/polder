taken_en_bevoegdheden: Het IMG heeft tot taak om schade af te handelen die is ontstaan
  door beweging van de bodem als gevolg van de aanleg of exploitatie van een mijnbouwwerk
  ten behoeve van het winnen van gas uit het Groningenveld of als gevolg van de gasopslag
  Norg. Dat doet het IMG door onafhankelijk te besluiten over aanvragen tot vergoeding
  van schade. Het kan om alle vormen van schade gaan, zoals fysieke schade aan gebouwen
  en objecten, waardedaling van woningen en immateriële schade. Ook moet het IMG meldingen
  van mogelijk acuut onveilige situaties (AOS) afhandelen. Het IMG is gebonden aan
  de kaders van de Tijdelijke wet Groningen, het civiele aansprakelijkheids- en schadevergoedingsrecht
  en de Algemene wet bestuursrecht.
