description:
  text: Skal Biocontrole is de Nederlandse toezichthouder op de biologische keten.
    De stichting certificeert bedrijven die biologische activiteiten uitvoeren en
    controleert of het produceren, bewerken en verhandelen van biologische producten
    voldoet aan zowel Nederlandse als Europese regelgeving.
  url: https://www.skal.nl/over-ons
