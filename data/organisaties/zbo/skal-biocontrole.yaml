taken_en_bevoegdheden: Stichting Skal Biocontrole is aangewezen als bevoegde autoriteit
  voor de uitvoeringvan wettelijke taken op het gebied van toezicht, controle en certificering
  die voortvloeien uit de Europeseverordeningen voor een wettelijk biologisch keurmerk.
