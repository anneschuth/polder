taken_en_bevoegdheden: De Sociale Verzekeringsbank (SVB) heeft de volgende taken:*
  het uitvoeren van de Algemene Ouderdomswet, de Algemene nabestaandenwet, de Algemene
  Kinderbijslagwet en wetten die de uitvoering van deze wetten beheersen;* het zorgdragen
  voor gevraagde en ongevraagde verstrekking van deugdelijke informatie aan werkgevers,
  werknemers, uitkeringsgerechtigden, verzekerden en andere belanghebbenden in verband
  met de uitvoering van de hierboven genoemde wetten;* het uitvoeren van taken die
  door andere wetten dan de hierboven genoemde wetten aan de SVB zijn opgedragen;*
  het beheren en administreren van de fondsen, bedoeld in artikel 1 Wet structuur
  uitvoeringsorganisatie werk en inkomen, onderdelen f en g van de Wet financiering
  sociale verzekeringen en het Algemeen Kinderbijslagfonds, genoemd in artikel 29a
  van de Algemene Kinderbijslagwet;* het in opdracht van de minister van Sociale Zaken
  en Werkgelegenheid (SZW) of uit eigen beweging verrichten van onderzoek met betrekking
  tot de wettelijke taken van de SVB;* het aan de minister van SZW op diens verzoek
  verstrekken van de informatie die nodig is voor de beoordeling van de uitvoerbaarheid
  van beleidsvoornemens en wettelijke voorschriften;* het voeren van een adequate
  administratie om de taken van de SVB uit te kunnen voeren;* het verrichten van diensten
  voor gegevensverkeer met het buitenland en verwerking van gegevens afkomstig uit
  het buitenland;* het op verzoek van een verzekerde, een zorgverzekeraar of andere
  belanghebbende verstrekken van informatie over de verzekeringsstatus van de verzekerde
  (voor zover deze informatie noodzakelijk is voor de uitvoering van de Algemene Wet
  Bijzondere Ziektekosten en de Zorgverzekeringswet) en het op verzoek van een verzekerde
  verstrekken van informatie over de verzekeringstijdvakken en daarop gebaseerde aanspraak
  op ouderdomspensioen.
