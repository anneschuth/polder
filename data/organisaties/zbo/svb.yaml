- value: Sociale Verzekeringsbank
  abbr: SVB
  valid_from: '1900-01-01'
description:
  text: De Sociale Verzekeringsbank (SVB) zorgt al zo'n 120 jaar voor de uitvoering
    van verschillende regelingen in de sociale zekerheid en zorg. Dit zijn regelingen
    voor verschillende groepen mensen zoals ouderen, ouders, nabestaanden, houders
    van een persoonsgebonden budget, verzetsdeelnemers en oorlogsgetroffenen en vele
    anderen. We doen dit in opdracht van overheden en andere instanties. Onze hoofdopdrachtgever
    is het Ministerie van Sociale Zaken en Werkgelegenheid. En we werken ook voor
    andere opdrachtgevers, zoals het ministerie van Volksgezondheid Welzijn en Sport.
  url: https://www.svb.nl/nl/over-de-svb/wie-zijn-we/onze-organisatie
