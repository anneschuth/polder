- opschrift: Wet structuur uitvoeringsorganisatie werk en inkomen (SUWI), artikel
    2
  referentie: http://wetten.overheid.nl/cgi-bin/deeplink/law1/title=Wet%20structuur%20uitvoeringsorganisatie%20werk%20en%20inkomen/article=2
taken_en_bevoegdheden: "-\tUitvoering geven aan de wettelijke arbeidsongeschiktheidsverzekeringen,\
  \ de wettelijke ziekengeldverzekering, de wettelijke werkloosheidsverzekering, de\
  \ Tijdelijke wet beperking inkomensgevolgen arbeidsongeschiktheidscriteria, de Wet\
  \ arbeidsongeschiktheidsvoorziening jonggehandicapten, de Toeslagenwet, de Wet inkomensvoorziening\
  \ oudere werklozen, alsmede aan wetten die de uitvoering van deze wetten beheersen,\
  \ voor zover die uitvoering niet bij of krachtens enige wet aan anderen is opgedragen.-\t\
  Het beheren en administreren van de fondsen, bedoeld in artikel 1, onderdelen j\
  \ tot en met m en w,  van de Wet financiering sociale verzekeringen, het Toeslagenfonds,\
  \ genoemd in artikel 31 van de Toeslagenwet, en het Arbeidsongeschiktheidsfonds\
  \ jonggehandicapten, genoemd in artikel 5:1 van de Wet arbeidsongeschiktheidsvoorziening\
  \ jonggehandicapten en het voeren van een adequate administratie ten behoeve van\
  \ de uitoefening van zijn taken.-\tHet aan de Minister van Sociale Zaken en Werkgelegenheid\
  \ op zijn verzoek verstrekken van de inlichtingen die nodig zijn voor de beoordeling\
  \ van de uitvoerbaarheid van beleidsvoornemens en wettelijke voorschriften.-\tHet\
  \ in opdracht van de Minister van Sociale Zaken en Werkgelegenheid of uit eigen\
  \ beweging verrichten van onderzoek met betrekking tot de wettelijke taken van dit\
  \ instituut en verzamelen en analyseren van informatie ten behoeve van de bevordering\
  \ van de werking van en het inzicht in de arbeidsmarkt.-\tDe inschakeling in het\
  \ arbeidsproces bevorderen voor personen zoals bedoeld in artikel 30a lid 1 van\
  \ de Wet SUWI.-\tHet registreren van werkzoekenden en van vacatures van werkgevers\
  \ en het voordragen van geschikte vacatures aan werkzoekenden en het voordragen\
  \ van geschikte werkzoekenden voor vacatures.-\tAanvragen in ontvangst nemen, onverminderd\
  \ artikel 41, tweede lid, van de Participatiewet, van algemene bijstand op grond\
  \ van de Participatiewet dan wel van een uitkering op grond van de Wet inkomensvoorziening\
  \ oudere en gedeeltelijk arbeidsongeschikte werkloze werknemers.-\tBeoordeling kans\
  \ op werk en verstrekken van informatie over de arbeidsmarkt en sociale verzekeringen.-\t\
  Het instellen van onderzoek en het verstrekken van informatie op verzoek van werkgever,\
  \ werknemer of eigenrisicodrager, zoals bedoeld in artikel 32 van de Wet SUWI.-\t\
  Het uitvoeren van taken opgedragen bij andere wetten, algemene maatregel van bestuur\
  \ of ministeriële regeling.-\tZorg dragen voor de inrichting en adequate werking\
  \ van de polisadministratie."
