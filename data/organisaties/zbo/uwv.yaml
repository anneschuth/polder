  abbr: UWV
  valid_from: '1900-01-01'
description:
  text: UWV is een vitaal onderdeel van de samenleving en werkt voor iedereen op de
    arbeidsmarkt. We zetten ons in om werkloosheid en arbeidsongeschiktheid te voorkomen.
    Dat doen we door vaker de menselijke maat in onze dienstverlening toe te passen.
    Door onze dienstverlening verder te verbeteren. Door samen te werken met onze
    externe partners.
  url: https://www.uwv.nl/nl/over-uwv/organisatie
