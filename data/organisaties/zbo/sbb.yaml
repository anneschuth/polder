  kaderwetZbo:
    kaderwetVanToepassing: ja
wettelijke_grondslagen:
- opschrift: Wet educatie en beroepsonderwijs, artikel 1.5.1
  referentie: http://wetten.overheid.nl/BWBR0007625/
taken_en_bevoegdheden: '* a. het ontwikkelen en onderhouden van een landelijke kwalificatiestructuur,
  gericht op de aansluiting tussen het aanbod van beroepsonderwijs en de maatschappelijke
  behoeften daaraan, mede in het licht van de arbeidsmarkt voor afgestudeerden, en
  mede gelet op van belang zijnde ontwikkelingen in internationaal verband, onder
  meer door het doen van voorstellen aan de minister van OCW voor de kwalificatiedossiers,
  bedoeld in artikel 7.2.4, tweede lid,;* b. het bijdragen aan een doelmatige en doelgerichte
  inzet van overheidsmiddelen door het ontwikkelen van voorstellen, welke beroepsopleidingen
  voor bekostiging uit ’s Rijks kas in aanmerking komen;* c. het bevorderen van de
  kwaliteit van de beroepspraktijkvorming;* d. het ontwikkelen en vaststellen van
  kwaliteitscriteria voor beroepspraktijkvormingsplaatsen en het ten minste een maal
  per vier jaar beoordelen van bedrijven en organisaties die de beroepspraktijkvorming
  verzorgen aan de hand van deze criteria en het openbaar maken van een overzicht
  van bedrijven en organisaties die voldoen aan deze criteria;* e. het zoveel mogelijk
  zorg dragen voor de beschikbaarheid van een toereikend aantal bedrijven en organisaties
  van voldoende kwaliteit die de beroepspraktijkvorming verzorgen;* f. het uitvoeren
  van onderzoek ter ondersteuning van de taken, genoemd als hierboven, en;* g. het
  uitvoeren van aanvullende activiteiten ter bevordering van de aansluiting onderwijs
  en arbeidsmarkt;'
