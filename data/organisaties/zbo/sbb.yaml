description:
  text: 'Staatsbosbeheer, opgericht in 1899, is een rechtspersoon met een wettelijke
    taak (RWT): het beheren en duurzaam tot maatschappelijk nut brengen van de toevertrouwde
    terreinen.'
  url: https://www.staatsbosbeheer.nl/over-staatsbosbeheer/organisatie
