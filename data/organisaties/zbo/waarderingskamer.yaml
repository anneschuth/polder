  text: De Waarderingskamer controleert of Nederlandse gemeenten de Wet waardering
    onroerende zaken (Wet WOZ) op de juiste manier uitvoeren.
  url: https://www.waarderingskamer.nl/over-ons/wie-zijn-wij
