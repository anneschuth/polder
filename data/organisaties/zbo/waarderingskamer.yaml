  referentie: https://wetten.overheid.nl/BWBR0007119/2025-01-01#HoofdstukII_Artikel4
taken_en_bevoegdheden: De belangrijkste taken van de Waarderingskamer zijn:* het toezicht
  houden op de waardebepaling en de waardevaststelling van onroerende zaken (met het
  oog op de belastingheffing door het Rijk, de gemeenten en de waterschappen) en de
  overige in de Wet WOZ geregelde onderwerpen, zodat diverse belastingen gelijkwaardig
  en doelmatig kunnen worden geheven;* het op verzoek of eigen initiatief adviseren
  van de staatssecretaris van Financiën over wet- en regelgeving en beleid wat betreft
  de Wet WOZ, evenals ontwikkelingen op het gebied van de WOZ;* het behandelen van
  geschillen tussen gemeenten en andere gebruikers van waardegegevens (zoals het Rijk
  en de waterschappen) over de uitvoering van de Wet WOZ;* het geven van voorlichting
  aan gemeenten en andere WOZ-belanghebbenden.
