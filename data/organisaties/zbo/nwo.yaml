taken_en_bevoegdheden: NWO heeft tot taak het bevorderen van de kwaliteit van wetenschappelijk
  onderzoek alsmede het initiëren en stimuleren van nieuwe ontwikkelingen in het wetenschappelijk
  onderzoek. NWO voert haar taak uit in het bijzonder door het toewijzen van middelen.
  De organisatie bevordert de overdracht van kennis van de resultaten van door haar
  geï¿½nitieerd en gestimuleerd onderzoek ten behoeve van de maatschappij. NWO richt
  zich bij het uitvoeren van haar taak in hoofdzaak op het universitair onderzoek.
  Daarbij let zij op het aspect van coördinatie en bevordert deze waar nodig.
