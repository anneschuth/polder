description:
  text: 'De Nederlandse Organisatie voor Wetenschappelijk Onderzoek (NWO) zorgt voor
    kwaliteit en vernieuwing in de wetenschap en is een van de belangrijkste wetenschapsfinanciers
    in Nederland. NWO investeert jaarlijks bijna 1 miljard euro in nieuwsgierigheidsgedreven
    onderzoek, onderzoek gericht op maatschappelijke uitdagingen en in onderzoeksinfrastructuur.Op
    basis van adviezen van deskundige wetenschappers en experts uit binnen- en buitenland
    selecteert en financiert NWO onderzoeksvoorstellen. Daarnaast kent NWO negen eigen
    onderzoeksinstituten waar internationaal toonaangevend onderzoek wordt verricht.
    NWO stimuleert nationale en internationale samenwerking, investeert in grote onderzoeksfaciliteiten
    en bevordert kennisbenutting. NWO financiert iets meer dan 7.000 onderzoeksprojecten
    aan universiteiten en andere kennisinstellingen.NWO is een zelfstandig bestuursorgaan
    met wettelijk vastgelegde taken. De organisatie valt onder de verantwoordelijkheid
    van het ministerie van Onderwijs, Cultuur en Wetenschap.De raad van bestuur is
    eindverantwoordelijk voor uitvoering van de taken van de gehele koepel. De raad
    van toezicht staat desgevraagd of uit eigen beweging de RvB met raad ter zijde
    en heeft een auditcommissie die de raad van bestuur adviseert over de begroting,
    de jaarrekening en het jaarverslag. De adviesraad kan de raad van bestuur gevraagd
    en ongevraagd adviseren over voor NWO relevante ontwikkelingen in samenleving
    en wetenschap. Onder de raad van bestuur ressorteren domeinbesturen, onderzoeksinstituten
    en regie-organen (tijdelijke aansturingsorganen). Belangrijk voor NWO is de kwaliteit,
    zorgvuldigheid en transparantie van het beoordelingsproces en projectbeheer. De
    governance van NWO is vastgelegd in de NWO-wet en reglementen. Uit oogpunt van
    good governance, kwaliteit, zorgvuldigheid en transparantie zijn de NWO-subsidieregeling
    en een aantal interne regelingen vastgesteld.De NWO-domeinen, onderzoeksinstituten
    en regieorganen voeren de kerntaak van NWO uit: het bevorderen van kwaliteit en
    vernieuwing in de wetenschap. De NWO-domeinen organiseren de programma’s en financiering
    voor onderzoek. Zowel de raad van bestuur als de NWO-domeinenbesturen hebben de
    bevoegdheid om publieke gelden voor wetenschappelijk onderzoek te verdelen.Bij
    de NWO-instituten wordt onderzoek gedaan. Regieorganen zijn tijdelijke onderdelen
    met speciale aandacht voor één, vaak multidisciplinair, onderzoeksveld.'
