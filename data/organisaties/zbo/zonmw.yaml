taken_en_bevoegdheden: ZonMw is een intermediaire organisatie die op programmatische
  wijze projecten, experimenten, onderzoek en ontwikkeling op het gebied van gezondheid,
  preventie en zorg laat uitvoeren. ZonMW bewaakt daarbij de kwaliteit, relevantie
  en samenhang. De activiteiteiten zijn gericht op het gehele continuüm van fundamenteel
  medisch onderzoek tot en met toepassing en implementatie van onderzoeksprojecten.
  De belangrijkste opdrachtgevers zijn het ministerie van Volksgezondheid, Welzijn
  en Sport (VWS) en de Nederlandse Organisatie voor Wetenschappelijk Onderzoek (NWO).
