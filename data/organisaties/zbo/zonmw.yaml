description:
  text: Met allerlei subsidieprogramma’s stimuleren en financieren wij kennisontwikkeling
    op het gebied van  gezondheid, zorg en welzijn. Daarnaast stimuleren we het gebruik
    van de ontwikkelde kennis en signaleren waar kennis nodig is. Zo blijven we inspelen
    op de veranderende wereld om ons heen.We vergroten relevantie, kwaliteit en impact
    van kennis en innovaties en versnellen de praktijktoepassingen om zo bij te dragen
    een goede gezondheid voor iedereen.  Daarbij ondersteunen we als organisatie de
    gehele kennisketen; van fundamenteel onderzoek, tot praktijkgericht- en actieonderzoek
    tot implementatieprojecten.Binnen de organisatie staan maatschappelijk relevante
    thema’s centraal. Deze thema’s worden – in de vorm van programma’s – binnen  verschillende
    clusters uitgevoerd. Elk cluster heeft zijn eigen team met leidinggevende. De
    stafafdelingen Beleid, Advies en Strategie (BAS) en Bedrijfsvoering ondersteunen
    de organisatie. De organisatie als geheel staat onder leiding van algemeen directeur
    Véronique Timmerhuis. Zij werkt daarin samen met het managementteam dat bestaat
    uit twee directeuren programma’s, die de inhoudelijke clusters aansturen, en de
    afdelingshoofden BAS en Bedrijfsvoering. Het ZonMw-bestuur is het hoogste bestuursorgaan
    van ZonMw.
  url: https://www.zonmw.nl/nl/over-zonmw/organisatie
