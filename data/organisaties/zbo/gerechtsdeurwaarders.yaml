taken_en_bevoegdheden: 'Als openbaar ambtenaar voert de gerechtsdeurwaarder taken
  uit die bij wet aan hem toegewezen zijn. Zulke wettelijke taken zijn bijvoorbeeld:
  het dagvaarden van personen of bedrijven voor de rechter, het opmaken van akten,
  het betekenen van juridische stukken en het ten uitvoer leggen van vonnissen en
  andere zgn. executoriale titels.'
