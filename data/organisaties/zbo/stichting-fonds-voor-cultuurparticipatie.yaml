description:
  text: 'Onze missieCultuur doet. Het heeft een verbindende, inspirerende en prikkelende
    kracht.Het Fonds voor Cultuurparticipatie ondersteunt de cultuursector bij het
    realiseren van actieve kunst- en cultuurdeelname van zoveel mogelijk Nederlanders.
    Ook van hen, voor wie cultuurdeelname niet vanzelfsprekend is. Het Fonds draagt
    bij aan een weerbare, wendbare, en toekomstbestendige sector die de denk- en maakkracht
    van cultuur volop kan inzetten voor onze samenleving.Actieve cultuurdeelname brengt
    mensen bij elkaar, daagt uit en biedt nieuwe perspectieven. Kunst en cultuur kunnen
    kansen vergroten en verschillen verkleinen, blikken verbreden en mensen verrijken.
    Cultuur helpt je geloven in jezelf en verplaatsen in een ander, doet mogelijkheden
    ontstaan en laat je gelijkgestemden en andersdenkenden ontmoeten.Van Amsterdam
    tot Appingedam en van Wilnis tot Willemstad: cultuur is iets van elke Nederlander.
    Wij geloven in de positieve impact van cultuur op ieder individu – met een sterke,
    sociale en veerkrachtige samenleving als gevolg.Een opdracht met impactAls rijkscultuurfonds
    stimuleren we actieve cultuurdeelname in het Koninkrijk der Nederlanden. Dit doen
    we door bij te dragen aan cultuureducatie op en buiten school, actieve cultuurparticipatie,
    toegankelijkheid van talentontwikkeling, actieve erfgoedparticipatie en internationale
    samenwerking.Hoe?Om zoveel mogelijk mensen toegang te geven tot kunst en cultuur,
    werken we volgens de volgende principes:Cultuur dichtbij voor iedereenWe zetten
    ons in voor een solide culturele infrastructuur, overal in ons Koninkrijk. Zodat
    cultuur voor iedereen toegankelijk is en van maatschappelijke waarde kan zijn.
    We houden rekening met de verschillen tussen regio’s en werken samen met regionale
    en lokale partners aan (plaatselijke) versterking. Via hen zijn we als landelijk
    fonds dicht bij onze aanvragers en doelgroepen, dragen we bij aan toekomstbestendige
    ecosystemen voor kunst en cultuur en kunnen we sectoroverstijgende samenwerking
    beter aanjagen.Gelijke kansen biedenDaarnaast is het van het grootste belang dat
    ons cultuurbeleid rechtvaardig is. Dat betekent dat we ons extra inzetten om doelgroepen
    te bereiken voor wie de afstand tot cultuurparticipatie groter is dan voor anderen.
    En richten we ons op het wegnemen van factoren die deze ongelijkheid veroorzaken.'
