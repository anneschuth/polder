taken_en_bevoegdheden: '* het CBR is belast met de volgende taken: het beoordelen
  van de rijvaardigheid;* het beoordelen van de lichamelijke en geestelijke geschiktheid
  tot het besturen van motorrijtuigen;* het opleggen van onderzoeken naar de rijvaardigheid
  en de geschiktheid tot het besturen van motorrijtuigen van houders van rijbewijzen
  ten aanzien van wie een vermoeden van onvoldoende rijvaardigheid of geschiktheid;*
  het opleggen van educatieve maatregelen ter bevordering van de rijvaardigheid of
  geschiktheid tot het besturen van motorrijtuigen;* het opleggen en uitvoeren van
  het alcoholslotprogramma;* het schorsen van de geldigheid van rijbewijzen;* het
  ongeldig verklaren van rijbewijzen;* het verlenen van ontheffingen als bedoeld in
  artikel 149, tweede lid;* het afgeven van gehandicaptenparkeerkaarten aan aanvragers
  die niet zijn ingeschreven in de basisadministratie persoonsgegevens van een gemeente;*
  het beoordelen van de vakbekwaamheid van bestuurders in het goederen- en personenvervoer
  over de weg;* het erkennen van opleidingscentra voor het verrichten van nascholing
  en het certificeren van cursussen met betrekking tot vakbekwaamheid bestuurders
  goederen- en personenvervoer over de weg en het registreren van nascholing;* het
  houden van toezicht op de naleving van de verplichtingen die voortvloeien uit de
  in onderdeel k bedoelde erkenningen;* het uitreiken van Nederlandse omwisselingscertificaten
  en deelcertificaten vakbekwaamheid bestuurders goederen- en personenvervoer over
  de weg;* het ongeldig verklaren van getuigschriften van vakbekwaamheid, getuigschriften
  van nascholing en Nederlandse omwisselingscertificaten;* het verwerken van gegevens,
  waaronder mede begrepen gegevens betreffende iemands gezondheid, voor zover dit
  noodzakelijk is voor de uitvoering van de taken waarmee het CBR bij of krachtens
  deze wet is belast, alsmede van de taken waarmee het CBR bij of krachtens andere
  wetten is belast;* het met inachtneming van artikel 4am vaststellen van de tarieven,
  alsmede het vaststellen van de wijze van betaling van deze tarieven, voor het verrichten
  van taken waarvoor het CBR bij of krachtens deze wet bevoegd is, alsmede voor de
  bij of krachtens andere wetten opgedragen taken;* het verstrekken van gegevens voor
  zover dit noodzakelijk is voor de uitvoering van de taken waarmee het CBR dan wel
  andere organisaties bij of krachtens deze wet zijn belast.Voorts is het CBR belast
  met:* de bij of krachtens andere wetten opgedragen taken, en;* andere bij regeling
  van Onze Minister opgedragen taken waarbij regels kunnen worden gesteld met betrekking
  tot de tarieven van deze taken.* afnemen vakexamens binnenvaart en examens Reglement
  voor het vervoer van gevaarlijke stoffen over de Rijn (ADNR);* afgifte Groot Vaarbewijs,
  Rijnpatenten en Radardiploma en vakbekwaamheidscertificaten ANDR.'
