names:
- value: Centraal Bureau Rijvaardigheidsbewijzen
  abbr: CBR
  valid_from: '1900-01-01'
description:
  text: 'Het beoordelen van de rijvaardigheid en de medische geschiktheid van bestuurders,
    en van de vakbekwaamheid van professionals in de sector transport en logistiek:
    dat is de taak die het CBR uitvoert in opdracht van de minister van Infrastructuur
    en Waterstaat. Zo stimuleert het CBR de mobiliteit van de individuele burger en
    levert het een significante bijdrage aan de verkeersveiligheid in Nederland van
    vandaag en morgen.Het CBR is een landelijke organisatie met een hoofdkantoor in
    Rijswijk en 54 examenlocaties in het land. Het voert zijn opdracht uit met zo''n
    1.200 gedreven collega’s. Het CBR is opgedeeld in vier divisies: Theorie, Rijvaardigheid,
    Rijgeschiktheid en CCV. Op het hoofdkantoor in Rijswijk zijn de directie en de
    centrale, ondersteunende stafafdelingen gehuisvest.'
  url: https://www.cbr.nl/nl/over-het-cbr/over/de-organisatie
