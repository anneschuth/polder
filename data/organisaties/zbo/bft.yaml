names:
- value: Bureau Financieel Toezicht
  abbr: BFT
  valid_from: '1900-01-01'
description:
  text: 'BFT houdt onafhankelijk toezicht op de naleving van de wet- en regelgeving
    door notarissen en gerechtsdeurwaarders. Daarnaast houdt BFT toezicht op de naleving
    van de Wet ter voorkoming van witwassen en financieren van terrorisme (Wwft) door
    financiële en juridische dienstverleners. Ons doel? Rechtszekerheid en financiële
    integriteit in Nederland te bevorderen.Dit betekent dat financiële en juridische
    dienstverleners zich bewust zijn van wet- en regelgeving en dit in de dagelijkse
    praktijk toepassen. Om dit te bereiken verrichten we zowel preventieve als repressieve
    activiteiten. Op het gebied van preventie geven we voorlichting en voeren we gesprekken.
    Ook proberen we door samenwerking met ketenpartners in spelen op signalen en risico’s
    tijdig te signaleren. Anderzijds verrichten we onderzoeken naar aanleiding van
    signalen of risico’s. Dergelijke onderzoeken kunnen tot handhaving leiden. Variërend
    van een waarschuwingsgesprek tot een boete of tuchtklacht.Om ons doel te realiseren
    hebben we drie ambities geformuleerd: Sturen op duurzame impact, Bestrijden van
    ondermijning en Inspelen op technologische ontwikkelingen.'
  url: https://www.bureauft.nl/over-bft/
