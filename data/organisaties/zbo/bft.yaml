taken_en_bevoegdheden: Het Bureau Financieel Toezicht houdt financieel toezicht op
  notarissen en gerechtsdeurwaarders. Tevens wordt toezicht gehouden op de naleving
  van de Wet ter voorkoming van witwassen en financieren van terrorisme (Wwft) bij
  notarissen, accountants, advocaten, belastingadviseurs en overige financiële en
  juridische dienstverleners.
