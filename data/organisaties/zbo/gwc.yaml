description:
  text: De Garantiewetcommissie (GWC) is ingesteld op basis van de Garantiewet Overheidspersoneel
    Indonesië, die op 3 juni 1950 in werking trad. In artikel 8 van de Garantiewet
    wordt verwezen naar de overige wetsartikelen waarin de diverse taken en bevoegdheden
    van de GWC zijn vastgelegd.
  url: https://wetten.overheid.nl/BWBR0002060/2013-01-01/0/#Artikel8
