  referentie: https://wetten.overheid.nl/BWBR0002060/2013-01-01/0/#Artikel8
taken_en_bevoegdheden: De Garantiewetcommissie (GWC) heeft als voornaamste taken:*
  het toezicht houden op de naleving van de Garantiewet Burgerlijk Overheidspersoneel
  Indonesië;* het garanderen van de rechten van burgerlijk overheidspersoneel op grond
  van de Garantiewet;* het behandelen van klachten en geschillen met betrekking tot
  de toepassing van de Garantiewet;* het nemen van maatregelen om de rechten van het
  personeel te beschermen.
