taken_en_bevoegdheden: Zorginstituut Nederland heeft de volgende taken:* het bevorderen
  van de rechtmatige en doelmatige uitvoering van de Wet Langdurige Zorg (Wlz) door
  de Wlz-uitvoerders en het CAK;* het bevorderen van een eenduidige uitleg van de
  aard, inhoud en omvang van het verzekerde pakket;* het met het oog op de rechtmatige
  en doelmatige uitvoering van de Wlz beleidsregels stellen voor de Wlz-uitvoerders
  en voor het CAK;* het voorlichten van Wlz-uitvoerders, zorgaanbieders en burgers
  over de aard, inhoud en omvang van de zorg die tot het verzekerde pakket behoort;*
  het desgevraagd adviseren van de minister van Volksgezondheid, Welzijn en Sport
  (VWS) over voorgenomen beleid inzake de aard, inhoud en omvang van de zorg die tot
  het verzekerde pakket behoort;* het gevraagd en ongevraagd aan de minister van VWS
  doorgeven van feitelijke ontwikkelingen die aanleiding kunnen geven tot wijzigingen
  van de aard, inhoud en omvang van de zorg die tot het verzekerde pakket behoort;*
  het bij of krachtens algemene maatregel van bestuur genoemde werkzaamheden uitvoeren
  ten behoeve van de gezamenlijke zorg voor de instandhouding van het elektronische
  gegevensverkeer, zoals bedoeld in artikel 9.1.6, eerste lid van de Wlz.
