  referentie: http://wetten.overheid.nl/BWBR0027660/
taken_en_bevoegdheden: '* Het geven van beschikkingen op een aanvraag voor een erkenning,
  buitengewoon pensioen, garantietoeslag, (periodieke) uitkering, garantieuitkering,
  vergoeding, tegemoetkoming of herziening als bedoeld in de wetten voor verzetsdeelnemers
  en oorlogsgetroffenen, afkomstig van een persoon die nog geen financiële aanspraak
  ontleent of heeft ontleend aan de wet waarop hij zijn aanvraag baseert;* Het ambtshalve
  herzien van de erkenning als verzetsdeelnemer, vervolgde of burger-slachtoffer;*
  Het vaststellen van beleidsregels voor beschikkingen van de Sociale Verzekeringsbank
  als bedoeld in artikel 6 (onderdelen a, b en d);* Het adviseren van de Sociale Verzekeringsbank
  over beschikkingen waarbij niet op basis van de beleidsregels, bedoeld in onderdeel
  c, kan worden besloten.'
