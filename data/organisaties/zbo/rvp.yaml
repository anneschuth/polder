names:
- value: Raad voor plantenrassen
  abbr: RvP
  valid_from: '1900-01-01'
description:
  text: Per 1 februari 2006 zijn de Raad voor het kwekersrecht, de Commissie voor
    de samenstelling van rassenlijst voor landbouwgewassen, de Commissie voor de samenstelling
    van rassenlijst voor bosbouwgewassen en de Commissie Toelating groenterassen gebundeld
    in de Raad voor plantenrassen.Sinds 1 januari 2008 wordt de Raad voor plantenrassen
    ondersteund door het Bureau Administratie en Documentatie van Naktuinbouw, afdeling
    Rassen & Proeven.
  url: https://www.raadvoorplantenrassen.nl/nl/over-de-raad/
kaderwet:
  kaderwetZbo:
    kaderwetVanToepassing: ja
wettelijke_grondslagen:
- opschrift: Zaaizaad- en Plantgoedwet 2005, artikel 2
  referentie: http://wetten.overheid.nl/BWBR0018040/
taken_en_bevoegdheden: De Raad voor plantenrassen is verantwoordelijk voor:* de verlening
  van kwekersrecht;* de toelating van landbouwrassen;* de toelating van rassen en
  opstanden van bosbouwgewassen;* de toelating van groenterassen met behulp van de
  zogenaamde B-lijst.De Raad is tevens houder van het Nederlands Rassenregister.
