names:
- value: Autoriteit Financiële Markten
  abbr: AFM
  valid_from: '1900-01-01'
description:
  text: De Autoriteit Financiële Markten (AFM) ziet erop toe dat de financiële markten
    op een transparante manier werken. Het toezicht van de AFM spitst zich onder meer
    toe op sparen, beleggen, verzekeren, lenen, pensioenen, kapitaalmarkten, assetmanagement,
    accountantsorganisaties en verslaggeving. Tevens oefent de AFM, samen met De Nederlandsche
    Bank (DNB), toezicht uit op financiële ondernemingen in Caribisch Nederland.
  url: https://www.afm.nl/nl-nl/over-de-afm
kaderwet:
  kaderwetZbo:
    instellingsmotief: Onafhankelijkheid
    kaderwetVanToepassing: ja
    afwijkendeBepalingKaderwet:
      artikel: 21,22,28,33
      toelichting: De afwijkende bepaling voor artikel 28 van de Kaderwet zelfstandige
        bestuursorganen is alleen van toepassing op het eerste lid.
wettelijke_grondslagen:
- opschrift: Wet op het financieel toezicht, artikel 1:30
  referentie: https://wetten.overheid.nl/BWBR0020368/2025-11-19/0#Titeldeel1_Hoofdstuk1.2_Afdeling1.2.2_Artikel1:30
- opschrift: Wet financiële markten BES, artikel 1:6
  referentie: https://wetten.overheid.nl/BWBR0030883/2023-07-01#Hoofdstuk1_Paragraaf2_Artikel1:6
- opschrift: Wet toezicht effectenverkeer 1995, artikel 40
  referentie: http://wetten.overheid.nl/cgi-bin/deeplink/law1/bwbid=BWBR0007657/article=40
taken_en_bevoegdheden: De belangrijkste taak van de AFM is het houden van gedragstoezicht
  op de financiële markten, ter bevordering van een ordelijk en transparant marktproces,
  zuivere verhoudingen tussen marktpartijen en de bescherming van consumenten. De
  AFM heeft deze toezichtstaak op grond van de Wet op het financieel toezicht (Wft).
  Tevens beslist de AFM over de toelating van financiële ondernemingen op de financiële
  markten. Op financiële ondernemingen in Caribisch Nederland oefent de AFM samen
  met De Nederlandse Bank (DNB) toezicht uit.
