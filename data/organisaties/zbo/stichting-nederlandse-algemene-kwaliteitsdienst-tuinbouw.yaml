names:
- value: Stichting Nederlandse Algemene Kwaliteitsdienst Tuinbouw
  valid_from: '1900-01-01'
description:
  text: De Stichting Nederlandse Algemene Kwaliteitsdienst Tuinbouw (Naktuinbouw)
    is per 1 januari 2000 ontstaan uit een fusie van de Stichting Nederlandse Algemene
    Keuringsdienst voor Bloemisterij en Boomkwekerijgewassen met de Stichting Nederlandse
    Algemene Keuringsdienst voor Groente- en Bloemzaden. Naktuinbouw onderzoekt teeltmateriaal
    (zoals zaden, stekken en jonge planten) en nieuwe plantenrassen die door tuinbouwondernemers
    worden geproduceerd. Daarnaast keurt en inspecteert Naktuinbouw zaad- en plantmateriaal
    en toetst deze op ziekten en plagen.
  url: https://www.naktuinbouw.nl/over-ons/de-organisatie
