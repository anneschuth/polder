taken_en_bevoegdheden: '* Bevordert en bewaakt de kwaliteit van producten, processen
  en ketens in de tuinbouw gericht op teeltmateriaal, zowel nationaal als internationaal.*
  Het uitvoeren van fytosanitaire export- en importinspecties en het waarmerken van
  het fytosanitaire certificaat.'
