- opschrift: Wet op de rechtsbijstand, artikel 2, eerste lid
  referentie: http://wetten.overheid.nl/cgi-bin/deeplink/law1/title=Wet%20op%20de%20rechtsbijstand/article=2
taken_en_bevoegdheden: De Raad voor Rechtsbijstand (RvR) zorgt voor de organisatie
  en het verlenen van rechtsbijstand en mediation, evenals het houden van toezicht
  op de uitvoering hiervan. Tevens coördineert de RvR in opdracht van de Minister
  van Justitie en Veiligheid de uitvoering van de Wet schuldsanering natuurlijke personen
  (Wsnp) en voert daarnaast ook de Wet beëdigde tolken en vertalers (Wbtv) uit.
