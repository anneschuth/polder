names:
- value: Raad voor Rechtsbijstand
  abbr: RvR
  valid_from: '1900-01-01'
description:
  text: De Raad voor Rechtsbijstand (RvR) is als zelfstandig bestuursorgaan verantwoordelijk
    voor de uitvoering van gesubsidieerde rechtsbijstand in Europees Nederland en
    op Bonaire, Sint Eustatius en Saba. Daarnaast voert de RvR (een deel van) de Wet
    schuldsanering natuurlijke personen (Wsnp) en de Wet beëdigde tolken en vertalers
    (Wbtv) uit.
  url: https://www.raadvoorrechtsbijstand.org/over/
