names:
- value: Stichting Administratie Indonesische Pensioenen
  abbr: SAIP
  valid_from: '1900-01-01'
description:
  text: De Stichting Administratie Indonesische Pensioenen (SAIP) is een zelfstandig
    bestuursorgaan (zbo) onder het ministerie van Binnenlandse Zaken (BZK). Het bestuur
    wordt gevormd door een Raad van Beheer, die is belast met beheer van de stichtingsgelden
    en het toekennen, berekenen, betalen en beheren van de overzeese pensioenen en
    uitkeringen. Ingevolge de statuten van de SAIP legt de Raad van Beheer door middel
    van het jaarverslag rekening en verantwoording af aan de ministers van BZK en
    Financiën. De SAIP beschikt niet over eigen personeel. De uitvoeringswerkzaamheden
    zijn krachtens een door de Raad van Beheer gesloten overeenkomst met de Stichting
    Pensioenfonds ABP neergelegd bij dat pensioenfonds. ABP heeft de uitvoering van
    deze werkzaamheden vervolgens opgedragen aan APG.
  url: https://www.saip.nl
kaderwet:
  kaderwetZbo:
    kaderwetVanToepassing: nee
wettelijke_grondslagen:
- opschrift: Wet houdende vaststelling regeling ten aanzien van de Stichting tot verzorging
    en afwikkeling van pensioensaangelegenheden gewezen overheidspersoneel van Indonesië
  referentie: http://wetten.overheid.nl/cgi-bin/deeplink/law1/bwbid=BWBR0002180
taken_en_bevoegdheden: De Stichting Administratie Indonesische Pensioenen (SAIP) heeft
  de volgende taken:* het zorgdragen voor de uitvoering van de verplichting tot voldoening
  van de weduwenpensioenen en wezenonderstanden aan de nagelaten betrekkingen van
  gewezen overheidspersoneel van Indonesië;* het namens de betreffende minister nemen
  van beslissingen ter uitvoering van de regelingen en aangelegenheden welke verband
  houden met zogenaamde overzeese pensioenen en uitkeringen.
