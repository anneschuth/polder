taken_en_bevoegdheden: Binnen de provincies Groningen, Drenthe en Friesland heeft
  de grondkamer Noord onder meer als taak:* het bevorderen van goede pachtverhoudingen
  in Nederland;* het toetsen van de inhoud van pachtovereenkomsten aan de dwingend
  rechtelijke bepalingen van Titel 7.5 Burgerlijk Wetboek (pacht);* prijstoetsing;*
  het toetsen van overeenkomsten van korte duur en de bepaling van verpachte waarde.
