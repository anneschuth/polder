description:
  text: Zorgkantoor DSW B.V. is een uitvoerder van de Wet langdurige zorg (Wlz), zoals
    bedoeld in artikel 4.1.1 van die wet. Tevens heeft deze Wlz-uitvoerder een zorgkantoorfunctie.
  url: https://www.zorgkantoordsw.nl/zorgaanbieders/zorgkantoor/het-zorgkantoor/taken
kaderwet:
  kaderwetZbo:
    kaderwetVanToepassing: nee
wettelijke_grondslagen:
- opschrift: Wet langdurige zorg, artikel 4.1.1
  referentie: https://wetten.overheid.nl/BWBR0035917/2025-01-01#Hoofdstuk4_Paragraaf1_Artikel4.1.1
taken_en_bevoegdheden: Zorgkantoor DSW B.V. is verantwoordelijk voor het uitvoeren
  van de taken zoals beschreven in paragraaf 2 van hoofdstuk 4 (artikelen 4.2.1 tot
  en met 4.2.6) van de Wet langdurige zorg (Wlz). Als zorgkantoor heeft Zorgkantoor
  DSW B.V. tevens een zorgplicht richting alle verzekerden die wonen in de regio waarvoor
  Zorgkantoor DSW B.V. als zorgkantoor is aangewezen. Deze zorgplicht omvat onder
  meer het verstrekken van een persoonsgebonden budget (pgb) en het verzorgen van
  de administratie of controle van de zorg die aan verzekerden in de betreffende regio
  wordt verleend. De mate van die administratie of controle wordt bepaald aan de hand
  van een Algemene Maatregel van Bestuur.
