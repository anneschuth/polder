taken_en_bevoegdheden: De Wet op de architectentitel kent het Bureau Architectenregister
  (BA) vier categorieën taken en bevoegdheden toe:* het beheer van het register;*
  werkzaamheden als bevoegde autoriteit;* werkzaamheden met betrekking tot regelingen
  van de Wet op de architectentitel;* overige wettelijke taken en bevoegdheden.Daarnaast
  voert het Architectenregister de zelfstandige route van de Beroepservaringperiode
  uit en coördineert samen met het College van Rijksbouwmeester & Rijksadviseurs periodiek
  onderzoek naar de stand van de architectuur.
