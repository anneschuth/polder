description:
  text: 'Op basis van de Wet op de architectentitel dragen wij medeverantwoordelijkheid
    voor de vakbekwaamheid van 14.000 interieurarchitecten, architecten, tuin- en
    landschapsarchitecten en stedenbouwkundigen (te noemen ''architect''). Hierbij
    streven wij de doelstellingen van de Wet op de architectentitel na: het waarborgen
    van een vakbekwame beroepsuitoefening van de architect en daarmee de bevordering
    van de kwaliteit van het landschap en de gebouwde omgeving, het implementeren
    van Europese richtlijnen voor de vier titels en de bescherming van de consument.'
  url: https://www.architectenregister.nl/wie-wij-zijn
