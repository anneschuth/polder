taken_en_bevoegdheden: Het Mondriaan Fonds is het publieke stimuleringsfonds voor
  beeldende kunst en cultureel erfgoed. Het bevordert bijzondere en vernieuwende projecten
  en activiteiten van beeldend kunstenaars, bemiddelaars en instellingen die van belang
  zijn voor de beeldende kunst en cultureel erfgoed in Nederland. Alle financiële
  bijdragen die het Mondriaan Fonds verstrekt, hebben tot doel de betekenisvolle ontwikkeling
  en zichtbaarheid van beeldende kunst en cultureel erfgoed in Nederland te stimuleren
  daar waar de markt dit niet of nog niet mogelijk maakt.
