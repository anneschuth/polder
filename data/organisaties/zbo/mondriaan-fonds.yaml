description:
  text: Het Mondriaan Fonds is voortgekomen uit de fusie op 30 december 2011 van het
    Fonds BKVB, dat zich richtte op hedendaagse kunstenaars en bemiddelaars, en de
    Mondriaan Stichting, die zich richtte op instellingen op het gebied van beeldende
    kunst en cultureel erfgoed.
  url: https://www.mondriaanfonds.nl/over-het-fonds/organisatie/
