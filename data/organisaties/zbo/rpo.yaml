names:
- value: Stichting Regionale Publieke Omroep
  abbr: RPO
  valid_from: '1900-01-01'
description:
  text: De Regionale Publieke Omroep (RPO) is een door de Mediawet ingestelde stichting
    die de samenwerking tussen publieke omroepen in verschillende regio's bevordert.
    Daarnaast treedt de RPO op als coördinatieorgaan voor deze omroepen.
  url: https://www.stichtingrpo.nl/over-rpo/
kaderwet:
  kaderwetZbo:
    kaderwetVanToepassing: nee
wettelijke_grondslagen:
- opschrift: Mediawet 2008, artikel 2.60a
  referentie: https://wetten.overheid.nl/BWBR0025028/2025-09-11/#Hoofdstuk2_Titeldeel2.3_Paragraaf2.3.1_Artikel2.60a
taken_en_bevoegdheden: De belangrijkste taken van de Regionale Publieke Omroep (RPO)
  zijn:* het bevorderen van samenwerking tussen publieke omroepen op regionaal niveau;*
  het coördineren van publieke omroepen op regionaal niveau, met het oog op de uitvoering
  van hun publieke mediaopdracht* de behartiging van zaken die voor de regionale publieke
  mediadienst en de regionale publieke media-instellingen van gemeenschappelijk belang
  zijn;* het sluiten van cao's en het vaststellen van betalingsnormen voor het werk
  dat freelancers leveren, mede in naam van de regionale publieke media-instellingen;*
  de bevordering van een doelmatige inzet van geld dat bestemd is voor het verzorgen
  en verspreiden van het media-aanbod, evenals het bevorderen van geïntegreerde financiële
  verslaglegging en verantwoording;* het inrichten, in stand houden, beheren, exploiteren
  en regelen van het gebruik van organen, diensten en faciliteiten (zoals studio’s
  en distributie-infrastructuren) die nodig zijn voor een goede uitvoering van de
  publieke mediaopdracht op regionaal niveau.
