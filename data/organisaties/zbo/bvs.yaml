taken_en_bevoegdheden: Het departement Bedrijfsvoering en strategie (BVS) van het
  CBS bestaat uit onderstaande afdelingen, die elk zijn onderverdeeld in een aantal
  teams:BSB (Strategie en bestuursadvisering):* BSA (Algemeen)* BBE (Beleid)* BIA
  (Interne auditdienst)BCB (Control & bedrijfsadministraties):* BBA (Bedrijfsadministraties)*
  BPC (Planning & control)BPO (Personeel en organisatie):* BPD (Personeel en organisatie
  Den Haag)* BPH (Personeel en organisatie Heerlen)* BCA (CBS Academy )BFB (Facilitair
  Bedrijf):* BRO (Regieorganisatie)* BUO (Uitvoeringsorganisatie)* BIH (Informatiehuishouding)BBM
  (Ondersteuning & informatiemanagement):* BBM (Ondersteuning & informatiemanagement)*
  BMO (Managementondersteuning)De afdelingen en teams zijn overgenomen uit het [CBS-organogram](https://www.cbs.nl/-/media/_pdf/organogram-nl.pdf).
