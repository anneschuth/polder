description:
  text: De Nederlandse Publieke Omroep (NPO) is het sturings- en samenwerkingsorgaan
    dat verantwoordelijk is voor het uitvoeren van de publieke mediataken op landelijk
    niveau, zoals vastgelegd in de Mediawet 2008.
  url: https://npo.nl/overnpo/organisatie-npo
