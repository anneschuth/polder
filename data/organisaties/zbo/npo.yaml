taken_en_bevoegdheden: De Nederlandse Publieke Omroep (NPO) heeft als belangrijkste
  taken:* het bevorderen van samenwerking en coördinatie binnen de landelijke publieke
  omroep;* het indelen van de zendtijd van instellingen die landelijke publieke zendtijd
  hebben verkregen;* de bekostiging van de instellingen die landelijke publieke zendtijd
  hebben verkregen.
