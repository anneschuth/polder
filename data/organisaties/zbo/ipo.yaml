description:
  text: 'Het Interprovinciaal Overleg (IPO) is het samenwerkingsverband van en voor
    de twaalf provincies. Hierin bundelen de provincies kennis, kunde en contacten
    voor onderlinge samenwerking en voor het behartigen van hun gezamenlijke belangen
    bij regering, parlement, departementen, publieke en private partners. Het IPO
    is een vereniging waarvan uitsluitend Nederlandse provincies lid kunnen zijn.DOELSTELLING
    - Doelstelling van het IPO als koepelorganisatie van en voor de twaalf provincies
    is het bevorderen van optimale randvoorwaarden, waarbinnen de provincies een adequate
    bijdrage kunnen leveren aan de aanpak van regionale maatschappelijke vraagstukken,
    en het stimuleren van de hiervoor noodzakelijke vernieuwingsprocessen binnen de
    provincies.KERNFUNCTIES - De kernfuncties van het IPO zijn belangenbehartiging
    (inbreng van interprovinciale standpunten bij regering, parlement, andere overheden
    en maatschappelijke organisaties) en platform (signaleren van relevante ontwikkelingen,
    interprovinciale kennis- en informatieuitwisseling, gezamenlijke besluitvorming
    en standpuntbepaling en vernieuwingsprocessen stimuleren).BIJ12 - Voor ondersteuning
    op het gebied van vitaal platteland en de fysieke leefomgeving is door het IPO
    in 2014 de uitvoeringsorganisatie BIJ12 opgericht. BIJ12 is onderdeel van de Vereniging
    het Interprovinciaal Overleg en ondersteunt provincies bij de uitvoering van hun
    gemeenschappelijke taken. Bij BIJ12 zijn de volgende units actief: Faunazaken,
    GBO Provincies, Natuurinformatie en Natuurbeheer, Expertiseteam Stikstof en Natura2000.
    Bij BIJ12 zijn de secretariaten ondergebracht van de Adviescommissie Schade Grondwater,
    de Maatschappelijke adviesraad faunaschade en de Stichting Certificering Subsidiestelsel
    Natuur- en Landschapsbeer. BIJ12 verleent namens de provincies tegemoetkomingen
    in faunaschade en subsidies voor het opruimen van gedumpt drugsafval.'
