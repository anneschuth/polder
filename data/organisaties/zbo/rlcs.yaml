taken_en_bevoegdheden: Iedere registerloods is daarnaast van rechtswege lid van een
  (of meer)regionale loodsencorporaties (rlc’s). De rlc’shebben een, overigens zeer
  beperkte, bevoegdheid tot het stellen vanaanvullende regels voor haar leden. Voor
  het overige verzorgen de Nederlandse Loodsencorporatie ende rlc’s de opleidingen,
  examens en voorlichting.
