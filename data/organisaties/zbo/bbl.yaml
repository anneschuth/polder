names:
- value: Bureau Beheer Landbouwgronden
  abbr: BBL
  valid_from: '1900-01-01'
description:
  text: Het Bureau Beheer Landbouwgronden (BBL) houdt zich bezig met het verwerven
    van onroerend goed en het doorleveren hiervan aan overheids- en andere organisaties,
    zodat overheidsdoelen in het landschap op de gebieden van natuur, landbouw, recreatie,
    landschap, water en milieu behaald kunnen worden.
