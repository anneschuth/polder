- opschrift: Wet agrarisch grondverkeer, artikel 28
  referentie: https://wetten.overheid.nl/BWBR0003386/2021-07-01#TiteldeelVII_Artikel28
taken_en_bevoegdheden: Het Bureau Beheer Landbouwgronden (BBL) is belast met de verwerving
  van onroerend goed dat wordt doorgeleverd aan overheids- en andere organisaties,
  die daarmee overheidsdoelen in het landelijk gebied realiseren met betrekking tot
  de thema's natuur, landbouw, recreatie, landschap, water en milieu. Als apart zelfstandig
  bestuursorgaan valt het BBL onder de beleids- en systeemverantwoordelijkheid van
  het ministerie van Landbouw, Visserij, Voedselzekerheid en Natuur.
