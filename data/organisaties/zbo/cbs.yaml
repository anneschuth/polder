names:
- value: Centraal Bureau voor de Statistiek
  abbr: CBS
  valid_from: '1900-01-01'
description:
  text: Het Centraal Bureau voor de Statistiek (CBS) verzamelt gegevens van personen
    en bedrijven en verwerkt deze gegevens tot statistieken. De statistieken van het
    CBS gaan over een groot aantal verschillende onderwerpen (denk bijvoorbeeld aan
    wonen, werken, gezondheid en economie) en zijn openbaar in te zien.
  url: https://www.cbs.nl/nl-nl/over-ons/dit-zijn-wij
