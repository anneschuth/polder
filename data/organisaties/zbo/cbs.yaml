  kaderwetZbo:
    instellingsmotief: Onafhankelijkheid
    kaderwetVanToepassing: ja
wettelijke_grondslagen:
- opschrift: Wet op het Centraal bureau voor de statistiek, artikel 2
  referentie: https://wetten.overheid.nl/BWBR0015926/2022-03-02#Hoofdstuk2_Paragraaf1_Artikel2
taken_en_bevoegdheden: Het Centraal Bureau voor de Statistiek (CBS) heeft de volgende
  taken:* het van overheidswege verrichten van statistisch onderzoek ten behoeve van
  praktijk, beleid en wetenschap;* het openbaar maken van de statistieken die voortkomen
  uit het hierboven genoemde onderzoek.Naast de verantwoordelijkheid voor de nationale
  (officiële) statistieken is het CBS ook verantwoordelijk voor het samenstellen van
  Europese (communautaire) statistieken.
