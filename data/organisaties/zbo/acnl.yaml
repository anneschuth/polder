names:
- value: Airport Coordination Netherlands
  abbr: ACNL
  valid_from: '1900-01-01'
description:
  text: Airport Coordination Netherlands (ACNL) is de instantie die binnen Nederland
    verantwoordelijk is voor de seizoensplanning van vluchten, evenals het toewijzen
    van vliegveldslots (aankomst- en vertrektijden van vliegtuigen) aan luchtvaartmaatschappijen
    en het toezicht houden op het gebruik van deze slots. ACNL voert deze taken, in
    overeenstemming met Europese regelgeving, uit voor de luchthavens Amsterdam Airport
    Schiphol, Rotterdam The Hague Airport en Eindhoven Airport.
  url: https://slotcoordination.nl/about-acnl/missions/
kaderwet:
  kaderwetZbo:
    kaderwetVanToepassing: ja
    afwijkendeBepalingKaderwet:
      artikel: 18,21,22
      toelichting: EU-regelgeving dwingt ACNL af te wijken van bepalingen omtrent
        de goedkeuring van de tarieven, de begroting en de jaarrekening, evenals beleidsregels
        en het vernietigingsrecht van de minister.
wettelijke_grondslagen:
- opschrift: Wet luchtvaart, artikel 8a.64
  referentie: http://wetten.overheid.nl/jci1.3:c:BWBR0005555
taken_en_bevoegdheden: Airport Coordination Netherlands (ACNL) heeft de volgende taken
  en bevoegheden:* het toewijzen van slots aan luchtvaartmaatschapppijen;* het bestuderen
  van en adviseren over ontwikkelingen op het gebied van vliegbewegingen;* het periodiek
  rapporteren aan het ministerie van Infrastructuur en Waterstaat.
