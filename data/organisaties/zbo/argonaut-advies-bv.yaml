- opschrift: Uitspraak ECLI:NL:CRVB:2018:2554 van de Centrale Raad van Beroep
  referentie: https://uitspraken.rechtspraak.nl/details?id=ECLI:NL:CRVB:2018:2554
taken_en_bevoegdheden: Argonaut Advies B.V. is als zelfstandig bestuursorgaan (zbo)
  bevoegd om het openbaar gezag uit te voeren inzake de publieke taak om indicatiestellingen
  te verstrekken voor een hoog persoonlijk kilometerbudget in het kader van bovenregionaal
  vervoer voor mensen met een mobiliteitsbeperking (de Valys-regeling). Deze zbo-taak
  is het beslissen over aanvragen voor een hoog persoonlijk kilometerbudget voor mensen
  die, vanwege een mobiliteitsbeperking, niet kunnen reizen met de trein (ook niet
  met begeleiding).De status van Argonaut als zbo in het kader van deze taak is gebaseerd
  op de [bestaande jurisprudentie](https://uitspraken.rechtspraak.nl/details?id=ECLI:NL:CRVB:2018:2554)
  van de Centrale Raad van Beroep (CRvB).
