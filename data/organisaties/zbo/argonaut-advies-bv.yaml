description:
  text: Argonaut Advies B.V. is de medisch adviespartner voor gemeenten, zorgverzekeraars,
    zorgkantoren en centrale overheden en is bevoegd om het openbaar gezag uit te
    voeren inzake de publieke taak om indicatiestellingen te verstrekken voor een
    hoog persoonlijk kilometerbudget in het kader van bovenregionaal vervoer voor
    mensen met een mobiliteitsbeperking (de Valys-regeling).
  url: https://argonaut.nl/over-ons/
