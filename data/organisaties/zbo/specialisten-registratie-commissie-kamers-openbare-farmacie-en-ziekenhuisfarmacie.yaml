wettelijke_grondslagen:
- opschrift: Wet beroepen in de individuele gezondheidszorg, artikelen 14 en 15
  referentie: http://wetten.overheid.nl/cgi-bin/deeplink/law1/title=Wet%20op%20de%20beroepen%20in%20de%20individuele%20gezondheidszorg/article=14
taken_en_bevoegdheden: Indien een organisatie van beoefenaren van een beroep als bedoeld
  in artikel 3 van de Wet beroepen in de individuele gezondheidszorg (Wet BIG) voor
  de inschrijving van beroepsbeoefenaren, die een bijzondere deskundigheid hebben
  verworven met betrekking tot de uitoefening van een deelgebied van hun beroep, een
  specialistenregister heeft en daaraan een titel is verbonden, kan de Minister van
  Volksgezondheid, Welzijn en Sport bepalen dat die titel als wettelijk erkende specialistentitel
  wordt aangemerkt. Een aanvraag daartoe wordt gedaan door het bestuur van de organisatie;
  het bestuur kan de bevoegdheid daartoe overdragen aan een orgaan. Deze bevoegdheid
  kan worden overgedragen aan het orgaan (college) zoals bedoeld in artikel 14, tweede
  lid, sub d van de Wet BIG.De Specialisten Registratie Commissie (SRC) is in het
  leven geroepen door de Koninklijke Nederlandse Maatschappij ter bevordering der
  Pharmacie (KNMP) als toezichthouder op de kwaliteit van de opleiding en het beroep
  van de specialismen openbaar en ziekenhuisapotheker.De taken van de SRC zijn:* het
  openen of sluiten van een register als bedoeld in artikel 11 onder c of e van de
  Regeling Specialismen en profielen Farmacie 2023, nadat het Centraal College heeft
  besloten tot het instellen respectievelijk intrekken ervan;* het inschrijven van
  een apotheker in een specialistenregister en het doorhalen van de inschrijving;*
  het opnieuw, al dan niet aansluitend, al dan niet op grond van gelijkgestelde werkzaamheden,
  inschrijven van een apotheker in een specialistenregister en het doorhalen van de
  inschrijving;* het inschrijven van de apotheker in een opleidingsregister en het
  wijzigen of doorhalen van de inschrijving;* het afgeven van een opleidingstitel
  indien een apotheker de opleiding tot specialist in Nederland met goed gevolg heeft
  voltooid;* het erkennen van beroepskwalificaties;* het al dan niet hernieuwd erkennen
  van een opleider, opleidingsinstelling en het wijzigen, schorsen of intrekken van
  de erkenning;* het houden van toezicht op de naleving van een besluit van het Centraal
  College door een opleider, opleidingsinstelling, opleidingsinstituut of apotheker
  in opleiding;* het opstellen van uitvoeringsregelingen op basis van besluiten van
  het Centraal College, inzake de opleiding en/of herregistratie en/of hernieuwde
  inschrijving in het specialistenregister;* het houden van toezicht op het specialistenregister.
