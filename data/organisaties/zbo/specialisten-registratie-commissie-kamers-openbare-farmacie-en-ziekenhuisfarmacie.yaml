description:
  text: 'Dit zbo is onderdeel van het cluster Registratiecommissies KNMG, KNMP, KNMT,
    FGzPt en V&VN. De Specialisten Registratie Commissie (SRC) is de registratiecommissie
    van de beroepsorganisatie Koninklijke Nederlandse Maatschappij ter bevordering
    der Pharmacie (KNMP). De registratiecommissie is een privaatrechtelijk vormgegeven
    deeltijd-zbo met publiekrechtelijke taken.De SRC is door de KNMP ingesteld als
    toezichthouder op de kwaliteit van de opleiding en het beroep van de apotheker.
    De SRC bestaat uit twee kamers: één voor de openbare farmacie (SRC-OF) en één
    voor de ziekenhuisfarmacie (SRC-ZF).'
  url: https://www.knmp.nl/beroepsontwikkeling/colleges-en-commissies
