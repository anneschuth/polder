taken_en_bevoegdheden: Een aantal artsen in en buiten Nederland is door de minister
  van Infrastructuur en Waterstaat aangewezen als keuringsarts voor de scheepvaart.
  De in Nederland aangewezen keuringsartsen voor de scheepvaart geven geneeskundige
  verklaringen voor de binnenvaart en voor de zeevaart af. De in het buitenland aangewezen
  keuringsartsen voor de scheepvaart geven uitsluitend geneeskundige verklaringen
  voor de zeevaart af. Daarnaast zijn er keuringsartsen erkend (de betreffende regelgeving
  maakt een onderscheid tussen aangewezen en erkende keuringsartsen) voor het afgeven
  van geneeskundige verklaringen voor zeevarenden zonder wachtfunctie en/of veiligheidstaken.De
  lijst met aangewezen en erkende artsen staat op de website van de Inspectie Leefomgeving
  en Transport (ILT) en wordt maandelijks geactualiseerd. Deze lijst is [hier](https://www.ilent.nl/onderwerpen/scheepvaart-algemeen/medische-keuring-scheepvaart/keuringsartsen)
  terug te vinden.
