names:
- value: Autoriteit Consument en Markt
  abbr: ACM
  valid_from: '1900-01-01'
description:
  text: De Autoriteit Consument en Markt (ACM) is op 1 april 2013 in het leven geroepen
    en houdt onafhankelijk toezicht op mededinging, het consumentenrecht en meerdere
    specifieke (bedrijfs)sectoren. Doel van de ACM is een goede, eerlijke werking
    van de markten voor zowel consumenten als bedrijven. De ACM is voortgekomen uit
    een fusie van de Consumentenautoriteit, de Nederlandse Mededingingsautoriteit
    (NMa) en de Onafhankelijke Post en Telecommunicatie Autoriteit (OPTA). De toezichtstaken
    van de ACM hebben betrekking op zowel Europees als Caribisch Nederland.
  url: https://www.acm.nl/nl/organisatie
kaderwet:
  kaderwetZbo:
    instellingsmotief: Onafhankelijkheid
    kaderwetVanToepassing: ja
    afwijkendeBepalingKaderwet:
      artikel: '22'
      toelichting: 'Artikel 22 van de Kaderwet zelfstandige bestuursorganen is gedeeltelijk
        van toepassing (zie: TKII 2012-2013, 33 622, nr. 2, artikel I, onderdeel G).'
wettelijke_grondslagen:
- opschrift: Instellingswet Autoriteit Consument en Markt, artikel 2, lid 1
  referentie: https://wetten.overheid.nl/BWBR0033043/2022-05-01#Hoofdstuk2_Artikel2
taken_en_bevoegdheden: De ACM is belast met taken (hoofdzakelijk nalevingstoezicht
  en bestuursrechtelijke handhaving) op grond van de volgende wetgeving:* Wet handhaving
  consumentenbescherming;* Mededingingswet;* Telecommunicatiewet;* Postwet 2009;*
  Elektriciteitswet 1998;* Gaswet;* vervoerswetgeving (Wet personenvervoer 2000, Loodsenwet,
  Spoorwegwet, Wet luchtvaart en Scheepvaartverkeerswet).
