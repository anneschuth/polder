wettelijke_grondslagen:
- opschrift: Wet aanwijzing nationale accreditatie-instantie, artikel 2
  referentie: http://wetten.overheid.nl/BWBR0026591/
taken_en_bevoegdheden: '* Het uitvoeren van de in verordening (EG) nummer 765/2008
  (betreffende accreditatie en markttoezicht) opgedragen taken. Hierij kan men denken
  aan het beoordelen van de bekwaamheid van conformiteitsbeoordelingsinstanties om
  een specifieke conformiteitsbeoordelingsactiviteit uit te voeren,* het monitoren
  van de conformiteitsbeoordelingsinstanties waaraan een accreditatieverklaring is
  verleend* en de werkzaamheden in het kader van de collegiale toetsing.'
