names:
- value: Raad voor Accreditatie
  abbr: RvA
  valid_from: '1900-01-01'
description:
  text: Accreditatie is het beoordelen of een keuringsinstantie, certificeringsinstantie,
    inspectie-instantie of een laboratorium (conformiteitsbeoordelingsinstanties)
    onpartijdig en competent zijn werk uitvoert. Bij een positieve beoordeling wordt
    door de accreditatie-instantie een formele verklaring afgegeven dat de instantie
    voldoet aan de eisen die zijn bepaald door Europese geharmoniseerde normen (Staatscourant
    2010, 3033)  en, indien van toepassing, door aanvullende eisen.
