- opschrift: Wet schadefonds geweldsmisdrijven, artikel 8
  referentie: http://wetten.overheid.nl/cgi-bin/deeplink/law1/title=WET%20SCHADEFONDS%20GEWELDSMISDRIJVEN
taken_en_bevoegdheden: Tegemoetkomen aan slachtoffers van ernstige opzettelijk gepleegde
  geweldsmisdrijven voor de letstelschade. Indien betrokkene is overleden, kunnen
  nabestaanden een verzoek doen om een uitkering.
