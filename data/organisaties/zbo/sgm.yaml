names:
- value: Commissie schadefonds geweldsmisdrijven
  abbr: SGM
  valid_from: '1900-01-01'
description:
  text: 'Het Schadefonds Geweldsmisdrijven geeft een financiële tegemoetkoming aan
    slachtoffers van geweldsmisdrijven, nabestaanden en naasten. Met deze uitkering
    erkennen we namens de overheid het onrecht dat zij hebben meegemaakt. Zo dragen
    wij bij aan het herstel van hun vertrouwen in de samenleving.Link naar beschrijving
    van taken en bevoegdheden van de organisatie per organisatieonderdeel: https://werkenbijschadefonds.nl/functies/'
  url: https://www.schadefonds.nl/schadefonds/
