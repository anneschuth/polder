names:
- value: Nationaal Rapporteur Mensenhandel en Seksueel Geweld tegen Kinderen
  valid_from: '1900-01-01'
description:
  text: De Nationaal Rapporteur Mensenhandel en Seksueel Geweld tegen Kinderen is
    onafhankelijk en heeft de wettelijke taak om onderzoek te doen naar de aard en
    omvang van mensenhandel en seksueel geweld tegen kinderen. Ook is het een wettelijke
    taak om onderzoek te doen naar de effecten van het huidige beleid op de aanpak
    van mensenhandel en seksueel geweld tegen kinderen en om de regering te adviseren
    over het voorkomen en bestrijden ervan.Nederland heeft sinds 2000 een Nationaal
    Rapporteur die zich inzet voor mensenhandel. In 2009 is het mandaat uitgebreid
    met de aanpak van kinderpornografie. In de eerste rapportage over dit mandaat
    in 2011, concludeerde de Nationaal Rapporteur dat de aanpak van kinderpornografie
    breder gezien moet worden in het kader van seksueel geweld tegen kinderen. De
    daaropvolgende aanbeveling is vervolgens overgenomen door de Nederlandse regering
    en leidde in 2012 tot mandaatuitbreiding naar seksueel geweld tegen kinderen.De
    Nationaal Rapporteur wordt in diens werkzaamheden ondersteund door een bureau.
    Samen met het bureau vormt de Nationaal Rapporteur het instituut Nationaal Rapporteur
    Mensenhandel en Seksueel Geweld tegen Kinderen; het instituut functioneert als
    een zelfstandig bestuursorgaan.
  url: https://www.nationaalrapporteur.nl/over-ons/over-de-nationaal-rapporteur
