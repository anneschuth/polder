taken_en_bevoegdheden: '* het doen van onderzoek naar de aard en de omvang van mensenhandel
  en seksueel geweld tegen kinderen;* het doen van onderzoek naar de effecten van
  beleid dat mensenhandel en seksueel geweld tegen kinderen moet tegengaan;* het adviseren
  van de nationale en lokale regering en organisaties in de hulpverlening en het strafrecht,
  met betrekking tot de bestrijding van mensenhandel en seksueel geweld tegen kinderen;*
  het delen van inzichten van de problematiek met Tweede Kamerleden en gemeenten.'
