names:
- value: Kansspelautoriteit
  abbr: Ksa
  valid_from: '1900-01-01'
description:
  text: De Kansspelautoriteit (Ksa) is de toezichthouder op de markt voor kansspelen,
    waaronder loterijen, sportweddenschappen en casinospelen. Als doelen heeft de
    Ksa het beschermen van consumenten op de kansspelmarkt, het bestrijden van illegaliteit
    en criminaliteit op deze markt en het voorkomen van kansspelverslaving. Daarbij
    handhaaft de Ksa wet- en regelgeving en vergunningsvoorwaarden op het gebied van
    kansspelen, om ervoor te zorgen dat deze veilig en eerlijk verlopen.
  url: https://kansspelautoriteit.nl/over-ons/
kaderwet:
  kaderwetZbo:
    instellingsmotief: Onafhankelijkheid
    kaderwetVanToepassing: ja
wettelijke_grondslagen:
- opschrift: Wet op de kansspelen, artikel 33, lid 1
  referentie: https://wetten.overheid.nl/BWBR0002469/2022-10-01#TiteldeelVI_Afdeling1_Artikel33
taken_en_bevoegdheden: De Kansspelautoriteit (Ksa) heeft de volgende taken:* het verstrekken,
  wijzigen en intrekken van vergunningen voor de diverse vormen van kansspelen, exploitatievergunningen
  en modeltoelatingen voor speelautomaten (door de raad van bestuur, tenzij bij of
  krachtens de wet anders is bepaald);* het bevorderen van het voorkomen en het beperken
  van kansspelverslaving;* het geven van voorlichting en informatie;*  het toezicht
  houden op de naleving van de toepasselijke wet- en regelgeving en de vergunningen;*
  de handhaving van de toepasselijke wet- en regelgeving en de vergunningen.
