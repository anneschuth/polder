description:
  text: De volledige beroepsorganisaties Koninklijke Nederlandsche Maatschappij tot
    bevordering der Geneeskunst (KNMG), Koninklijke Nederlandse Maatschappij ter bevordering
    der Pharmacie (KNMP), Koninklijke Nederlandse Maatschappij tot bevordering der
    Tandheelkunde (KNMT), Federatie van Gezondheidspsychologen en Psychotherapeuten
    (FGzPt) en Verpleegkundigen & Verzorgenden Nederland (V&VN) zijn geen zelfstandige
    bestuursorganen behorende tot dit cluster. De Registratiecommissies van de eerder
    genoemde beroepsorganisaties zijn dit wel.
kaderwet:
  kaderwetZbo:
