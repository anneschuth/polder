      artikel: '22'
      toelichting: Artikel 22 van de Kaderwet zelfstandige bestuursorganen is niet
        van toepassing voor zover het besluiten betreft ter zake van de inschrijving.
wettelijke_grondslagen:
- opschrift: Wet beroepen in de individuele gezondheidszorg,  artikelen 14 en 15
  referentie: http://wetten.overheid.nl/cgi-bin/deeplink/law1/title=Wet%20op%20de%20beroepen%20in%20de%20individuele%20gezondheidszorg/article=14
taken_en_bevoegdheden: Indien een organisatie van beoefenaren van een beroep als bedoeld
  in artikel 3 van de hierboven genoemde Wet beroepen in de individuele gezondheidszorg
  (Wet BIG) voor de inschrijving van beroepsbeoefenaren, die een bijzondere deskundigheid
  hebben verworven met betrekking tot de uitoefening van een deelgebied van hun beroep,
  een specialistenregister heeft en daaraan een titel is verbonden, kan de Minister
  van Volksgezondheid, Welzijn en Sport bepalen dat die titel als wettelijk erkende
  specialistentitel wordt aangemerkt. Een aanvraag daartoe wordt gedaan door het bestuur
  van de organisatie; het bestuur kan de bevoegdheid daartoe overdragen aan een orgaan.
  Deze bevoegdheid kan worden overgedragen aan het orgaan (college) zoals bedoeld
  in artikel 14, tweede lid, sub d van de Wet BIG.In het kort:* de inschrijving van
  specialisten;* het doorhalen van de inschrijving van specialisten;* het schorsen
  van de inschrijving van specialisten.
