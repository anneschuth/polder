description:
  text: Het departement Dataservices, research en innovatie (DRI) is een organisatieonderdeel
    van het Centraal Bureau voor de Statistiek (CBS).
taken_en_bevoegdheden: Het departement Dataservices, research en innovatie (DRI) van
  het CBS bestaat uit onderstaande afdelingen, waarvan meerdere zijn onderverdeeld
  in een aantal teams:DBM (Beleid- en Managementondersteuning)DRD (Research en Development):*
  DMD (Methodologie Den Haag)* DMH (Methodologie Heerlen)* DOD (Procesontwikkeling
  Den Haag)* DOH (Procesontwikkeling Heerlen)DBS (Beleidsstatistiek):* DBS1 (Beleidsstatistiek
  I)* DBS2 (Beleidsstatistiek II)* DBS3 (Beleidsstatistiek III)DVZ (Dataverzameling):*
  DOC (Onderzoekscoördinatie)* DVL (Vragenlijstontwikkeling en -bouw)* DOS (Opleidingen,
  berichtgeverscommunicatie en steekproeven)* DEL (Enquêtebeheer en logistiek)* DCC
  (Contactcenter)* DVW (Veldwerk)* DIN (Innovatie waarnemen)* DOB (Ontwikkeling en
  beheer)DDS (Dataservices):* DMC (Microdata services)* DSC (Data service centrum
  & secure data services)De afdelingen en teams zijn overgenomen uit het [CBS-organogram](https://www.cbs.nl/-/media/_pdf/organogram-nl.pdf).
