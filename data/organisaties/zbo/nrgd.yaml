- opschrift: Besluit register deskundige in strafzaken
  referentie: http://wetten.overheid.nl/BWBR0026190/
taken_en_bevoegdheden: Het Nederlands Register Gerechtelijk Deskundigen (NRGD), bestuurd
  door het College gerechtelijk deskundigen, is verantwoordelijk voor de volgende
  taken:* het beslissen over een aanvraag tot (her)inschrijving in het NRGD, op grond
  van artikelen 12 tot en met 14 en 17 tot en met 19 van het Besluit register deskundige
  in strafzaken (Brdis);* het beslissen over een aanvraag tot (her)inschrijving in
  of over een eventuele doorhaling uit het NRGD, op grond van artikel 18 Brdis;* het
  inrichten en onderhouden van het register waarin bovenstaande beslissingen worden
  verwerkt, alsmede het geven van aanwijzingen daarover aan het Bureau NRGD;* het
  bevorderen van de opstelling van specifieke eisen per deskundigheidsgebied, ter
  verdere uitwerking van de in artikel 12, tweede lid, Brdis bedoelde eisen;* het
  vaststellen van een gedragscode die de gedragsregels bevat waaraan geregistreerde
  deskundigen zich dienen te houden;* het in overleg met de secretaris vaststellen
  van de activiteiten van het Bureau NRGD, ter ondersteuning van de werkzaamheden
  van het College gerechtelijk deskundigen.
