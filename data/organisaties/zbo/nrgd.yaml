description:
  text: Het Nederlands Register Gerechtelijk Deskundigen (NRGD)  is een register met
    gecertificeerde deskundigen die in strafzaken rapporteren.  Het College gerechtelijk
    deskundigen vormt het bestuur van het NRGD. Het College is een zelfstandig bestuursorgaan
    (zbo), ressorterend onder het ministerie van Justitie en Veiligheid.
  url: https://www.nrgd.nl/over-het-nrgd
