names:
- value: College ter Beoordeling van Geneesmiddelen
  abbr: CBG
  valid_from: '1900-01-01'
description:
  text: Als onafhankelijke autoriteit reguleert het CBG de kwaliteit, werking en veiligheid
    van een medicijn, en stimuleert het CBG het juiste gebruik door de juiste patiënt.Onze
    organisatie bestaat uit een agentschap ('het aCBG') en een zelfstandig bestuursorgaan
    ('het College'). Het agentschap is verantwoordelijk voor de voorbereiding en uitvoering
    van besluiten van het College. Het College geeft op basis van die voorbereidende
    beoordeling een onafhankelijk en deskundig oordeel.Verder is het agentschap verantwoordelijk
    voor de geneesmiddelenbewaking in Nederland en voor de ontvangst van meldingen
    van medicijntekorten. En de Nederlandse vertegenwoordigers in de comités van het
    Europees medicijnagentschap EMA werken bij het agentschap.Naast de beoordeling
    van medicijnen voor mensen beoordeelt het agentschap ook diergeneesmiddelen en
    nieuwe voedingsmiddelen. De uiteindelijke verantwoordelijkheid voor de beoordeling
    daarvan ligt bij het ministerie van LVVN (diergeneesmiddelen) en het ministerie
    van VWS (nieuwe voedingsmiddelen).
  url: https://www.cbg-meb.nl/onderdelen/over-cbg
kaderwet:
  kaderwetZbo:
    instellingsmotief: Onafhankelijkheid
    kaderwetVanToepassing: ja
