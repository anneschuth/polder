taken_en_bevoegdheden: Het College ter Beoordeling van Geneesmiddelen is verantwoordelijk
  voor het toelaten van geneesmiddelen, beslist over de afleverstatus en is in Nederland
  belast met de geneesmiddelenbewaking, een en ander overeenkomstig bij of krachtens
  Europese richtlijnen en de Geneesmiddelenwet gegeven voorschriften.
