description:
  text: Opnieuw ingesteld in 1999.Dit is een cluster van zbo’s die niet onder de werking
    van de kaderwet zelfstandige bestuursorganen valt. De onderliggende onderdelen
    van dit cluster worden daarom niet in dit register benoemd.
