- opschrift: Wet op het notarisambt, art. 1 aanhef en sub l en art. 110
  referentie: http://wetten.overheid.nl/cgi-bin/deeplink/law1/title=WET%20OP%20HET%20NOTARISAMBT
taken_en_bevoegdheden: '* De wet heeft de notaris de bevoegdheid gegeven authentieke
  akten op te maken, met name op het gebied van:- het personen- en familierecht (het
  opmaken    van huwelijkse voorwaarden, testamenten, echtscheidingsakten, verklaringen
  van erfrecht enz.);- het onroerende zaakrecht (het opmaken van akten van levering,
  hypotheekakten, akten in het kader van een openbare veiling enz.);- het rechtspersonenrecht
  (het opmaken van oprichtingsakten, statutenwijzigingen, akten van overdracht en
  uitgifte (emissie) van aandelen, akten van juridische fusie en -splitsing en dergelijke).*
  Daarnaast kunnen partijen de notaris ook vragen om andere akten voor hen in notariële
  vorm op te maken.'
