taken_en_bevoegdheden: Het CAK is belast met:* de vaststelling en de inning van de
  eigen bijdragen, bedoeld in artikel 3.2.5, van de Wet langdurige zorg;* de vaststelling
  en inning van de eigen bijdragen, bedoeld in artikel 2.1.4 van de Wet maatschappelijke
  ondersteuning 2015* het namens een WLZ-uitvoerder of het Zorginstituut, verrichten
  van betalingen aan zorgaanbieders, welke de WLZ-uitvoerders of het Zorginstituut,
  uit hoofde van de uitvoering van deze wet verschuldigd zijn* de taken met betrekking
  tot de maatregelen gericht op verzekering van onverzekerden, bedoeld in paragraaf
  2.4 van de Zorgverzekeringswet* de heffing en inning van de bestuursrechtelijke
  premie, bedoeld in artikel 18d of artikel 18e van de Zorgverzekeringswet*  de verstrekking
  van de bijdrage, bedoeld in artikel 34a van de Zorgverzekeringswet*  de taken, bedoeld
  in artikel 69 van de Zorgverzekeringswet*  de taken met betrekking tot de gemoedsbezwaarden,
  bedoeld in artikel 70 van de Zorgverzekeringswet, en - de verstrekking van de bijdragen,
  bedoeld in artikel 122a van de Zorgverzekeringswet ('Onverzekerbare vreemdelingen')
