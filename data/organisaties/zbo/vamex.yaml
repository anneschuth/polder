taken_en_bevoegdheden: '* De Stichting Vamex is aangewezen als exameninstelling voor
  de examens Klein Vaarbewijs en het examen CWO Groot Motorschip. Vamex geeft tevens
  het Klein Vaarbewijs en het Groot Pleziervaartbewijs af.* Daarnaast verzorgt het
  de organisatie van examens voor het Basiscertificaat Marifonie (voor het ministerie
  van EZ).* Vamex geeft ook veel vaarbewijzen af die door burgers vrijwillig (zonder
  verplichting door wet- en regelgeving) worden gehaald.'
