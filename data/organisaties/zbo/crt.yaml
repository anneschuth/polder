description:
  text: 'Dit zbo is onderdeel van het cluster Registratiecommissies KNMG, KNMP, KNMT,
    FGzPt en V&VN. Het betreft hier de registratiecommissie van de Federatie van Gezondheidspsychologen
    en Psychotherapeuten (FGzPt).De Commissie Registratie en Toezicht (CRT), een onafhankelijk
    orgaan binnen de FGzPt, is verantwoordelijk voor de registers van specialisten
    binnen de gezondheidszorgpsychologie op grond van de Wet op de beroepen in de
    individuele gezondheidszorg (Wet BIG). Daarnaast houdt de CRT toezicht op de vier
    psychologische beroepen van de Wet BIG: de gezondheidszorgpsycholoog, de psychotherapeut,
    de klinisch psycholoog en de klinisch neuropsycholoog. Tevens voert de CRT het
    opleidingsregister.'
  url: https://www.fgzpt.nl/de-fgzpt/commissie-registratie-en-toezicht
kaderwet:
  kaderwetZbo:
