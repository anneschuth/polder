taken_en_bevoegdheden: '* Verstrekken van subsidie, die geheel of gedeeltelijk voorziet
  in de financiële gevolgen van (onder andere) (gedeeltelijke) sluiting van zorginstellingen
  en toezicht houden op de sanering;* beslissen dat goedkeuring is vereist voor verhuur,
  vervreemding of aan enig beperkt recht onderwerpen van gebouwen of delen daarvan,
  die blijvend niet meer voor de zorginstelling zullen worden gebruikt. Hierbij beslissen
  omtrent storting boekresultaat in het Algemeen Fonds Bijzondere Ziektekosten;* verstrekken
  van subsidie bij wijziging of opheffing van de vestigingsplaats van een centrale
  post voor het ambulancevervoer, alsmede sanering van ambulancevervoer ingeval een
  vergunning is ingetrokken;* op verzoek van de Minister van Volksgezondheid, Welzijn
  en Sport bijzondere opdrachten uitvoeren.'
