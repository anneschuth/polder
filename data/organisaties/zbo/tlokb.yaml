description:
  text: 'Nederland moet kunnen vertrouwen op de kwaliteit van bouwen. Dat is waar
    de Toelatingsorganisatie Kwaliteitsborging Bouw (TloKB) elke dag mee bezig is.
    De TloKB houdt toezicht op kwaliteitsborging in de bouw, erkent kwaliteit van
    bouwproducten en registreert certificaten voor het werken aan gasverbrandingsinstallaties.Als
    publieke, onafhankelijke partij houdt de TloKB toezicht op het stelsel van bouwkwaliteit
    als geheel en handhaaft waar nodig. Dat gebeurt altijd zorgvuldig en transparant.
    Met oog voor het maatschappelijk belang van bouwkwaliteit. Want dat is waar de
    TloKB voor staat: Beter vertrouwen in kwaliteit van bouwen.'
  url: https://www.tlokb.nl/over-de-tlokb
