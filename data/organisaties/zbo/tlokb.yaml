taken_en_bevoegdheden: De Toelatingsorganisatie Kwaliteitsborging Bouw (TloKB) voert
  diverse deeltaken uit op drie hoofdgebieden. Deze hoofdgebieden zijn als volgt:*
  kwaliteitsborging;* erkende kwaliteitsverklaringen;* werkzaamheden aan gasverbrandingsinstallaties.
