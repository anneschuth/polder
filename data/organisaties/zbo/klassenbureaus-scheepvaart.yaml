- opschrift: Schepenbesluit 1965, artikel 6
  referentie: http://wetten.overheid.nl/cgi-bin/deeplink/law1/title=Schepenbesluit%201965
taken_en_bevoegdheden: Klassenbureaus in hun rol als erkende organisatie (erkend door
  de EU) worden door een vlaggenstaat aangewezen om op te treden namens deze vlaggenstaat.
  Voor Nederland gaat het om het uitvoeren van inspecties en de afgifte van de daarbij
  behorende certificaten.Zeeschepen die onder Nederlandse vlag (willen) varen, worden
  door de klassenbureaus initieel en daarna periodiek gecontroleerd om na te gaan
  of ze voldoen aan de regelgeving en of de certificaten verlengd kunnen worden.Klassenbureaus
  voeren ook certificerende werkzaamheden uit voor de International Ship & Port facility
  Security Code (ISPS code).
