description:
  text: Nuffic helpt scholen en onderwijsinstellingen in binnen- en buitenland om
    internationale educatie en samenwerking mogelijk te maken. Daarnaast is Nuffic
    in Nederland verantwoordelijk voor de werkzaamheden van het Nationaal Agentschap
    Erasmus+ Onderwijs & Training.
