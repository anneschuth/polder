      artikel: 18,19,21,22,23,39,40
      toelichting: De hierboven vermelde artikelen van de Kaderwet zelfstandige bestuursorganen
        betreffen onderwerpen waarvoor de Erasmusverordening, de Verordening Europees
        Solidariteitskorps en het Financieel Regelement van de EU al voorzieningen
        bevatten. Om die reden zijn deze bepalingen van de toepasselijkheid van de
        Kaderwet uitgesloten.
