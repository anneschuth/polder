wettelijke_grondslagen:
- opschrift: Wet voorkoming verontreiniging door schepen, Artikel 6
  referentie: http://wetten.overheid.nl/cgi-bin/deeplink/law1/title=Wet%20voorkoming%20verontreiniging%20door%20schepen
taken_en_bevoegdheden: '* De beheerder van een aangewezen haven draagt zorg voor een
  toereikende voorziening voor het in ontvangst nemen van scheepsafval en overige
  schadelijke stoffen afkomstig van schepen. Deze taak kan worden uitgevoerd door
  een zogenoemde houder van een havenontvangstvoorziening.* Daarnaast kan de havenbeheerder
  op grond van de Wet havenstaatscontrole de toegang van een schip, dat op een zogenoemde
  zwarte of grijze lijst staat, tot zijn haven weigeren.'
