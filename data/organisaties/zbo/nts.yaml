    kaderwetVanToepassing: ja
    afwijkendeBepalingKaderwet:
      artikel: '22'
      toelichting: Artikel 22 van de Kaderwet is niet van toepassing voor zover het
        besluiten betreft met betrekking tot het toewijzen van donororganen.
wettelijke_grondslagen:
- opschrift: Wet op de orgaandonatie, artikel 24
  referentie: http://wetten.overheid.nl/cgi-bin/deeplink/law1/title=Wet%20op%20de%20orgaandonatie/article=24
taken_en_bevoegdheden: De Nederlandse Transplantatie Stichting (NTS) heeft de volgende
  taken en bevoegdheden op grond van de Wet op de orgaandonatie:* het bemiddelen bij
  het verkrijgen van donororganen;* het bemiddelen bij het typeren van donororganen;*
  het bemiddelen bij het vervoeren van donororganen;* het toewijzen van donororganen
  aan een daarvoor geschikte ontvanger.
