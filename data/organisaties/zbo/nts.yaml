names:
- value: Nederlandse Transplantatie Stichting
  abbr: NTS
  valid_from: '1900-01-01'
description:
  text: De Nederlandse Transplantatie Stichting (NTS) werkt aan de verbetering van
    orgaan- en weefseldonatie en -transplantatie. Ze ondersteunt de donorziekenhuizen
    en transplantatiecentra in Nederland. Sinds de komst van de Wet op de orgaandonatie
    in 1997 heeft de NTS de taak om donatie en transplantatie in goede banen te leiden.
    Dat doet ze in opdracht van het ministerie van Volksgezondheid, Welzijn en Sport
    (VWS).
  url: https://www.transplantatiestichting.nl/over-nts/wat-doen-wij
