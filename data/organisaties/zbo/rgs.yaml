description:
  text: 'Dit zbo is onderdeel van het cluster Registratiecommissies KNMG, KNMP, KNMT,
    FGzPt en V&VN. Het betreft hier de registratiecommissie van beroepsorganisatie
    Koninklijke Nederlandsche Maatschappij tot bevordering der Geneeskunst (KNMG).De
    Registratiecommissie Geneeskundig Specialisten (RGS), een orgaan binnen de KNMG,
    toetst periodiek of geneeskundig specialisten aan de regels van het College Geneeskundige
    Specialismen voldoen. Artsen die aan deze regels voldoen, kunnen zich inschrijven
    in een specialistenregister. De RGS is op 1 januari 2013 ontstaan uit een samenvoeging
    van drie registratiecommissies: de Huisarts, Verpleeghuisarts en arts voor verstandelijk
    gehandicapten Registratie Commissie (HVRC), de Medisch Specialisten Registratie
    Commissie (MSRC) en de Sociaal-Geneeskundigen Registratie Commissie (SGRC).'
  url: https://www.knmg.nl/ik-ben-arts/rgs/rgs/over-de-rgs
