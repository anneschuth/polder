wettelijke_grondslagen:
- opschrift: Wet beroepen in de individuele gezondheidszorg,  artikel 14
  referentie: http://wetten.overheid.nl/cgi-bin/deeplink/law1/title=Wet%20op%20de%20beroepen%20in%20de%20individuele%20gezondheidszorg/article=14
taken_en_bevoegdheden: Indien een organisatie van beoefenaren van een beroep als bedoeld
  in artikel 3 van de Wet beroepen in de individuele gezondheidszorg (Wet BIG) voor
  de inschrijving van beroepsbeoefenaren, die een bijzondere deskundigheid hebben
  verworven met betrekking tot de uitoefening van een deelgebied van hun beroep, een
  specialistenregister heeft en daaraan een titel is verbonden, kan de Minister van
  Volksgezondheid, Welzijn en Sport bepalen dat die titel als wettelijk erkende specialistentitel
  wordt aangemerkt. Een aanvraag daartoe wordt gedaan door het bestuur van de organisatie;
  het bestuur kan de bevoegdheid daartoe overdragen aan een orgaan. Deze bevoegdheid
  kan worden overgedragen aan het orgaan (college) zoals bedoeld in artikel 14, tweede
  lid, sub d van de Wet BIG.De Registratiecommissie Geneeskundig Specialisten (RGS)
  is als orgaan binnen de Koninklijke Nederlandsche Maatschappij tot bevordering der
  Geneeskunst (KNMG) verantwoordelijk voor diverse taken met betrekking tot de registers
  van geneeskundig specialisten. Deze taken zijn:* het inschrijven van geneeskundig
  specialisten in een specialistenregister;* het periodiek hernieuwen van bovenvermelde
  inschrijvingen;* het doorhalen van bovenvermelde inschrijvingen.
