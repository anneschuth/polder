description:
  text: De Vereniging Directeuren Publieksdiensten (VDP) zet zich in voor passende
    gemeentelijke dienstverlening. Dat zijn alle acties die een gemeente kan, mag
    en wil doen om een individuele inwoner, ondernemer of bezoeker van dienst te zijn
    en te laten meedoen aan de samenleving. Door samenwerking, kennisdeling en innovatie
    kun je de dienstverlening op veel manieren verbeteren en vernieuwen. De VDP is
    een strategische partner in het totale veld van overheidsdienstverlening.
  url: https://www.publieksdiensten.nl/over-de-vdp/
