names:
- value: Koninklijke Beroepsorganisatie van Gerechtsdeurwaarders
  abbr: KBvG
  valid_from: '1900-01-01'
description:
  text: De Koninklijke Beroepsorganisatie van Gerechtsdeurwaarders (KBvG) is een publiekrechtelijke
    beroepsorganisatie (pbo), ingesteld bij Gerechtsdeurwaarderswet. Alle in Nederland
    gevestigde (waarnemend, toegevoegd en kandidaat-) gerechtsdeurwaarders zijn lid
    van de KBvG. De taak van de beroepsorganisatie is de bevordering van de vakbekwaamheid
    en een goede beroepsuitoefening van de leden.
  url: https://www.kbvg.nl/over-de-kbvg/organisatie
