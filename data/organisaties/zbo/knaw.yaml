description:
  text: De Koninklijke Nederlandse Akademie van Wetenschappen (KNAW) is een genootschap
    van vooraanstaande wetenschappers uit allerlei vakgebieden en fungeert als bestuurder
    van diverse wetenschappelijke onderzoeksinstituten. Daarnaast voorziet de KNAW
    de regering van advies over wetenschapsbeoefening.
