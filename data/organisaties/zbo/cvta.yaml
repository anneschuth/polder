taken_en_bevoegdheden: De belangrijkste taak van het College van Toezicht Auteursrechten
  (CVtA) is het uitoefenen van toezicht op collectieve beheersorganisaties. Deze organisaties
  zijn door de minister van Justitie en Veiligheid aangewezen om vergoedingen op gezag
  van Auteurswet of de Wet op de Naburige Rechten te innen en te verdelen.
