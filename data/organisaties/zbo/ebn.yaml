description:
  text: Het departement Economie, bedrijven en nationale rekeningen (EBN) is een organisatieonderdeel
    van het Centraal Bureau voor de Statistiek (CBS).
taken_en_bevoegdheden: Het departement Economie, bedrijven en nationale rekeningen
  (EBN) van het CBS bestaat uit onderstaande afdelingen, die elk zijn onderverdeeld
  in een aantal teams:EBM (Beleids- en managementsondersteuning):* EBS (Beleidsstaf)*
  EIO (Innovatie en onderzoek)* EIT (Informatiemanagement en toolexpertise)EOC (Overheidsfinanciën
  en consumentenprijzen):* ODO (Decentrale overheden)* OCO (Centrale overheden)* OIO
  (Integratie overheidsfinanciën)* CPI (Consumentenprijzen)ENR (Nationale rekeningen):*
  SR (Sectorrekeningen)* AGT (Aanbod- en gebruiktabellen)* AMR (Arbeid, milieurekeningen
  en regio)* PCO (Publicatie, coördinatie en onderzoek)EBD (Bedrijfsstatistieken):*
  IEB (Industrie, energie en bouw)* PG (Producentenprijzen en goederenproductie* CD
  (Commerciële dienstverlening)* HT (Handel en transport)* BC (Bedrijvenconjunctuur
  en coördinatie)EBH (Bedrijfsstatistieken):* GO (Grote ondernemingen)* EHV (Internationale
  handel verwerking)* EHO (Internationale handel output)* ESP (Statistiekproductie
  bedrijfseconomische statistieken)* KIO (Informatieontwikkeling en output)ERB (Registers
  bedrijven):* ERK (Registers en koppelingen)* EPT (Profilen en typeren ondernemingen)De
  afdelingen en teams zijn overgenomen uit het [CBS-organogram](https://www.cbs.nl/-/media/_pdf/organogram-nl.pdf).
