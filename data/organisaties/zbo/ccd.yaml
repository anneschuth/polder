description:
  text: De CCD is een Commissie die bestaat uit externe leden. Zij worden ondersteund
    door een secretariaat, het zogeheten ondersteunend bureau dierproeven en alternatieven
    (OBDA). De medewerkers zijn door de minister van LVVN beschikbaar gesteld en hebben
    een dienstverband bij de Rijksdienst voor Ondernemend Nederland (RVO).
