names:
- value: Huis voor Klokkenluiders
  valid_from: '1900-01-01'
description:
  text: Het Huis voor Klokkenluiders adviseert werknemers die bij maatschappelijke
    misstanden als 'klokkenluider' aan de bel trekken. Daarnaast doet het Huis onderzoek
    naar misstanden of naar de behandeling van een klokkenluider, die geen last mag
    hebben van zijn of haar melding van een misstand. Ook stimuleert het Huis overheden,
    semipublieke instellingen en bedrijven om hun integriteit te bewaken.
  url: https://www.huisvoorklokkenluiders.nl/organisatie
kaderwet:
  kaderwetZbo:
    instellingsmotief: Onafhankelijkheid
    kaderwetVanToepassing: ja
    afwijkendeBepalingKaderwet:
      artikel: 12,20,21,22,23
      toelichting: Van artikelen 12, 21 en 22 van de Kaderwet zelfstandige bestuursorganen
        wordt afgeweken in overeenstemming met artikel 3, tweede lid, van de Wet bescherming
        klokkenluiders. In afwijking van artikel 20 van de Kaderwet is het Huis slechts
        verplicht om aan de Minister van Binnenlandse Zaken en Koninkrijksrelaties
        inlichtingen te verstrekken of inzage te geven in zakelijke gegevens en bescheiden
        met betrekking tot het gevoerde financiële beheer en de administratieve organisatie.
        Artikel 23 van de Kaderwet is slechts van toepassing ten aanzien van het financiële
        beheer en de administratieve organisatie van het Huis.
wettelijke_grondslagen:
- opschrift: Wet bescherming klokkenluiders, artikel 3
  referentie: https://wetten.overheid.nl/BWBR0037852/2023-02-18#Hoofdstuk2_Paragraaf1_Artikel3
taken_en_bevoegdheden: De belangrijkste taak van het Huis voor Klokkenluiders is het
  ondersteunen van personen in Nederland die (een redelijk vermoeden van) een werkgerelateerde
  misstand willen melden. Het Huis draagt bij aan een betere bescherming van melders,
  degene die een melder bijstaat en de betrokken derde partij. Dit doet het Huis onder
  meer door:* het geven van advies;* het doen van onderzoek;* het stimuleren van organisaties
  om hun eigen integriteit te bewaken.
