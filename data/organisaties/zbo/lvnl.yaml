wettelijke_grondslagen:
- opschrift: Wet Luchtvaart, artikel 5.22
  referentie: http://wetten.overheid.nl/cgi-bin/deeplink/law1/title=Wet%20luchtvaart/article=5.22
taken_en_bevoegdheden: '* Het veilig en efficient afhandelen van het luchtverkeer
  op en rond de luchthavens Amsterdam Airport Schiphol, Rotterdam Airport, Groningen
  Airport Eelde en Maastricht Aachen Airport en boven Nederland tot 24.500 voet;*
  het vernieuwen en beheren van technische systemen;* het verstrekken van luchtvaartinlichtingen;*
  het verzorgen van opleidingen voor luchtverkeersleiding;* het verzorgen van luchtvaartkaarten
  en publicaties.'
