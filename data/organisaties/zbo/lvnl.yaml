names:
- value: Luchtverkeersleiding Nederland
  abbr: LVNL
  valid_from: '1900-01-01'
description:
  text: LVNL is verantwoordelijk voor het beheer van het burgerluchtruim en alles
    wat daarbij komt kijken. We doen dat sinds 1923 en sinds 1993 als Zelfstandig
    Bestuursorgaan (ZBO).In de Wet luchtvaart zijn de wettelijke taken van LVNL vastgelegd.
    Daaronder vallen:- Het verlenen van luchtverkeersdiensten binnen het vluchtinformatiegebied
    Amsterdam.- Het verlenen van communicatie-, navigatie- en plaatsbepalingsdiensten.-
    Het verlenen van luchtvaartinlichtingendiensten en het uitgeven van luchtvaartpublicaties
    en -kaarten.- Het verzorgen of laten verzorgen van opleidingen voor luchtverkeersbeveiliging
    en het verlenen van luchtvaartnavigatiediensten.- Het adviseren van de minister
    van Infrastructuur en Waterstaat en de minister van Defensie over aangelegenheden
    op het gebied van de luchtverkeersbeveiliging en het verlenen van luchtvaartnavigatiediensten.-
    Het verrichten van andere bij of krachtens de Wet luchtvaart opgedragen taken.
  url: https://www.lvnl.nl/organisatie
kaderwet:
