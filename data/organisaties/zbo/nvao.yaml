  abbr: NVAO
  valid_from: '1900-01-01'
description:
  text: De Nederlands-Vlaamse Accreditatieorganisatie (NVAO) is verantwoordelijk voor
    het accrediteren van bestaande en nieuwe opleidingen binnen het hoger onderwijs
    in Nederland en Vlaanderen. Ook beoordeelt de NVAO de kwaliteitszorg van instellingen
    in het hoger onderwijs in Nederland en Vlaanderen, zodat de kwaliteit hiervan
    op deskundige en onafhankelijke wijze wordt geborgd.
  url: https://www.nvao.net/nl/over-ons
