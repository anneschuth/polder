  referentie: http://wetten.overheid.nl/cgi-bin/deeplink/law1/title=whw/article=5a.2
taken_en_bevoegdheden: De hoofdtaken van de Nederlands-Vlaamse Accreditatieorganisatie
  (NVAO) zijn:* het beoordelen en het borgen van het niveau en de kwaliteit van het
  hoger onderwijs in Nederland en Vlaanderen;* het bevorderen van de kwaliteitscultuur
  binnen het hoger onderwijs.De NVAO vervult deze taken in internationaal perspectief
  en in de context van het Europese Bolognaproces.
