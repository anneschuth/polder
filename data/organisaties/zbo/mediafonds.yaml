taken_en_bevoegdheden: Verstrekken van financiële bijdragen ten behoeve van de ontwikkeling
  en vervaardiging van programmaonderdelen die van bijzondere Nederlandse culturele
  aard zijn en die worden verzorgd door omroepverenigingen, de Nederlandse Programma
  Stichting, de educatieve omroepinstelling, dan wel kerkgenootschappen of genootschappen
  op geestelijke grondslag die zendtijd hebben verkregen voor landelijke omroep, de
  instellingen die zendtijd hebben verkregen voor regionale omroep, alsmede de Wereldomroep,
  dan wel door twee of meer van hen gezamenlijk.
