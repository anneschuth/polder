  abbr: COKZ
  valid_from: '1900-01-01'
description:
  text: De Stichting Controle Orgaan Kwaliteits Zaken (COKZ) is de Nederlandse toezichthouder
    op het gebied van zuivel, pluimvee en eieren. Bij het houden van dit toezicht
    voert het COKZ Nederlandse en Europese regelgeving uit. Het COKZ is de opvolger
    van het Centraal Orgaan Zuivelcontrole (COZ) en het Centraal Orgaan Melkhygiëne
    (COM). Ook zijn de taken van het Controlebureau voor Pluimvee, Eieren en Eiproducten
    (CPE) per 1 juli 2012 ondergebracht bij het COKZ.
  url: https://cokz.nl/over-ons/
