taken_en_bevoegdheden: Het Controle Orgaan Kwaliteits Zaken (COKZ) heeft onder meer
  de volgende taken:* het houden van toezicht op de naleving van proces- en productkwaliteitscriteria
  in de zuivel- en eierensector;* het waarborgen van de veiligheid en kwaliteit van
  in Nederland geproduceerde melk, zuivelproducten, eieren en eiproducten;* het bijhouden
  van een register van erkende bedrijven (waarop het COKZ toezicht houdt) en dit ter
  beschikking stellen aan de Nederlandse Voedsel- en Warenautoriteit (NVWA).
