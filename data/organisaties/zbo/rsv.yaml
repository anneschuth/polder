names:
- value: Registratiecommissie Specialismen Verpleegkunde
  abbr: RSV
  valid_from: '1900-01-01'
description:
  text: Dit zbo is onderdeel van het cluster Registratiecommissies KNMG, KNMP, KNMT,
    FGzPt en V&VN. Het betreft hier de registratiecommissie van beroepsorganisatie
    Verpleegkundigen en Verzorgenden Nederland (V&VN).De Registratiecommissie Specialismen
    Verpleegkunde (RSV), een onafhankelijk orgaan binnen V&VN, is verantwoordelijk
    voor de registratie en herregistratie van verpleegkundig specialisten, op basis
    van artikel 14 van de Wet op de beroepen in de individuele gezondheidszorg (Wet
    BIG). Het aanwijzen van de specialismen binnen de verpleegkunde, het instellen
    van registers en het opstellen van de algemene regelgeving hieromtrent wordt gedaan
    door het College Specialismen Verpleegkunde (CSV). De RSV exploiteert de registers
    en vertaalt de regelgeving van het CSV naar een praktische uitvoering.
  url: https://www.venvn.nl/registers/verpleegkundig-specialisten-register/het-register/
