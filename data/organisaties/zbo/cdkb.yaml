taken_en_bevoegdheden: Het College donorgegevens kunstmatige bevruchting (Cdkb) is
  verantwoordelijk voor het uitvoeren van de de Wet donorgegevens kunstmatige bevruchting
  (Wdkb). Daarom voert het Cdkb de volgende taken uit:* het bewaren en beheren van
  donorgegevens. De gegevens worden opgeslagen in een centrale database en minstens
  tachtig jaar bewaard;* het op verzoek verstrekken van donorgegevens aan het kind,
  de ouders en de huisarts van het donorkind;* het zorgen voor deskundige begeleiding
  bij het verstrekken van de gegevens (in samenwerking met Fiom);* het verstrekken
  van ouderschapsverklaringen voor het duomoederschap;* het geven van voorlichting
  over de Wdkb.
