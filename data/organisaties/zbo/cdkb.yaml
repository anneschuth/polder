names:
- value: College donorgegevens kunstmatige bevruchting
  abbr: Cdkb
  valid_from: '1900-01-01'
description:
  text: Het College donorgegevens kunstmatige bevruchting (Cdkb) zorgt voor de uitvoering
    van de Wet donorgegevens kunstmatige bevruchting. Sinds 2004 worden de gegevens
    van sperma-, eicel- en embryodonoren landelijk geregistreerd. Het Cdkb is verantwoordelijk
    voor het beheer van deze gegevens en verstrekt deze op verzoek aan het donorkind,
    de ouders of de huisarts.Het bestuur van het Cdkb heeft een aantal uitvoeringstaken
    overgedragen aan het Centraal Informatiepunt Beroepen Gezondheidszorg (CIBG),
    waaronder de registratie van de donorgegevens, het secretariaat van het Cdkb en
    de informatieverstrekking. Het Cdkb is en blijft echter verantwoordelijk voor
    de gegevens en beslist over ontvangen verzoeken om donorgegevens. Het CIBG is
    een agentschap van het Ministerie van Volksgezondheid, Welzijn en Sport (VWS).
  url: https://www.donorgegevens.nl/over-donorgegevens
