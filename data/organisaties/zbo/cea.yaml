names:
- value: Commissie Eindtermen Accountantsopleiding
  abbr: CEA
  valid_from: '1900-01-01'
description:
  text: De Commissie Eindtermen Accountantsopleiding (CEA) is een zelfstandig bestuursorgaan
    zonder rechtspersoonlijkheid en stelt de eindtermen vast voor de accountantsopleiding,
    en houdt hier toezicht op. De grondslag voor CEA is terug te vinden in de artikelen
    49 tot en met 53 van de Wet op het Accountantsberoep (Wab).De commissie bestaat
    uit zeven leden. De Minister van Financiën benoemt zowel de voorzitter als de
    andere leden op persoonlijke titel en voor een periode van vijf jaar.  Het werk
    van de commissie wordt ondersteund door de medewerkers van haar bureau.
  url: https://www.cea.nl/over-cea/
kaderwet:
  kaderwetZbo:
    instellingsmotief: Onafhankelijkheid
    kaderwetVanToepassing: ja
wettelijke_grondslagen:
- opschrift: Wet op het accountantsberoep, artikel 49
  referentie: http://wetten.overheid.nl/BWBR0032573/
taken_en_bevoegdheden: De CEA heeft de volgende taken en bevoegdheden:* het vaststellen
  van de eindtermen voor de opleidingen tot AA en RA;* het aanwijzen van opleidingen
  die geheel of gedeeltelijk voldoen aan de eindtermen, met uitzondering van de eindtermen
  die betrekking hebben op de praktijkstage;* het toetsen van de praktijkstage aan
  de mate waarin wordt voldaan aan de eindtermen;* het afgeven van verklaringen van
  vakbekwaamheid aan buitenlandse accountants.
