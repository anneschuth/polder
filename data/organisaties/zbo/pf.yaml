names:
- value: Stichting Participatiefonds voor het Onderwijs
  abbr: Pf
  valid_from: '1900-01-01'
description:
  text: Vervangingsfonds en Participatiefonds (VfPf) zijn twee zelfstandig bestuursorganen
    die nauw met elkaar verweven zijn. We werken vanuit wettelijke taken die omschreven
    staan in de Wet op het primair onderwijs. VfPf is de expert op het gebied van
    HRM die scholen adviseert en ondersteunt in hun ambities en ontwikkeling tot toekomstbestendige
    en professionele organisaties.Het beste onderwijs voor kinderen komt tot stand
    in goed functionerende schoolorganisaties waar iedereen met plezier aan het werk
    is en blijft. VfPf adviseert en ondersteunt schoolbesturen in het versterken van
    hun verantwoordelijkheid om werknemers duurzaam inzetbaar te houden binnen de
    sector. Zodat verzuim en werkloosheid zo laag mogelijk zijn. Dit doen we met onze
    expertise en ervaring van binnen én buiten het onderwijsveld. We geloven in duurzame
    oplossingen en bieden altijd maatwerk, afgestemd op regionale behoeftes. Waar
    nodig vangt VfPf de financiële gevolgen van verzuim en werkloosheid op en begeleidt
    uitkeringsgerechtigden snel naar een passende nieuwe baan. VfPf is van en voor
    het primair onderwijs en werkt zonder winstoogmerk. Samen met schoolbesturen werken
    we aan een aantrekkelijke en vitale sector.
  url: https://www.vfpf.nl/over-vfpf
