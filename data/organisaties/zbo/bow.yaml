- opschrift: Uitspraak 202100290/1/A2 van de Raad van State
  referentie: https://www.raadvanstate.nl/uitspraken/@130166/202100290-1-a2/
taken_en_bevoegdheden: Blik op Werk verleent een kwaliteitskeurmerk aan organisaties
  die met hun dienstverlening duurzame arbeidsparticipatie en inburgering bevorderen.
  De kwaliteit van diensten die door keurmerkhouders worden verleend, is onafhankelijk
  gecontroleerd. Tevens ondersteunt Blik op Werk keurmerkhouders bij het transparant,
  zichtbaar en vindbaar maken van hun dienstverlening in het Blik op Werk Kwaliteitsregister.
