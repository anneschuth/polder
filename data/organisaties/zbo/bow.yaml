  valid_from: '1900-01-01'
description:
  text: De Stichting Blik op Werk is opgericht als onafhankelijk kwaliteitsinstituut
    en door de Regeling inburgering 2021 aangewezen als de organisatie die het Keurmerk
    Inburgeren toekent en beheert.
  url: https://www.blikopwerk.nl/over-ons/
