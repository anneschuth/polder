- value: RDW
  valid_from: '1900-01-01'
description:
  text: De RDW (voorheen de Rijksdienst voor het Wegverkeer) is een publieke dienstverlener
    in de mobiliteitsketen. Als zelfstandig bestuursorgaan voert de RDW een aantal
    wettelijke en opgedragen taken uit op het gebied van toelating van voertuigen
    en onderdelen daarvan, toezicht, handhaving, registratie, informatieverstrekking
    en documentafgifte. Deze taken worden door de RDW in nauwe samenwerking met diverse
    partners in de mobiliteitsketen uitgevoerd.
  url: https://www.rdw.nl/over-rdw/organisatie/organisatiestructuur
kaderwet:
  kaderwetZbo:
    instellingsmotief: Regelgebonden uitvoering
    kaderwetVanToepassing: ja
    afwijkendeBepalingKaderwet:
      artikel: '15'
      toelichting: Het afwijken van artikel 15 van de Kaderwet is expliciet vastgelegd
        in de Wegenverkeerswet 1994, artikel 4a, tweede lid.
wettelijke_grondslagen:
- opschrift: Wegenverkeerswet 1994, artikel 4a
  referentie: http://wetten.overheid.nl/cgi-bin/deeplink/law1/title=Wegenverkeerswet%201994/article=4a
taken_en_bevoegdheden: 'De RDW heeft vier belangrijke opdrachten van de Nederlandse
  overheid:* toelating: voertuigen en voertuigonderdelen toelaten op de Nederlandse
  en Europese markt;* toezicht en controle: toezicht houden op door de RDW erkende
  bedrijven en controle uitoefenen op de technische staat van voertuigen;* registratie
  en informatieverstrekking: verzamelen, opslaan, bewerken en beheren van gegevens
  over voertuigen, hun eigenaren en voertuigdocumenten en het verstrekken van informatie
  aan belanghebbenden over deze gegevens;* documentafgifte: documenten afgeven die
  nodig zijn voor voertuigen of eigenaren, zoals kentekenbewijzen, rijbewijzen en
  het APK-formulier.'
