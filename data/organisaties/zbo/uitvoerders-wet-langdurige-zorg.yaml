description:
  text: Dit is een cluster van zelfstandige bestuursorganen waarop de Kaderwet zelfstandige
    bestuursorganen niet van toepassing is. Het betreft zorgverzekeraars die door
    de Nederlandse Zorgautoriteit zijn toegelaten als uitvoerders van de Wet langdurige
    zorg (Wlz), waarvan sommigen tevens fungeren als een zorgkantoor.
