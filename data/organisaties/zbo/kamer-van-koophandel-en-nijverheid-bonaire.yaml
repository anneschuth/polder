description:
  text: "De Kamers van Koophandel en Nijverheid (KvK’s) in Caribisch Nederland zijn\
    \ er voor ondernemers die op de eilanden van Caribisch Nederland zijn gevestigd\
    \ en voor ondernemers die zich er willen vestigen. Er is één KvK ingesteld voor\
    \ Bonaire en één voor Sint Eustatius en Saba samen, met op beide eilanden een\
    \ publiekskantoor.De KvK’s dragen bij aan het ondernemerschapsbeleid door te informeren\
    \ en te ondersteunen op het gebied van ondernemen. Zij bevorderen de economische\
    \ belangen van handel, industrie, ambacht en dienstverlening, en vormen daarmee\
    \ een schakel tussen ondernemer en overheid. De KvK's zijn zo een belangrijke\
    \ partner bij het uitvoeren van overheidsbeleid voor ondernemingen.De KvK's hebben\
    \ een aantal belangrijke wettelijke taken, te weten:•\tHet bijhouden van het handelsregister,\
    \ met daarin alle bedrijven, verenigingen en stichtingen•\tHet geven van voorlichting\
    \ aan (startende) ondernemers, bijvoorbeeld over het starten van een bedrijf en\
    \ over beschikbare ondersteuning•\tHet adviseren van het Bestuurscollege over\
    \ te verlenen vestigingsvergunningen•\tHet geven van adviezen aan de Bestuurscolleges.\
    \ Zo geven de KvK's bijvoorbeeld, in overleg met bestaande ondernemers, commentaar\
    \ op overheidsplannen.Andere diensten die de Kamers van Koophandel en Nijverheid\
    \ aan ondernemers leveren zijn onder meer:•\tInformatie verstrekken over subsidiemogelijkheden•\t\
    Voorlichting geven over het vestigen van een bedrijf•\tOrganiseren van cursussen\
    \ en trainingen voor het bedrijfsleven."
