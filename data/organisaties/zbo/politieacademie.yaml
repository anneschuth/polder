taken_en_bevoegdheden: '* Het ondersteunen van de landelijke werving en het uitvoeren
  van de selectie;* het verzorgen van initieel en post-initieel politieonderwijs (inclusief
  examinering);* het overdragen van kennis aan de Nederlandse politie en het bijdragen
  aan de ontwikkeling van de uitoefening van de politietaak, onder meer door het verrichten
  van onderzoek;* het ontwikkelen en verzorgen van andere opleidingen dan het initieel
  of post-initieel onderwijs;* Verder kan de Politieacademie marktactiviteiten uitvoeren
  (zie artikel 3 lid 2 van de Wet op het LSOP), mits die werkzaamheden samenhangen
  met bovengenoemde taken, niet leiden tot concurrentievervalsing ten opzichte van
  private aanbieders van vergelijkbare diensten en tegen ten minste kostendekkende
  prijzen worden verricht.'
