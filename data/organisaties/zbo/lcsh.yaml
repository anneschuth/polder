names:
- value: Landelijke commissie sociale hygiëne
  abbr: Lcsh
  valid_from: '1900-01-01'
description:
  text: De Landelijke commissie sociale hygiëne (Lcsh) voert het Register Sociale
    Hygiëne. In dit register moet elke onderneming die een alcoholvergunning wenst
    aan te vragen een leidinggevende hebben geregistreerd. Daarnaast is de Lcsh ook
    verantwoordelijk voor het erkennen van diploma’s Sociale Hygiëne.
  url: https://www.registersocialehygiene.nl/over-het-register/landelijke-commissie-sociale-hygiene
kaderwet:
  kaderwetZbo:
    instellingsmotief: Onafhankelijkheid,Regelgebonden uitvoering
    kaderwetVanToepassing: ja
wettelijke_grondslagen:
- opschrift: Alcoholwet, artikel 11a, lid 1
  referentie: https://wetten.overheid.nl/BWBR0002458/2024-04-01#Paragraaf2a_Artikel11a
taken_en_bevoegdheden: De taken van de Landelijke commissie sociale hygiëne (Lcsh)
  zijn:* het voeren van het Register Sociale Hygiëne;* het registreren van personen
  in het Register;* het raadpleegbaar maken van het Register;* het herbevestigen van
  registraties uit het oude Register (vóór 1 juli 2023 werd dit gevoerd door de Landelijke
  Examencommissie van de Stichting Vakbekwaamheid Horeca);* het erkennen van diploma’s
  Sociale Hygiëne.
