taken_en_bevoegdheden: Afgifte van een certificaat van onderzoek voor schepen in de
  Rijnvaart. Daarbij wordt beoordeeld of een vaartuig voldoet aan de richtlijnen en
  geen gevaar oplevert voor de veiligheid voor een zich aan boord bevindend persoon,
  of de scheepvaart.Het betreft feitelijk uitsluitend de Commissie van Deskundigen
  (van het reglement onderzoek schepen op de Rijn).
