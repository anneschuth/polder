names:
- value: Centraal Orgaan opvang asielzoekers
  abbr: COA
  valid_from: '1900-01-01'
description:
  text: COA staat voor Centraal Orgaan opvang asielzoekers. Het COA is een zelfstandig
    bestuursorgaan.Tot de invoering van de Regeling Opvang Asielzoekers (1987) was
    er in Nederland geen officiële asielopvang. Vanaf 1992 werd de verzelfstandiging
    van de asielopvang verder uitgewerkt tot de Wet Centraal Orgaan opvang asielzoekers.Die
    wet is vanaf 1 juli 1994 van kracht.Wij zijn sinds 1994 verantwoordelijk voor
    de opvang en begeleiding van asielzoekers in Nederland.Verder is het bestuur hetgene
    die verantwoordelijk is voor de uitvoering van de taken zoals beschreven in de
    Wet COA. De bevoegdheden van het bestuur zijn  ook uitgewerkt in de Bevoegdhedenregeling
    COA.
  url: https://www.coa.nl/nl/het-coa
