  referentie: http://wetten.overheid.nl/cgi-bin/deeplink/law1/title=WET%20CENTRAAL%20ORGAAN%20OPVANG%20ASIELZOEKERS
taken_en_bevoegdheden: Het op een bedrijfsmatige wijze organiseren van een humaan
  en sober eerste verblijf voor wisselende aantallen asielzoekers die naar Nederland
  komen, op een zodanige wijze dat hun komst en eerste verblijf hanteerbaar zijn voor
  overheid en samenleving.
