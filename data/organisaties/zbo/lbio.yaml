  referentie: https://wetten.overheid.nl/BWBR0007292/2021-07-01#Hoofdstuk1_Artikel2
taken_en_bevoegdheden: Het Landelijk Bureau Inning Onderhoudsbijdragen (LBIO) heeft
  de volgende taken en bevoegdheden:* het op verzoek innen van onderhoudsbijdragen
  voor minderjarigen en meerderjarigen die de leeftijd van 21 jaar nog niet hebben
  bereikt;* het uitvoeren van internationale verdragstaken met betrekking tot onderhoudsbijdragen.
