description:
  text: Het Landelijk Bureau Inning Onderhoudsbijdragen (LBIO) voert incasso-taken
    uit op het gebied van alimentatie. Alimentatiegerechtigden kunnen het LBIO inschakelen
    om openstaande alimentatie te incasseren.
  url: https://lbio.nl/over/
