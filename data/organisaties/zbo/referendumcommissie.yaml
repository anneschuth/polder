taken_en_bevoegdheden: '* De referendumcommissie verstrekt informatie aan de kiezer
  over een aan een referendum onderworpen wet.* Daarnaast verstrekt de referendumcommissie
  subsidies ten behoeve van maatschappelijke initiatieven die zich ten doel stellen
  het publieke debat in Nederland over de aan het referendum onderworpen wet te bevorderen.*
  De referendumcommissie stelt ter uitvoering van de taak, genoemd het tweede lid,
  een regeling vast. In deze regeling wordt in ieder geval een subsidieplafond vastgesteld.
  Het subsidieplafond bedraagt ten hoogste € 2 miljoen per referendum.'
