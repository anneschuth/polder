description:
  text: De Vereniging van Nederlandse Gemeenten (VNG) is de organisatie die alle gemeenten
    in Nederland en de overzeese gebieden verbindt. De vereniging heeft als doel om
    de lokale overheid te versterken, zodat gemeenten hun inwoners optimaal kunnen
    bedienen.Dat doen we door agendasettend te zijn op voor gemeenten relevante vraagstukken
    en ontwikkelingen, en door de lokale uitvoering centraal te stellen bij maatschappelijke
    opgaven.De VNG vervult een platformfunctie voor haar leden. De drie pijlers kennisdeling,
    belangenbehartiging en dienstverlening vormen de basis van de vereniging.
