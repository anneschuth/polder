names:
- value: Dienst voor het kadaster en de openbare registers
  valid_from: '1900-01-01'
description:
  text: Het Kadaster houdt bij wie in Nederland welke vastgoedrechten heeft, voor
    zowel grond als gebouwen. Dit vloeit voort uit de wettelijke taak om de openbare
    registers van de Basisregistratie Kadaster en de Basisregistratie Topografie te
    (onder)houden. Het Kadaster registreert niet alleen gegevens van woningen, schepen,
    luchtvaartuigen, percelen en wegen, maar ook van ondergrondse kabel- en leidingnetwerken.
  url: https://www.kadaster.nl/over-ons/het-kadaster
kaderwet:
  kaderwetZbo:
    instellingsmotief: Regelgebonden uitvoering
    kaderwetVanToepassing: ja
    afwijkendeBepalingKaderwet:
      artikel: '15'
      toelichting: Artikel 15 van de Kaderwet zelfstandige bestuursorganen is niet
        van toepassing omdat medewerkers van het Kadaster een eigen CAO-regeling hebben.
wettelijke_grondslagen:
- opschrift: Organisatiewet Kadaster, artikel 2
  referentie: http://wetten.overheid.nl/cgi-bin/deeplink/law1/title=Organisatiewet%20Kadaster/article=2
taken_en_bevoegdheden: Het Kadaster heeft de volgende taken en bevoegdheden:* het
  registreren van vastgoed;* het vervaardigen, verzamelen, houden en bijwerken van
  geografische gegevens en het landsdekkend cartografisch weergeven daarvan (op grond
  van artikel 3 van de Kadasterwet);* het bevorderen van de rechtszekerheid bij het
  maatschappelijk verkeer in vastgoed, inclusief schepen en luchtvaartuigen, door
  het inwinnen, accepteren, muteren, beheren en verstrekken van informatie over vastgoed;*
  het in stand houden van een net van zogenaamde coördinaatpunten (de Rijksdriehoeksmeting);*
  meewerken aan het landinrichtingsproces.
