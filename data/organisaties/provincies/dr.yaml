description:
  text: De provincie Drenthe heeft een wisselende personele omvang. Er zijn zo’n tussen
    de 700 en 800 mensen in dienst. Een groot deel hiervan is in vaste dienst en een
    klein deel is in tijdelijke dienst. De provinciale ambtenaren werken binnen en
    buiten het provinciehuis.
  url: https://www.provincie.drenthe.nl/organisatie-bestuur/organisatie/
