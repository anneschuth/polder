description:
  text: Provinciale Staten, Gedeputeerde Staten en de commissaris van de Koning vormen
    samen het bestuur van provincie Flevoland. De ambtelijke organisatie ondersteunt
    de bestuurders op allerlei manieren. De organisatie van provincie Flevoland bestaat
    uit ongeveer 450 medewerkers. Aan het hoofd staat de directie. Zij zijn de schakel
    tussen het bestuur en de ambtelijke organisatie.Naast het droogmaken, ontginnen
    en inrichten van het nieuwe land in de voormalige Zuiderzee, moest de polder natuurlijk
    ook bestuurd worden. Via tijdelijke besturen en bestuurlijke herindelingen verliep
    de ontwikkeling van de polders voorspoedig. Een zelfstandig voortbestaan onder
    leiding van een provinciaal bestuur was een logische volgende stap. Op 1 januari
    1986 is de instelling van provincie Flevoland een feit en daarmee ook een historische
    gebeurtenis in de bestuurlijke geschiedenis van Nederland. Historisch, omdat er
    niet iedere dag een nieuwe provincie bijkomt. Daarbij was dit de kroon op de inpoldering
    van de voormalige Zuiderzee.
  url: https://www.flevoland.nl/wie-zijn-we/over-flevoland
