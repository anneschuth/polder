description:
  text: 'De organisatie van provincie Utrecht bestaat uit:Het bestuur: dat zijn Provinciale
    Staten en Gedeputeerde Staten samen.De ambtelijke organisatie: dat zijn de ambtenaren
    die voor de provincie werken.De directie: de provinciesecretaris/algemeen directeur
    en de directeuren. Samen zorgen zij voor de verbinding tussen het bestuur en de
    ambtelijke organisatie.'
