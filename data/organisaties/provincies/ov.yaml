description:
  text: Missie van de provincie Overijssel:De provincie Overijssel is een middenbestuur
    dat vernieuwt, inspireert en initiatief neemt. Dat met respect voor traditie vooruit
    kijkt en investeert in grote, vernieuwende projecten op regionale schaal.Zonodig
    als regisseur, smeden we coalities met tal van partners om resultaten te boeken
    voor de inwoners van Overijssel. Ons doel is dat iedereen hier gezond en plezierig
    kan wonen, werken en recreëren. In een omgeving met balans tussen rust, ruimte
    én dynamiek.We laten zien dat de provincie er toe doet. Dat we het verschil durven
    maken. We pakken door, maken keuzes en nemen risico’s. Dit alles met oog voor
    de verschillen die er zijn, die Overijssel juist aantrekkelijk en veelzijdig maken.https://www.overijssel.nl/over-overijssel/informatie-over-overijssel
