description:
  text: Ons doel is een gezond, veilig, schoon en welvarend Gelderland. We leggen
    de focus op een duurzaam, verbonden en een economisch krachtig Gelderland. Daar
    investeren wij in. Daar willen en kunnen we van meerwaarde zijn.Hoe doen we dat?Door
    7 met elkaar samenhangende ambities na te streven waar wij het verschil kunnen
    maken voor een schoon, gezond, veilig en welvarend Gelderland. Deze ambities vindt
    u hieronder.
  url: https://www.gelderland.nl/themas/organisatie/over-de-provincie
