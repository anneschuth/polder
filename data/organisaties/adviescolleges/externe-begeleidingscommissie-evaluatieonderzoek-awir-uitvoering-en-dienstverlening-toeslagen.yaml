description:
  text: Het Evaluatieonderzoek Algemene wet inkomensafhankelijke regelingen (Awir),
    uitvoering en dienstverlening toeslagen wordt uitgevoerd in opdracht van het ministerie
    van Financiën (specifiek de directeuren-generaal Fiscale Zaken en Toeslagen).
    Om dit onderzoek zo onafhankelijk mogelijk te laten zijn, wordt het onderzoek
    uitgevoerd door een extern onderzoeksbureau. De externe begeleidingscommissie
    helpt dit bureau door te adviseren en mee te denken over de uitvoering en opzet
    van het onderzoek, zowel tijdens de voorbereiding als tijdens de looptijd.
