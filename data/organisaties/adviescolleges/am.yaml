description:
  text: De Adviesraad Migratie (AM), voorheen de Adviescommissie voor Vreemdelingenzaken,
    is een onafhankelijk adviescollege onder de Kaderwet adviescolleges, ingesteld
    bij de Vreemdelingenwet 2000. Zij adviseert regering en parlement over migratiebeleid
    en vreemdelingenrecht. De AM wordt ondersteund door een secretariaat, waarvan
    de leiding berust bij de secretaris van de AM.
