names:
- value: Adviescommissie Nationaal Groeifonds
  valid_from: '1900-01-01'
description:
  text: Het Nationaal Groeifonds werkt samen met initiatiefnemers en investeerders
    om projecten te financieren die bijdragen aan duurzame en structurele economische
    groei. Om te bepalen in welk van deze projecten geïnvesteerd wordt, is de Adviescommissie
    Nationaal Groeifonds ingesteld. Deze commissie beoordeelt op investeringsvoorstellen
    op onafhankelijke wijze, aan de hand van vooraf vastgestelde voorwaarden.
  url: https://www.nationaalgroeifonds.nl/over-de-commissie
