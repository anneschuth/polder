description:
  text: De Adviesraad voor wetenschap, technologie en innovatie (AWTI) is de onafhankelijke
    adviesraad van de regering en het parlement op het terrein van wetenschap, technologie
    en innovatie. Met zijn strategische beleidsadviezen wil de AWTI bijdragen aan
    het versterken van de innovatieve, wetenschappelijke en technologische kracht
    van mensen, bedrijven en kennisinstellingen in Nederland.  En daarmee aan een
    toekomstbestendige Nederlandse economie en samenleving.
