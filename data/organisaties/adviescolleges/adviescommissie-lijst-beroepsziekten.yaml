description:
  text: De Adviescommissie Lijst beroepsziekten heeft als voornaamste taak het adviseren
    van de minister van Sociale Zaken en Werkgelegenheid (SZW) over het aanpassen
    of uitbreiden van de Lijst beroepsziekten veroorzaakt door gevaarlijke stoffen.
    Deze [lijst](https://wetten.overheid.nl/BWBR0047535/2026-01-01/0#Bijlage) hoort
    bij de Regeling tegemoetkoming stoffengerelateerde beroepsziekten (Regeling TSB)
    en biedt een overzicht van ziekten die veroorzaakt kunnen zijn door werkgerelateerde
    blootstelling aan bepaalde stoffen (bijvoorbeeld longkanker als gevolg van asbest).
    Daarnaast is de commissie ook verantwoordelijk voor het opstellen en onderhouden
    van een afwegingskader causaliteit en bijbehorende protocollen beroepsziekten.
