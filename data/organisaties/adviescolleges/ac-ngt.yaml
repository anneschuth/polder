description:
  text: Het Adviescollege Nederlandse Gebarentaal is ingesteld om het ministerie van
    Binnenlandse Zaken en Koninkrijksrelaties te adviseren over het bevorderen van
    het gebruik van de Nederlandse Gebarentaal (NGT) in de samenleving, zowel gevraagd
    als ongevraagd. Daarbij is het belangrijkste doel van het Adviescollege om de
    Nederlandse samenleving goed toegankelijk te maken voor gebarentaligen.
