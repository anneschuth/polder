- value: Adviescollege Levenslanggestraften
  valid_from: '1900-01-01'
description:
  text: Het Adviescollege Levenslanggestraften adviseert de staatssecretaris van Justitie
    en Veiligheid of een levenslanggestrafte zich, na 25 jaar van de straf te hebben
    uitgezeten, kan voorbereiden op een eventuele terugkeer in de samenleving. Een
    levenslange gevangenisstraf zonder enig zicht op strafvermindering of vervroegde
    vrijlating is namelijk in strijd met artikel 3 van het Europees Verdrag van de
    Rechten van de Mens. Dit is vastgesteld in een uitspraak die het Europees Hof
    voor de Rechten van de Mens op 14 december 2000 heeft gedaan. Daarom wordt er
    voor levenslanggestraften een zogenaamde 'ambtshalve gratieprocedure' opgestart
    nadat zij 28 jaar van hun straf hebben uitgezeten. Tijdens deze procedure heeft
    het Adviescollege Levenslanggestraften een informerende rol. De uitkomst van de
    procedure kan zijn dat een levenslanggestrafte (onder voorwaarden) op vrije voeten
    komt, al kan een dergelijke herbeoordeling er ook toe leiden dat de gestrafte
    vast blijft zitten.Dit college valt niet onder de Kaderwet adviescolleges en is
    dus geen formeel adviescollege in de zin van die wet.
  url: https://www.adviescollegelevenslanggestraften.nl/over-het-adviescollege-levenslanggestraften/
