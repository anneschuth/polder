description:
  text: Het College financieel toezicht (Cft) Bonaire, Sint Eustatius en Saba is opgericht
    om in Caribisch Nederland duurzame overheidsfinanciën te realiseren. Hiervoor
    wordt samengewerkt met de besturen van Aruba, Curaçao, Sint Maarten, Bonaire,
    Sint Eustatius en Saba. Het belangrijkste doel van het Cft is het bevorderen van
    goed openbaar bestuur, welvaart en welzijn op de eilanden. De instelling van het
    Cft is vastgelegd in de Wet financiën openbare lichamen Bonaire, Sint Eustatius
    en Saba (Wet FinBES).Dit college valt niet onder de Kaderwet adviescolleges en
    is dus geen formeel adviescollege in de zin van die wet.
  url: https://www.cft.cw/organisatie/
