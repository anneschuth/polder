- value: Wetenschappelijke autoriteit CITES
  valid_from: '1900-01-01'
description:
  text: 'CITES (Convention on International Trade in Endangered Species) is een internationaal
    verdrag met als doel de bescherming van bedreigde planten- en diersoorten. Deze
    soorten lopen het risico om uit te sterven door (internationale) handel, vandaar
    dat er in het CITES-verdrag afspraken zijn gemaakt over het handelen in en het
    vervoeren van bedreigde soorten. Binnen de Europese Unie (EU) is er voor de uitvoering
    van CITES een basisverordening opgesteld: [Verordening (EG) nr. 338/97](https://eur-lex.europa.eu/legal-content/NL/ALL/?uri=celex%3A31997R0338).
    Artikel 13, tweede lid, van de basisverordening verplicht elke EU-lidstaat om
    ten minste één wetenschappelijke autoriteit aan te wijzen op het gebied van CITES.
    In Nederland is de instelling van deze wetenschappelijke autoriteit geregeld in
    de Omgevingswet.De Kaderwet adviescolleges is niet van toepassing op de wetenschappelijke
    autoriteit CITES, daarom is de autoriteit geen formeel adviescollege.'
