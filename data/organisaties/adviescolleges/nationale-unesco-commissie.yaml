  text: 'De Nationale Unesco Commissie is is de Unesco Commissie van Nederland en
    houdt zich binnen ons land bezig met de vier werkterreinen van Unesco: onderwijs,
    wetenschap, cultuur en communicatie. Elke Unesco-lidstaat heeft een eigen nationale
    Unesco Commissie.'
