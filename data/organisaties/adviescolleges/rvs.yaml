names:
- value: Raad voor Volksgezondheid en Samenleving
  abbr: RVS
  valid_from: '1900-01-01'
description:
  text: De Raad voor Volksgezondheid en Samenleving (RVS) adviseert de regering en
    het parlement bij beleids- en besluitvorming waarbij de thema's volksgezondheid,
    zorg en samenleving een rol spelen. Dit doet de RVS door onder meer vraagstukken
    te agenderen, hierover te informeren en aan politiek en maatschappelijk debat
    richting te geven voor. Tevens is de praktische uitvoering van beleid een belangrijk
    aandachtspunt van de RVS.
  url: https://www.raadrvs.nl/over-de-rvs
