names:
- value: Adviesraad internationale vraagstukken
  abbr: AIV
  valid_from: '1900-01-01'
description:
  text: 'De Adviesraad internationale vraagstukken is het adviescollege voor regering
    en parlement op het gebied van buitenlands beleid. De AIV adviseert gevraagd en
    ongevraagd over internationale vraagstukken. Het betreft in het bijzonder: Europese
    samenwerking, mensenrechten, ontwikkelingssamenwerking en veiligheidsbeleid.De
    AIV is een permanent adviescollege onder de Kaderwet adviescolleges, ingesteld
    middels de Wet op de Adviesraad internationale vraagstukken.'
