- value: Nederlandse Commissie beoordeling veiligheid voedselcontactmaterialen
  abbr: CBVV
  valid_from: '1900-01-01'
description:
  text: De Commissie beoordeling veiligheid voedselcontactmaterialen (CBVV) kijkt
    of diverse grond- en hulpstoffen en materialen veilig genoeg zijn om gebruikt
    te worden in voedselcontactmaterialen (bijvoorbeeld voedselverpakkingen, productiemachines,
    servies en bestek). Dit doet de CBBV voor voedselcontactmaterialen waarvoor geen
    afgestemde Europese regels gelden. De uitkomsten van de beoordeling worden door
    de CBBV vastgelegd in een zogenaamde opinie, die vervolgens wordt aangeboden aan
    de minister van Volksgezondheid, Welzijn en Sport (VWS). De minister van VWS kan
    vervolgens besluiten of de beoordeelde stoffen/materialen geschikt zijn voor het
    maken van voedselcontactmaterialen en deze toevoegen aan de bijlage bij de Warenwetregeling
    verpakkingen en gebruiksartikelen.Deze beoordelingscommissie is geen formeel adviescollege
    en valt niet onder de Kaderwet adviescolleges.
