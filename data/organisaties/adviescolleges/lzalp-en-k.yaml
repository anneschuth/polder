names:
- value: Beoordelingscommissie late zwangerschapsafbreking en levensbeëindiging bij
    pasgeborenen en kinderen van 1 tot 12 jaar
  abbr: LZA/LP&K
  valid_from: '1900-01-01'
description:
  text: Wanneer er bij ongeborenen, pasgeborenen of kinderen van 1 tot 12 jaar sprake
    is van uitzichtloos en (te verwachten) ondraaglijk lijden, hebben artsen de mogelijkheid
    om over te gaan tot afbreking van de zwangerschap of beëindiging van het leven
    om zulk lijden te voorkomen. Dit kan wanneer artsen bij een dergelijk ingrijpend
    besluit zorgvuldig handelen volgens de geldende criteria (onder meer beschreven
    in de Regeling beoordelingscommissie late zwangerschapsafbreking en levensbeëindiging
    bij pasgeborenen en kinderen 1-12 jaar). De Beoordelingscommissie late zwangerschapsafbreking
    en levensbeëindiging bij pasgeborenen en kinderen van 1 tot 12 jaar (LZA/LP&K)
    toetst achteraf of het besluitvormingsproces en de toepassing van de criteria
    zorgvuldig zijn verlopen.Deze beoordelingscommissie is geen formeel adviescollege
    en valt niet onder de Kaderwet adviescolleges.
  url: https://www.lzalpkcommissie.nl/over-ons
