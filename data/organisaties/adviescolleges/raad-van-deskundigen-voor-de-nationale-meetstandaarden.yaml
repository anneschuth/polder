description:
  text: De Raad van deskundigen voor de nationale meetstandaarden is een technisch
    wetenschappelijk adviescollege. Op grond van de Metrologiewet beheert en oefent
    de Raad toezicht uit op de verwezenlijking van nationale meetstandaarden en brengt
    hierover jaarlijks verslag uit aan de minister van Economische Zaken en Klimaat,
    evenals advies over aangelegenheden in verband met de meetstandaarden van grootheden.
