  abbr: ICBR
  valid_from: '1900-01-01'
description:
  text: 'De ICBR is ambtelijk voorportaal van de Raad voor Bestuur en Justitie (RBJ)
    en verzorgt  (via het zogeheten SGO Voorportaal) in die rol de voorbereiding van
    de besluitvorming in de RBJ over belangrijke wetgeving en beleidsonderwerpen  op
    het terrein van de bedrijfsvoering rijksdienst. De ICBR staat voor het rijksbreed
    sturen op een doelmatige en doeltreffende bedrijfsvoering. De commissies heeft
    tot taak op dit terrein de in het eerste lid genoemde terreinen desgevraagd of
    uit eigen beweging te adviseren over wet- en regelgeving en beleidsinitiatieven.Leden:
    de hoogst verantwoordelijke ambtenaren voor de bedrijfsvoering van alle ministeries,
    de plaatsvervangend SG''s of de (hoofd)directeuren bedrijfsvoering. Voorzitter
    is de directeur-generaal Organisatie en Bedrijfsvoering Rijk van het ministerie
    van BZK.'
