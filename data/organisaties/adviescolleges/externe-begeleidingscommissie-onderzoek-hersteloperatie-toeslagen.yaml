description:
  text: In 2025 heeft de staatssecretaris van Financiën opdracht gegeven tot het uitvoeren
    van een onderzoek dat de Wet hersteloperatie toeslagen (en het beleid daaromheen)
    moet evalueren. Voor het onderzoek wordt een extern onderzoeksbureau ingezet,
    dat op zijn beurt wordt begeleid door een externe begeleidingscommissie. Deze
    begeleidingscommissie adviseert en denkt mee over de opzet en uitvoering van het
    onderzoek (zowel tijdens de voorbereiding als tijdens de looptijd) en spreekt
    zich daarnaast uit over de tussenrapportages en het eindrapport van het onderzoeksbureau.
