description:
  text: Het Adviescollege toetsing regeldruk (ATR) adviseert voornamelijk over het
    effect die voorgenomen wet- en regelgeving op de regeldruk heeft. In de meeste
    gevallen brengt het ATR advies uit tijdens een vroege fase van het wetgevingsproces,
    bijvoorbeeld bij het opstellen van nieuwe wetten. Het ATR kan echter ook over
    bestaande wetgeving adviseren. Daarnaast kan het ATR op verzoek advies uitbrengen
    over regelgeving van medeoverheden en beleidsregels en overige regels van toezichthouders,
    inspecties en uitvoeringsorganisaties.Het ATR is in 2017 opgericht als tijdelijk
    adviescollege, maar is op 1 januari 2026 een permanent adviescollege geworden.
