names:
- value: Commissie Doelmatigheid Hoger Onderwijs
  abbr: CDHO
  valid_from: '1900-01-01'
description:
  text: De Commissie Doelmatigheid Hoger Onderwijs (CDHO) heeft als belangrijkste
    taken:* het adviseren van de minister van Onderwijs, Cultuur en Wetenschap (OCW),
    zoals beschreven in artikel 3, lid 1 en 3, van het [Instellingsbesluit Commissie
    Doelmatigheid Hoger Onderwijs](https://wetten.overheid.nl/BWBR0026019/2024-03-20/#Artikel3);*
    het op grond van de [Regeling macrodoelmatig opleidingsaanbod hoger onderwijs
    2023](https://wetten.overheid.nl/BWBR0048105/2023-04-29/0) adviseren over nieuwe
    opleidingen en vestigingsplaatsen, verplaatsing van bestaande opleidingen, fusietoetsen
    en herordeningsoperaties;* het op verzoek van de minister adviseren over ontwikkelingen
    op het gebied van de macrodoelmatigheid en de (mogelijke) effecten hiervan op
    het beleid;* het op verzoek van de minister uitvoeren van sectorale doorlichtingen
    van het bestaande opleidingsaanbod.
  url: https://www.cdho.nl/commissie/taken/
