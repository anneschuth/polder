description:
  text: Ingesteld bij besluit van de Soevereine Vorst van 24 juni 1814, nr.10. Samenstelling
    en bevoegdheid zijn geregeld in de Wet op de adeldom van 10 mei 1994, Stb.360.TAAK:-
    adviseren vana.  de Minister van Algemene Zaken betreffende naamgeving, titulatuur
    en wapenverlening van leden van het Koninklijk Huis;b. de Minister van Binnenlandse
    Zaken en Koninkrijksrelaties betreffende alle adelszaken en de samenstelling en
    wijziging van de wapens van publiekrechtelijke lichamen;c. de besturen van publiekrechtelijke
    lichamen inzake de samenstelling van de door hen gewenste vlaggen;d. de Minister
    van Justitie omtrent verzoeken tot naamswijziging, waarbij de namen van adellijke
    geslachten of van heerlijkheden en dergelijke betrokken zijn;e. de Minister van
    Defensie inzake ontwerpen van emblemen en medailles van krijgsmachtonderdelen;-
    het verrichten van de uit het bovenstaande voortvloeiende werkzaamheden;- in het
    algemeen het verstrekken van advies en voorlichting op genealogisch en heraldisch
    gebied aan rechtspersonen en particulieren.COLLECTIE:- Archieven Hoge Raad van
    Adel 1814 - heden;- Genealogische en heraldische handschriften;- Enkele archieven
    van adellijke families;- Gespecialiseerde bibliotheek.
