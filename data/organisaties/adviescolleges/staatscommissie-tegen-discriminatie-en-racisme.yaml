description:
  text: De Staatscommissie tegen Discriminatie en Racisme is een eenmalig adviescollege
    en doet wetenschappelijk onderzoek naar discriminatie en racisme in Nederland.
    Het belangrijkste doel van de commissie is om discriminatie en racisme effectiever
    aan te pakken, door inzicht te verschaffen in de aard, omvang en oorzaken hiervan.
    De commissie adviseert de regering onder meer over betere waarborgen en het verbeteren
    van beleid en regelgeving om discriminatie en racisme te voorkomen en tegen te
    gaan, evenals de effecten van dergelijk beleid. Daarnaast onderzoekt de commissie
    of er sprake is van discriminatie en etnisch profileren in de werkwijze en organisatiecultuur
    van (semi)overheidsinstanties en uitvoeringsinstanties. De commissie verkent tevens
    de mogelijkheden om onderscheid op grond van ras en nationaliteit in risicoprofielen
    alleen toe te passen om mensen te beschermen en te ondersteunen. De werkzaamheden
    van de commissie richten zich op zowel Europees als op Caribisch Nederland.
