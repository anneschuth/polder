description:
  text: 'Het Adviescollege Openbaarheid en Informatiehuishouding (ACOI) is een onafhankelijk
    adviesorgaan van de overheid, dat in 2022 is ingesteld om de toepassing van de
    Wet open overheid, de Woo, te bevorderen. De taken die daarbij horen, zijn bepaald
    door deze wet.Onze missieHet ACOI hecht aan een democratie waaraan iedere burger
    actief kan deelnemen en kan volgen wat de overheid doet. Dat betekent dat iedereen
    zoveel mogelijk toegang moet hebben tot de informatie die de overheid heeft. De
    missie van het college is om aanjager te zijn van die openbaarheid.Onze kerntakenAdvisering:
    ACOI geeft adviezen aan regering en parlement over beleid en wetgeving rond openbaarheid
    en goed beheer van overheidsinformatie. Deze adviezen zijn relevant voor de centrale
    overheid, gemeenten, provincies en waterschappen. Het ACOI doet zelf onafhankelijk
    onderzoek of geeft opdracht voor onderzoek ter voorbereiding van zijn adviezen
    en werkwijzers.Bemiddeling: ACOI heeft een ombudsfunctie speciaal voor journalisten,
    onderzoekers en maatschappelijke organisaties die een ‘beroepsmatig belang’ hebben
    bij openbaarmaking van overheidsinformatie. Wanneer zij een klacht hebben over
    de afhandeling van hun Woo-verzoek, kan ACOI bemiddelen tussen hen en de betreffende
    overheidsorganisatie.Kennisdeling: ACOI bevordert de kennis die nodig is om de
    transitie naar een open bestuurscultuur te realiseren. Kennisdeling vindt plaats
    in verschillende vormen, zoals bijeenkomsten,  leerkringen, en gerichte trainingen.
    Ook maakt ACOI werkwijzers (''richtsnoeren'') die overheidsorganisaties helpen
    bij de uitvoering van de Woo. De belangrijkste doelgroepen zijn ambtenaren die
    de Woo uitvoeren, journalisten, onderzoekers en andere burgers als mogelijke gebruikers
    van de Woo.'
