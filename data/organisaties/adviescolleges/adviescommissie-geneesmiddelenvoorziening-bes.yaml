description:
  text: De Adviescommissie geneesmiddelenvoorziening BES adviseert de minister van
    Volksgezondheid, Welzijn en Sport (VWS) over vergunningen die van toepassing zijn
    op apotheken op Bonaire, Sint Eustatius of Saba (de BES-eilanden). Het gaat hierbij
    om advies over het toekennen, weigeren of intrekken van vergunningen om op de
    BES-eilanden een apotheek te vestigen, te runnen, te verplaatsen of over te nemen.
