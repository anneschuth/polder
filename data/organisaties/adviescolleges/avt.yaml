names:
- value: Adviescollege Verloftoetsing TBS
  abbr: AVT
  valid_from: '1900-01-01'
description:
  text: Het Adviescollege Verloftoetsing TBS (AVT) is een onafhankelijk en multidisciplinair
    orgaan dat ingediende verlofaanvragen van tbs'ers (of andere personen die in inrichtingen
    verblijven waar tbs met verpleging wordt uitgevoerd) beoordeelt. Hierbij toetst
    het AVT of het geven van verlof aan een tbs'er veilig en verantwoord is. Op basis
    van deze toetsing brengt het AVT vervolgens een advies uit aan de minister van
    Justitie en Veiligheid.Dit college valt niet onder de Kaderwet adviescolleges
    en is dus geen formeel adviescollege in de zin van die wet.
  url: https://www.verlofadviescollege.nl/over-het-avt
