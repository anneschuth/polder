  valid_until: '2025-01-01'
description:
  text: De Commissie Buitenslands Gediplomeerden Volksgezondheid (CBGV) adviseert
    bij aanvragen over erkenning van buitenlandse zorgdiploma's, bijvoorbeeld wanneer
    iemand die een zorgdiploma in een ander land heeft behaald binnen de Nederlandse
    gezondheidszorg wil werken. Ook adviseert de CBGV bij aanvragen voor beroepsuitoefening
    op Bonaire, Sint Eustatius, Saba en Sint Maarten en bij aanvragen voor herregistratie
    in het register van Beroepen in de Individuele Gezondheidszorg (BIG-register)
    als er sprake is van buitenlandse werkervaring. Ten slotte brengt de CBGV advies
    uit aan de minister van Volksgezondheid, Welzijn en Sport.Deze adviescommissie
    is geen formeel adviescollege en valt niet onder de Kaderwet adviescolleges.
  url: https://www.bigregister.nl/buitenlands-diploma/cbgv
