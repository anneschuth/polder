description:
  text: Dit is de Wetenschappelijke Adviescommissie voor het actieprogramma Eén tegen
    Eenzaamheid, dat in 2018 van start is gegaan. De commissie bestaat uit diverse
    wetenschappers en is verantwoordelijk voor het bijdragen van kennis aan het actieprogramma,
    evenals het adviseren over de manier waarop de effectiviteit van het programma
    in kaart wordt gebracht.Deze adviescommissie is geen formeel adviescollege en
    valt niet onder de Kaderwet adviescolleges.
