description:
  text: De Ecologische Autoriteit is onafhankelijk en heeft als taken om vanuit haar
    deskundigheid:* te toetsen of, met het oog op de huidige en beoogde kwaliteit
    van de beschermde natuur, de essentiële ecologische informatie betrokken is bij
    de onderbouwing van besluiten door het bevoegde gezag over natuurdoelanalyses,
    gebiedsplannen en gebiedsprogramma’s;* te adviseren over relevante wetenschappelijke
    inzichten voor besluitvorming ten aanzien van brede ecologische vraagstukken,
    met inbegrip van vraagstukken over klimaat en abiotische randvoorwaarden voor
    natuur zoals bodem, water en atmosferische depositie.
