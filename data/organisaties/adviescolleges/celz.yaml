description:
  text: De Commissie Expertisecentra langdurige zorg (CElz) voert de regie op het
    inrichten van een (kennis)infrastructuur gericht op specifieke doelgroepen, waarbij
    sprake is van een (zeer) complexe zorgbehoefte en een laag volume. Dit doet de
    CElz door het vormen van doelgroepnetwerken, die bestaan uit diverse kennis- en
    expertisecentra die hooggespecialiseerde kennis en deskundigheid samenbrengen.Deze
    adviescommissie is geen formeel adviescollege en valt niet onder de Kaderwet adviescolleges.
