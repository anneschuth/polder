description:
  text: De Kiesraad is verantwoordelijk voor de verkiezingen in Nederland en ziet
    erop toe dat deze eerlijk en transparant verlopen.
  url: https://www.kiesraad.nl/over-ons
kaderwet:
  kaderwetAdviescollege:
    kaderwetVanToepassing: ja
    afwijkendeBepalingKaderwet:
      artikel: 10,12,13,14,15,21,25,26,27,28,29
      toelichting: Omdat de adviestaak bij de Kiesraad niet de hoofdtaak is, gelden
        enkele bepalingen zoals bedoeld in artikel 3 van de Kaderwet adviescolleges
        niet. Artikel 12, lid 3 en artikel 15, lid 1, 3, 4 en 5 gelden wel.Artikel
        21 en artikel 29 zijn uitgesloten.
  kaderwetZbo:
    instellingsmotief: Onafhankelijkheid
    kaderwetVanToepassing: ja
    afwijkendeBepalingKaderwet:
      artikel: 12,21,22
      toelichting: Leden van de Kiesraad worden door de Kroon benoemd. Met het oog
        op de onafhankelijke positie van de Kiesraad is het niet wenselijk dat de
        minister beleidsregels kan vaststellen en door de Kiesraad genomen besluiten
        kan vernietigen.
wettelijke_grondslagen:
- opschrift: Kieswet, artikel A 2
  referentie: https://wetten.overheid.nl/BWBR0004627/2025-08-01#AfdelingI_HoofdstukA_Paragraaf2_ArtikelA2
taken_en_bevoegdheden: De Kiesraad heeft de volgende taken:* het adviseren van de
  regering en de beide Kamers der Staten-Generaal over uitvoeringstechnische aangelegenheden
  die het kiesrecht of de verkiezingen betreffen (artikel A2 Kieswet);* het als centraal
  stembureau optreden voor de verkiezingen van de leden van:<br />a. de Tweede Kamer
  (artikel E II, tweede lid, Kieswet); <br />b. de Eerste Kamer (artikel S I, eerste
  lid, Kieswet); <br />c. het Europees Parlement (artikel Y9, eerste lid, Kieswet);*
  het adviseren van overheden, politieke partijen, media en burgers in verkiezingstijd
  en het optreden als deskundig adviseur in rechtsgedingen.
