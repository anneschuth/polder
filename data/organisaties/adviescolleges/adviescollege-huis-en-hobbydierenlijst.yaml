description:
  text: Het Adviescollege huis- en hobbydierenlijst beoordeelt en registreert welke
    zoogdieren geschikt zijn om in Nederland als huis- of hobbydieren te houden. Dit
    wordt gedaan aan de hand van een toetsingskader dat door het college zelf ontwikkeld
    is, waarbij onder meer gekeken wordt naar eventuele risico's voor het dierenwelzijn
    en of het houden van een bepaalde diersoort gevaren voor andere dieren en mensen
    kan opleveren. Tevens adviseert het college de minister van Landbouw, Visserij,
    Voedselzekerheid en Natuur over het aanwijzen van dieren die als huis- of hobbydier
    gehouden kunnen worden.
