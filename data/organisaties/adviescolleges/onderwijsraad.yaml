description:
  text: 'Goed onderwijs voor iedereen: daar draagt de Onderwijsraad aan bij. De raad
    geeft al meer dan honderd jaar onafhankelijk advies over onderwijsbeleid en -wetgeving
    aan de regering en de Eerste en Tweede Kamer. Gevraagd én uit eigen beweging.
    Dit mondt uit in gefundeerde verkenningen en adviezen die focussen op oplossingen
    voor de langere termijn. Ze gaan over alle vormen van onderwijs: van voorschoolse
    voorzieningen tot aan postuniversitair onderwijs en een leven lang ontwikkelen.De
    raad is onafhankelijk, met oog en oor voor opvattingen en ontwikkelingen in de
    samenleving en het onderwijs. De adviezen zijn gebaseerd op wetenschappelijke
    kennis en inzichten. En ze worden gevoed door kennis en ervaring uit de onderwijspraktijk
    en de praktijk van onderwijswetgeving en -beleid. De JongerenOnderwijsraad, met
    leerlingen en studenten van diverse leeftijden en schooltypen, voedt de raad met
    ervaringen en ideeën over het Nederlandse onderwijs en denkt mee over onderwerpen.'
  url: https://www.onderwijsraad.nl/over-ons
