description:
  text: De Raad voor Strafrechtstoepassing en Jeugdbescherming (RSJ) is een onafhankelijk
    orgaan met een rechtsprekende en adviserende taak.Justitiabelen en jeugdigen bevinden
    zich in een afhankelijke positie. Zij hebben daarom bescherming nodig tegen te
    ver gaande inbreuken op hun (grond)rechten of een willekeurige toepassing daarvan.
    De overheid is verantwoordelijk voor de zorg van justitiabelen en jeugdigen. De
    RSJ draagt hier aan bij.
  url: https://www.rsj.nl/over-de-rsj
