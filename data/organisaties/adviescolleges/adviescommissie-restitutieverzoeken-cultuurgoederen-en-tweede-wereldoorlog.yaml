description:
  text: De Adviescommissie Restitutieverzoeken Cultuurgoederen en Tweede Wereldoorlog
    (of simpelweg de Restitutiecommissie) behandelt teruggaveverzoeken op het gebied
    van kunst die door de nazi's is geroofd. Bij verzoeken tot teruggave van kunstwerken
    die in bezit zijn van de Nederlandse Staat, adviseert de Restitutiecommissie de
    minister van Onderwijs, Cultuur en Wetenschap (OCW). Voor de totstandkoming van
    dit advies heeft de regering vastgestelde kaders en beleidslijnen opgesteld, de
    minister van OCW toetst of de Restitutiecommissie zich bij de advisering aan deze
    kaders en beleidslijnen heeft gehouden. Vervolgens neemt de minister de beslissing
    over het restitutieverzoek.Bij kunstwerken die niet in bezit zijn van de Nederlandse
    Staat, adviseert de Restitutiecommissie zowel de huidige bezitter van het kunstwerk
    als (de erfgenamen van) de voormalige eigenaar van het kunstwerk.
