names:
- value: Adviescollege ICT-toetsing
  abbr: AcICT
  valid_from: '1900-01-01'
description:
  text: Het Adviescollege ICT-toetsing (AcICT) is ingesteld voor de algehele verbetering
    van de beheersing van ICT-projecten en informatiesystemen bij ministeries, zelfstandige
    bestuursorganen, de politie en de Raad voor de rechtspraak.Het AcICT adviseert
    het kabinet en de Eerste en Tweede Kamer over de doeltreffendheid en doelmatigheid
    van de inrichting en toepassing van een informatiesysteem ter uitvoering van beleid
    en regelgeving binnen de Rijksoverheid. En over de risico’s en slaagkans van (voorgenomen)
    ICT-projecten. Ministeries zijn gehouden om alle voorgenomen projecten met een
    ICT-component van meer dan vijf miljoen euro bij het Adviescollege aan te melden.
    Daarnaast adviseert het Adviescollege over de doeltreffendheid en doelmatigheid
    van het onderhoud en beheer van informatiesystemen.Dit college valt niet onder
    de Kaderwet adviescolleges en is dus geen formeel adviescollege in de zin van
    die wet, al zijn enkele afzonderlijke bepalingen in de Kaderwet wel van (overeenkomstige)
    toepassing.
