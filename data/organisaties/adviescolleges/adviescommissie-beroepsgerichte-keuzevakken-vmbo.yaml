description:
  text: De Adviescommissie beroepsgerichte keuzevakken vmbo beoordeelt of nieuwe,
    beroepsgerichte keuzevakken doorontwikkeld kan worden tot examenvak voor het vmbo.
    Een nieuw keuzevak kan namelijk alleen als examenvak meetellen wanneer dit officieel
    is vastgesteld door de minister van Onderwijs, Cultuur en Wetenschap (OCW). De
    wens om een nieuw keuzevak te ontwikkelen moet eerst door de betreffende school
    worden gemeld bij de Dienst Uitvoering Onderwijs (DUO), waarna de commissie bepaalt
    of het nieuwe keuzevak passend is voor het vmbo. Als dat zo is, kan de school
    verdergaan met het ontwikkelen van een examenprogramma voor dat keuzevak.De commissie
    is geen formeel adviescollege zoals bedoeld in de Kaderwet adviescolleges. De
    commissie bestaat uit vertegenwoordigers van de Stichting Platforms vmbo (SPV),
    SLO (voorheen de Stichting voor de Leerplanontwikkeling) en de Samenwerkingsorganisatie
    Beroepsonderwijs Bedrijfsleven (SBB).
