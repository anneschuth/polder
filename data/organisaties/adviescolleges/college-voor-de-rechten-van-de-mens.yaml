names:
- value: College voor de Rechten van de Mens
  valid_from: '1900-01-01'
description:
  text: Het College voor de Rechten van de Mens is opgericht om erop te letten dat
    de mensenrechten goed beschermd worden en om hierover te vertellen, in Nederland
    en Caribisch Nederland.  In het kader van deze missie doet het College onderzoek
    en adviseert het College de regering en het parlement. Ook wordt er aan internationale
    organisaties, zoals de VN, gerapporteerd over mensenrechtenkwesties. Tevens oordeelt
    het College over individuele discriminatieklachten en biedt het voorlichting,
    omdat het belangrijk is dat mensen weten wat hun rechten zijn.
  url: https://www.mensenrechten.nl/over-ons
kaderwet:
  kaderwetAdviescollege:
    kaderwetVanToepassing: ja
    afwijkendeBepalingKaderwet:
      artikel: 10,11,12,13,14,15,16,17,25,26,27,28,29
      toelichting: Hoofdstuk 3 (artikel 10 tot en met 16a), hoofdstuk 5 (artikel 25
        tot en met 27) en artikel 28 van de Kaderwet adviescolleges zijn niet van
        toepassing, omdat advisering niet de hoofdtaak van het College voor de Rechten
        van de Mens is. Artikel 17 is wel van toepassing, maar uitgebreid naar andere
        bestuursorganen. Artikel 29 is ook van toepassing, waarbij vermeld moet worden
        dat het College niet verplicht is om gegevens over concrete onderzoeken, die
        ten grondslag liggen aan het advies, te overleggen (dit is tevens in lijn
        met de uitzondering op artikel 20 van de Kaderwet zelfstandige bestuursorganen).
  kaderwetZbo:
    instellingsmotief: Onafhankelijkheid
    kaderwetVanToepassing: ja
    afwijkendeBepalingKaderwet:
      artikel: 12,20,21,22
      toelichting: De afwijkende bepalingen ten opzichte van de Kaderwet zelfstandige
        bestuursorganen worden vermeld in artikel 20 van de Wet College voor de rechten
        van de mens.
wettelijke_grondslagen:
- opschrift: Wet College voor de rechten van de mens, artikel 1
  referentie: https://wetten.overheid.nl/BWBR0030733/2020-01-01#Hoofdstuk1_Artikel1
taken_en_bevoegdheden: Het College voor de Rechten van de Mens voert de volgende taken
  uit:* het doen van onderzoek naar mogelijke (stelselmatige) schendingen van mensenrechten
  of naar het niveau van bescherming van deze rechten op een specifiek terrein;* het
  doen van onderzoek naar de bescherming van de rechten van de mens;* het doen van
  onderzoek naar mogelijk onderscheid dat bestaat of wordt gemaakt, zoals bedoeld
  in de Algemene wet gelijke behandeling, de Wet gelijke behandeling van mannen en
  vrouwen en artikel 646 van Boek 7 van het Burgerlijk Wetboek;* het doen van onderzoek
  mogelijk stelselmatig onderscheid, zoals hierboven omschreven;* het rapporteren
  van en oordelen over de uitkomsten van bovenstaande onderzoeken;* het rapporteren
  over en het doen van aanbevelingen op het terrein van mensenrechten, waaronder het
  jaarlijks rapporteren over de mensenrechtensituatie in Nederland;* het adviseren
  over (concept)wet- en regelgeving en beleid dat direct of indirect betrekking heeft
  op mensenrechten;* het geven van voorlichting op het terrein van mensenrechten en
  het stimuleren en coördineren van onderwijs over de rechten van de mens;* het stimuleren
  van onderzoek naar de bescherming van de rechten van de mens;* het structureel samenwerken
  met maatschappelijke organisaties en nationale, Europese en wereldwijde instellingen,
  onder meer door het organiseren van activiteiten in samenwerking met maatschappelijke
  organisaties;* het aansporen tot de ratificatie, implementatie en naleving van verdragen
  over de rechten van de mens en het aansporen tot de opheffing van voorbehouden bij
  zulke verdragen;* het aansporen tot de implementatie en naleving van bindende besluiten
  van volkenrechtelijke organisaties over de rechten van de mens;* het aansporen tot
  de naleving van Europese of internationale aanbevelingen over de rechten van de
  mens;Het mandaat van het College heeft ook betrekking op Caribisch Nederland (de
  eilanden Bonaire, Sint Eustatius en Saba). Dit geldt voor alle taken van het College,
  behalve de oordelende taak op het gebied van gelijke behandeling.
