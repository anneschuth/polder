description:
  text: De Commissie beoordeling uitingen maatschappelijk verantwoordelijkheidsbesef
    adviseert de minister van Onderwijs, Cultuur en Wetenschap (OCW) indien deze een
    besluit wenst te nemen op grond van artikel 6.11, eerste lid, van de Wet op het
    hoger onderwijs en wetenschappelijk onderzoek. Bij het nemen van een dergelijk
    besluit beoordeelt de commissie of een uiting discriminatoir is in de zin van
    bestaande wet- en regelgeving volgens eerdere uitspraken van de (straf)rechter
    en het College voor de Rechten van de Mens, of op een andere manier duidelijk
    in strijd is met de kernwaarden van de Nederlandse democratische rechtstaat. Daarnaast
    beoordeelt de commissie of de uiting, gelet op de context waarin deze is gedaan,
    valt onder een grondrecht, de academische vrijheid of een ander fundamenteel recht
    en adviseert over hoe de betrokken (grond)rechten tegen elkaar moeten worden afgewogen.
