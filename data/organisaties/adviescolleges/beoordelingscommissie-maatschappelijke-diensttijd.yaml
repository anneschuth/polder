description:
  text: De Beoordelingscommissie Maatschappelijke Diensttijd (MDT) beoordeelt aanvragen
    voor MDT-subsidies. Deze subsidies kunnen door maatschappelijke organisaties en
    onderwijsinstellingen gebruikt worden om projecten op te zetten die gericht zijn
