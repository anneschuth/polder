names:
- value: Gezondheidsraad
  abbr: GR
  valid_from: '1900-01-01'
description:
  text: De Gezondheidsraad is een onafhankelijke wetenschappelijke adviesraad voor
    regering en parlement op het brede terrein van de volksgezondheid en gezondheidszorg.
    De organisatie van de Gezondheidsraad bestaat uit een raad en een secretariaat
    en beschikt over een uitgebreid netwerk van gerespecteerde wetenschappers die
    zich onbezoldigd inzetten. Adviezen worden opgesteld door multidisciplinaire tijdelijke
    of vaste commissies en getoetst door de beraadsgroep. Ook nauw betrokken bij het
    raadswerk zijn de leden van de presidiumcommissie. Via de Jonge Gezondheidsraad
    (jongGR) worden jonge wetenschappers betrokken bij het werk van de Gezondheidsraad
    en verder onderhoudt de Gezondheidsraad zowel nationaal als internationaal samenwerkingsverbanden.
  url: https://www.gezondheidsraad.nl/over-ons
kaderwet:
  kaderwetAdviescollege:
    kaderwetVanToepassing: ja
    afwijkendeBepalingKaderwet:
      artikel: 10,11,15,16,17,18,19,20,21
      toelichting: Het maximumaantal leden, normaliter maximaal vijftien, is, vanwege
        de noodzakelijke technisch-specialistische kennis op velerlei gebieden, losgelaten.
        Daaruit voortvloeiend zijn er enkele andere afwijkingen. Bij artikel 19 wijkt
        alleen het tweede lid af, bij artikel 20 het eerste lid.
