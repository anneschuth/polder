names:
- value: Raad voor de leefomgeving en infrastructuur
  abbr: Rli
  valid_from: '1900-01-01'
description:
  text: De Raad adviseert de regering en de Eerste en Tweede Kamer over strategische
    beleidsvraagstukken met betrekking tot de duurzame ontwikkeling van de leefomgeving
    en infrastructuur. Hierbij wordt in het bijzonder aandacht besteed aan wonen,
    ruimtelijke ordening, milieu, klimaatbeleid, water, energie-infrastructuur, landbouw,
    natuur, voedsel(kwaliteit), verkeer en vervoer en de ruimtelijk-economische ontwikkeling.Verder
    adviseert de Raad over beleid ter voorkoming van ongevallen en rampen als gevolg
    van het gebruik, de opslag, de productie en het vervoer van gevaarlijke stoffen.
    Hierbij geeft de Raad ook advies over hoe de gevolgen van dergelijke ongevallen
    en rampen beperkt kunnen worden.
