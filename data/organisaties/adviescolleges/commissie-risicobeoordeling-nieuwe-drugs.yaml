description:
  text: De commissie risicobeoordeling nieuwe drugs is een adviescommissie die het
    Coördinatiepunt Assessment en Monitoring nieuwe drugs (CAM), dat is ondergebracht
    bij het Rijksinstituut voor Volksgezondheid en Milieu (RIVM), ondersteunt. Naast
    deze ondersteunde taak is de commissie verantwoordelijk voor het (zo breed mogelijk)
    uitwisselen van informatie over trends op het gebied van drugs en drugsgebruik,
    het beoordelen van de risico's van nieuwe drugs (op een onafhankelijke, slagvaardige
    en multidisciplinaire manier) en het toetsen en evalueren van de risicobeoordelingsprocedure.Deze
    adviescommissie is geen formeel adviescollege en valt niet onder de Kaderwet adviescolleges.
