description:
  text: De Bezwaarschriftenadviescommissie hersteloperatie toeslagen (BAC) is een
    onafhankelijke commissie die Uitvoeringsorganisatie Herstel Toeslagen (UHT) adviseert.
    Wanneer de UHT een beslissing heeft genomen en een belanghebbende het daar niet
    mee eens is, kan de belanghebbende bezwaar maken tegen de beslissing. In bepaalde
    gevallen zal de BAC de UHT vervolgens adviseren over het ingediende bezwaar.
