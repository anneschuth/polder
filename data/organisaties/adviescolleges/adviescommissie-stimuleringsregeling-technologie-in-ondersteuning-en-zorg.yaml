description:
  text: De adviescommissie Stimuleringsregeling Technologie in Ondersteuning en Zorg
    adviseert de minister van Volksgezondheid, Welzijn en Sport (VWS) over subsidieaanvragen
    boven een bedrag van &euro; 125.000, op grond van de Stimuleringsregeling Technologie
    in Ondersteuning en Zorg (STOZ). Hierbij hanteert de commissie de beoordelingscriteria
    zoals vermeld in de bijlage van de STOZ.Deze adviescommissie is geen formeel adviescollege
    en valt niet onder de Kaderwet adviescolleges.
