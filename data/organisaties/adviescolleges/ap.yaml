names:
- value: Autoriteit Persoonsgegevens
  abbr: AP
  valid_from: '1900-01-01'
description:
  text: De Autoriteit Persoonsgegevens (AP) is opgericht en aangewezen als toezichthouder
    op de Algemene verordening gegevensbescherming (AVG) en de Uitvoeringswet AVG
    (UAVG). De AP is zowel een adviescollege als een zelfstandig bestuursorgaan.
  url: https://www.autoriteitpersoonsgegevens.nl/over-de-autoriteit-persoonsgegevens
kaderwet:
  kaderwetAdviescollege:
    kaderwetVanToepassing: ja
    afwijkendeBepalingKaderwet:
      artikel: 10,11,12,13,14,15,16,25,26,27,28
      toelichting: Omdat de adviestaak bij de AP niet de hoofdtaak is, gelden enkele
        bepalingen niet, zoals bedoeld in artikel 3 van de Kaderwet adviescolleges.
  kaderwetZbo:
    instellingsmotief: Onafhankelijkheid
    kaderwetVanToepassing: ja
    afwijkendeBepalingKaderwet:
      artikel: 12,20,21,22,23
      toelichting: Artikel 20 is niet van toepassing als het College de informatie
        van derden heeft verkregen onder de voorwaarde dat het geheime karakter daarvan
        wordt gehandhaafd. Artikel 23 is slechts toepasbaar op het financiële beheer
        en de administratieve organisatie.
wettelijke_grondslagen:
- opschrift: Uitvoeringswet Algemene verordening gegevensbescherming, artikel 6, lid
    1
  referentie: http://wetten.overheid.nl/jci1.3:c:BWBR0040940&hoofdstuk=2&paragraaf=2.1&artikel=6
taken_en_bevoegdheden: De Autoriteit Persoonsgegevens (AP) is verantwoordelijk voor:*
  het toezicht houden op de verwerking van persoonsgegevens overeenkomstig het bij
  en krachtens de wet bepaalde;* het toezicht houden op de verwerking van persoonsgegevens
  in Nederland, wanneer de verwerking plaatsvindt overeenkomstig het recht van een
  ander land van de Europese Unie;* het adviseren over wetsvoorstellen en ontwerpen
  van algemene maatregelen van bestuur die geheel of voor een belangrijk deel betrekking
  hebben op de verwerking van persoonsgegevens;* het toetsen van gedragscodes;* het
  voorafgaand onderzoek doen naar verwerkingen met bijzondere risico's;* het adviseren
  over vergunningen voor het doorgeven van persoonsgegevens naar landen buiten de
  Europese Unie;* het behandelen van klachten en verzoeken van betrokkenen en andere
  belanghebbenden;* diverse taken ingevolge de Wet politiegegevens en andere bijzondere
  wetgeving;* diverse internationaalrechtelijke taken, die verband houden met het
  bovenstaande.
