description:
  text: De Adviescommissie beoordeling aangeboden cultuurbezit uit nalatenschappen
    is een onafhankelijke commissie. Deze heeft  de taak de minister van Financiën
    te adviseren over verzoeken om toepassing van de kwijtscheldingsregeling. Dit
    is een fiscale regeling die onder de bevoegdheid van de minister van Financiën
    valt. Het verzoek loopt via de Belastingdienst, die het doorstuurt aan de Adviescommissie
    beoordeling aangeboden cultuurbezit uit nalatenschappen. De commissie beoordeelt
    de vraag of het aangeboden object van kunsthistorisch of cultuurhistorisch belang
    is en brengt hierover advies uit aan de minister van Financiën. Deze commissie
    bestaat uit een voorzitter, tevens lid, en vier andere leden en vergadert vier
    keer per jaar.
