description:
  text: De Commissie onderzoek naar Binnenlandse Afstand en Adoptie leidt een onafhankelijk
    onderzoek, bestaande uit drie deelonderzoeken, naar de geschiedenis van binnenlandse
    afstand en adoptie in de periode 1956-1984. Op basis van de uitkomsten van de
    drie deelonderzoeken zal de Commissie een eindrapport schrijven en aan de verantwoordelijke
    minister aanbieden.
