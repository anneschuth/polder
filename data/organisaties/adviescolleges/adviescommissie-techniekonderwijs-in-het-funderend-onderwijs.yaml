description:
  text: De Adviescommissie techniekonderwijs in het funderend onderwijs voert diverse
    werkzaamheden uit op basis van de Subsidieregeling sterk techniekonderwijs 2025–2028
    (regeling STO) en de Subsidieregeling Techkwadraat 2025–2028 (regeling Techkwadraat).
    De belangrijkste taken van de commissie zijn het adviseren van de minister van
    Onderwijs, Cultuur en Wetenschap (OCW) en de betreffende penvoerders die door
    de hiervoor genoemde regelingen zijn aangewezen.
