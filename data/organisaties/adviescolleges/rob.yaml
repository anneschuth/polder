  valid_from: '1900-01-01'
description:
  text: De Raad voor het Openbaar Bestuur (ROB) is een bij wet ingesteld strategisch
    adviescollege voor de regering en het parlement. De Raad adviseert over het functioneren
    en de inrichting van de overheid en democratie met het oog op het vergroten van
    de doelmatigheid en doeltreffendheid en met bijzondere aandacht voor de beginselen
    van de democratische rechtsstaat.Daarnaast adviseert de Raad ook over de beleidsmatige
    aspecten van de financiële verhoudingen in relatie tot bestuurlijke verhoudingen,
    in het bijzonder waar het de verhoudingen tussen Rijk, gemeenten en provincies
    betreft. Dit betreft de taken van de Raad voor de financiële verhoudingen die
    per 1 juli 2017 zijn taken heeft overgedragen aan de ROB en is opgehouden te bestaan.De
    ROB geeft invulling aan zijn adviestaak door rapporten te schrijven, symposia
    te organiseren, essaybundels samen te stellen of via het schrijven van artikelen
    of het geven van lezingen en colleges deel te nemen aan het debat over het functioneren
    van het openbaar bestuur.De Raad bestaat uit een voorzitter en een vaste kern
    van acht raadsleden. De leden van de Raad worden door de regering benoemd. De
    ROB wordt ondersteund door een professionele staf van twaalf mensen.
