description:
  text: In het regeerakkoord van het kabinet-Schoof uit 2024 is afgesproken dat de
    Rijksoverheid het aantal eigen ambtenaren en de inhuur van externe werknemers
    terugbrengt. Deze taakstelling heeft als doel om de Rijksdienst toekomstbestendiger
    te maken. De Ministeriële Commissie Taakstelling Rijksdienst (MCTR) is in het
    leven geroepen om in de gaten te houden of er voldoende voortgang is geboekt bij
    de uitvoering van de taakstelling. Als dat niet het geval is, kan de MCTR besluiten
    dat er aanvullende maatregelen nodig zijn. De MCTR wordt voorgezeten door de minister-president
    en bestaat verder uit de ministers van Binnenlandse Zaken en Koninkrijksrelaties
    (BZK), Financiën, Sociale Zaken en Werkgelegenheid (SZW), Infrastructuur en Waterstaat
    (IenW) en Landbouw, Visserij, Voedselzekerheid en Natuur (LVVN). Wanneer het kabinet-Schoof
    wordt opgevolgd door een nieuw kabinet, wordt de MCTR opgeheven.
