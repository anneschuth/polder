description:
  text: De Adviescommissie richtlijn passend bewijs preventie is ingesteld om een
    richtlijn te ontwikkelen die is toegespitst op het bewijzen van het nut van een
    preventiemaatregel bij gezondheidsvraagstukken. Om te kunnen bepalen of een preventiemaatregel
    effect heeft op de gezondheid, is er bewijs nodig. De richtlijn die door de commissie
    wordt ontwikkeld, geeft aan wanneer dit bewijs van een passend niveau is.Deze
    adviescommissie is geen formeel adviescollege en valt niet onder de Kaderwet adviescolleges.
