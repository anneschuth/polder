description:
  text: Het Forum Standaardisatie adviseert de publieke sector over het gebruik van
    standaarden (afspraken over informatie en processen) binnen de ICT. Dit om te
    bevorderen dat computersystemen gegevens uitwisselen volgens vaste afspraken en
    processen, zodat systeemfouten, systeemmisbruik en het verkeerd overnemen van
    data kunnen worden voorkomen. De voornaamste taken van het Forum zijn het toetsen
    van open standaarden en deze voorschrijven aan publieke organisaties, om zo de
    samenwerking tussen burgers, de overheid en bedrijven te verbeteren.Het Forum
    is een extern adviesorgaan waarop de Kaderwet adviescolleges niet van toepassing
    is, daarom is het Forum geen formeel adviescollege.
  url: https://www.forumstandaardisatie.nl/over-ons
