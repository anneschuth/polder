names:
- value: Raad voor Cultuur
  abbr: RVC
  valid_from: '1900-01-01'
description:
  text: De Raad voor Cultuur treedt op als het wettelijke adviesorgaan van de regering
    en het parlement wanneer het gaat om kunst, cultuur en media. De Raad adviseert
    over het Nederlandse cultuurbeleid. Hoewel de Raad zowel gevraagd als ongevraagd
    adviezen kan uitbrengen, wordt er meestal geadviseerd op verzoek van de minister
    van Onderwijs, Cultuur en Wetenschap.Naast adviezen over het cultuurbeleid geeft
    de Raad ook zogenoemde 'uitvoeringsadviezen'. Dit zijn adviezen over de aanwijzing
    van beschermde stads- en dorpsgezichten, over aanvragen tot aanwijzing als professionele
    organisatie voor monumentenbehoud en over voorwerpen en verzamelingen die van
    bijzondere, cultuurhistorische of wetenschappelijke betekenis zijn.
  url: https://www.raadvoorcultuur.nl/over-ons
