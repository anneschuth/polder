description:
  text: De Raad voor Energie bestaat uit onafhankelijke deskundigen die de regering
    en de Eerste en Tweede Kamer adviseren over diverse energievraagstukken. De nadruk
    van deze advisering ligt vooral op de volgende punten:* het overgaan naar een
    klimaatneutrale, betrouwbare en betaalbare energievoorziening in Nederland (de
    energietransitie);* het minder afhankelijk worden van buitenlandse energiebronnen
    en grondstoffen;* de voorbereiding van het [Nationaal plan energiesysteem (NPE)](https://www.rvo.nl/onderwerpen/energiesysteem/nationaal-plan-energiesysteem),
    dat in kaart brengt hoe er een energiesysteem kan worden opgezet waarmee Nederland
    in 2050 klimaatneutraal kan zijn.
