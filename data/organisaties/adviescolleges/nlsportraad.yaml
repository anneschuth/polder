description:
  text: De Nederlandse Sportraad (NLsportraad) is een onafhankelijk adviesorgaan dat
    zich richt op het versterken van de betekenis van topsport, breedtesport en bewegen
    voor de samenleving. De raad geeft strategische en operationele adviezen over
    zowel sportspecifieke thema’s als de relatie tussen sport en andere beleidsterreinen.
    Adviezen worden op transparante wijze ontwikkeld, samen met de betrokkenen uit
    het veld. Op die manier zijn de adviezen van de raad vernieuwend, onderbouwd door
    onderzoek en praktisch uitvoerbaar.
  url: https://www.nederlandse-sportraad.nl/de-raad
