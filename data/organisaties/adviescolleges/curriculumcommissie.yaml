description:
  text: Het curriculum van het Nederlandse onderwijs maakt onder meer duidelijk welke
    basiskennis en -vaardigheden leerlingen dienen te leren en leraren dienen te onderwijzen.
    Daarmee is het curriculum een belangrijk onderdeel van het onderwijsstelsel. De
    Curriculumcommissie is een adviescollege dat adviseert over het actueler maken
    van het curriculum, zodat hierin de meest recente inzichten uit het onderwijs,
    de maatschappij en de wetenschap verwerkt kunnen worden.
