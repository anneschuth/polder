description:
  text: "Het Korps Politie Caribisch Nederland staat voor een integere en betrouwbare\
    \ politie organisatie, die zegt wat ze doet en doet wat ze zegt. Een organisatie\
    \ die waakzaam en dienstbaar is en daadkrachtig en professioneel optreedt: vriendelijk\
    \ als het kan, streng als het moet.Dit houdt in dat we:•\tBereikbaar zijn voor\
    \ iedereen•\tEen goede verbinding hebben met de bewoners en bezoekers van de eilanden•\t\
    Direct adequaat reageren op noodhulp-meldingen•\tKlant- en doelgericht reageren•\t\
    Afspraken nakomen•\tOnze eigen grenzen kennen en aangeven naar buiten toe•\tLokale\
    \ en bovenlokale criminaliteit adequaat aanpakken•\tActief samenwerking zoeken\
    \ met andere partijen indien nodig•\tInteger en betrouwbaar handelen•\tOnze organisatie\
    \ zodanig inrichten en opleiden zodat bovenstaande waargemaakt kan"
