description:
  text: Bij Financiën gaan we over het geld. Niet als doel, maar in dienst van een financieel gezond Nederland.
    Wij bewaken daarom de balans tussen inkomsten en uitgaven en borgen het goede functioneren van het
    financiële stelsel. Wij richten ons op het belang van de samenleving als geheel, op korte én lange
    termijn en zijn ons daarbij bewust van de impact van ons handelen op alle burgers en bedrijven. Wij
    heffen en innen belastingen en doen dat eerlijk en zorgvuldig. Wij zien erop toe dat de besteding
    van overheidsgeld en de vormgeving van ons fiscale stelsel zo goed mogelijk aansluiten bij de publieke
    belangen. Daartoe zetten wij in op evenwichtige besluitvorming, efficiënte uitvoering en effectief
    toezicht.
