description:
  text: Het ministerie van Volkshuisvesting en Ruimtelijk Ordening werkt aan de basis
    van onze samenleving. Wij zorgen ervoor dat iedereen kan wonen en leven in een
    prettige omgeving. Daarnaast zorgen wij voor een goede verdeling van de schaarse
    ruimte in Nederland.
