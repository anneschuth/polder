description:
  text: Het ministerie van Landbouw, Visserij, Voedselzekerheid en Natuur staat voor
    duurzaam voedsel, waardevolle natuur en een vitaal platteland. Voor de huidige
    en toekomstige generaties.Wij maken ons sterk voor duurzaam, voldoende en veilig
    voedsel op ieders bord. Als ministerie maken wij ons er hard voor dat we de Nederlandse
    innovatiekracht op het gebied van voedselproductie gebruiken voor stappen in duurzaamheid.
    Zo dragen wij bij aan een gezonde aarde en het welzijn van mensen en dieren.Wij
    werken ook aan gezonde natuur binnen natuurgebieden, op het platteland en in grote
    wateren, maar juist ook in steden. Dit draagt eraan bij dat het platteland en
    de steden aantrekkelijke plekken zijn om te wonen en werken.
