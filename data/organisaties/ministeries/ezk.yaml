description:
  text: Het ministerie van Economische Zaken werkt samen met zijn partners aan een
    innovatief én ondernemend Nederland en een sterke, weerbare economie, die iedereen
    kansen biedt. Ondernemers en bedrijven moeten kunnen rekenen op een stabiel en
    voorspelbaar ondernemersklimaat. We zoeken daarbij steeds de beste balans tussen
    de belangen van bedrijven, consumenten en de omgeving.
