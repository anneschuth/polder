description:
  text: Defensie beschermt wat ons Nederlanders dierbaar is. We strijden voor een
    wereld waarin mensen in vrijheid en veiligheid kunnen leven. Omdat we ervan overtuigd
    zijn dat ieder mens dat verdient. Dat is onze missie en daarvoor gaan we op missie.De
    krijgsmacht heeft 3 hoofdtaken. Dit zijn:- beschermen van het eigen grondgebied
    en dat van bondgenoten;- bevorderen van de (internationale) rechtsorde en stabiliteit;-
    ondersteunen van civiele autoriteiten en leveren van bijstand bij rampen en crises.
