description:
  text: Het ministerie van Buitenlandse Zaken (BZ) is ieder uur van de dag ergens
    in de wereld actief. Zo is het ministerie er voor u als u voor korte of langere
    tijd naar het buitenland gaat. Ook behartigt BZ de internationale betrekkingen,
    vanuit Den Haag en via een netwerk van ruim 150 posten over de hele wereld. Daarnaast
    geeft het ministerie van Buitenlandse Zaken, in overleg met andere ministeries,
    vorm aan het Europa van de toekomst.
