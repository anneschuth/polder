      toelichting: Een convenant is een schriftelijke set van afspraken tussen een
        overheidsorganisatie en één of meer andere partijen. Het doel van de afspraken
        is het voorbereiden of realiseren van beleid of het uitvoeren van een overheidstaak.
    - informatiecategorie: Jaarplannen en jaarverslagen
