      toelichting: Een beschikking is een formele, schriftelijke beslissing van een
        overheidsorganisatie. Beschikkingen gaan over specifieke, individuele gevallen
        (bijvoorbeeld een bedrijf, een inwoner, een overtreding) – ze zijn niet op
        iedereen van toepassing.
