description:
  text: Het ministerie van Volksgezondheid, Welzijn en Sport (VWS) werkt aan een gezond,
    fit en veerkrachtig Nederland. Dat doen wij door een gezonde leefstijl, voldoende
    beweging en goede voeding te stimuleren. Ook bieden we Nederland goede (top)sportvoorzieningen.
    En we zetten ons in voor goede, betaalbare en voor iedereen toegankelijke zorg
    en ondersteuning.
