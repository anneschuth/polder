description:
  text: '''Samen leven en wonen, in een democratische rechtsstaat, met een slagvaardig
    bestuur. BZK, duidelijk voor mensen''. Dit is de missie van BZK.Het ministerie
    van BZK borgt de kernwaarden van de democratie. BZK staat voor een goed en slagvaardig
    openbaar bestuur en een overheid waar burgers op kunnen vertrouwen. BZK draagt
    eraan bij dat burgers kunnen wonen in betaalbare, veilige en energiezuinige woningen
    in een buurt waar iedereen meetelt en meedoet en het prettig leven is.'
  url: https://www.rijksoverheid.nl/ministeries/ministerie-van-binnenlandse-zaken-en-koninkrijksrelaties/organisatie
