description:
  text: 'Werk en bestaanszekerheid voor iedereen: samen werken voor samen leven. Het
    ministerie van Sociale Zaken en Werkgelegenheid werkt aan eerlijk, gezond en veilig
    werk in Nederland. Iedereen moet de kans krijgen om mee te doen en zich te ontwikkelen
    zodat je zelf kan bijdragen aan je eigen toekomst. Als het tegenzit zorgen we
    voor een vangnet, en als je met pensioen gaat voor een inkomen. Dat kan alleen
    in een land waar mensen er voor elkaar zijn. De bewindslieden zijn onder meer
    verantwoordelijk voor het arbeidsmarktbeleid, inclusief migratie en vrij verkeer
    van werknemers, uitkeringen en re-integratie, inkomensbeleid, het combineren van
    arbeid en zorg, arbeidsomstandighedenbeleid en inspectie daarop.'
