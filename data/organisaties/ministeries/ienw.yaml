description:
  text: Het ministerie van Infrastructuur en Waterstaat (IenW) zet in op leefbaarheid
    en bereikbaarheid, met een vlotte doorstroming in een goed ingerichte, schone
    en veilige omgeving. Het ministerie werkt aan krachtige verbindingen over de weg,
    spoor, het water en door de lucht, beschermt tegen wateroverlast en bevordert
    de kwaliteit van lucht en water. Een leefbaar, bereikbaar en veilig Nederland.
    Daar werkt IenW aan.
