description:
  text: Het ministerie van Onderwijs, Cultuur en Wetenschap (OCW) werkt elke dag aan
    een slim, vaardig en creatief Nederland. Een land waar je jezelf mag en kan zijn.Een
    land waar iedereen mee kan doen. Waar je de vrijheid hebt om je te ontwikkelen
    en te uiten. Als iedereen een gelijke kans krijgt, dan kan al het talent in Nederland
    bloeien. Van de handigste handen tot de knapste koppen.
