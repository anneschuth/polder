description:
  text: Het ministerie van Klimaat en Groene Groei werkt samen met zijn partners aan
    een schoner en sterker Nederland. Door te werken aan een klimaatneutrale samenleving
    en door te investeren in mensen, innovatie en duurzame energie. Zodat we de kansen
    kunnen pakken voor een duurzame toekomst en ervoor zorgen dat iedereen hieraan
    een bijdrage kan leveren. Nu én later.
