description:
  text: Wij zijn het ministerie van Justitie en Veiligheid. Wij werken aan een veilige
    en rechtvaardige samenleving voor iedereen. Mensen moeten in vrijheid kunnen samenleven.
    Met de juiste balans tussen hoofd en hart kijken wij naar waar de vrijheid van
    de één ophoudt en die van de ander begint.Recht en veiligheid raken mensen. Door
    te luisteren zijn we zorgvuldig, daadkrachtig en open over onze afwegingen. Want
    iedereen moet kunnen vertrouwen op rechtvaardigheid.Samen met honderdduizend collega’s
    bij tal van organisaties staan we midden in de maatschappij. Helpen we allerlei
    vormen van onrecht en criminaliteit te voorkomen. Zetten we ons in voor de bescherming
    van de samenleving en het individu. Handhaven we met de menselijke maat. Zorgen
    we voor toegankelijke rechtspraak.Wij zijn het ministerie van Justitie en Veiligheid.
    Met recht voor iedereen.
  url: https://www.rijksoverheid.nl/ministeries/ministerie-van-justitie-en-veiligheid/organisatie/organogram
