description:
  text: ProRail is spoorwegbeheerder. Dit betekent dat wij verantwoordelijk zijn voor
    het onderhoud, de vernieuwing, de uitbreiding en de veiligheid van het Nederlandse
    spoorwegnet. We verdelen als onafhankelijke partij de ruimte op 7.000 kilometer
    spoor, regelen alle treinverkeer (160 miljoen kilometer per jaar) en bouwen en
    beheren stations. Dit doen we met aandacht voor onze samenleving én met oog voor
    toekomst. ProRail staat voor duurzame mobiliteit. Door middel van innovatie maken
    we mogelijk dat er meer mensen met de trein kunnen reizen en meer goederen over
    het spoor vervoerd kunnen worden.ProRail is een niet-beursgenoteerde vennootschap.
    Het bestuur van de vennootschap wordt gevormd door drie statutair directeuren.
    De raad van commissarissen houdt toezicht.De Nederlandse staat is, via Railinfratrust
    B.V., de enige aandeelhouder van ProRail B.V.. Het aandeelhouderschap is ondergebracht
    bij het ministerie van Infrastructuur en Waterstaat.
