description:
  text: Coöperatie ParkeerService U.A. is ontstaan uit ParkeerService NV, het parkeerbedrijf
    van de gemeente Amersfoort, een stad met diverse parkeeruitdagingen. Zo kent Amersfoort
    een sterk aanzuigende regiofunctie, een autoluwe historische binnenstad en een
    grote vraag naar parkeercapaciteit. Door de jaren heen is uitgebreide expertise
    opgebouwd in parkeermanagement, parkeerbeleid en uitvoering van parkeertaken.In
    2010 is ParkeerService verzelfstandigd, waarbij gekozen is voor het coöperatiemodel.
    ParkeerService biedt daarmee een alternatief naast de bestaande mogelijkheden
    van gemeentelijk of commercieel parkeermanagement. Per 1 januari 2022 zijn dertien
    gemeenten aangesloten bij ParkeerService, waarbij het zowel om stedelijke als
    landelijke gemeenten gaat:- Gemeente Alphen aan de Rijn- Gemeente Amersfoort-
    Gemeente Barneveld- Gemeente Bergen- Gemeente Gouda- Gemeente Hilversum- Gemeente
    Hoogeveen- Gemeente Lelystad- Gemeente Nieuwegein- Gemeente Nijkerk- Gemeente
    Woerden- Gemeente Zandvoort- Gemeente Zeist
