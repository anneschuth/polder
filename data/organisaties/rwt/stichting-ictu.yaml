description:
  text: ICTU is een onafhankelijke advies- en projectenorganisatie binnen de overheid.
    Wij werken vanuit de overtuiging dat ICT de overheid vooruit helpt bij maatschappelijke
    vraagstukken.ICTU helpt overheden bij het verbeteren van hun dienstverlening met
    ICT, in dienst van het openbaar bestuur. Samen met onze opdrachtgevers realiseren
    we kwalitatief hoogwaardige digitale dienstverlening. We verbinden kennis aan
    kunde, en oplossingen aan vraagstukken. Met oog voor de balans tussen techniek
    en gebruik, tussen innovatie en werkbare oplossingen. Zodat burgers en bedrijven
    zaken die ze doen met de overheid veilig en makkelijk digitaal kunnen afhandelen.
    ICTU is in 2001 opgericht als overheidsstichting zonder winstdoel.
