description:
  text: Stichting Waarborgfonds Eigen Woningen (handelend onder de naam Nationale
    Hypotheek Garantie (NHG)) is in 1993 opgericht en staat voor een toegankelijke
    koopwoningmarkt voor kwetsbare groepen en consumenten in kwetsbare situaties,
    ook wanneer de macro-economische situatie ongunstig is. Dit tracht NHG te bereiken
    door via het afgeven van de Nationale Hypotheek Garantie consumenten toegang te
    bieden tot verantwoorde financiering voor koop en verbetering van een woning,
    hulp te bieden bij beheer en behoud van de woning en een vangnet te zijn in kwetsbare
    situaties.NHG is een privaatrechtelijke stichting met een eigen Raad van Bestuur.
    Het ministerie van Binnenlandse Zaken en Koninkrijksrelaties (BZK), het ministerie
    van Financiën, de Nederlandse Vereniging van Banken (NVB), en de Vereniging Eigen
    Huis (VEH) zijn als stakeholders betrokken bij NHG en benoemen NHG’s Raad van
    Commissarissen.
