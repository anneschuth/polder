description:
  text: 'Stichting Reclassering Caribisch Nederland is een zelfstandige stichting,
    werkzaam op drie eilanden in de Caribische Regio: Bonaire, St. Eustatius en Saba.
    17 medewerkers zetten zich in voor veiligheid in de samenleving. De meesten werken
    als Reclasseringswerkers, zij zijn degenen die het werk met de cliënten uitvoeren.
    Er wordt samengewerkt met een kleine staf van een administratief medewerker, een
    coördinator administratie en een beleidsadviseur. De organisatie wordt aangestuurd
    door de Directeur/Bestuurder. Een Raad van Toezicht houdt toezicht op de organisatie,
    bovendien leggen wij structureel verantwoording af aan de over onze werkzaamheden
    en financiën aan het Ministerie van Justitie en Veiligheid in Nederland, van wie
    wij subsidie ontvangen en de Raad voor de Rechtshandhaving.'
