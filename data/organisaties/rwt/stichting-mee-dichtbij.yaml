  valid_from: '1900-01-01'
description:
  text: 'MEE maakt meedoen mogelijk. MEE biedt gratis en onafhankelijk informatie,
    advies en ondersteuning aan kinderen, jongeren, volwassenen en ouderen, die door
    hun kwetsbaarheid minder goed mee kunnen in de samenleving. Zoals mensen met een
    lichamelijke beperking, psychische problemen, licht verstandelijke beperking,
    moeilijk lerend, niet-aangeboren hersenletsel, chronische ziekte, Autisme en dak-
    en thuislozen. MEE denkt mee bij alle vragen in het dagelijks leven en voor alle
    leeftijden (0 tot 100 jaar). Bijvoorbeeld: regelen van zorg, Wet langdurige zorg
    (Wlz), zorg in natura of een persoonsgebonden budget (PGB), evalueren van zorg,
    persoonlijk plan, zorg plan, Wet maatschappelijke ondersteuning (Wmo), omgaan
    met een beperking, huisvesting, solliciteren, arbeid, dagbesteding, vrije tijd,
    sport, vakantie, reizen met het openbaar vervoer, omgaan met geld, aanpassing
    aan huis, sociale vaardigheden, vriendschap, relaties, mantelzorg, leerachterstand,
    pesten, eenzaamheid, schulden, huiselijk geweld, loverboys. MEE biedt ook cursussen,
    lotgenotencontact, kortdurende ondersteuningstrajecten en beeldvormend onderzoek.
    Professionals kunnen ook terecht bij MEE voor trainingen, consult, intervisie
    en coaching on the job. Bijvoorbeeld voor het beter leren herkennen en omgaan
    met een beperking.'
