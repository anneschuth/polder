description:
  text: De Stichting Centraal Orgaan Voorraadvorming Aardolieproducten (COVA) is een
    Rechtspersoon met een Wettelijke Taak. COVA is de centrale, onafhankelijke, organisatie
    die in opdracht van de minister van Klimaat en Groene Groei, strategische olievoorraden
    voor Nederland aanhoudt. De verplichte olievoorraad bestaat voor maximaal 2/3
    uit ruwe aardolie en minimaal 1/3 uit geraffineerd product. De product voorraad
    bestaat uit benzine, diesel en kerosine met een onderlinge verdeling naar rato
    van het binnenlands gebruik.
