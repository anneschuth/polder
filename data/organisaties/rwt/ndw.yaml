  valid_from: '1900-01-01'
description:
  text: In NDW werken Nederlandse overheden samen aan het inwinnen, combineren, opslaan
    en distribueren van mobiliteitsdata.Deze gegevens zijn essentieel voor het managen
    van het verkeer, ze voeden talloze verkeersinformatiediensten en vormen een stevige
    basis onder het mobiliteitsbeleid in ons land.Data van en over het wegverkeer
    zijn onze core business. We regelen de inwinning ervan, zien toe op de kwaliteit,
    we verrijken data, slaan ze op en stellen ze beschikbaar.NDW is een initiatief
    van de volgende partners:- Gemeente Amsterdam- Gemeente Den Haag- Gemeente Rotterdam-
    Gemeente Utrecht- Metropoolregio Rotterdam Den Haag- Provincie Drenthe- Provincie
    Flevoland- Provincie Fryslân- Provincie Gelderland- Provincie Groningen- Provincie
    Limburg- Provincie Noord-Brabant- Provincie Noord-Holland- Provincie Overijssel-
    Provincie Utrecht- Provincie Zeeland- Provincie Zuid-Holland- Rijkswaterstaat-
    Vervoerregio Amsterdam
