description:
  text: De LID is een onafhankelijke stichting die de dierenwelzijnswetgeving in Nederland
    handhaaft en toezicht houdt op de naleving ervan. De inspectiedienst richt zich
    daarbij op het welzijn van hobby- en gezelschapsdieren. De LID telt 25 inspecteurs
    en werkt in opdracht van het ministerie van Landbouw, Natuur en Voedselkwaliteit.
