description:
  text: De heer Andrew Carnegie heeft bij akte van 7 oktober 1903 de naar hem genoemde
    stichting ingesteld, staande onder de Nederlandse wet en strekkende tot het bouwen,
    inrichten en onderhouden van een rechtsgebouw en een boekerij ten behoeve van
    het Permanente Hof van Arbitrage. In die akte is Den Haag als zetel der stichting
    aangewezen, met de bepaling dat de Nederlandse Regering, aan welke ten voorschreven
    einde en bij voorzegde alte 1,5 miljoen dollars ter beschikking zijn gesteld,
    zal aanwijzen bestuurders, staande onder behoorlijk toezicht, en daarenboven voorschriften
    vaststellen volgens welke het beheer over de stichting gevoerd zal worden. Bij
    k.b. van 30 mei 1904 zijn die voorschriften goedgekeurd welke zijn belichaamd
    in de statuten, vastgesteld bij notariële akte van 6 juni 1904, gewijzigd op 29
    april 1953. Volgens art. 3 bestaat het bestuur uit vijf leden, allen Nederlanders,
    van wie er vier worden benoemd door de Koningin, terwijl de Raad van Beheer van
    het Permanente Hof Arbitrage het vijfde lid zal aanwijzen. Het bestuur wordt uitgeoefend
    onder toezicht van een Raad, welke - ingevolge art. 4 bestaat uit 9 leden.
