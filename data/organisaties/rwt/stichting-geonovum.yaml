description:
  text: Geonovum is een overheidsstichting met veel kennis en een rijk netwerk. De
    overheid beter laten presteren met geo-informatie. Dat is waar wij dagelijks aan
    werken. We doen dat door de toegankelijkheid van geo-informatie te verbeteren
    en door de uitwisseling van geo-informatie onderling en met andere soorten gegevens
    mogelijk te maken met standaarden. Daarnaast helpen we overheidsorganisaties om
    geo-informatie beter te benutten, door hen te informeren over bestaande voorzieningen.
    En door organisaties die behoefte hebben aan geo-informatie, te verbinden aan
    partijen die hen daarmee kunnen helpen.
