description:
  text: 'De CIBUA is een coöperatie waarin ongeveer 65 bedrijven zijn verenigd die
    "lid zijn" van de Gezamenlijke Brandweer (GB).De GB is een brandweerorganisatie
    met een dubbele taakstelling: enerzijds is de GB de bedrijfsbrandweer van veel
    bedrijven in het Rotterdamse haven- en industriegebied en anderzijds levert de
    GB de publieke brandweerzorg in het Rotterdamse haven- en industriegebied, als
    ook in de woonkernen Hoogvliet, Rozenburg en Pernis. Hiermee is de GB een publiek/private
    samenwerking.Bij Koninklijk Besluit 6 november 1997 is CIBUA toegetreden tot de
    "Gemeenschappelijke regeling gezamenlijke brandweer voor het haven- en industriegebied
    van Rotterdam".'
