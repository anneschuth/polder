# Publiceert de polder-site (Astro + D3-organogram) naar GitHub Pages
# op https://anneschuth.nl/polder/.
#
# Pipeline:
# 1. polder build viz  -> JSON-bundels in dist/site/data/
# 2. kopieer dist/site/data naar web/public/organogram/data/
# 3. astro build       -> web/dist/ (5.5k persoon-pagina's + org/post/stats + organogram)
# 4. deploy web/dist/ naar Pages
#
# Eenmalige setup: repo-settings -> Pages -> Source = "GitHub Actions",
# Custom domain = anneschuth.nl. Astro's `base: '/polder'` zorgt voor de
# subpath-routing.

name: pages

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "schemas/**"
      - "src/polder/build/**"
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync polder dependencies
        run: uv sync

      - name: Build D3 viz bundles
        run: uv run polder build viz

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install Astro dependencies
        working-directory: web
        run: npm ci

      - name: Install viz data under web/public/organogram/data
        run: |
          rm -rf web/public/organogram/data
          mkdir -p web/public/organogram
          cp -R dist/site/data web/public/organogram/data

      - name: Build Astro site
        working-directory: web
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
